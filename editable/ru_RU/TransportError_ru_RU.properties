The_parameter_must_be_a_constant = Параметр должен быть константой: #.
The_Phase_Change_Interface_feature_requires_to_be_adjacent,_on_each_side,_either_to_a_Deforming_Domain_feature_under_Deformed_Geometry_in_Definitions,_either_to_a_Free_Deformation_feature_under_Deformed_Geometry_physics_interface. = Функция «Интерфейс фазового изменения» должна с каждой стороны примыкать либо к функции «Деформация области» в разделе «Деформированная геометрия», либо к функции «Свободная деформация» в физическом интерфейсе «Деформированная геометрия».
The_Phase_Change_Interface,_exterior_feature_requires_to_be_adjacent,_either_to_a_Deforming_Domain_feature_under_Deformed_Geometry,_either_to_a_Free_Deformation_feature_under_Deformed_Geometry_physics_interface. = Интерфейс фазового изменения, внешний элемент должен быть смежным либо с элементом «Деформирующая область» в разделе «Деформированная геометрия», либо с элементом «Свободная деформация» в физическом интерфейсе «Деформированная геометрия».
The_species_X_cannot_be_set_to_solvent = Вид # не может быть установлен в качестве растворителя.
The_Specify_density_and_Specify_reference_temperature_settings_must_be_set_to_From_fluid_flow_interface_when_the_Nonisothermal_flow_multiphysics_coupling_is_used_together_with_the_Nonisothermal_mixture_model_multiphysics_coupling = Для параметров «Указать плотность» и «Указать эталонную температуру» необходимо установить значение «Из интерфейса потока жидкости», если мультифизическая связь «Неизотермический поток» используется вместе с мультифизической связью «Неизотермическая модель смеси».
The_unit_operation_x_does_not_support_isothermal_chemical_system = Работа установки # не поддерживает изотермическую химическую систему.
There_must_be_at_least_two_species_defined_and_active = Должно быть как минимум два определенных и активных вида.
This_multiphysics_coupling_uses_a_multiphase_material_that_does_not_define_its_volume_fraction_from_this_coupling_or_one_of_its_physics = В этой мультифизической связи используется многофазный материал, объемная доля которого не определяется этой связью или одной из его физических особенностей.
Token_error = Ошибка токена.
Too_many_layers_in_wall_heat_transfer_feature_X = Слишком много слоев в функции теплопередачи стены #
Two_main_branches_of_X_in_point_Y_should_have_equal_angle_to_side_branch = Две основные ветви #0 в точке #1 должны иметь равный угол с боковой ветвью.
Two_of_three_edges_connected_to_X_in_point_Y_should_colinear_and_the_third_one_should_be_perpendicular = Два из трех ребер, соединенных с #0 в точке #1, должны быть коллинеарны, а третье - перпендикулярно.
Two_species_with_the_same_tag_but_different_names = Вид "#0" получил тот же тег, что и вид "#1".\nОтредактируйте формулу, чтобы использовать вид "#1", или выберите другое имя для "#0".
# - U --------------------------------------------------------------------- U -
Unsupported_collision_feature_specification_passed_to_electron_impact_event_handler = Спецификация неподдерживаемой функции столкновения передана в обработчик событий удара \nelectron.
Unit_syntax_error = Синтаксическая ошибка модуля.
Unknown_cross-section_file_type = Неизвестный тип файла поперечного сечения.
Unknown_variable_on_row_in_the_Model_variable_expression_of_Experiment_feature = Неизвестная переменная (#0) в строке #1 в выражении переменной модели функции эксперимента (#2)
# - V --------------------------------------------------------------------- V -
Valid_charge_indication_text = Например, допустимое указание заряда записывается одним из следующих способов: \nFe++, Fe(++), Fe(2+), Fe^++, Fe^(++), Fe^2+, Fe^(2+).\nЗаряд указывается последним в названии вида, перед любым указанием фазы.
Valid_chemical_formula_text =  Убедитесь, что формула состоит только из элементов таблицы Менделеева, \n, за которыми необязательно следует указание заряда и/или фазы. \nКроме того, "e-", обозначающий электрон, является допустимым вводом.
Valid_input_starts_with_text = Допустимый ввод начинается с символа английского алфавита или закрывающего символа, например "(".
Valid_phase_indication_text = Действительная индикация фазы состоит из действительного названия вида непосредственно \n, за которым следует допустимая индикация фазы.\nИндикация фазы всегда должна располагаться последней после любого указания заряда.\nНапример Fe(2+)(aq).\nСписок допустимых фаз см. в документации.
Valid_use_of_caret_characters_text = Символ вставки ^ допускается только как часть действительного указания заряда, например: \n Fe^++, Fe^(++), Fe^2+, Fe^(2+).\nЗаряд указывается последним в названии вида, перед любым указанием фазы.
Valid_use_of_enclosing_characters_text = Включающие символы должны быть правильно вложены и находиться в парах. Допустимые закрывающие символы: "()", "[]" и "{}".
Valid_use_of_numbers_text = Допустимый ввод не содержит цифр непосредственно после символов (, [ или {.
# - W --------------------------------------------------------------------- W -
Wall_heat_transfer_feature_must_have_at_least_one_resistive_layer = Элемент теплопередачи стены должен иметь хотя бы один резистивный слой.
When_coupled_to_High_Mach_Number_Flow_interfaces,_the_Transport_of_Diluted_Species_interface_only_supports_conservative_form_of_the_convective_term = В сочетании с интерфейсами потока с высоким числом Маха интерфейс «Перенос разбавленных частиц» поддерживает только консервативную форму конвективного члена.
When_using_the_Thermochemistry_coupling_in_a_Vapor_Liquid_Mixture_Interface_feature,_all_dependent_variables_must_be_coupled._Use_the_Species_Matching_table_in_the_Chemistry_interface_to_couple_all_dependent_variables = При использовании термохимической связи в функции интерфейса Vapor–жидкость-смесь все зависимые переменные должны быть связаны. Используйте таблицу соответствия видов в интерфейсе «Химия», чтобы связать все зависимые переменные.
