Adaption_only_implemented_for_tetrahedral_meshes._Consider_converting_the_mesh = Адаптация реализована только для тетраэдральных сеток. Рассмотрите возможность преобразования сетки. 
Adaption_only_implemented_for_triangular_meshes = Адаптация реализована только для треугольных сеток.
Adaption_only_implemented_for_triangular_meshes._Consider_converting_the_mesh = Адаптация реализована только для треугольных сеток. Рассмотрите возможность преобразования сетки.
