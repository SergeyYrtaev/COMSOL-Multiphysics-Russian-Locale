Arpack_with_search_method_rectangle_does_not_support_phase_velocity_transformation._Use_arpack_with_search_method_around_shift_instead. = Arpack с прямоугольником метода поиска не поддерживает преобразование фазовой скорости. \nВместо этого используйте arpack с методом поиска по сдвигу.
