Adaptive_gaussian_process_cannot_find_new_input_point_to_compute_and_improve_the_accuracy_Try_to_increase_surrogate_evaluations_per_adaptation = Адаптивный гауссов процесс не может найти новую входную точку для вычисления и повышения точности. Постарайтесь увеличить суррогатные оценки за адаптацию.
