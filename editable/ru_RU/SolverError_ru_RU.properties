Automatic_multigrid_coarsening_refining_is_not_supported_for_meshes_defining_their_own_geometric_models = Автоматическое многосеточное огрубление/уточнение не поддерживается для сеток, определяющих собственные геометрические модели.
Automatic_time_stepping_with_rhoinf_1_not_supported_for_first_order_systems._Use_manual_time_stepping_or_change_rhoinf = Автоматический шаг по времени с параметром шага по времени Усиление для высокой частоты = 1 не поддерживается для систем первого порядка. \nИспользуйте шаг по времени вручную или измените значение Усиление для высокой частоты.
Autoscaling_failed_in_SVD = В SVD не удалось выполнить автоматическое масштабирование.
A_memory_allocation_failed = Не удалось выделить память.
A_Cholesky_solver_can_only_handle_positive_definite_matrices = Решатель Холецкого может обрабатывать только положительно определенные матрицы.
A_segregated_approach_is_not_supported_for_modal_analysis = Раздельный подход не поддерживается для модального анализа.
