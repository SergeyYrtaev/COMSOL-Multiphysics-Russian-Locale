Complex_number_unexpectedly_encountered._To_overcome_this_error,_select_the_Allow_complex_numbers_check_box_in_the_Advanced_section_of_the_time-dependent_solver_settings = Неожиданно встретилось сложное число. Чтобы устранить эту ошибку, \nустановите флажок Разрешить комплексные числа в разделе «Дополнительно» \n настроек нестационарного решателя.
