COBYLA_could_not_satisfy_all_simple_bounds_Infeasibilities_have_been_minimized = COBYLA не могла удовлетворить всем простым ограничениям. Невозможности сведены к минимуму.
colon_NaN_or_Inf_in_matrix = : NaN или Inf в матрице.
colon_NaN_or_Inf_in_vector = : NaN или Inf в векторе.
Could_not_augment_surrogate_model_with_verification_quantities_of_interest_data = Не удалось дополнить суррогатную модель проверочными объемами интересующих данных.
Could_not_evaluate_the_derivative_of_the_objective_function_with_respect_to_the_eigenvalues_Check_the_expression_of_the_objective_function = Не удалось вычислить производную целевой функции по собственным значениям. Проверьте выражение целевой функции.
Computation_of_accurate_boundary_fluxes_failed_Accurate_flux_will_not_be_available_for_postprocessing = Вычислить точные граничные потоки не удалось. Точный флюс не будет доступен для постобработки.
Computation_of_left_eigenvectors_failed._Try_to_change_the_shift_in_the_eigenvalue_solver = Вычисление левых собственных векторов не удалось. Попробуйте изменить сдвиг в решателе собственных значений.
