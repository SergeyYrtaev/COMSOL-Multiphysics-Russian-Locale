Terminal_sweep_cannot_control_circuit_terminals = Развертка клемм не может контролировать клеммы цепи.
Terminal_features_with_Terminated_setting_can_only_be_used_in_frequency_domain_Disable_the_feature = Функции терминала с настройкой «Терминировано» можно использовать только в частотной области. \nОтключите эту функцию на этапе исследования.
Too_many_coils_per_slot = Слишком много катушек на слот.
The_BH_curve_constitutive_relation_can_only_be_used_in_stationary_time_dependent_or_frequency_perturbation_study_steps = Определяющее соотношение 'BH Curve' можно использовать только на этапах исследования стационарного, временного или частотного исследования возмущений.
The_center_coordinate_of_perfectly_matched_layers_cannot_be_evaluated = Координата центра идеально совмещенных слоев не может быть оценена.
The_center_coordinate_of_perfectly_matched_layers_needs_to_be_matched_to_that_of_the_far_field_domain_sphere = Центральная координата идеально согласованных слоев должна совпадать с координатой областьной сферы в дальней зоне. 
The_circuit_contains_hanging_nodes = Схема содержит висячие узлы.
The_Current_excitation_is_not_supported_for_Single_conductor_coils_in_time_dependent_studies._Read_doc. = Возбуждение током не поддерживается для однопроводных катушек в исследованиях, зависящих от времени.\nПожалуйста, обратитесь к документации по функциям 3D-катушки.
The_effective_BH_curve_constitutive_relation_can_only_be_used_in_frequency_domain_study_steps = Определяющее соотношение 'Effective BH Curve' можно использовать только на этапах исследования частотной области.
The_effective_HB_curve_constitutive_relation_can_only_be_used_in_frequency_domain_study_steps = Определяющее соотношение 'Effective HB Curve' можно использовать только на этапах исследования частотной области.
The_exterior_boundaries_of_the_force_calculation_feature_must_coincide_with_the_exterior_boundaries_of_one_or_more_charge_conservation_features = Внешние границы функции расчета силы должны совпадать с внешними границами одной или нескольких функций сохранения заряда.
The_exterior_boundaries_of_the_force_calculation_feature_must_coincide_with_the_exterior_boundaries_of_one_or_more_magnetic_flux_conservation_features = Внешние границы функции расчета силы должны совпадать с внешними границами одной или нескольких функций сохранения магнитного потока.
The_far_field_X_cannot_be_evaluated = Дальнее поле # не может быть оценено.
The_background_H_field_was_specified._Please_redefine_the_background_field_in_terms_of_E. = Было указано фоновое поле H. Пожалуйста, переопределите поле фона в терминах E.
The_integration_lines_evaluating_voltage_and_current_are_not_defined_properly = Линии интегрирования, оценивающие напряжение и ток, не определены должным образом.
The_lattice_primitive_vectors_are_linearly_dependent = Примитивные векторы решетки линейно зависимы.
The_Magnetic_Losses_constitutive_relation_can_only_be_used_in_frequency_domain_study_steps = Определяющее соотношение 'Magnetic Losses' можно использовать только на этапах исследования в частотной области.
The_material_properties_adjacent_to_a_periodic_port_must_be_homogeneous = Свойства материала, прилегающего к периодическому порту, должны быть однородными.
The_material_properties_in_a_far-field_domain_must_be_homogeneous = Свойства материала в дальней зоне должны быть однородными.
The_periodic_port_boundary_must_be_continuous = Граница периодического порта должна быть непрерывной.
The_periodic_unit_cell_is_not_perfectly_aligned_to_the_major_axes_a_periodic_reference_point_needs_to_be_added = Периодическая элементарная ячейка не идеально выровнена по главным осям. Необходимо добавить периодическую контрольную точку.
The_slit_condition_should_be_applied_only_on_an_interior_boundary_or_the_port_should_be_placed_on_an_exterior_boundary = Условие разреза следует применять только на внутренней границе, либо порт следует размещать на внешней границе.
There_cannot_be_more_than_one_slit_port_per_port_boundary = На каждой границе не может быть более одного щелевого порта.
There_cannot_be_more_than_one_excited_port_when_using_a_deposited_power_port = При использовании выведенного порта питания не может быть более одного возбужденного порта.
There_cannot_be_more_than_one_periodic_port_per_port_boundary = На границе порта не может быть более одного периодического порта.
There_is_no_Wave_Equation,_Electric_node_with_infinite_void_selection = Не существует Волнового Уравнения, Электрического узла с бесконечным выбором пустот.
Time_periodic_phase_can_be_used_only_in_input_fields_accepting_time_periodic_valued_expressions_and_it_cannot_be_used_into_variable_definitions = Периодическая по времени фаза может использоваться только в полях ввода, принимающих периодические по времени выражения, и ее нельзя использовать в определениях переменных.
Time_to_Frequency_Losses_study_inputs_inconsistent_with_input_study_output_times = Входные данные исследования «Время до потери частоты» не соответствуют времени выходных данных исследования входных данных.
Touchstone_file_is_not_imported_yet = Файл Touchstone еще не импортирован.
Touchstone_filename_is_empty = Имя файла Touchstone пусто.
Touchstone_input_array_dimensions_mismatch = Несоответствие размеров входного массива Touchstone.
Two_periodic_conditions_are_needed_or_a_reference_point_on_each_periodic_port_needs_to_be_added = Требуются два периодических условия или необходимо добавить опорную точку на каждом периодическом порту.
Two_points_describing_the_axis_vector_need_to_be_defined_properly = Две точки, описывающие вектор оси, должны быть определены правильно.
