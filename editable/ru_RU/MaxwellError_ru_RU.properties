#
# English error messages resource file.
#
# Translation to another language:
#
# Replace the English string to the right of
# the = sign with the translated string in the
# local language. The string can contain Unicode
# characters.
#
# Note: Do not change the string to the left
# of the equal sign.
#
# The string can contain \n indicating a line break.
#
# Unicode characters for Greek letters should not be
# translated.
#
# The string can contain a placeholder character # (do
# not confuse this with a # at the beginning of a line
# that contains comments). This placeholder indicates a
# variable name such as the name of a spatial coordinate.
# It should remain in the translated string in the position
# where this word appears in the translated sentence.
#
# The master strings ending in _mnemonic contains a keyboard
# shortcut letter. Replace them with the letter in the local
# language. Bear in mind that all letters on a particular menu
# must be unique and that many menu items in the File and Edit
# menus have established shortcut keys.
#
# Save the translated file as
#
# MaxwellError_<ISO Language Code>_<ISO Country Code>.properties
#
# for example, for Japanese in Japan,
#
# MaxwellError_ja_JP.properties


# - # --------------------------------------------------------------------- # -
2D_axisymmetric_coaxial_port_does_not_support_nonzero_azimuthal_mode_number = 2D-осесимметричный коаксиальный порт не поддерживает ненулевой номер азимутальной моды.
3D_single_turn_coil_features_cannot_be_used_in_time_dependent_studies_Disable_the_feature = Функции 3D однопроводной катушки нельзя использовать в исследованиях, зависящих от времени.\nПожалуйста, отключите эту функцию на этапе исследования.
# - A --------------------------------------------------------------------- A -
A_Circular_coil_requires_a_Coil_Geometry_subfeature._Read_doc. = Для круглой катушки требуется подфункция «Геометрия катушки» с допустимым выбором. \nПожалуйста, обратитесь к документации по функциям 3D-катушки.
A_device_must_be_selected_for_a_current-controlled_switch = Необходимо подобрать устройство для выключателя, управляемого по току.
A_Linear_coil_requires_a_Coil_Geometry_subfeature._Read_doc. = Для линейной катушки требуется подфункция «Геометрия катушки» с допустимым выбором.\nПожалуйста, обратитесь к документации по функциям 3D-катушки.
A_Numeric_coil_requires_a_Geometry_Analysis_subfeature._Read_doc. = Для числовой катушки требуется дополнительная функция анализа геометрии.\nПожалуйста, обратитесь к документации по функциям 3D-катушки.
A_User_defined_coil_requires_a_User_Defined_Coil_Geometry_subfeature._Read_doc. = Для катушки, определяемой пользователем, требуется подфункция «Геометрия катушки, определяемая пользователем».\nПожалуйста, обратитесь к документации по функциям 3D-катушки.
All_selected_domains_must_be_connected_when_using_a_mapped_mesh = Все выбранные домены должны быть связаны при использовании сопоставленной сетки.
All_selected_domains_must_be_connected_when_using_a_swept_mesh = Все выбранные домены должны быть связаны при использовании сетки с вытягиванием.
Angle_of_incidence_must_be_a_number = Угол падения должен быть числом.
Azimuth_angle_of_incidence_must_be_a_number = Азимутальный угол падения должен быть числом.
# - B --------------------------------------------------------------------- B -
Boundary_current_source_cannot_be_applied_to_insulating_layers = Источник граничного тока нельзя применять к изолирующим слоям.
Boundary_current_source_cannot_be_applied_to_dielectric_layers = Источник граничного тока нельзя применять к диэлектрическим слоям.
Boundary_selection_for_X_is_not_on_a_valid_annular_surface_for_coaxial_type_port = Выбор границы для # не находится на допустимой кольцевой поверхности для порта коаксиального типа.
Boundary_selection_for_X_is_not_on_a_valid_circular_surface_for_circular_type_port = Выбор границы для # не находится на допустимой круглой поверхности для порта круглого типа.
# - C --------------------------------------------------------------------- C -
Cannot_analyze_circular_coil_geometry_in_imported_meshes_use_robust_geometry_analysis_method = Невозможно проанализировать геометрию круговой катушки в импортированных сетках.\nИспользуйте метод анализа устойчивой геометрии.
Cannot_determine_primitive_vectors = Невозможно определить примитивный вектор.
Cannot_evaluate_inductance_in_stationary_studies_if_there_are_multiple_or_no_active_coils = Невозможно оценить индуктивность в стационарных исследованиях, если имеется несколько активных катушек или они отсутствуют.
Cannot_open_Touchstone_file = Невозможно открыть файл Touchstone.
Cannot_use_periodic_condition_and_curl_type_2_shape_functions_with_swept_mesh_Either_change_to_default_curl_shape_functions_or_use_tetrahedral_mesh = Невозможно использовать периодическое условие и функции формы скручивания типа 2 с сеткой по стреловидию. \n\nЛибо измените функции формы скручивания по умолчанию, либо используйте тетраэдральную сетку.
Circular_port_boundary_is_not_defined_properly = Граница круглого порта определена неправильно.
Conductor_has_empty_selection = У одного из Проводников пустое выделение.
Conductor_selection_is_not_connected = Выбор проводника не подключен.
Conductor_terminal_subfeature_has_empty_selection = Одна из подфункций «Контроль проводника» имеет пустой выбор.
Conductor_voltage_calculation_not_performed_add_a_source_initialization_study_step = Расчет напряжения проводника не выполняется. Для этого добавьте этап исследования «Инициализация источника».
Conflicting_values_in_sector_symmetry_specification = Конфликтующие значения в спецификации симметрии секторов.
Conflict_with_existing_subfeatures = Конфликт с существующими дополнительными функциями.
Consider_using_Relative_Permeability_for_the_stationary_case = Рассмотрите возможность использования 'Relative Permeability' для стационарного случая.
Could_not_find_edge_connected_to_reference_point = Не удалось найти ребро, соединенное с контрольной точкой.
# - D --------------------------------------------------------------------- D -
Data_mismatch_in_Touchstone_export = Несоответствие данных при экспорте Touchstone.
Data_mismatch_in_Touchstone_export_Parametric_sweep_for_Touchstone_file_export_cannot_include_parameters_other_than_port_name_and_frequency = Несоответствие данных при экспорте Touchstone. Параметрическая развертка для экспорта файла Touchstone не может включать другие параметры, кроме имени порта и частоты.
Destination_selection_in_periodic_condition_is_empty = Выбор пункта назначения в периодическом состоянии пуст.
Device_x_contains_too_few_terminals_y_expected_z = Устройство #0 содержит слишком мало терминалов (#1, ожидается #2).
Dielectric_losses_and_loss_tangent_can_only_be_used_in_frequency = Диэлектрические потери и тангенс потерь можно использовать только в исследованиях в частотной области.
Direction_between_lumped_port_terminals_must_be_nonzero = Направление между терминалами сосредоточенного порта должно быть ненулевым.
Duplicate_coil_name = Повторяющееся название катушки.
Duplicate_device_name_x = Повторяющееся имя устройства #.
# - E --------------------------------------------------------------------- E -
Each_Rotating_Domain_feature_should_be_covering_one_component_of_the_physics_selection = Каждая функция вращающейся области должна охватывать один компонент выбора физики.
Edge_ground_cannot_be_applied_to_insulating_layers = Краевое заземление нельзя наносить на изоляционные слои.
Edge_terminal_cannot_be_applied_to_insulating_layers = Краевая клемма не может быть применена к изолирующим слоям.
Edge_terminal_cannot_be_applied_to_dielectric_layers = Краевая клемма не может быть применена к диэлектрическим слоям.
Edge_electric_potential_cannot_be_applied_to_insulating_layers = Краевой электрический потенциал не может быть приложен к изолирующим слоям.
Edge_current_source_cannot_be_applied_to_insulating_layers = Источник краевого тока нельзя применять к изолирующим слоям.
Edge_current_source_cannot_be_applied_to_dielectric_layers = Источник краевого тока нельзя применять к диэлектрическим слоям.
Electric_potential_selection_in_port_is_empty = Выбор электрического потенциала в порту пуст.
Elevation_angle_of_incidence_must_be_a_number = Угол возвышения и падения должен быть числом.
Empty_maximum_element_size_set_the_maximum_element_size_to_0.2_wavelengths_or_smaller = Пустой максимальный размер элемента. Установите максимальный размер элемента на 0,2 длины волны или меньше.
Empty_maximum_frequency_for_physics_controlled_mesh = Пустая максимальная частота для сетки, управляемой физикой.
Empty_minimum_wavelength_for_physics_controlled_mesh = Пустая минимальная длина волны для сетки, управляемой физикой.
Empty_parameter_input_for_physics_controlled_mesh = Пустой ввод параметра для сетки, управляемой физикой.
Empty_selection_for_outer_circle = Пустое выделение для внешнего круга.
Equation_form_is_set_to_Boundary_mode_analysis_but_the_type_of_the_port_named_X_is_not_set_to_Numeric = Для формы уравнения задан анализ граничного режима, но тип порта с именем # не установлен на числовой.
Error_in_circular_port_set_up_Invalid_mode_number = Ошибка в настройке кругового порта. Неверный номер режима.
Error_in_RLC_coil_group_setup = Ошибка в настройке группы катушек RLC.
Error_in_periodic_port_set_up = Ошибка периодической настройки порта.
Error_in_rectangular_port_set_up_Invalid_mode_number = Ошибка в настройке прямоугольного порта. Неверный номер режима.
Error_in_rectangular_port_set_up_The_selection_is_not_rectangular = Ошибка в настройке прямоугольного порта. Выбор не прямоугольный.
Error_in_parsing_SPICE_netlist_file = Ошибка при анализе файла списка соединений SPICE.
Error_in_uniform_element_set_up = Ошибка в настройке элемента униформы.
# - F --------------------------------------------------------------------- F -
Failed_to_create_Gaussian_beam_background_field = Не удалось создать фоновое поле гауссова луча.
Failed_to_place_all_domains_on_a_lattice = Не удалось разместить все домены в решетке.
Failed_to_populate_winding_phases = Не удалось заполнить фазы обмотки.
Failed_to_read_calculator_input_parameters = Не удалось прочитать входные параметры калькулятора.
Failed_to_read_Touchstone_file = Не удалось прочитать файл Touchstone.
Failed_to_set_mesh_size_automatically = Не удалось установить размер сетки автоматически.
Feature_x_cannot_be_defined_in_same_domain_as_feature_y = Функция #0 не может быть определена в том же области, что и функция #1.
FFT_start_time_anterior_to_transient_initial_time = Время начала БПФ перед переходным начальным временем
File_is_not_compatible_with_x_port_touchstone_format = Файл несовместим с форматом #-port Touchstone.
Found_a_sub-circuit_instance_not_linked_to_any_block = Обнаружен экземпляр подсхемы, не связанный ни с одним блоком.
Frequency_cannot_be_evaluated_from_study_as_it_doesnt_include_frequency_domain_wavelength_domain_or_eigenfrequency_study_steps = Частоту невозможно оценить на основе исследования, поскольку она не включает этапы исследования частотной области, области длин волн или собственных частот.
Frequency_in_X_study_step_cannot_be_evaluated = Частота на # шаге исследования не может быть оценена.
Frequency_in_equation_settings_cannot_be_evaluated = Частоту в настройках уравнения невозможно оценить.
Frequency_or_wavelength_in_study_step_cannot_be_evaluated = Частота или длина волны на этапе исследования не могут быть оценены.
Frequency_or_wavelength_in_study_step_is_empty = Частота или длина волны на этапе исследования пуста.
# - G --------------------------------------------------------------------- G -
Geometry_inconsistent_with_specified_numbers_of_slot_poles_and_layers = Геометрия не соответствует указанному количеству полюсов пазов и слоев.
# - H --------------------------------------------------------------------- H -
Homogenized_shell_must_not_be_applied_to_boundaries_shared_by_layered_shell = Гомогенизированную оболочку не следует применять к границам, общим для многослойной оболочки, даже если выбор слоев отличается.
# - I --------------------------------------------------------------------- I -
Ignoring_unknown_SPICE_command_in_statement_x = Игнорирование неизвестной команды SPICE в операторе #.
Impedance_boundary_condition_only_supports_frequency_studies_Disable_feature = Функция «Граничные условия импеданса» поддерживает только частотные исследования.\nПожалуйста, отключите эту функцию на этапе исследования.
Incident_wave_direction_for_Gaussian_beam_input_option_must_be_homogeneous = Направление падающей волны для варианта ввода гауссова луча должно быть однородным.
Incomplete_selection_for_periodic_condition = Неполный выбор для периодического состояния.
Inconsistent_circuit_setup = Непоследовательная настройка схемы.
Inconsistent_number_of_terminals_between_subcircuit_definition_x_and_device_y = Несогласованное количество клемм между определением подсхемы '#0' и устройством '#1'. 
Inductor_and_capacitor_settings_for_lumped_elements_can_only_be_used_in_frequency_domain = Настройки индуктивности и конденсатора для сосредоточенных элементов можно использовать только в частотной области.
Infinite_void_is_the_only_selection_allowed_in_Wave_Equation_Electric_1_when_multiple_Wave_Equation_Electric_features_exist = Бесконечная пустота — единственный выбор, разрешенный в Волновом уравнении, Электрическое 1 (wee1), когда существует несколько функций Волнового Уравнения, Электрическое.
Input_study_in_Time_To_Frequency_Losses_study_set_to_current_requires_an_active_transient_study_step = Исследование входных данных в исследовании «Время до потери частоты», для которого установлено текущее значение, требует активного этапа исследования переходных процессов.
Interface_current_source_must_be_adjacent_to_a_conducting_boundary = Источник тока интерфейса должен находиться рядом с проводящей границей.
Internal_design_error = Внутренняя ошибка проектирования.
Internal_error_in_vector_shape_maker = Внутренняя ошибка в создателе векторных фигур.
Invalid_equation_form = Неверная форма уравнения.
Invalid_identifier_for_device = Неверный идентификатор устройства #.
Invalid_identifier_for_node_x_in_device_y = Неверный идентификатор узла #0 в устройстве #1.
Invalid_identifier_for_model_x = Неверный идентификатор модели #.
Invalid_input_parameter_in_material_properties = Неверный входной параметр в свойствах материала.
Invalid_maximum_element_size = Неверный максимальный размер элемента.
Invalid_maximum_frequency_for_physics_controlled_mesh = Недопустимая максимальная частота для сетки, управляемой физикой.
Invalid_minimum_wavelength_for_physics_controlled_mesh = Недопустимая минимальная длина волны для сетки, управляемой физикой.
Invalid_number_of_variable_groups = Недопустимое количество групп переменных.
Invalid_type_for_model_x = Неверный тип модели #.
Invalid_wire_gauge_specification = Неверная спецификация сечения провода.
# - J --------------------------------------------------------------------- J -
Jiles-Atherton_Hysteresis_model_is_supported_for_stationary_and_time_dependent_studies = Jiles–Atherton Модель гистерезиса поддерживается для стационарных и нестационарных исследований.
# - K --------------------------------------------------------------------- K -
# - L --------------------------------------------------------------------- L -
Layered_shell_cannot_be_used_with_terminal_sweep = Многоуровневую оболочку нельзя использовать с терминальной разверткой.
Linearized_resistivity_is_not_supported_for_physics_controlled_mesh = Линеаризованное удельное сопротивление не поддерживается для сеток, управляемых физикой.
# - M --------------------------------------------------------------------- M -
Magnetic_shielding_feature_only_supports_stationary_studies_Disable_feature = Функция магнитного экранирования поддерживает только стационарные исследования.\nПожалуйста, отключите эту функцию на этапе исследования.
Manual_domain_list_must_contain_all_and_only_the_domains_in_the_selection = Список областей, созданный вручную, должен содержать все и только выбранные области.
Manual_terminal_sweep_check_must_be_disabled_in_source_sweep_studies = Ручная проверка развертки терминала должна быть отключена в исследованиях развертки источника.
Magnitude_of_circular_port_azimuthal_mode_number_must_be_less_than_eleven = Величина номера азимутальной моды кругового порта должна быть меньше одиннадцати.
Material_definition_is_incomplete_for_physics_controlled_mesh = Определение материала является неполным для сетки, управляемой физикой.
Material_parameter_must_be_isotropic = Параметр материала должен быть изотропным.
Maximum_frequency_must_be_a_number = Максимальная частота должна быть числом.
Mixed_mode_s_parameters_requires_port_sweep_and_four_port_features = Для использования S-параметров в смешанном режиме требуется развертка порта и четыре функции порта.
Mode_number_must_be_an_integer = Номер режима должен быть целым числом.
Motion_not_consistent_with_periodic_pair = Движение не соответствует периодической паре.
Multiport_network_supports_only_S_parameter_type_Touchstone_file = Многопортовая сеть поддерживает только файл Touchstone типа S-параметров.
Must_be_a_domain_list_example_x = Должен быть список областей (например, #)
# - N --------------------------------------------------------------------- N -
Need_at_least_one_wrapped_feature = Нужна хотя бы одна завернутая функция.
No_excited_Periodic_Port_available_At_least_one_Periodic_Port_must_be_excited = Возбужденный периодический порт отсутствует.\nПо крайней мере один периодический порт должен быть возбужден.
No_excited_Periodic_Port_available_Please_use_an_exciting_Periodic_Port_or_select_User_defined_k-vector_for_Floquet_periodicity_in_Periodic_Condition = Возбуждаемый периодический порт отсутствует.\nПожалуйста, используйте захватывающий периодический порт или выберите определяемый пользователем k-вектор для периодичности Флоке в периодическом состоянии.
No_frequency_related_study_is_available = Исследования, связанные с частотой, не доступны.
No_intersection_found_between_the_two_periodic_boundary_condition_edges = Между двумя периодическими краями граничных условий не обнаружено пересечения.
No_Loss_Calculation_information_found_in_physics = Информации о расчете потерь в физике нет.
No_selection_in_the_following_feature = Не выбрана следующая функция.
No_selection_in_coaxial_lumped_X = Нет выбора в коаксиальном сосредоточенном #. Пожалуйста, выберите границу для коаксиального сосредоточенного #.
No_selection_in_periodic_port = Нет выбора в периодическом порте. Пожалуйста, выберите границу для периодического порта.
No_selection_in_uniform_element = Нет выделения в едином элементе. Пожалуйста, выберите границу для однородного элемента.
No_selection_in_uniform_lumped_X = Никакого отбора в униформе в совокупности #. Пожалуйста, выберите границу для однородного сосредоточенного #.
No_selection_in_user_defined_lumped_X = Нет выбора в определенном пользователем сосредоточенном #. Пожалуйста, выберите границу для определенного пользователем сосредоточенного #.
No_selection_specified_for_the_Input_subfeature_under_the_Geometry_Analysis_subfeature._Read_doc. = Для подфункции «Ввод» в подфункции «Анализ геометрии» не указан выбор.\nПожалуйста, обратитесь к документации по функциям 3D Coil.
No_sources_found = Источники не найдены.
Not_all_slots_fully_used = Не все слоты используются полностью.
Not_any_conductor_defined_add_conductor_features = Функция проводника отсутствует. Добавьте функцию «Проводник» в свою физику, чтобы иметь возможность запустить исследование.
Not_enough_time_steps_in_input_study = Недостаточно временных шагов во входном исследовании
Not_enough_time_outputs_stored_in_input_study_within_specified_windowing_period = Недостаточно выходных данных, хранящихся во входном исследовании в течение указанного периода окна.
Non_Linear_Permanent_magnet_modeling_is_supported_for_stationary_and_time_dependent_studies = Нелинейное моделирование с постоянными магнитами поддерживается для стационарных и нестационарных исследований.
Numeric_coil_X_not_solved_for_solve_it_in_a_coil_geometry_analysis_step = Числовая катушка # не решена. Решите ее на этапе анализа геометрии катушки.
Number_of_coils_per_slot_can_be_either_one_or_two = Количество катушек на слот может быть как одна, так и две.
Number_of_poles_must_be_an_even_integer = Количество полюсов должно быть четным целым числом.
Number_of_sectors_incompatible_with_specified_numbers_for_poles_and_slots = Количество секторов, несовместимое с указанными числами полюсов и слотов.
Number_of_sectors_undetermined = Количество секторов не определено.
Number_of_slots_must_be_a_multiple_of_three_larger_than_six = Количество слотов должно быть кратно трем и больше шести.
Number_of_time_frames_must_be_an_even_integer_larger_than_two_and_smaller_than_X = Количество таймфреймов должно быть четным целым числом, большим двух и меньшим, чем #.
Numeric_multi_turn_coil_X_not_solved_for_solve_it_in_a_coil_geometry_analysis_step = Числовая многовитковая катушка # не решена. Решите ее на этапе анализа геометрии катушки.
