Periodic_port_is_not_defined_properly = Периодический порт определен неправильно.
Periodic_port_is_not_supported_for_2D_axisymmetry = Периодический порт не поддерживается для 2D-осевой симметрии.
Periodic_boundary_conditions_must_have_planar_boundaries = Периодические граничные условия должны иметь плоские границы.
Periodic_ports_must_have_planar_boundaries = Периодические порты должны иметь плоские границы.
Permanent_magnet_modeling_should_not_be_added_to_velocity_Lorentz_term_domains = Моделирование постоянного магнита не должно быть добавлено к областям скоростей Лоренца. Используйте Moving Сетка или отключите проверку применимости изучаемых функций на уровне физики.
Please_add_a_frequency_related_study_sequence_before_building_the_mesh = Пожалуйста, добавьте последовательность исследований, связанных с частотой, прежде чем строить сетку.
Primitive_vector_a_must_be_different_from_zero = Примитивный вектор a должен быть отличен от нуля.
Primitive_vector_components_must_be_specified_either_as_numbers_or_model_parameters = Компоненты примитивного вектора должны быть указаны либо как числа, либо как параметры модели.
Porous_media_is_not_supported_for_physics_controlled_mesh = Пористые среды не поддерживаются для сеток, управляемых физикой.
Power_excitation_cannot_be_used_with_terminal_sweep = Силовое возбуждение не может использоваться с разверткой по клеммам.
Port_mode_field_plot_is_available_only_for_port_boundaries_parallel_to_the_major_axes = График поля режима порта доступен только для границ порта, параллельных главным осям.
Port_name_in_equation_form_does_not_exist = Имя порта в форме уравнения не существует.
Port_offset_cannot_be_evaluated = Смещение порта не может быть оценено.
Port_X_selection_in_multi_port_network_is_empty = Выбор порта# в многопортовой сети пуст.
