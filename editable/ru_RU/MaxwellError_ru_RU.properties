Only_letters_digits_underscore_allowed_in_the_name = В имени допускаются только буквы, цифры и подчеркивания.
Only_one_wave_equation_electric_node_can_be_used_in_the_scattered_field_formulation = В формулировке рассеянного поля можно использовать только одно Волновое уравнение, электрический узел.
Out_of_plane_wave_number_must_be_a_number = Волновое число вне плоскости должно быть числом.
