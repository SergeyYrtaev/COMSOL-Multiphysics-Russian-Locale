Source_selection_in_periodic_condition_is_empty = Выбор источника в периодическом состоянии пуст.
Sweep_on_Circuit_Terminal_excitation_is_not_possible = Развертка по возбуждению клемм цепи невозможна.
Sweep_on_Terminated_Terminal_excitation_can_be_done_activating_manual_terminal_sweep = Развертку по возбуждению терминированной клеммы можно выполнить, активировав ручную развертку клеммы.
Sweep_on_Power_Terminal_excitation_can_be_done_activating_manual_terminal_sweep = Развертка по силовому возбуждению клеммы может быть выполнена путем активации ручной развертки клемм.
Subcircuit_external_pin_names_must_be_valid_identifiers = Имена внешних контактов подсхемы должны быть действительными идентификаторами.
Subfeature_X_is_valid_only_if_exactly_one_edge_is_selected = Подобъект # действителен, только если выбрано ровно одно ребро.
Subfeature_X_should_be_placed_between_two_conductive_boundaries = Подобъект # должен располагаться между двумя проводящими границами.
Symmetry_plane_is_not_applicable_on_via_type_lumped_port = Плоскость симметрии не применима к порту сквозного типа с сосредоточенными параметрами.
Syntax_error_in_model_statement_x = Синтаксическая ошибка в операторе модели #.
