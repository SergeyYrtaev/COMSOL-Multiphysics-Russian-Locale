Assembly1_object_expected = Ожидаемый объект сборки 1D.
Assembly2_object_expected = 2D объект сборки ожидаемый.
Assembly3_object_expected = Ожидаемый объект 3D сборки.
At_least_one_profile_must_be_non-degenerate = По крайней мере один профиль должен быть недегенеративным.
At_least_two_distances_are_needed_when_Include_input_faces_is_cleared = Не менее двух расстояний требуется при очистке 'Include input faces'.
At_least_two_vertices_are_needed = Необходимы как минимум две вершины.
At_most_one_map_feature_is_allowed = Допускается максимум одна карта.
Automatic_mesh_sequences_not_allowed_when_component_is_defined_by_mesh = Автоматические последовательности сетки не допускаются, когда компонент определяется сеткой.
Axisymmetry_is_not_available_in_3D = Аксисимметрия недоступна в 3D.
Axisymmetry_is_not_available_in_a_mesh_part = Аксисимметрия не доступна в сетчатой части.

