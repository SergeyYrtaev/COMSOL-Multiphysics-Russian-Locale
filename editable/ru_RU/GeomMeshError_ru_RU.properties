Civil_3D_files_are_not_supported = Гражданские 3D файлы не поддерживаются.
Cleanup_of_resulting_mesh_failed = Очистка полученной сетки не удалась.
Coinciding_control_points = совпадающие контрольные точки.
Coinciding_vertices = Совпадающие вершины.
Compact_history_is_not_supported_for_imported_meshes_defined_by_datasets = Компактная история не поддерживается для импортных сеток, определенных наборами данных.
Compact_history_is_not_supported_for_models_with_deformed_geometry_configurations = Компактная история не поддерживается для моделей с деформированными геометрическими конфигурациями.
