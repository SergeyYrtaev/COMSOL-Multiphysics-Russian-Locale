A_mesh_part_must_define_its_own_geometric_model = Сетчатая часть должна определять свою собственную геометрическую модель.
A_minimum_element_size_larger_than_the_maximum_element_size_has_no_effect = Минимальный размер элемента больше максимального размера элемента не имеет эффекта.
A_problem_emerged_in_feature_X_of_sequence_Y = Проблема возникла в функции '#0' последовательности '#1'.
