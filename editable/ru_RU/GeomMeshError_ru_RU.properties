Could_not_update_domain_elements_Try_to_delete_the_elements_of_the_domain =  Не удалось обновить элементы области. Попробуйте удалить элементы области.
Created_1_empty_object = Создан 1 пустой объект.
Created_X_empty_objects = Создан # пустые объекты.
Cubic_spline_interpolation_only_1D = Интерполяция кубических сплин может использоваться только в 1D.
