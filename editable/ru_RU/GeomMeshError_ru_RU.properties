Too_many_elements_X_per_Y = Текущие настройки физики требуют, чтобы сетка составляла около #0 элементов на #1.\n\nПопытка выполнить это требование может привести к нехватке памяти или блокировке процесса.\nПереключение на управляемую пользователем сетку.\n\nПожалуйста, внимательно просмотрите настройки сетки перед созданием сетки, управляемой пользователем.\nили вернитесь к сетке, управляемой физикой, и измените настройки физики.
