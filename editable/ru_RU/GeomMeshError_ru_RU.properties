Ambiguous_face_parametrization = Двусмысленная параметризация лица.
An_edge_group_must_contain_at_least_one_edge = Краевая группа должна содержать по меньшей мере один край.
An_empty_cavity_was_generated = Появилась пустая полость.
An_unconnected_vertex_was_found_in_the_extrude_layers = В экструдированных слоях была обнаружена несвязанная вершина.
An_unknown_error_occurred_in_the_CAD_interface_plug-in = Неизвестная ошибка произошла в плагине интерфейса CAD.
