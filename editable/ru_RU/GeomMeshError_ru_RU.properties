All_source_domains_must_be_meshed = Все исходные домены должны быть объединены.
All_source_edges_must_be_meshed = Все исходные края должны быть склеены.
All_source_faces_must_be_meshed = Все лица источников должны быть склеены.
All_triangles_in_surface_mesh_are_singular = Все треугольники в поверхностной сетке единичны.
