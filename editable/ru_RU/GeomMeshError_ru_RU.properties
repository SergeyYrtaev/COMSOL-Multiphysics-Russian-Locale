Adjustment_parameter_length_invalid = Параметры регулировки недействительны.
All_edges_must_lie_on_the_same_curve = Все края должны лежать на одной и той же кривой.
All_geometric_entities_adjacent_to_a_mesh_control_entity_need_to_be_meshed = Все геометрические объекты, прилегающие к сетчатой управляющей сущности, должны быть сшитыми.
