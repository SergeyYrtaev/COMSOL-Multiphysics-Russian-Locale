Cap_faces_on_a_curve_object_is_only_supported_when_the_object_is_a_single_loop = Лица колпачка на изогнутом объекте поддерживаются только тогда, когда объект представляет собой единую петлю.
Change_Geometry_representation_to_CAD_kernel = Изменить 'Geometry representation' на 'CAD kernel' в окне настроек узла геометрии или части.\nИзменить навсегда в диалоговом окне «Предпочтения».
Change_Geometry_representation_to_CAD_kernel_X = Изменить 'Geometry representation' на 'CAD kernel' в окне настроек # node.\nИзменить навсегда в диалоговом окне «Предпочтения».
Check_edges = Проверьте края: #.
