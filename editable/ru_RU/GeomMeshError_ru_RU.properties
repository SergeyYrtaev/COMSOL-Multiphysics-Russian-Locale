A_feature_list_cannot_be_added_to_a_geometry_that_is_defined_by_a_mesh = Список признаков не может быть добавлен к геометрии, которая определяется сеткой.
A_geometry_can_only_be_defined_by_a_mesh_if_it_does_not_contain_any_features = Геометрия может быть определена только сеткой, если она не содержит каких-либо признаков.
A_geometry_object_cannot_be_set_on_a_geometry_sequence_that_is_defined_by_a_mesh = Объект геометрии не может быть установлен на последовательности геометрии, которая определяется сеткой.
A_mesh_has_been_lost_Try_to_rebuild_all_meshing_sequences = Сетка была потеряна. Попробуйте восстановить все сетчатые последовательности.
A_mesh_part_can_only_contain_one_geometry_sequence = Сетчатая часть может содержать только одну геометрическую последовательность.
