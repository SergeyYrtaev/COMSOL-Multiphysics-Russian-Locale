The_displacement_cannot_be_smaller_than_the_size_of_the_input_cell = Смещение не может быть меньше размера входной ячейки.
The_distance_can_only_be_computed_for_datasets_that_define_exactly_two_points = Расстояние можно вычислить только для наборов данных, определяющих ровно две точки.
The_distance_between_the_sender_and_the_receiver_must_be_positive = Расстояние между отправителем и получателем должно быть положительным.
The_element_data_must_be_a_X-by-Y_matrix = Данные элемента должны представлять собой матрицу #0-by-#1.
The_extrusion_levels_must_be_monotonically_increasing_or_monotonically_decreasing = Уровни экструзии должны монотонно увеличиваться или монотонно уменьшаться.
The_extrusion_variable_s_name_collides_with_another_variable = Имя переменной выдавливания конфликтует с другой переменной.
The_first_argument_cannot_be_empty = Первый аргумент не может быть пустым.
The_far_field_evaluation_radius_must_be_nonnegative = Радиус оценки дальнего поля должен быть неотрицательным.
The_merged_level_contains_both_inner_and_outer_parameters_This_is_not_supported = Объединенный уровень содержит как внутренние, так и внешние параметры. Это не поддерживается.
The_intersection_point_dataset_must_define_a_hemisphere_centered_at_the_image_point = Набор данных точек пересечения должен определять полусферу с центром в точке изображения. \nВыберите «Полусфера» из списка «Тип поверхности» в окне настроек для набора 3D-данных «Точка пересечения».
The_height_cannot_be_zero_pixels = Высота не может быть равна нулю пикселей.
The_histogram_plot_cannot_evaluate_height_data_specified_by_an_expression = График гистограммы не может оценивать данные о высоте, заданные выражением.
The_image_plane_is_empty = Плоскость изображения пуста.
The_input_cells_size_is_smaller_than_the_size_of_the_chosen_datasets_geometry = Размер входной ячейки меньше размера геометрии выбранного набора данных.
The_intersecting_surface_must_be_a_plane = Пересекающаяся поверхность должна быть плоскостью.
The_intersection_point_data_does_not_correspond_to_a_ray_dataset = Данные точки пересечения не соответствуют набору данных Ray.
The_local_z-coordinate_must_lie_between_X_and_Y = Локальная координата z должна находиться между #0 и #1.
The_matrix_histogram_cannot_be_determined = Матричную гистограмму определить невозможно.
The_matrix_histogram_data_does_not_have_the_right_format = Данные матричной гистограммы имеют неверный формат.
The_matrix_is_not_stored = Матрица не сохраняется.
The_matrix_is_too_large = Матрица слишком большая.
The_matrix_is_too_large_for_the_table = Матрица слишком велика для таблицы.
The_matrix_must_have_size_X_by_Y = Матрица должна иметь размер #0-by-#1.
The_maximum_array_size_is_X_cells = Максимальный размер массива составляет # ячеек.
The_maximum_number_of_slides_limit_of_N_preference_setting_was_exceeded_The_presentation_has_been_truncated = Превышено максимальное количество слайдов # (настройка предпочтений).\nПрезентация была усечена.
The_maximum_relative_deformation_must_be_positive = Максимальная относительная деформация должна быть положительной.
The_meshes_for_the_different_phases_are_incompatible = Сетки для разных фаз несовместимы.
The_method_generate_is_only_supported_at_the_report_root_level = Метод генерировать(...) поддерживается только на корневом уровне отчета.
The_node_group_can_only_contain_configurations = Группа узлов может содержать только конфигурации.
The_node_group_can_only_contain_plot_groups = Группа узлов может содержать только группы графиков.
The_node_group_can_only_contain_evaluation_groups = Группа узлов может содержать только группы оценки.
The_node_group_can_only_contain_datasets = Группа узлов может содержать только наборы данных.
The_node_group_can_only_contain_derived_values = Группа узлов может содержать только производные значения.
The_node_group_can_only_contain_export_features = Группа узлов может содержать только объекты экспорта.
The_node_group_can_only_contain_tables = Группа узлов может содержать только таблицы.
The_node_group_can_only_contain_reports = Группа узлов может содержать только отчеты.
The_node_group_can_only_contain_views = Группа узлов может содержать только представления.
The_normal_data_must_be_a_X-by-Y_matrix = Обычные данные должны представлять собой матрицу #0-by-#1.
The_normalization_angle_lies_outside_the_evaluated_angle_range = Угол нормализации лежит за пределами оцененного диапазона углов.
The_number_of_bins_must_be_at_least_X_and_at_most_Y = Количество ячеек должно быть не менее #0 и не более #1.
The_number_of_planes_must_be_an_integer_larger_than_or_equal_to_X = Количество плоскостей должно быть целым числом, большим или равным #.
The_number_of_points_in_each_grid_direction_must_be_positive = Количество точек в каждом направлении сетки должно быть положительным.
The_number_of_rays_must_be_a_positive_integer = Количество лучей должно быть целым положительным числом.
The_Nyquist_plot_requires_that_one_outer_solution_is_chosen = График Найквиста требует, чтобы было выбрано одно внешнее решение.
The_operation_cannot_be_performed_as_the_involved_geometries_have_different_length_units = Эту операцию невозможно выполнить, поскольку задействованные геометрии имеют разные единицы длины.
The_operation_cannot_be_performed_for_data_that_covers_more_than_one_sector = Операцию нельзя выполнить для данных, охватывающих более одного сектора.
The_operation_is_not_defined_for_this_dataset_type = Операция не определена для этого типа набора данных.
The_operation_is_only_supported_for_one_single_point = Операция поддерживается только для одной точки.
The_optical_aberration_plot_requires_an_intersection_point_3D_dataset = Для графика оптической аберрации требуется набор данных Intersection Point 3D.
The_orthogonal_vector_cannot_be_parallel_to_the_cut_line = Ортогональный вектор не может быть параллелен линии разреза.
The_passband_slope_factor_must_be_greater_than_1 = Коэффициент наклона полосы пропускания должен быть больше 1.
The_passband_slope_factor_must_be_finite = Коэффициент наклона полосы пропускания должен быть конечным.
The_plot_data_does_not_represent_a_closed_surface = Данные графика не представляют собой замкнутую поверхность.
The_point_data_must_be_a_X-by-Y_matrix = Данные точки должны представлять собой матрицу #0-by-#1.
The_point_is_outside_of_the_geometry = Дело находится за пределами геометрии.
The_precision_input_must_be_an_integer_between_1_and_17 = Точность ввода должна быть целым числом от 1 до 17.
The_presentation_file_X_is_open_in_another_program._Please_close_the_file_and_then_try_again = Файл презентации '#' открыт в другой программе.\nПожалуйста, закройте файл и повторите попытку.
The_ray_of_specified_index_was_not_found_in_the_cut_plane = Луч заданного индекса не найден в плоскости сечения.
The_reference_value_must_be_positive = Эталонное значение должно быть положительным.
The_report_file_X_is_open_in_another_program._Please_close_the_file_and_then_try_again = Файл отчета '#' открыт в другой программе.\nПожалуйста, закройте файл и повторите попытку.
The_ripple_factor_must_lie_between_0_and_1 = Коэффициент пульсации должен находиться в диапазоне от 0 до 1.
The_sampling_frequency_must_be_finite = Частота дискретизации должна быть конечной.
The_sampling_frequency_must_be_positive = Частота дискретизации должна быть положительной.
The_selected_node_is_not_applicable_for_the_preset_target = Выбранный узел неприменим для заданной цели.
The_selected_Microsoft_PowerPoint_template_file_is_not_available._Please_specify_a_valid_template_file_or_use_the_default_internal_template = Выбранный файл шаблона Microsoft PowerPoint недоступен.\nУкажите действительный файл шаблона или используйте внутренний шаблон по умолчанию.
The_solution_does_not_contain_any_Assemble_or_Modal_feature = Решение не содержит каких-либо функций Assemble или Modal.
The_solution_does_not_contain_any_layered_shell = Раствор не содержит слоистой оболочки. 
The_solutions_are_incompatible = Решения несовместимы.
The_spot_diagram_plot_is_only_supported_for_ray_tracing_in_3D_geometries = График точечной диаграммы поддерживается только для трассировки лучей в трехмерных геометриях.
The_source_dataset_must_be_nonsingular = Исходный набор данных не должен быть сингулярным.
The_stored_particle_trajectories_have_the_wrong_dimension = Сохраненные траектории частиц имеют неправильный размер.
The_stored_ray_trajectories_have_the_wrong_dimension = Сохраненные траектории лучей имеют неправильную размерность.
The_surface_where_the_cut_line_is_defined_is_empty = Поверхность, на которой определена линия разреза, пуста.
The_table_does_not_contain_valid_Sobol_index_data = Таблица не содержит допустимых данных индекса Соболя.
The_time_average_dataset_can_only_handle_time-dependent_solutions = Набор данных о среднем по времени может обрабатывать только решения, зависящие от времени.
The_time_integral_dataset_can_only_handle_time-dependent_solutions = Набор данных интеграла времени может обрабатывать только решения, зависящие от времени.
The_times_or_parameters_must_be_nondecreasing_when_a_cumulative_integral_is_computed = Время или параметры не должны уменьшаться при вычислении кумулятивного интеграла.
The_tube_radius_data_must_have_the_same_length_as_the_point_data_or_be_empty = Данные о радиусе трубы должны иметь ту же длину, что и данные точки, или быть пустыми.
The_tolerance_must_be_positive = Толерантность должна быть положительной. 
The_vector_data_must_be_a_X-by-Y_matrix = Векторные данные должны представлять собой матрицу #0-by-#1.
The_volume_of_the_room_must_be_larger_than_X = Объем комнаты должен быть больше #.
The_volume_where_the_cut_line_is_defined_is_empty = Объем, в котором определена линия разреза, пуст.
The_volume_where_the_cut_plane_is_defined_is_empty = Объем, в котором определена плоскость сечения, пуст.
The_web_browser_does_not_support_the_tag_X = Веб-браузер не поддерживает тег '#'.
The_width_cannot_be_zero_pixels = Ширина не может быть равна нулю пикселей.
The_width_must_be_positive_and_finite = Ширина должна быть положительной и конечной.
There_already_is_a_variable_called_X_Result_parameters_must_have_names_that_are_not_in_use = Уже существует переменная с именем '#'. Параметры результата должны иметь имена, которые не используются.
There_is_no_2D_or_3D_dataset_that_can_be_used_to_define_a_cut_line = Не существует набора 2D или 3D данных, который можно было бы использовать для определения линии разреза.
There_is_no_3D_dataset_that_can_be_used_to_define_a_cut_plane = Не существует набора 3D-данных, который можно было бы использовать для определения плоскости сечения.
There_is_no_time_variable_to_sweep_over = Временная переменная, которую можно было бы охватить, отсутствует.
There_is_no_particle_tracing_data_available = Данных по отслеживанию частиц нет.
There_is_no_ray_tracing_data_available = Данные трассировки лучей отсутствуют.
Too_many_evaluation_points = Слишком много оценочных баллов.
Trajectories_cannot_be_plotted_as_lines_when_using_a_receiver_dataset = Траектории нельзя отображать в виде линий при использовании набора данных приемника.
Trajectories_cannot_be_plotted_as_lines_when_using_an_intersection_point_dataset = Траектории нельзя отображать в виде линий при использовании набора данных точек пересечения.
Transformations_can_only_be_applied_to_matrices_that_have_identical_dimensions = Преобразования можно применять только к матрицам, имеющим одинаковые размеры.
Transformations_can_only_be_applied_to_square_matrices = Преобразования можно применять только к квадратным матрицам.
Transverse_and_normal_directions_must_not_be_parallel = Поперечное и нормальное направления не должны быть параллельны.
