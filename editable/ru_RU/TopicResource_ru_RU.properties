topicdescr_physics/geometricdopingmodel = [Геометрическая модель легирования] Определяет профиль легирования, который меняется в зависимости от расстояния от границы, выбранной в геометрии.
topicdescr_physics/geometrictrapdensity = [Геометрическая плотность ловушек] Определяет профиль плотности ловушек, который меняется в зависимости от расстояния от границы, выбранной в геометрии.
topicdescr_physics/geothermalheating = [Геотермальное отопление]Геотермальный источник тепла в пористой среде.
topicdescr_physics/globalconstraint = [Глобальное ограничение]Ограничение на глобальном уровне.
topicdescr_physics/globalcontrolvariables = [Глобальные переменные управления]Глобальные переменные управления.
topicdescr_physics/globalequations = [Глобальные уравнения]Глобальные (независимые от пространства) уравнения, такие как ОДУ и ДАУ.
topicdescr_physics/globalinequality = [Ограничение глобального неравенства] Ограничение глобального неравенства или равенства.
topicdescr_physics/globalleastsquaresobjective = [Глобальная цель наименьших квадратов]Глобальная цель наименьших квадратов, которая добавляет сумму квадратов ошибок к цели в задаче оптимизации. Ошибки вычисляются как разница между внешними экспериментальными значениями и выражением модели, рассчитанным для диапазона времени или значений параметров.
topicdescr_physics/globalobjective = [Глобальная цель]Глобальная цель, которая добавляет вклад в целевую функцию.
topicdescr_physics/gop_auxiliaryfield = [Вспомогательная зависимая переменная] Определяет обыкновенное дифференциальное уравнение первого порядка, которое необходимо решить для каждого луча.
topicdescr_physics/gop_blackbodyradiation = [Излучение черного тела] Диффузно испускает лучи от поверхности с длиной волны и распределением мощности идеального источника излучения черного тела при указанной температуре.
topicdescr_physics/gop_boundaryaccumulator = [Аккумулятор]Создает переменную поля, которая зависит от положения и свойств лучей.
topicdescr_physics/gop_continuity = [Непрерывность] Позволяет лучам перемещаться через внутренние границы сборки.
topicdescr_physics/gop_diffractionorder = [Порядок дифракции]Выпустить лучи указанного порядка дифракции из дифракционной решетки.
topicdescr_physics/gop_domainaccumulator = [Аккумулятор]Создает переменную поля, которая зависит от положения и свойств лучей.
topicdescr_physics/gop_nonlocalaccumulator = [Нелокальный аккумулятор]Определяет зависимую переменную, на которую влияют траектории лучей, выпущенных родительской функцией выпуска.
topicdescr_physics/gop_release = [Release]Выпускает лучи изнутри области.
topicdescr_physics/gop_releasefromboundary = [Высвобождение от границы для геометрической оптики] Выпускает лучи из границы.
topicdescr_physics/gop_releasefromdatafile = [Выпуск из файла данных] Выпускает лучи, как указано в файле данных.
topicdescr_physics/gop_releasefromedge = [Выпуск с ребра]Выпускает лучи с ребер.
topicdescr_physics/gop_releasefrompoint = [Выпуск из точки] Выпускает лучи из точек.
topicdescr_physics/gop_releasefromsymmetryaxis = [Высвобождение от оси симметрии для геометрической оптики] Выпускает лучи от краев вдоль оси симметрии.
topicdescr_physics/gop_releasegrid = [Release from Grid] Выпускает лучи в наборе точек сетки.
