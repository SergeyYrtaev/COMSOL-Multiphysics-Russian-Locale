topicdescr/multiphysicsmoistureflowturbulentlvel = [Турбулентный поток, интерфейс L-VEL] Мультифизический интерфейс L-VEL Turbulent Moisture Flow используется для имитации связи между переносом влаги в воздухе и турбулентным потоком жидкости.\n\n Он сочетает в себе влажный транспорт в воздухе и турбулентный поток, L-VEL интерфейсы. Мультифизическая связь потока влаги автоматически добавляется. Он соединяет интерфейсы транспортировки влаги и потока жидкости. Свойства жидкости могут зависеть от концентрации пара. Модели также могут включать транспорт влаги в строительных материалах. Физический интерфейс поддерживает низкие числа Маха (обычно менее 0,3).\n\nстационарный и моделирование временных областей поддерживаются в 2D, 2D аксисимметрии и 3D геометрии.
topicdescr/multiphysicsmoistureflowturbulentrkeps = [The турбулентное течение, Realizable k-εInterface]The Turbulent Moisture Flow, Realizable k-ε multiphysics interface is used to simulate the coupling between moisture transport in air and Turbulent fluid flow.\n\n Он сочетает в себе влажный транспорт в воздухе и турбулентный поток, реализуемые интерфейсы k-ε. Мультифизическая связь потока влаги автоматически добавляется. Он соединяет интерфейсы транспортировки влаги и потока жидкости. Свойства жидкости могут зависеть от концентрации пара. Модели также могут включать транспорт влаги в строительных материалах. Физический интерфейс поддерживает низкие числа Маха (обычно менее 0,3).\n\nстационарный и моделирование временных областей поддерживаются в 2D, 2D аксисимметрии и 3D геометрии.
topicdescr/multiphysicsmoistureflowturbulentspalartallmaras = (перенаправлено с «The турбулентное течение, Spalart-Allmaras Interface») Мультифизический интерфейс Спаларта-Альмараса используется для имитации связи между переносом влаги в воздухе и турбулентным потоком жидкости.\n\n Он сочетает в себе влажный транспорт в воздухе и турбулентный поток, интерфейсы Spalart-Allmaras. Мультифизическая связь потока влаги автоматически добавляется. Он соединяет интерфейсы транспортировки влаги и потока жидкости. Свойства жидкости могут зависеть от концентрации пара. Модели также могут включать транспорт влаги в строительных материалах. Физический интерфейс поддерживает низкие числа Маха (обычно менее 0,3).\n\nстационарный и моделирование временных областей поддерживаются в 2D, 2D аксисимметрии и 3D геометрии.
topicdescr/multiphysicsmoistureflowturbulentsst = [Турбулентный поток, интерфейс SST] Мультифизический интерфейс Turbulent Moisture Flow, SST используется для имитации связи между переносом влаги в воздухе и турбулентным потоком жидкости.\n\n Он сочетает в себе влажный транспорт в воздухе и турбулентный поток, интерфейсы SST. Мультифизическая связь потока влаги автоматически добавляется. Он соединяет интерфейсы транспортировки влаги и потока жидкости. Свойства жидкости могут зависеть от концентрации пара. Модели также могут включать транспорт влаги в строительных материалах. Физический интерфейс поддерживает низкие числа Маха (обычно менее 0,3).\n\nстационарный и моделирование временных областей поддерживаются в 2D, 2D аксисимметрии и 3D геометрии.
topicdescr/multiphysicsmoistureflowturbulentv2f = (перенаправлено с «The турбулентное течение, v2-f Interface») Мультифизический интерфейс V2-f Turbulent Moisture Flow используется для имитации связи между переносом влаги в воздухе и турбулентным потоком жидкости.\n\n Он сочетает в себе влажный транспорт в воздухе и турбулентный поток, интерфейсы v2-f. Мультифизическая связь потока влаги автоматически добавляется. Он соединяет интерфейсы транспортировки влаги и потока жидкости. Свойства жидкости могут зависеть от концентрации пара. Модели также могут включать транспорт влаги в строительных материалах. Физический интерфейс поддерживает низкие числа Маха (обычно менее 0,3).\n\nстационарный и моделирование временных областей поддерживаются в 2D, 2D аксисимметрии и 3D геометрии.
topicdescr/multiphysicsmultiphaseflowinfreeandporousmedia = [Интерфейс многофазного свободного и пористого медиапотока] Интерфейс многофазного свободного и пористого медиапотока объединяет Darcy’s Закон, фазовый транспорт в свободном и пористом медиа-потоке и ламинарный поток интерфейсы для моделирования потока и транспортировки нескольких несмешивающихся фаз в соединенном свободном и пористом медиа-потоке.
topicdescr/multiphysicsmultiphaseflowinporousmedia = [Многофазный поток в Porous Media Interface] Многофазный поток в интерфейсе Porous Media объединяет Darcy’s Юридический интерфейс с интерфейсом Phase Transport in Porous Media для моделирования потока и транспортировки нескольких несмешивающихся фаз в пористой среде.
topicdescr/multiphysicsnernstplanckpoissonequations = [Интерфейс уравнений Нернста-Планка-Пуассона] Интерфейс Nernst-Planck-Poisson Equations описывает транспорт электролитов, не допуская локальной электронейтральности. Это позволяет имитировать разделение заряда, которое обычно возникает вблизи поверхности электрода, где ионы в электролите притягиваются и отталкиваются от неэкранированного избыточного заряда на электроде. \n\nЭтот мультифизический интерфейс объединяет интерфейс Транспорт Разбавленных Видов (с включенной Миграцией), который решает уравнения Нернста-Планка без нейтралитета заряда, и интерфейс Электростатики, который решает уравнение Пуассона.
topicdescr/multiphysicsnonisothermalflow = [Неизотермический поток, интерфейс ламинарного потока] Интерфейс Nonisothermal ламинарное течение используется для имитации связи между передачей тепла и потоком жидкости.\n\n Он объединяет интерфейсы теплопередачи в жидкостях и ламинарных потоках. Неизотермический поток мультифизической связи автоматически добавляется. Он соединяет интерфейсы теплопередачи и потока и предоставляет опции для включения нагрева потока в модель. Свойства жидкости могут зависеть от температуры. Модели также могут включать теплопередачу в твердых телах, а также излучение от поверхности к поверхности и излучение в участвующих средах с модулем теплопередачи. Физический интерфейс поддерживает низкие числа Маха (обычно менее 0,3), а также неньютоновские жидкости. В интерфейсе ламинарное течение узел Fluid Properties по умолчанию активен на всем выборе интерфейса. Выбор области интерфейса потока может быть отредактирован, если модель содержит сплошные области.\n\nстационарный modeling и моделирование временной области поддерживаются в 2D, 2D аксисимметрии и 3D геометрии.
topicdescr/multiphysicsnonisothermalflowbrinkmanequations = [Неизотермический поток, интерфейс уравнений Бринкмана] Интерфейс неизотермическое течение, Brinkman Equations используется для имитации связи между теплообменом и потоком жидкости в пористых средах.\n\n Он объединяет интерфейсы теплопередачи в Porous Media и Brinkman Equations. Неизотермический поток мультифизической связи автоматически добавляется. Он соединяет интерфейсы теплопередачи и потока и предоставляет опции для включения нагрева потока в модель. В обоих интерфейсах узел Porous Medium активен по умолчанию для всех вариантов. Модели также могут включать теплопередачу в твердых телах и жидкостях путем добавления жидкого или твердого узла в интерфейс теплопередачи в пористых средах. Узел свойств жидкости может быть добавлен к интерфейсу уравнений Бринкмана, если присутствуют области свободного потока. Если модель содержит твердые области, где нет потока, выбор области интерфейса Brinkman Equations может быть отредактирован.\n\nстационарный modeling и моделирование временных областей поддерживаются в 2D, 2D аксисимметрии и 3D геометрии.
topicdescr/multiphysicsnonisothermalflowlesrbvm = [Неизотермический поток, LES RBVM] Интерфейс неизотермическое течение, LES RBVM используется для выполнения больших вихревых симуляций, связывающих теплообмен и поток жидкости.\n\n Он объединяет интерфейсы LES RBVM и теплопередача in Fluids. Неизотермическая мультифизическая связь потока автоматически добавляется, обеспечивая связь между интерфейсами теплопередачи и потока. Он также добавляет турбулентные тепловые потоки, полученные из остаточного многомасштабного анализа, к уравнению тепла. Для несжимаемого потока приближение Boussinesq может использоваться для включения вкладов плавучести в уравнение импульса, когда гравитация активна. Модели также могут включать теплопередачу в твердых телах, а также излучение от поверхности к поверхности и излучение в участвующих средах с модулем теплопередачи. В интерфейсе LES RBVM узел Fluid Properties по умолчанию активен на всем выборе интерфейса. Выбор области интерфейса потока может быть отредактирован, если модель содержит твердые области.\n\nTime зависимые исследования в 3D-геометрии необходимы для моделирования больших вихрей.
topicdescr/multiphysicsnonisothermalflowlesrbvmwv = [Неизотермический поток, LES RBVMWV] Интерфейс неизотермическое течение, LES RBVMWV используется для выполнения больших вихревых симуляций, связывающих теплообмен и поток жидкости.\n\n Он объединяет интерфейсы LES RBVMWV и теплопередача in Fluids. Неизотермическая мультифизическая связь потока автоматически добавляется, обеспечивая связь между интерфейсами теплопередачи и потока. Он также добавляет турбулентные тепловые потоки, полученные из остаточного вариационного многомасштабного анализа с расширенной диффузией тепла, к уравнению тепла. Для несжимаемого потока приближение Boussinesq может использоваться для включения вкладов плавучести в уравнение импульса, когда гравитация активна. Модели также могут включать теплопередачу в твердых телах, а также излучение от поверхности к поверхности и излучение в участвующих средах с модулем теплопередачи. В интерфейсе LES RBVMWV узел Fluid Properties по умолчанию активен на всем выборе интерфейса. Выбор области интерфейса потока может быть отредактирован, если модель содержит твердые области.\n\nTime зависимые исследования в 3D-геометрии необходимы для моделирования больших вихрей.
topicdescr/multiphysicsnonisothermalflowlessmagorinsky = [Неизотермический поток, LES Smagorinsky] Интерфейс неизотермическое течение, LES Smagorinsky используется для выполнения больших вихревых симуляций, связывающих теплообмен и поток жидкости.\n\n Он объединяет интерфейсы LES Smagorinsky и теплопередача in Fluids. Неизотермическая мультифизическая связь потока автоматически добавляется, обеспечивая связь между интерфейсами теплопередачи и потока. Он также добавляет турбулентные тепловые потоки, полученные из остаточного многомасштабного анализа, к уравнению тепла. Шкалы потока делятся на разрешенные большие шкалы, разрешенные малые шкалы и неразрешенные подсетевые шкалы, где последние моделируются с использованием смагоринского выражения. Для несжимаемого потока приближение Boussinesq может использоваться для включения вкладов плавучести в уравнение импульса, когда гравитация активна. Модели также могут включать теплопередачу в твердых телах, а также излучение от поверхности к поверхности и излучение в участвующих средах с модулем теплопередачи. В интерфейсе LES Smagorinsky по умолчанию активен узел Fluid Properties на всем выборе интерфейса. Выбор области интерфейса потока может быть отредактирован, если модель содержит твердые области.\n\nTime зависимые исследования в 3D-геометрии необходимы для моделирования больших вихрей.
topicdescr/multiphysicsnonisothermalflowturbulentalgebraicyplus = (перенаправлено с «Algebraic yPlus Interface») Многофизический интерфейс неизотермическое турбулентное течение, Algebraic yPlus используется для имитации связи между теплообменом и потоком жидкости.\n\n Он сочетает в себе теплопередачу в жидкостях и турбулентный поток, интерфейсы алгебраического yPlus. Неизотермический поток мультифизической связи автоматически добавляется. Он соединяет интерфейсы теплопередачи и потока и предоставляет опции для включения нагрева потока в модель. Свойства жидкости могут зависеть от температуры. Модели также могут включать теплопередачу в твердых телах, а также излучение от поверхности к поверхности и излучение в участвующих средах с модулем теплопередачи. Физический интерфейс поддерживает низкие числа Маха (обычно менее 0,3). В интерфейсе турбулентное течение, Algebraic yPlus, узел Fluid Properties по умолчанию активен на всех настройках интерфейса. Выбор области интерфейса потока может быть отредактирован, если модель содержит сплошные области.\n\nстационарный modeling и моделирование временной области поддерживаются в 2D, 2D аксисимметрии и 3D геометрии.
topicdescr/multiphysicsnonisothermalflowturbulentkeps = [Турбулентный поток, k-ε Интерфейс]Неизотермический турбулентный поток, k-ε мультифизический интерфейс используется для имитации связи между передачей тепла и потоком жидкости.\n\n Он сочетает в себе теплопередачу в жидкостях и турбулентный поток, k-ε интерфейсы. Неизотермический поток мультифизической связи автоматически добавляется. Он соединяет интерфейсы теплопередачи и потока и предоставляет опции для включения нагрева потока в модель. Свойства жидкости могут зависеть от температуры. Модели также могут включать теплопередачу в твердых телах, а также излучение от поверхности к поверхности и излучение в участвующих средах с модулем теплопередачи. Физический интерфейс поддерживает низкие числа Маха (обычно менее 0,3). В интерфейсе турбулентное течение, k-ε, по умолчанию активен узел Fluid Properties для всего выбора интерфейса. Выбор области интерфейса потока может быть отредактирован, если модель содержит сплошные области.\n\nСтационарное моделирование и моделирование временной области поддерживаются в 2D, 2D аксисимметрии и 3D геометрии.
topicdescr/multiphysicsnonisothermalflowturbulentkom = [Турбулентный поток, k-ω Интерфейс]Неизотермический турбулентный поток, k-ω мультифизический интерфейс используется для имитации связи между передачей тепла и потоком жидкости.\n\n Он сочетает в себе теплопередачу в жидкостях и турбулентный поток, k-ω интерфейсы. Неизотермический поток мультифизической связи автоматически добавляется. Он соединяет интерфейсы теплопередачи и потока и предоставляет опции для включения нагрева потока в модель. Свойства жидкости могут зависеть от температуры. Модели также могут включать теплопередачу в твердых телах, а также излучение от поверхности к поверхности и излучение в участвующих средах с модулем теплопередачи. Физический интерфейс поддерживает низкие числа Маха (обычно менее 0,3). В интерфейсе турбулентное течение, k-ω, по умолчанию активен узел Fluid Properties для всего выбора интерфейса. Выбор области интерфейса потока может быть отредактирован, если модель содержит сплошные области.\n\nСтационарное моделирование и моделирование временной области поддерживаются в 2D, 2D аксисимметрии и 3D геометрии.
