topicdescr/multiphysicsdispersedtwophaseflowdilutedspecieslowrekeps = [Dispersed Two-Phase Flow with Species Transport] Низкий Re k-ε версия Dispersed Two-Phase Flow with Species Transport multiphysics interface используется для имитации двухфазного потока, в турбулентном режиме, в сочетании с переносом химических видов в жидкой фазе и дисперсной фазе, состоящей из пузырьков или капель.\n\n Он сочетает в себе модель смеси, интерфейс Low Re k-ε, с интерфейсом непрерывной фазы транспортировки разбавленных видов и интерфейсом дисперсной фазы транспортировки разбавленных видов. Автоматически добавляемый рассеянный двухфазный поток, разбавленный вид мультифизического узла соединяет двухфазный поток жидкости с массовым транспортом в каждой фазе. Помимо транспортировки на каждом этапе, также поддерживается перенос видов между фазами (решительная добыча).\n\n Интерфейс может использоваться для стационарного и зависящего от времени анализа в 2D, 2D аксисимметрии и 3D геометрии.
topicdescr/multiphysicsdispersedtwophaseflowdilutedspeciessst = [Разбросанный двухфазный поток с переносом видов] SST-версия дисперсного двухфазного потока с мультифизическим интерфейсом Species Transport используется для имитации двухфазного потока в турбулентном режиме, связанного с переносом химических видов в жидкой фазе и дисперсной фазе, состоящей из пузырьков или капель.\n\n Он сочетает в себе модель смесей, интерфейс SST с интерфейсом непрерывной фазы транспортировки разбавленных видов и интерфейсом дисперсной фазы транспортировки разбавленных видов. Автоматически добавляемый рассеянный двухфазный поток, разбавленный вид мультифизического узла соединяет двухфазный поток жидкости с массовым транспортом в каждой фазе. Помимо транспортировки на каждом этапе поддерживается также передача видов между фазами (решительная добыча).\n\n Интерфейс может использоваться для стационарного и зависящего от времени анализа в 2D, 2D аксисимметрии и 3D геометрии.
topicdescr/multiphysicselectrodepositionprimary = [Электроосложение, первичный интерфейс] Интерфейс Electrodeposition, Primary описывает распределение тока, потенциальное распределение и геометрические изменения в ячейке электродепозиции при предположении, что изменения в композиции незначительны в электролите и что избыточные возможности активации реакций электрода незначительны. Он сочетает в себе первичное распределение тока и деформированную геометрию.
