topicdescr/multiphysicsrotatingmachineryphasetransportmixturemodelalgebraicyplus = [The Rotating Machinery, Phase Transport Mixture Model, Algebraic yPlus Interface] The Rotating Machinery, Phase Transport Mixture Model турбулентное течение, Algebraic yPlus multiphysics interface is used to simulate the coupling between phase transport and fluid flow at high Reynolds numbers in equipment containing one or more rotating parts.\n\n Он сочетает в себе фазовый транспорт и турбулентный поток, интерфейсы алгебраического yPlus и вращающийся область под движущейся сеткой. Функция мультифизической связи Mixture Model добавляется автоматически. Эта функция соединяет интерфейсы фазового транспорта и потока и предоставляет варианты для различных моделей вязкости смеси и скорости скольжения. Эффекты турбулентности включаются с использованием модели повышенной вязкости, основанной на расстоянии локальной стены. Следовательно, физический интерфейс включает в себя уравнение расстояния между стенами.\n\n Существуют два типа исследований, доступных для этого физического интерфейса. Используя тип исследования, зависящий от времени, вращение достигается за счет движущейся функциональности сетки, также известной как скользящая сетка. Используя исследование Frozen Rotor, вращающиеся части замораживаются в положении, а вращение объясняется включением центробежных и кориолисовых сил.
topicdescr/multiphysicsrotatingmachineryphasetransportmixturemodelarea = [Вращающаяся машина, фазовая транспортная смесь, модельная ветвь] Вращающаяся машина, фазовая транспортная смесь содержит мультифизические интерфейсы для моделирования ламинарных и турбулентных потоков жидкостей, содержащих несколько дисперсных фаз в оборудовании с одной или несколькими вращающимися частями. Диспергированные фазы могут быть пузырьками, жидкими каплями или твердыми частицами.
topicdescr/multiphysicsrotatingmachineryphasetransportmixturemodelkeps = [The Rotating Machinery, Phase Transport Mixture Model, k-εInterface]The Rotating Machinery, Phase Transport Mixture Model турбулентное течение, k-ε multiphysics interface is used to simulate the coupling between phase transport and fluid flow at high Reynolds numbers in equipment containing one or more rotating parts.\n\n Он сочетает в себе фазовый транспорт и турбулентный поток, интерфейсы k-ε и вращающийся область под движущейся сеткой. Функция мультифизической связи Mixture Model добавляется автоматически. Эта функция соединяет интерфейсы фазового транспорта и потока и предоставляет варианты для различных моделей вязкости смеси и скорости скольжения. Эффекты турбулентности моделируются с использованием стандартной модели с двумя уравнениями k-ε с ограничениями реализуемости. Поток вблизи стен моделируется с использованием функций стен.\n\n Для этого физического интерфейса доступны два типа исследований. Используя тип исследования, зависящий от времени, вращение достигается за счет движущейся функциональности сетки, также известной как скользящая сетка. Используя исследование Frozen Rotor, вращающиеся части замораживаются в положении, а вращение объясняется включением центробежных и кориолисовых сил.
topicdescr/multiphysicsrotatingmachineryphasetransportmixturemodelkomega = [The Rotating Machinery, Phase Transport Mixture Model, k-ωInterface]The Rotating Machinery, Phase Transport Mixture Model турбулентное течение, k-ω multiphysics interface is used to simulate the coupling between phase transport and fluid flow at high Reynolds numbers in equipment containing one or more rotating parts.\n\n Он сочетает в себе фазовый транспорт и турбулентный поток, интерфейсы k-ω и вращающийся область под движущейся сеткой. Функция мультифизической связи Mixture Model добавляется автоматически. Эта функция соединяет интерфейсы фазового транспорта и потока и предоставляет варианты для различных моделей вязкости смеси и скорости скольжения. Эффекты турбулентности моделируются с использованием пересмотренной модели Уилкокса k-ω с ограничениями реализуемости. Модель k-ω представляет собой так называемую модель с низким числом Рейнольдса, что означает, что она может разрешать поток вплоть до стены.\n\n Существуют два типа исследований, доступных для этого физического интерфейса. Используя тип исследования, зависящий от времени, вращение достигается за счет движущейся функциональности сетки, также известной как скользящая сетка. Используя исследование Frozen Rotor, вращающиеся части замораживаются в положении, а вращение объясняется включением центробежных и кориолисовых сил.
topicdescr/multiphysicsrotatingmachineryphasetransportmixturemodellaminar = [The Rotating Machinery, Phase Transport Mixture Model, ламинарное течение Interface] The Rotating Machinery, Phase Transport Mixture Model ламинарное течение multiphysics interface используется для имитации связи между фазовым транспортом и потоком жидкости при низких и умеренных числах Рейнольдса в оборудовании, содержащем одну или несколько вращающихся частей. Он сочетает в себе интерфейсы Phase Transport и ламинарное течение и вращающийся область под Moving Сетка. Функция мультифизической связи Mixture Model добавляется автоматически. Эта функция соединяет интерфейсы фазового транспорта и потока и предоставляет варианты для различных моделей вязкости смеси и скорости скольжения. Физический интерфейс поддерживает низкие числа Маха (обычно менее 0,3).\n\n Существуют два типа исследования для этого физического интерфейса. Используя тип исследования, зависящий от времени, вращение достигается за счет движущейся функциональности сетки, также известной как скользящая сетка. Используя исследование Frozen Rotor, вращающиеся части замораживаются в положении, а вращение объясняется включением центробежных и кориолисовых сил.
topicdescr/multiphysicsrotatingmachineryphasetransportmixturemodellowrekeps = [The Rotating Machinery, Phase Transport Mixture Model, Low Re k-ε Interface]Мультифизический интерфейс Rotating Machinery, Phase Transport Mixture Model турбулентное течение, Low Re k-ε используется для моделирования взаимодействия между фазовым переносом и потоком жидкости при высоких числах Рейнольдса в оборудовании, содержащем одну или несколько вращающихся частей.\n\nОн сочетает в себе интерфейсы фазового транспорта и турбулентного потока, Low Re k-ε и вращающуюся область под движущейся сеткой. Функция мультифизической связи модели смеси добавляется автоматически. Эта функция объединяет интерфейсы фазового транспорта и потока и предоставляет возможности для различных моделей вязкости смеси и скорости скольжения. Эффекты турбулентности моделируются с использованием модели AKN с двумя уравнениями k-ε с ограничениями реализуемости. Модель AKN представляет собой так называемую модель с низким числом Рейнольдса, что означает, что она может разрешить поток вплоть до стенки. Модель АКН зависит от расстояния до ближайшей стены. Поэтому физический интерфейс включает уравнение расстояния до стены.\n\nДля этого физического интерфейса доступны два типа исследования. При использовании типа исследования «Зависит от времени» вращение достигается за счет функции перемещения сетки, также известной как скользящая сетка. При использовании исследования «Замороженный ротор» вращающиеся части удерживаются в замороженном состоянии, а вращение учитывается за счет центробежных сил и сил Кориолиса.
topicdescr/multiphysicsrotatingmachineryphasetransportmixturemodellvel = [The Rotating Machinery, Phase Transport Mixture Model, L-VEL Interface] The Rotating Machinery, Phase Transport Mixture Model турбулентное течение, L-VEL multiphysics interface is used to simulate the coupling between phase transport and fluid flow at high Reynolds numbers in equipment containing one or more rotating parts.\n\n Он сочетает в себе фазовый транспорт и турбулентный поток, интерфейсы L-VEL и вращающийся область под движущейся сеткой. Функция мультифизической связи Mixture Model добавляется автоматически. Эта функция соединяет интерфейсы фазового транспорта и потока и предоставляет варианты для различных моделей вязкости смеси и скорости скольжения. Эффекты турбулентности включаются с использованием модели повышенной вязкости, основанной на расстоянии локальной стены. Следовательно, физический интерфейс включает в себя уравнение расстояния между стенами.\n\n Существуют два типа исследований, доступных для этого физического интерфейса. Используя тип исследования, зависящий от времени, вращение достигается за счет движущейся функциональности сетки, также известной как скользящая сетка. Используя исследование Frozen Rotor, вращающиеся части замораживаются в положении, а вращение объясняется включением центробежных и кориолисовых сил.
topicdescr/multiphysicsrotatingmachineryphasetransportmixturemodelrealizablekeps = [Модель вращающейся машины, фазовой транспортной смеси, реализуемый k-ε Интерфейс] Вращающаяся машина, фазовая транспортная смесь модель турбулентного потока, реализуемый k-ε мультифизический интерфейс используется для имитации связи между фазовым транспортом и потоком жидкости при высоких номерах Рейнольдса в оборудовании, содержащем одну или несколько вращающихся частей.\n\n Он сочетает в себе фазовый транспорт и турбулентный поток, реализуемые интерфейсы k-ε и вращающийся область под движущейся сеткой. Функция мультифизической связи Mixture Model добавляется автоматически. Эта функция соединяет интерфейсы фазового транспорта и потока и предоставляет варианты для различных моделей вязкости смеси и скорости скольжения. Эффекты турбулентности моделируются с использованием реализуемой модели с двумя уравнениями k-ε. Поток вблизи стен моделируется с использованием функций стен.\n\n Для этого физического интерфейса доступны два типа исследований. Используя тип исследования, зависящий от времени, вращение достигается за счет движущейся функциональности сетки, также известной как скользящая сетка. Используя исследование Frozen Rotor, вращающиеся части замораживаются в положении, а вращение объясняется включением центробежных и кориолисовых сил.
topicdescr/multiphysicsrotatingmachineryphasetransportmixturemodelspalartallmaras = [Вращающееся оборудование, фазовая транспортная модель, интерфейс Spalart-Allmaras] Вращающееся оборудование, фазовая транспортная смесь, турбулентный поток, мультифизический интерфейс Spalart-Allmaras используется для имитации связи между фазовым транспортом и потоком жидкости при высоких числах Рейнольдса в оборудовании, содержащем одну или несколько вращающихся частей.\n\n Он сочетает в себе фазовый транспорт и турбулентный поток, интерфейсы Spalart-Allmaras и вращающийся область под движущейся сеткой. Функция мультифизической связи Mixture Model добавляется автоматически. Эта функция соединяет интерфейсы фазового транспорта и потока и предоставляет варианты для различных моделей вязкости смеси и скорости скольжения. Эффекты турбулентности моделируются с использованием модели одного уравнения Спаларта-Альмараса. Модель Spalart-Allmaras представляет собой так называемую модель с низкими числами Рейнольдса, что означает, что она может разрешать поток вплоть до стены. Модель Spalart-Allmaras зависит от расстояния до ближайшей стены. Следовательно, физический интерфейс включает в себя уравнение расстояния между стенами.\n\n Существуют два типа исследований, доступных для этого физического интерфейса. Используя тип исследования, зависящий от времени, вращение достигается за счет движущейся функциональности сетки, также известной как скользящая сетка. Используя исследование Frozen Rotor, вращающиеся части замораживаются в положении, а вращение объясняется включением центробежных и кориолисовых сил.
topicdescr/multiphysicsrotatingmachineryphasetransportmixturemodelsst = [The Rotating Machinery, Phase Transport Mixture Model, SST Interface] The Rotating Machinery, Phase Transport Mixture Model турбулентное течение, SST multiphysics interface используется для имитации связи между фазовым транспортом и потоком жидкости при высоких числах Рейнольдса в оборудовании, содержащем одну или несколько вращающихся частей. Он сочетает в себе фазовый транспорт и турбулентный поток, интерфейсы SST и вращающийся область под движущейся сеткой. Функция мультифизической связи Mixture Model добавляется автоматически. Эта функция соединяет интерфейсы фазового транспорта и потока и предоставляет варианты для различных моделей вязкости смеси и скорости скольжения. Эффекты турбулентности моделируются с использованием модели переноса сдвига-напряжения Menter (SST) с ограничениями реализуемости. Модель SST представляет собой так называемую модель с низким числом Рейнольдса, что означает, что она может разрешать поток вплоть до стены. Модель SST зависит от расстояния до ближайшей стены. Следовательно, физический интерфейс включает в себя уравнение расстояния между стенами.\n\n Существуют два типа исследований, доступных для этого физического интерфейса. Используя тип исследования, зависящий от времени, вращение достигается за счет движущейся функциональности сетки, также известной как скользящая сетка. Используя исследование Frozen Rotor, вращающиеся части замораживаются в положении, а вращение объясняется включением центробежных и кориолисовых сил.
topicdescr/multiphysicsrotatingmachineryphasetransportmixturemodelturbulentarea = [Вращающиеся машины, фазовая модель транспортной смеси, интерфейсы турбулентных потоков] Вращающиеся машины, фазовые транспортные смеси, турбулентные потоки используются для моделирования потоков на высоких числах Рейнольдса, содержащих несколько дисперсных фаз в оборудовании с одной или несколькими вращающимися частями. Диспергированной фазой могут быть пузырьки, жидкие капли или твердые частицы.
topicdescr/multiphysicsrotatingmachineryphasetransportmixturemodelv2f = [The Rotating Machinery, Phase Transport Mixture Model, v2-f Interface] The Rotating Machinery, Phase Transport Mixture Model турбулентное течение, v2-f multiphysics interface используется для имитации связи между фазовым транспортом и потоком жидкости при высоких числах Рейнольдса в оборудовании, содержащем одну или несколько вращающихся частей. Он сочетает в себе фазовый транспорт и турбулентный поток, интерфейсы v2-f и вращающийся область под движущейся сеткой. Функция мультифизической связи Mixture Model добавляется автоматически. Эта функция соединяет интерфейсы фазового транспорта и потока и предоставляет варианты для различных моделей вязкости смеси и скорости скольжения. Эффекты турбулентности моделируются с использованием модели v2-f, выраженной в терминах турбулентных относительных флуктуаций (v2 нормализуется на k). Эллиптическая функция используется для смешивания околостенных и объемных терминов в уравнениях модели турбулентности. Модель v2-f представляет собой так называемую модель с низким числом Рейнольдса, что означает, что она может разрешать поток вплоть до стены. Модель v2-f зависит от расстояния до ближайшей стены. Следовательно, физический интерфейс включает в себя уравнение расстояния между стенами.\n\n Существуют два типа исследований, доступных для этого физического интерфейса. Используя тип исследования, зависящий от времени, вращение достигается за счет движущейся функциональности сетки, также известной как скользящая сетка. Используя исследование Frozen Rotor, вращающиеся части замораживаются в положении, а вращение объясняется включением центробежных и кориолисовых сил.
topicdescr/multiphysicsrotatingmachineryreactingflowkeps = [Вращающиеся машины, турбулентный поток, k-ε Интерфейс] Турбулентный поток, k-ε версия вращающихся машин, реагирующий поток мультифизические интерфейсы используются для имитации потока в турбулентном режиме, связанном с переносом видов в газе или жидкости в оборудовании, содержащем одну или несколько вращающихся частей.\n\n Он объединяет интерфейсы турбулентное течение, k-ε и Transport of Concentrated Species и добавляет вращающийся область под Moving Сетка. Мультифизическая связь, которая добавляется автоматически, соединяет поток жидкости и массовый транспорт и применяет моделирование турбулентности для массового транспорта. Видовой транспорт поддерживает как смесь, где концентрации сопоставимы по величине, так и низкоконцентрационные растворители в растворителе.\n\n Для этого физического интерфейса доступны два типа исследований. Используя тип исследования, зависящий от времени, вращение достигается за счет движущейся функциональности сетки, также известной как скользящая сетка. Используя тип исследования Frozen Rotor, вращающиеся части замораживаются в положении, а вращение объясняется включением центробежных и кориолисовых сил.
