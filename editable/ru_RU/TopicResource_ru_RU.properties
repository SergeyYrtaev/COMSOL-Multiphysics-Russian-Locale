topicdescr_physics/boundarypair = Выбор пары границ для периодичности ячеек.
topicdescr_physics/boundaryradiation = [Радиация] Состояние теплового излучения на краях оболочек.
topicdescr_physics/boundaryreactioncoefficients = [Коэффициенты реакции]Реакционная стехиометрия связанной электрохимической реакции
topicdescr_physics/boundaryselectionfordopingprofile = [Выбор границы для профиля допинга]Граница, от которой изменяется геометрический профиль допинга.
topicdescr_physics/boundaryselectionfortrapdensityprofile = [Выбор границы для профиля легирования]Граница, от которой изменяется геометрический профиль плотности ловушек.
topicdescr_physics/boundarytoboundary = [Граница с границей] Соединение границы с границей в оболочках.
topicdescr_physics/boundarystress = [Граничное напряжение]Граничные условия для жидкостного напряжения.
topicdescr_physics/boundarystressfreeporous = [Граничное напряжение]Граничные условия для жидкостного напряжения.
