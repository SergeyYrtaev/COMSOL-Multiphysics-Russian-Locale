topicdescr/multiphysicselectrodepositionsecondary = [Электроосложение, вторичный интерфейс] Вторичный интерфейс описывает распределение тока, распределение потенциала и геометрические изменения в ячейке электроосаждения при предположении, что изменения в композиции незначительны в электролите. Он объединяет интерфейсы вторичного распределения тока и деформированной геометрии.\n\n Добавить дополнительные интерфейсы переноса химических видов для описания зависимых от концентрации (третичных) распределения тока.
