topicdescr_physics/heatpipe = [Тепловая трубка]Двухконтактный терморезистор для моделирования тепловой трубки.
topicdescr_physics/heatratenode = [Узел скорости нагрева]Одноконтактный компонент с заданной общей скоростью нагрева, конвективной скоростью тепла или источником джоулевого тепла.
