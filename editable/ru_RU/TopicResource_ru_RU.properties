topicdescr_physics/hardness = [Твердость]Твердость используется для расчета твердости по Виккерсу сталей.
topicdescr_physics/harmonicperturbation = [Гармоническое возмущение]Вклад гармонического возмущения для условия, примененного к родительскому объекту.
topicdescr_physics/harmonicperturbationint = [Гармоническое возмущение]Вклад гармонического возмущения для условия, применяемого на уровне интерфейса в родительском объекте в многослойной оболочке.
topicdescr_physics/harmonicperturbationintep = [Гармоническое возмущение]Вклад гармонического возмущения для условия, применяемого на уровне интерфейса в родительском объекте в многослойной оболочке.
topicdescr_physics/harmonicperturbationints = [Гармоническое возмущение]Вклад гармонического возмущения для условия, применяемого на уровне интерфейса в родительском объекте в многослойной оболочке.
topicdescr_physics/heatequation = [Уравнение теплопроводности]Уравнение теплопроводности.
topicdescr_physics/heatexchanger = [Теплообменник]Теплообменник для двух и более потоков материала.
