topicdescr/rotatingmachineryflowsst = [Вращающиеся машины, турбулентный поток, SST интерфейс] Вращающиеся машины, турбулентный поток, SST интерфейс используется для моделирования потока при высоких числах Рейнольдса в геометрии с одной или несколькими вращающимися частями. Физический интерфейс поддерживает несжимаемые и сжимаемые потоки при низких числах Маха (обычно менее 0,3).\n\n Интерфейс турбулентное течение, SST сочетается с вращающимся областьом под Moving Сетка. Баланс импульса регулируется уравнениями Навье-Стокса, а сохранение массы регулируется уравнением непрерывности. Эффекты турбулентности моделируются с использованием модели двух уравнений SST с ограничениями реализуемости. Модель SST представляет собой так называемую модель с низким числом Рейнольдса, что означает, что она может разрешать поток вплоть до стены. Модель SST зависит от расстояния до ближайшей стены. Поэтому физический интерфейс включает в себя уравнение расстояния между стенами.\n\n Для этого физического интерфейса доступны два типа анализа. Используя переходный анализ, один или несколько областей вращаются относительно фиксированной системы отсчета. Этот тип анализа также известен как скользящая сетка. Используя анализ замороженного ротора, вращающиеся части замораживаются в положении, а вращение объясняется включением центробежных и кориолисовых сил.
topicdescr/rotatingmachineryflowv2f =  [Вращающаяся машина, турбулентный поток, v2-f интерфейс] Вращающаяся машина, турбулентный поток, v2-f интерфейс используется для имитации потока при высоких числах Рейнольдса в геометрии с одной или несколькими вращающимися частями. Физический интерфейс подходит для несжимаемых потоков и сжимаемых потоков при низком количестве Маха (обычно менее 0,3). \n\nThe турбулентное течение, v2-f интерфейс сочетается с вращающимся областьом под Moving Сетка. Баланс импульса регулируется уравнениями Навье-Стокса, а сохранение массы регулируется уравнением непрерывности. Эффекты турбулентности моделируются с использованием модели v2-f, выраженной в терминах турбулентных относительных флуктуаций (v2 нормализуется на k). Эллиптическая функция используется для смешивания околостенных и объемных терминов в уравнениях модели турбулентности. Модель v2-f представляет собой так называемую модель с низким числом Рейнольдса, что означает, что она может разрешать поток вплоть до стены. Модель v2-f зависит от расстояния до ближайшей стены. Поэтому физический интерфейс включает в себя уравнение расстояния между стенами.\n\n Для этого физического интерфейса доступны два типа анализа. Используя переходный анализ, один или несколько областей вращаются относительно фиксированной системы отсчета. Этот тип анализа также известен как скользящая сетка. Используя анализ замороженного ротора, вращающиеся части замораживаются в положении, а вращение объясняется включением центробежных и кориолисовых сил.
topicdescr/rotatingmachineryflowyplus = [Интерфейс «Вращающееся оборудование, турбулентный поток, алгебраический yPlus»] Интерфейс «Вращающееся оборудование, турбулентный поток, алгебраический yPlus» используется для моделирования потока при высоких числах Рейнольдса в геометриях с одной или несколькими вращающимися частями. Физический интерфейс поддерживает несжимаемые и сжимаемые потоки при низких числах Маха (обычно менее 0,3).\n\nТурбулентный поток, алгебраический интерфейс yPlus сочетается с вращающейся областью в движущейся сетке. Баланс импульса определяется уравнениями Навье-Стокса, а сохранение массы определяется уравнением неразрывности. Эффекты турбулентности учитываются с использованием расширенной модели вязкости, основанной на локальном расстоянии от стенки. Поэтому физический интерфейс включает уравнение расстояния до стены.\n\nДля этого физического интерфейса доступны два типа анализа. Используя переходный анализ, один или несколько областей вращаются относительно фиксированной системы отсчета. Этот тип анализа также известен как скользящая сетка. При использовании анализа замороженного ротора вращающиеся части остаются в замороженном состоянии, а вращение учитывается с учетом центробежных сил и сил Кориолиса.
topicdescr/rotatingmachinerymagnetic = [Вращающееся оборудование, магнитный интерфейс] Магнитный интерфейс вращающегося оборудования используется для проектирования и анализа электродвигателей и генераторов. Стационарное и временное моделирование поддерживается в 2D и 3D.\n\nФизический интерфейс решает уравнения Максвелла, сформулированные с использованием комбинации магнитного векторного потенциала и магнитного скалярного потенциала в качестве зависимых переменных.
topicdescr/rotordynamics = [Группа «Физика роторной динамики» в мастере моделей] Ветка «Роторная динамика» содержит физические интерфейсы для анализа динамики и устойчивости компонентов вращающегося оборудования, а также физические интерфейсы для анализа гидродинамических подшипников.
topicdescr/rspf = [Интерфейсы реагирующего потока] Ветка «Реагирующий поток» содержит несколько версий мультифизического интерфейса, который объединяет уравнения потока жидкости с уравнениями, управляющими массопереносом в смесях жидкостей.\n\nЭти физические интерфейсы поддерживают ламинарный поток и, в зависимости от лицензированных продуктов, турбулентный поток, а также поток через пористые среды.
topicdescr/schrodingerequation = [Интерфейс уравнения Шредингера] Интерфейс Schrödinger Equation решает уравнение Шредингера для общих квантово-механических задач, а также для волновых функций электронов и дырок в квантово-ограниченных полупроводниках в предположении аппроксимации огибающей функции.
topicdescr/secondarycurrentdistribution = [Интерфейсы первичного распределения тока и вторичного распределения тока]Интерфейс вторичного распределения тока аналогичен интерфейсу первичного распределения тока с той разницей, что он учитывает перенапряжения активации. Связь между переносом заряда и перенапряжением можно описать с помощью произвольных кинетических выражений, таких как уравнения Батлера-Фольмера и Тафеля.\n\nИспользуйте этот физический интерфейс для общего моделирования электрохимических ячеек. Его можно комбинировать с интерфейсами, моделирующими массоперенос, для описания зависимого от концентрации (третичного) распределения тока. \n\nЗакон Ома используется в сочетании с балансом заряда для описания проводимости токов в электродах и электролитах.
topicdescr/semiconductor = [Интерфейс Semiconductor] Интерфейс Semiconductor решает уравнение Пуассона для электрического потенциала и уравнения дрейфа-диффузии для электронов и дырок в полупроводниковом материале.
topicdescr/semiconductors = [Полупроводник]Ветка «Полупроводник» содержит интерфейс «Полупроводник», который решает уравнение Пуассона для электрического потенциала и уравнения дрейфовой диффузии для электронов и дырок в полупроводниковом материале.
topicdescr/sensitivity = [Интерфейс чувствительности]Интерфейс чувствительности предоставляет инструменты для выполнения анализа чувствительности в связи с общим мультифизическим моделированием.
topicdescr/shallowwaterequations = [Уравнения мелкой воды] Ветка «Уравнения мелкой воды» содержит физический интерфейс для моделирования течения под свободной поверхностью при условии, что масштаб горизонтальной длины намного больше масштаба вертикальной длины.
topicdescr/shallowwaterequationstimeexplicit = [Уравнения мелководья, явный интерфейс по времени] Интерфейс «Уравнения мелководья, явный по времени» используется для моделирования течения под свободной поверхностью при условии, что масштаб горизонтальной длины намного больше масштаба вертикальной длины. Физический интерфейс решает уравнения мелкой воды, полученные путем усреднения по глубине уравнений Навье-Стокса. Зависимыми переменными являются глубина воды и поток воды.\n\nМоделирование с использованием уравнений мелководья, интерфейс явная по времени всегда зависит от времени. Интерфейс основан на разрывном методе Галеркина (dG-FEM) и использует явный по времени решатель.
topicdescr/shapeoptimization = [Интерфейс оптимизации формы]Интерфейс оптимизации формы предоставляет инструменты для оптимизации формы в связи с общим мультифизическим моделированием.
topicdescr/shapeoptimizationshell = [Функция оптимизации оболочки произвольной формы]Функция оболочки произвольной формы используется для оптимизации формы оболочки.
topicdescr/shell = [Интерфейсы «Оболочка» и «Плита»]Интерфейс «Оболочка» используется для моделирования несущих оболочек на 3D-гранях. Оболочки представляют собой тонкие плоские или изогнутые конструкции, обладающие значительной жесткостью на изгиб. В интерфейсе используются оболочечные элементы типа MITC, которые можно использовать для анализа как тонких (теория Кирхгофа), так и толстых (теория Миндлина) оболочек. Можно учитывать геометрическую нелинейность.\n\nМодуль «Композитные материалы» добавляет возможность моделировать слоистые оболочки конструкций от тонкой до умеренной толщины. Формулировка основана на теории однослойной эквивалентной сдвиговой деформации первого порядка (FSDT). Он позволяет быстро рассчитывать глобальную реакцию, включая грубые прогибы, собственные частоты и критические нагрузки, вызывающие потерю устойчивости.\n\nС модулем нелинейных конструкционных материалов интерфейс расширяется, например, за счет моделей материалов для пластичности, гиперэластичности и ползучести.
topicdescr/singleparticlebattery = [Интерфейс одночастичной батареи] Интерфейс одночастичной батареи вычисляет распределение заряда в батарее, учитывая диффузию твердых частиц в частицах электрода и кинетику реакции интеркаляции. Падение омического потенциала в электролите учитывается с использованием термина сосредоточенного сопротивления раствора. \n\nЭтот физический интерфейс предлагает упрощенный (по сравнению, например, с интерфейсом литий-ионного аккумулятора) подход к моделированию аккумулятора. Основные допущения, использованные в одночастичной формулировке, справедливы, когда эффекты распределения тока по глубине пористых электродов незначительны и когда градиенты концентрации солей в электролите не вызывают существенных изменений локальной проводимости электролита.
topicdescr/slipflow = [Интерфейс скользящего потока]Интерфейс скользящего потока используется для моделирования тепловых и изотермических потоков газа в режиме скользящего течения. В режиме скользящего течения уравнения Навье-Стокса можно использовать для моделирования течения, за исключением тонкого слоя газа, примыкающего к стенкам. Внутри этого слоя, известного как слой Кнудсена, газ значительно разрежен. Влияние слоя Кнудсена на континуальную часть течения можно смоделировать с помощью модифицированных граничных условий для уравнений Навье-Стокса. Обычно проскальзывающее течение применяется при числах Кнудсена от 0,01 до 0,1.
topicdescr/sme = [Физические группы в мастере моделей] Ветка «Механика конструкций» содержит физические интерфейсы для анализа деформаций, напряжений и деформаций твердых конструкций. Доступные типы анализа: стационарный, собственная частота, переходный процесс, частотная характеристика и линейная потеря устойчивости.
topicdescr/solidmechanics = [Интерфейс «Механика твердого тела»Интерфейс «Механика твердого тела» предназначен для общего структурного анализа 3D, 2D, 1D или осесимметричных тел. Типичными результатами являются смещения, напряжения и деформации.\n\nПредположения о плоском напряжении, плоской деформации или обобщенной плоской деформации можно использовать в 2D, 1D и 1D осесимметричном анализе. В двумерную осесимметрию можно включать окружные смещения.\n\nМодуль «Акустика», модуль MEMS и модуль «Механика конструкций» добавляют несколько функций, например, геометрическую нелинейность и расширенные граничные условия, такие как контактные, следящие деформации и неотражающие границы.\n\nС помощью модуля «Нелинейные конструкционные материалы» или модуля «Геомеханика» интерфейс расширяется, например, моделями материалов для пластичности, гиперупругости, ползучести и бетона.
topicdescr/solidoxidefc = [Интерфейс твердооксидно-водородного топливного элемента] Интерфейс твердооксидно-водородного топливного элемента предполагает, что заряд в электролите переносится ионами оксония, образуя воду на анодной стороне элемента в реакции окисления водорода. сторона катода.\n\nЭтот интерфейс подходит для твердооксидных топливных элементов (ТОТЭ).
topicdescr/solidoxidewe = [Интерфейс твердооксидно-водного электролизера] Интерфейс твердооксидно-водного электролизера предполагает, что заряд в электролите переносится ионами оксония, потребляя воду на катодной стороне ячейки в реакции выделения водорода. на стороне анода.\n\nЭтот интерфейс подходит для твердооксидных водных электролизеров (SOEC).
topicdescr/solidrotor = [Интерфейс Solid Rotor]Интерфейс Solid Rotor используется для выполнения структурного анализа вращающихся машин. Уравнения равновесия формулируются во вращающейся системе отсчета. Эффекты ускорения кадра из-за вращения учитываются автоматически. Интерфейс может моделировать как осесимметричные, так и неосесимметричные роторы. Однако в частотной области или анализе собственных частот статор должен быть осесимметричным. Интерфейс использует трехмерные твердотельные элементы и поддерживает как геометрически линейный, так и нелинейный анализ. Доступно несколько моделей подшипников.
topicdescr/solidrotorfixedframe = [Интерфейс «Сплошной ротор, фиксированная рама»]Интерфейс «Сплошной ротор, фиксированная рама» используется для выполнения структурного анализа вращающихся машин. Уравнения равновесия формулируются в фиксированной системе отсчета. Эффекты ускорения кадра из-за вращения учитываются автоматически. При анализе частотной области и собственных частот можно моделировать только осесимметричные роторы. Однако статор может быть и неосесимметричным. Интерфейс использует трехмерные твердотельные элементы и поддерживает как геометрически линейный, так и нелинейный анализ. Доступно несколько моделей подшипников.
topicdescr_physics/solid_thinlayer = [Тонкий слой] Добавьте тонкий слой для структурного анализа. Тонкий слой может быть определен с использованием различных приближений толщины и моделей материала.
topicdescr_physics/solid_thinlayerpair = [Тонкий слой] Добавьте тонкий слой для структурного анализа. Тонкий слой может быть определен с использованием различных приближений толщины и моделей материала.
topicdescr/solutetransport = [Интерфейс переноса растворенных веществ]Интерфейс переноса растворенных веществ используется для расчета концентрации и переноса веществ в свободных и пористых средах. Он включает выражения скорости реакции и источники растворенных веществ для моделирования транспорта растворенных веществ. Физический интерфейс предназначен для транспортировки в пористых средах, особенно в приложениях с подземными потоками. \n\nФизический интерфейс включает потоки свободной и пористой среды с неподвижными и подвижными твердыми фазами, включая диффузию, конвекцию, дисперсию, сорбцию и улетучивание в пористых средах. media.\n\nФизический интерфейс можно использовать для стационарного и нестационарного анализа.
topicdescr/solversequence = [Вычисление решения] Узел «Решатель» содержит все функции, которые определяют последовательность решателя. Щелкните правой кнопкой мыши, чтобы добавить функцию; вычислить или скопировать решение; или удалите или отключите последовательность решателя.
topicdescr/speciestransport = [Отдел транспорта видов]Физические интерфейсы для моделирования переноса электронов, переноса тяжелых веществ или переноса заряда без обязательной связи с электромагнитными полями.
topicdescr/spf = [Однофазный поток] Ветка «Однофазный поток» содержит физические интерфейсы для моделирования потоков однофазных жидкостей с низким числом Маха (<0,3).
topicdescr/stabilizedconvectiondiffusionequation = [Стабилизированное уравнение конвекции-диффузии]Интерфейс «Стабилизированное уравнение конвекции-диффузии» можно использовать для моделирования классического PDE, описывающего перенос посредством конвекции и диффузии. Он включает в себя стабилизацию, поглощение, а также консервативные и неконсервативные конвективные условия.
topicdescr/structuralmembrane = [Мембранный интерфейс] Интерфейс «Мембрана» в основном используется для моделирования предварительно напряженных мембран, но также может использоваться для тонкой оболочки твердого тела. Мембраны можно рассматривать как плоские напряженные элементы в 3D, способные деформироваться как в плоскостном, так и внеплоскостном направлениях. Разница между оболочкой и мембраной заключается в том, что мембрана не имеет изгибной жесткости. \n\nПоскольку для того, чтобы мембрана имела поперечную жесткость, необходимо растягивающее напряжение, обычно требуется начальное напряжение, чтобы избежать сингулярности. Однако можно обрабатывать состояния сжимающего напряжения, используя специальную нелинейную формулу сморщивания. \n\nС модулем «Нелинейные конструкционные материалы» интерфейс расширяется, например, за счет моделей материалов для пластичности, гиперэластичности и ползучести.
topicdescr/surfacereactions = [Интерфейс «Поверхностные реакции»] Интерфейс «Поверхностные реакции» используется для моделирования химических реакций поверхностных и объемных частиц на границе. Поверхностные частицы могут переноситься в тангенциальном направлении к поверхности по закону Фика, тогда как объемные частицы считаются неподвижными на поверхности.
topicdescr/surfacetosurfaceradiation = [Интерфейс «Излучение от поверхности к поверхности»]Интерфейс «Излучение от поверхности к поверхности» используется для моделирования теплопередачи посредством излучения. Он рассматривает тепловое излучение как перенос энергии между границами и внешними источниками тепла, где среда не участвует в излучении (излучение в прозрачных средах).\n\nВ то время как интерфейс теплопередачи с излучением от поверхности к поверхности вычисляет температурное поле, этот физический интерфейс требует его в качестве модели input.\n\nЕсли среда участвует в излучении (полупрозрачная среда), то вместо этого используйте интерфейс Излучение в участвующих средах.\n\nУравнение радиации определенный на границах, где разрешено излучение от поверхности к поверхности, соответствует уравнению метода излучательности.
topicdescr/tcht = [Интерфейсы «Неизотермический поток» и «Сопряженная теплопередача», «Турбулентный поток»]Ветка «Турбулентный поток» содержит физические интерфейсы, которые объединяют уравнение теплопроводности с уравнениями турбулентного потока.
topicdescr/tdp = [Использование функции пакета «Термодинамика»] Узел «Термодинамика» предоставляет доступ к функциям для связи с внешними функциями для расчета свойств. Щелкните правой кнопкой мыши узел «Пакет термодинамики», чтобы просмотреть доступные типы свойств.
topicdescr/ternaryphasefield = [Интерфейс тройного фазового поля]Интерфейс тройного фазового поля используется для отслеживания движущихся границ раздела между тремя несмешивающимися жидкостями путем решения двух переменных фазового поля и двух обобщенных переменных химического потенциала. Основным узлом является функция «Свойства смеси», которая добавляет уравнения фазового поля и предоставляет интерфейс для определения свойств модели фазового поля.
topicdescr/tertiarycurrentdistributionnernstplanck = [Третичное распределение тока, интерфейс Нернста-Планка]Третичное распределение тока, интерфейс Нернста-Планка описывает распределение тока и потенциала в электрохимической ячейке с учетом индивидуального транспорта заряженных частиц (ионов) в электролите. Физический интерфейс далее предполагает, что в электролите выполняется условие электронейтральности. Электродную кинетику реакций переноса заряда можно описать с помощью произвольных выражений или с помощью заранее определенных выражений Батлера-Фольмера и Тафеля. Обратите внимание, что условие электронейтральности предполагает, что в модель включены все основные ионы, несущие ток. (ионы).\n\nЗакон Ома используется в сочетании с балансом заряда для описания течения токов в электродах. Уравнения Нернста-Планка используются для описания переноса заряженных и нейтральных частиц в электролите.
topicdescr/tertiaryelectroanalysis = [Интерфейс электроанализа]Интерфейс электроанализа описывает массовый перенос разбавленных веществ в электролитах с использованием уравнения диффузии-конвекции, позволяющего определить концентрацию электроактивных веществ. Физический интерфейс содержит специальные функции для моделирования циклической вольтамперометрии и электрохимической импедансной спектроскопии. \n\nОпция сохранения заряда электроанализа предполагает, что в электролите нет градиентов потенциала и переносом ионов, несущих заряд, путем миграции, можно пренебречь. Следовательно, интерфейс по умолчанию не определяет потенциал электролита. Также доступны другие модели сохранения заряда.\n\nИспользуйте этот физический интерфейс для моделирования электроаналитических задач с растворами электролитов, содержащими большое количество инертных веществ "supporting" электролит.\n\nНастройки этого физического интерфейса можно выбрать так, чтобы имитировать перенос химических веществ посредством диффузии (закон Фика) и конвекции (при соединении с потоком жидкости).
topicdescr/tirf = [Интерфейсы изотермического реагирующего потока]Мультифизические интерфейсы изотермического реагирующего турбулентного потока объединяют уравнения турбулентного потока с уравнениями, управляющими массопереносом в смесях жидкостей.
topicdescr/tnirf = [Интерфейсы неизотермического реагирующего потока] Мультифизические интерфейсы «Неизотермический реагирующий турбулентный поток» объединяют уравнения турбулентного потока с уравнениями, управляющими теплообменом и массопереносом в смесях жидкостей.
topicdescr/tf = [Турбулентный поток] Интерфейсы «Турбулентный поток» предназначены для моделирования однофазных потоков при высоких числах Рейнольдса и низких числах Маха (<0,3).
topicdescr/tff = [Моделирование тонкопленочного потока] Физические интерфейсы в разделе «Тонкопленочный поток» используются для описания двумерного потока жидкости в тонком слое с использованием уравнений Рейнольдса или модифицированных уравнений Рейнольдса.
topicdescr/thac = [Отдел термовязкостной акустики]Интерфейсы термовязкостной акустики используются для явного расчета распространения акустических волн, включая тепловые и вязкостные потери. Физические интерфейсы используются для решения линеаризованного уравнения неразрывности, уравнения Навье-Стокса и уравнения энергии (для условий без фонового потока). Это описание необходимо для моделирования распространения звука в узких областях, где важны вязкостные и тепловые потери, например, в преобразователях, мобильных устройствах, МЭМС-преобразователях, слуховых аппаратах и ​​т. д. Мультифизические интерфейсы с заранее заданными связями доступны для моделирования взаимодействия упругих волн в твердых телах и акустики в жидкости.\n\nВ зависимости от лицензированных продуктов также доступны физические интерфейсы для взаимодействия упругих волн в оболочках и термовязкостной акустики в жидкостях.
topicdescr/thamf = [Интерфейсы потока тепла и влаги, турбулентного потока] Ветка «Турбулентный поток» содержит физические интерфейсы, которые моделируют перенос тепла и влаги в воздухе турбулентным потоком.
topicdescr/thermalstress = [Ветка Thermal-Structure Interaction]Ветка Thermal–Structure Interaction содержит физические интерфейсы для моделирования теплового расширения в твердых телах, оболочках и мембранах.
topicdescr/thermoacoustics = [Интерфейс термовязкостной акустики, частотная область] Интерфейс термовязкостной акустики, частотная область используется для расчета акустических изменений давления, скорости и температуры. Физический интерфейс необходим для точного моделирования акустики в геометрии малых размеров. Вблизи стенок вязкость и теплопроводность становятся важными, поскольку они создают вязкий и тепловой граничный слой, в котором потери значительны. По этой причине необходимо явно учитывать эффекты теплопроводности и вязкие потери в основных уравнениях. Физический интерфейс включает в себя функции интерфейса «Акустика давления, частотная область» с предопределенными связями с термоакустикой. Например, он используется при моделировании реакции небольших преобразователей, таких как микрофоны и приемники. Другие приложения включают анализ обратной связи в слуховых аппаратах и ​​мобильных устройствах или изучение затухающих вибраций МЭМС-структур. \n\nФизический интерфейс решает уравнения в частотной области, предполагая, что все поля и источники являются гармоническими. Предполагается линейная акустика. \n\nУравнения, определенные интерфейсом Термовязкостная акустика, частотная область, представляют собой линеаризованные уравнения Навье-Стокса в условиях покоя, решающие уравнения непрерывности, импульса и энергии.
topicdescr/thermoacousticsboundarymode = [Thermoviscous Acoustics, Boundary Mode Interface] Интерфейс Thermoviscous Acoustics, Boundary Mode используется для вычисления и идентификации режимов распространения и нераспространения в волноводах и протоках. Интерфейс выполняет анализ пограничного режима на границе, входе или поперечном сечении волновода или протока небольших размеров, включая тепловые и вязкие эффекты потери, которые важны в акустическом пограничном слое вблизи стен. \n\n Интерфейс решает акустические вариации давления, скорости и температуры, а также внеплоскостьовое волновое число режимов. Возле стен вязкие потери и теплопроводность становятся важными, поскольку существует граничный слой. Толщина этих слоев известна как вязкая и термическая глубина проникновения. По этой причине необходимо включить эффекты теплопроводности и вязкие потери в управляющие уравнения. Интерфейс Thermoviscous Acoustics, Boundary Mode, например, используется при настройке источников в системах с небольшими каналами, такими как слуховые аппараты или мобильные устройства. Он также может быть использован для идентификации распространяющегося волнового числа и характеристического импеданса поперечного сечения протока и использования этой информации в гомогенизированной модели акустики узкой области в акустике давления, частотном областьном интерфейсе. \n\n Интерфейс физики решает уравнения, определенные линеаризованными уравнениями Навье-Стокса (линейные уравнения непрерывности, импульса и энергии), в спокойных фоновых условиях, на границах, в поисках внеплоскостьовых волновых чисел на заданной частоте.
topicdescr/thermoacousticshell = [Взаимодействие термовязкостной акустики и оболочки, интерфейс частотной области] Интерфейс термовязкостной акустики –Shell Interaction, частотной области объединяет интерфейсы акустики давления, частотной области, термовязкостной акустики, частотной области и оболочки. Физический интерфейс учитывает и заранее определяет связь между полем смещения оболочки и акустическими изменениями в областях жидкости. Его можно использовать, например, для моделирования вибрационного отклика микрозеркал в приложениях MEMS.\n\nФизический интерфейс решает уравнения в частотной области, предполагая, что все поля и источники являются гармоническими. Предполагается линейная акустика. 
topicdescr/thermoacousticsolid = [Интерфейс термовязкостной акустики и твердого тела, частотная область]Интерфейс термовязкостной акустики–Твердое взаимодействие, частотная область объединяет интерфейсы акустики давления, частотной области, термовязкостной акустики, частотной области и механики твердого тела. Физический интерфейс рассчитывает и заранее определяет связи между полем смещения в твердом теле и акустическими изменениями в областях жидкости. \n\nФизический интерфейс решает уравнения в частотной области, предполагая, что все поля и источники являются гармоническими. Предполагается линейная акустика.
topicdescr/thermoacousticssinglephysics = [Интерфейс термовязкостной акустики в частотной области]Физический интерфейс термовязкостной акустики в частотной области используется для расчета распространения акустических волн, включая тепловые и вязкостные потери. Интерфейс учитывает акустические изменения давления, скорости и температуры. Термовязкостная акустика необходима для точного моделирования акустики в геометрии малых размеров. Вблизи стенок существует вязкий и термический граничный слой. Здесь вязкие потери из-за сдвига и теплопроводности становятся важными из-за больших градиентов. По этой причине необходимо явно учитывать эффекты теплопроводности и вязкие потери в основных уравнениях. Например, он используется при моделировании реакции небольших преобразователей, таких как микрофоны и приемники. Другие приложения включают анализ обратной связи в слуховых аппаратах и ​​мобильных устройствах или изучение затухающих вибраций МЭМС-структур.\n\nФизический интерфейс решает уравнения в частотной области, предполагая, что все поля и источники являются гармоническими. Предполагается линейная акустика.\n\nУравнения, определяемые интерфейсом Термовязкостная акустика, частотная область, представляют собой линеаризованные уравнения Навье-Стокса в условиях покоя, решающие уравнения непрерывности, импульса и энергии.
topicdescr/thermoacousticssinglephysicstransient = [Термовязкостная акустика, интерфейс переходных процессов] Интерфейс термовязкостной акустики, переходной физики используется для расчета переходного распространения акустических волн, включая тепловые и вязкостные потери. Интерфейс учитывает акустические изменения давления, скорости и температуры. Термовязкостная акустика необходима для точного моделирования акустики в геометрии малых размеров. Вблизи стенок существует вязкий и термический граничный слой. Здесь вязкие потери из-за сдвига и теплопроводности становятся важными из-за больших градиентов. По этой причине необходимо явно учитывать эффекты теплопроводности и вязкие потери в основных уравнениях. Например, он используется при моделировании реакции небольших преобразователей, таких как микрофоны и приемники. Другие приложения включают анализ обратной связи в слуховых аппаратах и ​​мобильных устройствах или изучение затухающих вибраций МЭМС-структур.\n\nФизический интерфейс решает уравнения во временной области. Это позволяет осуществлять общее возбуждение системы произвольными переходными сигналами, а также моделировать переходные процессы, такие как явления демпфирования вибрирующих конструкций. Предполагается линейная акустика.\n\nУравнения, определенные интерфейсом Термовязкостная акустика, переходный процесс, представляют собой линеаризованные уравнения Навье-Стокса в условиях покоя, решающие уравнения непрерывности, импульса и энергии.
topicdescr/thermoelasticity = [Интерфейс «Термоупругость»] Интерфейс «Термоупругость» добавляет термоупругие связи в интерфейс «Механика твердого тела» и учитывает результирующее отклонение температуры в дополнение к структурным смещениям. Термоупругая связь приводит к локальному охлаждению материала при растяжении и нагреву материала при сжатии. Между теплыми и холодными областями твердого тела происходит необратимый теплообмен, вызывающий механические потери, что может быть важно, особенно для небольших конструкций.
topicdescr/thinfilmdamping = [Ветка тонкопленочного демпфирования]Ветвь тонкопленочного демпфирования содержит мультифизические интерфейсы для моделирования взаимодействия между твердыми материалами и тонкими пленками жидкости.
topicdescr/thinfilmflowdomain = [Интерфейс «Тонкопленочный поток, область»] Интерфейс «Тонкопленочный поток, область» используется для решения уравнения Рейнольдса или модифицированного уравнения Рейнольдса в узком канале, который представлен областью внутри геометрии. Он используется для моделирования смазки или газового демпфирования, когда канал для жидкости достаточно тонкий, чтобы можно было применить уравнение Рейнольдса или модифицированное уравнение Рейнольдса.
topicdescr/thinfilmflowedge = [Интерфейс «Тонкопленочный поток»]Интерфейс «Тонкопленочный поток» используется для решения уравнения Рейнольдса или модифицированного уравнения Рейнольдса в узком канале, который представлен краем внутри геометрии. Он используется для моделирования смазки, эластогидродинамики или газового демпфирования, когда канал для жидкости достаточно тонкий, чтобы можно было применить уравнение Рейнольдса или модифицированное уравнение Рейнольдса.
topicdescr/thinfilmflowshell = [Интерфейс «Тонкопленочный поток»]Интерфейс «Тонкопленочный поток» используется для решения уравнения Рейнольдса или модифицированного уравнения Рейнольдса в узком канале, который представлен поверхностью внутри геометрии. Он используется для моделирования смазки, эластогидродинамики или газового демпфирования, когда канал для жидкости достаточно тонкий, чтобы можно было применить уравнение Рейнольдса или модифицированное уравнение Рейнольдса.
topicdescr/thmnf = [Интерфейсы потока с высоким числом Маха] Ветка турбулентного потока с высоким числом Маха имеет две версии одного и того же предопределенного мультифизического интерфейса. Эти интерфейсы используются для моделирования газовых течений при высоких числах Рейнольдса, где величина скорости сравнима со скоростью звука в газе, то есть турбулентных течений в трансзвуковом и сверхзвуковом диапазоне.
topicdescr/threephaseflowphasefield = [Трехфазный поток, фазовое поле] Ветка Трехфазный поток, фазовое поле содержит физический интерфейс для отслеживания границ раздела между тремя несмешивающимися жидкостями с использованием метода фазового поля.
topicdescr/tmf = [Интерфейсы «Поток влаги», «Турбулентный поток»] Ветка «Турбулентный поток» содержит физические интерфейсы, которые объединяют уравнение переноса влаги в воздухе с уравнениями турбулентного потока.
topicdescr/tnitf = [Интерфейсы «Неизотермический поток», «Турбулентный поток»] Ветка «Турбулентный поток» содержит физические интерфейсы, которые объединяют уравнение теплопроводности с уравнениями турбулентного потока.
topicdescr/tnp = [Третичное распределение тока, ветвь Нернста-Планка]Третичное распределение тока, ветвь Нернста-Планка содержит интерфейсы с различными вариантами сохранения заряда для моделирования обычных электрохимических ячеек. Интерфейсы описывают распределение тока и потенциала в электрохимической ячейке с учетом индивидуального транспорта заряженных частиц (ионов) в электролите, а также кинетики реакции переноса заряда.
topicdescr/topologyoptimization = [Интерфейс оптимизации топологии]Интерфейс оптимизации топологии предоставляет инструменты для выполнения оптимизации топологии в связи с общим мультифизическим моделированием. 
topicdescr/tpfls = [Двухфазный поток, установка уровня] Ветка «Двухфазный поток, установка уровня» содержит физические интерфейсы для отслеживания границы раздела между двумя несмешивающимися жидкостями с помощью функции установки уровня.
topicdescr/tpfmm = [Интерфейс «Ламинарный двухфазный поток, движущаяся сетка»] Ветка «Двухфазный поток, движущаяся сетка» содержит физический интерфейс для отслеживания границы раздела между двумя несмешивающимися жидкостями с использованием метода движущейся сетки, основанного на произвольной формулировке Лагранжа-Эйлера (ALE).
topicdescr/tpfpf = [Двухфазный поток, фазовое поле] Ветка «Двухфазный поток, фазовое поле» содержит физические интерфейсы для отслеживания границы раздела между двумя несмешивающимися жидкостями с использованием метода фазового поля.
topicdescr/tptffpf = [Двухфазный тонкопленочный поток, фазовое поле]Ветвь «Двухфазный тонкопленочный поток, фазовое поле» содержит физические интерфейсы для отслеживания границы раздела между двумя несмешивающимися тонкопленочными жидкостями с использованием метода фазового поля.
topicdescr/transientacousticpiezo = [Акустическое-пьезоэлектрическое взаимодействие, переходный интерфейс] Интерфейс «Акустика-пьезоэлектрическое взаимодействие, переходная физика» объединяет интерфейсы «Акустика давления», «Переходные процессы» и «Пьезоэлектрические устройства» для подключения и расчета изменений акустического давления в жидкостях со структурной деформацией как в твердых телах, так и в пьезоэлектрических твердых областих. Физический интерфейс также включает функции электростатики для расчета электрического поля в пьезоэлектрическом материале. Примеры включают моделирование пьезоэлектрических преобразователей для гидролокаторов или медицинских приложений и, например, улучшение слоев согласования импеданса. \n\nУравнение волны давления решается в области жидкости, а структурные динамические уравнения в твердом теле вместе с определяющими соотношениями, необходимыми для моделирования пьезоэлектриков. Можно моделировать как прямые, так и обратные пьезоэлектрические эффекты, а пьезоэлектрическую связь можно сформулировать с использованием форм заряда деформации или заряда напряжения.
topicdescr/transientacousticshell = [Взаимодействие акустической оболочки, переходный интерфейс] Интерфейс Acoustic–Shell Interaction, переходный процесс объединяет функции интерфейсов «Акустика давления», «Переходный процесс» и «Оболочка», чтобы связать акустические изменения давления в области жидкости со структурной деформацией границы оболочки. Его можно, например, использовать для определения прохождения звука через тонкую упругую конструкцию, такую как капот автомобиля, и анализа виброакустики диффузора громкоговорителя. через границу жидкости-структуры.\n\nСпециальные условия интерфейса легко определяются на границе жидкость-оболочка и определяют нагрузки жидкости на границу оболочки и влияние структурных ускорений на жидкость. Интерфейс доступен только для 3D-геометрий и способен моделировать связанную акустику давления и вибрации оболочки во временной области. 
topicdescr/transientacousticsolid = [Акустическое взаимодействие твердого тела, переходный интерфейс] Интерфейс Acoustic–Твердое взаимодействие, переходный процесс объединяет интерфейсы «Акустика давления», «Переходный процесс» и «Механика твердого тела» для связи акустических изменений давления в области жидкости со структурной деформацией в области твердого тела. Его можно, например, использовать для определения прохождения звука через упругую конструкцию или для решения связанных виброакустических явлений, присутствующих в громкоговорителе. через границу жидкость-твердое тело.\n\nСпециальные условия интерфейса легко определяются на границе жидкость-твердое тело и определяют нагрузки жидкости на твердую область и влияние структурных ускорений на жидкость. Физический интерфейс позволяет проводить исследования переходных процессов, а также решать задачи в частотной области с имеющимися граничными условиями.
topicdescr/linearizedpotentialflowtransient = [Линеаризованный потенциальный поток, переходный интерфейс] Интерфейс «Линеаризованный потенциальный поток, переходный процесс» используется для расчета акустических изменений потенциала скорости в присутствии невязкого и безвихревого фонового среднего потока, то есть потенциального потока. Физический интерфейс используется для аэроакустического моделирования, которое можно описать линеаризованными уравнениями потенциального потока сжимаемой жидкости. \n\nУравнения сформулированы во временной области. Физический интерфейс ограничен потоками с числом Маха M<1, частично из-за ограничений потенциального потока и частично из-за настроек акустических границ, необходимых для сверхзвукового потока. Связь между акустическим полем и фоновым потоком не включает в себя какой-либо заранее заданный шум, вызванный потоком.
topicdescr/transientelectromagneticwaves = [Электромагнитные волны, переходный интерфейс] Интерфейс «Радиочастота, электромагнитные волны, переходный процесс» используется для решения волнового уравнения во временной области для магнитного векторного потенциала. Источники могут иметь форму точечных диполей, линейных токов или падающих полей на границах или областих. Он используется в первую очередь для моделирования распространения электромагнитных волн в различных средах и структурах, когда требуется решение во временной области, например, для несинусоидальных сигналов или для нелинейных сред. Типичные применения связаны с распространением электромагнитных импульсов. 
topicdescr/transientpipeacoustics = [Интерфейс Pipe Acoustics, Transient] Интерфейс Pipe Acoustics, Transient используется для расчета изменений акустического давления и скорости при моделировании распространения звуковых волн в гибких трубопроводных системах. Основные уравнения сформулированы в общем виде с учетом возможности стационарного фонового течения. Физический интерфейс можно, например, использовать для расчета распространения звуковых волн в системах отопления, вентиляции и кондиционирования, других крупных трубопроводных системах или просто в органной трубе. \n\nРешенные уравнения предполагают, что распространяющиеся волны плоские. Распространение мод более высокого порядка, существующих выше частоты среза, определяемой поперечным сечением трубы, не моделируется. \n\nУравнения, управляющие распространением звука в трубах, основаны на учете балансов импульса, массы и энергии для контрольного объема куска трубы. Полученные уравнения выражаются в усредненных по поперечному сечению переменных и сводят уравнения к одномерной модели со скалярными зависимыми переменными. Физический интерфейс доступен в 3D для ребер и точек и в 2D для границ и точек.
topicdescr/transientpressureacoustics = [Интерфейс «Акустика давления, переходные процессы»] Интерфейс «Акустика давления, переходные процессы» используется для расчета изменения давления при моделировании распространения акустических волн в жидкостях в фоновых условиях покоя. Он подходит для нестационарного моделирования с произвольными зависящими от времени полями и источниками.\n\nФизический интерфейс можно использовать для моделирования линейной и нелинейной акустики, которая хорошо описывается скалярной переменной давления. Нелинейное поведение можно реализовать несколькими способами, например, путем привязки к нелинейной модели конструкции или с помощью встроенной нелинейной акустической модели Вестервельта. Физический интерфейс также может моделировать проблемы рассеяния, настраивая поля фонового давления.\n\nФизический интерфейс решает скалярное волновое уравнение во временной области. Также существуют исследования по созданию зависящих от времени модальных моделей и модальных моделей пониженного порядка. Физический интерфейс также выполняет решение в частотной области с доступными граничными условиями.
topicdescr/transitionalflow = [Интерфейс переходного потока]Интерфейс переходного потока можно использовать для моделирования изотермических потоков во всем диапазоне чисел Кнудсена от предела ламинарного потока до предела молекулярного потока. Интерфейс решает уравнение Больцмана с помощью модели столкновений Бхатнагара-Гросса-Крука (BGK), которая представляет собой упрощенную форму уравнения Больцмана с использованием метода решетки Больцмана. Когда в методе решетки Больцмана используются решетки большего размера, его можно рассматривать как метод дискретных скоростей для решения уравнения Больцмана БГК.
topicdescr/transmissionline = [Интерфейс линии передачи]Интерфейс «Линия передачи» используется для изучения распространения волн вдоль одномерных линий передачи. Интерфейс решает уравнение временной гармоники линии передачи для электрического потенциала.
topicdescr/transportinsolids = [Интерфейс «Перенос в твердых телах»Интерфейс «Перенос в твердых телах» предназначен для расчета переноса поля концентрации в твердых материалах, где закон диффузии Фика является движущей силой механизма переноса. Можно моделировать перенос одного или нескольких видов, а также менять единицы измерения переменных концентрации. Стационарные и временные исследования поддерживаются во всех пространственных измерениях.
topicdescr/trspf = [Интерфейсы «Реагирующий поток»]Мультифизические интерфейсы «Реагирующий турбулентный поток» объединяют уравнения турбулентного потока с уравнениями, управляющими массопереносом в смесях жидкостей.
topicdescr/trspfds = [Интерфейсы реагирующего потока] Мультифизические интерфейсы «Реагирующий турбулентный поток», «Разбавленные виды» объединяют уравнения турбулентного потока с уравнениями, управляющими транспортом разбавленных растворенных веществ в растворителе.  
topicdescr/truss = [Интерфейс фермы]Интерфейс фермы используется для моделирования тонких элементов, которые могут воспринимать только осевые силы. Основное применение – анализ ферменных конструкций. Однако его также можно использовать для моделирования провисающих кабелей или армирования в твердых телах. Он доступен в 3D и 2D. Можно учитывать геометрическую нелинейность.\n\nС модулем «Нелинейные конструкционные материалы» интерфейс расширяется за счет нелинейных моделей материалов.
topicdescr/ts = [Тонкие структуры]Ветка «Тонкие структуры» содержит физические интерфейсы для теплопередачи в тонких структурах: тонких оболочках, тонких пленках и трещинах.
topicdescr/turbulentbubblyflow = [Интерфейсы «Пузырьковый поток», «Турбулентный поток»]Интерфейсы «Пузырьковый поток», «Турбулентный поток» используются для моделирования течения жидкостей с диспергированными пузырьками при высоких числах Рейнольдса. Предполагается, что пузырьки занимают лишь небольшую объемную долю и всегда движутся со своей конечной скоростью.
topicdescr/turbulentflowalgebraicyplus = [Турбулентный поток, алгебраический интерфейс yPlus] Интерфейс Турбулентный поток, алгебраический yPlus используется для моделирования однофазных потоков при высоких числах Рейнольдса. Физический интерфейс подходит для несжимаемых потоков и сжимаемых потоков с низким числом Маха (обычно менее 0,3).\n\nУравнения, решаемые с помощью интерфейса турбулентное течение, Algebraic yPlus, представляют собой усредненные по Рейнольдсу уравнения Навье-Стокса для сохранения импульса и уравнение неразрывности. для сохранения массы. Эффекты турбулентности учитываются с использованием расширенной модели вязкости, основанной на локальном расстоянии от стенки. Поэтому физический интерфейс включает в себя уравнение расстояния до стены. \n\nТурбулентный поток, алгебраический интерфейс yPlus можно использовать для стационарного и нестационарного анализа.
topicdescr/turbulentflowkeps = [Интерфейс Турбулентный поток, k-ε]Интерфейс Турбулентный поток, k-ε используется для моделирования однофазных потоков при высоких числах Рейнольдса. Физический интерфейс подходит для несжимаемых потоков и сжимаемых потоков с низким числом Маха (обычно меньше 0,3).\n\nУравнения, решаемые с помощью турбулентного потока, k-ε интерфейс представляют собой уравнения Навье-Стокса. для сохранения импульса и уравнение неразрывности для сохранения массы. Эффекты турбулентности моделируются с использованием стандартной модели с двумя уравнениями k-ε с ограничениями реализуемости. Поток вблизи стен моделируется с использованием стеновых функций. \n\nТурбулентный поток, интерфейс k-ε можно использовать для стационарного и нестационарного анализа.
topicdescr/turbulentflowkomega = [Интерфейс Турбулентный поток, k-ω]Интерфейс Турбулентный поток, k-ω используется для моделирования однофазных потоков при высоких числах Рейнольдса. Физический интерфейс подходит для несжимаемых потоков и сжимаемых потоков с низким числом Маха (обычно менее 0,3). уравнения сохранения импульса и уравнение неразрывности сохранения массы. Эффекты турбулентности моделируются с использованием пересмотренной модели Уилкокса с двумя уравнениями k-ω с ограничениями реализуемости. Модель k-ω представляет собой так называемую модель с низким числом Рейнольдса, что означает, что она может разрешить поток вплоть до стенки.\n\nТурбулентный поток, Интерфейс k-ω может использоваться для стационарного и нестационарного анализа.
topicdescr/turbulentflowlowrekeps = [Интерфейс турбулентное течение, Low Re k-ε]Интерфейс турбулентное течение, Low Re k-ε используется для моделирования однофазных потоков при высоких числах Рейнольдса. Физический интерфейс подходит для несжимаемых потоков и сжимаемых потоков с низким числом Маха (обычно менее 0,3).\n\nУравнения, решаемые с помощью интерфейса Турбулентного потока, Low Re k-ε4, представляют собой интерфейс Навье-Стокса уравнения сохранения импульса и уравнение неразрывности сохранения массы. Эффекты турбулентности моделируются с использованием модели AKN с двумя уравнениями k-ε с ограничениями реализуемости. Модель AKN представляет собой так называемую модель с низким числом Рейнольдса, что означает, что она может разрешить поток вплоть до стенки. Модель АКН зависит от расстояния до ближайшей стены. Поэтому физический интерфейс включает в себя уравнение расстояния до стенки. \n\nТурбулентный поток, низкий Re k-ε интерфейс можно использовать для стационарного и нестационарного анализа.
topicdescr/turbulentflowlvel = [Интерфейс Турбулентный поток, L-VEL] Интерфейс Турбулентный поток, L-VEL используется для моделирования однофазных потоков при высоких числах Рейнольдса. Физический интерфейс подходит для несжимаемых потоков и сжимаемых потоков с низким числом Маха (обычно менее 0,3).\n\nУравнения, решаемые с помощью интерфейса турбулентное течение, L-VEL, представляют собой усредненные по Рейнольдсу уравнения Навье-Стокса для сохранения импульса и уравнение неразрывности для сохранения масса. Эффекты турбулентности учитываются с использованием расширенной модели вязкости, основанной на локальном расстоянии от стенки. Поэтому физический интерфейс включает в себя уравнение расстояния до стены. \n\nИнтерфейс турбулентное течение, L-VEL можно использовать для стационарного и нестационарного анализа.
topicdescr/turbulentflowrealizablekeps = [Интерфейс Турбулентный поток, реализуемый k-ε]Интерфейс Турбулентный поток, реализуемый k-ε используется для моделирования однофазных потоков при высоких числах Рейнольдса. Физический интерфейс подходит для несжимаемых потоков и сжимаемых потоков с низким числом Маха (обычно менее 0,3). Уравнения Навье-Стокса сохранения импульса и уравнение неразрывности сохранения массы. Эффекты турбулентности моделируются с использованием реализуемой модели с двумя уравнениями k-ε. Поток вблизи стен моделируется с использованием стеновых функций. \n\nТурбулентный поток, реализуемый интерфейс k-ε можно использовать для стационарного и нестационарного анализа.
topicdescr/turbulentflowspalartallmaras = [Турбулентный поток, интерфейс Спаларт-Алмарас] Интерфейс Турбулентный поток, Спаларт-Алмарас используется для моделирования однофазных потоков при высоких числах Рейнольдса. Физический интерфейс подходит для несжимаемых потоков и сжимаемых потоков с низким числом Маха (обычно менее 0,3).\n\nУравнения, решаемые с помощью интерфейса турбулентное течение, Spalart-Allmaras, представляют собой уравнение Навье-Стокса для сохранения импульса и уравнение неразрывности для сохранения массы. Эффекты турбулентности моделируются с использованием модели одного уравнения Спаларта-Алмараса. Модель Спаларта-Аллмараса представляет собой так называемую модель с низким числом Рейнольдса, что означает, что она может разрешить поток вплоть до стенки. Модель Spalart-Allmaras зависит от расстояния до ближайшей стены. Поэтому физический интерфейс включает в себя уравнение расстояния до стенки. \n\nТурбулентный поток, интерфейс Spalart-Allmaras может использоваться для стационарного и нестационарного анализа.
topicdescr/turbulentflowsst = [Интерфейс Турбулентный поток, SST]Интерфейс Турбулентный поток, SST используется для моделирования однофазных потоков при высоких числах Рейнольдса. Физический интерфейс подходит для несжимаемых и сжимаемых потоков с низким числом Маха (обычно менее 0,3).\n\nУравнения, решаемые с помощью интерфейса турбулентное течение, SST, представляют собой уравнение Навье-Стокса для сохранения импульса и уравнение неразрывности для сохранения массы. Эффекты турбулентности моделируются с использованием модели переноса сдвигового напряжения Ментера (SST) с двумя уравнениями 2003 года с ограничениями реализуемости. Модель SST представляет собой так называемую модель с низким числом Рейнольдса, что означает, что она может разрешить поток вплоть до стенки. Модель SST зависит от расстояния до ближайшей стены. Поэтому физический интерфейс включает уравнение расстояния до стены. Опционально может быть включена модель перехода граничного слоя на основе локальной корреляции. \n\nИнтерфейс турбулентное течение, SST можно использовать для стационарного и нестационарного анализа. 
topicdescr/turbulentflowv2f = [Интерфейс турбулентное течение, v2-f] Интерфейс турбулентное течение, v2-f используется для моделирования однофазных потоков при высоких числах Рейнольдса. Физический интерфейс подходит для несжимаемых и сжимаемых потоков при низком числе Маха (обычно менее 0,3).\n\nУравнения, решаемые с помощью интерфейса турбулентное течение, v2-f, представляют собой уравнение Навье-Стокса для сохранения импульса и уравнение неразрывности для сохранения массы. Эффекты турбулентности моделируются с использованием модели v2-f, выраженной через турбулентные относительные флуктуации (v2, нормированный на k). Эллиптическая функция используется для смешивания пристеночных и объемных членов в уравнениях модели турбулентности. Модель v2-f представляет собой так называемую модель с низким числом Рейнольдса, что означает, что она может разрешить поток вплоть до стенки. Модель v2-f зависит от расстояния до ближайшей стены. Поэтому физический интерфейс включает в себя уравнение расстояния до стены. \n\nИнтерфейс турбулентное течение, v2-f можно использовать для стационарного и нестационарного анализа. 
topicdescr/turbulentmixturemodel = [Модель смеси, интерфейс турбулентного потока] Интерфейсы Модель смеси, турбулентный поток используются для моделирования дисперсных многофазных потоков при высоких числах Рейнольдса. Дисперсной фазой могут быть пузырьки, капли жидкости или твердые частицы, которые, как предполагается, всегда движутся с предельной скоростью.
topicdescr/turbulenttwophaseflowlevelset = [Интерфейсы «Турбулентный двухфазный поток, набор уровней»]Мультифизические интерфейсы «Турбулентный двухфазный поток, набор уровней» используются для отслеживания границы раздела между двумя несмешивающимися жидкостями. Течение предполагается турбулентным; то есть его число Рейнольдса велико.
topicdescr/turbulenttwophaseflowphasefield = [Интерфейсы «Турбулентный двухфазный поток, фазовое поле»] Мультифизические интерфейсы «Турбулентный двухфазный поток, фазовое поле» используются для отслеживания границы раздела между двумя несмешивающимися жидкостями. Течение предполагается турбулентным; то есть его число Рейнольдса велико.
topicdescr/twophasedarcyslaw = [Интерфейс двухфазного закона Дарси]Интерфейс двухфазного закона Дарси используется для моделирования течения жидкости через пустоты в пористой среде. Он решает закон Дарси для общего давления и переноса содержимого жидкости для одной жидкой фазы. Физический интерфейс можно использовать для моделирования низкоскоростных потоков или сред, где проницаемость и пористость очень малы, для которых градиент давления является основной движущей силой, а на поток в основном влияет сопротивление трения внутри пор.\n\nФизический интерфейс можно использовать для стационарного и нестационарного анализа. 
topicdescr/twophaseflow = [Двухфазный поток]Интерфейсы «Двухфазный поток» предоставляют функции для моделирования потока двух несмешивающихся жидкостей, где представляет интерес положение границы раздела жидкость-жидкость.
topicdescr/twotermboltzmann = [Уравнение Больцмана, интерфейс двухчленной аппроксимации] Интерфейс уравнения Больцмана, двухчленной аппроксимации изучает функцию распределения электронов по энергии (EEDF) и рассчитывает ее на основе набора сечений столкновений для некоторых средних условий разряда. Интерфейс отличается тем, что геометрия и сетка фиксированы и автоматически генерируются при добавлении интерфейса в модель. Ось X представляет собой энергетическую координату, а не физическое пространство, что позволяет загружать наборы сечений столкновений и устанавливать свойства функции распределения. Кроме того, можно рассчитать коэффициенты источника электронов и транспортные свойства. Интерфейс задуман как этап предварительной обработки перед решением пространственно-зависимых моделей.
topicdescr/uls = [Отделение ультразвука] Ультразвуковые интерфейсы используются для расчета переходного распространения акустических волн на большие расстояния относительно длин волн. Акустические помехи с частотами, не слышимыми для человека, классифицируются как ультразвук. Это означает, что ультразвуковые волны имеют короткую длину волны. Однако интерфейсы ультразвуковой ветви не ограничиваются распространением высокочастотных сигналов, а в целом могут применяться для решения любой акустически серьезной проблемы.
topicdescr/vectorformulations = [Векторные формулы] Ветка векторных формулировок содержит множество физических интерфейсов, используемых в ситуациях, когда существует однонаправленная или двунаправленная связь между электрическими и магнитными полями. Вообще говоря, волновые явления не рассматриваются (хотя некоторые интерфейсы их поддерживают), а индуктивные эффекты учитываются. Другими словами, эти интерфейсы обычно используются, когда глубина скин-слоя может быть порядка размера устройства, но длина волны все равно намного больше. \n\nВ отличие от других интерфейсов в разделе «Электромагнитные поля», интерфейсы этой подкатегории обычно требуют немного большего опыта при использовании и не рекомендуются в качестве отправной точки. В некоторых случаях они более эффективны или могут обрабатывать некоторые особые случаи, которые не может обрабатывать рекомендуемый по умолчанию вариант. Опцией по умолчанию в этом случае является интерфейс «Магнитные поля».
topicdescr/vf = [Интерфейсы потока пара] Ветка Vapor Flow содержит различные версии мультифизического интерфейса, который сочетает перенос пара с ламинарным или турбулентным потоком. Течение жидкости может быть либо свободным, либо течь в пористой среде.
topicdescr/viscoelasticflow = [Интерфейс вязкоупругого потока]Интерфейс вязкоупругого потока используется для моделирования потоков жидкостей, которые демонстрируют сочетание вязкого и упругого поведения. Интерфейс Viscoelastic Flow решает уравнение неразрывности для сохранения массы и уравнение Навье-Стокса с дополнительным членом упругого напряжения для сохранения импульса. Для расчета тензора дополнительных напряжений доступен ряд предопределенных определяющих соотношений. \n\nИнтерфейс Viscoelastic Flow можно использовать для стационарных и нестационарных исследований. 
topicdescr/volumeaveragedmixturemodelalgebraicyplus = [Модель смеси, алгебраический интерфейс yPlus]Модель смеси, алгебраический интерфейс yPlus используется для моделирования дисперсных многофазных потоков при высоких числах Рейнольдса. Дисперсной фазой могут быть пузырьки, капли жидкости или твердые частицы, которые, как предполагается, всегда движутся с предельной скоростью. \n\nМодель смеси, алгебраический интерфейс yPlus решает один набор уравнений Навье-Стокса для определения импульса смеси. Распределение давления рассчитывается по усредненному уравнению неразрывности смеси, а скорость дисперсной фазы описывается моделью скольжения. Объемную долю дисперсной фазы отслеживают путем решения уравнения переноса объемной доли. Эффекты турбулентности учитываются с использованием расширенной модели вязкости, основанной на локальном расстоянии от стенки. Поэтому физический интерфейс включает в себя уравнение расстояния до стены.\n\nФизический интерфейс также может моделировать распределение числовой плотности, которое можно использовать для расчета площади межфазной границы, что полезно при моделировании химических реакций в смеси.
