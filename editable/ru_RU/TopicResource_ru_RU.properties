topicdescr/highmachnumberflowturbulentkomega = [Интерфейс «Поток с высоким числом Маха, турбулентный поток, k-ω»]Интерфейс «Поток с высоким числом Маха», k-ω используется для моделирования газовых течений при высоких числах Рейнольдса, где величина скорости сравнима со скоростью звука, то есть турбулентных течений в трансзвуковом и сверхзвуковом режимах. range.\n\nФизический интерфейс решает задачу сохранения энергии, массы и импульса. Эффекты турбулентности моделируются с использованием пересмотренной модели Уилкокса с двумя уравнениями k-ω с ограничениями реализуемости. Модель k-ω представляет собой так называемую модель с низким числом Рейнольдса, что означает, что она может разрешать поля скорости, давления и температуры вплоть до стенки. В качестве опции поток и теплообмен вблизи стенок можно смоделировать с помощью функций стенок. Физический интерфейс также поддерживает теплообмен в твердых телах, а также излучение между поверхностями.
topicdescr/highmachnumberflowturbulentsst = [Интерфейс «Поток с высоким числом Маха, турбулентный поток, SST]Интерфейс «Поток с высоким числом Маха, SST» используется для моделирования потоков газа с высоким числом Рейнольдса, где величина скорости сравнима со скоростью звука, то есть турбулентных течений в околозвуковом и сверхзвуковом диапазоне.\n\nФизический интерфейс решает вопрос сохранения энергии, массы и импульса. Эффекты турбулентности моделируются с использованием модели переноса сдвигового напряжения Ментера (SST) с двумя уравнениями 2003 года с ограничениями реализуемости. Модель SST представляет собой так называемую модель с низким числом Рейнольдса, что означает, что она может разрешать поля скорости, давления и температуры вплоть до стенки. Модель SST зависит от расстояния до ближайшей стены. Поэтому физический интерфейс включает уравнение расстояния до стены. Опционально может быть включена модель перехода граничного слоя на основе локальной корреляции. Физический интерфейс также поддерживает теплообмен в твердых телах, а также излучение между поверхностями.
topicdescr/highmachnumberflowturbulentlowrekeps = [Интерфейс «Поток с высоким числом Маха, турбулентный поток, низкое число Рейнольдса» k-ε] Интерфейс «Поток с высоким числом Маха, низкое число Рейнольдса» k-ε используется для моделирования потоков газа с высоким числом Рейнольдса, где величина скорости сравнима со скоростью звука, то есть турбулентные потоки в трансзвуковой и сверхзвуковой диапазон.\n\nФизический интерфейс решает вопрос сохранения энергии, массы и импульса. Эффекты турбулентности моделируются с использованием модели AKN с двумя уравнениями k-ε с ограничениями реализуемости. Модель AKN — это так называемая модель с низким числом Рейнольдса, что означает, что она может разрешать поля скорости, давления и температуры вплоть до стенки. Модель АКН зависит от расстояния до ближайшей стены. Поэтому физический интерфейс включает уравнение расстояния до стены. Он также поддерживает теплообмен в твердых телах, а также излучение от поверхности к поверхности.
topicdescr/highmachnumberflowturbulentv2f = [Интерфейс «Поток с высоким числом Маха, турбулентный поток, v2-f]» Интерфейс «Поток с высоким числом Маха, v2-f» используется для моделирования газовых течений с высоким числом Рейнольдса, где величина скорости сравнима со скоростью звука, то есть турбулентных потоков в околозвуковом и сверхзвуковом пространстве. range.\n\nФизический интерфейс решает задачу сохранения энергии, массы и импульса. Эффекты турбулентности моделируются с использованием модели v2-f, выраженной через турбулентные относительные флуктуации (v2, нормированный на k). Эллиптическая функция используется для смешивания пристеночных и объемных членов в уравнениях модели турбулентности. Модель v2-f — это так называемая модель с низким числом Рейнольдса, что означает, что она может разрешать поля скорости, давления и температуры вплоть до стенки. Модель v2-f зависит от расстояния до ближайшей стены. Поэтому физический интерфейс включает уравнение расстояния до стены. Он также поддерживает теплообмен в твердых телах, а также излучение от поверхности к поверхности.
topicdescr/hmnf = [Ветка потока с высокими числами Маха] Ветка потока с высокими числами Маха содержит десять вариантов одного и того же предопределенного мультифизического интерфейса. Эти интерфейсы используются для моделирования потоков газа, величина скорости которых сравнима со скоростью звука в газе; то есть течет в околозвуковом и сверхзвуковом диапазоне.
topicdescr/hmnrf = [Интерфейсы реагирующего потока с высоким числом Маха] Ветка «Поток реагирующего с большим числом Маха» содержит несколько версий одного и того же предопределенного мультифизического интерфейса. Эти интерфейсы объединяют уравнения для газовых потоков, где величина скорости сравнима со скоростью звука в газе, то есть течений в трансзвуковом и сверхзвуковом диапазоне, с уравнениями, управляющими массопереносом в газовых смесях.\n\nЭти физические интерфейсы поддерживают ламинарное течение и, в зависимости от лицензированных продуктов, турбулентное течение.
topicdescr/hmnrfdt = [Интерфейсы реагирующего потока с высоким числом Маха]Мультифизические интерфейсы «Турбулентный поток с высоким числом Маха, реагирующий на разбавленные частицы» объединяют уравнения для турбулентных газовых потоков, где величина скорости сравнима со скоростью звука в газе, то есть потоков в трансзвуковом и сверхзвуковом диапазоне, с уравнениями, управляющими переносом разбавленных частиц в газе.
topicdescr/hmnrft = [Интерфейсы реагирующего потока с высоким числом Маха]Мультифизические интерфейсы для турбулентного потока с высоким числом Маха объединяют уравнения для турбулентных газовых потоков, где величина скорости сравнима со скоростью звука в газе, то есть потоков в трансзвуковом и сверхзвуковом диапазоне, с уравнениями, управляющими переносом и реакцией веществ в газе.
topicdescr/ht = [Физические группы в мастере моделей]Интерфейсы теплопередачи используются для расчета полей температуры и интенсивности излучения. Мультифизические интерфейсы также вычисляют другие физические поля, такие как скорость, давление или электромагнитные поля. \n\nВ зависимости от лицензированных продуктов интерфейсы теплопередачи и тепловые мультифизические связи могут использоваться для моделирования теплопередачи путем проводимости, конвекции или излучения, а также сопряженной теплопередачи или электромагнитного нагрева.
topicdescr/hydrodynamicbearing = [Интерфейс гидродинамического подшипника] Интерфейс «Гидродинамический подшипник» используется для анализа смазки подшипников с жидкостной пленкой. Уравнение Рейнольдса или модифицированное уравнение Рейнольдса решаются в узких каналах, представленных поверхностями внутри геометрии. \n\n Помимо определяемых пользователем подшипников, интерфейс включает в себя распространенные типы опорных подшипников, такие как подшипники скольжения, многолепестковые, наклонные колодки и плавающее кольцо. Также поддерживаются распространенные типы упорных подшипников, такие как конические и наклонные подшипники. Модели подшипников могут включать кавитацию в смазке.
topicdescr/hydrogenfuelcell = [Водородный топливный элемент]Интерфейс «Водородное топливо» моделирует электрохимическую ячейку, в которой водородсодержащая газовая смесь присутствует на одной стороне, а кислородсодержащая смесь присутствует на другой стороне мембраны или сепаратора. Также могут быть включены дополнительные виды газа, такие как азот, окись углерода, диоксид углерода и водяной пар. \n\nИнтерфейс включает перенос заряда в электролитной и электродной фазах и электродные реакции в отдельных газовых отсеках и, необязательно, газовую диффузию. Закон Дарси о передаче импульса также можно решить с помощью интерфейса.
topicdescr/hydroxideexchangefc = [Интерфейс водородного топливного элемента с гидроксидным обменом] Интерфейс водородного топливного элемента с гидроксидным обменом предполагает, что заряд в электролите переносится ионами гидроксида, образуя воду на анодной стороне ячейки в реакции окисления водорода и потребляя воду на катодной стороне ячейки в реакции восстановления кислорода. газовыми составляющими являются водород и вода на анодной стороне, а также кислород, азот и вода на катодной стороне.\n\nЭтот интерфейс подходит для гидроксидообменных мембран (HEMFC) и щелочных (AFC) топливных элементов.
topicdescr/hydroxideexchangewe = [Интерфейс электролизера гидроксидной воды] Интерфейс гидроксидного водного электролизера предполагает, что заряд в электролите переносится ионами гидроксида, потребляющими воду на катодной стороне ячейки в реакции выделения водорода и образующими воду на анодной стороне ячейки в реакции выделения кислорода.\n\nПо умолчанию видами газа являются водород и вода на катодной стороне, а также кислород и вода на анодной стороне.\n\nЭтот интерфейс подходит для электролизеров с гидроксидообменной мембраной (HEMEC) и щелочной (AEC) водой.
topicdescr/incompressiblepotentialflow = [Интерфейс несжимаемого потенциального потока]Интерфейс несжимаемого потенциального потока используется для расчета потенциала скорости в предположении несжимаемого безвихревого потока. Поле скоростей описывается как градиент потенциального поля скалярной скорости.\n\nФизический интерфейс можно использовать для получения начальных значений для других границ раздела однофазного потока. 
topicdescr/inductioncurrents = [Интерфейс магнитных полей]Интерфейс магнитных полей используется для расчета распределения магнитного поля и наведенного тока внутри и вокруг катушек, проводников и магнитов. В зависимости от лицензированных продуктов стационарный анализ, анализ в частотной области, анализ малых сигналов и моделирование во временной области поддерживаются в 2D и 3D.\n\nОбратите внимание, что формулировки в частотной и временной области могут стать некорректными при приближении к статическому пределу. Полезный частотный диапазон можно расширить вниз, добавив низкую проводимость или используя интерфейс «Магнитные и электрические поля».\n\nФизический интерфейс решает уравнения Максвелла, сформулированные с использованием векторного магнитного потенциала. Переменные, описывающие текущее направление, решаются, когда выбран анализ геометрии катушки. Анализ геометрии катушки необходим, когда указан числовой тип катушки.
topicdescr/inductioncurrents[acdc] = [Интерфейс магнитных полей]Интерфейс магнитных полей используется для расчета распределения магнитного поля и наведенного тока внутри и вокруг катушек, проводников и магнитов. В зависимости от лицензированных продуктов стационарный анализ, анализ в частотной области, анализ малых сигналов и моделирование во временной области поддерживаются в 2D и 3D.\n\nОбратите внимание, что формулировки в частотной и временной области могут стать некорректными при приближении к статическому пределу. Полезный частотный диапазон можно расширить вниз, добавив низкую проводимость или используя интерфейс «Магнитные и электрические поля».\n\nФизический интерфейс решает уравнения Максвелла, сформулированные с использованием векторного магнитного потенциала. Переменные, описывающие текущее направление, решаются, когда выбран анализ геометрии катушки. Анализ геометрии катушки необходим, когда указан числовой тип катушки.
topicdescr/irf = [Интерфейсы изотермического реагирующего потока] Ветка «Изотермический реагирующий поток» содержит несколько версий мультифизического интерфейса, который объединяет уравнения потока жидкости с уравнениями, управляющими массопереносом в смесях жидкостей.\n\nЭти физические интерфейсы поддерживают ламинарный поток и, в зависимости от лицензированных продуктов, турбулентный поток, а также поток через пористые среды.
topicdescr/laminarbubblyflow = [Интерфейс «Ламинарный пузырьковый поток»]Интерфейс «Ламинарный пузырьковый поток» используется для моделирования потока жидкостей с диспергированными пузырьками при низких и средних числах Рейнольдса.\n\nПредполагается, что пузырьки занимают лишь небольшую объемную долю и что они всегда движутся со своей конечной скоростью. Таким образом, можно решить только одну систему уравнений Навье-Стокса для жидкой фазы и позволить скорости пузырьков определяться моделью скольжения. Распределение давления рассчитывается на основе уравнения неразрывности, усредненного по смеси. Объемная доля пузырьков отслеживается путем решения уравнения переноса для эффективной плотности газа.\n\nФизический интерфейс также может моделировать распределение числовой плотности, то есть количества пузырьков на единицу объема, что, в свою очередь, можно использовать для расчета площади межфазной границы, что полезно при моделировании химических реакций в смеси.
topicdescr/laminareulereulermodel = [Модель Эйлера-Эйлера, интерфейс ламинарного потока]Модель Эйлера-Эйлера, интерфейс ламинарного потока можно использовать для моделирования потока двух непрерывных и полностью взаимопроникающих несжимаемых фаз. Физический интерфейс может моделировать поток при низких и умеренных числах Рейнольдса. Типичными применениями являются псевдоожиженные слои (твердые частицы в газе), седиментация (твердые частицы в жидкости) или транспортировка капель или пузырьков жидкости в жидкости.\n\nФизический интерфейс решает два набора уравнений Навье-Стокса, по одному для каждой фазы, чтобы вычислить поле скоростей для каждой фазы. Фазы обмениваются импульсом, как описано в модели сопротивления. Давление рассчитывается по усреднённому по смеси уравнению неразрывности, а объёмная доля дисперсной фазы отслеживается по уравнению переноса.
topicdescr/laminarflow = [Интерфейс ламинарного потока]Интерфейс ламинарного потока используется для расчета полей скорости и давления для потока однофазной жидкости в режиме ламинарного потока. Поток будет оставаться ламинарным до тех пор, пока число Рейнольдса ниже определенного критического значения. При более высоких числах Рейнольдса возмущения имеют тенденцию к росту и вызывают переход к турбулентности. Это критическое число Рейнольдса зависит от модели, но классическим примером является поток в трубе, где критическое число Рейнольдса, как известно, равно примерно 2000. \n\nФизический интерфейс поддерживает несжимаемые потоки и сжимаемые потоки при низких числах Маха (обычно менее 0,3). Он также поддерживает неньютоновские жидкости.\n\nУравнения, решаемые с помощью интерфейса ламинарное течение, — это уравнения Навье-Стокса для сохранения импульса и уравнение неразрывности для сохранения масса.\n\nИнтерфейс ламинарного потока можно использовать для стационарного и нестационарного анализа. Обратите внимание, что для более высоких чисел Рейнольдса поток становится по своей сути зависимым от времени и трехмерным, и необходимо использовать исследования, зависящие от времени.
topicdescr/laminarmixturemodel = [Модель смеси, интерфейс ламинарного потока] Интерфейс Модель смеси, ламинарный поток используется для моделирования дисперсных многофазных потоков при низких и умеренных числах Рейнольдса. Дисперсной фазой могут быть пузырьки, капли жидкости или твердые частицы, которые, как предполагается, всегда движутся с предельной скоростью. \n\nИнтерфейс «Модель смеси, ламинарный поток» решает один набор уравнений Навье-Стокса для определения импульса смеси. Распределение давления рассчитывается на основе усредненного по смеси уравнения неразрывности, а скорость дисперсной фазы описывается моделью скольжения. Объемная доля дисперсной фазы отслеживается путем решения уравнения переноса объемной доли.\n\nФизический интерфейс также может моделировать распределение числовой плотности, которое можно использовать для расчета площади межфазной границы, что полезно при моделировании химических реакций в смеси.
topicdescr/laminarthreephaseflowphasefield = [Ламинарный трехфазный поток, интерфейс фазового поля] Интерфейс ламинарного трехфазного потока, фазового поля используется для отслеживания границ раздела между тремя несмешивающимися жидкостями. Течение предполагается ламинарным; то есть число Рейнольдса от низкого до умеренного, а плотность каждой фазы постоянна. \n\nФизический интерфейс решает уравнения Навье-Стокса для сохранения импульса и уравнение непрерывности для сохранения массы. Положение границы раздела отслеживается путем решения четырех дополнительных уравнений переноса: двух для переменных фазового поля и двух для обобщенных химических потенциалов. Движение поверхности определяется минимизацией свободной энергии.\n\nМоделирование с использованием интерфейса «Ламинарный трехфазный поток, фазовое поле» всегда зависит от времени, поскольку положение интерфейса почти всегда зависит от его истории. 
topicdescr/laminartwophaseflowmovingmesh = [Интерфейс «Ламинарный двухфазный поток, движущаяся сетка»] Интерфейс «Ламинарный двухфазный поток, движущаяся сетка» используется для моделирования ламинарного потока двух несмешивающихся жидкостей с использованием движущейся сетки для отслеживания положения границы раздела жидкость-жидкость.
topicdescr/laplaceequation = [Классические интерфейсы PDE]Уравнение Лапласа's Equation interface can be used to model a classical PDE of elliptic type that can describe the behavior of electric, gravitational, or fluid potentials, as well as the steady-state heat equation. Laplace's также доступно в качестве узла функции предметной области для всех интерфейсов PDE.
topicdescr/latest_used = [Недавно использованные] В этом узле вы можете получить удобный доступ к некоторым из последних использованных физических интерфейсов.
topicdescr/layeredbeamcrosssection = [Интерфейс многослойного поперечного сечения балки] Интерфейс «Поперечное сечение балки» в 3D используется для расчета свойств поперечного сечения балки, а также для оценки напряжений в сегменте балки, когда известны силы сечения по длине балки. В основном он используется в сочетании с интерфейсами Beam and Pipe Mechanics.\n\nВ качестве входных данных вы предоставляете двухмерный эскиз поперечного сечения, а затем определяете длину балки, используя дополнительный размер. В дополнение к переменным напряжения рассчитываются геометрические свойства, такие как площадь, моменты инерции, центр тяжести, направления главных осей, жесткость на кручение, расположение центра сдвига, поправочные коэффициенты сдвига и константа деформации. Можно визуализировать полное трехмерное распределение напряжений вдоль балки.
topicdescr/layereddarcyslaw = [Интерфейс многослойного закона Дарси]Интерфейс многослойного закона Дарси используется для моделирования потока жидкости через пустоты в слоистых пористых средах. Его можно использовать для моделирования низкоскоростных потоков или сред, где проницаемость и пористость очень малы, и для которых градиент давления является основной движущей силой, а на поток в основном влияет сопротивление трения внутри пор.\n\nИнтерфейс многоуровневого закона Дарси можно использовать для стационарного и нестационарного анализа. 
topicdescr/layeredshell = [Интерфейс «Многослойная оболочка»]Интерфейс «Многослойная оболочка» используется для моделирования слоистых структурных оболочек от толстой до умеренно тонкой на 3D-гранях. Формулировка позволяет точно рассчитать сквозные и межламинарные напряжения. Для направлений в плоскости и вне плоскости можно использовать разные порядки функций формы. Интерфейс позволяет легко обрабатывать послойные и межфазные данные.\n\nС модулем «Нелинейные конструкционные материалы» интерфейс расширяется, например, моделями материалов для пластичности, гиперупругости и ползучести.
topicdescr/ldpdei = [Нижние измерения] Ветка нижних измерений интерфейсов УЧП содержит интерфейсы УЧП для уравнений в частных производных в форме коэффициентов и общей форме, а также УЧП в слабой форме на границах, краях и в точках.
topicdescr/leadacidbattery = [Интерфейс свинцово-кислотной батареи]Интерфейс свинцово-кислотной батареи используется для расчета распределения потенциала и тока в свинцово-кислотной батарее.\n\nЗакон Ома используется для описания переноса заряда в электродах, тогда как теория концентрированного электролита используется для описания переноса заряда и массы в электролитной фазе. Массовые балансы пористости в пористых электродных доменах учитывают изменения зарядового состояния.
topicdescr/legacydeformedmesh = [Устаревшие интерфейсы деформированной сетки]Большая часть функций интерфейсов «Деформированная геометрия» и «Подвижная сетка» была перенесена в функции «Подвижная сетка» и «Деформированная геометрия», доступные напрямую из соответствующих ветвей каждого компонента. Устаревшие интерфейсы представлены здесь для обратной совместимости.    
topicdescr/lesf = [Моделирование больших вихрей] Интерфейсы LES предназначены для разрешения более крупных трехмерных нестационарных турбулентных вихрей, тогда как моделируются эффекты меньших вихрей. Все интерфейсы LES решают уравнение Навье-Стокса с дополнительными членами напряжения и уравнение непрерывности.
topicdescr/lesnitf = [Неизотермический поток, моделирование больших вихрей] Интерфейсы «Неизотермический поток, моделирование больших вихрей» предназначены для решения более крупных трехмерных нестационарных турбулентных вихрей, тогда как моделируются эффекты меньших вихрей. Для несжимаемого потока вклады плавучести могут быть учтены с использованием приближения Буссинеска, когда гравитация активна. Все интерфейсы моделирования неизотермического потока и больших вихрей решают уравнения Навье-Стокса и уравнения теплопроводности с дополнительными условиями напряжения и теплового потока, а также уравнение неразрывности.
topicdescr/lesrbvm = [Моделирование больших вихрей, вариационная многомасштабная модель на основе невязок] Интерфейс LES, вариационный многомасштабный метод на основе невязок, предназначен для решения более крупных трехмерных, нестационарных и турбулентных вихрей, тогда как моделируются эффекты меньших вихрей. Для интерфейса RBVM неразрешенная компонента скорости и масштабы давления пропорциональны остатку соответствующей компоненты уравнения импульса и уравнения неразрывности соответственно. Поскольку неразрешенные шкалы используются для составления членов Рейнольдса и перекрестного напряжения, все смоделированные члены исчезают для полностью разрешенного потока. \n\nОбласть потока жидкости должна быть трехмерной, а исследование - зависимым от времени.  
topicdescr/lesrbvmwv = [Моделирование больших вихрей, вариационная многомасштабная модель на основе невязок с моделью вязкости] LES, вариационная многомасштабная модель на основе невязок с интерфейсом вязкости, предназначена для решения более крупных трехмерных, нестационарных и турбулентных вихрей, тогда как моделируются эффекты меньших вихрей. Для интерфейса RBVMWV неразрешенная компонента скорости и масштабы давления пропорциональны остатку соответствующей компоненты уравнения импульса и уравнения неразрывности соответственно. К уравнению количества движения добавляется дополнительный член вязкого напряжения, основанный на остаточном напряжении. Поскольку неразрешенные масштабы используются для составления членов Рейнольдса и перекрестного напряжения, а также дополнительного члена вязкого напряжения, все смоделированные члены исчезают для полностью разрешенного потока. \n\nОбласть потока жидкости должна быть трехмерной, а исследование - зависимым от времени.  
topicdescr/lessmagorinsky = [Моделирование больших вихрей, модель Смагоринского] Интерфейс LES, Смагоринский предназначен для решения более крупных трехмерных, нестационарных и турбулентных вихрей, тогда как моделируются эффекты меньших вихрей. Для границы раздела Смагоринского члены перекрестного напряжения пропорциональны разрешенным остаткам, тогда как напряжение Рейнольдса моделируется термином повышенной вязкости, где вязкость Смагоринского основана на разрешенной скорости деформации и локальном размере сетки. \n\nОбласть потока жидкости должна быть трехмерной, а исследование - зависимым от времени.  
topicdescr/levelset = [Интерфейс установки уровня]Интерфейс установки уровня используется для отслеживания движущихся границ раздела в моделях потока жидкости, решая проблему установки уровня.
topicdescr/levelsetporousmedia = [Интерфейс «Установка уровня в пористой среде»]Интерфейс «Установка уровня в пористой среде» используется для отслеживания движущихся границ раздела в моделях потока жидкости в пористых областях для решения функции установки уровня.
topicdescr/linearizedeulerboundarymode = [Линеаризованный интерфейс Эйлера, граничный режим] Интерфейс Линеаризованный Эйлер, граничный режим используется для расчета и идентификации распространяющихся и нераспространяющихся мод в волноводах и воздуховодах при наличии стационарного фонового среднего потока, который хорошо аппроксимируется потоком идеального газа. Интерфейс выполняет анализ граничной моды на границе, входе или поперечном сечении волновода. Интерфейс учитывает акустические изменения плотности, скорости и давления, а также внеплоскостное волновое число мод. Интерфейс «Линеаризованный Эйлер, граничный режим», например, используется при настройке источников в волноводных системах при наличии фонового среднего потока.
topicdescr/linearizedeulerfrequency = [Линеаризованный Эйлер, частотная область] Интерфейс Линеаризованный Эйлер, частотная область используется для расчета акустических изменений плотности, скорости и давления в присутствии стационарного фонового среднего потока, который хорошо аппроксимируется потоком идеального газа. Физический интерфейс используется для аэроакустического моделирования, которое можно описать линеаризованными уравнениями Эйлера. \n\nУравнения сформулированы в частотной области и предполагают гармоническое изменение всех источников и полей. Фоновый средний расход может быть любого типа, если жидкость представляет собой идеальный газ. Связь между акустическим полем и фоновым потоком не включает в себя какой-либо заранее заданный шум, вызванный потоком. Несмотря на то, что уравнения не включают в себя какие-либо механизмы потерь, в частотной области существуют только акустические моды, поскольку частота возбуждения заранее определена и имеет реальное значение. \n\nУравнения, определяемые интерфейсом Линеаризованный Эйлер, частотная область, представляют собой линеаризованные уравнения непрерывности, импульса (Эйлера) и энергии.
topicdescr/linearizedeulertransient =  [Линеаризованный Эйлер, Переходный процесс] Интерфейс Линеаризованный Эйлер, Переходный процесс используется для расчета акустических изменений плотности, скорости и давления при наличии стационарного фонового среднего потока, который хорошо аппроксимируется потоком идеального газа. Физический интерфейс используется для аэроакустического моделирования, которое может быть описано линеаризованными уравнениями Эйлера.\n\nУравнения формулируются во временной области. Фоновый средний расход может быть любого типа, если жидкость представляет собой идеальный газ. Связь между акустическим полем и фоновым потоком не включает в себя какой-либо заранее заданный шум, вызванный потоком. Поскольку уравнения не включают в себя какие-либо механизмы потерь, неакустические режимы и нестабильности можно моделировать во временной области. \n\nУравнения, определяемые интерфейсом Линеаризованный Эйлер, Переходный процесс, представляют собой линеаризованные уравнения непрерывности, импульса (Эйлера) и энергии.
topicdescr/linearizednavierstokesboundarymode = [Линеаризованный интерфейс Навье-Стокса, граничный режим]Линеаризованный интерфейс Навье-Стокса, граничный режим используется для расчета и идентификации распространяющихся и нераспространяющихся мод в волноводах и воздуховодах при наличии любого стационарного изотермического или неизотермического фонового среднего потока. Интерфейс выполняет анализ граничной моды на границе, входе или поперечном сечении волновода. Интерфейс учитывает все эффекты тепловых и вязкостных потерь, а также взаимодействие с фоновым потоком. При необходимости сюда включаются потери в акустическом пограничном слое. \n\nИнтерфейс учитывает акустические изменения давления, скорости и температуры, а также внеплоскостное волновое число мод. Линеаризованный интерфейс Навье-Стокса, граничный режим, например, используется при настройке источников в волноводных системах при наличии фонового среднего потока.
topicdescr/linearizednavierstokesfrequency = [Линеаризованный интерфейс Навье-Стокса, частотная область]Линеаризованный интерфейс Навье-Стокса, частотная область используется для расчета акустических изменений давления, скорости и температуры в присутствии любого стационарного изотермического или неизотермического фонового среднего потока. Физический интерфейс используется для аэроакустического моделирования, которое можно описать линеаризованными уравнениями Навье-Стокса. \n\nУравнения сформулированы в частотной области и предполагают гармоническое изменение всех источников и полей. Уравнения включают вязкостные потери и теплопроводность, а также тепло, выделяемое за счет вязкой диссипации, если это необходимо. Связь между акустическим полем и фоновым потоком не включает в себя какой-либо заранее заданный шум, вызванный потоком. \n\nУравнения, определяемые линеаризованным интерфейсом Навье-Стокса, частотная область, представляют собой линеаризованные уравнения непрерывности, импульса (Навье-Стокса) и энергии.
topicdescr/linearizednavierstokestransient = [Линеаризованный интерфейс Навье-Стокса, переходный процесс]Линеаризованный интерфейс Навье-Стокса, переходный процесс используется для расчета акустических изменений давления, скорости и температуры в присутствии любого стационарного изотермического или неизотермического фонового среднего потока. Физический интерфейс используется для аэроакустического моделирования, которое можно описать линеаризованными уравнениями Навье-Стокса. \n\nУравнения сформулированы во временной области и включают вязкостные потери и теплопроводность, а также тепло, выделяемое за счет вязкой диссипации, если применимо. Связь между акустическим полем и фоновым потоком не включает в себя какой-либо заранее заданный шум, вызванный потоком. \n\nУравнения, определяемые линеаризованным интерфейсом Навье-Стокса, переходный процесс, представляют собой линеаризованные уравнения непрерывности, импульса (Навье-Стокса) и энергии.
topicdescr/lithiumionbatterymph = [Интерфейс литий-ионной батареи]Интерфейс литий-ионной батареи используется для расчета распределения потенциала и тока в литий-ионной батарее. Можно использовать несколько интеркалирующих электродных материалов, а также потери напряжения из-за слоев твердого электролита (SEI). \n\nФизический интерфейс основан на работах Ньюмана и др. Ом 's law is used to describe the charge transport in the electrodes, whereas concentrated electrolyte theory for an acidic (1:1) electrolyte is used to describe charge and mass transport in the electrolyte phase. A pseudo-dimension is included in the porous electrode domains to describe the transport of solid lithium in the solid electrode phase using Fick' закон.
topicdescr/lithiumionbatterymphsingleionconductor = [Интерфейс литий-ионной батареи с одноионным проводником] Интерфейс литий-ионной батареи с одноионным проводником используется для расчета распределения потенциала и тока в литий-ионной батарее с одноионным проводящим электролитом. Предполагается, что в одноионном проводнике может двигаться только один ион, тогда как противоион неподвижен. Предположение об электронейтральности и постоянной концентрации иммобилизованного иона приводит к постоянной концентрации мобильного иона. Можно использовать несколько интеркалирующих электродных материалов, а также учитывать потери напряжения из-за слоев твердого электролита (SEI). электролиты.\n\nOhm's law is used to describe the charge transport in the electrodes and electrolyte. A pseudo-dimension is included in the porous electrode domains to describe the transport of solid lithium in the solid electrode phase using Fick's закон.
topicdescr/localthermalnonequilibrium = [Интерфейс локальной термической неравновесности] Интерфейс локальной термической неравновесности (LTNE) используется для моделирования теплопередачи в пористой среде, где не предполагается локальное тепловое равновесие между твердой и жидкой фазами. Для каждой фазы, твердой и жидкой пористой среды определяется температурное поле и учитывается теплообмен между ними. Пористая среда с моделью локальной термической неравновесности активна по умолчанию во всех областих. Также доступны все функциональные возможности для включения других типов областей, таких как сплошной область. \n\nФункция Porous Medium предоставляет параметры для определения межузельного коэффициента конвективной теплопередачи. В его рамках подфункции Porous Matrix и Fluid вычисляют температурные поля в твердой и жидкой фазах соответственно. К одной из двух фаз можно применить любое граничное или относящееся к области условие, добавив соответствующую функцию в подфункции «Пористая матрица» или «Жидкость». Поддерживаются эффекты излучения от поверхности к поверхности, при условии, что они применяются только к твердой фазе. \n\nСтационарное, временное и частотное моделирование поддерживается во всех пространственных измерениях.
topicdescr/lumpedbattery = [Интерфейс сосредоточенной батареи] Интерфейс сосредоточенной батареи используется для определения модели батареи на основе небольшого набора сосредоточенных параметров, не требуя знаний внутренней структуры или конструкции электродов батареи или выбора материалов.\n\nМодели, созданные с помощью интерфейса Lumped Battery, обычно можно использовать для мониторинга состояния заряда и реакции напряжения батареи во время цикла нагрузки. Интерфейс также определяет источник тепла батареи, который может быть связан с интерфейсом теплопередачи для моделирования охлаждения батареи и управления температурой.
topicdescr/lumpedmechanicalsystem = [Интерфейс сосредоточенной механической системы]Интерфейс сосредоточенной механической системы используется для моделирования смещений и сил в механической системе с использованием представления схемы с сосредоточенными компонентами, такими как массы, пружины и демпферы. Помимо источников смещения и силы в системе, терминальные узлы используются для определения сил, смещений, скоростей, ускорений или импедансов в качестве граничных условий. Физический интерфейс поддерживает стационарный анализ, анализ в частотной области, собственной частоте и анализ во временной области. Модели, созданные с помощью интерфейса сосредоточенной механической системы, также могут включать соединения с распределенными моделями конечных элементов.
topicdescr/lumpedthermalsystem = [Интерфейс сосредоточенной тепловой системы]Интерфейс сосредоточенной тепловой системы используется для расчета скорости теплопередачи и распределения температуры в тепловой сети. Он поддерживает сосредоточенные функции, такие как терморезистор, скорость нагрева или тепловую массу. Физический интерфейс решает уравнение сохранения энергии, используя температуру и скорость нагрева в качестве зависимых переменных. Поддерживается стационарное моделирование и моделирование во временной области. Во временной области учитываются эффекты термоемкости. 
topicdescr/magneticfieldformulation = [Интерфейс формулирования магнитного поля]Интерфейс формулирования магнитного поля используется для расчета магнитных полей и распределений индуцированного тока. Он особенно подходит для магнитного моделирования во временной области материалов с сильно нелинейной электромагнитной характеристикой, таких как сверхпроводники. Стационарный анализ в частотной области, анализ малых сигналов и моделирование во временной области поддерживаются в 2D и 3D. Обратите внимание, что формула требует ненулевой проводимости везде. \n\nФизический интерфейс решает уравнения Максвелла, сформулированные с использованием магнитного поля в качестве зависимой переменной. 
topicdescr/magneticfieldscurrentsonly = [Интерфейс «Магнитные поля, только токи»]Интерфейс «Магнитные поля, только токи» используется для расчета магнитных полей на основе токов в предположении, что все регионы имеют одинаковую относительную магнитную проницаемость, равную единице. Он предназначен для поддержки как бездивергентных, так и недивергентных токов. В свободном пространстве он возвращает значение интеграла Био-Савара.
topicdescr/magneticfieldsnocurrents = [Магнитные поля, отсутствие токов] Ветка «Магнитные поля, отсутствие токов» содержит физические интерфейсы для анализа магнитостатических полей от постоянных магнитов и других бестоковых магнитных источников. Формулировка, используемая в содержащихся интерфейсах, является стационарной, но для использования вместе с другой физикой поддерживается также моделирование во временной области в 2D и 3D.
topicdescr/magneticfieldsnocurrentsboundaryelements = [Интерфейс «Магнитные поля, отсутствие токов, граничные элементы»]Интерфейс «Магнитные поля, отсутствие токов, граничные элементы» используется для расчета магнитостатических полей от постоянных магнитов и других бестоковых магнитных источников. Формулировка основана на методе граничных элементов, а интерфейс доступен в 2D и 3D.\n\nФизический интерфейс решает закон Гаусса для магнитного поля, используя скалярный магнитный потенциал в качестве зависимой переменной.
topicdescr/magneticfieldstimeperiodic = [Интерфейс периодического времени магнитного поля]Интерфейс периодического времени магнитного поля используется для расчета магнитных полей и распределений индуцированного тока. Он особенно подходит для периодических во времени возбуждений.
topicdescr/magneticmachinerytimeperiodic = [Магнитное оборудование, периодическое время]Физический интерфейс Магнитное оборудование, периодическое время используется для анализа режима распределения магнитных полей и тока в статических, вращающихся и поступательных машинах при обычных периодических возбуждениях.
topicdescr/magneticmachineryrotatingtimeperiodic = [Магнитное оборудование, вращающееся, периодическое по времени]Физический интерфейс Магнитное оборудование, периодическое по времени используется для анализа режима распределения магнитных полей и тока в статических, вращающихся и поступательных машинах при обычных периодических возбуждениях.
topicdescr/magnetostaticsnocurrents = [Интерфейс «Магнитные поля, отсутствие токов»]Интерфейс «Магнитные поля, отсутствие токов» используется для расчета магнитостатических полей от постоянных магнитов и других бестоковых магнитных источников. Формулировка является стационарной, но для использования вместе с другими физиками также поддерживается моделирование во временной области в 2D и 3D.\n\nФизический интерфейс решает закон Гаусса для магнитного поля, используя скалярный магнитный потенциал в качестве зависимой переменной.
topicdescr/mathematical = [Физические группы в мастере моделей]Ветка «Математика» содержит интерфейсы для решения УЧП и ОДУ, выполнения анализа чувствительности, моделирования движущихся сеток и деформированной геометрии и многого другого.
topicdescr/mathparticle = [Интерфейс математической трассировки частиц]Интерфейс математической трассировки частиц вычисляет траектории частиц с помощью геометрии. Движение частиц обычно приводится в движение внешним полем. Частицы могут быть безмассовыми или их движение определяется вторым законом Ньютона. Кроме того, вы можете указать гамильтониан или лагранжиан, определяющий движение частиц.
topicdescr/metalphasetransformation = [Фазовое преобразование металла]Интерфейс «Фазовое преобразование металла» доступен для 3D, 2D, 1D или осесимметричных тел и предназначен для анализа фазовых превращений металла из твердого тела в твердое. Развивающийся фазовый состав рассчитывается на основе набора диффузионных и/или вытесняющих металлургических фазовых превращений. \n\nЭффективные термические и механические свойства материала для составного материала могут быть дополнительно рассчитаны. Деформации фазового превращения, возникающие в результате эффектов объемной аккомодации, а также пластичности, вызванной трансформацией, можно рассчитать и использовать в структурном анализе. Скрытое тепло от фазовых превращений можно вычислить и использовать в анализе теплопередачи.\n\nФизический интерфейс поддерживает анализ, зависящий от времени.
topicdescr/mf = [Интерфейсы Moisture Flow] Ветка Moisture Flow содержит различные версии мультифизического интерфейса, который объединяет перенос влаги в воздухе с ламинарным или турбулентным потоком. Течение жидкости может быть либо свободным, либо течь в пористой среде.
topicdescr/mixturemodelalgebraicyplus = [Модель смеси, алгебраический интерфейс yPlus]Модель смеси, алгебраический интерфейс yPlus используется для моделирования дисперсных многофазных потоков при высоких числах Рейнольдса. Дисперсной фазой могут быть пузырьки, капли жидкости или твердые частицы, которые, как предполагается, всегда движутся с предельной скоростью. \n\nМодель смеси, алгебраический интерфейс yPlus решает один набор уравнений Навье-Стокса для определения импульса смеси. Распределение давления рассчитывается по усредненному уравнению неразрывности смеси, а скорость дисперсной фазы описывается моделью скольжения. Объемную долю дисперсной фазы отслеживают путем решения уравнения переноса объемной доли. Эффекты турбулентности учитываются с использованием расширенной модели вязкости, основанной на локальном расстоянии от стенки. Поэтому физический интерфейс включает в себя уравнение расстояния до стены.\n\nФизический интерфейс также может моделировать распределение числовой плотности, которое можно использовать для расчета площади межфазной границы, что полезно при моделировании химических реакций в смеси.
topicdescr/mixturemodelkeps = [Модель смеси, интерфейс k-ε] Интерфейс модели смеси, k-ε используется для моделирования дисперсных многофазных потоков при высоких числах Рейнольдса. Дисперсной фазой могут быть пузырьки, капли жидкости или твердые частицы, которые, как предполагается, всегда движутся со своей предельной скоростью. смесь. Распределение давления рассчитывается по усредненному уравнению неразрывности смеси, а скорость дисперсной фазы описывается моделью скольжения. Объемную долю дисперсной фазы отслеживают путем решения уравнения переноса объемной доли. Эффекты турбулентности моделируются с использованием стандартной модели с двумя уравнениями k-ε с ограничениями реализуемости. Поток вблизи стенок моделируется с использованием стеновых функций. \n\nФизический интерфейс также может моделировать распределение числовой плотности, которое можно использовать для расчета площади межфазной границы, что полезно при моделировании химических реакций в смеси.
topicdescr/mixturemodelkomega = [Модель смеси, интерфейс k-ω] Интерфейс модели смеси, k-ω используется для моделирования дисперсных многофазных потоков при высоких числах Рейнольдса. Дисперсной фазой могут быть пузырьки, капли жидкости или твердые частицы, которые, как предполагается, всегда движутся со своей предельной скоростью. смесь. Распределение давления рассчитывается по усредненному уравнению неразрывности смеси, а скорость дисперсной фазы описывается моделью скольжения. Объемную долю дисперсной фазы отслеживают путем решения уравнения переноса объемной доли. Эффекты турбулентности моделируются с использованием пересмотренной модели Уилкокса с двумя уравнениями k-ω с ограничениями реализуемости. Модель k-ω является так называемой моделью с низким числом Рейнольдса, что означает, что она может определять поток вплоть до стенки.\n\nФизический интерфейс также может моделировать распределение числовой плотности, которое можно использовать для расчета межфазной границы область, полезная при моделировании химических реакций в смеси.
