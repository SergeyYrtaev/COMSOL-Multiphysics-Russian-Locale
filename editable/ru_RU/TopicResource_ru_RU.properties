topicdescr_study/acimpedanceinitialvalues = [Электрохимические исследования и этапы исследования]Исследование начальных значений импеданса переменного тока используется для расчетов спектроскопии электрохимического импеданса (EIS) в электрохимических ячейках. \n\nИсследование состоит из одного этапа исследования частотной области и возмущений, на котором определяется гармоническое линейное возмущение. Используйте это исследование для электрохимических ячеек, когда стационарный раствор известен априори. Выходные данные представляют собой графики Найквиста и Боде для выбранных электродов в указанном диапазоне частот.
topicdescr_study/acimpedancestationary = [Электрохимические исследования и этапы исследования] Стационарное исследование импеданса переменного тока используется для расчетов электрохимической импедансной спектроскопии (ЭИС) в электрохимических ячейках. \n\nИсследование состоит из двух этапов исследования: этап стационарного исследования, за которым следует этап исследования частотной области и возмущений, на котором определяется гармоническое линейное возмущение. стационарного нелинейного решения. Выходные данные представляют собой графики Найквиста и Боде для выбранных электродов в указанном диапазоне частот.
topicdescr_study/acimpedancetransient = [Электрохимические исследования и этапы исследования]Исследование зависимости импеданса переменного тока от времени используется для расчетов спектроскопии электрохимического импеданса (EIS) в электрохимических ячейках.\n\nИсследование состоит из двух этапов исследования: шаг исследования зависимости от времени, за которым следует этап исследования частотной области и возмущений, который определяет гармоническое возмущение зависящего от времени решения на последнем временном шаге. Данное исследование может быть использовано для систем, не имеющих стационарного решения. Выходные данные представляют собой графики Найквиста и Боде для выбранных электродов в указанном диапазоне частот.
topicdescr_study/advanced = [Дополнительно] Эта ветка содержит типы исследований, предложенные выбранной вами физикой, но они либо являются продвинутыми, либо используются не так часто.
topicdescr_study/aweromstudy = [Типы исследования]Исследование частотной области с помощью модели пониженного порядка с использованием метода асимптотической оценки формы сигнала (AWE).\n\nИсследование является отправной точкой для облегчения настройки модели пониженного порядка и выполнения анализа частотной характеристики с использованием метода AWE. При выборе будут добавлены несколько исследований.
topicdescr_study/batch = Используйте пакетное исследование, чтобы запустить пакетный процесс COMSOL Multiphysics, который решает текущее исследование на вашем компьютере.
topicdescr_study/batchsweep = Используйте исследование «Пакетная очистка», чтобы найти решение для последовательности стационарных или зависящих от времени симуляций, которые возникают, когда вы изменяете некоторые интересующие параметры, используя несколько пакетных процессов.
topicdescr_study/bidirectionallycoupledparticletracing = [Типы исследований]Исследование двунаправленно связанной трассировки частиц используется для моделирования взаимодействия траекторий частиц со стационарными полями. В ходе исследования создается решатель, зависящий от времени, который рассчитывает все степени свободы, связанные с частицами. Все остальные степени свободы вычисляются с помощью стационарного решателя. Два решателя повторяются с использованием цикла For-End For, так что получается самосогласованное решение с учетом двунаправленной связи между движущимися частицами и стационарными полями.\n\nПримеры: В электромагнетике он используется для моделирования пучков частиц при постоянном токе, на которые существенно влияют собственные поля. При отслеживании частиц в жидкости он используется для моделирования воздействия силы сопротивления, действующей на частицы, и соответствующей нагрузки на тело, действующей на жидкость со стороны частиц.
topicdescr_study/bidirectionallycoupledraytracing = [Типы исследования]Исследование двунаправленной трассировки лучей используется для расчета траекторий лучей, на которые влияют внешние поля. В этом исследовании вычисляются все степени свободы, связанные с лучами, с использованием решателя, зависящего от времени. Все остальные степени свободы вычисляются с помощью стационарного решателя. Два решателя повторяются с использованием цикла For-End For, так что получается самосогласованное решение с учетом двунаправленной связи между распространяющимися лучами и стационарными полями.\n\nПримеры: он используется для моделирования эффектов термического линзирования, при которых тепло, выделяемое при затухании лучей в поглощающей среде, изменяет форму и показатель преломления области. Изменения показателя преломления и формы, в свою очередь, влияют на траектории лучей.
topicdescr_study/boltpretension = [Типы исследований]Исследование предварительного натяжения болтов представляет собой особый случай стационарного исследования. Он используется вместе с функцией предварительного натяжения болта в интерфейсе механика твердого тела. Исследование «Предварительное натяжение болта» — единственный тип исследования, в котором рассчитываются специальные степени свободы перед деформацией.\n\nПри работе с предварительно напряженными болтами вы обычно начинаете с исследования предварительного натяжения болта, за которым затем следуют другие типы исследований, в которых анализируются эксплуатационные нагрузки.
topicdescr_study/boundarymodeanalysis = [Типы исследования]Исследование «Анализ граничной моды» используется для расчета констант распространения или волновых чисел, а также форм распространяющихся мод для заданной частоты в порту. \n\nИсследование сочетает в себе этап исследования «Анализ граничной моды» на порте с этапом исследования частотной области для полной геометрии. 
topicdescr_study/boundarymodefrequencystationary = [Типы исследования]Исследование «Анализ граничной моды» используется для вычисления констант распространения или волновых чисел, а также форм распространяющихся мод для заданной частоты в порту. \n\nИсследование сочетает в себе этап исследования «Анализ граничной моды» в порте с этапом исследования «Частотно-стационарная модель» для полной геометрии. 
topicdescr_study/boundarymodefrequencytransient = [Типы исследования]Исследование «Анализ граничной моды» используется для расчета констант распространения или волновых чисел, а также формы распространяющихся мод для заданной частоты в порту. \n\nИсследование сочетает в себе этап исследования «Анализ граничной моды» в порте с этапом исследования частотных переходных процессов для всей геометрии. 
topicdescr_study/clustercomputing = Используйте исследование «Кластерные вычисления ()», если хотите отправить пакетные задания COMSOL Multiphysics в планировщик заданий, который, в свою очередь, запускает пакетное задание на втором компьютере или кластере.
topicdescr_study/clustersweep = Используйте исследование Cluster Sweep для параллельного решения нескольких моделей, где каждая модель имеет свой набор параметров.
topicdescr_study/coilcurrentcalculation = [Типы исследования] Исследование «Анализ геометрии катушки» используется для расчета распределения тока, когда в модель добавляется область катушки, и это может быть необходимо перед запуском других поддерживаемых анализов магнитных полей. Для модели проводника "Homogenized multiturn" это необходимо, когда для Типа катушки установлено значение "Numeric", и она создает плотность тока, соответствующую пучку проводящих проводов, соединенных последовательно. В случае "Single Conductor" он создает постоянный ток этого объемного проводника. В анализе, следующем за анализом геометрии катушки, автоматически учитываются эффекты наведенных токов.
topicdescr_study/combinesolution = Используйте узел «Объединить решения», чтобы объединить два решения с помощью конкатенации или суммирования или удалить решения.
topicdescr_study/currentdistributioninitialization = Шаг исследования «Инициализация текущего распределения» добавлен в Стационарный с инициализацией; Зависит от времени с инициализацией, фиксированная геометрия; и зависимость от времени с исследованиями инициализации. Этот этап исследования можно использовать в качестве этапа инициализации электрического и электролитного потенциалов при моделировании электрохимической ячейки.
topicdescr_study/custom_studies = [Пользовательские исследования]Эта ветка содержит типы исследований, для которых выбранная физика не адаптируется автоматически. Вместо этого эти физические интерфейсы необходимо адаптировать вручную с помощью дерева модели.
topicdescr_study/cyclicvoltammetry = [Типы исследований]Исследование циклической вольтамперометрии используется для переходных вычислений экспериментов по вольтамперометрии вместе с интерфейсом электроанализа.
topicdescr_study/dynamic = [Исследования по инициализации технологической схемы для модуля «Технологическая схема в химической технологии»] Исследование «Переходная технологическая схема с инициализацией» предназначено для зависящих от времени моделей, требующих инициализации. Он добавляет в узел Исследования шаг исследования «Инициализация блок-схемы», за которым следует шаг исследования «Зависимость от времени». Первый шаг, этап исследования «Инициализация блок-схемы», представляет собой частный случай стационарного исследования. На этом этапе исследования вычисляются согласованные начальные состояния для всех состояний в системе DAE модели устройства. Это позволяет решать другую физику, не связанную с устройствами, как стационарную задачу. Это также позволяет пользователю отключить инициализацию другой физики. Второй шаг – это обычный этап исследования зависимости от времени.
topicdescr_study/dynamicfromsteady = [Блок-схема переходного процесса из устойчивого состояния] В то время как исследование блок-схемы переходного процесса с инициализацией полезно для моделирования любой заданной схемы переходного процесса, например, схем управления, а также запуска процесса, исследование блок-схемы переходного процесса из устойчивого состояния подходит для остановки процесса или нарушения нормального управления. Другой подходящий сценарий — поломка трубы или клапана, когда установившийся процесс внезапно нарушается. Первый шаг — это стационарный шаг, на котором все производные по времени равны нулю. Второй шаг – это этап исследования зависимости от времени.
topicdescr_study/eedfinitialization = [Типы исследования]Исследование инициализации EDF используется для расчета функции распределения электронов по энергии (EEDF) без решения других степеней свободы плазмы. Его также можно использовать для расчета начальной ФРЭЭЭ для модели плазмы, зависящей от времени и пространства.
topicdescr_study/eigenfrequency = [Типы исследования]Исследование собственных частот используется для расчета собственных мод и собственных частот линейной или линеаризованной модели.\n\nПримеры: В электромагнетизме собственные частоты соответствуют резонансным частотам, а собственные моды соответствуют нормированному электромагнитному полю на собственные частоты. В механике твердого тела собственные частоты соответствуют собственным частотам колебаний, а собственные моды соответствуют нормированным деформированным формам на собственных частотах. В акустике собственные частоты соответствуют резонансным частотам, а собственные моды соответствуют нормированному акустическому полю на собственных частотах.
topicdescr_study/eigenvalue = [Типы исследования]Исследование собственных значений используется для вычисления собственных значений и собственных мод линейной или линеаризованной модели в общей формулировке собственных значений, где собственные значения не обязательно являются частотами. Исследование собственных значений дает вам полный контроль над формулировкой собственных значений, в отличие от исследования собственных значений, адаптированного для конкретных физических интерфейсов. Исследование собственных значений обычно используется для моделирования на основе уравнений.
topicdescr_study/eigenvalue_schr = [Типы исследования]Исследование собственных значений используется для вычисления собственных значений и собственных мод линейной или линеаризованной модели в общей формулировке собственных значений, где собственные значения не обязательно являются частотами. Исследование собственных значений дает вам полный контроль над формулировкой собственных значений, в отличие от исследования собственных значений, адаптированного для конкретных физических интерфейсов. Исследование собственных значений обычно используется для моделирования на основе уравнений.\n\nЭто исследование собственных значений слегка адаптировано для физического интерфейса Schrödinger Equation. Для собственного значения установлено безразмерное значение, а собственная энергия определяется как произведение собственного значения и введенного пользователем значения "Eigenvalue scale" (единица измерения: Дж) в настройках физического интерфейса.
topicdescr_study/empty = [Типы исследования]Пустое исследование создает узел исследования без этапов исследования.
topicdescr_study/fatigue = [Типы исследований]Исследование усталости представляет собой специальное исследование для оценки усталости. Он обрабатывает цикл нагрузки и оценивает критерий усталости, указанный в интерфейсе усталости. Прежде чем можно будет рассчитать исследование усталости, необходимо смоделировать цикл нагрузки. Это делается в стационарном или зависящем от времени исследовании путем моделирования реакции конструкции на несколько событий нагрузки.
topicdescr_study/freqtotimefft = [Типы исследования]Исследование БПФ «Частота-время» используется для вычисления быстрых или неравномерных преобразований Фурье из частотной области во временную область.
topicdescr_study/frequency = [Типы исследования]Исследование частотной области используется для расчета отклика линейной или линеаризованной модели, подвергнутой гармоническому возбуждению на одной или нескольких частотах.\n\nПримеры: В механике твердого тела оно используется для расчета частотной характеристики механической конструкции в зависимости от конкретного распределения нагрузки и частот. В квазистатических формулировках электромагнетизма он используется, например, для расчета зависимости импеданса от частоты. В акустике и распространении электромагнитных волн он используется для расчета передачи и отражения в зависимости от частоты. Исследование частотной области учитывает влияние всех собственных мод, которые правильно разрешаются сеткой, и то, как они сочетаются с приложенными нагрузками или возбуждениями. Результаты исследования частотной области обычно отображаются в виде передаточной функции, например, величины или фазы деформации, звукового давления, импеданса или параметров рассеяния в зависимости от частоты.
topicdescr_study/frequencyadaptive = [Типы исследования]Исследование адаптивной развертки частоты используется для расчета отклика линейной или линеаризованной модели, подвергнутой гармоническому возбуждению для нескольких частот с точным частотным разрешением с использованием модели пониженного порядка в частотной области.\n\nСокращение модели асимптотической оценки формы сигнала (AWE) выполняется путем сопоставления моментов, когда для передаточной функции в заданном частотном интервале используется аппроксимация Паде или разложение в ряд Тейлора.
topicdescr_study/frequencydomainsourcesweep = [Типы исследования] Решите исследование в частотной области, которое охватывает каналы питания, такие как порты и порты с сосредоточенными параметрами, автоматически извлекая полную матрицу S-параметров.
topicdescr_study/frequencydomainrfadaptivemesh = [Типы исследований] Решите исследование в частотной области, в ходе которого выполняется адаптация сетки для печатных плат и радиочастотных приложений.
topicdescr_study/frequencylinearized = [Типы исследования] Исследование возмущений в частотной области используется для изучения небольших колебаний относительно смещенного решения. Исследование состоит из двух этапов исследования: этап стационарного исследования для расчета смещенного решения, за которым следует этап исследования частотной области для расчета реакции на гармонические нагрузки, колеблющиеся вокруг смещенного решения. На втором этапе исследования вычисляются линейные возмущения относительно смещенного решения. 
topicdescr_study/frequencymodal = [Типы исследования] Модальное исследование частотной области используется для расчета реакции линейной или линеаризованной модели механики конструкций, подвергнутой гармоническому возбуждению на одной или нескольких частотах.\n\nИсследование состоит из двух этапов исследования: этап исследования собственных частот для расчета собственных частот и собственных мод конструкции, за которым следует второй этап исследования модальных частот в частотной области для расчета модального отклика. В анализе модальной суперпозиции деформация конструкции представлена ​​линейной комбинацией собственных мод конструкции. Это означает, что изучаемые частоты ограничены частотами вычисленных собственных мод. Модальное исследование частотной области обычно приводит к более быстрому вычислению, чем прямое решение с использованием исследования частотной области.
topicdescr_study/frequencystationary = [Типы исследования]Частотно-стационарное исследование используется для расчета температурного поля в состоянии теплового равновесия и распределения электромагнитного поля для моделей, созданных с помощью физических интерфейсов индукционного, микроволнового или лазерного нагрева. Это частный случай стационарного исследования, когда стационарное уравнение теплопередачи решается вместе с уравнением электромагнетизма в частотной области.
topicdescr_study/frequencystationaryonewayelectromagneticheating = [Типы исследования] Исследование «Частотно-стационарный односторонний электромагнитный нагрев» используется для расчетов стационарного электромагнитного нагрева, где уравнение теплопередачи зависит от электромагнитного источника тепла, но электромагнитная часть модели не зависит от температуры.\n\nИсследование состоит из двух этапов исследования: этап исследования частотной области, на котором определяется распределение электромагнитного поля, за которым следует этап стационарного исследования, на котором определяется распределение температуры. 
topicdescr_study/frequencytransient = [Типы исследования]Исследование частотных переходных процессов используется для расчета изменений температуры с течением времени вместе с распределением электромагнитного поля в частотной области. Он используется для моделей, созданных с помощью одного из физических интерфейсов для индукционного нагрева, микроволнового нагрева, лазерного нагрева, индуктивно связанной плазмы и микроволновой плазмы. Для интерфейсов физики плазмы температура представляет собой температуру электронов.
topicdescr_study/frequencytransientonewayelectromagneticheating = [Типы исследования] Исследование частотно-переходного одностороннего электромагнитного нагрева используется для расчетов электромагнитного нагрева, зависящего от времени, где уравнение теплопередачи зависит от источника электромагнитного тепла, но электромагнитная часть модели не зависит от температуры.\n\nИсследование состоит из двух этапов исследования: этап исследования частотной области, решение проблемы распределения электромагнитного поля, за которым следует этап исследования зависимости от времени, решение проблемы распределения температуры.
topicdescr_study/frozenrotor = [Типы исследований]Исследование «Замороженный ротор» используется для расчета скорости, давления, турбулентности, концентрации, температуры и других полей потока во вращающихся машинах и является частным случаем стационарного исследования. Вращающиеся части удерживаются в замороженном состоянии, а вращение учитывается за счет центробежных сил и сил Кориолиса. Исследование особенно подходит для исследования течения во вращающихся машинах, топология геометрии которых не меняется при вращении. Он также используется для расчета начальных условий для нестационарного моделирования потока во вращающихся машинах.
topicdescr_study/frozenrotoronewaynitf = [Типы исследования] Исследование NITF «Замороженный ротор, односторонний» используется для расчета неизотермического потока замороженного ротора, когда изменения температуры настолько малы, что не влияют на поток.\n\nИсследование состоит из двух этапов исследования замороженного ротора: первый — определение полей скорости жидкости и давления, а второй — определение поля температуры. Если добавляется дополнительный физический интерфейс, он автоматически добавляется на оба этапа исследования.
topicdescr_study/frozenrotoronewaywithinitializationnitf = [Типы исследования] Исследование NITF «Замороженный ротор, односторонний с инициализацией» используется для расчетов неизотермического потока замороженного ротора с турбулентной моделью, требующей инициализации. В этом исследовании предполагается, что изменения температуры настолько малы, что они не влияют на поток. \n\nИсследование состоит из инициализации расстояния до стены, за которой следуют два этапа исследования замороженного ротора. Шаг исследования «Инициализация расстояния до стены» посвящен определению обратного расстояния от стены (то есть обратного расстояния до ближайшей стены). На первом этапе исследования «замороженного ротора» рассчитываются поля скорости жидкости и давления, а на втором — поле температуры.
topicdescr_study/frozenrotorstationaryfreesurface = [Типы исследования]Исследование «Замороженный ротор со стационарной свободной поверхностью» используется для моделирования потока во вращающихся машинах и является особым случаем стационарного исследования. Он состоит из двух этапов исследования: шаг «замороженного ротора», на котором определяется скорость, давление, турбулентность и другие поля, за которым следует этап исследования «стационарной свободной поверхности», на котором определяется деформация свободной поверхности. На этапе исследования «замороженного ротора» вращающиеся части остаются в замороженном состоянии, а вращение учитывается с учетом центробежных сил и сил Кориолиса. На этапе исследования стационарной свободной поверхности деформация поверхности оценивается на основе линеаризованного состояния свободной поверхности с использованием давления на этапе исследования замороженного ротора. \n\nЭто исследование особенно подходит для исследования течения во вращающихся машинах, где топология геометрии не меняется при вращении. Он также используется для расчета начальных условий для нестационарного моделирования потока во вращающихся машинах.
topicdescr_study/frozenrotorwithinitialization = [Типы исследования]Исследование «Замороженный ротор с инициализацией» используется для моделирования турбулентного потока жидкости во вращающихся машинах. Он состоит из двух этапов исследования: шаг исследования «Инициализация расстояния до стены», на котором определяется функция расстояния до ближайшей стены, за которым следует этап исследования «замороженного ротора», на котором определяется скорость, давление, турбулентность и другие поля. На этапе исследования «Замороженного ротора» вращающиеся части удерживаются в замороженном состоянии, а вращение учитывается с учетом центробежных сил и сил Кориолиса. \n\nЭто исследование особенно подходит для потока во вращающихся машинах, где топология геометрии не меняется при вращении. Он также используется для расчета начальных условий для нестационарного моделирования потока во вращающихся машинах.
topicdescr_study/frozenrotorwithinitializationstationaryfreesurface = [Типы исследования] Исследование «Замороженный ротор с инициализацией и стационарной свободной поверхностью» используется для моделирования турбулентного потока жидкости во вращающихся машинах и является частным случаем стационарного исследования. Он состоит из трех этапов исследования: шаг исследования «Инициализация расстояния до стены», на котором определяется функция расстояния до ближайшей стены, за которым следует этап исследования «замороженного ротора», на котором определяется скорость, давление, турбулентность и другие поля, и этап исследования «Стационарная свободная поверхность», на котором определяется деформация свободной поверхности. На этапе исследования «замороженного ротора» вращающиеся части остаются в замороженном состоянии, а вращение учитывается с учетом центробежных сил и сил Кориолиса. На этапе исследования стационарной свободной поверхности деформация поверхности оценивается из состояния линеаризованной свободной поверхности с использованием давления, полученного на этапе исследования замороженного ротора. \n\nЭто исследование особенно подходит для потока во вращающихся машинах, где топология геометрии не меняется при вращении. Он также используется для расчета начальных условий для нестационарного моделирования потока во вращающихся машинах.
topicdescr_study/functionsweep = Шаг исследования «Проверка функций» — это особый случай шага исследования «Параметрическая очистка», на котором решатель просматривает функции, определенные в узле «Переключение», определенном в разделе «Глобальные определения»> «Функции». 
topicdescr_study/general = [Общие исследования] В этом разделе вы найдете исследования, которые имеют один этап обучения, применимые ко всем выбранным физикам и широко используемые во многих различных областях физики.
topicdescr_study/linearbuckling = [Типы исследования]Исследование линейной устойчивости используется для оценки критической нагрузки, при которой конструкция становится нестабильной.\n\nИсследование линейной устойчивости состоит из двух этапов исследования: этап стационарного исследования для приложения внешней нагрузки, за которым следует этап исследования линейной устойчивости. На втором этапе исследования используется решатель собственных значений для расчета режимов потери устойчивости и связанных с ними критических коэффициентов нагрузки.
topicdescr_study/lsqoptimization = Добавьте шаг исследования «Оценка параметров», который использует методы оптимизации для изменения параметров, чтобы минимизировать сумму квадратов ошибок. Ошибки вычисляются как разница между внешними экспериментальными значениями и выражением модели, рассчитанным на основе решения, зависящего от времени или параметра.
topicdescr_study/mapping = [Типы исследования]Исследование «Картирование» используется при соединении решения о потоке жидкости с аэроакустическим интерфейсом с использованием мультифизической связи «Фоновая связь с потоком жидкости».
topicdescr_study/materialsweep = Шаг исследования «Проверка материала» представляет собой особый случай параметрической проверки, когда решатель просматривает материалы, определенные в узле «Переключение», определенном в разделе «Глобальные определения» > «Материалы».
topicdescr_study/meanenergies = [Типы исследования]Исследование «Средние энергии» используется для ввода массива значений средней энергии электронов и доступно для интерфейса «Уравнение Больцмана, двухчленное приближение». 
topicdescr_study/modalfrequencyromstudy = [Типы исследования]Исследование частотной области с помощью модели пониженного порядка с использованием модальной суперпозиции.\n\nИсследование является отправной точкой для облегчения настройки модели пониженного порядка и выполнения анализа частотной характеристики. Если этот флажок установлен, несколько исследований будут добавлены вместе с узлом в разделе «Определения» для задания входных данных модели пониженного порядка.
topicdescr_study/modaltransientromstudy = [Типы исследования]Зависимое от времени исследование с помощью модели пониженного порядка с использованием модальной суперпозиции.\n\nИсследование является отправной точкой для облегчения настройки модели пониженного порядка и выполнения анализа переходных процессов. Если этот флажок установлен, несколько исследований будут добавлены вместе с узлом в разделе «Определения» для задания входных данных модели пониженного порядка.
topicdescr_study/modeanalysis = [Типы исследования]Исследование «Анализ мод» используется для расчета констант распространения или волновых чисел, а также форм распространяющихся мод для заданной частоты.\n\nПримеры: В электромагнетике оно используется для расчета констант распространения и форм мод в портах и поперечных сечениях волновода. В акустике он используется для расчета констант распространения и формы колебаний на входах, выходах и поперечных сечениях направляющих конструкций, таких как воздуховоды. 
topicdescr_study/modelreduction = [Типы исследований]Исследование «Сокращение модели» предоставляет инструменты для создания модели уменьшенного порядка, которая хранится в специальном формате для уменьшенных моделей — файлах MPHROM.
topicdescr_study/multigridlevel = Узел Многосеточный уровень определяет геометрический многосеточный уровень, используемый в исследовании.
topicdescr_study/optimization = В исследовании «Оптимизация» собраны все настройки, необходимые для решения оптимизационных задач. Он служит двойной цели: определить решаемую задачу оптимизации и выбрать решающую программу, а также управлять важными свойствами решающей программы и ее выходными данными.
topicdescr_study/orbitaltemperature = [Орбитальная температура] Исследование орбитальной температуры представляет собой особый случай исследования зависимости от времени, в котором внешнее облучение на этапе исследования орбитальных тепловых нагрузок повторно используется на нескольких периодах орбиты.
topicdescr_study/orbitcalculation = [Расчет орбиты]Этап исследования «Расчет орбиты» представляет собой особый случай шага исследования «Зависимость от времени», на котором рассчитываются только степени свободы, используемые для моделирования орбиты космического корабля. Это исследование используется для проверки свойств Солнца, плоскоститы и орбиты.
topicdescr_study/orbitthermalloads = [Тепловые нагрузки на орбите]Этап исследования «Тепловые нагрузки на орбите» представляет собой особый случай этапа исследования «Зависимость от времени», на котором решаются только степени свободы, используемые для моделирования орбиты космического корабля. Кроме того, внешнее излучение сохраняется для повторного использования в течение нескольких периодов обращения на этапе исследования орбитальной температуры.
topicdescr_study/parameterestimation = Шаг исследования «Подбор кривой» предоставляет возможность выполнить оценку параметров на основе данных модели и некоторых справочных данных с использованием различных методов оценки параметров.
topicdescr_study/parametric = Используйте исследование «Параметрическое исследование», чтобы найти решение последовательности стационарных или зависящих от времени проблем, возникающих при изменении некоторых интересующих параметров.
topicdescr_study/particletrajectories = [Типы исследования] Исследование и этап исследования «Траектории частиц» имеют те же настройки, что и шаг исследования «Зависимость от времени», за исключением того, что по умолчанию при выборе физического интерфейса активны только физические интерфейсы для отслеживания частиц.
topicdescr_study/phaseinitialization = Шаг исследования «Инициализация фазы» добавляется к исследованию переходного процесса с инициализацией фазы при использовании двухфазного потока или движущейся границы раздела. Этот этап исследования посвящен решению обратного расстояния между границами раздела.
topicdescr_study/prestressedanalysis = [Исследование частотного анализа с предварительным напряжением]Исследование «Анализ преднапряженных частот в частотной области» используется для расчета реакции на гармонические нагрузки, колеблющиеся вокруг предыдущей статической нагрузки. \n\nИсследование состоит из двух этапов исследования: этапа стационарного исследования, за которым следует этап исследования частотной области.
topicdescr_study/prestressedeigenfrequency = [Исследования с анализом частот с предварительным напряжением] Анализ с предварительным напряжением, исследование собственных частот используется для расчета собственных частот и собственных мод, на которые влияет предшествующая статическая нагрузка. \n\nИсследование состоит из двух этапов исследования: этап стационарного исследования, за которым следует этап исследования собственной частоты. В ходе исследования вычисляются собственные частоты и формы собственных мод под воздействием предшествующей статической нагрузки на конструкцию.
topicdescr_study/prestressedmodalfrequencydomain = [Исследование модальной частотной области с предварительным напряжением]Исследование модальной частотной области с предварительным напряжением используется для расчета реакции на гармонические нагрузки, колеблющиеся вокруг предшествующей статической нагрузки. Решение выполняется с использованием модальной суперпозиции.\n\n Исследование состоит из трех этапов исследования: этап стационарного исследования, за которым следует этап исследования собственной частоты и этап исследования модальной области в частотной области.
topicdescr_study/prestressedmodaltimedependent = [Исследование предварительно напряженной модальной зависимости от времени] Исследование зависимости от времени, предварительно напряженной, модальной нагрузки используется для расчета реакции на зависящие от времени нагрузки, колеблющиеся вокруг предыдущей статической нагрузки. Решение выполняется с использованием модальной суперпозиции.\n\nИсследование состоит из трех этапов исследования: этап стационарного исследования, за которым следует этап исследования собственной частоты и этап зависимого от времени модального исследования.
topicdescr_study/randomresponsestudy = [Типы исследования] Модальный анализ случайной вибрации с использованием спектральной плотности мощности (PSD). \n \nИсследование случайной вибрации является отправной точкой для облегчения настройки анализа случайной вибрации. Если этот флажок установлен, несколько исследований будут добавлены вместе с узлами в разделе «Определения» для задания входных спектров.
topicdescr_study/raytracing = [Типы исследований]Исследование «Трассировка лучей» используется для расчета траекторий лучей. Это частный случай шага исследования зависимости от времени. Временные шаги, выполняемые решателем, можно указать напрямую или путем указания набора длин пути и характеристической групповой скорости. Встроенные условия остановки можно использовать для остановки решателя, когда не осталось активных лучей или когда интенсивность активных лучей пренебрежимо мала.\n\nПримеры: Это исследование используется с интерфейсом геометрической оптики или лучевой акустики для расчета траекторий лучей. Указав диапазон временных шагов с точки зрения максимальной длины пути, можно определить оптимальные настройки исследования на основе размера геометрии и свойств луча.
topicdescr_study/reducedelectricfields = [Типы исследования]Исследование «Приведенные электрические поля» используется для анализа диапазона приведенных электрических полей и доступно для интерфейса «Уравнение Больцмана, двухчленное приближение». 
topicdescr_study/responsespectrumstudy = [Типы исследования]Анализ спектра реакции — это модальный метод аппроксимации механической реакции на короткие недетерминированные события, такие как землетрясения и толчки.\n\nИсследование спектра реакции — это отправная точка для облегчения настройки анализа спектра реакции. Если этот флажок установлен, будет добавлено исследование собственных частот вместе с узлом «Спектр ответа» в разделе «Определения». Фактические оценки спектра ответа доступны с использованием специальных наборов данных в разделе «Результаты».
topicdescr_study/schrodingerpoisson = [Типы исследования]Исследование Schrödinger–Poisson используется для моделирования связи между плотностью пространственного заряда, рассчитанной с помощью интерфейса Schrödinger Equation, и электрическим потенциалом, рассчитанным с помощью интерфейса электростатики.
topicdescr_study/semiconductorequilibrium = [Равновесие полупроводника] На этапе исследования равновесия полупроводника предполагается, что носители заряда находятся в тепловом равновесии, поэтому решается только уравнение Пуассона (при этом принимая во внимание плотность объемного заряда носителей заряда и ионизированных примесей). Это обеспечивает наиболее эффективное решение для систем, которые, как известно, находятся в равновесии, а также возможность генерировать начальные условия для решения неравновесных моделей.
topicdescr_study/semiconductorinitialization = [Инициализация полупроводников] Это исследование инициализации используется для адаптивного уточнения сетки на основе градиента концентрации легирующих примесей.
topicdescr_study/sensitivity = Используйте шаг исследования чувствительности, чтобы добавить к исследованию анализ чувствительности.
topicdescr_study/shapeoptimization = Узел исследования «Оптимизация формы» собирает все настройки, необходимые для решения задач оптимизации формы. 
topicdescr_study/shapeoptimizationfrequencydomainstudy = [Типы исследования]Исследование «Оптимизация формы, частотная область» используется для оптимизации формы модели в частотной области.
topicdescr_study/shapeoptimizationstationarystudy = [Типы исследования]Исследование «Оптимизация формы, стационарное состояние» используется для оптимизации формы стационарной модели.
topicdescr_study/smallsignalanalysis = [Анализ малых сигналов, частотная область] Исследование «Анализ малых сигналов, частотная область» используется для изучения малых колебаний относительно смещенного решения в электромагнетизме. Исследование состоит из двух этапов исследования: этап стационарного исследования для расчета смещенного решения, за которым следует этап исследования частотной области и возмущений для расчета частотной характеристики смещенного решения. На втором этапе исследования вычисляются линейные возмущения относительно смещенного решения.
topicdescr_study/sourceinitialization = [Типы исследования]Этап исследования «Инициализация источника» для интерфейса «Магнитные поля, только токи» аналогичен шагу исследования «Анализ геометрии катушки» и используется для расчета поля текущего потока в рамках исследования «Развертка источника с инициализацией».
topicdescr_study/stationary = [Типы исследования]Стационарное исследование используется, когда переменные поля не меняются с течением времени.\n\nПримеры: В электромагнетике оно используется для расчета статических электрических или магнитных полей, а также постоянных токов. В теплопередаче он используется для расчета температурного поля в состоянии теплового равновесия. В механике твердого тела он используется для расчета деформаций, напряжений и деформаций в состоянии статического равновесия. В потоке жидкости он используется для расчета установившихся полей потока и давления. При транспортировке химических веществ он используется для расчета установившегося химического состава в установившихся потоках. В химических реакциях он используется для расчета химического состава в равновесии реагирующей системы.\n\nТакже можно вычислить несколько решений, например несколько вариантов нагрузки, или отследить нелинейную реакцию на медленно меняющуюся нагрузку.
topicdescr_study/stationaryfluid = Шаг исследования «Стационарный, флюид» добавляется к исследованию «Стационарный, односторонний» или «Стационарный, односторонний с инициализацией», которые доступны для интерфейса Fluid–Structure Interaction.
topicdescr_study/stationaryfreesurface = Шаг исследования «Неподвижная свободная поверхность», который добавляется к исследованию «Замороженный ротор» или «Замороженный ротор с инициализацией», когда применяется функция постобработки «Неподвижная свободная поверхность», использует давление, полученное на этапе исследования «Замороженный ротор», для оценки деформации поверхности на основе линеаризованного состояния свободной поверхности.
topicdescr_study/stationaryonewayfsi = [Стационарные и зависящие от времени односторонние исследования взаимодействия жидкости со структурой] Стационарное одностороннее исследование используется для расчетов стационарного взаимодействия жидкости со структурой, когда структурные деформации настолько малы, что не влияют на поток.\n\nИсследование состоит из двух этапов исследования: этап исследования «Стационарное тело», определение полей скорости жидкости и давления, за которым следует этап исследования «Стационарное тело», определение поля деформации твердого тела. Настройки, доступные для двух этапов исследования, такие же, как и для этапа стационарного исследования. Если добавляется дополнительный физический интерфейс, он автоматически добавляется на оба этапа исследования.
topicdescr_study/stationaryonewayfsiwithinitialization = [Стационарные и зависящие от времени односторонние исследования взаимодействия жидкости со структурой] Стационарное одностороннее исследование с инициализацией используется для расчетов стационарного турбулентного взаимодействия жидкости со структурой, где структурные деформации настолько малы, что не влияют на поток.\n\nИсследование состоит из трех этапов исследования: этап исследования, решение функции расстояния до ближайшей стенки, за которым следует этап исследования стационарного тела, решение для поля жидкости, и, наконец, этап исследования стационарного тела, решение для поля деформации твердого тела. Настройки, доступные для шагов исследования, такие же, как и для шага Стационарного исследования. Если добавляется дополнительный физический интерфейс, то он автоматически добавляется к двум последним шагам исследования.
topicdescr_study/stationaryonewaymf = [Стационарные и зависящие от времени односторонние исследования потока влаги] Исследование стационарного одностороннего потока влаги используется для стационарного потока влаги, где изменения влажности достаточно малы и не влияют на поток, в то время как поток вызывает перенос влаги путем конвекции.\n\nИсследование состоит из двух этапов исследования: Стационарный этап исследования жидкости, определение полей скорости и давления жидкости, за которым следует этап исследования стационарного переноса влаги, расчет относительной влажности. Настройки, доступные для двух этапов исследования, такие же, как и для этапа стационарного исследования. Если добавляется дополнительный физический интерфейс, он автоматически добавляется на оба этапа исследования.
topicdescr_study/stationaryonewaynitf = [Стационарные и зависящие от времени односторонние исследования для неизотермического потока] Стационарное одностороннее исследование NITF используется для стационарного неизотермического потока или сопряженной теплопередачи, где изменения температуры достаточно малы, так что они не влияют на поток, в то время как поток вызывает теплообмен за счет convection.\n\nИсследование состоит из двух этапов исследования: этап исследования стационарной жидкости, определение полей скорости и давления жидкости, за которым следует этап исследования стационарной теплопередачи, расчет температуры. Настройки, доступные для двух этапов исследования, такие же, как и для этапа стационарного исследования. Если добавляется дополнительный физический интерфейс, он автоматически добавляется на оба этапа исследования.
topicdescr_study/stationaryonewaywithinitializationmf = [Стационарные и зависящие от времени односторонние исследования потока влаги] Исследование стационарного одностороннего потока влаги с инициализацией используется для расчета стационарного потока влаги с помощью турбулентной модели, требующей инициализации. В исследовании предполагается, что колебания влажности настолько малы, что они не влияют на поток. \n\nИсследование состоит из инициализации расстояния до стены, за которой следуют два этапа стационарного исследования. Шаг исследования «Инициализация расстояния до стены» посвящен определению обратного расстояния от стены (то есть обратного расстояния до ближайшей стены). На первом этапе стационарного исследования вычисляются поля скорости и давления жидкости, а на втором — поле относительной влажности. 
topicdescr_study/stationaryonewaywithinitializationnitf = [Стационарные и зависящие от времени односторонние исследования неизотермического потока] Стационарное одностороннее исследование NITF используется для расчетов стационарного неизотермического потока с турбулентной моделью, требующей инициализации. В исследовании предполагается, что изменения температуры настолько малы, что они не влияют на поток. \n\nИсследование состоит из инициализации расстояния до стены, за которой следуют два этапа стационарного исследования. Шаг исследования «Инициализация расстояния до стены» посвящен определению обратного расстояния от стены (то есть обратного расстояния до ближайшей стены). На первом этапе стационарного исследования вычисляются поля скорости и давления жидкости, а на втором — поле температуры. 
topicdescr_study/stationaryplugflow = [Типы исследований]Исследование стационарного поршневого потока используется для моделей реакторов поршневого типа, созданных с помощью интерфейса Reaction Engineering. Он используется для определения молярной скорости потока как функции объема реактора.
topicdescr_study/stationarysolid = Шаг исследования «Стационарное, твердое тело» добавляется к исследованию «Стационарное, одностороннее» или «Стационарное, одностороннее с инициализацией», которое доступно для интерфейса Fluid–Structure Interaction.
topicdescr_study/stationarysourcesweep = Решите стационарное исследование, которое перемещается между подачами, автоматически извлекая сосредоточенные матрицы (например, матрицу емкости в электростатике или матрицу сопротивления в электрических токах).
topicdescr_study/stationarysourcesweepwithinitialization = Исследование инициализации источников, за которым следует исследование стационарных источников. Последний решает стационарное исследование, которое охватывает источники и в конечном итоге извлекает матрицы с сосредоточенными параметрами.
topicdescr_study/stationarytheneigenfrequency = [Стационарная, затем собственная частота] Исследование «Стационарная, затем собственная частота» дает конфигурацию решателя со стационарным решателем, за которым следует решатель собственных значений, эффективно настраивая связь между двумя решателями за один шаг исследования, так что стационарный решатель можно использовать для зависимых переменных, определенных интерфейсами оптимизации формы и оптимизации топологии, прежде чем решатель собственных значений будет использоваться для физических переменных.
topicdescr_study/frequencydomainsourcesweepwithinitialization = Исследование инициализации источников, за которым следует исследование источника в частотной области. Последний решает исследование в частотной области, которое охватывает источники и в конечном итоге извлекает матрицы с сосредоточенными параметрами.
topicdescr_study/stationarywithinitialization = [Стационарный с инициализацией и зависящий от времени с инициализацией] Исследование «Стационарный с инициализацией» предназначено для моделирования стационарной жидкости, требующего вычисления уравнения расстояния перед вычислением расхода жидкости. \n\nИсследование состоит из двух этапов исследования: шаг исследования «Инициализация расстояния до стены», за которым следует этап стационарного исследования.
topicdescr_study/stationarywithinitializationechem = [Электрохимические исследования и этапы исследования] Стационарный метод с инициализацией используется для решения стационарных электрохимических задач. Исследование состоит из двух этапов исследования: шаг исследования «Инициализация распределения тока», на котором решаются только потенциальные поля, за которым следует второй этап стационарного исследования, для которого поле, вычисленное на первом этапе исследования, используется в качестве начальных значений.
topicdescr_study/study = Создайте исследование.
topicdescr_study/studyreference = Используйте узел «Справочник исследования», чтобы обратиться к другому исследованию в модели.
topicdescr_study/supported_by_all = [Предустановленные исследования/Предустановленные исследования для выбранной физики]Если вы добавили один физический интерфейс, в этом узле вы найдете предлагаемые исследования.\n\nЕсли вы добавили несколько физических интерфейсов, вы найдете исследования, применимые ко всем физическим интерфейсам, которые вы добавили.
topicdescr_study/supported_by_multiphysics = [Предварительно заданные исследования для выбранных мультифизических моделей] В этом узле отображаются исследования, применимые к мультифизическим связям, которые вы выбрали для решения.
topicdescr_study/supported_by_some = [Предустановленные исследования для некоторых видов физики] В этом узле отображаются исследования, применимые ко всем физикам, которые вы выбрали для решения.
topicdescr_study/surrogatemodeltraining = Добавьте шаг исследования «Обучение суррогатной модели» в текущее исследование.
topicdescr_study/temboundarymodeanalysis = [Типы исследования] Исследование «Анализ граничного режима TEM» используется для расчета статического электрического потенциала и внеплоскостной составляющей для магнитного векторного потенциала для определения формы поля моды в портах. \n\nИсследование сочетает в себе этап исследования «Анализ граничного режима TEM» для всех портов типа TEM с этапом исследования частотной области для полной геометрии.
topicdescr_study/thermalperturbationeigenfrequency = [Типы исследования] Исследование тепловых возмущений и собственных частот позволяет вычислить собственные моды и собственные частоты линеаризованных моделей вокруг равновесного стационарного температурного поля.\n\nИсследование состоит из двух этапов исследования: этап стационарного исследования для расчета стационарного решения, за которым следует этап исследования собственных частот для расчета собственных мод и собственных частот.
topicdescr_study/thermalperturbationfrequencydomain = [Типы исследования]В исследовании «Тепловое возмущение, частотная область» вычисляются колебания вокруг равновесного стационарного температурного поля.\n\nИсследование состоит из двух этапов исследования: этап стационарного исследования для расчета стационарного решения, за которым следует этап исследования частотной области, возмущения для расчета гармонических колебаний.
topicdescr_study/timedependentfixedgeometry = [Типы исследования]Шаг исследования «Зависит от времени, фиксированная геометрия» добавляется к исследованию «Зависит от времени, с инициализацией, фиксированная геометрия». Используйте его, чтобы исключить переменные деформации/ALE из переменных, которые решаются на этапе исследования. Это подходящий этап исследования, если вы хотите смоделировать зависящую от времени проблему электроосаждения или коррозии в случаях, когда ожидается, что деформация сетки будет небольшой.
topicdescr_study/timedependentfrequency = [Типы исследования]Исследование зависимости от времени с помощью БПФ представляет собой комплексное исследование, состоящее из двух этапов исследования и одного этапа расширения исследования.\n\nПервый этап — это исследование зависимости от времени для вычисления временного решения. Вторым шагом является исследование БПФ от времени до частоты, в котором частотный спектр временного решения получается посредством преобразования Фурье. Последний шаг — это этап расширения исследования «Объединить решения». На этом этапе расширения исследования можно удалить любые нежелательные результаты в частотной области, такие как первые 10% и последние 10% частотной характеристики после БПФ, используя определяемое пользователем выражение.
topicdescr_study/timedependentsw = [Типы исследования]Исследование зависимости от времени используется, когда переменные поля изменяются с течением времени.\n\nПри решении уравнений мелкой воды добавляется стационарный шаг для получения аппроксимации высоты дна перед решением переходной задачи.
topicdescr_study/timedependentwithinitialization = [Электрохимические исследования и этапы исследования] Зависимый от времени с инициализацией используется для нестационарных электрохимических задач, содержащих физический интерфейс деформированной сетки. Исследование состоит из двух этапов исследования: шаг исследования «Инициализация распределения тока», который решает только потенциальные поля, за которым следует этап исследования, зависящий от времени, для которого поле, вычисленное на первом этапе исследования, используется в качестве начальных значений.
topicdescr_study/timedependentwithinitializationfixedgeometry = [Электрохимические исследования и этапы исследования] Исследование «Зависимость от времени с инициализацией и фиксированной геометрией» используется для решения нестационарных электрохимических задач, содержащих физический интерфейс «Деформированная сетка». Исследование состоит из двух этапов исследования: шаг исследования «Инициализация распределения тока», на котором решаются только потенциальные поля, за которым следует этап исследования «Зависящая от времени, фиксированная геометрия», для которого поле, вычисленное на первом этапе исследования, используется в качестве начальных значений. Исследование отключает решение переменных, зависящих от деформированной геометрии, на обоих этапах исследования, тем самым сохраняя пространственную структуру фиксированной в пространстве.
topicdescr_study/timediscrete = [Типы исследования]На этапе исследования дискретного времени добавляется решатель дискретного времени. Используйте его для выполнения временного анализа с использованием метода проекции.
topicdescr_study/frequencytimeperiodic = [Типы исследования]Исследование периодического времени используется для расчета периодического стационарного решения для моделей, использующих физический интерфейс «Плазма, периодическое время» вместе с распределением электромагнитного поля в частотной области.
topicdescr_study/timeperiodic = [Типы исследования]Исследование периодичности времени используется для расчета периодического стационарного решения для моделей с использованием физического интерфейса «Плазма, периодичность времени».
topicdescr_study/timeperiodictotimedependent = [Типы исследования]Исследование «Периодическое исследование в зависимости от времени» используется для преобразования решения из ранее вычисленного исследования периодического времени во временную область.
topicdescr_study/timetofreqfft = [Типы исследования]Исследование БПФ от времени к частоте используется для вычисления быстрых преобразований Фурье из временной области в частотную область.
topicdescr_study/timetofrequencylosses = [Типы исследования]Исследование «Время до потери частоты» используется для расчета потерь в подузле «Расчет потерь». Это исследование обычно добавляется после исследования зависимости от времени. Обратите внимание, что подузел «Расчет потерь» необходимо добавить до расчета исследования зависимости от времени. Исследование «Время до потерь частоты» выполняет прямое БПФ из временной области (вход) в частотную область, которое используется для расчета потерь (выход) на основе эмпирических формул или интеграла по времени от резистивного нагрева.
topicdescr_study/topologyoptimization = Узел исследования «Оптимизация топологии» собирает все настройки, необходимые для решения задач оптимизации топологии.
topicdescr_study/topologyoptimizationfrequencydomainstudy = [Типы исследования] Исследование «Оптимизация топологии, частотная область» используется для оптимизации распределения материала в модели частотной области.
topicdescr_study/topologyoptimizationstationarystudy = [Типы исследования] Стационарное исследование «Оптимизация топологии» используется для оптимизации распределения материала в стационарной модели.
topicdescr_study/transient = [Типы исследования]Исследование зависимости от времени используется, когда переменные поля изменяются с течением времени.\n\nПримеры: В электромагнетике оно используется для расчета переходных электромагнитных полей, включая распространение электромагнитных волн во временной области. В теплопередаче он используется для расчета изменений температуры с течением времени. В механике твердого тела он используется для расчета изменяющейся во времени деформации и движения твердых тел, подверженных временным нагрузкам. В акустике он используется для расчета изменяющегося во времени распространения волн давления. В потоке жидкости он используется для расчета нестационарных полей потока и давления. При транспортировке химических веществ он используется для расчета химического состава с течением времени. В химических реакциях он используется для расчета кинетики реакции и химического состава реагирующей системы.
topicdescr_study/transientfluid = Шаг исследования «Зависит от времени, жидкость» добавляется к исследованию «Зависит от времени, односторонний или переходный процесс, односторонний с инициализацией», которые доступны для интерфейса Fluid–Structure Interaction.
topicdescr_study/transientmapping = [Типы исследования] Исследование «Картирование переходных процессов» используется при объединении решения для моделирования больших вихрей (LES) с интерфейсом «Акустика давления в частотной области» с использованием мультифизической связи «Аэроакустическая связь с источником потока».
topicdescr_study/transientmodal = [Типы исследования]Зависимое от времени модальное исследование используется для расчета динамической структурной деформации объекта, подверженного воздействию переходной силы.\n\nИсследование состоит из двух этапов исследования: один этап исследования для расчета собственных частот и собственных мод конструкции, а второй этап исследования для расчета модального режима. ответ. В анализе модальной суперпозиции деформация конструкции представлена ​​линейной комбинацией собственных мод конструкции. Это означает, что частотный состав нагрузок ограничен частотами вычисленных собственных мод. Предполагается, что все нагрузки имеют одинаковые изменения во времени. Модальное исследование, зависящее от времени, обычно приводит к более быстрому вычислению, чем прямое решение с использованием исследования, зависящего от времени.
topicdescr_study/transientmodalreduction = [Типы исследования]Исследование модальной модели пониженного порядка используется для экспорта матриц моделей пониженного порядка.\n\nИсследование состоит из двух этапов исследования: этап исследования собственной частоты для вычисления собственных частот и собственных мод линейной или линеаризованной модели в частотной области, за которым следует этап исследования модальной модели пониженного порядка для экспорта матриц модели пониженного порядка.
topicdescr_study/transientonewayfsi = [Стационарные и зависящие от времени односторонние исследования взаимодействия жидкости со структурой] Одностороннее исследование, зависящее от времени, используется для расчетов зависящего от времени взаимодействия жидкости со структурой, когда структурные деформации настолько малы, что не влияют на поток.\n\nИсследование состоит из двух этапов исследования: этап исследования «Зависит от времени, жидкость», на котором вычисляются поля скорости жидкости и давления, за которым следует этап исследования «Зависит от времени, твердое тело», на котором вычисляется поле деформации твердого тела. Настройки, доступные для двух шагов исследования, такие же, как и для шага исследования, зависящего от времени. Если добавляется дополнительный физический интерфейс, он автоматически добавляется на оба этапа исследования.
topicdescr_study/transientonewayfsiwithinitialization = [Стационарные и зависящие от времени односторонние исследования взаимодействия жидкости со структурой] Зависимое от времени одностороннее исследование с инициализацией используется для расчетов зависящего от времени турбулентного взаимодействия жидкости со структурой, когда структурные деформации настолько малы, что не влияют на поток.\n\nИсследование состоит из трех этапов исследования: шаг исследования «Инициализация расстояния до стены», решение функции расстояния до ближайшей стены, за которым следует этап исследования «Зависит от времени, жидкость», решение для поля жидкости, и, наконец, этап исследования «Зависит от времени, твердое тело», решение для поля деформации твердого тела. Настройки, доступные для шагов исследования, такие же, как и для шага исследования, зависящего от времени. Если добавляется дополнительный физический интерфейс, то он автоматически добавляется к двум последним шагам исследования.
topicdescr_study/transientonewaymf = [Стационарные и односторонние исследования потока влаги, зависящие от времени] Исследование одностороннего потока влаги, зависящего от времени, используется для зависящего от времени потока влаги, где изменения влажности достаточно малы и не влияют на поток, в то время как поток вызывает перенос влаги путем конвекции.\n\nИсследование состоит из двух исследований Шаги: шаг исследования зависимости жидкости от времени, определение полей скорости жидкости и давления, за которым следует этап исследования зависимости от времени, переноса влаги, определение относительной влажности. Настройки, доступные для двух шагов исследования, такие же, как и для шага исследования, зависящего от времени. Если добавляется дополнительный физический интерфейс, он автоматически добавляется на оба этапа исследования.
topicdescr_study/transientonewaynitf = [Стационарные и зависящие от времени односторонние исследования для неизотермического потока]Зависящее от времени одностороннее исследование NITF используется для зависящего от времени неизотермического потока или сопряженной теплопередачи, где изменения температуры достаточно малы, так что они не влияют на поток, в то время как поток вызывает теплообмен за счет convection.\n\nИсследование состоит из двух этапов исследования: этап исследования зависимости жидкости от времени, определение полей скорости и давления жидкости, за которым следует этап исследования зависимости теплопередачи от времени, определение температуры. Настройки, доступные для двух шагов исследования, такие же, как и для шага исследования, зависящего от времени. Если добавляется дополнительный физический интерфейс, он автоматически добавляется на оба этапа исследования.
topicdescr_study/transientonewaywithinitializationmf = [Стационарные и односторонние исследования потока влаги, зависящие от времени] Исследование потока влаги в зависимости от времени, одностороннее с инициализацией используется для расчетов зависящего от времени потока влаги с помощью турбулентной модели, требующей инициализации. В исследовании предполагается, что изменения влажности настолько малы, что они не влияют на поток. \n\nИсследование состоит из инициализации расстояния до стены, за которой следуют два этапа исследования, зависящего от времени. Шаг исследования «Инициализация расстояния до стены» посвящен определению обратного расстояния от стены (то есть обратного расстояния до ближайшей стены). На первом этапе исследования зависимости от времени вычисляются поля скорости жидкости и давления, а на втором — поле относительной влажности.
topicdescr_study/transientonewaywithinitializationnitf = [Стационарные и зависящие от времени односторонние исследования неизотермического потока]Зависящее от времени одностороннее исследование NITF используется для расчетов неизотермических потоков, зависящих от времени, с турбулентной моделью, требующей инициализации. В исследовании предполагается, что изменения температуры настолько малы, что они не влияют на поток. \n\nИсследование состоит из инициализации расстояния до стены, за которой следуют два этапа исследования, зависящего от времени. Шаг исследования «Инициализация расстояния до стены» посвящен определению обратного расстояния от стены (то есть обратного расстояния до ближайшей стены). На первом этапе исследования зависимости от времени вычисляются поля скорости жидкости и давления, а на втором — поле температуры.
topicdescr_study/transientsolid = Шаг исследования «Зависит от времени, твердое тело» добавляется к исследованию «Зависит от времени, односторонний» или «Переходный процесс, односторонний с инициализацией», которые доступны для интерфейса Fluid–Structure Interaction.
topicdescr_study/transientwithinitialization = [Стационарный с инициализацией и зависящий от времени с инициализацией] Исследование «Зависящий от времени с инициализацией» используется для моделирования жидкости в зависимости от времени, требующего вычисления уравнения расстояния перед расчетом расхода жидкости. \n\nИсследование добавляет шаг исследования «Инициализация расстояния до стены», за которым следует шаг исследования «Зависит от времени» в узел «Исследование».
topicdescr_study/transientwithphaseandwalldistanceinitialization = [Зависит от времени с инициализацией] Исследование «Зависит от времени с инициализацией» используется для моделирования двухфазного потока, зависящего от времени, которое требует расчета расстояния до стенки и границы раздела жидкость-жидкость перед расчетом потока.\n\nИсследование добавляет шаг исследования «Инициализация расстояния до стены», за которым следуют шаг исследования «Инициализация фазы» и шаг исследования «Зависимость от времени» в узел «Исследование».
topicdescr_study/transientwithphaseinitialization = [Зависит от времени с фазовой инициализацией] Исследование «Зависит от времени с инициализацией фазы» используется для моделирования двухфазного потока, зависящего от времени, которое требует вычисления расстояния до границы раздела жидкость-жидкость перед расчетом потока. \n\nИсследование добавляет шаг исследования «Инициализация фазы», за которым следует шаг исследования «Зависит от времени» к узлу «Исследование».
topicdescr_study/uncertaintyquantification = Узел «Количественная оценка неопределенности» управляет настройкой исследований количественной оценки неопределенности (UQ).
topicdescr_study/walldistanceinitialization = Шаг исследования «Инициализация расстояния до стены» добавляется к исследованию «Стационарный режим с инициализацией», используемому для моделей стационарного турбулентного потока, требующих инициализации. Этот этап исследования посвящен определению расстояния обратной стены (то есть обратного расстояния до закрытой стены).
topicdescr_study/wavelength = [Типы исследования]Исследование области длины волны используется для расчета реакции линейной или линеаризованной модели, подвергнутой гармоническому возбуждению для одной или нескольких длин волн.\n\nПример: При распространении электромагнитных волн оно используется для расчета передачи и отражения структуры в зависимости от длины волны. Исследование области длины волны учитывает влияние всех собственных мод, которые правильно разрешаются сеткой, и то, как они сочетаются с приложенными возбуждениями. Результаты исследования области длины волны обычно отображаются в виде передаточной функции, например, зависимости величины или фазы параметров рассеяния от длины волны.

