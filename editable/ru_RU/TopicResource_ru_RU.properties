topicdescr_physics/separator = [Сепаратор]Уравнения предметной области для электролита с пористостью.
topicdescr_physics/fc_separator = [Сепаратор] Устанавливает область сепаратора, который обычно используется для разделения двух газоэлектролитных отсеков топливного элемента на основе жидкого электролита.
