topicdescr/multiphysicsnonisothermalreactingflowkeps = [Неизотермический реагирующий поток, k-ε Интерфейс] Неизотермический реагирующий турбулентный поток, k-ε мультифизический интерфейс используется для имитации потока в турбулентном режиме, связанном с передачей тепла, переносом видов и реакциями в газе или жидкости, движущейся либо в свободном потоке, либо через промежутки пористой среды. Он сочетает в себе химический, турбулентный поток, k-ε, теплообмен и транспорт концентрированных видов интерфейсов.\n\n Мультифизические связи учитывают тепло реакции, диффузию энтальпии, способствующие массовым потокам и применяют моделирование турбулентности для теплового и массового транспорта. Кроме того, учитывается температурная зависимость химических и жидких свойств.\n\n Интерфейс может использоваться для стационарного и зависящего от времени анализа в 2D, 2D аксисимметрии и 3D геометрии.
