topicdescr/multiphysicsfluidsolidinteractionviscoelasticflow = [Взаимодействие с твердой жидкостью, интерфейс вязкоупругого потока] Интерфейс мультифизики Fluid–Solid Interaction, Viscoelastic Flow используется для моделирования явлений, когда деформируемое твердое тело и жидкость, проявляющие комбинацию вязкого и эластичного поведения, влияют друг на друга. Интерфейс моделирует как флюидный область, так и твердый область и включает в себя предварительно заданное условие для взаимодействия на флюидно-твердых границах. Формулировка ALE используется для включения геометрических изменений флюидного области.\n\n Интерфейс Viscoelastic Flow решает уравнение непрерывности для сохранения массы и уравнение Навье-Стокса с дополнительным термином упругого напряжения для сохранения импульса. Для вычисления тензора дополнительного напряжения имеется ряд предопределенных конститутивных отношений. Твердый область имеет все функциональные возможности, доступные в интерфейсе механика твердого тела, включая условия контакта, а также нелинейные материалы, если доступен модуль нелинейных структурных материалов или модуль геомеханики.
topicdescr/multiphysicsfluidsolidinteractionviscoelasticflowfixedgeometry = [Интерфейс «Взаимодействие жидкости и твердого тела, вязкоупругий поток, фиксированная геометрия]Мультифизический интерфейс Fluid–Твердое взаимодействие, вязкоупругий поток, фиксированная геометрия используется для моделирования явлений, в которых деформируемое твердое тело и жидкость, демонстрирующая сочетание вязкого и упругого поведения, влияют друг на друга. Можно учитывать как нагрузку жидкости на конструкцию, так и передачу скорости конструкции жидкости. Интерфейс моделирует ситуации, когда смещения твердого тела считаются достаточно малыми, чтобы геометрию жидкой области можно было считать фиксированной во время взаимодействия.\n\nИнтерфейс Viscoelastic Flow решает уравнение неразрывности для сохранения массы и уравнение Навье-Стокса с дополнительным членом упругого напряжения для сохранения импульса. Для расчета тензора дополнительных напряжений доступен ряд предопределенных определяющих соотношений. Область твердого тела обладает всеми функциями, доступными в интерфейсе «Механика твердого тела», включая условия контакта, а также нелинейные материалы, если доступен модуль «Нелинейные конструкционные материалы» или модуль «Геомеханика».
