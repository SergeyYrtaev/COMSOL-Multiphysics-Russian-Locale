topicdescr/multiphysicsrotatingmachinerymixturemodelv2f = [Вращающаяся машина, модель смеси, интерфейс v2-f] Турбулентный поток, v2-f версия вращающихся машин, смешанная модель интерфейсов используется для моделирования дисперсных многофазных потоков при высоких числах Рейнольдса в оборудовании, содержащем одну или несколько вращающихся частей. Диспергированной фазой могут быть пузырьки, жидкие капли или твердые частицы, которые, как предполагается, всегда движутся с конечной скоростью.\n\n Интерфейс Mixture Model, v2-f сочетается с вращающимся областьом под Moving Сетка. Он решает один набор уравнений Навье-Стокса для импульса смеси. Распределение давления рассчитывается из уравнения непрерывности со средним значением смеси, а скорость дисперсной фазы описывается моделью скольжения. Объемная фракция дисперсной фазы отслеживается путем решения транспортного уравнения для объемной фракции. Эффекты турбулентности моделируются с использованием модели v2-f, выраженной в терминах турбулентных относительных флуктуаций (v2 нормализуется на k). Эллиптическая функция используется для смешивания околостенных и объемных терминов в уравнениях модели турбулентности. Модель v2-f представляет собой так называемую модель с низким числом Рейнольдса, что означает, что она может разрешать поток вплоть до стены. Модель v2-f зависит от расстояния до ближайшей стены. Следовательно, физический интерфейс включает уравнение расстояния до стены. Физический интерфейс также может моделировать распределение плотности чисел, которое может быть использовано для расчета межфазной области, полезной при моделировании химических реакций в смеси.\n\n Существуют два типа исследований, доступных для этого физического интерфейса. Используя тип исследования, зависящий от времени, вращение достигается за счет движущейся функциональности сетки, также известной как скользящая сетка. Используя исследование Frozen Rotor, вращающиеся части замораживаются в положении, а вращение объясняется включением центробежных и кориолисовых сил.
topicdescr/multiphysicsrotatingmachinerynonisothermalflow = [Вращающаяся машина, неизотермический поток, интерфейс ламинарного потока] Версия ламинарное течение интерфейсов Rotating Machinery, неизотермическое течение multiphysics используется для имитации связи между ламинарным потоком и теплообменом в геометрии с одной или несколькими вращающимися частями.\n\n Он объединяет интерфейсы теплопередачи в жидкостях и ламинарном потоке и добавляет вращающийся область под движущейся сеткой. Неизотермический поток мультифизической связи автоматически добавляется. Он соединяет интерфейсы теплопередачи и потока и предоставляет опции для включения нагрева потока в модель. Физический интерфейс может использоваться для имитации потоков жидкости, где свойства жидкости зависят от температуры. Модели также могут включать теплопередачу в твердых телах, стационарное и вращающееся, а также излучение от поверхности к поверхности и излучение в участвующих средах с модулем теплопередачи. Физический интерфейс поддерживает низкие числа Маха (обычно менее 0,3), а также неньютоновские жидкости. В интерфейсе ламинарное течение узел Fluid Properties по умолчанию активен на всем выборе интерфейса. Выбор области интерфейса потока может быть отредактирован, если модель содержит твердые области.\n\n Существуют два типа исследования для этого физического интерфейса. Используя тип исследования, зависящий от времени, вращение достигается за счет движущейся функциональности сетки, также известной как скользящая сетка. Используя тип исследования Frozen Rotor, вращающиеся части замораживаются в положении, а вращение объясняется включением центробежных и кориолисовых сил.
