topicdescr/multiphysicsfluidsolidinteractionviscoelasticflowsme = [Взаимодействие с твердой жидкостью, интерфейс вязкоупругого потока] Интерфейс мультифизики Fluid–Solid Interaction, Viscoelastic Flow используется для моделирования явлений, когда деформируемое твердое тело и жидкость, проявляющие комбинацию вязкого и эластичного поведения, влияют друг на друга. Интерфейс моделирует как флюидный область, так и твердый область и включает в себя предварительно заданное условие для взаимодействия на флюидно-твердых границах. Формулировка ALE используется для включения геометрических изменений флюидного области.\n\n Интерфейс Viscoelastic Flow решает уравнение непрерывности для сохранения массы и уравнение Навье-Стокса с дополнительным термином упругого напряжения для сохранения импульса. Для вычисления тензора дополнительного напряжения имеется ряд предопределенных конститутивных отношений. Твердый область имеет все функциональные возможности, доступные в интерфейсе механика твердого тела, включая условия контакта, а также нелинейные материалы, если доступен модуль нелинейных структурных материалов или модуль геомеханики.
topicdescr/multiphysicsfluidstructureinteraction = [Ветка взаимодействия жидкости и конструкции]Ветка Fluid–Structure Interaction содержит мультифизические интерфейсы, которые сочетают в себе структурную механику и гидродинамику. На конструкцию действуют нагрузки от жидкости, а структурные деформации влияют на течение жидкости.
topicdescr/multiphysicsfluidstructureinteractionconjugateheattransfer = [Взаимодействие жидкостной структуры, сопряженные интерфейсы теплопередачи] Ветвь Fluid–Structure Interaction, Conjugate теплопередача содержит мультифизические интерфейсы, которые объединяют уравнения структурной механики с уравнениями для ламинарного или турбулентного потока и связывают их с передачей тепла в твердых телах и жидкостях. 
topicdescr/multiphysicsfluidstructureinteractionconjugateheattransfersme = [Взаимодействие жидкостной структуры, сопряженные интерфейсы теплопередачи] Ветвь Fluid–Structure Interaction, Conjugate теплопередача содержит мультифизические интерфейсы, которые объединяют уравнения структурной механики с уравнениями для ламинарного или турбулентного потока и связывают их с передачей тепла в твердых телах и жидкостях. 
topicdescr/multiphysicsfluidstructureinteractionsme = [Ветка взаимодействия жидкости и конструкции]Ветка Fluid–Structure Interaction содержит мультифизические интерфейсы, которые сочетают в себе структурную механику и гидродинамику. На конструкцию действуют нагрузки от жидкости, а структурные деформации влияют на течение жидкости.
topicdescr/multiphysicsfluidstructureinteractiontwophaseflow = [Взаимодействие жидкости со структурой, двухфазный поток, интерфейсы фазового поля]Ветка Fluid–Structure Interaction, Two-Phase Flow, Phase Field содержит мультифизические интерфейсы, которые сочетают в себе структурную механику с ламинарным или турбулентным потоком двух несмешивающихся жидкостей. Граница раздела двух жидкостей отслеживается методом фазового поля. 
topicdescr/multiphysicsfluidstructureinteractiontwophaseflowsme = [Взаимодействие жидкости со структурой, двухфазный поток, интерфейсы фазового поля]Ветка Fluid–Structure Interaction, Two-Phase Flow, Phase Field содержит мультифизические интерфейсы, которые сочетают в себе структурную механику с ламинарным или турбулентным потоком двух несмешивающихся жидкостей. Граница раздела двух жидкостей отслеживается методом фазового поля. 
topicdescr/multiphysicsfluidstructureinteractionviscoelasticflow = [Взаимодействие жидкостной структуры, интерфейсы вязкоупругих потоков] Ветвь Fluid–Structure Interaction, Viscoelastic Flow содержит мультифизические интерфейсы, которые объединяют уравнения структурной механики с уравнениями для вязкоупругого ламинарного потока. 
topicdescr/multiphysicsfluidstructureinteractionviscoelasticflowsme = [Взаимодействие жидкостной структуры, интерфейсы вязкоупругих потоков] Ветвь Fluid–Structure Interaction, Viscoelastic Flow содержит мультифизические интерфейсы, которые объединяют уравнения структурной механики с уравнениями для вязкоупругого ламинарного потока. 
topicdescr/multiphysicsfreeandporousmediaflow = [Поток свободной и пористой среды, интерфейс Дарси] Интерфейс Дарси «Поток свободной и пористой среды», интерфейс Дарси сочетает в себе интерфейсы закона Дарси’s и ламинарного потока и используется для расчета полей скорости жидкости и давления в однофазном потоке, где свободный поток связан с потоком через пористую среду. Физический интерфейс подходит для ситуаций, когда как свободное течение, так и течение в пористой среде являются ламинарными.\n\nФизический интерфейс можно использовать для стационарного и нестационарного анализа.
topicdescr/multiphysicsheatandmoistureflow = [Тепло и влажность, интерфейс ламинарного потока] Многофизический интерфейс Laminar Heat and Moisture Flow используется для имитации переноса тепла и влаги в воздухе ламинарным потоком. Поток жидкости может быть либо свободным потоком, либо потоком в пористой среде.\n\n Он сочетает в себе теплопередачу во влажном воздухе, транспорт влаги в воздухе и интерфейсы ламинарное течение. Тепло и влага, неизотермический поток и мультифизические соединения потока влаги автоматически добавляются, соединяя интерфейсы теплопередачи, переноса влаги и потока жидкости. Свойства жидкости могут зависеть от концентрации пара. Модели также могут включать в себя транспорт тепла и влаги в строительных материалах. Физический интерфейс поддерживает низкие числа Маха (обычно менее 0,3).\n\nстационарный и моделирование временных областей поддерживаются в 2D, 2D аксисимметрии и 3D геометрии.
topicdescr/multiphysicsheatandmoistureflowbrinkman = [Интерфейс «Поток тепла и влаги, уравнения Бринкмана»]Мультифизический интерфейс «Поток тепла и влаги, уравнения Бринкмана» используется для моделирования теплопередачи и переноса влаги во влажных пористых средах с помощью уравнений Бринкмана.\n\nОн сочетает в себе интерфейсы «Теплопередача во влажных пористых средах», «Перенос влаги в пористых средах» и «Уравнения Бринкмана». Мультифизические связи «Тепло и влага», «Неизотермический поток» и «Влажный поток» добавляются автоматически, связывая интерфейсы теплопередачи, переноса влаги и потока жидкости. Транспортные свойства могут зависеть от концентрации паров в воздухе. Модели также могут учитывать перенос тепла и влаги в строительных материалах.\n\nСтационарное моделирование и моделирование во временной области поддерживаются в 2D, 2D осесимметричной и 3D геометрии.
topicdescr/multiphysicsheatandmoistureflowturbulentalgebraicyplus = (перенаправлено с «Algebraic yPlus Interface») Turbulent Heat and Moisture Flow, мультифизический интерфейс Algebraic yPlus используется для имитации переноса тепла и влаги в воздухе турбулентным потоком.\n\n Он сочетает в себе теплообмен во влажном воздухе, влажный транспорт в воздухе и турбулентный поток, алгебраические интерфейсы yPlus. Тепло и влага, неизотермический поток и мультифизические соединения потока влаги автоматически добавляются, соединяя интерфейсы теплопередачи, переноса влаги и потока жидкости. Свойства жидкости могут зависеть от температуры и концентрации пара. Модели также могут включать в себя транспорт тепла и влаги в строительных материалах. Физический интерфейс поддерживает низкие числа Маха (обычно менее 0,3).\n\nстационарный и моделирование временных областей поддерживаются в 2D, 2D аксисимметрии и 3D геометрии.
topicdescr/multiphysicsheatandmoistureflowturbulentkeps = [Интерфейс «Турбулентный поток», k-ε]Мультифизический интерфейс «Турбулентный поток тепла и влаги», k-ε используется для моделирования переноса тепла и влаги в воздухе турбулентным потоком.\n\nОн сочетает в себе теплообмен во влажном воздухе, перенос влаги в воздухе и турбулентный поток, интерфейсы k-ε. Мультифизические связи «Тепло и влага», «Неизотермический поток» и «Влажный поток» добавляются автоматически, связывая интерфейсы теплопередачи, переноса влаги и потока жидкости. Свойства жидкости могут зависеть от температуры и концентрации пара. Модели также могут учитывать перенос тепла и влаги в строительных материалах. Физический интерфейс поддерживает низкие числа Маха (обычно менее 0,3).\n\nСтационарное моделирование и моделирование во временной области поддерживаются в 2D, 2D осесимметричной и 3D геометрии.
topicdescr/multiphysicsheatandmoistureflowturbulentkom = [Интерфейс «Турбулентный поток», k-ω]Мультифизический интерфейс «Турбулентный поток тепла и влаги», k-ω используется для моделирования переноса тепла и влаги в воздухе турбулентным потоком.\n\nОн сочетает в себе теплообмен во влажном воздухе, перенос влаги в воздухе и турбулентный поток, интерфейсы k-ω. Мультифизические связи «Тепло и влага», «Неизотермический поток» и «Влажный поток» добавляются автоматически, связывая интерфейсы теплопередачи, переноса влаги и потока жидкости. Свойства жидкости могут зависеть от температуры и концентрации пара. Модели также могут учитывать перенос тепла и влаги в строительных материалах. Физический интерфейс поддерживает низкие числа Маха (обычно менее 0,3).\n\nСтационарное моделирование и моделирование во временной области поддерживаются в 2D, 2D осесимметричной и 3D геометрии.
topicdescr/multiphysicsheatandmoistureflowturbulentlowrekeps = [Турбулентный поток, Low Re k-ε Интерфейс]Турбулентный тепловой и влажный поток, Low Re k-ε мультифизический интерфейс используется для имитации переноса тепла и влаги в воздухе турбулентным потоком.\n\n Он сочетает в себе теплопередачу во влажном воздухе, транспортировку влаги в воздухе и турбулентный поток, интерфейсы Low Re k-ε. Тепло и влага, неизотермический поток и мультифизические соединения потока влаги автоматически добавляются, соединяя интерфейсы теплопередачи, переноса влаги и потока жидкости. Свойства жидкости могут зависеть от температуры и концентрации пара. Модели также могут включать в себя транспорт тепла и влаги в строительных материалах. Физический интерфейс поддерживает низкие числа Маха (обычно менее 0,3).\n\nстационарный и моделирование временных областей поддерживаются в 2D, 2D аксисимметрии и 3D геометрии.
topicdescr/multiphysicsheatandmoistureflowturbulentlvel = [Турбулентный поток, интерфейс L-VEL] Мультифизический интерфейс L-VEL Turbulent Heat and Moisture Flow используется для имитации переноса тепла и влаги в воздухе турбулентным потоком.\n\n Он сочетает в себе теплопередачу во влажном воздухе, влажного транспорта в воздухе и турбулентного потока, L-VEL интерфейсов. Тепло и влага, неизотермический поток и мультифизические соединения потока влаги автоматически добавляются, соединяя интерфейсы теплопередачи, переноса влаги и потока жидкости. Свойства жидкости могут зависеть от температуры и концентрации пара. Модели также могут включать в себя транспорт тепла и влаги в строительных материалах. Физический интерфейс поддерживает низкие числа Маха (обычно менее 0,3).\n\nстационарный и моделирование временных областей поддерживаются в 2D, 2D аксисимметрии и 3D геометрии.
topicdescr/multiphysicsheatandmoistureflowturbulentrkeps = [The турбулентное течение, Realizable k-εInterface]The Turbulent Heat and Moisture Flow, Realizable k-ε multiphysics interface is used to simulate heat transfer and moisture transport in air byturbulent flow.\n\n Он сочетает в себе теплопередачу во влажном воздухе, транспортировку влаги в воздухе и турбулентный поток, реализуемые интерфейсы k-ε. Тепло и влага, неизотермический поток и мультифизические соединения потока влаги автоматически добавляются, соединяя интерфейсы теплопередачи, переноса влаги и потока жидкости. Свойства жидкости могут зависеть от температуры и концентрации пара. Модели также могут включать в себя транспорт тепла и влаги в строительных материалах. Физический интерфейс поддерживает низкие числа Маха (обычно менее 0,3).\n\nстационарный и моделирование временных областей поддерживаются в 2D, 2D аксисимметрии и 3D геометрии.
topicdescr/multiphysicsheatandmoistureflowturbulentspalartallmaras = (перенаправлено с «The турбулентное течение, Spalart-Allmaras Interface») Турбулентный тепловой и влажный поток, мультифизический интерфейс Спаларта-Альмараса используется для имитации переноса тепла и влаги в воздухе турбулентным потоком.\n\n Он сочетает в себе теплопередачу во влажном воздухе, влажный транспорт в воздухе и турбулентный поток, интерфейсы Spalart-Allmaras. Тепло и влага, неизотермический поток и мультифизические соединения потока влаги автоматически добавляются, соединяя интерфейсы теплопередачи, переноса влаги и потока жидкости. Свойства жидкости могут зависеть от температуры и концентрации пара. Модели также могут включать в себя транспорт тепла и влаги в строительных материалах. Физический интерфейс поддерживает низкие числа Маха (обычно менее 0,3).\n\nстационарный и моделирование временных областей поддерживаются в 2D, 2D аксисимметрии и 3D геометрии.
topicdescr/multiphysicsheatandmoistureflowturbulentsst = [Турбулентный поток, интерфейс SST] Многофизический интерфейс Turbulent Heat and Moisture Flow, SST используется для имитации переноса тепла и влаги в воздухе турбулентным потоком.\n\n Он сочетает в себе теплопередачу во влажном воздухе, транспорт влаги в воздухе и турбулентный поток, интерфейсы SST. Тепло и влага, неизотермический поток и мультифизические соединения потока влаги автоматически добавляются, соединяя интерфейсы теплопередачи, переноса влаги и потока жидкости. Свойства жидкости могут зависеть от температуры и концентрации пара. Модели также могут включать в себя транспорт тепла и влаги в строительных материалах. Физический интерфейс поддерживает низкие числа Маха (обычно менее 0,3).\n\nстационарный и моделирование временных областей поддерживаются в 2D, 2D аксисимметрии и 3D геометрии.
topicdescr/multiphysicsheatandmoistureflowturbulentv2f = (перенаправлено с «The турбулентное течение, v2-f Interface») Turbulent Heat and Moisture Flow, v2-f multiphysics interface используется для имитации переноса тепла и влаги в воздухе турбулентным потоком.\n\n Он сочетает в себе теплообмен во влажном воздухе, влажный транспорт в воздухе и турбулентный поток, интерфейсы v2-f. Тепло и влага, неизотермический поток и мультифизические соединения потока влаги автоматически добавляются, соединяя интерфейсы теплопередачи, переноса влаги и потока жидкости. Свойства жидкости могут зависеть от температуры и концентрации пара. Модели также могут включать в себя транспорт тепла и влаги в строительных материалах. Физический интерфейс поддерживает низкие числа Маха (обычно менее 0,3).\n\nстационарный и моделирование временных областей поддерживаются в 2D, 2D аксисимметрии и 3D геометрии.
topicdescr/multiphysicsheatandmoisturetransport = [Строительные материалы] Эта версия мультифизического интерфейса Heat and Moisture Transport сочетает в себе интерфейсы теплопередача in Building Materials и Moisture Transport in Building Materials. Узел мультифизики тепла и влаги автоматически добавляется в интерфейсы парных тезисов.\n\n Используется для имитации связи между передачей тепла и переносом влаги в строительных материалах.\n\n Он учитывает хранение тепла и влаги, скрытые тепловые эффекты, а также жидкий и конвективный транспорт влаги. Кроме того, температурная зависимость свойств влаги автоматически учитывается.\n\nстационарный и моделирование временной области поддерживаются во всех пространственных измерениях.
topicdescr/multiphysicsheatandmoisturetransportinair = [Влажный воздух] Эта версия мультифизического интерфейса Heat and Moisture Transport сочетает в себе интерфейсы теплопередача in Fluids и Moisture Transport in Air. Узел мультифизики тепла и влаги автоматически добавляется к интерфейсам парных тезисов.\n\n Используется для имитации связи между передачей тепла и переносом пара в воздухе.\n\nстационарный и моделирование временных областей поддерживаются во всех пространственных измерениях.
topicdescr/multiphysicsheatandmoisturetransportinporousmedia = [Влажные пористые СМИ] Эта версия мультифизического интерфейса Heat and Moisture Transport сочетает в себе теплопередачу во влажных пористых средах и транспорт влаги в интерфейсах Porous Media. Узел мультифизики тепла и влаги автоматически добавляется к интерфейсам парных тезисов.\n\n Используется для имитации связи между передачей тепла и переносом влаги в жидкой и газовой фазах в порах среды.\n\nстационарный и моделирование временных областей поддерживаются во всех пространственных измерениях.
topicdescr/multiphysicsheattransferwithphasetransformations = [Теплопередача с фазовыми преобразованиями] Теплообмен с мультифизическим интерфейсом фазовых преобразований сочетает теплообмен в твердых телах с металлической фазовой трансформацией. Используется для моделирования металлургических фазовых преобразований при тепловой нагрузке. При добавлении мультифизического интерфейса включается мультифизическая связь с фазой преобразования латентного тепла.
topicdescr/multiphysicsheattransferwithradiationinabsorbingscatteringmedia = [Теплопередача с излучением при поглощении медиаинтерфейса рассеяния] Теплообмен с излучением в интерфейсе Absorbing-Scattering Media используется для моделирования теплопередачи по проводимости, конвекции и излучению, включая излучение в абсорбирующих-рассеивающих (полупрозрачных) средах.\n\nA Твердая модель активна по умолчанию на всех областих, а также доступна вся функциональность для включения других моделей теплопередачи, таких как Fluid.\n\n Уравнения интенсивности излучения, определенные в медиаобластих поглощения-рассеивания, соответствуют уравнениям метода приближения P1 или дискретных ординат в зависимости от выбранного метода дискретизации.\n\nстационарный, временной области и частотно-областьному моделированию поддерживаются во всех пространственных измерениях.
topicdescr/multiphysicsheattransferwithradiationinparticipatingmedia = [Теплообмен с радиацией в медиаинтерфейсе] Интерфейс теплопередачи с излучением в участвующих средах используется для моделирования теплопередачи по проводимости, конвекции и излучению, включая излучение в участвующих (полупрозрачных) средах.\n\nA Твердая модель активна по умолчанию на всех областих, а также доступна вся функциональность для включения других моделей теплопередачи, таких как Fluid.\n\n Уравнения радиационной интенсивности, определенные в участвующих медиа-областих, соответствуют уравнениям метода приближения P1 или дискретных ординат в зависимости от выбранного метода дискретизации.\n\nстационарный, временной области и частотно-областьному моделированию поддерживаются во всех пространственных измерениях.
topicdescr/multiphysicsheattransferwithradiativebeaminabsorbingmedia = [Теплопередача с лучом излучения в абсорбирующем медиаинтерфейсе] Теплообмен с радиационным лучом в интерфейсе Absorbing Media используется для моделирования теплопередачи проводимостью, конвекцией и излучением за счет распространения и поглощения коллимированных радиационных лучей, таких как лазеры, внутри частично прозрачных носителей.\n\nA Твердая модель активна по умолчанию на всех областих. Также доступна вся функциональность для включения других моделей теплопередачи, таких как Fluid.\n\n Уравнение интенсивности излучения, определяемое в поглощающих медиаобластих, соответствует закону Пива-Ламберта.\n\nстационарный и моделирование временных областей поддерживаются во всех пространственных измерениях.
topicdescr/multiphysicsheattransferwithorbitalthermalloads = [Теплопередача с интерфейсом орбитальных тепловых нагрузок] Интерфейс теплопередачи с орбитальными тепловыми нагрузками используется для моделирования теплопередачи, включая радиационные нагрузки на космические аппараты, в частности излучение от Солнца и Земли для спутников, вращающихся вокруг Земли.\n\nA Твердая модель теплопередачи активна по умолчанию на всех областих, а интерфейс орбитальных тепловых нагрузок определен на всех границах. Последний определяет радиационные свойства космических аппаратов, орбиту и ориентацию, орбитальные маневры и свойства плоскостит. Вся функциональность для включения других моделей теплопередачи, таких как Fluid, также доступна.\n\n Уравнение радиосити, определенное на границах, где включена орбитальная тепловая нагрузка, соответствует уравнению метода радиосити.\n\nМоделирование области времени поддерживается в 3D.
topicdescr/multiphysicsheattransferwithsurfacetosurfaceradiation = [Теплопередача с интерфейсом излучения от поверхности к поверхности]Теплопередача с интерфейсом излучения от поверхности к поверхности используется для моделирования теплопередачи посредством проводимости, конвекции и излучения, включая излучение от поверхности к поверхности.\n\nA Твердая модель теплопередачи активна по умолчанию во всех областих, а интерфейс «Поверхность-поверхность» настроен на смежных границах. Вся функциональность для включения других моделей теплопередачи, таких как Fluid, также доступна.\n\n Уравнение радиосити, определенное на границах, где включено излучение от поверхности к поверхности, соответствует уравнению метода радиосити.\n\nстационарный, моделирование временной области и частотной области поддерживается во всех пространственных измерениях.
topicdescr/multiphysicshighmachnumberreactingflowdilutedspecieslaminar = [The High Mach Number Reacting ламинарное течение Interface] Интерфейс мультифизики Diluted Species используется для имитации переноса разбавленных видов в потоках газа, где величина скорости сравнима со скоростью звука в газе, то есть потоки в трансонном и сверхзвуковом диапазоне.\n\n Он сочетает в себе поток ламинарного числа высокого Маха и интерфейсы физики разбавленных видов. Реакционный поток, разбавленный вид мультифизическая связь, которая добавляется автоматически, соединяет поток жидкости и массовый транспорт. Массовый перенос решает для разработки одного или нескольких растворителей, растворенных в потоке газа в трансонном и сверхзвуковом диапазоне.\n\n Интерфейс может использоваться для стационарного и зависящего от времени анализа в 2D, 2D аксисимметрии и 3D геометрии.
topicdescr/multiphysicshighmachnumberreactingflowdilutedspecieskepsilon = [Интерфейс «Турбулентный поток с высоким числом Маха», k-ε]Мультифизический интерфейс «Разбавленные виды» используется для моделирования переноса разбавленных веществ в газовых потоках в турбулентном режиме, когда величина скорости сравнима со скоростью звука в газ, то есть течет в околозвуковом и сверхзвуковом диапазоне.\n\nОн сочетает в себе физические интерфейсы «Турбулентный поток с высоким числом Маха», «k-ε» и «Перенос разбавленных частиц». Мультифизическая связь «Реагирующий поток, разбавленные виды», добавляемая автоматически, связывает поток жидкости и массоперенос и применяет моделирование турбулентности для массопереноса. Массоперенос решает проблему развития одного или нескольких растворенных веществ в турбулентном потоке газа в трансзвуковом и сверхзвуковом диапазоне.\n\nИнтерфейс можно использовать для стационарного и временного анализа в 2D, 2D осесимметричной и 3D геометрии.
topicdescr/multiphysicshighmachnumberreactingflowdilutedspeciesspalartallmaras = [Интерфейс высокочастотного реакционного турбулентного Spalart Allmaras Flow] Интерфейс мультифизики разбавленных видов Spalart-Allmaras используется для имитации переноса разбавленных видов в газовых потоках в турбулентном режиме, где величина скорости сравнима со скоростью звука в газе, то есть потоки в трансонном и сверхзвуковом диапазоне.\n\n Он сочетает в себе турбулентный поток с высоким числом Маха, Spalart-Allmaras и интерфейсы физики разбавленных видов. Реакционный поток, разбавленный вид, мультифизическая связь, которая добавляется автоматически, соединяет поток жидкости и массовый транспорт и применяет моделирование турбулентности для массового транспорта. Массовый перенос решает задачу разработки одного или нескольких растворителей, растворенных в турбулентном потоке газа в трансонном и сверхзвуковом диапазоне.\n\n Интерфейс может использоваться для стационарного и зависящего от времени анализа в 2D, 2D аксисимметрии и 3D геометрии.
topicdescr/multiphysicshighmachnumberreactingflowlaminar = [Интерфейс ламинарного потока с высоким числом Маха] Многофизический интерфейс High Mach Number Reacting ламинарное течение используется для имитации транспорта и реакции видов в потоках газа, где величина скорости звука сопоставима со скоростью звука в газе, то есть потоки в трансонном и сверхзвуковом диапазоне.\n\n Он сочетает в себе высокочастотный ламинарный интерфейс потока, интерфейс транспорта концентрированных видов и, необязательно, интерфейс химии. Мультифизическая связь, которая добавляется автоматически, соединяет поток жидкости и массовый транспорт с реакциями. Мультифизическая связь учитывает тепло реакции, диффузию энтальпии и способствующие потоки массы. Кроме того, учитывается температурная зависимость химических и жидких свойств.\n\n Интерфейс может использоваться для стационарного и зависящего от времени анализа в 2D, 2D аксисимметрии и 3D геометрии.
topicdescr/multiphysicshighmachnumberreactingflowkepsilon = [The High Mach Number Reacting Turbulent k-εFlow Interface] Интерфейс High Mach Number Reacting турбулентное течение, k-ε multiphysics interface используется для имитации транспорта и реакции видов в потоках газа в турбулентном режиме, где величина скорости сравнима со скоростью звука в газе, то есть потоки в трансонном и сверхзвуковом диапазоне.\n\n Он сочетает в себе турбулентный поток с высоким числом Маха, интерфейс k-ε, интерфейс транспорта концентрированных видов и, необязательно, интерфейс химии. Мультифизическая связь, которая добавляется автоматически, соединяет поток жидкости и массовый транспорт с реакциями. Мультифизическая связь учитывает тепло реакции, диффузию энтальпии, способствуя массовым потокам и применяет моделирование турбулентности для массового транспорта. Кроме того, учитывается температурная зависимость химических и жидких свойств.\n\n Интерфейс может использоваться для стационарного и зависящего от времени анализа в 2D, 2D аксисимметрии и 3D геометрии.
topicdescr/multiphysicshighmachnumberreactingflowspalartallmaras = [Интерфейс турбулентного потока Спаларта Аллмараса с реакционным числом высокого Маха] Интерфейс мультифизики Спаларта-Альмараса используется для имитации транспорта и реакции видов в потоках газа в турбулентном режиме, где величина скорости сравнима со скоростью звука в газе, то есть потоки в трансонном и сверхзвуковом диапазоне.\n\n Он сочетает в себе турбулентный поток с высоким числом Маха, интерфейс Spalart-Allmaras, интерфейс Transport of Concentrated Species и необязательно интерфейс Chemistry. Мультифизическая связь, которая добавляется автоматически, соединяет поток жидкости и массовый транспорт с реакциями. Мультифизическая связь учитывает тепло реакции, диффузию энтальпии, способствуя массовым потокам и применяет моделирование турбулентности для массового транспорта. Кроме того, учитывается температурная зависимость химических и жидких свойств.\n\n Интерфейс может использоваться для стационарного и зависящего от времени анализа в 2D, 2D аксисимметрии и 3D геометрии.
topicdescr/multiphysicsinductionheating = [Интерфейс индукционного нагрева] Мультифизический интерфейс индукционного нагрева используется для моделирования индукционного нагрева и нагрева вихревого тока. Этот мультифизический интерфейс добавляет интерфейс магнитных полей и интерфейс теплопередачи в твердых телах. Мультифизические связи добавляют рассеивание электромагнитной мощности в качестве источника тепла, а свойства электромагнитного материала могут зависеть от температуры.\n\nВ зависимости от лицензированных продуктов, стационарное моделирование временных и частотных областей поддерживается в 2D и 3D. Кроме того, поддерживаются комбинации частотно-областьного моделирования для интерфейса магнитных полей и стационарного моделирования для интерфейса теплопередачи в твердых телах, называемого частотно-стационарным и, аналогично, частотно-переходным моделированием.
topicdescr/multiphysicsinductivelycoupledcoldplasma = [Индуктивно связанный плазменный интерфейс] Индуктивно связанный мультифизический интерфейс плазмы используется для изучения разрядов, которые поддерживаются индукционными токами. Этот мультифизический интерфейс добавляет плазменный интерфейс и интерфейс магнитных полей. Магнитное поле решается в частотной области, а плазма решается во временной области. Мультифизические связи связывают проводимость плазмы с интерфейсом магнитных полей и связывают полученный электронный нагрев из-за индукционных токов обратно в интерфейс плазмы.
topicdescr/multiphysicsinductivelycoupledplasma = [Индуктивно связанный плазменный интерфейс] Индуктивно связанный мультифизический интерфейс плазмы используется для изучения разрядов, которые поддерживаются индукционными токами. Индукционные токи решаются в частотной области. Нагрев электронов за счет индукционных токов автоматически обрабатывается программным обеспечением. С модулем AC/DC этот интерфейс также доступен в 3D. Этот мультифизический интерфейс добавляет плазменный интерфейс и интерфейс магнитных полей. Мультифизические связи соединяют проводимость плазмы с интерфейсом магнитных полей и соединяют полученное нагревание с интерфейсом плазмы.
topicdescr/multiphysicsinductivelycoupledcoldplasmaquasineutral = [Индуктивно связанная плазма, квазинейтральный интерфейс] Индуктивно связанный плазменный, квазинейтральный мультифизический интерфейс используется для изучения разрядов, которые поддерживаются индукционными токами. Этот мультифизический интерфейс добавляет плазменный, квазинейтральный интерфейс и интерфейс магнитных полей. Магнитное поле решается в частотной области, а плазма решается во временной области. Мультифизические связи связывают проводимость плазмы с интерфейсом магнитных полей и связывают полученный электронный нагрев из-за индукционных токов обратно в плазменный, квазинейтральный интерфейс.
topicdescr/multiphysicsinductivelycoupledplasmarfbias = [Индуктивно связанная плазма с интерфейсом RF Bias] Индуктивно связанная плазма с мультифизическим интерфейсом RF Bias используется для изучения разрядов, которые поддерживаются индукционными токами и имеют дополнительное периодическое электрическое возбуждение. Этот мультифизический интерфейс добавляет плазменный, периодический интерфейс времени и интерфейс магнитных полей. Магнитное поле решается для частотной области, а плазма решает для периодического решения. Мультифизические связи соединяют усредненную по времени проводимость плазмы с интерфейсом магнитных полей и соединяют полученный электронный нагрев из-за индукционных токов обратно в плазменный, периодический интерфейс времени.
topicdescr/multiphysicsisothermalreactingflowkeps = [Изотермический реакционный поток, турбулентный поток, k-ε Интерфейс] Изотермический реакционный турбулентный поток, k-ε мультифизический интерфейс используется для имитации потока в турбулентном режиме, связанном с переносом видов в газе или жидкости.\n\n Он объединяет интерфейсы турбулентное течение, k-ε и Transport of Concentrated Species. Мультифизическая связь, которая добавляется автоматически, соединяет поток жидкости и массовый транспорт и применяет моделирование турбулентности для массового транспорта. Видовой транспорт поддерживает как смесь, где концентрации сопоставимы по величине, так и низкоконцентрационные растворители в растворителе.\n\n Интерфейс может использоваться для стационарного и зависящего от времени анализа в 2D, 2D аксисимметрии и 3D геометрии. 
topicdescr/multiphysicsisothermalreactingflowkomega = [Изотермический реакционный поток, турбулентный поток, k-ω Интерфейс] Изотермический реакционный турбулентный поток, k-ω мультифизический интерфейс используется для имитации потока в турбулентном режиме, связанном с переносом видов в газе или жидкости.\n\n Он объединяет интерфейсы турбулентное течение, k-ω и Transport of Concentrated Species. Мультифизическая связь Reacting Flow, которая добавляется автоматически, соединяет поток жидкости и массовый транспорт и применяет моделирование турбулентности для массового транспорта. Видовой транспорт поддерживает как смесь, где концентрации сопоставимы по величине, так и низкоконцентрационные растворители в растворителе.\n\n Интерфейс может использоваться для стационарного и зависящего от времени анализа в 2D, 2D аксисимметрии и 3D геометрии.   
topicdescr/multiphysicsisothermalreactingflowlaminar = [Изотермический реакционный поток, интерфейс ламинарного потока] Многофизический интерфейс изотермического реакционного ламинарного потока используется для имитации ламинарного потока, связанного с переносом видов в газе или жидкости.\n\n Он сочетает в себе ламинарный поток и транспорт концентрированных видов. Мультифизическая связь, которая добавляется автоматически, соединяет поток жидкости и массовый транспорт. Поток жидкости может быть либо свободным потоком, либо потоком в пористой среде. Видовой транспорт поддерживает как смесь, где концентрации сопоставимы по величине, так и низкоконцентрационные растворители в растворителе.\n\n Интерфейс может использоваться для стационарного и зависящего от времени анализа в 2D, 2D аксисимметрии и 3D геометрии.
topicdescr/multiphysicsisothermalreactingflowlowrekeps = [Изотермический реакционный поток, турбулентный поток, Low Re k-ε Интерфейс] Изотермический реакционный турбулентный поток, Low Re k-ε мультифизический интерфейс используется для имитации потока в турбулентном режиме, связанном с переносом видов в газе или жидкости.\n\n Он сочетает в себе турбулентное течение, Low Re k-ε и интерфейсы Transport of Concentrated Species. Мультифизическая связь Reacting Flow, которая добавляется автоматически, соединяет поток жидкости и массовый транспорт и применяет моделирование турбулентности для массового транспорта. Видовой транспорт поддерживает как смесь, где концентрации сопоставимы по величине, так и низкоконцентрационные растворители в растворителе.\n\n Интерфейс может использоваться для стационарного и зависящего от времени анализа в 2D, 2D аксисимметрии и 3D геометрии.
topicdescr/multiphysicsisothermalreactingflowsst = [Изотермический реакционный поток, турбулентный поток, интерфейс SST] Мультифизический интерфейс SST используется для имитации потока в турбулентном режиме, связанном с переносом видов в газе или жидкости.\n\n Он объединяет интерфейсы турбулентное течение, SST и Transport of Concentrated Species. Мультифизическая связь Reacting Flow, которая добавляется автоматически, соединяет поток жидкости и массовый транспорт и применяет моделирование турбулентности для массового транспорта. Видовой транспорт поддерживает как смесь, где концентрации сопоставимы по величине, так и низкоконцентрационные растворители в растворителе.\n\n Интерфейс может использоваться для стационарного и зависящего от времени анализа в 2D, 2D аксисимметрии и 3D геометрии. 
topicdescr/multiphysicsjouleheating = [Интерфейс нагрева Джоуля] Многофизический интерфейс Joule Heating используется для моделирования резистивного нагрева и, в зависимости от лицензированных продуктов, диэлектрического нагрева в устройствах, где индуктивные эффекты незначительны; то есть, когда глубина кожи намного больше, чем изученное устройство. Этот мультифизический интерфейс добавляет интерфейс электрических токов и интерфейс теплопередачи в твердых телах. Мультифизические связи добавляют рассеивание электромагнитной мощности в качестве источника тепла, а свойства электромагнитного материала могут зависеть от температуры.\n\nВ зависимости от лицензированных продуктов, стационарное моделирование временных и частотных областей поддерживается во всех пространственных измерениях. Кроме того, поддерживаются комбинации частотно-областьного моделирования для интерфейса электрических токов и стационарного моделирования для интерфейса теплопередачи в твердых телах, называемого частотно-стационарным и, аналогично, частотно-переходным моделированием.
topicdescr/multiphysicsjouleheatingthermalexpansion = [Интерфейс нагрева и теплового расширения Джоуля] Многофизический интерфейс Joule Heating and Thermal Expansion сочетает в себе тепловые, электрические и структурные мультифизические эффекты. Предопределенное взаимодействие добавляет электромагнитные потери от электрического тока в качестве источника тепла. Кроме того, температура от теплопередачи в интерфейсе Solids действует как тепловая нагрузка для интерфейса механика твердого тела, вызывая тепловое расширение.
topicdescr/multiphysicslaminartwophaseflowlevelset = [Ламинарный двухфазный поток, интерфейс установки уровня]Мультифизический интерфейс «Ламинарный двухфазный поток, установка уровня» используется для отслеживания границы раздела между двумя несмешивающимися жидкостями. Течение предполагается ламинарным; то есть число Рейнольдса от низкого до умеренного.\n\nМультифизический интерфейс объединяет интерфейсы «Ламинарный поток» и «Установка уровня», а мультифизическая связь «Двухфазный поток и набор уровней» добавляется автоматически. Он решает уравнения Навье-Стокса для сохранения импульса и уравнение неразрывности для сохранения массы. Положение интерфейса отслеживается путем решения уравнения переноса для функции уровня.\n\nМоделирование с использованием интерфейса «Ламинарный двухфазный поток, установка уровня» всегда зависит от времени, поскольку положение интерфейса почти всегда зависит от его истории.
topicdescr/multiphysicslaminartwophaseflowmovingmesh = [Интерфейс «Ламинарный двухфазный поток, движущаяся сетка»] Интерфейс «Ламинарный двухфазный поток, движущаяся сетка» используется для моделирования ламинарного потока двух несмешивающихся жидкостей с использованием движущейся сетки для отслеживания положения границы раздела жидкость-жидкость.
topicdescr/multiphysicslaminartwophaseflowphasefield = [Ламинарный двухфазный поток, интерфейс поля фазы] Ламинарный двухфазный поток, многофизический интерфейс поля фазы используется для отслеживания интерфейса между двумя несмешивающимися жидкостями. Поток считается ламинарным, то есть число Рейнольдса от низкого до умеренного. \n\nМультифизический интерфейс объединяет интерфейсы Ламинарного потока и Фазового поля в жидкостях, и автоматически добавляется двухфазная мультифизическая связь Фазового поля. Она решает уравнения Навье-Стокса для сохранения импульса и уравнение непрерывности для сохранения массы. Положение интерфейса отслеживается путем решения двух дополнительных транспортных уравнений, одно для переменной фазового поля и одно для плотности смешивания энергии. Движение поверхности определяется минимизацией свободной энергии.\n\nСимуляции с использованием Ламинарного двухфазного потока, интерфейс Фазового поля всегда зависят от времени, поскольку положение интерфейса почти всегда зависит от его истории. 
topicdescr/multiphysicslaserheating = [Мультифизический интерфейс лазерного нагревания] Многофизический интерфейс лазерного нагрева используется для моделирования электромагнитного нагрева для систем и устройств, где амплитуда электрического поля медленно изменяется в масштабе длины волны. Этот мультифизический интерфейс добавляет электромагнитные волны, интерфейс Beam Envelopes и интерфейс теплопередачи в твердых телах. Мультифизические связи добавляют электромагнитные потери от электромагнитных волн в качестве источника тепла, а свойства электромагнитного материала могут зависеть от температуры. Подход к моделированию основан на предположении, что время электромагнитного цикла коротко по сравнению с тепловой временной шкалой.\n\n Комбинации частотно-областьного моделирования для электромагнитных волн, интерфейса Beam Envelopes и стационарного моделирования для интерфейса теплопередачи в твердых телах, называемого частотно-стационарным и, аналогично, частотно-переходным моделированием, поддерживаются в 2D и 3D. Моделирование частотной области также доступно для обоих интерфейсов.
topicdescr/multiphysicslithiumionbatterydeformedgeometry = [Литий-ионная батарея, деформированный геометрический интерфейс] Литий-ионная батарея, деформированный геометрический интерфейс используется для расчета потенциального распределения, распределения тока и геометрических изменений в литий-ионной батарее. Он сочетает в себе интерфейс литий-ионной батареи с формулой деформированной геометрии.
topicdescr/multiphysicsmagneticelasticinteractionrotatingmachinery = [Магнитно-упругое взаимодействие в вращающемся машинном интерфейсе] Magnetic–Elastic Interaction in Rotating Machinery multiphysics interface сочетает в себе механика твердого тела и Rotating Machinery, магнитные интерфейсы вместе с движущейся функциональностью сетки для моделирования деформации вращающихся магнитных структур машин.
topicdescr/multiphysicsmagneticrigidbodyinteractionrotatingmachinery  = [Взаимодействие магнитно-резистентного тела с вращающимся машинным интерфейсом] Магнитный– Жесткое взаимодействие тела в мультифизическом интерфейсе вращающейся машины объединяет мультителодинамику и вращающуюся машину, магнитные интерфейсы вместе с движущейся функциональностью сетки для моделирования деформации вращающихся магнитных структур машин.
topicdescr/multiphysicsmagnetomechanics = [Интерфейс магнитомеханики] Интерфейс мультифизики магнитомеханики объединяет интерфейсы механика твердого тела и магнитные поля вместе с движущейся функциональностью сетки для моделирования деформации магнитно приводимых в действие структур.
topicdescr/multiphysicsmagnetomechanicsinterface = [Ветвь магнитомеханики] Ветвь магнитомеханики содержит физические интерфейсы для моделирования магнитомеханических сил в твердых телах.
topicdescr/multiphysicsmagnetomechanicsnocurrents = [Магнетомеханика, Интерфейс токов отсутствует] Интерфейс Magnetomechanics, No Currents multiphysics объединяет механика твердого тела и магнитные поля, No Currents интерфейсы вместе с движущейся функциональностью сетки для моделирования деформации магнитостатически приводимых в действие структур.
topicdescr/multiphysicsmagnetohydrodynamics = [Интерфейс магнитогидродинамики] Интерфейс магнитогидродинамики используется для моделирования взаимодействия между движущимися проводящими жидкостями и магнитными полями.
topicdescr/multiphysicsmagnetohydrodynamicsoutofplanecurrents = [Интерфейс токов вне плоскости, магнитогидродинамика] Интерфейс магнитогидродинамики, токов вне плоскости используется для моделирования взаимодействия между движущимися проводящими жидкостями и магнитными полями в 2D, где электрические токи находятся вне плоскости.
topicdescr/multiphysicsmagnetohydrodynamicsinplanecurrents = [Магнетогидродинамика, интерфейс токов в плоскости] Интерфейс магнитогидродинамики, токов в плоскости используется для моделирования взаимодействия между движущимися проводящими жидкостями и магнитными полями в 2D, где электрические токи находятся в плоскости.
topicdescr/multiphysicsmagnetostrictioninterface = [Ветвь магнитострикции] Ветвь магнитострикции содержит физические интерфейсы для моделирования линейных и нелинейных магнитострикционных материалов и устройств.
topicdescr/multiphysicsmicrowavecoldplasma = [Микроволновый плазменный интерфейс] Многофизический интерфейс микроволновой плазмы используется для изучения разрядов, которые поддерживаются электромагнитными волнами (разряды с волновым нагревом). Этот мультифизический интерфейс добавляет плазменный интерфейс и интерфейс электромагнитных волн. Электромагнитные волны решаются в частотной области, а плазма – во временной. Мультифизические связи соединяют проводимость плазмы с интерфейсом электромагнитных волн и соединяют полученный электронный нагрев обратно в интерфейс плазмы.
topicdescr/multiphysicsmicrowavecoldplasmaquasineutral = [Микроволновая плазма, квазинейтральный интерфейс] Микроволновая плазма, квазинейтральный мультифизический интерфейс используется для изучения разрядов, которые поддерживаются электромагнитными волнами (разряды с волновым нагревом). Этот мультифизический интерфейс добавляет плазменный, квазинейтральный интерфейс и интерфейс электромагнитных волн. Электромагнитные волны решаются в частотной области, а плазма – во временной. Мультифизические связи соединяют проводимость плазмы с интерфейсом электромагнитных волн и соединяют полученный электронный нагрев обратно в плазменный, квазинейтральный интерфейс.
topicdescr/multiphysicsmicrowaveheating =[Интерфейс микроволнового нагрева] Многофизический интерфейс Microwave Heating используется для моделирования электромагнитного нагрева для систем и устройств, которые находятся в масштабе от 1/10 длины волны до, в зависимости от доступной памяти компьютера, около 10 длин волн. Этот мультифизический интерфейс добавляет электромагнитные волны, интерфейс частотного области и интерфейс теплопередачи в твердых телах. Мультифизические связи добавляют электромагнитные потери от электромагнитных волн в качестве источника тепла, а свойства электромагнитного материала могут зависеть от температуры. Подход к моделированию основан на предположении, что время электромагнитного цикла коротко по сравнению с тепловой временной шкалой.\n\nКомбинации частотно-областьного моделирования для электромагнитных волн, интерфейса частотного области и стационарного моделирования для интерфейса теплопередачи в твердых телах, называемые частотно-стационарным и, аналогично, частотно-транзиентным моделированием, поддерживаются в 2D и 3D. Моделирование частотной области также доступно для обоих интерфейсов.
topicdescr/multiphysicsmicrowaveplasma = [Микроволновый плазменный интерфейс] Многофизический интерфейс микроволновой плазмы подходит для изучения разрядов, которые поддерживаются электромагнитными волнами (разряды с волновым нагревом). Нагрев электронов за счет их взаимодействия с электромагнитными волнами автоматически обрабатывается программным обеспечением. Электромагнитные волны решаются в частотной области. Этот мультифизический интерфейс добавляет плазменный интерфейс и интерфейс электромагнитных волн.
topicdescr/multiphysicsmixturemodel = [Модель фазовой транспортной смеси, интерфейс ламинарного потока] Интерфейс мультифизической модели фазовой транспортной смеси Ламинарный поток используется для имитации связи между фазовым транспортом и потоком жидкости.\n\n Он сочетает в себе интерфейсы Phase Transport и ламинарное течение. Мультифизическая связь Mixture Model добавляется автоматически. Он соединяет интерфейсы фазового транспорта и потока и предоставляет варианты для различных моделей вязкости смеси и скорости скольжения. Физический интерфейс поддерживает низкие числа Маха (обычно менее 0,3).\n\nстационарный modeling и моделирование временных областей поддерживаются в 2D, 2D аксисимметрии и 3D геометрии.
topicdescr/multiphysicsmixturemodelalgebraicyplus = [Модель фазовой транспортной смеси, алгебраический интерфейс yPlus]Турбулентный поток фазовой транспортной смеси, мультифизический интерфейс алгебраической yPlus используется для имитации связи между фазовым транспортом и потоком жидкости.\n\n Сочетает в себе интерфейсы Phase Transport и турбулентное течение, Algebraic yPlus. Мультифизическая связь Mixture Model добавляется автоматически. Он соединяет интерфейсы фазового транспорта и потока и предоставляет варианты для различных моделей вязкости смеси и скорости скольжения. Физический интерфейс поддерживает низкие числа Маха (обычно менее 0,3).\n\nстационарный modeling и моделирование временных областей поддерживаются в 2D, 2D аксисимметрии и 3D геометрии.
topicdescr/multiphysicsmixturemodelkeps = [The Phase Transport Mixture Model, k-εInterface]The Phase Transport Mixture Model турбулентное течение, k-ε multiphysics interface is used to simulate the coupling between phase transport and fluid flow.\n\n Он объединяет интерфейсы Phase Transport и турбулентное течение, k-ε. Мультифизическая связь Mixture Model добавляется автоматически. Он соединяет интерфейсы фазового транспорта и потока и предоставляет варианты для различных моделей вязкости смеси и скорости скольжения. Физический интерфейс поддерживает низкие числа Маха (обычно менее 0,3).\n\nСтационарное моделирование и моделирование временной области поддерживаются в 2D, 2D аксисимметрии и 3D геометрии.
