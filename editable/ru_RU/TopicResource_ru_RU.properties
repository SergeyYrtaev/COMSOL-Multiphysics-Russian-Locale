topicdescr_physics/shapememoryalloy = [Сплав с памятью формы] Модель материала сплава с памятью формы для структурного анализа.
topicdescr_physics/shell = [Shell]Вычисляет эквивалентный коэффициент Клаузиуса-Моссотти, используя электрические свойства внутренней части частицы и одного или нескольких тонких слоев на ее поверхности.
