topicdescr_physics/fallbackthinlayer = [Тонкий слой]Модель теплопередачи для тонких слоев. Слой может быть термически тонким, термически толстым или общим.
topicdescr_physics/fallbackvacuumpump  = [Вакуумный насос]Эффективное давление на выходе, создаваемое вакуумным насосом. Применяется к частям границ, где выбор родительской пары не соответствует.
