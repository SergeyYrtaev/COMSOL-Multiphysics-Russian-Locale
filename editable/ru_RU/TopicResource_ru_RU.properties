topicdescr_physics/groundpointing = [Наведение на землю]Определяет событие наведения на землю, которое можно выбрать в функции интерфейса создания событий.
topicdescr_physics/h2electrodesurface = [Поверхность электрода H2]Поверхность электрода, расположенная на внешних границах области отсека газ-электролит H2, которые также являются внешними по отношению к выбору областей интерфейса.
topicdescr_physics/h2electrodereaction = [Электродная реакция H2]Определяет электрохимические электродные реакции на границе.
topicdescr_physics/h2flowchannel = [Канал потока H2] Устанавливает свойства области канала потока газа H2.
topicdescr_physics/h2gasdiffusionelectrode = [H2 Газодиффузионный электрод] Устанавливает свойства области газодиффузионного электрода H2.
topicdescr_physics/h2gasdiffusionelectrodereaction = [Реакция газодиффузионного электрода H2] Электрохимические реакции в газодиффузионном электроде H2.
