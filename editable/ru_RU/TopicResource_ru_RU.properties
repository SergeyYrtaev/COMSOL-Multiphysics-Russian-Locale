topicdescr/bubblyflowrealizablekeps = [Интерфейс Bubbly Flow, Realizable k-ε] Интерфейс Bubbly Flow, Realizable k-ε используется для моделирования течения жидкостей с диспергированными пузырьками при высоких значениях Рейнольдса. Numbers.\n\nПредполагается, что пузырьки занимают лишь небольшую объемную долю и что они всегда движутся со своей конечной скоростью. Таким образом, можно решить только одну систему уравнений Навье-Стокса для жидкой фазы и позволить скорости пузырьков определяться моделью скольжения. Распределение давления рассчитывается на основе уравнения неразрывности, усредненного по смеси. Объемную долю пузырьков отслеживают путем решения уравнения переноса для эффективной плотности газа. Эффекты турбулентности моделируются с использованием реализуемой модели с двумя уравнениями k-ε и образования турбулентности, вызванной пузырьками. Поток вблизи стенок моделируется с использованием стеновых функций. \n\nФизический интерфейс также может моделировать распределение числовой плотности, которое можно использовать для расчета площади межфазной границы, что полезно при моделировании химических реакций в смеси.
topicdescr/bubblyflowsa = [Интерфейс Bubbly Flow, Spalart-Allmaras] Интерфейс Bubbly Flow, Spalart-Allmaras используется для моделирования потока жидкостей с диспергированными пузырьками при высоких числах Рейнольдса.\n\nПредполагается, что пузырьки занимают лишь небольшую объемную долю и что они всегда движутся со своей конечной скоростью. Таким образом, можно решить только одну систему уравнений Навье-Стокса для жидкой фазы и позволить скорости пузырьков определяться моделью скольжения. Распределение давления рассчитывается на основе уравнения неразрывности, усредненного по смеси. Объемную долю пузырьков отслеживают путем решения уравнения переноса для эффективной плотности газа. Эффекты турбулентности моделируются с использованием модели одного уравнения Спаларта-Алмараса. Модель Спаларта-Аллмараса представляет собой так называемую модель с низким числом Рейнольдса, что означает, что она может разрешить поток вплоть до стенки. Модель Spalart-Allmaras зависит от расстояния до ближайшей стены. Поэтому физический интерфейс включает уравнение расстояния до стены. \n\nФизический интерфейс также может моделировать распределение числовой плотности, которое можно использовать для расчета площади межфазной границы, что полезно при моделировании химических реакций в смеси.
topicdescr/bubblyflowsst = [Интерфейс Bubbly Flow, SST] Интерфейс Bubbly Flow, SST используется для моделирования течения жидкостей с диспергированными пузырьками при высоких числах Рейнольдса.\n\nПредполагается, что пузырьки занимают лишь небольшую объемную долю и что они всегда движутся со своей конечной скоростью. Таким образом, можно решить только одну систему уравнений Навье-Стокса для жидкой фазы и позволить скорости пузырьков определяться моделью скольжения. Распределение давления рассчитывается на основе уравнения неразрывности, усредненного по смеси. Объемную долю пузырьков отслеживают путем решения уравнения переноса для эффективной плотности газа. Эффекты турбулентности моделируются с использованием модели переноса сдвигового напряжения Ментера (SST) с двумя уравнениями с ограничениями реализуемости и образованием турбулентности, вызванной пузырьками. Модель SST представляет собой так называемую модель с низким числом Рейнольдса, что означает, что она может разрешить поток вплоть до стенки. Модель SST зависит от расстояния до ближайшей стены. Поэтому физический интерфейс включает уравнение расстояния до стены. \n\nФизический интерфейс также может моделировать распределение числовой плотности, которое можно использовать для расчета площади межфазной границы, что полезно при моделировании химических реакций в смеси.
topicdescr/bubblyflowv2f = [Интерфейс Bubbly Flow, v2-f] Интерфейс Bubbly Flow, v2-f используется для моделирования потока жидкостей с диспергированными пузырьками при высоких числах Рейнольдса. \n\nПредполагается, что пузырьки занимают лишь небольшую объемную долю и что они всегда движутся со своей конечной скоростью. Таким образом, можно решить только одну систему уравнений Навье-Стокса для жидкой фазы и позволить скорости пузырьков определяться моделью скольжения. Распределение давления рассчитывается на основе уравнения неразрывности, усредненного по смеси. Объемную долю пузырьков отслеживают путем решения уравнения переноса для эффективной плотности газа. Эффекты турбулентности моделируются с использованием модели v2-f, выраженной через турбулентные относительные флуктуации (v2, нормированный на k). Эллиптическая функция используется для смешивания пристеночных и объемных членов в уравнениях модели турбулентности. Модель v2-f представляет собой так называемую модель с низким числом Рейнольдса, что означает, что она может разрешить поток вплоть до стенки. Модель v2-f зависит от расстояния до ближайшей стены. Поэтому физический интерфейс включает в себя уравнение расстояния до стены.\n\nФизический интерфейс также может моделировать распределение числовой плотности, которое можно использовать для расчета площади межфазной границы, что полезно при моделировании химических реакций в смеси.
topicdescr/carburization = [Науглероживание]Интерфейс «Науглероживание» предназначен для анализа процесса термообработки, при котором стальной компонент поглощает углерод в присутствии богатой углеродом атмосферы. Диффузия углерода рассчитывается с использованием второго закона Фика, а для моделирования массопереноса углерода на поверхность предусмотрены различные граничные условия. \n\nФизический интерфейс доступен для 3D, 2D, 1D или осесимметричных тел и поддерживает анализ, зависящий от времени.
topicdescr/cathodicprotection = [Интерфейс катодной защиты]Интерфейс катодной защиты аналогичен интерфейсу вторичного распределения тока, но с дополнительными функциями, настроенными для области применения катодной защиты.\n\nЭтот физический интерфейс учитывает эффект активационного перенапряжения в электрохимических ячейках. Связь между переносом заряда и перенапряжением можно описать с помощью произвольных кинетических выражений, таких как уравнения Батлера-Фольмера и Тафеля. Его можно комбинировать с интерфейсами, моделирующими массоперенос, для описания зависимого от концентрации (третичного) распределения тока. \n\nЗакон Ома используется в сочетании с балансом заряда для описания проводимости токов в электродах и электролитах.
topicdescr/ccpreactor = [Интерфейс емкостно-связанной плазмы]Интерфейс емкостно-связанной плазмы объединяет интерфейсы «Дрейфовая диффузия», «Перенос тяжелых частиц» и «Электростатика» в интегрированный мультифизический интерфейс для моделирования емкостно-связанной плазмы (CCP). Он используется для изучения разрядов, которые поддерживаются изменяющимся во времени электростатическим полем.
topicdescr/cdbem = [Распределение тока, интерфейс BEM]Распределение тока, интерфейс BEM определяет перенос заряженных ионов в электролите однородного состава с использованием закона Ома в сочетании с балансом заряда, аналогично интерфейсам первичного и вторичного распределения тока.\n\nУравнения, определенные интерфейсом, решаются с использованием метода граничных элементов.
topicdescr/cdedgesbem = [Распределение тока по краям, интерфейс BEM]Распределение тока по краям, интерфейс BEM определяет перенос заряженных ионов в электролите однородного состава с использованием закона Ома в сочетании с балансом заряда. геометрические края, которым приписывается радиус и тем самым аппроксимируются как цилиндрические электроды.\n\nУравнения, определенные интерфейсом, решаются с использованием метода граничных элементов.
topicdescr/chargedparticletracing = [Интерфейс отслеживания заряженных частиц]Интерфейс отслеживания заряженных частиц используется для моделирования орбит заряженных частиц под воздействием электромагнитных сил. Кроме того, он также может моделировать двустороннюю связь между частицами и полями. Некоторые типичные области применения — ускорители частиц, вакуумные трубки и устройства для имплантации ионов. Физический интерфейс поддерживает моделирование во временной области только в 2D и 3D.\n\nФизический интерфейс решает уравнение движения заряженных частиц, подвергающихся воздействию электромагнитных сил.
topicdescr/chargetransport = [Интерфейс переноса заряда]Интерфейс переноса заряда вычисляет плотность носителей заряда в фоновом газе в предположении, что в переносе преобладает миграция.
topicdescr/chemistry = [Интерфейс химии]Интерфейс химии может предоставлять библиотеки химических реакций для использования в любом физическом интерфейсе. Он предоставляет кинетические выражения для скоростей реакций, источников тепла реакции, а также свойств переноса частиц, которые могут использоваться другими физическими интерфейсами.
topicdescr/cht = Ветка «Сопряженная теплопередача» содержит различные версии мультифизического интерфейса, который объединяет теплообмен в твердых телах и жидкостях с ламинарным или турбулентным потоком. 
topicdescr/circuit = [Интерфейс электрической цепи]Интерфейс электрической цепи используется для моделирования токов и напряжений в цепях, включая источники напряжения и тока, резисторы, конденсаторы, катушки индуктивности и полупроводниковые устройства. Модели, созданные с помощью интерфейса «Электрическая цепь», могут включать соединения с моделями распределенных полей. Физический интерфейс поддерживает стационарное моделирование, моделирование в частотной и временной областях, а также решает законы сохранения Кирхгофа для напряжений, токов и зарядов, связанных с элементами схемы.
topicdescr/classicalpdes = [Классические интерфейсы PDE] Ветка классических PDE содержит некоторые классические PDE, которые являются частными случаями PDE в форме коэффициентов: интерфейсы уравнения Лапласа's Equation, Poisson's, волнового уравнения, уравнения теплопроводности, уравнения Гельмгольца, уравнения конвекции-диффузии и стабилизированного уравнения конвекции-диффузии.
topicdescr/codedinterfacessme = [Ветка «Кодированные интерфейсы»] Ветка «Кодированные интерфейсы» содержит закодированные физические интерфейсы механики конструкций.
topicdescr/coefficientformboundarypde = [Интерфейсы УЧП формы коэффициентов] УЧП формы коэффициентов предоставляет общий интерфейс для задания и решения УЧП в форме коэффициентов на границах.
topicdescr/coefficientformboundarypde{1axi} = ${topicdescr/coefficientformboundarypde}\n\nПримечание: интерфейс PDE в коэффициентной форме на границе никак не учитывает осевую симметрию геометрии; направление r рассматривается как одномерная линия. 
topicdescr/coefficientformboundarypde{axi} = ${topicdescr/coefficientformboundarypde}\n\nПримечание: интерфейс PDE в коэффициентной форме на границе никак не учитывает осевую симметрию геометрии; плоскость r-z рассматривается как плоская двумерная геометрия. 
topicdescr/coefficientformedgepde = [Интерфейсы PDE формы коэффициентов] УЧП формы коэффициентов предоставляет общий интерфейс для задания и решения УЧП в форме коэффициентов на ребрах в 3D.
topicdescr/coefficientformedgepde{1axi} = ${topicdescr/coefficientformedgepde}\n\nПримечание: интерфейс Coefficient Form Edge PDE никоим образом не учитывает осевую симметрию геометрии; направление r рассматривается как одномерная линия. 
topicdescr/coefficientformedgepde{axi} = ${topicdescr/coefficientformedgepde}\n\nПримечание: интерфейс Coefficient Form Edge PDE никоим образом не учитывает осевую симметрию геометрии; Плоскость rz рассматривается как плоская двумерная геометрия. 
topicdescr/coefficientformpde = [Интерфейсы УЧП формы коэффициентов] УЧП формы коэффициентов предоставляет общий интерфейс для задания и решения многих известных УЧП в форме коэффициентов. Многие PDE можно привести к общей форме, содержащей производные до второго порядка как во времени, так и в пространстве, но без смешанных производных. В COMSOL Multiphysics вы можете определить PDE этого типа, указав коэффициенты для производных разных порядков, в результате чего будет получена форма коэффициентов PDE.
topicdescr/coefficientformpde{1axi} = ${topicdescr/coefficientformpde}\n\nПримечание: интерфейс Coefficient Form PDE никоим образом не учитывает осевую симметрию геометрии; направление r рассматривается как одномерная линия. 
topicdescr/coefficientformpde{axi} = ${topicdescr/coefficientformpde}\n\nПримечание: интерфейс Coefficient Form PDE никоим образом не учитывает осевую симметрию геометрии; Плоскость rz рассматривается как плоская двумерная геометрия. 
topicdescr/coefficientformpointpde = [Интерфейсы УЧП формы коэффициентов] УЧП формы коэффициентов предоставляет общий интерфейс для задания и решения УЧП в форме коэффициентов в точках.
topicdescr/coefficientformpointpde{1axi} = ${topicdescr/coefficientformpointpde}\n\nПримечание: интерфейс Coefficient Form Point PDE никоим образом не учитывает осевую симметрию геометрии; направление r рассматривается как одномерная линия. 
topicdescr/coefficientformpointpde{axi} = ${topicdescr/coefficientformpointpde}\n\nПримечание: интерфейс Coefficient Form Point PDE никоим образом не учитывает осевую симметрию геометрии; Плоскость rz рассматривается как плоская двумерная геометрия. 
topicdescr/coldplasma = [Интерфейс «Плазма»]Интерфейс «Плазма» используется для изучения разрядов, которые поддерживаются статическим или изменяющимся во времени электрическим полем. Этот интерфейс объединяет интерфейсы «Дрейфовая диффузия», «Перенос тяжелых веществ» и «Электростатика». Химия плазмы определяется набором реакций электронного удара, реакций тяжелых частиц и поверхностных реакций. Существуют специальные граничные условия для электронов, тяжелых частиц и электрического потенциала.
topicdescr/coldplasmatimeperiodic = [Интерфейс «Плазма, периодичность времени» Интерфейс «Плазма, периодичность времени» используется для изучения разрядов, которые поддерживаются периодическими электрическими полями. Этот интерфейс объединяет интерфейсы «Дрейфовая диффузия», «Перенос тяжелых веществ» и «Электростатика». Периодическое по времени решение вычисляется путем добавления дополнительного измерения, представляющего один период времени, и применения периодических граничных условий к зависимым переменным.
topicdescr/coldplasmaquasineutral= [Плазма, квазинейтральный интерфейс] Интерфейс «Плазма, квазинейтральный» используется для изучения разрядов, в которых дебаевская длина и длина свободного пробега ионов малы по сравнению с размерами плазмы. Электронейтральность предполагается во всей плазменной области, что означает, что разделение зарядов не решается явно. Электрическое поле получается путем решения уравнения сохранения тока или использования аналитического амбиполярного электрического поля. Этот интерфейс объединяет интерфейсы «Дрейфовая диффузия», «Перенос тяжелых веществ» и «Электрические токи». Химия плазмы определяется набором реакций электронного удара, реакций тяжелых частиц и поверхностных реакций. Существуют специальные граничные условия для электронов, тяжелых частиц и электрического потенциала.
topicdescr/compressibleeulerequationstimeexplicit = [Интерфейс сжимаемых уравнений Эйлера]Интерфейс сжимаемых уравнений Эйлера используется для решения переходных моделей течения невязкого идеального газа, где величина скорости сравнима со скоростью звука, то есть сжимаемых течений в трансзвуковом и сверхзвуковом диапазоне. \n\nИнтерфейс основан на разрывном методе Галеркина (dG-FEM) и использует явный по времени решатель. Физический интерфейс решает вопрос сохранения энергии, массы и импульса. Зависимыми переменными являются плотность, импульс и полная энергия.
topicdescr/compressiblepotentialflow = [Интерфейс сжимаемого потенциального потока]Интерфейс сжимаемого потенциального потока используется для расчета потенциала скорости в потенциальном сжимаемом поле дозвукового потока, предполагая, что это идеальная баротропная безвихревая жидкость с постоянной энтропией. Поток может иметь только одно уникальное начало или вход, поскольку он использует глобальное определение полной энергии. \n\nФизический интерфейс используется для моделирования фонового потока, который будет использоваться в качестве входных данных для линеаризованных интерфейсов потенциального потока.
topicdescr/concentratedspecies = [Интерфейс «Перенос концентрированных видов» Интерфейс «Перенос концентрированных видов» используется для изучения газообразных и жидких смесей, в которых концентрации веществ имеют один и тот же порядок величины и ни один из видов не может быть идентифицирован как растворитель. В этом случае свойства смеси зависят от состава и необходимо учитывать молекулярное и ионное взаимодействие между всеми видами. Физический интерфейс включает модели многокомпонентной диффузии, где диффузионная движущая сила каждого вида зависит от состава смеси, температуры и давления. \n\nФизический интерфейс рассчитывает массовые доли всех участвующих видов. Можно включить перенос посредством конвекции, диффузии и миграции в электрическом поле.
topicdescr/concentratedspeciesinvapor = [Перенос концентрированных веществ в границе раздела паров] Транспорт концентрированных веществ в границе раздела паров используется для изучения паровых смесей, в которых концентрации веществ имеют один и тот же порядок величины и ни одно из веществ не может быть идентифицировано как растворитель. Пар может находиться в результате притока пара или находиться в равновесии с жидкостью на границах. Свойства паровой смеси зависят от состава, поэтому необходимо учитывать молекулярное и ионное взаимодействие между всеми видами. Физический интерфейс включает модели многокомпонентной диффузии, где диффузионная движущая сила каждого вида зависит от состава паровой смеси, температуры и давления. \n\nФизический интерфейс рассчитывает массовые доли всех участвующих видов. Можно включить перенос посредством конвекции, диффузии и миграции в электрическом поле.
topicdescr/conductivemedia = [Интерфейс «Электрические токи»]Интерфейс «Электрические токи» используется для расчета распределения электрического поля, тока и потенциала в проводящих средах в условиях, когда индуктивные эффекты незначительны; то есть, когда глубина скин-слоя намного больше, чем у исследуемого устройства.\n\nВ зависимости от лицензированных продуктов стационарный анализ, частотный анализ, анализ малых сигналов и моделирование во временной области поддерживаются во всех пространственных измерениях. Во временной и частотной областях также учитываются емкостные эффекты.\n\nФизический интерфейс решает уравнение сохранения тока на основе закона Ома, используя скалярный электрический потенциал в качестве зависимой переменной.
topicdescr/conductivemediashell = [Интерфейс «Электрические токи, оболочка» (устаревший интерфейс)]Интерфейс «Электрические токи, оболочка» используется для расчета распределения электрического поля, тока и потенциала в тонких проводящих оболочках в условиях, когда индуктивные эффекты незначительны; то есть когда глубина скин-слоя намного больше, чем у исследуемого устройства. Он поддерживает стационарный анализ, анализ в частотной области, анализ малых сигналов и моделирование во временной области на краях в 2D и гранях в 3D.\n\nФизический интерфейс решает уравнение сохранения тока на основе закона Ома, используя скалярный электрический потенциал в качестве зависимой переменной.
topicdescr/convectedwaveequation = [Уравнение конвекционной волны, явный интерфейс по времени] Интерфейс «Уравнение конвекционной волны, явный по времени» используется для решения больших переходных линейных акустических задач, содержащих множество длин волн в стационарном фоновом потоке. Он подходит для нестационарного моделирования с произвольными зависящими от времени источниками и полями. В целом интерфейс подходит для моделирования распространения акустических сигналов на большие расстояния относительно длины волны, например, в задачах линейного ультразвука. Интерфейс включает поглощающие слои, которые используются для создания эффективных неотражающих граничных условий. \n\nИнтерфейс основан на разрывном методе Галеркина (dG-FEM) и использует явный по времени решатель. Этот метод очень ресурсоемок по памяти. Области применения включают ультразвуковые расходомеры и другие ультразвуковые датчики, где время пролета является важным параметром. \n\nИнтерфейс решает линеаризованные уравнения Эйлера, предполагая адиабатическое уравнение состояния. Зависимыми переменными являются акустическое давление и возмущения акустической скорости. Фоновым потоком может быть любой стационарный поток с градиентами скорости от малых до умеренных. В интерфейсе не предусмотрены механизмы затухания из-за объемных потерь. Потери на границах можно моделировать с помощью условий импеданса для потерь резистивного типа.
topicdescr/convectiondiffusionequation = [Классические интерфейсы PDE]Интерфейс «Уравнение конвекции-диффузии» можно использовать для моделирования классического PDE, описывающего перенос посредством конвекции и диффузии. Уравнение конвекции-диффузии также доступно в качестве узла функции предметной области для всех интерфейсов PDE.
topicdescr/corr = [Ветка «Коррозия, деформированная геометрия»]Ветка «Коррозия, деформированная геометрия» содержит предопределенные мультифизические интерфейсы для зависящего от времени моделирования деформаций электродов, возникающих в результате коррозионных процессов в электрохимических ячейках. cell.\n\nФизические интерфейсы сочетают в себе соответствующий интерфейс Current Distribution с интерфейсом Deformed Сетка и добавляют индивидуальные связи между электродными реакциями и граничными скоростями.
topicdescr/corrosionprimary = [Первичный и вторичный интерфейсы коррозии] Интерфейс «Коррозия, первичный» описывает распределения тока и потенциала в коррозионной ячейке в предположении, что изменения состава электролита незначительны и что активационные перенапряжения электродных реакций пренебрежимо малы.
topicdescr/corrosionsecondary = [Первичный и вторичный интерфейсы коррозии] Интерфейс «Коррозия, вторичный» описывает распределения тока и потенциала в коррозионной ячейке в предположении, что изменения в составе электролита незначительны. Интерфейс можно комбинировать с интерфейсами, моделирующими массоперенос, для описания зависимых от концентрации (третичных) распределений тока.
topicdescr/corrosiontertiarynp = [Коррозия, третичный интерфейс Нернста-Планка] Интерфейс Коррозия, третичный интерфейс Нернста-Планка описывает распределения тока и потенциала в коррозионной ячейке, принимая во внимание транспорт заряженных частиц (ионов) в электролите. Транспорт заряженных и нейтральных частиц описывается диффузией, миграцией и конвекцией. Обратите внимание, что условие электронейтральности требует, чтобы в модель были включены все основные ионы, несущие ток.\n\nИспользуйте этот физический интерфейс для моделирования коррозионных ячеек со значительными градиентами концентрации частиц (ионов), несущих ток.
topicdescr/creepingflow = [Интерфейс Creeping Flow]Интерфейс Creeping Flow используется для моделирования потоков жидкости при очень низких числах Рейнольдса, для которых инерционным членом в уравнениях Навье-Стокса можно пренебречь. Этот тип однофазного потока также называется потоком Стокса и встречается в системах с высокой вязкостью или малыми геометрическими масштабами длины (например, в микрофлюидике и устройствах MEMS). Жидкость может быть сжимаемой или несжимаемой, ньютоновской или неньютоновской.\n\nУравнения, решаемые с помощью интерфейса Creeping Flow, — это уравнения Стокса для сохранения импульса и уравнение неразрывности для сохранения масса.\n\nИнтерфейс Creeping Flow можно использовать для стационарного и нестационарного анализа.
topicdescr/cst = [Физические группы в мастере моделей]Интерфейсы переноса химических веществ используются для расчета полей концентрации химических веществ в растворах. Они описывают химические реакции и транспорт посредством диффузии, конвекции и миграции в разбавленных и концентрированных растворах.
topicdescr/curing = [Отверждение] Ветка «Отверждение» содержит физические интерфейсы для моделирования отверждения полимеров, а также заранее заданные связи с теплопередачей и потоком жидкости.
topicdescr/curingreaction = [Интерфейс реакции отверждения]Интерфейс «Реакция отверждения» используется для анализа изменения степени конверсии во время реакций отверждения с использованием заранее заданных кинетических выражений для скорости реакции.\n\nНеобязательно, можно вычислить эффективные свойства отвержденного материала.
topicdescr/currentdistributionbem = [Интерфейс «Распределение тока, граничные элементы»] Интерфейс «Распределение тока, граничные элементы» определяет перенос заряженных ионов в электролите однородного состава с использованием закона Ома в сочетании с балансом заряда, аналогично интерфейсам «Первичное и вторичное распределение тока».\n\nУравнения, определенные интерфейсом, решаются с использованием метода граничных элементов.
topicdescr/currentdistributionpipe = [Распределение тока, интерфейс трубы] Интерфейс «Распределение тока, труба» моделирует проводимость ионного тока в тангенциальном направлении на ребре, которому приписывается радиус и, таким образом, аппроксимируется как цилиндрические электроды. однородного состава.\n\nИнтерфейс подходит для моделирования внутренней коррозии трубопроводов.
topicdescr/currentdistributionshell = [Распределение тока, интерфейс оболочки] Интерфейс «Распределение тока, оболочка» моделирует проводимость ионного тока в тангенциальном направлении на границе.\n\nФизический интерфейс подходит для моделирования тонких электролитов, где изменение потенциала в нормальном направлении незначительно. Это предположение позволяет заменить тонкую область электролита формулировкой уравнения в частных производных на границе. Таким образом, можно уменьшить размер задачи и избежать потенциальных проблем с анизотропией сетки в тонком слое. \n\nЗакон Ома используется в сочетании с балансом заряда для описания проводимости ионных токов в оболочковом электролите.
topicdescr/curvilinearcoordinates = [Интерфейс криволинейных координат] Используйте интерфейс криволинейных координат, чтобы создать криволинейную систему координат для определения анизотропных свойств материала, соответствующих форме геометрического объекта. Для расчета системы координат доступны три различных метода: метод диффузии, метод упругости и метод потока. Вы также можете указать определяемые пользователем координатные направления.
topicdescr/darcyslaw = [Интерфейс закона Дарси's Law Interface]The Darcy's используется для моделирования течения жидкости через пустоты в пористой среде. Его можно использовать для моделирования низкоскоростных потоков или сред, где проницаемость и пористость очень малы, и для которых градиент давления является основной движущей силой, а на поток в основном влияет сопротивление трения внутри пор. Настройка нескольких интерфейсов закон Дарси interfaces to model multiphase flows involving more than one mobile phase.\n\nThe закон Дарси можно использовать для стационарного и нестационарного анализа. 
topicdescr/dcdischarge = [Интерфейс разряда постоянного тока]Интерфейс разряда постоянного тока объединяет интерфейсы дрейфовой диффузии, переноса тяжелых веществ и электростатики. Он используется для изучения разрядов, поддерживаемых статическим электрическим полем. Коэффициенты Таунсенда можно использовать вместо коэффициентов скорости для условий источника электронов.
topicdescr/dds = [Дисперсный двухфазный поток с переносом частиц]Ветка «Дисперсный двухфазный поток с переносом частиц» содержит несколько версий мультифизического интерфейса для моделирования дисперсного двухфазного потока в сочетании с массопереносом. Модель смеси используется для расчета двухфазного потока путем учета непрерывной фазы и дисперсной фазы. Можно изучать транспорт растворенных веществ в непрерывной фазе и дисперсной фазе, а также перенос веществ между фазами.\n\nЭти физические интерфейсы поддерживают ламинарный поток и, в зависимости от лицензированных продуктов, турбулентный поток.
topicdescr/ddst = [Дисперсный двухфазный поток с переносом частиц] Турбулентные версии мультифизического интерфейса «Дисперсный двухфазный поток с переносом частиц» объединяют уравнения для турбулентного двухфазного потока с уравнениями, управляющими массопереносом как в непрерывной, так и в дисперсной фазе.
topicdescr/deformedgeometry = [Интерфейс «Деформированная геометрия»]Интерфейс «Деформированная геометрия» можно использовать для изучения того, как меняется физика, когда геометрия изменяется в зависимости от параметра. Разница между интерфейсами Deformed Geometry и Moving Сетка заключается в том, что первый определяет деформацию материального каркаса относительно геометрического каркаса, а второй определяет смещение пространственного каркаса относительно материального каркаса.
topicdescr/deformedgeometryfreedeformation = [Квазиинтерфейс «Деформированная геометрия, свободная деформация»]Добавьте «Деформированную геометрию, свободную деформацию», чтобы представить домены, которые меняют форму по мере того, как их границы деформируются с использованием граничных условий. 
topicdescr/deformedgeometrygroup = [Функции деформированной геометрии]Функции деформированной геометрии можно использовать для изучения того, как меняется физика, когда геометрия изменяется в зависимости от параметра. Разница между интерфейсами Deformed Geometry и Moving Сетка заключается в том, что первый определяет деформацию материального каркаса относительно геометрического каркаса, а второй определяет смещение пространственного каркаса относительно материального каркаса.
topicdescr/deformedgeometryprescribeddeformation = [Квазиинтерфейс «Деформированная геометрия, заданная деформация»]Добавьте деформированную геометрию, заданную деформацию, чтобы напрямую управлять формой доменов с помощью выражений.
topicdescr/deformedgeometryrotatingdomain = [Квазиинтерфейс «Деформированная геометрия, вращающаяся область»]Добавьте деформированную геометрию, вращающуюся область, чтобы представить вращающиеся области.  
topicdescr/deformedmesh = [Основы деформированной сетки] Ветка деформированной сетки имеет два физических интерфейса. Интерфейс «Деформированная геометрия» изучает поведение различных форм исходного объекта, а интерфейс «Подвижная сетка» изучает, как твердый объект деформируется в результате физической нагрузки и как жидкости в соседних областих реагируют на смещение границ области.
topicdescr/desf = [Моделирование отдельного вихря]DES — это гибридный метод, который сочетает в себе модели турбулентности RANS (усредненное значение Рейнольдса-Навье-Стокса) с LES (моделирование больших вихрей). Турбулентное напряжение, полученное из модели турбулентности RANS, добавляется к уравнению количества движения, но активно только в пристеночной области. Вдали от стен метод LES извлекается. 
topicdescr/desrbvmspalartallmaras = [DES RBVM, Spalart-Allmaras]Интерфейс DES RBVM, Spalart-Allmaras решает уравнение Спаларта-Алмараса для турбулентной вязкости. Соответствующий член турбулентного напряжения добавляется к уравнению количества движения, но активен только в пристеночной области. Вдали от стен крупномасштабные турбулентные структуры разрешаются с использованием вариационного многомасштабного метода LES на основе невязок. Модель Spalart-Allmaras зависит от расстояния до ближайшей стены. Поэтому физический интерфейс включает в себя уравнение расстояния до стенки.\n\nОбласть потока жидкости должна быть трехмерной, а исследование зависит от времени.
topicdescr/desrbvmwvspalartallmaras = [DES RBVMWV, Spalart-Allmaras]Интерфейс DES RBVMWV, Spalart-Allmaras решает уравнение Спаларта-Алмараса для турбулентной вязкости. Соответствующий член турбулентного напряжения добавляется к уравнению количества движения, но активен только в пристеночной области. Вдали от стен крупномасштабные турбулентные структуры разрешаются с использованием вариационного многомасштабного метода LES на основе невязок с вязкостью. Модель Spalart-Allmaras зависит от расстояния до ближайшей стены. Поэтому физический интерфейс включает в себя уравнение расстояния до стенки.\n\nОбласть потока жидкости должна быть трехмерной, а исследование зависит от времени.
topicdescr/dessmagorinskyspalartallmaras = [DES Смагоринский, Спаларт-Алмарас]Интерфейс DES Смагоринский, Спаларт-Алмарас решает уравнение Спаларта-Алмараса для турбулентной вязкости. Соответствующий член турбулентного напряжения добавляется к уравнению количества движения, но активен только в пристеночной области. Вдали от стен крупномасштабные турбулентные структуры разрешаются методом LES Смагоринского. Модель Spalart-Allmaras зависит от расстояния до ближайшей стены. Поэтому физический интерфейс включает в себя уравнение расстояния до стенки.\n\nОбласть потока жидкости должна быть трехмерной, а исследование зависит от времени.
topicdescr/dilutedspecies = [Интерфейс «Перенос разбавленных веществ»] Интерфейс «Перенос разбавленных веществ» используется для расчета поля концентрации разбавленного растворенного вещества в растворителе. Можно рассчитать транспорт и реакции веществ, растворенных в газе, жидкости или твердом теле. Движущими силами транспорта могут быть диффузия по закону Фика, конвекция в сочетании с потоком жидкости и миграция в сочетании с электрическим полем.\n\nВ зависимости от лицензированных продуктов возможно моделирование переноса нескольких видов. Также возможна диффузия, конвекция, дисперсия, адсорбция и испарение в насыщенных или частично насыщенных пористых средах в зависимости от лицензированных продуктов.
topicdescr/dilutedspeciesinfractures = [Интерфейс «Перенос разбавленных веществ в трещинах»] Интерфейс «Перенос разбавленных веществ в трещинах» используется для моделирования переноса растворенных веществ вдоль тонких пористых трещин с учетом диффузии, дисперсии, конвекции и химических реакций. Трещины определяются границами в 2D и 3D, и предполагается, что растворенные вещества присутствуют в растворителе. \n\nУравнение массопереноса, решенное вдоль трещин, представляет собой тангенциальную дифференциальную форму реакции конвекции-диффузии-реакции. уравнение.\n\nВ зависимости от лицензированных продуктов возможно моделирование переноса нескольких видов.
topicdescr/dilutedspeciespipes = [Интерфейс «Перенос разбавленных веществ в трубах»] Интерфейс «Перенос разбавленных веществ в трубах» используется для моделирования уравнения баланса массы труб с целью расчета распределения концентрации растворенного вещества в разбавленном растворе с учетом диффузии, дисперсии, конвекции и химических реакций. Интерфейс аппроксимирует профиль концентрации в трубах и каналах с помощью одномерного предположения по линиям в 2D и 3D.\n\nВ зависимости от лицензированных продуктов можно моделировать несколько видов.
topicdescr/dilutedspeciesininpackedbeds = [Транспорт разбавленных частиц в насадочных слоях]Интерфейс «Перенос разбавленных частиц в насадочных слоях» используется для моделирования реакторов, заполненных пористыми каталитическими гранулами. Помимо транспорта в поровом пространстве между гранулами, можно детально изучить межчастичный транспорт химических веществ и реакций. Внутри окатышей можно изучать как гетерогенные реакции, так и объемные реакции, а также объемные реакции в поровом пространстве. Гранулы доступны в каждой точке области слоя и определяются с использованием дополнительного измерения, описывающего радиус гранул.
topicdescr/dilutedspeciesinporouscatalysts = [Транспорт разбавленных частиц в пористых катализаторах] Интерфейс «Перенос разбавленных частиц в пористых катализаторах» используется для изучения влияния адсорбции и гетерогенных реакций, когда газ или жидкость движутся через пустоты пористой среды. Можно изучать адсорбцию и десорбцию объемных частиц на границе раздела жидкость-твердое тело или с нее, а также гетерогенные реакции с участием как объемных частиц, так и поверхностных частиц, связанных с границей раздела жидкость-твердое тело. Можно также включить объемные реакции, происходящие в поровом пространстве.
topicdescr/dilutedspeciesinporousmedia = [Перенос разбавленных веществ в пористой среде]Интерфейс «Перенос разбавленных веществ в пористой среде» используется для расчета концентрации частиц и транспорта в свободной и пористой среде. Он включает в себя выражения скорости для химических реакций и механизмы переноса химических веществ. \n\nФизический интерфейс включает перенос веществ посредством диффузии, конвекции, дисперсии, адсорбции и улетучивания в насыщенных или частично насыщенных пористых средах. Он поддерживает случаи, когда либо твердофазная подложка исключительно неподвижна, либо когда неподвижной считается и газонаполняющая среда.
topicdescr/concentratedspeciesinpackedbeds = [Транспорт концентрированных веществ в насадочных слоях]Интерфейс «Перенос концентрированных веществ в насадочных слоях» используется для моделирования реакторов, заполненных пористыми каталитическими гранулами. Помимо транспорта в поровом пространстве между гранулами, можно детально изучить межчастичный транспорт химических веществ и реакций. Внутри окатышей можно изучать как гетерогенные реакции, так и объемные реакции, а также объемные реакции в поровом пространстве. Гранулы доступны в каждой точке области слоя и определяются с использованием дополнительного измерения, описывающего радиус гранул.
topicdescr/concentratedspeciesinporouscatalysts = [Транспорт концентрированных частиц в пористых катализаторах] Интерфейс «Перенос концентрированных частиц в пористых катализаторах» используется для изучения влияния адсорбции и гетерогенных реакций, когда газ или жидкость движутся через пустоты пористой среды. Можно изучать адсорбцию и десорбцию объемных частиц на границе раздела жидкость-твердое тело или с нее, а также гетерогенные реакции с участием как объемных частиц, так и поверхностных частиц, связанных с границей раздела жидкость-твердое тело. Можно также включить объемные реакции, происходящие в поровом пространстве.
topicdescr/concentratedspeciesinporousmedia = [Перенос концентрированных веществ в пористой среде]Интерфейс «Перенос концентрированных веществ в пористой среде» используется для расчета химического состава газа или жидкости, присутствующих в свободных и пористых средах. Он включает в себя выражения скорости для химических реакций и механизмы переноса химических веществ. \n\nФизический интерфейс включает перенос веществ посредством диффузии, конвекции, дисперсии, адсорбции и улетучивания в насыщенных или частично насыщенных пористых средах. Он поддерживает случаи, когда либо твердофазная подложка исключительно неподвижна, либо когда неподвижной считается и газонаполняющая среда.
topicdescr/domainode = [Интерфейсы распределенных ODE и DAE]Интерфейс Domain ODE и DAE используется для добавления пространственно-независимых уравнений в области. Переменные поля могут представлять дополнительные состояния, а соответствующие уравнения могут быть ОДУ, алгебраическими уравнениями и ДАУ.
topicdescr/driftdiffusion = [Интерфейс дрейфовой диффузии]Интерфейс дрейфовой диффузии определяет плотность электронов и среднюю энергию электронов для любого типа плазмы. Доступен широкий диапазон граничных условий для обработки вторичной эмиссии, термоэлектронной эмиссии и потерь на стенках.
topicdescr/dropletsprays = [Интерфейс «Распыление капель в потоке жидкости» Интерфейс «Распыление капель в потоке жидкости» — это вариант интерфейса «Трассировка частиц для потока жидкости» с соответствующими функциями по умолчанию для моделирования распыления капель жидкости. Узлы Drag Force и Droplet Breakup добавляются во все домены по умолчанию.
topicdescr/ech = [Физические группы в мастере моделей]Отдел «Электрохимия» содержит общие физические интерфейсы для моделирования распределения потенциала и тока в электрохимических ячейках. system.\n\nВ зависимости от лицензированных продуктов доступны индивидуальные физические интерфейсы для батарей, электроанализа, электроосаждения и коррозии.
topicdescr/edep = [Ветка «Электроосаждение, деформированная геометрия»] Ветка «Электроосаждение, деформированная геометрия» содержит предопределенные мультифизические интерфейсы для зависящего от времени моделирования деформаций, возникающих в результате процессов осаждения/растворения в электрохимических ячейках. cell.\n\nФизические интерфейсы сочетают в себе соответствующий интерфейс Current Distribution с интерфейсом Deformed Сетка и добавляют индивидуальные связи между электродными реакциями и граничными скоростями.
topicdescr/edgeode = [Интерфейсы распределенных ODE и DAE]Интерфейс Edge ODE и DAE используется для добавления пространственно-независимых уравнений к ребрам. Переменные поля могут представлять дополнительные состояния, а соответствующие уравнения могут быть ОДУ, алгебраическими уравнениями и ДАУ.
topicdescr/ee = [Модель Эйлера-Эйлера, интерфейс ламинарного потока] Интерфейс модели Эйлера-Эйлера можно использовать для моделирования потока двух непрерывных и полностью взаимопроникающих фаз.
topicdescr/eh = [Электромагнитный нагрев] Ветка «Электромагнитный нагрев» включает интерфейс джоулевого нагрева. Модуль переменного/постоянного тока дополнительно оснащен интерфейсом индукционного нагрева, радиочастотный модуль добавляет микроволновый нагрев, а модуль волновой оптики добавляет лазерный нагрев.
topicdescr/elasticwaves = [Интерфейс упругие волны]Интерфейс упругие волны используется для расчета поля смещений в твердых телах с распространяющимися упругими волнами. Физический интерфейс позволяет добавлять жидкие или пористые области, прилегающие к твердому области по умолчанию. Специальные граничные условия определяют нагрузки между жидкой, твердой и пористой областями, включая специальные наборы граничных условий, которые автоматически применяются для взаимодействий жидкость-твердое тело, жидкость-пора и пористо-твердое тело. \n\nИнтерфейс подходит для моделирования распространения линейных упругих и линейных акустических волн в частотной области. Предполагаются гармонические изменения поля смещений и источников.\n\nУравнение Гельмгольца решается в жидкой области, а уравнения структурной динамики - в твердом теле. В пористых областях решаются уравнения Био, учитывающие совместное распространение упругих волн в упругой пористой матрице и волн давления в насыщающей жидкости. Сюда входит демпфирующий эффект поровой жидкости.
topicdescr/elasticwavessinglephysics = [Интерфейс упругие волны]Интерфейс упругие волны используется для расчета поля смещений в твердых телах с распространяющимися упругими волнами. Физический интерфейс позволяет добавлять пористые области рядом с твердым областьом по умолчанию. Специальные граничные условия определяют нагрузки между твердыми и пористыми областями.\n\nИнтерфейс подходит для моделирования распространения линейных упругих и линейных акустических волн в частотной области. Предполагаются гармонические изменения поля смещений и источников.
topicdescr/elasticwavestimeexplicit = [Интерфейс упругие волны, явная по времени] Интерфейс упругие волны, явная по времени предназначен для решения задач распространения нестационарных линейных упругих волн в больших областях, содержащих множество длин волн. Он подходит для нестационарного моделирования с произвольными зависящими от времени источниками и полями. Поглощающие слои используются для создания эффективных неотражающих граничных условий. \n\nИнтерфейс основан на разрывном методе Галеркина (dG-FEM) и использует явный по времени решатель. Интерфейс решает уравнения линейной упругости в формулировке «скорость-деформация». Зависимыми переменными являются структурная скорость и деформация.
topicdescr/electricalbreakdowndetection = [Интерфейс обнаружения электрического пробоя] Интерфейсы обнаружения электрического пробоя используют приблизительный метод для определения того, произойдет ли электрический пробой в данной конструкции, путем интегрирования коэффициентов роста Таунсенда вдоль линий электрического поля.
topicdescr/electriccurrentslayeredshell = [Интерфейс «Электрические токи, многослойная оболочка»] Интерфейс «Электрические токи, многослойная оболочка» используется для расчета распределения электрического поля, тока и потенциала в тонких и толстых проводящих оболочках, опционально с внутренней многослойной структурой.\n\nФизический интерфейс решает уравнение сохранения тока на основе закона Ома, используя скалярный электрический потенциал в качестве зависимой переменной. Электрический потенциал может находиться либо на выбранной поверхности, либо в пространстве произведения поверхности и физической толщины (дополнительное измерение). 
topicdescr/electriccurrentsshell = [Интерфейс «Электрические токи в оболочках»] Этот интерфейс используется для расчета распределения электрического поля, тока и потенциала в тонких и толстых проводящих оболочках и диэлектриках, опционально с внутренней слоистой структурой. Предполагается, что индуктивные эффекты пренебрежимо малы; то есть глубина скин-слоя должна быть намного больше, чем у исследуемого устройства.\n\nЭлектрический потенциал может быть расположен либо на выбранной поверхности, либо в пространстве продукта, охватываемом поверхностью и физической толщиной оболочки (с использованием дополнительного измерения). Для проводящих оболочек физический интерфейс решает уравнение сохранения тока, основанное на законе Ома's law using the scalar electric potential as the dependent variable. For dielectric layers the interface solves Gauss' (он фактически превращается в локальный интерфейс электростатики).\n\nИнтерфейсы «Электрические токи в оболочках» и «Электрические токи в слоистых оболочках» очень похожи. Основное отличие – это режим по умолчанию. Интерфейс «Электрические токи в многослойных оболочках» по умолчанию настроен на отсутствие слоев, а интерфейс «Электрические токи в многослойных оболочках» по умолчанию настроен на многослойность.
topicdescr/electricdischarges= [Ветка «Электрические разряды»] Ветка «Электрические разряды» содержит интерфейсы, предназначенные для моделирования конкретных физических процессов в плазме, таких как электрический пробой и коронные разряды, с использованием приближенных методов.
topicdescr/electricfieldsandcurrents = [Электрические поля и токи] Ветка «Электрические поля и токи» содержит физические интерфейсы для анализа электрических полей, распределения электрического потенциала, плотности заряда и сохранения тока на относительно низких частотах. Индуктивные эффекты незначительны; то есть глубина скин-слоя и длина волны считаются намного большими, чем у исследуемого устройства.
topicdescr/electricinductioncurrents = [Интерфейс «Магнитные и электрические поля»]Интерфейс «Магнитные и электрические поля» используется для расчета распределения магнитного поля и тока, когда возбуждающий ток управляется приложенным напряжением. Стационарное моделирование и моделирование в частотной области поддерживаются в 2D и 3D. Обратите внимание, что в большинстве случаев использование интерфейса «Магнитные поля» со специальными функциями моделирования катушек является более предпочтительным выбором, чем использование интерфейса «Магнитные и электрические поля».\n\nФизический интерфейс решает уравнения Максвелла, сформулированные с использованием векторного магнитного потенциала и скалярного электрического потенциала в качестве зависимых переменных.
topicdescr/electroanalysis = [Интерфейс электроанализа] Интерфейс электроанализа содержит уравнения, граничные условия и выражения скорости для моделирования массового переноса разбавленных частиц в электролитах с использованием уравнения диффузии-конвекции, позволяющего определить концентрацию электроактивных веществ. Физический интерфейс содержит специальные функции для моделирования циклической вольтамперометрии и электрохимической импедансной спектроскопии.\n\nИспользуйте этот физический интерфейс для моделирования электроаналитических задач с растворами электролитов, содержащими большое количество инертных "supporting" электролит.\n\nНастройки этого физического интерфейса можно выбрать так, чтобы имитировать перенос химических веществ посредством диффузии (закон Фика), миграции (в сочетании с электрическим полем и электрокинетическим потоком) и конвекции (в сочетании с потоком жидкости).
topicdescr/electrodepositionprimary = [Первичный и вторичный интерфейсы электроосаждения] Интерфейс «Электроосаждение, первичный» описывает распределения тока и потенциала в ячейке электроосаждения в предположении, что изменения состава электролита незначительны и что активационные перенапряжения электродных реакций пренебрежимо малы.
topicdescr/electrodepositionsecondary = [Первичный и вторичный интерфейсы электроосаждения] Интерфейс «Электроосаждение, вторичный» описывает распределения тока и потенциала в ячейке электроосаждения в предположении, что изменения состава электролита незначительны. Интерфейс можно комбинировать с интерфейсами, моделирующими массоперенос, для описания зависимых от концентрации (третичных) распределений тока.
topicdescr/electrodepositiontertiarynp = [Электроосаждение, третичный интерфейс Нернста-Планка] Электроосаждение, третичный интерфейс Нернста-Планка описывает распределения тока и потенциала в электрохимической ячейке, принимая во внимание транспорт ионов в электролите. Транспорт заряженных и нейтральных частиц описывается диффузией, миграцией и конвекцией. Обратите внимание, что условие электронейтральности требует, чтобы в модель были включены все основные ионы, несущие ток. \n\nИспользуйте этот физический интерфейс для моделирования ячеек электроосаждения со значительными градиентами концентрации частиц (ионов), несущих ток.
topicdescr/electrodeshell = [Интерфейс «Электрод, оболочка» Интерфейс «Электрод, оболочка» моделирует проводимость электрического тока в тангенциальном направлении на границе. \n\nФизический интерфейс подходит для моделирования тонких электродов, где изменение потенциала в нормальном направлении к электроду незначительно. Это предположение позволяет заменить тонкую электродную область формулировкой уравнения в частных производных на границе. Таким образом, можно уменьшить размер задачи и избежать потенциальных проблем с анизотропией сетки в тонком слое. \n\nЗакон Ома используется в сочетании с балансом заряда для описания проводимости токов в оболочечном электроде.
topicdescr/electromagneticfields = [Электромагнитные поля] Ветка «Электромагнитные поля» содержит множество физических интерфейсов, используемых в ситуациях, когда существует однонаправленная или двунаправленная связь между электрическими и магнитными полями. Вообще говоря, волновые явления не рассматриваются (хотя некоторые интерфейсы их поддерживают), а индуктивные эффекты учитываются. Другими словами, эти интерфейсы обычно используются, когда глубина скин-слоя может быть порядка размера устройства, но длина волны все равно намного больше.
topicdescr/electromagneticheating = [Электромагнитное отопление]Отрасль «Электромагнитное отопление» включает в себя мультифизические интерфейсы, которые объединяют электромагнетизм с теплопередачей или теплопередачу и строительную механику.
topicdescr/electromagneticsandmechanics = [Электромагнетизм и механика] Раздел «Электромагнетизм и механика» содержит множество физических интерфейсов, обычно используемых для мультифизических сценариев, включающих электромагнетизм и (структурную) механику. Общие области применения включают двигатели, генераторы, исполнительные механизмы и датчики.
topicdescr/electromagneticsandfluids = [Электромагнетизм и жидкости]Отдел «Электромагнетизм и жидкости» содержит множество физических интерфейсов, обычно используемых для мультифизических сценариев, включающих электромагнетизм и потоки жидкости, такие как магнитогидродинамика.
topicdescr/electromagneticwaves = [Интерфейс «Электромагнитные волны, частотная область»]Интерфейс «Радиочастота, электромагнитные волны, частотная область» используется для расчета распределений электромагнитного поля, гармонических во времени.\n\nДля этого физического интерфейса максимальный размер элемента сетки должен быть ограничен долей длины волны. Таким образом, размер области, которую можно моделировать, зависит от объема доступной компьютерной памяти и длины волны. Физический интерфейс поддерживает типы исследования: частотная область, собственная частота, анализ мод и анализ граничных мод. Тип исследования «Частотная область» используется для моделирования, управляемого источником, для одной частоты или последовательности частот. Тип исследования «Собственная частота» используется для поиска резонансных частот и связанных с ними собственных мод в резонансных полостях.\n\nЭтот физический интерфейс решает волновое уравнение гармоники времени для электрического поля. 
topicdescr/electromagneticwavesasymptoticscattering = [Интерфейс «Электромагнитные волны, асимптотическое рассеяние»]Физический интерфейс радиочастоты «Электромагнитные волны, асимптотическое рассеяние» используется для аппроксимации рассеянного поля и радиолокационного сечения (RCS) металлического объекта. Этот физический интерфейс определяет определяемое пользователем фоновое поле на поверхности рассеивателя, которое определяется как идеальный электрический проводник, для выполнения преобразования в дальней зоне при постобработке. \n\nДля этого физического интерфейса максимальный размер элемента сетки должен быть ограничен долей длины волны. Только границы объекта представляют собой сетку.\n\nФизический интерфейс поддерживает тип исследования частотной области для одной частоты или последовательности частот. Этот физический интерфейс не решает никаких уравнений, но подготавливает электрическое поле к преобразованию из ближнего поля в дальнее. Он не включает ни многолучевого отражения, ни дифракции.
topicdescr/electromagneticwavesbeamenvelopes = [Интерфейс «Электромагнитные волны, огибающие луча]Интерфейс «Волновая оптика, электромагнитные волны, огибающие луча» используется для расчета распределений электрических и магнитных полей для систем и устройств, в которых амплитуда поля медленно меняется в масштабе длины волны. балки. Однако для явлений оптического рассеяния, когда поле рассеивается во многих различных направлениях, интерфейс «Электромагнитные волны, частотная область» лучше подходит. \n\nВ этом физическом интерфейсе электрическое поле рассматривается как произведение медленно меняющейся огибающей функции (медленно в масштабе длины волны) и быстро меняющейся фазовой функции. Фазовая функция задана априори, поэтому физический интерфейс решает волновое уравнение гармоники времени для медленно меняющейся огибающей функции.
topicdescr/electromagneticwavesbem = [Интерфейс «Электромагнитные волны, граничные элементы»Интерфейс «Волновая оптика, электромагнитные волны, граничные элементы» предназначен для расчета распределения электрического поля в диэлектриках в условиях, когда распределение электрического поля на границах задано явно. Формулировка основана на методе граничных элементов, а интерфейс доступен в 2D и 3D. Для этого физического интерфейса максимальный размер элемента граничной сетки должен быть ограничен долей длины волны. Таким образом, размер задачи, которую можно моделировать, масштабируется в зависимости от объема доступной компьютерной памяти и длины волны. \n\nЭтот физический интерфейс решает волновое уравнение гармоники времени для электрического поля, используя тип исследования частотной области.
topicdescr/electromagneticwavesboundaryelements = [Интерфейс «Электромагнитные волны, граничные элементы»Интерфейс «Радиочастота, электромагнитные волны, граничные элементы» используется для расчета распределения электрического поля в диэлектриках в условиях, когда распределение электрического поля на границах задано явно. Формулировка основана на методе граничных элементов, а интерфейс доступен в 2D и 3D. Для этого физического интерфейса максимальный размер элемента граничной сетки должен быть ограничен долей длины волны. Таким образом, размер задачи, которую можно моделировать, масштабируется в зависимости от объема доступной компьютерной памяти и длины волны. \n\nЭтот физический интерфейс решает волновое уравнение гармоники времени для электрического поля, используя тип исследования частотной области.
topicdescr/electromagneticwavesdiscontinuousgalerkin = [Электромагнитные волны, явный интерфейс по времени] Интерфейс «Волновая оптика, электромагнитные волны, явный по времени» используется для моделирования зависящего от времени распространения электромагнитных волн в линейных средах. Источники могут быть в форме объемных электрических или магнитных токов, а также электрических поверхностных токов или полей на границах.\n\nЭтот физический интерфейс решает два дифференциальных уравнения в частных производных первого порядка (закон Фарадея's law and Maxwell-Ampère's) для электрических и магнитных полей с использованием времени Явный разрывный метод Галеркина. 
topicdescr/electromagneticwavesfrequencydomain = [Интерфейс «Электромагнитные волны, частотная область»]Интерфейс «Волновая оптика, электромагнитные волны, частотная область» используется для расчета распределений электромагнитного поля, гармонических во времени.\n\nДля этого физического интерфейса максимальный размер элемента сетки должен быть ограничен долей длины волны. Таким образом, размер области, которую можно моделировать, зависит от объема доступной компьютерной памяти и длины волны. Физический интерфейс поддерживает типы исследования: частотная область, собственная частота, анализ мод и анализ граничных мод. Тип исследования «Частотная область» используется для моделирования, управляемого источником, для одной частоты или последовательности частот. Тип исследования «Собственная частота» используется для поиска резонансных частот и связанных с ними собственных мод в резонансных полостях.\n\nЭтот физический интерфейс решает волновое уравнение гармоники времени для электрического поля. 
topicdescr/electromagneticwavestimeexplicit = [Электромагнитные волны, явный интерфейс по времени]Интерфейс «Радиочастота, электромагнитные волны, явный по времени» используется для моделирования зависящего от времени распространения электромагнитных волн в линейных средах. Источники могут быть в форме объемных электрических или магнитных токов, а также электрических поверхностных токов или полей на границах.\n\nЭтот физический интерфейс решает два дифференциальных уравнения в частных производных первого порядка (закон Фарадея's law and Maxwell-Ampère's) для электрических и магнитных полей с использованием времени Явный разрывный метод Галеркина.
topicdescr/electromagneticwavestransient = [Волновая оптика, электромагнитные волны, переходный процесс]Интерфейс «Волновая оптика, электромагнитные волны, переходный процесс» используется для решения волнового уравнения во временной области для магнитного векторного потенциала. Источники могут иметь форму точечных диполей, линейных токов или падающих полей на границах или областих. Он в основном используется для моделирования распространения электромагнитных волн в различных средах и структурах, когда требуется решение во временной области, например, для несинусоидальных сигналов или для нелинейных сред. Типичные применения включают распространение электромагнитных импульсов и генерацию гармоник в нелинейных оптических средах. 
topicdescr/electromechanics = [Интерфейс электромеханики]Интерфейс электромеханики сочетает в себе механику твердого тела и электростатику с движущейся сеткой для моделирования деформации электростатически деформируемых структур.
topicdescr/electrontransport = [Интерфейс дрейфовой диффузии]Интерфейс дрейфовой диффузии используется для расчета электронной плотности и средней энергии электронов. Доступен широкий диапазон граничных условий для обработки вторичной эмиссии, термоэлектронной эмиссии и потерь на стенках.
topicdescr/electrophoretictransport = [Интерфейс электрофоретического транспорта]Интерфейс электрофоретического транспорта используется для расчета полей потенциала и концентрации разбавленного растворенного вещества в водном растворителе. Движущими силами транспорта являются диффузия, миграция и конвекция согласно уравнениям Нернста-Планка, которые сочетаются с электронейтральностью и равновесием диссоциации для слабых кислот, оснований и амфолитов, а также реакцией автоионизации воды.\n\nФизический интерфейс обычно используется для моделирования различных режимы электрофореза, такие как зональный электрофорез, изотахофорез, изоэлектрофокусирование и электрофорез с подвижной границей.
topicdescr/electrostatics = [Интерфейс электростатики]Интерфейс электростатики используется для расчета электрического поля, поля электрического смещения и распределения потенциала в диэлектриках в условиях, когда распределение электрического заряда явно задано. Формулировка является стационарной, но для использования вместе с другими физическими данными, а также собственной частотой, частотной областью, анализом малых сигналов и моделированием во временной области, поддерживаются во всех пространственных измерениях. \n\nФизический интерфейс решает закон Гаусса для электрического поля, используя скалярный электрический потенциал в качестве зависимой переменной.
topicdescr/electrostaticsboundaryelements = [Интерфейс Электростатика, Граничные элементы]Интерфейс Электростатика, Граничные элементы используется для расчета распределения потенциала в диэлектриках в условиях, когда распределение электрического потенциала на границах задано явно. Формулировка основана на методе граничных элементов, а интерфейс доступен в 2D и 3D.\n\nФизический интерфейс решает уравнение Лапласа для электрического потенциала, используя скалярный электрический потенциал в качестве зависимой переменной.
topicdescr/elw = [Отдел «Упругие волны»]Интерфейсы «Упругие волны» используются для расчета распространения упругих волн в твердых телах, а также совместного распространения упругих волн и волн давления в пористых материалах. Задачи упругих волн могут решаться как в частотной области, так и во временной области, тогда как распространение пороупругих волн рассматривается в частотной области. Также существует специальный интерфейс, основанный на разрывном методе Галеркина (dG-FEM), который использует решатель с явным временем. Этот метод очень ресурсоемок по памяти. Твердые или пористые области можно соединить с жидкостными областями с помощью одной из многих встроенных мультифизических связей. Существуют предопределенные мультифизические интерфейсы, которые расположены в папке Acoustic–Structure Interaction.
topicdescr/equilibriumdischarges = [Отдел равновесных разрядов] Равновесные разряды, также известные как термическая плазма, имеют широкий спектр промышленных применений, включая резку, сварку, распыление, уничтожение отходов и обработку поверхности. В современных методах производства тепловой плазмы обычно используются дуги высокой интенсивности или высокочастотные индуктивно связанные разряды. Целью интерфейсов «Равновесный разряд» является моделирование тепловой плазмы, генерируемой первыми двумя методами (т.е. дугами или индуктивно связанными разрядами). Соответственно, целевыми областями применения являются в первую очередь плазменные горелки постоянного тока и индуктивной связи, а также устройства для дуговой сварки.
topicdescr/equivalentb = [Отдел равновесных разрядов] Равновесные разряды, также известные как термическая плазма, имеют широкий спектр промышленных применений, включая резку, сварку, распыление, уничтожение отходов и обработку поверхности. В современных методах производства тепловой плазмы обычно используются дуги высокой интенсивности или высокочастотные индуктивно связанные разряды. Целью интерфейсов «Равновесный разряд» является моделирование тепловой плазмы, генерируемой первыми двумя методами (т.е. дугами или индуктивно связанными разрядами). Соответственно, целевыми областями применения являются в первую очередь плазменные горелки постоянного тока и индуктивной связи, а также устройства для дуговой сварки.
topicdescr/eulereulermodelkeps = [Модель Эйлера-Эйлера, интерфейс турбулентного потока]Модель Эйлера-Эйлера, интерфейс турбулентного потока можно использовать для моделирования потока с высоким числом Рейнольдса в двухфазной смеси, содержащей непрерывную и дисперсную фазы. Модель Эйлера-Эйлера предполагает, что обе фазы непрерывны, полностью взаимопроникающи и несжимаемы. Типичными применениями интерфейса являются псевдоожиженный слой (твердые частицы в газе), седиментация (твердые частицы в жидкости) или транспортировка капель или пузырьков жидкости в жидкости.\n\nФизический интерфейс решает два набора уравнений Навье-Стокса, по одному для каждой фазы, чтобы вычислить поле скоростей для каждой фазы. Фазы обмениваются импульсом, как описано в модели сопротивления. Давление рассчитывается по усредненному для смеси уравнению неразрывности, а объемная доля дисперсной фазы отслеживается с помощью уравнения переноса. ограничения. Интерфейс включает возможность решения одного набора k-ε уравнений для двухфазной смеси или решения двух наборов k-ε уравнений, по одному для каждой фазы. Поток вблизи стенок моделируется с использованием стеновых функций.
topicdescr/events = [Интерфейс событий]Интерфейс «События» используется для создания событий решателя. Событие может быть явным или неявным, разница в том, что для явных событий необходимо указать точное время возникновения события. При возникновении события решатель останавливается и предоставляет возможность повторно инициализировать значения состояний и зависимых переменных. Также можно указать последовательность событий, которые будут происходить, используя функцию «Последовательность событий».
topicdescr/fatigue = [Интерфейс усталости]Интерфейс усталости используется для оценки усталости на основе результатов напряжения, деформации или энергии, рассчитанных с помощью физических интерфейсов механики конструкций.\n\nВычисленный цикл деформации может представлять собой последовательность стационарных вариантов деформации, параметрическое решение или решение, зависящее от времени. Деформация также может быть представлена ​​разверткой по частоте или PSD на основе анализа случайной вибрации. Также возможно выполнить анализ напряжений дождевых потоков на основе вычисленных или измеренных историй нагрузок.
topicdescr/fc = [Ветка «Водородные топливные элементы]» Ветка «Водородные топливные элементы» содержит интерфейсы для моделирования топливных элементов, в которых на анодной стороне присутствует смесь водорода, а на катодной стороне — кислородная (воздушная) смесь соответственно. Могут быть включены дополнительные виды газа, такие как азот, окись углерода, диоксид углерода и водяной пар. \n\nИнтерфейсы раздела включают перенос заряда в электролитной и электродной фазах и электродные реакции в отдельных анодном и катодном отделениях, а также, необязательно, газофазную диффузию. Закон Дарси о передаче импульса также можно решить с помощью интерфейсов. Другие модели переноса импульса для потока жидкости можно использовать путем подключения к отдельным интерфейсам потока жидкости. \n\nДля включенных реагирующих газов и электродных реакций будут использоваться различные настройки по умолчанию в зависимости от выбранного типа ячейки.
topicdescr/ff = [Физические группы в мастере моделей]Интерфейсы Fluid Flow используются для моделирования полей потока и давления жидкостей и газов. Физические интерфейсы охватывают однофазный поток, многофазный поток, поток в тонких пленках, поток пористой среды и поток в трубах, в зависимости от лицензированных продуктов.
topicdescr/flowinpipes = [Интерфейс Pipe Flow]Интерфейс Pipe Flow используется для расчета полей скорости и давления в трубах и каналах различной формы. Он аппроксимирует профили потока в трубопроводе с помощью одномерных предположений в сегментах кривой или линиях. Эти линии могут быть нарисованы в 2D или 3D и представляют собой упрощенную форму полых трубок.
topicdescr/fluid_particle_interaction = [Интерфейс взаимодействия с частицами жидкости] Интерфейс «Взаимодействие с частицами жидкости» сочетает в себе интерфейс «Трассировка частиц для потока жидкости» и интерфейс «Ламинарный поток». Функция мультифизического взаимодействия Fluid Particle Interaction добавляется автоматически. Интерфейс Fluid Particle Interaction используется для моделирования движения частиц в жидкости. Поскольку частицы ускоряются или замедляются под действием силы сопротивления, оказываемой жидкостью, к жидкости прикладывается соответствующая сила реакции.
topicdescr/fluidparticletracing = [Интерфейс «Трассировка частиц для потока жидкости»]Интерфейс «Трассировка частиц для потока жидкости» используется для расчета движения частиц в фоновой жидкости. Движение частиц может быть обусловлено сопротивлением, гравитацией, а также электрическими, магнитными и акустофоретическими силами. Могут быть добавлены определяемые пользователем силы. Также возможно вычислить массу и температуру частицы, а также взаимодействие частицы с жидкостью.
topicdescr/fluidstructureinteraction = [Интерфейс взаимодействия жидкости и структуры] Используя мультифизический интерфейс Fluid–Structure Interaction, вы можете моделировать явления, в которых жидкость и деформируемое твердое тело влияют друг на друга. Интерфейс моделирует как жидкую область, так и твердую область (структуру) и включает заранее определенные условия для взаимодействия на границах жидкость-твердое тело. Формулировка ALE используется для учета геометрических изменений жидкой области. \n\nЖидкость может быть сжимаемой или несжимаемой. Режим течения может быть ламинарным или турбулентным (при наличии модуля CFD). Область твердого тела обладает всеми функциями, доступными в интерфейсе «Механика твердого тела», включая условия контакта, а также нелинейные материалы, если доступен модуль «Нелинейные конструкционные материалы» или модуль «Геомеханика». Интерфейс Fluid–Structure Interaction моделирует двустороннюю связь между твердыми телами и жидкостями. Однако существуют также специальные этапы исследования, позволяющие моделировать одностороннее взаимодействие жидкости и конструкции.
topicdescr/fluidstructureinteraction[sme] = [Интерфейс взаимодействия жидкости и структуры] Используя мультифизический интерфейс Fluid–Structure Interaction, вы можете моделировать явления, в которых жидкость и деформируемое твердое тело влияют друг на друга. Интерфейс моделирует как жидкую область, так и твердую область (структуру) и включает заранее определенные условия для взаимодействия на границах жидкость-твердое тело. Формулировка ALE используется для учета геометрических изменений жидкой области. \n\nЖидкость может быть сжимаемой или несжимаемой. Режим течения может быть ламинарным или турбулентным (при наличии модуля CFD). Область твердого тела обладает всеми функциями, доступными в интерфейсе «Механика твердого тела», включая условия контакта, а также нелинейные материалы, если доступен модуль «Нелинейные конструкционные материалы» или модуль «Геомеханика». Интерфейс Fluid–Structure Interaction моделирует двустороннюю связь между твердыми телами и жидкостями. Однако существуют также специальные этапы исследования, позволяющие моделировать одностороннее взаимодействие жидкости и конструкции.
topicdescr/foo = [Граница смешанного состава]Узел «Граница смешанного состава» обеспечивает непрерывность между магнитным скалярным потенциалом на одной стороне границы и магнитным векторным потенциалом на другой стороне.
topicdescr/fractureflow = [Интерфейс Fracture Flow] Интерфейс Fracture Flow используется для моделирования потока вдоль внутренних границ, представляющих трещины в пористой или твердой среде. \n\nФизический интерфейс использует вариант закона Дарси и может использоваться для стационарного и нестационарного анализа. 
topicdescr/freeandporousmediaflow = [Интерфейс «Поток свободной и пористой среды», Бринкман]Интерфейс «Поток свободной и пористой среды», Бринкман используется для расчета полей скорости жидкости и давления однофазного потока, когда свободный поток связан с пористой средой. Физический интерфейс хорошо подходит для перехода между потоком в пористых средах, определяемым уравнениями Бринкмана, и потоком в каналах, описываемым уравнениями Навье-Стокса. Жидкости с различной плотностью могут быть включены при числах Маха ниже 0,3. Также вязкость жидкости может меняться, например, для описания неньютоновских жидкостей. Кроме того, доступен набор моделей RANS (Reynolds Averaged Navier-Stokes) для моделирования турбулентности как в потоке свободной, так и в пористой среде. \n\nФизический интерфейс можно использовать для стационарного и нестационарного анализа.
topicdescr/freemolecularflow = [Интерфейс свободного молекулярного потока]Интерфейс свободного молекулярного потока используется для моделирования молекулярных потоков, взаимодействующих с объектами, которые движутся медленно по отношению к скорости молекул, такими как микроустройства или вакуумные системы. Предполагается диффузное отражение от всех поверхностей, когда молекулы со всех направлений эффективно адсорбируются на поверхности и впоследствии переизлучаются в соответствии с законом Кнудсена. Можно смоделировать влияние температуры на поток. Обычно свободный молекулярный поток возникает при числах Кнудсена выше 10.
topicdescr/freeporous = [Интерфейс потока свободной и пористой среды]Интерфейс потока свободной и пористой среды используется для расчета полей скорости жидкости и давления однофазного потока, когда свободный поток связан с пористой средой. Интерфейс Free and Porous Media Flow используется как минимум в двух разных областях: свободный канал и пористая среда. Физический интерфейс хорошо подходит для переходов между медленным течением в пористых средах, определяемым уравнениями Бринкмана, и быстрым течением в каналах, описываемым уравнениями Навье-Стокса. Жидкости с различной плотностью могут быть включены при числах Маха ниже 0,3. Также вязкость жидкости может меняться, например, для описания неньютоновских жидкостей.\n\nФизический интерфейс можно использовать для стационарного и нестационарного анализа. 
topicdescr/frequencypipeacoustics = [Интерфейс «Акустика трубы, частотная область»] Интерфейс «Акустика трубы, частотная область» используется для расчета изменений акустического давления и скорости при моделировании распространения звуковых волн в гибких трубопроводных системах. Основные уравнения сформулированы в общем виде с учетом возможности стационарного фонового течения. Физический интерфейс можно, например, использовать для расчета распространения звуковых волн в системах отопления, вентиляции и кондиционирования, других крупных трубопроводных системах или просто в органной трубе. \n\nВ частотной области все источники и вариации считаются гармоническими. Решаемые уравнения предполагают, что распространяющиеся волны плоские. Распространение мод более высокого порядка, существующих выше частоты среза, определяемой поперечным сечением трубы, не моделируется. \n\nУравнения, управляющие распространением звука в трубах, основаны на учете балансов импульса, массы и энергии для контрольного объема куска трубы. Полученные уравнения выражаются в усредненных по поперечному сечению переменных и сводят уравнения к одномерной модели со скалярными зависимыми переменными. Интерфейс доступен в 3D для ребер и точек и в 2D для границ и точек.
topicdescr/gac = [Отдел геометрической акустики]Отдел геометрической акустики включает физические интерфейсы лучевой акустики и уравнения акустической диффузии. Физика обоих интерфейсов справедлива в высокочастотном пределе, где длина акустической волны меньше характерных геометрических особенностей. Это на частотах выше частоты Шредера для помещений. Оба интерфейса подходят для моделирования акустики помещений и концертных залов. Уравнение акустической диффузии ограничено приложениями внутри помещений, тогда как интерфейс Ray Acoustics можно использовать, например, для акустики океана и атмосферы. Акустические свойства на границах учитываются с помощью различных моделей поглощения.
topicdescr/generalformboundarypde = [Интерфейсы PDE общей формы] Интерфейс PDE общей формы обеспечивает гибкий интерфейс для задания и решения PDE общей формы на границах.
topicdescr/generalformboundarypde{1axi} = ${topicdescr/generalformboundarypde}\n\nПримечание: интерфейс PDE General Form Boundary никоим образом не учитывает осевую симметрию геометрии; направление r рассматривается как одномерная линия. 
topicdescr/generalformboundarypde{axi} = ${topicdescr/generalformboundarypde}\n\nПримечание: интерфейс PDE General Form Boundary никоим образом не учитывает осевую симметрию геометрии; Плоскость rz рассматривается как плоская двумерная геометрия. 
topicdescr/generalformedgepde = [Интерфейсы PDE общей формы]Интерфейс PDE общей формы Edge предоставляет гибкий интерфейс для задания и решения PDE общей формы на ребрах в 3D.
topicdescr/generalformedgepde{1axi} = ${topicdescr/generalformedgepde}\n\nПримечание: интерфейс PDE General Form Edge никоим образом не учитывает осевую симметрию геометрии; направление r рассматривается как одномерная линия. 
topicdescr/generalformedgepde{axi} = ${topicdescr/generalformedgepde}\n\nПримечание: интерфейс PDE General Form Edge никоим образом не учитывает осевую симметрию геометрии; Плоскость rz рассматривается как плоская двумерная геометрия. 
topicdescr/generalformpde = [Интерфейсы PDE общей формы]Интерфейс PDE общей формы предоставляет общий интерфейс для задания и решения PDE общей формы. Формат, использующий дивергенцию вектора потока, тесно связан с законами сохранения, которые управляют многими областями физики. В практических приложениях вектор потока обычно представляет собой поток сохраняющейся величины, такой как тепло, заряд, масса или импульс. Этот поток обычно каким-то эмпирическим путем, посредством материального закона, связан с градиентом зависимой переменной.
topicdescr/generalformpde{1axi} = ${topicdescr/generalformpde}\n\nПримечание: интерфейс PDE General Form никоим образом не учитывает осевую симметрию геометрии; направление r рассматривается как одномерная линия. 
topicdescr/generalformpde{axi} = ${topicdescr/generalformpde}\n\nПримечание: интерфейс PDE General Form никоим образом не учитывает осевую симметрию геометрии; Плоскость rz рассматривается как плоская двумерная геометрия. 
topicdescr/generalformpointpde = [Интерфейсы PDE общей формы] Интерфейс PDE общей формы обеспечивает гибкий интерфейс для задания и решения PDE общей формы в точках.
topicdescr/generalformpointpde{1axi} = ${topicdescr/generalformpointpde}\n\nПримечание: интерфейс PDE General Form Point никоим образом не учитывает осевую симметрию геометрии; направление r рассматривается как одномерная линия. 
