topicdescr/multiphysicstwophaseflowphasefieldlvel = [Турбулентный двухфазный поток, Фазовое поле, L-VEL интерфейс] Турбулентный двухфазный поток, Фазовое поле, мультифизический интерфейс L-VEL используется для отслеживания интерфейса между двумя несмешивающимися жидкостями при высоких числах Рейнольдса. \n\nМультифизический интерфейс сочетает в себе турбулентный поток, L-VEL и фазовое поле в интерфейсах жидкостей, и автоматически добавляется двухфазная мультифизическая связь Фазового поля. Она решает уравнения Навье-Стокса для сохранения импульса и уравнение непрерывности для сохранения массы. Положение интерфейса отслеживается путем решения двух дополнительных транспортных уравнений, одно для переменной фазового поля и одно для свободной энергии. Движение поверхности определяется минимизацией свободной энергии. Эффекты турбулентности включаются с использованием модели повышенной вязкости, основанной на расстоянии локальной стены. Следовательно, физический интерфейс включает в себя уравнение расстояния между стенами.\n\nСимуляции с использованием турбулентного двухфазного потока, поля фазы, интерфейса L-VEL всегда зависят от времени, поскольку положение интерфейса почти всегда зависит от его истории.
topicdescr/multiphysicstwophaseflowphasefieldrealizablekeps = [Турбулентный двухфазный поток, Фазовое поле, Реализуемый k-ε Интерфейс] Турбулентный двухфазный поток, Фазовое поле, Реализуемый k-ε мультифизический интерфейс используется для отслеживания интерфейса между двумя несмешивающимися жидкостями при высоких числах Рейнольдса. \n\nМультифизический интерфейс сочетает в себе турбулентный поток, реализуемый k-ε и интерфейсы фазового поля в жидкостях, и автоматически добавляется двухфазная мультифизическая связь Фазового поля. Она решает уравнения Навье-Стокса для сохранения импульса и уравнение непрерывности для сохранения массы. Положение интерфейса отслеживается путем решения двух дополнительных транспортных уравнений, одно для переменной фазового поля и одно для свободной энергии. Движение поверхности определяется минимизацией свободной энергии. Эффекты турбулентности моделируются с использованием реализуемой модели с двумя уравнениями k-ε. Поток, близкий к стенам, моделируется с использованием функций стен.\n\nSimulations с использованием турбулентного двухфазного потока, поля фазы, реализуемого интерфейса k-ε, всегда зависит от времени, поскольку положение интерфейса почти всегда зависит от его истории.
topicdescr/multiphysicstwophaseflowphasefieldspalartallmaras = [Турбулентный двухфазный поток, Фазовое поле, Интерфейс Спаларта-Альмараса] Турбулентный двухфазный поток, Фазовое поле, мультифизический интерфейс Спаларта-Альмараса используется для отслеживания интерфейса между двумя несмешивающимися жидкостями при высоких числах Рейнольдса. \n\nМультифизический интерфейс объединяет в себе интерфейсы турбулентное течение, Spalart-Allmaras и Phase Field in Fluids, и автоматически добавляется двухфазная мультифизическая связь Фазового поля. Она решает уравнения Навье-Стокса для сохранения импульса и уравнение непрерывности для сохранения массы. Положение интерфейса отслеживается путем решения двух дополнительных транспортных уравнений, одно для переменной фазового поля и одно для свободной энергии. Движение поверхности определяется минимизацией свободной энергии. Эффекты турбулентности моделируются с использованием модели одного уравнения Спаларта-Альмараса. Модель Spalart-Allmaras представляет собой так называемую модель с низкими числами Рейнольдса, что означает, что она может разрешать поток вплоть до стены. Модель Spalart-Allmaras зависит от расстояния до ближайшей стены. Таким образом, физический интерфейс включает в себя уравнение расстояния между стенами.\n\nСимуляции с использованием турбулентного двухфазного потока, поля фазы, интерфейса Спаларта-Альмараса всегда зависят от времени, поскольку положение интерфейса почти всегда зависит от его истории.
topicdescr/multiphysicstwophaseflowphasefieldsst = [Турбулентный двухфазный поток, поле фазы, интерфейс SST] Турбулентный двухфазный поток, поле фазы, мультифизический интерфейс SST используется для отслеживания интерфейса между двумя несмешивающимися жидкостями при высоких числах Рейнольдса. \n\nМультифизический интерфейс объединяет в себе интерфейсы турбулентное течение, SST и Phase Field in Fluids, и автоматически добавляется двухфазная мультифизическая связь Фазового поля. Она решает уравнения Навье-Стокса для сохранения импульса и уравнение непрерывности для сохранения массы. Положение интерфейса отслеживается путем решения двух дополнительных транспортных уравнений, одно для переменной фазового поля и одно для свободной энергии. Движение поверхности определяется минимизацией свободной энергии. Эффекты турбулентности моделируются с использованием модели переноса сдвига-напряжения Menter (SST) с ограничениями реализуемости. Модель SST представляет собой так называемую модель с низким числом Рейнольдса, что означает, что она может разрешать поток вплоть до стены. Модель SST зависит от расстояния до ближайшей стены. Следовательно, физический интерфейс включает в себя уравнение расстояния между стенами.\n\nСимуляции с использованием турбулентного двухфазного потока, поля фазы, интерфейса SST всегда зависят от времени, поскольку положение интерфейса почти всегда зависит от его истории.
topicdescr/multiphysicstwophaseflowphasefieldv2f = [Турбулентный двухфазный поток, фазовое поле, интерфейс v2-f]Мультифизический интерфейс «Турбулентный двухфазный поток, фазовое поле, v2-f» используется для отслеживания границы раздела между двумя несмешивающимися жидкостями при высоких числах Рейнольдса.\n\nМультифизический интерфейс объединяет интерфейсы «Турбулентный поток», v2-f и «Фазовое поле в жидкостях», а мультифизическая связь «Двухфазный поток» и «Фазовое поле» добавляется автоматически. Он решает уравнения Навье-Стокса для сохранения импульса и уравнение неразрывности для сохранения массы. Положение границы раздела отслеживается путем решения двух дополнительных уравнений переноса: одного для переменной фазового поля и одного для свободной энергии. Движение поверхности определяется минимизацией свободной энергии. Эффекты турбулентности моделируются с использованием модели v2-f, выраженной через турбулентные относительные флуктуации (v2, нормированный на k). Эллиптическая функция используется для смешивания пристеночных и объемных членов в уравнениях модели турбулентности. Модель v2-f представляет собой так называемую модель с низким числом Рейнольдса, что означает, что она может разрешить поток вплоть до стенки.Модель v2-f зависит от расстояния до ближайшей стены. Поэтому физический интерфейс включает уравнение расстояния до стены.\n\nМоделирование с использованием интерфейса Турбулентный двухфазный поток, Фазовое поле, v2-f всегда зависит от времени, поскольку положение интерфейса почти всегда зависит от его истории.
topicdescr/multiphysicstwophasethinfilmflowdomainphasefield = [Двухфазный тонкий пленочный поток, область, интерфейс фазового поля] Двухфазный тонкий пленочный поток, мультифизический интерфейс области, фазового поля используется для отслеживания интерфейса между двумя несмешивающимися жидкостями. Предполагается, что жидкости текут в узком канале, который представлен областью в геометрии. \n\nМультифизический интерфейс сочетает в себе тонкий поток, интерфейс области и интерфейс поля фазы в жидкостях. Автоматически добавляется двухфазная тонкая пленочная связь Фазового поля. Он решает уравнение Рейнольдса или модифицированное уравнение Рейнольдса для потока жидкости. Положение интерфейса отслеживается путем решения двух дополнительных транспортных уравнений, одно для переменной фазового поля и одно для плотности смешивания энергии. Движение поверхности определяется минимизацией свободной энергии. \n\nСимуляции с использованием двухфазного тонкофильмового интерфейса, области, поля фазы всегда зависят от времени, поскольку положение интерфейса почти всегда зависит от его истории.
topicdescr/multiphysicstwophasethinfilmflowedgephasefield = [Двухфазный тонкий пленочный поток, интерфейс поля фазы] Двухфазный тонкий пленочный поток, мультифизический интерфейс поля фазы используется для отслеживания интерфейса между двумя несмешивающимися жидкостями. Предполагается, что жидкости текут в узком канале, который представлен краем в геометрии. \n\nМультифизический интерфейс объединяет интерфейс Thin-Film Flow и интерфейс Phase Field, Thin-Film Flow. Автоматически добавляется двухфазная тонкая пленочная связь Фазового поля. Он решает уравнение Рейнольдса или модифицированное уравнение Рейнольдса для потока жидкости. Положение интерфейса отслеживается путем решения двух дополнительных транспортных уравнений, одно для переменной фазового поля и одно для плотности смешивания энергии. Движение поверхности определяется минимизацией свободной энергии. \n\nСимуляции с использованием двухфазного тонкофильмового интерфейса всегда зависят от времени, поскольку положение интерфейса почти всегда зависит от его истории.
topicdescr/multiphysicstwophasethinfilmflowshellphasefield = [Двухфазный тонкий пленочный поток, интерфейс поля фазы] Двухфазный тонкий пленочный поток, мультифизический интерфейс поля фазы используется для отслеживания интерфейса между двумя несмешивающимися жидкостями. Предполагается, что жидкости текут в узком канале, который представлен поверхностью в геометрии. \n\nМультифизический интерфейс объединяет интерфейс Thin-Film Flow и интерфейс Phase Field, Thin-Film Flow. Автоматически добавляется двухфазная тонкая пленочная связь Фазового поля. Он решает уравнение Рейнольдса или модифицированное уравнение Рейнольдса для потока жидкости. Положение интерфейса отслеживается путем решения двух дополнительных транспортных уравнений, одно для переменной фазового поля и одно для плотности смешивания энергии. Движение поверхности определяется минимизацией свободной энергии. \n\nСимуляции с использованием двухфазного тонкофильмового интерфейса всегда зависят от времени, поскольку положение интерфейса почти всегда зависит от его истории.
topicdescr/multiphysicsunsaturatedporoelasticcoupling = [Интерфейс ненасыщенной пороэластичности] Интерфейс мультифизики ненасыщенной пороэластичности сочетает в себе транспорт влаги в твердых телах с квазистатической формулировкой твердой механики. Связь происходит на уровне области, где давление пор от интерфейса Moisture Transport in Solids действует как деформация для интерфейса механика твердого тела, вызывая отек или сокращение. Изменения объемной деформации влияют на поровое пространство, которое действует как источник массы или сток для интерфейса Moisture Transport in Solids.
topicdescr/multiphysicsvaporflowkeps = [Интерфейс The Vapor Flow, турбулентное течение, k-ε]Мультифизический интерфейс турбулентное течение, k-ε используется для моделирования переноса частиц в паровой смеси, связанной с потоком в турбулентном режиме.\n\nОн сочетает в себе транспорт концентрированных частиц в паре и турбулентный поток, интерфейсы k-ε. Мультифизическая связь Reacting Flow, добавляемая автоматически, связывает поток жидкости и массоперенос пара и применяет моделирование турбулентности для массопереноса пара.\n\nИнтерфейс можно использовать для стационарного и временного анализа в 2D, 2D осесимметричной и 3D геометрии. 
