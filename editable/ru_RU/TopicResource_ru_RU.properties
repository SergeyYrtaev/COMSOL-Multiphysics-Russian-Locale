topicdescr/acdc = [Физические группы в мастере моделей]Интерфейсы переменного/постоянного тока используются для расчета электрических и магнитных полей в статических и низкочастотных системах; то есть в системах, где длина волны существенно больше, чем у исследуемого устройства.\n\nВ зависимости от лицензированных продуктов интерфейсы переменного/постоянного тока могут использоваться для моделирования электрических цепей, проводимости электрического тока, магнитных и электрических полей с полными векторными формулировками, орбит заряженных частиц и вращающихся механизмов, таких как двигатели и генераторы.
topicdescr/aco = [Физические группы в мастере моделей]Акустические интерфейсы используются для расчета распространения акустических полей при различных условиях как в частотной, так и во временной области. В зависимости от физического интерфейса зависимыми переменными могут быть, например, скалярное акустическое давление, акустические изменения давления, скорости и температуры или акустические лучи. Существуют физические интерфейсы для решения классической акустики в спокойном фоновом режиме, для решения аэроакустики при наличии фонового потока, а также для приложений ультразвуковой и комнатной акустики. Распространение акустических волн в пористых материалах рассматривается в нескольких физических интерфейсах. Интерфейсы термовязкостной акустики позволяют точно моделировать акустику в геометрии с небольшими размерами. В различных мультифизических интерфейсах предусмотрены заранее заданные связи между упругими колебаниями и волнами в твердых телах, а также волнами давления в жидкостях.
topicdescr/acousticdiffusionequation = [Уравнение акустической диффузии] Интерфейс уравнения акустической диффузии решает уравнение диффузии для распределения плотности акустической энергии для акустики помещения. Он применим для высокочастотной акустики, когда акустические поля рассеяны. Диффузия плотности акустической энергии зависит от длины свободного акустического пути и, следовательно, от геометрии помещения. Поглощение может применяться к стенам, а потери при передаче могут применяться при соединении помещений. Можно добавить повышенную диффузию за счет приспособления помещения. Свойства материалов и источники можно указать в полосах частот.\n\nИнтерфейс хорошо подходит для быстрой оценки распределения уровня звукового давления внутри зданий и других крупных сооружений. По сравнению с симуляцией лучевой акустики, этот интерфейс не содержит никакой информации о фазе, прямом звуке или ранних отражениях. Интерфейс поддерживает стационарные исследования для моделирования установившегося распределения звуковой энергии или уровня звукового давления. Исследование зависимости от времени можно использовать для определения кривых затухания энергии и времени реверберации. Время реверберации связанных и несвязанных помещений также можно определить с помощью исследования собственных значений. Собственное значение напрямую связано со временем экспоненциального затухания.
topicdescr/acousticpiezo = [Интерфейс акустического-пьезоэлектрического взаимодействия, частотная область]Интерфейс «Акустика-пьезоэлектрическое взаимодействие, частотная область» объединяет интерфейсы «Акустика давления», «Частотная область» и «Пьезоэлектрические устройства» для подключения и расчета изменений акустического давления в жидкостях со структурной деформацией как в твердых телах, так и в твердых пьезоэлектрических областях. Физический интерфейс также включает функции электростатики для расчета электрического поля в пьезоэлектрическом материале. Его можно, например, использовать для моделирования пьезоэлектрических преобразователей для гидролокаторов или медицинских приложений и, например, для улучшения слоев согласования импедансов, а также диаграмм направленности излучения преобразователя в дальней зоне.\n\nУравнение Гельмгольца решается в области жидкости, а структурные уравнения - в твердом теле вместе с определяющими соотношениями, необходимыми для моделирования пьезоэлектриков. Можно моделировать как прямые, так и обратные пьезоэлектрические эффекты, а пьезоэлектрическую связь можно сформулировать с использованием форм заряда деформации или заряда напряжения.
topicdescr/acousticshell = [Взаимодействие акустической оболочки, интерфейс частотной области] Интерфейс Acoustic–Shell Interaction, частотная область объединяет функции интерфейсов «Акустика давления», «Частотная область» и «Оболочка», чтобы связать акустические изменения давления в области жидкости со структурной деформацией границы оболочки. Его можно, например, использовать для определения передачи звука через тонкую упругую конструкцию, такую как капот автомобиля, и анализа виброакустики диффузора громкоговорителя. нормальное ускорение на границе жидкость-структура.\n\nОсобые условия интерфейса легко определяются на границе жидкость-оболочка и определяют нагрузки жидкости на границу оболочки и влияние структурных ускорений на жидкость. Физический интерфейс доступен для трехмерной и двумерной осесимметричной геометрии и способен моделировать связанную акустику давления и вибрации оболочки в частотной области. 
topicdescr/acousticsolid = [Интерфейс акустического-твердого тела, частотная область] Интерфейс Acoustic–Твердое взаимодействие, частотная область объединяет интерфейсы «Акустика давления», «Частотная область» и «Механика твердого тела» для связи акустических изменений давления в области жидкости со структурной деформацией в области твердого тела. Его можно, например, использовать для определения прохождения звука через упругую конструкцию или для решения связанных виброакустических явлений, присутствующих в громкоговорителе. через границу жидкость-твердое тело.\n\nСпециальные условия интерфейса легко определяются на границе жидкость-твердое тело и определяют нагрузки жидкости на твердую область и влияние структурных ускорений на жидкость. Интерфейс существует для исследований частотной области и собственных частот.
topicdescr/acst = [Отдел Acoustic Streaming]Мультифизические интерфейсы Acoustic Streaming используются для расчета устойчивого потока жидкости, называемого акустическим потоком, индуцированного акустическим полем. Акустическое течение — нелинейное явление, возникающее из-за нелинейности уравнений Навье-Стокса. Реализация справедлива в пределе, когда гармониками более высокого порядка можно пренебречь. \n\nМультифизические интерфейсы Acoustic Streaming используют две мультифизические связи Acoustic Streaming Domain Coupling и Acoustic Streaming Boundary Coupling для соединения акустического интерфейса (акустики давления или термовязкостной акустики) и интерфейса потока жидкости. Acoustic Streaming Domain Coupling вычисляет силы в области жидкости, а Acoustic Streaming Boundary Coupling вычисляет скорость скольжения из-за акустических эффектов на границе.
topicdescr/aeac = [Отдел аэроакустики]Интерфейсы аэроакустики используются для расчета распространения акустических волн под воздействием стационарного фонового поля потока, также известного как конвекционная акустика. Существуют различные формулировки линеаризованных уравнений этого типа в зависимости от физических свойств жидкости. Они включают линеаризованные уравнения потенциального потока для моделирования акустики без потерь в безвихревых жидкостях, описываемых потенциальным потоком, линеаризованные уравнения Эйлера для моделирования акустики без потерь в любом потоке идеальных газов и линеаризованные уравнения Навье-Стокса для моделирования детального распространения звука в любом потоке жидкости. Соединение интерфейсов с конструкциями позволяет проводить детальный анализ вибрации конструкций в присутствии потока, например, FSI в частотной области, включая выполнение анализа собственных частот.
topicdescr/alphabetaphasetransformation = [Фазовое преобразование альфа-бета]Интерфейс фазового преобразования альфа-бета представляет собой специализированную версию интерфейса фазового преобразования металла. Он доступен для 3D, 2D, 1D или осесимметричных тел и специализируется на изучении альфа-бета-фазовых превращений во время охлаждения и/или нагревания титана. Интерфейс автоматически генерирует несколько металлургических фаз и фазовых превращений, которые могут возникнуть во время термического переходного процесса.\n\nЭволюционирующий состав материала рассчитывается на основе различных фазовых превращений. Эффективные термические и механические свойства составного материала могут быть дополнительно вычислены. \n\nДеформации фазового преобразования, возникающие в результате эффектов объемной аккомодации, могут быть рассчитаны и использованы в структурном анализе. Скрытое тепло от фазовых превращений можно вычислить и использовать в анализе теплопередачи.\n\nФизический интерфейс поддерживает анализ, зависящий от времени.
topicdescr/linearizedpotentialflowfrequency = [Интерфейс «Линеаризованный потенциальный поток, частотная область»] Интерфейс «Линеаризованный потенциальный поток, частотная область» используется для расчета акустических изменений потенциала скорости в присутствии невязкого и безвихревого фонового среднего потока, то есть потенциального потока. Физический интерфейс используется для аэроакустического моделирования, которое может быть описано линеаризованными уравнениями потенциального сжимаемого потока.\n\nУравнения сформулированы в частотной области и предполагают гармонические изменения всех источников и полей. Физический интерфейс ограничен потоками с числом Маха M<1, частично из-за ограничений потенциального потока и частично из-за настроек акустических границ, необходимых для сверхзвукового потока. Связь между акустическим полем и фоновым потоком не включает в себя какой-либо заранее заданный шум, вызванный потоком.
topicdescr/asi = [Отдел взаимодействия акустической конструкции]Мультифизические интерфейсы Acoustic–Structure Interaction используются для расчета взаимодействия упругих волн в твердых телах и волн давления в жидкостях. Это мультифизическое явление также называют виброакустикой, взаимодействием жидкости и структуры (FSI) или просто ASI. Физические интерфейсы имеют предварительно определенные мультифизические граничные условия, определяющие связи. Также доступны физические интерфейсы для моделирования пьезоэлектрических материалов и их взаимодействия с твердыми телами и жидкостями, а также взаимодействия пороупругих волн, твердых тел и жидкостей. В зависимости от лицензионных продуктов существуют также физические интерфейсы для моделирования взаимодействия упругих волн в оболочках и акустических волн в жидкостях.
topicdescr/austenitedecomposition = [Разложение аустенита]Интерфейс «Разложение аустенита» представляет собой специализированную версию физического интерфейса фазового превращения металла. Он доступен для 3D, 2D, 1D или осесимметричных тел и специализируется на изучении распада аустенита во время быстрого охлаждения стали из аустенитного состояния. Интерфейс автоматически генерирует несколько металлургических фаз и фазовых превращений, которые могут возникнуть в процессе закалки.\n\nЭволюционирующий состав материала рассчитывается на основе фазовых превращений, связанных с распадом аустенита. Эффективные термические и механические свойства составного материала могут быть дополнительно рассчитаны. \n\nДеформации фазового преобразования, возникающие в результате эффектов объемной аккомодации, а также пластичности, вызванной трансформацией, могут быть рассчитаны и использованы в структурном анализе. Скрытое тепло от фазовых превращений можно вычислить и использовать в анализе теплопередачи.\n\nФизический интерфейс поддерживает анализ, зависящий от времени.
topicdescr/batchsweep = [Пакетная очистка]Добавьте узел Пакетной очистки, чтобы настроить параметрическую очистку для запуска в качестве пакетного задания.
topicdescr/batterybinaryelectrolyte = [Аккумулятор с интерфейсом бинарного электролита] Интерфейс аккумулятора с бинарным электролитом используется для расчета распределения потенциала и тока в обычной батарее. Можно использовать несколько интеркалирующих электродных материалов, а также можно учитывать потери напряжения из-за образования пленки на пористых электродах. \n\nИспользуйте этот физический интерфейс для моделирования батарей с базовыми бинарными (1:1) электролитами, такими как NiMH или NiCd. батареи.\n\nOhm's law is used to describe the charge transport in the electrodes, whereas concentrated electrolyte theory for a basic (1:1) electrolyte is used to describe charge and mass transport in the electrolyte phase. A pseudo-dimension can be included in the porous electrode domains to describe transport of species in the solid electrode phase using Fick's закон.
topicdescr/batteryequivalentcircuit = [Эквивалентная схема батареи] Эквивалентная схема батареи может использоваться для определения модели батареи на основе произвольного количества элементов электрической цепи. Модели, созданные с помощью эквивалентной схемы батареи, обычно можно использовать для мониторинга состояния заряда и реакции батареи во время цикла нагрузки. \n\nЭквивалентная схема батареи добавляет к модели интерфейс электрической цепи, включающий ряд предопределенных элементов схемы, которые используются для определения напряжения разомкнутой цепи, тока нагрузки и внутреннего сопротивления. Дополнительные элементы схемы, такие как резисторы, конденсаторы и катушки индуктивности, могут быть добавлены пользователем.\n\nФизический интерфейс поддерживает стационарное моделирование, моделирование в частотной и временной областях и решает законы сохранения Кирхгофа для напряжений, токов и зарядов, связанных с элементами схемы.
topicdescr/beamcrosssection = [Интерфейс поперечного сечения балки]Интерфейс поперечного сечения балки используется для расчета свойств поперечного сечения балки, а также для детальной оценки напряжений в балке, когда известны силы сечения, которым она подвергается. В основном он используется в сочетании с интерфейсами Beam and Pipe Mechanics.\n\nВ качестве входных данных вы даете 2D-эскиз поперечного сечения, а вычисленные результаты включают площадь, моменты инерции, центр тяжести, направления главных осей, жесткость при кручении, расположение центра сдвига, поправочные коэффициенты сдвига, константу деформации и распределение напряжений. для разных типов нагрузки.
topicdescr/beamrotor = [Интерфейс Beam Rotor]Интерфейс Beam Rotor используется для выполнения структурного анализа вращающихся компонентов оборудования. Уравнения равновесия формулируются в фиксированной системе отсчета. Гироскопические моменты, возникающие при вращении ротора, автоматически учитываются в интерфейсе. Интерфейс Beam Rotor использует 3D-элемент балки Тимошенко и поддерживает геометрически линейный анализ. Доступно несколько моделей подшипников.
topicdescr/bf = [Интерфейсы Bubbly Flow]Интерфейсы Bubbly Flow используются для моделирования ламинарных и турбулентных потоков жидкостей с диспергированными пузырьками.
topicdescr/bif = [Интерфейсы батарей]Ветка «Батареи» содержит индивидуальные физические интерфейсы для моделирования батарей. Физические интерфейсы включают уравнения, граничные условия и выражения скорости для описания переноса массы и заряда в электролитах, сепараторах, пористых электродах и электродах.\n\nФизические интерфейсы могут использоваться для моделирования характеристик заряда и разряда батарей для различных конфигураций материалов и геометрии, а также для моделей тепловых батарей при подключении к интерфейсу теплопередачи.
topicdescr/bioheat = [Интерфейс переноса биотепла]Интерфейс переноса биотепла используется для моделирования теплопередачи посредством проводимости, конвекции и излучения. Модель «Теплопередача в биологической ткани» активна по умолчанию во всех областих. Также доступны все функциональные возможности для включения других типов областей, таких как твердый область. \n\nТемпературное уравнение, определенное в областих биологической ткани, соответствует дифференциальной форме закона Фурье с заранее определенными вкладами для источников биотепла. Кроме того, могут быть включены интегральные модели повреждения тканей, основанные на температурном пороге или модели поглощения энергии. \n\nСтационарное моделирование, моделирование во временной и частотной области поддерживается во всех пространственных измерениях.
topicdescr/boltzmann = [Уравнение Больцмана, интерфейс двухчленной аппроксимации] Интерфейс уравнения Больцмана, двухчленной аппроксимации изучает функцию распределения электронов по энергии (EEDF) и рассчитывает ее на основе набора сечений столкновений для некоторых средних условий разряда. Интерфейс отличается тем, что геометрия и сетка фиксированы и автоматически генерируются при добавлении интерфейса в модель. Ось X представляет собой энергетическую координату, а не физическое пространство, что позволяет загружать наборы сечений столкновений и устанавливать свойства функции распределения. Кроме того, можно рассчитать коэффициенты источника электронов и транспортные свойства. Интерфейс задуман как этап предварительной обработки перед решением пространственно-зависимых моделей.
topicdescr/boltzmannequation = [Уравнение Больцмана, интерфейс двухчленной аппроксимации] Интерфейс уравнения Больцмана, двухчленной аппроксимации используется для расчета функции распределения электронов по энергии (EEDF) с учетом набора сечений электронного удара и определенных условий эксплуатации. Приблизительное уравнение Больцмана вычисляется в дополнительном измерении, представляющем энергию электрона. Этот интерфейс позволяет рассчитывать и экспортировать условия источника электронов и параметры транспорта электронов, которые можно использовать в пространственно-зависимых моделях плазмы.
topicdescr/boundarymodeacoustics = [Интерфейс акустики граничной моды]Интерфейс акустики давления граничной моды используется для расчета и идентификации распространяющихся и нераспространяющихся мод в волноводах и воздуховодах путем выполнения анализа граничной моды на заданной границе. Исследование полезно, например, при определении источников на воздухозаборниках или анализе поперечных акустических мод в воздуховодах.\n\nФизический интерфейс решает уравнение собственных значений Гельмгольца на границах, находя внеплоскостные волновые числа на заданной частоте.
topicdescr/linearizedpotentialflowboundarymode = [Интерфейс линеаризованного потенциального потока, граничный режим] Интерфейс Линеаризованный потенциальный поток, граничный режим используется для расчета собственных мод и волновых чисел вне плоскости для линеаризованных уравнений потенциального потока сжимаемой жидкости. Это исследование используется, например, при уточнении источников на воздухозаборниках или анализе поперечных акустических мод в воздуховодах. \n\nИнтерфейс решает уравнение собственных значений на границах, ищет волновые числа вне плоскости на заданной частоте.
topicdescr/boundaryode = [Интерфейсы распределенных ОДУ и ДАУ]Интерфейс граничных ОДУ и ДАУ используется для добавления пространственно-независимых уравнений к границам. Переменные поля могут представлять дополнительные состояния, а соответствующие уравнения могут быть ОДУ, алгебраическими уравнениями и ДАУ.
topicdescr/brinkman = [Интерфейс уравнений Бринкмана]Интерфейс уравнений Бринкмана используется для расчета полей скорости жидкости и давления однофазного потока в пористых средах в ламинарном режиме течения. Физический интерфейс расширяет закон Дарси для описания диссипации кинетической энергии за счет вязкого сдвига, аналогично уравнениям Навье-Стокса. Жидкости с различной плотностью могут быть включены при числах Маха ниже 0,3. Также вязкость жидкости может меняться, например, для описания неньютоновских жидкостей. Чтобы упростить уравнения, выберите функцию потока Стокса-Бринкмана, чтобы уменьшить зависимость от инерционных эффектов, когда число Рейнольдса значительно меньше 1. \n\nФизический интерфейс можно использовать для стационарного и нестационарного анализа.
topicdescr/porousmediaflowbrinkman = [Интерфейс уравнений Бринкмана]Интерфейс уравнений Бринкмана используется для расчета полей скорости жидкости и давления однофазного потока в пористых средах. Физический интерфейс расширяет закон Дарси для описания диссипации кинетической энергии за счет вязкого сдвига, аналогично уравнениям Навье-Стокса. Жидкости с различной плотностью могут быть включены при числах Маха ниже 0,3. Также вязкость жидкости может меняться, например, для описания неньютоновских жидкостей. Чтобы упростить уравнения, выберите функцию потока Стокса-Бринкмана, чтобы уменьшить зависимость от инерционных эффектов, когда число Рейнольдса значительно меньше 1. Кроме того, для течений с высокими числами Рейнольдса доступен набор моделей RANS (среднее значение Рейнольдса Навье-Стокса) для моделирования турбулентности в пористых средах. media.\n\nФизический интерфейс можно использовать для стационарного и нестационарного анализа. 
topicdescr/batterypack = [Интерфейс аккумуляторной батареи]Интерфейс аккумуляторной батареи позволяет моделировать аккумуляторные блоки, состоящие из нескольких аккумуляторных ячеек, соединенных между собой токопроводящими устройствами или фидерами. Интерфейс доступен только в 3D.\n\nМодели аккумуляторных ячеек определяются так же, как и для интерфейса сосредоточенной батареи. Отдельные модели ячеек определяются автоматически на непересекающихся наборах доменов батареи, и токовая нагрузка каждой отдельной батареи задается неявно через потенциальные ограничения на границах разъемов между доменами батареи и доменами проводников тока. Нагрузка всего аккумуляторного блока определяется граничными условиями на внешних границах областей проводников тока. \n\nИнтерфейс также определяет источник тепла, который может быть связан с интерфейсом теплопередачи для моделирования охлаждения батареи и управления температурой.
topicdescr/bubblyflowalgebraicyplus = [Интерфейс Bubbly Flow, Algebraic yPlus]Интерфейс Bubbly Flow, Algebraic yPlus используется для моделирования потока жидкостей с диспергированными пузырьками при высоких числах Рейнольдса.\n\nПредполагается, что пузырьки занимают лишь небольшую объемную долю и что они всегда движутся со своей конечной скоростью. Таким образом, можно решить только одну систему уравнений Навье-Стокса для жидкой фазы и позволить скорости пузырьков определяться моделью скольжения. Распределение давления рассчитывается на основе уравнения неразрывности, усредненного по смеси. Объемную долю пузырьков отслеживают путем решения уравнения переноса для эффективной плотности газа. Эффекты турбулентности учитываются с использованием расширенной модели вязкости, основанной на локальном расстоянии от стенки. Поэтому физический интерфейс включает уравнение расстояния до стены. \n\nФизический интерфейс также может моделировать распределение числовой плотности, которое можно использовать для расчета площади межфазной границы, что полезно при моделировании химических реакций в смеси.
topicdescr/bubblyflowkeps = [Интерфейс Bubbly Flow, k-ε]Интерфейс Bubbly Flow, k-ε используется для моделирования течения жидкостей с диспергированными пузырьками при высоких значениях Рейнольдса. Numbers.\n\nПредполагается, что пузырьки занимают лишь небольшую объемную долю и что они всегда движутся со своей конечной скоростью. Таким образом, можно решить только одну систему уравнений Навье-Стокса для жидкой фазы и позволить скорости пузырьков определяться моделью скольжения. Распределение давления рассчитывается на основе уравнения неразрывности, усредненного по смеси. Объемную долю пузырьков отслеживают путем решения уравнения переноса для эффективной плотности газа. Эффекты турбулентности моделируются с использованием стандартной модели с двумя уравнениями k-ε с ограничениями реализуемости и образованием турбулентности, вызванной пузырьками. Поток вблизи стенок моделируется с использованием стеновых функций. \n\nФизический интерфейс также может моделировать распределение числовой плотности, которое можно использовать для расчета площади межфазной границы, что полезно при моделировании химических реакций в смеси.
topicdescr/bubblyflowkomega = [Интерфейс Bubbly Flow, k-ω]Интерфейс Bubbly Flow, k-ω используется для моделирования течения жидкостей с диспергированными пузырьками при высоких значениях Рейнольдса. Numbers.\n\nПредполагается, что пузырьки занимают лишь небольшую объемную долю и что они всегда движутся со своей конечной скоростью. Таким образом, можно решить только одну систему уравнений Навье-Стокса для жидкой фазы и позволить скорости пузырьков определяться моделью скольжения. Распределение давления рассчитывается на основе уравнения неразрывности, усредненного по смеси. Объемную долю пузырьков отслеживают путем решения уравнения переноса для эффективной плотности газа. Эффекты турбулентности моделируются с использованием пересмотренной модели Уилкокса с двумя уравнениями k-ω с ограничениями реализуемости и образованием турбулентности, вызванной пузырьками. Модель k-ω является так называемой моделью с низким числом Рейнольдса, что означает, что она может определять поток вплоть до стенки.\n\nФизический интерфейс также может моделировать распределение числовой плотности, которое можно использовать для расчета межфазной границы область, полезная при моделировании химических реакций в смеси.
topicdescr/bubblyflowlowrekeps = [Интерфейс Bubbly Flow, Low Re k-ε]Интерфейс Bubbly Flow, Low Re k-ε используется для моделирования течения жидкостей с диспергированными пузырьками при высоком значении Рейнольдса. Numbers.\n\nПредполагается, что пузырьки занимают лишь небольшую объемную долю и что они всегда движутся со своей конечной скоростью. Таким образом, можно решить только одну систему уравнений Навье-Стокса для жидкой фазы и позволить скорости пузырьков определяться моделью скольжения. Распределение давления рассчитывается на основе уравнения неразрывности, усредненного по смеси. Объемную долю пузырьков отслеживают путем решения уравнения переноса для эффективной плотности газа. Эффекты турбулентности моделируются с использованием модели AKN с двумя уравнениями k-ε с ограничениями реализуемости и образованием турбулентности, вызванной пузырьками. Модель AKN представляет собой так называемую модель с низким числом Рейнольдса, что означает, что она может разрешить поток вплоть до стенки. Модель АКН зависит от расстояния до ближайшей стены. Поэтому физический интерфейс включает уравнение расстояния до стены. \n\nФизический интерфейс также может моделировать распределение числовой плотности, которое можно использовать для расчета площади межфазной границы, что полезно при моделировании химических реакций в смеси.
