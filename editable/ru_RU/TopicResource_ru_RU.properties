topicdescr/multiphysicsvaporflowlowrekeps = [The Vapor Flow, турбулентное течение, Low Re k-εInterface] турбулентное течение, Low Re k-ε multiphysics interface используется для имитации переноса видов в паровой смеси, соединенной с потоком в турбулентном режиме. \n\n Он сочетает в себе транспорт концентрированных видов в паре и турбулентный поток, интерфейсы Low Re k-ε. Мультифизическая связь Reacting Flow, которая добавляется автоматически, соединяет поток жидкости и массовый транспорт пара и применяет моделирование турбулентности для массового транспорта пара. \n\n Интерфейс может использоваться для стационарного и зависящего от времени анализа в 2D, 2D аксисимметрии и 3D геометрии.
topicdescr/multiphysicsvaporflowsst = [Вапорный поток, турбулентный поток, интерфейс SST] Мультифизический интерфейс турбулентное течение, SST используется для имитации переноса видов в паровой смеси, соединенной с потоком в турбулентном режиме. \n\n Он сочетает в себе транспорт концентрированных видов в паре и турбулентный поток, интерфейсы SST. Мультифизическая связь Reacting Flow, которая добавляется автоматически, соединяет поток жидкости и массовый транспорт пара и применяет моделирование турбулентности для массового транспорта пара. \n\n Интерфейс может использоваться для стационарного и зависящего от времени анализа в 2D, 2D аксисимметрии и 3D геометрии.
topicdescr/multiple_physics_nodes = [Выбирается несколько интерфейсов] Информация не может быть показана.
topicdescr/nernstplanck = [Интерфейс уравнений Нернста-Планка] Интерфейс Nernst-Planck Equations используется для вычисления концентраций в электролитах, подвергающихся воздействию электрических полей. Он определяет материальные балансы и транспорт ионов и нейтральных видов в сочетании с состоянием электронейтральности. Физический интерфейс поддерживает моделирование транспорта путем конвекции, диффузии и миграции нескольких растворителей в растворителе. Зависимыми переменными поля являются концентрации видов и электрический потенциал.\n\n Интерфейс физики может быть использован для моделирования генерических электрохимических клеток со значительными градиентами концентрации переносящих ток видов (ионов).
topicdescr/nirf = [Интерфейсы неизотермического реагирующего потока] Ветка «Неизотермический реагирующий поток» содержит несколько версий мультифизического интерфейса, который объединяет уравнения потока жидкости с уравнениями, управляющими теплообменом и массопереносом в смесях жидкостей.\n\nЭти физические интерфейсы поддерживают ламинарный поток и, в зависимости от лицензированных продуктов, турбулентный поток.
topicdescr/nitf = [Неизотермический поток и сопряженный перенос тепла, ламинарный поток и турбулентный поток интерфейсов] Ветвь неизотермическое течение содержит несколько версий мультифизического интерфейса, который объединяет уравнение тепла с уравнениями для ламинарного или турбулентного потока.
topicdescr/nonisothermalmixturemodelarea = [Отделение модели неизотермической смеси] Ветвь Nonisothermal Mixture Model содержит мультифизические интерфейсы для моделирования ламинарных и турбулентных потоков и теплопередачи жидкостей, содержащих несколько дисперсных фаз. Диспергированные фазы могут быть пузырьками, жидкими каплями или твердыми частицами.
topicdescr/nonisothermalmixturemodelturbulentarea = [Неизотермическая модель смесей, интерфейсы турбулентных потоков] Неизотермическая модель смеси, ветвь турбулентного потока содержит мультифизические интерфейсы для моделирования связи между турбулентными потоками и теплопередачей жидкостей, содержащих несколько дисперсных фаз. Диспергированные фазы могут быть пузырьками, жидкими каплями или твердыми частицами.
topicdescr/nonisothermalpipeflow = [Интерфейс неизотермического потока труб] Интерфейс Nonisothermal Pipe Flow используется для расчета полей температуры, скорости и давления в трубах и каналах различной формы. Он аппроксимирует профиль потока трубы по 1D предположениям в кривых сегментах или линиях. Эти линии могут быть проведены в 2D или 3D и представляют собой упрощения полых трубок.
topicdescr/nonlinearpressureacousticstimeexplicit = [Нелинейная акустика давления, явный интерфейс времени] Нелинейная акустика давления, явный интерфейс времени используется для моделирования распространения нелинейных конечных амплитудных акустических волн в вычислительных областях, которые содержат много длин волн. Он подходит для моделирования с произвольными зависящими от времени источниками и полями. Поглощающие слои используются для создания эффективных неотражающих граничных условий.\n\n Интерфейс основан на прерывистом методе Галеркина (dG-FEM) и использует тайм-явный решатель. Он решает нелинейные управляющие уравнения второго порядка для акустического давления и возмущений акустической скорости. Интерфейс подходит для моделирования явлений прогрессивного распространения волн, когда кумулятивные нелинейные эффекты превосходят локальные нелинейные эффекты. Таким образом, модель согласуется с уравнением Вестервельта второго порядка для акустического давления.\n\n Интерфейс полезен для биомедицинских применений, например, ультразвуковой визуализации и сфокусированного ультразвука высокой интенсивности (HIFU).
topicdescr/odei = [ODE и DAE интерфейсы] Интерфейсы ODE и DAE используются для добавления глобальных независимых от пространства уравнений, которые могут представлять дополнительные состояния. Уравнения могут быть ODE, алгебраическими уравнениями и DAE.
topicdescr/opt = [Отдел оптимизации] Ветвь оптимизации и чувствительности содержит интерфейсы для оптимизации и анализа чувствительности. Интерфейс оптимизации требует модуля оптимизации.
topicdescr/optics = [Отделение оптики] Интерфейсы оптики используются для вычисления электрических и магнитных полей для систем, где длина волны сопоставима или намного меньше, чем изученное устройство или система.\n\nЭти физические интерфейсы могут использоваться для электромагнитного моделирования нанооптических и плазмонных устройств, волноводов и волокон, явлений оптического рассеяния и нелинейной оптики.
topicdescr/orbitalthermalloadsevents = [Интерфейс орбитальных тепловых нагрузок] Интерфейс орбитальных тепловых нагрузок используется для моделирования радиационных нагрузок на космические аппараты, в частности излучения от Солнца и Земли для спутников, вращающихся вокруг Земли. Он определяет радиационные свойства космического аппарата, орбиту и ориентацию, орбитальные маневры и свойства плоскостит. Эти входы используются для вычисления и визуализации прямого солнечного излучения, альбедо и радиационного потока плоскоститы, а также радиационной теплопередачи между различными частями космического корабля.\n\nМоделирование области времени поддерживается в 3D.
topicdescr/pac = [Отделение акустики труб] Интерфейсы Pipe Acoustics используются для вычисления изменений акустического давления и скорости при моделировании распространения звуковых волн в гибких системах труб. Уравнения управления сформулированы общим образом, чтобы включить возможность стационарного фонового потока. Физические интерфейсы могут, например, использоваться для вычисления распространения звуковых волн в системах HVAC, других больших системах трубопроводов или просто в трубе органа. Мультифизическая связь существует, чтобы связать физику трубной акустики с моделью акустики полного давления.
topicdescr/parameterestimation = [Интерфейс оценки параметров] Интерфейс оценки параметров предоставляет инструменты для выполнения оценки параметров наименьших квадратов.
topicdescr/participatingmediaradiation = [Радиация в медиаинтерфейсе] Интерфейс «Излучение в участвующих средах» используется для моделирования радиационной теплопередачи внутри участвующих (полупрозрачных носителей) медиа.\n\nВ то время как теплопередача с излучением в интерфейсе участвующих СМИ вычисляет температурное поле, этот физический интерфейс требует его в качестве ввода модели.\n\nЕсли среда не участвует в излучении (прозрачная среда), то используйте интерфейс «Поверхность-поверхность» вместо этого.\n\n Уравнения интенсивности излучения, определенные в участвующих областях среды, соответствуют уравнениям метода P1 или дискретных ординатов в зависимости от выбранного приближения.
topicdescr/particle_field_interaction_non_relativistic = [Взаимодействие с заряженными частицами, нерелятивистский интерфейс] Взаимодействие с частицами, нерелятивистский интерфейс объединяет интерфейс отслеживания заряженных частиц с интерфейсом электростатики. Функция мультифизического взаимодействия электрических частиц и полей добавляется автоматически. Полевое взаимодействие частиц, нерелятивистский интерфейс используется для моделирования пучков заряженных частиц на нерелятивистских скоростях. Частицы генерируют термин плотности пространственного заряда, когда они распространяются через домены. Плотность заряда пространства затем используется в качестве исходного термина в интерфейсе электростатики, и результирующая электрическая сила на частицах вычисляется.
topicdescr/particle_field_interaction_relativistic = [Взаимодействие с заряженными частицами, релятивистский интерфейс] Взаимодействие с частицами, релятивистский интерфейс объединяет интерфейсы физики заряженных частиц, электростатики и магнитных полей. Функции мультифизического взаимодействия электрических частиц и магнитных частиц добавляются автоматически. Полевое взаимодействие частиц, релятивистский интерфейс используется для моделирования пучков релятивистских заряженных частиц. Частицы генерируют плотность заряда пространства и условия плотности тока, когда они распространяются через домены. Плотность заряда пространства и плотность тока затем используются для вычисления электрических и магнитных сил, соответственно, которые воздействуют на частицы.
topicdescr/pdeboundaryelements = [ПДЭ, граничные элементы] Интерфейс PDE, граничные элементы решает уравнение Лапласа методом граничных элементов (BEM), используя только сетчатые элементы на границах смоделированных областей.\n\n Интерфейс PDE, граничных элементов может использоваться для моделирования в трех типах объемных областей: домены, пустоты и бесконечная пустота.
topicdescr/pdei = Ветвь интерфейсов PDE содержит интерфейсы с частичным дифференциальным уравнением (PDE) для PDE в форме коэффициента и общей форме, а также для слабых форм PDE на разных уровнях геометрии. Кроме того, доступны интерфейсы для PDE формы волны и PDE с использованием граничных элементов.
topicdescr/phasefield = [Фазовое поле в интерфейсе жидкостей] Интерфейс Фазового поля в жидкостях используется для отслеживания движущихся флюидно-флюидных интерфейсов путем решения для переменной фазового поля и переменной фазового поля помощи. Основным узлом является функция Фазовой модели поля, которая добавляет уравнения фазового поля и обеспечивает интерфейс для определения свойств фазовой модели поля. Интерфейс Фазового поля в жидкостях может использоваться для зависящих от времени анализов.
topicdescr/phasefieldsolids = [Фазовое поле в интерфейсе твердых частиц] Интерфейс Фазового поля в твердых телах используется для моделирования таких явлений, как повреждение, перелом и другие движущиеся интерфейсы в твердых телах. Интерфейс решает уравнение реакции-диффузии второго порядка, которое хорошо подходит для упорядочивания острых интерфейсов, таких как трещины или границы зерен. Интерфейс Фазового поля в твердых телах может использоваться для стационарного и зависящего от времени анализа.
topicdescr/phasefieldthinfilmflowedge = Интерфейс Thin-Film Flow используется для отслеживания движущихся интерфейсов в узком канале, который представлен краем в геометрии, решая для переменной фазового поля и переменной помощи фазового поля. Основным узлом является функция Фазовой модели поля, которая добавляет уравнения фазового поля и обеспечивает интерфейс для определения свойств фазовой модели поля.
topicdescr/phasefieldthinfilmflowshell = Интерфейс Thin-Film Flow используется для отслеживания движущихся интерфейсов в узком канале, который представлен поверхностью в геометрии, решая для переменной фазового поля и переменной помощи фазового поля. Основным узлом является функция Фазовой модели поля, которая добавляет уравнения фазового поля и обеспечивает интерфейс для определения свойств фазовой модели поля.
topicdescr/phasetransport = [Транспортный интерфейс фазы] Интерфейс Phase Transport используется для имитации переноса нескольких несмешивающихся фаз в свободном потоке. Этот интерфейс решает для усредненных объемных фракций фаз и не отслеживает интерфейсы между различными фазами.\n\n Интерфейс Phase Transport может использоваться для стационарного и зависящего от времени анализа.
topicdescr/phasetransportfreeporousmedia = [Интерфейс «Перенос фаз в потоках свободной и пористой среды» Интерфейс «Перенос фаз в потоках свободной и пористой среды» используется для моделирования переноса нескольких несмешивающихся фаз в связанных потоках свободной и пористой среды. Этот интерфейс определяет усредненные объемные доли (также называемые насыщенностью в пористых средах) фаз и не отслеживает границы раздела между различными фазами, хотя микроскопические межфазные эффекты в пористых областях учитываются в макроскопических уравнениях через функции капиллярного давления.\n\nИнтерфейс «Фазовый транспорт в потоке свободной и пористой среды» можно использовать для стационарного и нестационарного анализа.
topicdescr/phasetransportmixturemodelphysicsarea = [Фазовая модель транспортной смеси] Фазовая модель транспортной смеси содержит мультифизические интерфейсы для моделирования ламинарных и турбулентных потоков жидкостей, содержащих несколько дисперсных фаз. Диспергированные фазы могут быть пузырьками, жидкими каплями или твердыми частицами.
topicdescr/phasetransportphysicsarea = [Транспортный филиал] Ветвь Фазового транспорта содержит физические интерфейсы для имитации переноса нескольких несмешивающихся фаз в ламинарных и турбулентных свободных потоках.
topicdescr/phasetransportporousmedia = [Интерфейс «Фазовый транспорт в пористой среде» Интерфейс «Фазовый транспорт в пористой среде» используется для моделирования переноса нескольких несмешивающихся фаз через пористую среду. Этот интерфейс определяет усредненные объемные доли (также называемые насыщенностью в пористой среде) фаз и не отслеживает границы раздела между различными фазами, хотя микроскопические межфазные эффекты учитываются в макроскопических уравнениях через функции капиллярного давления.\n\nИнтерфейс «Фазовый транспорт в пористых средах» можно использовать для стационарного и нестационарного анализа.
topicdescr/phasetransportturbulentphysicsarea = [Модель фазовой транспортной смеси, интерфейсы турбулентных потоков] Ветвь турбулентного потока содержит физические интерфейсы, которые объединяют уравнения фазового транспорта с уравнениями турбулентного потока.
topicdescr/piezoelectricdevices = [Интерфейс пьезоэлектрических устройств] Интерфейс Пьезоэлектрических устройств объединяет твердую механику и электростатику вместе с конститутивными отношениями, необходимыми для моделирования пьезоэлектриков. Можно моделировать как прямые, так и обратные пьезоэлектрические эффекты, и пьезоэлектрическая связь может быть сформулирована с использованием форм деформации или заряда напряжения.
topicdescr/piezoelectricity = [Пьезоэлектрическая ветвь] Ветвь пьезоэлектричества содержит физические интерфейсы для моделирования пьезоэлектрических эффектов в твердых телах и оболочках.
topicdescr/piezoresistivity = [Ветвь пьезорезистивности] Ветвь пьезорезистивности содержит физические интерфейсы для моделирования электрических токов в твердых телах и оболочках, где электрическая проводимость зависит от механического напряжения или деформации в структуре.
topicdescr/piezoresistivityboundarycurrents = [Пьезорезистивность, интерфейс пограничных токов] Интерфейс Piezoresistivity, Boundary Currents объединяет интерфейс механика твердого тела с потоком электрического тока в тонком слое твердого тела для моделирования пьезосопротивления. Интерфейс подходит для ситуаций, в которых толщина пьезорезистивного слоя намного меньше, чем у структурного слоя.
topicdescr/piezoresistivitydomaincurrents = [Пьезорезистивность, интерфейс областьных токов] Интерфейс Piezoresistivity, Domain Currents объединяет интерфейсы механика твердого тела и Electric Currents для имитации пьезорезистивного эффекта. Физический интерфейс подходит для ситуаций, когда толщины проводящих и пьезорезистивных слоев решаются сеткой.
topicdescr/piezoresistivityshell = Интерфейс Piezoresistivity, Shell сочетает в себе структурные оболочки с потоком электрического тока на тонком слое внутри оболочки для имитации пьезорезистивного эффекта. Физический интерфейс используется, когда структурный слой достаточно тонкий для обработки интерфейсом Shell, но проводящие и пьезорезистивные слои все еще намного тоньше, чем структурные слои. Этот физический интерфейс требует добавления модуля структурной механики.
topicdescr/pipeflow = [Интерфейс Pipe Flow]Интерфейс Pipe Flow используется для расчета полей скорости и давления в трубах и каналах различной формы. Он аппроксимирует профили потока в трубопроводе с помощью одномерных предположений в сегментах кривой или линиях. Эти линии могут быть нарисованы в 2D или 3D и представляют собой упрощенную форму полых трубок.
topicdescr/pipemechanics = [Интерфейс механики труб] Интерфейс Pipe Mechanics используется для вычисления напряжений и деформаций в трубах с произвольными сечениями. Нагрузки от внутреннего давления, силы сопротивления и разницы температур через стенки трубы могут сочетаться с внешними нагрузками. 
topicdescr/plasma = Плазменный интерфейс объединяет интерфейсы Drift Diffusion, Heavy Species Transport и Electrostatics. Он используется для изучения разрядов, которые поддерживаются статическим или изменяющимся во времени электрическим полем. Химия плазмы определяется набором электронного воздействия и объемных реакций. Виды автоматически создаются на основе химии плазмы. Также могут быть включены поверхностные реакции и виды, а также граничные условия для электронов и электрический потенциал.
topicdescr/plasmabranch = [Физические группы в мастере моделей] Плазменная ветвь содержит физические интерфейсы для моделирования равновесия и неравновесных разрядов. Интерфейсы неравновесных разрядов вычисляют плотность электронов, среднюю энергию электронов, электромагнитные поля и концентрацию всех неэлектронных видов, включая ионы. Интерфейсы для равновесных разрядов вычисляют электромагнитные поля, температуру газа и необязательно поток газа, предполагая, что электроны находятся в локальном термодинамическом равновесии (LTE) с фоновым газом.
topicdescr/plasmatimeperiodic = Плазма, периодический интерфейс времени, периодический интерфейс времени соединяет диффузию дрейфа, транспорт тяжелых видов и электростатические интерфейсы. Временное периодическое решение вычисляется путем присоединения дополнительного измерения, представляющего один период во времени, и обеспечения соблюдения периодических граничных условий на зависимых переменных. 
topicdescr/plate = [Интерфейсы оболочки и плиты] Интерфейс Plate обеспечивает возможность моделирования структурных пластин в 2D. Пластины представляют собой тонкие плоские конструкции со значительной жесткостью изгиба, загружаемые в направлении из плоскости. Интерфейс использует элементы плит типа MITC, которые могут быть использованы для анализа как тонких (теория Кирхгофа), так и толстых (теория Миндлина) пластин. Можно учитывать геометрическую нелинейность. Материал считается линейно упругим.
topicdescr/pmf = [Моделирование пористых сред и подземных потоков] Ветвь Porous Media и Subsurface Flow содержит физические интерфейсы для моделирования передачи массы и импульса в пористых средах. В зависимости от лицензированных продуктов интерфейсы Porous Media и Subsurface Flow могут использоваться для моделирования широкого спектра применений, от переменно насыщенного подземного потока до пористых электродов в батареях и топливных элементах.
topicdescr/pointode = [Распределенные интерфейсы ODE и DAE] Интерфейс Point ODE и DAE используется для добавления пространственно-независимых уравнений к точкам. Переменные поля могут представлять дополнительные состояния, а соответствующие уравнения могут быть ODE, алгебраическими уравнениями и DAE.
topicdescr/poissonequation = [Классические интерфейсы PDE] Poisson's Equation interface can be used to model a classical PDE of elliptic type that can describe, for example, electrostatics with a space charge density. Poisson's Уравнение также доступно в качестве узла функции области для всех интерфейсов PDE.
topicdescr/poroelasticity = [Интерфейс пороэластичности] Интерфейс Poroelasticity сочетает в себе переходную формулировку закона Дарси с квазистатической формулировкой механика твердого тела. Основной особенностью является Poroelastic Material, который обеспечивает интерфейс для определения упругих свойств дренированной пористой среды, свойств жидкости и свойств пористой матрицы, таких как пористость и проницаемость.
topicdescr/poroelasticwaves = [Интерфейс пороупругих волн] Интерфейс Poroelastic Waves используется для вычисления поля смещения и акустических колебаний давления в пористых материалах с распространяющимися пороэластическими волнами. Физический интерфейс позволяет добавлять жидкие или твердые области, прилегающие к по умолчанию пористому области. Выделенные граничные условия определяют нагрузки между жидкими, твердыми и пористыми областями, включая специальные наборы граничных условий, которые автоматически применяются для жидко-твердых, жидко-пористых и пористо-твердых взаимодействий. Примеры применения варьируются от распространения упругих волн в породах и почвах до моделирования акустических свойств фильтров для затухания твердых частиц и звуковых поглотителей.\n\n Физический интерфейс действителен для моделирования распространения линейных упругих и линейных акустических волн в частотной области. Предполагаются гармонические вариации поля смещения и источников.\n\n В пористых областих уравнения Биота решаются с учетом сопряженного распространения упругих волн в упругой пористой матрице и волн давления в насыщенной поровой жидкости. Это включает в себя эффект демпфирования поровой жидкости. Уравнение Гельмгольца решается в области жидкости и структурных динамических уравнениях в твердом теле.
topicdescr/poroelasticwavessinglephysics = [Интерфейс пороупругих волн] Интерфейс Poroelastic Waves используется для вычисления поля смещения и акустических колебаний давления в пористых материалах с распространяющимися пороэластическими волнами. Примеры применения варьируются от распространения упругих волн в породах и почвах до моделирования акустических свойств фильтров для затухания твердых частиц и звуковых поглотителей.\n\n Физический интерфейс действителен для моделирования распространения линейных упругих и линейных акустических волн в частотной области. Предполагаются гармонические вариации поля смещения и источников.\n\n В пористых областих уравнения Биота решаются с учетом сопряженного распространения упругих волн в упругой пористой матрице и волн давления в насыщенной поровой жидкости. Модель потерь Biot включает вязкое демпфирование, в то время как модель потерь Biot-Allard включает как вязкое, так и тепловое демпфирование в поровой жидкости.
topicdescr/porousmedia = [Передача видов в пористом медиаинтерфейсе] Интерфейс Species Transport in Porous Media используется для вычисления концентрации видов и транспортировки в свободных и пористых средах. Он включает в себя выражения скорости реакции и растворенные источники для моделирования растворенного транспорта.\n\n Физический интерфейс включает свободный и пористый медиапоток с неподвижными и мобильными твердыми фазами, включая диффузию, конвекцию, дисперсию, адсорбцию и улетучивание в пористых средах. Он поддерживает случаи, когда либо твердофазный субстрат является исключительно неподвижным, либо когда газонаполняющая среда также считается неподвижной.\n\n Физический интерфейс может использоваться для стационарного и зависящего от времени анализа. 
topicdescr/porousmedia[bfc] = [Передача видов в пористом медиаинтерфейсе] Интерфейс Species Transport in Porous Media используется для вычисления концентрации видов и транспортировки в свободных и пористых средах. Он включает в себя выражения скорости реакции и растворенные источники для моделирования растворенного транспорта.\n\n Физический интерфейс включает свободный и пористый медиапоток с неподвижными и мобильными твердыми фазами, включая диффузию, конвекцию, дисперсию, адсорбцию и улетучивание в пористых средах. Он поддерживает случаи, когда либо твердофазный субстрат является исключительно неподвижным, либо когда газонаполняющая среда также считается неподвижной.\n\n Физический интерфейс может использоваться для стационарного и зависящего от времени анализа.
topicdescr/porousmediaflowdarcy = [закон Дарси Interface]The Darcy's] Интерфейс закона используется для имитации потока жидкости через промежутки в пористой среде. Он может использоваться для моделирования потоков с низкой скоростью или среды, где проницаемость и пористость очень малы, и для которых градиент давления является основной движущей силой, а поток в основном зависит от сопротивления трения в порах. Установите несколько интерфейсов закона Дарси для моделирования многофазных потоков, включающих более одной мобильной фазы.\n9000000000000002стационарный, time-domain и frequency-domain моделирование поддерживаются во всех пространственных измерениях.
topicdescr/porousmediaflowfracture = [Интерфейс Fracture Flow] Интерфейс Fracture Flow используется для имитации потока вдоль границ, представляющих трещины в пористой или твердой среде. \n\n Физический интерфейс использует вариант закона Дарси и может использоваться для стационарного и зависящего от времени анализа.
topicdescr/porousmediaflowrichards = [Интерфейс уравнения Ричардса] Интерфейс уравнения Ричардса используется для анализа течения в пористых средах с переменной насыщенностью. Аналитические формулы Ван Генухтена, Брукса и Кори доступны для моделирования потока с переменной насыщенностью, когда гидравлические свойства изменяются по мере движения жидкости через пористую среду, заполняя одни поры и дренируя другие.\n\nФизический интерфейс можно использовать для стационарного и нестационарного анализа. 
topicdescr/porousmediaheat = [Интерфейс «Теплопередача в пористых средах»Интерфейс «Теплопередача в пористых средах» используется для моделирования теплопередачи посредством проводимости, конвекции и излучения. Модель пористой среды активна по умолчанию во всех областих. Также доступны все функциональные возможности для включения других типов областей, таких как твердый область. \n\nТемпературное уравнение, определенное в областих пористой среды, соответствует уравнению конвекции-диффузии с моделями усреднения термодинамических свойств для учета как твердой матрицы, так и жидкости. Properties.\n\nСтационарное, временное и частотное моделирование поддерживается во всех пространственных измерениях.
topicdescr/porousmediaheattransfer = [Интерфейс «Теплопередача в пористых средах»Интерфейс «Теплопередача в пористых средах» используется для моделирования теплопередачи посредством проводимости, конвекции и излучения. Пористая среда с моделью локального теплового равновесия активна по умолчанию во всех областих. Также доступны все функциональные возможности для включения других типов областей, таких как твердый область. \n\nТемпературное уравнение, определенное в областих пористой среды, соответствует уравнению конвекции-диффузии с моделями усреднения термодинамических свойств для учета как твердой матрицы, так и жидкости. Properties.\n\nСтационарное, временное и частотное моделирование поддерживается во всех пространственных измерениях.
topicdescr/porousmf = Ветка Porous Media Flow содержит различные версии мультифизического интерфейса, моделирующего перенос влаги в пористых средах. 
topicdescr/potf = [Потенциальный поток] Потенциальные границы потока аппроксимируют потоки с безвихревыми полями скорости. Поле скорости описывается как градиент скалярного потенциала скорости. Потенциальные границы раздела потока можно использовать для решения задач с небольшими эффектами завихренности, а также для обеспечения начальных решений для других границ раздела однофазного потока, решающих уравнения Навье-Стокса.
topicdescr/pm = [Пористые среды] Ветка «Пористые среды» содержит физические интерфейсы для моделирования теплопередачи в пористых средах с предположениями о локальном тепловом равновесии или локальной тепловой неравновесности.
topicdescr/pr = [Ветвь пьезорезистивности] Ветвь пьезорезистивности содержит физические интерфейсы для моделирования электрических токов в твердых телах и оболочках, где электрическая проводимость зависит от механического напряжения или деформации в структуре.
topicdescr/prac = [Отдел акустики давления]Интерфейсы акустики давления используются для моделирования классической акустики давления. Существуют различные численные формулировки основных уравнений. Физические интерфейсы на основе метода конечных элементов (МКЭ) учитывают акустические изменения давления. Уравнение Гельмгольца решается в частотной области, а уравнение скалярной волны — во временной области. Областьные условия существуют для однородного моделирования потерь в пористых материалах, а также в узких областях. Также доступны такие источники, как фоновые поля. Граничные условия включают источники, условия неотражающего излучения, условия импеданса, периодические условия, условия расчета внешнего поля, а также внутренние граничные условия, такие как стены или перфорированные пластины. Для моделирования в частотной области также существует интерфейс на основе метода граничных элементов (BEM) «Акустика давления, граничный элемент». Во временной области интерфейс «Акустика давления, явное время» использует формулировку, основанную на разрывном методе Галеркина (dG-FEM), и использует явный по времени решатель. Интерфейс хорошо подходит для моделирования больших переходных линейных акустических задач, содержащих множество длин волн.
topicdescr/pressureacoustics = [Интерфейс «Акустика давления, частотная область»] Интерфейс «Акустика давления, частотная область» используется для расчета изменения давления при распространении акустических волн в жидкостях в фоновых условиях покоя. Он подходит для любого моделирования в частотной области с гармоническими изменениями поля давления.\n\nФизический интерфейс можно использовать для линейной акустики, описываемой скалярной переменной давления. Он включает в себя областьные условия для однородного моделирования потерь, так называемые модели жидкости для пористых материалов, а также потери в узких областях. Областьные особенности также включают фоновые падающие акустические поля, а также областьные монопольные и дипольные источники. Характер затухания акустических волн в плоской волне можно ввести как определяемую пользователем величину или определить как объемные вязкие и тепловые потери. \n\nФизический интерфейс решает уравнение Гельмгольца в частотной области для заданных частот или в виде анализа собственных частот или модального анализа.
topicdescr/pressureacousticsasymptoticscattering = [Акустика давления, асимптотическое рассеяние] Этот интерфейс используется для моделирования проблем рассеяния на высоких частотах с использованием интегральной формулы Кирхгофа-Гельмгольца. Предполагается, что акустическое поле является локально плоским, так что рассеянное поле может быть выражено аналитически. Поверхность объекта рассеяния может рассматриваться как идеально отражающая или обладающая поглощающими свойствами путем определения нормального импеданса поверхности, коэффициента отражения или коэффициента поглощения. Последние два могут зависеть от угла падения. Интерфейс может моделировать рассеяние от сферических и плоских волн в 3D и 2D аксисимметрии, а также плоских и цилиндрических волн в 2D. Интерфейс имеет встроенную функциональность для вычисления коэффициента видимости.
topicdescr/pressureacousticsboundaryelements = [Интерфейс «Акустика давления, граничные элементы»] Интерфейс «Акустика давления, граничные элементы» используется для расчета изменения давления при распространении акустических волн в газах и жидкостях. Он подходит для любого моделирования в частотной области с гармоническими изменениями поля давления. Формулировка основана на методе граничных элементов (МГЭ), а интерфейс доступен в 2D и 3D. Физический интерфейс решает уравнение Гельмгольца для определения свойств материала с постоянными значениями и использует давление в качестве зависимой переменной. \n\nИнтерфейс полностью поддерживает мультифизику и может легко сочетаться с физическими интерфейсами, основанными на методе конечных элементов. Это включает в себя связь с вибрирующими конструкциями и другими акустическими областями. Этот подход позволяет моделировать, адекватно используя сильные стороны каждой формулировки. Интерфейс на основе БЭМ особенно хорошо подходит для решения проблем, связанных с излучением и рассеянием.
topicdescr/pressureacousticskirchhoffhelmholtz = [Акустика давления, интерфейс Кирхгоффа-Гельмгольца] Этот интерфейс используется для моделирования проблем излучения на высоких частотах с использованием интегральной формулировки Кирхгоффа-Гельмгольца. Предполагается, что акустическое поле является локальной плоскостью. Этот метод также часто называют высокочастотным BEM или просто HFB. Метод часто используется для вычисления излучаемого акустического поля из вибрирующих структур на высоких частотах, без необходимости моделирования окружающей жидкости. Метод действителен до тех пор, пока акустическая длина волны в жидкости меньше, чем структура и структурные режимы. Для плоской вибрирующей поверхности метод сводится к решению интеграла Рэлея. Опция, определяемая пользователем, дает доступ к полной интегральной формуле Кирхгофа-Гельмгольца для определения как давления, так и его нормального градиента.
topicdescr/pressureacousticstimeexplicit = [Акустика давления, явный интерфейс по времени] Интерфейс «Акустика давления, явный по времени» используется для решения больших переходных линейных акустических задач, содержащих множество длин волн. Он подходит для нестационарного моделирования с произвольными зависящими от времени источниками и полями. Интерфейс включает опцию фонового акустического поля для моделирования проблем рассеяния. Поглощающие слои используются для создания эффективных граничных условий, подобных неотражающим. Внешнее поле можно рассчитать, объединив функцию расчета внешнего поля с этапом исследования БПФ от времени до частоты. \n\nИнтерфейс основан на разрывном методе Галеркина (dG-FEM) и использует явный по времени решатель. Этот метод очень ресурсоемок по памяти. Области применения включают переходное распространение звуковых импульсов в акустике помещения или моделирование явлений рассеяния, включающих большие объекты относительно длины волны. \n\nИнтерфейс решает линеаризованные уравнения Эйлера, предполагая адиабатическое уравнение состояния. Зависимыми переменными являются акустическое давление и возмущения акустической скорости. В интерфейсе не предусмотрены механизмы затухания из-за объемных потерь. Потери на границах можно моделировать с помощью условий импеданса для потерь резистивного типа.
topicdescr/primarycurrentdistribution = [Интерфейсы первичного распределения тока и вторичного распределения тока]Интерфейс первичного распределения тока определяет перенос заряженных ионов в электролите однородного состава, а также проводимость тока в электродах с использованием закона Ома в сочетании с балансом заряда. Физический интерфейс не учитывает перенапряжения активации из-за реакций переноса заряда. \n\nИспользуйте этот физический интерфейс для оценки омических потерь в упрощенных моделях электрохимических ячеек, где перенапряжения электродных реакций малы по сравнению с омическими падениями напряжения в электролите и электродах.
topicdescr/protonexchangefc = [Интерфейс водородного топливного элемента с протонным обменом] Интерфейс водородного топливного элемента с протонным обменом предполагает, что заряд в электролите переносится протонами (или ионами гидроксония), образуя воду на катодной стороне элемента в реакции восстановления кислорода. кислород, азот и вода на катодной стороне.\n\nЭтот интерфейс подходит для топлива с протонообменной мембраной (PEMFC), полимерным электролитом (PEFC) и фосфорной кислотой (PAFC). ячейки.\n\nТопливный элемент с прямым метанолом (DMFC) можно смоделировать с использованием этого интерфейса путем соединения, например, с интерфейсом Bubble Flow для описания двухфазного переноса жидкого метанола и газообразного диоксида углерода на анодной стороне.
topicdescr/protonexchangewe = [Интерфейс протонообменного водного электролизера] Интерфейс протонообменного водного электролизера предполагает, что заряд в электролите переносится протонами (или ионами гидроксония), потребляя воду на анодной стороне ячейки в реакции выделения кислорода. кислород и вода на анодной стороне.\n\nЭтот интерфейс подходит для электролизеров с протонообменной мембраной (PEMEC), полимерным электролитом (PEEC) и фосфорной кислотой (PAEC).
topicdescr/pscd = [Ветвь первичного и вторичного распределения тока]Ветвь первичного и вторичного распределения тока содержит интерфейсы, которые определяют транспорт заряженных ионов в электролите однородного состава с использованием закона Ома в сочетании с балансом заряда. \n\nПервичный тип распределения тока не учитывает активационные перенапряжения, возникающие вследствие реакций переноса заряда, и может использоваться для оценки омических потерь в упрощенных моделях электрохимических ячеек, где перенапряжения электродных реакций малы по сравнению с омическими падениями напряжения в электролите и электродах. \n\nВторичный тип распределения тока учитывает активационные перенапряжения. Связь между переносом заряда и перенапряжением можно описать с помощью произвольных кинетических выражений, таких как уравнения Батлера-Фольмера и Тафеля.
topicdescr/pt = [Трассировка частиц]Ветка «Трассировка частиц» содержит интерфейсы для расчета траекторий заряженных частиц в электрических и магнитных полях, включая однонаправленные и двунаправленные взаимодействия частиц с полем. 
topicdescr/ptff = [Трассировка частиц] Ветка «Трассировка частиц» содержит интерфейсы для расчета траекторий частиц, капель или пузырьков газа в жидкостях, включая однонаправленные и двунаправленные взаимодействия жидкость-частица. 
topicdescr/rad = [Радиационная теплопередача] Ветка «Радиация» включает в себя физические интерфейсы для радиационной теплопередачи: излучение от поверхности к поверхности и излучение в участвующих средах.
topicdescr/radiation = [Интерфейс «Излучение от поверхности к поверхности»]Интерфейс «Излучение от поверхности к поверхности» используется для моделирования теплопередачи посредством излучения. Он рассматривает тепловое излучение как перенос энергии между границами и внешними источниками тепла, где среда не участвует в излучении (излучение в прозрачных средах).\n\nВ то время как интерфейс теплопередачи с излучением от поверхности к поверхности вычисляет температурное поле, этот физический интерфейс требует его в качестве модели input.\n\nЕсли среда участвует в излучении (полупрозрачная среда), то вместо этого используйте интерфейс Излучение в участвующих средах.\n\nУравнение радиации определенный на границах, где разрешено излучение от поверхности к поверхности, соответствует уравнению метода излучательности. 
topicdescr/radiationinabsorbingscatteringmedia = [Интерфейс «Излучение в поглощающих-рассеивающих средах»]Интерфейс «Излучение в поглощающих-рассеивающих средах» используется для моделирования радиационного теплопереноса внутри поглощающих-рассеивающих (полупрозрачных) сред. поле температуры, этот физический интерфейс требует его в качестве входных данных модели. \n\nЕсли среда не участвует в излучении (прозрачная среда), то используйте интерфейс «Излучение от поверхности к поверхности» вместо этого.\n\nУравнения интенсивности излучения, определенные в областях поглощающих-рассеивающих сред, соответствуют уравнениям метода P1 или метода дискретных ординат в зависимости от выбранного приближения.
topicdescr/radiativebeaminabsorbingmedia = [Интерфейс «Радиационный луч в поглощающей среде» Интерфейс «Радиационный луч в поглощающей среде» используется для моделирования распространения и поглощения коллимированных радиационных лучей, таких как лазеры, внутри частично прозрачных сред. Поглощенное излучение создает источник тепла, который может быть включен в модель теплопередачи.\n\nПоле интенсивности излучения определяется по закону Бера-Ламберта, который учитывает поглощающую способность среды, которая может быть зависит от температуры.\n\nСтационарное моделирование и моделирование во временной области поддерживаются в 2D, 2D осесимметричной и 3D геометрии.
topicdescr/orbitalthermalloads = [Интерфейс орбитальных тепловых нагрузок] Интерфейс орбитальных тепловых нагрузок используется для моделирования радиационных нагрузок на космические аппараты, в частности излучения от Солнца и Земли для спутников, вращающихся вокруг Земли. Он определяет радиационные свойства космического аппарата, орбиту и ориентацию, орбитальные маневры и свойства плоскостит. Эти входы используются для вычисления и визуализации прямого солнечного излучения, альбедо и радиационного потока плоскоститы, а также радиационной теплопередачи между различными частями космического корабля.\n\nМоделирование области времени поддерживается в 3D.
topicdescr/raref = [Ветка «Разреженный поток»] Ветка «Разреженный поток» содержит интерфейсы для моделирования потока разреженных газов, включая скользящее течение, переходное течение и свободномолекулярное течение.
topicdescr/ray_heating = [Интерфейс лучевого нагрева]Интерфейс лучевого нагрева сочетает в себе интерфейс геометрической оптики и интерфейс теплопередачи в твердых телах. Мультифизическая функция Ray Heat Source добавляется автоматически. Интерфейс Ray Heating используется для моделирования распространения электромагнитных волн в оптически больших системах, в которых показатель преломления зависит от температуры. Энергия, теряемая из-за затухания лучей в поглощающей среде, создает источник тепла, который учитывается при расчете температуры.
topicdescr/rayacoustics = [Интерфейс Ray Acoustics]Интерфейс Ray Acoustics используется для расчета траекторий, фазы и интенсивности акустических лучей. Лучевая акустика действительна в высокочастотном пределе, где длина волны звука меньше характерных геометрических особенностей. Интерфейс можно использовать для моделирования акустики в комнатах, концертных залах и многих других средах на открытом воздухе.\n\nСвойства среды, в которой распространяются лучи, могут меняться непрерывно внутри доменов или прерывисто на границах. На внешних границах можно задать различные условия стен, включая комбинации зеркального и диффузного отражения. Импеданс и поглощение могут зависеть от частоты, интенсивности и направления падающих лучей. Передача и отражение также моделируются на разрывах материала. Фоновую скорость также можно присвоить любой среде.
topicdescr/reactingpipeflow = [Интерфейс «Реагирующий поток в трубе»Интерфейс «Реагирующий поток в трубе» — это мультифизический интерфейс, который сочетает в себе три физических интерфейса: «Поток в трубе», «Теплопередача в трубах» и «Перенос разбавленных веществ в трубах». Физический интерфейс аппроксимирует профили потока в трубах и каналах с помощью 1D-предположения по линиям в 2D и 3D.\n\nВ зависимости от лицензированных продуктов можно моделировать несколько видов.
topicdescr/reactioneng = [Интерфейс Reaction Engineering] Интерфейс Reaction Engineering используется для моделирования нескольких идеальных типов химических реакторов и развития химических реакций с течением времени. Уравнения баланса массы и баланса энергии, описывающие эти системы, предполагают идеальное или четко определенное перемешивание в реакторе. Кинетические и термодинамические выражения реакций в реакторе можно экспортировать в пространственно-зависимую модель.
topicdescr/reactionengineering = [Интерфейс Reaction Engineering] Интерфейс Reaction Engineering используется для моделирования нескольких идеальных типов химических реакторов и развития химических реакций с течением времени. Уравнения баланса массы и баланса энергии, описывающие эти системы, предполагают идеальное или четко определенное перемешивание в реакторе. Кинетические и термодинамические выражения реакций в реакторе можно экспортировать в пространственно-зависимую модель.
topicdescr/rf = [Физические группы в мастере моделей] Радиочастотные интерфейсы используются для расчета электрических и магнитных полей в высокочастотных системах; то есть в системах, где длина волны сопоставима с размером системы.\n\nЭти физические интерфейсы могут использоваться для моделирования гармонических во времени и переходных электромагнитных полей с полными векторными формулировками, где решается либо полное поле, либо рассеянное поле. Также имеется интерфейс для моделирования распространения волн по одномерным линиям передачи.
topicdescr/rfp = [Интерфейсы «Реагирующий поток в пористых средах»] Интерфейсы «Реагирующий поток в пористых средах» используются для изучения потока и химического состава газа или жидкости, движущихся через пористую среду. Химические соединения могут представлять собой либо растворенные вещества с низкой концентрацией, присутствующие в растворителе со значительно более высокой концентрацией, либо смесь веществ, где концентрации имеют сопоставимый порядок величины. Помимо областей пористой среды в проточную систему могут входить и области со свободным течением.
topicdescr/rfpb = [Реагирующий поток в интерфейсах с насадочным слоем] Интерфейсы с насадочным слоем используются для моделирования реакторов, заполненных каталитическими гранулами. Таблетки слоя являются пористыми, образуя в реакторе бимодальную пористость. Помимо транспорта в поровом пространстве между гранулами, можно детально изучить межчастичный транспорт и реакции. Внутри окатышей можно изучать как гетерогенные реакции, так и объемные реакции, а также объемные реакции в поровом пространстве. Гранулы доступны в каждой точке области слоя и определяются с использованием дополнительного измерения, описывающего радиус гранул. \n\nХимические вещества в слое могут представлять собой либо растворенные вещества с низкой концентрацией, присутствующие в растворителе со значительно более высокой концентрацией, либо смесь веществ, где концентрации имеют сопоставимый порядок величины. Помимо областей упакованных таблеток, реакторная система может также включать области со свободным потоком.
topicdescr/rfpc = [Реагирующий поток в интерфейсах пористого катализатора] Интерфейсы пористого катализатора используются для изучения влияния адсорбции и гетерогенных реакций, когда газ или жидкость движутся через пустоты пористой среды. Можно изучать адсорбцию и десорбцию объемных частиц на границе раздела жидкость-твердое тело или с нее, а также гетерогенные реакции с участием как объемных частиц, так и поверхностных частиц, связанных с границей раздела жидкость-твердое тело. Также могут быть включены объемные реакции, происходящие в поровом пространстве. \n\nХимические соединения могут представлять собой либо растворенные вещества с низкой концентрацией, присутствующие в растворителе со значительно более высокой концентрацией, либо смесь веществ, концентрации которых имеют сопоставимый порядок величины. Помимо областей пористой среды в проточную систему могут входить и области со свободным течением. 
topicdescr/richardsequation = [Интерфейс уравнения Ричардса] Интерфейс уравнения Ричардса используется для анализа течения в пористых средах с переменной насыщенностью. Аналитические формулы Ван Генухтена, Брукса и Кори доступны для моделирования потока с переменной насыщенностью, когда гидравлические свойства изменяются по мере движения жидкости через пористую среду, заполняя одни поры и дренируя другие.\n\nФизический интерфейс можно использовать для стационарного и нестационарного анализа. 
topicdescr/rm = [Вращающееся оборудование, поток жидкости]Интерфейсы «Вращающееся оборудование, поток жидкости» используются для моделирования потока, при котором одна или несколько границ периодически вращаются. Он используется для миксеров и пропеллеров.\n\nЭти физические интерфейсы доступны для 3D и 2D компонентов.
topicdescr/rmhmnf = [Вращающееся оборудование, поток с высоким числом Маха] Ветка «Вращающееся оборудование, поток с высоким числом Маха» содержит три варианта одного и того же предопределенного мультифизического интерфейса для моделирования газовых потоков, где одна или несколько границ вращаются периодически, а величина скорости сравнима со скоростью звука в газе; то есть течет в околозвуковом и сверхзвуковом диапазоне. Течение жидкости может быть ламинарным или турбулентным. Физические интерфейсы можно использовать для моделирования высокоскоростного турбомашинного оборудования.
topicdescr/rmhmnft = [Интерфейсы «Вращающееся оборудование», «Поток с высоким числом Маха», «Турбулентный поток»] Ветка «Вращающееся оборудование», «Поток с высоким числом Маха», «Турбулентный поток» имеет две вариации одного и того же предопределенного мультифизического интерфейса, используемого для моделирования газовых потоков, где одна или несколько границ вращаются периодически, а величина скорости сравнима со скоростью звука в газе (то есть турбулентные потоки в околозвуковом и сверхзвуковом диапазоне).
topicdescr/rmmf = [Вращающиеся машины, многофазный поток]Ветка «Вращающиеся машины, многофазный поток» содержит физические интерфейсы для изучения многофазного потока в оборудовании, содержащем одну или несколько вращающихся частей.\n\nЭти физические интерфейсы доступны для 3D- и 2D-компонентов.
topicdescr/rmnitf = [Вращающиеся машины, неизотермический поток] Ветка «Вращающиеся машины, неизотермический поток» содержит мультифизические интерфейсы для моделирования потока и теплопередачи в оборудовании, где одна или несколько границ вращаются периодически. Поток жидкости может быть ламинарным или турбулентным, при этом может учитываться температура внутри жидкости, а также твердых частей оборудования. Физические интерфейсы можно использовать для моделирования мешалок и пропеллеров.
topicdescr/rmnitf_turb = [Интерфейсы «Вращающееся оборудование», «Неизотермический поток», «Турбулентный поток»]Интерфейсы «Вращающееся оборудование», «Неизотермический поток», «Турбулентный поток» содержат мультифизические интерфейсы для моделирования потока при высоких числах Рейнольдса и теплопередачи в оборудовании, где одна или несколько границ вращаются периодически.
topicdescr/rmrf = [Вращающееся оборудование, реагирующий поток] Интерфейсы «Вращающееся оборудование, реагирующий поток» используются для расчета потока жидкости и концентрации химических веществ в оборудовании, содержащем одну или несколько вращающихся частей. Также можно изучить реакции между участвующими видами.
topicdescr/rmtrf = [Вращающееся оборудование, реагирующий поток]Интерфейсы «Вращающееся оборудование, реагирующий турбулентный поток» используются для моделирования турбулентного потока и смешивания химических веществ в оборудовании, содержащем одну или несколько вращающихся частей. Также можно изучить реакции между участвующими видами.
topicdescr/roptics = [Ветка лучевой оптики] Ветка лучевой оптики мастера моделей содержит интерфейс геометрической оптики, который используется для моделирования распространения электромагнитных волн, когда длина волны намного меньше наименьшего геометрического объекта в модели.
topicdescr/rotatingmachineryflowkeps = [Интерфейс «Вращающееся оборудование, турбулентный поток», k-ε] Интерфейс «Вращающееся оборудование, турбулентный поток», k-ε используется для моделирования потока при высоких числах Рейнольдса в геометриях с одной или несколькими вращающимися частями. Физический интерфейс подходит для несжимаемых и сжимаемых потоков при низких числах Маха (обычно менее 0,3).\n\nТурбулентный поток, k-ε интерфейс сочетается с вращающейся областью под движущейся сеткой. Баланс импульса определяется уравнениями Навье-Стокса, а сохранение массы определяется уравнением неразрывности. Эффекты турбулентности моделируются с использованием стандартной модели с двумя уравнениями k-ε с ограничениями реализуемости. Поток вблизи стенок моделируется с использованием стеновых функций.\n\nДля этого физического интерфейса доступны два типа исследования. При использовании типа исследования «Зависит от времени» вращение достигается за счет функции перемещения сетки, также известной как скользящая сетка. При использовании типа исследования «Замороженный ротор» вращающиеся части остаются в замороженном состоянии, а вращение учитывается за счет центробежных сил и сил Кориолиса.
topicdescr/rotatingmachineryflowkomega = [Интерфейс «Вращающееся оборудование, турбулентный поток», k-ω] Интерфейс «Вращающееся оборудование, турбулентный поток», k-ω используется для моделирования потока при высоких числах Рейнольдса в геометриях с одной или несколькими вращающимися частями. Физический интерфейс поддерживает несжимаемые и сжимаемые потоки при низких числах Маха (обычно менее 0,3).\n\nТурбулентный поток, интерфейс k-ω объединен с вращающейся областью под движущейся сеткой. Баланс импульса определяется уравнениями Навье-Стокса, а сохранение массы определяется уравнением неразрывности. Эффекты турбулентности моделируются с использованием пересмотренной модели Уилкокса с двумя уравнениями k-ω с ограничениями реализуемости. Модель k-ω представляет собой так называемую модель с низким числом Рейнольдса, что означает, что она может разрешить поток вплоть до стенки.\n\nДля этого физического интерфейса доступны два типа исследования. При использовании типа исследования «Зависит от времени» вращение достигается за счет функции перемещения сетки, также известной как скользящая сетка. При использовании типа исследования «Замороженный ротор» вращающиеся части остаются в замороженном состоянии, а вращение учитывается за счет центробежных сил и сил Кориолиса.
topicdescr/rotatingmachineryflowlaminar = [Интерфейс «Вращающееся оборудование, ламинарный поток»] Интерфейс «Вращающееся оборудование, ламинарный поток» используется для моделирования потока при низких и средних числах Рейнольдса в геометриях с одной или несколькими вращающимися частями. Физический интерфейс поддерживает несжимаемые и сжимаемые потоки при низких числах Маха (обычно менее 0,3). Он также поддерживает моделирование неньютоновских жидкостей.\n\nИнтерфейс ламинарного потока сочетается с вращающейся областью в подвижной сетке. Баланс импульса определяется уравнениями Навье-Стокса, а сохранение массы определяется уравнением непрерывности.\n\nДля этого физического интерфейса доступны два типа исследования. При использовании типа исследования «Зависимость от времени» вращение достигается за счет функции перемещения сетки, также известной как скользящая сетка. При использовании типа исследования «Замороженный ротор» вращающиеся части остаются в замороженном состоянии, а вращение учитывается за счет центробежных сил и сил Кориолиса. В обоих типах баланс импульса определяется уравнениями Навье-Стокса, а сохранение массы определяется уравнением неразрывности.
topicdescr/rotatingmachineryflowlowrekeps = [Интерфейс «Вращающееся оборудование, турбулентный поток, низкое Re k-ε]» Интерфейс «Вращающееся оборудование, турбулентный поток, низкое Re» k-ε используется для моделирования потока при высоких числах Рейнольдса в геометриях с одной или несколькими вращающимися частями. Физический интерфейс поддерживает несжимаемые и сжимаемые потоки при низких числах Маха (обычно менее 0,3).\n\nТурбулентный поток, низкий Re k-ε интерфейс сочетается с вращающейся областью под движущейся сеткой. Баланс импульса определяется уравнениями Навье-Стокса, а сохранение массы определяется уравнением неразрывности. Эффекты турбулентности моделируются с использованием модели AKN с низким числом Рейнольдса k-ε, которая может разрешить поток вплоть до стенки. Модель АКН зависит от расстояния до ближайшей стены. Поэтому физический интерфейс включает в себя уравнение расстояния до стены.\n\nДля этого физического интерфейса доступны два типа анализа. Используя переходный анализ, один или несколько областей вращаются относительно фиксированной системы отсчета. Этот тип анализа также известен как скользящая сетка. При использовании анализа замороженного ротора вращающиеся части остаются в замороженном состоянии, а вращение учитывается с учетом центробежных сил и сил Кориолиса.
