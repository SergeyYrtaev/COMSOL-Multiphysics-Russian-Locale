topicdescr/volumeaveragedmixturemodelkomega = [Модель смеси, интерфейс k-ω] Интерфейс модели смеси, k-ω используется для моделирования дисперсных многофазных потоков при высоких числах Рейнольдса. Дисперсной фазой могут быть пузырьки, капли жидкости или твердые частицы, которые, как предполагается, всегда движутся со своей предельной скоростью. смесь. Распределение давления рассчитывается по усредненному уравнению неразрывности смеси, а скорость дисперсной фазы описывается моделью скольжения. Объемную долю дисперсной фазы отслеживают путем решения уравнения переноса объемной доли. Эффекты турбулентности моделируются с использованием пересмотренной модели Уилкокса с двумя уравнениями k-ω с ограничениями реализуемости. Модель k-ω является так называемой моделью с низким числом Рейнольдса, что означает, что она может определять поток вплоть до стенки.\n\nФизический интерфейс также может моделировать распределение числовой плотности, которое можно использовать для расчета межфазной границы область, полезная при моделировании химических реакций в смеси.
topicdescr/volumeaveragedmixturemodellaminar = [Модель смеси, интерфейс ламинарного потока] Интерфейс Модель смеси, ламинарный поток используется для моделирования дисперсных многофазных потоков при низких и умеренных числах Рейнольдса. Дисперсной фазой могут быть пузырьки, капли жидкости или твердые частицы, которые, как предполагается, всегда движутся с предельной скоростью. \n\nИнтерфейс «Модель смеси, ламинарный поток» решает один набор уравнений Навье-Стокса для определения импульса смеси. Распределение давления рассчитывается на основе усредненного по смеси уравнения неразрывности, а скорость дисперсной фазы описывается моделью скольжения. Объемная доля дисперсной фазы отслеживается путем решения уравнения переноса объемной доли.\n\nФизический интерфейс также может моделировать распределение числовой плотности, которое можно использовать для расчета площади межфазной границы, что полезно при моделировании химических реакций в смеси.
topicdescr/volumeaveragedmixturemodellowrekeps = [Модель смеси, интерфейс Low Re k-ε] Интерфейс модели смеси, Low Re k-ε используется для моделирования дисперсных многофазных потоков при высоких числах Рейнольдса. Дисперсной фазой могут быть пузырьки, капли жидкости или твердые частицы, которые, как предполагается, всегда движутся со своей предельной скоростью. смесь. Распределение давления рассчитывается по усредненному уравнению неразрывности смеси, а скорость дисперсной фазы описывается моделью скольжения. Объемную долю дисперсной фазы отслеживают путем решения уравнения переноса объемной доли. Эффекты турбулентности моделируются с использованием модели AKN с двумя уравнениями k-ε с ограничениями реализуемости. Модель AKN представляет собой так называемую модель с низким числом Рейнольдса, что означает, что она может разрешить поток вплоть до стенки. Модель АКН зависит от расстояния до ближайшей стены. Поэтому физический интерфейс включает уравнение расстояния до стены. \n\nФизический интерфейс также может моделировать распределение числовой плотности, которое можно использовать для расчета площади межфазной границы, что полезно при моделировании химических реакций в смеси.
topicdescr/volumeaveragedmixturemodellvel = [Модель смеси, интерфейс L-VEL] Интерфейс модели смеси, L-VEL используется для моделирования дисперсных многофазных потоков при высоких числах Рейнольдса. Дисперсной фазой могут быть пузырьки, капли жидкости или твердые частицы, которые, как предполагается, всегда движутся с предельной скоростью. \n\nМодель смеси, интерфейс L-VEL решает один набор уравнений Навье-Стокса для определения импульса смеси. Распределение давления рассчитывается по усредненному уравнению неразрывности смеси, а скорость дисперсной фазы описывается моделью скольжения. Объемную долю дисперсной фазы отслеживают путем решения уравнения переноса объемной доли. Эффекты турбулентности учитываются с использованием расширенной модели вязкости, основанной на локальном расстоянии от стенки. Поэтому физический интерфейс включает в себя уравнение расстояния до стены.\n\nФизический интерфейс также может моделировать распределение числовой плотности, которое можно использовать для расчета площади межфазной границы, что полезно при моделировании химических реакций в смеси.
topicdescr/volumeaveragedmixturemodelrealizablekeps = [Модель смеси, реализуемый интерфейс k-ε] Интерфейс модели смеси, реализуемый k-ε используется для моделирования дисперсных многофазных потоков при высоких числах Рейнольдса. Дисперсной фазой могут быть пузырьки, капли жидкости или твердые частицы, которые, как предполагается, всегда движутся со своей предельной скоростью. смеси. Распределение давления рассчитывается по усредненному уравнению неразрывности смеси, а скорость дисперсной фазы описывается моделью скольжения. Объемную долю дисперсной фазы отслеживают путем решения уравнения переноса объемной доли. Эффекты турбулентности моделируются с использованием реализуемой модели с двумя уравнениями k-ε. Поток вблизи стенок моделируется с использованием стеновых функций. \n\nФизический интерфейс также может моделировать распределение числовой плотности, которое можно использовать для расчета площади межфазной границы, что полезно при моделировании химических реакций в смеси.
topicdescr/volumeaveragedmixturemodelsa = [Модель смеси, интерфейс Spalart-Allmaras] Модель смеси, интерфейс Spalart-Allmaras используется для моделирования дисперсных многофазных потоков при высоких числах Рейнольдса. Дисперсной фазой могут быть пузырьки, капли жидкости или твердые частицы, которые, как предполагается, всегда движутся с предельной скоростью. \n\nМодель смеси, интерфейс Spalart-Allmaras решает один набор уравнений Навье-Стокса для определения импульса смеси. Распределение давления рассчитывается по усредненному уравнению неразрывности смеси, а скорость дисперсной фазы описывается моделью скольжения. Объемную долю дисперсной фазы отслеживают путем решения уравнения переноса объемной доли. Эффекты турбулентности моделируются с использованием модели одного уравнения Спаларта-Алмараса. Модель Спаларта-Аллмараса представляет собой так называемую модель с низким числом Рейнольдса, что означает, что она может разрешить поток вплоть до стенки. Модель Spalart-Allmaras зависит от расстояния до ближайшей стены. Поэтому физический интерфейс включает в себя уравнение расстояния до стены.\n\nФизический интерфейс также может моделировать распределение числовой плотности, которое можно использовать для расчета площади межфазной границы, что полезно при моделировании химических реакций в смеси.
topicdescr/volumeaveragedmixturemodelsst = [Модель смеси, интерфейс SST] Модель смеси, интерфейс SST используется для моделирования дисперсных многофазных потоков при высоких числах Рейнольдса. Дисперсной фазой могут быть пузырьки, капли жидкости или твердые частицы, которые, как предполагается, всегда движутся с предельной скоростью. \n\nМодель смеси, интерфейс SST решает один набор уравнений Навье-Стокса для определения импульса смеси. Распределение давления рассчитывается по усредненному уравнению неразрывности смеси, а скорость дисперсной фазы описывается моделью скольжения. Объемную долю дисперсной фазы отслеживают путем решения уравнения переноса объемной доли. Эффекты турбулентности моделируются с использованием модели переноса сдвигового напряжения Ментера (SST) с двумя уравнениями и ограничениями реализуемости. Модель SST представляет собой так называемую модель с низким числом Рейнольдса, что означает, что она может разрешить поток вплоть до стенки. Модель SST зависит от расстояния до ближайшей стены. Поэтому физический интерфейс включает в себя уравнение расстояния до стены.\n\nФизический интерфейс также может моделировать распределение числовой плотности, которое можно использовать для расчета площади межфазной границы, что полезно при моделировании химических реакций в смеси.
topicdescr/volumeaveragedmixturemodelv2f = [Модель смеси, интерфейс v2-f] Интерфейс Модель смеси, v2-f используется для моделирования дисперсных многофазных потоков при высоких числах Рейнольдса. Дисперсной фазой могут быть пузырьки, капли жидкости или твердые частицы, которые, как предполагается, всегда движутся с предельной скоростью. \n\nМодель смеси, интерфейс v2-f решает один набор уравнений Навье-Стокса для определения импульса смеси. Распределение давления рассчитывается по усредненному уравнению неразрывности смеси, а скорость дисперсной фазы описывается моделью скольжения. Объемную долю дисперсной фазы отслеживают путем решения уравнения переноса объемной доли. Эффекты турбулентности моделируются с использованием модели v2-f, выраженной через турбулентные относительные флуктуации (v2, нормированный на k). Эллиптическая функция используется для смешивания пристеночных и объемных членов в уравнениях модели турбулентности. Модель v2-f представляет собой так называемую модель с низким числом Рейнольдса, что означает, что она может разрешить поток вплоть до стенки. Модель v2-f зависит от расстояния до ближайшей стены. Поэтому физический интерфейс включает в себя уравнение расстояния до стены.\n\nФизический интерфейс также может моделировать распределение числовой плотности, которое можно использовать для расчета площади межфазной границы, что полезно при моделировании химических реакций в смеси.
topicdescr/vtspf = [Интерфейсы потока пара]Мультифизические интерфейсы турбулентного потока объединяют уравнения массопереноса в паре с уравнениями, управляющими турбулентным потоком.
topicdescr/walldistance = [Интерфейс «Расстояние до стены»Интерфейс «Расстояние до стены» решает модифицированное уравнение Эйконала для вычисления расстояния до стен, которое является важной величиной для моделирования турбулентности при моделировании потока жидкости.
topicdescr/waterhammer = [Интерфейс «Гидроудар»]Интерфейс «Гидравлический удар» используется для расчета полей скорости и давления для распространения гидравлического переходного процесса, также известного как гидравлический удар, в системах упругих труб. Например, распространение гидравлического удара в системе трубопроводов нефтеперерабатывающего завода.\n\nУравнения, управляющие распространением гидравлических переходных процессов в трубах, основаны на учете балансов импульса, массы и энергии для контрольного объема куска трубы. В формулировке интерфейса Water Hammer эффекты сжимаемости жидкости и стенок трубы линеаризуются. Полученные уравнения выражаются в усредненных по поперечному сечению переменных и сводят уравнения к одномерной модели со скалярными полевыми переменными. Физический интерфейс доступен в 3D на краях и в точках, а также в 2D на границах и точках.
topicdescr/waterelectrolyzer = [Электролизер воды] Интерфейс «Электролизер воды» моделирует электрохимическую ячейку, в которой водородосодержащая газовая смесь присутствует на одной стороне, а кислородсодержащая смесь — на другой стороне мембраны или сепаратора. Также могут быть включены дополнительные виды газа, такие как азот, окись углерода, диоксид углерода и водяной пар. \n\nИнтерфейс включает перенос заряда в электролитной и электродной фазах и электродные реакции в отдельных газовых отсеках и, необязательно, газовую диффузию. Закон Дарси о передаче импульса также можно решить с помощью интерфейса.
topicdescr/waveequation = [Классические интерфейсы УЧП]Интерфейс волнового уравнения можно использовать для моделирования классического УЧП гиперболического типа. Это УЧП второго порядка, который описывает волны, такие как звуковые волны, световые волны и волны на воде. Wave Equation также доступен в качестве узла функции предметной области для всех интерфейсов PDE.
topicdescr/waveformpde = [Интерфейс Wave Form PDE] Интерфейс Wave Form PDE решает волновые уравнения, сформулированные с производными первого порядка во времени и пространстве, с использованием разрывного метода Галеркина и высоко оптимизирован с точки зрения скорости и потребления памяти. 
topicdescr/waveformpde{1axi} = ${topicdescr/waveformpde}\n\nПримечание: интерфейс Wave Form PDE никоим образом не учитывает осевую симметрию геометрии; направление r рассматривается как одномерная линия. 
topicdescr/waveformpde{axi} = ${topicdescr/waveformpde}\n\nПримечание: интерфейс Wave Form PDE никоим образом не учитывает осевую симметрию геометрии; Плоскость rz рассматривается как плоская двумерная геометрия. 
topicdescr/we = [Ветка «Электролизеры воды»] Ветка «Электролизеры воды» содержит интерфейсы для моделирования электролизеров воды, в которых на катодной стороне присутствует смесь водорода, а на анодной стороне — кислородная смесь соответственно. Могут быть включены дополнительные виды газа, такие как азот, окись углерода, диоксид углерода и водяной пар. \n\nИнтерфейсы раздела включают перенос заряда в электролитной и электродной фазах и электродные реакции в отдельных анодном и катодном отделениях, а также, необязательно, газофазную диффузию. Закон Дарси о передаче импульса также можно решить с помощью интерфейсов. Другие модели переноса импульса для потока жидкости можно использовать путем подключения к отдельным интерфейсам потока жидкости. \n\nДля включенных реагирующих газов и электродных реакций будут использоваться различные настройки по умолчанию в зависимости от выбранного типа ячейки.
topicdescr/weakformboundarypde = [Интерфейсы УЧП слабой формы]Интерфейс УЧП слабой формы обеспечивает гибкий интерфейс для задания и решения УЧП в слабой форме на границах.
topicdescr/weakformboundarypde{1axi} = ${topicdescr/weakformboundarypde}\n\nПримечание: интерфейс Weak Form Boundary PDE никоим образом не учитывает осевую симметрию геометрии; направление r рассматривается как одномерная линия. 
topicdescr/weakformboundarypde{axi} = ${topicdescr/weakformboundarypde}\n\nПримечание: интерфейс Weak Form Boundary PDE никоим образом не учитывает осевую симметрию геометрии; Плоскость rz рассматривается как плоская двумерная геометрия. 
topicdescr/weakformedgepde = [Интерфейсы PDE слабой формы]Интерфейс PDE Weak Form Edge предоставляет гибкий интерфейс для задания и решения PDE слабой формы на ребрах в 3D.
topicdescr/weakformedgepde{1axi} = ${topicdescr/weakformedgepde}\n\nПримечание. Интерфейс Weak Form Edge PDE никоим образом не учитывает осевую симметрию геометрии; направление r рассматривается как одномерная линия. 
topicdescr/weakformedgepde{axi} = ${topicdescr/weakformedgepde}\n\nПримечание. Интерфейс Weak Form Edge PDE никоим образом не учитывает осевую симметрию геометрии; Плоскость rz рассматривается как плоская двумерная геометрия. 
topicdescr/weakformpde = [Интерфейсы УЧП слабой формы] УЧП слабой формы предоставляет общий интерфейс для задания и решения УЧП в слабой форме. Слабая форма не определяет никаких коэффициентов и даже не разделяет различные уравнения в системе уравнений. При задании УЧП и его граничных условий в слабой форме вы задаете вклады в общее уравнение слабой формы.
topicdescr/weakformpde{1axi} = ${topicdescr/weakformpde}\n\nПримечание: интерфейс Weak Form PDE никоим образом не учитывает осевую симметрию геометрии; направление r рассматривается как одномерная линия. 
