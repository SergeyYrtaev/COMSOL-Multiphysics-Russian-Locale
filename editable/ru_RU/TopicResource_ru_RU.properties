topicdescr_evaluationGroup/ray = Оценить величины по лучам.
topicdescr_evaluationGroup/systemmatrix = Оцените матрицу системы.

topicdescr_export/animation = Создайте анимацию группы графиков для экспорта в файл.
topicdescr_export/data = Экспортировать данные в файл.
topicdescr_export/image = Экспортируйте изображение.
topicdescr_export/mesh = Экспортируйте сетку.
topicdescr_export/player = Создайте анимацию в плеере в главном окне COMSOL Desktop.
topicdescr_export/plot = Экспорт графиков в файлы.
topicdescr_export/table = Экспортировать данные таблицы в файл.
topicdescr_export/touchstone = Экспортируйте параметры сети в файл Touchstone.

topicdescr_func/analytic = Аналитическая функция определяется символьным выражением.
topicdescr_func/dnn = Функция глубокой нейронной сети аппроксимирует неизвестную функцию на основе обучающих данных и может эффективно обрабатывать большой объем многомерных данных.
topicdescr_func/elevation = Функция высоты позволяет импортировать геопространственные данные о высоте из цифровых моделей рельефа в формате файла DEM и сопоставлять данные о высоте с функцией x и y.
topicdescr_func/external = Внешняя функция взаимодействует с другими внешними функциями, написанными на языке C.
topicdescr_func/functionswitch = Переключение между глобальными функциями во время развертки решателя. 
topicdescr_func/gaussianprocess = Функция гауссовского процесса интерполирует данные из таблицы или файла с использованием регрессии гауссовского процесса (кригинг).
topicdescr_func/gaussianpulse = Импульсная функция Гаусса создает колоколообразную кривую (функция Гаусса).
topicdescr_func/image = Функция изображения использует изображение из файла BMP, GIF, JPEG или PNG.
topicdescr_func/interpolation = Функция интерполяции интерполирует (и экстраполирует) данные из таблицы или файла.
topicdescr_func/leastsquares = Функция наименьших квадратов оптимизирует выражение, чтобы оно соответствовало данным из таблицы или файла.  
topicdescr_func/matlab = Функция MATLAB объявляет использование функции в MATLAB. Для этого требуется LiveLink для MATLAB.
topicdescr_func/normaldistribution = Статистические функции, связанные с нормальным распределением: функция плотности, кумулятивная функция распределения, функция квантиля и случайно сгенерированная функция.
topicdescr_func/partialfraction = Функция частичных дробей аппроксимирует рациональную функцию на основе комплексных данных, зависящих от частоты.
topicdescr_func/polynomialchaosexpansion = Функция расширения полиномиального хаоса интерполирует данные из таблицы или файла, используя статистическую информацию о входных данных.
topicdescr_func/piecewise = Функция кусочной интерполяции создается путем объединения нескольких функций, каждая из которых определена на одном интервале.
topicdescr_func/ramp = Функция линейного изменения определяет линейное изменение с начальной точкой и наклоном, а также дополнительное сглаживание в начале и в конце.
topicdescr_func/random = Случайная функция с равномерным или нормальным распределением.
topicdescr_func/rectangle = Функция прямоугольника определяет функцию прямоугольной формы с дополнительными зонами сглаживания по обе стороны переходов.
topicdescr_func/step = Ступенчатая функция с определенным местоположением и возможным сглаживанием перехода.
topicdescr_func/triangle = Функция треугольника определяет функцию в форме треугольника с дополнительными зонами сглаживания по обе стороны переходов.
topicdescr_func/wave = Волновая функция генерирует волновую функцию пилообразной, синусоидальной, прямоугольной или треугольной формы.

topicdescr_geom/adjacentselection = Создайте выборку объектов, которые примыкают к заданным выборкам.
topicdescr_geom/angle = Укажите угол между двумя краями.
topicdescr_geom/array = Создайте блочный (3D), прямоугольный (2D, 3D) или линейный массив геометрических объектов.
topicdescr_geom/ballselection = Создавайте выборки из геометрических объектов или объектов, которые (частично) лежат внутри шара.
topicdescr_geom/bezierpolygon = Создайте кривую или сплошной многоугольник, состоящий из сегментов Безье в 2D или 3D.
topicdescr_geom/block = Создайте прямоугольное твердое тело или блок поверхности в 3D.
topicdescr_geom/boxselection = Создавайте выборки из геометрических объектов или объектов, которые (частично) лежат внутри рамки.
topicdescr_geom/capfaces = Заполните дыры в геометрии или разделите ее, закрыв грани.
topicdescr_geom/centroidmeasurement = Создавайте параметры, измеряющие центроид выбранных вершин.
topicdescr_geom/chamfer = Создайте сглаженные углы (фаски).
topicdescr_geom/chamfer3d = Добавьте шарфы для резки углов в 3D-геометрии.
topicdescr_geom/check = Проверьте достоверность объектов геометрии.
topicdescr_geom/circle = Создайте круг или диск в 2D.
topicdescr_geom/circulararc = Создайте дугу окружности в 2D.
topicdescr_geom/coincident = Используйте ограничение «Совпадение», чтобы заставить два геометрических объекта совпадать друг с другом.
topicdescr_geom/collapseedges = Сворачивайте ребра, удаляя их, объединяя соседние вершины и повторно соединяя соседние ребра с объединенными вершинами.
topicdescr_geom/collapsefaceregions = Свернуть области граней, размеры которых уже указанного размера.
topicdescr_geom/collapsefaces = Свернуть грани, удалив их, объединив их соседние противоположные ребра или свернув все смежные ребра в одну вершину и повторно соединив соседние грани с объединенными ребрами или вершинами.
topicdescr_geom/complementselection = Объедините выбранные объекты или объекты, используя дополнение множества.
topicdescr_geom/compose = Составляйте геометрические объекты, используя формулу логического набора.
topicdescr_geom/compositedomains = Сформируйте составной область для каждого компонента связанного области выбранных областей, игнорируя границы между областями.
topicdescr_geom/compositeedges = Сформируйте составное ребро для каждого компонента связного ребра (типа многообразия) выбранных ребер, игнорируя вершины между ребрами.
topicdescr_geom/compositefaces = Сформируйте составную грань для каждого компонента подключенной грани (типа коллектора) выбранных граней, игнорируя ребра между гранями. 
topicdescr_geom/concentric = Добавьте ограничение «Концентричность», чтобы обеспечить одинаковый центр круглых ребер или чтобы центральная точка круглых ребер и вершин совпадала.
topicdescr_geom/cone = Создайте круглый конус или усеченный конус (усеченный конус, усеченный конус) в 3D.
topicdescr_geom/converttocomsol = Преобразуйте геометрические объекты из ядра модуля импорта САПР в ядро COMSOL.
topicdescr_geom/converttocurve = Объединяйте и преобразуйте геометрические объекты в объект кривой.
topicdescr_geom/converttopoint = Объединяйте и преобразуйте геометрические объекты в точечный объект.
topicdescr_geom/converttosolid = Объединяйте и преобразуйте геометрические объекты в твердотельный объект.
topicdescr_geom/converttosurface = Объединяйте и преобразуйте геометрические объекты в объект поверхности.
topicdescr_geom/copy = Копирование объектов геометрии путем перевода.
topicdescr_geom/crosssection = Создайте 2D-геометрию из поперечного сечения 3D-геометрии.
topicdescr_geom/cubicbezier = Создайте кубический сегмент Безье в 2D или 3D.
topicdescr_geom/cylinder = Создайте сплошной или полый (поверхностный) цилиндр в 3D.
topicdescr_geom/cylinderselection = Создавайте выборки из геометрических объектов или объектов, которые (частично) лежат внутри цилиндра.
topicdescr_geom/delete = Удалите вершины, ребра, грани, домены или геометрические объекты.
topicdescr_geom/deletefillets = Удаление скруглений из объекта геометрии 3D CAD.
topicdescr_geom/deleteholes = Удаление отверстий из объекта геометрии 3D CAD.
topicdescr_geom/deleteshortedges = Удалите короткие кромки из объекта геометрии 3D CAD.
topicdescr_geom/deletesliverfaces = Удалите грани из объекта геометрии 3D CAD.
topicdescr_geom/deletesmallfaces = Удаление небольших граней из объекта геометрии 3D CAD.
topicdescr_geom/deletespikes = Удалите шипы (то есть длинные и узкие выступы на краю или углу грани, определяемой двумя или тремя краями) из объекта геометрии 3D CAD.
topicdescr_geom/detachfaces = Отделите грани от объекта 3D CAD и создайте новый объект. 
topicdescr_geom/detectinterferences = Обнаружение пересечений, которое позволяет обнаружить перекрытия и пробелы между объектами трехмерной геометрии.
topicdescr_geom/difference = Составьте геометрические объекты как заданную разницу входных объектов.
topicdescr_geom/differenceselection = Объедините выбранные объекты или объекты с помощью операции установки разности.
topicdescr_geom/dirdistance = Добавьте размер направленного расстояния, чтобы задать расстояние в указанном направлении между двумя геометрическими объектами.
topicdescr_geom/diskselection = Создавайте выборки из геометрических объектов или объектов, которые (частично) лежат внутри диска.
topicdescr_geom/distance = Добавьте размер «Расстояние», чтобы задать расстояние между двумя геометрическими объектами.
topicdescr_geom/distancemeasurement = Создание параметров, измеряющих расстояние между выбранными геометрическими объектами.
topicdescr_geom/econe = Создайте твердый или поверхностный эксцентричный косой конус или усеченный конус в 3D.
topicdescr_geom/editobject = Создайте объект редактирования в 2D.
topicdescr_geom/ellipse = Создайте сплошной или изогнутый эллипс в 2D.
topicdescr_geom/ellipsoid = Создайте твердый или поверхностный эллипсоид в 3D.
topicdescr_geom/else = Добавьте оператор Else как часть предложения If, включив или отключив функции в зависимости от условий с точки зрения параметров.
topicdescr_geom/elseif = Добавьте оператор Else If как часть предложения If, включив или отключив функции в зависимости от условий с точки зрения параметров.
topicdescr_geom/endif = Добавьте оператор End If как часть предложения If, включив или отключив функции в зависимости от условий с точки зрения параметров.
topicdescr_geom/equaldistance = Добавьте ограничение «Равное расстояние», чтобы сделать расстояния между двумя парами геометрических объектов равными.
topicdescr_geom/equalradius = Добавьте ограничение «Равный радиус», чтобы два круговых ребра имели одинаковый радиус.
topicdescr_geom/explicitselection = Создавайте явный выбор геометрических объектов или объектов.
topicdescr_geom/extract =  Извлеките объекты из геометрии или удалите все объекты, которые не были выбраны.
topicdescr_geom/extrude = Выдавливание плоских граней в 3D-объекты.
topicdescr_geom/fillet = Создавайте круглые закругленные углы (скругления) в объектах 2D-геометрии.
topicdescr_geom/fillet3d = Добавьте филе для создания закругленных углов в 3D-геометрии.
topicdescr_geom/finalize = Создайте объединение или сборку, объединив все геометрические объекты.
topicdescr_geom/frommesh = Создайте геометрию (деформированную конфигурацию) из (деформированной) сетки.
topicdescr_geom/geomsequence = Создайте геометрическую последовательность.
topicdescr_geom/helix = Создайте твердое тело, поверхность или кривую спираль (катушку) с круглым поперечным сечением в 3D.
topicdescr_geom/hexahedron = Создайте твердый или поверхностный шестигранник, ограниченный билинейными гранями.
topicdescr_geom/horizontal = Добавьте ограничение по горизонтали, чтобы прямые края были параллельны оси X.
topicdescr_geom/if = Добавьте оператор If, включающий или отключающий функции в зависимости от условий с точки зрения параметров.
topicdescr_geom/ifplusendif = Добавьте оператор If и оператор End If, включая или отключая функции в зависимости от условий с точки зрения параметров.
topicdescr_geom/ignoreedges = Игнорируйте ребра, удаляя выбранные ребра, которые изолированы, примыкают ровно к двум граням или находятся между двумя доменами.
topicdescr_geom/ignorefaces = Игнорируйте лица, удалив выбранные лица, которые изолированы или находятся между двумя доменами.
topicdescr_geom/ignorevertices = Игнорируйте вершины, удаляя выбранные вершины, которые изолированы или примыкают ровно к двум ребрам.
topicdescr_geom/import = Импортируйте геометрию из файла, другой последовательности геометрии или последовательности построения сетки.
topicdescr_geom/interpolationcurve = Создайте кривую, интерполирующую или аппроксимирующую последовательность точек в 2D или 3D.
topicdescr_geom/intersection = Составляйте геометрические объекты, используя заданное пересечение входных объектов.
topicdescr_geom/intersectionselection = Объедините выбранные объекты или объекты, используя операцию пересечения множеств.
topicdescr_geom/interval = Создайте один или несколько связанных интервалов в 1D.
topicdescr_geom/knit = Сшивайте поверхностные объекты САПР для формирования твердых тел или поверхностных объектов.
topicdescr_geom/linesegment = Создайте сегмент линии в 2D или 3D.
topicdescr_geom/livelinkautocad = [LiveLink для AutoCAD]Синхронизируйте геометрию между AutoCAD® и COMSOL Multiphysics.
topicdescr_geom/livelinkautocadlivelinkcad = Добавьте функцию синхронизации геометрии между AutoCAD® и COMSOL Multiphysics.
topicdescr_geom/livelinkfakecad = [LiveLink для FakeCAD]Только для внутреннего использования. Синхронизируйте временные файлы, созданные надстройками LiveLink, с COMSOL Multiphysics.
topicdescr_geom/livelinkinventor = [LiveLink для Inventor]Синхронизируйте геометрию между Inventor® и COMSOL Multiphysics.
topicdescr_geom/livelinkptccreoparametric = [LiveLink for PTC Creo Parametric]Синхронизируйте геометрию между PTC® Creo® Parametric™ и COMSOL Multiphysics.
topicdescr_geom/livelinkptcproengineer = [LiveLink для PTC Pro/ENGINEER]Синхронизируйте геометрию между PTC® Pro/ENGINEER® и COMSOL Multiphysics.
topicdescr_geom/livelinkrevit = [LiveLink for Revit]Синхронизируйте геометрию между Revit® и COMSOL Multiphysics.
topicdescr_geom/livelinksolidedge = [LiveLink для Solid Edge]Синхронизируйте геометрию между Solid Edge® и COMSOL Multiphysics.
topicdescr_geom/livelinksolidworks = [LiveLink для SOLIDWORKS]Синхронизируйте геометрию между SOLIDWORKS® и COMSOL Multiphysics.
topicdescr_geom/loft = Лофт 2D разделы на объекты 3D геометрии.
topicdescr_geom/logicalexpressionselection = Создайте выборку, определенную логическим выражением, которое содержит ссылки на другие выборки или атрибуты.
topicdescr_geom/mergeedges = Объедините ребра, прилегающие к граням.
topicdescr_geom/mergevertices = Объедините две вершины.
topicdescr_geom/meshcontroldomains = Определите домены управления сеткой.
topicdescr_geom/meshcontroledges = Определите контрольные края сетки.
topicdescr_geom/meshcontrolfaces = Определите управляющие грани сетки.
topicdescr_geom/meshcontrolvertices = Определите управляющие вершины сетки.
topicdescr_geom/midsurface = Выполните операцию срединной поверхности, которая удаляет толщину твердого объекта, в результате чего создается поверхностный объект, что может быть полезно, например, если вы можете использовать интерфейс оболочки.
topicdescr_geom/mirror = Отражайте (отражайте) объекты в плоскости (3D), линии (2D) или точке (1D).
topicdescr_geom/move = Перемещайте геометрические объекты путем перемещения.
topicdescr_geom/offset = Смещение краев в нормальном направлении в объектах 2D-геометрии.
topicdescr_geom/offsetfaces = Смещение лиц в нормальном направлении в 3D-объектах геометрии.
topicdescr_geom/parallel = Добавьте ограничение «Параллельность», чтобы прямые края были параллельными.
topicdescr_geom/parametercheck = Проверьте значения входных параметров геометрической последовательности.
topicdescr_geom/parametriccurve = Создайте параметрическую кривую, определенную координатными выражениями в 2D или 3D.
topicdescr_geom/parametricsurface = Создайте параметрическую поверхность, определенную координатными выражениями в 3D.
topicdescr_geom/partinstance = Создайте экземпляр геометрической детали.
topicdescr_geom/partition = Разделите геометрические объекты с помощью объектов-инструментов или рабочей плоскости.
topicdescr_geom/partitiondomains = Домены разделов 
topicdescr_geom/partitionedges = Ребра разбиения в трехмерной геометрии в некоторых вершинах разбиения вдоль ребер.
topicdescr_geom/partitionfaces = Грани разделов в 3D-геометрии 
topicdescr_geom/perpendicular = Добавьте ограничение «Перпендикулярность», чтобы сделать два прямых края ортогональными. 
topicdescr_geom/point = Создайте точечный объект в 1D, 2D или 3D.
topicdescr_geom/polygon = Создайте кривую или сплошной многоугольник, состоящий из сегментов линий в 2D или 3D.
topicdescr_geom/position = Добавьте измерение «Положение», чтобы указать координаты вершины.
topicdescr_geom/projection = Создайте проекцию на плоскость работы объектов и объектов 3D-геометрии.
topicdescr_geom/pyramid = Создайте твердую или поверхностную прямоугольную пирамиду или усеченную пирамиду в 3D.
topicdescr_geom/quadraticbezier = Создайте квадратичный сегмент Безье в 2D или 3D.
topicdescr_geom/radius = Добавьте размер «Радиус», чтобы задать радиус круглого края.
topicdescr_geom/rectangle = Создайте сплошной или кривой прямоугольник в 2D.
topicdescr_geom/removedetails = Автоматически удаляйте мелкие детали из геометрии.
topicdescr_geom/repair = Автоматически удаляйте мелкие детали и исправляйте дефекты геометрии.
topicdescr_geom/replacefaces = Удаление и замена граней из объекта геометрии 3D CAD.
topicdescr_geom/revolve = Вращение плоских граней в 3D.
topicdescr_geom/rigidtransform = [Жесткое преобразование]Перемещайте и вращайте объекты трехмерной геометрии.
topicdescr_geom/rotate = Вращайте объекты вокруг точки в 2D или оси в 3D.
topicdescr_geom/scale = Масштабируйте объекты вокруг точки.
topicdescr_geom/sphere = Создайте твердый шар или поверхностную сферу в 3D.
topicdescr_geom/split = Разделите (расчлените) объекты на домены, грани, ребра или вершины.
topicdescr_geom/square = Создайте сплошной или изогнутый квадрат в 2D.
topicdescr_geom/sweep = Сместите одну или несколько граней вдоль кривой позвоночника в твердое тело в 3D.
topicdescr_geom/tangent = Создайте сегмент касательной к одному или двум 2D-краям.
topicdescr_geom/tangentconstraint = Используйте ограничение касательности, чтобы ограничить наличие точки касания двух ребер.
topicdescr_geom/tetrahedron = Создайте твердый или поверхностный тетраэдр в 3D.
topicdescr_geom/thicken = Преобразуйте поверхностные объекты в твердые, придавая им толщину (обычно в нормальном направлении).
topicdescr_geom/thicken2d = Преобразуйте объекты 2D-кривой в твердые объекты, давая им толщину в нормальном направлении.
topicdescr_geom/torus = Создайте твердотельный или поверхностный тор в 3D.
topicdescr_geom/totaledgelength = Добавьте размер «Общая длина ребра», чтобы указать общую длину набора ребер. Ребра должны образовывать цепочку и лежать на одной линии, круге или сплайне.
topicdescr_geom/transformfaces = Преобразование лиц в объекты 3D-геометрии.
topicdescr_geom/union = Составляйте геометрические объекты, используя объединение входных объектов.
topicdescr_geom/unionselection = Объедините выбранные сущности или объекты, используя операцию объединения множеств.
topicdescr_geom/vertical = Добавьте ограничение по вертикали, чтобы прямые края были параллельны оси Y.
topicdescr_geom/workplane = Создайте рабочую плоскость в 3D для рисования 2D-объектов, которые можно вытягивать или вращать.
topicdescr_geom/xdistance = Добавьте размер «Расстояние по оси X», чтобы задать расстояние по оси X между двумя геометрическими объектами.
topicdescr_geom/ydistance = Добавьте размер «Расстояние по оси Y», чтобы задать расстояние в направлении Y между двумя геометрическими объектами.

topicdescr_massProp/masscontributions = Добавьте вклады в массу для вычисления свойств массы, таких как общая масса и центр масс.
topicdescr_massProp/massproperties = Вычислите массовые свойства, такие как общая масса, центр масс и момент инерции.

topicdescr_mesh/adapt = Адаптивная модификация сетки.
topicdescr_mesh/adjacentselection = Определите выборку объектов, которые примыкают к указанной выборке.
topicdescr_mesh/ball = Разделение геометрических объектов сетки на элемент, заданный шаром.
topicdescr_mesh/bndlayer = Генерировать граничный слой сетки.
topicdescr_mesh/bndlayerprop = Укажите свойства границ граничного слоя.
topicdescr_mesh/box = Разделение геометрических объектов сетки на элемент, заданный коробкой.
topicdescr_mesh/collapseentities = Свернуть геометрические объекты сетки.
topicdescr_mesh/convert = Преобразуйте несимплексные элементы в сетку в простые элементы (треугольники и тетраэдры).
topicdescr_mesh/copy = Скопируйте сетку из последовательности создания сетки.
topicdescr_mesh/copydomain = Копировать сетку между доменами.
topicdescr_mesh/copyedge = Копируйте сетку между краями.
topicdescr_mesh/copyface = Копируйте сетку между лицами.
topicdescr_mesh/cornerprop = Укажите свойства обработки углов.
topicdescr_mesh/cornerrefinement = Укажите утонченность в острых углах.
topicdescr_mesh/createdomains = Создайте один область для каждой конечной пустотной области, определенной сеткой.
topicdescr_mesh/createedges = Создавайте новые грани в сетке.
topicdescr_mesh/createfaces = Создайте новые лица в сетке.
topicdescr_mesh/createvertices = Создайте новые вершины в сетке.
topicdescr_mesh/cylinder = Разделение геометрических объектов сетки на элемент, заданный цилиндром.
topicdescr_mesh/deleteentities = Удалите геометрические объекты из сетки.
topicdescr_mesh/detectfaces = Разделите грани сетки путем поиска фигур, которые могут представлять собой отдельные грани.
topicdescr_mesh/distribution = Укажите распределение элементов.
topicdescr_mesh/edge = Создайте сетку для краев.
topicdescr_mesh/edgegroup = Определите группы ребер для сопоставленных сеток.
topicdescr_mesh/edgemap = Укажите два ребра, которые определяют сопоставление источника и места назначения.
topicdescr_mesh/explicitselection = Определите явный выбор объектов.
topicdescr_mesh/fillholes = Ремонт отверстий в гранях сетки.
topicdescr_mesh/fixedmesh = Закрепите сетку по краям, чтобы предотвратить ее изменение.
topicdescr_mesh/freequad = Неструктурированная четырехсторонняя сетка.
topicdescr_mesh/freetet = Генерировать неструктурированную тетраэдрическую сетку.
topicdescr_mesh/freetri = Генерировать неструктурированную треугольную сетку.
topicdescr_mesh/identicalmesh = Укажите идентичную сетку на парах граней или ребер.
topicdescr_mesh/import = Импорт сетки из файла или другого источника.
topicdescr_mesh/intersectline = Пересеките сетку линией.
topicdescr_mesh/imprint = Сделайте отпечатки граней, ребер или вершин на другой грани.
topicdescr_mesh/intersectplane = Пересеките сетку плоскостью.
topicdescr_mesh/joinentities = Присоединяйтесь к соседним геометрическим объектам сетки.
topicdescr_mesh/logicalexpression = Разделение геометрических объектов сетки на элемент, заданный логическим выражением.
