topicdescr/mixturemodelrealizablekeps = [Модель смеси, реализуемый интерфейс k-ε] Интерфейс модели смеси, реализуемый k-ε используется для моделирования дисперсных многофазных потоков при высоких числах Рейнольдса. Дисперсной фазой могут быть пузырьки, капли жидкости или твердые частицы, которые, как предполагается, всегда движутся со своей предельной скоростью. смеси. Распределение давления рассчитывается по усредненному уравнению неразрывности смеси, а скорость дисперсной фазы описывается моделью скольжения. Объемную долю дисперсной фазы отслеживают путем решения уравнения переноса объемной доли. Эффекты турбулентности моделируются с использованием реализуемой модели с двумя уравнениями k-ε. Поток вблизи стенок моделируется с использованием стеновых функций. \n\nФизический интерфейс также может моделировать распределение числовой плотности, которое можно использовать для расчета площади межфазной границы, что полезно при моделировании химических реакций в смеси.
topicdescr/mixturemodelsa = [Модель смеси, интерфейс Spalart-Allmaras] Модель смеси, интерфейс Spalart-Allmaras используется для моделирования дисперсных многофазных потоков при высоких числах Рейнольдса. Дисперсной фазой могут быть пузырьки, капли жидкости или твердые частицы, которые, как предполагается, всегда движутся с предельной скоростью. \n\nМодель смеси, интерфейс Spalart-Allmaras решает один набор уравнений Навье-Стокса для определения импульса смеси. Распределение давления рассчитывается по усредненному уравнению неразрывности смеси, а скорость дисперсной фазы описывается моделью скольжения. Объемную долю дисперсной фазы отслеживают путем решения уравнения переноса объемной доли. Эффекты турбулентности моделируются с использованием модели одного уравнения Спаларта-Алмараса. Модель Спаларта-Аллмараса представляет собой так называемую модель с низким числом Рейнольдса, что означает, что она может разрешить поток вплоть до стенки. Модель Spalart-Allmaras зависит от расстояния до ближайшей стены. Поэтому физический интерфейс включает в себя уравнение расстояния до стены.\n\nФизический интерфейс также может моделировать распределение числовой плотности, которое можно использовать для расчета площади межфазной границы, что полезно при моделировании химических реакций в смеси.
topicdescr/mixturemodelsst = [Модель смеси, интерфейс SST] Модель смеси, интерфейс SST используется для моделирования дисперсных многофазных потоков при высоких числах Рейнольдса. Дисперсной фазой могут быть пузырьки, капли жидкости или твердые частицы, которые, как предполагается, всегда движутся с предельной скоростью. \n\nМодель смеси, интерфейс SST решает один набор уравнений Навье-Стокса для определения импульса смеси. Распределение давления рассчитывается по усредненному уравнению неразрывности смеси, а скорость дисперсной фазы описывается моделью скольжения. Объемную долю дисперсной фазы отслеживают путем решения уравнения переноса объемной доли. Эффекты турбулентности моделируются с использованием модели переноса сдвигового напряжения Ментера (SST) с двумя уравнениями и ограничениями реализуемости. Модель SST представляет собой так называемую модель с низким числом Рейнольдса, что означает, что она может разрешить поток вплоть до стенки. Модель SST зависит от расстояния до ближайшей стены. Поэтому физический интерфейс включает в себя уравнение расстояния до стены.\n\nФизический интерфейс также может моделировать распределение числовой плотности, которое можно использовать для расчета площади межфазной границы, что полезно при моделировании химических реакций в смеси.
topicdescr/mixturemodelv2f = [Модель смеси, интерфейс v2-f] Интерфейс Модель смеси, v2-f используется для моделирования дисперсных многофазных потоков при высоких числах Рейнольдса. Дисперсной фазой могут быть пузырьки, капли жидкости или твердые частицы, которые, как предполагается, всегда движутся с предельной скоростью. \n\nМодель смеси, интерфейс v2-f решает один набор уравнений Навье-Стокса для определения импульса смеси. Распределение давления рассчитывается по усредненному уравнению неразрывности смеси, а скорость дисперсной фазы описывается моделью скольжения. Объемную долю дисперсной фазы отслеживают путем решения уравнения переноса объемной доли. Эффекты турбулентности моделируются с использованием модели v2-f, выраженной через турбулентные относительные флуктуации (v2, нормированный на k). Эллиптическая функция используется для смешивания пристеночных и объемных членов в уравнениях модели турбулентности. Модель v2-f представляет собой так называемую модель с низким числом Рейнольдса, что означает, что она может разрешить поток вплоть до стенки. Модель v2-f зависит от расстояния до ближайшей стены. Поэтому физический интерфейс включает в себя уравнение расстояния до стены.\n\nФизический интерфейс также может моделировать распределение числовой плотности, которое можно использовать для расчета площади межфазной границы, что полезно при моделировании химических реакций в смеси.
topicdescr/mm = [Интерфейсы модели смеси] Ветка «Модель смеси» содержит физические интерфейсы для моделирования ламинарных и турбулентных потоков жидкостей, содержащих дисперсную фазу. Дисперсной фазой могут быть пузырьки, капли жидкости или твердые частицы.
topicdescr/moisturetransportinair = [Интерфейс переноса влаги в воздухе]Эта версия интерфейса переноса влаги используется для расчета поля относительной влажности во влажном воздухе. Он имитирует перенос влаги путем конвекции и диффузии пара во влажном воздухе. Модель влажного воздуха активна по умолчанию во всех областих.\n\nСтационарное моделирование и моделирование во временной области поддерживаются во всех пространственных измерениях.
topicdescr/moisturetransportinbuildingmaterials = [Интерфейс «Перенос влаги в строительных материалах»]Эта версия интерфейса «Перенос влаги» используется для расчета поля относительной влажности в строительных материалах. Он моделирует перенос влаги, принимая во внимание накопление влаги, перенос жидкости за счет сил капиллярного всасывания и конвективный перенос пара. Модель строительного материала активна по умолчанию во всех областих. \n\nСтационарное моделирование и моделирование во временной области поддерживаются во всех измерениях пространства.
topicdescr/moisturetransportinporousmedia = [Интерфейс переноса влаги в пористых средах]Эта версия интерфейса переноса влаги используется для расчета поля относительной влажности в пористых средах. Он моделирует перенос влаги путем конвекции и диффузии пара в газовой фазе, перенос жидкой воды путем конвекции и капиллярности в порах среды. Модель гигроскопической пористой среды активна по умолчанию во всех областих. \n\nСтационарное моделирование и моделирование во временной области поддерживаются во всех пространственных измерениях.
topicdescr/moisturetransportinsolids = [Интерфейс «Перенос влаги в твердых веществах»]Эта версия интерфейса «Перенос влаги» используется для расчета относительной влажности и давления влажного воздуха в пористых средах. Он моделирует перенос влаги путем конвекции пара и диффузии в газовой фазе, а также перенос жидкой воды путем конвекции и капиллярности в порах среды. \n\nСтационарное моделирование и моделирование во временной области поддерживаются во всех пространственных измерениях.
topicdescr/moisturetransportporousmedia = [Интерфейс переноса влаги в пористых средах]Эта версия интерфейса переноса влаги используется для расчета поля относительной влажности в пористых средах. Он моделирует перенос влаги путем конвекции и диффузии пара в газовой фазе, перенос жидкой воды путем конвекции и капиллярности в порах среды. Модель гигроскопической пористой среды активна по умолчанию во всех областих. \n\nСтационарное моделирование и моделирование во временной области поддерживаются во всех пространственных измерениях.
topicdescr/moltencarbonatefc = [Интерфейс топливного элемента с расплавленным карбонатом водорода] Интерфейс топливного элемента с расплавленным карбонатным водородом предполагает, что заряд в электролите переносится ионами карбоната, образуя воду и углекислый газ на анодной стороне элемента в реакции окисления водорода и потребляя углекислый газ на катодной стороне элемента при восстановлении кислорода. \n\nПо умолчанию газовыми видами являются водород, углекислый газ и вода на анодной стороне, а также кислород, азот и углекислый газ на катодной стороне.\n\nЭтот интерфейс подходит для топливные элементы с расплавленным карбонатом (MCFC).
topicdescr/moltencarbonatewe = [Интерфейс электролизера расплавленной карбонатной воды] Интерфейс электролизера расплавленной карбонатной воды предполагает, что заряд в электролите переносится ионами карбоната, потребляя воду и углекислый газ на катодной стороне ячейки в реакции выделения водорода и образуя углекислый газ на анодной стороне при выделении кислорода. \n\nПо умолчанию газовыми видами являются водород, углекислый газ и вода на катодной стороне, а также кислород и углекислый газ на анодной стороне.\n\nЭтот интерфейс подходит для электролизеры с расплавленной карбонатной водой (MCEC).
topicdescr/movingmesh = [Интерфейс движущейся сетки]Интерфейс движущейся сетки можно использовать для создания моделей, в которых геометрия, представленная здесь сеткой, меняет форму из-за некоторой физики в модели. Его можно использовать для изучения как стационарных состояний, так и зависящих от времени деформаций, когда геометрия меняет свою форму из-за динамики задачи.
topicdescr/movingmeshfreedeformation = [Квазиинтерфейс «Подвижная сетка, свободная деформация»]Добавьте движущуюся сетку, свободную деформацию, чтобы представить домены, которые меняют форму, когда их границы деформируются с использованием граничных условий. 
topicdescr/movingmeshgroup = [Функции движущейся сетки]Функции движущейся сетки можно использовать для создания моделей, в которых геометрия, представленная здесь сеткой, меняет форму из-за некоторой физики в модели. Его можно использовать для изучения как стационарных состояний, так и зависящих от времени деформаций, когда геометрия меняет свою форму из-за динамики задачи.
topicdescr/movingmeshprescribeddeformation = [Подвижная сетка, квазиинтерфейс заданной деформации]Добавьте движущуюся сетку, заданную деформацию, чтобы напрямую управлять формой доменов с помощью выражений. 
topicdescr/movingmeshrotatingdomain = [Квазиинтерфейс «Подвижная сетка, вращающийся область»]Добавьте движущуюся сетку, вращающийся область, чтобы представить вращающиеся области. 
topicdescr/movint = [Ветка «Математика, движущийся интерфейс»] Ветка «Движущийся интерфейс» содержит два интерфейса на основе уравнений для отслеживания движущихся интерфейсов: «Установка уровня» и «Фазовое поле».
topicdescr/mpf = [Многофазный поток] Ветка «Многофазный поток» содержит физические интерфейсы для моделирования потоков, состоящих из более чем одной фазы.
topicdescr/mproc = [Обработка металлов]Отрасль «Обработка металлов» содержит физические интерфейсы для моделирования металлургических фазовых превращений, а также связи с теплопередачей и механикой твердого тела.
topicdescr/mt = [Перенос влаги]Ветка «Перенос влаги» содержит различные версии интерфейса для моделирования переноса влаги в строительных материалах, влажном воздухе и пористых средах.
topicdescr/multibodydynamics = [Интерфейс многотельной динамики]Интерфейс многотельной динамики предназначен для анализа механических сборок, соединенных различными типами соединений, шестерен, кулачков, цепей, пружин и демпферов. Детали могут быть жесткими или упругими. С помощью модуля «Механика конструкций» в сборку можно добавлять элементы оболочки и балки.\n\nСуществует множество типов соединений, таких как шарниры или шаровые шарниры, которые можно использовать для моделирования соединений между компонентами. Суставам можно присвоить такие свойства, как эластичность, демпфирование, трение и ограничения движения.
topicdescr/multiphysicinductivelycoupledplasma = [Интерфейс индуктивно связанной плазмы]Интерфейс индуктивно связанной плазмы объединяет интерфейсы «Дрейфовая диффузия», «Перенос тяжелых частиц», «Электростатика» и «Магнитные поля». Он используется для исследования разрядов, поддерживаемых индукционными токами. Индукционные токи определяются в частотной области. Нагрев электронов за счет индукционных токов автоматически регулируется программным обеспечением. С модулем AC/DC этот интерфейс также доступен в 3D.
topicdescr/multiphysicsacousticpiezo = [Акустико-пьезоэлектрическое взаимодействие, интерфейс частотной области] Мультифизический интерфейс акустико-пьезоэлектрического взаимодействия, частотная область сочетает в себе акустику давления, частотную область; Механика твердого тела; и интерфейсы электростатики, позволяющие связать изменения акустического давления в жидкостях со структурной деформацией как в твердых телах, так и в пьезоэлектрических областих. Мультифизическая связь пьезоэлектричества используется для объединения электростатики и механики твердого тела в пьезоэлектрических областих. Мультифизический интерфейс может, например, использоваться для моделирования пьезоэлектрических преобразователей для гидролокаторов или медицинских приложений и для улучшения слоев согласования импедансов, а также диаграмм направленности излучения преобразователя в дальней зоне. Можно моделировать как прямые, так и обратные пьезоэлектрические эффекты, а пьезоэлектрическую связь можно сформулировать с использованием форм заряда деформации или заряда напряжения.
topicdescr/multiphysicsacousticporoelasticwaves = [Интерфейс взаимодействия акустических и пороупругих волн] Мультифизические интерфейсы взаимодействия акустических и пороупругих волн сочетают в себе акустику давления, частотную область и пороупругие волны вместе с функцией мультифизического взаимодействия акустической и пористой границы.
topicdescr/multiphysicsacousticshell = [Взаимодействие акустической оболочки, интерфейс частотной области] Мультифизический интерфейс Acoustic–Shell Interaction, частотная область объединяет функции интерфейсов «Акустика давления», «Частотная область» и «Оболочка», чтобы связать изменения акустического давления в области жидкости со структурной деформацией границы оболочки. Его можно, например, использовать для определения передачи звука через тонкую упругую конструкцию, такую как капот автомобиля, и анализа виброакустики диффузора громкоговорителя. нормальное ускорение на границе жидкость-структура.\n\nСпециальное мультифизическое условие связи легко определяется для границы жидкость-оболочка и устанавливает нагрузки жидкости на границу оболочки и влияние структурных ускорений на жидкость. Физический интерфейс доступен для трехмерной и двумерной осесимметричной геометрии и способен моделировать связанную акустику давления и вибрации оболочки в частотной области. 
topicdescr/multiphysicsacousticsolid = [Интерфейс Acoustic-твердое тело, частотная область] Мультифизический интерфейс Acoustic–Solid Interaction, частотная область объединяет интерфейсы «Акустика давления», «Частотная область» и «Механика твердого тела» для связи изменений акустического давления в области жидкости со структурной деформацией в области твердого тела. Его можно, например, использовать для определения прохождения звука через упругую конструкцию или для решения связанных виброакустических явлений, присутствующих в громкоговорителе. через границу жидкость-твердое тело.\n\nСпециальное мультифизическое условие связи легко определяется для границы жидкость-твердое тело и устанавливает нагрузки жидкости на область твердого тела и влияние структурных ускорений на жидкость. Интерфейс существует для исследований частотной области и собственных частот.
topicdescr/multiphysicsacousticsolidporoelasticwaves = [Интерфейс взаимодействия акустических, твердых и пороупругих волн] Мультифизические интерфейсы Acoustic–Solid–Poroelastic Waves Interaction сочетают в себе акустику давления, частотную область, механику твердого тела и пороупругие волны вместе с акустико-конструкционная граница, Acoustic–3Porous Boundary и Porous–Solid Boundary функция мультифизического взаимодействия.
topicdescr/multiphysicsacousticsolidtimeexplicit = [Интерфейс Acoustic-Solid Interaction, явная по времени]Мультифизический интерфейс Acoustic–Solid Interaction, явная по времени объединяет интерфейсы акустика давления, явная по времени и Elastic Wave, явная по времени для соединения акустических волн, распространяющихся в области жидкости, с упругими волнами, распространяющимися в твердом теле. область.\n\nВзаимодействие акустической структуры относится к мультифизическому явлению, при котором акустическое давление вызывает нагрузку жидкости на область твердого тела, а структурная скорость действует на область жидкости как нормальная скорость через границу жидкость-твердое тело. Интерфейс доступен для нестационарных исследований, в которых используются решатели, основанные на явных во времени схемах.
topicdescr/multiphysicsacousticstreamingfrompressureacoustics = [Acoustic Streaming from акустика давления]Мультифизический интерфейс Acoustic Streaming from акустика давления объединяет интерфейсы «Акустика давления», «Частотная область» и «Ламинарный поток» для расчета установившегося потока жидкости, вызванного акустическим полем. \n\nВ интерфейсе «Акустика давления, частотная область» вязкий граничный слой не определяется численно, но вязкий граничный слой важен для генерации акустического потока. Поэтому аналитическое решение используется для расчета аналитической скорости скольжения на границе из-за тонких вязких и термических граничных слоев. Эта эффективная модель действительна, когда толщина вязкого граничного слоя намного меньше акустической длины волны и масштабов характерной геометрической длины. \n\nПоскольку вязкие граничные слои важны, рекомендуется использовать граничное условие «Термовязкостный импеданс граничного слоя» в интерфейсе «Акустика давления, частотная область».
topicdescr/multiphysicsacousticstreamingfromthermoviscousacoustics = [Акустическое течение из термовязкостной акустики] Мультифизический интерфейс Acoustic Streaming из термовязкостной акустики объединяет интерфейсы термовязкостной акустики, частотной области и ламинарного потока для расчета устойчивого потока жидкости, индуцированного акустическим полем. \n\nИнтерфейс термовязкостной акустики, частотная область численно разрешает вязкие граничные слои. Следовательно, он подходит для моделирования акустического течения от конструкций с острыми краями. \n\nПоскольку вычисленные силы в жидкости зависят от производных акустических полей, рекомендуется использовать квадратичный порядок элементов для акустического давления и кубический для акустической скорости и температуры.
topicdescr/multiphysicsacousticthermoacoustic = [Акустико-термовязкостное акустическое взаимодействие, частотная область] Мультифизический интерфейс «Акустически-термовязкостное акустическое взаимодействие, частотная область» сочетает в себе интерфейсы «Термовязкостная акустика, частотная область» и «Акустика давления, частотная область» вместе с функцией акусто-термовязкостной акустической граничной связи. Объединение двух физических процессов и использование термовязкостной акустики только там, где это необходимо, может снизить вычислительные затраты модели. \n\nФизический интерфейс решает уравнения в частотной области, предполагая, что все поля и источники являются гармоническими. Предполагается линейная акустика.
topicdescr/multiphysicsbeamrotorbearingcoupling = [Ротор-балка с интерфейсом гидродинамического подшипника]Мультифизический интерфейс ротора-балки с гидродинамическим подшипником объединяет интерфейсы ротора-балки и гидродинамического подшипника посредством мультифизической связи Beam Rotor–Bearing Coupling.
topicdescr/multiphysicsbrinkmantwophaseflowlevelset = [Уравнения Бринкмана, интерфейс набора уровней]Мультифизический интерфейс «Уравнения Бринкмана, набор уровней» используется для отслеживания границы раздела между двумя несмешивающимися жидкостями в пористой среде. \n\nМультифизический интерфейс сочетает в себе интерфейсы «Уравнения Бринкмана» и «Набор уровней», а мультифизическая связь «Двухфазный поток и набор уровней» добавляется автоматически. Он решает уравнения Бринкмана для сохранения импульса и уравнение неразрывности для сохранения массы. Положение интерфейса отслеживается путем решения транспортного уравнения для функции level-set. \n\nМоделирование с использованием уравнений Бринкмана, интерфейс Level Set всегда зависит от времени, поскольку положение интерфейса почти всегда зависит от его истории.
topicdescr/multiphysicsbrinkmantwophaseflowphasefield = [Уравнения Бринкмана, интерфейс фазового поля]Мультифизический интерфейс «Уравнения Бринкмана, фазовое поле» используется для отслеживания границы раздела между двумя несмешивающимися жидкостями в пористой среде. \n\nМультифизический интерфейс объединяет интерфейсы «Уравнения Бринкмана» и «Фазовое поле в жидкостях», а мультифизическая связь «Двухфазный поток и фазовое поле» добавляется автоматически. Он решает уравнения Бринкмана для сохранения импульса и уравнение неразрывности для сохранения массы. Положение границы раздела отслеживается путем решения двух дополнительных уравнений переноса: одного для переменной фазового поля и другого для плотности энергии смешения. Движение поверхности определяется минимизацией свободной энергии.\n\nМоделирование с использованием уравнений Бринкмана, интерфейс Phase Field всегда зависит от времени, поскольку положение интерфейса почти всегда зависит от его истории. 
topicdescr/multiphysicscompressiblepotentialflow = [Интерфейс сжимаемого потенциального потока]Интерфейс сжимаемого потенциального потока используется для расчета потенциала скорости в потенциальном сжимаемом поле дозвукового потока, предполагая, что это идеальная баротропная безвихревая жидкость с постоянной энтропией. Поток может иметь только одно уникальное начало или вход, поскольку он использует глобальное определение полной энергии. \n\nФизический интерфейс используется для моделирования фонового потока, который будет использоваться в качестве входных данных для линеаризованных интерфейсов потенциального потока.
topicdescr/multiphysicsconjugateheattransferlaminar = [Интерфейс «Сопряженная теплопередача, ламинарный поток»]Мультифизический интерфейс «Сопряженная теплопередача, ламинарный поток» используется для моделирования связи между теплопередачей и потоком жидкости.\n\nОн сочетает в себе интерфейсы «Теплоперенос в твердых телах и жидкостях» и «Ламинарный поток». Мультифизическая связь «Неизотермический поток» добавляется автоматически. Он объединяет интерфейсы теплопередачи и потока и предоставляет возможность включить в модель нагрев потока. Свойства жидкости могут зависеть от температуры. Модели также могут включать теплообмен в твердых телах, а также излучение от поверхности к поверхности и излучение в участвующих средах с помощью модуля теплопередачи. Физический интерфейс поддерживает низкие числа Маха (обычно менее 0,3), а также неньютоновские жидкости. В интерфейсе «Ламинарный поток» узел «Свойства жидкости» активен по умолчанию для всех выбранных интерфейсов. Выбор области интерфейса потока можно редактировать, если модель содержит твердотельные области. \n\nСтационарное моделирование и моделирование во временной области поддерживаются в 2D, 2D осесимметричной и 3D геометрии.
topicdescr/multiphysicsconjugateheattransferturbulentalgebraicyplus = [Интерфейс «Турбулентный поток, алгебраический yPlus»]Мультифизический интерфейс «Сопряженный теплообмен», «Турбулентный поток», «Алгебраический yPlus» используется для моделирования связи между теплопередачей и потоком жидкости. Алгебраические интерфейсы yPlus. Мультифизическая связь «Неизотермический поток» добавляется автоматически. Он объединяет интерфейсы теплопередачи и потока и предоставляет возможность включить в модель нагрев потока. Свойства жидкости могут зависеть от температуры. Модели также могут включать теплообмен в твердых телах, а также излучение от поверхности к поверхности и излучение в участвующих средах с помощью модуля теплопередачи. Физический интерфейс поддерживает низкие числа Маха (обычно менее 0,3). В интерфейсе турбулентное течение, Algebraic yPlus узел «Свойства жидкости» активен по умолчанию для всех выбранных интерфейсов. Выбор области интерфейса потока можно редактировать, если модель содержит твердотельные области. \n\nСтационарное моделирование и моделирование во временной области поддерживаются в 2D, 2D осесимметричной и 3D геометрии. 
topicdescr/multiphysicsconjugateheattransferturbulentkeps = [Интерфейсы турбулентного течения k-ε и турбулентного течения Low Re k-ε]Мультифизический интерфейс сопряженной теплопередачи с турбулентным течением k-ε используется для моделирования связи между теплопередачей и течением жидкости.\n\nОн объединяет интерфейсы теплопередачи в твердых телах и жидкостях и турбулентного течения k-ε. Мультифизическая связь неизотермического течения добавляется автоматически. Она связывает интерфейсы течения и теплопередачи и предоставляет параметры для учета нагрева потоком в модели. Свойства жидкости могут зависеть от температуры. Модели также могут включать теплопередачу в твердых телах, излучение от поверхности к поверхности и излучение в участвующих средах при наличии Heat Transfer Module. Физический интерфейс поддерживает малые числа Маха (обычно меньше 0,3). Узел свойств жидкости активен по умолчанию для выбора интерфейса, а выбор областей интерфейса течения можно изменить, если модель содержит твердые области.\n\nСтационарное моделирование и моделирование во временной области поддерживаются в 2D, осесимметричной 2D и 3D-геометрии.
topicdescr/multiphysicsconjugateheattransferturbulentkom = [Интерфейс «Турбулентный поток», k-ω]Мультифизический интерфейс «Сопряженная теплопередача, турбулентный поток», k-ω используется для моделирования взаимодействия между теплопередачей и жидкостью. flow.\n\nОн сочетает в себе теплообмен в твердых телах и жидкостях и турбулентный поток, k-ω интерфейсы. Мультифизическая связь «Неизотермический поток» добавляется автоматически. Он объединяет интерфейсы теплопередачи и потока и предоставляет возможность включить в модель нагрев потока. Свойства жидкости могут зависеть от температуры. Модели также могут включать теплообмен в твердых телах, а также излучение от поверхности к поверхности и излучение в участвующих средах с помощью модуля теплопередачи. Физический интерфейс поддерживает низкие числа Маха (обычно менее 0,3). В интерфейсе турбулентное течение, k-ω узел Fluid Properties активен по умолчанию для всех выбранных интерфейсов. Выбор области интерфейса потока можно редактировать, если модель содержит твердотельные области. \n\nСтационарное моделирование и моделирование во временной области поддерживаются в 2D, 2D осесимметричной и 3D геометрии.
