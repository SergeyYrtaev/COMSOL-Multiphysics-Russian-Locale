topicdescr_physics/helmholtzequation = [Уравнение Гельмгольца]Уравнение Гельмгольца.
topicdescr_physics/highlyconductivelayer = [Высокопроводящий слой]Модель теплопередачи для проводящих границ.
topicdescr_physics/highlyconductiveporouselectrode = [Высокопроводящий пористый электрод] Уравнения предметной области для ионной фазы (электролита) с учетом очень высокой проводимости электронной (электродной) фазы.
