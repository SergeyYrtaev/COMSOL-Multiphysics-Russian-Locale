topicdescr_report/titleslide = Добавьте титульный слайд в презентацию или в шаблон презентации, чтобы настроить параметры презентации.
topicdescr_report/unitset = Добавьте в отчет набор единиц измерения из приложения. 
topicdescr_report/variables = Добавьте информацию о пользовательских переменных в отчет или настройки отчета по умолчанию для конкретного типа в шаблон.

topicdescr_result/aberrationheight = Добавьте атрибут высоты для 2D-графиков оптической аберрации.
topicdescr_result/admittancegraph = Добавьте график допуска к графику Смита.
topicdescr_result/annotation = Добавить аннотацию к графику.
topicdescr_result/annotationdata = Узел графика «Данные аннотации» появляется в группах графиков 2D и 3D, если вы запускаете метод, создающий график AnnotationData.
topicdescr_result/arrowdata = Узел графика ArrowData появляется в группах 2D- и 3D-графиков, если вы запускаете метод, создающий график ArrowData.
topicdescr_result/arrowline = Создайте график линии и стрелки.
topicdescr_result/arrowpoint = Создайте график точечной стрелки.
topicdescr_result/arrowsurface = Создайте график поверхностной стрелки.
topicdescr_result/arrowvolume = Создайте график стрелки объема.
topicdescr_result/color = Добавьте атрибут цветового выражения, чтобы раскрасить фигуры, определенные на графике.
topicdescr_result/comparison = Добавить атрибут сравнения.
topicdescr_result/contour = Создайте контурный график.
topicdescr_result/contourseries = Создайте график серии контуров.
topicdescr_result/coordsysline = Создайте линейный график системы координат.
topicdescr_result/coordsyspoint = Создайте точечный график системы координат.
topicdescr_result/coordsyssurface = Создайте график поверхности системы координат.
topicdescr_result/coordsysvolume = Создайте объемный график системы координат.
topicdescr_result/deform = Добавьте атрибут деформации на график.
topicdescr_result/directivity = Добавьте график направленности, который собирает пространственную информацию по частотам и показывает эту информацию на контурном графике.
topicdescr_result/energydecay = Добавьте атрибут распада энергии.
topicdescr_result/errorbars = Добавьте полосы ошибок на глобальные или точечные графики.
topicdescr_result/export = Добавьте атрибут выражения экспорта на график.
topicdescr_result/farfield = Создайте график дальнего поля.
topicdescr_result/filter = Добавьте атрибут фильтра к графику, чтобы ограничить этот график элементами, удовлетворяющими условию.
topicdescr_result/function = Добавить функцию Preview.
topicdescr_result/function2d = Добавить функцию Preview.
topicdescr_result/function3d = Добавить функцию Preview.
topicdescr_result/global = Создайте глобальный график для групп одномерных графиков и групп полярных графиков, чтобы визуализировать глобальные переменные, такие как решения ОДУ.
topicdescr_result/globalfilter = Добавьте атрибут фильтра к глобальному графику, чтобы ограничить этот график элементами, удовлетворяющими условию.
topicdescr_result/graphmarker = Добавьте подузел «Маркер графика», чтобы добавлять маркеры, такие как минимальные и максимальные значения, на глобальные или точечные графики.
topicdescr_result/height = Добавьте атрибут высоты для 2D-графиков линий и поверхностей.
topicdescr_result/histogram = Создайте график гистограммы для групп 1D и 2D графиков.
topicdescr_result/histogramfilter = Добавьте атрибут фильтра к графику гистограммы, чтобы ограничить этот график элементами, удовлетворяющими условию.
topicdescr_result/histogramheight = Добавьте атрибут высоты для графиков 2D-гистограмм.
topicdescr_result/image = Создайте график изображения.
topicdescr_result/imageoverlay = Встройте наложение изображения в график поверхности или объема.
topicdescr_result/impedancegraph = Добавьте график импеданса к графику Смита.
topicdescr_result/impulseresponse = Добавьте график импульсной реакции к текущей группе графиков.
topicdescr_result/interferencepattern = Создайте график интерференционной картины, который показывает интенсивность на плоскости сечения в результате интерференции нескольких лучей, проходящих через плоскость сечения.
topicdescr_result/isosurface = Создайте график изоповерхности.
topicdescr_result/isosurfaceseries = Создайте график серии изоповерхностей.
topicdescr_result/jointprobabilitydistribution = Создайте совместный график распределения вероятностей.
topicdescr_result/layeredmaterialslice = Создайте график для визуализации среза многослойного материала.
topicdescr_result/line = Создайте линейный график.
topicdescr_result/linedata = Узел графика Line Data появляется в группах графиков 2D и 3D, если вы запускаете метод, создающий график LineData.
topicdescr_result/linegraph = Создайте линейный график.
topicdescr_result/linegraphfilter = Добавьте атрибут фильтра к графику линейного графика, чтобы ограничить этот график элементами, удовлетворяющими условию.
topicdescr_result/linesegments = Создайте график сегментов линий.
topicdescr_result/marker = Добавьте на график маркеры максимума и минимума.
topicdescr_result/materialappearance = Добавьте подузел «Внешний вид материала», чтобы заменить графику из родительского узла внешним видом материала.
topicdescr_result/matrixhistogram = Создайте график матричной гистограммы в 2D, чтобы визуализировать предварительно вычисленную матрицу в виде 2D-гистограммы.
topicdescr_result/maxminline = Создайте маркерный график макс/мин на линиях.
topicdescr_result/maxminpoint = Создайте график маркеров макс/мин в точках.
topicdescr_result/maxminsurface = Создайте маркерный график макс/мин на поверхностях.
topicdescr_result/maxminvolume = Создайте график маркеров макс/мин в объемах.
topicdescr_result/mesh = Создайте график сетки.
topicdescr_result/meshselection = Добавьте выделение к текущему выбранному графику сетки.
topicdescr_result/multislice = Создайте график среза в нескольких направлениях одновременно.
topicdescr_result/nyquist = Создайте график Найквиста.
topicdescr_result/octaveband = Добавьте участок полосы октавы, чтобы представить частотную реакцию в полосах частот.
topicdescr_result/opticalaberration = Создайте график оптических аберраций, который может показать различные типы монохроматических аберраций, возникающих при фокусировке электромагнитных лучей системой линз и зеркал.
topicdescr_result/particle = Создайте график трассировки безмассовых частиц.
topicdescr_result/particle1d = Добавьте участок частицы к группе участка, чтобы построить свойства частиц друг против друга или с течением времени.
topicdescr_result/particlemass = Создайте график трассировки частиц с массой.
topicdescr_result/particletrajectories = Создайте график траекторий частиц.
topicdescr_result/particletrajectoriesfilter = Добавьте атрибут фильтра к графику траекторий частиц, чтобы ограничить этот график элементами, удовлетворяющими условию.
topicdescr_result/pellets = Добавьте график гранул для визуализации гранул в пористой среде.
topicdescr_result/phaseportrait = Создайте график фазового портрета для 2D- и 2D-осесимметричных моделей, чтобы визуализировать большие наборы данных о траекториях частиц.
topicdescr_result/plotgroup1d = Создайте группу 1D-графиков.
topicdescr_result/plotgroup2d = Создайте группу 2D-графиков.
topicdescr_result/plotgroup3d = Создайте группу 3D-графиков.
topicdescr_result/poincaremap = Создайте график карты Пуанкаре для визуализации траекторий частиц с помощью карты Пуанкаре (иногда называемой первой картой рекуррентности).
topicdescr_result/point = Создайте точечный график.
topicdescr_result/pointdata = Узел графика PointData появляется в группах 2D- и 3D-графиков, если вы запускаете метод, создающий график PointData.
topicdescr_result/pointfilter = Добавьте атрибут фильтра к точечному графику, чтобы ограничить этот график элементами, удовлетворяющими условию.
topicdescr_result/pointgraph = Создайте точечный график.
topicdescr_result/pointgraphfilter = Добавьте атрибут фильтра к графику точечного графика, чтобы ограничить этот график элементами, удовлетворяющими условию.
topicdescr_result/pointtrajectories = Создайте график траекторий точек, чтобы визуализировать траектории геометрических точек. 
topicdescr_result/pointtrajectoriesfilter = Добавьте атрибут фильтра к графику траекторий точек, чтобы ограничить этот график элементами, удовлетворяющими условию.
topicdescr_result/polargroup = Создайте группу полярных графиков.
topicdescr_result/polarization = Создайте график поляризации.
topicdescr_result/principalline = Создайте эпюру главного напряжения или главной деформации на линиях или кромках.
topicdescr_result/principalsurface = Создайте эпюру главного напряжения или главной деформации на поверхностях.
topicdescr_result/principalvolume = Создайте график главного напряжения или главной деформации в объемах.
topicdescr_result/radiationpattern = Добавьте график радиационного рисунка к группе графика, чтобы нарисовать рисунок излучения для электромагнитной или акустической волны.
topicdescr_result/ray1d = Добавьте лучевой участок к группе участков, чтобы нанести свойства лучей друг на друга или с течением времени.
topicdescr_result/raytrajectories = Создайте график траекторий лучей, чтобы визуализировать траектории лучей, вычисленные с помощью интерфейса «Геометрическая оптика» или «Акустика лучей». 
topicdescr_result/raytrajectoriesfilter = Добавьте атрибут фильтра к графику траекторий лучей, чтобы ограничить этот график элементами, удовлетворяющими условию.
topicdescr_result/reflectiongraph = Добавьте график отражения к графику Смита.
topicdescr_result/scattersurface = Создайте диаграмму рассеяния на поверхностях.
topicdescr_result/scattervolume = Создайте диаграмму рассеяния в объемах.
topicdescr_result/selection = Добавьте выборку в выбранный в настоящее время участок.
topicdescr_result/slice = Создайте график среза.
topicdescr_result/sobolindex = Добавьте график индекса Собола в текущую группу.
topicdescr_result/spotdiagram = Создайте точечную диаграмму для визуализации лучей.
topicdescr_result/streamline = Создайте упрощенный график.
topicdescr_result/streamlinemultislice = Добавьте упрощенный мультисрезовый график для визуализации векторной величины на срезах внутри доменов.
topicdescr_result/streamlinesurface = Добавьте график обтекаемой поверхности для визуализации векторной величины на поверхностях.
topicdescr_result/surface = Создайте график поверхности.
topicdescr_result/surface_height = Создайте график поверхности с атрибутом высоты.
topicdescr_result/surfacedata = Узел графика Surface Data появляется в группах 2D- и 3D-графиков, если вы запускаете метод, создающий график SurfaceData.
topicdescr_result/surfaceslit = Создайте график поверхностной щели для визуализации прерывистой величины на поверхностях.
topicdescr_result/table = Отобразите данные из таблицы на графике.
topicdescr_result/tableannotation = Добавьте аннотации из таблицы на график.
topicdescr_result/tablecontour = Отобразите данные из таблицы на контурном графике.
topicdescr_result/tableerrorbars = Добавьте полосы ошибок к графикам таблицы.
topicdescr_result/tablefilter = Добавьте атрибут фильтра к графику табличной диаграммы, чтобы ограничить этот график точками, удовлетворяющими условию.
topicdescr_result/tableheight = Создайте атрибут высоты для двумерных табличных графиков.
topicdescr_result/tablehistogram = Добавьте график гистограммы, который берет данные из таблицы.
topicdescr_result/tablepoint = Отобразите данные из таблицы на точечном графике.
topicdescr_result/tablesmith = Отобразите данные из таблицы на графике Смита.
topicdescr_result/tablesurface = Отобразите данные из таблицы на поверхностном графике.
topicdescr_result/throughthickness = Создайте график по толщине для визуализации многослойной оболочки.
topicdescr_result/throughthicknessfilter = Добавьте атрибут фильтра к графику «По толщине», чтобы ограничить этот график элементами, удовлетворяющими условию.
topicdescr_result/translation = Используйте подузел «Перевод» для перемещения 2D- или 3D-графика или для создания массива 2D- или 3D-графиков.
topicdescr_result/transparency = Добавьте прозрачность к 3D-графикам и 2D-графикам, использующим подузел «Выражение высоты».
topicdescr_result/tubedata = Узел графика TubeData появляется в группах 2D- и 3D-графиков, если вы запускаете метод, создающий график TubeData.
topicdescr_result/visualeffects = Добавьте атрибут, который контролирует, какие визуальные эффекты могут быть применены к этому графику. 
topicdescr_result/volume = Создайте объемный график.
topicdescr_result/waterfall = Создайте каскадную диаграмму, представляющую собой график, иллюстрирующий зависимость выражения от двух параметров в выборке.
topicdescr_result/whirl = Создайте график вихря, который представляет собой график форм режима ротора, который вращается вокруг оси ротора с дискретными интервалами вращения.

topicdescr_selection/adjacent = Выбор объектов, которые соседствуют с объектами в другом выделении.
topicdescr_selection/ball = Выбор объектов, находящихся внутри шара или пересекающих его.
topicdescr_selection/box = Выбор объектов, находящихся внутри рамки или пересекающих ее.
topicdescr_selection/complement = Выбор определяется дополнением набора выборок.
topicdescr_selection/cylinder = Выбор объектов, находящихся внутри цилиндра или пересекающих его.
topicdescr_selection/difference = Выбор определяется разницей между двумя наборами выборов.
topicdescr_selection/disk = Выбор объектов, находящихся внутри диска или пересекающих его.
topicdescr_selection/explicit = Выбор определяется явным набором геометрических объектов, таких как области или границы.
topicdescr_selection/intersection = Выбор определяется пересечением набора выборок.
topicdescr_selection/logicalexpression = Выбор объектов, определяемый логическим выражением, которое содержит ссылки на другие выборки или атрибуты.
topicdescr_selection/union = Выбор определяется объединением набора выборок.

topicdescr_sol/adaption = Обработка параметров адаптивного уточнения сетки.
topicdescr_sol/advanced = Обработка расширенных общих свойств решателя.
topicdescr_sol/ams = Обработайте параметры для решателей/предварительных обуславливателей линейных систем, которые используют решатель Максвелла во вспомогательном пространстве (AMS). 
topicdescr_sol/assemble = Соберите и сохраните матрицы, созданные во время сборки.
topicdescr_sol/autoremesh = Итеративно и автоматически создавайте деформированные геометрии и повторно объединяйте их в сетки.
topicdescr_sol/auxiliaryspacealgebraicmultigridcoarsesolver = Узел грубого решения AMG — это подузел вспомогательных атрибутов без каких-либо настроек, используемых узлами атрибутов AMG Auxiliary-Space.
topicdescr_sol/auxiliaryspacealgebraicmultigridpostsmoother = Узел Postsmoother — это узел вспомогательных атрибутов без каких-либо настроек, используемый узлом Auxiliary-Space AMG для администрирования постсмягчения.
topicdescr_sol/auxiliaryspacealgebraicmultigridpresmoother = Узел Presmoother — это узел вспомогательных атрибутов без каких-либо настроек, используемый узлом Auxiliary-Space AMG для администрирования средств предварительного сглаживания.
topicdescr_sol/auxiliaryspaceamg = Обработайте параметры для решателей/предварительных обуславливателей линейных систем, которые используют решатель Auxiliary-Space AMG.
topicdescr_sol/asamgkrylovpreconditioner = Обработайте настройки для методов предварительной обработки типа Крылова.
topicdescr_sol/awe = Решите параметрическую задачу УЧП, используя асимптотическую оценку формы сигнала (AWE).
topicdescr_sol/blocknavierstokes = Добавьте узел Блочный Навье-Стокса под узлом Итеративного решателя в качестве эффективного предварительного обусловливателя для несжимаемых уравнений Навье-Стокса в переходном режиме.
topicdescr_sol/coarsesolver = Узел «Грубый решатель» — это подузел вспомогательных атрибутов без каких-либо настроек, используемых узлами атрибутов «Мультисетка» и «Разложение области» (Шварц).
topicdescr_sol/combinesolution = Объедините два решения, используя конкатенацию, суммирование решений или удаление решений.
topicdescr_sol/controlfield = Поля управления (набор управляющих переменных).
topicdescr_sol/controlstate = Набор глобальных управляющих переменных.
topicdescr_sol/copysolution = Обработка копии решения из другого решателя.
topicdescr_sol/direct = Решатели прямых линейных систем.
topicdescr_sol/directpreconditioner = Узел «Прямой предобуславливатель» — это атрибут, который можно добавить в качестве предобуславливателя, что позволяет решить один из физических интерфейсов в мультифизической модели с помощью прямого решателя.
topicdescr_sol/domaindecomposition = Добавьте аддитивный, мультипликативный, гибридный или симметричный решатель разложения перекрывающихся областей Шварца.
topicdescr_sol/domaindecompositioncoarse = Добавьте решатель разложения перекрывающихся областей Шварца на грубый уровень.
topicdescr_sol/domaindecompositioncoarsesolver = Узел «Грубый решатель» — это подузел вспомогательных атрибутов без каких-либо настроек, используемых атрибутом «Разложение области» (Шварц).
topicdescr_sol/domaindecompositionschur = Добавьте решатель разложения области с помощью метода дополнения Шура.
topicdescr_sol/domainsolver = Узел «Решение области» — это подузел вспомогательных атрибутов без каких-либо настроек, используемых узлом атрибутов «Разложение области» (Шварц). 
topicdescr_sol/eigenvalue = Решите задачу собственных значений УЧП.
topicdescr_sol/eigenvalueattrib  = Решите задачу собственных значений УЧП.
topicdescr_sol/eigenvalueparam = Используйте параметрическую развертку для задачи собственных значений.
topicdescr_sol/endfor = Завершите цикл for в последовательности решателя.
topicdescr_sol/errorestimation = Отображение информации о функционале для целевого оценивания ошибок.
topicdescr_sol/fft = Вычислите быстрое преобразование Фурье (БПФ) или обратное быстрое/неравномерное преобразование Фурье (ОБПФ/ИНПФ), используя этап исследования БПФ и решатель,
topicdescr_sol/field = Поля (набор зависимых переменных).
topicdescr_sol/for = Запустите цикл for в последовательности решателя.
topicdescr_sol/fullycoupled = Обработайте подход полностью связанного нелинейного решения.
topicdescr_sol/hierarchicallu = Обработка параметров для решателей метода граничных элементов (BEM), которые используют иерархическую факторизацию LU.
topicdescr_sol/incompletelu = Обработайте параметры для решателей/предварительных обуславливателей линейных систем, которые используют неполную LU-факторизацию.
topicdescr_sol/inputmatrix = Введите матрицы и векторы в линейные решатели.
topicdescr_sol/iterative = Итерационные решатели линейных систем.
topicdescr_sol/jacobi = Управляйте настройками метода Якоби (или диагонального масштабирования).
topicdescr_sol/krylovpreconditioner = Обработайте настройки для методов предварительной обработки типа Крылова.
topicdescr_sol/linear = Управляйте решателями линейных систем с тремя различными функциями атрибутов: прямыми, итеративными и многосеточными.
topicdescr_sol/lowerlimit = Наложите ограничения нижнего предела на степени свободы (переменные поля) для каждого подэтапа раздельного подхода.
topicdescr_sol/lumpedstep = Обеспечьте ускорение и регуляризацию вычислений любой L2-проекции, вытекающей из формулировки FEM, с помощью отдельного подхода.
topicdescr_sol/modal = Решите параметрическую или зависящую от времени задачу УЧП с помощью метода собственных мод.
topicdescr_sol/modalreduction = Используйте решатель Modal Reduction, чтобы выполнить пошаговое изменение параметра (частотная характеристика) или временное изменение (переходный процесс) с использованием уменьшенной модели.
topicdescr_sol/multigrid = Выполните настройку геометрического многосеточного решателя (GMG) или алгебраического многосеточного решателя (AMG).
topicdescr_sol/optimization = Обработка свойств решателя оптимизации.
topicdescr_sol/parametric = Обработка параметров для пошагового изменения параметров для стационарных задач.
topicdescr_sol/plugflow = Решите стационарную задачу пробкового течения.
topicdescr_sol/postsmoother = Узел Postsmoother — это вспомогательный узел атрибутов без каких-либо настроек, используемый узлом атрибутов Multigrid для администрирования постсмягчения.
topicdescr_sol/pod = Используйте подходящий решатель ортогональной декомпозиции (POD) для выполнения моделирования пониженного порядка.
topicdescr_sol/presmoother =  Узел Presmoother — это вспомогательный узел атрибутов без каких-либо настроек, используемых узлом атрибутов Multigrid для администрирования средств предварительного сглаживания.
topicdescr_sol/pressuresolver = Узел «Решатель давления» — это подузел атрибутов без каких-либо настроек, используемых узлом атрибутов Блока Навье-Стокса для администрирования общего предварительного обусловливателя для блока давления.
topicdescr_sol/previoussolution = Вычислите решения для предыдущих параметров параметрического решения и предыдущих параметров решения, зависящих от времени.
topicdescr_sol/sai = Управляйте разреженным приближенным обратным (SAI или SPAI) предобусловливателем, предварительным и постсглаживающим устройством и грубым решателем.
topicdescr_sol/scgs = Управляйте решателем SCGS (симметрично связанным Гауссом-Зейделем), который полезен в качестве предварительного условия для решения уравнений Навье-Стокса и подобных задач о потоке жидкости.
topicdescr_sol/schurkrylovpreconditioner = Управляйте настройками методов типа Крылова для решателя Шура по декомпозиции областей.
topicdescr_sol/schurlocal = Узел Локализованный Шур является атрибутом решателя Шура и предобуславливателя Крылова, добавленного под узлом решателя Шура. Он решает заполненную, плотную систему уравнений.
topicdescr_sol/schursolver = Узел Schur решатель — это подузел вспомогательных атрибутов без каких-либо настроек, используемых узлом атрибутов декомпозиции области (Schur). Его цель — администрировать решатели предметной области для решателя Шура с разложением предметной области.
topicdescr_sol/schursourcekrylovpreconditioner =  Обработайте настройки для методов предварительной обработки типа Крылова.
topicdescr_sol/schursourcesolver = Узел Schur Source решатель — это подузел вспомогательных атрибутов без каких-либо настроек, используемых узлом атрибутов декомпозиции области (Schur). Его целью является администрирование решателей для искусственных источников на внутренних границах для решателя Шура с разложением областей, когда используется поглощающее граничное условие.
topicdescr_sol/schursplocal = Узел Sparse Localized Schur является атрибутом решателя Schur и предобусловливателя Krylov, добавленного под узлом решателя Schur. Он отфильтровывает мелкие элементы матрицы и поэтому может использовать все решатели.
topicdescr_sol/segregated = Используйте подход к раздельному решению.
topicdescr_sol/segregatedstep = Обработка шага отдельного решения.
topicdescr_sol/sensitivity = Обработка параметров решателя чувствительности.
topicdescr_sol/solversequence = Создайте последовательность решателей.
topicdescr_sol/sor = Обработка настроек итерационного метода SOR (последовательное чрезмерное расслабление).
topicdescr_sol/sorgauge = Управляйте настройками для итерационного метода датчика SOR, который полезен в качестве предварительной обработки/сглаживания, например, для трехмерной магнитостатики, дискретизированной векторными элементами.
topicdescr_sol/sorline = Обработка настроек для итерационного метода линии SOR. Это метод типа SOR с дополнительной функциональностью, полезной, например, для анизотропных сеток.
topicdescr_sol/sorvector = Обработайте настройки для итерационного метода вектора SOR. Это метод типа SOR с дополнительными функциями, полезными для задач электромагнетизма, включающих оператор скручивания-закручивания и где вы используете векторные элементы.
topicdescr_sol/statacceleration = Подузел Стационарное ускорение может быть полезен для ускорения процесса решения нелинейных задач с периодическим по времени стационарным решением.
topicdescr_sol/state = Наборы глобальных зависимых переменных.
topicdescr_sol/statespace = Соберите и сохраните матрицы, описывающие модель как динамическую систему.
topicdescr_sol/stationary = Решите стационарную задачу УЧП с параметрами, адаптацией, чувствительностью или оптимизацией или без них.
topicdescr_sol/stationaryattrib = Используйте стационарный решатель, чтобы найти решение линейных и нелинейных стационарных задач.
topicdescr_sol/stopcondition = Обработка условий остановки для зависящих от времени и параметрических процессов решателя.
topicdescr_sol/storesolution = Добавьте заполнитель для последовательности решателя, которая используется для хранения вычисленного решения.
topicdescr_sol/studystep = Укажите, какую задачу использовать для последующих операций решателя, используя ссылку на исследование и ссылку на шаг исследования в этом исследовании.
topicdescr_sol/time = Решите нестационарную задачу PDE.
topicdescr_sol/timeadaption = Выполняйте адаптивное уточнение сетки вместе с зависящим от времени решателем. Адаптивное уточнение сетки создает несколько сеток для сегментов моделирования, зависящего от времени. 
topicdescr_sol/timeattrib = Используйте решатель зависящий от времени, чтобы найти решение задач, зависящих от времени, используя неявные методы временного шага или явный метод из семейства методов Рунге–Кутта для решения обыкновенных дифференциальных уравнений.
topicdescr_sol/timediscrete = Решите дискретизированную по времени задачу PDE.
topicdescr_sol/timeexplicit = Решайте нестационарные задачи с явным шагом по времени.
topicdescr_sol/timeparametric = Обработка свойств для пошагового изменения параметров для проблемы, зависящей от времени.
topicdescr_sol/timesplit = Используйте Time Discrete решатель, чтобы найти решение зависящих от времени задач, которые уже были дискретизированы во времени, например, с помощью оператора prev или оператора bdf.
topicdescr_sol/upperlimit = Наложите ограничения на верхний предел степеней свободы (переменных поля) для каждого подэтапа раздельного подхода.
topicdescr_sol/vanka = Храним настройки итерационного метода Ваньки. Формально этот метод применяется к задачам седла в качестве предобуславливателя или сглаживателя.
topicdescr_sol/variables = Обработка исходных данных и масштабирование решаемых переменных, а также способ вычисления нерешенных переменных.
topicdescr_sol/velocitysolver = Узел Velocity решатель — это подузел атрибутов без каких-либо настроек, используемых узлом атрибутов Block Navier-Stokes для администрирования общего предварительного обусловливателя для блока скорости.
topicdescr_sol/xmeshinfo = Получите расширенную информацию о сетке.

topicdescr_table/table = Создайте объект, содержащий таблицу данных.

topicdescr_view/axis = Добавление и определение свойств для 2D-вида с осями X и Y.
topicdescr_view/axis1d = Добавление и определение свойств для 1D-вида с осью X.
topicdescr_view/axis2d = Добавление и определение свойств для 2D-вида с осями X и Y.
topicdescr_view/axis3d = Добавление и определение свойств трехмерного вида с осями x, y и z.
topicdescr_view/camera = Определение свойств камеры в 3D-виде.
topicdescr_view/clipbox = Добавьте узел «Обрезная рамка», чтобы активировать инструмент «Обрезная рамка», который добавляет рамку для обрезки 3D-геометрии, включая ее сетку и графики результатов, чтобы заглянуть внутрь нее. 
topicdescr_view/clipcylinder = Добавьте узел «Цилиндр обрезки», чтобы активировать инструмент «цилиндр обрезки», который добавляет цилиндр для обрезки трехмерной геометрии, включая ее сетку и графики результатов, чтобы заглянуть внутрь нее.
topicdescr_view/clipplane = Добавьте узел «Плоскость отсечения», чтобы активировать инструмент «Плоскость отсечения», который добавляет плоскость для отсечения 3D-геометрии, включая ее сетку и графики результатов, чтобы заглянуть внутрь нее.
topicdescr_view/clipsphere = Добавьте узел «Сфера отсечения», чтобы активировать инструмент «Сфера отсечения», который добавляет сферу для обрезки трехмерной геометрии, включая ее сетку и графики результатов, чтобы заглянуть внутрь нее.
topicdescr_view/directionallight = Определение свойств направленного света в 3D-виде.
topicdescr_view/headlight = Определение свойств фары в 3D виде.
topicdescr_view/hidegeom = Скрытие части геометрии в графическом окне.
topicdescr_view/light = Добавление и определение направленного света, фары, прожектора или точечного света в 3D-виде.
topicdescr_view/modelview1d = Добавление и определение свойств общего 1D-вида в графическом окне.
topicdescr_view/modelview2d = Добавление и определение свойств общего 2D-вида в графическом окне.
topicdescr_view/modelview3d = Добавление и определение свойств общего 3D-вида в графическом окне.
topicdescr_view/pointlight = Определение свойств точечного источника света на 3D-виде.
topicdescr_view/resultview2d = Добавление и определение свойств 2D-представления для графиков результатов в графическом окне.
topicdescr_view/resultview3d = Добавление и определение свойств трехмерного представления для графиков результатов в графическом окне
topicdescr_view/spotlight = Определение свойств прожектора в 3D-виде.
topicdescr_view/view  = Добавление и определение свойств общего 2D или 3D вида в графическом окне.

