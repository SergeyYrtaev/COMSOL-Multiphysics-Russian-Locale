topicdescr_physics/materialdiscontinuity = [Разрыв материала]Граница между двумя различными средами, на которой испускаются отраженные и преломленные лучи.
topicdescr_physics/mbd_friction = [Трение]Добавляет трение в сустав.
topicdescr_physics/meanflowvelocitypotential = [Потенциал средней скорости потока] Потенциальное состояние средней скорости потока.
topicdescr_physics/mechanicaldamping = [Механическое демпфирование]Механическое демпфирование в пьезоэлектрических и магнитострикционных материалах.
topicdescr_physics/mediumproperties = [Свойства среды]Определяет свойства среды, в которой распространяются лучи.
topicdescr_physics/membrane = [Мембрана] Устанавливает мембранный область.
topicdescr_physics/membranecontact = [Контакт]Механический контакт между структурными мембранами.
topicdescr_physics/metalcontact = [Металлоконтакт]Граничное условие контакта металла.
topicdescr_physics/metallurgicalphase = [Металлургическая фаза] Металлургическая фаза, используемая в интерфейсах «Преобразование металлической фазы» и «Разложение аустенита».
topicdescr_physics/mf_ampereslawmagnetostrictive = [Закон Ампера's Law, Magnetostrictive]Ampère's для векторного магнитного потенциала в магнитострикционных материалах. Используется как часть мультифизического интерфейса Магнитострикции.
topicdescr_physics/mf_ampereslawnonlinearmagnetostrictive = [Закон Ампера 's Law, Nonlinear Magnetostrictive]Ampère's для векторного магнитного потенциала в нелинейных магнитострикционных материалах. Используется как часть мультифизического интерфейса нелинейной магнитострикции.
topicdescr_physics/mf_ampereslawpiezomagnetic = [Закон Ампера 's Law, Piezomagnetic]Ampère's для векторного магнитного потенциала в линейных магнитострикционных материалах. Используется как часть мультифизического интерфейса «Пьезомагнетизм».
topicdescr_physics/mf_coil = [Катушка] Проводящая область, используемая для моделирования катушек, кабелей и других устройств, подверженных сосредоточенному возбуждению, например внешнему току или напряжению. Возбуждение преобразуется в локальные величины (электрические поля и плотности тока). Вычисляются сосредоточенные параметры, такие как импеданс или индуктивность.
topicdescr_physics/mf_coilboundary = [Катушка]Проводящая граница, используемая для моделирования катушек, кабелей и других устройств, подверженных сосредоточенному возбуждению, например внешнему току или напряжению. Возбуждение преобразуется в локальные величины (электрические поля и плотности тока). Вычисляются сосредоточенные параметры, такие как импеданс или индуктивность.
topicdescr_physics/mf_coilfloating = [Соединенные границы] Отмечает две или более границы как электрически связанные для этапа предварительной обработки анализа геометрии катушки.
topicdescr_physics/mf_coilharmonicperturbation = [Гармоническое возмущение] Определяет гармоническое возмущение для возбуждения катушки.
topicdescr_physics/mf_coilinput = [Ввод (для геометрии катушки, определяемой пользователем)] Указывает границы, по которым провода входят в область.
topicdescr_physics/mf_coiloutput = [Вывод (для геометрии катушки, определяемой пользователем)] Указывает границы, по которым провода выходят за пределы области.
topicdescr_physics/mf_divergencefilteringconstraint = [Переопределить вход/выход катушки]Определяет особые условия на границах входа/выхода для функции точного расчета напряжения катушки. Эта функция выполняет фильтрацию тока для повышения точности расчета электрического поля в частотной области.
topicdescr_physics/mf_floatingpotentialcoil = [Плавающий потенциал] Граница при постоянном, неизвестном потенциале катушки. Если применить его к нескольким несвязанным границам, он моделирует электрическое соединение между ними.
topicdescr_physics/mf_freespace = [Свободное пространство] Используется для моделирования окружающей среды в непосредственной близости от индуктивного или емкостного устройства, обычно воздуха или вакуума.
topicdescr_physics/mf_impedance = [Импеданс]Частотная модель проводящего области; предполагает, что поле проникает лишь на небольшое расстояние за границу.
topicdescr_physics/mf_passiveconductor = [Пассивный проводник]Электрически изолированный область с конечной проводимостью.
topicdescr_physics/mf_symmetryplane = [Плоскость симметрии]Условие симметрии плотности магнитного потока на границе.
topicdescr_physics/mf_transitionboundarycondition = [Переходное граничное условие]Частотная модель тонкого проводящего слоя.
topicdescr_physics/mf_userdefinedcoilgeometry = [Пользовательская геометрия катушки] Устанавливает направление проводов в катушке с помощью определяемого пользователем векторного поля.
topicdescr_physics/mf_velocity = [Скорость (член Лоренца)] Член Лоренца для плотности индуцированного тока в движущемся проводнике.
topicdescr_physics/mfco_conductor = [Проводник]Добавляет уравнение непрерывности для электрического потенциала и предоставляет интерфейс для определения электропроводности. Используйте его как простой способ применить источники тока, особенно в связи с исследованиями анализа источника с инициализацией.
topicdescr_physics/mfco_exteriorboundaries = [Внешние границы]Условие бесконечности предназначено для использования в исследованиях анализа источника с инициализацией.
topicdescr_physics/mfco_freespace = [Свободное пространство] Добавляет закон Ампера в свободном пространстве и предполагает, что все домены имеют одинаковую относительную магнитную проницаемость, равную единице.
topicdescr_physics/mfco_passiveconductor = [Пассивный проводник]Добавляет уравнение непрерывности для электрического потенциала и предоставляет интерфейс для определения электропроводности.
topicdescr_physics/mfco_terminal = [Терминал]Подузел Терминал предоставляет интерфейс для определения общего тока, протекающего в проводнике (родительский узел).
topicdescr_physics/mfnc_magneticscalarpotentialdiscontinuity = [Разрыв магнитного скалярного потенциала] Предписанный разрыв магнитного скалярного потенциала.
topicdescr_physics/mfnc_symmetryplane = [Плоскость симметрии]Условие симметрии магнитного поля на границе.
topicdescr_physics/mftp_freespace = [Свободное пространство] Добавляет закон Ампера в свободном пространстве и предполагает, что все домены имеют одинаковую относительную магнитную проницаемость, равную единице.
topicdescr_physics/mftp_insulator = [Изолятор] Изолирующая область с магнитными свойствами.
topicdescr_physics/mftp_passiveconductor = [Пассивный проводник]Добавляет уравнение непрерывности для электрического потенциала и предоставляет интерфейс для определения электропроводности.
topicdescr_physics/microfluidicwallconditions = [Условия микрофлюидной стенки] Граничные условия скорости скольжения для микрофлюидного потока. 
topicdescr_physics/microporesporousmedium = [Микропоры]Микропоры
topicdescr_physics/microwavepowerdeposition = [Наложение микроволновой энергии] Добавляет микроволновое нагревание электронам в плазме.
topicdescr_physics/minmaxpressure = [Рассчитать минимальное и максимальное давление]Рассчитать минимальное и максимальное акустическое давление с течением времени.
topicdescr_physics/minmaxpressureedge = [Рассчитать минимальное и максимальное давление]Рассчитать минимальное и максимальное акустическое давление с течением времени.
topicdescr_physics/mirror = [Зеркало] Зеркально отражает все падающие лучи.
topicdescr_physics/misalignment = [Несоосность подшипников] Несоосность подшипников.
topicdescr_physics/mixedformulationboundary = [Граница смешанной формулировки] Состояние на границе между областями магнитного векторного потенциала и областями магнитного скалярного потенциала. Применяется автоматически на всех таких границах. 
topicdescr_physics/mixedmodesparameters = [S-параметры смешанного режима]Глобальная функция для расчета S-параметров смешанного режима.
topicdescr_physics/mixer = [Микшер]Микшер потока.
topicdescr_physics/mixingplane = [Плоскость смешивания]Граничное условие потока жидкости для моделирования перемешивания в одном направлении.
topicdescr_physics/mixtureproperties = [Свойства смеси] Уравнения потока жидкости модели смеси (без учета объемных сил).
topicdescr_physics/mm_inlet = [Вход]Входные граничные условия для непрерывной и дисперсной фаз.
topicdescr_physics/mm_masstransfer = [Массообмен]Массообмен между дисперсной и непрерывной фазами.
topicdescr_physics/mm_outlet = [Выход]Выходные граничные условия для сплошной и дисперсной фаз.
topicdescr_physics/mm_symmetryfluid = [Симметрия]Условия симметрии для сплошной и дисперсной фаз.
topicdescr_physics/mm_wall = [Wall]Пристеночные граничные условия для сплошной и дисперсной фаз.
topicdescr_physics/mmtp_exteriorboundaries = [Внешние границы]Граничное условие, которое присваивает нулевой внеплоскостной магнитный векторный потенциал на внешних границах.
topicdescr_physics/mmtp_freespace = [Свободное пространство] Добавляет закон Ампера в свободном пространстве и предполагает, что все домены имеют одинаковую относительную магнитную проницаемость, равную единице.
topicdescr_physics/mobilefluidimmobilesolid = [Подвижная жидкость, Неподвижное твердое тело] Создает модель уравнения подвижной жидкости и твердого тела.
topicdescr_physics/mobileliquidimmobilesolid = [Подвижная жидкость, Неподвижное твердое тело] Создает модель уравнения подвижной жидкости и неподвижного твердого тела.
topicdescr_physics/mobileliquidimmobilesolidandgas = [Подвижная жидкость, неподвижное твердое тело и газ] Создает модель уравнения подвижной жидкости, неподвижного твердого тела и газа.
topicdescr_physics/mobilitymodeluserdefined = [Пользовательская модель мобильности] Пользовательская модель мобильности для транспорта полупроводников.
topicdescr_physics/modeldeviceiv = [Внешний I против U]Двухконтактное подключение к другому физическому интерфейсу, действующему как источник напряжения.
topicdescr_physics/modeldevicevi = [Внешний U против I] Двухконтактное подключение к другому физическому интерфейсу, действующему как источник тока.
topicdescr_physics/modelterminaliv = [Внешний I-терминал]Одноконтактное соединение с другим физическим интерфейсом, действующее как источник напряжения на землю.
topicdescr_physics/moistairheattransfermodel = [Влажный воздух]Теплопередача во влажном воздухе посредством диффузии и конвекции.
topicdescr_physics/moistairhygroscopicporousmediummodel = [Влажный воздух]Влажный воздух во влажной пористой среде.
topicdescr_physics/moistairmoistporousmediumheattransfermodel = [Влажный воздух]Влажный воздух во влажной пористой среде.
topicdescr_physics/moistporousmedia = [Влажные пористые материалы]Влажные пористые материалы.
topicdescr_physics/moistporousmediumheattransfermodel = [Влажная пористая среда]Модель теплопередачи для пористой среды, наполненной влажным воздухом и жидкой водой.
topicdescr_physics/monopolesource = [Источник монополя]Исходный термин области «Монополь».
topicdescr_physics/mosfetn = [n-канальный MOSFET]Четырехконтактный n-канальный MOSFET (транзистор). 
topicdescr_physics/mosfetp = [p-канальный MOSFET]Четырехконтактный p-канальный MOSFET (транзистор).
topicdescr_physics/movingfoundation = [Движение основания в роторной динамике]Движение несущего основания.
topicdescr_physics/movingwall = [Движущаяся стена] Состояние движущейся стены.
topicdescr_physics/mt_inflow = [Приток] Указывает условия влажности выше по потоку поступающей жидкости на входе.
topicdescr_physics/mt_moistair = [Влажный воздух] Перенос влаги во влажном воздухе посредством диффузии и конвекции.
topicdescr_physics/mt_moistsurface = [Влажная поверхность] Модель испарения и конденсации на твердой поверхности, частично покрытой жидкой водой.
topicdescr_physics/mt_moisturecontent = [Содержание влаги] Укажите относительную влажность и температуру или концентрацию пара на внешних границах.
topicdescr_physics/mt_moistureflux = [Поток влаги] Добавьте поток влаги через внешние границы.
topicdescr_physics/mt_moisturesource = [Источник влаги] Образование влаги внутри области.
topicdescr_physics/mt_openboundary = [Открытая граница] Перенос влаги посредством конвекции через открытые границы.
topicdescr_physics/mt_thinmoisturebarrier = [Тонкий влагобарьер] Непрерывное содержание влаги по внутренним границам.
topicdescr_physics/mt_wetsurface = [Влажная поверхность]Модель испарения и конденсации на твердой поверхности, полностью покрытой жидкой водой.
topicdescr_physics/mts_moisturecontentandpressure = [Содержание влаги и давление] Укажите относительную влажность и давление влажного воздуха на внешних границах.
topicdescr_physics/mts_moistureflux = [Поток влаги] Добавьте поток влаги через внешние границы.
topicdescr_physics/mts_moisturesource = [Источник влаги] Образование влаги внутри области.
topicdescr_physics/muellermatrix = [Матрица Мюллера] Применяет определяемые пользователем матрицы Мюллера к векторам Стокса падающих лучей.
topicdescr_physics/mullinseffect = [Эффект Маллинза]Эффект Маллинза в гиперэластичных материалах. 
topicdescr_physics/multiphasewinding = Задайте область, заполненную несколькими катушками, имеющими разные электрические фазы. Каждая катушка состоит из большого количества тонких проводов, и ток может течь только в направлении проводов.
topicdescr_physics/multispoolbearing = [Многокатушечный подшипник]Функция многокатушечного подшипника в интерфейсах сплошного ротора и балочного ротора.
topicdescr_physics/multiturncoilboundary = [Многовитковая катушка]Гомогенизированная модель катушки, состоящей из большого количества тонких проводов. Ток может течь только вдоль направления проводов. Катушка имеет незначительную толщину, поэтому моделируется как граница.
topicdescr_physics/multiturncoildomain = [Многовитковая катушка]Гомогенизированная модель катушки, состоящей из большого количества тонких проводов. Ток может течь только вдоль направления проводов.
topicdescr_physics/mutualinductance = [Взаимная индуктивность]Соединяет два существующих устройства индуктивности с взаимной индуктивностью. 
topicdescr_physics/narrowregionacousticsmodel = [Акустика узкой области]Модель акустического материала узкой области для гомогенизированных тепловых и вязкостных потерь.
topicdescr_physics/navierslip = [Navier Slip]Граничное условие скольжения для стен, контактирующих со свободной поверхностью.  
topicdescr_physics/negativeconnectors = [Отрицательные разъемы]Определяет границы отрицательного разъема между доменами батареи и доменами проводников тока аккумуляторной батареи.
topicdescr_physics/negativeelectrode = [Отрицательный электрод]Определяет уравнения массопереноса в отрицательном пористом электроде.
topicdescr_physics/negativeelectrodeselection = [Выбор отрицательного электрода] Указывает отрицательный пористый электрод в модели батареи.
topicdescr_physics/negativeporouselectrode = [Отрицательный пористый электрод] Определяет уравнения для переноса заряда и массы, а также изменения пористости в пористом электроде отрицательного свинцово-кислотного аккумулятора.
topicdescr_physics/negelectrodeselection = [Выбор отрицательного электрода] Указывает отрицательный пористый электрод в модели батареи.
topicdescr_physics/newturbulencemodel = [Создать новый интерфейс модели турбулентности] Копирует активные настройки текущего интерфейса и создает новый интерфейс с указанной моделью турбулентности. Также генерируется новое исследование, в котором начальные значения могут быть взяты из уже существующего исследования.
topicdescr_physics/njunction = [n-образный переход]Падение давления в системе трубопроводов из-за потерь в N-образном переходе.
topicdescr_physics/nodecolumn = [Столбец узла]Столбец узла.
topicdescr_physics/noflow = [Нет потока]Нет граничного условия потока.
topicdescr_physics/noflowint = [Нет потока, интерфейс]Нет граничного условия потока.
topicdescr_physics/noflux = [Нет потока]Граничное условие нулевого потока.
topicdescr_physics/nonconductingmagnet  = [Непроводящий магнит] Намагниченный область или регулярная структура намагниченных областей с нулевой проводимостью. Направление намагничивания можно указать, выбрав границы северного и южного полюса.
topicdescr_physics/nondepositingboundary = [Неотлагающаяся граница] Изолирующая граница, на которой нет отложений материала.
topicdescr_physics/nonfaradaicreactions = [Нефарадеевские реакции]Нефарадеевские реакции на границе раздела электрод-электролит.
topicdescr_physics/nonisothermalflowmodel = [Жидкость]Уравнения неизотермического потока (исключая объемные силы). 
topicdescr_physics/nonlinearacousticswestervelt = [Вклад в нелинейную акустику (Вестервельт)]Нелинейный вклад в модель акустики.
