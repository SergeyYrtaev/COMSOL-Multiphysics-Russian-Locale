topicdescr/multiphysicsnonlinearmagnetostriction = [Нелинейный магнитострикционный интерфейс] Интерфейс мультифизики нелинейной магнитострикции объединяет интерфейсы механика твердого тела и магнитные поля вместе с конститутивными отношениями, необходимыми для анализа магнитострикционных материалов и устройств. Можно смоделировать как прямой эффект Джоуля, так и обратный эффект Виллари. Доступны нелинейные модели магнитостриктивной деформации и намагниченности материала.
topicdescr/multiphysicsphasefielddamage = Мультифизический интерфейс Фазового Полевого Повреждения объединяет Твердую Механику и Фазовое Поле в интерфейсах Твердых, чтобы моделировать эволюцию повреждений и трещин в деформирующих твердых телах. Движущая сила повреждения зависит от состояния деформации в твердом теле, которое регулирует эволюцию фазового поля. В свою очередь, фазовое поле определяет деградацию твердых свойств в поврежденных регионах.\n\n Интерфейс может использоваться для стационарного и зависящего от времени анализа в 3D, 2D и 2D аксисимметричных доменах.
topicdescr/multiphysicspiezoelectricdevices = [Пьезоэлектрический интерфейс] Многофизический интерфейс Пьезоэлектричества объединяет Твердую Механику и Электростатику вместе с конститутивными отношениями, необходимыми для моделирования пьезоэлектриков. Можно моделировать как прямые, так и обратные пьезоэлектрические эффекты, и пьезоэлектрическая связь может быть сформулирована с использованием форм деформации или заряда напряжения.
topicdescr/multiphysicspiezoelectricls = [Пьезоэлектричество, интерфейс слоистой оболочки] Многофизический интерфейс Piezoelectricity, Layered Shell объединяет структурные слоистые оболочки и электрические токи в оболочках вместе с конститутивными отношениями, необходимыми для моделирования пьезоэлектриков. Можно моделировать как прямые, так и обратные пьезоэлектрические эффекты, и пьезоэлектрическая связь может быть сформулирована с использованием форм деформации или заряда напряжения.
topicdescr/multiphysicspiezoelectricitypyroelectricity = [Пьезоэлектричество и пироэлектрический интерфейс] Интерфейс мультифизики Пьезоэлектричества и Пироэлектричества сочетает в себе твердую механику, электростатику и теплообмен в твердых телах вместе с конститутивными отношениями, необходимыми для моделирования пьезоэлектрических приложений, в которых сочетаются изменение температуры и электрический заряд.
topicdescr/multiphysicspiezoelectricwavestimeexplicit = Пьезоэлектрические волны, мультифизический интерфейс явная по времени объединяет эластичные волны, явная по времени и электростатику вместе с конститутивными отношениями, необходимыми для моделирования пьезоэлектриков. Можно моделировать как прямые, так и обратные пьезоэлектрические эффекты, и пьезоэлектрическая связь может быть сформулирована с использованием форм деформации или заряда напряжения.
topicdescr/multiphysicspiezomagnetism = [Интерфейс пьезомагнетизма] Интерфейс мультифизики пьезомагнетизма объединяет интерфейсы механика твердого тела и магнитные поля вместе с конститутивными отношениями, необходимыми для анализа линейных магнитострикционных материалов и устройств. Можно смоделировать как прямой эффект Джоуля, так и обратный эффект Виллари.
topicdescr/multiphysicspiezoresistivityboundarycurrents = [Пьезорезистивность, интерфейс пограничных токов] Многофизический интерфейс Piezoresistivity, Boundary Currents объединяет интерфейс механика твердого тела с потоком электрического тока в тонком слое твердого тела для моделирования пьезосопротивления. Интерфейс подходит для ситуаций, в которых толщина пьезорезистивного слоя намного меньше, чем у структурного слоя.
topicdescr/multiphysicspiezoresistivitydomaincurrents = [Пьезорезистивность, интерфейс областьных токов] Многофизический интерфейс Piezoresistivity, Domain Currents объединяет интерфейсы механика твердого тела и Electric Currents для имитации пьезорезистивного эффекта. Физический интерфейс подходит для ситуаций, когда толщины проводящих и пьезорезистивных слоев решаются сеткой.
topicdescr/multiphysicspiezoresistivityshell = [Пьезорезистивность, Shell Interface]Пьезорезистивность, мультифизический интерфейс Shell объединяет структурные оболочки с потоком электрического тока на тонком слое внутри оболочки для имитации пьезорезистивного эффекта. Физический интерфейс используется, когда структурный слой достаточно тонкий для обработки интерфейсом Shell, но проводящие и пьезорезистивные слои все еще намного тоньше, чем структурные слои. Этот физический интерфейс требует добавления модуля структурной механики.
topicdescr/multiphysicspiezoresistivityls = [Пьезорезистивность, сложенный интерфейс оболочки] Многофизический интерфейс Piezoresistivity, Layered Shell объединяет структурные слоистые оболочки с электрическими токами в оболочках для имитации пьезорезистивного эффекта в многослойных структурах. Этот физический интерфейс требует добавления модуля композитных материалов.
topicdescr/multiphysicsporoelasticcoupling = [Интерфейс пороэластичности] Мультифизический интерфейс пороэластичности сочетает нестационарную формулировку закона Дарси с квазистатической формулировкой механики твердого тела. Связь выполняется на уровне области, где поровое давление из интерфейса «Закон Дарси» действует как нагрузка на интерфейс «Механика твердого тела», вызывая набухание или усадку. Изменения объемной деформации влияют на поровое пространство, которое выступает как источник массы или сток для интерфейса «Закон Дарси».
topicdescr/multiphysicsporoelasticcouplinglargedeformation = [Пороэластичность, большие деформации] Мультифизический интерфейс «Пороэластичность, большие деформации» сочетает нестационарную формулировку закона Дарси с квазистатической формулировкой механики твердого тела. Интерфейс использует деформированную геометрию для моделирования возможных больших деформаций в пористых материалах. Связь выполняется на уровне области, где поровое давление из интерфейса «Закон Дарси» действует как нагрузка на интерфейс «Механика твердого тела», вызывая набухание или усадку. Изменения объемной деформации влияют на поровое пространство, которое выступает как источник массы или сток для интерфейса «Закон Дарси».
topicdescr/multiphysicsporoelasticcouplinglayered = [Пороэластичность, многослойная оболочка] Мультифизический интерфейс «Пороэластичность, многослойная оболочка» сочетает нестационарную формулировку многослойного закона Дарси с квазистатической формулировкой многослойной оболочки. Связь выполняется на многослойных границах, где поровое давление из интерфейса «Многослойный закон Дарси» действует как нагрузка на интерфейс «Многослойная оболочка», вызывая набухание или усадку. Изменения объемной деформации влияют на поровое пространство, которое выступает как источник массы или сток в интерфейсе «Многослойный закон Дарси».
topicdescr/multiphysicsporoelasticity = [Отделение пороэластичности] Ветвь Пороэластичности содержит физические интерфейсы для моделирования пороэластичности и закона Дарси в твердых телах и оболочках.
topicdescr/multiphysicspressureacousticsasymptoticscattering = [Акустика давления, асимптотическое рассеяние] Этот интерфейс используется для моделирования проблем рассеяния на высоких частотах с использованием интегральной формулы Кирхгофа-Гельмгольца. Предполагается, что акустическое поле является локально плоским, так что рассеянное поле может быть выражено аналитически. Поверхность объекта рассеяния может рассматриваться как идеально отражающая или обладающая поглощающими свойствами путем определения нормального импеданса поверхности, коэффициента отражения или коэффициента поглощения. Последние два могут зависеть от угла падения. Интерфейс может моделировать рассеяние от сферических и плоских волн в 3D и 2D аксисимметрии, а также плоских и цилиндрических волн в 2D. Интерфейс имеет встроенную функциональность для вычисления коэффициента видимости.
topicdescr/multiphysicspressureacousticskirchhoffhelmholtz = [Акустика давления, интерфейс Кирхгоффа-Гельмгольца] Этот интерфейс используется для моделирования проблем излучения на высоких частотах с использованием интегральной формулировки Кирхгоффа-Гельмгольца. Предполагается, что акустическое поле является локальной плоскостью. Этот метод также часто называют высокочастотным BEM или просто HFB. Метод часто используется для вычисления излучаемого акустического поля из вибрирующих структур на высоких частотах, без необходимости моделирования окружающей жидкости. Метод действителен до тех пор, пока акустическая длина волны в жидкости меньше, чем структура и структурные режимы. Для плоской вибрирующей поверхности метод сводится к решению интеграла Рэлея. Опция, определяемая пользователем, дает доступ к полной интегральной формуле Кирхгофа-Гельмгольца для определения как давления, так и его нормального градиента.
topicdescr/multiphysicspyroelectricity = [Пироэлектрический интерфейс] Интерфейс мультифизики Пироэлектричества сочетает в себе теплопередачу в твердых телах и электростатические интерфейсы вместе с конститутивными отношениями, необходимыми для моделирования пироэлектричества. Можно моделировать как прямые пироэлектрические, так и обратные электрокалорические эффекты.
topicdescr/multiphysicsreactingflowkeps = [The Reacting Flow, турбулентное течение, k-εInterface]The Reacting турбулентное течение, k-ε multiphysics interface is used to simulation flow in the turbulent regime coupled to species transport in a gas or liquid.\n\n Он объединяет интерфейсы турбулентное течение, k-ε и Transport of Concentrated Species. Мультифизическая связь, которая добавляется автоматически, соединяет поток жидкости и массовый транспорт и применяет моделирование турбулентности для массового транспорта. Видовой транспорт поддерживает как смесь, где концентрации сопоставимы по величине, так и низкоконцентрационные растворители в растворителе.\n\n Интерфейс может использоваться для стационарного и зависящего от времени анализа в 2D, 2D аксисимметрии и 3D геометрии. 
topicdescr/multiphysicsreactingflowkepsds = [The Reacting Flow, турбулентное течение, k-εInterface] Разбавленная версия интерфейса Reacting турбулентное течение, k-ε multiphysics используется для имитации потока в турбулентном режиме, связанном с транспортировкой разбавленных растворителей в растворителе. Растворительной жидкостью может быть либо газ, либо жидкость.\n\n Он объединяет интерфейсы турбулентное течение, k-ε и Transport of Diluted Species. Мультифизическая связь Reacting Flow, Diluted Species, которая добавляется автоматически, соединяет поток жидкости и массовый транспорт и применяет моделирование турбулентности для массового транспорта.\n\n Интерфейс может использоваться для стационарного и зависящего от времени анализа в 2D, 2D аксисимметрии и 3D геометрии. 
topicdescr/multiphysicsreactingflowkomega = [The Reacting Flow, турбулентное течение, k-ωInterface]The Reacting турбулентное течение, k-ω multiphysics interface is used to simulation flow in the turbulent regime coupled to species transport in a gas or a liquid.\n\n Он объединяет интерфейсы турбулентное течение, k-ω и Transport of Concentrated Species. Мультифизическая связь Reacting Flow, которая добавляется автоматически, соединяет поток жидкости и массовый транспорт и применяет моделирование турбулентности для массового транспорта. Видовой транспорт поддерживает как смесь, где концентрации сопоставимы по величине, так и низкоконцентрационные растворители в растворителе.\n\n Интерфейс может использоваться для стационарного и зависящего от времени анализа в 2D, 2D аксисимметрии и 3D геометрии.   
topicdescr/multiphysicsreactingflowkomegads = [The Reacting Flow, турбулентное течение, k-ωInterface] Разбавленная версия интерфейса Reacting турбулентное течение, k-ω multiphysics используется для имитации потока в турбулентном режиме, связанном с транспортировкой разбавленных растворителей в растворителе. Растворительной жидкостью может быть либо газ, либо жидкость.\n\n Он объединяет интерфейсы турбулентное течение, k-ω и Transport of Diluted Species. Мультифизическая связь Reacting Flow, Diluted Species, которая добавляется автоматически, соединяет поток жидкости и массовый транспорт и применяет моделирование турбулентности для массового транспорта.\n\n Интерфейс может использоваться для стационарного и зависящего от времени анализа в 2D, 2D аксисимметрии и 3D геометрии. 
topicdescr/multiphysicsreactingflowlaminar = (перенаправлено с «ламинарное течение Interface») Мультифизический интерфейс Reacting ламинарное течение используется для имитации ламинарного потока, связанного с переносом видов в газе или жидкости.\n\n Он сочетает в себе ламинарный поток и транспорт концентрированных видов. Мультифизическая связь, которая добавляется автоматически, соединяет поток жидкости и массовый транспорт. Поток жидкости может быть либо свободным потоком, либо потоком в пористой среде. Видовой транспорт поддерживает как смесь, где концентрации сопоставимы по величине, так и низкоконцентрационные растворители в растворителе.\n\n Интерфейс может использоваться для стационарного и зависящего от времени анализа в 2D, 2D аксисимметрии и 3D геометрии.
topicdescr/multiphysicsreactingflowlaminards = [Реакционный ламинарный поток, разбавленный интерфейс видов] Многофизический интерфейс Reacting ламинарное течение, Diluted Species используется для имитации ламинарного потока, связанного с транспортировкой разбавленного растворителя в растворителе.\n\n Он сочетает в себе ламинарный поток и транспорт разбавленных видов интерфейсов. Реакционный поток, разбавленный вид мультифизическая связь, которая добавляется автоматически, соединяет поток жидкости и массовый транспорт. Поток жидкости может быть либо свободным потоком, либо потоком в пористой среде. Массовый перенос решает для разработки одного или нескольких растворителей, растворенных в газе или жидком растворителе.\n\n Интерфейс может использоваться для стационарного и зависящего от времени анализа в 2D, 2D аксисимметрии и 3D геометрии.
topicdescr/multiphysicsreactingflowlowrekeps = [The Reacting Flow, турбулентное течение, Low Re k-εInterface]The Reacting турбулентное течение, Low Re k-ε multiphysics interface используется для имитации потока в турбулентном режиме, связанном с переносом видов в газе или жидкости.\n\n Он сочетает в себе турбулентное течение, Low Re k-ε и интерфейсы Transport of Concentrated Species. Мультифизическая связь Reacting Flow, которая добавляется автоматически, соединяет поток жидкости и массовый транспорт и применяет моделирование турбулентности для массового транспорта. Видовой транспорт поддерживает как смесь, где концентрации сопоставимы по величине, так и низкоконцентрационные растворители в растворителе.\n\n Интерфейс может использоваться для стационарного и зависящего от времени анализа в 2D, 2D аксисимметрии и 3D геометрии.
topicdescr/multiphysicsreactingflowlowrekepsds = [Реагирующий поток, турбулентный поток, k-ε Интерфейс]Разбавленная версия мультифизического интерфейса «Реагирующий турбулентный поток, низкий Re» k-ε используется для моделирования потока в турбулентном режиме, связанного с переносом разбавленных растворенных веществ в растворителе. Жидкий растворитель может быть газом или жидкостью.\n\nОн сочетает в себе интерфейсы «Турбулентный поток», «Low Re k-ε» и «Перенос разбавленных веществ». Мультифизическая связь «Реагирующий поток, разбавленные виды», которая добавляется автоматически, связывает поток жидкости и массоперенос и применяет моделирование турбулентности для массопереноса.\n\nИнтерфейс можно использовать для стационарного и временного анализа в 2D, 2D осесимметричной и 3D геометрии. 
topicdescr/multiphysicsreactingflowpackedbedcs = [Реакционный поток, упакованный в кровать, концентрированный интерфейс видов] Интерфейс «Упакованная кровать, транспорт концентрированных видов» используется для моделирования реактора, заполненного пористыми каталитическими гранулами. В дополнение к транспортировке в поровом пространстве между гранулами можно подробно изучить перенос химических видов и реакций между частицами.\n\n Он сочетает в себе уравнения Бринкмана и транспорт концентрированных видов в интерфейсе упакованных кроватей. Мультифизическая связь, которая добавляется автоматически, соединяет поток жидкости и массовый транспорт. Видовой транспорт поддерживает как смесь, где концентрации имеют одинаковый порядок величины, так и низкоконцентрационные растворители в растворителе.
topicdescr/multiphysicsreactingflowpackedbedds = [Реакционный поток, упакованный в кровать, разбавленный интерфейс видов] Интерфейс «Упакованная кровать, транспорт разбавленных видов» используется для моделирования реактора, заполненного пористыми каталитическими гранулами. В дополнение к транспортировке в поровом пространстве между гранулами можно подробно изучить перенос химических видов и реакций между частицами.\n\n Он сочетает в себе уравнения Бринкмана и транспорт разбавленных видов в интерфейсе упакованных кроватей. Реакционный поток, разбавленный вид мультифизическая связь, которая добавляется автоматически, соединяет поток жидкости и массовый транспорт. Химические виды считаются растворенными, растворенными в растворителе значительно более высокой концентрации.
topicdescr/multiphysicsreactingflowpackedbeddsshrinkingcore = [Упакованная кровать, сжимающий интерфейс модели] Усадочный вариант модели ядра мультифизического интерфейса Packed Bed используется для моделирования реакторов, заполненных изначально твердыми частицами-реагентами. Поскольку реагентные частицы потребляются гетерогенными реакциями, происходящими на поверхности ядра, твердое ядро сжимается, оставляя вокруг него пористый слой. Помимо основных поглощающих реакций, транспорт и реакции внутри пористого реагирующего слоя, а также транспорт в поровом пространстве вокруг частиц можно подробно изучить.\n\n Он сочетает в себе интерфейс Brinkman Equations и интерфейс Transport of Diluted Species, Shrinking Core Model. Реакционный поток, разбавленный вид мультифизическая связь, которая добавляется автоматически, соединяет поток жидкости и массовый транспорт. Предполагается, что химические виды являются растворенными видами, присутствующими в растворителе со значительно более высокой концентрацией.
topicdescr/multiphysicsreactingflowporouscatalystcs = [Реакционный пористый катализатор, концентрированный интерфейс видов] Интерфейс Porous Catalyst, Transport of Concentrated Species используется для изучения влияния адсорбции и гетерогенных реакций с участием химических видов, поскольку газ или жидкость перемещаются через промежутки пористой среды.\n\n Он объединяет уравнения Бринкмана и транспорт концентрированных видов в интерфейсе Porous Catalysts. Мультифизическая связь, которая добавляется автоматически, соединяет поток жидкости и массовый транспорт. Видовой транспорт поддерживает как смесь, где концентрации имеют одинаковый порядок величины, так и низкоконцентрационные растворители в растворителе.
topicdescr/multiphysicsreactingflowporouscatalystds = [Перенаправлено с Reacting Flow Porous Catalyst, Diluted Species Interface] Интерфейс Porous Catalyst, Transport of Diluted Species используется для изучения влияния адсорбции и гетерогенных реакций с участием химических видов, поскольку газ или жидкость перемещаются через промежутки пористой среды.\n\n Он объединяет уравнения Бринкмана и транспорт разбавленных видов в интерфейсе Porous Catalysts. Реакционный поток, разбавленный вид мультифизическая связь, которая добавляется автоматически, соединяет поток жидкости и массовый транспорт. Химические виды считаются растворенными, растворенными в растворителе значительно более высокой концентрации.
topicdescr/multiphysicsreactingflowporouscs = [Реакционный поток в пористом медиа-интерфейсе] Интерфейс Reacting Flow in Porous Media, Transport of Concentrated Species используется для изучения потока и химического состава газа или жидкости, движущихся через промежутки пористой среды.\n\n Он объединяет уравнения Бринкмана и транспорт концентрированных видов в интерфейсах Porous Media. Мультифизическая связь, которая добавляется автоматически, соединяет поток жидкости и массовый транспорт. Видовой транспорт поддерживает как смесь, где концентрации имеют одинаковый порядок величины, так и низкоконцентрационные растворители в растворителе.
topicdescr/multiphysicsreactingflowporousds = [Реакционный поток в пористом медиа-интерфейсе] Интерфейс Reacting Flow in Porous Media, Transport of Diluted Species используется для изучения потока и химического состава газа или жидкости, движущихся через промежутки пористой среды.\n\n Он объединяет уравнения Бринкмана и транспорт разбавленных видов в интерфейсах Porous Media. Реакционный поток, разбавленный вид мультифизическая связь, которая добавляется автоматически, соединяет поток жидкости и массовый транспорт. Химические виды считаются растворенными, растворенными в растворителе значительно более высокой концентрации.
topicdescr/multiphysicsreactingflowsst = [Реакционный поток, турбулентный поток, интерфейс SST] Мультифизический интерфейс Reacting турбулентное течение, SST используется для имитации потока в турбулентном режиме, связанном с переносом видов в газе или жидкости.\n\n Он объединяет интерфейсы турбулентное течение, SST и Transport of Concentrated Species. Мультифизическая связь Reacting Flow, которая добавляется автоматически, соединяет поток жидкости и массовый транспорт и применяет моделирование турбулентности для массового транспорта. Видовой транспорт поддерживает как смесь, где концентрации сопоставимы по величине, так и низкоконцентрационные растворители в растворителе.\n\n Интерфейс может использоваться для стационарного и зависящего от времени анализа в 2D, 2D аксисимметрии и 3D геометрии. 
topicdescr/multiphysicsreactingflowsstds = [Реакционный поток, турбулентный поток, интерфейс SST] Разбавленная видовая версия мультифизического интерфейса Reacting турбулентное течение, SST используется для имитации потока в турбулентном режиме, связанном с транспортировкой разбавленных растворителей в растворителе. Растворительной жидкостью может быть либо газ, либо жидкость.\n\n Он объединяет интерфейсы турбулентное течение, SST и Transport of Diluted Species. Мультифизическая связь Reacting Flow, Diluted Species, которая добавляется автоматически, соединяет поток жидкости и массовый транспорт и применяет моделирование турбулентности для массового транспорта.\n\n Интерфейс может использоваться для стационарного и зависящего от времени анализа в 2D, 2D аксисимметрии и 3D геометрии.
topicdescr/multiphysicsreactingflowvapormovingmeshtcs = [Интерфейс «Ламинарный поток пара, концентрированные частицы, подвижная сетка»] Версия мультифизического интерфейса переноса паров с ламинарным потоком с подвижной сеткой используется для моделирования испарения и конденсации в или из интерфейса пара–жидкость, а также для отслеживания положения интерфейса.\n\nОн сочетает в себе интерфейсы переноса концентрированных частиц в паре, ламинарного потока и подвижной сетки. Мультифизическая связь Reacting Flow, добавляемая автоматически, связывает массоперенос пара и поток жидкости.\n\nИнтерфейс можно использовать для стационарного и временного анализа в 2D, 2D осесимметричной и 3D геометрии.
topicdescr/multiphysicsreactingflowvaportcs = Ламинарный паровой поток, концентрированные виды Многофизический интерфейс Laminar Vapor Transport используется для имитации переноса видов в паровой смеси, связанной с ламинарным потоком.\n\n Он сочетает в себе транспорт концентрированных видов в паре и интерфейсы ламинарного потока. Мультифизическая связь с реакционным потоком, которая добавляется автоматически, соединяет массовый транспорт пара и поток жидкости.\n\n Интерфейс может использоваться для стационарного и зависящего от времени анализа в 2D, 2D аксисимметрии и 3D геометрии.
topicdescr/multiphysicsrotatingmachineryhighmachnumberflowlaminar = [Вращающаяся машина, поток чисел высокого Маха, ламинарный интерфейс] Версия ламинарное течение мультифизических интерфейсов Rotating Machinery, High Mach Number Flow используется для имитации потоков газа в геометрии с одной или несколькими вращающимися частями и газа при низком и умеренном числе Рейнольдса, где величина скорости сравнима со скоростью звука, то есть ламинарных потоков в трансонном и сверхзвуковом диапазоне. Это состояние часто связано с очень низким давлением.\n\n Он сочетает в себе высокий поток чисел Маха, ламинарный интерфейс с вращающимся областьом под движущейся сеткой. Физический интерфейс решает задачу сохранения энергии, массы и импульса. Физический интерфейс также поддерживает теплопередачу в твердых телах, а также излучение от поверхности к поверхности. Тем не менее, поддерживаются только текучие области, прилегающие к границам пар.\n\n Существуют два типа исследований для этого физического интерфейса. Используя тип исследования, зависящий от времени, вращение достигается за счет движущейся функциональности сетки, также известной как скользящая сетка. Используя тип исследования Frozen Rotor, вращающиеся части замораживаются в положении, а вращение объясняется включением центробежных и кориолисовых сил.
topicdescr/multiphysicsrotatingmachineryhighmachnumberflowturbulentkepsilon = [Вращающееся оборудование, поток с высоким числом Маха, k-ε Интерфейс] Турбулентный поток, k-ε мультифизические интерфейсы вращающегося оборудования, поток с высоким числом Маха используются для моделирования потоков газа в геометриях с одной или несколькими вращающимися частями и газом с высоким числом Рейнольдса, где величина скорости сопоставима. до скорости звука, то есть турбулентных течений в околозвуковом и сверхзвуковом диапазоне.\n\nОн сочетает в себе поток с высоким числом Маха, интерфейс k-ε с вращающейся областью под движущейся сеткой. Физический интерфейс решает вопрос сохранения энергии, массы и импульса. Эффекты турбулентности моделируются с использованием стандартной модели с двумя уравнениями k-ε с ограничениями реализуемости. Поток и теплопередача вблизи стен моделируются с использованием стеновых функций. Физический интерфейс также поддерживает теплообмен в твердых телах, а также излучение между поверхностями. Однако поддерживаются только жидкостные области, примыкающие к границам пар.\n\nДля этого физического интерфейса доступны два типа исследования. При использовании типа исследования «Зависимость от времени» вращение достигается за счет функции перемещения сетки, также известной как скользящая сетка. При использовании типа исследования «Замороженный ротор» вращающиеся части остаются в замороженном состоянии, а вращение учитывается за счет центробежных сил и сил Кориолиса.
topicdescr/multiphysicsrotatingmachineryhighmachnumberflowturbulentspalartallmaras = [Вращающаяся машина, поток чисел высокого Маха, интерфейс Спаларта-Альмараса] Турбулентный поток, версия вращающейся машины Spalart-Allmaras, мультифизические интерфейсы High Mach Number Flow используются для имитации потоков газа в геометрии с одной или несколькими вращающимися частями и газом с высоким числом Рейнольдса, где величина скорости сравнима со скоростью звука, то есть турбулентных потоков в трансонном и сверхзвуковом диапазоне.\n\n Он сочетает в себе высокий поток чисел Маха, интерфейс Spalart-Allmaras с вращающимся областьом под движущейся сеткой. Физический интерфейс решает задачу сохранения энергии, массы и импульса. Эффекты турбулентности моделируются с использованием модели турбулентности с одним уравнением Spalart-Allmaras. Модель Спаларта-Альмараса представляет собой так называемую модель с низким числом Рейнольдса, что означает, что она может разрешать поля скорости, давления и температуры вплоть до стены. Модель Spalart-Allmaras зависит от расстояния до ближайшей стены. Следовательно, физический интерфейс включает уравнение расстояния до стены. Он также поддерживает теплообмен в твердых телах, а также излучение от поверхности к поверхности. Тем не менее, поддерживаются только текучие области, прилегающие к границам пар.\n\n Существуют два типа исследований для этого физического интерфейса. Используя тип исследования, зависящий от времени, вращение достигается за счет движущейся функциональности сетки, также известной как скользящая сетка. Используя тип исследования Frozen Rotor, вращающиеся части замораживаются в положении, а вращение объясняется включением центробежных и кориолисовых сил.
topicdescr/multiphysicsrotatingmachinerymagneticstructureinteraction = [Ветвь вращающихся машин, взаимодействие магнитной структуры]Ветвь вращающихся машин, магнитных–Взаимодействие структур содержит физические интерфейсы для моделирования деформации вращающихся структур магнитных машин.
topicdescr/multiphysicsrotatingmachinerymixturemodelalgebraicyplus = [Вращающаяся машина, модель смеси, алгебраический интерфейс yPlus] Интерфейсы турбулентное течение, Algebraic yPlus версии Rotating Machinery, Mixture Model используются для моделирования рассеянных многофазных потоков при высоких числах Рейнольдса в оборудовании, содержащем одну или несколько вращающихся частей. Диспергированной фазой могут быть пузырьки, жидкие капли или твердые частицы, которые, как предполагается, всегда движутся с конечной скоростью.\n\n Интерфейс Mixture Model, Algebraic yPlus сочетается с вращающимся областьом под Moving Сетка. Он решает один набор уравнений Навье-Стокса для импульса смеси. Распределение давления рассчитывается из уравнения непрерывности со средним значением смеси, а скорость дисперсной фазы описывается моделью скольжения. Объемная фракция дисперсной фазы отслеживается путем решения транспортного уравнения для объемной фракции. Эффекты турбулентности включаются с использованием модели повышенной вязкости, основанной на расстоянии локальной стены. Следовательно, физический интерфейс включает уравнение расстояния до стены. Физический интерфейс также может моделировать распределение плотности чисел, которое может быть использовано для расчета межфазной области, полезной при моделировании химических реакций в смеси.\n\n Существуют два типа исследований, доступных для этого физического интерфейса. Используя тип исследования, зависящий от времени, вращение достигается за счет движущейся функциональности сетки, также известной как скользящая сетка. Используя исследование Frozen Rotor, вращающиеся части замораживаются в положении, а вращение объясняется включением центробежных и кориолисовых сил.
topicdescr/multiphysicsrotatingmachinerymixturemodelarea = [Вращающаяся машина, ветвь модели смеси] Интерфейсы вращающейся машины, модели смеси используются для моделирования рассеянных многофазных потоков при низких и высоких числах Рейнольдса в оборудовании, содержащем одну или несколько вращающихся частей. Диспергированной фазой могут быть пузырьки, жидкие капли или твердые частицы, которые, как предполагается, всегда движутся с конечной скоростью.
topicdescr/multiphysicsrotatingmachinerymixturemodelkeps = [The Rotating Machinery, Mixture Model, k-εInterface] турбулентное течение, k-ε version of the Rotating Machinery, Mixture Model interfaces используется для моделирования рассеянных многофазных потоков при высоких числах Рейнольдса в оборудовании, содержащем одну или несколько вращающихся частей. Диспергированной фазой могут быть пузырьки, жидкие капли или твердые частицы, которые, как предполагается, всегда движутся с конечной скоростью.\n\n Интерфейс Mixture Model, k-ε сочетается с вращающимся областьом под Moving Сетка. Он решает один набор уравнений Навье-Стокса для импульса смеси. Распределение давления рассчитывается из уравнения непрерывности со средним значением смеси, а скорость дисперсной фазы описывается моделью скольжения. Объемная фракция дисперсной фазы отслеживается путем решения транспортного уравнения для объемной фракции. Эффекты турбулентности моделируются с использованием стандартной модели с двумя уравнениями k-ε с ограничениями реализуемости. Поток вблизи стен моделируется с использованием функций стен. Физический интерфейс также может моделировать распределение плотности чисел, которое может быть использовано для расчета межфазной области, полезной при моделировании химических реакций в смеси.\n\n Для этого физического интерфейса доступны два типа исследований. Используя тип исследования, зависящий от времени, вращение достигается за счет движущейся функциональности сетки, также известной как скользящая сетка. Используя исследование Frozen Rotor, вращающиеся части замораживаются в положении, а вращение объясняется включением центробежных и кориолисовых сил.
