topicdescr/multiphysicselectrodepositiontertiarysupportingelectrolyte = [Электроосложение, третичное с поддерживающим электролитным интерфейсом] Электродепозиция, третичная с поддерживающим интерфейсом электролита описывает распределение тока, распределение потенциала и геометрические изменения в электрохимической ячейке с учетом переноса ионов в электролите. Он сочетает в себе третичное распределение тока, Nernst-Planck и интерфейсы деформированной геометрии.\n\nТранспорт заряженных и нейтральных видов описывается диффузией, миграцией и конвекцией. Обратите внимание, что вариант сохранения заряда поддерживающего электролита предполагает, что градиенты концентрации ионов, несущих заряд, малы, так что можно использовать объемную проводимость для определения потенциального падения электролита.\n\nИспользовать этот физический интерфейс для моделирования геометрических изменений в клетках электродепозиции с поддерживающими электролитами.
topicdescr/multiphysicselectrodepositiontertiarysupportingelectrolytedeformedgeometry = [Электроосложение, третичное с поддерживающим электролитным интерфейсом] Электродепозиция, третичная с поддерживающим интерфейсом электролита описывает распределение тока, распределение потенциала и геометрические изменения в электрохимической ячейке с учетом переноса ионов в электролите. Он сочетает в себе третичное распределение тока, интерфейс Nernst-Planck с формулой деформированной геометрии.\n\nТранспорт заряженных и нейтральных видов описывается диффузией, миграцией и конвекцией. Обратите внимание, что вариант сохранения заряда поддерживающего электролита предполагает, что градиенты концентрации ионов, несущих заряд, малы, так что можно использовать объемную проводимость для определения потенциального падения электролита.\n\nИспользовать этот физический интерфейс для моделирования геометрических изменений в клетках электродепозиции с поддерживающими электролитами.
topicdescr/multiphysicselectromagneticsstructureinteraction = Ветвь электромагнитно-структурного взаимодействия Electromagnetics–Structure Interaction содержит мультифизические интерфейсы, которые объединяют структурную механику с электрическими и магнитными полями.
topicdescr/multiphysicselectromechanics = [Электромеханический интерфейс] Интерфейс мультифизики электромеханики объединяет твердую механику и электростатику с движущейся функциональностью сетки для моделирования деформации электростатически приводимых в действие структур.
topicdescr/multiphysicselectromechanicsbem = [Электромеханика, интерфейс граничных элементов] Многофизический интерфейс «Электромеханика, граничные элементы» сочетает в себе функциональность механики твердого тела и электростатики для моделирования деформации электростатически приводимых в действие структур. Сцепление представляет собой пограничную нагрузку, вызванную напряжением Максвелла на интерфейсе твердых доменов и нетвердых пустот, где электрическое поле вычисляется с использованием метода граничного элемента. Обратная связь с электростатикой обусловлена деформациями границ.
topicdescr/multiphysicselectromechanicsinterface = [Отделение электромеханики] Ветвь электромеханики содержит физические интерфейсы для моделирования электромеханических сил в твердых телах.
topicdescr/multiphysicselectrostaticsboundaryandfiniteelements = [Мультифизический интерфейс Электростатика, Граничные элементы]Мультифизический интерфейс Электростатика, Граничные элементы используется для расчета распределения электрического поля и потенциала в диэлектриках в условиях, когда распределение электрического заряда явно задано. Этот мультифизический интерфейс добавляет интерфейс Электростатика и интерфейс Электростатика, граничные элементы. Мультифизическая связь определяет ограничение на общую границу, которое делает электрический потенциал непрерывным на границе между доменами для двух физических интерфейсов.\n\nСтационарное моделирование поддерживается в 2D и 3D.
topicdescr/multiphysicselectrostriction = [Электрострикционный интерфейс] Многофизический интерфейс электрострикции сочетает в себе твердую механику и электростатику вместе с конститутивными отношениями, необходимыми для моделирования электрострикционного эффекта в материале. Можно моделировать как прямые, так и обратные эффекты. В отличие от линейного пьезоэлектричества, электростриктивная деформация, индуцированный в поляризованном материале, пропорционален квадрату поляризации.
topicdescr/multiphysicsequilibriumdischarges = [Интерфейс равновесных разрядов] Многофизический интерфейс Equilibrium Discharges используется для изучения равновесных разрядов в рамках магнитогидродинамики (MHD). Этот мультифизический интерфейс добавляет три отдельных физических интерфейса: магнитные и электрические поля, теплообмен в жидкостях и ламинарный поток вместе с несколькими функциями мультифизической связи. Мультифизические связи добавляют MHD-связь между магнитным и электрическим полями и интерфейсами ламинарного потока. Мультифизические связи также добавляют нагревание и охлаждение равновесной плазмы путем переноса энтальпии, нагрева Джоуля и потери излучения, а также специальные граничные условия для моделирования нагрева ионов и электронов на границах плазмы.
topicdescr/multiphysicsequilibriumdischargesinplanecurrents = [Равновесные разряды, интерфейс токов в плоскости] Интерфейс мультифизики токов в плоскости используется для изучения равновесных разрядов в рамках магнитогидродинамики (MHD), где токи находятся в плоскости. Этот мультифизический интерфейс добавляет три отдельных физических интерфейса: магнитные и электрические поля, теплообмен в жидкостях и ламинарный поток вместе с несколькими функциями мультифизической связи. Мультифизические связи добавляют MHD-связь между магнитным и электрическим полями и интерфейсами ламинарного потока. Мультифизические связи также добавляют нагревание и охлаждение равновесной плазмы путем переноса энтальпии, нагрева Джоуля и потери излучения, а также специальные граничные условия для моделирования нагрева ионов и электронов на границах плазмы.
topicdescr/multiphysicsequilibriumdischargesoutofplanecurrents = [Равновесные разряды, интерфейс токов вне плоскости] Многофизический интерфейс Equilibrium Discharges, Out-of-plane Currents используется для изучения равновесных разрядов в рамках магнитогидродинамики (MHD), где токи находятся вне плоскости. Этот мультифизический интерфейс добавляет три отдельных физических интерфейса: магнитные поля, теплообмен в жидкостях и ламинарный поток вместе с несколькими функциями мультифизической связи. Мультифизические связи добавляют MHD-связь между магнитными полями и интерфейсами Ламинарного потока. Мультифизические связи также добавляют нагревание и охлаждение равновесной плазмы путем переноса энтальпии, нагрева Джоуля и потери излучения.
topicdescr/multiphysicsfembemrf = [Интерфейс «Электромагнитные волны, FEM-BEM»] Мультифизический интерфейс «Электромагнитные волны, FEM-BEM» позволяет создавать гибридные модели FEM-BEM, где метод граничных элементов (BEM) используется для расчета электрических полей за пределами областей метода конечных элементов (FEM). Этот мультифизический интерфейс добавляет интерфейс «Электромагнитные волны, частотная область» и интерфейс «Электромагнитные волны, граничные элементы». Мультифизическая связь обеспечивает непрерывность тангенциальных электрических и магнитных полей на границах между двумя интерфейсами.\n\nМоделирование в частотной области поддерживается в 2D и 3D.
topicdescr/multiphysicsfembemwo = [Интерфейс «Электромагнитные волны, FEM-BEM»] Мультифизический интерфейс «Электромагнитные волны, FEM-BEM» позволяет создавать гибридные модели FEM-BEM, где метод граничных элементов (BEM) используется для расчета электрических полей за пределами областей метода конечных элементов (FEM). Этот мультифизический интерфейс добавляет интерфейс «Электромагнитные волны, частотная область» и интерфейс «Электромагнитные волны, граничные элементы». Мультифизическая связь обеспечивает непрерывность тангенциальных электрических и магнитных полей на границах между двумя интерфейсами.\n\nМоделирование в частотной области поддерживается в 2D и 3D.
topicdescr/multiphysicsferroelectroelasticity = [Интерфейс ферроэлектроэластичности] Интерфейс мультифизики Ферроэлектроэластичности сочетает в себе твердую механику и электростатику вместе с конститутивными отношениями, необходимыми для моделирования нелинейных сегнетоэлектрических материалов с насыщением поляризацией и возможным гистерезисом. Многие пьезоэлектрические материалы проявляют такое нелинейное ферроэлектроэластичное поведение на больших прикладных электрических полях. Можно моделировать как прямые, так и обратные электростриктивные связи.
topicdescr/multiphysicsfluidmembraneinteraction = [Интерфейс взаимодействия жидкости и мембраны]Мультифизический интерфейс взаимодействия жидкости и мембраны используется для моделирования явлений, при которых жидкость и деформируемая мембрана влияют друг на друга. Интерфейс моделирует как область жидкости, так и границу (структуру) мембраны и включает заранее определенные условия для взаимодействия на границах жидкость-мембрана. Формулировка ALE используется для учета геометрических изменений жидкой области.\n\nЖидкость может быть как сжимаемой, так и несжимаемой. Режим течения может быть ламинарным или турбулентным (при наличии модуля CFD). Граница мембраны имеет те же параметры, что и в интерфейсе мембраны.\n\nИспользуя стационарное или зависящее от времени исследование, интерфейс «Взаимодействие жидкости и мембраны» моделирует двустороннюю связь между мембранами и жидкостями. Однако существуют также специальные этапы исследования, позволяющие моделировать одностороннее взаимодействие жидкости и структуры.
topicdescr/multiphysicsfluidmembraneinteractionfixedgeometry = [Флюидно-мембранное взаимодействие, фиксированный геометрический интерфейс] Взаимодействие жидкости и мембраны, мультифизический интерфейс фиксированной геометрии может использоваться для моделирования явлений, когда жидкость и деформируемая мембранная структура влияют друг на друга. Можно учитывать как загрузку жидкости на структуру, так и передачу структурной скорости к жидкости. Интерфейс моделирует ситуации, когда перемещения мембраны считаются достаточно малыми для того, чтобы геометрия области жидкости рассматривалась как фиксированная во время взаимодействия.
topicdescr/multiphysicsfluidmembraneinteractionfixedgeometrysme = [Флюидно-мембранное взаимодействие, фиксированный геометрический интерфейс] Взаимодействие жидкости и мембраны, мультифизический интерфейс фиксированной геометрии может использоваться для моделирования явлений, когда жидкость и деформируемая мембранная структура влияют друг на друга. Можно учитывать как загрузку жидкости на структуру, так и передачу структурной скорости к жидкости. Интерфейс моделирует ситуации, когда перемещения мембраны считаются достаточно малыми для того, чтобы геометрия области жидкости рассматривалась как фиксированная во время взаимодействия.
topicdescr/multiphysicsfluidmembraneinteractionsme = [Интерфейс взаимодействия жидкости и мембраны]Мультифизический интерфейс взаимодействия жидкости и мембраны используется для моделирования явлений, при которых жидкость и деформируемая мембрана влияют друг на друга. Интерфейс моделирует как область жидкости, так и границу (структуру) мембраны и включает заранее определенные условия для взаимодействия на границах жидкость-мембрана. Формулировка ALE используется для учета геометрических изменений жидкой области.\n\nЖидкость может быть как сжимаемой, так и несжимаемой. Режим течения может быть ламинарным или турбулентным (при наличии модуля CFD). Граница мембраны имеет те же параметры, что и в интерфейсе мембраны.\n\nИспользуя стационарное или зависящее от времени исследование, интерфейс «Взаимодействие жидкости и мембраны» моделирует двустороннюю связь между мембранами и жидкостями. Однако существуют также специальные этапы исследования, позволяющие моделировать одностороннее взаимодействие жидкости и структуры.
topicdescr/multiphysicsfluidmultibodyinteraction = [Интерфейс взаимодействия жидкости и тела] Мультифизический интерфейс взаимодействия жидкости и тела используется для моделирования явлений, когда жидкие и механические части влияют друг на друга. Интерфейс моделирует текучие и твердые области и включает в себя предварительно определенное условие для взаимодействия на границах текучей среды. Формулировка ALE используется для включения геометрических изменений флюидного области.\n\n Жидкость может быть либо сжимаемой, либо несжимаемой. Режим потока может быть ламинарным или турбулентным (при наличии модуля CFD). Твердый область имеет те же параметры, что и в интерфейсе Multibody Dynamics, включая условия контакта, а также нелинейные материалы, если доступен модуль нелинейных структурных материалов.
topicdescr/multiphysicsfluidmultibodyinteractionassembly = [Взаимодействие жидкости с несколькими телами, Интерфейс сборки] Взаимодействие жидкости с несколькими телами, мультифизический интерфейс сборки используется для моделирования явлений, когда жидкие и механические части влияют друг на друга. Интерфейс моделирует текучие и твердые области и включает в себя предварительно определенное условие для взаимодействия на границах текучей среды. Этот интерфейс используется, когда геометрия моделируется как сборка. Формулировка ALE используется для включения геометрических изменений флюидного области.\n\n Жидкость может быть либо сжимаемой, либо несжимаемой. Режим потока может быть ламинарным или турбулентным (при наличии модуля CFD). Твердый область имеет те же параметры, что и в интерфейсе Multibody Dynamics, включая условия контакта, а также нелинейные материалы, если доступен модуль нелинейных структурных материалов.
topicdescr/multiphysicsfluidmultibodyinteractionassemblysme = [Взаимодействие жидкости с несколькими телами, Интерфейс сборки] Взаимодействие жидкости с несколькими телами, мультифизический интерфейс сборки используется для моделирования явлений, когда жидкие и механические части влияют друг на друга. Интерфейс моделирует текучие и твердые области и включает в себя предварительно определенное условие для взаимодействия на границах текучей среды. Этот интерфейс используется, когда геометрия моделируется как сборка. Формулировка ALE используется для включения геометрических изменений флюидного области.\n\n Жидкость может быть либо сжимаемой, либо несжимаемой. Режим потока может быть ламинарным или турбулентным (при наличии модуля CFD). Твердый область имеет те же параметры, что и в интерфейсе Multibody Dynamics, включая условия контакта, а также нелинейные материалы, если доступен модуль нелинейных структурных материалов.
topicdescr/multiphysicsfluidmultibodyinteractionsme = [Интерфейс взаимодействия жидкости и тела] Мультифизический интерфейс взаимодействия жидкости и тела используется для моделирования явлений, когда жидкие и механические части влияют друг на друга. Интерфейс моделирует текучие и твердые области и включает в себя предварительно определенное условие для взаимодействия на границах текучей среды. Формулировка ALE используется для включения геометрических изменений флюидного области.\n\n Жидкость может быть либо сжимаемой, либо несжимаемой. Режим потока может быть ламинарным или турбулентным (при наличии модуля CFD). Твердый область имеет те же параметры, что и в интерфейсе Multibody Dynamics, включая условия контакта, а также нелинейные материалы, если доступен модуль нелинейных структурных материалов.
topicdescr/multiphysicsfluidpipeinteractionfixedgeometry = [Взаимодействие жидкостной трубы, фиксированный геометрический интерфейс] Взаимодействие Жидкости-Трубы, Fixed Geometry мультифизический интерфейс может быть использован для моделирования различных нагрузок потока в системах трубопроводов, передающих жидкость: давление и сопротивление сил, центробежные силы в изогнутых трубах, и нагрузки жидкости на изгибах и соединениях. Интерфейс применим в ситуациях, когда смещения трубы незначительны для потока жидкости. Таким образом, поток и нагрузки на жидкость, оказываемые на трубу, вычисляются с использованием недеформированной геометрии.
topicdescr/multiphysicsfluidpipeinteractionfixedgeometrysme = [Взаимодействие жидкостной трубы, фиксированный геометрический интерфейс] Взаимодействие Жидкости-Трубы, Fixed Geometry мультифизический интерфейс может быть использован для моделирования различных нагрузок потока в системах трубопроводов, передающих жидкость: давление и сопротивление сил, центробежные силы в изогнутых трубах, и нагрузки жидкости на изгибах и соединениях. Интерфейс применим в ситуациях, когда смещения трубы незначительны для потока жидкости. Таким образом, поток и нагрузки на жидкость, оказываемые на трубу, вычисляются с использованием недеформированной геометрии.
topicdescr/multiphysicsfluidshellinteraction = [Интерфейс взаимодействия жидкостной оболочки] Мультифизический интерфейс Fluid–Shell Interaction используется для моделирования явлений, когда жидкость и деформируемая структурная оболочка влияют друг на друга. Интерфейс моделирует как область текучей среды, так и границу оболочки (структуру) и включает предварительно определенное условие для взаимодействия на границах текучей оболочки. Формулировка ALE используется для включения геометрических изменений флюидного области.\n\n Жидкость может быть либо сжимаемой, либо несжимаемой. Режим потока может быть ламинарным или турбулентным (при наличии модуля CFD). Граница оболочки имеет те же параметры, что и в интерфейсе Shell.\n\n Используя стационарное или зависящее от времени исследование, интерфейс Fluid–Shell Interaction модели двусторонней связи между оболочками и жидкостями. Однако существуют также специальные этапы исследования для моделирования одностороннего взаимодействия флюидной структуры.
topicdescr/multiphysicsfluidshellinteractionfixedgeometry = Fluid–Shell Interaction, Fixed Geometry multiphysics interface может использоваться для моделирования явлений, где жидкость и деформируемая структура оболочки влияют друг на друга. Можно учитывать как загрузку жидкости на структуру, так и передачу структурной скорости к жидкости. Интерфейс моделирует ситуации, когда перемещения оболочки считаются достаточно малыми для того, чтобы геометрия области текучей среды рассматривалась как фиксированная во время взаимодействия.
topicdescr/multiphysicsfluidshellinteractionfixedgeometrysme = Fluid–Shell Interaction, Fixed Geometry multiphysics interface может использоваться для моделирования явлений, где жидкость и деформируемая структура оболочки влияют друг на друга. Можно учитывать как загрузку жидкости на структуру, так и передачу структурной скорости к жидкости. Интерфейс моделирует ситуации, когда перемещения оболочки считаются достаточно малыми для того, чтобы геометрия области текучей среды рассматривалась как фиксированная во время взаимодействия.
topicdescr/multiphysicsfluidshellinteractionsme = [Интерфейс взаимодействия жидкостной оболочки] Мультифизический интерфейс Fluid–Shell Interaction используется для моделирования явлений, когда жидкость и деформируемая структурная оболочка влияют друг на друга. Интерфейс моделирует как область текучей среды, так и границу оболочки (структуру) и включает предварительно определенное условие для взаимодействия на границах текучей оболочки. Формулировка ALE используется для включения геометрических изменений флюидного области.\n\n Жидкость может быть либо сжимаемой, либо несжимаемой. Режим потока может быть ламинарным или турбулентным (при наличии модуля CFD). Граница оболочки имеет те же параметры, что и в интерфейсе Shell.\n\n Используя стационарное или зависящее от времени исследование, интерфейс Fluid–Shell Interaction модели двусторонней связи между оболочками и жидкостями. Однако существуют также специальные этапы исследования для моделирования одностороннего взаимодействия флюидной структуры.
topicdescr/multiphysicsfluidsolidinteraction = [Интерфейс взаимодействия с твердой жидкостью] Мультифизический интерфейс Fluid–Solid Interaction используется для моделирования явлений, когда жидкость и деформируемое твердое тело влияют друг на друга. Интерфейс моделирует как флюидный область, так и твердый область (структуру) и включает в себя предварительно определенное условие для взаимодействия на флюидно-твердых границах. Формулировка ALE используется для включения геометрических изменений флюидного области.\n\n Жидкость может быть либо сжимаемой, либо несжимаемой. Режим потока может быть ламинарным или турбулентным (при наличии модуля CFD). Твердый область имеет все функциональные возможности, доступные в интерфейсе механика твердого тела, включая условия контакта, а также нелинейные материалы, если доступен модуль нелинейных структурных материалов или модуль геомеханики.\n\n Используя стационарное или зависящее от времени исследование, интерфейс Fluid–Solid Interaction модели двусторонней связи между твердыми и жидкими веществами. Однако существуют также специальные этапы исследования для моделирования одностороннего взаимодействия флюидной структуры.
topicdescr/multiphysicsfluidsolidinteractionconjugateheattransferlaminar = [Интерфейс «Взаимодействие жидкости и твердого тела, сопряженная теплопередача»] Мультифизический интерфейс «Жидкость–Твердое взаимодействие, сопряженная теплопередача» используется для моделирования явлений, в которых жидкость и деформируемое твердое тело влияют друг на друга в неизотермических условиях. Анализ может быть стационарным или зависящим от времени. Интерфейс моделирует как область неизотермического течения жидкости, так и область твердого тела, где теплопередача и изменения температуры вызывают тепловое расширение. Он также включает в себя заранее заданные условия взаимодействия на границах жидкость-твердое тело. Формулировка движущейся сетки ALE используется для учета геометрических изменений области жидкости.\n\nЖидкость может быть как сжимаемой, так и несжимаемой. Режим течения может быть ламинарным или турбулентным (при наличии модуля CFD). Область твердого тела обладает всеми функциями, доступными в интерфейсе «Механика твердого тела», включая условия контакта, а также нелинейные материалы, если доступен модуль «Нелинейные конструкционные материалы» или модуль «Геомеханика».
topicdescr/multiphysicsfluidsolidinteractionconjugateheattransferlaminarsme = [Интерфейс «Взаимодействие жидкости и твердого тела, сопряженная теплопередача»] Мультифизический интерфейс «Жидкость–Твердое взаимодействие, сопряженная теплопередача» используется для моделирования явлений, в которых жидкость и деформируемое твердое тело влияют друг на друга в неизотермических условиях. Анализ может быть стационарным или зависящим от времени. Интерфейс моделирует как область неизотермического течения жидкости, так и область твердого тела, где теплопередача и изменения температуры вызывают тепловое расширение. Он также включает в себя заранее заданные условия взаимодействия на границах жидкость-твердое тело. Формулировка движущейся сетки ALE используется для учета геометрических изменений области жидкости.\n\nЖидкость может быть как сжимаемой, так и несжимаемой. Режим течения может быть ламинарным или турбулентным (при наличии модуля CFD). Область твердого тела обладает всеми функциями, доступными в интерфейсе «Механика твердого тела», включая условия контакта, а также нелинейные материалы, если доступен модуль «Нелинейные конструкционные материалы» или модуль «Геомеханика».
