topicdescr/generaloptimization = [Интерфейс оптимизации]Интерфейс оптимизации содержит инструменты для определения и решения задач оптимизации. Основная цель интерфейса — его способность решать задачи оптимизации с ограничениями PDE. Используйте его для определения целевых функций и ограничений с точки зрения компонентов управляющей и вспомогательной переменной. Последнее задается как решение дифференциальных уравнений, определенных мультифизической моделью. Затем ограничьте их конкретными областями или сделайте их доступными по всему миру. Эта гибкость отражена в интерфейсе путем группировки этих настроек в соответствии с размером области, к которому они применяются.
topicdescr/genericfc = [Общий интерфейс водородного топливного элемента] Интерфейс общего водородного топливного элемента определяет перенос заряда в фазах электролита и электрода по закону Ома и по умолчанию не включает эффекты массопереноса в газовых смесях.\n\nЭтот интерфейс подходит для моделей топливных элементов, в которых не учитываются эффекты массопереноса (распределение вторичного тока), или при соединении с другими физическими интерфейсами для управления массопереносом.
topicdescr/genericwe = [Общий интерфейс водного электролизера] Интерфейс «Общий водный электролизер» определяет перенос заряда в фазах электролита и электрода по закону Ома и по умолчанию не включает эффекты массопереноса в газовых смесях.\n\nЭтот интерфейс подходит для моделей электролизеров, в которых не учитываются эффекты массопереноса (распределение вторичного тока), или при соединении с другими физическими интерфейсами для управления массопереносом.
topicdescr/geometricaloptics = [Интерфейс геометрической оптики]Интерфейс геометрической оптики используется для моделирования распространения электромагнитных волн, когда длина волны намного меньше наименьшего геометрического объекта в модели. Он включает в себя встроенные инструменты для расчета интенсивности, фазы и длины оптического пути лучей. Лучи могут быть поляризованными, неполяризованными или частично поляризованными. Также поддерживаются частотные распределения и распространение лучей в поглощающих средах.
topicdescr/geomsequence = [Работа с последовательностями геометрии] Узел «Геометрия» содержит все объекты, определяющие последовательность геометрии. Щелкните правой кнопкой мыши, чтобы добавить элемент или построить геометрию.
topicdescr/globalalphabetaphasetransformation = [Фазовое преобразование альфа-бета]Интерфейс фазового преобразования альфа-бета представляет собой специализированную версию интерфейса фазового преобразования металла. Он специализируется на изучении альфа-бета-фазовых превращений при охлаждении и/или нагреве титана. Интерфейс автоматически генерирует несколько металлургических фаз и фазовых превращений, которые могут возникнуть во время термического переходного процесса. \n\nЭволюционирующий состав материала рассчитывается на основе различных фаз. преобразования.\n\nФизический интерфейс поддерживает временной анализ.
topicdescr/globalaustenitedecomposition = [Разложение аустенита]Интерфейс «Разложение аустенита» представляет собой специализированную версию физического интерфейса фазового превращения металла. Интерфейс автоматически генерирует несколько металлургических фаз и фазовых превращений, которые могут возникнуть во время разложения аустенита.\n\nФизический интерфейс поддерживает временной анализ.
topicdescr/globaldefinitions = [Глобальные определения] В ветке «Глобальные определения» вы определяете и собираете параметры, переменные и функции с глобальной областью действия.
topicdescr/globalequations = [Моделирование с помощью ODE и DAE]Интерфейс Global ODEs и DAE используется для добавления глобальных пространственно-независимых уравнений, которые могут представлять дополнительные состояния. Уравнения могут быть ОДУ, алгебраическими уравнениями и ДАУ.
topicdescr/globalmetalphasetransformation = [Металлофазовое превращение]Интерфейс «Металлофазовое превращение» предназначен для анализа фазовых превращений металлов из твердого состояния в твердое. Развивающийся фазовый состав рассчитывается на основе набора диффузионных и/или вытесняющих металлургических фазовых превращений.\n\nФизический интерфейс поддерживает временной анализ.
topicdescr/granularflow = [Интерфейс Granular Flow]Интерфейс Granular Flow используется для выполнения лагранжевого моделирования, в котором зерна твердого материала движутся относительно друг друга. Положение и ориентация каждого зерна отслеживается отдельно. Зерна могут контактировать друг с другом и с поверхностями в геометрии.
topicdescr/hamf = Ветка «Тепло и влажность» содержит различные версии мультифизического интерфейса, моделирующего теплообмен и перенос влаги в воздухе ламинарным или турбулентным потоком. Течение жидкости может быть либо свободным, либо течь в пористой среде.
topicdescr/hamt = [Перенос тепла и влаги] Ветка «Перенос тепла и влаги» содержит различные версии мультифизического интерфейса, который объединяет перенос тепла и влаги в строительных материалах, влажном воздухе и пористых средах.
topicdescr/heatequation = [Классические интерфейсы PDE]Интерфейс уравнения теплопроводности можно использовать для моделирования классического PDE параболического типа, который описывает зависящую от времени и стационарную теплопередачу путем диффузии и других диффузионных процессов. Heat Equation также доступен в качестве узла функции предметной области для всех интерфейсов PDE.
topicdescr/heattransfer = [Интерфейс теплопередачи]Интерфейс «Теплопередача в твердых телах» используется для моделирования теплопередачи посредством проводимости, конвекции и излучения. Твердотельная модель активна по умолчанию во всех областих. Также доступны все функциональные возможности для включения других типов областей, таких как область жидкости. \n\nТемпературное уравнение, определенное в твердых областих, соответствует дифференциальной форме закона Фурье, который может содержать дополнительные вклады, такие как тепло source.\n\nСтационарное, временное и частотное моделирование поддерживается во всех пространственных измерениях.
topicdescr/heattransferinalloys = [Интерфейс «Теплопередача»]Интерфейс «Теплопередача в сплавах» используется для моделирования теплопередачи посредством проводимости, конвекции и излучения. Модель Alloy активна по умолчанию во всех областих. Также доступны все функциональные возможности для включения других типов областей, таких как область твердого тела или жидкости. \n\nТемпературное уравнение, определенное в областих сплава, соответствует дифференциальной форме закона Фурье, который может содержать дополнительные вклады, такие как источники тепла. Оно также включает усреднение свойств материала на основе состава сплава. \n\nСтационарное, временное и частотное моделирование поддерживается во всех пространственных измерениях.
topicdescr/heattransferinfilmslm = [Интерфейс «Теплопередача в пленках»]Интерфейс «Теплопередача в пленках» используется для моделирования теплопередачи за счет проводимости и конвекции в пленках. Модель жидкости активна по умолчанию на всех границах. Также доступны все функциональные возможности для включения других вкладов, таких как твердая, пористая среда или излучение от поверхности к поверхности. \n\nВ зависимости от настройки типа слоя решаемое уравнение температуры соответствует тангенциальному дифференциалу или общей форме уравнения конвекции-диффузии, которое может содержать дополнительные вклады, такие как тепло source.\n\nСтационарное, временное и частотное моделирование поддерживается во всех пространственных измерениях.
topicdescr/heattransferinfilmsls = [Интерфейс «Теплопередача в пленках»]Интерфейс «Теплопередача в пленках» используется для моделирования теплопередачи за счет проводимости и конвекции в пленках. Модель жидкости активна по умолчанию на всех границах. Также доступны все функциональные возможности для включения других вкладов, таких как твердая, пористая среда или излучение от поверхности к поверхности. \n\nВ зависимости от настройки типа слоя решаемое уравнение температуры соответствует тангенциальному дифференциалу или общей форме уравнения конвекции-диффузии, которое может содержать дополнительные вклады, такие как тепло source.\n\nСтационарное, временное и частотное моделирование поддерживается во всех пространственных измерениях.
topicdescr/heattransferinfluids = [Интерфейс теплопередачи]Интерфейс «Теплопередача в жидкостях» используется для моделирования теплопередачи посредством проводимости, конвекции и излучения. Гибкая модель активна по умолчанию во всех областих. Также доступны все функциональные возможности для включения других типов областей, таких как твердый область. \n\nУравнение температуры, определенное в областих жидкости, соответствует уравнению конвекции-диффузии, которое может содержать дополнительные вклады, такие как тепло source.\n\nСтационарное, временное и частотное моделирование поддерживается во всех пространственных измерениях.
topicdescr/heattransferinfractures = [Интерфейс теплопередачи в трещинах]Интерфейс теплопередачи в трещинах используется для моделирования теплопередачи теплопроводностью и конвекцией в тонких пористых структурах. Модель трещины по умолчанию активна на всех границах. Также доступны все возможности для учета других вкладов, например излучения в твердом теле, жидкости или излучения от поверхности к поверхности.\n\nВ зависимости от настройки типа слоя решаемое уравнение температуры соответствует касательной дифференциальной или общей форме уравнения конвекции-диффузии с моделями усреднения термодинамических свойств для учета свойств как твердой матрицы, так и жидкости.\n\nСтационарное моделирование, моделирование во временной области и в частотной области поддерживаются во всех пространственных размерностях.
topicdescr/heattransferinfractureslm = [Интерфейс теплопередачи в трещинах]Интерфейс теплопередачи в трещинах используется для моделирования теплопередачи теплопроводностью и конвекцией в тонких пористых структурах. Модель трещины по умолчанию активна на всех границах. Также доступны все возможности для учета других вкладов, например излучения в твердом теле, жидкости или излучения от поверхности к поверхности.\n\nВ зависимости от настройки типа слоя решаемое уравнение температуры соответствует касательной дифференциальной или общей форме уравнения конвекции-диффузии с моделями усреднения термодинамических свойств для учета свойств как твердой матрицы, так и жидкости.\n\nСтационарное моделирование, моделирование во временной области и в частотной области поддерживаются во всех пространственных размерностях.
topicdescr/heattransferinfracturesls = [Интерфейс теплопередачи в трещинах]Интерфейс теплопередачи в трещинах используется для моделирования теплопередачи теплопроводностью и конвекцией в тонких пористых структурах. Модель трещины по умолчанию активна на всех границах. Также доступны все возможности для учета других вкладов, например излучения в твердом теле, жидкости или излучения от поверхности к поверхности.\n\nВ зависимости от настройки типа слоя решаемое уравнение температуры соответствует касательной дифференциальной или общей форме уравнения конвекции-диффузии с моделями усреднения термодинамических свойств для учета свойств как твердой матрицы, так и жидкости.\n\nСтационарное моделирование, моделирование во временной области и в частотной области поддерживаются во всех пространственных размерностях.
topicdescr/heattransferinpackedbeds = [Теплопередача в интерфейсе упакованных кроватей] Интерфейс теплопередачи в упакованных кроватях используется для имитации теплопередачи в пористой среде, где локальное тепловое равновесие не предполагается между гранулами упакованной кровати и жидкой фазой, и где учитывается изменение температуры внутри гранул. Для каждой фазы, гранул и жидкости пористой среды определяется температурное поле, и учитывается теплообмен между ними. Температурное поле микромасштабных гранул зависит от радиальной координаты каждой гранулы. Функция Porous Medium с многомасштабной локальной тепловой неравновесной моделью активна по умолчанию во всех областих. Все функциональные возможности для включения других типов областей, таких как твердый область, также доступны.\n\n Функция Porous Medium предоставляет варианты для определения интерстициального конвективного коэффициента теплопередачи или непрерывной температуры между жидкостью и внешней поверхностью гранул. Под ним подфункции гранул и жидкости вычисляют температурные поля в гранулах и в жидких фазах соответственно. Любое пограничное или относящееся к области условие может быть применено к жидкой фазе путем добавления соответствующего признака в подфункцию жидкости. Поддерживаются эффекты излучения от поверхности к поверхности, предполагая, что они применяются только к внешней поверхности гранул.\n\nстационарный, моделирование временных и частотных областей поддерживается во всех пространственных измерениях.
topicdescr/heattransferinshellslm = [Интерфейс «Теплопередача в оболочках»]Интерфейс «Теплопередача в оболочках» используется для моделирования теплопередачи за счет проводимости в тонких структурах. Твердотельная модель активна по умолчанию на всех границах. Также доступны все функции для включения других вкладов, таких как жидкость, пористая среда или излучение от поверхности к поверхности. \n\nВ зависимости от настройки типа слоя уравнение температуры, определенное на оболочках, соответствует тангенциальному дифференциалу или общей форме закона Фурье, который может содержать дополнительные вклады, такие как тепло source.\n\nСтационарное, временное и частотное моделирование поддерживается во всех пространственных измерениях.
topicdescr/heattransferinshellsls = [Интерфейс «Теплопередача в оболочках»]Интерфейс «Теплопередача в оболочках» используется для моделирования теплопередачи за счет проводимости в тонких структурах. Твердотельная модель активна по умолчанию на всех границах. Также доступны все функции для включения других вкладов, таких как жидкость, пористая среда или излучение от поверхности к поверхности. \n\nВ зависимости от настройки типа слоя уравнение температуры, определенное на оболочках, соответствует тангенциальному дифференциалу или общей форме закона Фурье, который может содержать дополнительные вклады, такие как тепло source.\n\nСтационарное, временное и частотное моделирование поддерживается во всех пространственных измерениях.
topicdescr/heattransferinsolidsandfluids = [Интерфейс теплопередачи]Интерфейс «Теплопередача в твердых телах и жидкостях» используется для моделирования теплопередачи посредством проводимости, конвекции и излучения. Твердотельная модель активна по умолчанию во всех областих, а жидкостная модель добавляется с пустым выбором. Также доступны все функциональные возможности для включения других типов областей, таких как область жидкости. \n\nТемпературное уравнение, определенное в твердых областих, соответствует дифференциальной форме закона Фурье, который может содержать дополнительные вклады, такие как тепло source.\n\nСтационарное, временное и частотное моделирование поддерживается во всех пространственных измерениях.
topicdescr/heattransferinthinfilms = [Интерфейс «Теплопередача в тонких пленках»]Интерфейс «Теплопередача в тонких пленках» используется для моделирования теплопередачи посредством проводимости, конвекции и излучения в тонких жидкостных структурах. Модель «Тонкая пленка» активна по умолчанию на всех границах. Также доступны все функциональные возможности для включения других граничных вкладов, таких как проводящий слой, трещина или излучение от поверхности к поверхности. \n\nТемпературное уравнение, определенное на тонких пленках, соответствует тангенциальной дифференциальной форме конвекции-диффузии, которая может содержать дополнительные вклады, такие как тепло source.\n\nСтационарное, временное и частотное моделирование поддерживается во всех пространственных измерениях.
topicdescr/heattransferinthinshells = [Интерфейс «Теплопередача в тонких оболочках»Интерфейс «Теплопередача в тонких оболочках» используется для моделирования теплопередачи за счет проводимости и излучения в тонких структурах. Модель тонкого проводящего слоя активна по умолчанию на всех границах. Также доступны все функции для учета других граничных вкладов, таких как излучение от поверхности к поверхности. \n\nТемпературное уравнение, определенное на оболочках, соответствует тангенциальной дифференциальной форме закона Фурье, которая может содержать дополнительные вклады, такие как тепло source.\n\nСтационарное, временное и частотное моделирование поддерживается во всех пространственных измерениях.
topicdescr/heattransferpipes = [Интерфейс «Теплопередача в трубах»]Интерфейс «Теплопередача в трубах» используется для моделирования теплопередачи путем проводимости и конвекции в трубах и каналах различной формы, где априорно известны скорость и давление жидкости. Он предоставляет 1D-модели для определения профиля потока в трубе и профилей температуры на сегментах кривых или линиях. Эти линии могут быть нарисованы в 2D или 3D и представляют собой упрощенную форму полых трубок. Теплопередача стен, включая многослойные стены и облицовку, включена в качестве опции. \n\nТемпературное уравнение соответствует одномерному уравнению конвекции-диффузии, которое может содержать дополнительные вклады, такие как тепло source.\n\nИнтерфейс «Неизотермический поток в трубе» расширяет этот физический интерфейс, предоставляя уравнения для расчета полей скорости и давления, когда они неизвестны.
topicdescr/heattransferwithsurfacetosurface = [Интерфейс «Теплопередача с излучением поверхность-поверхность»]Интерфейс «Теплопередача с излучением поверхность-поверхность» используется для моделирования теплопередачи посредством проводимости, конвекции и излучения, включая излучение от поверхности к поверхности. Опция излучения интерфейса теплопередачи включена. Также доступны все функциональные возможности для включения других моделей теплопередачи, таких как жидкость. \n\nУравнение излучательности, определенное на границах, где включено излучение от поверхности к поверхности, соответствует методу излучательности уравнение.\n\nСтационарное моделирование, моделирование во временной и частотной области поддерживается во всех пространственных измерениях.
topicdescr/heavyspecies = [Интерфейс переноса тяжелых веществ]Интерфейс переноса тяжелых веществ добавляет в плазменные модели реакции электронного удара, реакции газовой фазы, а также реакции частиц и поверхности.
topicdescr/heavyspeciestransport = [Интерфейс переноса тяжелых частиц]Интерфейс переноса тяжелых веществ используется для расчета массовой доли тяжелых частиц в плазменных моделях. Движущими силами переноса могут быть диффузия с использованием модели, усредненной по смеси, или закона Фика, конвекция и миграция. Этот интерфейс позволяет проводить реакции электронного удара, газофазные реакции и поверхностные реакции.
topicdescr/helmholtzequation = [Классические интерфейсы УЧП] Интерфейс «Уравнение Гельмгольца» можно использовать для моделирования классического УЧП эллиптического типа, который может представлять, например, независимую от времени форму волнового уравнения. Уравнение Гельмгольца также доступно в качестве узла функции предметной области для всех интерфейсов PDE.
topicdescr/hermitianbeam = [Интерфейс Beam]Интерфейс Beam используется для моделирования тонких конструктивных элементов, имеющих значительную жесткость на изгиб. Балки можно моделировать по 2D-границам и 3D-кромкам. Используются двухузловые элементы с эрмитовой формулировкой, и можно анализировать либо тонкие (теория Эйлера-Бернулли), либо толстые (теория Тимошенко) балки. При геометрически нелинейном анализе допускаются большие смещения и повороты, но предполагается, что локальная кривизна и деформации малы. Среди результатов расчета - смещения, вращения, напряжения, деформации и силы сечения.\n\nВ дополнение к явному указанию свойств балки в терминах геометрических величин, таких как площадь и момент инерции, доступно несколько предопределенных общих типов поперечного сечения. Также можно напрямую ввести жесткостные свойства поперечного сечения.
topicdescr/highmachnumberflow = [Интерфейс «Поток с высоким числом Маха, ламинарный поток»] Интерфейс «Поток с высоким числом Маха, ламинарный» используется для моделирования потоков газа с низким и умеренным числом Рейнольдса, где величина скорости сравнима со скоростью звука, то есть ламинарные потоки в околозвуковом и сверхзвуковом диапазоне. Это состояние часто связано с очень низким давлением.\n\nФизический интерфейс решает вопрос сохранения энергии, массы и импульса. Физический интерфейс также поддерживает теплообмен в твердых телах, а также излучение между поверхностями.
topicdescr/highmachnumberflowturbulentkeps = [Интерфейс «Поток с высоким числом Маха, турбулентный поток, k-ε»]Интерфейс «Поток с высоким числом Маха», k-ε используется для моделирования газовых течений при высоких числах Рейнольдса, где величина скорости сравнима со скоростью звука, то есть турбулентных течений в трансзвуковом и сверхзвуковом режимах. range.\n\nФизический интерфейс решает задачу сохранения энергии, массы и импульса. Эффекты турбулентности моделируются с использованием стандартной модели с двумя уравнениями k-ε с ограничениями реализуемости. Поток и теплопередача вблизи стен моделируются с использованием стеновых функций. Физический интерфейс также поддерживает теплообмен в твердых телах, а также излучение между поверхностями. 
topicdescr/highmachnumberflowturbulentspalartallmaras = [Поток с высоким числом Маха, турбулентный поток, интерфейс Спаларта-Алмараса] Интерфейс Спаларта-Алмараса с высоким числом Маха, используется для моделирования газовых течений с высоким числом Рейнольдса, где величина скорости сравнима со скоростью звука, то есть турбулентных течений в околозвуковом и сверхзвуковом пространстве. range.\n\nФизический интерфейс решает задачу сохранения энергии, массы и импульса. Эффекты турбулентности моделируются с использованием модели турбулентности Спаларта-Аллмараса с одним уравнением. Модель Спаларта-Аллмараса представляет собой так называемую модель с низким числом Рейнольдса, что означает, что она может разрешать поля скорости, давления и температуры вплоть до стенки. Модель Spalart-Allmaras зависит от расстояния до ближайшей стены. Поэтому физический интерфейс включает уравнение расстояния до стены. Он также поддерживает теплообмен в твердых телах, а также излучение от поверхности к поверхности. 
