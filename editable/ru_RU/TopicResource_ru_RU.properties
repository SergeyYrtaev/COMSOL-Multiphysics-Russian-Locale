topicdescr/multiphysicsmixturemodelsa = [Модель фазовой транспортной смеси, интерфейс Spalart-Allmaras]Турбулентный поток фазовой транспортной смеси, мультифизический интерфейс Spalart-Allmaras используется для моделирования связи между фазовым транспортом и потоком жидкости.\n\n Он сочетает в себе интерфейсы Phase Transport и турбулентное течение, Spalart-Allmaras. Мультифизическая связь Mixture Model добавляется автоматически. Он соединяет интерфейсы фазового транспорта и потока и предоставляет варианты для различных моделей вязкости смеси и скорости скольжения. Физический интерфейс поддерживает низкие числа Маха (обычно менее 0,3).\n\nстационарный modeling и моделирование временных областей поддерживаются в 2D, 2D аксисимметрии и 3D геометрии.
topicdescr/multiphysicsmixturemodelsst = [The Phase Transport Mixture Model, SST Interface] Фазовая транспортная смесь Модель турбулентного потока, мультифизический интерфейс SST используется для имитации связи между фазовым транспортом и потоком жидкости.\n\n Он объединяет интерфейсы Phase Transport и турбулентное течение, SST. Мультифизическая связь Mixture Model добавляется автоматически. Он соединяет интерфейсы фазового транспорта и потока и предоставляет варианты для различных моделей вязкости смеси и скорости скольжения. Физический интерфейс поддерживает низкие числа Маха (обычно менее 0,3).\n\nстационарный modeling и моделирование временных областей поддерживаются в 2D, 2D аксисимметрии и 3D геометрии.
topicdescr/multiphysicsmixturemodelv2f = [The Phase Transport Mixture Model, v2-f Interface]The Phase Transport Mixture Model турбулентное течение, v2-f multiphysics interface is used to simulate the coupling between phase transport and fluid flow.\n\n Он сочетает в себе фазовый транспорт и турбулентный поток, интерфейсы v2-f. Мультифизическая связь Mixture Model добавляется автоматически. Он соединяет интерфейсы фазового транспорта и потока и предоставляет варианты для различных моделей вязкости смеси и скорости скольжения. Физический интерфейс поддерживает низкие числа Маха (обычно менее 0,3).\n\nстационарный modeling и моделирование временных областей поддерживаются в 2D, 2D аксисимметрии и 3D геометрии.
topicdescr/multiphysicsmoistureflow = [Влажный поток, интерфейс ламинарного потока] Многофизический интерфейс Laminar Moisture Flow используется для имитации связи между переносом влаги в воздухе и потоком жидкости. Поток жидкости может быть либо свободным потоком, либо потоком в пористой среде.\n\n Он сочетает в себе интерфейсы влажного транспорта в воздухе и ламинарного потока. Мультифизическая связь потока влаги автоматически добавляется. Он соединяет интерфейсы транспортировки влаги и потока жидкости. Свойства жидкости могут зависеть от концентрации пара. Модели также могут включать транспорт влаги в строительных материалах. Физический интерфейс поддерживает низкие числа Маха (обычно менее 0,3).\n\nстационарный и моделирование временных областей поддерживаются в 2D, 2D аксисимметрии и 3D геометрии.
topicdescr/multiphysicsmoistureflowbrinkman = [Интерфейс Moisture Flow, Brinkman Equations] Мультифизический интерфейс Moisture Flow, Brinkman Equations используется для моделирования связи между переносом влаги в пористых средах и потоком жидкости с помощью уравнений Бринкмана.\n\nОн сочетает в себе интерфейсы «Перенос влаги в пористых средах» и «Уравнения Бринкмана». Мультифизическая связь Moisture Flow добавляется автоматически, связывая интерфейсы переноса влаги и потока жидкости. Транспортные свойства могут зависеть от концентрации паров в воздухе. Модели также могут учитывать перенос влаги в строительных материалах.\n\nСтационарное моделирование и моделирование во временной области поддерживаются в 2D, 2D осесимметричной и 3D геометрии.
topicdescr/multiphysicsmoistureflowturbulentalgebraicyplus = (перенаправлено с «Algebraic yPlus Interface») Многофизический интерфейс Turbulent Moisture Flow, Algebraic yPlus используется для имитации связи между переносом влаги в воздухе и турбулентным потоком жидкости.\n\n Он сочетает в себе влажный транспорт в воздухе и турбулентный поток, интерфейсы Algebraic yPlus. Мультифизическая связь потока влаги автоматически добавляется. Он соединяет интерфейсы транспортировки влаги и потока жидкости. Свойства жидкости могут зависеть от концентрации пара. Модели также могут включать транспорт влаги в строительных материалах. Физический интерфейс поддерживает низкие числа Маха (обычно менее 0,3).\n\nстационарный и моделирование временных областей поддерживаются в 2D, 2D аксисимметрии и 3D геометрии.
topicdescr/multiphysicsmoistureflowturbulentkeps = [Турбулентный поток, k-ε Интерфейс]Турбулентный поток влаги, k-ε мультифизический интерфейс используется для моделирования связи между переносом влаги в воздухе и турбулентным потоком жидкости.\n\n Он сочетает в себе влажный транспорт в воздухе и турбулентный поток, k-ε интерфейсы. Мультифизическая связь потока влаги автоматически добавляется. Он соединяет интерфейсы транспортировки влаги и потока жидкости. Свойства жидкости могут зависеть от концентрации пара. Модели также могут включать транспорт влаги в строительных материалах. Физический интерфейс поддерживает низкие числа Маха (обычно менее 0,3).\n\nстационарный и моделирование временных областей поддерживаются в 2D, 2D аксисимметрии и 3D геометрии.
