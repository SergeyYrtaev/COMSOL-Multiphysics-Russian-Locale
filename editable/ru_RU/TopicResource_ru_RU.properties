topicdescr_physics/grating = [Решетка]Создает дифракционную решетку. Добавьте к решетке подузлы «Порядок дифракции», чтобы выпускать лучи в указанных порядках дифракции.
topicdescr_physics/gravity = [Гравитация] Сила гравитационного объема.
topicdescr_physics/gravityacceleration = [Гравитация]Гравитационная нагрузка для строительной механики.
topicdescr_physics/grille = [Решетка]Падение давления на входе или выходе из-за решетки.
topicdescr_physics/ground = [Земля]Нулевой электрический потенциал на границе. Также применимо на границах, относительно которых электрический потенциал антисимметричен.
