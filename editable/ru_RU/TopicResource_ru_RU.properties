topicdescr_physics/freeporouselectrodecoupling = [Соединение пористого электрода] Добавляет молярный источник в доменах, которые связаны с функциями реакции пористого электрода.
topicdescr_physics/freeporousreactioncoefficients = [Коэффициенты реакции] Определите молярные потоки и источники на основе плотностей электродного тока.
topicdescr_physics/freesurface = [Свободная поверхность] Граница свободной поверхности, отделяющая внутреннюю моделируемую жидкость от внешней жидкости. Используется в интерфейсах вращающихся машин.
topicdescr_physics/freesurfacedomain = [Область свободной поверхности] Область потока жидкости, включающая одну или несколько свободных поверхностей. Используется в интерфейсах вращающихся машин.
topicdescr_physics/frequencyacousticaxisource = [Источник линии на оси]Источник линии на оси симметрии.
topicdescr_physics/frequencyacousticcircularsource = [Круговой источник] Внеосевой круглый источник (2D-осевая симметрия).
