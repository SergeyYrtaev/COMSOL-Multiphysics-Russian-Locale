topicdescr/multiphysicsconjugateheattransferturbulentrkeps = [Турбулентный поток, реализуемый интерфейс k-ε]Мультифизический интерфейс «Сопряженная теплопередача, турбулентный поток, реализуемый» k-ε используется для моделирования взаимодействия между теплообменом и жидкостью. flow.\n\nОн сочетает в себе теплообмен в твердых телах и жидкостях и турбулентный поток, реализуемые k-ε интерфейсы. Мультифизическая связь «Неизотермический поток» добавляется автоматически. Он объединяет интерфейсы теплопередачи и потока и предоставляет возможность включить в модель нагрев потока. Свойства жидкости могут зависеть от температуры. Модели также могут включать теплообмен в твердых телах, а также излучение от поверхности к поверхности и излучение в участвующих средах с помощью модуля теплопередачи. Физический интерфейс поддерживает низкие числа Маха (обычно менее 0,3). В интерфейсе турбулентное течение, Realizable k-ε узел Fluid Properties активен по умолчанию для всех выбранных интерфейсов. Выбор области интерфейса потока можно редактировать, если модель содержит твердотельные области. \n\nСтационарное моделирование и моделирование во временной области поддерживаются в 2D, 2D осесимметричной и 3D геометрии.
