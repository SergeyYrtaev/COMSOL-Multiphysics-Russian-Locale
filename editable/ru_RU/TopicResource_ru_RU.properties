topicdescr/weakformpointpde = [Интерфейсы УЧП слабой формы]Интерфейс УЧП слабой формы обеспечивает гибкий интерфейс для задания и решения УЧП в слабой форме в точках.
topicdescr/weakformpointpde{1axi} = ${topicdescr/weakformpointpde}\n\nПримечание. Интерфейс Weak Form Point PDE никоим образом не учитывает осевую симметрию геометрии; направление r рассматривается как одномерная линия. 
topicdescr/weakformpointpde{axi} = ${topicdescr/weakformpointpde}\n\nПримечание. Интерфейс Weak Form Point PDE никоим образом не учитывает осевую симметрию геометрии; Плоскость rz рассматривается как плоская двумерная геометрия. 
topicdescr/wire = [Интерфейс Wire]Интерфейс Wire используется для моделирования растяжимых структурных элементов. Основное применение — анализ провисания проводов и кабелей под действием силы тяжести или внешних нагрузок. Он доступен в 3D и 2D. Учтена геометрическая нелинейность.
topicdescr/woptics = [Отрасль оптики]Интерфейсы волновой оптики используются для расчета электрических и магнитных полей для систем, длина волны которых сравнима или намного меньше длины волны исследуемого устройства или системы.\n\nЭти интерфейсы могут использоваться для гармонического и переходного электромагнитного моделирования нанооптических и плазмонных устройств, волноводов и волокон, оптического рассеяния явления и нелинейная оптика.

