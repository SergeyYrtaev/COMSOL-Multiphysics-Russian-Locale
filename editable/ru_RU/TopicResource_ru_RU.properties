topicdescr_evaluationGroup/avsurface = Вычислите среднее значение по поверхности.
topicdescr_evaluationGroup/avvolume = Вычислите средний объем.
topicdescr_evaluationGroup/evalaberration = Вычислите список коэффициентов Цернике для полиномов Цернике, которые соответствуют различным типам монохроматической аберрации.
topicdescr_evaluationGroup/evalglobal = Оцените глобальные количества.
topicdescr_evaluationGroup/evalglobalmatrix = Оцените глобальные матричные величины.
topicdescr_evaluationGroup/evalglobalsweep = Оцените глобальные величины с помощью параметрического анализа.
topicdescr_evaluationGroup/evalpoint = Оцените количество в баллах.
topicdescr_evaluationGroup/evalpointmatrix = Оцените величины матрицы в некоторых точках.
topicdescr_evaluationGroup/evaluationgroup = Создайте группу оценки, которая соберет несколько узлов числовой оценки.
topicdescr_evaluationGroup/intline = Вычислите линейный интеграл.
topicdescr_evaluationGroup/intsurface = Вычислите поверхностный интеграл.
topicdescr_evaluationGroup/intvolume = Вычислите объемный интеграл.
topicdescr_evaluationGroup/measuredistance = Вычислите расстояние между двумя точками.
topicdescr_evaluationGroup/measureline = Вычислить длину линии.
topicdescr_evaluationGroup/measuresurface = Вычислите площадь поверхности.
topicdescr_evaluationGroup/measurevolume = Вычислите объем области.
topicdescr_evaluationGroup/maxline = Вычислите максимум по прямой.
topicdescr_evaluationGroup/maxsurface = Вычислите максимум по поверхности.
topicdescr_evaluationGroup/maxvolume = Вычислите максимум по объему.
topicdescr_evaluationGroup/minline = Вычислите минимум по прямой.
topicdescr_evaluationGroup/minsurface = Вычислите минимум по поверхности.
topicdescr_evaluationGroup/minvolume = Вычислите минимум по объему.
