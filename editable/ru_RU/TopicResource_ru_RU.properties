topicdescr/multiphysicsconjugateheattransferturbulentv2f = [Интерфейс Турбулентный поток, v2-f] Мультифизический интерфейс «Сопряженная теплопередача, Турбулентный поток, v2-f» используется для моделирования связи между теплопередачей и потоком жидкости. \n\nОн сочетает в себе интерфейсы «Теплоперенос в твердых телах и жидкостях» и «Турбулентный поток», v2-f. Мультифизическая связь «Неизотермический поток» добавляется автоматически. Он объединяет интерфейсы теплопередачи и потока и предоставляет возможность включить в модель нагрев потока. Свойства жидкости могут зависеть от температуры. Модели также могут включать теплообмен в твердых телах, а также излучение от поверхности к поверхности и излучение в участвующих средах с помощью модуля теплопередачи. Физический интерфейс поддерживает низкие числа Маха (обычно менее 0,3). В интерфейсе турбулентное течение, v2-f узел Fluid Properties активен по умолчанию для всех выбранных интерфейсов. Выбор области интерфейса потока можно редактировать, если модель содержит твердотельные области. \n\nСтационарное моделирование и моделирование во временной области поддерживаются в 2D, 2D осесимметричной и 3D геометрии.
topicdescr/multiphysicscoronadischarge = [Интерфейс коронного разряда] Интерфейс коронного разряда использует упрощенную модель переноса заряда в сочетании с электростатикой, чтобы обеспечить приблизительный метод расчета плотности заряда и электростатического поля при коронном разряде.
topicdescr/multiphysicscorrosionprimary  = [Коррозия, первичный интерфейс] Интерфейс «Коррозия, первичный» описывает распределение тока, распределение потенциала и геометрические изменения в коррозионной ячейке в предположении, что изменения состава электролита незначительны, а перенапряжения активации электродных реакций пренебрежимо малы. Он сочетает в себе интерфейсы «Распределение первичного тока» и «Деформированная геометрия».
topicdescr/multiphysicscorrosionprimarydeformedgeometry  = [Коррозия, первичный интерфейс] Интерфейс «Коррозия, первичный» описывает распределение тока, распределение потенциала и геометрические изменения в коррозионной ячейке в предположении, что изменения состава электролита незначительны, а перенапряжения активации электродных реакций пренебрежимо малы. Он сочетает в себе интерфейс первичного распределения тока с формулировкой деформированной геометрии.
topicdescr/multiphysicscorrosionsecondary = [Коррозия, вторичный интерфейс] Интерфейс «Коррозия, вторичный» описывает распределение тока, распределение потенциала и геометрические изменения в коррозионной ячейке при предположении, что изменения в составе электролита незначительны. Он сочетает в себе интерфейсы «Распределение вторичного тока» и «Деформированная геометрия». \n\nДобавьте дополнительные интерфейсы переноса химических веществ для описания зависимого от концентрации (третичного) распределения тока.
topicdescr/multiphysicscorrosionsecondarydeformedgeometry = Коррозия, вторичный интерфейс Вторичный интерфейс описывает распределение тока, потенциальное распределение и геометрические изменения в коррозионной ячейке при предположении, что изменения в составе электролита незначительны. Он сочетает в себе интерфейс вторичного распределения тока с формулой деформированной геометрии.\n\n Добавить дополнительные интерфейсы переноса химических видов для описания зависимых от концентрации (третичных) распределения тока.
topicdescr/multiphysicscorrosiontertiarynp = [Интерфейс третичного нернст-планка] Коррозия, третичная с интерфейсом электронейтральности описывает текущее распределение, потенциальное распределение и геометрические изменения в коррозионной ячейке с учетом переноса заряженных видов (ионов) в электролите. Он сочетает в себе третичное распределение тока, Nernst-Planck и интерфейсы деформированной геометрии.\n\nТранспорт заряженных и нейтральных видов описывается диффузией, миграцией и конвекцией. Обратите внимание, что вариант сохранения заряда электронейтральности требует, чтобы все основные несущие ток ионы были включены в модель.\n\nИспользовать этот физический интерфейс для моделирования геометрических изменений в коррозионных клетках со значительными градиентами концентрации несущих ток видов (ионов).
