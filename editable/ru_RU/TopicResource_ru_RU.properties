topicdescr/multiphysicscorrosiontertiarysupportingelectrolyte = [Коррозия, третичная с поддержкой электролитного интерфейса] Коррозия, третичная с поддерживающим интерфейсом электролита описывает текущее распределение, потенциальное распределение и геометрические изменения в коррозионной ячейке с учетом переноса заряженных видов (ионов) в электролите. Он сочетает в себе третичное распределение тока, Nernst-Planck и интерфейсы деформированной геометрии.\n\nТранспорт заряженных и нейтральных видов описывается диффузией, миграцией и конвекцией. Заметим, что вариант сохранения заряда поддерживающего электролита предполагает, что градиенты концентрации ионов, несущих заряд, малы, поэтому для определения потенциального падения электролита можно использовать объемную проводимость.\n\nИспользовать этот физический интерфейс для моделирования геометрических изменений в коррозионных клетках с поддерживающими электролитами.
topicdescr/multiphysicscorrosiontertiarysupportingelectrolytedeformedgeometry = [Коррозия, третичная с поддержкой электролитного интерфейса] Коррозия, третичная с поддерживающим интерфейсом электролита описывает текущее распределение, потенциальное распределение и геометрические изменения в коррозионной ячейке с учетом переноса заряженных видов (ионов) в электролите. Он сочетает в себе третичное распределение тока, интерфейс Nernst-Planck с формулой деформированной геометрии.\n\nТранспорт заряженных и нейтральных видов описывается диффузией, миграцией и конвекцией. Заметим, что вариант сохранения заряда поддерживающего электролита предполагает, что градиенты концентрации ионов, несущих заряд, малы, поэтому для определения потенциального падения электролита можно использовать объемную проводимость.\n\nИспользовать этот физический интерфейс для моделирования геометрических изменений в коррозионных клетках с поддерживающими электролитами.
topicdescr/multiphysicsdispersedtwophaseflowdilutedspecieslaminar = [Разбросанный двухфазный поток с переносом видов] Ламинарная версия потока рассеянного двухфазного потока с мультифизическим интерфейсом переноса видов используется для имитации двухфазного потока в ламинарном режиме, связанного с переносом химических видов в жидкой фазе и дисперсной фазе, состоящей из пузырьков или капель.\n\n Он сочетает в себе интерфейс ламинарное течение модели смесей с интерфейсом Continuous Phase Transport of Diluted Species и интерфейсом Dispersed Phase Transport of Diluted Species. Автоматически добавляемый рассеянный двухфазный поток, разбавленный вид мультифизического узла соединяет двухфазный поток жидкости с массовым транспортом в каждой фазе. Помимо транспортировки на каждом этапе поддерживается также передача видов между фазами (решительная добыча).\n\n Интерфейс может использоваться для стационарного и зависящего от времени анализа в 2D, 2D аксисимметрии и 3D геометрии.
topicdescr/multiphysicsdispersedtwophaseflowdilutedspecieskeps = [Dispersed Two-Phase Flow with Species Transport] Версия дисперсного двухфазного потока с мультифизическим интерфейсом Species Transport используется для имитации двухфазного потока в турбулентном режиме, связанного с переносом химических видов в жидкой фазе и дисперсной фазе, состоящей из пузырьков или капель.\n\n Он сочетает в себе модель смесей, интерфейс k-ε, с интерфейсом непрерывной фазы транспортировки разбавленных видов и интерфейсом дисперсной фазы транспортировки разбавленных видов. Автоматически добавляемый рассеянный двухфазный поток, разбавленный вид мультифизического узла соединяет двухфазный поток жидкости с массовым транспортом в каждой фазе. Помимо транспортировки на каждом этапе, также поддерживается перенос видов между фазами (решительная добыча).\n\n Интерфейс может использоваться для стационарного и зависящего от времени анализа в 2D, 2D аксисимметрии и 3D геометрии.
