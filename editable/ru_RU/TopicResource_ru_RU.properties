topicdescr_physics/h2gaselectrolytecompartment = [Отделение газа-электролита H2] Устанавливает свойства области отделения газа-электролита H2 в электролизере на основе жидкого электролита.
topicdescr_physics/h2gasphase = [Газовая фаза H2]Уравнения переноса газовой фазы H2.
topicdescr_physics/h2inlet = [H2 Inlet]Входной тип и граничные условия потока жидкости для газофазной смеси H2.
