topicdescr_physics/exteriorboundaryselection = [Выбор внешней границы]Выбор границы, обращенной в бесконечность.
topicdescr_physics/exteriorfieldcalculation = [Расчет внешнего поля] Граница расчета внешнего поля, окружающая все излучающие и рассеивающие объекты.
topicdescr_physics/exterioropacity = [Непрозрачность]Определяет направление излучения от поверхности к поверхности на границах.
topicdescr_physics/exteriorpressureacousticsmodel = [Акустика давления]Модель материала акустики давления.
topicdescr_physics/exteriorshell = [Внешняя оболочка]Внешняя оболочка.
topicdescr_physics/externalcurrentdensity = [Плотность внешнего тока]Условие для плотности внешнего тока в области.
topicdescr_physics/externaldepositingelectrode = [Внешний осаждающий электрод] Граница между электролитом и электродом, где электрод не моделируется как область. Добавляет зависимые переменные для видов-депонентов.
topicdescr_physics/externalelectrodesurface = [Поверхность электрода]Поверхность электрода, расположенная на внешней границе области электролита.
topicdescr_physics/externalfilmresistance = [Внешнее сопротивление пленки] Определяет сопротивление внешней пленки, основанное на принудительной или естественной конвекции для функции теплопередачи стены.
topicdescr_physics/externalfluidinterface = [Внешний интерфейс жидкости]Определяет начальное положение внешнего интерфейса жидкости (интерфейса, где вязкостью жидкости можно пренебречь).
topicdescr_physics/externalmagneticfield = [Внешнее магнитное поле] Устанавливает общее тангенциальное магнитное поле, равное внешнему фоновому магнитному полю или, что то же самое, уменьшенному тангенциальному магнитному полю до нуля.
topicdescr_physics/externalmagneticfluxdensity = [Плотность внешнего магнитного потока] Устанавливает общую плотность нормального магнитного потока, равную внешней фоновой плотности магнитного потока или, что то же самое, уменьшенной нормальной плотности магнитного потока, равной нулю.
topicdescr_physics/externalmagneticvectorpotential = [Внешний векторный магнитный потенциал] Устанавливает общий тангенциальный векторный магнитный потенциал равным внешне приложенному фоновому потенциалу или, что то же самое, уменьшенному тангенциальному векторному магнитному потенциалу равным нулю.
topicdescr_physics/externalmaterial = [Внешний материал]Внешняя модель материала, ссылающаяся на внешне скомпилированный код.
topicdescr_physics/externalpropertypackage = [Внешний пакет свойств] Импортированный пакет свойств термодинамики от внешнего поставщика.
topicdescr_physics/externalradiationsource = [Внешний источник излучения]Внешний источник радиационного тепла.
topicdescr_physics/externalshort = [Внешнее короткое замыкание]Граничное условие для соединения двух границ через внешний резистор.
topicdescr_physics/externalslipwall = [Внешняя скользящая стена]Скольжение по внешним границам из-за эффектов разрежения.
topicdescr_physics/externalsource = [Внешний источник]Двухконтактный компонент с внешним источником, задающим смещение на обоих концах.
topicdescr_physics/externalstrain = [Внешняя деформация]Вклад внешней деформации в модели материалов механики конструкций.
topicdescr_physics/externalstress = [Внешнее напряжение]Вклад внешнего напряжения в моделях материалов механики конструкций.
