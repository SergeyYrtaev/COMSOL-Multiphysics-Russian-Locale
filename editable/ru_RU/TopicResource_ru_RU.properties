topicdescr/multiphysicsrotatingmachinerytwophaseflowphasefieldalgebraicyplus = [Вращающаяся машина, турбулентный двухфазный поток, фазовое поле, алгебраический интерфейс yPlus] Вращающаяся машина, турбулентный двухфазный поток, фазовое поле, мультифизический интерфейс алгебраического yPlus используется для отслеживания интерфейса между двумя несмешивающимися жидкостями в геометрии с одной или несколькими вращающимися частями. Поток считается турбулентным, то есть число Рейнольдса велико. \n\nМультифизический интерфейс сочетает в себе турбулентный поток, алгебраический yPlus и фазовое поле в интерфейсах жидкостей, и автоматически добавляется двухфазная мультифизическая связь Фазового поля. Вращающийся область добавляется в Moving Сетка. Интерфейс турбулентное течение, Algebraic yPlus решает уравнения Навье-Стокса для сохранения импульса и уравнения непрерывности для сохранения массы. Эффекты турбулентности включаются с использованием модели повышенной вязкости, основанной на расстоянии локальной стены. Следовательно, физический интерфейс включает уравнение расстояния до стены. Положение интерфейса отслеживается путем решения двух дополнительных транспортных уравнений, одно для переменной фазового поля и одно для плотности смешивания энергии. Движение поверхности определяется минимизацией свободной энергии.\n\nСимуляции с использованием вращающейся машины, турбулентного двухфазного потока, поля фазы, алгебраического интерфейса yPlus всегда зависят от времени, поскольку положение интерфейса почти всегда зависит от его истории. Вращение достигается за счет движущейся функциональности сетки, также известной как скользящая сетка.
