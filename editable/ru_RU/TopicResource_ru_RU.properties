topicdescr_physics/externalsurfacechargeaccumulation = [Накопление внешнего поверхностного заряда]Накопление поверхностных зарядов на внешней границе.
topicdescr_physics/externaltemperature = [Внешняя температура]Заданная температура на внешней стороне тонкого слоя или тонкой пленки.
topicdescr_physics/externalterminal = [Внешний терминал]Одноконтактное подключение к физическому интерфейсу теплопередачи, действующему как заданный температурный узел.
topicdescr_physics/extfan = [Fan]Веерные граничные условия для внешних границ.
topicdescr_physics/faceload = [Торцевая нагрузка]Механическая торцевая нагрузка на оболочку или пластину.
topicdescr_physics/fallbackconvectiveoutflow = [Отток]Граничное условие оттока.
topicdescr_physics/fallbackextfan = [Fan]Веерные граничные условия для внешних границ. Применяется к частям границ, где выбор родительской пары не соответствует.
topicdescr_physics/fallbackgrille = [Решетка]Падение давления на входе или выходе из-за решетки. Применяется к частям границ, где выбор родительской пары не соответствует.
topicdescr_physics/fallbackinflow = [Приток] Определяет условия поступления жидкости на входе. 
