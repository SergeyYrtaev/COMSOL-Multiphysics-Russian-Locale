topicdescr/multiphysicsnonisothermalmixturemodel = [Неизотермическая модель смеси, интерфейс ламинарного потока] Неизотермальная модель смеси, мультифизический интерфейс ламинарное течение используется для имитации связи между теплообменом и потоком жидкости смесей.\n\n Он сочетает в себе интерфейсы ламинарное течение, Phase Transport и теплопередача. Автоматически добавляются три мультифизические связи: неизотермический поток, модель смеси и модель неизотермической смеси. Неизотермический поток соединяет интерфейсы теплопередачи и потока и предоставляет варианты для включения нагрева потока в модель. Мультифизическое соединение Mixture Model соединяет интерфейсы фазового транспорта и ламинарного потока и предоставляет варианты для различных моделей вязкости смеси и скорости скольжения. Модель неизотермической смеси соединяет фазовый транспорт и теплообмен для определения теплообменных свойств смеси. Модели также могут включать теплопередачу в твердых телах, а также излучение от поверхности к поверхности и излучение в участвующих средах с модулем теплопередачи. Физический интерфейс поддерживает низкие числа Маха (обычно менее 0,3). В интерфейсе ламинарное течение узел Fluid Properties по умолчанию активен на всем выборе интерфейса. Выбор области интерфейса потока может быть отредактирован, если модель содержит сплошные области.\n\nстационарный modeling и моделирование временной области поддерживаются в 2D, 2D аксисимметрии и 3D геометрии.
