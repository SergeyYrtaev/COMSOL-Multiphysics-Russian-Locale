topicdescr_physics/cableshield = [Кабельный экран]Частотная модель тонкого проводящего слоя, моделирующая экраны кабелей.
topicdescr_physics/camclaymodel = [Материал Cam-Clay] Модель материала Cam-Clay для геомеханического анализа.
topicdescr_physics/camfollower = [Cam-Follower]Определяет соединение между кулачком и его ведомым устройством.
topicdescr_physics/capacitor = [Конденсатор]Двухконтактный конденсатор.
topicdescr_physics/capacityloss = [Потеря емкости]Потеря емкости, возникающая в аккумуляторе из-за паразитных реакций.
topicdescr_physics/capeopenthermo = [Термодинамическое определение из базы данных CAPE-OPEN]Термодинамическое определение из внешних баз данных, совместимых с CAPE-OPEN.
topicdescr_physics/carbonconcentration = [Концентрация углерода]Заданная концентрация углерода на границе.
topicdescr_physics/carbonflux = [Поток углерода]Граничное условие потока углерода.
topicdescr_physics/carburization = [Науглероживание]Модель науглероживания, используемая для анализа диффузии углерода.
topicdescr_physics/cathode = [Катод]Начальная точка интегрирования вдоль линий электрического поля, используемых для обнаружения пробоя.
topicdescr_physics/caugheythomasmobilitymodel = [Модель мобильности Коги-Томаса (E)]Модель мобильности Коги-Томаса для полупроводникового транспорта.
topicdescr_physics/cc_inlet = [Вход для криволинейных координат]Условие впуска (нормальный поток) для векторного поля.
topicdescr_physics/cc_outlet = [Выход для криволинейных координат]Условие выхода (нормальный поток) для вычисленного векторного поля.
topicdescr_physics/cc_wall = [Стена для криволинейных координат]Состояние стены. Векторное поле имеет нулевую нормальную составляющую у стенки.
topicdescr_physics/cd_wiringedges = [Кромки проводки]Определите края, соединяющие различные аноды жертвенных кромок.
topicdescr_physics/cdpipe_pipeelectrodesurface = [Поверхность электрода трубы] Определяет поверхность (трубчатого) электрода вдоль края.
topicdescr_physics/cdpipe_pipepointelectrodesurface = [Поверхность электрода точки трубы] Определяет поверхность электрода в точке.
topicdescr_physics/cdpipe_pipepointsacrificialanode = [Жертвенный анод в точке трубы]Указывает жертвенный анод в точке.
topicdescr_physics/cellequilibriumpotential = [Потенциал клеточного равновесия] Термодинамика батареи.
topicdescr_physics/cellperiodicity = Условие периодичности ячеек в механике твердого тела.
topicdescr_physics/centerofjointbnd = [Центр соединения: граница] Указывает центр тяжести выбранных границ в качестве центра соединения.
topicdescr_physics/centerofjointedge = [Центр соединения: край]Указывает центр тяжести выбранных ребер в качестве центра соединения.
topicdescr_physics/centerofjointpoint = [Центр соединения: точка] Указывает центр тяжести выбранных точек в качестве центра соединения.
topicdescr_physics/centerofmassbnd = [Центр масс: граница]Центр массы массы и момента инерции твердого материала, определяемый границами.
topicdescr_physics/centerofmassedge = [Центр масс: край]Центр масс для массы и момента инерции твердого материала, определяемый ребрами.
topicdescr_physics/centerofmasspoint = [Центр масс: точка]Центр масс для массы и момента инерции твердого материала, определяемый точками.
topicdescr_physics/centerofrotationbnd = [Центр вращения: граница] Центр вращения различных физических объектов, определяемый границами.
topicdescr_physics/centerofrotationbndint = [Центр вращения: граница интерфейса многослойной оболочки] Центр вращения для различных физических функций, определяемый границами интерфейса в многослойной оболочке.
topicdescr_physics/centerofrotationdom = [Центр вращения: область]Центр вращения для различных физических функций, определяемый областями.
topicdescr_physics/centerofrotationedge = [Центр вращения: край]Центр вращения различных физических объектов, определяемый краями.
topicdescr_physics/centerofrotationedgeint = [Центр вращения: край интерфейса многослойной оболочки] Центр вращения для различных физических функций, определяемый краями интерфейса в многослойной оболочке.
topicdescr_physics/centerofrotationpoint = [Центр вращения: точка] Центр вращения различных физических объектов, определяемый точками.
topicdescr_physics/centerofrotationpointint = [Центр вращения: точка интерфейса многослойной оболочки] Центр вращения для различных физических функций, определяемый точками интерфейса в многослойной оболочке.
topicdescr_physics/chaindrive = [Цепной привод]Определяет звенья цепи и узел звездочки.
topicdescr_physics/changecrosssection = [Изменить сечение] Пользовательская площадь и периметр поперечного сечения.
topicdescr_physics/changeshellthickness = [Изменить толщину оболочки] Устанавливает локальную толщину оболочки.
topicdescr_physics/changestructuralthickness = [Изменить структурную толщину] Изменяет толщину тонкого слоя.
topicdescr_physics/changethickness = [Изменить толщину] Пользовательская толщина.
topicdescr_physics/changethicknesssc = [Изменить толщину (вне плоскости)]Переопределите глобальную толщину, чтобы указать локальную толщину вне плоскости.
topicdescr_physics/chargeaccumulation  = [Накопление заряда]Накопление заряда частиц на основе плотности пространственного заряда окружающей жидкости.
topicdescr_physics/chargeconservation = [Сохранение заряда] Закон Гаусса для электрического поля смещения. Предоставляет интерфейс для определения определяющего соотношения и связанных с ним свойств, таких как относительная диэлектрическая проницаемость.
topicdescr_physics/chargeconservationferroelectric = [Сохранение заряда, сегнетоэлектрик]Добавляет уравнения сохранения заряда в соответствии с законом Гаусса для электрического поля смещения для сегнетоэлектрика. Может быть подключен к интерфейсу механика твердого тела с использованием функции электрострикционного соединения.
topicdescr_physics/chargeconservationpiezo = [Сохранение заряда, пьезоэлектрик]Добавляет уравнения сохранения заряда в соответствии с законом Гаусса для электрического поля смещения для пьезоэлектрического материала. Должен использоваться вместе с пьезоэлектрическим материалом в механике твердого тела и функцией пьезоэлектрической связи.
topicdescr_physics/chargedischargecycling = [Циклический заряд-разряд] Потенциальное/текущее состояние на границе с переключением событий.
topicdescr_physics/chemorheology = [Хемореология] Связывает вязкость с конверсией и температурой.
topicdescr_physics/cir_switch = [Переключатель]Двухконтактный переключатель.
topicdescr_physics/circuitterminal = [Клемма цепи]Граничное условие для подключения к интерфейсу электрической цепи.
topicdescr_physics/circularportreferenceaxis = [Опорная ось кругового порта]Условие точки для определения опорной оси поляризации для круглых портов.
topicdescr_physics/circularwaveretarder = [Замедлитель круговой волны] Вращает поляризацию падающих лучей.
topicdescr_physics/clearancejoint = [Зазорное соединение]Определяет зазор между двумя телами.
topicdescr_physics/closed = [Закрыто]Закрытый конец трубы.
topicdescr_physics/coefficientformpde = [Форма коэффициента PDE]PDE в форме коэффициента.
topicdescr_physics/coilcurrentcalculation = [Автоматический расчет тока] Вычисляет направление катушки для числовой многовитковой катушки в выбранных доменах. Необходимо решить на этапе исследования «Анализ геометрии катушки».
topicdescr_physics/coildomaingroup = [Группа областей]Группа параллельно соединенных областей, последовательно соединенных с другими областями или группами областей в катушке.
topicdescr_physics/coilground = [Выход] Выходная граница для тока катушки. 
topicdescr_physics/coilgroupdomain = [Область группы катушек]Устаревшая функция. Используйте функцию «Однопроводная катушка» с активной настройкой «Группа катушек».
topicdescr_physics/coilinsulation = [Электрическая изоляция] Состояние изоляции для протекания тока в катушке. Нормальная составляющая потока на границе равна нулю.
topicdescr_physics/coilperiodic = [Периодические границы (Катушка)]Периодические границы для анализа геометрии катушки. Применимо на границах с периодическим условием.
topicdescr_physics/coilreferenceedge = [Справочный край]Определяет линейный или круговой край, который определяет направление родительской катушки.
topicdescr_physics/coilterminal = [Вход]Входная граница для тока катушки.
topicdescr_physics/collisionaccumulator = [Аккумулятор]Создает переменную поля в наборе доменов, которая увеличивается при каждом столкновении частицы с молекулой фонового газа в выбранных доменах.
topicdescr_physics/collisionfeature = [Столкновение]Добавьте данные сечения реакции электронного удара.
topicdescr_physics/collisionlessheating = [Бесстолкновительный нагрев]Нагрев за счет нелокальных эффектов.
topicdescr_physics/collisions = [Столкновения]Взаимодействие частиц с разреженным фоновым газом.
topicdescr_physics/component = [Компонент]Узел «Определение компонента» в режиме синтеза компонентов.
topicdescr_physics/compressiblepotentialflow = [Модель потенциального сжимаемого потока]Модель потенциального сжимаемого потока.
topicdescr_physics/compressor = [Компрессор]Технологическая схема газового компрессора для химического машиностроения.
topicdescr_physics/computedisplacement = [Вычисление смещения]Вычисление смещения.
topicdescr_physics/computedisplacementdom = [Вычисление смещения]Вычисление смещения.
topicdescr_physics/concentration = [Концентрация]Граничное условие концентрации.
topicdescr_physics/concrete = [Бетон]Модель бетонного материала для геомеханического анализа.
topicdescr_physics/conductingmagnet  = [Проводящий магнит] Намагниченный область или регулярная структура намагниченных областей с конечной проводимостью. Направление намагничивания можно указать, выбрав границы северного и южного полюса.
topicdescr_physics/conductionlosstimeharmonic = [Потери проводимости (гармоники времени)]Потери проводимости пьезоэлектрического материала.
topicdescr_physics/conductivematerial = [Проводящий материал] Проводящий материал для передачи электрического тока.
topicdescr_physics/conductivethermalresistor = [Проводящий терморезистор]Двухконтактный проводящий терморезистор.
topicdescr_physics/connectionpoint = [Точка соединения] Устанавливает общий ток электрода в точке.
topicdescr_physics/connectionsurface = [Поверхность соединения] Устанавливает общий ток электрода на границе.
topicdescr_physics/constraint = [Ограничение] Ограничьте граничное условие, ограничивающее выражение значением 0.
topicdescr_physics/constraints = [Ограничения]Ограничивает относительное движение сустава.
topicdescr_physics/contact = [Контакт]Механический контакт.
topicdescr_physics/contactangle = [Угол контакта] Угол контакта между границей раздела свободной поверхности и твердой стеной. Используется в интерфейсах вращающихся машин.
topicdescr_physics/contactarea = [Область контакта]Определяет область контакта для применения распределенного трения.
topicdescr_physics/contactbetweengrains = [Контакт между зернами]Определяет нормальные и тангенциальные контактные силы между перекрывающимися зернами.
topicdescr_physics/contactbetweengrainsstatevariables = [Контакт между переменными состояния зерен]Определяет парные свойства перекрывающихся зерен.
topicdescr_physics/contactimpedance = [Контактное сопротивление]Тонкий слой с более высоким сопротивлением, чем окружающая среда.
topicdescr_physics/contactstabilization = [Стабилизация]Добавьте стабилизацию для подавления движения твердого тела первоначально неограниченных частей в стационарном или квазистатическом анализе.  
topicdescr_physics/contactwithwalls = [Контакт со стенками]Определяет нормальные и тангенциальные контактные силы между зерном и любыми стенками, которые оно перекрывает.
topicdescr_physics/contactwithwallsstatevariables = [Контакт с переменными состояния стенок] Определяет парные свойства пар зерна и стенок.
topicdescr_physics/continuity = [Непрерывность] Непрерывность полей.
topicdescr_physics/continuityflow = [Непрерывность потока]Парное условие непрерывности потока жидкости.
topicdescr_physics/continuityheat = [Непрерывность тепла]Условие пары для непрерывности передачи тепла.
topicdescr_physics/continuitylayeredshell = [Непрерывность оболочки] Непрерывность поперек между двумя слоями материалов.
topicdescr_physics/continuityltne = [Непрерывность] Непрерывность между температурным полем фазы жидкости или пористой матрицы и температурным полем, внешним по отношению к пористой среде.
topicdescr_physics/continuitymixture = [Непрерывность смеси]Парные условия, определяющие непрерывность потока жидкости и объемную долю дисперсной фазы.
topicdescr_physics/continuityoninteriorboundary = [Непрерывность на внутренней границе] Включите сохранение интенсивности на внутренних границах, когда выбран метод дискретных ординат.
topicdescr_physics/continuitytl = [Непрерывность] Непрерывность между двумя слоями материалов.
topicdescr_physics/continuitywalldistance = [Непрерывность расстояния до стены] Непрерывность для уравнения расстояния до стены.
topicdescr_physics/continuousenergylevelsboundary = [Непрерывные уровни энергии] Определяет непрерывное распределение уровней энергии захвата на поверхности полупроводника.
topicdescr_physics/continuousenergylevelsdomain = [Непрерывные уровни энергии] Определяет непрерывное распределение уровней энергии захвата в полупроводниковой области.
topicdescr_physics/continuousenergylevelsheterointerface = [Непрерывные уровни энергии] Определяет непрерывное распределение уровней энергии захвата на гетероинтерфейсе полупроводника.
topicdescr_physics/contractionexpansion = [Сжатие/Расширение]Падение давления из-за изменения поперечного сечения трубы.
topicdescr_physics/contributingvelocity = [Вклад скорости]Добавьте вклад скорости в поле скоростей Дарси.
topicdescr_physics/controlvariablebounds = [Границы управляющей переменной] Укажите простые границы для поля родительской управляющей переменной. 
topicdescr_physics/controlvariablefield = [Поле управляющей переменной]Управляющая переменная, которая изменяется в зависимости от положения внутри выбранных геометрических объектов.
topicdescr_physics/convectedwaveequationmodel = [Модель уравнения конвекции]Модель уравнения конвекции волн для акустического анализа.
topicdescr_physics/convectiondiffusion = [Конвекция и диффузия] Транспортные свойства видов и входные данные модели, необходимые для выбранных механизмов переноса.
topicdescr_physics/convectiondiffusionequation = [Уравнение конвекции-диффузии]Уравнение конвекции-диффузии.
topicdescr_physics/convectiondiffusionmigration = [Конвекция, диффузия и миграция] Свойства переноса видов и входные данные модели, необходимые для выбранных механизмов переноса.
topicdescr_physics/convectiveheatflux = [Конвективный тепловой поток]Граничное условие конвективного теплового потока.
topicdescr_physics/convectiveheatlosses = [Конвективные тепловые потери]При расчете температуры частиц применяется термин конвективных тепловых потерь.
topicdescr_physics/convectivelyenhancedconductivity = [Увеличенная конвективная проводимость] Учитывает конвекцию, заменяя конвективный тепловой поток вкладом в проводимость.
topicdescr_physics/convectiveoutflow = [Отток]Граничное условие оттока.
topicdescr_physics/convectivethermalresistor = [Конвективный терморезистор]Двухконтактный конвективный терморезистор.
topicdescr_physics/conversion = [Конверсия]Ценность конверсии.
topicdescr_physics/coordinatecolumn = [Столбец координат]Столбец координат: столбец в файле экспериментальных данных, содержащий глобальные координаты.
topicdescr_physics/coordinatesystemsettings = [Настройки системы координат]Настройки системы координат, созданной интерфейсом.
topicdescr_physics/corrodingelectrode = [Корродирующий электрод]Определите толщину затравочного слоя, изменение толщины электрода, электропроводность и плотность тока электрода для корродирующего электрода.
topicdescr_physics/couplingloss = [Потери в соединении]Потери в соединении в пьезоэлектрическом материале.
topicdescr_physics/cpt_currentdensity = [Плотность тока]Вычисляет плотность тока на основе заряда и скорости падающих частиц.
topicdescr_physics/cpt_elastic = [Упругие]Упругие столкновения между частицами и фоновым газом.
topicdescr_physics/cpt_heatsource = [Источник тепла]Вычисляет источник тепла, используя кинетическую энергию падающих частиц.
topicdescr_physics/crack = [Трещина]Определяет геометрию и ориентацию трещины.
topicdescr_physics/crackclosure = [Закрытие трещины]Определите модель контакта между берегами трещины.
topicdescr_physics/crackfaceload = [Нагрузка на поверхность трещины]Нагрузка на поверхность трещины.
topicdescr_physics/creep = [Creep]Модели ползучести для структурного анализа.
topicdescr_physics/crossdiffractionorder = [Порядок дифракции] Выпускает лучи указанного порядка дифракции из поперечной решетки.
topicdescr_physics/crossgrating = [Поперечная решетка] Создает дифракционную решетку с периодичностью в двух поперечных направлениях. Добавьте к решетке подузлы «Порядок дифракции», чтобы выпускать лучи в указанных порядках дифракции.
topicdescr_physics/crosssection = [Поперечное сечение] Пользовательская площадь и периметр поперечного сечения.
topicdescr_physics/crosssectionbeam = [Данные сечения]Данные сечения балки.
topicdescr_physics/crosssectionimport = [Импорт сечений] Импорт данных о сечениях для группы реакций электронного удара.
topicdescr_physics/crosssectiontruss = [Данные о поперечном сечении]Данные о поперечном сечении фермы.
topicdescr_physics/cstr = [CSTR]Технологическая схема резервуарного реактора непрерывного перемешивания для химического машиностроения.
topicdescr_physics/cumulativedamagemodel = [Накопленный урон]Модель усталости от накопительного урона.
topicdescr_physics/curingkinetics = [Кинетика отверждения]Определяет скорость реакции отверждения.
topicdescr_physics/currentcollector = [Текущий коллектор] Устанавливает свойства текущего области коллектора.
topicdescr_physics/currentconductor = [Текущий проводник]Определяет баланс заряда в электронном проводнике.
topicdescr_physics/currentconductors = [Текущие проводники]Определяет токовые домены проводников в аккумуляторном блоке.
topicdescr_physics/currentconservation = [Текущее сохранение]Текущее уравнение сохранения для доменов.
topicdescr_physics/currentcurrentsource = [Источник тока, управляемый током]Двухконтактный источник тока, управляемый током. Ток пропорционален току, протекающему через другое двухконтактное устройство. 
topicdescr_physics/currentdensity = [Плотность тока]Укажите распределение плотности тока вдоль границы, например поверхности электрода.
topicdescr_physics/currentdiscontinuity = [Текущий разрыв]Укажите разрыв плотности тока на внутренней границе.
topicdescr_physics/currentsource = [Источник тока]Объемный источник тока в доменах.
topicdescr_physics/currentsourcecircuit = [Источник тока] Двухконтактный идеальный источник тока.
topicdescr_physics/currentvoltagesource = [Источник напряжения, управляемый током]Двухконтактный источник напряжения, управляемый током. Напряжение пропорционально току, протекающему через другое двухконтактное устройство. 
topicdescr_physics/customthermo = [Термодинамическое определение] Определяемое пользователем определение термодинамики.
topicdescr_physics/customthermocontainer = [Пользовательская термодинамика] Определяемое пользователем определение термодинамики, конкретное термоопределение.
topicdescr_physics/cylindricaljoint = [Цилиндрическое соединение]Определяет цилиндрическое соединение между двумя телами.
topicdescr_physics/cylindricalwaveradiation = [Излучение цилиндрических волн]Условия излучения цилиндрических волн.
topicdescr_physics/damage = [Повреждение]Модель повреждения линейно-упругого материала.
topicdescr_physics/damper = [Демпфер]Двухконтактный демпфер.
topicdescr_physics/damping = [Демпфирование]Механическое демпфирование в твердых материалах.
topicdescr_physics/dampingloss = [Затухание и потери]Добавьте вклады затухания и потерь для пьезоэлектрического материала.
topicdescr_physics/darcyslawmodel = [Свойства жидкости и матрицы]Свойства жидкости и пористой среды для интерфейса закона Дарси.
topicdescr_physics/debyedispersion = [Дисперсия]Диэлектрическая дисперсия.
topicdescr_physics/decohesion = [Декогезия]Декогезия при механическом контакте.
topicdescr_physics/delamination = [Расслоение]Расслоение многослойного интерфейса оболочки.
topicdescr_physics/depositedbeampower = [Мощность выделенного луча]Определяет источник тепла, создаваемый узкими лучами, такими как лазерные или электронные лучи.
topicdescr_physics/depositedbeampowerinterface = [Мощность выделенного луча, интерфейс]Определяет источник тепла, создаваемый узкими лучами, такими как лазерные или электронные лучи.
topicdescr_physics/depositedraypower = [Deposited Ray Power]Вычисляет источник тепла на основе мощности лучей.
topicdescr_physics/depositedraypowerboundary = [Deposited Ray Power]Вычисляет граничный источник тепла на основе мощности падающих лучей.
topicdescr_physics/depositingelectrode = [Электрод для осаждения]Определите толщину затравочного слоя, изменение толщины электрода, электропроводность и плотность тока электрода для осаждающего электрода.
topicdescr_physics/depositingelectrodereaction = [Электродная реакция] Определите кинетику электрода для реакции переноса заряда между электролитом и непористым электродом.
topicdescr_physics/depositingelectrodesurface = [Поверхность осаждающего электрода] Граница между осаждающим электродом и электролитом. Добавляет зависимые переменные для депонированных видов.
topicdescr_physics/destinationaxis = [Целевая ось]Указывает выбранное направление края в качестве целевой оси.
topicdescr_physics/destinationdomains = [Выбор пункта назначения]Выбор границ назначения для периодического граничного условия.
topicdescr_physics/destinationfilter = [Фильтр назначения] Указывает регион для фильтрации списка вложений в поле назначения.
topicdescr_physics/destinationpoint = [Точка назначения]Указывает точку подключения назначения.
topicdescr_physics/destinationpointbnd = [Точка назначения: граница] Указывает центр тяжести выбранных границ в качестве точки соединения назначения.
topicdescr_physics/destinationpointedge = [Точка назначения: край]Указывает центр тяжести выбранных ребер в качестве конечной точки соединения.
topicdescr_physics/destinationpointpoint = [Точка назначения: Точка]Указывает центр тяжести выбранных точек в качестве точки соединения назначения.
topicdescr_physics/devicereferenceedge = [Опорный край]Указывает пространственную ориентацию оптического устройства.
topicdescr_physics/dielectriccontact = [Диэлектрический контакт]Граничное условие для плазмы, контактирующей с диэлектрической (изолирующей) поверхностью.
topicdescr_physics/dielectricloss = [Диэлектрические потери]Диэлектрические потери в пьезоэлектрическом материале.
topicdescr_physics/dielectricshielding = [Диэлектрическое экранирование]Тонкий слой с более высокой электрической проницаемостью, чем окружающая среда.
topicdescr_physics/dielectrophoreticforce = [Диэлектрофоретическая сила]Оказывает диэлектрофоретическое воздействие на частицы в электрическом поле.
topicdescr_physics/diffmirror = [Рассеянное зеркало]Идеализированная граница, отражающая все полученное излучение.
topicdescr_physics/diffractionorder = [Порядок дифракции]Характеристика порта для волны, определяемая порядком ее дифракции.
topicdescr_physics/diffuseflux = [Диффузный поток]Входные граничные условия для молекулярных потоков.
topicdescr_physics/diffusemirror = [Рассеянное зеркало]Идеализированная граница, отражающая все полученное излучение.
topicdescr_physics/diffusesurface = [Диффузия поверхности]Граничное условие «Диффузия поверхности».
topicdescr_physics/diffusesurfacebackcomp = [Диффузия поверхности]Граничное условие «Диффузия поверхности».
topicdescr_physics/diffusesurfaceinterface = [Диффузия поверхности, интерфейс]Граничное условие диффузной поверхности на границе слоев.
topicdescr_physics/diffusion = [Диффузия] Свойства переноса видов и входные данные модели в областях, где перенос ограничивается диффузией.
topicdescr_physics/diffusionmethod = [Метод диффузии]Вычисляет векторное поле как градиент потенциала, решая уравнение стационарной диффузии (Лапласа).
topicdescr_physics/diode = [Диод]Двухконтактный диод.
topicdescr_physics/dipolesource = [Источник диполя] Исходный термин дипольного области.
topicdescr_physics/direcombination = [Прямая рекомбинация]Феноменологическая прямая электронно-дырочная рекомбинация для полупроводников.
topicdescr_physics/dirichletboundary = [Граничное условие Дирихле]Граничное условие Дирихле, определяющее значение зависимой переменной.
topicdescr_physics/dirichletboundarycondition = [Граничное условие Дирихле]Граничное условие Дирихле, определяющее значение зависимой переменной.
topicdescr_physics/discreteenergylevelboundary = [Дискретный уровень энергии] Указывает дискретный уровень энергии захвата на поверхности полупроводника.
topicdescr_physics/discreteenergyleveldomain = [Дискретный уровень энергии]Указывает дискретный уровень энергии захвата в полупроводниковой области.
topicdescr_physics/discreteenergylevelheterointerface = [Дискретный уровень энергии] Указывает дискретный уровень энергии захвата на гетероинтерфейсе полупроводника.
topicdescr_physics/discretestates = [Дискретные состояния]Определите дискретные переменные состояния.
topicdescr_physics/discretization = [Дискретизация]Укажите несколько дискретизаций для одной и той же физики.
topicdescr_physics/disk = [Диск]Функция диска в интерфейсе лучевого ротора.
topicdescr_physics/dispersion = [Дисперсия]Дисперсия в пористой среде.
topicdescr_physics/dispersionfracture = [Дисперсия]Дисперсия в трещине.
topicdescr_physics/displacement = [Заданное смещение]Заданное смещение.
topicdescr_physics/displacementtl = [Заданное смещение]Заданное смещение.
topicdescr_physics/displacementfield = [Поле электрического смещения]Заданная нормальная составляющая поля электрического смещения на границе.
topicdescr_physics/displacementintep = [Заданное смещение: край и точка]Заданное смещение для интерфейса в многослойной оболочке.
topicdescr_physics/displacementints = [Заданное смещение: граница]Заданное смещение интерфейса в многослойной оболочке.
topicdescr_physics/displacementnode = [Узел смещения]Одноконтактный компонент с заданным смещением.
topicdescr_physics/displacementsource = [Источник смещения]Двухконтактный компонент с заданным смещением.
topicdescr_physics/disprot = [Заданное смещение/поворот]Заданное смещение или вращение.
topicdescr_physics/dissipatedparticleheat = [Рассеиваемое тепло частиц]Накопление тепла, полученного или потерянного частицами в окружающей области.
topicdescr_physics/dissipationschrod = [Диссипация]Добавьте диссипацию к зависящему от времени уравнению Шраöдингера.
topicdescr_physics/distanceequation = [Уравнение расстояния]Уравнение расстояния — модифицированное уравнение Эйконала для расчета расстояния до стен.
topicdescr_physics/distancejoint = [Расстояние между двумя телами] Сохраняет заданное расстояние между двумя телами.
topicdescr_physics/distributedcapacitance = [Распределенная емкость] Емкостный слой между соседним областьом и указанным потенциалом.
topicdescr_physics/distributedimpedance = [Распределенный импеданс]Резистивно-емкостный слой между соседними доменами и электродом с заданным потенциалом.  
topicdescr_physics/distributedode = [Распределенный ODE]Добавьте распределенный ODE или DAE в области, на границе, ребре или в точке.
topicdescr_physics/divergenceconstraint = [Ограничение дивергенции]Численная стабилизация, когда частота достаточно низка, чтобы член волнового уравнения, связанный с общей плотностью электрического тока, стал численно незначимым.
topicdescr_physics/dl_fluxdiscontinuity = [Разрыв потока]Условие разрыва потока массы. Может наноситься на внутренние границы или пары.
topicdescr_physics/domainimpedance = [Граничное условие импеданса] Функция предметной области для назначения граничных условий импеданса на внешних границах.
topicdescr_physics/domaindirection = [Направление области] Укажите направление магнита в каждом области.
topicdescr_physics/domainperfectelectricconductor = [Идеальный электрический проводник] Функция предметной области для назначения нулевого тангенциального электрического поля на внешних границах.
topicdescr_physics/domainsource = [Источник области]Источник области.
topicdescr_physics/domainsources = [Источники области]Источники области.
topicdescr_physics/doublelayercapacitance = [Емкость двойного слоя]Определяет электрохимическую емкость двойного слоя на границе.
topicdescr_physics/dragforce = [Drag Force]Прилагает силу сопротивления к частицам.
topicdescr_physics/driftdiffusionmodel = [Модель дрейфовой диффузии] Свойства переноса электронов в доменах.
topicdescr_physics/dropletbreakup  = [Разрушение капель]Разрушение капель жидкости или пакетов капель.
topicdescr_physics/dropletevaporation = [Испарение капель] Изменяйте массу или диаметр частиц с течением времени, рассматривая частицы как испаряющиеся капли жидкости.
topicdescr_physics/drudelorentzpolarization = [Поляризация Друде-Лоренца]Условие добавления еще одного поляризационного члена к полю электрического смещения для модели дисперсии Друде-Лоренца.
topicdescr_physics/dualpermeabilitymedium = [Среда с двойной проницаемостью] Транспортные свойства среды с двойной проницаемостью.
topicdescr_physics/dualporositymedium = [Среда с двойной пористостью] Транспортные свойства среды с двойной пористостью.
topicdescr_physics/ebd_boundaryaccumulator = [Аккумулятор]Создает переменную поля, которая зависит от положения и свойств частиц.
topicdescr_physics/ec_domainterminal = [Терминал]Условие области применения заданного напряжения, тока или мощности для моделирования соединения линии передачи или подключения к цепи. Вычисляет сосредоточенные параметры системы и допускает развертку терминала.
topicdescr_physics/ec_symmetryplane = [Плоскость симметрии]Условие симметрии электрического поля на границе.
topicdescr_physics/ec_terminal = [Терминал]Граничное условие для подачи заданного напряжения, тока или мощности для моделирования соединения линии передачи или подключения к цепи. Вычисляет сосредоточенные параметры системы и допускает развертку терминала.
topicdescr_physics/ecis_boundarycurrentsource = [Источник тока (Граница)]Заданный источник тока, расположенный на границе оболочки.
topicdescr_physics/ecis_boundaryelectricpotential = [Электрический потенциал (граница)]Заданный электрический потенциал на границе оболочки.
topicdescr_physics/ecis_boundaryfloatingpotential = [Плавающий потенциал (граница)]Граница при постоянном, неизвестном потенциале. Если применить его к нескольким несвязанным границам, он моделирует электрическое соединение между ними.
topicdescr_physics/ecis_boundaryground = [Земля (Граница)]Нулевой электрический потенциал на границе оболочки.
topicdescr_physics/ecis_boundaryterminal = [Терминал (Граница)]Функция терминала, применимая к границе оболочки. Используется для подачи заданного напряжения, тока или мощности или для подключения к цепи. Вычисляет сосредоточенные параметры системы.
topicdescr_physics/ecis_conductiveshell = [Проводящая оболочка]Уравнение сохранения тока для оболочек. Это может быть неслоистая оболочка, гомогенизированная оболочка или слоистая оболочка.
topicdescr_physics/ecis_piezoresistiveshell = [Пьезорезистивная оболочка]Уравнение сохранения тока для оболочек, электропроводность которых зависит от механического напряжения или деформации. Это может быть неслоистая оболочка, гомогенизированная оболочка или слоистая оболочка.
topicdescr_physics/ecis_currentsource = [Текущий источник]Текущий источник внутри оболочки.
topicdescr_physics/ecis_dielectriclayer = [Диэлектрический слой]Емкостные электрические эффекты в диэлектрических слоистых структурах.
topicdescr_physics/ecis_electricpotential = [Электрический потенциал]Заданный электрический потенциал в оболочке.
topicdescr_physics/ecis_externalcurrentdensity = [Плотность внешнего тока]Условие плотности внешнего тока в оболочке.
topicdescr_physics/ecis_ground = [Земля]Нулевой электрический потенциал в оболочке.
topicdescr_physics/ecis_insulatinglayer = [Изоляционный слой] Используется для определения идеального изолятора путем полного удаления слоя из выбора физического интерфейса (диэлектрические эффекты не учитываются).
topicdescr_physics/ecis_interlayerconnection = [Межслойное соединение]Условие, при котором константа потенциала распределяется по толщине оболочки, создавая электрическое соединение между слоями.
topicdescr_physics/ecis_normalcurrentdensity = [Нормальная плотность тока] Предписанная нормальная плотность тока, протекающего из оболочки или в оболочку.
