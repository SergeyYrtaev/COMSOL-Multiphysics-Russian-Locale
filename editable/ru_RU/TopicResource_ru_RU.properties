topicdescr_physics/shellcontact = [Контакт]Механический контакт между оболочками.
topicdescr_physics/shelllocalsystem = [Локальная система оболочки]Локальная система координат оболочки.
topicdescr_physics/shortcircuit = [Короткое замыкание]Условие, предполагающее, что электрический потенциал на границе равен нулю.
topicdescr_physics/siec_electrolyte = [Электролит]Уравнения баланса зарядов электролитной фазы.
topicdescr_physics/simplysupported = [Просто поддерживается]Просто поддерживаемое граничное условие для оболочек или пластин.
topicdescr_physics/singleturncoilboundary = [Однопроводящая катушка] Тонкий проводящий слой, по которому течет поверхностный ток. Можно указать сосредоточенное напряжение, ток или мощность на границе, а также подключение к цепи.
topicdescr_physics/singleturncoildomain = [Однопроводниковая катушка] Проводящая область, в которой течет ток катушки. Можно указать сосредоточенное напряжение, ток или мощность катушки, а также подключение к цепи. 
topicdescr_physics/singleturncoildomainground = [Земля]Условие нулевого потенциала для потенциала катушки.
topicdescr_physics/singleturncoildomainpotential = [Boundary Feed]Граничное условие для потенциала катушки, определяющее возбуждающее напряжение, ток или соединение с цепью.
topicdescr_physics/singleturncoildomainslit = [Gap Feed] Указывает напряжение, ток или соединение цепи через внутреннюю границу в области катушки.
topicdescr_physics/slip = [Скольжение] Состояние скольжения.
topicdescr_physics/slipvelocity = [Скорость скольжения]Условие скорости скольжения.
topicdescr_physics/slipwall = [Slip Wall]Условие скользящей стены для стены, примыкающей к сплошной области.
topicdescr_physics/slotjoint = [Пазовое соединение]Определяет пазовое соединение между двумя телами.
topicdescr_physics/socandinitialchargedistribution = [SOC и начальное распределение заряда]SOC и глобальный узел начального распределения заряда для определения состояния заряда ячейки (SOC) и начального запаса заряда.
topicdescr_physics/soilmodel = [Пластичность грунтов]Модели пластичности грунтов для геомеханического анализа.
topicdescr_physics/solarradiation = [Солнечное излучение] Испускает лучи из сетки, начальное направление которых зависит от положения Солнца.
topicdescr_physics/solid = [Твердое]Определяет коэффициент диффузии в твердом теле, либо в пространственном, либо в материальном каркасе.
topicdescr_physics/solid_gravity = [Гравитация]Гравитационная нагрузка для строительной механики.
topicdescr_physics/solidconnection = [Жесткое соединение]Жесткое соединение для балок или оболочек.
topicdescr_physics/solidcontact = [Контакт]Механический контакт между твердыми телами.
topicdescr_physics/solidheattransfermodel = [Solid]Модель теплопередачи твердых тел.
topicdescr_physics/solidlayeredshell = [Твердый]Модель теплопередачи для многослойных оболочек.
topicdescr_physics/solidwithtranslationalmotion = [Твердое тело с поступательным движением]Модель теплопередачи для твердых тел с поступательным движением.
topicdescr_physics/solutesource = [Источник растворов] Создает источник жидкости.
topicdescr_physics/solvent = [Растворитель]Настройки области растворителя.
topicdescr_physics/soundhard = [Звучная твердая граница (стена)] Звук твердой стены.
topicdescr_physics/soundhardwall = [Звук твердой стены] Состояние твердой стены.
topicdescr_physics/soundpressurelevelboundary = [Расчет уровня звукового давления]Расчет уровня звукового давления.
topicdescr_physics/soundsoft = [Звуковая мягкая граница] Звуковое мягкое состояние с нулевым давлением.
topicdescr_physics/source = [Скорость]Заданное условие скорости.
topicdescr_physics/sourceaxis = [Исходная ось]Указывает выбранное направление края в качестве оси источника.
topicdescr_physics/sourcefilter = [Фильтр источника] Указывает регион для фильтрации списка вложений в поле источника.
topicdescr_physics/sourcepoint = [Исходная точка] Указывает исходную точку подключения.
topicdescr_physics/sourcepointbnd = [Исходная точка: граница] Указывает центр тяжести выбранных границ в качестве исходной точки соединения.
topicdescr_physics/sourcepointedge = [Исходная точка: Край]Указывает центр тяжести выбранных ребер в качестве исходной точки соединения.
topicdescr_physics/sourcepointpoint = [Исходная точка: Точка]Указывает центр тяжести выбранных точек в качестве исходной точки соединения.
topicdescr_physics/sourceterm = [Источник]Исходный термин.
topicdescr_physics/sourcewithdirectivity = [Источник с направленностью] Выпускают лучи из точки, уровень звукового давления которой пропорционален функции пространственной направленности.
topicdescr_physics/south = [Юг]Укажите границы, определяющие южный полюс магнита.
topicdescr_physics/spacechargedensity = [Плотность пространственного заряда]Объемная плотность электрического заряда в доменах.
topicdescr_physics/spacechargedensitycalculation = [Расчет плотности пространственного заряда]Добавляет зависимую переменную для плотности пространственного заряда из-за присутствия заряженных частиц.
topicdescr_physics/spacecraftaxes = [Оси космического корабля]Определяет оси космического корабля. 
topicdescr_physics/spacecraftorientation = [Ориентация космического корабля] Определяет ориентацию космического корабля. 
topicdescr_physics/species = [Виды]Виды, составляющие плазму.
topicdescr_physics/speciesactivity = [Активность видов] Создает переменные для активности всех видов/поверхностных видов, присутствующих в родительских объектах группы видов.
topicdescr_physics/specieschem = [Виды] Определяет специфичную для вида информацию, касающуюся химической кинетики, термодинамики и транспортных свойств. Эта функция автоматически генерируется для участвующих реагентов и продуктов, указанных в узле «Реакция». Его также можно подобрать для отдельных видов.
topicdescr_physics/speciesconstraintgroup = [Группа ограничений видов] Укажите виды, которые необходимо ограничить начальными значениями при решении.
topicdescr_physics/speciesgroup = [Группа видов] Указывает информацию на молекулярном уровне об объемных и поверхностных видах. Автоматически создается на основе родительских функций группы обратимых реакций или групп равновесных реакций.
topicdescr_physics/speciesinitialvalue = [Начальные значения]Указывает начальные значения в интерфейсе.
topicdescr_physics/speciessource = [Источник видов] Создает источник жидкости.
topicdescr_physics/speciesthermodynamics = [Термодинамические виды]Определяет переменные для энтальпий, энтропий и теплоемкостей для всех видов/поверхностных видов, присутствующих в родительском объекте группы видов.
topicdescr_physics/specificabsorptionrate = [Удельная скорость поглощения] Функция предметной области для расчета удельной скорости поглощения (SAR).
topicdescr_physics/spf_fluidproperties = [Свойства жидкости]Уравнения потока однофазной жидкости (без учета объемных сил).
topicdescr_physics/sphericalwaveradiation = [Излучение сферических волн]Условия излучения сферических волн.
topicdescr_physics/splitter = [Сплиттер] Разделитель потока.
topicdescr_physics/spring = [Пружина]Двухконтактная пружина.
topicdescr_physics/springanddamper = [Пружина и демпфер]Добавляет пружину и демпфер на сустав.
topicdescr_physics/springdamper = [Пружина-демпфер]Соединяет два тела с помощью пружины и демпфера.
topicdescr_physics/springdampermaterial = [Пружина-демпфер]Модель материала пружины-демпфера в интерфейсе фермы.
topicdescr_physics/springfoundation = [Упругое основание]Упругое основание для расчета конструкций.
topicdescr_physics/springfoundationint = [Упругое основание, интерфейс]Упругое основание для интерфейса в физике многослойных оболочек при расчете конструкций.
topicdescr_physics/springmaterial = [Пружинный материал] Добавьте пружинный материал тонким слоем.
topicdescr_physics/sprocketaxis = [Ось звездочки]Указывает выбранное направление кромки в качестве оси звездочки.
topicdescr_physics/spurgear = [Spur Gear] Прямозубая шестерня в динамике многотельных тел.
topicdescr_physics/spurrack = [Spur Rack] Прямая (прямая) стойка в многотельной динамике.
topicdescr_physics/squeezefilmdamper = [Сжимающий пленочный демпфер] Функция сжимающего пленочного демпфера в динамике ротора.
topicdescr_physics/srhrecombination = [Рекомбинация с помощью ловушек] Модель рекомбинации с помощью ловушек устанавливает скорости рекомбинации электронов и дырок в полупроводниках с непрямой запрещенной зоной.
topicdescr_physics/stationarycontactangle = [Угол контакта]Угол контакта между свободной поверхностью и твердой стеной.
topicdescr_physics/stationarycontactanglee= [Угол контакта]Угол контакта между свободной поверхностью и твердой стеной.
topicdescr_physics/stationaryfreesurface = [Стационарная свободная поверхность]Используется для оценки деформации свободной поверхности по распределению давления на границе.
topicdescr_physics/stationaryfreesurfacee= [Стационарная свободная поверхность]Используется для оценки деформации свободной поверхности по распределению давления на границе.
topicdescr_physics/steelcomposition = [Состав стали]Используется для определения химического состава сталей для моделирования фазовых превращений. 
topicdescr_physics/storagemodel = [Модель хранения]Модель хранения, свойства жидкости и пористой среды.
topicdescr_physics/straightedgeconstraint = [Ограничение прямой кромки] Ограничение прямой кромки фермы.
topicdescr_physics/strainbasedmodel = [На основе деформации]Модель усталости на основе деформации.
topicdescr_physics/strainlifemodel = [Strain-Life]Модель усталости от деформации.
topicdescr_physics/stressbasedmodel = [На основе напряжения]Модель усталости на основе напряжения.
topicdescr_physics/stresslifemodel = [Stress-Life]Модель напряжениеовой усталости.
topicdescr_physics/stresslinearization = [Линеаризация напряжений]Линии линеаризации напряжений для оценки мембранных и изгибающих напряжений в механике твердого тела.
topicdescr_physics/subcircuit = [Экземпляр подсхемы] Экземпляр определения подсхемы. Количество контактов варьируется и указывается в определении.
topicdescr_physics/subcircuitblock = [Определение подсхемы]Определяет шаблон подсхемы с использованием подфункций, которые можно добавить в схему с помощью функций экземпляра подсхемы. 
topicdescr_physics/subsystem = [Экземпляр подсистемы] Экземпляр определения подсистемы. Количество портов является переменным и указывается в определении.
topicdescr_physics/subsystemblock = [Определение подсистемы]Определяет шаблон подсистемы с использованием подфункций, которые можно добавить в систему с помощью функций экземпляра подсистемы.
topicdescr_physics/sunproperties = [Свойства Солнца]Определяет свойства Солнца для расчета орбиты. 
topicdescr_physics/surfacechargeaccumulation = [Накопление поверхностного заряда]Накопление поверхностного заряда на внутренних границах.
topicdescr_physics/surfacechargedensity = [Плотность поверхностного заряда]Плотность поверхностного электрического заряда на границе.
topicdescr_physics/surfaceconcentration = [Поверхностная концентрация] Состояние точки/края (2D/3D) для поверхностной концентрации. 
topicdescr_physics/surfacecurrent = [Поверхностный ток]Граничное условие для плотности тангенциального поверхностного тока.
topicdescr_physics/surfacecurrentdensity = [Плотность поверхностного тока]Граничное условие для плотности тангенциального поверхностного тока.
topicdescr_physics/surfaceequilibriumreaction = [Реакция поверхностного равновесия] Граничный элемент поверхностного равновесия.
topicdescr_physics/surfacemagneticcurrent = [Плотность поверхностного магнитного тока]Граничное условие для плотности поверхностного магнитного тока (поток магнитных зарядов вдоль границы).
topicdescr_physics/surfacemagneticcurrentdensity = [Плотность поверхностного магнитного тока]Граничное условие для плотности тангенциального поверхностного магнитного тока.
topicdescr_physics/surfaceproperties = [Свойства поверхности]Функция свойств поверхности для интерфейса Surface Reactions.
topicdescr_physics/surfacereaction = [Поверхностная реакция] Реакции, которые создают входящий или исходящий поток на границах, а также производят или потребляют поверхностные вещества.
topicdescr_physics/surfacereactionsflux = [Поверхностные реакции]Производство или потребление видов за счет реакций на границах. 
topicdescr_physics/surfaceroughness = [Шероховатость поверхности]Граничное условие для шероховатости поверхности.
topicdescr_physics/surfacespecies = [Поверхностные виды] Виды, активные только на границах.
topicdescr_physics/surfacetension = [Поверхностное натяжение]Граничное условие поверхностного натяжения на внутренних границах. 
topicdescr_physics/surfacetemperature = [Температура поверхности]Температура поверхности на границах.
topicdescr_physics/surfacetoambientradiation = [Излучение от поверхности к окружающей среде] Радиационный тепловой поток от поверхности к окружающей среде.
topicdescr_physics/surfacetoambientradiationinterface = [Излучение от поверхности к окружающей среде, интерфейс] Радиационный тепловой поток от поверхности к окружающей среде.
topicdescr_physics/surfacetosurfaceradiation = [Излучение от поверхности к поверхности] Радиационный тепловой поток от поверхности к поверхности.
topicdescr_physics/swe_domainproperties = [Свойства предметной области]Уравнения мелкой воды с топографией дна.
topicdescr_physics/symmetry = [Симметрия]Условие симметрии.
topicdescr_physics/symmetryaxisreferencepoint = [Опорная точка оси симметрии]Определяет опорную точку на оси симметрии в двумерной осевой симметрии для падающей волны.
topicdescr_physics/symmetryfluid = [Симметрия]Условие симметрии потока жидкости.
topicdescr_physics/symmetryforsurfacetosurfaceradiation = [Симметрия излучения от поверхности к поверхности]Условие симметрии для расчета коэффициента обзора при излучении от поверхности к поверхности.
topicdescr_physics/symmetryfreeporous = [Симметрия]Условие симметрии течения в свободной и пористой среде.
topicdescr_physics/symmetryheavyspecies = [Симметрия]Условие симметрии для переноса тяжелых веществ.
topicdescr_physics/symmetryint = [Симметрия, Интерфейс]Условие симметрии.
topicdescr_physics/symmetryplane = [Плоскость симметрии]Условие симметрии для осесимметричного структурного анализа.
topicdescr_physics/symmetrysolid = [Симметрия]Условие симметрии для структурного анализа.
topicdescr_physics/symmetrythermalsolid = [Симметрия]Условие симметрии.
topicdescr_physics/symmetrythermoacousticsolid = [Симметрия]Условие симметрии.
topicdescr_physics/ta_interiorslipwall = [Внутренняя скользящая стена] Состояние скользящей стены для внутренней стены.
topicdescr_physics/ta_lumpedport = [Сосредоточенный порт]Сосредоточенное граничное условие, которое можно подключить к цепи.
topicdescr_physics/ta_wall = [Стена]Граничное условие стены.
topicdescr_physics/tatd_interiorslipwall = [Внутренняя скользящая стена] Состояние скользящей стены для внутренней стены.
topicdescr_physics/tcdee_electrolyte = [Электролит] Уравнения электролитной фазы, включая балансы заряда и массы.
topicdescr_physics/tcs_adsorptions = [Адсорбция] Адсорбция и десорбция в пористом материале.
topicdescr_physics/tcs_fluidporouscatalyst = [Жидкость]Свойства жидкой фазы, присутствующей в пористом каталитическом материале.
topicdescr_physics/tcs_flux = [Flux]Граничные условия потока для переноса видов.
topicdescr_physics/tcs_fluxdiscontinuity = [Разрыв потока]Условие разрыва потока массы. Может наноситься на внутренние границы или пары.
topicdescr_physics/tcs_inflow = [Вход]Укажите граничное условие притока видов. Состав смеси на входе может быть указан в виде отдельных массовых долей, мольных долей, молярных концентраций, числовых плотностей или плотностей частиц.
topicdescr_physics/tcs_outflow = [Отток]Условие оттока видов. Применяется на границах, где виды выносятся из модельной области потоком жидкости.
topicdescr_physics/tcs_packedbedconc = [Уплотненный слой]Укажите перенос видов и реакции в уплотненном слое.
topicdescr_physics/tcs_pellettransportproperties = [Свойства транспортировки гранул]Свойства конвекции и диффузии внутри гранулы в дополнительном измерении.
topicdescr_physics/tcs_porouscatalyst = [Пористый катализатор] Поток жидкости, адсорбция и поверхностная реакция в катализаторе.
topicdescr_physics/tcs_porousinitcconc = [Начальные значения]Укажите начальные значения концентрации внутри гранул.
topicdescr_physics/tcs_porousmatrixcatalyst = [Пористая матрица] Укажите пористость, объемную и твердую плотность.
topicdescr_physics/tcs_porouspelletconc = [Пеллеты]Укажите перенос видов и реакции в уплотненном слое.
topicdescr_physics/tcs_porouspelletfluidinterfaceconc = [Интерфейс гранулы-жидкость]Укажите граничные условия на границе раздела гранул-жидкости.
topicdescr_physics/tcs_porousreactionconc = [Реакции]Определить химические реакции, протекающие в окатышах насадочного слоя.
topicdescr_physics/tcs_poroustransportproperties = [Свойства транспорта]Определите свойства транспорта внутри окатышей насадочного слоя.
topicdescr_physics/tcs_reactionsconc = [Источники реакций]Источники реакций для потребления или производства видов вследствие одной или нескольких реакций внутри гранул.
topicdescr_physics/tcs_reactionwithturbulencemodel = [Реакция]Реакция с моделью турбулентности.
topicdescr_physics/tcs_reactivepelletbedconc = [Реактивный слой гранул]Перенос массы внутри гранулы в дополнительное измерение.
topicdescr_physics/tcs_speciesproperties = [Свойства вида]Указывает свойства вида, такие как молярная масса.
topicdescr_physics/tcs_surfacereactioncatalyst = [Поверхностная реакция]Поверхностные реакции для объемных частиц, адсорбированных частиц и определяемых пользователем частиц.
topicdescr_physics/tcs_symmetry = [Симметрия]Условие симметрии видов. Нормальный поток массы через границу равен нулю.
topicdescr_physics/tcs_vaporinflow = [Приток пара]Условия притока пара из восходящей газовой смеси, контактирующей с жидкостью.
topicdescr_physics/tcs_vaporliquidinterface = [Пар-Жидкость] Условия давления пара на границе раздела жидкостей, где вещества испаряются или конденсируются.
topicdescr_physics/tcs_vaporliquidinterfaceinterior = [Смесь пар-жидкость]Давление пара и состояние жидкости на границах раздела, где частицы испаряются или конденсируются.
topicdescr_physics/tcsporousmediatransportproperties = [Свойства транспортировки пористой среды]Свойства транспортировки пористой среды.
topicdescr_physics/tds_adsorptions = [Адсорбция] Адсорбция и десорбция в пористом материале.
topicdescr_physics/tds_fluidporouscatalyst = [Жидкость]Свойства жидкой фазы, присутствующей в пористом каталитическом материале.
topicdescr_physics/tds_flux = [Flux]Произвольный заданный пользователем поток при граничном условии.
topicdescr_physics/tds_fluxdiscontinuity = [Разрыв потока]Условие разрыва потока массы. Может наноситься на внутренние границы или пары.
topicdescr_physics/tds_inflow = [Вход]Укажите граничное условие притока видов. Может быть обеспечено путем задания концентрации видов или с помощью условия Данквертса (нормального потока).
topicdescr_physics/tds_openboundary = [Открытая граница] Состояние вида с открытой границей. Применяется на границах, вдоль которых может возникнуть как конвективный приток, так и отток.
topicdescr_physics/tds_outflow = [Отток]Условие оттока видов. Применяется на границах, где виды выносятся из модельной области потоком жидкости.
topicdescr_physics/tds_packedbed = [Уплотненный слой]Укажите перенос видов и реакции в уплотненном слое.
topicdescr_physics/tds_periodiccondition = [Периодическое условие]Периодическое условие для перевозки видов. Концентрация видов и массовый поток заданы одинаковыми на обеих сторонах (источник и пункт назначения) выбора.
topicdescr_physics/tds_porouscatalyst = [Пористый катализатор] Поток жидкости, адсорбция и поверхностная реакция в катализаторе.
topicdescr_physics/tds_porousdiffusion = [Диффузия]Укажите диффузионные свойства внутри гранул.
topicdescr_physics/tds_porousinitc = [Начальные значения]Укажите начальные значения концентрации внутри гранул.
topicdescr_physics/tds_porouslayerreactions = [Реакции пористого слоя] Укажите перенос веществ и реакции в прореагировавшем слое (модель сжимающегося ядра).
topicdescr_physics/tds_porousmatrixcatalyst = [Пористая матрица] Укажите пористость, объемную и твердую плотность.
topicdescr_physics/tds_porousmedium = [Пористая среда] Транспортные свойства пористой среды.
topicdescr_physics/tds_porouspellet = [Пеллеты]Укажите перенос видов и реакции в слое пеллет.
topicdescr_physics/tds_porouspelletfluidinterface = [Интерфейс гранулы-жидкость]Укажите граничные условия на границе раздела гранул-жидкости.
topicdescr_physics/tds_porousreaction = [Реакции]Определить химические реакции, протекающие в окатышах насадочного слоя.
topicdescr_physics/tds_reactionx = [Реакция]Химические реакции, которые производят или потребляют виды в дополнительном измерении.
topicdescr_physics/tds_reactivepelletbed = [Реактивный слой гранул]Укажите свойства гранул в дополнительном измерении.
topicdescr_physics/tds_shrinkingcorereactions = [ShrinkingCoreReactions]Укажите перенос видов и поверхностные реакции на поверхности ядра (модель сжимающегося ядра).
topicdescr_physics/tds_speciesproperties = [Свойства вида]Указывает свойства вида, такие как заряд.
topicdescr_physics/tds_surfacereactioncatalyst = [Поверхностная реакция]Поверхностные реакции для объемных частиц, адсорбированных частиц и определяемых пользователем частиц.
topicdescr_physics/tds_symmetry = [Симметрия]Условие симметрии видов. Нормальный поток массы через границу равен нулю.
topicdescr_physics/tds_volatilization = [Испарение]Модель испарения в частично насыщенной области.
topicdescr_physics/teew_electriccurrentdensity = [Плотность электрического тока для волнового интерфейса с явным во времени в модуле «Волновая оптика»] В область добавлена ​​плотность внешнего электрического тока.
topicdescr_physics/teew_flux = [Поток]Условие как для тангенциального электрического, так и для магнитного поля на границе.
topicdescr_physics/temperature = [Температура]Заданная температура.
topicdescr_physics/temperatureboundary = [Температура]Заданная температура на границе.
topicdescr_physics/temperaturedeviation = [Отклонение температуры] Определяет фиксированное отклонение температуры от равновесной температуры на границах.
topicdescr_physics/temperatureedge = [Температура края]Заданная температура на краю.
topicdescr_physics/temperatureharmonicperturbation = [Гармоническое возмущение]Гармоническое изменение заданной температуры.
topicdescr_physics/temperatureinterface = [Температура, интерфейс]Заданная температура на интерфейсе слоев.
topicdescr_physics/temperatureinterfaceharmonicperturbation = [Гармоническое возмущение]Гармоническое изменение заданной температуры на границе слоев.
topicdescr_physics/temperaturenode = [Температура]Одноконтактный компонент с заданной температурой.
topicdescr_physics/temperaturepoint = [Точка температуры]Заданная температура в точке.
topicdescr_physics/temperaturevariation = [Изменение температуры] Предписанное акустическое изменение температуры.
topicdescr_physics/temw_waveequationelectric = [Волновое уравнение, электрическое для переходного интерфейса ЭМВ для радиочастотного модуля] Волновое уравнение переходного процесса для магнитного векторного потенциала.
topicdescr_physics/terminatingimpedance = [Оконечный импеданс]Условие задания импеданса на границе.
topicdescr_physics/testmaterial = [Тестовый материал] Проверьте стабильность материала с помощью набора заранее заданных вариантов нагрузки на один элемент.
topicdescr_physics/thermalcapacitor = [Термический конденсатор]Двухконтактный тепловой конденсатор.
topicdescr_physics/thermalconnection = [Тепловое соединение]Соединяет два граничных элемента с помощью терморезистора, теплового конденсатора или сосредоточенной тепловой системы.
topicdescr_physics/thermalcontact = [Термический контакт]Термический контакт между двумя твердыми доменами.
topicdescr_physics/thermalcontactinterface = [Термический контакт, интерфейс]Тепловой контакт между двумя многослойными оболочками.
topicdescr_physics/thermaldamage = [Термическое повреждение]Термическое повреждение биологической ткани.
topicdescr_physics/thermaldispersion = [Термическая дисперсия]Термическая дисперсия в пористой среде.
topicdescr_physics/thermaleffects = [Термические эффекты]Термические эффекты для вязкоупругого материала.
topicdescr_physics/thermalevent = [Тепловое событие]Настройте источник тепла на основе событий в аккумуляторном блоке.
topicdescr_physics/thermalexpansion = [Тепловое расширение]Тепловая деформация.
topicdescr_physics/thermalexpansionatt = [Тепловое расширение крепления]Термическое расширение крепления.
topicdescr_physics/thermalexpansionfiber = [Тепловое расширение] Влияние термической деформации в волокнах.
topicdescr_physics/thermalexpansionfix = [Тепловое расширение фиксированных ограничений]Термическая деформация ограничений из-за изменения температуры.
topicdescr_physics/thermalexpansionfixintep = [Тепловое расширение фиксированных ограничений в многослойной оболочке]Термическая деформация ограничений из-за изменения температуры на уровне интерфейса в многослойной оболочке.
topicdescr_physics/thermalexpansionfixints = [Тепловое расширение фиксированных ограничений в многослойной оболочке]Термическая деформация ограничений из-за изменения температуры на уровне интерфейса в многослойной оболочке.
topicdescr_physics/thermalexpansionnorot = [Тепловое расширение при отсутствии вращения]Термическая деформация ограничений из-за изменения температуры.
topicdescr_physics/thermalexpansionpd = [Тепловое расширение при заданном смещении]Термическая деформация ограничителей из-за изменения температуры.
topicdescr_physics/thermalexpansionpdintep = [Тепловое расширение при заданном смещении в многослойной оболочке]Термическая деформация ограничений из-за изменения температуры на уровне интерфейса в многослойной оболочке.
topicdescr_physics/thermalexpansionpdints = [Тепловое расширение при заданном смещении в многослойной оболочке]Термическая деформация ограничений из-за изменения температуры на уровне интерфейса в многослойной оболочке.
topicdescr_physics/thermalexpansionpin = [Тепловое расширение закреплено]Термическая деформация ограничений из-за изменения температуры.
topicdescr_physics/thermalexpansionrc = [Тепловое расширение жесткого соединителя]Термическое расширение жесткого соединителя.
topicdescr_physics/thermalexpansionrcint = [Тепловое расширение жесткого соединителя]Тепловое расширение жесткого соединителя уровня интерфейса в многослойной оболочке.
topicdescr_physics/thermalexpansionrd = [Тепловое расширение твердого материала]Термическое расширение твердого материала.
topicdescr_physics/thermalinsulation = [Теплоизоляция] Граничные условия нулевого теплового потока.
topicdescr_physics/thermalinsulationedge = [Теплоизоляция, край]Вводит температурный разрыв на выбранных краях.
topicdescr_physics/thermalinsulationinterface = [Теплоизоляция, интерфейс]Граничные условия нулевого теплового потока на границе раздела слоев.
topicdescr_physics/thermalinsulationinterfacedefault = [Теплоизоляция, интерфейс]Граничные условия нулевого теплового потока на границе раздела слоев.
topicdescr_physics/thermalmass = [Тепловая масса]Одноконтактный компонент, эквивалентный тепловому конденсатору, подключенному к узлу с фиксированной температурой.
topicdescr_physics/thermalreemission = [Термическое повторное излучение] Диффузная адсорбция и повторное излучение атомов или молекул со стены с распределением скоростей в зависимости от температуры.
topicdescr_physics/thermionicemission = [Термионная эмиссия]Тепловая эмиссия электронов с поверхности при заданной температуре и работе выхода.
topicdescr_physics/thermocontinuity = [Непрерывность]Условие непрерывности температуры.
topicdescr_physics/thermoelasticdamping = [Термоупругое демпфирование]Термоупругое демпфирование источника тепла из-за изменений напряжения.
topicdescr_physics/thermoelectricmodule = [Термоэлектрический модуль]Двухконтактный компонент для моделирования термоэлектрического модуля.
topicdescr_physics/thermophoreticforce = [Термофоретическая сила]Оказывает термофоретическое воздействие на частицы в температурном поле.
topicdescr_physics/thermoviscousacousticsmodel = [Модель термовязкостной акустики] Модель термовязкостного акустического материала для акустического анализа.
topicdescr_physics/thermoviscousboundarylayerimpedance = [Сопротивление термовязкостного граничного слоя] Импеданс термовязкостного граничного слоя для акустического анализа.
topicdescr_physics/thickness = [Толщина]Пользовательская толщина.
topicdescr_physics/thicknesschange = [Изменение толщины]Изменение толщины для переходных исследований в оболочках и мембранах.
topicdescr_physics/thicknessoffset = [Толщина и смещение]Толщина и смещение пластин и оболочек.
topicdescr_physics/thinbarrier = [Тонкий барьер] Бесконечно тонкий барьер, который действует как сопротивление полю потока.
topicdescr_physics/thinbarrierint = [Тонкий барьер, интерфейс] Бесконечно тонкий барьер, который действует как сопротивление полю потока.
topicdescr_physics/thinconductivelayer = [Тонкий проводящий слой]Тонкий проводящий слой для передачи электрического тока.
topicdescr_physics/thindielectricfilm = [Тонкая диэлектрическая пленка] Изменяет коэффициенты отражения и пропускания в зависимости от свойств пленки.
topicdescr_physics/thindiffusionbarrier = [Тонкий диффузионный барьер] Бесконечно тонкий барьер для переноса видов. Перенос видов через барьер ограничивается диффузией.
topicdescr_physics/thinelasticlayer = [Тонкий эластичный слой]Тонкий эластичный слой для структурного анализа.
topicdescr_physics/thinelasticlayerint = [Тонкий эластичный слой, интерфейс]Тонкий эластичный слой на интерфейсах многослойных оболочек.
topicdescr_physics/thinelectrodelayer = [Тонкий электродный слой] Состояние резистивной или изолирующей щели на границе.
topicdescr_physics/thinelectrodesurface = [Тонкая поверхность электрода] Состояние щели на поверхности электрода на границе.
topicdescr_physics/thinelectrolytelayer = [Тонкий слой электролита] Состояние резистивной или изолирующей щели на границе.
topicdescr_physics/thinfilm = [Тонкая пленка]Модель теплопередачи для тонких пленок.
topicdescr_physics/thinh2gasdiffusionelectrode = [Тонкий газодиффузионный электрод H2] Задает свойства тонкого газодиффузионного электрода H2.
topicdescr_physics/thinh2gasdiffusionelectrodereaction = [Реакция тонкого газодиффузионного электрода H2] Электрохимические реакции в тонком газодиффузионном электроде H2.
topicdescr_physics/thinimpermeablebarrier = [Тонкий непроницаемый барьер] Бесконечно тонкий непроницаемый барьер для транспортировки видов. 
topicdescr_physics/thinlayer = [Тонкий слой]Модель теплопередачи для тонких слоев. Слой может быть резистивным, проводящим или более общим, с использованием дополнительных измерений.
topicdescr_physics/thinlayeredshell = [Тонкослойная оболочка]Модель теплопередачи для многослойных оболочек.
topicdescr_physics/thinlayeredshellheatsource = [Источник тепла]Распределенный источник тепла в тонкослоистой оболочке.
topicdescr_physics/thinlowpermeabilitygap = [Тонкий зазор с низкой проницаемостью] Тонкий слой с магнитной проницаемостью ниже, чем у окружающей среды.
topicdescr_physics/thinlowpermittivitygap = [Тонкий зазор с низкой диэлектрической проницаемостью]Тонкий слой с электрической диэлектрической проницаемостью ниже, чем у окружающей среды.
topicdescr_physics/thino2gasdiffusionelectrode = [Тонкий газодиффузионный электрод O2] Задает свойства тонкого газодиффузионного электрода O2.
topicdescr_physics/thino2gasdiffusionelectrodereaction = [Реакция тонкого газодиффузионного электрода O2] Электрохимические реакции в тонком газодиффузионном электроде O2.
topicdescr_physics/thinpassivemetalsurface = [Тонкая пассивная металлическая поверхность] Устанавливает состояние изоляции на тонкой защищенной границе.
topicdescr_physics/thinpiezoresistivelayer = [Тонкий пьезорезистивный слой]Тонкий пьезорезистивный слой для пьезорезистивных интерфейсов.
topicdescr_physics/thinprotectedmetalsurface = [Тонкая защищенная металлическая поверхность] Устанавливает плотность тока (поток) электролита восстановления кислорода на тонкой защищенной границе.
topicdescr_physics/thinrod = [Тонкий стержень]Модель теплопередачи для тонких стержней.
topicdescr_physics/thinthermallyresistivelayer = [Тонкий терморезистивный слой]Модель теплопередачи для тонких резистивных слоев.
topicdescr_physics/threeportnetwork = [Трехпортовая сеть]Граничное условие, характеризующее реакцию трехпортовой сетевой системы.
topicdescr_physics/threeportnetworkport = [Трехпортовый сетевой порт]Граничное условие для выбора границ, соответствующих порту 1, порту 2 и порту 3 во входных S-параметрах.
topicdescr_physics/thrustbearing = [Упорный подшипник]Упорный подшипник в интерфейсах сплошного ротора и балочного ротора.
topicdescr_physics/timecolumn = [Столбец времени]Столбец времени: столбец в файле экспериментальных данных, содержащий время выполнения измерений в столбцах значений.
topicdescr_physics/timeperiodicrotatingdomain = [TimePeriodicRotatingDomain]Магнитная область, в которой конструкции подвергаются вращению твердого тела и испытывают физику вращающихся магнитных полей. 
topicdescr_physics/tjunction = [Т-образное соединение]Падение давления в системе трубопроводов из-за потерь в Т-образном соединении.
topicdescr_physics/totalfieldscontinuity = [Непрерывность общих полей] Непрерывность полей полного акустического давления и скорости.
topicdescr_physics/totalvacuum = [Общий вакуум]Укажите, что на границах существует полный вакуум.
topicdescr_physics/tpdl_inflow = [Вход]Граничные условия притока для двухфазного течения в пористой среде.
topicdescr_physics/tpdl_init = [Начальные значения]Начальные значения давления и насыщения.
topicdescr_physics/tpdl_outflow = [Выход]Граничные условия истечения для двухфазного потока в пористой среде.
topicdescr_physics/tpf_fluidproperties = [Свойства жидкости]Уравнения течения двухфазной жидкости (без учета объемных сил).
topicdescr_physics/tpf_initialinterface = [Начальный интерфейс] Исходное положение границы раздела жидкость-жидкость.
topicdescr_physics/tpf_wall = [Wall]Пристеночные граничные условия для двухфазного потока.
topicdescr_physics/transfermatrixcoupling = [Соединение матрицы переноса]Соединяет поле на двух границах с помощью матрицы переноса.
topicdescr_physics/transformationcondition = [Условие трансформации] Условие, которое должно быть удовлетворено для осуществления фазового преобразования.
topicdescr_physics/transformer = [Трансформатор]Четырехконтактное устройство, моделирующее трансформатор переменного тока.
topicdescr_physics/transientacousticaxisource = [Источник линии на оси]Источник линии на оси симметрии.
topicdescr_physics/transientacousticcircularsource = [Круговой источник] Внеосевой круглый источник (2D-осевая симметрия).
topicdescr_physics/transientacousticlinesource = [Источник линии]Источник линии на краю.
topicdescr_physics/transientmonopolelinesource = [Источник точки] Источник точки (источник линии вне плоскости в 2D).
topicdescr_physics/transientmonopolepointsource = [Источник монопольной точки] Источник монопольной точки.
topicdescr_physics/transientpressureacousticsmodel = [Модель акустики переходного давления]Модель материала акустики переходного давления для скалярного волнового уравнения.
topicdescr_physics/transitionalflowproperties = [Свойства потока]Свойства жидкости в переходном режиме течения на доменах.
topicdescr_physics/transitionbetweendiscretelevelsboundary = [Переход между дискретными уровнями]Переход между двумя дискретными уровнями-ловушками на поверхности полупроводника.
topicdescr_physics/transitionbetweendiscretelevelsdomain = [Переход между дискретными уровнями]Переход между двумя дискретными уровнями ловушки в полупроводниковой области.
topicdescr_physics/transitionbetweendiscretelevelsheterointerface = [Переход между дискретными уровнями]Переход между двумя дискретными уровнями ловушки на полупроводниковом гетероинтерфейсе.
topicdescr_physics/transitionboundarycondition = [Переходное граничное условие]Внутреннее граничное условие, представляющее геометрически тонкую, но не обязательно электрически тонкую среду.
topicdescr_physics/translationalmotion = [Поступательное движение] Скорость перемещения твердого тела.
topicdescr_physics/transmissionerror = [Ошибка трансмиссии] Добавляет ошибку трансмиссии к зубчатой паре.
topicdescr_physics/transmissionlineequation = [Уравнение линии передачи] Область уравнения линии передачи.
topicdescr_physics/transportinporousmediaproperties = [Свойства транспорта в пористых средах]Эффективные свойства переноса веществ в регионах с пористыми средами. Также включает входные данные модели, необходимые для выбранных транспортных механизмов.
topicdescr_physics/transportproperties = [Свойства транспорта] Свойства транспорта для интерфейса Reacting Flow.
topicdescr_physics/trapassistedheterointerfacerecombination = [Рекомбинация гетероинтерфейсов с помощью ловушек] Электронно-дырочная рекомбинация с помощью ловушек на полупроводниковых гетероинтерфейсах.
topicdescr_physics/trapassistedrecombination = [Рекомбинация с помощью ловушек] Электронно-дырочная рекомбинация с помощью ловушек для полупроводников.
topicdescr_physics/trapassistedsurfacerecombination = [Поверхностная рекомбинация с помощью ловушек] Электронно-дырочная рекомбинация с помощью ловушек на поверхностях полупроводников.
topicdescr_physics/ts_chemicalpotential = [Химический потенциал]Определите свойства диффузии частиц в твердом теле с точки зрения химического потенциала.
topicdescr_physics/ts_externalchemicalpotential = [Внешний химический потенциал]Добавьте внешний вклад в химический потенциал.
topicdescr_physics/ts_externalflux = [Внешний поток]Добавить поток внешнего области.
topicdescr_physics/ts_fluxboundary = [Flux]Граничное условие потока.
topicdescr_physics/ts_solid = [Твердый]Укажите свойства диффузии частиц в твердом теле.
topicdescr_physics/ts_source = [Источник]Добавить исходный термин.
topicdescr_physics/ts_symmetry = [Симметрия]Граничное условие симметрии. Нормальный поток через границы равен нулю.
topicdescr_physics/ts_prescribedchemicalpotential = [Заданный химический потенциал]Укажите значение химического потенциала на границах.
topicdescr_physics/ts_prescribedtransportedquantity = [Заданное транспортируемое количество] Укажите значения зависимых переменных на границах.
topicdescr_physics/tube = [Трубка]Добавляет трубку теплообменника к теплообменнику. Для имитации многоходовых теплообменников можно добавить несколько трубок.
topicdescr_physics/turbulentmixing = [Турбулентное смешивание]Смешение видов, вызванное турбулентностью потока жидкости.
topicdescr_physics/twoportnetwork = [Двухпортовая сеть]Граничное условие, характеризующее реакцию двухпортовой сетевой системы.
topicdescr_physics/twoportnetworkport = [Двухпортовый сетевой порт]Граничное условие для выбора границ, соответствующих порту 1 и порту 2 во входных S-параметрах.
topicdescr_physics/udgeneration = [Пользовательская генерация] Пользовательская генерация электронно-дырочных элементов для полупроводников.
topicdescr_physics/udrecombination = [Пользовательская рекомбинация] Пользовательская электронно-дырочная рекомбинация для полупроводников.
topicdescr_physics/unchargedspecies = [Незаряженные виды] Областьные виды.
topicdescr_physics/uncoupledshell = [Несвязанная оболочка]Несвязанная оболочка.
topicdescr_physics/uniformelement = [Uniform Element]Граничное условие для определения подэлементов для многоэлементного универсального порта с сосредоточенными параметрами. 
topicdescr_physics/universaljoint = [Универсальный шарнир]Определяет универсальный шарнир между двумя корпусами.
topicdescr_physics/unsaturatedporousmedium = [Ненасыщенная пористая среда] Транспортные свойства ненасыщенной пористой среды.
topicdescr_physics/unsaturateddualpermeabilitymedium = [Ненасыщенная среда с двойной проницаемостью] Транспортные свойства ненасыщенной среды с двойной проницаемостью.
topicdescr_physics/userdefined = [Определяется пользователем]Явное указание векторного поля.
topicdescr_physics/vacuumpump = [Вакуумный насос]Эффективное давление на выходе, создаваемое вакуумным насосом.
topicdescr_physics/valuecolumn = [Столбец значений] Столбец значений: столбец в файле экспериментальных данных, содержащий значения измерений.
topicdescr_physics/valve = [Клапан]Падение давления из-за дроссельного клапана.
topicdescr_physics/varyingthickness = [Измененная толщина] Укажите толщину, которая переопределяет толщину, указанную на уровне материала.
topicdescr_physics/velocity = [Заданная скорость] Граничное условие заданной скорости для структурного анализа.
topicdescr_physics/velocitydriftdiffusion = [Скорость]Конвекция электронов вследствие движения фонового газа.
topicdescr_physics/velocityharmonicperturbation = [Гармоническое возмущение заданной скорости]Вклад гармонического возмущения для условия, примененного в родительском объекте.
topicdescr_physics/velocityharmonicperturbationints = [Гармоническое возмущение заданной скорости в многослойной оболочке]Вклад гармонического возмущения для условия, применяемого к интерфейсу родительского объекта в многослойной оболочке.
topicdescr_physics/velocityint = [Заданная скорость, интерфейс] Граничное условие заданной скорости для интерфейса в физике слоистых оболочек для структурного анализа.
topicdescr_physics/velocitynode = [Узел скорости]Одноконтактный компонент с заданной скоростью.
topicdescr_physics/velocitypotential = [Потенциал скорости]Состояние потенциала скорости.
topicdescr_physics/velocityreinitialization = [Повторная инициализация скорости] Прерывисто изменяет скорость частицы и вспомогательные зависимые переменные при выполнении определенного условия.
topicdescr_physics/velocityreinitializationaccumulator = [Аккумулятор]Создает переменную поля в наборе доменов, которая увеличивается всякий раз, когда скорость частицы меняется прерывисто в пределах выбранных доменов.
topicdescr_physics/velocitythermoacoustic = [Скорость]Заданное условие скорости.
topicdescr_physics/vibrationfatiguemodel = [Гармоническая вибрация]Модель усталости от гармонической вибрации.
topicdescr_physics/virtualcrackextension = [Расширение виртуальной трещины]Рассчитывает скорость выделения энергии трещины с помощью метода расширения виртуальной трещины.
topicdescr_physics/viscoelasticity = [Вязкоупругость]Модель вязкоупругого материала для структурного анализа.
topicdescr_physics/viscoelasticmodel = [Линейный вязкоупругий материал]Модель вязкоупругого материала для структурного анализа.
topicdescr_physics/viscoplasticity = [Вязкопластичность]Вязкопластический материал для структурного анализа.
topicdescr_physics/viscousdissipation = [Вязкостное рассеяние]Тепловыделение из-за вязкости жидкости. Может определяться пользователем или предоставляться другим интерфейсом физики жидкости.
topicdescr_physics/viscousheating = [Вязкостный нагрев]Тепловыделение из-за вязкости жидкости. Может определяться пользователем или предоставляться другим интерфейсом физики жидкости.
topicdescr_physics/voltagecurrentsource = [Источник тока, управляемый напряжением] Четырехконтактный источник тока, управляемый напряжением. Ток, текущий между первыми двумя контактами, пропорционален напряжению на двух других контактах.
topicdescr_physics/voltagelosses = [Потери напряжения]Потери напряжения, возникающие в аккумуляторе при подаче тока.
topicdescr_physics/voltagesource = [Источник напряжения] Двухконтактный идеальный источник напряжения.
topicdescr_physics/voltagevoltagesource = [Источник напряжения, управляемый напряжением] Четырехконтактный источник напряжения, управляемый напряжением. Напряжение, приложенное между первыми двумя контактами, пропорционально напряжению на двух других контактах.
topicdescr_physics/voltmeter = [Вольтметр]Двухконтактный прибор для измерения напряжения. Может создавать зонды. 
topicdescr_physics/volumeforce = [Объемная сила]Объемная сила в жидкости.
topicdescr_physics/volumeforcecalculation  = [Расчет объемной силы]Добавляет зависимые переменные для объемной силы, действующей на жидкость частицами.
topicdescr_physics/volumeforcesource = [Источник объемной силы]Источник объемной силы в жидкости.
topicdescr_physics/volumeheatsource = [Объемный источник тепла]Объемный источник тепла в устройстве.
topicdescr_physics/vortexsheet = [Вихревой слой]Состояние внутреннего вихревого слоя.
topicdescr_physics/wall = [Стена]Граничные условия для стены.
topicdescr_physics/wallbc = [Стена]Граничные условия для стены.
topicdescr_physics/walldefault = [Стена (функция по умолчанию) для криволинейных координат. Должно быть таким же, как cc_wall]Условие скольжения. Векторное поле имеет нулевую нормальную составляющую у стенки.
topicdescr_physics/walldriftdiffusion = [Wall]Настенное граничное условие для электронов.
topicdescr_physics/wallfluidinterface = [Интерфейс «Стена-Жидкость»]Подузел «Интерфейс Стена-Жидкость» применяет силы, необходимые для поддержания угла контакта со стеной.
topicdescr_physics/wallfreeporous = [Стена]Граничные условия на стенке для свободного пористого течения.
topicdescr_physics/wallheattransfer = [Теплопередача через стену] Используйте функцию «Теплопередача через стену», чтобы настроить теплообмен через стенку трубы.
topicdescr_physics/wallheattransferinner = [Теплопередача по стене, внутренняя] Используйте эту функцию для настройки теплообмена через стенку трубы.
topicdescr_physics/walllayer = [Слой стены] Элемент «Слой стены» — это дополнительный элемент, используемый для определения теплопроводности и толщины стены для элемента «Теплопередача стены».
topicdescr_physics/wallmasstransfer = [Массообмен на стенке] Утечка вещества через стенку трубы, используемая при транспортировке разбавленных веществ по трубам.
topicdescr_physics/wallproperties = [Свойства стены]Назначает свойства материала выбранным границам.
topicdescr_physics/warpage = [Деформация]Разложите поле смещения на средние и деформирующие компоненты смещения.
topicdescr_physics/waterabsorptiondesorptionh2side = [Абсорбция-десорбция воды, сторона H2] Определяет граничные условия, которые определяют поток воды абсорбции-десорбции между мембраной и соседней областью газовой фазы H2.
topicdescr_physics/waterabsorptiondesorptiono2side = [Абсорбция-десорбция воды, сторона O2] Определяет граничные условия, которые определяют поток воды абсорбции-десорбции между мембраной и соседней областью газовой фазы O2.
topicdescr_physics/waterchemicalpotential = [Химический потенциал воды] Определяет химический потенциал воды на внешних границах мембраны.
topicdescr_physics/watercondensationevaporation = [Конденсация-испарение воды] Указывает скорость реакции и теплоту реакции конденсации-испарения воды.
topicdescr_physics/waterflux = [Поток воды] Определяет поток воды на внешних границах мембраны.
topicdescr_physics/watergasshiftreaction = [Реакция конверсии водяного газа] Определяет скорость реакции и теплоту реакции конверсии водяного газа.
topicdescr_physics/watersource = [Источник воды]Указывает источник высоты в уравнении непрерывности.
topicdescr_physics/waveequation = [Волновое уравнение]Волновое уравнение.
topicdescr_physics/waveequationbeamenvelopes = [Волновое уравнение, огибающие луча]Волновое уравнение, представляющее одну или две волны, распространяющиеся в заданных направлениях.
topicdescr_physics/waveequationelectric = [Волновое уравнение, электрическое]Уравнение Гельмгольца для электрического поля.
topicdescr_physics/waveequations = [Волновые уравнения]Уравнения переходного процесса для электрического и магнитного полей.
topicdescr_physics/waveformpde = [Wave Form PDE] Волновая форма PDE для решения волновых уравнений, сформулированных с производными первого порядка во времени и пространстве.
topicdescr_physics/wavespeeds = [Скорость волн]Создайте переменные для скоростей упругих волн.
topicdescr_physics/weakacid = [Слабая кислота] Областьные виды.
topicdescr_physics/weakbase = [Слабая база] Областьные виды.
topicdescr_physics/weakconstraint = [Слабое ограничение]Слабое ограничение, которое добавляет множитель Лагранжа и слабое уравнение.
topicdescr_physics/weakcontribution = [Слабый вклад] Добавьте вклад в общую систему уравнений, используя выражение в слабой форме.
topicdescr_physics/weakformpde = [Слабая форма PDE] PDE в слабой форме.
topicdescr_physics/weakglobalcontribution = [Слабый вклад]Слабый вклад формы на глобальном уровне.
topicdescr_physics/weakinequalityconstraint = [Слабое ограничение-неравенство]Ограничение-неравенство, реализуемое либо с помощью метода штрафов, либо с помощью расширенной лагранжевой итерации.
topicdescr_physics/wear = [Износ] Рассчитайте износ между двумя скользящими поверхностями.
topicdescr_physics/well = [Well]Укажите давление или массовый расход в скважине.
topicdescr_physics/wettedwall = [Смачиваемая стена]Граничное условие «Смачиваемая стена».
topicdescr_physics/wkbtunnelingmodelelectrons = [Модель туннелирования электронов WKB] Добавляет подузел к гетеропереходу или контакту Шоттки для туннелирования электронов с использованием приближения WKB.
topicdescr_physics/wkbtunnelingmodelholes = [Отверстия модели туннелирования WKB] Добавляет подузел к гетеропереходу или контакту Шоттки для туннелирования дыр с использованием приближения WKB.
topicdescr_physics/wormgear = [Червячная передача]Червячная передача в многотельной динамике.
topicdescr_physics/wormwheel = [Червяк и колесо]Определяет связь между червяком и колесом.
topicdescr_physics/wrinkling = [Сморщивание]Модель сморщивания мембран.
topicdescr_physics/yjunction = [Y-образное соединение]Падение давления в системе трубопроводов из-за потерь в Y-образном соединении.
topicdescr_physics/zerocarbonflux = [Нулевой поток углерода]Граничное условие нулевого потока углерода.
topicdescr_physics/zerocharge = [Нулевой заряд] Устанавливает нормальную составляющую поля смещения на ноль. Это состояние по умолчанию на внешних границах. Это также применимо на границах симметрии электрического потенциала.
topicdescr_physics/zeroenergyflux = [Нулевой поток энергии] Граничное условие нулевого потока энергии, которое указывает, что ни один электрон не может иметь энергию меньше 0 эВ.
topicdescr_physics/zeroflux = [Нулевой поток] Устанавливает нормальную составляющую плотности вероятностного тока на границе равной нулю. Это состояние по умолчанию на внешних границах.
topicdescr_physics/zerofluxboundary = [Нулевой поток]Граничное условие нулевого потока.
topicdescr_physics/zeromagneticscalarpotential = [Нулевой магнитный скалярный потенциал] Устанавливает магнитный скалярный потенциал равным нулю на границе.
topicdescr_physics/zeronormalmeshdisplacement = [Нулевое нормальное смещение сетки]Нет (нулевого) смещения сетки по нормали к границе.
topicdescr_physics/zeronormalmeshvelocity = [Нулевая нормальная скорость сетки]Нет (нулевой) скорости сетки по нормали к границе.
topicdescr_physics/zeroprobability = [Нулевая вероятность] Граничное условие нулевой вероятности, означающее, что не существует электронов с бесконечной энергией.
topicdescr_physics/zerotemperaturedeviation = [Нулевое отклонение температуры]Граничное условие, которое поддерживает температуру на равновесном уровне.
topicdescr_physics/zerothorderhamiltoniansemicond = [Гамильтониан нулевого порядка]Добавьте члены гамильтониана нулевого порядка.

topicdescr_batch/batch = Запустите моделирование как отдельное пакетное задание.
topicdescr_batch/class = Запустите основной метод внешнего скомпилированного файла класса Java. 
topicdescr_batch/cluster = Отправьте пакетное задание в планировщик заданий или запустите модель в распределенном режиме как пакетное задание.
topicdescr_batch/data = Информация о запущенных пакетных процессах.
topicdescr_batch/designofexperiments = Добавьте план экспериментов (DOE) для анализа моделирования.
topicdescr_batch/evalnumericalseq = Оцените некоторые или все узлы производных значений, определенные в ветви «Результаты» дерева модели. 
topicdescr_batch/exportseq = Запустите узел экспорта и сохраните файл с уникальным именем.
topicdescr_batch/functionsweep = Запустите специальную версию параметрической очистки, которая сканирует функции. 
topicdescr_batch/geomseq = Запустите геометрическую последовательность.
topicdescr_batch/jobseq = Запустите другую конфигурацию задания. 
topicdescr_batch/materialsweep = Запустите специальную версию параметрической развертки, которая сканирует материалы.
topicdescr_batch/meshseq = Запустите последовательность создания сетки.
topicdescr_batch/methodcall = Запускает метод модели.
topicdescr_batch/numericalseq = Запустите функцию производных значений.
topicdescr_batch/optimization = Запустите исследование оптимизации с помощью решателя оптимизации без градиента.
topicdescr_batch/parametric = Цикл по заданному набору параметров в параметрической развертке. Для каждого набора параметров очистка выполняет последовательность, определенную его подузлами.
topicdescr_batch/process = Внешний процесс связан с запущенным пакетным заданием. Используйте окно «Внешний процесс», чтобы отслеживать запущенные внешние процессы (например, распределенные пакетные задания).
topicdescr_batch/postseq = Запустите последовательность групп графиков, создав график в графическом окне.
topicdescr_batch/save = Сохраните модель в том состоянии, в котором она находится на данный момент в конфигурации пакетного или параметрического задания.
topicdescr_batch/sequence = Выполните шаги последовательности заданий, указанные в упомянутых исследованиях.
topicdescr_batch/solutionseq = Запустите конфигурацию решателя.
topicdescr_batch/uncertaintyquantification = Используйте количественную оценку неопределенности (UQ), чтобы добавить оцененные неопределенности к результатам моделирования.

topicdescr_colorTable/colortable = Добавьте узел «Таблица цветов», чтобы импортировать или определить пользовательскую таблицу цветов.

topicdescr_common/ambientproperties = Добавьте узел Ambient Properties для указания свойств окружающей среды как пользовательских свойств или на основе метеорологических данных. 
topicdescr_common/bucklingimperfection = Добавьте узел «Несовершенство потери устойчивости», чтобы проводить нелинейные исследования потери устойчивости. 
topicdescr_common/commoninputdef = Добавьте к компоненту узел ввода модели, чтобы переопределить входные данные глобальной модели в некоторых частях геометрии компонента.
topicdescr_common/commoninputdefault = Добавьте узел Общие входные данные модели, чтобы отображать и изменять значения общих входных данных модели.
topicdescr_common/controlfunction = Добавьте функцию управления для использования на этапе исследования оптимизации.
topicdescr_common/controlvariablefield = Управляющая переменная, которая изменяется в зависимости от положения внутри выбранных геометрических объектов.  
topicdescr_common/deformingdomain = Добавьте узел «Деформирующий область», чтобы добавить движущуюся сетку, которая деформируется в некоторых областих.
topicdescr_common/deformingdomaindeformedgeometry = Добавьте узел «Деформирующий область», чтобы добавить движущуюся сетку, которая деформируется в некоторых областих.
topicdescr_common/densitytopology = Добавьте узел Топология плотности, чтобы включить оптимизацию топологии с использованием модели плотности.
topicdescr_common/expressionoperator = Добавьте узел Оператор выражения, чтобы определить общее параметризованное выражение.
topicdescr_common/fixedboundary = Добавьте узел «Фиксированная граница», чтобы указать, что движущаяся сетка фиксируется на некоторых границах.
topicdescr_common/fixedboundarydeformedgeometry = Добавьте узел «Фиксированная граница», чтобы указать, что движущаяся сетка фиксируется на некоторых границах.
topicdescr_common/fixedshapeboundary = Добавьте узел «Граница фиксированной формы» к границам, которые не должны смещаться при оптимизации формы.
topicdescr_common/fixedshapeedge = Добавьте узел «Фиксированный край» к краям, которые не должны смещаться при оптимизации формы.
topicdescr_common/fixedshapepoint = Добавьте узел «Фиксированная точка» к вершинам, которые не должны смещаться при оптимизации формы.
topicdescr_common/fixedtopologyboundary = Добавьте узел Prescribed Boundary Density, чтобы задать граничные условия для фильтра Гельмгольца в функциях топологии плотности. 
topicdescr_common/fixedtopologydomain = Добавьте узел Prescribed Density, чтобы расширить фильтр Гельмгольца для функций топологии плотности.
topicdescr_common/freeshapeboundary = Добавьте узел «Граница свободной формы» к границам, где смещение отдельных узлов сетки должно контролироваться оптимизацией формы.
topicdescr_common/freeshapedomain = Добавьте узел Область свободной формы, чтобы включить оптимизацию формы с помощью смещения границ области.
topicdescr_common/freeshapeshell = Добавьте узел «Оболочка произвольной формы» к границам, где смещение отдельных узлов сетки должно контролироваться оптимизацией формы.
topicdescr_common/freeshapesymmetry = Добавьте узел «Симметрия/Ролик» к плоским границам, где сетка должна иметь возможность скользить во время оптимизации формы. 
topicdescr_common/freetopologyboundary = Добавьте узел «Граница свободной топологии» к границам, где наличие или отсутствие материала должно определяться процессом оптимизации топологии.
topicdescr_common/globalleastsquaresobjective = Добавьте узел цели «Глобальные наименьшие квадраты», который добавляет сумму квадратов ошибок к цели в задаче оптимизации. Ошибки вычисляются как разница между внешними экспериментальными значениями и выражением модели, рассчитанным для диапазона времени или значений параметров.
topicdescr_common/globalrandomvariables = Добавьте функцию «Глобальные случайные переменные», чтобы определить случайные переменные для входных данных модели пониженного порядка.
topicdescr_common/globalreducedmodelinputs = Добавьте функцию «Глобальные входные данные уменьшенной модели», чтобы определить скалярные входные данные для моделирования уменьшенного порядка.
topicdescr_common/materialtopologyboundary = Добавьте узел «Заданная граница материала», чтобы воздействовать на границы объектов модели плотности, использующих фильтрацию Гельмгольца.
topicdescr_common/materialtopologydomain = Добавьте узел «Предписанный материал». Это приводит к тому, что в любой модели плотности выбор отфильтрованных, прогнозируемых и штрафных переменных расширяется или перезаписывается выбором заданного материала.
topicdescr_common/matrix = Добавьте узел Matrix, чтобы определить квадратную матрицу.
topicdescr_common/matrixdecomposition = Добавьте узел разложения матрицы (SVD), чтобы определить квадратную матрицу для разложения с использованием SVD.
topicdescr_common/matrixdiagonalization = Добавьте узел Диагонализация матрицы, чтобы определить матрицу 3x3 для диагонализации.
topicdescr_common/matrixinverse = Добавьте узел «Обратная матрица», чтобы определить квадратную матрицу для инвертирования.
topicdescr_common/matrixtransform = Добавьте узел «Преобразование матрицы», чтобы преобразовать матрицу между системами координат.
topicdescr_common/mirrorshape = Добавьте узел «Зеркальная симметрия», чтобы отражать функции оптимизации формы в том же компоненте.
topicdescr_common/mirrortopology = Добавьте узел «Зеркальная симметрия», чтобы отразить элементы модели плотности в том же компоненте.
topicdescr_common/operatorcontribution = Добавьте подузел «Вклад оператора» в узел «Оператор выражения», чтобы переопределить определяющее выражение оператора в подмножестве родительского выбора.
topicdescr_common/participationfactors = Добавьте узел «Коэффициенты участия» для вычисления коэффициентов участия в структурном моделировании.
topicdescr_common/polynomialboundary = Добавьте узел Polynomial Boundary к границам, где смещение должно быть представлено в виде полинома во время оптимизации формы.
topicdescr_common/polynomialshell = Добавьте узел Polynomial Shell к границам, где смещение должно быть представлено в виде полинома во время оптимизации формы.
topicdescr_common/prescribeddeformation = Добавьте узел Prescribed Deformation, чтобы добавить заданную деформацию сетки для движущейся сетки в некоторых областях.
topicdescr_common/prescribeddeformationdeformedgeometry = Добавьте узел Prescribed Deformation, чтобы добавить заданную деформацию сетки для движущейся сетки в некоторых областях.
topicdescr_common/prescribedmeshdisplacement = Добавьте узел Prescribed Сетка Displacement, чтобы добавить заданное смещение сетки для движущейся сетки на некоторых границах.
topicdescr_common/prescribedmeshdisplacementdeformedgeometry = Добавьте узел Prescribed Сетка Displacement, чтобы добавить заданное смещение сетки для движущейся сетки на некоторых границах.
topicdescr_common/prescribedmeshvelocity = Добавьте узел Prescribed Сетка Velocity на границах областей со свободным смещением, чтобы указать скорость границ. Пространственная рамка в соседних доменах движется в соответствии со скоростью.
topicdescr_common/prescribedmeshvelocitydeformedgeometry = Добавьте узел Prescribed Сетка Velocity на границах деформируемых областей, чтобы полностью указать скорость сетки на границах. Материальный каркас в соседних доменах движется в соответствии со скоростью.
topicdescr_common/prescribednormalmeshdisplacement = Добавьте узел Prescribed Normal Сетка Displacement, чтобы добавить заданное смещение сетки для движущейся сетки, нормали к некоторым границам.
topicdescr_common/prescribednormalmeshdisplacementdeformedgeometry = Добавьте узел Prescribed Normal Сетка Displacement, чтобы добавить заданное смещение сетки для движущейся сетки, нормали к некоторым границам.
topicdescr_common/prescribednormalmeshvelocity = Добавьте узел Prescribed Normal Сетка Velocity, чтобы добавить заданную скорость сетки для движущейся сетки, перпендикулярной некоторым границам.
topicdescr_common/prescribednormalmeshvelocitydeformedgeometry = Добавьте узел Prescribed Normal Сетка Velocity, чтобы добавить заданную скорость сетки для движущейся сетки, перпендикулярной некоторым границам.
topicdescr_common/responsespectrum = Добавьте узел «Спектр ответа».
topicdescr_common/rotatingboundary = Добавьте узел «Вращающаяся граница», чтобы добавить заданное вращение сетки на некоторых границах.
topicdescr_common/rotatingboundarydeformedgeometry = Добавьте узел «Вращающаяся граница», чтобы добавить заданное вращение сетки на некоторых границах.
topicdescr_common/rotatingdomain = Добавьте узел «Вращающийся область», чтобы добавить движущуюся сетку, которая вращается в некоторых областих.
topicdescr_common/rotatingdomaindeformedgeometry = Добавьте узел «Вращающийся область», чтобы добавить движущуюся сетку, которая вращается в некоторых областих.
topicdescr_common/sectorshape = Добавьте узел «Симметрия сектора», чтобы расширить возможности оптимизации формы в том же компоненте с помощью симметрии сектора.
topicdescr_common/sectortopology = Добавьте узел «Симметрия сектора», чтобы расширить функции модели плотности в том же компоненте с помощью симметрии сектора.
topicdescr_common/slip = Добавьте узел Сетка Slip, чтобы описать движущуюся сетку, которая может скользить по некоторым границам.
topicdescr_common/slipdeformedgeometry = Добавьте узел Сетка Slip, чтобы описать движущуюся сетку, которая может скользить по некоторым границам.
topicdescr_common/statevariables = Добавьте узел «Переменные состояния», чтобы определить состояния и соответствующие правила обновления.
topicdescr_common/symmetry = Добавьте узел «Симметрия/Ролик», чтобы описать движущуюся сетку, симметричную на некоторых границах.
topicdescr_common/symmetrydeformedgeometry = Добавьте узел «Симметрия/Ролик», чтобы описать движущуюся сетку, симметричную на некоторых границах.
topicdescr_common/transformation = Добавьте узел Трансформация, чтобы разрешить перемещение, масштабирование и вращение границ и доменов.
topicdescr_common/vectortransform = Добавьте узел векторного преобразования, чтобы преобразовать вектор из одной системы координат в другую.
topicdescr_common/voidtopologyboundary = Добавьте узел Prescribed Void Boundary. Он действует на границах функций модели плотности, которые используют фильтрацию Гельмгольца, ограничивая отфильтрованное поле нулевым значением.
topicdescr_common/voidtopologydomain = Добавьте узел Prescribed Void. Это приводит к тому, что в любой модели плотности выбор отфильтрованных, проецируемых и штрафных переменных расширяется или перезаписывается выбором предписанной пустоты.

topicdescr_configuration/graphstyle = Создайте конфигурацию, которая определяет настройки стиля для графиков. 
topicdescr_configuration/multiselectsolution = Создайте конфигурацию, которая определяет набор значений времени или кортежей параметров. 
topicdescr_configuration/singleselectsolution = Создайте конфигурацию, которая определяет один кортеж времени или параметров.

topicdescr_coordSystem/absorbinglayer= Поглощающий слой действует как губка, замедляя распространяющиеся волны в точном во времени моделировании.
topicdescr_coordSystem/boundary = Локальная базовая векторная система на двумерных границах (t, n) и на трехмерных границах (t1, t2, n).
topicdescr_coordSystem/combined = Система координат, представляющая собой комбинацию других систем координат, определенных в разных областях.
topicdescr_coordSystem/composite = Система координат, которая действует как последовательное применение двух других систем координат.
topicdescr_coordSystem/cylindrical = Цилиндрическую систему координат можно использовать в 2D и 3D, где требуется вращательная симметрия относительно оси.
topicdescr_coordSystem/domainnormal = Переключите направление нормали для граничной системы координат на внешней стороне некоторых областей.
topicdescr_coordSystem/fromgeometry = Система координат, выровненная по рабочей плоскости в 3D-геометрии или геометрической детали.
topicdescr_coordSystem/infiniteelement = Область бесконечных элементов — это виртуальный область, который можно растянуть до бесконечности, чтобы представить неограниченную геометрию.
topicdescr_coordSystem/mapping = Система координат, определяющая сопоставление с системой координат кадра. Сопоставленная система может работать с транслируемыми и повернутыми системами координат.
topicdescr_coordSystem/pml = Идеально согласованный слой (PML) поглощает исходящие волны, растягивая виртуальную область в комплексную плоскость.
topicdescr_coordSystem/reversenormal = Обратный вектор нормали для граничной системы координат на некоторых границах.
topicdescr_coordSystem/rotated = Повернутая система координат, которую вы определяете как вращение относительно глобальной декартовой системы координат.
topicdescr_coordSystem/scaling = Система координат масштабирования используется для создания системы, которая отображает геометрию на виртуальную геометрию, представленную координатами виртуальной системы масштабирования.
topicdescr_coordSystem/spherical = Сферическая система координат в 3D, определяемая началом координат, осью зенита и осью азимута.
topicdescr_coordSystem/vectorbase = Система координат базового вектора, в которой вы используете набор базовых векторов, заданных как компоненты кадра.

topicdescr_cpl/average = Оператор средней связи интегрирует выражение по выбору источника и делит его на меру выбора источника.
topicdescr_cpl/boundarysimilarity = Оператор связи подобия границ отображает выражение, определенное на части границы, на другую часть границы той же формы.
topicdescr_cpl/edgemap = Карта ребер указывает, что определенное ребро назначения должно быть сопоставлено с определенным ребром источника.
topicdescr_cpl/generalextrusion = Общий оператор связи вытягивания сопоставляет выражение, определенное в источнике, с выражением, которое можно оценить на любой целевой геометрии, где выражения целевой карты допустимы.
topicdescr_cpl/generalprojection = Общий оператор связи проекций оценивает выражение, определенное в источнике, путем интегрирования по линиям или кривым в зависимости от точки оценки в месте назначения.
topicdescr_cpl/identitymapping = Оператор связи тождественного отображения сопоставляет геометрические объекты, которые перекрываются, возможно, при просмотре в разных кадрах.
topicdescr_cpl/integration = Оператор интеграционной связи интегрирует выражение по выбору источника.
topicdescr_cpl/line = Оператор связи интеграции строк интегрирует выражение по строке посредством выбора исходного области, где направление линии определяется общими выражениями, зависящими от места назначения.
topicdescr_cpl/linearextrusion = Оператор связи линейного вытягивания линейно сопоставляет выражение, определенное в источнике, с выражением, которое можно вычислить в месте назначения.
topicdescr_cpl/linearprojection = Оператор связи линейной проекции определяет отображение между пунктом назначения и источником, которое задается линейным отображением, определяемым вершинами. 
topicdescr_cpl/maximum = Оператор максимальной связи находит максимум выражения в исходном выборе.
topicdescr_cpl/minimum = Оператор минимальной связи находит минимум выражения в исходном выборе.
topicdescr_cpl/onepointmap = Одноточечная карта указывает, что определенная вершина назначения должна быть сопоставлена с определенной исходной вершиной.
topicdescr_cpl/twopointmap = Двухточечная карта указывает, что две целевые вершины должны быть сопоставлены с двумя исходными вершинами.

topicdescr_dataset/array1d = Создайте набор одномерных данных массива, чтобы создать массив данных для графиков на основе другого набора одномерных данных.
topicdescr_dataset/array2d = Создайте набор 2D-данных массива, чтобы создать массив данных для графиков на основе другого набора 2D-данных.
topicdescr_dataset/array3d = Создайте набор 3D-данных массива, чтобы создать массив данных для графиков на основе другого набора 3D-данных.
topicdescr_dataset/arrayfactor = Создайте набор данных коэффициентов массива для предварительной обработки данных для графиков диаграмм направленности. 
topicdescr_dataset/average = Создайте средний набор данных.
topicdescr_dataset/contour = Создайте набор контурных данных.
topicdescr_dataset/cutline2d = Создайте 2D набор данных линий разреза.
topicdescr_dataset/cutline3d = Создайте набор данных 3D-линий разреза.
topicdescr_dataset/cutplane = Создайте набор данных секущей плоскости.
topicdescr_dataset/cutpoint1d = Создайте набор данных точек разреза 1D.
topicdescr_dataset/cutpoint2d = Создайте 2D набор данных точек разреза.
topicdescr_dataset/cutpoint3d = Создайте 3D набор данных точек разреза.
topicdescr_dataset/edge2d = Создайте 2D набор данных ребер.
topicdescr_dataset/edge3d = Создайте 3D-набор данных ребер.
topicdescr_dataset/embed1d = Создайте набор данных для внедрения 1D.
topicdescr_dataset/embed2d = Создайте набор данных для внедрения в 2D.
topicdescr_dataset/extrude1d = Создайте набор данных 1D-вытягивания.
topicdescr_dataset/extrude2d = Создайте набор данных 2D-выдавливания.
topicdescr_dataset/filter = Создайте набор данных фильтра.
topicdescr_dataset/grid1d = Создайте набор данных, который может оценивать функции или другие наборы данных в области с помощью 1D-сетки (интервала).
topicdescr_dataset/grid2d = Создайте набор данных, который может оценивать функции или другие наборы данных в области с помощью 2D-сетки (прямоугольника).
topicdescr_dataset/grid3d = Создайте набор данных, который может оценивать функции или другие наборы данных в области с помощью трехмерной сетки (блока).
topicdescr_dataset/integral = Создайте целостный набор данных.
topicdescr_dataset/intersectionpoint2d = Создайте набор 2D-данных точек пересечения, чтобы обеспечить оценку выражений в точках пересечения траекторий частиц или лучей и поверхности. 
topicdescr_dataset/intersectionpoint3d = Создайте набор 3D-данных точек пересечения, чтобы обеспечить оценку выражений в точках пересечения траекторий частиц или лучей и поверхности.
topicdescr_dataset/isosurface = Создайте набор данных изоповерхности.
topicdescr_dataset/join = Например, соедините два набора данных, чтобы сформировать разницу.
topicdescr_dataset/kerneldensityestimation = Создайте набор данных оценки плотности ядра из таблицы. 
topicdescr_dataset/layeredmaterial = Создайте многослойный набор данных материалов.
topicdescr_dataset/maximum = Создайте максимальный набор данных.
topicdescr_dataset/mesh = Создайте набор данных сетки.
topicdescr_dataset/meshimportparameters = Создайте атрибут, чтобы указать, какое время или параметры использовать при создании сетки из набора данных.
topicdescr_dataset/meshpartparameters = Создайте параметры для использования при импорте этого набора данных в часть сетки. 
topicdescr_dataset/minimum = Создайте минимальный набор данных.
topicdescr_dataset/mirror2d = Создавайте зеркальные 2D-наборы данных, добавляющие зеркальную копию относительно оси.
topicdescr_dataset/mirror3d = Создавайте наборы 3D-зеркальных данных, которые добавляют зеркальную копию относительно плоскости отражения.
topicdescr_dataset/parametric1d = Расширьте набор данных 1D-решения, используя в качестве измерения такой параметр, как время.
topicdescr_dataset/parametric2d = Расширьте набор данных 2D-решения, используя в качестве измерения такой параметр, как время.
topicdescr_dataset/parcurve2d = Создайте набор данных 2D параметризованной кривой.
topicdescr_dataset/parcurve3d = Создайте параметризованный набор данных 3D-кривых.
topicdescr_dataset/parsurface = Создайте параметризованный набор данных поверхности.
topicdescr_dataset/particle = Создайте набор данных частиц (необходим для построения траекторий частиц).
topicdescr_dataset/particlebin = Создайте набор данных контейнера частиц для создания раздела частиц.
topicdescr_dataset/partition = Создайте набор данных раздела.
topicdescr_dataset/ray = Создайте набор лучевых данных для визуализации трассировок лучей, вычисленных с помощью интерфейса Geometrical Optics или Ray Acoustics.
topicdescr_dataset/raybin = Создайте набор данных лучей для создания раздела лучей.
topicdescr_dataset/receiver2d = Создайте 2D набор данных приемника.
topicdescr_dataset/receiver3d = Создайте набор данных 3D-приемника.
topicdescr_dataset/responsespectrum2d = Создайте набор данных спектра 2D ответа.
topicdescr_dataset/responsespectrum3d = Создайте набор данных спектра 3D ответа.
topicdescr_dataset/revolve1d = Создайте набор данных вращения 1D.
topicdescr_dataset/revolve2d = Создайте 2D набор данных вращения.
topicdescr_dataset/sector2d = Создайте набор данных симметрии 2D-сектора.
topicdescr_dataset/sector3d = Создайте набор данных симметрии трехмерного сектора.
topicdescr_dataset/shell = Создайте набор данных оболочки.
topicdescr_dataset/solution = Создайте набор данных решения.
topicdescr_dataset/spatialfft = Создайте пространственный набор данных БПФ.
topicdescr_dataset/surface = Создайте набор данных поверхности.
topicdescr_dataset/timeaverage = Создайте набор данных среднего времени, чтобы вычислить среднее время некоторых зависящих от времени данных в другом наборе данных.
topicdescr_dataset/timeintegral = Создайте набор данных интеграла времени, чтобы вычислить интеграл времени некоторых зависящих от времени данных в другом наборе данных.
topicdescr_dataset/transformation2d = Создайте набор данных для аффинных преобразований в 2D.
topicdescr_dataset/transformation3d = Создайте набор данных для аффинных преобразований в 3D.

topicdescr_evaluation/avline = Вычислите среднее значение по строке.
topicdescr_evaluation/avsurface = Вычислите среднее значение по поверхности.
topicdescr_evaluation/avvolume = Вычислите средний объем.
topicdescr_evaluation/evalaberration = Вычислите список коэффициентов Цернике для полиномов Цернике, которые соответствуют различным типам монохроматической аберрации.
topicdescr_evaluation/evalglobal = Оцените глобальные количества.
topicdescr_evaluation/evalglobalmatrix = Оцените глобальные матричные величины.
topicdescr_evaluation/evalglobalsweep = Оцените глобальные величины с помощью параметрического анализа.
topicdescr_evaluation/evalpoint = Оцените количество в баллах.
topicdescr_evaluation/evalpointmatrix = Оцените величины матрицы в некоторых точках.
topicdescr_evaluation/intline = Вычислите линейный интеграл.
topicdescr_evaluation/intsurface = Вычислите поверхностный интеграл.
topicdescr_evaluation/intvolume = Вычислите объемный интеграл.
topicdescr_evaluation/maxline = Вычислите максимум по прямой.
topicdescr_evaluation/maxsurface = Вычислите максимум по поверхности.
topicdescr_evaluation/maxvolume = Вычислите максимум по объему.
topicdescr_evaluation/measuredistance = Вычислите расстояние между двумя точками.
topicdescr_evaluation/measureline = Вычислить длину линии.
topicdescr_evaluation/measuresurface = Вычислите площадь поверхности.
topicdescr_evaluation/measurevolume = Вычислите объем области.
topicdescr_evaluation/minline = Вычислите минимум по прямой.
topicdescr_evaluation/minsurface = Вычислите минимум по поверхности.
topicdescr_evaluation/minvolume = Вычислите минимум по объему.
topicdescr_evaluation/particle = Оцените величины на траекториях частиц.
topicdescr_evaluation/ray = Оценить величины по лучам.
topicdescr_evaluation/systemmatrix = Оцените матрицу системы.

