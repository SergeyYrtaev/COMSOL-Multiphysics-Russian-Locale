topicdescr/multiphysicsrotatingmachinerytwophaseflowphasefieldrealizablekeps = [Вращающееся оборудование, турбулентный двухфазный поток, фазовое поле, реализуемый k-ε интерфейс]Вращающееся оборудование, турбулентный двухфазный поток, фазовое поле, реализуемое k-ε мультифизический интерфейс используется для отслеживания границы раздела между двумя несмешивающимися жидкостями в геометрии с одним или более вращающихся частей. Течение предполагается турбулентным; то есть число Рейнольдса велико.\n\nМультифизический интерфейс объединяет интерфейсы «Турбулентный поток», «Реализуемый k-ε» и «Фазовое поле в жидкостях», а мультифизическая связь «Двухфазный поток и фазовое поле» добавляется автоматически. Вращающийся область добавлен в раздел «Подвижная сетка». Интерфейс турбулентное течение, Realizable k-ε решает уравнения Навье-Стокса для сохранения импульса и уравнение неразрывности для сохранения массы. Эффекты турбулентности моделируются с использованием реализуемой модели с двумя уравнениями k-ε. Поток вблизи стенок моделируется с использованием стеновых функций. Положение границы раздела отслеживается путем решения двух дополнительных уравнений переноса: одного для переменной фазового поля и другого для плотности энергии смешения. Движение поверхности определяется минимизацией свободной энергии.\n\nМоделирование с использованием вращающегося оборудования, турбулентного двухфазного потока, фазового поля, реализуемого интерфейса k-ε всегда зависит от времени, поскольку положение интерфейса почти всегда зависит от его истории. Вращение достигается за счет функции перемещения сетки, также известной как скользящая сетка.
topicdescr/multiphysicsrotatingmachinerytwophaseflowphasefieldspalartallmaras = [Вращающаяся машина, турбулентный двухфазный поток, фазовое поле, интерфейс Спаларта-Альмараса] Вращающаяся машина, турбулентный двухфазный поток, фазовое поле, мультифизический интерфейс Спаларта-Альмараса используется для отслеживания интерфейса между двумя несмешивающимися жидкостями в геометрии с одной или несколькими вращающимися частями. Поток считается турбулентным, то есть число Рейнольдса велико. \n\nМультифизический интерфейс объединяет в себе интерфейсы турбулентное течение, Spalart-Allmaras и Phase Field in Fluids, и автоматически добавляется двухфазная мультифизическая связь Фазового поля. Вращающийся область добавляется в Moving Сетка. Интерфейс турбулентное течение, Spalart-Allmaras решает уравнения Навье-Стокса для сохранения импульса и уравнения непрерывности для сохранения массы. Эффекты турбулентности моделируются с использованием модели одного уравнения Спаларта-Альмараса. Модель Spalart-Allmaras представляет собой так называемую модель с низкими числами Рейнольдса, что означает, что она может разрешать поток вплоть до стены. Модель Spalart-Allmaras зависит от расстояния до ближайшей стены. Следовательно, физический интерфейс включает уравнение расстояния до стены. Положение интерфейса отслеживается путем решения двух дополнительных транспортных уравнений, одно для переменной фазового поля и одно для плотности смешивания энергии. Движение поверхности определяется минимизацией свободной энергии.\n\nСимуляции с использованием вращающихся машин, турбулентного двухфазного потока, фазового поля, интерфейса Спаларт-Альмарас всегда зависят от времени, поскольку положение интерфейса почти всегда зависит от его истории. Вращение достигается за счет движущейся функциональности сетки, также известной как скользящая сетка.
topicdescr/multiphysicsrotatingmachinerytwophaseflowphasefieldsst = [Вращающаяся машина, турбулентный двухфазный поток, фазовое поле, интерфейс SST] Вращающаяся машина, турбулентный двухфазный поток, фазовое поле, мультифизический интерфейс SST используется для отслеживания интерфейса между двумя несмешивающимися жидкостями в геометрии с одной или несколькими вращающимися частями. Поток считается турбулентным, то есть число Рейнольдса велико. \n\nМультифизический интерфейс объединяет в себе интерфейсы турбулентное течение, SST и Phase Field in Fluids, и автоматически добавляется двухфазная мультифизическая связь Фазового поля. Вращающийся область добавляется в Moving Сетка. Интерфейс турбулентное течение, SST решает уравнения Навье-Стокса для сохранения импульса и уравнение непрерывности для сохранения массы. Эффекты турбулентности моделируются с использованием модели переноса сдвига-напряжения Menter (SST) с ограничениями реализуемости. Модель SST представляет собой так называемую модель с низким числом Рейнольдса, что означает, что она может разрешать поток вплоть до стены. Модель SST зависит от расстояния до ближайшей стены. Следовательно, физический интерфейс включает уравнение расстояния до стены. Положение интерфейса отслеживается путем решения двух дополнительных транспортных уравнений, одно для переменной фазового поля и одно для плотности смешивания энергии. Движение поверхности определяется минимизацией свободной энергии.\n\nSimulations using the Rotating Machinery, Turbulent Two-Phase Flow, Phase Field, SST interface are always time-dependent since the position of an interface is almost always Depend of its history. Вращение достигается за счет движущейся функциональности сетки, также известной как скользящая сетка.
topicdescr/multiphysicsrotatingmachinerytwophaseflowphasefieldturbulentarea = [Вращающаяся машина, турбулентный двухфазный поток, фазовое поле] Вращающаяся машина, турбулентный двухфазный поток, фазовое поле содержит мультифизические интерфейсы для отслеживания интерфейса между двумя несмешивающимися жидкостями в геометрии с одной или несколькими вращающимися частями с использованием метода фазового поля. Поток считается турбулентным, то есть число Рейнольдса велико.
topicdescr/multiphysicsrotatingmachinerytwophaseflowphasefieldv2f = [Вращающееся оборудование, турбулентный двухфазный поток, фазовое поле, интерфейс v2-f] Мультифизический интерфейс вращающегося оборудования, турбулентный двухфазный поток, фазовое поле, v2-f используется для отслеживания границы раздела между двумя несмешивающимися жидкостями в геометриях с одной или несколькими вращающимися частями. Течение предполагается турбулентным; то есть число Рейнольдса велико.\n\nМультифизический интерфейс объединяет интерфейсы «Турбулентный поток», v2-f и «Фазовое поле в жидкостях», а мультифизическая связь «Двухфазный поток» и «Фазовое поле» добавляется автоматически. Вращающийся область добавлен в раздел «Подвижная сетка». Интерфейс турбулентное течение, v2-f решает уравнения Навье-Стокса для сохранения импульса и уравнение неразрывности для сохранения массы. Эффекты турбулентности моделируются с использованием модели v2-f, выраженной через турбулентные относительные флуктуации (v2, нормированный на k). Эллиптическая функция используется для смешивания пристеночных и объемных членов в уравнениях модели турбулентности. Модель v2-f представляет собой так называемую модель с низким числом Рейнольдса, что означает, что она может разрешить поток вплоть до стенки. Модель v2-f зависит от расстояния до ближайшей стены. Поэтому физический интерфейс включает уравнение расстояния до стены.Положение границы раздела отслеживается путем решения двух дополнительных уравнений переноса: одного для переменной фазового поля и другого для плотности энергии смешения. Движение поверхности определяется минимизацией свободной энергии.\n\nМоделирование с использованием интерфейса «Вращающееся оборудование», «Турбулентный двухфазный поток», «Фазовое поле», интерфейса v2-f всегда зависит от времени, поскольку положение интерфейса почти всегда зависит от его истории. Вращение достигается за счет функции перемещения сетки, также известной как скользящая сетка.
topicdescr/multiphysicsschrodingerpoisson = [Интерфейс уравнений Шредингера–Пуассона] Мультифизический интерфейс Schrödinger–Poisson Equation объединяет Schrödinger Equation и Electrostatics для моделирования носителей заряда в квантово-ограниченных системах. Электрический потенциал из Electrostatics вносит вклад в член потенциальной энергии в Schrödinger Equation, а плотность заряда, вычисленная по волновым функциям, вносит вклад в плотность заряда в Electrostatics.
topicdescr/multiphysicssemiconductoroptoelectronicsbeamenvelopes = [Полупроводниковая оптоэлектроника, пучковые конверты] Полупроводниковая оптоэлектроника, интерфейс Beam Envelopes объединяет интерфейс Semiconductor с интерфейсом Electromagnetic Waves, Beam Envelopes. Связь происходит через функцию оптических переходов, которая добавляет стимулированный термин генерации выбросов (подходящий для материалов с прямым разрывом полос) на доменах в интерфейсе полупроводника. Этот термин пропорционален оптической интенсивности в соответствующем волновом уравнении, функция лучевых конвертов в электромагнитных волнах, интерфейс лучевых конвертов. Кроме того, учитывается спонтанное излучение (для материалов с прямым разрывом полос). Эффект адсорбции света или излучения учитывается соответствующим изменением комплексного показателя проницаемости или преломления в волновом уравнении Beam Envelopes feature.\n\n\n Интерфейс используется для моделирования устройств, таких как фотодиоды, светоизлучающие диоды и лазерные диоды без квантовых скважин в материалах с прямым зазором. 
topicdescr/multiphysicssemiconductoroptoelectronicsfrequencydomain = [Полупроводниковая оптоэлектроника, частотная область] Полупроводниковая оптоэлектроника, интерфейс частотного области объединяет интерфейс полупроводника с электромагнитными волнами, интерфейс частотного области. Связь происходит через функцию оптических переходов, которая добавляет стимулированный термин генерации выбросов (подходящий для материалов с прямым разрывом полос) на областих в интерфейсе полупроводника. Этот термин пропорционален оптической интенсивности в соответствующем волновом уравнении, электрической функции в электромагнитных волнах, частотном областьном интерфейсе. Кроме того, учитывается спонтанное излучение (для материалов с прямым разрывом полос). Эффект адсорбции света или излучения учитывается соответствующим изменением комплексного показателя проницаемости или преломления в волновом уравнении, Электрический признак.\n\n\n Интерфейс используется для моделирования устройств, таких как фотодиоды, светоизлучающие диоды и лазерные диоды без квантовых скважин в материалах с прямым зазором.
topicdescr/multiphysicsshellthinfilmdamping = Мультифизический интерфейс Shell–Thin-Film Damping объединяет Shell и Thin-Film Flow вместе с предопределенными условиями для взаимодействия на границах жидкостной оболочки.\n Жидкость может быть либо жидкостью, либо газом, с возможностью включения кавитации в жидкости.\n Используя частотную область или зависящее от времени исследование, интерфейс может моделировать демпфирование, вызванное жидкостью, в оболочках.
topicdescr/multiphysicssolidmechanics = [Интерфейс твердой механики (упругих волн)] Интерфейс механика твердого тела предназначен для общего структурного анализа 3D, 2D, 1D или аксисимметричных тел. Напряжение плоскости, напряжение плоскости или обобщенные предположения напряжения плоскости могут быть использованы в 2D, 1D и 1D аксисимметричном анализе. Интерфейс механика твердого тела основан на решении уравнений Навье, и вычисляются такие результаты, как смещения, напряжения и деформации.\n\n Модуль акустики, модуль MEMS и модуль структурной механики добавляют несколько функций, например геометрическую нелинейность и расширенные граничные условия, такие как контакт, последующие деформации и неотражающие границы.\n\nС модулем нелинейных структурных материалов или модулем геомеханики интерфейс расширен с моделями нелинейных материалов.
topicdescr/multiphysicssolidrotorbearingcoupling = [Твердый ротор с гидродинамическим несущим интерфейсом] Solid Rotor с мультифизическим интерфейсом Hydrodynamic Bearing объединяет интерфейсы Solid Rotor и Hydrodynamic Bearing через мультифизическую связь Solid Rotor–Bearing Coupling.
topicdescr/multiphysicssolidthinfilmdamping = Мультифизический интерфейс Solid–Thin-Film Damping сочетает в себе механика твердого тела и Thin-Film Flow вместе с предопределенными условиями для взаимодействия на границах жидкостного тела.\n Жидкость может быть либо жидкостью, либо газом, с возможностью включения кавитации в жидкости.\n Используя частотная область или зависящее от времени исследование, интерфейс может моделировать демпфирование, вызванное жидкостью, в твердых структурах.
topicdescr/multiphysicssteelquenching = [Стальной кванчинг] Мультифизический интерфейс Steel Quenching сочетает в себе теплопередачу в твердых телах, разложение аустенита и твердую механику. Используется для имитации закалки сталей. Можно моделировать искажения и напряжения, возникающие в результате металлургических фазовых преобразований. При добавлении мультифизического интерфейса включаются мультифизические связи Phase Transformation Latent Heat и деформация фазового превращения.
topicdescr/multiphysicstertiaryelectroneutrality = [Интерфейс Третичный, Электронейтральность]Интерфейс Третичный, Электронейтральность добавляет интерфейс Третичного распределения тока, Нернста-Планка с опцией сохранения заряда по умолчанию — Электронейтральность.\n\nТретичное распределение тока, интерфейс Нернста-Планка описывает распределение тока и потенциала в электрохимической ячейке с учетом индивидуального транспорта заряженных частиц (ионов) в электролите. Электродную кинетику реакций переноса заряда можно описать с помощью произвольных выражений или с помощью заранее определенных выражений Батлера-Фольмера и Тафеля.\n\nОпция сохранения заряда «Электронейтральность» предполагает, что в электролите выполняется условие электронейтральности. Обратите внимание, что условие электронейтральности предполагает, что в модель включены все основные ионы с током.\n\nИспользуйте этот физический интерфейс для моделирования обычных электрохимических ячеек со значительными градиентами концентрации частиц (ионов) с током.\n\nЗакон Ома используется в сочетании с балансом заряда для описания течения токов в электродах. Уравнения Нернста-Планка используются для описания переноса заряженных и нейтральных частиц в электролите.
topicdescr/multiphysicstertiarysupportingelectrolyte = [Третий, поддерживающий электролитный интерфейс] Интерфейс Tertiary, Supporting Electrolyte добавляет интерфейс Tertiary Current Distribution, Nernst-Planck с опцией сохранения заряда по умолчанию Supporting Electrolyte.\n\n Интерфейс Tertiary Current Distribution, Nernst-Planck описывает распределение тока и потенциала в электрохимической ячейке с учетом индивидуального переноса заряженных видов (ионов) в электролите. Кинетика электродов для реакций переноса заряда может быть описана с помощью произвольных выражений или с помощью предопределенных выражений Батлера-Вольмера и Тафеля.\n\n Опция сохранения заряда поддерживающего электролита предполагает, что градиенты концентрации ионов, несущих заряд, малы, поэтому для определения потенциального падения электролита может быть использована суммарная проводимость.\n\nОм закон используется в сочетании с балансом заряда для описания потока токов в электродах. Уравнения Нернста-Планка используются для описания переноса заряженных и нейтральных видов в электролите.
topicdescr/multiphysicstertiarywaterbased = [Интерфейс Третичный, на водной основе с электронейтральностью]Интерфейс Третичный, на водной основе с электронейтральностью добавляет интерфейс Третичного распределения тока, Нернста-Планка с опцией сохранения заряда по умолчанию «На водной основе с электронейтральностью».\n\nТретичное распределение тока, интерфейс Нернста-Планка описывает распределение тока и потенциала в электрохимической ячейке с учетом индивидуального транспорта заряженных частиц (ионов) в электролите. Электродную кинетику реакций переноса заряда можно описать с помощью произвольных выражений или с помощью заранее определенных выражений Батлера-Фольмера и Тафеля.\n\nОпция сохранения заряда на водной основе с электронейтральностью предполагает, что в электролите действует условие электронейтральности в сочетании с равновесной реакцией самоионизации воды. Обратите внимание, что условие электронейтральности предполагает, что в модель включены все основные ионы с током.\n\nИспользуйте этот физический интерфейс для моделирования обычных электрохимических ячеек со значительными градиентами концентрации частиц (ионов) с током.\n\nЗакон Ома используется в сочетании с балансом заряда для описания течения токов в электродах. Уравнения Нернста-Планка используются для описания переноса заряженных и нейтральных частиц в электролите.
topicdescr/multiphysicsthermallyinducedstresses = [Интерфейс термических напряжений, твердое тело]Мультифизический интерфейс термических напряжений для твердого тела объединяет интерфейс механики твердого тела с интерфейсом теплопередачи в твердых телах. Связь происходит в областях, где температура из интерфейса теплопередачи действует как тепловая нагрузка на интерфейс механики твердого тела, вызывая тепловое расширение. При необходимости эффекты термоупругого демпфирования и неупругого рассеяния можно использовать как источники тепла в анализе теплопередачи.
topicdescr/multiphysicsthermallyinducedstressesls = [Интерфейс термических напряжений, многослойная оболочка]Мультифизический интерфейс термических напряжений для многослойной оболочки объединяет интерфейс многослойной оболочки с интерфейсом теплопередачи в оболочках. Связь происходит на границах, где температура из интерфейса теплопередачи действует как тепловая нагрузка на интерфейс многослойной оболочки, вызывая тепловое расширение. При необходимости эффекты термоупругого демпфирования и неупругого рассеяния можно использовать как источники тепла в анализе теплопередачи.
topicdescr/multiphysicsthermallyinducedstressesm = [Тепловой напряжение, Мембранный интерфейс] Тепловой напряжение, Мембранный мультифизический интерфейс сочетает в себе Мембранный интерфейс с интерфейсом теплопередачи в Shells. Соединение происходит на границах, где температура от интерфейса теплопередачи действует как тепловая нагрузка для интерфейса Мембраны, вызывая тепловое расширение. Необязательно, эффекты от термоупругого демпфирования и неупругого рассеивания могут быть использованы в качестве источников тепла в анализе теплопередачи.
topicdescr/multiphysicsthermallyinducedstressess = Тепловой напряжение, мультифизический интерфейс Shell сочетает в себе интерфейс Shell с передачей тепла в интерфейсе Shells. Соединение происходит на границах, где температура от интерфейса теплопередачи действует как тепловая нагрузка для интерфейса Shell, вызывая тепловое расширение. Необязательно, эффекты от термоупругого демпфирования и неупругого рассеивания могут быть использованы в качестве источников тепла в анализе теплопередачи.
topicdescr/multiphysicsthermoacousticshell = [Thermoviscous Acoustic-Shell Interface, частотная область Interface] Thermoviscous Acoustic–Shell Interaction, мультифизический интерфейс частотная область сочетает в себе интерфейсы Thermoviscous Acoustics, частотная область и Shell. Физический интерфейс решает и имеет предопределенную связь между полем смещения оболочки и акустическими вариациями в жидкостных областих. Его можно использовать, например, для моделирования вибрирующего отклика микрозеркал в приложениях MEMS.\n\n Интерфейс физики решает уравнения в частотной области, предполагая, что все поля и источники гармоничны. Предполагается линейная акустика. 
topicdescr/multiphysicsthermoacousticsolid = [Thermoviscous Acoustic-Solid Interface, частотная область Interface] Thermoviscous Acoustic–Solid Interaction, мультифизический интерфейс частотная область объединяет интерфейсы Thermoviscous Acoustics, частотная область и механика твердого тела. Интерфейс физики решает и имеет предопределенные мультифизические связи между полем смещения в твердом теле и акустическими вариациями в области жидкости.\n\n Интерфейс физики решает уравнения в частотной области, предполагая, что все поля и источники гармоничны. Предполагается линейная акустика.
topicdescr/multiphysicsthermoelasticity = [Интерфейс термоупругости] Интерфейс мультифизики термоупругости объединяет интерфейс механика твердого тела с интерфейсом теплопередачи в твердых телах. Связь происходит на уровне области, где происходят два физических эффекта: во-первых, температура от интерфейса теплопередачи действует как тепловая нагрузка для интерфейса механика твердого тела, вызывая тепловое расширение, а во-вторых, напряжение и сжатие от интерфейса механика твердого тела действует как источник тепла для интерфейса теплопередачи, вызывая локальное охлаждение и нагрев. Необратимая теплопередача происходит между теплой и прохладной областями твердого тела, что приводит к механическим потерям, которые могут быть важны, особенно для небольших структур.
topicdescr/multiphysicsthermoelectriceffect = Интерфейс термоэлектрического эффекта используется для моделирования эффектов Пелтье-Сибека-Томсона. Этот мультифизический интерфейс добавляет интерфейс электрических токов и интерфейс теплопередачи в твердых телах. Мультифизические связи добавляют термоэлектрический эффект, рассеивание электромагнитной мощности и свойства электромагнитного материала, которые могут зависеть от температуры.\n\nВ зависимости от лицензированных продуктов, стационарное моделирование временных и частотных областей поддерживается во всех пространственных измерениях. Кроме того, поддерживаются комбинации частотно-областьного моделирования для интерфейса электрических токов и стационарного моделирования для интерфейса теплопередачи в твердых телах, называемого частотно-стационарным и частотно-переходным моделированием.
topicdescr/multiphysicsthermoviscousacousticthermoelasticity = [Thermoviscous Acoustic-Thermoelasticity, частотная область Interface] Thermoviscous Acoustic-Thermoelasticity Interaction, частотная область multiphysics interface объединяет Thermoviscous Acoustics, частотная область interface и Thermoelasticity multiphysics interface. Интерфейс физики решает и имеет предопределенные мультифизические связи между смещением и температурным полем в твердом теле и акустическими колебаниями давления, скорости и температуры в области жидкости.\n\n Интерфейс физики решает уравнения, используя подход возмущения частотной области, предполагая, что все поля и источники гармоничны. Поле смещения и температуры в твердом теле линеаризовано вокруг стационарного раствора. Предполагается линейная акустика.
topicdescr/multiphysicsthinfilmedgeandporousmediaflow = [Интерфейс тонкой пленки и пористого медиапотока] Интерфейс тонкой пленки и пористого медиапотока используется для моделирования потока жидкости в области, где пористая область регулируется закон Дарси and represented by a surface within the geometry is coupled to a thin-film region governed by the Reynolds equation or modified Reynolds equation and represented by an edge within the geometry.\n\nThe multiphysics interface combines the Darcy's Интерфейс закона и интерфейс тонкой пленки. Мультифизическая связь тонкой пленки и пористого медиапотока автоматически добавляется. Соединение обеспечивает непрерывность давления и учитывает массовый поток через интерфейс. Кроме того, в зависимости от типа связи, развитие граничного слоя на интерфейсе моделируется с использованием небольшой скорости скольжения интерфейса.\n\n Физический интерфейс может использоваться для стационарного и зависящего от времени анализа.
topicdescr/multiphysicsthinfilmshellandporousmediaflow = [Интерфейс тонкой пленки и пористого медиапотока] Интерфейс тонкой пленки и пористого медиапотока используется для моделирования потока жидкости в области, где пористая область регулируется закон Дарси and represented by a volume within the geometry is coupled to a thin-film region governed by the Reynolds equation or modified Reynolds equation and represented by a surface within the geometry.\n\nThe multiphysics interface combines the Darcy's Интерфейс закона и интерфейс тонкой пленки. Мультифизическая связь тонкой пленки и пористого медиапотока автоматически добавляется. Соединение обеспечивает непрерывность давления и учитывает массовый поток через интерфейс. Кроме того, в зависимости от типа связи, развитие граничного слоя на интерфейсе моделируется с использованием небольшой скорости скольжения интерфейса.\n\n Физический интерфейс может использоваться для стационарного и зависящего от времени анализа.
topicdescr/multiphysicstransientthermoviscousacousticthermoelasticity = [Thermoviscous Acoustic-Thermoelasticity, Transient Interface] Thermoviscous Acoustic-Thermoelasticity Interaction, Transient multiphysics interface объединяет Thermoviscous Acoustics, Transient interface и Thermoelasticity multiphysics interface. Интерфейс физики решает и имеет предопределенные мультифизические связи между смещением и температурным полем в твердом теле и акустическими колебаниями давления, скорости и температуры в области жидкости.\n\n Интерфейс физики решает уравнения во временной области, связывая отклонение от ссылки в твердом теле с акустическими полями в жидкости.
topicdescr/multiphysicstransientacousticpiezo = [Акустико-пиезоэлектрическое взаимодействие, переходный интерфейс] Акустико-пиезоэлектрическое взаимодействие, транзиторный мультифизический интерфейс сочетает в себе акустику давления, транзиторную; твердую механику; и электростатические интерфейсы для подключения изменений акустического давления в жидкостях к структурной деформации как в твердых телах, так и в пьезоэлектрических доменах. Пьезоэлектрическая мультифизическая связь используется для соединения электростатики и твердой механики в пьезоэлектрических доменах. Мультифизический интерфейс может, например, использоваться для моделирования переходного поведения пьезоэлектрических преобразователей для гидролокатора или медицинских применений и для повышения соответствия импеданса слоев или паттернов излучения ближнего поля преобразователя. Могут быть смоделированы как прямые, так и обратные пьезоэлектрические эффекты, и пьезоэлектрическая связь может быть сформулирована с использованием форм деформации или заряда напряжения.
topicdescr/multiphysicstransientacousticshell = [Взаимодействие акустической оболочки, переходный интерфейс] Мультифизический интерфейс Acoustic–Shell Interaction, переходный режим объединяет функции интерфейсов «Акустика давления», «Переходный процесс» и «Оболочка», чтобы связать изменения акустического давления в области жидкости со структурной деформацией границы оболочки. Его можно, например, использовать для определения прохождения звука через тонкую упругую конструкцию, такую ​​как капот автомобиля, и анализа виброакустики диффузора громкоговорителя.\n\nВзаимодействие акустической структуры относится к мультифизическому явлению, при котором акустическое давление вызывает нагрузку жидкости на твердую поверхность, а структурное ускорение влияет на область жидкости как нормальное ускорение на границе жидкости и структуры.\n\nСпециальное мультифизическое условие связи легко определяется для границы жидкость-оболочка и устанавливает нагрузки жидкости на границу оболочки и влияние структурных ускорений на жидкость. Интерфейс доступен для 3D и 2D осесимметричной геометрии и способен моделировать связанную акустику давления и колебания оболочки во временной области. 
topicdescr/multiphysicstransientacousticsolid = [Акустико-твердое взаимодействие, переходный интерфейс] Мультифизический интерфейс Acoustic–Solid Interaction, переходный процесс объединяет интерфейсы «Акустика давления», «Переходный процесс» и «Механика твердого тела» для связи изменений акустического давления в области жидкости со структурной деформацией в области твердого тела. Его можно, например, использовать для определения передачи звука через упругую конструкцию или для решения связанных виброакустических явлений, присутствующих в громкоговорителе.\n\nВзаимодействие акустической конструкции относится к мультифизическому явлению, при котором акустическое давление вызывает нагрузку жидкости на область твердого тела, а структурное ускорение действует на область жидкости как нормальное ускорение на границе жидкость-твердое тело.\n\nСпециальное мультифизическое условие связи легко определяется для границы жидкость-твердое тело и устанавливает нагрузки жидкости на область твердого тела и влияние структурных ускорений на жидкость. Физический интерфейс позволяет проводить исследования переходных процессов, а также решать задачи в частотной области с имеющимися граничными условиями.
topicdescr/multiphysicstwophaseflowlevelsetalgebraicyplus = Турбулентный двухфазный поток, набор уровней, алгебраический интерфейс yPlus Турбулентный двухфазный поток, набор уровней, мультифизический интерфейс алгебраического yPlus используется для отслеживания интерфейса между двумя несмешивающимися жидкостями при высоких числах Рейнольдса. \n\nМультифизический интерфейс сочетает в себе турбулентный поток, алгебраический yPlus и интерфейсы набора уровней, и автоматически добавляется двухфазная мультифизическая связь набора уровней. Она решает уравнения Навье-Стокса для сохранения импульса и уравнение непрерывности для сохранения массы. Положение интерфейса отслеживается путем решения транспортного уравнения для функции набора уровней. Эффекты турбулентности включаются с использованием модели повышенной вязкости, основанной на расстоянии локальной стены. Таким образом, физический интерфейс включает в себя уравнение расстояния между стенами.\n\nСимуляции с использованием турбулентного двухфазного потока, набора уровней, алгебраического интерфейса yPlus всегда зависят от времени, поскольку положение интерфейса почти всегда зависит от его истории.
topicdescr/multiphysicstwophaseflowlevelsetkeps = [Turbulent Two-Phase Flow, Level Set, k-εInterface] Turbulent Two-Phase Flow, Level Set, k-ε multiphysics interface используется для отслеживания интерфейса между двумя несмешивающимися жидкостями при высоких числах Рейнольдса. \n\nМультифизический интерфейс объединяет интерфейсы турбулентное течение, k-ε и Level Set, и автоматически добавляется двухфазная мультифизическая связь Level Set. Она решает уравнения Навье-Стокса для сохранения импульса и уравнение непрерывности для сохранения массы. Положение интерфейса отслеживается путем решения транспортного уравнения для функции набора уровней. Эффекты турбулентности моделируются с использованием стандартной модели с двумя уравнениями k-ε с ограничениями реализуемости. Поток, близкий к стенам, моделируется с использованием функций стен.\n\nSimulations с использованием турбулентного двухфазного потока, набора уровней, k-ε интерфейс всегда зависит от времени, поскольку положение интерфейса почти всегда зависит от его истории.
topicdescr/multiphysicstwophaseflowlevelsetkomega = [Turbulent Two-Phase Flow, Level Set, k-ωInterface] Turbulent Two-Phase Flow, Level Set, k-ω multiphysics interface используется для отслеживания интерфейса между двумя несмешивающимися жидкостями при высоких числах Рейнольдса. \n\nМультифизический интерфейс объединяет интерфейсы турбулентное течение, k-ω и Level Set, и автоматически добавляется двухфазная мультифизическая связь Level Set. Она решает уравнения Навье-Стокса для сохранения импульса и уравнение непрерывности для сохранения массы. Положение интерфейса отслеживается путем решения транспортного уравнения для функции набора уровней. Эффекты турбулентности моделируются с использованием пересмотренной модели Уилкокса k-ω с ограничениями реализуемости. Модель k-ω представляет собой так называемую модель с низким числом Рейнольдса, что означает, что она может разрешать поток вплоть до стены.\n\nSimulations с использованием турбулентного двухфазного потока, набора уровней, k-ω интерфейс всегда зависит от времени, поскольку положение интерфейса почти всегда зависит от его истории. 
topicdescr/multiphysicstwophaseflowlevelsetlowrekeps = [Turbulent Two-Phase Flow, Level Set, Low Re k-εInterface] Turbulent Two-Phase Flow, Level Set, Low Re k-ε multiphysics interface используется для отслеживания интерфейса между двумя несмешивающимися жидкостями при высоких числах Рейнольдса. \n\n Интерфейс мультифизики объединяет интерфейсы турбулентное течение, Low Re k-ε и Level Set, и автоматически добавляется двухфазная мультифизическая связь Level Set. Она решает уравнения Навье-Стокса для сохранения импульса и уравнение непрерывности для сохранения массы. Положение интерфейса отслеживается путем решения транспортного уравнения для функции набора уровней. Эффекты турбулентности моделируются с использованием модели AKN с двумя уравнениями k-ε с ограничениями реализуемости. Модель AKN представляет собой так называемую модель с низким числом Рейнольдса, что означает, что она может разрешать поток вплоть до стены. Модель AKN зависит от расстояния до ближайшей стены. Таким образом, физический интерфейс включает в себя уравнение расстояния между стенами.\n\nСимуляции с использованием турбулентного двухфазного потока, набора уровней, интерфейса Low Re k-ε всегда зависят от времени, поскольку положение интерфейса почти всегда зависит от его истории.
