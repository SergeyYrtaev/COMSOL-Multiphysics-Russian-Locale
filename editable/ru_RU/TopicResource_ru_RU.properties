topicdescr/multiphysicsfluidsolidinteractiontwophaseflowphasefield = [Взаимодействие с твердой жидкостью, двухфазный поток, интерфейс поля фазы] Взаимодействие с твердой жидкостью  –  Solid, двухфазный поток, мультифизический интерфейс поля фазы используется для моделирования явлений, когда две несмешивающиеся жидкости и деформируемое твердое вещество влияют друг на друга. Интерфейс моделирует как флюидный область, так и твердый область и включает в себя предварительно заданное условие для взаимодействия на флюидно-твердых границах. Формулировка ALE используется для включения геометрических изменений флюидной области. Интерфейс между двумя жидкостями отслеживается путем решения двух дополнительных транспортных уравнений, одно для переменной фазового поля и одно для плотности смешивания энергии.\n\n Режим потока может быть ламинарным или турбулентным (при наличии модуля CFD). Твердый область имеет всю функциональность, доступную в интерфейсе механика твердого тела, включая условия контакта, а также нелинейные материалы, если доступен модуль нелинейных структурных материалов или модуль геомеханики.\n\nSimulations с использованием интерфейса Fluid–Solid Interaction, двухфазный поток, фазовое поле всегда зависят от времени, поскольку положение интерфейса почти всегда зависит от его истории.
topicdescr/multiphysicsfluidsolidinteractiontwophaseflowphasefieldfixedgeometry = [Взаимодействие с твердой жидкостью, двухфазный поток, фазовое поле, фиксированный геометрический интерфейс] Взаимодействие с твердой жидкостью, двухфазный поток, фазовое поле, мультифизический интерфейс с фиксированной геометрией используется для моделирования явлений, когда две несмешивающиеся жидкости и деформируемое твердое вещество влияют друг на друга. Можно учитывать как загрузку жидкости на структуру, так и передачу структурной скорости к жидкости. Интерфейс моделирует ситуации, когда перемещения твердого тела считаются достаточно малыми для того, чтобы геометрия области текучей среды рассматривалась как фиксированная во время взаимодействия. Положение интерфейса между обеими жидкостями отслеживается путем решения двух дополнительных транспортных уравнений, одно для переменной фазового поля и одно для плотности смешивания энергии.\n\n Режим потока может быть ламинарным или турбулентным (при наличии модуля CFD). Твердый область имеет всю функциональность, доступную в интерфейсе механика твердого тела, включая условия контакта, а также нелинейные материалы, если доступен модуль нелинейных структурных материалов или модуль геомеханики.\n\nSimulations с использованием интерфейса Fluid–Solid Interaction, двухфазный поток, фазовое поле, фиксированная геометрия всегда зависят от времени, поскольку положение интерфейса почти всегда зависит от его истории.
