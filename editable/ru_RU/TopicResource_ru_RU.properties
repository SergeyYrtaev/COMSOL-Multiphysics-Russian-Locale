topicdescr/multiphysicsrotatingmachinerynonisothermalflowrkeps = [The Rotating Machinery, неизотермическое течение, турбулентное течение, Realizable k-εInterface]The турбулентное течение, Realizable k-ε version of the Rotating Machinery, неизотермическое течение multiphysics interfaces is used to simulate the coupling between heat transfer and fluid flow at high Reynolds numbers in geometries with one or more rotating parts.\n\n Он сочетает в себе теплопередачу в жидкостях и турбулентном потоке, реализуемый интерфейс k-ε и добавляет вращающийся область под движущейся сеткой. Неизотермический поток мультифизической связи автоматически добавляется. Он соединяет интерфейсы теплопередачи и потока и предоставляет опции для включения нагрева потока в модель. Физический интерфейс может использоваться для имитации потоков жидкости, где свойства жидкости зависят от температуры. Модели также могут включать теплопередачу в твердых телах, стационарное и вращающееся, а также излучение от поверхности к поверхности и излучение в участвующих средах с модулем теплопередачи. Физический интерфейс поддерживает низкие числа Маха (обычно менее 0,3), а также неньютоновские жидкости. В интерфейсе турбулентное течение, Realizable k-ε, по умолчанию активен узел Fluid Properties для всего выбора интерфейса. Выбор области интерфейса потока может быть отредактирован, если модель содержит сплошные области.\n\n Существуют два типа исследования для этого физического интерфейса. Используя тип исследования, зависящий от времени, вращение достигается за счет движущейся функциональности сетки, также известной как скользящая сетка. Используя тип исследования Frozen Rotor, вращающиеся части замораживаются в положении, а вращение объясняется включением центробежных и кориолисовых сил.
