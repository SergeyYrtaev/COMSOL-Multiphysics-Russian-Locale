###############################################################################
# Enhanced tooltip texts for Excel ribbon buttons.
# The resource key must have the form llexcel_tooltiptext_<action_tag>, where 
# <action_tag> is the tag of the ControlID associated with the button.
###############################################################################
llexcel_model_open_descriptive_text = Откройте файл модели. Запуск локального мультифизического сервера COMSOL, если он еще не подключен.
llexcel_model_reopen_descriptive_text = Откройте модель, связанную с текущей рабочей тетрадкой в подключенном многофизическом сервере COMSOL. При необходимости запускается локальный сервер COMSOL Multiphysics Server, и соединение устанавливается автоматически.
llexcel_comsol_mph_client_descriptive_text = Откройте активную модель на мультифизическом сервере COMSOL в рабочем столе COMSOL.
llexcel_tooltiptext_model_connect = Подключитесь к COMSOL Multiphysics Server или COMSOL Server.
llexcel_tooltiptext_import_application_from_server = Загрузить модель с подключенного COMSOL Multiphysics Server или COMSOL Server.
llexcel_tooltiptext_remove_applications_from_server = Выгрузка моделей из подключенного COMSOL Multiphysics Server или COMSOL Server.
llexcel_tooltiptext_model_run_application = Запустите приложение в COMSOL Multiphysics.
llexcel_tooltiptext_model_comsol_server = Открытый COMSOL Веб-интерфейс сервера.
llexcel_tooltiptext_group_open_menu = Откройте файл модели или откройте модель, связанную в текущей рабочей книге.
llexcel_tooltiptext_model_open = Откройте файл модели. Запуск локального мультифизического сервера COMSOL, если он еще не подключен.
llexcel_tooltiptext_model_reopen = Откройте модель, связанную с текущей рабочей тетрадкой в подключенном многофизическом сервере COMSOL. При необходимости запускается локальный сервер COMSOL Multiphysics Server, и соединение устанавливается автоматически.
llexcel_tooltiptext_model_dbopen = Откройте модель из базы данных. Запуск локального мультифизического сервера COMSOL, если он еще не подключен.
llexcel_tooltiptext_comsol_mph_client = Откройте активную модель на мультифизическом сервере COMSOL в рабочем столе COMSOL.
llexcel_tooltiptext_model_save = Сохраните текущий файл модели.
llexcel_tooltiptext_model_saveas = Сохраните текущий файл модели, используя новое имя.
llexcel_tooltiptext_model_status = Покажи статус модели.
llexcel_tooltiptext_insert_graphics = Захватите скриншот изображения окна COMSOL Graphics и вставьте его в рабочий лист.
llexcel_tooltiptext_break_all_links = Удалите все комментарии, которые связывают ячейки в текущем рабочем листе с моделью. Данные в ячейках не удаляются.
llexcel_tooltiptext_break_link = Удалите комментарии, связывающие выбранные клетки с моделью. Данные в ячейках не удаляются.
llexcel_tooltiptext_open_preferences = Открытое диалоговое окно предпочтений.
llexcel_tooltiptext_parameters_all = Включить все глобальные параметры определения из модели в рабочий лист.
llexcel_tooltiptext_result_parameters = Включить все параметры результата из модели в рабочий лист.
llexcel_tooltiptext_parameters_extern = Включить глобальные параметры определения из модели с префиксом "extern" в рабочий лист.
llexcel_tooltiptext_parameter_node = Включить параметры из узла глобального определения Параметры в рабочий лист.
llexcel_tooltiptext_parameter_case = Включить параметры из глобального узла определения в рабочий лист.
llexcel_tooltiptext_variables_all = Включить все переменные из модели в рабочий лист.
llexcel_tooltiptext_variables_extern = Вставьте переменные из модели, которые имеют префикс "extern" в рабочий лист.
llexcel_tooltiptext_variables_node = Вставьте переменные из узла переменных в рабочий лист.
llexcel_tooltiptext_variables_select = Вставить переменные из выбранного узла в модели в рабочий лист.
llexcel_tooltiptext_function = Включить функцию от модели в рабочий лист.
llexcel_tooltiptext_update_definitions = Обновите модель определениями в текущей ячейке.
llexcel_tooltiptext_update_definitions_all = Обновить модель со всеми определениями в текущем рабочем листе.
llexcel_tooltiptext_update_definitions_selected = Обновить модель с выбранными определениями в текущем рабочем листе.
llexcel_tooltiptext_plot_geom = Посмотреть геометрию модели в окне COMSOL Graphics.
llexcel_tooltiptext_dynamicmenu_geom = Выберите геометрию для просмотра в окне COMSOL Graphics.
llexcel_tooltiptext_plot_mesh = Посмотреть сетку модели в окне COMSOL Graphics.
llexcel_tooltiptext_dynamicmenu_mesh = Выберите сетку для просмотра в графическом окне COMSOL.
llexcel_tooltiptext_study_compute = Решите первое исследование в модели.
llexcel_tooltiptext_study_update = Обновление всех решений в модели.
llexcel_tooltiptext_study_sweep = Решите модель с помощью параметрической подметки.
llexcel_tooltiptext_dynamicmenu_study = Выберите исследование и решите.
llexcel_tooltiptext_dynamicmenu_plotgroups = Выберите группу графиков для просмотра в окне COMSOL Graphics.
llexcel_tooltiptext_plotgroups_plotsettings = Выберите значение параметра, время или собственную частоту для просмотра результатов в группе графиков, отображаемых в окне COMSOL Graphics.
llexcel_tooltiptext_dynamicmenu_1D_Export = Выберите и экспортируйте линейные графики и гистограммы и создайте графики Excel из 1D-групп.
llexcel_tooltiptext_report = Создайте и создайте отчет.
llexcel_tooltiptext_results_derived = Оценка производных ценностей. Вставьте данные в текущую ячейку.
llexcel_tooltiptext_results_pointdata = Оценка выражения в точке геометрии. Вставьте данные в текущую ячейку.
llexcel_tooltiptext_results_ray_particle = Оцените экспрессию вдоль лучей или траекторий частиц.
llexcel_tooltiptext_results_particle = Оценка экспрессии по траекториям частиц. Вставьте данные в текущую ячейку.
llexcel_tooltiptext_results_ray = Оценка экспрессии по траекториям лучей. Вставьте данные в текущую ячейку.
llexcel_tooltiptext_results_interp = Оценка выражения в произвольном месте. Вставьте данные в текущую ячейку.
llexcel_tooltiptext_results_tables = Извлеките данные таблицы из модели. Вставьте данные в текущую ячейку.
llexcel_tooltiptext_results_update = Обновить все оцениваемые данные в текущем рабочем листе.
llexcel_tooltiptext_material_settings = Определение параметров материала для экспорта. Открывает диалоговое окно «Настройки экспорта материалов».
llexcel_tooltiptext_material_new = Создание новой библиотеки материалов с использованием выбранных определений материалов.
llexcel_tooltiptext_material_append = Добавьте выбранные определения материала в существующую библиотеку материалов.
llexcel_tooltiptext_material_batch = Батч обрабатывает ряд материальных файлов.
llexcel_tooltiptext_documentation = Открытая мультифизическая документация COMSOL.
llexcel_tooltiptext_help = Откройте LiveLink для Excel.
llexcel_tooltiptext_close_comsol = Отключите клиент LiveLink for Excel от COMSOL Multiphysics Server или COMSOL Server.
lloffice_tooltiptext_automatic_pre_launch_server_at_start_up = Автоматический запуск локального мультифизического сервера COMSOL.
lloffice_tooltiptext_close_comsol = Отключите клиент от COMSOL Multiphysics Server или COMSOL Server.
lloffice_tooltiptext_delete_links = Удалите всю информацию о файлах и настройках модели из связанного контента в презентации.
lloffice_tooltiptext_start_comsol_mph_server = Запускается и подключается к локальному мультифизическому серверу COMSOL.
lloffice_tooltiptext_updateAllButton = Замените все связанные изображения и связанные таблицы регенерированными изображениями и таблицами. Сервер COMSOL Multiphysics автоматически запускается в фоновом режиме для открытия исходных моделей, если они еще не открыты в COMSOL Multiphysics или подключенном сервере COMSOL Multiphysics.
lloffice_tooltiptext_updateButton = Замените выбранное изображение или таблицу восстановленным изображением или таблицей. Сервер COMSOL Multiphysics автоматически запускается в фоновом режиме для открытия исходной модели, если он еще не открыт в COMSOL Multiphysics или подключенном сервере COMSOL Multiphysics.
lloffice_tooltiptext_comsolUpdateShapeButtonPictureTools = Замените выбранное изображение регенерированным. Сервер COMSOL Multiphysics автоматически запускается в фоновом режиме для открытия исходной модели, если он еще не открыт в COMSOL Multiphysics или подключенном сервере COMSOL Multiphysics.
lloffice_tooltiptext_comsolUpdateShapeButtonTableTools = Замените выбранную таблицу восстановленной таблицей. Сервер COMSOL Multiphysics автоматически запускается в фоновом режиме для открытия исходной модели, если он еще не открыт в COMSOL Multiphysics или подключенном сервере COMSOL Multiphysics.
lloffice_tooltiptext_viewAllButton = Просмотр и редактирование исходных моделей и узлов для всех связанных изображений и таблиц.
lloffice_tooltiptext_pasteButton = Добавьте к документу последнее связанное изображение или таблицу из Clipboard COMSOL. Чтобы скопировать изображение на клавиатуру COMSOL, используйте кнопки Image Snapshot или Quick Snapshot с панели инструментов Graphics в COMSOL Multiphysics. Чтобы скопировать таблицу на клавиатуру COMSOL, используйте кнопку Copy Table и Headers из панели инструментов окна Table в COMSOL Multiphysics.
lloffice_tooltiptext_clipboardGallery = Просмотрите все связанные изображения и таблицы на Clipboard COMSOL и выберите изображение или таблицу, которую вы хотите добавить в документ. Чтобы скопировать изображение на клавиатуру COMSOL, используйте кнопки Image Snapshot или Quick Snapshot с панели инструментов Graphics в COMSOL Multiphysics. Чтобы скопировать таблицу на клавиатуру COMSOL, используйте кнопку Copy Table и Headers из панели инструментов окна Table в COMSOL Multiphysics.
lloffice_tooltiptext_helpButton = Откройте помощь для вкладки COMSOL.
lloffice_tooltiptext_documentationButton = Откройте документацию COMSOL.
lloffice_tooltiptext_comsolImageLockUpdateCheckBox = Предотвращение замены выбранного изображения регенерированным изображением при нажатии кнопки «Обновить все» или во время пакетного обновления.
lloffice_tooltiptext_comsolDeleteLinkButton = Удалите ссылку с выбранного изображения. Изображение будет сохранено, но обновлять его будет невозможно.
lloffice_tooltiptext_comsolDeleteLinkButtonTableTools = Удалите ссылку из выбранной таблицы. Таблица будет сохранена, но обновлять ее будет невозможно.
lloffice_tooltiptext_comsolImageWidthEditBox = Введите ширину изображения в выбранный блок. Значение будет использоваться при следующем обновлении изображения.
lloffice_tooltiptext_comsolImageHeightEditBox = Введите высоту изображения в выбранном блоке. Значение будет использоваться при следующем обновлении изображения.
lloffice_tooltiptext_comsolImageResolutionEditBox = Введите разрешение изображения в DPI (точки на дюйм) в виде значения от 10 до 1200 DPI. Когда выбранный блок не является пикселем, это значение используется для расчета размера изображения в пикселях при следующем обновлении изображения.
lloffice_tooltiptext_comsolImageLockAspectRationCheckBox = Выберите для поддержания соотношения сторон изображения при изменении ширины или высоты изображения.
lloffice_tooltiptext_comsolImageAntialiasesCheckBox = Выберите, чтобы минимизировать искажения, такие как зубчатые края в генерируемом изображении. Настройка вступит в силу в следующий раз, когда изображение будет обновлено.
lloffice_tooltiptext_comsolImageLockViewCheckBox = Выберите, чтобы поддерживать вид, используемый в изображении, когда изображение обновляется. Во время обновления изображение будет регенерировано с текущим видом, даже если настройки просмотра изменились в исходной модели.
lloffice_tooltiptext_comsolImageZoomExtentsCheckBox = Выберите, чтобы добавить команду масштабирования перед генерацией изображения во время следующего обновления.
lloffice_tooltiptext_comsolImageLayoutTitleCheckBox = Выберите для отображения заголовка графика на изображении. Настройка вступит в силу в следующий раз, когда изображение будет обновлено.
lloffice_tooltiptext_comsolImageLayoutColorLegendCheckBox = Выберите для отображения легенды на изображении. Настройка вступит в силу в следующий раз, когда изображение будет обновлено.
lloffice_tooltiptext_comsolImageLayoutGridCheckBox = Выберите для отображения сетки на изображении. Настройка вступит в силу в следующий раз, когда изображение будет обновлено.
lloffice_tooltiptext_comsolImageLayoutAxisOrientationCheckBox = Выберите для отображения ориентации оси координат на изображении. Настройка вступит в силу в следующий раз, когда изображение будет обновлено.
lloffice_tooltiptext_comsolImageLayoutAxesCheckBox = Выберите для отображения ориентации оси координат на изображении. Настройка вступит в силу в следующий раз, когда изображение будет обновлено.
lloffice_tooltiptext_comsolImageLayoutLogoCheckBox = Выберите для отображения логотипа на изображении. Настройка вступит в силу в следующий раз, когда изображение будет обновлено.
lloffice_tooltiptext_comsolImageFontSizeEditBox = Введите размер шрифта в точках (pt) как значение от 1 до 1000 pt. Размер шрифта будет применяться при следующем обновлении изображения.
lloffice_tooltiptext_comsolImageBackgroundMenu = Выберите фон, чтобы применить к изображению при следующем обновлении.
lloffice_tooltiptext_comsolImageHelpButton = Откройте вкладку COMSOL Image.
lloffice_tooltiptext_comsolTableLockUpdateCheckBox = Предотвращение замены выбранной таблицы восстановленной таблицей при нажатии кнопки «Обновить все» или во время пакетного обновления.
lloffice_tooltiptext_comsolDeleteTableLinkButton = Удалите ссылку из выбранной таблицы. Таблица будет сохранена, но обновлять ее будет невозможно.
lloffice_tooltiptext_comsolTablePrecisionEditBox = Введите точность таблицы в качестве значения от 1 до 15. Настройка вступит в силу в следующий раз, когда таблица будет обновлена, если не будет выбрана полная точность.
lloffice_tooltiptext_comsolTableNotationDropDown = Выберите нотацию таблицы. Настройка вступит в силу в следующий раз, когда таблица будет обновлена.
lloffice_tooltiptext_comsolTableComplexNotationDropDown = Выберите нотацию таблицы для комплексных чисел. Настройка вступит в силу в следующий раз, когда таблица будет обновлена.
lloffice_tooltiptext_comsolTableIncludeHeaderCheckBox = Выберите включить заголовок на столе. Настройка вступит в силу в следующий раз, когда таблица будет обновлена.
lloffice_tooltiptext_comsolTableIncludeTitleCheckBox = Выберите, чтобы включить название для таблицы. Настройка вступит в силу в следующий раз, когда таблица будет обновлена.
lloffice_tooltiptext_comsolTableFullPrecisionCheckBox = Выберите использование полной точности для стола. Настройка вступит в силу в следующий раз, когда таблица будет обновлена.
lloffice_tooltiptext_comsolTableHelpButton = Откройте вкладку «CoMSOL Table».
lloffice_tooltiptext_clearAllModelLocationsButton = Избегайте обмена конфиденциальной информацией в документе, сохраняя только имя файла исходных моделей в ссылках.
lloffice_tooltiptext_useRelativePathsCheckBox = Найдите исходные модели относительно рабочего каталога. 
lloffice_tooltiptext_checkButton = Убедитесь, что исходные модели существуют в указанных местах и что они содержат ссылки на узлы.
lloffice_tooltiptext_clearAllButton = Исключить все ссылки из документа. Изображения будут сохранены, но обновлять их будет невозможно.
