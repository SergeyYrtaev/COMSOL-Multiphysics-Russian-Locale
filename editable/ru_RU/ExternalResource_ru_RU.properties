This_will_delete_all_folder_information_from_the_model_references_Updating_will_still_be_possible_if_the_model_files_are_located_in_the_same_folder_as_the_presentation_or_if_you_manually_browse_to_find_the_files_Do_you_want_to_continue = Это удалит всю информацию о папках из ссылок на модель. Обновление по-прежнему будет возможно, если файлы модели находятся в той же папке, что и документ, или если вы вручную просматриваете, чтобы найти файлы. Хочешь продолжить?
