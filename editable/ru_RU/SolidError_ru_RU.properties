Consider_using_the_Shell-Beam_connection_multiphysics_coupling_feature_instead. = Вместо этого рассмотрите возможность использования функции мультифизического соединения Shell–Beam Connection.
Consider_using_the_Solid-Beam_connection_multiphysics_coupling_feature_instead. = Вместо этого рассмотрите возможность использования функции мультифизического соединения Solid–Beam Connection.
Consider_using_the_Solid-Shell_connection_multiphysics_coupling_feature_instead. = Вместо этого рассмотрите возможность использования функции мультифизического соединения Solid–Shell Connection.
