Maximum_element_size_could_not_be_determined_from_the_study._The_mesh_is_not_used_in_any_study = В результате исследования не удалось определить максимальный размер элемента.\nСетка не используется ни в одном исследовании.
Maximum_element_size_could_not_be_determined_from_the_study._The_study_step_does_not_define_a_maximum_frequency = В ходе исследования не удалось определить максимальный размер элемента.\n0Этап исследования не определяет максимальную частоту.
