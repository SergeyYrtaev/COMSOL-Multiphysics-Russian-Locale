Ring_inner_diameter_must_be_greater_than_hole_diameter = Внутренний диаметр кольца должен быть больше диаметра отверстия.
Ring_inner_diameter_must_be_smaller_than_ring_outer_diameter = Внутренний диаметр кольца должен быть меньше внешнего диаметра кольца.
Ring_outer_diameter_must_be_a_positive_number = Внешний диаметр кольца должен быть положительным числом.
Ring_outer_diameter_must_be_smaller_than_root_diameter = Внешний диаметр кольца должен быть меньше диаметра корня.
Ring_width_is_too_large = Ширина кольца слишком велика.
Ring_width_must_be_a_positive_number = Ширина кольца должна быть положительным числом.
Roller_diameter_must_be_smaller_than_pitch[MBD] = Диаметр ролика должен быть меньше шага.
Root_fillet_radius_must_be_a_positive_number = Радиус корневого скругления должен быть положительным числом.
Shaft_length_must_be_a_positive_number = Длина вала должна быть положительным числом.
Sprocket_center_distance_correction_factor_must_vary_between_0_to_0.5[MBD] = Поправочный коэффициент межосевого расстояния звездочки должен варьироваться от 0 до 0,5.
Sprocket_center_distance_correction_parameter_must_be_either_1_or_0[MBD] = Параметр коррекции межосевого расстояния звездочки должен быть равен 1 или 0.
Sprocket_center_distance_must_be_greater_than_sum_of_sprocket_radii[MBD] = Расстояние между центрами звездочек должно быть больше суммы радиусов звездочек.
Sprocket_clearance_must_be_smaller_than_width[MBD] = Зазор звездочки должен быть меньше ширины.
Sprocket_dimensions_must_be_positive[MBD] = Размеры звездочки должны быть положительными.
Tip_fillet_radius_must_be_a_positive_number = Радиус скругления кончика должен быть положительным числом.

