Fracture_plane_angle_under_transverse_compression_must_be_larger_than_0_and_smaller_than_90_degrees = Угол плоскости разрушения при поперечном сжатии должен быть больше 0 и меньше 90 градусов.
Fracture_plane_angle_increment_must_be_larger_than_1_and_smaller_than_5_degrees = Приращение угла плоскости разрушения должно быть больше 1 и меньше 5 градусов.
The_current_contact_settings_require_storage_of_history_variables._Use_either_a_time_dependent_study_or_a_stationary_study_with_a_continuation_parameter = Текущие настройки контакта требуют хранения переменных истории. Используйте либо исследование, зависящее от времени, либо стационарное исследование с параметром продолжения.
