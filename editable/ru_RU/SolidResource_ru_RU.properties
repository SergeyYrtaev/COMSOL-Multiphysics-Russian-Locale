Life_cutoff[Fatigue] = Окончание жизни
Lower_frequency[Fatigue] = Более низкая частота
Moment_computation[Fatigue] = Расчет момента
Number_of_frequencies[Fatigue] = Количество частот
Number_of_upward_zero_crossings_per_unit_time = Количество восходящих переходов через нуль в единицу времени
Number_of_peaks_per_unit_time = Количество пиков в единицу времени
Pitoiset-Preumont = Питуазет–Преумонт
Physics_interface_for_stresses = Физический интерфейс для напряжений
Probability_density_function[Fatigue] = Функция плотности вероятности
Random_vibration_model = Модель случайной вибрации
RMS_of_stress = Среднеквадратичное значение напряжения
Second_moment = Второй момент
Spatially_varying_S-N_data = Пространственно меняющиеся данные S–N
Stress_expression[Fatigue] = Выражение напряжения
Stress_method[Fatigue] = Напряжениеовый метод
Upper_frequency[Fatigue] = Верхняя частота
Upper_integration_limit[Fatigue] = Верхний предел интеграции
Zeroth_moment = Нулевой момент
