The_number_of_sectors_must_be_an_integer_when_rotation_is_selected_and_an_even_integer_when_rotation_and_reflection_is_selected  = Количество секторов должно быть целым числом, если выбрано вращение, и четным целым числом, если выбрано вращение и отражение.
#--------------------------------------------
# Descriptions for Warning messages
#-------------------------------------------- 
Disconnected_closed_surfaces_found_in_boundary_selection = При выборе границ обнаружены несвязные замкнутые поверхности.
The_boundary_selection_does_not_form_a_single_closed_surface = Граничное выделение не образует единой замкнутой поверхности.
Selection_expected_to_be_open_but_a_closed_surface_selection_found = Ожидалось, что выделение будет открытым, но обнаружено закрытое поверхностное выделение.
Inertia_relief_analysis_can_produce_incorrect_results_in_case_of_geometric_nonlinearity = Анализ инерционного рельефа может дать неправильные результаты в случае геометрической нелинейности.
Inertia_Relief_feature_does_not_support_generalized_plane_strain = Функция снятия инерции не поддерживает обобщенную плоскую деформацию.
Inertia_Relief_feature_does_not_support_out-of-plane_mode_extension = Функция сброса инерции не поддерживает расширение режима вне плоскости.
Inertia_Relief_feature_does_not_support_circumferential_mode_extension = Функция снятия инерции не поддерживает расширение окружного режима.
Inertia_Relief_feature_does_not_support_circumferential_displacement = Функция снятия инерции не поддерживает смещение по окружности.
Identity_boundary_pairs_should_use_the_material_frame_for_both_source_frame_and_destination_frame_Consider_changing_the_frame_settings_for_all_identity_boundary_pairs = Пары границ идентификаторов должны использовать фрейм материала как для исходного кадра, так и для целевого кадра.\nРассмотрите возможность изменения настроек фрейма для всех пар границ идентификаторов.
Check_if_the_viscosity_depends_on_the_pressure_and_temperature_this_is_important_when_including_the_first_order_viscosity_terms_in_Acoustic_Streaming_Boundary_Coupling = Проверьте, зависит ли вязкость от давления. Это важно при включении вязкости первого порядка в акустическую граничную связь.
Check_if_the_viscosity_depends_on_the_pressure_and_temperature_this_is_important_when_including_the_first_order_viscosity_terms_in_Acoustic_Streaming_Domain_Coupling = Проверьте, зависит ли вязкость от давления. Это важно при включении вязкости первого порядка в акустическую потоковую связь.
Inconsistent_fluid_boundary_condition_at_fluid-structure_interface = Несогласованное граничное условие жидкости на границе раздела жидкость–структура. Мультифизическая связь Fluid–Structure Interaction требует, чтобы в интерфейсе Fluid–2structure был установлен набор функций Wall, а для скорости перемещения стены установлено значение Автоматически из кадра.
Inconsistent_fluid_interior_boundary_condition_at_fluid-structure_interface = Несогласованное внутреннее граничное условие жидкости на границе раздела жидкость–структура. Мультифизическая связь Fluid–Structure Interaction требует, чтобы функция «Внутренняя стена» была установлена ​​в интерфейсе Fluid–structure, а для параметра «Скорость перемещения стены» установлено значение «Автоматически» из кадра.
Inconsistent_boundary_conditions_at_the_port_boundary[numeric] = Несогласованные граничные условия на границе порта. Для числового порта границы соседних волноводов должны использовать скольжение или отсутствие скольжения вместе с изотермическими или адиабатическими граничными условиями.
Inconsistent_boundary_conditions_at_the_port_boundary[analytic] = Несогласованные граничные условия на границе порта. Для аналитического порта прилегающие границы волновода должны использовать условия отсутствия скольжения и изотермические граничные условия.
Inconsistent_boundary_conditions_at_the_port_boundary[planewave] = Несогласованные граничные условия на границе порта. Для плоского волнового порта соседние границы волновода должны использовать симметрию или скользить вместе с адиабатическими граничными условиями.
Layered_material_model_on_wear_surface_boundary_is_not_supported = Модель слоистого материала на границе поверхности износа не поддерживается.
Missing_interior_wall_boundary_condition_in_fluid = Отсутствует граничное условие внутренней стенки в жидкости.
Prescribed_displacement_should_normally_use_a_coordinate_system_on_spatial_frame = Предписанное смещение обычно должно использовать систему координат в пространственной системе координат.
Click_the_Create_Links_and_Joints_button_to_create_Rigid_Material,_Attachment,_and_Hinge_Joint_nodes[MBD] = Нажмите кнопку «Создать связи и соединения», чтобы создать узлы «Жесткий материал», «Прикрепление» и «Шарнирное соединение».
Feature_name_is_modified._Click_the_Create_Links_and_Joints_button_to_update_Rigid_Material,_Attachment,_and_Hinge_Joint_nodes[MBD]  = Имя элемента изменено.\nНажмите кнопку «Создать связи и соединения», чтобы обновить узлы «Жесткий материал», «Прикрепление» и «Шарнирное соединение». 
One_or_more_input_selections_are_modified._Click_the_Create_Links_and_Joints_button_to_create_Rigid_Material,_Attachment,_and_Hinge_Joint_nodes[MBD] = Изменяются один или несколько входных параметров. \nНажмите кнопку «Создать связи и соединения», чтобы создать узлы «Жесткий материал», «Прикрепление» и «Шарнирное соединение».
One_or_more_input_parameters_are_modified._Click_the_Create_Links_and_Joints_button_to_update_Rigid_Material,_Attachment,_and_Hinge_Joint_nodes[MBD] = Изменены один или несколько входных параметров.\nНажмите кнопку «Создать связи и соединения», чтобы обновить узлы «Жесткий материал», «Прикрепление» и «Шарнирное соединение».
Consider_recreating_the_Contact_node = Рассмотрите возможность воссоздания узла контактов.
Consider_recreating_the_Creep_node = Рассмотрите возможность воссоздания узла Creep.
Consider_using_the_Impervious_added_mass_feature_together_with_the_Boundary_load_feature_instead. = Вместо этого рассмотрите возможность использования функции «Непроницаемая добавленная масса» вместе с функцией «Граничная нагрузка».
Consider_using_the_Solid_Thin-Film_Damping_multiphysics_interface = Рассмотрите возможность использования мультифизического интерфейса Solid–Thin-Film Damping.
Consider_using_the_Symmetry_Plane_feature_instead = Вместо этого рассмотрите возможность использования функции «Плоскость симметрии».
Consider_using_a_Thin_Layer_instead = Вместо этого рассмотрите возможность использования тонкого слоя.
Duplicate_parameter_name_found_in_the_parameter_table = В таблице параметров обнаружено повторяющееся имя параметра.
Source_boundary_internal_to_the_current_physics_detected,_even_though_the_Source_external_to_current_physics_check_box_is_selected = Обнаружена внутренняя граница источника текущей физики, хотя флажок 'Source external to current physics' установлен.
A_manual_selection_is_used_in_this_default_feature._The_boundary_conditions_on_deselected_boundaries_correspond_to_no_stress_and_adiabatic_conditions. = В этой функции по умолчанию используется ручной выбор. Граничные условия на снятых границах соответствуют отсутствию напряжений и адиабатическим условиям.
Selection_requires_min_1_points = Необходимо выбрать хотя бы одну точку.
Selection_requires_min_2_points = Необходимо выбрать как минимум две точки.
Selection_requires_min_3_points = Необходимо выбрать как минимум три точки.
Geometric_nonlinearity_is_not_supported_for_frequency_analysis_in_beam_interface._using_a_geometric_linear_implementation_instead = Геометрическая нелинейность не поддерживается для частотного анализа в интерфейсе Beam. Вместо этого используется геометрическая линейная реализация.
Geometric_nonlinearity_is_not_supported_for_linear_buckling_analysis_in_beam_interface._using_a_geometric_linear_implementation_instead = Геометрическая нелинейность не поддерживается для линейного анализа потери устойчивости в интерфейсе Beam. Вместо этого используется геометрическая линейная реализация.
Geometric_nonlinearity_is_not_supported_for_frequency_analysis_in_pipe_mechanics_interface._using_a_geometric_linear_implementation_instead = Геометрическая нелинейность не поддерживается для частотного анализа в интерфейсе «Механика труб». Вместо этого используется геометрическая линейная реализация.
Geometric_nonlinearity_is_not_supported_for_linear_buckling_analysis_in_pipe_mechanics_interface._using_a_geometric_linear_implementation_instead = Геометрическая нелинейность не поддерживается для линейного анализа потери устойчивости в интерфейсе «Механика труб». Вместо этого используется геометрическая линейная реализация.
On_the_study_step_node_consider_setting_the_eigenfrequency_search_method_around_shift_to_larger_real_part = На узле шага исследования рассмотрите возможность установки метода поиска собственной частоты вокруг сдвига к большей действительной части. Эта опция может улучшить производительность решателя собственных значений.
Parameter_table_cannot_be_empty = Таблица параметров не может быть пустой.
Thermoelastic_damping_needs_linearization_point_temperature = Термоупругое демпфирование требует температуры точки линеаризации.
This_model_was_created_in_an_earlier_version,_the_following_obsolete_pair_boundary_conditions_have_been_removed = Эта модель была создана в более ранней версии, были удалены следующие устаревшие парные граничные условия:
This_feature_uses_a_legacy_setting,_which_will_be_removed_in_future_versions._Consider_using_the_standard_notation_instead = Эта функция использует устаревшие настройки, которые будут удалены в будущих версиях.\nРассмотрите возможность использования вместо этого стандартных обозначений.
You_may_need_to_add_corresponding_nonpair_boundary_conditions_to_your_model = Возможно, вам придется добавить в модель соответствующие непарные граничные условия.
The_boundary_system_is_referencing_an_invalid_system._The_section_forces_are_not_computed = Система границ ссылается на недопустимую систему. Силы сечения не рассчитываются.
The_derivation_of_the_Acoustic_Streaming_Boundary_Coupling_does_not_take_turbulent_fluid_flow_into_account = Вывод граничной связи акустического потока не учитывает турбулентный поток жидкости.
The_derivation_of_the_Acoustic_Streaming_Domain_Coupling_does_not_take_turbulent_fluid_flow_into_account = Вывод акустической потоковой связи не учитывает турбулентный поток жидкости.
The_geometry_shape_function_order_is_not_consistent_with_the_discretization_of_the_dependent_variables._Consider_increasing_the_geometry_shape_function_order_to_Quadratic_Lagrange_in_the_Curved_Mesh_Element_section_in_the_Component_node's_settings = Порядок функции формы геометрии не соответствует дискретизации зависимых переменных.\nРассмотрите возможность увеличения порядка функции формы геометрии до квадратичного Лагранжа в разделе «Элемент криволинейной сетки» в настройках узла «Компонент».
The_legacy_port_sweep_is_obsolete_and_will_be_removed_in_future_versions = Устаревшая очистка портов устарела и будет удалена в будущих версиях.
The_selected_boundaries_are_disconnected._The_section_forces_are_not_computed = Выбранные границы отключены. Силы сечения не рассчитываются.
The_selected_boundaries_are_nonplanar._The_section_forces_are_not_computed = Выбранные границы неплоские. Силы сечения не рассчитываются.
# End
