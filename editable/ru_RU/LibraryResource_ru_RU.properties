addinlabel_mph/mesh_partition_with_ball = Разбиение сетки шаром
addindoc_mph/mesh_partition_with_ball = Это дополнение создаёт разбиение 3D-сетки с помощью функции Ball на основе сферы отсечения в окне графики. Центр шара также можно задать в центре вращения графического окна. Радиус шара можно ввести вручную или принять равным удвоенному среднему размеру элемента сетки.
addinlabel_mph/mesh_partition_with_ball_form_main = Разбиение сетки шаром
addindoc_mph/mesh_partition_with_ball_form_main = Разбивает 3D-сетку с помощью функции Ball, созданной из сферы отсечения.
addinlabel_mph/mesh_partition_with_ball_From_Clip_Sphere = Сфера отсечения
addin_mph/mesh_partition_with_ball_message_Not_Supported = Разбиение шаром в этом контексте не поддерживается.
addin_mph/mesh_partition_with_ball_message_Please_select_a_mesh = Выберите 3D-сетку, которая определяет собственную геометрическую модель, например импортированную сетку.
addin_mph/mesh_partition_with_ball_message_Please_create_a_Component_or_a_Mesh_Part = Создайте 3D-компонент или 3D-часть сетки.
addin_mph/mesh_partition_with_ball_Information = Выберите 3D-сетку для разбиения. Поддерживаются сетки, которые определяют собственную геометрическую модель и не являются заблокированными или пустыми. По умолчанию выбирается сетка, связанная с текущим видом.\n\nЦентр шара автоматически устанавливается в центр вращения графического окна. Чтобы изменить центр вращения, щёлкните средней кнопкой мыши в нужной точке.
addin_mph/mesh_partition_with_ball_tooltip_create = Создать разбиение с помощью функции Ball
addin_mph/mesh_partition_with_ball_tooltip_refresh = Обновить список радиусов шара после включения или отключения отсечения

