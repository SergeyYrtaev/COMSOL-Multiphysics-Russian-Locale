# Library update server-side messages
According_to_our_records,_this_license_has_been_canceled._Please_contact_your_COMSOL_representative_to_get_a_license_number_eligible_for_use = Согласно нашим данным, эта лицензия была аннулирована. Свяжитесь с представителем COMSOL, чтобы получить номер лицензии, доступный для использования.
Download_applications_with_complete_solutions._These_will_take_longer_to_download = Скачать приложения с полными решениями. Загрузка займёт больше времени.
Download_applications_without_solutions._These_will_be_faster_to_download,_but_you_need_to_solve_them_yourself = Скачать приложения без решений. Они загрузятся быстрее, но их потребуется решить самостоятельно.
Library_Update_is_not_available_for_your_COMSOL_Multiphysics_version = Обновление библиотеки недоступно для вашей версии COMSOL Multiphysics.
Your_COMSOL_Application_Libraries_are_up_to_date = Библиотеки приложений COMSOL обновлены.
Your_COMSOL_Part_Libraries_are_up_to_date = Библиотеки деталей COMSOL обновлены.
Session_cookies_not_allowed = Убедитесь, что ваш браузер (Internet Explorer или Microsoft Edge в Windows независимо от браузера по умолчанию) настроен на разрешение сеансовых cookie.\n\nЕсли вы получаете доступ к Интернету через прокси-сервер, обратитесь к локальному системному администратору, чтобы убедиться, что он настроен на разрешение доступа к https://secure.comsol.com/updates/.


