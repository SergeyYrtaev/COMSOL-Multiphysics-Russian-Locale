addindoc_mph/_09_advanced_compact_smartphones_template_main = Шаблон для разработки приложений, которые будут использоваться на небольших экранах, таких как смартфоны. Шаблон состоит из верхнего меню с четырьмя кнопками, которые выделяются при нажатии. Нажатие на кнопку в верхней кнопке меню активирует два стека карт. Первый стек карт содержит панель инструментов с элементами для построения графики в графическом объекте внизу, в то время как второй стек карт может использоваться для добавления входов, настроек и результатов.

# COMSOL Multiphysics apps
applicationdescr_mph/beam_subjected_to_traveling_load = Балка, подверженная движущейся нагрузке\n\nВ качестве примера создания приложения с помощью Конструктора приложений это приложение моделирует переходный процесс балки или моста, размещенного на нескольких равноудаленных опорах и подвергающегося движущейся нагрузке.\n\nЦелью приложения «Балка, подверженная движущейся нагрузке» является анализ структурной реакции моста, когда по нему проезжают транспортные средства. Многие параметры моста можно варьировать, например, свойства материала и многие геометрические параметры.\n\nОдним из наблюдений, полученных в ходе анализа, является то, что определенные скорости транспортных средств вызывают резонанс в мосту и он подвергается колебаниям с высокой амплитудой.
applicationdescr_mph/cluster_setup_validation = Cluster Setup Validation\n\nИспользуйте это приложение, чтобы подтвердить, что настройки по умолчанию правильно отправляют задания в кластер. Эти настройки по умолчанию взяты из настроек.\n\n Приложение позволяет переопределить настройки кластера по умолчанию, протестировать модификации текущей настройки и протестировать различные настройки для подключения к кластеру.
applicationdescr_mph/curve_digitizer = Curve Digitizer\n\nИспользуйте это приложение для извлечения кривых из изображений. Он обеспечивает простой способ оцифровки различных 1D-графиков с различными осями в картезианских или полярных системах координат.
applicationdescr_mph/helical_static_mixer = Helical Static Mixer\n\nЭто приложение демонстрирует следующее:\n\n• Геометрические части и параметризированные геометрии\n•тёмная тема\n• Визуализация внешнего вида материала с отражением окружающей среды\n• Создание отчётов для Microsoft® Word и Microsoft® PowerPoint\n• Варианты настройки различных размеров сетки\n• Улучшенная визуализация графики путем отображения/скрытия различных объектов геометрии\n• Включение и отключение ленточных элементов на основе решения state.\n\nHelical статические смесители часто используются для смешивания мономеров и инициаторов, которые затем реагируют во время процесса полимеризации. Поле концентрации включено в анализ для того, чтобы вычислить степень смешивания между двумя потоками, вводимыми в статический смеситель через полукруглые входы.\n\n Приложение может использоваться для оценки степени смешивания в системе, включающей от одного до пяти спиральных лопастей, размеры которых также могут быть изменены. Жидкие свойства мономеров и скорость входа также могут быть изменены.
applicationdescr_mph/installation_verification = Проверка установки\n\nПриложение проверки установки можно использовать для проверки того, что установка COMSOL Multiphysics® или COMSOL Server™ работает должным образом на ваших аппаратных платформах и операционных системах. Приложение автоматически загружает и запускает набор тестовых моделей и сравнивает результаты с сохраненными ожидаемыми значениями. Один набор тестов сравнивает текущие вычисленные результаты с опубликованными результатами, полученными в результате экспериментов или других типов расчётов или аналитических результатов. Другой набор тестов сравнивает вычисленные результаты с ранее вычисленными сохраненными результатами, обычно с уточненной сеткой. для наиболее ресурсоёмких тестовых моделей может потребоваться до 32 ГБ ОЗУ.
applicationdescr_mph/shock_tube_dg = Ударная труба\n\n Сжимаемые уравнения Эйлера реализованы в интерфейсе Wave Form PDE с узловыми прерывистыми функциями формы Лагранжа для вычисления потока в ударной трубе. Целью этого приложения является моделирование потока в трубе и оценка распределения давления, плотности, скорости, температуры, скорости звука, числа Маха и массового потока вдоль трубки, а также положения волн в любой момент времени.
applicationdescr_mph/thermal_actuator_surrogate = [Приложение суррогатной модели теплового привода]Приложение суррогатной модели теплового привода\n\n Приложение Thermal Actuator Surrogate Model демонстрирует, как ускорить вычисления для мультифизического анализа с использованием суррогатной модели для полностью параметрической модели геометрии. Суррогатная модель — это более простая, обычно вычислительно более дешевая модель, которая используется для аппроксимации поведения более сложной и часто более дорогостоящей модели. Более быстрая оценка модели, предлагаемая суррогатной моделью, обеспечивает пользователю приложения более интерактивный пользовательский опыт и облегчает распространение использования симуляций в организации. Этот пример иллюстрирует, как суррогатная модель может быть создана и использована в приложении для мультифизического моделирования, где геометрия основана на параметрической модели САПР.
applicationdescr_mph/transmission_line_calculator = Калькулятор параметров линии передачи\n\nЭто приложение демонстрирует следующее:\n\n• Создание приложений для небольших экранов, таких как смартфоны\n• Навигация по пользовательскому интерфейсу с верхним меню обычно используется на веб-сайтах\n• Динамическое скрытие форм с использованием стеков карт для минимизации пространства, требуемого приложением \n• Изменение внешнего вида с использованием различных цветов фона.\n\nТеория линий передачи является краеугольным камнем в преподавании радиочастотной и микроволновой инженерии.\n\nЛинии передачи используются для направления волн электромагнитных полей на радиочастотах. Они существуют в различных формах, многие из которых адаптированы для легкого изготовления и использования в конструкциях печатных плат. Часто они используются для передачи информации с минимальными потерями и искажениями внутри устройства и между устройствами.\n\nElectromagnetic поля распространяются вдоль линий передачи в виде поперечных электромагнитных (TEM) волн. Приложение Transmission Line Parameter Calculator вычисляет сопротивление (R), индуктивность (L), проводимость (G) и ёмкость (C), а также характерную импедансную и постоянную распространения для некоторых распространенных типов линий передачи: коаксиальная линия, двойной свинец, линия микрополосы и копланарный волновод (CPW).
applicationdescr_mph/tubular_reactor = Tubular Reactor with Jacket\n\nЭто приложение демонстрирует следующее:\n\n• Отправка по электронной почте отчета, когда расчёт завершён \n• Пользовательские настройки сервера электронной почты \n• Воспроизведение звука при завершении вычисления\n• Варианты визуализации графиков tiled или tabbed\n• Локализация приложения\n\n Приложение иллюстрирует, как студенты в области химической инженерии могут моделировать неидеальные трубчатые реакторы (радиальные и осевые изменения) и исследовать влияние различных условий эксплуатации. [+] Это также отличный пример того, как учителя могут создавать индивидуальные интерфейсы для задач, которые бросают вызов воображению студентов.\n\n Модель описывает трубчатый реактор, в котором оксид пропилена (A) реагирует с водой (B) с образованием пропиленгликоля (C):\n\nA + B -> C\n\nПоскольку вода является растворителем и присутствует в изобилии, кинетика реакции может быть описана как первый порядок в отношении пропилена оксида \n\nR = k*C A\n\nАльтернативно, реакция второго порядка также может быть реализована по адресу\n\nR = kf*C A*C B - kr*C C\n\n Реакция экзотермическая, и для охлаждения реактора используется охлаждающая куртка. Реактор моделируется в 2D-аксисимметрии, и результаты моделирования дают изменения состава и температуры как в радиальном, так и в осевом направлениях.
applicationdescr_mph/tubular_reactor_surrogate = [Приложение суррогатной модели трубчатого реактора] Приложение суррогатной модели трубчатого реактора\n\nЭто приложение трубчатого реактора, вместе с его связанной встроенной моделью, демонстрирует, как вычислительная скорость может быть увеличена с использованием суррогатной модели, в отличие от полноценной модели конечных элементов. Суррогатная модель является более простой, обычно вычислительно более дешевой моделью, которая используется для приближения поведения более сложной и часто более вычислительно дорогой модели. Более быстрая оценка модели, предлагаемая суррогатной моделью, обеспечивает пользователю приложения более интерактивный пользовательский опыт и облегчает распространение использования симуляций в организации.
applicationdescr_mph/tubular_reactor_surrogate_sampling = Приложение суррогатной модели трубчатого реактора с эффективной геометрией выборкой\n\nЭто приложение трубчатого реактора вместе с его связанной встроенной моделью демонстрирует, как вычислительная скорость может быть увеличена с использованием суррогатной модели, в отличие от полноценной модели конечных элементов. Суррогатная модель является более простой, обычно вычислительно более дешевой моделью, которая используется для приближения поведения более сложной и часто более вычислительно дорогой модели. Более быстрая оценка модели, предлагаемая суррогатной моделью, обеспечивает пользователю приложения более интерактивный пользовательский опыт и облегчает распространение использования симуляций в организации. В этой версии используется метод эффективной геометрии выборки путем объединения дизайна экспериментов с координатной выборки решения.
applicationdescr_mph/tuning_fork = Камертон\n\nЭто приложение демонстрирует следующее:\n\n• Воспроизведение звука на определенной вычислительной частоте\n• Выбор различных материалов из раскрывающегося списка\n• Выбор трех различных макетов пользовательского интерфейса для компьютера, планшета или смартфона\n• Пользовательская реализация метода секантирования\n• Пользовательский значок окна.\n\n При ударе камертона он вибрирует в сложном шаблоне движения, который может быть математически описан как суперпозиция резонансных режимов, также известных как собственные моды. Каждый режим связан с определенной собственной частотой. Тюнинг-форк производит свой характерный звук из определенного тембра, который создается комбинацией всех собственных частот.\n\n Приложение вычисляет фундаментальную резонансную частоту камертона, где вы можете изменить длину зубца. В качестве альтернативы вы можете предоставить определенную пользователем целевую частоту, и приложение найдет соответствующую длину зубца с помощью алгоритма, основанного на методе секантирования.
applicationdescr_mph/model_tester = Model Tester\n\nModel Tester перестраивает и повторно вычисляет модели, содержащиеся в библиотеке приложений, и сравнивает новые результаты с сохраненной версией. Если результаты согласуются, установка COMSOL Multiphysics работает по назначению.
applicationdescr_mph/model_test_generator = Model Test Generator\n\nModel Test Generator может создавать и редактировать тестовые архивы для использования в Model Tester. Вы можете использовать его для тестирования установки COMSOL на своих моделях.

# COMSOL Multiphysics models
modeldescr_mph/automotive_muffler = Автомобильный глушитель\n\n Этот пример имитирует распространение волны давления в глушителе для двигателя внутреннего сгорания. Он использует общий подход для анализа демпфирования распространения гармонических волн давления. Модель решается в частотной области и обеспечивает эффективное демпфирование в частотном диапазоне 100-1000 Гц.
modeldescr_mph/backstep_argyris = Стационарный несжимаемый поток над обратным уступом\n\nЭто версия модели обратного уступа, которая использует элементы без дивергенции. Давление устраняется из уравнений с помощью C1-непрерывного элемента Аргириса.
modeldescr_mph/backstep_quad = Стационарный несжимаемый поток над обратным уступом\n\nЭтот пример решает несжимаемые уравнения Navier–Stokes в геометрии с уступом с использованием четырехугольных элементов вместо треугольных элементов. В остальном пример идентичен backstep.mph.
modeldescr_mph/bipolar_transistor = Распределенная SPICE модель биполярного транзистора\n\n Исследуется скорость переключателя интегрированного биполярного транзистора, как в зависимости от времени, так и в зависимости от времени. Транзистор изготовлен из карбида кремния и хорошо подходит для приложений переключения питания.
modeldescr_mph/black_scholes_put = Black–Scholes Equation\n\n Решение уравнения Black–Scholes для значения европейского опциона пут. Блэк и Скоулз разработали аналитическое выражение для решения.
modeldescr_mph/blasius_boundary_layer = Граничный слой Блазиуса\n\nВ этом примере моделируется граничный слой Блазиуса для различных сеток и сравниваются результаты с решением подобия.
modeldescr_mph/buoyancy_free = Плавучее течение свободных жидкостей\n\nУправляемый плотностью или плавучее течение может влиять на жидкости, свободно движущиеся в трубах, озерах, реках и ручьях. Этот пример демонстрирует эффективный способ моделирования плавучего течения в свободных жидкостях, который является результатом небольших вариаций плотности. Исследование совпадает с опубликованной работой де Валь Дэвиса.
modeldescr_mph/busbar = Электрический нагрев в шине\n\n В этом примере анализируется резистивный нагрев шины, предназначенной для проведения постоянного тока.
modeldescr_mph/busbar_box = [Электрический нагрев в шине] Конвективное охлаждение в шине: шина\n\n Это шаблон MPH-файла, который можно использовать в качестве отправной точки для расширения примера электрического нагрева в шине с изучением конвективного охлаждения шины воздушным потоком.
modeldescr_mph/busbar_geom = [Электрический нагрев в шине]Параметризованная геометрия шины\n\n Это шаблон MPH-файла, содержащий физические интерфейсы и параметризованную геометрию для примера электрического нагрева в шине.
modeldescr_mph/busbar_assembly = Электрический нагрев в сборке шины\n\nЭто руководство анализирует резистивный нагрев (нагрев джоулей) сборки шины, предназначенной для проведения постоянного тока от источника тока к аноду в процессе электролиза. для изучения влияния размерных параметров на повышение температуры в устройстве параметрический решатель вычисляет моделирование для множественных комбинаций выбранных размеров геометрии.
modeldescr_mph/carbon_fibers = Анизотропные теплопередачи через волокнистые волокна \n\nCarbon-fiber-reinforced полимеры содержат тканые углеродные волокна, которые имеют гораздо более высокую теплопроводность вдоль оси волокна, чем перпендикулярно ей. Это руководство показывает, как использовать интерфейс криволинейных координат для вычисления локальной ориентации волокна и использовать его для определения анизотропной теплопроводности волокон.
modeldescr_mph/carbon_fibers_geom = [Анизотропная теплопередача через тканые углеродные волокна] Параметризованная геометрия тканых углеродных волокон\n\nЭто шаблон MPH-файла, содержащий параметризованную геометрию для примера анизотропной теплопередачи через тканые углеродные волокна.
modeldescr_mph/chemical_etching = Chemical Etching\n\n Этот пример иллюстрирует принцип влажного химического травления для 2D-геометрии под ламинарным потоком. Влажное химическое травление особенно важно для микроэлектронной промышленности для моделирования интегральных схем, устройств MEMS, оптоэлектронных и датчиков давления. Это приложение иллюстрирует влажный химический процесс травления для полости меди под потоком хлорида меди. Линейная кинетика предполагается для реагента травления.\n\nПрофиль концентрации, профиль скорости и эволюция формы полости без маскировки меди изучается в процессе травления. Установлено, что деформирующая геометрия медного субстрата зависит от локального профиля скорости жидкости и от потока траншированных видов. Модель предсказывает, как медная подложка под ламинарным потоком вытравливается и отслеживает форму 2D полости во время процесса влажного травления.
modeldescr_mph/comsol_application_libraries_template_source = COMSOL Application Libraries Template Source\n\nЭто внутренний MPH-файл, который определяет шаблон для использования для пользовательских презентаций моделей библиотек приложений.
modeldescr_mph/conical_quantum_dot = Конические квантовые точки Dot\n\nQuantum создаются путем ограничения свободных электронов на поверхности полупроводника. Это модель электронных состояний конической точки InAs, выращенной на подложке GaAs.
modeldescr_mph/crankshaft = Анализ собственных значений коленчатого вала\n\nВ этом примере сетка NASTRAN коленчатого вала импортируется в COMSOL Multiphysics и используется для анализа собственных частот.
modeldescr_mph/cylinder_flow = Поток мимо цилиндра\n\n Этот пример имитирует зависящий от времени поток мимо цилиндра. Число Рейнольдса составляет около 100, что достаточно мало, чтобы поток оставался ламинарным, но достаточно высоко, чтобы образовалась вихревая улица фон Кармана.
modeldescr_mph/diffraction_patterns = Diffraction Patterns\n\nЭто модель известного эксперимента с интерференцией с двумя щелями. Два тонких волновода приводят к щелям на экране. Пример вычисляет дифракционный паттерн, который появляется с другой стороны.
modeldescr_mph/effective_diffusivity = Эффективная диффузивность в пористых материалах\n\n Этот пример вводит концепцию эффективной диффузивности в пористых средах путем сравнения транспорта через искусственную пористую структуру, описанную в подробной модели, с упрощенным гомогенным пористо-средним подходом с использованием эффективных транспортных свойств.
modeldescr_mph/eigenmodes_of_room = Eigenmodes of a Room\n\n Этот пример имитирует стоящие акустические волны в комнате с мебелью. Собственные моды немного отличаются от точного решения для пустой комнаты.
modeldescr_mph/electric_sensor = Electric Sensor\n\nЭтот пример показывает, как визуализировать внутреннюю проницаемость коробки, применяя разность потенциалов на границах коробки. Результатом является плотность поверхностного заряда, которая зависит от проницаемости среды внутри коробки.
modeldescr_mph/electrochemical_polishing = Электрохимическая полировка\n\n Этот пример иллюстрирует принцип электрохимической полировки. Два электрода и промежуточный электролитный область составляют упрощенную геометрию 2D-модели. Положительный электрод имеет выступ, который представляет собой дефект поверхности. В примере рассматривается, как этот выступ и окружающий материал электрода истощаются в течение определенного периода времени. Деформированный интерфейс геометрии объясняет изменения в геометрии поверхности электрода.
modeldescr_mph/electronic_conductor = Электронный проводник\n\nВ этом примере изучаются связанные тепловые и электрические явления. Смоделированное устройство проводит постоянный ток. Омические потери из-за ограниченной проводимости устройства выделяют тепло, которое повышает температуру проводника и, таким образом, также изменяет проводимость материала.
modeldescr_mph/falling_sand = Терминальная скорость падения песчаного зерна \n\nA сферическая песчинка падает в резервуар для воды. Высвобожденное от стояния зерно ускоряется и достигает конечной скорости. Этот пример имитирует течение жидкости в движущейся системе координат, связанной с ODE, которая описывает баланс силы на зерне.
modeldescr_mph/feeder_clamp = Деформация Feeder Clamp\n\n Этот пример вычисляет статическую деформацию зажима при нагрузке на фидер, закрепленный в зажиме. Фейдер зажат винтом М3.
modeldescr_mph/fluid_valve = Жидкость Valve\n\n Этот пример описывает клапан или затвор, где поток может быть направлен в один из двух каналов. В области, соответствующей штифту клапана, указывается очень большая вязкость, которая фактически останавливает поток в этой области. Вводится логическое выражение вязкости для имитации движения клапанного штифта.
modeldescr_mph/free_convection = Теплопередача Free Convection\n\n В этом примере описывается спаренный течение жидкости и теплопередача в жидкости. Массив нагревательных трубок погружается в текущую жидкость, которая поступает со дна.
modeldescr_mph/groundwater_flow = Groundwater Flow and Solute Transport\n\nЭто пример стационарного подземного течения жидкости и транзиторного растворенного транспорта по вертикальному сечению в неограниченном водоносном горизонте. Из-за глубокой геологической неоднородности модель должна оценивать растворенный транспорт, подверженный сильно нерегулярным условиям потока с сильной анизотропной дисперсией.
modeldescr_mph/heart_electrical = Электрические сигналы в сердце\n\nВ этом примере для описания используются две математические модели —, основанные на уравнениях ФитцХью–Нагумо и комплексных уравнениях Гинзбурга–Ландау, соответственно — различные аспекты распространения электрического сигнала в сердечной ткани.
modeldescr_mph/heat_convection_2d = Steady-State 2D теплопередача with Conduction\n\nЭто эталонная проблема для 2D стационарного термического анализа с конвекцией до 0°C на двух границах. Температурное поле по результатам анализа сравнивается с эталонным решением NAFEMS.
modeldescr_mph/heat_radiation_1d = Устойчивая теплопередача 1D с излучением \n\n Это контрольная задача для 1D стационарного термического анализа с фиксированной температурой 1000 К на левом конце и излучением до 300 К на правом конце. Температурное поле по результатам анализа сравнивается с эталонным решением NAFEMS.
modeldescr_mph/heat_transient_axi = Axisymmetric Transient теплопередача\n\nЭто базовая задача для аксисимметричного транзиторного термического анализа. Температура на границах изменяется от 0°C до 1000°C в начале моделирования. Температура на уровне 190 с сравнивается с эталонным решением NAFEMS.
modeldescr_mph/hydrogen_atom = Решение уравнения Шредингера для атома водорода\n\n Визуализируется квантово-механическая волновая функция. Решение симметрично относительно оси y, что всегда имеет место, когда магнитное квантовое число равно нулю.
modeldescr_mph/integro_partial = Integro-Partial Differential Equation\n\n Этот пример содержит анализ проводящего и радиационного теплопередачи в полой трубе, где концы удерживаются при двух разных температурах. Чтобы решить это интегрочастичное дифференциальное уравнение, в примере используется оператор назначения и оператор интеграционной связи.
modeldescr_mph/isospectral_drums = Isospectral Drums\n\nВычисляя один и тот же набор собственных значений для двух различных плоских мембранных форм, этот пример показывает, что вы не можете услышать форму барабана.
modeldescr_mph/kdv_equation = Уравнение KdV и Solitons\n\n Этот пример решает уравнение Korteweg–de Vries (KdV) с двухсолитонным решением в качестве начального значения. Солитоны распространяются с разной скоростью, и более быстрый солитон несколько раз сливается с более медленным солитоном и отделяется от него.
modeldescr_mph/laser_heating_wafer = Лазерный нагрев кремниевой пластины\n\nПластина нагревается лазером, который с течением времени движется радиально внутрь и наружу, в то время как сама пластина вращается на своей платформе. Моделируя падающий тепловой поток от лазера в качестве пространственно распределенного источника тепла на поверхности, получается транзиторная тепловая реакция пластины. Вычисляются пиковые, средние и минимальные температуры во время процесса нагрева, а также колебания температуры по всей пластине.
modeldescr_mph/loaded_spring = Loaded Spring — Использование глобальных уравнений для удовлетворения ограничений\n\nВ этом учебном примере, демонстрирующем более общий метод, модель механики конструкций пружины дополняется глобальным уравнением, которое определяет нагрузку, необходимую для достижения желаемого общего растяжения пружины.
modeldescr_mph/lorenz_attractor = Лоренц Аттрактор\n\n Аттрактор Лоренца — это аттрактор, который описывается системой обычных дифференциальных уравнений: системой Лоренца. В начале 1960-х Лоренц открыл хаотическое поведение этой системы для определённых значений параметров и начальных условий. Решение, когда оно построено как фазовое пространство, напоминает цифру восемь.\n\n В этом примере используется явный метод Dormand–Prince для решения ODE и графика точечных траекторий для визуализации аттрактора Лоренца.
modeldescr_mph/lshaped_membrane_parametric = L-Shaped Membrane with Rounded Corner\n\n Этот пример выполняет параметрическое исследование собственного режима L-образной мембраны с различным радиусом филе в закругленном углу.
modeldescr_mph/magnet_brake = Магнитный тормоз\n\nВ этом примере токи индуцируются при вращении металлического диска в воздушном зазоре магнита. Силы на линиях тока замедляют диск. COMSOL Multiphysics моделирует индуцированные токи на каждом временном шаге и вычисляет временную эволюцию угловой скорости.
modeldescr_mph/magnetic_drug_targeting = Магнитное нацеливание на лекарства\n\nВ этом примере представлена ​​простая установка для исследования внешнего магнитного поля и его взаимодействия с потоком крови с веществом-магнитным носителем. Уравнения и теория основаны на уравнениях Максвелла и уравнениях Навье–Стокса. Феррогидродинамика крови изучается для оценки химиотерапии.
modeldescr_mph/marangoni_convection = Marangoni Convection\n\nA модель конвекции Марангони в полости, заполненной силиконовым маслом. Жидкость ускоряется, когда градиент температуры высок. Проводимость тепла невелика по сравнению с конвекцией.
modeldescr_mph/mast_diagonal_mounting = Stiffness Analysis of a Communication Mast's Diagonal Mounting\n\nThis example analyzes the stiffness of a communication mast's mounting и сравнивает результаты с идеальным случаем. На примере показано, как использовать параметризованные геометрии в параметрических промахах.
modeldescr_mph/mast_diagonal_mounting_mphbin = Diagonal Mounting Detail of the Communication Mast\n\n Жесткость крепления анализируется и сравнивается с идеальным случаем. Сборка САПР обновляется на основе результатов. Далее следует анализ обновленной геометрии. Пример демонстрирует импорт сборок САПР и использование интерактивных инструментов сетки.\n\n для импорта файлов CAD требуется модуль импорта CAD. Кроме того, для живого обновления модели геометрии САПР требуются SOLIDWORKS.
modeldescr_mph/mast_diagonal_mounting_parasolid = Diagonal Mounting Detail of the Communication Mast\n\n Жесткость крепления анализируется и сравнивается с идеальным случаем. Сборка САПР обновляется на основе результатов. Далее следует анализ обновленной геометрии. Пример демонстрирует импорт сборок САПР и использование интерактивных инструментов сетки.\n\n для импорта файлов CAD требуется модуль импорта CAD. Кроме того, для живого обновления модели геометрии САПР требуются SOLIDWORKS.
modeldescr_mph/mast_diagonal_mounting_sensitivity = Анализ чувствительности коммуникационной мачты Detail\n\nSensitivity используется для прогнозирования влияния изменения некоторых геометрических параметров коммуникационной мачты на ее общую жесткость. С этой целью оригинальная модель механики конструкций дополнена интерфейсом деформированной геометрии и интерфейсом анализа чувствительности.
modeldescr_mph/mast_diagonal_mounting_swlive = Diagonal Mounting Detail of the Communication Mast\n\n Жесткость крепления анализируется и сравнивается с идеальным случаем. Сборка САПР обновляется на основе результатов. Далее следует анализ обновленной геометрии. Пример демонстрирует импорт сборок САПР и использование интерактивных инструментов сетки.\n\n для импорта файлов CAD требуется модуль импорта CAD. Кроме того, для живого обновления модели геометрии САПР требуются SOLIDWORKS.
modeldescr_mph/mems_joule_heating = Joule Heating in a MEMS Device\n\nЭта модель иллюстрирует использование Материальной библиотеки при моделировании нагрева Джоуля в устройствах MEMS. Целью анализа является оценка температуры проводника при приложенной разности электрических потенциалов. Как тепловая, так и электрическая проводимость зависят от температуры. Влияние температуры на электропроводность приводит к нелинейной кривой для тока как функции потенциала.\n\n Вам нужна библиотека материалов для создания этой модели.
modeldescr_mph/micromixer = Micromixer\n\nЭтот пример имитирует ламинарный статический смеситель с двумя параллельными каскадами элементов смешивания сплит-реформ-рекомбината. Каждый смешивающий элемент удваивает количество слоев жидкости, что приводит к быстрому процессу смешивания.
modeldescr_mph/micromixer_batch = [Micromixer — Пакетные и кластерные версии]Micromixer — Пакетная версия\n\nЭта версия модели Micromixer демонстрирует, как использовать пакетные функции в COMSOL Multiphysics, и показывает, как измерить ускорение.
modeldescr_mph/micromixer_cluster = [Micromixer — Batch and Cluster Versions]Micromixer — Cluster Version\n\nЭта версия модели Micromixer демонстрирует, как использовать функциональность кластерных расчётов в COMSOL Multiphysics и показывает, как измерить ускорение.\n\n Эта модель требует лицензии плавающей сети.
modeldescr_mph/microrobot = Моделирование Microrobot\n\n Пример показывает изгиб ноги в кремниевом микророботе. Три полиимидных V-грубовых соединения имеют высокий коэффициент теплового расширения, что заставляет ногу изгибаться при нагревании полиимида.
modeldescr_mph/minimal_surface = Минимальная поверхностная проблема\n\nИспользуйте тестовый оператор, чтобы сформулировать уравнение Эйлера–Лагранжа для задачи минимальной поверхности, которая связана с определением формы мыльной пленки с заданной границей.
modeldescr_mph/mos_transistor = Транзистор MOS Transistor Model\n\nМОС транзистор является наиболее распространенным типом устройства в интегральной схеме. Этот пример вычисляет электрические характеристики транзистора и представляет ток на дренажной диаграмме.
modeldescr_mph/pacemaker_electrode = Pacemaker Electrode\n\nЭтот пример показывает, как ток распределяется вокруг электрода кардиостимулятора внутри человеческого сердца.
modeldescr_mph/photonic_crystal_waveguide = Оптимизация направленного излучения от фотонного кристаллического волновода\n\n Этот пример объединяет интерфейсы уравнения Гельмгольца и оптимизации для максимизации направленного излучения от фотонного кристаллического волновода по широкой полосе пропускания путем поиска оптимального распределения диэлектрического материала в обозначенной области.
modeldescr_mph/pid_control = Процессный контроль Используя PID Controller\n\nЭтот пример иллюстрирует, как реализовать алгоритм управления PID (пропорционально-интегрально-производный) для моделирования системы управления процессом и поиска оптимальных параметров PID.
modeldescr_mph/point_source = Внедрение Point Source\n\n Решение уравнения Пуассона на единичном диске с точечным источником у начала. Плотность сетки очень близка к происхождению, чтобы разрешить сингулярность в точечном источнике. Решение сравнивают с аналитическим решением.
modeldescr_mph/poisson_unit_disk = Уравнение Пуассона на единице Disk\n\nСравнение мультифизического решения COMSOL с точным решением показывает, что погрешность равна нулю, кроме как на границе с использованием элементов второго порядка. График показывает решение с помощью графика высоты. Цвет показывает локальную ошибку в решении COMSOL Multiphysics.
modeldescr_mph/potential_between_cylinders = Электростатический потенциал между двумя цилиндрами \n\nЭта 3D-модель вычисляет потенциальное поле в вакууме вокруг двух цилиндров, один с потенциалом +1 В, а другой с потенциалом -1 В.
modeldescr_mph/quadrupole = Квадрупольная линза\n\nПодобно тому, как оптические линзы фокусируют свет, электрические и магнитные линзы могут использоваться для фокусировки пучков заряженных частиц. Эта модель COMSOL Multiphysics показывает путь ионов B5+, проходящих через фокусирующую систему из трех магнитных квадруполей.
modeldescr_mph/reactive_muffler = Reactive Muffler\n\nВ этом примере рассматриваются свойства передачи звука идеализированного реактивного глушителя. Аксисимметричное решение COMSOL Multiphysics сравнивается с теоретическим решением 1D.
modeldescr_mph/resistive_heating = Резистивный нагрев медной пластины\n\nA ток проходит через металлическую пластину, производящую тепло. Электропроводность, в свою очередь, зависит от температуры. Переходный анализ сопряженной теплоэлектрической модели показывает, как температура повышается и достигает устойчивого состояния.
modeldescr_mph/rock_fracture_flow = Rock Fracture Flow\n\n Поток на трещине породы моделируется как в 2D, так и в 3D. В примере используются данные синтетически генерируемой диафрагмы перелома (ширины) и функция интерполяции. Предполагается, что трансмиссивность перелома пропорциональна кубу апертуры.
modeldescr_mph/semiconductor_diode = Полупроводник Diode\n\nA модель полупроводникового устройства с диодом с областями p- и n-типа. На изображении показана концентрация отверстия для смещения вперед 0,5 В.
modeldescr_mph/shaft_submodeling = Анализ субмоделирования может использоваться, когда невозможно решить все детали сложной геометрии в глобальной модели. Приблизительное решение вычисляется с использованием глобальной модели, и результаты этого анализа используются в качестве граничных условий для подробной подмодели.\n\n В этом примере этот метод применяется для выполнения точной оценки напряжения в задаче механики конструкций.
modeldescr_mph/shaft_submodeling_plasticity = Подмоделирование с помощью Plasticity\n\n В этой учебной модели показано, как включить локализованную нелинейность в подмодель.\n\nВ этом случае первоначальный эластичный анализ показывает, что небольшая область структуры имеет напряжения выше предела доходности. для улучшения результатов модель эластопластического материала добавляется в подмодель.\n\n Глобальная модель в данном случае анализируется с использованием линейной эластичности, но это не является необходимым предположением.
modeldescr_mph/shallow_water_equations = Уравнения мелкой воды\n\nЭта одномерная модель использует уравнения мелкой воды для исследования оседания волны на переменном дне в зависимости от времени. Первоначальная волна и форма слоя представлены математическими соотношениями, поэтому такие параметры, как амплитуда волны или форма слоя, можно легко изменить.
modeldescr_mph/shell_diffusion = Диффузия оболочки в Tank\n\nЭта 3D-модель показывает, как вычислить плотность тока в корпусе танка и потенциальное распределение на поверхности.
modeldescr_mph/shock_tube = Шоковая модель Tube\n\nA из газовой динамики: сжимаемый поток Euler 1D в ударной трубе. Ось y соответствует времени. Изображение показывает удар, движущийся вправо, контактную поверхность, движущуюся медленнее вправо, и, наконец, вентилятор расширения, удаляющийся влево в более плотный, ненарушенный газ. Используется адаптивная сетка.
modeldescr_mph/skin_effect = Эффект кожи Wire\n\n Эффект кожи для тока переменного тока в круговой проволоке. Чистый медный провод сравнивают с более дешевым и легким, сделанным из 90% алюминия.\n Частота линии составляет 50 Гц. Эффект кожи увеличивается с частотой.
modeldescr_mph/sloshing_tank = Sloshing Tank\n\nЭтот пример слошинга в раскачивающемся резервуаре демонстрирует способность COMSOL Multiphysics имитировать динамический свободный поверхностный поток с помощью движущейся сетки.
modeldescr_mph/spherical_capacitor = Сферический конденсатор \n\nA со стеклянными конденсаторами в меди моделируется с электрическим скалярным потенциалом. Ёмкость можно вычислить и сравнить с аналитическим выражением.
modeldescr_mph/spherically_symmetric_transport = Сферически-симметричный транспорт\n\nЭтот пример временного нагрева гранулы магнетитовой руды показывает общий подход к моделированию сферически симметричного транспорта с использованием 1D-геометрии.
modeldescr_mph/spice_parameter_extraction_diode = SPICE Parameter Extraction for a Semiconductor Diode\n\nИз IV-характеристики модели Semiconductor Diode можно извлечь параметры модели для модели SPICE диода. В этом примере используется интерфейс оптимизации и система глобальных уравнений, представляющих эквивалентную схему для диода. Обратная проблема включает в себя шесть неизвестных параметров, которые сопоставляются в смысле наименьшего квадрата.\n\n Требуется модуль оптимизации и доступ к функции SPICE Import.
modeldescr_mph/stresses_in_pulley = Напряжения в Pulley\n\n Этот пример описывает приводной шкив, подключенный к двигателю, который управляет другим шкивом. Пример показывает, как настроить пограничную нагрузку с помощью системы координат границы. Используя параметрическое исследование, результаты включают максимальное напряжение в зависимости от скорости вращения.
modeldescr_mph/tapered_cantilever = Tapered Cantilever with Two Load Cases\n\nНа этом примере показана 2D-модель напряжения плоскости тонкого конического конуса. Рассматриваются различные граничные и нагрузочные сценарии. Показано, как применять и как оценивать различные группы нагрузки и ограничения. Результирующие напряжения сравниваются с эталонными значениями NAFEMS.
modeldescr_mph/telegraph_equation = Телеграфное уравнение\n\n Уравнение телеграфа описывает тепловой или массовый транспорт, вводя термин, который учитывает эффекты конечной скорости. Он моделирует смеси между диффузией и распространением волн, которые не могут быть полностью описаны только диффузией.
modeldescr_mph/thermal_actuator_jh = В этом руководстве Joule Heating of a Microactuator\n\n используется интерфейс Joule Heating для имитации нагрева двухрукого привода, вызванного электрическим напряжением, приложенным к устройству.
modeldescr_mph/thermal_actuator_jh_distributed = Joule Heating of a Microactuator — Distributed Parameter Version\n\nЭта версия модели Joule Heating of a Microactuator демонстрирует, как воспользоваться функциональностью распределенных параметров в COMSOL Multiphysics и показывает, как измерить ускорение.\n\n для этого требуется лицензия на плавающую сеть.
modeldescr_mph/thermal_actuator_simplified = Thermal Microactuator Simplified\n\nЭто руководство иллюстрирует, как моделировать электротермическое приведение в действие микроустройства. Он использует интерфейс Joule Heating для имитации нагрева привода, вызванного электрическим напряжением, приложенным к устройству. Тепловое расширение добавляется вручную, используя вид уравнения. Этот пример использует операцию программирования в последовательности геометрии для рассмотрения различных случаев геометрии.
modeldescr_mph/thermal_actuator_surrogate = [Thermal Actuator Surrogate Model Application]Thermal Actuator Surrogate Model\n\nЭто руководство иллюстрирует, как моделировать электротермическое приведение в действие микроустройства. Он использует интерфейс Joule Heating для имитации нагрева привода, вызванного электрическим напряжением, приложенным к устройству. Тепловое расширение добавляется вручную, используя вид уравнения. Этот пример использует операцию программирования в последовательности геометрии для рассмотрения различных случаев геометрии.
modeldescr_mph/thermal_controller_rom = Терморегулятор, модель пониженного порядка\n\nБольшие модели FEM могут быть дорогостоящими, и если необходимы повторные симуляции, может быть полезно использовать модели пониженного порядка (ROM). ПЗУ обычно действительны только вблизи расчетных условий и имеют меньшую точность, но время моделирования значительно короче. Целью редукции модели является обеспечение достаточно точного представления динамики ввода-вывода нередуцированной модели в заданном диапазоне параметров с минимальными общими вычислительными затратами, включая стоимость создания приведенной модели. Динамическая система состоит из металлического блока, который обменивается теплом с внешней средой. Внутри находится ТЭН и термостат. Система работает очень просто: термостат включает и выключает обогреватель, когда его температура слишком низкая или слишком высокая.В этой учебной модели показано, как создать модель пониженного порядка с помощью исследования «Сокращение модели» и как полученную уменьшенную модель можно использовать для исследования различных стратегий управления терморегулированием. Чтобы проиллюстрировать точность сокращенной модели, также включено сравнение с результатами модели FEM.
modeldescr_mph/thermal_controller_simulink = Термический контроллер, Simulink Simulation\n\n Динамическая система состоит из металлического блока, который обменивается теплом снаружи. Внутри находится нагреватель и переключатель термостата. Система работает очень просто: Термостат включает и выключает нагреватель, когда его температура слишком низкая или слишком высокая. Это делается в Simulink; см. thermal controller mdl.mdl.\n\nTo export to Simulink, select Export, Simulink Model on the File menu. Нажмите OK. Откройте модель Simulink, набрав в MATLAB thermal controller mdl.
modeldescr_mph/thin_film_resistance = Thin-Film Resistance\n\n Этот пример иллюстрирует технику приближения тонкого слоя с поверхностью в задачах диффузионного типа, что приводит к значительной экономии в использовании памяти. В этом примере изучается влияние тонкого слоя с относительно низкой проводимостью на потенциальное распределение в структуре. Результаты показывают, что приближение тонкого слоя может быть справедливым даже для слоя толщиной до 10 процентов от общей высоты структуры.
modeldescr_mph/thin_layer_diffusion = Thin-Layer Diffusion\n\nЭта обучающая модель диффузии демонстрирует, как связать вместе две геометрии в геометрии сборки 3D. Условие пары непрерывности гарантирует, что концентрация одинакова по всему интерфейсу между двумя геометриями.
modeldescr_mph/transport_and_adsorption = Транспорт и адсорбция\n\nНа этом примере показана диффузия поверхности и поверхностные реакции, связанные с переносом видов на реагирующую поверхность. В реакциях адсорбции необходимо моделировать поверхностные концентрации активных участков или поверхностного комплекса, а также объёмную концентрацию в газовой фазе. Это устройство может быть катализатором, биочипом, полупроводниковым компонентом или любым процессом со специфическими для поверхности видами.
modeldescr_mph/transport_problem = Транспортная проблема\n\n Этот пример решает транспортную проблему с чистым стационарным транспортом. Это приводит к прерывному решению. В примере используется перемотка для стабилизации раствора при разрыве.
modeldescr_mph/traveling_load = Beam with a Traveling Load\n\n Этот пример показывает, как моделировать нагрузку, которая варьируется в пространстве и времени. Серия импульсов нагрузки проходит вдоль луча, который поддерживается на равных расстояниях.\n\n для некоторых комбинаций скорости перемещения импульсов нагрузки и расстояния между ними можно возбуждать резонансы в луче. Исследованы эффекты четырех различных комбинаций этих параметров.
modeldescr_mph/tubular_reactor = Трубчатый реактор с неизотермическим охлаждением Jacket\n\nЭтот пример описывает трубчатый реактор, где оксид пропилена (A) реагирует с водой (B) с образованием пропиленгликоля (C): \n\nA + B -> C\n\nПоскольку вода является растворителем и присутствует в изобилии, кинетика реакции может быть описана как первый заказ по отношению к оксиду пропилена \n9000000000007R = k*C A9000000000008\n Альтернативно реакция второго порядка также может быть реализована по адресу\n\nR = kf*C A*C B - kr*C C\n\n Реакция экзотермическая, и для охлаждения реактора используется охлаждающая куртка. Реактор моделируется в 2D-аксисимметрии, и результаты моделирования дают изменения состава и температуры как в радиальном, так и в осевом направлениях.
modeldescr_mph/tubular_reactor_embedded = Тубулярный реактор: Jacket\n\n Этот пример описывает трубчатый реактор, где оксид пропилена (A) реагирует с водой (B) с образованием пропиленгликоля (C): \n\nA + B -> C\n\nПоскольку вода является растворителем и присутствует в изобилии, кинетика реакции может быть описана как первый порядок в отношении оксида пропилена \n9000000000007R = k*C A9000000000008\n Альтернативно реакция второго порядка также может быть реализована по адресу\n\nR = kf*C A*C B - kr*C C\n\n Реакция экзотермическая, и для охлаждения реактора используется охлаждающая куртка. Реактор моделируется в 2D-аксисимметрии, и результаты моделирования дают изменения состава и температуры как в радиальном, так и в осевом направлениях.
modeldescr_mph/tubular_reactor_jacket = Tubular Reactor with Isothermal Cooling Jacket\n\nЭтот пример касается экзотермической химии 2-го порядка, происходящей в трубчатом реакторе. Реактор моделируется в 2D-аксисимметрии, что позволяет изучать состав и колебания температуры как в радиальном, так и в осевом направлениях. Настоящая модель относится к неизотермическому реактору, включая неизотермическую охлаждающую куртку.
modeldescr_mph/tubular_reactor_surrogate = [Приложение суррогатной модели трубчатого реактора] Суррогатная модель трубчатого реактора\n\n Этот пример демонстрирует, как увеличить вычислительную скорость приложения трубчатого реактора с помощью суррогатной модели, в отличие от модели с конечным элементом. Суррогатная модель является более простой, обычно вычислительно более дешевой моделью, которая используется для приближения поведения более сложной и часто более вычислительно дорогой модели. Более быстрая оценка модели, предлагаемая суррогатной моделью, обеспечивает пользователю приложения более интерактивный пользовательский опыт и облегчает распространение использования симуляций в организации.
modeldescr_mph/tuning_fork = Тюнинг Fork\n\n Этот пример вычисляет фундаментальную собственную частоту и собственный режим для камертона. При правильной конструкции вилка тюнинга вибрирует на частоте 440 Гц, известной как стандартный концертный шаг.
modeldescr_mph/two_term_boltzmann = Двухвременное уравнение Больцмана \n\n Этот пример решает уравнение Больцмана для кислородной плазмы. Решение дает функцию распределения энергии электронов (EEDF), которая затем позволяет самосогласованный расчет коэффициентов скорости неупругого столкновения и свойств переноса электронов. Уравнение нелокально в энергетическом пространстве и, следовательно, требует взаимодействия переменных.
modeldescr_mph/vacuum_drying = Вакуумная сушка\n\nВакуумная сушка - это химический процесс, часто используемый в фармацевтической и пищевой промышленности для удаления воды или органического растворителя из мокрого порошка. При проектировании системы вакуумной сушки инженеры стремятся минимизировать время сушки при сохранении высокого качества продукта. Эта модель исследует вакуумную сушку в сушилке фильтра Nutsche, которая состоит из цилиндрического барабана, заполненного влажным тортом. Верхняя часть торта подвергается воздействию пространства головы низкого давления, а боковые и нижние стены подвергаются воздействию нагревательной жидкости. Работая при очень низком давлении и повышенной температуре, скорость испарения жидкости увеличивается, тем самым ускоряя процесс сушки порошка. Путем моделирования теплопередачи и испарения растворителя в порошке можно изучить профили температуры и жидкой фазы. Этот пример основан на статье, опубликованной Мурру и другими для порошка, высушенного с n-пропанолом в статических условиях.
modeldescr_mph/wrench = Напряжения и напряжения в Wrench\n\n Этот пример комбинированного гаечного ключа и болта демонстрирует, как настроить простой статический расчёт механики конструкций.

# Geometry Tutorials
modeldescr_mph/busbar_assembly_geometry = [шина Assembly Geometry Tutorial Series]шина Assembly Geometry — with Geometry Parts\n\nGeometry parts предоставляет способ организации, параметризации и повторного использования геометрий, которые вы создаете в COMSOL Multiphysics. Следуйте этому учебнику, чтобы создать версию параметризованной геометрии для анализа резистивного нагрева шинной панели, узнавая больше о том, как создавать геометрические части с входными и локальными параметрами, как вставлять геометрические части в последовательность геометрии и как позиционировать геометрические части с использованием систем координат, определенных рабочими плоскостями.\n\n Настройка физики описана в модели электрического нагрева в сборке шины, найденной в библиотеках приложений для COMSOL Multiphysics, внутри папки Multiphysics.
modeldescr_mph/busbar_assembly_groups_geometry = [шина Assembly Geometry Tutorial Series]шина Assembly Geometry — с группой Nodes\n\nГрупповые узлы в дереве моделей могут помочь с организацией моделей путем группировки узлов функций, которые принадлежат вместе. Следуйте этому учебнику, чтобы создать версию параметризированной геометрии для анализа резистивного нагрева шинной панели, изучая, как собирать узлы геометрических признаков в группы, как создавать рабочие плоскости с помощью локальных систем координат, определенных пользователем, и как позиционировать объекты геометрии различными способами.\n\n Настройка физики описана в модели электрического нагрева в сборке шины, найденной в библиотеках приложений для COMSOL Multiphysics, внутри папки Multiphysics.
modeldescr_mph/light_bulb_geometry = Light Bulb Geometry\n\nЭто руководство представляет рабочий процесс, типичный для создания геометрии для моделирования с использованием режима Sketch для рисования сложных форм. Следуйте пошаговым инструкциям, чтобы нарисовать геометрию для анализа лампочки. Физическая установка описана в модели Free Convection in a Light Bulb, найденной в библиотеках приложений для модуля теплопередачи.
modeldescr_mph/steam_reformer_geometry = Геометрия парового риформера\n\nВ этом учебном примере вы узнаете, как использовать выборки при создании параметрической геометрии для анализа парового риформинга, а также настраивать выборки, необходимые для физических определений. Мультифизический анализ установки парового риформинга описан в модели парового риформинга, которую можно найти в библиотеках приложений модуля «Инженерия химических реакций».

# Meshing Tutorials
modeldescr_mph/bracket_swept_mesh = Swept Сеткаing of a Bracket Geometry\n\nThis tutorial shows how to partition a 3D part to create a swept сетка. В примере исследуются различные стратегии для разделения геометрии и показано, как комбинировать сметенные и свободные сетки.
modeldescr_mph/meshing_sequence = Используя Сеткаing Sequences\n\nЭто руководство демонстрирует, как использовать последовательность сетки для создания сетки, состоящей из различных типов элементов. Вы узнаете, как добавлять, перемещать, отключать и удалять операции сетки, а также как управлять сеткой, используя функции размера в последовательности сетки.
modeldescr_mph/piston_mesh = Корректировка размера элемента для неструктурированного ячеистого генератора\n\nЭто учебная модель, которая демонстрирует, как использовать параметры ячеек, такие как <ul><li>минимальный размер элемента, </li><li>разрешение кривизны, </li><li>резолюция узких регионов и </li><li>максимальный темп роста элемента.</li></ul> Инструкции также подробно описывают, как получить доступ к статистике сетки и как создать график сетки.
modeldescr_mph/stl_vertebra_import = [STL Import Tutorial Series]STL Import 1 — Генерация геометрии из импортируемой сетки Сетка\n\nЭто руководство демонстрирует, как импортировать и создавать геометрию из поверхностной сетки, сохраненной в формате STL. Инструкции подробно описывают, как удалить изолированные грани из импортной сетки STL, как использовать параметры импорта геометрии и как создавать объёмы для моделирования как внутри, так и снаружи импортируемого геометрического объекта.
modeldescr_mph/stl_vertebra_mesh_import = [Серия руководств по импорту STL]STL Import 2 — Изменение сетки импортированной сетки\n\nВ этом учебном примере показано, как объединить две импортированные сетки поверхности и создать сетку моделирования без создания геометрии из сетки. В инструкциях подробно описано, как исправить дыры в импортированной STL-сетке позвонка, как импортировать другую сетку для моделирования как внутри, так и снаружи импортированного позвонка, как пересекать и соединять сетки, повторно создавать сетку поверхности, создавать домены и генерировать тетраэдрическую сетку для моделирования.
modeldescr_mph/wheel_rim = Виртуальные операции на колесном диске Geometry\n\nЭто руководство показывает, как выполнять операции виртуальной геометрии на импортированной геометрии САПР. Эти виртуальные операции, такие как формирование составных объектов или игнорирование объектов, могут помочь улучшить сетку и уменьшить общее число элементов.
modeldescr_mph/valve_boundary_layers = [Серия учебников по сетке пограничного уровня] Сетка пограничного уровня — Изучите Settings\n\nFollow это руководство, чтобы узнать, как настроить сетку граничного слоя и изменить настройки для автоматически созданной сетки граничного слоя. для контролируемой физикой сетки сетка граничного слоя автоматически добавляется для приложений, где резкие градиенты ожидаются близко к границам. Вы узнаете, как контролировать количество слоев, как определить толщину слоя и как создать сетку граничного слоя с различными свойствами для разных границ. Учебник также демонстрирует доступные методы добавления граничных слоев вокруг углов и настройку сетчатых участков для оценки качества элементов.
modeldescr_mph/valve_boundary_layers_import = [Серия учебных пособий по сетке пограничного уровня] Сетка пограничного уровня — Добавление граничных слоев в импортированную сетку Сетка\n\nЭто руководство демонстрирует, как добавить сетку граничного слоя в импортированную сетку. Вы узнаете, как усовершенствовать импортную сетку, как вставить сетку граничного слоя, как контролировать скорость роста элемента от границы до интерьера и как настроить распределение и толщину граничных слоев.

# Mesh Import and Export Guide Models
modeldescr_mph/busbar_box_fully_coupled_compare = [COMSOL Multiphysics Сетка Import and Export Guide] Электрический нагрев в шине с течением жидкости, Сравнение результатов\n\n Этот пример представляет собой модифицированную версию учебника «Электрический нагрев в шине». Данные о температуре в вычислительном объёме течения жидкости с моделированием теплопередачи экспортируются для использования в другой модели для сравнения вычисленных и импортированных данных.
modeldescr_mph/busbar_box_fully_coupled_export_from_normal_mesh = [COMSOL Multiphysics Сетка Import and Export Guide] Электрический нагрев в шине с жидким потоком, экспорт результатов\n\n Этот пример представляет собой модифицированную версию учебника «Электрический нагрев в шине». Данные о температуре в вычислительном объёме течения жидкости с имитацией теплопередачи импортируются. Данные вычисляются на более грубой сетке, чем текущая симуляция. Сравниваются температурное поле текущего моделирования, использующее более тонкую сетку, и импортные температурные данные, ранее моделируемые на сетке с размером по умолчанию.
modeldescr_mph/busbar_with_selections = [COMSOL Multiphysics Сетка Import and Export Guide] Электрический нагрев на шине с Selections\n\n Этот пример представляет собой модифицированную версию учебника «Электрический нагрев в шине». Данные сетки с выборками экспортируются из этой модели.
modeldescr_mph/mesh_example_intro = [Руководство по импорту и экспорту сетки COMSOL Multiphysics]Вводный пример импорта сетки\n\nВ этом примере сетка импортируется из файла. Сетка уточняется один раз и наносятся на график различные геометрические объекты.
modeldescr_mph/non_newtonian_flow_compare_surface = [COMSOL Multiphysics Сетка Import and Export Guide]Non-Newtonian Flow in a Valve, Comparing Results\n\n Этот пример имитирует поле скорости неньютоновской жидкости на сетке более мелкого размера. Поле скорости на поверхностях сравнивается с импортированными данными скорости из моделирования с использованием сетки нормального размера.
modeldescr_mph/non_newtonian_flow_export_from_normal_mesh_surface = [COMSOL Multiphysics Сетка Import and Export Guide]Non-Newtonian Flow in a Valve, Exporting Results\n\n Этот пример имитирует поле скорости неньютоновской жидкости на сетке нормального размера. Поле скорости на поверхностях экспортируется в файл для импорта и сравнения в другой модели.

# AC/DC Module apps
applicationdescr_acdc/bh_curve_checker = B-H Curve Checker\n\nЭто приложение демонстрирует следующее:\n\n• Импорт измеренных данных из текстового файла\n• Обработка измеренных данных методами\n• Экспорт результатов в текстовый файл.\n\n Приложение может использоваться для проверки и оптимизации кривых B-H с использованием экспериментальных данных. Он также генерирует данные кривой в области перелива, где измерение трудно выполнить. Он устраняет нефизические колебания наклона кривой B-H, которые могут вызвать числовую нестабильность.\n\n Первоначальная кривая B-H оценивается с двух сторон. Сначала проверить, что экстраполяция кривой разумна с физической точки зрения. Во-вторых, проверить, является ли наклон кривой плавным. Алгоритмы оптимизации в основном основаны на методе одновременной экспоненциальной экстраполяции и методе линейной интерполяции, соответственно.\n\n Приложение требует исходных данных кривой, определенных в текстовом файле ввода. Как только кривая импортируется, приложение проверяет, требуется ли оптимизация. Нажав кнопку 'Optimize Curve', пользователь может генерировать оптимизированные данные кривой, которые могут быть экспортированы в текстовый файл.
applicationdescr_acdc/billet_induction_heating = Induction Heating of a Steel Billet\n\nЭто приложение демонстрирует следующее:\n\n• Геометрические детали и параметризированные геометрии\n• Использование таблиц для параметров пользовательского ввода\n• Визуализация на 2D-сечении 3D-геометрии\n• Улучшенная визуализация и пользовательский опыт, когда объект геометрии (воздушный объект) скрыт.\n\nИндукционное нагрев - это метод, используемый для нагрева металлов для ковки и других применений. По сравнению с более традиционными методами отопления, такими как газовые или электрические печи, индукционное нагрев обеспечивает подачу тепловой энергии непосредственно на деталь более контролируемым способом и обеспечивает более быстрое время обработки. Приложение используется для проектирования простой системы индукционного нагрева стальной заготовки, состоящей из одной или нескольких электромагнитных катушек, через которые заготовка перемещается с постоянной скоростью. Катушки подпитываются переменным током и вызывают вихревые токи в металлической заготовке, генерируя тепло из-за нагрева Джоуля. Поперечное сечение заготовки; номер катушки, размещение и размер; а также начальная и окружающая температура и отдельные токи катушки могут быть указаны в качестве входов в приложении.
applicationdescr_acdc/effective_nonlinear_magnetic_curves = Эффективные нелинейные магнитные кривые Calculator\n\nЭто приложение демонстрирует следующее:\n\n• Импорт измеренных данных из текстового файла\n• Обработка измеренных данных методами\n• Экспорт результатов в текстовый файл\n• Экспорт результатов в виде файла Материальной библиотеки COMSOL.\n\n Приложение является дополнением к функциональности эффективных нелинейных конституционных отношений. Магнитные интерфейсы в модуле AC/DC поддерживают модель материала с эффективной кривой BH, которая может использоватьсяа для приближения поведения нелинейного магнитного материала в моделировании частотной области без дополнительной вычислительной стоимости полного переходного моделирования.\n\n Эффективная модель материала кривой BH требует эффективного отношения Beff(H), определяемого как интерполяционная функция. Это полезное приложение может использоваться для вычисления данных интерполяции, начиная с отношения B(H) материала.\n\n Данные интерполяции для отношения B(H) могут быть импортированы из текстового файла или введены в таблицу. Затем приложение вычисляет данные интерполяции для отношения Beff(H) с использованием двух различных энергетических методов. Полученные в результате эффективные свойства материала могут быть экспортированы в виде файла библиотеки материалов COMSOL и дополнительно использованы в модели с интерфейсом магнитных полей.
applicationdescr_acdc/magnetic_prospecting = Магниторазведка рудных месторождений\n\nМагниторазведка — метод геологоразведки, применимый к определенным типам месторождений железных руд, в частности сложенных магнетитом и гематитом. Метод заключается в измерении магнитных аномалий (изменений магнитного поля Земли), обусловленных наличием магнитных руд.\n\nПриложение Magnetic Prospecting имитирует влияние залежей магнитной руды на магнитное поле Земли и прогнозирует измеренные аномалии в заданных точках измерения на поверхности. Вы можете импортировать изображения карты высот или файлы цифровой модели рельефа (DEM), чтобы определить орографию региона, а также данные геомагнитного поля для указанного местоположения.\n\nВ результате расчётов генерируется график магнитного поля на поверхности Земли, а также числовые данные ожидаемой аномалии в определенных местах измерения в регионе.
applicationdescr_acdc/touchscreen_simulator = Touchscreen Simulator\n\nПредназначенный как инструмент для раннего доказательства концепции в разработке ёмкостных сенсорных устройств, приложение Touchscreen Simulator оценивает имитируемую матрицу ёмкости, а также норму электрического поля.\n\n Приложение вычисляет матрицу ёмкости сенсорного экрана в присутствии фантома пальца человека, где положение и ориентация пальца контролируются с помощью входных параметров. Это включает в себя размер ячейки электродного блока, расположение пальца, угол и уровень касания, толщину подложки и суперслоя и их свойства материала.

# AC/DC Module models
modeldescr_acdc/busbar_terminal = Электрический нагрев в автобусе с терминалами\n\n Этот пример демонстрирует использование текущего терминала для вычисления резистивного нагрева шины.
modeldescr_acdc/bh_curve_checker = B-H Curve Checker\n\nЭто приложение можно использовать для проверки и оптимизации кривой B-H, измеренной в ходе экспериментов. Приложение может генерировать данные кривой в перегруженной области, где измерение затруднено. Он также может удалять нефизические рябь наклона кривой B-H, которые могут вызвать числовую нестабильность.
modeldescr_acdc/billet_induction_heating = Индукционное нагрев стального биллета\n\n Этот пример может использоваться для проектирования системы индуктивного нагрева стальных заготовок. Номер катушки, позиционирование, индивидуальные токи катушки и другие конструктивные параметры указаны как входы, в то время как окончательное распределение температуры на поперечном сечении и общая электрическая мощность, подаваемая на катушку, вычисляются как выходы.
modeldescr_acdc/axisymmetric_approximation_of_inductor_3d = Аксисимметричное приближение 3D Inductor\n\n Индуктивные устройства испытывают ёмкостную связь между проводниками на высоких частотах. Моделирование этого явления требует описания электрических полей, которые имеют компоненты, параллельные и перпендикулярные проводу. Это рассмотрение может привести к выводу, что 3D-модель всегда необходима для моделирования явления, даже если катушка является спиралью, что на самом деле не так.\n\n Пример 3D-индуктора демонстрирует, как извлекать информацию, связанную с саморезонансом 3D-индуктора, с помощью аксисимметричного моделирования. для достижения правильной 2D аксисимметричной модели создается эффективное аксисимметричное ядро, и используется функция <em>RLC Coil Group</em>. Этот метод особенно подходит для изучения систем с тысячами оборотов, таких как датчики или трансформаторы, что снижает вычислительные затраты.
modeldescr_acdc/axial_magnetic_bearing = Осевой магнитный подшипник с использованием постоянных магнитов\n\nПодшипники с постоянными магнитами используются в турбомашинах, насосах, двигателях, генераторах и системах хранения энергии маховика, и это лишь некоторые области применения; бесконтактная работа, низкие эксплуатационные расходы и возможность работы без смазки — вот некоторые ключевые преимущества по сравнению с обычными механическими подшипниками. Этот пример иллюстрирует, как рассчитать параметры конструкции, такие как магнитные силы и жесткость, для осевого подшипника с постоянными магнитами.
modeldescr_acdc/amplifier_and_inductor_nocircuit = Индуктор в схеме усилителя\n\nЭтот пример является индуктивной частью модели схемы индуктора в схеме усилителя. Он используется в импорте SPICE при соединении цепи и индуктора.
modeldescr_acdc/bond_wires_to_chip = Соединение проводов с чипом\n\nСоединительные провода используются для подключения микросхемы интегральной схемы к контактам корпуса. Эти соединительные провода создают относительно большую индуктивность, которая может вызывать перекрестные помехи и искажать сигналы. В этом примере вычисляются сосредоточенные параметры в виде индуктивности и взаимной индуктивности между несколькими соединительными проводами.
modeldescr_acdc/capacitive_position_sensor = Моделирование ёмкостного датчика положения методом FEM\n\nВ этой учебной модели показано, как извлекать сосредоточенные матрицы с помощью исследования <em>Stationary Source Sweep</em>. Матрица ёмкостей пятитерминальной системы используется для определения положения металлического объекта, подобно реальным ёмкостным датчикам положения.\n\nПример иллюстрирует использование FEM, поддерживаемого интерфейсом <em>Electrostatics</em>. При использовании FEM необходима объёмная сетка части окружающего воздуха.\n\nМодель также сравнивает, как на производительность исследования влияет использование прямых и итерационных решателей.
modeldescr_acdc/capacitive_position_sensor_bem = Моделирование сенсора ёмкостной позиции с использованием BEM\n\nЭта учебная модель объясняет, как извлечь смешанные матрицы с помощью исследования <em>стационарный Source Sweep</em>. Матрица ёмкости пятиконечной системы используется для вывода положения металлического объекта, а не реальных ёмкостных датчиков положения.\n\n Пример иллюстрирует использование метода граничных элементов (BEM), который поддерживается интерфейсом <em>Electrostatics, граничные элементы</em>.
modeldescr_acdc/capacitor_ac = Частотное моделирование области Capacitor\n\n Этот пример вычисляет импеданс конденсатора с приложенной синусоидально изменяющейся разностью напряжения в широком диапазоне частот. Обсуждается взаимосвязь между импедансом частотной области и устойчивой ёмкостью и сопротивлением устройства и рассматривается точность решателя.
modeldescr_acdc/capacitor_dc = Расчёт ёмкости\n\nВ своей простейшей форме конденсатор представляет собой электрическое устройство с двумя выводами, которое накапливает электрическую энергию, когда на его клеммах прикладывается разность напряжений. Запасенная электрическая энергия пропорциональна квадрату приложенного напряжения и количественно определяется ёмкостью устройства. В этом примере представлена ​​модель простого конденсатора, вычисляющая электрическое поле и ёмкость устройства в электростатических условиях.
modeldescr_acdc/capacitor_transient = Временное моделирование конденсатора в схеме \n\n Этот пример решает переходную модель конденсатора в сочетании с внешней электрической цепью. Конечная элементная модель конденсатора сочетается с схемной моделью источника напряжения и резистора. Применяется пошаговое изменение напряжения, а переходный ток через конденсатор вычисляется и сравнивается с аналитическим результатом.
modeldescr_acdc/capacitor_tunable = Настраиваемый конденсатор MEMS Capacitor\n\nЭлектростатически настраиваемый конденсатор параллельных пластин в этом примере является типичным компонентом в различных устройствах MEMS для радиочастот, которые варьируются от 300 МГц до 300 ГГц. Вы можете изменить расстояние между двумя пластинами по мере изменения приложенного напряжения через пружину, прикрепленную к одной из пластин. Затем этап постобработки вычисляет ёмкость.\n\n В примере для этого моделирования используется интерфейс <em>Electrostatics, граничные элементы</em>, который основан на методе граничных элементов (BEM). Этот интерфейс отменяет необходимость определения конечной области моделирования и границы, а также сетки тонкого объёма конденсатора.
modeldescr_acdc/capacitor_fringing_fields = Расчёт влияния окаймляющих полей на ёмкость\n\nA Типичный конденсатор состоит из двух проводящих объектов с диэлектриком между ними. Применение разности напряжений приводит к электрическому полю, которое простирается на некоторое расстояние от пространства непосредственно между объектами, явление, называемое краевым полем. Чтобы точно предсказать ёмкость конденсатора, необходимо использовать область моделирования, достаточно большую, чтобы включить это окаймляющее поле и использовать соответствующие граничные условия. Этот пример конденсатора с параллельной пластиной изучает размер воздушной области и решает выбор граничного условия.
modeldescr_acdc/circuit_fem_resistor = Резистор FEM в Circuit\n\nЭта вводная модель иллюстрирует два разных способа подключения модели электрической цепи к моделированию конечных элементов. В этом случае конечная элементная часть представляет собой цилиндрический резистор в цепи. Модель FEM будет подключена к схеме либо с помощью двух внешних функций I-Terminal, либо с помощью функции внешнего I против U. Затем будут выделены различия между двумя подходами.
modeldescr_acdc/coil_above_plate = Вводные токи от Circular Coils\n\n Два Катушки переменного тока размещены над медной пластиной. Вычисляются вихревые токи вблизи края пластины и силы Лоренца на пластине.
modeldescr_acdc/coil_eddy_currents = Eddy Currents in a Cylinder\n\n Изучаются вихревые токи в проводящем цилиндре, генерируемые токами, проходящими через окружающую катушку. Также изучается скин-эффект в катушке.
modeldescr_acdc/coil_inductance = Индуктивность и сопротивление\n\nЭтот пример является простым примером того, как рассчитать сопротивление и индуктивность катушки в зависимости от частоты.
modeldescr_acdc/coil_infinite_elements = Катушка с Infinite Elements\n\nЭто простой пример того, как смоделировать катушку в свободном пространстве с бесконечными элементами. Он сравнивает результат с аналитическим решением задачи, а также сравнивает результаты с бесконечными элементами и без них.
modeldescr_acdc/coil_lem = Линейный электродвигатель движущейся катушки Type\n\nСимулирование полевых паттернов для линейного электродвигателя в режиме остановки, что демонстрирует этот пример, дает ценную информацию о возможностях ускорения.
modeldescr_acdc/cold_crucible = Cold Crucible\n\nЭто модель холодного тигля, используемого для изготовления сплавов, требующих высокой степени чистоты. Холодный тигель окружен индуктором, что заставляет тигель действовать как концентратор поля благодаря индуцированным токам.
modeldescr_acdc/contact_impedance_comparison = Contact Impedance Comparison\n\n Граничное условие контактного импеданса аппроксимирует тонкий слой материала, который препятствует потоку нормального тока к границе, но не вводит какой-либо дополнительный проводящий путь, касательной к границе. В этом примере сравнивается граничное условие контактного импеданса с моделью полной точности и рассматривается диапазон применимости этого граничного условия.
modeldescr_acdc/dielectric_shielding_comparison = Dielectric Shielding Comparison\n\nДоступно для электростатического моделирования поля, диэлектрическое защитное граничное условие, аппроксимирует тонкий слой материала с высокой относительной проницаемостью по сравнению с его окружением. В этом примере сравнивается диэлектрическое защитное граничное условие с моделью полной точности и рассматривается диапазон применимости этого граничного условия.
modeldescr_acdc/ecore_transformer = E-Core Transformer\n\n Этот пример демонстрирует, как выполнять переходное моделирование однофазного трансформатора E-core. Включая эффект нелинейной кривой B-H в ядре мягкого железа, пример вычисляет пространственное распределение магнитного и электрического полей, эффект магнитного насыщения, переходную реакцию и утечку потока в окружающую среду. Имитируются две разные версии трансформатора: первая с соотношением поворотов единства и вторая с соотношением поворотов 1000.
modeldescr_acdc/eddy_currents = Металлическая пластина Eddy Currents\n9000000000001A расположена вблизи проводника переменного тока 50 Гц. Полученное распределение вихревого тока в пластине зависит от проводимости и проницаемости пластины. Рассматриваются четыре различных материала: медь, алюминий, нержавеющая сталь и магнитное железо.
modeldescr_acdc/effective_nonlinear_magnetic_curves = Эффективные нелинейные магнитные кривые Calculator\n\nЭта полезная модель может импортировать данные интерполяции, которые определяют конститутивное отношение кривой HB или кривой BH для нелинейного магнитного материала и вычислять эффективные кривые HB и BH, которые могут использоваться в исследованиях частотной области с использованием эффективного конститутивного отношения кривой HB / BH. Кривые вычисляются с использованием двух различных энергетических методов и могут быть экспортированы в виде данных интерполяции или в виде файла библиотеки материалов COMSOL.
modeldescr_acdc/electric_field_concentric_cylinders = Электрическое поле между концентрическими цилиндрами\n\nЭта вводная модель рассматривает проблему электростатики двух концентрических цилиндров бесконечной длины, которая обычно встречается в учебниках. Поскольку задача может быть решена аналитически, модель может использоватьсяа для сравнения теории с результатами численного моделирования. Рассматриваются два случая: один с фиксированным потенциалом на каждом цилиндре, а другой с плотностью поверхностного заряда на одном цилиндре и фиксированным потенциалом на другом.
modeldescr_acdc/electric_motor_parameter_optimization = Оптимизация параметров электродвигателя\n\n Этот пример демонстрирует, как использовать оптимизацию параметров для определения оптимального положения и формы постоянных магнитов в электродвигателе. В качестве целевых функций используется крутящий момент, но различные конструкции встречаются в зависимости от секторной симметрии и количества слотов.
modeldescr_acdc/electric_shielding = Electric Shielding\n\nЭто руководство показывает, как моделировать изолированные высокопроводящие объекты с использованием интерфейса электрических токов.
modeldescr_acdc/electric_shielding_comparison = Electric Shield Comparison\n\n Условие границы электрического экранирования аппроксимирует тонкий слой высокопроводящего материала, который обеспечивает дополнительный ток, тангенциальный к границе. В этом примере сравнивается граничное условие электрического экранирования с моделью полной точности и рассматривается диапазон применимости этого граничного условия.
modeldescr_acdc/electrodynamic_bearing = Электродинамический подшипник \n\n Этот пример иллюстрирует принцип работы пассивного электродинамического подшипника. Электрически проводящий ротор, вращающийся в магнитном поле, создаваемом постоянными магнитами, вызывает вихревые токи на проводящем роторе. Вихревые токи, в свою очередь, создают магнитное поле, которое противостоит магнитным полям магнитами и вызывает силу, которая противостоит движению ротора. радиальное смещение ротора всегда уравновешивается сочетанием притягивающих и отталкивающих магнитных сил, таким образом, ротор вращается в центре с равномерным зазором. Магнитные силы вычисляются как функция радиального смещения.
modeldescr_acdc/electrodynamic_levitation_device = Электродинамическое устройство левитации\n\nЭта модель представляет собой решение задачи семинара по тестированию методов электромагнитного анализа (TEAM) 28, "An Electrodynamic Levitation Device". Это эталонная проблема, включающая динамическую связь электромагнетизма и динамики жесткого тела. Электродинамическая сила левитации создается индуцированными вихревыми токами, когда проводящий диск помещается над двумя концентрическими катушками, несущими изменяющиеся во времени токи в противоположных направлениях. Динамика левитирующего диска решена и сопоставлена с измеренными данными из литературы.
modeldescr_acdc/electron_beam_divergence = Дивергенция электронного луча в результате самопотенциала\n\n При моделировании распространения пучков заряженных частиц при высоких токах плотность пространственного заряда пучка существенно влияет на траектории заряженных частиц. Возмущения на этих траекториях, в свою очередь, влияют на распределение пространственного заряда. Используя этап исследования двунаправленного отслеживания частиц, можно вычислить траектории и поля таким образом, чтобы была рассмотрена двусторонняя связь между ними. Такая процедура уменьшает необходимое количество частиц модели на несколько порядков по сравнению с методами, основанными на явном моделировании кулоновских взаимодействий между частицами пучка. В этом примере для подтверждения того, что решение согласуется с аналитическим выражением для формы нерелятивистской, параксиальной лучевой оболочки при постоянном токе, используется исследование сетчатого уточнения.
modeldescr_acdc/ferroelectric_hysteresis = Гистерезис в Ферроэлектрическом Материале\n\nФерроэлектрические Материалы проявляют нелинейное поведение поляризации, такое как гистерезис и насыщение на больших прикладных электрических полях. Многие пьезоэлектрические материалы являются сегнетоэлектрическими. Эта модель анализирует простой привод из пьезоэлектрического керамического материала PZT, который подвергается прикладному электрическому полю.
modeldescr_acdc/force_calculation_01_introduction = [Серия проверки электромагнитной силы]Расчет силы 1 — Введение\n\nЭта модель служит основой для последующих руководств из этой серии (учебные примеры Magnetic Force BEM FEM и Magnetic Torque BEM FEM). Он содержит общее введение, а также геометрии, используемые в этой серии. Подробные инструкции по моделированию геометрии включены.\n\nОпытные пользователи, которые мало интересуются построением геометрии или совсем не интересуются им, могут пропустить эту часть и продолжить изучение одного из вышеупомянутых руководств. Однако если вы новичок в COMSOL или впервые знакомы с этой серией, стоит уделить этому некоторое время, поскольку это поможет вам ознакомиться с основами.
modeldescr_acdc/force_calculation_02_magnetic_force_bem = [Серия проверки электромагнитной силы] Расчет силы 2 — Магнитная сила BEM FEM\n\nЭта проверочная модель рассматривает случай двух параллельных намагниченных стержней длиной один метр, расположенных на расстоянии одного метра. Относительная проницаемость предполагается везде одинаковой. Остаточная плотность потока намагниченных стержней выбирается такой, чтобы аналитическая модель предсказывала силу отталкивания между двумя стержнями, равную ровно одному Ньютону.\n\nМетод граничных элементов (МГЭ) и метод конечных элементов (МКЭ) сравниваются с аналитической моделью для нескольких размеров сетки. Проверяется качество тензора поверхностных напряжений Максвелла на опорах. Параметрическая развертка используется для исследования сходимости сетки как для BEM, так и для FEM.
modeldescr_acdc/force_calculation_03_magnetic_torque_bem = [Electromagnetic Force Verification Series]Force Calculation 3 — Magnetic Torque BEM FEM\n\nЭта модель является продолжением модели верификации Magnetic Force BEM FEM. Один намагниченный стержень длиной один метр помещается в перпендикулярное внешнее поле. Предполагается, что относительная проницаемость везде одинакова. Прочность внешнего поля выбрана так, что аналитическая модель прогнозирует крутящий момент на стержне ровно одного ньютон-метра.\n\n Метод граничных элементов (BEM) и метод конечных элементов (FEM) сравниваются с аналитической моделью для нескольких размеров сетки. Проверяется качество тензора поверхностного напряжения Максвелла на полюсах. Параметрический разверток используется для исследования сходимости сеток как для BEM, так и для FEM.
modeldescr_acdc/generator_2d = Генератор в роторе 2D\n\nA с постоянными магнитами и нелинейным магнитным материалом вращается внутри статора того же магнитного материала. Сгенерированное напряжение в обмотках вокруг статора вычисляется как функция времени. COMSOL Multiphysics моделирует вращение с помощью сборок и пар идентичности, используя предписанное преобразование координат вращения в движущейся сетке. Нелинейность магнитного материала моделируется с использованием интерполяционной функции, определенной в библиотеке материалов.
modeldescr_acdc/generator_3d = Генератор: 3D\n\n Генератор состоит из ротора с постоянными магнитами и нелинейного магнитного материала внутри статора того же магнитного материала. Вычисляются статические магнитные поля внутри и вокруг генератора. Нелинейность магнитного материала моделируется с помощью интерполяционной функции.
modeldescr_acdc/generator_sector_dynamic = Generator Sector Dynamic\n\nA секторная модель генератора, включающая обычное дифференциальное уравнение для механической динамики и вычисления крутящего момента, возникающего в результате магнитных сил. Он показывает, как можно использовать симметрию, чтобы уменьшить размер модели до 1/8 от первоначального размера. Пример также включает в себя сплющенное сопротивление обмотки.
modeldescr_acdc/geoelectrics = Геоэлектрическая передовая проблема\n\n Классическая передовая проблема в области геоэлектриков —, которая включает в себя электрическую томографию сопротивления, ЭРТ и вертикальное электрическое звучание, VES — - это расчет электрического потенциала при заданном наборе электродов, когда электрические токи вводятся в землю на других электродах. В этом примере описывается передняя задача 3D ЭРТ для 25 электродов в однородном грунте 100 омметров и сравнивается с аналитическим решением.
modeldescr_acdc/grading_ring_optimization = Оптимизация позиции Градинговые кольца\n\n Расширяя модель высоковольтного изолятора, этот пример показывает, как настроить исследование оптимизации для определения оптимального положения калибровочных колец для получения самого высокого напряжения вспышки.
modeldescr_acdc/hall_effect_sensor = Hall Effect Sensor\n\nЭта вводная модель иллюстрирует эффект Холла на проводник, погруженный в окружающее магнитное поле.
modeldescr_acdc/hartmann_boundary_layer = Hartmann Boundary Layer\n\nЭта вводная модель магнитогидродинамики иллюстрирует влияние внешнего магнитного поля на ламинарный профиль потока проводящей жидкости. Скорость жидкости, поперечная магнитному полю, вызывает объёмные токи через электродвижущую силу, создавая силу Лоренца на жидкости в направлении, противоположном направлению потока. Профиль скорости жидкости между двумя нескользящими стенками сравнивают с аналитическими значениями для различных значений числа Хартмана.
modeldescr_acdc/hartmann_flow_in_liquid_metal_blanket = Hartmann Flow in Liquid Metal Blanket with теплопередача\n\n В реакторах ядерного синтеза жидкий металл будет взаимодействовать с фоновым магнитным полем в режиме потока, известном как магнитогидродинамика (MHD). Эта модель демонстрирует поток MHD в протоке жидкого металлического одеяла, где электромагнитное поле и течение жидкости связаны через силу Лоренца и электродвижущую силу, а течение жидкости связан с теплообменом.
modeldescr_acdc/helmholtz_coil = Магнитное поле Helmholtz Coil\n\nA Катушка Гельмгольца представляет собой параллельную пару идентичных круглых катушек, расположенных на расстоянии одного радиуса друг от друга и ранящихся так, что ток течет через обе катушки в одном направлении. Эта обмотка приводит к равномерному магнитному полю между катушками с первичным компонентом, параллельным осям двух катушек. Модель показывает, как вычислять магнитное поле и его более высокие производные с помощью двух разных интерфейсов.
modeldescr_acdc/high_current_cable = High Current Cable\n\n Этот пример определяет физическое устройство в цепи, проанализированной в примере High Current Cables in a Circuit. Это кабель, подключенный к зажиму, и зажим зажат на столбе батареи. Соединение кабель-клип и соединение клип-полюс имеют контактное сопротивление, смоделированное условием интерфейса сборки. В примере используется нагрев Джоуля для включения как электрических, так и тепловых эффектов.
modeldescr_acdc/high_current_cables_circuit = Кабель высокого тока в схеме \n\n В этом примере анализируется схема зарядного устройства автомобиля, где кабели от зарядного устройства к батарее моделируются с использованием физических моделей. Физические модели являются примерами кабеля высокого тока. Схема включает в себя два экземпляра физического устройства, поэтому в одном и том же моделировании можно анализировать потенциальное и тепловое распределение в кабелях на сторону плюса и со стороны минуса.
modeldescr_acdc/high_voltage_insulator = Инсулятор высокого напряжения\n\nЭтот пример демонстрирует, как использовать интерфейс электростатики для расчета поверхностного электрического поля типичного изолятора высокого напряжения. Показано, что неоднородность и максимум поверхностного электрического поля значительно снижаются при установке калибровочных колец. Таким образом, изолятор высокого напряжения способен выдерживать более высокое напряжение вспышки.
modeldescr_acdc/homopolar_generator = Гомополярный генератор \n\nA состоит из электропроводящего вращающегося диска, помещенного в однородное магнитное поле, перпендикулярное плоскости вращения. Движение проводника через статическое магнитное поле вызывает токи Лоренца в диске. Путем подключения внешнего края диска к центру через стационарный проводник можно генерировать значительный ток. Этот пример моделирует поток тока через медный проводник и вращающийся диск.
modeldescr_acdc/hot_wall_furnace = Печь с горячими стенками с радиочастотным обогревом для обработки полупроводников\n\nПечные реакторы используются в производстве полупроводников для выращивания эпитаксиальных слоев на пластинах, что является ключевой технологией изготовления электрических устройств. для широкозонного полупроводника карбида кремния эпитаксиальный рост происходит в графитовых токоприемниках при очень высоких температурах (~ 2000°C).\nВ этом примере показана простая конструкция печи, которая нагревает токоприемник из графита с использованием радиочастотного сигнала мощностью 8 кВт и частотой 20 кГц. Извлечено распределение температуры по пластине, а также температура на внешней кварцевой трубе. При таких высоких температурах в тепловом потоке преобладает излучение.
modeldescr_acdc/impedance_sensor = Измерения электрического импеданса Sensor\n\nElectric impedance используются для визуализации и обнаружения, с приложениями, начиная от неразрушающего контроля и геофизической визуализации до медицинской визуализации. Этот пример включает в себя один электрод, помещенный на проводящий блок с заполненной воздухом полостью внутри. Пример изучает, как боковое положение полости влияет на импеданс.
modeldescr_acdc/induced_voltage_moving_magnet = Напряжение, индуцируемое в катушке движущимся магнитом\n\nA, движущимся осевым образом через центр катушки, будет вызывать напряжение через терминалы катушки. Практическое применение этого явления заключается в шейкерных фонариках, где фонарик энергично встряхивается туда и обратно, тем самым заставляя магнит двигаться через многооборотную катушку, которая обеспечивает заряд батареи. Этот пример моделирует движение магнита через катушку и вычисляет индуцированные напряжения. Смещение магнита является значительным, поэтому в примере используется движущаяся и скользящая сетка.
modeldescr_acdc/inductance_matrix_pcb_coils = Расчет матрицы индуктивности PCB Coils\n\nЭта модель демонстрирует, как использовать интерфейс магнитные поля, Currents Only вместе со стационарным источником Sweep с исследованием инициализации для вычисления матрицы индуктивности катушек PCB с числом 12.
modeldescr_acdc/inductive_heating = Индуктивное нагрев медного цилиндра\n\n Вихревые токи в проводящем цилиндре производят тепло. Чтобы найти омические потери и распределение температуры в цилиндре, необходимо одновременно проводить моделирование теплопередачи и электрического поля.
modeldescr_acdc/inductor_3d = Моделирование 3D-индуктора\n\nкатушки индуктивности являются важной частью многих приложений. Этот пример показывает, как извлечь как DC, так и AC свойства индуктора.
modeldescr_acdc/inductor_in_circuit = Индуктор в усилителе Circuit\n\n Этот пример показывает, как объединить моделирование электрической цепи с моделированием конечных элементов. Модель конечных элементов представляет собой индуктор с нелинейным магнитным сердечником и 1000 витков, где число витков моделируется с использованием технологии распределенного тока.\n Схема импортируется в COMSOL Multiphysics в виде нет-листа SPICE, который объединяет модель индуктора и элементы схемы в виде ODE.
modeldescr_acdc/interdigitated_capacitive_sensor_bem = Межцифровые сенсорные датчики Capacitive Sensor\n\nCapacitive используются для определения изменений диэлектрических свойств окружающей среды. Простое приложение может заменить механическую кнопку. Более продвинутые приложения включают устройства ввода, такие как трекпады и сенсорные экраны. Этот пример межцифрового ёмкостного датчика вычисляет ёмкость устройства с и без подложки диэлектрика FR4.
modeldescr_acdc/interdigitated_capacitive_sensor_fem = Межцифровые сенсорные датчики Capacitive Sensor\n\nCapacitive используются для определения изменений диэлектрических свойств окружающей среды. Простое приложение может заменить механическую кнопку. Более продвинутые приложения включают устройства ввода, такие как трекпады и сенсорные экраны. Этот пример межцифрового ёмкостного датчика вычисляет ёмкость устройства с и без подложки диэлектрика FR4.
modeldescr_acdc/interior_pm_motor_topology_optimization = Топология Оптимизация интерьера PM Motor\n\n В этом примере модели интерфейсы периодической и механики конструкций магнитных машин используются для оптимизации топологии ротора внутреннего электродвигателя с постоянным магнитом. В таких конструкциях требования к оптимальному распределению материала магнитной и физики механики конструкций противоречивы в определенных областях. С оптимизацией топологии и мультифизическим подходом потребности в эффективной магнитной цепи и структурной целостности удовлетворяются в оптимизированном решении.
modeldescr_acdc/iron_sphere_13mhz_bfield = Железная сфера в магнитном поле 13,56 МГц\n\nЖелезная сфера подвергается воздействию пространственно однородного, синусоидально изменяющегося во времени фонового магнитного поля. Частота поля настолько высока, что глубина скин-слоя в сфере намного меньше радиуса. На таких высоких частотах можно моделировать только поля и индуцированные токи на поверхности сферы, тем самым избегая необходимости решения полей в пределах объёма сферы, в результате чего значительно уменьшается размер модели.
modeldescr_acdc/iron_sphere_20khz_bfield = Железная сфера в магнитном поле 20 кГц\n\nЖелезная сфера подвергается воздействию пространственно однородного, синусоидально изменяющегося во времени фонового магнитного поля. Частота поля такова, что глубина скин-слоя меньше радиуса сферы. Пример вычисляет индуцированные токи в сфере и возмущение к фоновому полю. Кроме того, он решает вопрос о том, как правильно связать домены со значительным эффектом кожи.
modeldescr_acdc/iron_sphere_60hz_bfield = Железная сфера в магнитном поле 60 Гц\n\nЖелезная сфера подвергается воздействию пространственно однородного, синусоидально изменяющегося во времени фонового магнитного поля. Частота поля достаточно низкая, чтобы глубина скин-слоя была больше радиуса сферы. В этом примере используется сокращенная формулировка поля для наложения фонового поля и демонстрируются два подхода к решению проблемы. Пример вычисляет индуцированные токи в сфере и возмущение к фоновому полю.
modeldescr_acdc/iron_sphere_bfield_00_introduction = [Железная сфера в магнитном поле] Железная сфера в магнитном поле — Introduction\n\nЖелезная сфера подвергается воздействию ряда пространственно однородных фоновых магнитных полей. Во введении приводится краткое изложение четырех различных сценариев моделирования, охватываемых в серии, и соответствующих результатов. Он также дает инструкции по моделированию для настройки геометрии и материалов для последующих учебных моделей. Следующие учебные примеры используют модель введения в качестве отправной точки и могут быть завершены в любом порядке.
modeldescr_acdc/iron_sphere_bfield_01_static = [Железная сфера в магнитном поле] Железная сфера в магнитном поле — Статическое поле\n\nЖелезная сфера подвергается воздействию статического, пространственно однородного фонового магнитного поля. Возмущение магнитного поля и напряженность поля внутри сферы исследуется для ряда относительных проницаемостей железной сферы. Напряжение поля внутри сферы вычисляется и сравнивается с аналитическим решением. для решения этой проблемы используются две формулировки, и обсуждаются различия между ними.
modeldescr_acdc/iron_sphere_bfield_02_60hz = [Железная сфера в магнитном поле] Железная сфера в магнитном поле —60 Hz\n\nЖелезная сфера подвергается воздействию пространственно однородного фонового магнитного поля, которое синусоидально изменяется во времени с частотой 60 Гц. Частота поля достаточно низкая, чтобы глубина скин-слоя была больше радиуса сферы. Пример вычисляет индуцированные токи в сфере и возмущение к фоновому полю. В этом примере используются два подхода для решения проблемы и оценки их путем сравнения магнитного рассеивания в различных областях модели.
modeldescr_acdc/iron_sphere_bfield_03_20khz = [Железная сфера в магнитном поле] Железная сфера в магнитном поле —20 кГц\n\nЖелезная сфера подвергается воздействию пространственно однородного фонового магнитного поля, которое синусоидально изменяется во времени на частоте 20 кГц. Частота поля такова, что глубина скин-слоя меньше радиуса сферы. Пример вычисляет индуцированные токи в сфере и возмущение к фоновому полю. Кроме того, он решает вопрос о том, как правильно связать домены со значительным эффектом кожи.
modeldescr_acdc/iron_sphere_bfield_04_13mhz = [Железная сфера в магнитном поле] Железная сфера в магнитном поле —13.56 МГц\n\nЖелезная сфера подвергается воздействию пространственно однородного фонового магнитного поля, которое синусоидально изменяется во времени на частоте 13.56 МГц. Частота поля настолько высока, что глубина скин-слоя в сфере намного меньше радиуса. На таких высоких частотах можно моделировать только поля и индуцированные токи на поверхности сферы, тем самым избегая необходимости решения полей в пределах объёма сферы, в результате чего значительно уменьшается размер модели.
modeldescr_acdc/falling_magnet = Магнит, падающий через медную трубку\n\nA цилиндрический магнит, падающий через медную трубку, вызывает вихревые токи на стенках трубки. Вихревые токи, в свою очередь, создают магнитное поле, которое противостоит магнитному полю магнита и вызывает тормозную силу, которая противостоит движению магнита. Эта противостоящая сила увеличивается с увеличением скорости. Таким образом, существует конечная скорость, при которой сила магнитного торможения равна силе тяжести. Пример вычисляет скорость магнита после его падения, когда он достигает конечной скорости.
modeldescr_acdc/linear_motor_2d = Линейный двигатель в 2D\n\nLinear двигатели используются во многих приложениях, нуждающихся в поступательном движении. Типичными характеристиками линейных двигателей являются высокая точность или быстрое ускорение. В этой модели исследуется синхронный двигатель с трехфазной обмоткой на неподвижной части и постоянные магниты на движущейся части. Движущаяся сетка и периодические условия используются для моделирования периодической части двигателя. Также объясняется, как использовать эту модель для 2D представления осевых двигателей потока (вращательное движение).
modeldescr_acdc/magnetic_brake = Магнитный тормоз\n\nA металлический диск вращается в воздушном зазоре магнита. Токи индуцируются, и результирующие силы Лоренца (JxB) дают тормозной момент, который замедляет диск. Эта 3D-модель вычисляет распределение силы вихря и Лоренца и параллельно решает связанное обычное дифференциальное уравнение для временной эволюции угловой скорости.
modeldescr_acdc/magnetic_circuit_topology_optimization = Топология Оптимизация магнитного контура\n\nЭта модель представляет два примера топологии оптимизации магнитной цепи громкоговорителя. Первая оптимизация используется для нахождения конструкции нелинейного железного столба и верхней пластины, которые максимизируют коэффициент BL в положении покоя (небольшие смещения), при этом ограничивая количество используемого железа. Вторая оптимизация используется для нахождения конструкции магнитной цепи с плоской кривой BL, при этом ограничивая количество используемого железа. Это приводит к конструкции, которая уменьшает нелинейность для больших смещений конуса динамика. Дизайн, созданный во второй оптимизации, подтверждается в новом исследовании, показывая хорошее согласие с результатами топологии. Обе конструкции сравниваются с традиционным дизайном, демонстрирующим улучшенную производительность и требующим меньшего количества железа.
modeldescr_acdc/magnetic_damping = Магнитное демпфирование вибрирующих проводящих твёрдых тел\n\n Когда проводящий твердый материал перемещается через статическое магнитное поле, индуцируется вихревой ток. Ток, который течет через проводник, который сам движется через магнитное поле, вызывает силу Лоренца обратно на твердое тело. Поэтому проводящее твердое вещество, которое вибрирует в статическом магнитном поле, будет испытывать структурное демпфирование. Эффект магнитного демпфирования вычисляется в этом примере двумя различными способами. Сначала гармонически возбуждая консольный луч в диапазоне частот и помещая его в сильное магнитное поле. Тот же эффект затем вычисляется в полном переходном исследовании, когда луч вместо этого испытывает внезапную приложенную нагрузку. Представленный здесь подход предполагает, что относительная величина структурных смещений мала, что материал обладает изотропными и линейными свойствами и что магнитное поле является статическим.
modeldescr_acdc/magnetic_field_infinite_conductor = Магнитное поле от Infinite Conductor\n\nЭта модель введения создает простую модель проблемы магнитостатики с коаксиальным кабелем бесконечной длины, несущим ток, который обычно встречается в учебниках. Поскольку существует аналитическое решение этой проблемы, модель может использоватьсяа для сравнения теории с численными результатами моделирования. Область за пределами коаксиального кабеля не является частью этой модели.
modeldescr_acdc/magnetic_prospecting = Магнитная разведка месторождений железной руды\n\nМагнитная разведка является методом геологической разведки месторождений железной руды. Пассивный магнитный поиск основан на точном отображении локальных геомагнитных аномалий. Этот пример оценивает магнитную аномалию как для поверхностного, так и для воздушного поиска путем решения индуцированной намагниченности в железной руде из-за магнитного поля Земли.
modeldescr_acdc/magnetohydrodynamics_pump = Магнетогидродинамика Pump\n\nЭта вводная модель иллюстрирует действие магнитогидродинамического насоса. Движущееся магнитное поле создается трехфазными катушками, а наоборот индуцированное магнитное поле из-за вихревых токов в жидкости создает отталкивающую силу на жидкость в колонне, генерируя движение. Этот тип индукционного насоса используется, например, в системах высокотемпературного охлаждения, где отсутствие движущихся частей и перекачиваемая жидкость, хранящаяся в герметичной системе, являются явными преимуществами.
modeldescr_acdc/magnetotellurics = Magnetotellurics\n\nMagnetotellurics - это метод оценки профиля сопротивления недр Земли с использованием естественного электромагнитного источника, обеспечиваемого ионосферой. Данный пример представляет собой реализацию COMSOL стандартной эталонной модели магнитотеллурики COMMEMI-3D-2, определенной Ждановым и другими.
modeldescr_acdc/microstrip = Вместимость в учебнике Microstrip\n9000000000001A, который показывает, как рассчитать ёмкость в интерфейсах электростатики и квазистатики.
modeldescr_acdc/multipactor = Multipactor\n\nMultipaction может происходить, когда электроны ускоряются высокочастотным радиочастотным полем в поверхности. Вторичная эмиссия электронов может происходить и при правильных условиях может происходить экспоненциальный рост числа электронов. Эффект мультиплакации наиболее силен при определенной частоте РЧ, которая зависит от размеров устройства и приложенного напряжения. Из-за эффектов пространственного заряда экспоненциальный рост числа электронов в конечном итоге останавливается, а общее количество электронов достигает состояния динамического равновесия, явления, известного как насыщение мультипакторами.\n\n Этот пример требует модуля отслеживания частиц.
modeldescr_acdc/multiturn_coil_asymmetric_conductor = Multiturn Coil Above a Asymmetric Conductor Plate\n\nЭтот пример решает проблему 7 Testing Electromagnetic Analysis Methods (TEAM), 'Asymmetrical Conductor with a Hole'— эталонную проблему, касающуюся расчета вихревых токов и магнитных полей, производимых при размещении алюминиевого проводника асимметрично над многооборотной катушкой, несущей синусоидально изменяющийся ток. Сравнение результатов моделирования в определенных положениях в пространстве с измеренными данными из литературы показывает согласие.
modeldescr_acdc/mutual_inductance = Самоиндуктивность и взаимная индуктивность между одиночными проводниками\n\n Взаимная индуктивность между первичной и вторичной однооборотной катушкой в концентрической копланарной компоновке вычисляется с использованием модели постоянного тока с постоянным состоянием и сравнивается с аналитическим решением. Индуцированные токи во вторичной катушке вычисляются с использованием переменного тока, анализа частотной области. Обсуждается взаимосвязь между токами, индуцированными переменным током, и индуктивностью постоянного тока.
modeldescr_acdc/mutual_inductance_coil_group = Самоиндуктивность и взаимная индуктивность одного проводника и спиральной катушки\n\n Взаимная индуктивность и индуцированные токи между однооборотной первичной и двадцатиоборотной вторичной катушкой в концентрической копланарной компоновке вычисляются с использованием модели частотной области. Каждый поворот вторичной катушки моделируется явно. Результаты сравниваются с аналитическими прогнозами.
modeldescr_acdc/mutual_inductance_multiturn = Самоиндуктивность и взаимная индуктивность одного проводника и гомогенизированной спиральной катушки\n\n Взаимная индуктивность и индуцированные токи между однооборотной первичной и двадцатиоборотной вторичной катушкой в концентрической копланарной компоновке вычисляются с использованием модели частотной области. Вторичная катушка моделируется с использованием гомогенизированного подхода, который явно не учитывает каждый поворот катушки. Результаты сравниваются с аналитическими прогнозами.
modeldescr_acdc/octagonal_surface_coil = Моделирование спиральных катушек индуктора Coil\n\nSpiral привлекательно, потому что они могут быть легко интегрированы при гальванической обработке других печатных схем и обеспечивают надежные значения индуктивности. Модели таких спиральных индукторов могут стать довольно большими по мере увеличения числа витков. Этот пример показывает, как использовать близкую симметрию структуры, чтобы значительно уменьшить размер модели. Восьмиповоротная восьмиугольная спиральная катушка моделируется с использованием граничного условия Single conductor Coil с условиями Floating Potential для обеспечения непрерывности тока между разъединенными витками катушки.
modeldescr_acdc/one_sided_magnet = Односторонний магнит и Plate\n\nOne-sided магниты предназначены для того, чтобы иметь оба магнитных полюса, возникающие с одной и той же стороны магнита. Это приводит к тому, что магнитный поток концентрируется на одной стороне магнита. Эти типы магнитов встречаются во многих приложениях от обычного магнита холодильника до ускорителей частиц.\n\n Этот учебник демонстрирует метод моделирования цилиндрического одностороннего постоянного магнита, придавая магниту намагниченность, которая изменяется в боковом направлении. Модель имитирует магнитный поток от магнита и его взаимодействие с соседней тонкой металлической пластиной.
modeldescr_acdc/opamp_capacitive_load = Операционный усилитель с Capacitive Load\n\n Операционный усилитель (op-amp) является дифференциальным усилителем напряжения с широким спектром применений в аналоговой электронике. Этот учебник моделирует операционный усилитель, подключенный к петле обратной связи и ёмкостной нагрузке.\n\n Оп-амп моделируется как эквивалентная линейная подсхема в интерфейсе <em>Electrical Circuit</em>, где он вставляется во внешнюю цепь. Модель частично основана на формате SPICE. Модель моделируется в течение 10 мс с выходом данных каждые 0,05 мс. Внутренняя динамика операционного усилителя взаимодействует с сетью обратной связи, вызывая звон в выходном сигнале (этапный ответ).
modeldescr_acdc/parallel_wires = Электромагнитные силы на параллельных проводах с током\n\n1 ампер определяется как ток в двух параллельных проводниках бесконечной длины и незначительного круглого сечения, расположенных на расстоянии одного метра друг от друга, который создает силу 2e-7 Н/м. В этом примере показана установка двух параллельных проводов в духе этого определения с той разницей, что провода имеют немаловажное поперечное сечение.
modeldescr_acdc/permanent_magnet = Постоянный магнит\n\nЭтот пример изучает магнитостатическую силу между железным прутом и постоянным магнитом.
modeldescr_acdc/permeable_sphere_static_bfield = Магнитопроницаемая сфера в статическом магнитном поле\n\nA сфера относительной проницаемости больше единицы подвергается воздействию пространственно однородного, статического фонового магнитного поля. для решения этой проблемы используются две формулировки, и обсуждаются различия между ними. Напряжение поля внутри сферы вычисляется и сравнивается с аналитическим решением.
modeldescr_acdc/planar_pcb_coil = Планарный PCB Coil\n\nЭтот учебный пример показывает, как использовать интерфейс <em>Electric Currents, Layered Shell</em> вместе с интерфейсом <em>Magnetic Field</em> для оценки сопротивления и индуктивности плоской катушки PCB в стационарном режиме. Типичные приложения для такого устройства охватывают от сбора энергии до беспроводной подзарядки.
modeldescr_acdc/planar_transformer = Планарный трансформатор на PCB\n9000000000001A планарный трансформатор часто интегрируется на печатную плату, чтобы получить компактное устройство для приложений с высокой мощностью. Это статический анализ плоского трансформатора, который извлекает индуктивность, взаимную индуктивность и ёмкость. Макет трансформатора импортируется из файла IPC-2581 с помощью интерфейса ECAD Import, который автоматически создает полную 3D-модель.
modeldescr_acdc/pm_motor_2d_campbell_diagram = Постоянный магнитный двигатель с моделью Campbell Diagram\n\nA, демонстрирующей, как связать магнитные машины, периодическое время с твердой механикой и акустикой для создания диаграммы Кэмпбелла. Результаты дают представление о том, какие гармоники магнитных сил приводят к наиболее заметному моторному шуму на различных скоростях.
modeldescr_acdc/pm_motor_2d_efficiency_map = Двигатель с постоянными магнитами с картой эффективности\n\nМодель демонстрирует, как связать интерфейс Magnetic Machinery, Time Periodic с теплопередачей (двусторонняя связь) и построить карту эффективности при параметрическом изменении амплитуды тока и скорости ротора.
modeldescr_acdc/pm_motor_2d_introduction = Постоянный магнитный двигатель в 2D\n\nВ этом руководстве двигатель PM с 10 полюсами ротора и 12 слотами статора моделируется в 2D, чтобы захватывать крутящий момент в течение электрического периода и отображать плотность объёмных потерь в железе ротора и статора.
modeldescr_acdc/pm_motor_3d = Постоянный магнитный двигатель в двигателях 3D\n\nPermanent magnet (PM) используется во многих высокопроизводительных приложениях, таких как электрические и гибридные транспортные средства. Важным ограничением конструкции является то, что магниты чувствительны к высоким температурам, которые могут возникать из-за потерь тепла, вызванных токами, особенно вихревыми токами.\n\n В этом руководстве 18-полюсный двигатель PM моделируется в 3D, чтобы точно фиксировать потери вихревого тока в магнитах. Центральная часть геометрии, содержащая ротор и часть воздушного зазора, моделируется как вращающаяся относительно системы координат статора. Секторная симметрия и осевая зеркальная симметрия используются для уменьшения вычислительных усилий, сохраняя при этом полное 3D-поведение устройства.
modeldescr_acdc/pmsm_sector = Моторный сектор постоянного магнита в модели Steady State\n\nA, демонстрирующей использование интерфейса периодического времени магнитной машины для вычисления стабильного состояния двигателя постоянного магнита с использованием симметрии сектора.
modeldescr_acdc/pmsm_fullcircle = Постоянный магнитный двигатель в модели Steady State\n\nA, демонстрирующей использование интерфейса периодического магнитного оборудования для вычисления состояния постоянного магнитного двигателя.
modeldescr_acdc/power_inductor = Индуктивность индуктора питания \n\nСиловые катушки индуктивности являются центральной частью многих низкочастотных энергетических приложений. Они, например, используются в коммутируемом источнике питания для материнской платы и всех других компонентов в компьютере. Этот пример показывает, как использовать терминальное граничное условие для извлечения индуктивности. Он также показывает, как решить модель с и без датчика.
modeldescr_acdc/power_line_electric_field = Электрическое поле от линий электропередачи\n\n Линии электропередачи обычно используются в качестве средства передачи электроэнергии на большие расстояния. В этом руководстве моделируются башни, передающие трехфазную мощность переменного тока высокого напряжения, и вычисляется полученное электрическое поле. Башни имеют две защитные линии над фазовыми линиями, которые защищают башню от ударов молнии. \n\n Модель также иллюстрирует силу использования метода граничных элементов (BEM) для моделирования, который используется интерфейсом физики электростатики, граничных элементов.
modeldescr_acdc/power_line_magnetic_field = Магнитное поле от линий электропередачи \n\n Линии электропередачи обычно используются в качестве средства передачи электроэнергии на большие расстояния. В этом руководстве моделируются башни, передающие трехфазную мощность переменного тока высокого напряжения, и вычисляется полученное магнитное поле. Башни имеют две защитные линии над фазовыми линиями, которые защищают башню от ударов молнии. \n\n Модель использует интерфейс физики магнитных полей для вычисления магнитного поля.
modeldescr_acdc/power_switch = Электродинамика Power Switch\n\nЭлектрические события, такие как ток или перегрузка, могут серьезно повредить электрические цепи или линии электропередач. Чтобы избежать дорогостоящей замены критических деталей, можно установить электрические выключатели. Они механически прерывают поток тока или всплеск, перемещая плунжер, как только достигается критический ток. В отличие от предохранителя, который должен быть заменен после его активации для защиты окружающих электрических компонентов, автоматический выключатель может быть сброшен.\n\n Основная цель этой учебной модели заключается в изучении принципа работы и некоторых возможных решений для моделирования одного класса выключателей: магнитных силовых выключателей. Это электромеханическое устройство, в котором железные плунжеры перемещаются с помощью магнитного притяжения, оказываемого током, текущим в окружающих его катушках. Выключение тока движения сбрасывает переключатель на его начальное состояние.\n\n Модель имитирует динамику жесткого тела под воздействием магнитных сил, индуцированных токов и пружинных / удерживающих устройств, которые удерживают плунжер в его равновесном положении. Медная катушка помещается на центральную ногу нижнего E-ядра, которая сохраняется фиксированной. По мере того, как ток течет в катушке, на верхнее E-ядро (движущийся плунжер) воздействует притягивающая сила, которая удерживается на месте предварительно напряженной пружиной. Когда сила достигает порогового значения, плунжер движется к нижнему E-ядру, закрывая воздушный зазор. Модель иллюстрирует, как правильно имитировать движение и время закрытия, которое зависит от пружинной жесткости.
modeldescr_acdc/quadrupole_lens = Quadrupole Lens\n\nУскоренный пучок ионов B5+ проходит через систему фокусировки из трех магнитных квадруполей.
modeldescr_acdc/railgun_3d = Railgun\n9000000000001A - это тип магнитного ускорителя, который использует электромагнитную силу для приведения в движение электропроводящего снаряда, который изначально является частью текущего пути. Протекающий через рельсы ток устанавливает между ними магнитное поле и через снаряд перпендикулярно току в нем. Это приводит к ускорению снаряда по рельсам.
modeldescr_acdc/resistive_position_sensor = Resistive Position Sensor\n\nЭта модель показывает, как можно вычислить изменение сцепленного сопротивления за счет движения резистивной части. Модель имеет решение слоя, который настолько тонкий, что твердое представление не может быть надежным, соединенным как с твердым, так и с слоем, смоделированным как геометрически тонкий, но физически толстый.
modeldescr_acdc/resonant_spiral_coil_3d = [Резонансная спиральная катушка]Резонансная спиральная катушка в 3D\n\n На резонансной частоте ёмкостная связь между поворотами вызывает импеданс катушки для перехода от индуктивной к ёмкостной. Это приложение анализирует резонанс 5-оборотной спиральной катушки меди, оснащенной тонким эпоксидным лакоизоляционным слоем. Ёмкостная связь через тонкий слой лака моделируется с использованием специального граничного условия, тем самым избегая дорогостоящей объёмной сетки.
modeldescr_acdc/resonant_spiral_coil_2daxi = [Резонансная спиральная катушка]Резонансная спиральная катушка в 2D Axisymmetry\n\nA на резонансной частоте, ёмкостная связь между поворотами вызывает импеданс катушки для перехода от индуктивной к ёмкостной. Это приложение анализирует резонанс 5-оборотной спиральной катушки меди, оснащенной тонким эпоксидным лакоизоляционным слоем.
modeldescr_acdc/rfid = RFID System\n\nAn Система RFID состоит из антенны считывателя и метки транспондера. Поскольку длина волны обычно намного больше, чем размеры системы, взаимодействие между считывателем и транспондером хорошо описывается действием трансформатора. для вычисления взаимной индуктивности между считывателем и транспондером используется магнитостатическая модель.
modeldescr_acdc/rotating_machinery_3d_tutorial = Вращающиеся машины 3D Tutorial\n\n Круговое движение цилиндрического однородного медного ротора в магнитном поле от стационарного постоянного магнита генерирует индуцированные вихревые токи в роторе. Проникновение магнитного поля и распределение вихревого тока ограничено эффектом скорости кожи. Примером является общее введение в использование интерфейса вращающихся машин в 3D.
modeldescr_acdc/sector_generator_3d = Моделирование электрического генератора в 3D\n\nЭто приложение иллюстрирует, как моделировать электрическую машину, такую как генератор, двигатель или привод, используя симметрию сектора, чтобы уменьшить размер проблемы. Изучаемая машина представляет собой упрощенный электрогенератор в 3D, основанный на геометрии, используемой в приложении generator 2d.\n\n Приложение использует вращающиеся машины, магнитный интерфейс. Рекомендуется взглянуть на модель rotating machinery 3d tutorial, прежде чем приступать к этой заявке.
modeldescr_acdc/simple_resistor = Расчёт сопротивления Wire\n\n Каждое электрическое устройство имеет некоторое сопротивление. То есть, когда разность напряжений применяется через любые два терминала устройства, возникает прямо пропорциональный поток тока. Этот пример демонстрирует, как вычислить сопротивление короткого участка медного провода. Изучается также конвергенция раствора относительно размера сетки.
modeldescr_acdc/small_signal_analysis_of_inductor = Анализ малых сигналов индуктора\n\nA магнитного материала в ядре индуктора влияет на индуктивность. Если магнитный материал нелинейный, индуктивность зависит от тока через индуктивность. Этот пример анализирует поведение малых сигналов индуктивности с нелинейным ядром и исследует, как индуктивность малых сигналов зависит от постоянного тока.
modeldescr_acdc/solid_multilayer_shell_comparison = Сравнение твердой многослойной оболочки\n\nВ этом примере демонстрируется тест производительности, показывающий, что <em>Electric Currents, Layered Shell</em> физический интерфейс может использоваться для получения правильных результатов, как если бы модель решалась с помощью <em>Electric Интерфейс Currents</em> основан на четком трехмерном представлении.
modeldescr_acdc/spice_parameter_extraction_circuit = SPICE Parameter Extraction for a Semiconductor Diode\n\nИз IV-характеристики модели Semiconductor Diode можно извлечь параметры модели для модели SPICE диода. В этом примере используется интерфейс оптимизации и система глобальных уравнений, представляющих эквивалентную схему для диода. Обратная проблема включает в себя шесть неизвестных параметров, которые сопоставляются в смысле наименьшего квадрата.\n\n Примером является модуль оптимизации. Он не требует доступа к функции импорта SPICE.
modeldescr_acdc/spiral_inductor = Integrated Square-Shaped Spiral Inductor\n\nЭтот пример компонента, используемого в устройствах MEMS, соединяет статические электрические и магнитные поля. Целью примера является расчёт самоиндуктивности микроиндуктора.
modeldescr_acdc/static_field_halbach_rotor_3d = Статическое моделирование поля Halbach Rotor\n\n Этот пример представляет собой моделирование статического поля магнитного ротора, ориентированного на поток, с использованием постоянных магнитов, магнитного ротора, также известного как ротор Халбаха. Использование постоянных магнитов в вращательных устройствах, таких как двигатели, генераторы и магнитные передачи, увеличивается из-за их бесконтактной работы без трения. Этот пример иллюстрирует, как вычислить магнитное поле ротора с 4-полюсной парой в 3D, моделируя только один полюс ротора с использованием симметрии.
modeldescr_acdc/magnetic_signature_submarine = Магнитная подпись подводной лодки подводной лодки \n\nA, движущейся по поверхности или под водой, вызывает обнаруживаемые локальные возмущения в магнитном поле Земли, которые могут использоваться для обнаружения. Поэтому важным шагом в проектировании военно-морского корабля является прогнозирование его магнитной подписи. Этот пример демонстрирует мощную технику, которая обходит трудности, связанные с объёмной сеткой тонких листов и позволяет точно вычислять магнитные сигнатуры кораблей, автомобилей и других транспортных средств.
modeldescr_acdc/submarine_cable_01_introduction = [Cable Tutorial Series] Подводный кабель 1 — Introduction\n\n Модель, которая является результатом этого учебного пособия, служит шаблоном для последующих учебных пособий в этой серии (учебные примеры по ёмкостным, индуктивным и термическим эффектам). Он содержит подробную 2D-геометрию стандартного трехъядерного подводного кабеля XLPE HVAC, а также сетку. Некоторые параметры, варианты выбора и материалы также подготовлены.\n\n Опытные пользователи COMSOL с небольшим или нулевым интересом к этим темам — Геометрия, сетка, выборки и такие — могут пропустить эту часть серии и продолжить с одним из следующих учебных пособий. Однако, когда вы новичок в мультифизическом интерфейсе COMSOL, стоит уделить этому некоторое время, так как это поможет вам ознакомиться с основами.
modeldescr_acdc/submarine_cable_02_capacitive_effects = [Серия руководств по кабелям]Подводный кабель 2 — Ёмкостные эффекты\n\nВ этом учебном пособии рассматривается 2D-модель методом конечных элементов стандартного трехжильного подводного кабеля для систем отопления, вентиляции и кондиционирования воздуха из сшитого полиэтилена со свинцовой оболочкой, поперечным сечением основного проводника 500 мм² и междуфазным рабочим напряжением 220 кВ. Анализируются ёмкостные эффекты. Учебное пособие подтверждает предположение о том, что для ёмкости и зарядных токов аналитические подходы достаточно точны (проверка включена).\n\nОбсуждается влияние свойств материала, длины кабеля ’s и типов соединения. Модель оправдывает подход, выбранный в последующих руководствах этой серии, особенно в руководствах по ёмкостной связи и индуктивным эффектам (главы 3 и 4).
modeldescr_acdc/submarine_cable_03_bonding_capacitive = [Серия руководств по кабелям]Подводный кабель 3 — Ёмкостное соединение\n\nОсновываясь на результатах учебного примера «Ёмкостные эффекты» (предыдущего учебного примера этой серии), оправдано пренебречь ёмкостной связью между экранами и рассматривать одну изолированную фазу вместе с ее экраном. В отличие от учебных пособий по ёмкостным, индуктивным и термическим эффектам, в этом руководстве используется двухмерная осесимметричная геометрия, представляющая все 10 километров кабеля.\n\nдля нескольких типов соединения анализируются нарастания зарядных токов и соответствующие потери в экране (проверка включена). Модель подтверждает предположение о том, что высокий фазовый потенциал индуцирует равномерный зарядный ток —, который почти не зависит от потенциала экрана —, и таким образом оправдывает подход, выбранный в руководствах по ёмкостным и индуктивным эффектам (главы 2 и 4).
modeldescr_acdc/submarine_cable_04_inductive_effects = [Серия руководств по кабелям]Подводный кабель 4 — Индуктивные эффекты\n\nРезультаты учебных пособий по ёмкостным эффектам и ёмкостному соединению (предыдущие руководства этой серии) показывают, что между индуктивными и ёмкостными явлениями в кабеле существует лишь слабая связь. В дополнение к этому, 3D-модели скручивания показывают, что 2D- и 2,5D-индуктивные модели способны обеспечить хорошее приближение сосредоточенных величин кабеля ’s, и это лишь часть вычислительных затрат.\n\nЭто оправдывает использование 2D/2,5D индуктивной модели, включающей только внеплоскостные токи. Модель демонстрирует методы, подходящие для аппроксимации скручивания брони, а также некоторые конструкции проводников милликена. Он служит основой и справочным материалом для учебных пособий по 3D-эффектам Thermal Effects и Inductive Effects (главы 6 и 8). Проверка включена: результаты сравниваются с официальными спецификациями кабеля ’.
modeldescr_acdc/submarine_cable_05_bonding_inductive = [Cable Tutorial Series] Подводный кабель 5 — Bonding Inductive\n\n В руководстве по индуктивным эффектам (предыдущее руководство в этой серии) опция группы катушки упоминается как средство для имитации эффектов перекрестного связывания, но точная степень обоснованности этого подхода не показана. для более тщательного изучения различных типов связей в этом руководстве рассматриваются три раздела кабеля в отдельности, представленные тремя отдельными интерфейсами магнитных полей.\n\n Модель использует сильно упрощённую геометрию. Тем не менее, результаты очень хорошо соответствуют результатам из учебника по индуктивным эффектам. Это оправдывает как упрощенную геометрию в этом учебнике, так и перекрестный подход, предложенный в учебнике по индуктивным эффектам. Наконец, в отличие от других индуктивных моделей этой серии, эта позволяет исследовать различные длины секций.
modeldescr_acdc/submarine_cable_06_thermal_effects = [Серия руководств по кабелям]Подводный кабель 6 — Тепловые эффекты\n\nВ этом руководстве используется модель индуктивных эффектов из этой серии в качестве основы и добавляются тепловые эффекты, включая зависящую от температуры проводимость (через линеаризованное удельное сопротивление). Он показывает, как достичь мультифизической связи между электромагнитными полями и теплопередачей, используя частотно-стационарный тип исследования (индукционный нагрев).\n\nИсследовано влияние повышенных температур на потери в фазах, экранах и броне (поверка включена). Полученные значения температуры используются в учебном пособии по индуктивным эффектам 3D для применения температурной коррекции первого порядка в 3D. Наконец, в руководстве показано, как сопоставить полученное сопротивление переменному току с сопротивлением, указанным в серии стандартов IEC.
modeldescr_acdc/submarine_cable_07_a_geom_mesh_3d = [Серия руководств по кабелям]Подводный кабель 7a — Геометрия и сетка 3D\n\nЭтот MPH-файл представляет собой промежуточное состояние модели, которая построена и проанализирована в учебном пособии Geometry & Сетка 3D. для получения дополнительной информации, включая подробное введение, пошаговые инструкции и анализ результатов (с проверкой и ссылками на академические исследования), см. файл *.pdf, который поставляется с основной точкой входа учебника’s в библиотеке приложений: подводная лодка_cable_07_geom_сетка_3d.
modeldescr_acdc/submarine_cable_07_b_geom_mesh_3d = [Серия руководств по кабелям]Подводный кабель 7b — Геометрия и сетка 3D\n\nЭтот MPH-файл представляет собой промежуточное состояние модели, которая построена и проанализирована в учебном пособии Geometry & Сетка 3D. для получения дополнительной информации, включая подробное введение, пошаговые инструкции и анализ результатов (с проверкой и ссылками на академические исследования), см. файл *.pdf, который поставляется с основной точкой входа учебника’s в библиотеке приложений: подводная лодка_cable_07_geom_сетка_3d.
modeldescr_acdc/submarine_cable_07_c_geom_mesh_3d = [Серия руководств по кабелям]Подводный кабель 7c — Геометрия и сетка 3D\n\nЭтот MPH-файл представляет собой промежуточное состояние модели, которая построена и проанализирована в учебном пособии Geometry & Сетка 3D. для получения дополнительной информации, включая подробное введение, пошаговые инструкции и анализ результатов (с проверкой и ссылками на академические исследования), см. файл *.pdf, который поставляется с основной точкой входа учебника’s в библиотеке приложений: подводная лодка_cable_07_geom_сетка_3d.
modeldescr_acdc/submarine_cable_07_geom_mesh_3d = [Cable Tutorial Series] Подводный кабель 7 — Geometry & Сетка 3D\n\n Учебник по индуктивным эффектам 3D (следующий учебник в этой серии) требует довольно большой подготовки с точки зрения обработки геометрии и сетки. На самом деле, это то, что часто представляет собой основную часть усилий, потраченных на большие модели 3D FEM (в частности, модели с витым кабелем). Чтобы не упустить из виду эти важные темы, они рассматриваются в этом отдельном учебнике.\n\n Учебник организован в четырех разделах. Первая часть настраивает настройки камеры (обеспечение геометрии, сетки и графиков рендеринга по назначению). Затем добавляется последовательность геометрии вместе с выборками. Наконец, сетка построена. Некоторая постобработка проводится для изучения качества сетки.
modeldescr_acdc/submarine_cable_08_a_inductive_effects_3d = [Серия руководств по кабелям]Подводный кабель 8a — Индуктивные эффекты 3D\n\nЭтот MPH-файл представляет собой промежуточное состояние модели, которая построена и проанализирована в учебном пособии по Inductive Effects 3D. для получения дополнительной информации, включая подробное введение, пошаговые инструкции и анализ результатов (с проверкой и ссылками на академические исследования), см. файл *.pdf, который поставляется с основной точкой входа учебника ’s в библиотеке приложений: подводная лодка_кабель_08_inductive_effects_3d.
modeldescr_acdc/submarine_cable_08_b_inductive_effects_3d = [Серия руководств по кабелям]Подводный кабель 8b — Индуктивные эффекты 3D\n\nЭтот MPH-файл представляет собой промежуточное состояние модели, которая построена и проанализирована в учебном пособии по Inductive Effects 3D. для получения дополнительной информации, включая подробное введение, пошаговые инструкции и анализ результатов (с проверкой и ссылками на академические исследования), см. файл *.pdf, который поставляется с основной точкой входа учебника ’s в библиотеке приложений: подводная лодка_кабель_08_inductive_effects_3d.
modeldescr_acdc/submarine_cable_08_c_inductive_effects_3d = [Серия руководств по кабелю]Подводный кабель 8c — Индуктивные эффекты 3D\n\nЭтот MPH-файл представляет собой промежуточное состояние модели, которая построена и проанализирована в учебном пособии по Inductive Effects 3D. для получения дополнительной информации, включая подробное введение, пошаговые инструкции и анализ результатов (с проверкой и ссылками на академические исследования), см. файл *.pdf, который поставляется с основной точкой входа учебника ’s в библиотеке приложений: подводная лодка_кабель_08_inductive_effects_3d.
modeldescr_acdc/submarine_cable_08_d_inductive_effects_3d = [Серия руководств по кабелю]Подводный кабель 8d — Индуктивные эффекты 3D\n\nЭтот MPH-файл представляет собой промежуточное состояние модели, которая построена и проанализирована в учебном пособии по Inductive Effects 3D. для получения дополнительной информации, включая подробное введение, пошаговые инструкции и анализ результатов (с проверкой и ссылками на академические исследования), см. файл *.pdf, который поставляется с основной точкой входа учебника ’s в библиотеке приложений: подводная лодка_кабель_08_inductive_effects_3d.
modeldescr_acdc/submarine_cable_08_inductive_effects_3d = [Cable Tutorial Series]Submarine Cable 8 — Inductive Effects 3D\n\nЭто последнее руководство серии намерено дать “final answer” 3D кабельное моделирование. Он был разработан с обратной связью от нескольких экспертов из отрасли и находится на одном уровне с последними исследованиями (2020) при рассмотрении производительности и уровня детализации. Валидация включена. Поведение моделей анализируется в контексте нескольких научных статей и официальных спецификаций по адресу: cable’\n\n Учебник организован в пять разделов: Сначала кабель моделируется без скручивания и по сравнению с гораздо более подробными 2D-моделями. Затем добавляется поворот и модель решается и проверяется второй раз. На третьем этапе добавляется коррекция температуры, а на четвертом этапе демонстрируется экспериментальный метод численной стабилизации. Учебник заканчивается переходом на другой вид периодичности, уменьшая размер модели в сто раз, обеспечивая при этом ту же точность.
modeldescr_acdc/superconducting_wire = Сверхпроводящий провод\n\nСверхпроводящие материалы имеют нулевое удельное сопротивление до определенной критической плотности тока, выше которой удельное сопротивление быстро возрастает. для моделирования такого материала в этом примере используется физика формулировки магнитного поля.
modeldescr_acdc/thin_low_permittivity_gap_comparison = Тонкий пробел низкой разрешенности Сравнение\n\n Условие тонкого зазора с низкой пропускной способностью, доступное для электростатического моделирования поля, аппроксимирует тонкий слой материала с низкой относительной проницаемостью по сравнению с его окружением. Этот пример сравнивает тонкое граничное условие с низкой пропускной способностью с моделью полной точности и обсуждает диапазон применимости этого граничного условия.
modeldescr_acdc/three_phase_motor_frequency = Исследование частотной области трехфазного двигателя\n\nЭта трехфазная модель индукционного двигателя используется для сравнения с проблемой семинара по методу испытания электромагнитного анализа (TEAM) 30.\n\n Физика магнитных полей используется для моделирования двигателя в частотной области на частоте 60 Гц. Функция скорости (Lorentz Term) используется для моделирования арматуры ’s вращения. \n \n Solving модель генерирует значения для электродвигателя ’s электромагнитного крутящего момента, индуцированного напряжения и потерь ротора на различных скоростях ротора. Эти вычисленные результаты затем сравниваются с аналитическими результатами TEAM problem’s.
modeldescr_acdc/tokamak = Tokamak\n\nЭтот пример вычисляет ионные траектории в магнитном и электрическом поле. Все три компонента поля и скорости частиц вычисляются, несмотря на то, что модель аксисимметрична. Ионы демонстрируют хорошо известный "banana orbits", который происходит для заряженных частиц в электрических и магнитных полях.\n\n Этот пример требует модуля отслеживания частиц.
modeldescr_acdc/vector_hysteresis_modeling = Моделирование векторного гистерезиса\n\nЭто руководство представляет собой эталонную модель, воспроизводящую задачу 32 метода тестирования электромагнитного анализа (TEAM), в которой оцениваются численные методы моделирования анизотропного магнитного гистерезиса. Гистерезисный трехчленный многослойный железный сердечник подвергается воздействию изменяющегося во времени магнитного поля, создаваемого двумя катушками. Модель материала Jiles–Atherton (доступная в интерфейсе магнитные поля) используется для моделирования реакции материала, воспроизводя опубликованные экспериментальные и численные данные.\n\nКатушки возбуждаются источниками переменного напряжения, сдвинутыми по фазе на 90 градусов относительно друг друга, создавая магнитное поле, вращающееся в некоторых областях сердечника. Приложенное магнитное поле в основном ориентировано в плоскости xy, тогда как материал анизотропен и поэтому по-разному реагирует на поля, приложенные вдоль направления x или y.\n\nМодель векторного гистерезиса необходима для точного моделирования поля, зависящего от времени, а гистерезисное поведение отображается путем построения графика плотности магнитного потока как функции магнитного поля в течение одного цикла переменного тока (что соответствует одной петле гистерезиса). Прямой решатель (PARDISO) используется вместо итерационного решателя по умолчанию, в котором применяется функция фиксации датчика для A-поля.

# Acoustics Module apps
applicationdescr_aco/absorptive_muffler_designer = Поглощающие Muffler конструктор\n\nMufflers используются для ослабления шума, излучаемого двигателем внутреннего сгорания, например, и обычно должны хорошо работать в определенном диапазоне частот. Затухание измеряется через потерю передачи, что дает демпфирование в дБ как функцию частоты.\n\n Приложение для моделирования Absorptive Muffler конструктор используется для изучения и проектирования простого резонансного глушителя с пористой облицовкой. С помощью приложения вы можете выполнить анализ индуктивного и резистивного демпфирования в глушителе по вашему выбору.\n\n Приложение позволяет изучать результаты после изменения размеров глушителя, условий окружающей работы и свойств материала пористого лайнера.
applicationdescr_aco/acoustic_reflection_analyzer = Анализатор акустических отражений для интерфейса водяного седимента\n\n Анализ акустических отражений на поверхностях различных конструкций важен для многих инженерных дисциплин. Анализатор акустических отражений для приложения Water-Sediment Interface показывает одну из таких систем, где анализ имеет отношение к подводной акустике и гидроакустическим приложениям.\n\n Приложение анализирует коэффициенты отражения и поглощения плоских акустических волн, рассеиваясь от интерфейса водяного осадка на разных частотах и углах падения. Кроме того, коэффициенты поглощения случайных совпадений определяются для изученных частот.\n\n Чтобы описать систему водяного осадка, приложение использует способность интерфейса Poroelastic Waves в COMSOL Multiphysics моделировать связанные акустические и упругие волны в любом пористом веществе (теория Биота).
applicationdescr_aco/one_family_house_analyzer = One-Family House Acoustics Analyzer\n\n Приложение Analyzer используется для оценки распространения шума в спаренных комнатах внутри двухэтажного дома, состоящего из десяти комнат. Приложение определяет уровень звукового давления (SPL) в доме на основе ряда источников, которые интерактивно размещаются по всему дому.\n\n Он представляет собой классическую проблему акустики помещений, когда инженеры или архитекторы хотят определить шумовую среду в системе связанных комнат, таких как дома, офисные помещения или мастерские. Это важно при обеспечении того, чтобы акустическая среда соответствовала шуму и правилам работы, например.\n\n Инженер или архитектор может принести приложение, подобное этому, на месте и протестировать различные сценарии источника шума и характеристики изоляции стен. Затем они могут сравнить результаты моделирования с фактическими измерениями. Приложение позволяет размещать, удалять и определять несколько акустических источников в разных комнатах дома, чтобы определить полученный дистрибутив SPL.\n\n Акустика моделируется с использованием интерфейса физики акустического диффузионного уравнения в COMSOL Multiphysics, который является быстрым и эффективным при определении распределений SPL.
applicationdescr_aco/organ_pipe_design = Organ Pipe Design\n\nЭто приложение демонстрирует следующее:\n\n• Используя класс утилиты Java® для объединения нескольких форм волн и для игры sound\n• Использование таблиц для представления результатов\n\n Приложение позволяет изучать дизайн органной трубы, а затем воспроизводить звук и тон измененного дизайна. Звук трубы включает в себя эффекты различных гармоник с различными амплитудами.\n\n Органная труба моделируется с использованием интерфейса Pipe Acoustics, частотная область. Приложение позволяет анализировать, как изменяется первая фундаментальная резонансная частота с радиусом трубы и толщиной стенки, а также с давлением и температурой окружающей среды.\n\nВ приложении можно найти полный частотный отклик, включая фундаментальную частоту и гармоники. С помощью метода, написанного в коде Java®, приложение обнаруживает местоположение и амплитуду всех гармоник в ответе, тем самым расширяя анализ за пределы встроенной функциональности пользовательского интерфейса COMSOL Multiphysics.
applicationdescr_aco/piezoacoustic_transducer_designer = Пьезоакустический преобразователь конструктор\n\n В фазовом микрофоне пьезоэлектрическая кристаллическая пластина вписывается в структуру через ряд сложенных слоев, которые разделены на ряды. Пространство между этими слоями называется kerf, и строки повторяются с периодичностью или шагом. Используя функционал, предоставляемый Acoustics Module, это приложение позволяет проектировать и анализировать такую систему. Параметры материала, пьезоматериал, а также размер преобразователя можно изменять в пользовательском интерфейсе. Анализ решает акустическое давление, создаваемое преобразователем, и структурную деформацию из-за электрической нагрузки. Приложение также позволяет сравнивать различные проекты.\n\n Это приложение основано на приложении Piezoacoustic Transducer, расположенном в папке Piezoelectric Devices.
applicationdescr_aco/small_concert_hall_analyzer = Небольшой концертный зал Analyzer\n\nПроектирование конструкций и открытых пространств по качеству звука имеет важное значение для концертных залов, наружной среды и даже комнат дома. Моделирование акустики в высокочастотном пределе, где длина волны меньше геометрических особенностей, лучше всего выполнять с помощью акустики лучей.\n\n Это приложение анализирует акустику небольшого концертного зала с помощью интерфейса физики Ray Acoustics. Пользователи приложения могут определить местоположение микрофона для измерения импульсной реакции, всенаправленного источника звука, параметров поглощения стенок и свойств диффузоров. Результаты включают в себя график импульсного ответа и энергетическую рефлектограмму.

# Acoustics Module models
modeldescr_aco/absorptive_muffler = Абсорбирующий глушитель\n\nВ этом примере описывается распространение волны давления в глушителе двигателя внутреннего сгорания. В этом примере показано, как анализировать как индуктивное, так и резистивное демпфирование в глушителе, а также использование граничных условий порта.
modeldescr_aco/acoustic_cloaking = Acoustic Cloaking\n\n Этот пример демонстрирует, как использовать фоновое поле в задаче рассеяния звука. Приложение представляет собой акустический плащ-невидимку, изготовленный из метаматериала. Используются два различных типа метаматериалов: один с использованием анизотропного акустического материала с различными свойствами и один с использованием двух слоистых материалов с различными свойствами. Благодаря своим пространственно-зависимым свойствам материала и слоистой структуре, оба типа метаматериалов почти прозрачны для падающей волны давления плоскости.
modeldescr_aco/acoustic_levitator = Acoustic Levitator\n\nЭтот пример представляет собой упрощенную геометрию 2D-акустического левитатора, приводимую в движение с постоянной частотой. Небольшие упругие частицы равномерно высвобождаются в стоячем акустическом поле и их путь определяется при воздействии силы акустического излучения, вязкого сопротивления и гравитации.\n\n Этот пример требует модуля отслеживания частиц.
modeldescr_aco/acoustic_microfluidic_pump = Acoustic Microfluidic Pump\n\nЭто руководство использует 2D-модель микрофлюидного насоса с акустическим приводом. Акустический микрофлюидный насос приводится в действие акустическим потоком, происходящим из острых краев в микрофлюидном канале. Он управляет потоком вокруг замкнутого микрофлюидного канала.\n\n Акустическое поле моделируется с помощью акустического давления, частотного области и термовязкой акустики, частотного области в сочетании с мультифизической связью Acoustic–Thermoviscous Acoustic Boundary. Функция мультифизики акустического потока, соединения областей используется для вычисления сил, генерируемых акустическим полем, и применения их к интерфейсу ламинарное течение.
modeldescr_aco/acoustics_pipe_system = Акустика трубопроводной системы с 3D-наклоном и Junction\n\n В этом руководстве показано, как моделировать распространение акустических волн в больших трубных системах путем соединения интерфейса <em>Pipe Acoustics</em> с интерфейсом <em>акустика давления</em>. Учебник настроен как в области времени, так и в частотном области.\n\n1D акустика труб используется для моделирования распространения в длинных прямых участках труб. 3D-модель соединения трубы и изгиба трубы соединена с моделью 1D-трубы, чтобы детально смоделировать эти части.\n\n Эта модель может использоваться для моделирования и прогнозирования реакции систем трубопроводов, например, при обнаружении утечек или деформаций, и имеет отношение к нефтегазовой промышленности и системам водопроводных труб.
modeldescr_aco/acoustic_scattering = Акустическое рассеяние Ellipsoid\n\n Этот пример демонстрирует, как использовать фоновое поле и расчёт внешнего поля в задаче 3D-рассеивания звука. Приложение касается прогнозирования рассеивания падающей плоскости волной от твердого эллипсоида. Полученное рассеянное поле определяется вне вычислительной области с использованием функции расчета внешнего поля.
modeldescr_aco/acoustic_structure = Акустика–Взаимодействие со структурой\n\nЭтот пример иллюстрирует мультифизический интерфейс Acoustic–Solid Interaction модуля Акустика путем моделирования поведения твердого алюминиевого цилиндра, погруженного в воду и подвергающегося воздействию звукового сигнала. Акустическое давление (звук) взаимодействует с упругим телом и перемещает стенки, которые, в свою очередь, толкают воду, создавая дополнительные звуковые волны. Эта двусторонняя связь устанавливается автоматически. Рассчитывается частотная характеристика конструкции, которая затем передается обратно в область акустики, чтобы можно было проанализировать волновую картину. Таким образом, эта модель становится хорошим примером проблемы рассеяния. Взаимодействие акустики жидкости или газа с конструкционными объектами находит применение во многих инженерных задачах, например, в громкоговорителях, слуховых аппаратах, акустических датчиках, медицинской ультразвуковой диагностике.
modeldescr_aco/acoustic_streaming_microchannel_cross_section = Акустическая потоковая передача в Microchannel Cross Section\n\nЭта обучающая модель показывает, как можно моделировать акустическую обработку ячеек в поперечном сечении микрофлюидного канала. Модель имитирует акустическое поле в микрофлюидном канале, используя интерфейс акустика давления, частотная область с граничным условием Thermoviscous Boundary Layer Impedance, чтобы включить эффекты вязких граничных слоев. Затем он вычисляет устойчивый течение жидкости, индуцируемый акустическими полями, используя акустическую потоковую, областьную и акустическую потоковую, граничную связную мультифизические связи. \n\n Траектории частиц в поперечном сечении моделируются с использованием интерфейса Particle Tracing for Fluid Flow. Траектории частиц регулируются балансом между силой вязкого сопротивления (из акустического потока) и силой акустического излучения. Эта модель показывает, как включить и смоделировать оба из них с помощью COMSOL Multiphysics. Наконец, модель демонстрирует, как моделировать нагрев из-за вязких потерь в акустическом поле.
modeldescr_aco/acoustic_treatment_boundary_calculator = Acoustic Treatment Boundary Calculator\n\nЭто приложение позволяет рассчитать коэффициент поглощения и поверхностное сопротивление звукового поглотителя для нормальных и случайных случаев.\n\n Конфигурация поглотителя является гибкой. Исследуемый образец может быть выбран в качестве пористого или твердого материала, и он может быть подкреплен воздушной полостью, пористой полостью или жестким состоянием. Толщина и глубина различных элементов также могут быть скорректированы по мере необходимости.\n\n Приложение содержит преобразование результатов из частотного в временный область с функцией Partial Fraction Fit. Это позволяет использовать расчетное поверхностное импедансное сопротивление в качестве граничного условия в симуляции временной области. Остатки и столбы, полученные из фитинга, могут быть сохранены и позже импортированы в отдельную модель для описания импеданса границы.
modeldescr_aco/acoustics_particulate_filter = Акустика аксисимметричной модели 2D Particulate-Filter-Like System\n\nThis 2D вычисляет потери акустической передачи через систему, подобную фильтру твердых частиц, используя интерфейс Poroelastic Waves. Пример соединяет акустику давления на входе и выходе с пороэластическими волнами в матрице фильтра.
modeldescr_aco/active_flame_validation = Active Flame Validation\n\nЭто руководство демонстрирует, как моделировать взаимодействие между акустическим полем и выделением тепла из пламени, используя функцию области <em>Flame Model</em>. Моделирование этого взаимодействия важно для понимания и прогнозирования нестабильных акустических режимов в газовых турбинах и реактивных двигателях. Нестабильные режимы известны как неустойчивости горения. Модель состоит из простой 2D-геометрии трубы и компактной области пламени. Простая геометрия позволяет проверить результаты моделирования на соответствие аналитическому решению.
modeldescr_aco/angle_beam_ndt = Ультразвуковые блоки пучка Angle Beam Nondestructive Testing\n\nAngle используются для неразрушающего контроля твердых объектов, таких как металлические трубы. Они особенно полезны для обнаружения недостатков в областях сварки и вокруг них, таких как поры, небольшие трещины, отсутствие синтеза и т. Д. Угловой луч NDT часто используется там, где тестирование прямого луча изо всех сил пытается найти дефекты, например, когда трещины вертикальные и тонкие и, следовательно, не обнаруживаются из-за небольшого количества отражения. Принцип работы углового луча NDT заключается в преобразовании продольной (сжатой) волны, посылаемой преобразователем, в преломленную сдвиговую (поперечную) волну в испытательном образце. Затем сдвиговая волна отражается недостатками в испытательном объекте.
modeldescr_aco/baffled_membrane = Сбитая с толку мембрана\n\nУзнайте, как использовать мультифизический интерфейс Acoustic–Shell Interaction, частотная область в этом учебном примере тонкой вибрирующей мембраны, установленной в бесконечной перегородке.\n\nдля этого примера требуется модуль «Механика конструкций».
modeldescr_aco/baffled_piston_radiation = Сбитая с толку Piston Radiation\n\nАксисимметричная модель жесткого поршня в бесконечной сумке используется для иллюстрации функции расчета внешнего поля модуля акустики. Результаты излучения, предоставленные программным обеспечением COMSOL Multiphysics®, сравниваются с аналитическими результатами для рисунка излучения по оси (в зависимости от расстояния), пространственной реакции дальнего поля и общей излучаемой мощности. Переход от ближнего поля к дальнему является плавным и непрерывным.
modeldescr_aco/bessel_panel = Панель Бесселя\n\nИсследуется звуковое поле от панели громкоговорителей с разными амплитудами и фазами. Динамики расположены таким образом, что распределение давления в дальней зоне напоминает распределение давления в одном динамике. В модели используется подход BEM–FEM для расчета излучения от идеализированной панели динамиков.
modeldescr_aco/bk_4134_microphone = Brüel & Kjær 4134 Конденсаторный микрофон\n\nЭто модель конденсаторного микрофона Brüel и Kjær 4134. Геометрия и параметры материала соответствуют реальному микрофону. Смоделированный уровень чувствительности сравнивается с измерениями, выполненными на реальном микрофоне, и показывает хорошее согласие. Также определяют деформацию мембраны, давление, скорость, электрическое поле. Наконец, при постобработке вычисляется минимальный уровень механо-теплового шума.
modeldescr_aco/car_cabin_acoustics = Car Cabin Acoustics — Frequency-Domain Analysis\n\nЭта модель анализирует низко- и среднечастотный диапазон производительности звуковой системы в салоне автомобиля. Кабина является типичным интерьером седана, то есть внутри жесткого семейного автомобиля. Модель изучает частотный отклик в месте расположения микрофонного массива и модальное поведение на низких частотах.\n\n Модель управляется громкоговорителями, расположенными в типичных местах интерьера автомобиля. Небольшое представление Thiele–Small (из электрических и механических областей) реализовано с интерфейсом Electrical Circuit для универсального седла и общего твитера. Они соединены с акустическим областьом, используя условие Lumped Speaker Boundary. Защитные крышки сетки также моделируются перед динамиками с использованием состояния внутренней перфорированной пластины.\n\nОбщие данные. Окна, приборная панель и двери моделируются с использованием постоянных коэффициентов поглощения, а кожаные сиденья представлены со сложным поверхностным импедансом. Обрезка крыши и пол ковра определяются с использованием опции Porous в граничном состоянии Impedance. Пористые материалы моделируются с помощью полуэмпирической модели Delany–Bazley–Miki, используя константы Qunli’s и Miki’s для описания соответственно пеноматериалов и волокон.\n\n Модель относительно легко решается в частотной области на стандартном настольном компьютере. Модель решается до 1 кГц с помощью прямого решателя. На более высоких частотах модель решается итеративным подходом, использующим сложный сдвинутый лаплаковский метод (CSL).\n\n В дополнение к модулю акустики для этой модели требуется модуль AC/DC и модуль импорта CAD.
modeldescr_aco/test_bench_car_interior = Test Bench Car Interior\n\nSound генерируется точечным источником, расположенным в стене этого стенда. Реакция уровня звукового давления в точке измерения исследуется для диапазона частот и четырех различных разрешений сетки.
modeldescr_aco/chamber_music_hall = Камерная музыка Hall\n\n В этой модели акустика Малого зала в Концертхаусе в Берлине имитируется с трассировкой лучей. Полное исследование помещения проводится в 1/3-октавных полосах с 10 парами исходно-приемных положений. Акустические параметры комнаты получены из расчетных импульсных реакций, и результаты сравниваются с данными измерений из круглого исследования Робина по акустическому моделированию комнаты.
modeldescr_aco/condenser_microphone = Axisymmetric Condenser Microphone\n\nЭтот пример простого аксисимметричного конденсаторного микрофона включает в себя всю соответствующую физику и определяет чувствительность для конкретной геометрии микрофона и параметров материала. Он решает полностью связанную конечно-элементную модель для акустическо-электрическо-механической системы, используя линейный решатель возмущений в частотной области. В этом примере используются термовязкая акустика, электростатика, электрическая схема и интерфейсы Мембраны. Примером является улучшенная версия аксисимметричного конденсаторного микрофона с моделью электрического сцепления в отношении настройки соединений, и он не использует сцепление аппроксимации.\n\n для примера требуется модуль акустики, модуль AC/DC и модуль механики конструкций.
modeldescr_aco/condenser_microphone_lumped = Axisymmetric Condenser Microphone with Electrical Lumping\n\nЭтот пример представляет собой простой аксисимметричный конденсаторный микрофон. Модель включает в себя всю соответствующую физику и определяет чувствительность конкретной геометрии микрофона и параметров материала. В примере используется сосредоточенное приближение для электрической задачи малого сигнала, но решается полная конечно-элементная модель для акустическо-механической системы. Спокойная (ноль-точечная) задача полностью решается с помощью электростатики и пользовательской мембранной модели. Это усовершенствованная модель, демонстрирующая разнообразие возможных связей в COMSOL Multiphysics.\n\n для этого требуется модуль акустики и модуль AC/DC.
modeldescr_aco/coupled_rooms = Coupled Rooms\n\nПоведение диффузного звукового поля в двух спаренных комнатах исследуется с помощью интерфейса акустического уравнения диффузии. Настройка модели основана на статье Сяна и других, Дж. Soc. Am., vol. 126, p. 1187, 2009. Модель определяет распределение уровня звукового давления, кривые энергетического распада и время реверберации для двух комнат и более. Исследование проводится в октавных полосах. Примером является использование как стационарного, собственного значения, так и зависящих от времени этапов исследования.
modeldescr_aco/coupled_vibrations = Вибрации диска, поддерживаемые заполненным воздухом цилиндром\n\nСобственный частотный анализ режимов вибрации кругового диска, поддерживаемого цилиндрической полостью, показывает, что вы не можете игнорировать связь между режимами изгиба диска и акустическими режимами в цилиндре. Результаты хорошо коррелируют с полуаналитическими и экспериментальными данными.\n\n Требуется модуль акустики и модуль механики конструкций.
modeldescr_aco/cylindrical_subwoofer = Cylindrical Subwoofer\n\n Вычисляется акустическое поле внутри и снаружи нисходящего сабвуфера. Полученные результаты включают уровни звукового давления ближнего и дальнего поля в качестве функций полярного угла.
modeldescr_aco/demultiplexer_shape_optimization = Оптимизация формы акустического демультиплексора\n\n Эта модель показывает, как можно использовать оптимизацию формы для проектирования акустического демультиплексора. Демультиплексор — это устройство для распределения данных, в этом случае он будет распределять акустическую энергию. Геометрия состоит из кругового области с одним входным портом и двумя выходными портами. Область имеет структуру звукового кристалла, он имеет 19 круглых полостей, которые деформируются таким образом, что энергия поступает в один выходной порт для одной полосы частот и в другой выходной порт для другой полосы частот.
modeldescr_aco/diesel_particulate_filter_transfer_matrix = Дизельные фильтры для твердых частиц (Diesel Particulate Filter Analysis Using a Acoustic Transfer Matrix\n\nDiesel Particulate Filter) предназначены для удаления и фильтрации сажи (дизельные частицы) из выхлопных газов автомобилей с дизельными двигателями. Фильтры в таких системах, как правило, структурированы с длинными, заполненными воздухом каналами, окруженными пористой средой, которая сохраняет сажу.\n\n Хотя основной функцией DPF является фильтрация сажи в потоке выхлопных газов, DPF также имеет свойства акустического демпфирования, которые относятся к глушителю. Фильтры обычно содержат несколько тысяч воздушных каналов, что может сделать индивидуальное моделирование всех каналов вычислительно дорогим.\n\n В этой модели моделируется акустика в DPF. Способ снижения сложности расчётов представлен получением матрицы переноса самого фильтра. Передаточная матрица соединена с окружающими полостями для получения полной потери передачи (TL).
modeldescr_aco/diffuser_schroeder_2d = Диффузор Шредера в 2D\n\n В этой модели вычисляется коэффициент рассеяния диффузора Шредера. Этот коэффициент затем может использоваться в качестве входных данных для выражения граничных условий в типичном акустическом моделировании помещения. Эффект периодичности также исследуется путем изучения ответов от различных устройств одного и того же диффузора.
modeldescr_aco/doppler_shift = Doppler Shift\n\n Этот пример имитирует акустический эффект Доплера, помещая стационарный источник звука в постоянный течение жидкости. Частотный сдвиг визуализируется, и вычисляется акустическая интенсивность, измеренная наблюдателем, движущимся с потоком.
modeldescr_aco/duct_right_angled_bend = Duct with Right-Angled Bend\n\n В этом руководстве анализируется акустическое поведение протока или волновода с прямоугольным изгибом. Модель использует граничные условия порта на входе и выходе. Порты могут захватывать и обрабатывать нераспространяющие режимы в волноводах, расширяя анализ выше первой частоты среза. Определены потери передачи и коэффициенты рассеяния системы.
modeldescr_aco/eigenmodes_air_bubble = Eigenmodes in Air Bubble in Surface Tension\n\n В этом руководстве моделируются собственные моды и собственные частоты воздушного пузыря в воде и сравниваются с аналитическими решениями. Эффекты поверхностного натяжения включены и позволяют моделировать как пульсирующий режим, так и поверхностные режимы пузыря. Наконец, изучается влияние вязкости окружающей жидкости на собственные частоты.
modeldescr_aco/eigenmodes_in_muffler = Eigenmodes in a Muffler\n\n Этот пример состоит из 2D-анализа режимов распространения в камере глушителя, используемого в модели Абсорбтивного глушителя.
modeldescr_aco/eigenmodes_in_muffler_elastic = Eigenmodes in a Muffler with Elastic Walls\n\n Этот пример состоит из 2D-анализа режимов распространения в камере глушителя с тонкими упругими стенками. Это расширение Eigenmodes в модели Muffler.
modeldescr_aco/electric_motor_noise_pmsm = Electric Motor Noise: Permanent Magnet Synchronous Motor\n\nЭта модель анализирует шум, создаваемый электродвигателем во время его работы на разных скоростях вращения. Анализируемый тип электродвигателя, синхронный двигатель с постоянным магнитом (PMSM) использует постоянные магниты в роторе и переменный ток частоты, проходящий через статор, для генерации крутящего момента. Электромагнитные силы, генерируемые во время его работы, генерируют вибрации не только на частоте возбуждения, но и на более высоких частотах или гармониках. Переходный анализ используется для определения электромагнитных сил во временной области. Преобразование Фурье используется для определения вкладов в частотную область. Вычисляется виброакустическая реакция корпуса PMSM и его акустическое излучение. Создан график Кэмпбелла, показывающий основные гармоники, способствующие акустической реакции ПМСМ на различных скоростях вращения.
modeldescr_aco/flow_duct = Поток Duct\n\n Анализируется акустическое поле в модели осево-симметричного линейного воздуховодного двигателя на основе модальной передачи звука. Источник генерируется одним способом возбуждения на границе. Источники и неотражающие условия применяются с использованием граничных условий порта. Анализ модели выполняется в три этапа, сначала вычисляя фоновый средний поток (сжимаемый поток ирротационного потенциала), затем анализируя распространяющиеся режимы с анализом пограничного режима и, наконец, решая акустическое поле в протоке с линеаризованными уравнениями потенциального потока. Результаты представлены для ситуаций с фоновым потоком и без него, а также для случаев твердых и облицованных стенок протоков.
modeldescr_aco/flow_meter_piezoelectric_transducers = Ультразвуковой расходомер с пьезоэлектрическими преобразователями\n\nУльтразвуковые расходомеры определяют скорость жидкости, протекающей через трубу, посылая ультразвуковой сигнал через поток под углом перекоса. Когда нет потока, время передачи между передатчиком и приемником одинаково для сигналов, посылаемых в направлении вверх и вниз по течению. В противном случае волна, движущаяся вниз по течению, движется быстрее, чем та, которая движется вверх по течению, что может использоватьсяо для определения потока. Во многих случаях пьезоэлектрические преобразователи используются для отправки и приема ультразвуковой волны.\n\n Это руководство показывает, как имитировать ультразвуковой расходомер с пьезоэлектрическими преобразователями в присутствии потока. Модель основана на прерывистом методе Галеркина (dG), который хорошо подходит для акустически больших переходных задач. упругие волны, явная по времени и уравнение конвективной волны, явная по времени физические интерфейсы моделируют распространение волн в твердых и жидких областях соответственно. Они связаны через Pair граница конвективной акустико-конструкционной связи, функцию мультифизики явная по времени. Пьезоэлектрические преобразователи моделируются с помощью функции мультифизики Пьезоэлектричества явная по времени, которая соединяет эластичные волны, явная по времени и интерфейсы физики электростатики. Модель использует преимущества сборки геометрии и несоответствующей сетки.
modeldescr_aco/fuel_tank_vibration = Топливный бак Vibration\n\nЭта модель анализирует частотную реакцию топливного бака, частично заполненного жидкостью. Танк подается на вертикальное ускорение.\n\n Рассматриваются два метода моделирования, представляющие жидкость: традиционный метод размазывания массы жидкости через смоченную поверхность топливного бака и мультифизический подход, при котором акустическое давление внутри жидкости специально моделируется.\n\n Два метода показывают значительные различия, подчеркивая, насколько важно точно фиксировать виброакустическое поведение при прогнозировании напряжения или усталости на заполненных жидкостью полостях.
modeldescr_aco/gaussian_explosion = Transient Gaussian Explosion\n\n Этот пример представляет и демонстрирует некоторые важные концепции, которые следует учитывать при решении проблем переходной акустики. В частности, в примере рассматривается взаимосвязь между частотным содержанием в возбуждении, разрешением сетки и длиной шага времени.
modeldescr_aco/gaussian_pulse_absorbing_layers = Gaussian Pulse in 2D Uniform Flow: уравнение конвективной волны and Absorbing Layers\n\nЭто небольшое учебное пособие имитирует стандартную тестовую и эталонную модель для неотражающих условий и слоев губок для линеаризованных Эйлер-подобных систем. Он включает в себя распространение преходящего гауссовского импульса в 2D равномерном потоке. Интерфейс уравнение конвективной волны, явная по времени решает линеаризованные уравнения Эйлера с адиабатическим уравнением состояния, и интерфейс использует функцию поглощающих слоев для моделирования бесконечных областей.\n\nАкустический импульс генерируется начальным гауссовским распределением в центре вычислительной области. Пульс распространяется в равномерном потоке с высоким числом Маха. Аналитическое решение проблемы используется для проверки решения и показывает очень хорошее согласие.\n\n Модель также иллюстрирует, как настроить и использовать поглощающие слои. Используя поглощающие слои, можно уменьшить поглощающие волны до 1/1000 амплитуды падающего поля.
modeldescr_aco/gaussian_pulse_perfectly_matched_layers = Gaussian Pulse Absorption by Perfectly Matched Layers: акустика давления, Transient\n\nЭто руководство имитирует стандартную тестовую и эталонную модель для идеально подобранных слоев (PML) в качестве поглощающих граничных условий во временной области. Он включает в себя распространение преходящего гауссовского импульса без потока. Интерфейс <em>акустика давления, Transient</em> используется вместе с PML для уменьшения вычислительного области и подавления отражений от искусственных границ.\n\nАкустический импульс генерируется начальным гауссовским распределением в центре вычислительного области. Аналитическое решение проблемы используется для проверки решения, показывая очень хорошее согласие.
modeldescr_aco/gear_train_noise = Шумовое излучение по составу Gear Train\n\n Этот пример иллюстрирует моделирование шумового излучения от корпуса зубчатого поезда. Проводится временный анализ для расчета вибраций корпуса для заданной скорости вала водителя. Полученное нормальное ускорение корпуса преобразуется в частотную область и используется в качестве источника шума. Затем выполняется анализ акустики на выбранной частоте, и вычисляются уровни звукового давления в ближнем, дальнем и внешнем полях.
modeldescr_aco/generic_711_coupler = Generic 711 Coupler — A Occluded Ear-Canal Simulator\n\n Это модель универсального симулятора ушного канала (или соединителя). Реальные соединители используются для моделирования акустики стандартизированного человеческого ушного канала и могут использоваться для измерений на всевозможных устройствах. Они широко используются в индустрии слуховых аппаратов, а также в качестве ушных каналов на всевозможных акустических манекенах для записи 3D-звука. Результаты модели сравниваются со стандартными кривыми МЭК и с результатами, полученными с помощью модели акустики чистого давления.
modeldescr_aco/ground_motion_seismic_event = Наземное движение после сейсмического события: Рассеяние Малой Горы\n\n В этом учебном примере распространение упругих волн в земле после сейсмического события моделируется с использованием 2D-модели. Влияние топологии поверхности земли на распространение волн иллюстрируется при изменении идеального полупространства с наличием небольшой горы. Модель является вариацией проблемы Лэмба. Распространение упругих волн моделируется с использованием интерфейса физики упругие волны, явная по времени, а модель фиксирует распространение и рассеяние волн давления, волн сдвига, волн Рэлея и волн фон Шмидта.
modeldescr_aco/headphone_artificial_ear = Наушники на искусственном Ear\n\n В этом руководстве наушники моделируются в типичной настройке измерения. Поскольку наушники тесно связаны с ухом, не является репрезентативным измерять их чувствительность в акустическом свободном поле в классической установке, используемой для громкоговорителей. Измерение требует использования искусственных голов и ушей для точного представления условий использования. Эта модель показывает соединение окружных наушников с общим искусственным ухом.
modeldescr_aco/head_torso_hrtf = Head and Torso HRTF Computation\n\nЭта обучающая модель показывает, как импортировать 3D-сканированную геометрию человеческой головы и туловища и вычислять связанную с головкой функцию передачи (HRTF). Сканирование импортируется в виде файла.stl и преобразуется в геометрию COMSOL. HRTF вычисляется с использованием принципа взаимности, расположения источника на входе в ушной канал, а акустика моделируется с помощью интерфейса акустика давления, граничные элементы. Смоделированные результаты сравниваются с измеренными данными фактического субъекта и показывают хорошее согласие.\n\n Сканированная геометрия и измеренные данные предоставлены командой MedAk в Институте технической акустики, RWTH, Аахен, Германия.
modeldescr_aco/helmholtz_resonator_solvers = Helmholtz Resonator Analyzed with Different частотная область решательs\n\nЭтот пример имитирует частотный размах универсального резонатора Helmholtz — классической резонирующей схемы акустики с известным теоретическим решением —, чтобы проиллюстрировать, как использовать различные решатели в частотной области. В дополнение к стационарному решателю в примере также используется решатель оценки асимптотической формы волны и стационарный решатель частотного области-модаля, которые реконструируют результат на основе расширений вокруг нескольких точных решений в диапазоне размаха.
modeldescr_aco/helmholtz_resonator_with_flow = Резонатор Гельмгольца с потоком: взаимодействие потока и акустики\n\nHelmholtz резонаторы используются в выхлопных системах, так как они могут ослаблять определенную узкую полосу частот. Наличие потока в системе изменяет акустические свойства резонатора и потери передачи подсистемы. В этой учебной модели резонатор Гельмгольца расположен как боковая ветвь к основному каналу. Потери передачи через основной канал исследуются при введении потока.\n\n Средний поток вычисляется с помощью модели турбулентности SST для Ma = 0,05 и Ma = 0,1. Затем проблема акустики решается с помощью интерфейса <em>Linearized Navier–Stokes, частотная область (LNS)</em>. Средняя скорость потока, давление и турбулентная вязкость связаны с моделью LNS. Результаты сравниваются с измерениями, найденными в газете, а амплитуды и резонансные местоположения показывают хорошее согласие с данными измерений (как видно на графике 1D). Баланс между эффектами затухания и потока должен быть тщательно смоделирован, чтобы резонансное местоположение было правильным.
modeldescr_aco/hifu_tissue_sample = Высокоинтенсивное сфокусированное ультразвуковое исследование (HIFU) Распространение через ткань Phantom\n\nЭто учебное пособие изучает распространение высокоинтенсивного сфокусированного ультразвука (HIFU) через тканевый фантом. HIFU используется во многих различных биомедицинских приложениях, таких как термическая абляция опухолей, транскраниальная хирургия HIFU, литотрипсия ударной волны и т. Д. Преобразователь HIFU обычно содержит фокусирующую линзу, которая заставляет излучаемый ультразвуковой сигнал достигать максимальной интенсивности в фокусной зоне. Когда излучаемый сигнал имеет достаточно высокую амплитуду, нелинейные эффекты становятся значительными, что приводит к генерации гармоник более высокого порядка во время распространения сигнала.\n\n Нелинейное распространение сигнала HIFU моделируется с использованием интерфейса физики нелинейной акустики давления явная по времени. В этом примере амплитуды сигнала на месте источника достаточно для генерации гармоник более высокого порядка, но недостаточно для образования ударов. Излучаемый сигнал представляет собой импульс всплеска тона, который занимает только ограниченную часть вычислительной области на своем пути. Адаптивное сетчатое усовершенствование используется для автоматического стирания после распространения сигнала. Сетка достаточно тонкая, чтобы разрешать гармоники более высокого порядка там, где это необходимо.
modeldescr_aco/hollow_cylinder = Hollow Cylinder\n\nВ этом примере взаимодействия акустической–структуры волны давления генерируются из точечного источника или источника линии внутри заполненного водой металлического цилиндра с крышкой. Звук распространяется через цилиндр и окружающую воду.
modeldescr_aco/horn_shape_optimization = Оптимизация формы плосковолнового режима Horn\n9000000000001A подает аксисимметричный рог, излучающий из бесконечной сумки в открытое полупространство. Предполагается, что радиус питающего волновода фиксирован, а также глубина рога и размер отверстия, где рожок прикреплен к перегородке. Изменяя кривизну первоначально конической поверхности рога, его направленность и сопротивление могут быть изменены.\n\n Эта модель показывает, как применять оптимизацию формы границы к аксисимметричному рогу. Ради простоты уровень звукового давления в дальнем поле максимизируется для узкой полосы частот и в одном направлении. Основное внимание уделяется процедуре оптимизации, которая включает в себя выбор целевой функции и настроек решателя оптимизации.\n\n Результаты этого анализа показывают, что, изменяя форму рога в пределах выбранной параметризации, уровень звукового давления на оси может быть повышен примерно на 1 дБ по сравнению с простым конусом. Оптимальная форма по оси SPL, однако, приводит к глубоким нежелательным минимумам в других направлениях.
modeldescr_aco/isotropic_anisotropic_sample = Изотропно-анизотропный образец: Пропаганда эластичных волн \n\n В этом 2D руководстве тестовый образец состоит с одной стороны изотропного материала и с другой стороны гетерогенного анизотропного материала (поперечный анизотропный кристалл цинка). Упругие волны в образце возбуждаются точечной силой. Модель решена с помощью интерфейса физики упругие волны, явная по времени.
modeldescr_aco/jet_pipe = Jet Pipe\n\n Вычисляется излучение шума вентилятора от кольцевого протока турбовентиляторного аэродвигателя. Между струйным потоком и окружающим воздухом, движущимся с меньшей скоростью, появляется вихревой лист и воздействует на акустическое поле.
modeldescr_aco/lamb_waves_ndt_plate = Генерация волн ягненка для неразрушающего контроля пластины Specimens\n\nNumerical моделирование волн ягненка, которые относятся к управляемым волнам, имеет важное значение для анализа и проектирования систем структурного мониторинга здоровья (SHM) для ультразвукового тестирования на большие расстояния. Конструкция системы ШМ на основе управляемых волн состоит из двух основных частей. Сначала необходимо знать кривые дисперсии для режимов, которые могут распространяться в волноводе определенного сечения. Во-вторых, распространение выбранного режима через волновод и его отражение от возможной неровности в области поперечного сечения (перелом или дефект коррозии) анализируется во временной области.\n\n Этот учебник изучает распространение управляемых волн в стальной пластине с конечной шириной и толщиной. Исследование Mode Analysis для физического интерфейса механика твёрдого тела, применяемого на 2D сечении пластины, вычисляет режимы распространения. Этот подход также иногда называют методом полуаналитического конечного элемента (SAFE). Угловой луч клина возбуждает желаемый режим в пластине с недостатком, который моделируется в 3D с использованием интерфейса физики Elastic Wave, явная по времени.
modeldescr_aco/loudspeaker_driver = Драйвер громкоговорителя — Анализ в частотной области\n\nВ этом примере показано, как смоделировать динамик громкоговорителя динамического типа конуса, обычного для низких и средних частот. Анализ проводится в частотной области и, таким образом, представляет линейное поведение драйвера. Анализ модели включает в себя общий электрический импеданс и уровень звукового давления по оси при номинальном напряжении возбуждения в зависимости от частоты. Пространственные характеристики водителя изображены на графике направленности.\n\nУчебная модель настраивается с использованием комбинации интерфейса магнитные поля и мультифизического интерфейса Acoustic–Structure Interaction. Первый анализ решает только электромагнитную часть задачи, когда водитель находится в состоянии покоя. Отсюда можно извлечь и экспортировать для дальнейшего использования коэффициент движущей силы и сопротивление заблокированной звуковой катушки. Следующий анализ будет посвящен полной модели, включая соответствующие мультифизические взаимодействия, такие как акустическое –конструкционное взаимодействие и электромагнитную силу, действующую на звуковую катушку. Это исследование также включает в себя тепловое и вязкостное демпфирование в воздушном зазоре между звуковой катушкой и полюсными наконечниками. Также проводится анализ собственных частот для идентификации мод конуса и частот распада.
modeldescr_aco/loudspeaker_driver_3d = Loudspeaker Driver in 3D — Frequency-Domain Analysis\n\nЭто руководство показывает, как лучше всего решать полные 3D виброэлектроакустические мультифизические модели громкоговорителей. Модель основана на 3D представлении существующей 2D аксисимметричной модели библиотеки приложений loudspeaker driver. Физическая установка в этой 3D-версии практически такая же, как и в 2D-аксисимметричной версии. В 3D-модели для анализа частотной области выбирается итеративное предложение решателя. Это предложение гарантирует, что связанная акустическая, структурная и электромагнитная проблема будет решена эффективно.
modeldescr_aco/loudspeaker_driver_transient = Loudspeaker Driver — Transient Analysis\n\nЭта модель представляет полный переходный анализ драйвера громкоговорителя, который позволяет моделировать нелинейные эффекты. Он расширяет линейный анализ частотной области, выполненный в учебной модели Loudspeaker Driver.\n\n Анализ учитывает нелинейное поведение мягкого железа в магнитной системе, геометрические нелинейности в структурах и нелинейные эффекты из-за изменения топологии, когда голосовая катушка перемещается в и из магнитного зазора. Модель использует функцию движущейся сетки и автоматическое перемешивание для захвата изменений топологии и движения голосовой катушки.\n\n Выход включает в себя полное гармоническое искажение (THD) и динамическую кривую BL. Модель также описывает, как рассчитать искажение интермодуляции (IMD).\n\n Модель требует модуля акустики и модуля AC/DC.
modeldescr_aco/loudspeaker_spider_optimization = Громкоговоритель Spider Optimization\n\n Подвеска громкоговорителя предназначена для удержания конуса и пылевой шапки на месте и предотвращения любого качающегося движения голосовой катушки. На низких частотах, где существенно смещение конуса и пылевого колпачка, жесткость подвески изменяется по ходу голосовой катушки. Эта вариация, или нелинейность, может играть значительную роль в искажении, создаваемом спикером.\n\n Данная модель демонстрирует применение оптимизации формы к конструкции паука, которая составляет часть подвески громкоговорителя. Изменяя форму паука, можно создать систему подвески, которая ведет себя линейно (постоянная жесткость) во всем диапазоне движения голосовой катушки.
modeldescr_aco/loudspeaker_suspension = Loudspeaker Suspension\n\nВ этом примере сопротивление и соответствие подвески в модели Loudspeaker Driver вычисляются с использованием чисто механического анализа.\n\n для этого требуется модуль акустики и модуль AC/DC.
modeldescr_aco/lumped_loudspeaker_driver = Lumped Loudspeaker Driver\n\nЭто модель громкоговорителя с движущейся катушкой, в которой аналогия с объединёнными параметрами представляет поведение электрических и механических компонентов динамика. Параметры Thiele–Small (параметры малых сигналов) служат вводом в слитую модель, которая представлена интерфейсом Electric Circuit. Связанная модель соединена с 2D аксисимметричной моделью акустики давления, описывающей окружающую воздушную область. Выход из модели включает, среди прочего, чувствительность динамика, импеданс и излучаемую акустическую мощность. Результаты сравниваются с аналитическим решением, основанным на приближении плоского поршня.
modeldescr_aco/lumped_loudspeaker_driver_mechanical = Драйвер громкоговорителя с сосредоточенными параметрами, использующий сосредоточенную механическую систему\n\nЭто модель громкоговорителя с подвижной катушкой, в которой аналогия с сосредоточенными параметрами представляет поведение электрических и механических компонентов громкоговорителя. Параметры Thiele–Small (параметры малого сигнала) служат входными данными для модели с сосредоточенными параметрами, которая представлена ​​интерфейсом электрической цепи. Модель с сосредоточенными параметрами связана с двумерной осесимметричной моделью акустики давления, описывающей окружающую воздушную среду. Выходные данные модели включают, среди прочего, импеданс и излучаемую акустическую мощность.\n\nВ этой модели механические компоненты динамика, такие как движущаяся масса, податливость подвески и механические потери подвески, моделируются с использованием интерфейса сосредоточенной механической системы.
modeldescr_aco/lumped_loudspeaker_driver_transient = Lumped Loudspeaker Driver Transient Analysis with Nonlinear Large-Signal Parameters\n\nЭта модель показывает, как включить нелинейное (большой сигнал) поведение определенных компонентов в упрощенный анализ громкоговорителей. Механическая и электрическая система моделируется с использованием эквивалентной электрической цепи. CMS(x) и коэффициент силы BL(x) являются здесь нелинейными функциями расположения динамика. Кроме того, механическое демпфирование RMS(v) является функцией скорости динамика. Нелинейные эффекты, связанные с комплаенсом и коэффициентом BL, особенно важны на более низких частотах. Это также место, где подход к моделированию имеет свое основное применение.\n\n Модель использует встроенную связь между внутренней границей громкоговорителя (или границей громкоговорителя) и интерфейсом электрической схемы вместе со встроенными переменными для местоположения громкоговорителя x и скорости v.
modeldescr_aco/lumped_receiver_04cc = Приемник Lumped Receiver Connected to Test Setup with a 0.4-cc Coupler\n\n В этом примере приемник Knowles ED23146 (миниатюрный громкоговоритель) подключен к испытательной установке, состоящей из трубки из плесени диаметром 50 мм (1 мм) и так называемого 0.4-cc соединителя. Приемник моделируется с использованием сети пряностей и подключен к области конечных элементов на входе трубки. Реакция на измерительный микрофон в соединителе, а также электрический входной импеданс на приемник сравниваются с измерениями. Потери в длинной узкой трубе включаются с использованием функции акустики узкой области в интерфейсе акустики давления, физики частотных областей.\n\n для этого требуется модуль акустики и модуль AC/DC.
modeldescr_aco/lumped_receiver_vibroacoustic = Связанный приемник с полным Vibroacoustic Coupling\n\n Когда моделирование участвует в разработке мобильных устройств, бытовой электроники, слуховых аппаратов или гарнитур, необходимо учитывать, как преобразователи взаимодействуют с остальной частью системы. Здесь мы покажем анализ взаимодействия между установкой виброизоляции и миниатюрным преобразователем слухового аппарата (уравновешенный арматурный приемник Knowles TEC-30033) с использованием объединенного представления преобразователя. Связанная модель упрощается как эквивалентная электроакустическая схема. Вибрационные и акустические характеристики слитой модели затем соединяются с мультифизической моделью системы вибрационной изоляции для достижения полного системного анализа.\n\n Смоделированная система представляет собой типичную тестовую установку, которая состоит из силиконовой трубки, которая прикреплена к 2-кубовому соединителю, общей полости, используемой в качестве акустической нагрузки.\n\n Механические силы внутри сети пробуждаются и применяются в качестве жестких нагрузок на приемник. Выходное акустическое давление и зондированное движение жесткого тела приемника соединены с конечной элементной (FEM) моделью крепления силиконовых трубок и акустическим соединителем.\n\n Смоделированный акустический отклик, измеренный в соединителе, и вибрационные характеристики, полученные в модели, сравниваются с измерениями. Акустический отклик получается из соединительного микрофона и вибрационных характеристик лазерных виброметров.\n\n Эта модель требует модуля акустики, модуля механики конструкций и модуля AC / DC.
modeldescr_aco/mechanical_multiport_system = Механическая мультипортовая система: распространение эластичных волн в малой алюминиевой пластине\n\n В этом руководстве анализируется вибрационное поведение небольшой алюминиевой пластины с четырьмя волноводными структурами. Это пример структурного компонента, расположенного в устройстве, где распространяются эластичные волны, такие как интеллектуальный динамик, электродвигатель или устройство MEMS. Пластина может рассматриваться как механическая многопортовая система. Модель использует состояние границы порта на входе/выходе волноводных структур. Условия порта последовательно захватывают и обрабатывают различные распространяющиеся упругие режимы, такие как продольные, поперечные и торсионные волны. Передача и отражение различных режимов характеризуется через матрицу рассеяния системы, которая вычисляется автоматически. Это позволяет очень подробно охарактеризовать вибрационное поведение компонента, например, для последующего использования в системном моделировании.
modeldescr_aco/mems_microphone_slip_wall = Микрофон MEMS с Slip Wall\n\n Это модель микрофона MEMS, решенная в частотной области, включая эффекты пренапряжения постоянного тока. Модель настроена с использованием мультифизического интерфейса электромеханики, термовязкой акустики и акустики давления. Микрофон состоит из перфорированной пластины и предварительно напряженной мембраны. Модель использует граничное условие Slip Wall для включения эффектов высоких чисел Кнудсена в микрофон MEMS. Скорость скольжения может быть важна для потока через отверстия в микроперфорированной пластине (MPP) и для сжатия потока между перфорированной пластиной и мембраной.
modeldescr_aco/nonlinear_acoustics_westervelt_1d = Нелинейная акустика — Моделирование уравнения 1D Westervelt \n\n Этот пример показывает, как моделировать временное нелинейное распространение конечных амплитудных акустических волн в жидкостях с использованием модуля акустики. Интерфейс <em>акустика давления, Transient</em> решает уравнение Вестервельта, которое является приближением к полному нелинейному волновому уравнению 2-го порядка, когда кумулятивные нелинейные эффекты доминируют над локальными нелинейными эффектами. Пример моделирует конечную амплитудную волну, распространяющуюся в 1D на расстояние, намного большее, чем расстояние ударного образования. Вычисленное численное решение сравнивается с аналитическими решениями, доступными до и после ударообразования.
modeldescr_aco/nonlinear_cylindrical_wave = Нелинейное распространение цилиндрической волны — Verification Model\n\n Этот пример модели показывает, как моделировать нелинейное распространение цилиндрической волны с использованием нелинейной акустики давления, интерфейса физики времени, доступного в модуле акустики COMSOL Multiphysics. Интерфейс реализует систему нелинейных акустических уравнений в виде закона гиперболического сохранения с использованием метода дискретных конечных элементов Галеркина.\n\n Этот пример анализирует распространение волны в среде без потерь на расстояниях больше, чем расстояние ударного образования. Таким образом, в учебнике особое внимание уделяется методам, необходимым для лечения разрывов раствора, таких как ограничители, дискретизация и настройки решателя. Численное решение сравнивают с аналитическим решением, действительным на расстояниях до ударного образования.
modeldescr_aco/nonlinear_slit_resonator = Нелинейный щелевой резонатор\n\nВо многих случаях акустические волны взаимодействуют с поверхностями, имеющими небольшие перфорации или щели. Они могут находиться в системах глушителей; в звукоизоляционных конструкциях; во вкладышах для шумоглушения реактивных двигателей; или в решётках и сетках перед, например, миниатюрными динамиками в мобильных устройствах.\n\nПри уровнях звукового давления от среднего до высокого локальная скорость частиц в узкой области перфората или щели может быть настолько большой, что линейные предположения акустики нарушаются. Обычно образование вихрей происходит вблизи этой области. Это приводит к нелинейным потерям, а в аудиоприложениях – к нелинейным искажениям звукового сигнала. Нелинейные эффекты иногда включаются через полуэмпирические параметры в аналитические модели передаточного импеданса для перфораторов.\n\nВ этом учебном примере узкая щель расположена перед объёмом резонатора. Модель объединяет акустику давления, переходный процесс и акустику термовязкости, переходный процесс для моделирования нелинейной переходной задачи. Сложные нелинейные потери, связанные с образованием вихрей и вязкой диссипацией, фиксируются с помощью функции нелинейных термовязкостных акустических вкладов. Падающее акустическое поле имеет амплитуду, соответствующую уровню звукового давления 155 дБ.
modeldescr_aco/nonlinear_transfer_impedance = Нелинейный передаточный импеданс конического отверстия\n\nЭта модель анализирует нелинейный передаточный импеданс конического отверстия, которое может быть частью перфорированной или микроперфорированной пластины (MPP). Анализ проводится для различной степени сужения перфората и для диапазона частот.\n\nЛинейный анализ настраивается в частотной области с использованием интерфейса <em>Thermoviscous Acoustics, частотная область</em>. Нелинейный анализ проводится во временной области с использованием интерфейса <em>Thermoviscous Acoustics, Transient</em> и интерфейса <em>Nonlinear Thermoviscous Acoustics Вклады</em> функция. Линейный анализ также проводится во временной области для выбранных частот.\n\nРезультаты сравниваются с аналитическими и полуаналитическими моделями в простой конфигурации цилиндрической перфорации (круглое отверстие).
modeldescr_aco/one_family_house = One-Family House Acoustics\n\nЭта модель показывает применение интерфейса физики акустического диффузионного уравнения. Проанализирована акустика в двухэтажном односемейном доме, состоящем из 10 комнат.\n\n Стабильный уровень звукового давления и распределение плотности энергии анализируются для монопольного источника, расположенного в гостиной. Время реверберации T60 различных спаренных комнат затем изучается с использованием собственного решателя значений. Преходящий распад энергии также обнаруживается с помощью зависящего от времени исследования.\n\nFurthermore, уровень звукового давления, излучаемого за пределами дома, определяется с помощью ручной связи с интерфейсом Ray Acoustics.
modeldescr_aco/open_pipe = Open Pipe\n\n Если вы планируете настроить большую, сложную модель акустики, может быть полезно разбить ее на более мелкие, более простые задачи. В этом примере вибрирующий поршень устанавливается внутри одного конца цилиндрической трубы, в то время как другой конец открыт. В примере сравниваются результаты использования указанного граничного условия импеданса на выходе трубы с результатами с использованием идеально подобранного состояния слоя для воздуха за пределами поршня. Это сравнение делается как для трубы, установленной в неподвижной (фланговая труба), так и для нефланговой трубы.
modeldescr_aco/organ_pipe_design = Organ Pipe Design\n\nКонструкция органной трубы зависит от радиуса и длины трубы, материала и толщины стенки.\n\nВ этом примере найдена резонансная частота четверти волны трубы и определен частотный отклик, включая гармоники. В версии приложения этой модели можно воспроизводить и слушать звук, создаваемый заданным дизайном, иллюстрируя некоторые дополнительные функциональные возможности Application Builder.
modeldescr_aco/ow_microspeaker = OW Microspeaker: Simulation and Correlation with Measurements\n\n Эта модель анализирует электромагнитные, механические и акустические характеристики динамика OWS-1943T-8CP. Помимо определенных деталей, геометрия, свойства материала и измерения защищены авторским правом Ole Wolff.\n\n Начиная с геометрии динамика, аксисимметричная электромагнитная модель используется для характеристики частотно-зависимой реакции голосовой катушки и электромагнитной цепи. Этот ответ включен в 3D-модель, где анализируется виброакустический ответ говорящего и сравнивается с измерениями.\n\nOle Вольф признан во всем мире за высококачественные преобразователи, а также уникальные возможности дизайна, которые поставляются широкому кругу компаний первого уровня в отрасли бытовой электроники.
modeldescr_aco/panel_speaker = Panel Speaker\n\nВ тесных местах, где трудно уместить сборку голосовой катушки стандартного динамика, пьезоэлектрически возбужденный динамик панели может быть привлекательной альтернативой. В этом примере рассматриваются некоторые возможные аспекты использования дисплея мобильного телефона в качестве динамика.
modeldescr_aco/perforated_muffler = Muffler with Perforates\n\n Акустика автомобильного глушителя с перфорированными перегородками и трубами анализируется для диапазона частот. Результаты моделирования потери передачи хорошо согласуются с экспериментальными данными.
modeldescr_aco/piezoacoustic_spherical = Сферический пьезоакустический преобразователь\n\nЭто руководство показывает, как моделировать акустические волны, генерируемые в воздухе полым сферическим пьезоэлектрическим материалом. Прибор поляризован по радиальному направлению сферы, требуя определения новой локальной системы координат. Поскольку направление полирования придает анизотропию реакции материала, важно правильно включить ее в симуляцию.
modeldescr_aco/piezoacoustic_transducer = Пьезоакустический преобразователь\n9000000000001A пьезоэлектрический динамик, в просторечии известный как пьезобуфер, представляет собой тип пьезоэлектрического преобразователя, который использует пьезоэлектрический кристалл, прикрепленный к мембране. Движение кристалла вызывает изгиб мембраны и, таким образом, генерирует волны акустического давления. Эта модель имитирует аксисимметричный зуммер, предназначенный для ультразвуковых применений. Этот тип преобразователей обычно приводится в действие на резонансной частоте, где электрическая энергия эффективно преобразуется в излучаемый звук. Частотный размах используется, чтобы помочь идентифицировать резонансную частоту. Характеристики излучения преобразователя анализируются с точки зрения, например, лучевой ширины.
modeldescr_aco/piezo_mems_speaker = Piezoelectric MEMS Speaker\n\nЭта модель анализирует пьезоэлектрическую микроэлектромеханическую систему (MEMS) динамика. Динамик, состоящий из четырех треугольных мембран, использует слой свинцового цирконатного титаната (PZT) с двумя электродами поверх кремниевого слоя в качестве приводов. Треугольные мембраны разделены узкими зазорами воздуха, которые позволяют более крупные отклонения мембраны. Термовискусные потери в промежутках ограничивают поток воздуха, что позволяет четырем приводам вести себя акустически как одна мембрана.
modeldescr_aco/plate_with_ribs = Рассеивание с тарелки с Ribs\n\nЭта эталонная проблема из набора NAFEMS Бенчмарки для излучения и рассеяния звука модели рассеяния плоской волны от тонкой твердой пластины с парой пересекающихся ребер, сваренных сверху. Результаты сравниваются с опубликованными справочными решениями.
modeldescr_aco/porous_absorber = Porous Absorber\n\nЭто 2D-модель пористого звукопоглощающего стенового материала. Коэффициент поглощения альфа и удельное сопротивление поверхности Z определяются как функции частоты для двух разных углов падения. В примере используются граничные условия периодического флокета.
modeldescr_aco/pressure_reciprocity_calibration_coupler = Калибровочный суплер взаимного давления с детальными свойствами влажного воздуха \n\n При калибровке микрофонов для измерения высокой точности используется метод калибровки по взаимному давлению. Во время калибровки два микрофона соединяются на каждом конце закрытой цилиндрической полости. для процедуры калибровки важно понимать акустическое поле внутри такой полости, включая все термовязкие акустические эффекты, например, акустические граничные слои на более высоких частотах и переход к изотермическому поведению на более низких частотах.\n\n Эта модель устанавливает простую модель калибровочного соединителя и обсуждает важные соображения при выполнении высокоточного моделирования абсолютных значений. Результаты модели включают импеданс акустического переноса, используемый для калибровки взаимности, и давление в соединителе. Результаты сравниваются с аналитическими прогнозами.\n\n Модель также включает точную оценку свойств материала с использованием функции термодинамики в COMSOL Multiphysics. Это позволяет настроить влажный материал воздуха, который зависит от давления окружающей среды, температуры и относительной влажности.
modeldescr_aco/probe_tube_microphone = Зондовый ламповый микрофон\n\nЧасто невозможно вставить микрофон непосредственно в измеряемое звуковое поле. Микрофон может быть слишком большим, чтобы поместиться внутри измеряемой системы, например, для внутриушных измерений при установке слухового аппарата. Размер микрофона также может быть слишком большим по сравнению с длиной волны и нарушать акустическое поле. В этих случаях к корпусу микрофона можно прикрепить трубку зонда, чтобы отвести микрофон от точки измерения. В этой модели исследуется влияние на чувствительность микрофона ’s из-за добавления этого небольшого зонда.
modeldescr_aco/rectangular_horn_shape_optimization = Оптимизация формы прямоугольного громкоговорителя в 3D\n\nЭта модель демонстрирует, как использовать функцию Control Function для оптимизации формы на прямоугольном роге для улучшения ответа на оси. Результаты первоначального проектирования экспортируются в новый компонент через набор данных фильтра. Кроме того, пространственная реакция вне оси улучшается с использованием функций оптимизации свободной формы и формы преобразования.
modeldescr_aco/reflections_water_sediment = Acoustic Reflections off a Water-Sediment Interface\n\n Этот пример определяет коэффициент отражения плоских акустических волн от интерфейса водяного осадка на разных частотах и углах падения. В примере используется способность мультифизического интерфейса Acoustic–Poroelastic Waves Interaction моделировать сопряженные акустические и упругие волны в любом пористом веществе для описания системы водяного осадка. Результаты модели хорошо согласуются с результатами, полученными в рецензируемой исследовательской работе.
modeldescr_aco/seismic_waves_earth = Распространение сейсмических волн через Землю\n\nЭто руководство анализирует распространение сейсмических волн через внутреннюю структуру Земли. Модель использует 2D-аксисимметричную геометрию для представления разрывов материала и изменения свойств через концентрические слои Земли. Упрощенное землетрясение, состоящее из тонального импульса, используется для изучения генерации и распространения различных волн давления и сдвига по внутренней структуре Земли.\n\n Модель использует интерфейсы упругие волны, явная по времени и акустика давления, явная по времени для представления твердых и жидких частей Земли. Внезапные разрывы свойств обрабатываются с помощью функции Прерывистость материала, в то время как медленные изменения свойств включаются в свойства материала каждого из слоев. Модель демонстрирует масштабируемость временных эксплицитных интерфейсов и их применимость для захвата больших и очень больших акустических моделей (содержащих много длин волн).
modeldescr_aco/small_concert_hall = Малый концертный зал Акустика\n\n Проектирование конструкций и открытых пространств с учетом качества звука имеет важное значение для концертных залов, наружной среды и даже комнат дома. Моделирование акустики в высокочастотном пределе, где длина волны меньше геометрических особенностей, лучше всего выполнять с помощью акустики лучей.\n\n Эта учебная модель показывает основные шаги и принципы, используемые при настройке модели с использованием физического интерфейса Ray Acoustics. В модели анализируется акустика небольшого концертного зала. Настройка модели включает в себя всенаправленный источник звука, граничные условия стен для спектрального и диффузного рассеяния, оценку звукового давления, набор данных приемника, используемый для участка импульсного отклика, и энергетическую рефлектограмму. Результаты сравниваются с простыми оценками времени реверберации.
modeldescr_aco/sound_transmission_loss_concrete = Потери передачи звука через бетонную стену\n\nЭта модель представляет собой практичный и эффективный метод расчета потерь при передаче звука (STL) через компоненты здания. В частности, в этом примере рассматривается случай бетонной стены. Используемый здесь метод действителен до тех пор, пока компонент мало влияет на акустическое поле на стороне источника. Метод основан на предположении идеального диффузного поля на стороне источника и идеального безэхового окончания на приемной стороне бетонной стены. Используя подход, используемый в этой модели, можно получить идеальный, независимый от экспериментов STL. Полученные результаты сопоставлены с опубликованными экспериментальными данными и показывают хорошее согласие.
modeldescr_aco/spherical_scatterer_bem_benchmark = Сферический рассеиватель: BEM Benchmark\n\n В этой классической эталонной модели сферический рассеиватель помещается в фоновое поле плоской волны. Когда сфера смоделирована как твердая, задача имеет аналитическое решение. Модель сравнивает результаты с помощью интерфейса акустика давления, граничные элементыs с аналитическим решением для нескольких частот. Результаты показывают очень хорошее согласие. Результаты модели не показывают никаких нерегулярных режимов.
modeldescr_aco/submarine_asymptotic_scattering = Подводная лодка Высокочастотное асимптотическое рассеяние\n\n Основная защита подводной лодки заключается в ее способности оставаться скрытой во время эксплуатации. Поскольку радиоволны сильно поглощаются морской водой, звуковой диапазон навигации, или SONAR, является одним из основных методов, используемых для обнаружения подводных лодок. Системы SONAR также используются для подводных исследований, а также в рыбной промышленности.\n\nконструкторs анализируют способ отражения акустических волн, чтобы минимизировать эквивалентную отражающую площадь подводной лодки. В этом учебном пособии изучается рассеяние с базовой подводной лодки BeTTSi (Benchmark Target Echo Strength Simulation).\n\n Эта модель использует высокочастотное приближение интерфейса акустики давления, асимптотического рассеяния. Анализ является быстрым и хорошим приближением на высоких частотах, когда длина волны намного меньше объекта рассеяния.
modeldescr_aco/submarine_target_strength = Подводная лодка Target Strength\n\n Основная защита подводной лодки заключается в ее способности оставаться скрытой во время эксплуатации. Поскольку радиоволны сильно поглощаются морской водой, звуковой диапазон навигации, или SONAR, является одним из основных методов, используемых для обнаружения подводных лодок. Системы SONAR также используются для подводных исследований, а также в рыбной промышленности.\n\nконструкторs анализируют способ отражения акустических волн, чтобы минимизировать эквивалентную отражающую площадь подводной лодки. Сила цели, или TS, является мерой площади сонарной цели. В этом руководстве представлен упрощенный метод анализа TS базовой подводной лодки BeTTSi (Benchmark Target Echo Strength Simulation).\n\n Эта модель является акустически большой и использует стабилизированную формулировку в интерфейсе акустических граничных элементов давления (BEM). Включение стабилизированной композиции обеспечивает конвергенцию для больших моделей (высокочастотных или больших доменов) за счет некоторых дополнительных степеней свободы.
modeldescr_aco/submarine_scattering = Подводное рассеяние: моделирование области времени: FFT\n\n Эта модель анализирует рассеяние волны плоскости с корпуса подводной лодки. Также определяется рассеянное поле и пространственная реакция. Модель использует интерфейс акустика давления, явная по времени для моделирования этой большой акустической модели в области времени. Затем используется исследование FFT для преобразования результатов в частотную область, а рассеянное поле анализируется с помощью функции расчета внешнего поля.
modeldescr_aco/thermoacoustic_engine_heat_pump = Термоакустический двигатель и тепловой насос \n\nA термоакустический двигатель - это устройство без движущихся частей, которое может генерировать акустическую энергию из градиентов температуры внутри двигателя. Он использует связь между движением колеблющегося воздуха и изменениями температуры в воздухе, сжатом и расширенном акустическими волнами. Та же механика может использоватьсяа для генерации градиента температуры акустической энергией, которая называется термоакустическим тепловым насосом. Эта модель имитирует систему, которая соединяет термоакустический двигатель стоячей волны с тепловым насосом.
modeldescr_aco/tonpilz_transducer = Пьезоэлектрический преобразователь Tonpilz Transducer\n9000000000001A используется для относительно низкочастотного высокоэнергетического звукового излучения. Это одна из популярных конфигураций преобразователя для приложений SONAR. Преобразователь состоит из пьезокерамических колец, сложенных между массой головы и массой хвоста, которые соединены центральным болтом. В этом примере частотная реакция преобразователя изучается для определения структурной и акустической реакции устройства, такой как деформация, напряжения, излучаемое давление, уровень звукового давления, паттерн внешнего поля, кривая отклика передающего напряжения (TVR) и индекс направленности (DI) звукового пучка.
modeldescr_aco/tonpilz_transducer_prestressed = Пьезоэлектрический преобразователь Tonpilz с пренапряжениеовым преобразователем Bolt\n9000000000001A используется для относительно низкочастотного высокоэнергетического звукового излучения. Это одна из популярных конфигураций преобразователя для приложений SONAR. Преобразователь состоит из пьезокерамических колец, сложенных между массой головы и массой хвоста, которые соединены центральным болтом. Этот пример показывает, как включить эффект претензии в болт и как добавить конститутивную модель для воздействия на пьезоэлектрический материал. Геометрия болта импортируется из библиотек деталей. Частотный отклик показывает структурные и акустические эффекты, такие как деформация, напряжения, излучаемая мощность, уровень звукового давления, кривая отклика передающего напряжения (TVR) и индекс направленности (DI) звукового луча.
modeldescr_aco/topology_optimization_2d_room = Оптимизация топологии и проверка акустического режима в 2D-комнате\n\nЭто руководство вводит использование оптимизации топологии в акустике. Целью оптимизации является поиск оптимального распределения материала (твердого или воздушного) в заданной области проектирования, здесь потолок 2D-комнаты, который минимизирует средний уровень звукового давления в объективной области. Оптимизация выполняется для одной частоты. Оптимизированный дизайн дополнительно трансформируется в геометрию, и результаты оптимизации проверяются с использованием жестких границ.
modeldescr_aco/transfer_impedance_flow = Трансферный импеданс перфората с фоном Flow\n\n Перенос импеданса перфората определяется в присутствии вязкого фонового потока. В примере используется интерфейс линейной физики Navier–Stokes для моделирования акустики. Стационарный фоновый поток определяется с помощью интерфейса Single Phase Flow модели турбулентности RANS. Результаты сопоставляются с ситуацией отсутствия потока и аналитической моделью.\n\n Этот пример требует модуля акустики и модуля CFD.
modeldescr_aco/transfer_impedance_perforate = Трансфер Импеданс Perforate\n\nPerforates - это пластины с распределением небольших перфораций или отверстий. Они используются в глушителях, звукопоглощающих панелях и во многих других местах в качестве вкладышей, где важно точно контролировать затухание. По мере того, как перфорации становятся все меньше и меньше, более важными становятся вязкие и термические потери. Поведение ослабления, которое также зависит от частоты, можно контролировать, выбирая размер перфората и распределение в пластине.\n\n Хотя перфораты теоретически изучались в течение многих лет, аналитические или полуаналитические модели могут применяться только для простых геометрий. Цифровой подход необходим для систем, где отверстия имеют различные поперечные сечения, если перфорации сужены, или если распределение отверстий неравномерно.\n\nВ этой учебной модели эффекты моделируются подробно с использованием интерфейса Thermoviscous Acoustics, частотная область. В то время как нелинейные механизмы потери возникают при высоких уровнях звука или в присутствии потока (через или над перфоратом), в этой учебной модели изучаются только линейные эффекты из-за вязкости и теплопроводности. Определены импеданс передачи, поверхностное нормальное импеданс и коэффициент затухания системы.\n\n Импеданс переноса сравнивают с полуаналитической моделью. Вы можете применить импеданс передачи, который вычисляется в этой подробной модели, к более крупному системному моделированию с использованием состояния внутреннего импеданса, которое существует в интерфейсе акустики давления, частотного области.
modeldescr_aco/transverse_isotropic_porous_layer = Transverse Isotropic Porous Layer\n\nЭто руководство исследует акустические свойства пористого слоя из стеклянной ваты. Пористый материал обладает поперечными изотропными свойствами и моделируется с помощью полной модели анизотропного пороэластичного материала.
modeldescr_aco/tweeter_shape_optimization = Tweeter Dome и Waveguide Shape Optimization\n\nA Twitterer - это высокочастотный драйвер, используемый в системах громкоговорителей. Идеальный твиттер будет производить постоянный уровень звукового давления на заданном расстоянии перед водителем независимо от частоты, то есть плоской реакции. В идеале твиттер также в определенной степени будет поддерживать эту плоскую реакцию, когда точка прослушивания сдвинется с оси. Сложные взаимодействия между разрывом купола и лучом присущи конструкции громкоговорителя. Это в свою очередь вводит отклонения от идеальных характеристик излучения.\n\n В этом руководстве представлен пример оптимизации формы купола и волновода твитера. Изменяя форму этих двух компонентов, можно настроить разрыв конуса и эффект луча, чтобы они отменялись через частотный диапазон и создавали динамик, который ближе к идеальному твиттеру. Оптимизированная конструкция представляет собой более плоскую кривую отклика через диапазон частот, а также улучшает картину излучения. Это демонстрирует возможности оптимизации для этих типов виброакустических задач.
modeldescr_aco/type_43_ear_simulator = Type 4.3 Ear Simulator\n\nЭта модель представляет собой P.57 Type 4.3 Full-Band Ear Simulator. Модель включает в себя геометрию ушного канала, а также пинну, определенную в стандарте ITU-T P.57. Модель также включает данные интерполяции для импеданса барабана уха, обеспечивающего правильные акустические свойства уха. Модель пытается соответствовать геометрии и акустическим требованиям, определенным в стандарте. Это не модель конкретного, коммерчески доступного симулятора ушей.\n\n Данные по импедансу барабанного уха следуют из ссылки: L.B. Nielsen and M. Herring Jensen, “ Digital Twin of a New and Standardized Fullband Ear Simulator,” DAGA 2022.
modeldescr_aco/ultrasound_induced_heating = Фокусированный ультразвуковой индуцированный нагрев в ткани Phantom\n\n Этот пример показывает, как моделировать нагрев тканей, вызванное сфокусированным ультразвуком. Сначала стационарное акустическое поле в воде и ткани моделируются для получения распределения акустической интенсивности в ткани. Поглощенная акустическая энергия затем вычисляется и используется в качестве источника тепла для интерфейса Bioheat Transfer в тканевом области в зависящем от времени исследовании, имитируя нагрев и охлаждение ткани при воздействии ультразвука в течение 1 секунды.\n\n Этот пример требует модуля акустики и модуля теплопередачи.
modeldescr_aco/ultrasound_flow_meter_generic = Ультразвуковой расходомер с общей времяпролетной конфигурацией\n\nЗнание скорости движущейся жидкости важно во всех случаях, когда жидкость используется для транспортировки материала или энергии. В методе времени пролета или времени прохождения для определения скорости потока ультразвуковой сигнал передается поперек основного потока в трубе для неинвазивного определения его скорости. Передавая сигнал под углом относительно основного потока, ультразвуковой сигнал будет распространяться быстрее скорости звука, если он движется в направлении основного потока, и медленнее скорости звука, если он движется против него. Разница во времени прохождения в двух направлениях линейно возрастает со скоростью основного потока. Расходомеры этого типа находят множество применений, особенно в промышленных условиях.\n\nВ этой учебной модели вы узнаете, как смоделировать обычный смоченный ультразвуковой расходомер переходного периода с помощью программного обеспечения для моделирования COMSOL Multiphysics®. Установка модели решает переходную проблему сигнала, проходящего поток вниз по течению. Сначала мы используем модуль CFD для расчета установившегося фонового расхода в расходомере. Сигнал, движущийся вверх по течению, предварительно вычисляется и импортируется в виде данных. Разница во времени прихода используется для оценки скорости основного потока. Далее мы используем физический интерфейс «Уравнение конвекционной волны, явное время», расположенный в узле «Ультразвук» модуля «Акустика». Этот интерфейс адаптирован для переходных высокочастотных ситуаций и основан на разрывном методе Галеркина (DG-FEM).
modeldescr_aco/ultrasound_scattering = Ультразвуковое рассеяние с цилиндра\n\nЭта 2D-модель изучает рассеяние ультразвуковых волн от цилиндрического препятствия с различными акустическими свойствами, чем у окружающей среды. Ультраслабая вариационная формулировка позволяет разрешать короткие длины волн на стандартной сетке.
modeldescr_aco/uniform_layer_waveguide = Равномерный слой волновода\n\nВ этом примере поле термовязкой акустической волны в мелком однородном волноводе моделируется и сравнивается с аналитическим решением. Из-за небольшой высоты волновода (1 мм) тепловые и вязкие граничные слои значительны.
modeldescr_aco/vented_loudspeaker_enclosure = Loudspeaker Driver in a Vented Enclosure\n\n Этот пример коробочного громкоговорителя позволяет применять номинальное напряжение движения и извлекать полученный уровень звукового давления во внешней комнате в зависимости от частоты. Электромагнитные свойства драйвера обеспечиваются моделью Loudspeaker Driver (доступна с модулем AC/DC). В примере используется мультифизический интерфейс Acoustic–Shell Interaction, поэтому требуется модуль механики конструкций.
modeldescr_aco/vibrating_micromirror = Вибрирующее микрозеркало с вязкостным и термическим демпфированием\n\nМикрозеркала используются в некоторых устройствах MEMS для управления оптическими элементами. В этом примере вибрирующего микрозеркала, окруженного воздухом, используется мультифизический интерфейс Thermoviscous Acoustic–Shell Interaction для моделирования взаимодействия жидкости–твёрдого тела, и, таким образом, он включает правильное вязкостное и термическое демпфирование зеркала от окружающего воздуха. Резонансная частота зеркала под скручивающей нагрузкой изучается в частотной области посредством анализа как частотной характеристики, так и анализа собственных частот. В систему встроена простая модель RLC.
modeldescr_aco/vibrating_particle_water = Вибрирующая частица в воде\n\nЭто руководство относится к небольшой вибрирующей полусферической частице в воде. Вибрации вызывают акустические волны в жидкости. На примере показано, как настроить модель термовязкой акустики, которая решает для акустических (сжимаемых) волн в жидкости. Модель также настроена с использованием состояния импеданса термовязкого граничного слоя, доступного в акустике давления. Численные решения валидируются путем сравнения друг с другом и с аналитической асимптотической моделью.
modeldescr_aco/viscous_damping_mpp = Viscous Damping of a Microperforated Plate in the Slip Flow Regime\n\n Этот пример описывает импеданс плоской микромеханической структуры с перфорированной пластиной. Он исследует важность граничного состояния Скользящей стены при высоких числах Кнудсена в частотной области и оптимальном размере отверстия для перфорированных пластин.
modeldescr_aco/wave_based_room = Волновая акустика с временной областью с частотно-зависимым импедансом\n\n Использование волновых методов для акустического моделирования помещений распространилось в последние годы из-за увеличения вычислительной производительности, а также разработки новых численных методов. Проблема включения реалистичных условий импеданса на стенах традиционно решается в частотной области. Исследования обидчиков были сосредоточены на реализации частотно-зависимого импеданса в моделях временной области с использованием частичного представления фракций данных.\n\n Это руководство демонстрирует, как получить представление частичной фракции данных о частотно-зависимом импедансе стенки с помощью функции Partial Fraction Fit и как использовать результаты для настройки встроенных граничных условий импеданса для моделирования акустического ответа в пространстве во временной области. Модель использует интерфейс акустика давления, явная по времени для моделирования распространения звука. Интерфейс физики основан на прерывистом методе Галеркина (dG), который использует матричный свободный подход и решение времени. Метод очень эффективен и хорошо подходит для распределенных расчётов на кластерной архитектуре.
modeldescr_aco/wax_guard_acoustics = Wax Guard Acoustics: Transfer Matrix Computation\n\n В этом руководстве анализируются акустические свойства восковой гвардии. Восковая защита - это небольшая перфорированная сетка, используемая для защиты приемника (миниатюрный громкоговоритель в слуховом аппарате), используемая для слуховых аппаратов приемника в ухе (RITE) или приемника в канале (RIC). Из-за очень малых размеров структуры термические и вязкие потери граничного слоя должны быть включены в детали, и поэтому используется интерфейс Thermoviscous Acoustics, частотная область. На первом этапе вычисляется матрица переноса (или двухпортовая) восковой охраны с использованием функциональности Port Sweep и граничных условий Port. Геометрия восковой защиты импортируется из файла САПР и подготавливается для симуляции.\n\n На втором этапе вычисляется и сравнивается с фактическими измерениями реакция подсистемы восковой защиты при размещении в типичной настройке измерения. Это делается с использованием подхода сплющенной матрицы переноса. Вычисленная матрица переноса восковой защиты используется вместе с другими компонентами матрицы переноса для приемника (миниатюрный громкоговоритель), узкой трубы и объёма соединителя.


# Battery Design Module apps
applicationdescr_battery/li_battery_designer = Конструктор литиевых батарей\n\nЭто приложение можно использовать в качестве инструмента проектирования для разработки оптимизированной конфигурации батареи для конкретного применения. Приложение вычисляет ёмкость, энергоэффективность, тепловыделение и потери ёмкости из-за паразитных реакций аккумулятора для определенного цикла нагрузки.\n\nРазличные параметры конструкции батареи включают: геометрические размеры корпуса батареи, толщину различных компонентов (сепаратора, токосъемников и электродов), материал положительного электрода и объёмные доли различных фаз пористых материалов. Цикл нагрузки представляет собой цикл заряда-разряда с использованием нагрузки постоянного тока, который может быть разным для стадий заряда и разряда.\n\nПриложение также вычисляет температуру батареи (при условии равномерной внутренней температуры батареи) на основе выделяемого тепла и тепловой массы. Охлаждение определяется с использованием параметра температуры окружающей среды и коэффициента теплопередачи.
applicationdescr_battery/li_ion_battery_impedance = Lithium-Ion Battery Impedance\n\nЦель этого приложения - объяснить экспериментальные измерения электрохимической спектроскопии импеданса (EIS) и показать, как вы можете использовать приложение для моделирования, а также измерения для оценки свойств литий-ионных батарей.\n\n Приложение берет измерения из эксперимента EIS и использует их в качестве входных данных. Затем он моделирует эти измерения и выполняет оценку параметров на основе экспериментальных данных.\n\n Контрольными параметрами являются: плотность тока обмена, удельное сопротивление твердого электролитного интерфейса на частицах, двухслойная ёмкость NCA, двухслойная ёмкость углеродной опоры в положительном электроде и диффузивность иона лития в положительном электроде. Подгонка производится к измеренному импедансу положительного электрода на частотах от 10 мГц до 1 кГц.
applicationdescr_battery/li_battery_pack_designer = Lithium Battery Pack конструктор\n\nЭто приложение демонстрирует следующее:\n\n• Динамическая система помощи с использованием подоконников\n• Множественные компоненты (1D и 3D) в одном приложении\n• Кнопки переключателя в ленте для отображения различных входных данных, выбора геометрии сокрытия/показа, а также для динамической помощи\n• Геометрические детали и параметризированные геометрии\n• Импорт экспериментальных данных\n• Варианты создания различных размеров сетки\n• Сброс части входных параметров или all\n• Создание таблицы результатов во время сессии приложения\n• Экспорт результатов в текстовый файл или в Microsoft® Excel, если доступна лицензия LiveLink™ for Excel®\n• Слайдеры и кнопки для управления шагом времени на plot\n• Визуализация результатов с помощью анимации\n• Пользовательские значки окон.\n\n031Это инструмент для исследования динамического напряжения и теплового поведения аккумуляторной батареи, используя цикл нагрузки и экспериментальные данные о зависимости от OCV.\n\nParameter оценка различных параметров, таких как омический сверхпотенциал, постоянная времени диффузии и ток безразмерного обмена может быть выполнена приложением. Затем приложение может использоватьсяо для вычисления профиля температуры аккумуляторного блока на основе тепловой массы и генерируемого тепла, связанного с потерями напряжения батареи.\n\nРазличные параметры конструкции аккумуляторного блока (тип упаковки, количество батарей, конфигурация, геометрия), свойства материала батареи и условия работы могут быть изменены.
applicationdescr_battery/lib_rate_capability_surrogate = Surrogate Model Training of a Battery Rate Capability Model\n\nЭто приложение демонстрирует использование функции суррогатной модели для прогнозирования скорости работы ячейки NMC/графитовой батареи. Возможности тарифа показаны в Ragone plot.\n\n Суррогатная функция, глубокая нейронная сеть, была приспособлена к подмножеству возможных значений входных данных. Можно установить три значения входных данных: толщина положительного электрода, объёмная доля активного материала положительного электрода и объёмная доля активного материала отрицательного электрода. Низкая вычислительная стоимость оценки суррогатной функции позволяет использовать слайдеры для интерактивного объединения входных значений и прогнозирования графика Ragone.\n\n После выявления многообещающей комбинации значений можно вычислить фактическую физическую модель литий-ионной батареи для этих входных значений, чтобы проверить прогнозы суррогатной модели. Кроме того, вычисленные данные физической модели могут использоваться для дальнейшего улучшения суррогатной модели.

# Battery Design Module models
modeldescr_battery/battery_pack_6s2p = Тепловое распределение в пакете цилиндрических батарей\n\n Этот пример демонстрирует, как моделировать распределение температуры в аккумуляторной батарее во время разряда 4C.\n\n Пакет построен путем первого соединения двух цилиндрических батарей параллельно. Затем шесть пар, соединенных параллельно, соединяются последовательно для создания полного пакета. (Это также называется конфигурацией 6s2p.)\n\n Симметричность проблемы используется дважды, так что только распределение температуры для трех батарей должно быть решено для.\n\n Интерфейс Battery Pack используется для генерации соответствующих источников тепла, которые затем соединяются с одним интерфейсом теплопередачи в 3D-геометрии.
modeldescr_battery/capacity_fade = Мощность литий-ионной батареи\n\nЭта 1D-модель демонстрирует, как имитировать старение батареи за счет формирования SEI (твердоэлектролитного интерфейса) в графитовом электроде литий-ионной батареи. Функция Charge-Discharge Cycling используется для переключения между постоянным напряжением и работой постоянного тока, а также между зарядом и разрядом.\n\nCyclable литий теряется, и сопротивление слоя SEI увеличивается в отрицательном электроде из-за паразитного лития / растворителя SEI, образующего реакцию восстановления.
modeldescr_battery/capacity_fade_seed = 1D Lithium-Ion Battery Model for the Capacity Fade Tutorial\n\nЭто шаблон MPH-файла, содержащий физику, геометрию и сетку литий-ионной батареи. Шаблон используется в обучающей модели capacity fade.
modeldescr_battery/lib_diffusion_induced_stress = Диффузионно-индуцированное напряжение в литий-ионной батарее\n\n В этом примере используется интерфейс литий-ионной батареи для анализа диффузионного напряжения в отрицательных частицах электрода материала-хозяина во время разряда и расслабления литий-ионной батареи. Диффузионно-индуцированные напряжение и деформация возникают в результате композиционных неоднородностей во время интеркалирования лития в частицах материала-хозяина. Геометрия находится в одном измерении, а модель изотермическая.
modeldescr_battery/internal_short_circuit = Внутренняя короткая схема в литий-ионной аккумуляторной батарее\n\nВо время внутреннего короткого замыкания в батарее два электродных материала внутренне связаны в электронном виде, что приводит к высокой плотности локального тока. Внутренние короткие замыкания могут возникать в литий-ионной батарее из-за, например, образования дендрита лития или сжимающего удара. Высокая локальная плотность тока, возникающая во время внутреннего короткого интервала, приведет к локальному повышению температуры, что, в свою очередь, может привести к тепловому бегству ячейки.\n\n Этот пример имитирует повышение температуры из-за внутреннего короткого замыкания образованием дендрита. Модель соединяет электрохимические источники тепла от модели аккумуляторного элемента, главным образом из-за нагрева Джоуля в фазе электрода, для теплопередачи.
modeldescr_battery/jelly_roll = Желе Ролл\n\nВ цилиндрическом или призматическом аккумуляторном элементе активные слои, металлическая фольга токосъемника и сепараторы намотаны в "jelly roll".\n\nДополнительные выступы (металлические полоски) привариваются к фольге токосъёмника, чтобы проводить ток наружу корпуса элемента.\n\nВзаимодействие различных размеров слоев и выступов в сочетании с величиной тока элемента определяет температуру и распределение тока в элементе батареи.\n\nВ этом учебном пособии моделируются омические и активационные потери, а также результирующее распределение температуры в желейном валке для псевдостационарного случая при постоянном токе ячейки.
modeldescr_battery/jelly_roll_flattened = Jelly Roll Using a Flattened Geometry\n\nЭтот пример повторяет результаты учебного примера Jelly Roll с использованием сплющенного представления геометрии на основе раневой спирали.\n\nКартирование исходной проблемы сплюснутой 3d геометрии приносит несколько преимуществ: Искривление раневых слоев не нужно решать в сетке, уменьшая размер проблемы, и облегчается визуализация результатов по спиральному направлению.
modeldescr_battery/li_air_battery_1d = 1D Isothermal Lithium–Air Battery\n\n Этот пример использует интерфейс Lithium-Ion Battery для изучения разряда литиевой батареи–air. Транспорт кислорода в пористом положительном электроде моделируется с использованием интерфейса Transport of Diluted Species in Porous Media. Электрохимическая реакция снижения кислорода в положительном электроде приводит к изменению концентрации продукта реакции и пористости электрода. Геометрия находится в одном измерении, а модель изотермическая.
modeldescr_battery/li_battery_1d = 1D Isothermal Lithium-Ion Battery\n\n Этот пример демонстрирует интерфейс Lithium-Ion Battery для изучения разряда и заряда батареи. Геометрия находится в одном измерении, а модель изотермическая.
modeldescr_battery/li_battery_1d_for_thermal_models = 1D Lithium-Ion Battery for Thermal Models\n\nЭто шаблон MPH-файла, содержащий физический интерфейс, геометрию и сетку литий-ионной батареи. Шаблон используется в тепловом моделировании цилиндрической литий-ионной батареи в 3D и жидкостном литий-ионном аккумуляторе.
modeldescr_battery/lib_drive_cycle = 1D Lithium-Ion Battery Drive-Cycle Monitoring\n\n Этот пример демонстрирует интерфейс Lithium-Ion Battery, вычисляющий несколько ключевых свойств батареи во время цикла нагрузки, типичного для гибридного электромобиля. Свойствами являются, например, напряжение ячейки, напряжение ячейки с открытым замыканием, потенциал электрода, состояние заряда и потери напряжения.
modeldescr_battery/heterogeneous_li_battery = Гетерогенная литий-ионная батарея\n\nЭта модель описывает поведение ячейки литий-ионного аккумулятора, смоделированной с использованием идеализированной трехмерной геометрии. Геометрия имитирует структурные детали в пористых электродах. Такие модели называются гетерогенными моделями.\n\n В отличие от типичного гомогенизированного подхода для описания пористых электродов, гетерогенные модели описывают фактические формы поровых электролитных и электродных частиц. Модель использует связь со структурной механикой для расчета напряжений фон Мизеса в частицах.
modeldescr_battery/li_battery_impedance = Моделирование Импеданса в литий-ионной батарее\n\n Этот пример литий-ионной батареи описывает импеданс в ячейке LTO/NCA с эталонным электродом. Модель включает в себя этап исследования оценки параметров, чтобы подогнать моделирование к экспериментальным измерениям.
modeldescr_battery/lib_internal_resistance = Lithium-Ion Battery Internal Resistance\n\n Этот пример демонстрирует интерфейс Lithium-Ion Battery для моделирования внутреннего сопротивления и потери напряжения при применении импульсов высокого тока в тесте гибридной характеристики мощности импульса (HPPC). Вклад в потери от различных частей батареи также анализируется при изменении различных параметров конструкции.
modeldescr_battery/li_battery_seed = Lithium-Ion Battery Seed\n\nЭто шаблон MPH-файла, содержащий физику, геометрию и сетку литий-ионной батареи. Шаблон используется в li ёмкости батареи, li батареи внутреннего сопротивления, li батареи привода цикла, и диффузии-индуцированной модели напряжения.
modeldescr_battery/li_battery_multiple_materials_1d = Lithium-Ion Battery with Multiple Intercalating Electrode Materials\n\n Этот пример демонстрирует функцию Дополнительного интеркалирующего материала в интерфейсе Lithium-Ion Battery. Модель описывает литий-ионную батарею с двумя различными интеркалирующими материалами в положительном электроде, тогда как отрицательный электрод состоит только из одного интеркалирующего материала. Исследуется производительность батареи во время разряда для различных фракций смеси двух интеркалирующих материалов в положительном электроде.
modeldescr_battery/li_battery_pack_3d = Liquid-Cooled Lithium-Ion Battery Pack\n\n Этот пример имитирует температурный профиль в аккумуляторе с жидким охлаждением. Модель течения жидкости и температуры находится в 3D, в то время как для расчета источника тепла используется 1D-модель батарей.
modeldescr_battery/li_battery_sigr_hysteresis = Silicon–Graphite-Blended Electrode with Thermodynamic Voltage Hysteresis\n\nЭтот пример демонстрирует, как добавить Si в качестве дополнительного электродного материала в интерфейсе литий-ионной батареи и как определить переменную памяти для обработки гистерезиса напряжения с помощью дополнительного интерфейса PDE-формы коэффициента.
modeldescr_battery/lib_rate_capability = Lithium-Ion Battery Rate Capability\n\nЭтот пример демонстрирует, как исследование производительности конкретной конструкции батареи может быть выполнено с интерфейсом Lithium-Ion Battery. Вычисляются и анализируются выходы энергии и мощности.
modeldescr_battery/li_battery_single_particle = Модель одночастиц литий-ионной батареи\n\n Этот пример демонстрирует интерфейс одночастичной батареи для изучения разряда литий-ионной батареи. Модель изотермическая и устанавливается в 0D. Формулировка одной частицы обычно действительна для сценариев низкого среднего тока.\n\n Результаты для различных токов разряда сравниваются с более расширенной 1D-формацией литий-ионной батареи (li battery 1d).
modeldescr_battery/li_battery_solid_electrolyte = Lithium-Ion Battery with Single-Ion Conducting Solid Electrolyte\n\nЭтот пример демонстрирует интерфейс Lithium-Ion Battery, Single-Ion Conductor для изучения разряда литий-ионной батареи с твердым электролитом. Анализируется поведение при различных разрядных токах и проводимости твердого электролита. Геометрия находится в одном измерении, а модель изотермическая.
modeldescr_battery/li_battery_thermal_2d_axi = Тепловое моделирование цилиндрической литий-ионной батареи в 2D\n\n Этот пример имитирует профиль тепла цилиндрической батареи с использованием 2D-аксисимметричной геометрии. Тепловая модель соединена с моделью аккумуляторной батареи, которая используется для генерации источника тепла в активном материале батареи.
modeldescr_battery/li_battery_thermal_3d = Тепловое моделирование цилиндрической литий-ионной батареи в 3D\n\n Этот пример имитирует профиль тепла в цилиндрической батарее с воздушным охлаждением в 3D. Аккумулятор помещается в матрицу в аккумуляторном блоке. Тепловая модель соединена с моделью 1D-батареи, которая используется для генерации источника тепла в активном материале батареи.
modeldescr_battery/li_battery_tutorial_2d = 2D Lithium-Ion Battery\n\nЭто 2D модель литий-ионной батареи. Геометрия ячеек не основана на реальном применении; она предназначена только для демонстрации установки 2D-модели.
modeldescr_battery/li_battery_spiral_2d = Edge Effects in a Spirally Wound Lithium-Ion Battery\n\nЭта двухмерная модель исследует геометрические краевые эффекты в спиральном раневом ("jelly roll") литий-ионном аккумуляторе. Модель является изотермической.
modeldescr_battery/lib_base_model_1d = Модель литий-ионной батареи в 1D\n\n Это шаблонная базовая модель, содержащая физику, геометрию и сетку литий-ионной батареи, определенная в 1D.\n\n Модель использует четыре параметра литии, которые используются для определения относительной балансировки отрицательных и положительных электродов, а также переменной глобального состояния заряда ячейки (SOC). Кроме того, для определения толщин электродов используется параметр поперечного сечения ячейки.\n\n Базовая модель используется различными учебными пособиями в библиотеке приложений модуля проектирования батарей.
modeldescr_battery/lithium_sulfur = Lithium-Sulfur Battery\n\nЭтот пример модели разряда литий-серной батареи с двумя различными скоростями разряда. Электролитный заряд и массовый транспорт литиевой соли и шести полисульфидов включены, а также осаждение-растворение твердой октасульфуры (S8) и сульфида лития (Li2S) в сепараторе и положительном электроде.
modeldescr_battery/li_plating_with_deformation = Lithium Plating with Deformation\n\nЭтот учебник модели литиевого покрытия и роста дендрита в литий-ионной батарее. Пульс обратного покрытия используется для ослабления небольших выступов во время осаждения литиевого металла. Сопоставляя параметры процесса, включая длину передних и обратных импульсов (циклов работы), можно избежать всплесков литиевых дендритов.
modeldescr_battery/lumped_li_battery_parameter_estimation = Оценка параметров зависящей от времени паровой батареи Model\n\nЭто руководство использует подход "black-box" для определения модели батареи на основе небольшого набора сжатых параметров, при условии отсутствия знаний о внутренней структуре или дизайне электродов батареи или выборе материалов.\n\n Вводом в модель является ёмкость батареи, начальное состояние заряда (SOC) и кривая напряжения открытой цепи против SOC в сочетании с экспериментальными данными цикла нагрузки.\n\n Связанные параметры определяются с использованием этапа исследования оценки параметров.
modeldescr_battery/lumped_li_battery_capacity_loss = Aging Analysis of a Lumped Battery Model\n\nThis tutorial shows the Lumped Battery interface for modeling capacity loss in a battery. для описания потери ёмкости, которая происходит из-за паразитарных реакций в батарее, используется набор комковатых параметров, при условии отсутствия знаний о внутренней структуре или конструкции электродов батареи или выборе материалов.\n\n Анализ старения включает календарные исследования жизни и цикла жизни.
modeldescr_battery/over_discharge_protection = Защита от перезарядки аккумулятора с помощью Shunt Resistances\n\nЭто руководство демонстрирует, как интегрировать несколько моделей с паровой батареей в интерфейс электрической цепи. Две батареи соединены последовательно. Каждая батарея защищена шунтирующим сопротивлением, которое активируется, если состояние заряда батареи достигает ниже определенного порогового уровня.
modeldescr_battery/na_ion_battery_1d = 1D Isothermal Sodium-Ion Battery\n\nЭтот пример демонстрирует, как использовать интерфейс Lithium-Ion Battery для моделирования натрий-ионной батареи. Геометрия находится в одном измерении, а модель изотермическая.\n\n Химия натрий-ионных батарей имеет много сходств с химией литий-ионных батарей и часто может быть описана теми же уравнениями для переноса заряда и массы, кинетики электродов и интеркалирования частиц электродов.
modeldescr_battery/nimh_battery_1d = 1D Isothermal Nickel–Metal Hydride Battery\n\nВ этом примере используется батарея с интерфейсом бинарного электролита для изучения разряда никель–металлгидридной батареи. Геометрия находится в одном измерении, а модель изотермическая.
modeldescr_battery/nimh_equivalent_circuit_battery = Эквивалентная модель схемы для никель–металлогидридной батареи\n\nВ этом примере моделируется никель–металлогидридная батарея с использованием модели эквивалентной схемы. The model consists of two resistors, a capacitor, a current source and a voltage source depending on the battery state of charge (SOC). Различные циклы заряда-разряда при разных скоростях C моделируются с использованием параметрической развертки.
modeldescr_battery/nicd_battery_1d = 1D Isothermal Nickel–Cadmium Battery\n\nВ этом примере используется батарея с интерфейсом бинарного электролита для изучения заряда и разряда никель–кадмиевой батареи. Геометрия находится в одном измерении, плюс цилиндрически симметричная 1D-геометрия для диффузии протона в положительном электроде. Модель является изотермической. Эволюция/сокращение кислорода на положительном электроде, массовый перенос кислорода в клетке и эволюция/сокращение кислорода на отрицательном электроде являются дополнительными процессами, также включенными в модель.
modeldescr_battery/nmc_electrode_geometry = Генерация гетерогенной геометрии электрода\n\nВ этом примере показано, как создать репрезентативную трехмерную геометрию никель-марганцево-кобальтового (NMC) электрода на основе данных рентгеновской томографии. Сгенерированная геометрия может использоватьсяа для последующего моделирования гетерогенных электродов.\n\nМодельный метод используется для перебора табличных данных об объёмах частиц и координатах центра.
modeldescr_battery/nmc_electrode_homogenization = Homogenizing a Heterogeneous Electrode Model\n\nЭтот пример демонстрирует, как рассчитать эффективные транспортные свойства гетерогенной 3D-геометрии кобальта никеля марганца (NMC) электрод.\n\n Эффективные параметры затем используются для создания репрезентативной гомогенизированной 1D-модели электрода NMC. Благодаря гомогенизации требования к памяти и вычислительное время уменьшаются на порядки.
modeldescr_battery/orange_battery = Orange Battery\n\nЭта 3D-модель показывает, как настроить аккумулятор (коррозионную ячейку) из оранжевого и двух металлических гвоздей. Первое исследование решает для стационарных электрохимических токов. Второе, более длительное, зависящее от времени исследование моделирует растворение и транспорт ионов металлов в электролите.
modeldescr_battery/pb_acid_battery_1d = Разрядка и саморазрядка батареи Lead–Acid Battery\n\n Этот пример имитирует разряд батареи lead–acid. Сравниваются высокие и низкие скорости разряда, а при использовании побочных реакций в пористых электродах также изучается долгосрочное саморазрядное поведение.
modeldescr_battery/pb_flow_battery = Растворимый свинец–Кислотно-окислительно-восстановительный проточный аккумулятор\n\nЭто пример проточной окислительно-восстановительной батареи, которая имитирует заряд и разряд во время цикла нагрузки. для электрохимической ячейки используется двумерная модель, включающая перенос массы, заряда и импульса. Нульмерная модель резервуара имитирует концентрации реагентов в электролите вне ячейки.
modeldescr_battery/primary_cd_grid = Первичное текущее распределение в электросети Lead–Acid Battery Grid Electrode\n\n Модель демонстрирует, как использовать интерфейс распределения первичного тока для имитации электрода сетки в свинцовой – кислотной батарее. Модель находится в 3D.
modeldescr_battery/solid_state_li_battery = All-Solid-State Lithium-Ion Battery\n\nЭтот пример показывает, как использовать интерфейс распределения третичного тока для моделирования токов и переноса массы электролита в тонкопленочной полностью твердотельной литий-ионной батарее.\n\nA отдельный интерфейс Транспорт разбавленных видов связан с электрохимическими реакциями для моделирования массового переноса лития в положительном электроде.\n\n Анализируются различные источники потерь напряжения.
modeldescr_battery/thermal_runaway_propagation = Из-за злоупотребления, такого как внутренние или внешние короткие замыкания или чрезмерное нагрев, отдельная батарея может перейти в тепловой разгон, во время которого батарея генерирует значительное количество тепла. Если достаточное количество тепла передается между соседними ячейками во время теплового разгона, соседние ячейки также попадают в тепловой разгон.\n\nA тепловой разгон, распространяющееся по всей упаковке, представляет собой серьезную угрозу безопасности. При проектировании аккумуляторной батареи необходимо принять меры для смягчения последствий безудержного распространения.\n\n Этот учебник имитирует теплообмен и результирующее тепловое распространение в упаковке, состоящей из 20 цилиндрических клеток, с использованием источников тепла на основе событий.
modeldescr_battery/v_flow_battery = Vanadium Redox Flow Battery\n\nЭтот 2D пример ванадиевой проточной батареи демонстрирует, как связать модель распределения третичного тока для ионообменной мембраны с моделями распределения третичного тока для двух разных свободных электролитных отсеков проточной батареи.\n\n Граничный узел <em>Ion-Exchange Membrane</em> определяет граничное условие, при котором поток ионов является непрерывным, но где потенциал электролита является прерывистым и описывается равновесием Доннана.\n\n Это состояние обычно используется в электрохимических клетках, содержащих как свободные электролиты, так и ионообменные мембраны, например, при проблемах диализа.
modeldescr_battery/zn_ago_battery_1d = 1D Isothermal Zinc-Silver Oxide Battery\n\nВ этом примере используется батарея с интерфейсом бинарного электролита для изучения разряда оксидно-цинковой батареи. Электрохимические реакции в положительных и отрицательных электродах приводят к изменениям пористости и концентрации видов в электродах. Геометрия находится в одном измерении, а модель изотермическая.
modeldescr_battery/znbr_flow_battery = Zinc–Bromine Redox Flow Battery\n\nThe цинк–bromine redox flow battery - это электрохимическая технология хранения энергии, подходящая для стационарных применений.\n\nПо сравнению с другими химическими системами потоковых батарей, ячейка Zn-Br потенциально имеет более низкую стоимость, более высокую плотность энергии и лучшую энергоэффективность.\n\n В клетке при заряде на отрицательный электрод оседает цинковый металл, а на положительный электрод — бром.\n\n Этот учебник моделирует напряжение ячейки, а также производство-потребление брома и цинка во время цикла заряд-разряд.
modeldescr_battery/particle_size_distribution = Батарейный электрод с дистрибуцией размера частиц \n\nБатарейные электроды с большими неоднородностями с точки зрения размеров частиц иногда не могут быть адекватно описаны гомогенизированными моделями, использующими только один размер частиц.\n\nA в качестве альтернативы добавлению нескольких экземпляров дополнительного пористого электродного материального узла, это руководство демонстрирует, как вместо этого развернуть твердофазную диффузию интеркалированного лития для диапазона размеров частиц.\n9000000000005A гистограмма используется в качестве входа в модель для определения распределения размеров частиц в электроде.
modeldescr_battery/pouch_cell_utilization = Использование электродов в крупном литий-ионном аккумуляторе формата Cell\n\nБольшие литий-ионные батареи широко используются в электромобилях и для стационарных приложений хранения энергии. В (упакованной) конструкции аккумуляторной батареи весь ток выходит из ячейки на вкладках коллектора ячеек; и по мере увеличения размера и мощности ячейки могут вступать в игру градиенты напряжения в высокопроводящих коллекторах тока металлической фольги, что приводит к неравномерному распределению тока и использованию электродов в ячейке. Неоднородное использование приводит к неоптимальному использованию электродов батареи, а также может привести к неоднородному и ускоренному старению электродов.\n\n Этот учебник моделирует распределение тока и использование электродов в большой литий-ионной аккумуляторной ячейке и как это зависит от тока ячейки. Модель находится в 3D.
modeldescr_battery/electrochemical_capacitor_porous_electrodes = Электрохимический конденсатор с Porous Electrodes\n\nElectrochemical суперконденсаторы имеют относительно более высокую плотность энергии, чем обычные конденсаторы. Благодаря нескольким преимуществам, таким как быстрая зарядка, длительные циклы разрядки заряда и широкие диапазоны рабочих температур, электрохимические суперконденсаторы нашли широкое применение в гибридных электромобилях.\n\n Этот 1D учебник моделирует распределение тока и использование электродов в пористых электродах в электрохимическом конденсаторе. Уравнения Nernst–Planck используются для моделирования транспорта путем диффузии и миграции двоичного электролита, используя параметры крутизны и пористости для получения эффективных транспортных параметров для пористых электродов. Моделирование выполняется с использованием постоянного тока постоянного напряжения и постоянной нагрузки заряда / разряда мощности.
modeldescr_battery/electrochemical_capacitor_side_reactions = Эта модель иллюстрирует влияние образования и рекомбинации кислорода и водорода на производительность и саморазряд электрохимического конденсатора с водным электролитом.\n9000000000003A цикл нагрузки, состоящий из смешанных импульсов постоянного тока и периодов покоя на открытой цепи.
modeldescr_battery/nmc_electrode_heterogeneous = В этом примере гетерогенная структура электрода NMC Electrode\n\n генерируется из данных томографии с использованием Модельного метода.\n\nTime-зависимого разряда и электрохимической импедансной спектроскопии (EIS) симуляции затем производятся на полной 3D-геометрии.\n\nA твердое моделирование механики также производится для изучения влияния расширения/сжатия электрода на напряжения частиц и связующего.


# CAD Import Module and LiveLink models
modeldescr_cad/exhaust_manifold_create_fluid_domain = Создание жидкостного области внутри твердой структуры\n\nЭто руководство показывает, как создать область для объёма жидкости внутри импортируемой сборки САПР. Вы также узнаете, как обнаружить и устранить зазоры и перекрытия между объектами, и как использовать инструменты поражения для удаления филе и через отверстия.
modeldescr_cad/wheel_rim_repair = [Wheel Rim Defeaturing Tutorial Series] Удаление малых геометрических объектов с помощью Repair\n\n Геометрия в этом учебнике содержит небольшие детали, такие как короткие края, маленькие грани и ломтики, которые удаляются с помощью операции ремонта. В руководстве также показано, как использовать предупреждения, возвращенные после создания сетки для определения местоположения и измерения размера мелких деталей, чтобы определить подходящую допуск для ремонта.
modeldescr_cad/wheel_rim_remove_details = [Wheel Rim Defeaturing Tutorial Series] Удаление малых геометрических объектов с помощью Remove Details\n\nСледуйте этому учебнику, чтобы узнать, как автоматически удалять мелкие детали из геометрии с помощью операции Remove Details. Remove Details устанавливает последовательность операций виртуальной геометрии, которые могут быть изменены при необходимости, например, для предотвращения удаления выбранных деталей.
modeldescr_cad/wheel_rim_defeature = [Wheel Rim Defeaturing Tutorial Series] Удаление малых геометрических объектов с помощью инструментов Defeaturing Tools\n\nЭто руководство демонстрирует альтернативный рабочий процесс для удаления мелких деталей из импортированной геометрии САПР. В то время как операция по ремонту удаляет все детали, которые входят в установленный допуск, инструменты поражения, используемые в этом руководстве, позволяют выбирать объекты, которые должны быть удалены.
modeldescr_llac/busbar_llac = Электрический нагрев в шине\n\n В этом примере анализируется резистивный нагрев шины, предназначенной для проведения постоянного тока от трансформатора до электрического устройства.
modeldescr_llcreop/busbar_llcreop = Электрический нагрев в сборке шины\n\nЭто руководство анализирует резистивный нагрев (нагрев джоулей) сборки шины, предназначенной для проведения постоянного тока от источника тока к аноду в процессе электролиза. для изучения влияния размерных параметров на повышение температуры в устройстве параметрический решатель вычисляет моделирование для множественных комбинаций выбранных размеров сборки PTC®Creo® Parametric™.
modeldescr_llinventor/busbar_llinventor = Электрический нагрев в сборке шины\n\nЭто руководство анализирует резистивный нагрев (нагрев джоулей) сборки шины, предназначенной для проведения постоянного тока от источника тока к аноду в процессе электролиза. для изучения влияния размерных параметров на повышение температуры в устройстве параметрический решатель вычисляет моделирование для множественных комбинаций выбранных размеров сборки Autodesk®Inventor®.
modeldescr_llse/busbar_llse = Электрический нагрев в сборке шины\n\nВ этом примере анализируется резистивный нагрев (нагрев джоулей) шинной сборки, предназначенной для проведения постоянного тока от источника тока к аноду в процессе электролиза. для изучения влияния размерных параметров на повышение температуры в устройстве параметрический решатель вычисляет моделирование для множественных комбинаций выбранных размеров сборки Solid Edge®.
modeldescr_llsw/busbar_llsw = Электрический нагрев в сборке шины\n\nЭто руководство анализирует резистивный нагрев (нагрев джоулей) сборки шины, предназначенной для проведения постоянного тока от источника тока к аноду в процессе электролиза. для изучения влияния размерных параметров на повышение температуры в устройстве параметрический решатель вычисляет моделирование для множественных комбинаций выбранных размеров сборки SOLIDWORKS®.
modeldescr_llcreop/induction_motor_llcreop = Двухполюсный трехфазный индукционный двигатель\n\nЭта модель иллюстрирует, как вычислить крутящий момент трехфазного асинхронного двигателя белки-клетки на различных скоростях.\n\nВ примере крутящий момент вычисляется путем усреднения результатов моделирования, выполняемого на 2D сечениях в нескольких местах вдоль асинхронного двигателя. 3D-геометрия и выборки, которые используются для физических настроек, передаются с PTC® Creo® Parametric™ с использованием интерфейса LiveLink™. Определяя плоскость резания в 3D-геометрии, 2D-геометрия для моделирования генерируется в COMSOL Multiphysics® с помощью операции Cross Section, которая также сохраняет выбор, определенный в 3D.
modeldescr_llcreop/pacemaker_electrode_llac = Pacemaker Electrode\n\nЭтот пример показывает, как ток распределяется вокруг электрода кардиостимулятора внутри человеческого сердца.
modeldescr_llcreop/pacemaker_electrode_llcreop = Pacemaker Electrode\n\nЭтот пример показывает, как ток распределяется вокруг электрода кардиостимулятора внутри человеческого сердца.
modeldescr_llinventor/pacemaker_electrode_llinventor = Pacemaker Electrode\n\nЭтот пример показывает, как ток распределяется вокруг электрода кардиостимулятора внутри человеческого сердца.
modeldescr_llse/pacemaker_electrode_llse = Pacemaker Electrode\n\nЭтот пример показывает, как ток распределяется вокруг электрода кардиостимулятора внутри человеческого сердца.
modeldescr_llsw/pacemaker_electrode_llsw = Pacemaker Electrode\n\nЭтот пример показывает, как ток распределяется вокруг электрода кардиостимулятора внутри человеческого сердца.
modeldescr_llsw/pipe_fitting_llsw = Анализ напряжений трубопроводной арматуры из файла САПР\n\nВ этой учебной модели показана настройка двумерного анализа осесимметричного напряжения через контакт трехмерного резьбового трубного фитинга.\n\nВ примере используется синхронизация 3D-геометрии SOLIDWORKS® и выборок, задающих контактирующие грани, с 2D-геометрией в COMSOL Multiphysics®. Плоскость сечения определяется в COMSOL Multiphysics® для создания 2D-геометрии из 3D-объекта SOLIDWORKS®, но после синхронизации ни один из выбранных вариантов не требуется переопределять в среде COMSOL Multiphysics®. Это означает, что вы можете запускать параметрические исследования или оптимизировать проект 3D CAD на основе 2D-анализа.\n\nУзнайте больше об этой учебной модели в соответствующем сообщении в блоге: "<a href="/blogs/studying-stress-in-pipe-fitting-designs-from-cad-assemblies/">Studying Stress in Threaded Pipe Fitting Designs from CAD Assemblies</a>"\n\n<em>SOLIDWORKS является зарегистрированной торговой маркой Dassault Systèmes SOLIDWORKS Corp.</em>
modeldescr_llac/tuning_fork_llac = Оптимизация геометрических параметров Камертон\n\n Этот пример вычисляет фундаментальную собственную частоту и собственный режим для камертона, который синхронизируется с AutoCAD® через интерфейс LiveLink™. Длина вилки затем оптимизируется таким образом, чтобы тюнинговая вилка звучала как нота A, 440 Гц.
modeldescr_llcreop/tuning_fork_llcreop = Оптимизация геометрических параметров Камертон\n\n Этот пример вычисляет фундаментальную собственную частоту и собственный режим для камертона, который синхронизируется с PTC®Creo® Parametric™ через интерфейс LiveLink™. Длина вилки затем оптимизируется таким образом, чтобы тюнинговая вилка звучала как нота A, 440 Гц.
modeldescr_llinventor/tuning_fork_llinventor = Оптимизация геометрических параметров Камертон\n\n Этот пример вычисляет фундаментальную собственную частоту и собственный режим для камертона, который синхронизируется с Inventor® через интерфейс LiveLink™. Длина вилки затем оптимизируется таким образом, чтобы тюнинговая вилка звучала как нота A, 440 Гц.
modeldescr_llse/tuning_fork_llse = Оптимизация геометрических параметров Камертон\n\n Этот пример вычисляет фундаментальную собственную частоту и собственный режим для камертона, который синхронизируется с Solid Edge® через интерфейс LiveLink™. Длина вилки затем оптимизируется таким образом, чтобы тюнинговая вилка звучала как нота A, 440 Гц.
modeldescr_llsw/tuning_fork_llsw = Оптимизация геометрических параметров Камертон\n\n Этот пример вычисляет фундаментальную собственную частоту и собственный режим для камертона, который синхронизируется с SOLIDWORKS® через интерфейс LiveLink™. Длина вилки затем оптимизируется таким образом, чтобы тюнинговая вилка звучала как нота A, 440 Гц.
modeldescr_llrevit/living_room_acoustics_llrevit = Акустика гостиной\n\nПредотвратите встряхивание окон и улучшите качество звука, тщательно расположив громкоговорители в своей комнате. Этот учебник анализирует низкочастотную реакцию гостиной на вуферные единицы двух громкоговорителей и решает собственные частоты комнаты. Геометрия комнаты и мебель синхронизируются с Revit® через интерфейс LiveLink™.
modeldescr_llinventor/bracket_optimization_llinventor = Оптимизация геометрических параметров кронштейна\n\nВ этом примере сведена к минимуму масса кронштейна, который синхронизируется с Inventor® через интерфейс LiveLink™.\n\nСуществуют ограничения как для самой низкой собственной частоты, так и для максимального напряжения в случае статической нагрузки. Размер и положение ряда геометрических элементов изменяются для оптимизации массы, в то время как некоторые геометрические ограничения применяются для сохранения замысла проекта.
modeldescr_llcreop/bracket_optimization_llcreop = Оптимизация геометрического параметра Bracket\n\n Этот пример минимизирует массу скобки, которая синхронизируется с PTC Creo Parametric® через интерфейс LiveLink™9000000000004\n Существуют ограничения как для самой низкой естественной частоты, так и для максимального напряжения в случае статической нагрузки. Размер и положение для ряда геометрических элементов изменяются, чтобы оптимизировать массу, в то время как для поддержания замысла дизайна применяются несколько геометрических ограничений.
modeldescr_llsw/bracket_optimization_llsw = Оптимизация геометрического параметра Bracket\n\n Этот пример минимизирует массу скобки, которая синхронизируется с SOLIDWORKS® через интерфейс LiveLink™9000000000004\n Существуют ограничения как для самой низкой естественной частоты, так и для максимального напряжения в случае статической нагрузки. Размер и положение для ряда геометрических элементов изменяются, чтобы оптимизировать массу, в то время как для поддержания замысла дизайна применяются несколько геометрических ограничений.
modeldescr_llse/bracket_optimization_llse = Оптимизация геометрического параметра Bracket\n\n Этот пример минимизирует массу скобки, которая синхронизируется с Solid Edge® через интерфейс LiveLink™9000000000004\n Существуют ограничения как для самой низкой естественной частоты, так и для максимального напряжения в случае статической нагрузки. Размер и положение для ряда геометрических элементов изменяются, чтобы оптимизировать массу, в то время как для поддержания замысла дизайна применяются несколько геометрических ограничений.
modeldescr_llse/pipe_fitting_llse = Напряжение-анализ фитинга трубы из CAD File\n\n Эта учебная модель показывает настройку 2D аксисимметричного анализа напряжений через контакт 3D резьбового фитинга труб.\n\n Пример включает в себя синхронизацию геометрии и выбора 3D Solid Edge®, которые определяют контактные лица, с 2D-геометрией в COMSOL Multiphysics®. Плоскость резки определена в COMSOL Multiphysics® для создания 2D-геометрии из объекта Solid Edge® 3D, но ни один из вариантов не должен быть переопределен в среде COMSOL Multiphysics® после синхронизации. Это означает, что вы можете запускать параметрические исследования или оптимизировать дизайн 3D CAD из своего 2D-анализа.\n\n<em>Solid Edge является зарегистрированной торговой маркой Siemens Product Lifecycle Management Software Inc.</em>
modeldescr_llcreop/pipe_fitting_llcreop = Напряжение-анализ фитинга трубы из CAD File\n\n Эта учебная модель показывает настройку 2D аксисимметричного анализа напряжений через контакт 3D резьбового фитинга труб.\n\n Пример включает в себя синхронизацию геометрии 3D PTC Creo Parametric® и выборки, которые определяют контактные лица, с 2D-геометрией в COMSOL Multiphysics®. Плоскость резания определена в COMSOL Multiphysics® для создания 2D-геометрии из объекта PTC Creo Parametric® 3D, но ни один из вариантов не должен быть переопределен в среде COMSOL Multiphysics® после синхронизации. Это означает, что вы можете запускать параметрические исследования или оптимизировать дизайн 3D CAD из своего 2D-анализа.\n\n<em>PTC Creo Parametric является зарегистрированной торговой маркой PTC Inc.</em>
modeldescr_llinventor/pipe_fitting_llinventor = Напряжение-анализ фитинга трубы из CAD File\n\n Эта учебная модель показывает настройку 2D аксисимметричного анализа напряжений через контакт 3D резьбового фитинга труб.\n\n Пример включает в себя синхронизацию геометрии 3D Inventor® и выбора, которые определяют контактные лица, с 2D-геометрией в COMSOL Multiphysics®. Плоскость резки определена в COMSOL Multiphysics® для создания 2D-геометрии из объекта Inventor®3D, но ни один из вариантов не должен быть переопределен в среде COMSOL Multiphysics® после синхронизации. Это означает, что вы можете выполнять параметрические исследования или оптимизировать дизайн 3D CAD из своего 2D-анализа.\n\n<em>Inventor является зарегистрированной торговой маркой Autodesk Inc.</em>
modeldescr_llse/bike_frame_analyzer_llse = Базовая модель COMSOL для анализатора велосипедной рамы App\n\nGeometry синхронизирована с Solid Edge® через интерфейс LiveLink™
modeldescr_llcreop/bike_frame_analyzer_llcreop = Базовая модель COMSOL для анализатора велосипедной рамы App\n\nGeometry синхронизирована с PTC Creo Parametric® через интерфейс LiveLink™
modeldescr_llinventor/bike_frame_analyzer_llinventor = Базовая модель COMSOL для анализатора велосипедной рамы App\n\nGeometry синхронизирована с Inventor® через интерфейс LiveLink™

# CFD Module apps
applicationdescr_cfd/inkjet = Inkjet\n\nНесмотря на то, что изначально они были изобретены для использования в принтерах, они были приняты для других областей применения, таких как наука о жизни и микроэлектроника. Моделирование может быть полезным для улучшения понимания течения жидкости и прогнозирования оптимального дизайна струи для конкретного приложения.\n\n Цель приложения Inkjet - адаптировать форму и работу струйного сопла для желаемого размера капли, который зависит от угла контакта, поверхностного натяжения, вязкости и плотности введенной жидкости. Результаты также показывают, распадается ли впрыскиваемый объём на несколько капель, прежде чем слиться в конечную каплю на подложке.\n\n Поток жидкости моделируется несжимаемым Navier– Уравнения Стокса вместе с поверхностным натяжением, используя метод набора уровней для отслеживания жидкостного интерфейса.
applicationdescr_cfd/naca_airfoil_optimization = Оптимизация профиля NACA\n\nАэродинамические свойства крыла, воздушного винта или лопатки турбины в значительной степени определяются точной формой используемого аэродинамического профиля. Приложение NACA Airfoil Optimization вычисляет два основных аэродинамических свойства (коэффициенты подъемной силы и сопротивления) полностью параметризованного профиля NACA. Его можно использовать для визуализации того, как изменения толщины аэродинамического профиля, развала и длины хорды влияют на аэродинамику.\n\nКогда вы вводите число Рейнольдса течения жидкости в приложение для моделирования, соответствующие интерфейсы течения жидкости и сетки автоматически выбираются на основе этого числа. Моделирование с низким числом Рейнольдса выполняется с помощью интерфейса ламинарное течение, а для моделирования с высоким числом Рейнольдса используется модель турбулентности Spalart–0Allmaras, которая была специально разработана для моделирования конструкции аэродинамического профиля.\n\nГеометрия профиля полностью параметризована, и вы можете либо ввести размеры профиля напрямую, либо позволить программе оптимизации app’s найти оптимальную геометрию, чтобы максимизировать коэффициент подъемной силы к лобовому сопротивлению.
applicationdescr_cfd/turbulent_flow_smooth_pipes = турбулентное течение Through Smooth Pipes\n\nЭто приложение предназначено для моделирования турбулентного потока через гладкие трубы и изучения коэффициента трения, профиля скорости и падения давления вдоль трубы. Поток решается с помощью алгебраической модели турбулентности yPlus. Входными параметрами являются радиус и длина трубы, свойства жидкости и число потока Рейнольдса.
applicationdescr_cfd/water_treatment_basin = Обработка воды Basin\n\nЭто приложение демонстрирует следующее:\n\n• Параметризованная геометрия, содержащая последовательность геометрии с if-заявлениями для создания различных типов конструкций\n• Варианты установки размера сетки\n• Графический пользовательский интерфейс, который включает в себя различные окна, которые могут быть показаны или скрыты\n• Light Theme\n\nWater Treatment Basins используются в промышленных процессах для удаления бактерий или других загрязняющих веществ.\n\n Приложение иллюстрирует моделирование турбулентного потока и баланса материалов, подверженных химическим реакциям. Можно указать размеры и ориентацию бассейна, перемешивание перегородок, а также впускных и выпускных каналов. Вы также можете установить постоянную скорость входа, концентрацию видов и скорость реакции в реакции первого порядка.\n\n Приложение решает турбулентный поток через бассейн и представляет полученные поля потока и концентрации, а также пространство-время, период полураспада и падение давления.

# CFD Module models
modeldescr_cfd/ahmed_body = Воздушный поток над Ahmed Body\n\n Этот пример описывает, как вычислить турбулентное поле потока вокруг простой автомобильной геометрии с помощью интерфейса к-эпсилон модуля CFD турбулентное течение. Результаты сравниваются с экспериментальными данными.
modeldescr_cfd/airlift_loop_reactor = Flow in a Airlift Loop Reactor\n\n Этот пример иллюстрирует многофазное моделирование потока в петлевом реакторе. Реактор заполнен водой, а пузырьки воздуха вводятся на дно через два фритта. Из-за плавучести пузырьки поднимаются, вызывая циркулирующее движение жидкости.
modeldescr_cfd/air_filter = Air Filter\n\n Этот пример демонстрирует моделирование турбулентного потока в геометрии с воздушным фильтром. Пористый материал фильтра вызывает резкое падение давления и резкое повышение уровня турбулентности внутри фильтра.
modeldescr_cfd/backstep = Стационарный несжимаемый поток над обратным уступом\n\n Этот пример решает несжимаемые уравнения Navier–Stokes в геометрии с уступом. Визуализация показывает размер области рециркуляции.
modeldescr_cfd/baffled_mixer = ламинарное течение in a Baffled Stirred Mixer\n\nЭтот пример иллюстрирует, как построить сбитый с толку перемешиваемый смеситель с интерфейсом вращающейся машины. Поток в смесителе ламинарный из-за относительно низкой скорости рабочего колеса.
modeldescr_cfd/boiling_water = Boiling Water\n\nЭтот пример изучает кипячение воды пленкой. Тепловой поток над точкой Лейденфроста наносится на поверхность двух полостей. Слой пара поддерживается между горячей поверхностью и результатами кипения жидкости и пленки. Этот режим кипения характеризуется периодическим пролитием пузырьков пара. Используются интерфейсы двухфазного потока, фазового поля и теплопередачи.\n\n Этот пример требует модуля CFD и модуля теплопередачи.
modeldescr_cfd/bubble_column = Поток в реакторе барботажной колонны\n\nВ барботажных колонных реакторах пузырьки газа впрыскиваются через нижнюю стенку резервуара, наполненного водой. Благодаря плавучести пузырьки поднимаются по колонне и заставляют воду циркулировать в резервуаре. В примере используется макроскопическая модель двухфазного потока, предоставляемая интерфейсом Bubbly Flow. Модель учитывает растворение газа в жидкости и, таким образом, также учитывает концентрацию газа, растворенного в жидкости.
modeldescr_cfd/capillary_filling_ls = [Капиллярное заполнение]Капиллярное заполнение — Level Set Method\n\nТранзиентная модель, имитирующая заполнение узкого канала из-за поверхностного натяжения и сцепления стенок. Капиллярный канал изначально заполнен воздухом. Поскольку он прикреплен к водохранилищу, капиллярные силы заставляют воду подниматься через канал. Угол контакта, угол между поверхностью воды и стенкой, фиксируется до 67,5 градусов. Модель может быть решена с использованием либо набора уровней, либо метода фазового поля для отслеживания интерфейса жидкости. В этом примере используется метод набора уровней.
modeldescr_cfd/capillary_filling_pf = [Капиллярное заполнение]Капиллярное заполнение — Метод поля фазы\n\nТранзиентная модель, которая имитирует заполнение узкого канала из-за поверхностного натяжения и сцепления стенок. Капиллярный канал изначально заполнен воздухом. Поскольку он прикреплен к водохранилищу, капиллярные силы заставляют воду подниматься через канал. Угол контакта, угол между поверхностью воды и стенкой, фиксируется до 67,5 градусов. Модель может быть решена с использованием либо набора уровней, либо метода фазового поля для отслеживания интерфейса жидкости. В этом примере используется метод фазового поля.
modeldescr_cfd/chimney = турбулентное течение Around a Factory Chimney\n\n Этот пример имитирует турбулентный поток вокруг фабричного дымохода. Он изучает влияние на структуру потока от спиральных нитей, используемых для уменьшения массивного сбрасывания вихрей во время сильных ветров.
modeldescr_cfd/cylinder_flow_3d_periodic = Нестабильный 3D поток мимо цилиндра\n\n Этот пример имитирует нестабильный ламинарный поток 3D мимо цилиндра в канале. Профиль скорости притока меняется во времени. Коэффициенты подъема и сопротивления вычисляются, и результаты показывают хорошее согласие с опубликованными в литературе.
modeldescr_cfd/dense_suspension = Двухфазное моделирование потока Dense Suspension\n\n Этот пример имитирует поток подвески, помещенной между двумя концентрическими цилиндрами. Внутренний цилиндр вращается, а внешний фиксируется. Суспензия плотная, то есть объёмная фракция твердых частиц высокая. Модель учитывает эффекты плавучести и миграцию, вызванную сдвигом.
modeldescr_cfd/des_3d_hill = Отдельное моделирование Эдди 3D Hill Geometry\n\n Настоящий пример имитирует турбулентный поток по геометрии 3D-холма, используя интерфейс Detached Eddy Simulation (DES) с синтетической турбулентностью на границе входа.
modeldescr_cfd/displacement_ventilation = Displacement Ventilation\n\n Этот пример исследует производительность системы вентиляции смещения. Поток моделируется с использованием интерфейса неизотермическое турбулентное течение, модель k-omega.
modeldescr_cfd/diverging_duct = Расходящийся воздуховод\n\nВ этом примере рассматривается восстановление давления в расширяющемся воздуховоде путем решения уравнений Навье–Стокса.
modeldescr_cfd/dam_break_column_ls = Dam Breaking on the Column, Level Set\n\n Эта переходная модель использует интерфейс двухфазного потока, набора уровней, ламинарного потока для моделирования воздействия волны воды на колонну. Тело воды высотой 0,3 метра изначально содержится за воротами. В начале симуляции ворота внезапно освобождаются, и тело воды образует волну, движущуюся к структуре. После воздействия на конструкцию вода продолжается до тех пор, пока не отразится на стенке резервуара и не ударит второй раз по колонне. Сила давления на колонне вычисляется и может быть сопоставлена с экспериментальными результатами.
modeldescr_cfd/dam_break_column_sw = Прорыв плотины на колонне, уравнения мелкой воды\n\nЭта переходная модель решает уравнения мелкой воды для моделирования воздействия водной волны на столб. Первоначально за воротами находится водоем высотой 0,3 метра. В начале моделирования ворота внезапно открываются, и водная масса образует волну, движущуюся к конструкции. После воздействия на конструкцию вода продолжает движение до тех пор, пока не отразится от стенки резервуара и не ударится второй раз о колонну. Сила давления на колонну вычисляется и может сравниваться с экспериментальными результатами.
modeldescr_cfd/droplet_breakup = Droplet Breakup в T-Junction\n\nEmulsions состоит из небольших капель жидкости, погруженных в другую жидкость, и широко используется в производстве продуктов питания, косметики и фармацевтических продуктов. Этот пример подробно изучает, как каждая капля может быть создана в Т-образном микроканале.
modeldescr_cfd/droplet_population_model = Нефтеводный поток через отверстие — Популяционная модель капельки \n\nВ этом примере рассматривается турбулентный поток подвески масляной воды через отверстие. Капли масла разбиваются на более мелкие капли турбулентными напряжениями, когда суспензия проходит через отверстие. Целью данной модели является отслеживание распределения размеров капель. Распределение размеров капель дискретизировано на пять популяций капель с различным диаметром.\n\n Модель использует модель фазовой транспортной смеси, турбулентный поток, мультифизический интерфейс k-ε для вычисления поля потока смеси и транспортировки различных популяций капель.
modeldescr_cfd/droplet_suspension = Droplet Rising Through the Suspension\n\n Этот пример имитирует каплю масла, поднимающуюся через подвеску. Суспензия изначально стратифицирована, с плотным слоем между двумя прозрачными слоями. Капля изначально расположена в нижнем прозрачном слое. Частицы в суспензии начинают оседать к дну области потока, в то время как часть их также тянутся вместе с поднимающейся капелькой. Эта модель демонстрирует сочетание дисперсной многофазной модели потока с моделью уровня.
modeldescr_cfd/elastohydrodynamic_interaction = Transient Elastohydrodynamic Squeeze-Film Interaction\n\nЭтот бенчмарк вычисляет временное распределение давления и высоту пленки в подшипнике сжимающей пленки для смазки в неконформном соединении твердой сферы и упругой стенки, разделенной смазочной пленкой. Модель решает эталонный случай гидродинамического взаимодействия между твердой сферой и стенкой, разделенной смазочной пленкой, и расширяет эталонный случай, чтобы включить упругую деформацию и напряжения на контактирующей стенке. Настройка модели включает в себя твердую сферу, толкаемую внешней силой к твердой плоской стене. Слой смазки сжимается приближающимся шаром, что приводит к повышению давления смазки. Расчет максимального давления смазки и изменения высоты пленки по функциям времени сопоставляются с аналитическими решениями.
modeldescr_cfd/electrocoalescence = Разделение посредством электрокоалесценции\n\nВ этом примере моделируется процесс электрокоалесценции в системе двух капель воды, транспортируемых в маслонаполненном канале между двумя заряженными пластинами.
modeldescr_cfd/eppler_airfoil_transition = Eppler Airfoil Transition\n\n Поток вокруг фольги Eppler 387 вычисляется с помощью модели турбулентности SST как с переходной моделью, так и без нее. Результаты сравниваются с экспериментальными значениями.
modeldescr_cfd/euler_bump = Сверхзвуковое течение в канале с выступом\n\nСверхзвуковой поток входит в канал на скорости 1,4 Маха. Поток сталкивается с препятствием на дне канала, и возникают ударные волны. Ударные волны распространяются по жидкости и дифрагируют на стенках канала. Модель решает сжимаемые уравнения Эйлера, которые объединяют балансы импульса, массы и энергии.
modeldescr_cfd/euler_bump_3d = 3D сверхзвуковой поток в канале с Bump\n\nA 3D сверхзвуковой поток входит в канал на 1.4 Маха. Поток попадает в препятствие в нижней части канала, и создаются ударные волны. Ударные волны распространяются через жидкость и дифракт на стенках канала. Предполагается, что поток является сжимаемым и неразрешимым.\n\n Модель использует функцию адаптивного сетчатого усовершенствования в COMSOL Multiphysics. Этот пример основан на 2D случае, который широко использовался в более ранних исследованиях сжимаемого потока.
modeldescr_cfd/expansion_fan = Важным и интересным явлением со сверхзвуковыми потоками являются вентиляторы расширения, которые происходят, когда поток сталкивается с выпуклым или углу расширения. Направление потока плавно меняется по вентилятору, а число Маха увеличивается.\n\n Этот 2D-пример моделирует вентилятор расширения, где поток является невязким, и результаты сравниваются с теорией сжимаемого потока. Адаптивная сетка используется для более тонкого разрешения области расширения, чем остальная часть области моделирования.\n\nРезультаты хорошо коррелируют с результатами, проведенными с использованием теории сжимаемого потока.
modeldescr_cfd/fda_benchmark_blood_pump = FDA Benchmark Blood Pump\n\nЭта эталонная модель вычисляет турбулентное поле потока в центробежном насосе крови. Расчетное напряжение сдвига стенки может использоватьсяо для прогнозирования повреждения, которое может произойти с кровью, проходящей через насос при различных условиях нагрузки. Геометрия модели взята из вычислительного раунда Робина FDA и использовалась для нескольких симуляций при заданных скоростях потока и скоростях насоса. 2D-профили величины скорости и головки давления хорошо согласуются с экспериментальными данными.
modeldescr_cfd/fuel_spray_atomization = Атомизация топливных спреев в камере сгорания\n\nАтомизация жидкого топлива в камере сгорания является важным явлением, которое рассеивает топливо при одновременном увеличении соотношения площади поверхности к объёму, увеличении скорости испарения и повышении эффективности сгорания.\n\nВ этом руководстве жидкое топливо впрыскивается в камеру сгорания под высоким давлением. Эффекты турбулентной дисперсии и разрыва капель включены в модель.\n\n Этот пример требует модуля CFD и модуля отслеживания частиц.
modeldescr_cfd/fluid_damper = Вязкое нагрев в жидкостном демпфере \n\n Жидкие амортизаторы имеют широкое применение, например, в военных устройствах для ударной изоляции и гражданских структурах для подавления землетрясений и вибраций, вызванных ветром. Жидкий демпфер работает, рассеивая механическую энергию в тепло. Этот пример моделирует вязкий нагрев и последующее повышение температуры в демпфирующей жидкости и твердых частях амортизатора. Модель использует движущуюся сетку для представления движения большой амплитуды внутри демпфера. Результаты моделирования хорошо согласуются с экспериментальными данными.
modeldescr_cfd/fluidized_bed = Циркулирующая жидкостная кровать \n\n Этот пример имитирует работу циркулирующей жидкостной кровати. Рассеянная фаза, состоящая из твердых сферических частиц, оживляется воздухом и транспортируется вверх через вертикальный подъемник. По достижении выхода дисперсная фаза повторно вводится через вертикальные прорези в нижней части кровати. Твердые и жидкие фазы моделируются с использованием интерфейса Euler–Euler Model, ламинарное течение.
modeldescr_cfd/forced_turbulent_convection = Принудительное турбулентное конвекционное охлаждение горячей плиты\n\nВ этом примере объединяются двумерные поля установившейся температуры и течения жидкости с использованием предопределенной мультифизики для Turbulent Fluid–Thermal Interaction.
modeldescr_cfd/gravity_tutorial = Гравитация и граничные условия\n\nЭта учебная модель показывает простой пример реализации граничных условий при включении объёмных сил, обусловленных гравитацией. Это может использоватьсяо для учета гидростатического давления и для учета вариаций плотности в проблемах свободной конвекции.
modeldescr_cfd/hydrocyclone = Поток в гидроциклоне\n\n В этой учебной модели анизотропная турбулентность в гидроциклоне моделируется с использованием модели турбулентности v2-f. Сложный вихрь, который можно разделить на внешний полусвободный вихрь и внутреннее ядро вращения твёрдого тела, захватывается в результате затухания турбулентных колебаний в стене-нормальном направлении. Скоростное поле и перепады давления между входами и двумя выходами находятся в качественном и количественном согласии с результатами аналогичных конструкций в литературе.
modeldescr_cfd/hydrocyclone_particle_tracing = Отслеживание частиц в гидроциклоне\n\nВ этом расширении руководства по гидроциклону гидроциклон используется для разделения частиц по размеру. Твердые частицы попадают в область моделирования с широким диапазоном диаметров частиц. Частицы подвергаются силе сопротивления, основанной на стационарном поле скоростей жидкости, которое ранее было решено с использованием модели турбулентности v2-f. Затем графики гистограммы используются для сравнения количества частиц каждого размера, достигающих выходов в верхней и нижней части области моделирования.
modeldescr_cfd/incense_stick = Smoke from a Incense Stick — Визуализация Laminar to Turbulent Transition in Natural Convection\n\nВ этом примере рассматривается естественная конвекция воздуха над тлеющей ладанной палочкой. На самом деле этот тип потока часто показывает переход от ламинарного к турбулентному, который хорошо визуализируется дымом, производимым медленным сжиганием благовоний. Цель этой модели состоит в том, чтобы имитировать этот переход и проиллюстрировать это, воспроизводя форму дымового шлейфа.\n\n Чтобы иметь возможность фиксировать переход к турбулентности, модель использует интерфейс неизотермическое течение, LES RBVM. для визуализации потока используется интерфейс трассировки частиц для течения жидкости.
modeldescr_cfd/inclined_screen = Flow Through a Uniform Inclined Screen\n\n Используя функцию экрана интерфейса ламинарное течение, этот пример имитирует поток через однородный наклонный экран и сравнивает результаты с аналитическим решением.
modeldescr_cfd/inkjet_nozzle_ls = Сопло для струйной печати — Метод установки уровня\n\nВ этом примере показано, как смоделировать течение жидкости через сопло струйной печати, например, в принтере. Капля чернил выбрасывается через сопло и перемещается по воздуху, пока не достигнет цели. Течение несжимаемой жидкости моделируется уравнениями Навье–Стокса с поверхностным натяжением. Модель может быть решена с использованием либо набора уровней, либо метода фазового поля для отслеживания границы раздела жидкостей; в этом примере используется метод установки уровня. Модель также использует адаптивную сетку.
modeldescr_cfd/inkjet_nozzle_pf = Сопло для струйной печати — Метод фазового поля\n\nВ этом примере показано, как смоделировать течение жидкости через сопло струйной печати, например, в принтере. Капля чернил выбрасывается через сопло и перемещается по воздуху, пока не достигнет цели. Течение несжимаемой жидкости моделируется уравнениями Навье–Стокса с поверхностным натяжением. Модель может быть решена с использованием либо набора уровней, либо метода фазового поля для отслеживания границы раздела жидкостей; в этом примере используется метод фазового поля.
modeldescr_cfd/journal_bearing = Журнал Bearing\n\nЭтот пример иллюстрирует расчет распределения давления в смазке в полном подшипнике журнала, где подшипник распространяется по всему вращающемуся журналу. При решении уравнения Рейнольдса на поверхности смазки, обернутой вокруг журнала, в примере используется сходящаяся и расходящаяся толщина смазки для моделирования эксцентрического положения журнала в пределах клиренса подшипника.
modeldescr_cfd/journal_bearing_cavitation = Journal Bearing with Cavitation\n\n Этот пример предсказывает начало и степень газообразной кавитации в смазочном слое подшипника журнала. Поскольку кавитация может привести к преждевременному отказу, начало кавитации определяет нагрузку, которая может быть применена к подшипнику.
modeldescr_cfd/les_3d_hill = Большая симуляция Эдди 3D Hill Geometry\n\n Настоящий пример имитирует турбулентный поток по геометрии 3D-холма, используя интерфейс Large Eddy Simulation (LES) с синтетической турбулентностью на границе входа.
modeldescr_cfd/micromixer_particle_tracing = Отслеживание частиц в Micromixer\n\n Этот пример имитирует смешивание частиц во вращающемся микромиксере. Смеситель содержит 3 отдельных входа и выход. Интерфейс вращающейся машины используется для моделирования течения жидкости, а интерфейс трассировки частиц для течения жидкости используется для вычисления траекторий частиц.
modeldescr_cfd/monai_runup = Tsunami Runup on the Complex 3D Beach, Monai Valley\n\n Этот пример является установленным эталонным случаем, который моделирует масштабный лабораторный эксперимент с цунами в долине Монаи в Японии. Основное внимание уделяется региону вблизи береговой линии, для которого имеются подробные экспериментальные данные. Танк изначально заполнен неподвижной водой, и на одной из границ накладывается известная ударная волна. Волна заставляет береговую линию двигаться вперед и назад, в конечном итоге покрывая небольшой остров в середине области.
modeldescr_cfd/naca0012_airfoil = Обтекание наклонного аэродинамического профиля NACA 0012\n\nВ этом примере моделируется обтекание наклонного профиля NACA 0012 под разными углами атаки с помощью модели турбулентности SST. Результаты показывают хорошее согласие с экспериментальными данными о подъемной силе Ладсона и данными о давлении Грегори и O’Reilly.
modeldescr_cfd/naca2414_les = Большой Эдди Моделирование NACA 2414 Airfoil\n\n Метод Residual Based Variational Multiscale (RBVM) применяется в Большом Эдди-симуляторе временного разделения вдоль поверхности аэродинамической пленки NACA 2414 на конечном свободном потоке Рейнольдса числом 300000. Коэффициенты нулевого угла атаки и сопротивления хорошо согласуются с экспериментальными значениями.
modeldescr_cfd/nonisothermal_flow = Неизотермический поток вокруг охлаждающего устройства\n\n Этот пример рассматривает устойчивый поток газа над охлаждающим плавником, который нагревается внешним источником тепла. Тепловой баланс включает области металлического охлаждающего плавника и газа. На примере показано применение COMSOL Multiphysics в моделировании неизотермического потока газов при скоростях потока меньше 0,3 Маха. Модель предполагает, что работа, выполняемая газом, незначительна, что изменения температуры получаются за счет внешнего нагрева, и что газ является идеальным газом.
modeldescr_cfd/non_newtonian_flow = Неньютоновский Flow\n\nЭтот пример изучает влияние вязкости, зависящей от скорости сдвига, на поток линейного полистиролового раствора. для этого типа потока можно использовать модель вязкости Карро, включенную в неньютоновский интерфейс.
modeldescr_cfd/onera_m6_wing = Transonic Flow over the ONERA M6 Wing\n\n В настоящем примере показано, как настроить классическую задачу внешнего потока для решения высокоскоростного, сжимаемого, турбулентного потока над крылом ONERA M6. Проблема заключается в поиске стационарного решения поля потока вокруг 3D, геометрии стреловидного крыла, погруженного в трансонный поток под умеренно высоким углом атаки, что приводит к образованию слабых ударов на верхней поверхности крыла.\n\n Отказ от ответственности: Эта модель использует данные из крыла ONERA M6 в качестве эталона. Эта модель не является аффилированной, одобренной или спонсируемой ONERA.
modeldescr_cfd/phase_separation = Разделение фаз\n\nЭтот контрольный пример показывает, как поставить задачу, связанную с разделением двух несмешивающихся фаз. В примере используется интерфейс Phase Field и функция интерполяции для задания начальных условий.
modeldescr_cfd/pipe_elbow = Flow Through the Pipe Elbow\n\n Этот пример моделирует поток в 90-градусном локте трубы. Поток моделируется с использованием модели турбулентности k-omega. Результат сравнивают с инженерными корреляциями.
modeldescr_cfd/pipe_elbow_erosion = Эрозия труб из-за загрязняющих частиц \n\n Интерфейс трассировки частиц для течения жидкости используется для моделирования эрозии в изгибе трубы. Скорость эрозивного износа в локте трубы сравнивается с использованием нескольких различных моделей эрозии.
modeldescr_cfd/rigid_body_motion = Rigid Body Motion\n\n Этот пример показывает, как вы можете использовать интерфейс Level Set для отслеживания интерфейса в заданном поле скорости. Он также показывает, как выбор параметров уровня влияет на решение.
modeldescr_cfd/rising_bubble_2daxi = Растущий пузырь\n\nВ этой осесимметричной модели нефтяной пузырь поднимается в воде за счет плавучести. В примере используется метод установки уровня для отслеживания границы раздела жидкостей.
modeldescr_cfd/rotating_disk = Swirl Flow Around a Rotating Disk\n\nSwirl flow - это опция, которая учитывает устойчивый вращательный поток вокруг оси. Вместо того, чтобы моделировать этот процесс в 3D, модуль CFD обеспечивает 2D аксисимметричный физический интерфейс, где поток в направлении вращения все еще включен в уравнения. Этот пример показывает влияние вращающегося цилиндра на поток в контейнере. Такие приложения часто используются в химических кинетических экспериментальных устройствах, известных как вращающиеся дисковые электроды.
modeldescr_cfd/rough_pipe = Падение давления в трубе с грубыми стенами\n\n Этот пример вычисляет падение давления для полностью развитого турбулентного потока в трубах с грубыми стенками и сравнивает результаты с законом трения Коулбрука.
modeldescr_cfd/round_jet_burner = Syngas Combustion in a Round-Jet Burner\n\nNon-premixedturbulent combustion of syngas (synthesis gas) происходит в круглоструйной горелке.\n\nSyngas представляет собой газовую смесь, в основном состоящую из водорода, монооксида углерода и двуокиси углерода. Название «сингаз» относится к его использованию при создании синтетического природного газа. В модели сингаз подается из трубы в открытую область с медленным совместным потоком воздуха. При выходе из трубы сингаз смешивается и реагирует с окружающим воздухом непремиксированным образом. Полученное турбулентное пламя прикрепляется к выходу трубы. Модель решается путем объединения Reacting Flow и теплопередача в интерфейсах Fluids. Турбулентный поток в струе моделируется с использованием модели турбулентности k-omega, а турбулентные реакции моделируются с использованием модели диссипации вихря. Полученные скорости, температура и фракции массы видов в реагирующей струе сравниваются с экспериментальными значениями.
modeldescr_cfd/sajben_diffuser = Transonic Flow in a Sajben Diffuser\n\nЭто пример турбулентного сжимаемого потока в 2D конвергентно-дивергентном сопле (диффузор Sajben). Поток поступает в диффузор при Ма = 0,46, ускоряется через сходящуюся часть и достигает звуковых условий у сопла горла. Сверхзвуковой поток завершается ударом в расходящейся части. Стационарные положения ударной волны вычисляются для двух различных значений давления выхода.
modeldescr_cfd/sedimentation_ptmm = Загрязнитель-Удаление из сточных вод в вторичном кларификаторе Sedimentation\n\n Этот пример изучает удаление загрязняющих веществ из сточных вод путем оседания в круговом вторичном прояснителе. В примере используется модель k-эпсилонной турбулентности.
modeldescr_cfd/self_lubricating_bearing = Self-Lubricating Journal Bearing\n\n Этот пример описывает, как имитировать самосмазывающееся явление жидкой смазки в подшипнике журнала. Пористая втулка прижимается к подшипнику и насыщается смазкой. Он выступает в качестве резервуара для перераспределения тонкой пленки смазки между областями различных значений давления в зазоре между кустом и журналом.
modeldescr_cfd/slider_bearing_1d = 1D Plane Slider Bearing\n\nЭтот бенчмарк сравнивает давление, скорость потока и нагрузки с аналитическими решениями для подшипника слайдера 1D.
modeldescr_cfd/solar_panel = Солнечная панель в периодическом Flow\n\nЭта модель иллюстрирует анализ потока вокруг солнечной панели и соответствующего структурного смещения из-за сильной ветровой нагрузки. Изученная солнечная панель расположена в регулярно расположенном массиве идентичных панелей, что означает, что периодические условия потока могут применяться в направлении потока. Модель решает для поля потока скорость свободного потока 25 м/с и вычисляет результирующие структурные напряжения и смещения.\n\nNOTE: Модель требует модуля CFD и модуля механики конструкций.
modeldescr_cfd/solar_panel_geom = [Солнечная панель в периодическом потоке]Солнечная панель в периодическом потоке Template\n\n Эта модель представляет собой шаблон MPH-файла, содержащий геометрию и сетку, используемые моделью солнечной панели.
modeldescr_cfd/sports_car = Large Eddy Simulation of a Sports Car\n\nЭтот пример имитирует турбулентный поток вокруг спортивного автомобиля, движущегося со скоростью 180 км/ч с помощью Large Eddy Моделирование (LES).
modeldescr_cfd/sports_car_fsi = Fluid–Structure Interaction on a Sports Car Door\n\n Этот пример расширяет модель Большого Эдди модели спортивного автомобиля, чтобы включить вибрационный анализ двери автомобиля с окном и зеркалом заднего вида. Силы от жидкости, взаимодействующей с кузовом автомобиля, экструдируются на геометрию двери автомобиля и трансформируются в частотную область с FFT.
modeldescr_cfd/squeeze_film_porous = Squeeze Film Between Rectangular Porous and Nonporous Plates\n\n Этот пример описывает, как имитировать поток тонкой пленки жидкости в зазоре между двумя прямоугольными пластинами, одна из них с пористой облицовкой, когда жидкость сжимается вследствие относительного движения между пластинами. Модель учитывает проникновение и выход жидкости между пористым материалом и тонкопленочной областью.
modeldescr_cfd/step_bearing_1d = 1D Step Bearing\n\nЭтот бенчмарк сравнивает давление, скорость потока и нагрузки с аналитическими решениями для подшипника 1D шага.
modeldescr_cfd/supersonic_ejector = Supersonic Air-to-Air Ejector\n\nВ этом исследовании сжимаемый турбулентный поток через сверхзвуковой эжектор моделируется с использованием интерфейса High Mach Number Flow в модуле CFD.\n\nEjectors являются простыми механическими компонентами, используемыми для широкого спектра применений, включая промышленное охлаждение, вакуумную генерацию, рециркуляции газа и увеличение тяги в двигательных системах самолетов.\n\nEjectors индуцируют вторичный поток по импульсу и передачу энергии от высокоскоростной первичной струи. Высокоэнергетическая жидкость (первичный поток) проходит через конвергентно-дивергентное сопло и достигает сверхзвуковых условий. После выхода из сопла он взаимодействует со вторичным потоком и ускоряется благодаря эффекту, вызванному захватом. Смешивание между обоими потоками происходит вдоль канала с постоянной площадью, называемого камерой смешивания, где можно наблюдать сложные взаимодействия между слоем смешивания и ударами. Диффузор обычно помещают перед выходом, чтобы восстановить давление и вернуть поток к застою.
modeldescr_cfd/thermophoresis = Thermophoresis\n\n Этот пример рассматривает термофоретический перенос частиц в горизонтальном реакторе осаждения химического пара. Зона, свободная от частиц, имеет тенденцию развиваться над сусцептором из-за термофоретической силы, действующей на частицы. Размер зоны, свободной от частиц, зависит от температуры, наложенной на рецептор.\n\n Этот пример требует модуля CFD, модуля теплопередачи и модуля отслеживания частиц.
modeldescr_cfd/three_phase_bubble = Bubble-Induced Entrainment Between Stratified Liquid Layers\n\nЭта модель является эталоном для трехфазного потока, обычно используемого в пищевой промышленности, фармацевтической промышленности и химической обработке. Результаты проверены на основе данных, представленных в литературе.\n\nA пузырь газа поднимается через два слоя жидкости, более легкая жидкость, опирающаяся на более тяжелую. Когда пузырь перемещается из более тяжелой жидкости, он захватывает часть более тяжелой жидкости на своем пути и перемещает ее в более легкую жидкость, создавая хвост тяжелой жидкости.
modeldescr_cfd/tilted_pad_bearing = Подшипники тяги Tilted Pad Thrust Bearing\n\nTilted pad используются в различных вращающихся машинах, которые должны выдерживать высокую нагрузку тяги. Этот пример такого устройства вычисляет распределение давления в смазке и структурную деформацию стационарной наклонной прокладки.
modeldescr_cfd/turbulent_backstep = турбулентное течение over a Backward-Facing Step\n\nЭтот пример имитирует турбулентный поток по геометрии с уступом на уровне примерно Re=48000. Эталонная задача с рециркулирующим потоком, модель решается с помощью модели k-эпсилонной турбулентности. Результаты моделирования сравниваются с результатами, представленными в литературе.
modeldescr_cfd/turbulent_backstep_ext = турбулентное течение over a Backward-Facing Step\n\n Этот пример показывает турбулентный поток по геометрии заднего хода примерно на уровне Re=48000. Модель является эталонной проблемой, которая включает в себя поток канала и циркуляционный поток. Модель решается с помощью модели k-эпсилонной турбулентности. Результаты сравниваются с результатами, представленными в литературе. Этот пример расширен отдельной модельной областью, описывающей впускную область, и дает более точные результаты.
modeldescr_cfd/turbulent_free_porous = Турбулентный параллельный поток в канале с прилегающими жидкими и пористыми регионами\n\n Эта установка демонстрирует, как характеристики турбулентного потока в канале изменяются присутствием прилегающей пористой области. Профили асимметричных скоростей, более высокие уровни турбулентности и более высокие коэффициенты трения как на твердой стене, так и на жидко-пористом интерфейсе наблюдаются в симуляциях. Случаи с высокой проницаемостью показывают отличное согласие как с DNS, так и с экспериментальными результатами без необходимости специально откалиброванных эмпирических функций.
modeldescr_cfd/turbulent_mixing = Турбулентное смешивание в перемешиваемом танке\n\n Этот пример показывает, как можно оценить способность смешивания перемешиваемого сосуда. для эффективного достижения устойчивых условий эксплуатации турбулентный поток решается с использованием анализа замороженного ротора и последующего моделирования, зависящего от времени. Когда развивается квазиустойчивое поле потока, моделируется турбулентное смешивание следовых видов и оценивается время смешивания до полного смешения.
modeldescr_cfd/turbulent_residence_time_2d = Турбулентное время проживания 2D\n\n Степень непонимания в турбулентных реакторах обеспечивает хорошую рециркуляции и накладывает турбулентность, чтобы помочь с перемешиванием. Слишком много ошибок препятствуют темпам производства. Этот пример исследует время пребывания сбитого с толку турбулентного реактора, исследуя время проживания следовых видов. Он также показывает степень турбулентности и рециркуляции, а также мертвые зоны.
modeldescr_cfd/turbulent_residence_time_3d = Турбулентное время проживания 3D\n\n Степень непонимания в турбулентных реакторах обеспечивает хорошую рециркуляции и накладывает турбулентность, чтобы помочь с перемешиванием. Слишком много ошибок препятствуют темпам производства. Этот пример исследует время пребывания сбитого с толку турбулентного реактора, исследуя время проживания следовых видов. Он также показывает степень турбулентности и рециркуляции, а также мертвые зоны.
modeldescr_cfd/twophase_turbulence = Turbulent Two-Phase Flow Benchmark\n\n Этот пример демонстрирует, как использовать интерфейс Phase Field Two-Phase Flow с активированной моделью турбулентности. Модель имитирует наполнение пластины турбулентной струей воды.
modeldescr_cfd/water_purification_reactor = Реактор очистки воды\n\n Этот пример имитирует турбулентное поле потока в упрощенном реакторе очистки воды.

# Chemical Reaction Engineering Module apps
applicationdescr_chem/biosensor_design = Биосенсор Design\n\nSurface реакции с адсорбцией-реакция-десорбция этапы распространены в таких приложениях, как фотокатализ и биосенсоры.\n\n Это приложение Biosensor Design имитирует клетку в биосенсоре, которая содержит множество микропилляров для адсорбции антигенов в водных растворах. Сигнал, пропорциональный поверхностному покрытию, может быть обнаружен в этом датчике посредством хемилюминесценции.\n\n Приложение позволяет пользователю изменять конструктивные параметры датчика. Вы можете изменить диаметр столба, расстояние между сетками и скорость входа и посмотреть, как такие изменения влияют на возможности обнаружения.
applicationdescr_chem/gas_phase_equilibrium_reaction = Равновесие реакции - Преобразование газовой фазы этилена в этанол\n\nЭто приложение демонстрирует следующее:\n\n• Как приложение может использоватьсяо в качестве учебного пособия\n• Восьмивопросная викторина с множественным выбором, ответы на которую можно отправить грейдеру по электронной почте\n\n Это приложение вычисляет равновесные композиции в газовой фазе преобразования этилена в этанол. Это позволяет изучить, как начальные условия и условия эксплуатации влияют на производство этанола.\n\n Приложение предназначено для обучения вычисления количественных результатов для равновесного состава и обеспечения понимания динамики химического равновесия.
applicationdescr_chem/membrane_dialysis = Membrane Dialysis\n\nDialysis является широко используемым методом разделения химических видов. Одним из таких примеров является гемодиализ, который действует как искусственные почки для людей с почечной недостаточностью. При диализе через мембрану могут диффундировать только определенные компоненты, основываясь на различиях в молекулярном размере и растворимости.\n\n Приложение Membrane Dialysis имитирует процесс снижения концентрации загрязняющих веществ в жидкости. Устройство состоит из модуля полых волокон, где стенки полых волокон действуют как мембрана для удаления загрязняющего вещества.\n\nРезультаты этого приложения могут помочь в выборе мембранных материалов, размеров волокон и условий работы.
applicationdescr_chem/liquid_chromatography = Жидкая хроматография\n\nHPLC является распространенным методом разделения, идентификации и количественной оценки каждого химического соединения в смеси. HPLC находится в фармацевтической, биотехнологической и пищевой промышленности.\n\n Приложение Liquid Chromatography имитирует разделение двух видов в общей колонке жидкой хроматографии.\n\nSimulations может помочь точно определить элементы дизайна колонок хроматографии и детали разделения компонентов. Это включает в себя длину и пористость колонны и конкретные условия двух компонентов, включая их изотерму Лангмуир. Все это можно изменить в приложении.

# Chemical Reaction Engineering Module models
modeldescr_chem/activation_energy = Обнаружение параметров кинетического арениуса с помощью оценки параметров \n\nParameter Estimation имеет важное значение для экспериментальной калибровки теоретических моделей. В этом примере используются функции оценки параметров и эксперимента в интерфейсе Reaction Engineering. Он использует несколько экспериментальных файлов ввода данных, чтобы найти параметры реакции первого порядка. Реакция включает разложение хлорида бензола диазония на хлорид бензола и азот.
modeldescr_chem/barium_sulfate_precipitation = Осадки Barium Sulfate\n\nCrystallization являются важным процессом разделения в химической промышленности. Используется для производства фармацевтических препаратов и промышленных химикатов. Кристаллизация также может использоватьсяа в восстановлении ресурсов как способ отделения ценных материалов от отходов. Эта модель решает дискретную формулировку уравнения баланса популяции для получения распределения размера кристалла от осадков сульфата бария в 0D и 3D T-миксере.
modeldescr_chem/beer_fermentation = Ферментация в Beer Brewing\n\nВ процессе ферментации пива алкоголь, углекислый газ и различные ароматизаторы образуются, когда сахара потребляются дрожжами.\n\nВ этом примере процесс ферментации моделируется в идеально смешанном резервуаре с использованием интерфейса Reaction Engineering. \n\n Модель может использоватьсяа для оптимизации процесса ферментации пива и улучшения вкуса пива. Это позволяет изучить влияние, например, начального содержания сахара, температуры и типа дрожжей на процесс ферментации.
modeldescr_chem/bending_pipe = Bending Pipe\n\nЭтот пример моделирует течение жидкости через изгибающую трубу с высоким номером Рейнольдса. В этом примере сравниваются результаты, полученные с помощью моделей турбулентности k-эпсилон и k-омега, с экспериментальными данными. Модель содержит подробные описания того, как сделать моделирование максимально точным.
modeldescr_chem/benzoic_acid_crystallization = Crystallization of Benzoic Acid in a Mixed Suspension, Mixed Product Removal Crystallizer\n9000000000001Crystallization является ключевым процессом разделения, например, в производстве фармацевтических препаратов. Это процесс, посредством которого химический вид отделяется от раствора, образуя кристалл. для достижения требуемых свойств продукта необходим контроль за распределением размера кристаллических частиц. Эта модель 0D реализует уравнение баланса популяции для определения распределения размера кристалла и среднего размера частиц для кристаллизации бензойной кислоты в кристаллизаторе смешанной подвески, смешанного продукта.
modeldescr_chem/biochip = Электрокинетический поток в биочипе\n\nВ этом примере моделируется электрокинетический поток в чипе ДНК. Перемещение жидкости происходит за счет наличия у стенок каналов чипа заряженного раствора, который мигрирует под действием электрического поля. Электроосмотический поток в модели связывает электрическое поле с уравнениями Навье–Стокса на границах.
modeldescr_chem/biosensor_design_embedded = Биосенсор Design\n\nSurface реакции с адсорбцией-реакция-десорбция этапы распространены в таких приложениях, как фотокатализ и биосенсоры.\n\n Это приложение Biosensor Design имитирует клетку в биосенсоре, которая содержит множество микропилляров для адсорбции антигенов в водных растворах. Сигнал, пропорциональный поверхностному покрытию, может быть обнаружен в этом датчике посредством хемилюминесценции.\n\n Приложение позволяет пользователю изменять конструктивные параметры датчика. Вы можете изменить диаметр столба, расстояние между сетками и скорость входа и посмотреть, как такие изменения влияют на возможности обнаружения.
modeldescr_chem/boat_reactor = Корабельный реактор для осаждения химических паров низкого давления\n\n В этом примере описывается реактор лодки низкого давления для осаждения химического пара. Моделирование описывает, как скорость осаждения зависит от течения жидкости и химической кинетики.
modeldescr_chem/capillary_electrophoresis_1 = Капиллярный электрофорез 1\n\n Электрофорез смеси, содержащей бензойную кислоту и хлорбензойную кислоту, с ацетатом натрия в качестве фонового электролита, изучается в модели, которая включает транспорт вовлеченных видов посредством диффузии и миграции. Транспортные уравнения сочетаются с материальным балансом и состоянием электронейтральности. Эта вводная модель не учитывает реакции кислотного основания, что приводит к плохому разделению компонентов.
modeldescr_chem/capillary_electrophoresis_2 = Капиллярный электрофорез 2\n\n Электрофорез смеси, содержащей бензойную кислоту и хлорбензойную кислоту, с ацетатом натрия в качестве фонового электролита, изучается в модели, которая включает транспорт вовлеченных видов посредством диффузии и миграции. Транспортные уравнения сочетаются с материальным балансом и состоянием электронейтральности. Реакция нейтрализации для всех вовлеченных кислотно-щелочных пар включена в модель. Это вторая модель в серии из двух.
modeldescr_chem/carbon_deposition = Осаждение углерода в гетерогенном катализе\n\nВ этом примере исследуется термическое разложение метана на твердом катализаторе Ni-Al₂O₃. В качестве продуктов образуются газообразный водород и твердый углерод. Отложения углерода подавляют активность катализатора и снижают проницаемость реактора. Процесс моделируется как с помощью интерфейса Reaction Engineering в идеально смешанной среде, так и с помощью пространственно-зависимой модели.
modeldescr_chem/catalytic_cracking = Catalytic Cracking\n\n Этот пример иллюстрирует жидкостное каталитическое растрескивание (FCC) вспыхнувшего дистиллятного сырья в реакторе с пробкой. Кинетическая модель, в которой пять групп участвуют в восьми реакциях, описывает процесс растрескивания. Также учитывается влияние коксования на активность катализатора.
modeldescr_chem/chlor_alkali = Current Distribution in a Chlor-Alkali Membrane Cell\n\n Этот пример описывает текущее и потенциальное распределение в ячейке в ячейке мембраны хлор-щелочной мембраны. Модель представляет собой модель распределения вторичного тока, что означает, что она учитывает зависимость переноса электронов от локального потенциала.
modeldescr_chem/chlorine_scrubber = Нейтрализация хлора в Scrubber\n\n В этой модели анализируется кинетика нейтрализации газа хлора в водном растворе в скруббере. Смоделированный процесс включает в себя четыре равновесные реакции и предполагает, что объём жидкости в скруббере является постоянным и идеально смешанным.
modeldescr_chem/cinnamaldehyde_hydrogenation = Гидрогенизация циннамальдегида\n\nГидрирование ненасыщенных альдегидов по твердым катализаторам может происходить через несколько путей реакции. Автоматически генерируемая кинетика реакции и интегрированная оценка параметров позволяют легко охарактеризовать различные каналы реакции.
modeldescr_chem/compression_ignition = Однородное сжатие заряда Зажигание метана\n\n Однородное воспламенение сжатия заряда (HCCI) метана анализируется в этом примере. Кинетика горения сложна и включает 53 вида, принимающих участие в 325 реакциях.\n\n Механизм реакции настраивается путем импорта файлов CHEMKIN с формулами химической реакции, кинетикой и термодинамическими данными. для этого используется функция Reversible Reaction Group в интерфейсе Reaction Engineering.
modeldescr_chem/copper_deposition = Copper Deposition\n\nЭтот пример иллюстрирует использование движущихся сеток в учете изменения геометрии при электродепозиции меди на поверхности катода. Учитываются как кинетика электродов, так и транспорт посредством диффузии и конвекции ионов, и поэтому модель называется моделью распределения плотности третичного тока.
modeldescr_chem/cstr_stability = CSTR Стабильность\n\nПредопределенный тип реактора CSTR используется для моделирования неизотермического процесса. Модель иллюстрирует, как оценить стабильность нескольких устойчивых состояний.
modeldescr_chem/cstr_startup = Стартап реактора непрерывного перемешивания танков \n\n Имитируется начальная фаза реактора с непрерывным перемешиванием резервуара (CSTR), используемого для производства пропиленгликоля. Результаты показывают, как определенные начальные условия приводят к нарушению пределов безопасности реактора.
modeldescr_chem/cubic_autocatalysis = Кубический автокатализ: исследование модели Грея–Скотта\n\nПоказано, что обманчиво простая система двух видов и двух реакций, описывающая автокаталитическое превращение вещества, демонстрирует удивительно экзотическое поведение. На основе описания 0D CSTR формулируется двумерная задача реакции-диффузии, показывающая богатые закономерности, вытекающие из мультистабильности базовой реакционной сети.
modeldescr_chem/darcy_3d = Изменения плотности потока пористой среды\n\nЗакон Дарси описывает течение в пористой среде. Потери давления значительны, и необходимо учитывать влияние изменений плотности. Это достигается за счет использования закона идеального газа в уравнении непрерывности, которое в сочетании с законом Дарси определяет этот пример.
modeldescr_chem/dialysis = Разделение через Dialysis\n\n Этот пример вычисляет концентрацию загрязняющих веществ в водном потоке, который подвергается диализу. Устройство для диализа обычно изготавливается из модуля полых волокон, где многие полые волокна действуют как мембрана. Процесс диффузионно-управляемый, то есть загрязняющие вещества диффундируют через мембрану из-за различий в концентрации между диализатом и пронизанными сторонами мембраны.\n\n Этот пример моделирует удаление загрязняющих веществ в пределах одного полого волокна и предполагает полностью развитый ламинарный поток в геометрии. Также учитываются уравновешивания разделов между различными частями волокна, которые вызывают разрывы в концентрации переносимых видов.
modeldescr_chem/distillation_column = Размерение дистилляционной колонны для разделения воды и этанола\n\n Этот пример показывает, как сделать простую модель для процесса двоичной дистилляции, объединив функциональность в термодинамическом узле, доступную при лицензировании в модуле химической реакции и интерфейсе транспорта концентрированных видов. В данной модели изучается разделение неидеальной смеси этанола и воды. Требуемое равновесное соотношение генерируется с использованием функциональности равновесного расчета, доступной при использовании узла термодинамики. Модель используется для нахождения оптимальной конструкции колонны с точки зрения длины разделочных и выпрямительных секций для удовлетворения набора заданных композиций дистиллята и днища.
modeldescr_chem/membrane_dialysis_embedded = Membrane Dialysis\n\nDialysis является широко используемым методом разделения химических видов. Одним из таких примеров является гемодиализ, который действует как искусственные почки для людей с почечной недостаточностью. При диализе через мембрану могут диффундировать только определенные компоненты, основываясь на различиях в молекулярном размере и растворимости.\n\n Приложение Membrane Dialysis имитирует процесс снижения концентрации загрязняющих веществ в жидкости. Устройство состоит из модуля полых волокон, где стенки полых волокон действуют как мембрана для удаления загрязняющего вещества.\n\nРезультаты этого приложения могут помочь в выборе мембранных материалов, размеров волокон и условий работы.
modeldescr_chem/diesel_filter = Система фильтрации химических реакций и сажи в дизельном фильтре Filter\n9000000000001A для дизельного двигателя анализируется как идеальный реактор и как детальный блок, зависящий от пространства. В примере рассматривается, как пористая мембрана отделяет частицы сажи от выхлопных газов, проходящих через нее. Он учитывает как каталитические, так и некаталитические реакции, которые подавляют накопление слоя; окисление углерода до окиси углерода и двуокиси углерода, которые оба способны проходить через мембрану. Зависимая от пространства модель использует движущийся сетчатый интерфейс, чтобы включать изменение формы из-за накопления слоя сажи внутри мембраны.
modeldescr_chem/dissociation = Диссоциация в трубчатом реакторе \n9000000000001A смоделирована, в которой происходит обратимая реакция диссоциации вида A <->2B. В примере учитывается количество молекул в газовой фазе, увеличивающееся вдоль пути реакции, что приводит к увеличению объёма газовой смеси и ускорению газа. Исследуются как изотермические, так и неизотермические условия реактора.
modeldescr_chem/dna_degradation = Деградация ДНК в Plasma\n\n Доставка плазмидной ДНК к целевым участкам является серьезной проблемой в области генной терапии. В этом примере используется оценка параметров для определения констант скорости трех последовательных реакций, участвующих в типичном процессе деградации ДНК.
modeldescr_chem/diesel_particulate_filter = 3D-модель фильтра для дизельных частиц\n\nA 3D дизельный фильтр твердых частиц моделируется с использованием сопряженных интерфейсов передачи массы, тепла и импульса. Стены пористые, что позволяет газу проходить через них, в то же время отделяя частицы от потока. Изучаются усредненные поля концентрации, температуры и потока. Динамическое представление накопления сажи в фильтре учитывает осаждение частиц, а также каталитическое окисление углерода.
modeldescr_chem/ethanol_water_evaporation = Испарение этанола и воды из бокала\n\nВо время профессиональной дегустации вин за один сеанс оцениваются несколько образцов вина. Важно, чтобы каждый образец был накрыт, так как испарение этанола и воды изменит вкус. Эта модель имитирует испарение этанола и воды из бокала. Испарение нескольких веществ из неидеальной жидкой смеси моделируется с использованием расширенного закона Рауля. Испарение вызывает свободную конвекцию в окружающей паровой фазе как из-за изменения состава, так и из-за тепла испарения. Модель настраивается в двухмерной осевой симметрии с использованием связанных интерфейсов «Ламинарный поток», «Перенос концентрированных частиц» и «Теплопередача в жидкостях». Точные термодинамические данные предоставляются функцией «Термодинамика».Модель UNIQUAC используется для жидкой системы в сочетании с кубическим уравнением состояния Пенг–Робинсона, а модель Соаве–Redlich–Квонг используется для парожидкостной системы.
modeldescr_chem/drug_release = Высвобождение лекарств из матрицы биоматериала\n\nВ этом примере рассматривается подробная кинетика высвобождения лекарственного средства с выражениями скорости, учитывающими реакции диссоциации/ассоциации лекарственного средства, а также деградацию матрицы посредством ферментативного катализа. Ферментативная реакция описывается кинетикой Михаэлиса-Ментена. Модель исследует параметры конструкции, определяющие скорость высвобождения лекарства: сродство лекарства к биоматериалу, деградация биоматериала, загрузка лекарства, а также влияние геометрии и состава матрицы биоматериала.
modeldescr_chem/electrodialysis = Электродиализ\n\nTutorial модель, которая обрабатывает повторяющийся блок в клетке электродиализа. Повторяющаяся единичная клетка обрабатывает концентрированный канал и две половины разбавленных каналов, по одной на каждой стороне катион-селективной и анион-селективной мембран соответственно.
modeldescr_chem/electroosmotic_flow = Электроосмотическое течение в Porous Media\n\nЭлектроосмотическое течение в пористых средах показано в этом примере. Система состоит из отсека из спеченного пористого материала и двух электродов, которые генерируют электрическое поле. Клетка сочетает в себе давление и поток, управляемый электроосмосом.
modeldescr_chem/electrophoresis_channel = Электрофорез в канале Junction\n\n Этот пример изучает электрофоретический транспорт трех заряженных видов, разбавленных в водном растворе. Одна из ионных пар представляет собой буферный раствор, а третья — вид, который предполагается транспортировать в полевых условиях.
modeldescr_chem/engine_coolant_properties = Свойства охлаждения двигателя\n\n Блок двигателя автомобиля включает охлаждающую куртку для удаления избыточного тепла от сгорания. Охлаждающая куртка состоит из открытых пространств в блоке цилиндров и головке цилиндра. Когда двигатель работает, жидкость охлаждающей жидкости прокачивается через куртку, чтобы предотвратить перегрев двигателя. Оптимизация удаления тепла важна для минимизации кипения охлаждающей жидкости, предотвращения отказа двигателя и, в последнее время, повышения общей эффективности за счет рекуперации отработанного тепла. Этот пример демонстрирует, как функция термодинамики может использоватьсяа для оценки производительности различных охлаждающих веществ двигателя.
modeldescr_chem/enzyme_inhibition = Enzyme Inhibition\n\n В этом примере вы оцениваете константы скорости в фермент-катализаторе реакционной системы. Чтобы запустить оценку параметров, вы импортируете и оцениваете несколько наборов данных.
modeldescr_chem/erythritol_kinetics = Erythritol Kinetics\n\nЭтот пример рассматривает процесс получения пентаэритрита в водном щелочном растворе формальдегида и ацетальдегида. Создана и решена кинетическая модель. Модель откалибрована по экспериментальным данным на концентрацию по сравнению со временем, и оцениваются кинетические параметры.
modeldescr_chem/falling_film = Поглощение в падающем фильме\n\n Этот пример рассматривает падающую пленку в аппарате для измерения поглощения хлора, разведенного в водороде, в едком растворе. Раствор обеспечивает профиль концентрации десяти видов в системе.
modeldescr_chem/fixed_bed_reactor = Реактор с фиксированной кроватью для каталитического окисления углеводородов\n\n Этот пример рассматривает процесс производства фталического ангидрида в многотрубном реакторе с фиксированной кроватью. Процесс очень экзотермический, и в модели учитывается охлаждение на поверхности реакторных трубок. Модель включает в себя баланс массы для участвующих видов и энергетический баланс.
modeldescr_chem/fuel_cell_stack = Fuel Cell Stack\n\n Этот пример имитирует поток в газовых каналах стека топливных элементов. Модель имеет дело с газовыми каналами на воздушной стороне трех биполярных пластин. Каналы в соответствующих пластинах соединены между собой через цилиндрические заголовки для входа и выхода воздуха.
modeldescr_chem/gaas_cvd = На этом примере показано моделирование реактора для химического осаждения паров (CVD). CVD является важным процессом для электронной промышленности, в которой тонкая пленка выращивается на подложке, позволяя молекулам и молекулярным фрагментам адсорбироваться и реагировать на поверхности. Сочетание детальной кинетики химической реакции с транспортными моделями реактора ССЗ позволяет реалистично моделировать процесс осаждения. Такое моделирование, в свою очередь, сводит к минимуму большое количество дорогостоящих и трудоёмких пробных запусков, обычно необходимых для проектирования реактора.\n\n Интерфейс Химии собирает кинетику реакции и вычисляет транспортные и тепловые параметры, которые могут быть легко связаны с другими интерфейсами. В этой модели также используется функция Reversible Reaction Group для импорта поверхностных реакций CHEMKIN и организации сложной системы объёмных и поверхностных реакций, которые участвуют в процессе CVD.
modeldescr_chem/gas_phase_equilibrium_reaction_embedded = Равновесие реакции - Газовая фаза преобразования этилена в этанол\n\n Это приложение вычисляет равновесные композиции в газовой фазе преобразования этилена в этанол. Это позволяет изучить, как начальные условия и условия эксплуатации влияют на производство этанола.\n\n Приложение предназначено для использования в качестве учебного инструмента, как для обеспечения понимания динамики химического равновесия, так и для демонстрации того, как вычислять количественные результаты для равновесного состава.
modeldescr_chem/glycolytic_oscillations = Колебания в сетях метаболической реакции\n\n При определенных условиях скорость реакции, участвующей в гликолизе, может проявлять предельный цикл, когда концентрации периодически изменяются таким образом, который обычно не наблюдается в химической кинетике. Здесь используется комбинированная кинетическая модель из литературы для изучения того, как изменяется скорость потребления глюкозы вместе с коэнзимом NADH и энергоносителем АТФ. Эволюция времени колебаний в концентрации изучается в однородной системе, а транспортные процессы через клеточную мембрану обрабатываются неявным образом.
modeldescr_chem/gold_recycling = Переработка золота через окислительное растворение\n\n Модель изучает окислительное растворение этого благородного металла в насыщенном воздухом растворе цианида. Система охватывает три фазы: газообразную фазу (воздух), водную фазу и твердую золотую фазу. Предполагается, что система является однородной в макроскопическом масштабе, например, мелкие твердые частицы, диспергированные в воде, которая непрерывно возбуждается потоком пузырьков воздуха.
modeldescr_chem/heat_exchanger = Нагрев потока в теплообменнике\n\n Теплообменник использует перенос тепла конвекцией и проводимостью. Такие системы распространены в теплообменниках и для нагрева эндотермических реакторов. Параметрическое исследование показывает распределение температуры в жидкости, поскольку отслоение происходит на поверхности цилиндра.
modeldescr_chem/hi_batch_reactor = HI Batch Reactor\n\nA идеально смешанная модель реактора используется для имитации реагирующей смеси водорода и йодного газа, которая может реагировать и образовывать HI. Реакцию изучают и сравнивают в изотермических и неизотермических условиях.
modeldescr_chem/h_cell = Микроканал H-Cell\n\n Этот пример рассматривает микроканал H-клетки для разделения посредством диффузии. Клетка устанавливает два различных ламинарных потока в контакт в течение контролируемого периода времени. Контактная поверхность хорошо определена, и, контролируя скорость потока, можно контролировать количество видов, которые переносятся из одного потока в другой посредством диффузии.
modeldescr_chem/ibuprofen_synthesis = Ibuprofen Synthesis\n\nIbuprofen является важным противовоспалительным препаратом, синтезируемым катализом палладия. Этот пример иллюстрирует кинетический анализ сложного реакционного механизма в идеально перемешанной партии реактора.
modeldescr_chem/ion_speciation = Acid-Base Equilibria and Copper Speciation in Ammonia Solution\n\nCupric ионы проявляют сильное сродство к аммиаку в водных растворах, образуя сильно окрашенные глубокие синие комплексы. Относительные количества различных комплексов аминолигандов с различными координационными числами определяются константами стабильности равновесия, образующих координационные соединения. Вводя ряд равновесных реакций и внешний источник аммиака, решатель зависящий от времени может использоваться для получения диаграммы видообразования, которая показывает, как концентрация различных комплексов изменяется с общей концентрацией добавленного аммиака.
modeldescr_chem/isoelectric_focusing_1d = Isoelectric Focusing\n\nЭта модель демонстрирует изоэлектрическую фокусировку (IEF) семи амфолитов в колонке.\n\n Модель находится в 1D и решается в симуляции, зависящей от времени.
modeldescr_chem/isoelectric_separation = Isoelectric Separation\n\nЭтот пример применяет интерфейсы <em>Electrophoretic Transport</em> и <em>ламинарное течение</em> для моделирования изоэлектрического разделения в устройстве электрофореза свободного потока. Поток, содержащий шесть различных ионных видов, как показано, разделяется на чистые составные потоки посредством мигрирующего транспорта в электрическом поле.\n\nЭлектрофорез свободного потока может отделять макромолекулы, такие как белки, на основе их подвижности перпендикулярно потоку несущей жидкости. Если, кроме того, градиент pH применяется через поток носителей, то молекулы могут быть сфокусированы вдоль их изоэлектрических точек. Изоэлектрическая точка — это pH, при котором молекула имеет нулевой чистый заряд. Молекулы с положительным чистым зарядом будут двигаться в направлении электрического поля вдоль градиента pH, пока не достигнут изоэлектрической точки. В этом случае мигрирующий транспорт выключается, поскольку чистый заряд молекул равен нулю. Аналогично, анионные виды перемещаются в направлении, противоположном электрическому полю.
modeldescr_chem/laminar_static_mixer = Laminar Static Mixer\n\n В статических смесителях жидкость прокачивается через трубу, содержащую стационарные перегородки. Этот метод смешивания особенно хорошо подходит для смешивания ламинарного потока, поскольку он дает небольшие потери давления в этом режиме потока. В этом примере изучается поток в скрученном лезвии статического смесителя.
modeldescr_chem/liquid_chromatography_1 = Жидкая хроматография\n\nChromatography является важной группой методов для разделения тесно связанных компонентов сложных смесей. Этот пример моделирует разделение в высокопроизводительной колонке жидкостной хроматографии (HPLC).
modeldescr_chem/liquid_chromatography_embedded = Жидкая хроматография\n\nHPLC является распространенным методом разделения, идентификации и количественной оценки каждого химического соединения в смеси. HPLC находится в фармацевтической, биотехнологической и пищевой промышленности.\n\n Приложение Liquid Chromatography имитирует разделение двух видов в общей колонке жидкой хроматографии.\n\nSimulations может помочь точно определить элементы дизайна колонок хроматографии и детали разделения компонентов. Это включает в себя длину и пористость колонны и конкретные условия двух компонентов, включая их изотерму Лангмуир. Все это можно изменить в приложении.
modeldescr_chem/maxwell_stefan_diffusion = Maxwell–Stefan Diffusion in a Fuel Cell Unit Cell\n\nЭтот пример учитывает диффузию Maxwell–Stefan при описании массового транспорта в поперечном сечении катода протонно-обменных мембранных топливных элементов.
modeldescr_chem/membrane_hda = Гидродеалкилирование в мембранном реакторе\n\n Процесс термического гидродеалкилирования, осуществляемый в мембранном реакторе, моделируется в этом примере. В этом примере используется функция термодинамики, которая включает в себя встроенные термодинамические и физические оценки свойств.
modeldescr_chem/mems_heat_exchanger_3d = 3D-модель MEMS Heat Exchanger\n\n Модель в этом исследовании имеет дело с микромасштабным теплообменником из нержавеющей стали. Теплообменники этого типа находятся в лабораторных устройствах в биотехнологии и в микрореакторах, например, для микромасштабных топливных элементов.
modeldescr_chem/microbial_growth = Микробный рост\n\nЧетырехэтапная кинетическая модель описывает рождение, рост и смерть микробов. Модель используется для прогнозирования концентрации микробов в хлебе в зависимости от температуры.
modeldescr_chem/microchannel_h_cell = Микроканал H-Cell\n\n В этом примере моделируется микроканал H-клетки, используемый для разделения посредством диффузии. Клетка устанавливает два различных ламинарных потока в контакт в течение контролируемого периода времени. Контактная поверхность хорошо определена, и, контролируя скорость потока, можно контролировать количество видов, которые транспортируются из одного потока в другой посредством диффузии.
modeldescr_chem/microreactor_optimization = Оптимизация каталитического микрореактора\n\nA осуществляется через каталитический слой, где растворенный вид реагирует при контакте с катализатором. для заданной общей разности давлений на слое эта модель находит оптимальное распределение катализатора для максимизации общей скорости реакции растворенного вещества.\n\n Модель требует модуля оптимизации.
modeldescr_chem/monolith_3d = Сокращение NOx в монолитном реакторе \n\nNO происходит при прохождении дымовых газов через каналы монолитного реактора в выхлопной системе автомобиля. В этом примере исследуется полная геометрия 3D-модели реактора, и модель включает массовый транспорт, теплообмен и течение жидкости.
modeldescr_chem/monolith_kinetics = Анализ NOx Reaction Kinetics\n\nВ этом примере исследуется уменьшение NO в выхлопной системе автомобиля, где реакции происходят, когда дымовые газы проходят через каналы монолитного реактора. Исследование было сосредоточено на том, как температура и состав влияют на селективность реакции. Модель настроена с использованием реактора с заглубленным потоком в интерфейсе Reaction Engineering.
modeldescr_chem/monolith_plugflow = Уменьшение монолитного Plug-Flow\n\nNO происходит при прохождении дымовых газов по каналам монолитного реактора в выхлопной системе автомобиля. Реакционноспособный монолитный канал моделируется как неизотермический вилочный реактор.
modeldescr_chem/monolith_thermal_stress = Тепловые нагрузки в монолитном реакторе \n\nNO снижаются при прохождении дымовых газов по каналам монолитного реактора в выхлопной системе автомобиля. Экзотермические реакции в реакторе приводят к температурным градиентам, и этот пример исследует деформацию реактора, которая происходит из-за тепловых напряжений.
modeldescr_chem/monolithic_reactor = Monolithic Reactor\n\n Этот пример показывает, как моделировать химические реакторы в трех измерениях с помощью псевдо-3D-подхода, используя время в качестве оси z в канале монолита.
modeldescr_chem/multicomponent_tubular_reactor = Мультикомпонентный трубчатый реактор с изотермическим охлаждением\n\nЭта модель описывает трубчатый реактор, где оксид пропилена (A) реагирует с водой (B) с образованием пропиленгликоля (C): \n\nA + B -> C\n\nПоскольку вода является растворителем и присутствует в изобилии, кинетика реакции описывается как первый порядок по отношению к оксиду пропилена\n9000000000007R = k*C A9000000000008\n Реакция является экзотермической, и для охлаждения реактора используется изотермическая охлаждающая куртка.\n\n Реактор моделируется в 2D-аксисимметрии, и результаты моделирования дают изменения состава и температуры как в радиальном, так и в осевом направлениях. Интерфейс химии используется для включения реакционной кинетики и свойств массового транспорта.
modeldescr_chem/nonideal_cstr = Оценка параметров для неидеальных реакторных моделей\n\n Этот пример устанавливает так называемую модель мертвой зоны, неидеальную модель реактора. для этого используются два идеальных CSTR, один из которых представляет хорошо смешанную область, а другой - менее возбужденную область реального реактора. Два параметра, относящихся к объёму и обменному курсу двух регионов, определяются по параметрам.
modeldescr_chem/nonisothermal_plug_flow = Nonisothermal Plug-Flow Reactor\n\n Предопределенный тип реактора с заглубленным потоком в интерфейсе Reaction Engineering используется для моделирования неизотермического растрескивания ацетона. Соображения процесса исследуются, когда реакция запускается адиабатически, когда теплообменник подает энергию в реактор и с инертным присутствием.
modeldescr_chem/nox_reduction = NOx Reduction\n\nВ этом примере рассматривается селективное каталитическое уменьшение NOx в потоке выхлопных газов. Реакция происходит на каталитической поверхности монолитного реактора. Первое моделирование моделирует монолитный канал в качестве разъемного реактора. Второе моделирование учитывает фактическую геометрию канала и решает связанные уравнения баланса массы и импульса.
modeldescr_chem/optimal_cooling = Оптимальное охлаждение трубчатого реактора\n\n В этом примере рассматриваются две последовательные реакции, происходящие в неизотермическом трубчатом реакторе. Вычисления оптимизации производятся для определения температурных условий в реакторе, которые максимизируют производство продукта промежуточной реакции.\n\n Эта модель требует модуля оптимизации.
modeldescr_chem/oscillating_droplet = Колеблющийся Droplet\n\n Этот пример имитирует колеблющуюся каплю жидкого кобальта, окруженную воздухом. Поток жидкости моделируется уравнениями Navier–Stokes в сочетании с методом набора уровней сохранения массы для представления движущегося интерфейса между кобальтом и воздухом. Поверхностное натяжение включено в модель.
modeldescr_chem/oscillating_reactions_bz = Oscillating Reactions\n\n Этот пример относится к колеблющейся реакции Белоусова-Жаботинского. Такие же периодические колебания концентрации достигаются независимо от исходных концентраций реагентов.
modeldescr_chem/oscillating_reactions_lotka = Колеблющиеся реакции\n\nВ автокатализаторе реагенты, промежуточные вещества и продукты могут периодически изменяться. Этот пример иллюстрирует реакцию Лотки, характеризующуюся демпфированным колебательным поведением.
modeldescr_chem/oscillating_reactions_lv = Колеблющиеся реакции\n\nВ автокатализаторе реагенты, промежуточные вещества и продукты могут периодически изменяться. Этот пример иллюстрирует реакцию Lotka–Volterra, характеризующуюся незатухшими химическими колебаниями.
modeldescr_chem/ozone_combustion = Озоновое сжигание\n\nСемь обратимых реакций описывают сжигание озона в кислород. На примере показано детальное моделирование первичного ламинарного озонового пламени.
modeldescr_chem/packed_bed_reactor = Реактор с насадочным слоем\n\nСпособ изучения связанных макромасштабных и микромасштабных массовых балансов в одномерных моделях реакторов, заполненных катализатором, заключается в использовании нескольких геометрий. Модель требует двух геометрических форм, по одной для каждого масштаба системы, для расчета профилей концентрации реагирующих веществ вдоль реактора с насадочным слоем, а также внутри таблеток катализатора.
modeldescr_chem/packed_bed_reactor_3d = Многомасштабный 3D-упакованный кровать-реактор\n\n Этот пример показывает, как транспорт разбавленных видов в интерфейсе Porous Media используется для эффективного решения комбинированной макромасштабной и микромасштабной (многомасштабной) проблемы: гетерогенная система с бимодальным распределением пор. В примере используется функция Packed Bed, которая использует дополнительное измерение для представления пористых катализаторных гранул, заполняющих реактор. С помощью этой функции решается концентрация внутри гранул и распределение концентрации в жидкости, окружающей гранулы.
modeldescr_chem/parallel_plates = Flow Between Parallel Plates\n\n Этот пример моделирует развивающийся поток между двумя параллельными пластинами. Цель состоит в том, чтобы изучить впускные эффекты в ламинарном потоке при довольно умеренных числах Рейнольдса, в данном случае около 40.
modeldescr_chem/parameter_estimation_co_absorption = Определение некинетических параметров\n\nВы можете использовать функцию оценки параметров для калибровки определяемых пользователем параметров по экспериментальным данным. В этом примере вы найдете коэффициент массопередачи и концентрацию насыщения, поскольку окись углерода растворена в воде.
modeldescr_chem/parameter_estimation_isothermal = Определение констант скорости\n\nВ этом примере вы оцениваете константу скорости реакции на основе экспериментальных данных с помощью встроенной функции оценки параметров.
modeldescr_chem/parameter_estimation_nonisothermal = Определяя параметры Аррениуса\n\nдля оценки температурно-зависимых констант скорости из экспериментов вы прочли несколько наборов данных в программное обеспечение, данные, полученные при нескольких температурах. Функция оценки параметров позволяет оценить параметры Arrhenius напрямую, учтя все наборы данных одновременно.
modeldescr_chem/parameter_estimation_rxnorder = Определение порядка реакции\n\nЭтот пример иллюстрирует, как извлечь как константы скорости, так и порядок реакции в задаче оценки параметров.
modeldescr_chem/pellet = Цилиндрический катализатор Pellet\n\n Этот пример моделирует цилиндрическую частицу катализатора, подвергнутую потоку реагирующего газа. Он показывает структуру потока и поле концентрации в свободной жидкости, окружающей частицу, и поле концентрации внутри и снаружи частицы.
modeldescr_chem/plate = Диффузия в изотермическом ламинарном потоке Вдоль плоской пластины\n\n Этот пример рассматривает проблему с одним диффузионным видом, растворенным в воде при комнатной температуре. В примере используются уравнения Navier–Stokes в сочетании с уравнением баланса массы для одного растворенного вида. Перевозка этого вида происходит путем диффузии и конвекции.
modeldescr_chem/plate_reactor = Тонко-химическое производство в реакторах на плитах \n\nPlate, работающих в непрерывных условиях, появилось в качестве кандидатов на замену серийных реакторов в мелкохимическом производстве. Этот пример демонстрирует, как настроить и решить связанные уравнения потока, массы и переноса энергии, описывающие реагирующий поток в реакторе пластины.
modeldescr_chem/polymerization_multijet = Полимеризация в многоструйном трубчатом реакторе\n\n В реакторе полимеризации для производства полиэфира смешивание в реакторе достигается путем воздействия турбулентных струй реагентов друг на друга. Турбулентность влияет на кинетику реакции и качество полимерной связи. Этот пример моделирует реактор полимеризации в неизотермических условиях с использованием интерфейсов Reacting Flow and теплопередача in Fluids.
modeldescr_chem/porous_free = Porous Media Flow\n\n Этот пример рассматривает связь между потоком в открытом канале и потоком, индуцированным в пористых стенках каналов. Уравнения Navier–Stokes в открытом канале соединены с уравнениями Бринкмана для пористого медиапотока. Существует значительный поток в пористых средах, и этот поток индуцируется как давлением, так и вязкими эффектами.
modeldescr_chem/porous_reactor = Пористый каталитический реактор с инъекцией Needle\n\nМоделирование каталитических гетерогенных реакторов существенно упрощено с помощью интерфейса мультифизики <em>Transport of Diluted Species in Porous Catalysts</em>. Это определяет диффузию, конвекцию, миграцию, массовую реакцию в потоке пористых сред и гетерогенные реакции (адсорбция, десорбция и другая газонепроницаемая поверхностная реакция) в пористом катализаторе для химического вида. Мультифизический интерфейс автоматически объединяет все соединения и физические интерфейсы, необходимые для моделирования гетерогенного катализа, вместе с пористым потоком среды и разбавленным переносом химических видов.\n\nГетерогенные каталитические реакторы широко используются в химической промышленности. Этот тип газонепроницаемых каталитических реакторов, где газофазные виды катализируются твердым катализатором, имеет широкое применение в таких областях, как каталитическое окисление, селективное каталитическое восстановление и т.д. Этот пример иллюстрирует моделирование пористого каталитического реактора с химической системой окисления водорода на катализаторе благородного металла Rh. Модель исследует кинетику гетерогенной каталитической реакционной системы, распределение концентрации вида (как вида в фазе объёмного газа, так и поглощенного на каталитической поверхности) и поле скорости в объёме пор.
modeldescr_chem/pressure_time = Анализ данных о давлении-времени\n\n Неимолекулярное разложение пероксида вызывает повышение давления в закрытом реакторе. В этом примере вы выполняете оценку параметров для извлечения постоянной скорости и порядка реакции из измеренных данных о давлении.\n\n Эта модель требует модуля оптимизации.
modeldescr_chem/protein_adsorption = Protein Adsorption\n\nЭтот пример изучает адсорбцию двух белков в ионообменной колонке. Адсорбция описывается равновесными реакциями. Сначала кинетика изучается в 0D-модели с интерфейсом Reaction Engineering. Во-вторых, 3D-модель используется для изучения адсорбции в пористой структуре ионообменной массы.
modeldescr_chem/parameter_estimation_pyrolysis_wood = Оценка параметров для пиролиза древесины\n\n Пиролиз древесной частицы размером в сантиметр представляет собой полностью связанную мультифизическую проблему с переносом массы, течением жидкости и теплопередачей.\n\n Эта модель состоит из двух частей. Первая часть демонстрирует, как настроить модель, описывающую пиролиз пористой, анизотропной древесной сферы. Используется схема реакции, состоящая из пяти псевдовидов и пяти реакций.\n\nПосле этого для оптимизации модели с использованием экспериментальных данных используется оценка параметров. Параметры, подлежащие оценке, представляют собой одну постоянную Аррениуса, два реакционных тепла и один внешний коэффициент теплопередачи.
modeldescr_chem/reinforced_membrane = Диффузия газа через усиленную мембрану\n\n Этот пример моделирует диффузию химического вида через мембрану. Система аналогична той, которая используется для измерения проницаемости газов в мембранах.
modeldescr_chem/rising_bubble_ls = Rising Bubble — Level Set Method\n\nAxisymmetric model of a oil bubble rising in water due tobuoyancy. Модель может быть решена с использованием либо набора уровней, либо метода фазового поля для отслеживания интерфейса жидкости. В этом примере используется метод набора уровней.
modeldescr_chem/rising_bubble_pf = Rising Bubble — Phase Field Method\n\nAxisymmetric model of a oil bubble rising in water due tobuoyancy. Модель может быть решена с использованием либо набора уровней, либо метода фазового поля для отслеживания интерфейса жидкости. В этом примере используется метод фазового поля.
modeldescr_chem/schematic_pump_1 = Схематический насос 1\n\nМодель насоса с вращающимися лопастями. Положение лопастей насоса ' rotation causes a change in the blades' по отношению к стенкам насоса и пример использует скользящую сетку для решения этой проблемы.
modeldescr_chem/schematic_pump_2 = Схематический насос 2\n\nМодель насоса с вращающимися лопастями. Положение лопастей насоса ' rotation causes a change in the blades' по отношению к стенкам насоса, и пример использует раздвижную сетку для решения этой проблемы. Геометрия насоса улучшается, и насос обеспечивает значительно лучший поток с той же скоростью вращения по сравнению с первым подходом к проектированию.
modeldescr_chem/semibatch_polymerization = Полубоевая полимеризация\n\nПредопределенный полубоевой реактор используется для моделирования реакции полимеризации раствора. Объём реагирующей смеси уменьшается по мере образования полимера. Моделирование показывает, что учет этого эффекта может значительно увеличить производство полимеров.
modeldescr_chem/silver_complexation = Очистка воды Silver Complexation\n\nA Общим методом удаления ионов металлов из воды является комплексация. Этот пример показывает очистительный реактор, где ионы серебра комплексируются в диамин-серебряную реакцию для удаления. Реакция изучается как для идеального полупакетного реактора, так и для 2D-аксисимметричного реактора с учетом переноса видов.
modeldescr_chem/sinusoidal_heat_exchanger = MEMS Heat Exchanger\n\nЭтот пример моделирует простой пластинчатый теплообменник с синусоидальной структурой. Такая структура может использоватьсяа для улучшения массы и теплопередачи. Как течение жидкости, так и теплообмен изучаются, чтобы понять вовлеченные процессы.
modeldescr_chem/shrinking_core_model = Сжимающаяся базовая модель железной руды уменьшена на Hydrogen\n\n Исследованы термодинамика и кинетика газо-твердых реакций среди оксидов железа и водорода. Сокращение гранул FeO моделируется с помощью модели Shrinking Core. Концентрации видов как в шахтной печи, так и в реакционном слое внутри гранул моделируются в модели 2D-осевой симметрии. Также исследуется распределение температуры и скорости жидкости в шахтной печи.
modeldescr_chem/slab = Нагрев Slab\n\n Этот пример показывает переходный теплообмен в конечной плите. Результаты показывают отличное согласие с аналитическим решением.
modeldescr_chem/spacedependent_hi_reactor = Space-Dependent HI Reactor\n\nЭто вторая модель, имеющая дело с HI-продуцирующей реакцией, но теперь вводящей космическую зависимость. Состав и температура теперь могут изменяться как в пространстве, так и во времени. Следовательно, материальные балансы, энергетические балансы и транспортные свойства устанавливаются и решаются.
modeldescr_chem/steam_reformer = Steam Reformer\n\nЭтот пример решает 3D-модель парового реформатора, обслуживающего стационарный блок топливных элементов с водородом. Тесно связанная система уравнений массы, энергии и импульса, используемая для описания реформатора, легко настраивается с использованием заранее определенных физических интерфейсов модуля химической реакции.
modeldescr_chem/stefan_tube = Стефан Тьюб\n\nЭто пример стационарной многокомпонентной газодиффузионной модели в 1D. Диффузия трех газов в трубе Стефана моделируется с использованием интерфейса Transport of Concentrated Species с механизмом диффузии Maxwell–Stefan. Профили мольных долей в установившемся состоянии вычисляются и проверяются на основе экспериментальных данных.
modeldescr_chem/tank_flow_system = Идеальный реактор для перемешивания резервуаров System\n\nВ химической и биохимической промышленности реакторы, имеющие хорошо смешанные условия и контроль уровня жидкости являются общими. Этот пример показывает, как использовать интерфейс Reaction Engineering для моделирования системы идеальных реакторов-цистерн последовательно с контролируемыми потоками впуска и выпуска продукта. Также отслеживается изменение объёма каждого реактора.
modeldescr_chem/tankinseries_control = Серия резервуаров с управлением с обратной связью\n\nВ этом примере показано, как настроить и решить модель последовательного резервуара с помощью интерфейса Reaction Engineering. Он использует контур управления с обратной связью для регулировки концентрации на входе в первый резервуар, чтобы поддерживать концентрацию на выходе из последнего реактора близкой к заданному уровню.
modeldescr_chem/thermal_decomposition = Thermal Decomposition\n\nЭто руководство иллюстрирует, как настроить и решить мультифизическую задачу, включающую сопряженные уравнения для транспорта массы, энергии и импульса.\n\n Это хороший пример того, как модель может быть настроена шаг за шагом, сначала решая для потока, затем потока и тепла, и, наконец, потока, тепла и экзотермической химии.
modeldescr_chem/thermal_decomposition_uq = Термическое разложение бета-каротина в реакторе потока\n\n Стабильность бета-каротина в фруктовом соке, который течет мимо нагретого цилиндра, изучается с использованием типов исследования неопределенности. Исследования UQ выявляют наиболее важные параметры и количественно оценивают важность их неопределенности. Наиболее вероятный исход для оттока бета-каротина, который представляет собой количество процентов (QoI), и вероятность того, что он не достигнет нижнего предела, определяется.
modeldescr_chem/thermal_dispersion = Оценивая тепловую дисперсию в упаковке Bed\n\nИспользуя минимизацию наименьших квадратов, этот пример оценивает коэффициенты тепловой дисперсии упакованной кровати, сравнивая экспериментальные данные о температуре с смоделированными результатами.\n\n Эта модель требует модуля оптимизации.
modeldescr_chem/thin_domain = Массовый перевод с тонкого области\n\n Эта модель демонстрирует, как перенос массы из тонкого области может быть приближен к 2D-модели с использованием функции Out-of-Plane Flux. для проверки достоверности 2D-приближения также решается эквивалентная 3D-модель. Кроме того, эта модель иллюстрирует, как толщина вне плоскости влияет на относительную погрешность приближения 2D и на то, насколько вычислительное время может быть уменьшено.
modeldescr_chem/tortuous_reactor = Дегалогенация углеводородов в извилистом микрореакторе\n\n Этот пример показывает дегалогенацию углеводородов, как это происходит в извилистом микрореакторе. Реагенты транспортируются от объёма жидкости к каталитическим поверхностям на стенках реактора, где они реагируют. и космическо-независимая модель, анализирующая две конкурирующие реакции с использованием интерфейса Reaction Engineering, и космическо-зависимая модель, которая включает течение жидкости и массовый транспорт, настроены и решены.
modeldescr_chem/tube_reactor = Транспорт и реакция в катализаторе в 3D\n\nГетерогенная реакция протекает в трубе внутри пористой структуры катализатора. В этом примере баланс масс описывает распределение концентрации активных веществ в воздухе, например, загрязняющего вещества в потоке выхлопных газов.
modeldescr_chem/wire_electrode = Wire Electrode\n\nКонтролирование распределения тока электролита и электрода является центральным элементом конструкции электрохимических элементов. Этот пример моделирует первичное, вторичное и третичное распределение тока проволочной ячейки электрода.


# ECRE Models
modeldescr_chem/dispersion_reaction_danckwerts = Дисперсионная реакция Модель \n\nA трубчатый реактор моделируется в 1D учета дисперсии и химической реакции. Открытые или закрытые граничные условия налагаются с использованием предопределенных граничных условий COMSOL Multiphysics.
modeldescr_chem/dispersion_reaction_3sections = Модель дисперсионного реактора с длинными входными и выходными секциями\n\nA трубчатый реактор моделируется в 1D учета дисперсии и химической реакции. Реактор имеет участок вверх по течению, добавленный к его входу, и графики вниз по течению, добавленные к его выходу. Открытые и закрытые граничные условия для реактора устанавливаются путем изменения числа Пеклета в этих секциях.
modeldescr_chem/packed_bed_reactor_nonisothermal = радиальные эффекты в неизотермическом реакторе с упакованной кроватью \n9000000000001A превращают о-ксилен в фталический ангидрид. Реактор моделируется в 2D-аксисимметрии, что позволяет исследовать радиальные градиенты температуры и концентрации для этого высокоэкзотермического процесса.
modeldescr_chem/tubular_reactor_adiabatic = радиальные эффекты в трубчатых реакторах —Adiabatic Conditions\n\nЭтот пример касается экзотермической химии 2-го порядка, происходящей в трубчатом реакторе. Реактор моделируется в 2D-аксисимметрии, что позволяет изучать состав и колебания температуры как в радиальном, так и в осевом направлениях. В настоящей модели рассматриваются условия адиабатического реактора.
modeldescr_chem/tubular_reactor_isothermal = радиальные эффекты в трубчатых реакторах — Isothermal Conditions\n\nЭтот пример касается экзотермической химии 2-го порядка, происходящей в трубчатом реакторе. Реактор моделируется в 2D-аксисимметрии, что позволяет изучать состав и колебания температуры как в радиальном, так и в осевом направлениях. В настоящей модели рассматриваются изотермические условия реактора.
modeldescr_chem/tubular_reactor_jacket1 = Nonisothermal Tubular Reactor with Isothermal Cooling Jacket\n\nЭтот пример касается экзотермической химии 2-го порядка, происходящей в трубчатом реакторе. Реактор моделируется в 2D-аксисимметрии, что позволяет изучать состав и колебания температуры как в радиальном, так и в осевом направлениях. Настоящая модель относится к неизотермическому реактору, включая изотермическую охлаждающую куртку.
modeldescr_chem/tubular_reactor_jacket2 = Tubular Reactor with Nonisothermal Cooling Jacket\n\nЭтот пример касается экзотермической химии 2-го порядка, происходящей в трубчатом реакторе. Реактор моделируется в 2D-аксисимметрии, что позволяет изучать состав и колебания температуры как в радиальном, так и в осевом направлениях. Настоящая модель относится к неизотермическому реактору, включая неизотермическую охлаждающую куртку.


# Component Library models (obsolete)
modeldescr_comp/heating_device = Устройство отопления\n\nМодель нагревательного устройства, состоящего из алюминиевого блока и трех стальных нагревательных элементов. Это используется для измерения эффективности охлаждения теплоотводов при различных скоростях мощности от устройства.
modeldescr_comp/heat_sink_lpd19 = Heat Sink lpd19\n\nМодель характеристик охлаждения алюминиевого теплоотвода lpd19 от Alpha Company Ltd в Японии. Модель изучает сопротивление нагрева при различных скоростях потока воздуха с использованием полуэмпирической формулы для коэффициента теплопередачи на поверхности устройства.
modeldescr_comp/heat_sink_n19 = Heat Sink n19\n\nМодель характеристик охлаждения алюминиевого теплоотвода n19 от Alpha Company Ltd в Японии. Модель изучает сопротивление нагрева при различных скоростях потока воздуха с использованием полуэмпирической формулы для коэффициента теплопередачи на поверхности устройства.
modeldescr_comp/heat_sink_s1519 = Heat Sink s1519\n\nМодель характеристик охлаждения алюминиевого теплоотвода s1519 от Alpha Company Ltd в Японии. Модель изучает сопротивление нагрева при различных скоростях потока воздуха с использованием полуэмпирической формулы для коэффициента теплопередачи на поверхности устройства.
modeldescr_comp/heat_sink_ub19 = Heat Sink ub19\n\nМодель охлаждающих характеристик алюминиевого теплоотвода ub19 от Alpha Company Ltd в Японии. Модель изучает сопротивление нагрева при различных скоростях потока воздуха с использованием полуэмпирической формулы для коэффициента теплопередачи на поверхности устройства.


# Composite Materials Module models
modeldescr_compmat/composite_blade_multiple_model_method = Анализ композитного лезвия с использованием метода множественной модели \n\n Этот пример демонстрирует моделирование сэндвич-композитного лезвия, состоящего из карбон–epoxy, стекло–vinylester и пенного материала из ПВХ. для моделирования композитной структуры сэндвича используются три различных метода: теория Layerwise, теория Equivalent Single Layer (ESL) и метод множественной модели. Модальный и частотно-реакционный анализы выполняются для заданной нагрузки, и метод множественной модели сравнивается с традиционной теорией послойности и ESL с точки зрения производительности и точности результатов, включая распределение напряжения по толщине.\n\n Показано, что теория послойности точна, но вычислительно дорогая. Напротив, теория ESL вычислительно дешевле, но не в состоянии уловить точную толщину и общее распределение напряжения. Метод множественной модели кажется лучшим выбором с точки зрения точности и производительности для моделирования сэндвич-композитных конструкций.
modeldescr_compmat/composite_cylinder_buckling = В этом примере показано, как выполнять анализ пряжки и вычислять критические коэффициенты нагрузки для композитного цилиндра при сжатой нагрузке и фиксированных условиях. Композитный цилиндр состоит из восьми слоев армированного углеродным волокном полимера (CFRP), имеющего различные ориентации волокна. Используется подход, основанный на теории эквивалентного одного слоя (ESL).\n\n Влияние укладки последовательности на форму режима пряжки и коэффициент критической нагрузки анализируется для различных типов сбалансированных ламинатов, таких как симметричный ламинат с углом наклона и антисимметричный ламинат с углом наклона.
modeldescr_compmat/composite_cylinder_micromechanics_and_stress_analysis = Микромеханика и макромеханика композитного цилиндра\n\n В этом примере напряжения вычисляются в цилиндрической оболочке из композитного волокна ламината. Пример состоит из двух частей: \n\nFirst, гомогенизированные упругие свойства одного слоя в ламинате определяются с помощью модели микромеханики. Одно волокно в эпоксидной смоле используется для вычисления гомогенизированных эластичных свойств. Вместе с ориентацией на слой определяются упругие свойства, которые определяют индивидуальный слой (слой) в ламинат.\n\nТогда, используя информацию о слое и заданную последовательность укладки, определяется весь ламинат. Затем проводится напряжение-анализ цилиндрической оболочки. Сравниваются две теории ламината: теория Layerwise и теория эквивалентного одиночного слоя (ESL). В дополнение к напряжение-анализу вычисляются собственные частоты и формы режима для изучения динамического поведения цилиндрической оболочки.
modeldescr_compmat/composite_multiscale = Микромеханика отказа: Многомасштабный анализ композитной структуры\n\n В этом примере структурная целостность цилиндра, изготовленного из композитного волокна, оценивается как на макроуровне, так и на уровне микромасштаба. Использование волоконных композитов варьируется от транспортного и энергетического секторов до потребительской промышленности. По сравнению с традиционными монолитными материалами, волоконные композиты предлагают различные свойства, подходящие для индивидуальных применений. Наряду с макромасштабным анализом структурные композиты нуждаются в микромасштабном анализе напряжений и отказов для определения критических составляющих в ламинированных структурах.\n\nКомпозиты могут быть проанализированы в макро- или микромасштабах, и любой анализ имеет свои преимущества и ограничения. Анализы в макро- и микромасштабах, так называемые многомасштабные анализы, дают глубокое представление о составной структуре, а также о реакции ее компонентов и помогают изучать микромеханику отказов на основе глобальной нагрузки.
modeldescr_compmat/composite_wheel_rim = Напряженный и модальный анализ композитного обода колеса\n\nЭтот пример демонстрирует моделирование обода колеса из ламинированного композитного материала. Композитный ламинат, рассматриваемый для данного анализа, изготовлен из углеродного –эпоксидного материала и имеет восемь слоев с симметричным расположением слоев.\n\nСначала проводится анализ напряжений композитного обода колеса, при котором обод подвергается давлению внутри шины и нагрузке на шину. Во-вторых, выполняется анализ собственных частот предварительного напряжения, при котором обод подвергается воздействию вращающихся сил рамы.
modeldescr_compmat/failure_prediction_in_a_laminated_composite_shell = Предсказание неисправности в композитном лакомом Shell\n\nЛаминированные композитные оболочки из армированного углеродным волокном полимера (CFRP) распространены в большом разнообразии применений из-за их высокого соотношения прочности к весу. Оценка структурной целостности ламинированной композитной оболочки для набора применяемых нагрузок необходима для обеспечения надежности конструкции таких конструкций. Структурная целостность ламината с различными ориентациями волокон в каждом пли оценивается с помощью параметров, называемых Индексом отказов и Фактором безопасности, с использованием различных полиномиальных критериев отказа.\n\n Этот пример показывает, как моделировать слоистые композитные оболочки с использованием интерфейса Shell вместе с модулем композитных материалов. В этом примере сравниваются шесть различных полиномиальных критериев. Эта модель является эталонной моделью NAFEMS, и вычисленные результаты сравниваются со справочными данными.
modeldescr_compmat/forced_vibration_of_a_composite_laminate = Анализ вынужденной вибрации композитного ламината\n\nЭтот пример демонстрирует анализ вынужденной вибрации композитного ламината при изгибающих и скручивающих нагрузках. Композитный ламинат, рассматриваемый для данного анализа, изготовлен из углеродного –эпоксидного материала и имеет три слоя с угловой укладкой.\n\nЭта модель вычисляет структурный импеданс как функцию частоты в различных положениях. Также проанализировано влияние различных типов расслоения на структурный импеданс. Наличие расслоения моделируется с использованием послойной (LW) теории моделирования композитных ламинатов.
modeldescr_compmat/heating_circuit_layered = Схема нагревания — Layered Shell Version\n\nЭтот мультифизический пример имитирует генерацию электрического тепла, теплопередачу и механические напряжения и деформации устройства тепловой цепи. Устройство состоит из электрически резистивного слоя, нанесенного на стеклянную пластину. Слой приводит к нагреванию Джоуля при подаче напряжения на цепь, что приводит к структурной деформации.
modeldescr_compmat/piezoelectric_layered = Пьезоэлектричество в Layered Shell\n\nЭто учебный пример, показывающий, как моделировать пьезоэлектрические устройства с использованием функции слоистой оболочки. Изучаются два случая материальной ориентации. В первом случае ось полюсов является нормальной для поверхности оболочки, что приводит к изменению толщины. Во втором случае ось полюса находится в плоскости оболочки, что приводит к изгибу.
modeldescr_compmat/ply_drop_off_in_a_composite_panel = Выпадение слоев в композитной панели\n\nЭтот пример иллюстрирует моделирование выпадения слоев в композитной панели. Панель, рассматриваемая для анализа, имеет три секции –толстая, коническая и тонкая. Слои толстого сечения делятся на сердечник, верхне-нижние пояса и опущенные слои. Толстая секция панели состоит из шестнадцати слоев с симметричной угловой укладкой, из которых восемь слоев постепенно опускаются в коническую часть с некоторым заданным расстоянием смещения.\n\nВ качестве слоя материала используется углеродный –эпоксидный материал, обладающий свойствами трансверсально-изотропного материала. Эпоксидный материал, обладающий изотропными свойствами материала, используется в карманах вблизи опущенных слоев. Подход, основанный на послойной теории, вместе с моделированием зон штабелирования используется для детального представления сценария падения слоев. Стационарный анализ проводится для расчета напряжений в разных слоях в различных сечениях композитной панели под действием внешней нагрузки.
modeldescr_compmat/simply_supported_composite_laminate = Изгиб просто поддерживаемого композитного ламината\n\n Этот пример демонстрирует анализ изгиба просто поддерживаемого композитного ламината под синусоидальной распределенной поперечной нагрузкой. Композитный ламинат толстый, с отношением толщины к длине стороны 1/4. Ламинат имеет три слоя в поперечном укладке. Модель решается с использованием как теории Лайервайза (LW), так и теории эквивалентного одиночного слоя (ESL).\n\n Это пример проверки, где результаты, вычисленные из обеих теорий, сравниваются с точными результатами 3D-эластичности, приведенными в ссылке. Изменение сквозной толщины нормального напряжения в плоскости, поперечного нормального напряжения и поперечного напряжения сдвига в каждом слое сравнивается с исходными результатами.
modeldescr_compmat/thermal_expansion_of_a_laminated_composite_shell = Термическое расширение ламинированной композитной оболочки\n\nЭтот пример иллюстрирует анализ термического напряжения ламинированной композитной оболочки, подвергнутой воздействию источника тепла с осажденным пучком. Композитная оболочка, рассматриваемая для данного анализа, имеет шесть слоев с антисимметричной угловой укладкой. В качестве пластинчатого материала используется углеродный –эпоксидный материал, обладающий свойствами ортотропного материала. Подход, основанный на послойной теории, используется для моделирования структурной части композитной оболочки.\n\nЭтот пример также демонстрирует расчёт гомогенизированного коэффициента теплового расширения пластины и анализирует влияние положения источника тепла на профили напряжений и деформаций.
modeldescr_compmat/laminated_shell_material_characteristics = Материальные характеристики ламинированного композита Shell\n\n В этом бенчмарке ламинированная композитная оболочка, состоящая из восьми ортотропных слоев с различной ориентацией, подвергается единичным нагрузкам и единичному изменению температуры. Гибкость, жесткость матриц и штаммы средней плоскости сравниваются с теоретическими и численными результатами, приведенными в эталоне.
modeldescr_compmat/layered_shell_structure_connection = Соединение слоистых оболочек с твердыми и Shells\n\nслойные элементы оболочки, которые используются для моделирования композитных оболочек, часто соединяются с твердыми и оболочками в облицовке или боковой конфигурации для представления реалистичной структуры. для таких приложений становится важным правильно и легко подключить слоистый элемент оболочки к другим структурным элементам.\n\n В этом учебном примере и задаче проверки вы узнаете, как подключить слоистые элементы оболочки к твердым и элементы оболочки в различных конфигурациях. Результаты также сравниваются с твердой моделью той же геометрии.
modeldescr_compmat/mixed_mode_delamination = Разложение в смешанном режиме композитного ламината\n\n Межфазный сбой или расслоение в композитном материале можно моделировать с помощью модели сплочённой зоны (CZM). Этот пример показывает реализацию CZM с билинейным законом разделения тяги в слоистой оболочке. Он используется для прогнозирования начала размягчения в смешанном режиме и распространения делеминации.\n\nA для сравнения используется соответствующая модель, созданная в интерфейсе механика твёрдого тела.
modeldescr_compmat/progressive_delamination_in_a_laminated_shell = Прогрессивное расслоение в ламинированной оболочке \n\n Межфазный сбой или расслоение в композитном материале является распространенным явлением. Это можно смоделировать с помощью модели сплочённой зоны (CZM).\n\n Этот пример показывает реализацию CZM с билинейным законом разделения тяги в слоистой оболочке. Он используется для прогнозирования начала размягчения смешанного режима и распространения расслоения.
modeldescr_compmat/stacking_sequence_optimization = Оптимизация последовательности штабелирования\n\nЭтот пример иллюстрирует оптимизацию последовательности укладки композитного ламината на основе критерия разрушения Хашина. Композитный ламинат, рассматриваемый для анализа, имеет шесть слоев с симметричной угловой укладкой. В качестве пластинчатого материала используется углеродный –эпоксидный материал, обладающий свойствами трансверсально-изотропного материала. Оптимизационный анализ проводится для того, чтобы найти оптимальную ориентацию волокон в каждом слое, чтобы сделать ламинат безопасным и подходящим для данных условий нагрузки.
modeldescr_compmat/wind_turbine_composite_blade = Напряженный и модальный анализ композитной лопасти ветряной турбины\n\nЭтот пример демонстрирует моделирование лопасти ветряной турбины, изготовленной из ламинированного композитного материала. Ламинированный композит состоит из углеродного –эпоксидной смолы, стекла–винилэфира и пенопласта ПВХ, где пена используется в качестве основного материала. Композитный ламинат имеет большое количество слоев, поэтому он моделируется с использованием теории эквивалентного одиночного слоя (ESL).\n\nСначала выполняется анализ напряжений композитной лопасти, при которой лопасть подвергается воздействию силы тяжести, центробежной силы или того и другого. Смещение кончика, максимальные значения напряжения и распределение напряжения по толщине в определенной точке лопасти вычисляются для различных случаев нагрузки. Во-вторых, выполняется анализ собственных частот предварительного напряжения для диапазона рабочих скоростей и создается диаграмма Кэмпбелла, изображающая изменение собственных частот в зависимости от скорости вращения.

# Corrosion Module apps
applicationdescr_corr/ship_hull_iccp = Ship Hull ICCP\n\n Приложение Impressed Cathodic Current Protection (ICCP) демонстрирует, как моделировать системы катодной защиты в 3D с использованием программного обеспечения для моделирования. Встроенная модель содержит стандартные функции для моделирования коррозии, такие как транспортировка заряда электролита, кинетика электродов с ограничением плотности тока и потенциальный контроль с использованием эталонного электрода.\n\n Приложение имитирует ICCP для морского судна. В ICCP активный анодный электрод используется для воздействия катодного тока на защищенный металл, тем самым понижая потенциал поверхности до режима, при котором коррозия практически не происходит.\n\n Величина тока контролируется путем мониторинга потенциала защищенного металлического корпуса по сравнению с эталонным электродом, который расположен в непосредственной близости от защищенного корпуса. Это, наряду с другими важными электрохимическими свойствами системы, может быть свободно изменено в приложении.
applicationdescr_corr/cathodic_protection_designer = Проектировщик катодной защиты \n\nПриложение для проектировщика катодной защиты может использоваться для упрощенного моделирования общих конструкций катодной защиты, для случаев, когда все различные части, использующие различные граничные условия, разделены как отдельные объекты в геометрии.\n\n Геометрия импортируется в виде файла САПР, удовлетворяющего определенным требованиям. Затем пользователь может выбрать каждую часть геометрии и установить граничные условия в соответствии с типичной схемой моделирования, используемой инженерами по коррозии для конструкций катодной защиты, что позволяет решить начальную, среднюю и конечную плотность тока. Результаты могут быть экспортированы в отчете в форматах HTML, Word или Powerpoint.

# Corrosion Module models
modeldescr_corr/ac_corrosion = Коррозия, вызванная переменным током\n\nЭта модель сначала оценивает влияние приложенного потенциала постоянного тока (DC) на коррозию с помощью стационарного анализа, а затем оценивает влияние переменного тока на коррозию с помощью анализа переходных процессов. Впоследствии модель была расширена для исследования влияния частоты на скорость коррозии переменного тока, выявив вклад ёмкости двойного слоя, особенно на более высоких частотах.
modeldescr_corr/anode_film_resistance = Anode Film Resistance Effect on Cathodic Corrosion Protection\n\nЭтот пример является продолжением модели oil platform. Модель иллюстрирует, как скорость коррозии стали увеличивается с течением времени из-за накопления резистивной пленки на жертвенных анодах, образованных продуктами реакции. Модель также включает в себя вторичное распределение тока электродной кинетики на защищенной стальной конструкции, определяя одновременное растворение металла и снижение кислорода (смешанный потенциал).
modeldescr_corr/atmospheric_corrosion = Atmospheric Corrosion\n\n Этот пример имитирует атмосферную гальваническую коррозию алюминиевого сплава, контактирующего со сталью. Толщина электролитной пленки зависит от относительной влажности окружающего воздуха и плотности солевой нагрузки кристаллов NaCl на металлических поверхностях. Эмпирические выражения для диффузивности и растворимости кислорода также включены в модель, чтобы получить выражение для предельной плотности тока для снижения кислорода.
modeldescr_corr/atmospheric_corrosion_busbar = Атмосферная коррозия шина\n\n Эта модель имитирует атмосферную гальваническую коррозию бушбара, которая включает в себя медный фланец, фланец из алюминиевого сплава, контактирующий с цинковым орехом и болтом. Интерфейс вторичного распределения тока используется для решения электрического потенциала в области электродов, а интерфейс Shell используется для решения потенциала электролита в тонком слое электролита.\n\n Толщина и проводимость электролитной пленки зависят от относительной влажности окружающего воздуха. Ограничивающая плотность тока снижения кислорода зависит от диффузивности и растворимости кислорода в этой модели.
modeldescr_corr/atmospheric_corrosion_busbar_geom = [Атмосферная коррозия бушбара]Атмосферная коррозия бушбара — Template File\n\nЭтот пример представляет собой шаблон MPH-файл, используемый атмосферной коррозией модели бушбара. Геометрия представляет собой комбинацию гайки, болта и двух фланцев бушбара и использует геометрические последовательности, указанные в частях геометрии.
modeldescr_corr/atmospheric_corrosion_mass_transport = Атмосферная коррозия с помощью Mass Transport\n\n Этот пример имитирует атмосферную коррозию гальванической пары, состоящей из алюминиевого сплава и стали, которая находится в контакте с электролитной пленкой толщиной 50 микрометров. Представленная здесь модель учитывает перенос заряда, а также массовый транспорт, включающий 10 видов и 6 однородных реакций. Модель вычисляет временное и пространственное распределение видов в пленке, включая продукты коррозии.
modeldescr_corr/cathodic_protection_in_concrete = Cathodic Protection of Steel in Reinforced Concrete\n\nЭтот пример модели катодной защиты стального армирующего стержня в бетоне. На поверхности стали рассматриваются три различных электрохимических реакции. Заряд и перенос кислорода моделируются в бетонной области, где электролитная проводимость и диффузивность кислорода зависят от содержания влаги. Исследуется влияние различных уровней влаги на коррозионные токи.
modeldescr_corr/cp_with_anode_deformation = Катодная защита с помощью Anode Deformation\n\nЭти учебные модели катодной защиты структуры нефтяной вышки в течение периода времени 30 лет.\n\nВ результате потребления жертвенных анодов защитные возможности системы со временем снижаются.\n\n Изменение формы анода определяется с помощью интерфейса Level Set, связанного со скоростью растворения анода, определенной интерфейсом Cathodic Protection.
modeldescr_corr/corrosion_inhibitor_transport = Ингибитор коррозии Transport\n\nЭтот пример имитирует атмосферную коррозию гальванической пары, состоящей из металлического покрытия Al-Co-Ce и алюминиевого сплава, который находится в контакте с электролитной пленкой толщиной 100 микрометров.\n\n Ингибиторы коррозии высвобождаются из металлического покрытия и транспортируются на поверхность царапины алюминия путем диффузии и миграции. Представленная здесь модель учитывает перенос заряда, а также массовый транспорт с участием 11 видов и 5 однородных реакций.\n\n Модель вычисляет временное и пространственное распределение видов в пленке, оценивая время, необходимое для накопления критической концентрации ингибитора над поверхностью царапины алюминия. Эффект размера царапины и начального рН электролита также продемонстрирован в модели.
modeldescr_corr/internal_pipeline_corrosion_protection_rcp = Защита внутренних трубопроводов от коррозии с использованием катодной защиты, управляемой резисторами\n\nВысоколегированная нержавеющая сталь, используемая в системах хлорированной морской воды, может быть склонна к коррозии при определенных условиях эксплуатации. Обычный метод катодной защиты менее подходит для нержавеющей стали из-за неприемлемой скорости расхода анода и склонности к водородному охрупчиванию при сильно отрицательных потенциалах.\n\nВ настоящей модели демонстрируется альтернативный метод защиты от коррозии, основанный на катодной защите, управляемой резистором, с использованием интерфейса «Распределение тока, труба».\n\nИсследовано влияние сопротивления муфты на уровень предлагаемой защиты от коррозии.
modeldescr_corr/resistor_modulated_pipeline_cathodic_protection = Резисторно-модулированная катодная защита трубопроводов\n\nВысоколегированная нержавеющая сталь, используемая в системах хлорированной морской воды, может быть склонна к коррозии при определенных условиях эксплуатации. Обычный метод катодной защиты менее подходит для нержавеющей стали из-за неприемлемой скорости расхода анода и склонности к водородному охрупчиванию при сильно отрицательных потенциалах.\n\nВ настоящей модели демонстрируется альтернативный метод защиты от коррозии, основанный на катодной защите с резисторной модуляцией, с использованием интерфейса «Распределение тока, труба».\n\nИсследовано влияние различных значений сопротивления на получаемый уровень предлагаемой защиты от коррозии.
modeldescr_corr/galvanized_nail = Galvanized Nail\n\nЭтот пример показывает, как сначала настроить гальваническую коррозионную ячейку для моделирования стационарной проблемы распределения вторичного тока, а затем как расширить модель, добавив массовый перенос в модель третичного распределения тока.\n\n Геометрия выполнена в двух измерениях с осевой симметрией.
modeldescr_corr/co2_corrosion = Коррозия диоксида углерода в стальных трубах\n\nДиоксид углерода в водных растворах является высококоррозионным и может нанести значительный ущерб стальным конструкциям. Особенно в нефтехимической промышленности такие условия возникают в трубах некоторых применений. Этот пример исследует коррозию, происходящую на стальной поверхности труб для турбулентных потоков углекислого газа и воды. Также моделируется влияние температуры и pH.
modeldescr_corr/corrosion_parameter_estimation = Оценка параметров кинетики коррозии.\n\nВ этом руководстве показано, как использовать этап исследования «Оценка параметров» для определения параметров кинетики электрода на основе данных о поляризации.\n\nПостроена нульмерная модель поляризации электрода с использованием отдельных кинетических выражений для реакций растворения металла и реакций восстановления кислорода.\n\nдля запуска этого руководства вам понадобится модуль оптимизации.
modeldescr_corr/crevice_corrosion_fe = Crevice Corrosion of Iron in a Acetic Acid/Sodium Acetate Solution\n\nЭтот пример модели расщепляют коррозию железа в буферном растворе pH 4.8, образованном равными количествами уксусной кислоты и ацетата натрия. Модель сочетает электрохимическое растворение железа на расщелине стенок вместе с гетерогенными равновесными реакциями в электролите. Модель находится в 1D.
modeldescr_corr/crevice_corrosion_with_deformation = Crevice Corrosion of Nickel with Electrode Deformation\n\nЭта 2D-модель иллюстрирует основные принципы коррозии трещин и то, как зависящее от времени исследование может использоватьсяо для моделирования деформации электрода.
modeldescr_corr/evans_droplet = Corrosion Under a Evans Droplet\n\nЭтот пример имитирует общую коррозию стали в атмосфере под капелькой водного раствора хлорида натрия. Модель учитывает массовый транспорт вместе с однородными реакциями и атмосферными взаимодействиями кислорода и углекислого газа. Модель вычисляет временное и пространственное распределение видов внутри капли, включая пассивирующие продукты коррозии, образующиеся в реакциях осаждения на поверхности электрода.
modeldescr_corr/galvanic_corrosion_mg_alloy = Гальваническая коррозия сплава магния в контакте со сталью\n\n Этот пример имитирует гальваническую коррозию сплава магния в контакте с мягкой сталью. Электролит представляет собой соленую воду. Геометрия выполнена в двух измерениях с осевой симметрией. Катод (сталь) помещается в центр геометрии.
modeldescr_corr/galvanic_corrosion_with_deformation = Гальваническая коррозия с деформацией электрода\n\n Этот пример демонстрирует, как смоделировать гальваническую пару, в которой коррозия анода вызывает деформацию геометрии.\n\n Данные о параметрах используются для соединения магния (AE44) / легкой стали в растворе рассола (соленая вода).\n\n Модель находится в 2D.
modeldescr_corr/isolator_thickness = Изолятор Thickness Effect\n\nИспользование изолятора алюминия (Al) является обычно используемой стратегией смягчения гальванической коррозии между сплавом магния (Mg) и мягкой сталью (MS). Данная модель демонстрирует влияние толщины изолятора Al на гальваническую коррозию с помощью параметрического исследования. Электродная кинетика реализуется с использованием экспериментальных данных поляризации.
modeldescr_corr/localized_corrosion = Локализованная коррозия\n\nЭтот пример моделирует гальваническую коррозию между двумя различными фазами в сплаве магния для репрезентативной конфигурации микроструктуры поперечного сечения. Ключевой особенностью в формуле модели является реализация как анодных, так и катодных областей на поверхности электрода, используя единую границу, представленную с точки зрения функции набора уровней.
modeldescr_corr/localized_corrosion_ls = Локализованная коррозия с использованием метода набора уровней\n\n Этот пример моделирует гальваническую коррозию между двумя различными фазами в сплаве магния для репрезентативной конфигурации микроструктуры поперечного сечения. Интерфейс Level Set используется здесь для моделирования растворения составной фазы, приводящей к топологическим изменениям. Кинетика электродов на границе коррозии определяется как относящийся к области термин, использующий функцию дельты уровня.
modeldescr_corr/localized_corrosion_pf = Локализованная коррозия с использованием метода поля фазы\n\n Этот пример моделирует гальваническую коррозию между двумя различными фазами в сплаве магния для репрезентативной конфигурации поперечного сечения микроструктуры. Интерфейс Фазового поля используется здесь для моделирования растворения составной фазы, приводящей к топологическим изменениям. Кинетика электродов на границе коррозии определяется как относящийся к области термин, использующий функцию дельты фазового поля.
modeldescr_corr/monopile = Monopile with Dissolving Sacrificial Anodes\n\nA monopile foundation - это структурный элемент большого диаметра, который можно использовать для поддержки, например, оффшорной ветряной мельницы.\n\n Это приложение иллюстрирует, как катодная защита монопила уменьшается с течением времени по мере растворения жертвенных анодов.\n\n Пример включает кинетику вторичного распределения тока на защищенной стальной структуре, определяющую одновременное растворение металла и уменьшение кислорода (смешанный потенциал). Включив в модель сжатое сопротивление между верхней структурой и нижним основанием монопила, видно, что коррозионная защита монопила ухудшается.
modeldescr_corr/multiple_oil_platforms = Corrosion Protection of Multiple Oil Platforms\n\nЭтот пример расширяет системный анализ системы защиты от коррозии на примере одной нефтяной платформы, моделируя влияние нескольких нефтяных платформ, размещенных в массиве. Использование интерфейса Current Distribution, граничные элементы значительно уменьшает размер проблемы и вычислительное время, моделируя все электроды как трубки по краям геометрии каркаса.
modeldescr_corr/oil_platform = Защита от коррозии нефтяной платформы с использованием жертвенных анодов\n\n Этот пример моделирует систему защиты от коррозии нефтяной платформы с использованием жертвенных алюминиевых анодов. Область Бесконечных Элементов используется для описания бесконечного расширения океана.
modeldescr_corr/oxide_jacking = Oxide Jacking of Reinforced Concrete\n\nЭтот пример модели оксидного угона железобетона. Процесс коррозии вызывает рост оксидного слоя на арматуре, что, в свою очередь, вызывает внутренние напряжения в бетоне. Заряд и перенос кислорода моделируются в бетонной области, где электролитная проводимость и диффузивность кислорода зависят от содержания влаги. Арматура и бетонные окрестности моделируются как линейные эластичные материалы с начальными деформациями на каждом этапе времени на основе толщины слоя оксида. Трещина от арматуры до внешней поверхности бетона видна через 750 дней, что ставит под угрозу бетонную конструкцию.
modeldescr_corr/pipeline_corrosion_protection_iccp = В этом примере три параллельных трубопровода защищены от коррозии системой впечатлившей текущей катодной защиты (ICCP) с использованием девяти отдельных анодов.\n\n Потенциал электрода и общая плотность тока интерфейса оцениваются вдоль трубопроводов для оценки производительности системы защиты от коррозии.
modeldescr_corr/pipeline_corrosion_protection_sacrificial_anodes = Защита трубопроводов от коррозии с использованием расходных анодов\n\nВ этом примере три параллельных трубопровода длиной 68 км и горизонтальным расстоянием между ними 10 м защищены от коррозии серией анодов. Каждый анод подключен ко всем трем трубопроводам, демонстрируя соединение «один ко многим», смоделированное с помощью модели электрического потенциала точки подключения функции «Жертвенный краевой анод» и подфункций «Внешняя короткая точка» функции «Крайовой электрод». Модель рассматривает два слоя почвы с разной проводимостью электролита. Потенциал электрода и общая плотность тока на границе раздела наносятся по длине трубопроводов, чтобы оценить, достаточно ли они защищены от коррозии.
modeldescr_corr/pitting_corrosion = Питтинговая коррозия\n\nПиттинговая коррозия – это вид локализованной коррозии, при котором на изначально гладкой поверхности металла образуются локальные полости, ямки.\n\nЯмка может возникнуть из-за поверхностных дефектов, таких как неоднородности состава или формы, или механического воздействия, приводящего к образованию небольшой царапины или вмятины.\n\nТо, как растет ямка, зависит от ряда факторов, таких как тип металла, соленость, pH и температура.\n\nВ этом руководстве исследуется фундаментальный механизм распространения ямок путем моделирования кинетики электродов, переноса массы, переноса заряда и возникающей в результате деформации геометрии.
modeldescr_corr/ship_hull = Коррозионная защита судна Hull\n\nЭтот пример моделирует распределение вторичного тока вокруг корпуса судна с использованием системы импрессионной катодной защиты (ICCP) для защиты вала и винта.
modeldescr_corr/stress_corrosion = Stress Corrosion\n\n Этот пример имитирует влияние упругих и пластических деформаций на коррозию трубопровода. Интерфейс механика твёрдого тела с моделью пластичности небольшого напряжения используется для моделирования эластопластического напряжения. Интерфейс распределения вторичного тока используется для моделирования электрохимических реакций. Видно, что коррозия трубопровода ускоряется с увеличением продольной деформации в области пластической деформации.
modeldescr_corr/stray_current = Коррозия трубопровода паразитным током\n\nЭтот пример демонстрирует коррозию паразитным током заглубленного трубопровода, который расположен рядом с пересекающимся трубопроводом, защищенным системой катодной защиты от наложенного тока (ICCP). Модель прогнозирует коррозию незащищенного трубопровода вблизи перехода.
modeldescr_corr/under_deposit_corrosion = Under-Deposit Corrosion\n\nЭтот пример демонстрирует, как смоделировать влияние продукта коррозии на гальваническую коррозию между сплавом магния (AE44) и мягкой сталью в контакте с раствором рассола (соленая вода).\n\n Деформированные границы из-за осаждения продукта коррозии, а также растворения поверхности магния моделируются здесь с использованием уровней и деформированных геометрических составов соответственно.


# Electrical Circuits Module models
modeldescr_circuit/opamp_capacitive_load = Операционный усилитель с Capacitive Load\n\n Операционный усилитель (op-amp) является дифференциальным усилителем напряжения с широким спектром применений в аналоговой электронике. Этот учебник моделирует операционный усилитель, подключенный к петле обратной связи и ёмкостной нагрузке.\n\n Оп-амп моделируется как эквивалентная линейная подсхема в интерфейсе <em>Electrical Circuit</em>, где он вставляется во внешнюю цепь. Модель частично основана на формате SPICE. Модель моделируется в течение 10 мс с выходом данных каждые 0,05 мс. Внутренняя динамика операционного усилителя взаимодействует с сетью обратной связи, вызывая звон в выходном сигнале (этапный ответ).
modeldescr_circuit/voltage_multiplier = Напряжение Multiplier\n\n Используя сеть конденсаторов и диодов, можно преобразовать электрическую мощность переменного тока от более низкого напряжения до более высокого напряжения постоянного тока.\n\n Генерируемые напряжения варьируются от нескольких вольт до миллионов вольт в зависимости от приложения. Это модель наиболее распространенного типа множителя напряжения, множителя серии полуволн, также известного как каскад Вильярда.


# Design Module Models
modeldescr_design/bracket_geometry = Работа с Loft Geometry Operation\n\nЭто руководство демонстрирует, как генерировать лофтовые поверхности с касательными, соответствующими касательными смежных лиц, указывая направление лофта и используя направляющие кривые.
modeldescr_design/bracket_import_optimization_expressions = [Оптимизация импортированной серии учебников по геометрии кронштейнов]Оптимизация импортированной геометрии кронштейнов — с помощью Parameter Expressions\n\n В этом руководстве вы будете использовать операции Offset Faces и Transform Faces как способ репараметризации существующих отверстий в геометрии кронштейнов, импортированных из файла STEP. Масса скобки сведена к минимуму с ограничениями как для самой низкой естественной частоты, так и для максимального напряжения в случае статической нагрузки.\n\nГеометрические ограничения, сформулированные как выражения параметров, применяются во время оптимизации для поддержания целей проектирования геометрии.
modeldescr_design/bracket_import_optimization_dimensions = [Оптимизация импортированной серии учебников по геометрии кронштейнов]Оптимизация импортированной геометрии кронштейнов — с измерительными измерениями \n\n В этом руководстве вы будете использовать операции Offset Faces и Transform Faces как способ репараметризации существующих отверстий в геометрии кронштейнов, импортированных из файла STEP. Масса скобки сведена к минимуму с ограничениями как для самой низкой естественной частоты, так и для максимального напряжения в случае статической нагрузки.\n\n В этой учебной последовательности размерности добавлены функции для измерения как импортированной, так и модифицированной геометрии. Параметры, создаваемые измерительными размерами, используются в узлах проверки параметров. Они усиливают геометрические ограничения во время оптимизации, чтобы поддерживать цель проектирования геометрии.

# ECAD Import Module models
modeldescr_ecad/pcb_import = Импорт и сетка геометрии печатной платы из ODB++ Archive\n\nЭта обучающая модель показывает, как импортировать данные из архива ODB++ для создания геометрии печатной платы (PCB). Следуйте инструкциям, чтобы узнать, как удалить мелкие детали из геометрии, создать сетку и использовать автоматически сгенерированные выборы для определения физики и настроек сетки.\n\n<em> Файл ODB++ предоставлен компанией Hypertherm, Inc., Hanover, NH, USA</em>


# Electrochemistry Module apps
applicationdescr_echem/electrochemical_impedance_spectroscopy = Электрохимический импеданс-спектроскопия\n\n Цель этого приложения - понять графики EIS, Nyquist и Bode. Приложение позволяет варьировать концентрацию массы, коэффициент диффузии, плотность тока обмена, ёмкость двойного слоя, а также максимальную и минимальную частоту.\n\nElectrochemical impedance spectroscopy (EIS) является распространенным методом электроанализа, используемым для изучения гармонической реакции электрохимической системы. Небольшое синусоидальное изменение применяется к потенциалу на рабочем электроде, и результирующий ток анализируется в частотном области.\n\n Реальные и мнимые компоненты импеданса дают информацию о кинетических и массовых транспортных свойствах клетки, а также поверхностных свойствах через ёмкость двойного слоя.
applicationdescr_echem/cyclic_voltammetry = Циклическая Вольтамметрия\n\n Целью приложения является демонстрация и моделирование использования циклической вольтамметрии. Вы можете варьировать объёмную концентрацию обоих видов, транспортные свойства, кинетические параметры, а также окно напряжения велосипеда и скорость сканирования.\n\nCyclic Voltammetry является распространенным аналитическим методом для исследования электрохимических систем. В этом методе разность потенциалов между рабочим электродом и эталонным электродом проносится линейно во времени от стартового потенциала до вершинного потенциала и обратно. Форма волны тока, называемая вольтаммограммой, предоставляет информацию о реактивности и свойствах переноса массы электролита.


# Electrochemistry Module models
modeldescr_echem/adsorption_desorption_voltammetry=Адсорбция-десорбция Voltammetry\n\n для возникновения электрохимической реакции реагирующие виды обычно должны адсорбироваться на поверхности электрода перед тем, как подвергнуться сокращению или окислению, после чего получающийся вид продукта десорбируется обратно в электролит.\n\n Если скорость адсорбции или десорбции является медленной по сравнению с этапом переноса электрохимического заряда, явления адсорбции-десорбции, возможно, придется учитывать в модели.\n\n Этот пример исследует влияние различных кинетических параметров для адсорбции, десорбции и переноса электронов при выполнении циклической вольтамметрии на плоском электроде.
modeldescr_echem/chlor_alkali = Current Distribution in a Chlor-Alkali Membrane Cell\n\n Этот пример описывает распределение вторичного тока в реалистичной структуре для анодов и катодов в хлорщелочной мембранной ячейке. Модельная геометрия является единицей ячейки целой ячейки.
modeldescr_echem/cyclic_voltammetry_1d = Циклическая вольтамметрия на макроэлектроде в 1D\n\n Пример моделирует циклическую вольтамметрию на электроде мм размеров. В этой общей аналитической электрохимии потенциал рабочего электрода сметается вверх и вниз и регистрируется ток. Форма волны тока (вольтаммограмма) дает информацию о реактивности и свойствах переноса массы аналита.
modeldescr_echem/diffuse_double_layer = Diffuse Double Layer\n\nЭтот пример является расширением модели Diffuse Double Layer и демонстрирует, как включить передачу заряда в диффузный двойной слой, описанный спаренным набором уравнений Nernst–Planck–Poisson.
modeldescr_echem/diffuse_double_layer_with_charge_transfer = Диффузный двойной слой с зарядкой Transfer\n\nВ интерфейсе электрод-электролит есть тонкий слой пространственного заряда, называемый диффузным двойным слоем. В этой области электронейтралитет не держится. Двойной слой может представлять интерес при моделировании таких устройств, как электрохимические суперконденсаторы и наноэлектроды.\n\n Учебник Diffuse Double Layer показывает, как связать уравнения Nernst–Planck с уравнением Пуассона, чтобы описать диффузный двойной слой в соответствии с моделью Gouy–Chapman–Stern.\n\nПриложение моделирования расширяет простой пример, включив два электрода. Он также рассматривает реакции электродов Фарадея (переноса заряда). Решено дополнительное уравнение для обеспечения общего сохранения заряда.
modeldescr_echem/electrodialysis = Опреснение в электродиализе Cell\n\n Этот пример рассматривает удаление хлорида натрия из водного раствора (разбавление) в другой поток (концентрат). Типичные применения электродиализа можно найти в опреснении технологических потоков, продуктов питания и соков, биомедицинской инженерии, не говоря уже о некоторых.
modeldescr_echem/glucose_sensor = Glucose Sensor\n\nElectrochemical глюкозодатчики используют амперометрические методы для измерения концентрации глюкозы в образце. Этот пример моделирует диффузию глюкозных и ферри/ферроцианидных окислительно-восстановительных медиаторов в единичной ячейке электролита над межцифровым электродом. Датчик дает линейный ответ в соответствующем диапазоне концентраций. Интерфейс электроанализа используется для сопряжения переноса химических видов с электролизом на рабочих и встречных электродах, а глюкоза окисляется ферментом глюкозооксидазы в растворе по Michaelis–Menten kinetics.
modeldescr_echem/impedance_spectroscopy = Электрохимическая импеданс-спектроскопия\n\nElectrochemical Impedance Spectroscopy (EIS) является распространенным методом, в котором небольшое колебательное возмущение применяется к электрохимической системе для опроса кинетических и транспортных свойств. Этот пример моделирует EIS для диапазона скоростей реакции электрода. Найквист и Боде иллюстрируют переход между реакцией, протекающей под кинетическим или транспортным контролем.
modeldescr_echem/microdisk_voltammetry = Вольтамметрия в микродиске Electrode\n\nMicroelectrodes популярна в электроанализе, потому что они обеспечивают высокую плотность тока с небольшим количеством активного материала электрода. Короткие временные шкалы диффузии до микроэлектрода означают, что устойчивый результат точен, и поэтому можно использовать стационарное исследование.\n\n Этот пример имитирует вольтамметрию на микроэлектроде радиусом 10 мкм.
modeldescr_echem/thin_layer_chronoamperometry = Тонкий слой Chronoamperometry\n\nОбщий электроаналитический метод исчерпывающего амперометрического обнаружения в микроскопическом тонком слое моделируется как 1D-симметричная диффузионная задача. Смоделированный результат согласуется с аналитическим уравнением Коттрелла в короткие сроки и отклоняется, как и ожидалось, в длительные сроки, когда диффузионный слой охватывает тонкослойную ячейку.
modeldescr_echem/tumor = Электрохимическое лечение опухолей\n\n Этот пример рассматривает транспорт и реакцию при электролизе опухолевой ткани в печени. Видами в модели являются протоны, хлорид и натрий. Реакциями на поверхности анода являются реакции эволюции хлора и кислорода.
modeldescr_echem/zone_electrophoresis = Zone Electrophoresis\n\nZone electrophoresis (ZE) - электрофоретический метод разделения, обычно используемый для анализа белков, нуклеиновых кислот и биополимеров. В процессе различные виды в образце транспортируются в непрерывной электролитной буферной системе при условии потенциального градиента. Из-за различий в подвижности виды в образцах в конечном итоге разделятся на разные, хорошо разрешенные пики.\n\n Этот учебник представляет интерфейс <em>Electrophoretic Transport</em>. Буферная система, состоящая из уксусной кислоты и трис(трис(гидроксиметил)аминометана), используется для разделения образца, состоящего из пиридина и анилина, на два хорошо разрешенных пика.
modeldescr_echem/wire_electrode = Wire Electrode\n\nКонтролирование распределения тока электролита и электрода является центральным элементом конструкции электрохимических элементов. Этот пример моделирует первичное, вторичное и третичное распределение тока проволочной ячейки электрода.


# Electrodeposition Module apps
applicationdescr_edecm/pcb_designer = Дизайнер печатных плат\n\nПриложение для гальваники печатных плат (PCB) позволяет дизайнерам изучать важные параметры и запускать моделирование с помощью нескольких простых щелчков мыши. С помощью этого ресурса разработчик печатных плат может использовать моделирование для анализа ряда факторов в процессе проектирования и производства. Можно оценить, будет ли конструкция адекватной для достижения технических характеристик медной проводки, оценить производительность таких устройств и оценить стоимость процесса гальваники’.

# Electrodeposition Module models
modeldescr_edecm/al_anodization = Алюминиевая анодизация\n\n При анодировании алюминия поверхность электрохимически изменяется, образуя абразивную и коррозионно-резистивную пленку Al₂O₃. Кинетика электродов в процессе лишь незначительно влияет на рост оксидного слоя, поэтому стационарного анализа распределения тока достаточно для определения однородности этого слоя’s \n\nАнодная кинетика из экспериментальных данных поляризации используется для исследования однородности плотности тока анодирования при трех различных температурах для заданной средней плотности тока. При более высоких температурах потенциал ячейки уменьшается, в то время как распределение тока и толщина становятся менее однородными. Это объясняется более низкими потерями активации (быстрая кинетика) при более высоких температурах.
modeldescr_edecm/alloy_deposition = Сплав Deposition\n\nЭта учебная модель демонстрирует электродепозицию никель-фосфорного сплава. Модель учитывает заряд и массовый транспорт множества видов наряду с многочисленными электродными реакциями, такими как электродепозиция никеля и фосфора и эволюция водорода. Модель вычисляет пространственные распределения различных видов вдоль диффузионного слоя. Участок поляризации вместе с участком мольной фракции осаждения выявляют желательные условия эксплуатации для приготовления сплава.
modeldescr_edecm/car_door = Электропокрытие двери автомобиля\n\nВ этом примере моделируется электропокрытие краски на двери автомобиля в зависимости от времени. Напыленная краска обладает высоким сопротивлением, что приводит к снижению скорости локального осаждения на участках с покрытием.\n\nПервичное распределение тока в сочетании с сопротивлением пленки используется для описания переноса заряда в электролите.\n\nМодель выполнена в 3D и использует импортированную геометрию САПР.
modeldescr_edecm/cu_deposition_suppressor = Медное осаждение в сквозной дыре Via\n\nЭта модель демонстрирует механизм заполнения сквозного отверстия через медное электроосаждение "butterfly". Из-за присутствия галогенид-супрессорных добавок в электролите электродепозиция происходит избирательно в центре с помощью, что позволяет избежать образования корпусов электролитов.\n\n Интерфейс Tertiary Current Distribution, Nernst Planck в сочетании с деформированной геометрией используется для отслеживания движущейся границы поверхности катода. Модель включает баланс массы для видов электролитов и адсорбированных добавок на поверхности электрода, а также баланс заряда электролита, предполагающий наличие поддерживающего электролита.
modeldescr_edecm/cu_electroless_deposition = Copper Electroless Deposition\n\n Этот пример демонстрирует, как моделировать переходное безэлектронное осаждение меди с использованием теории смешанного потенциала. Модель учитывает массовый транспорт путем диффузии и электрохимических реакций на поверхности электрода. Равновесные потенциалы частичных электрохимических реакций зависят от концентрации, а смешанный потенциал оценивается путем установки общего тока на 0.\n\n Изменение плотности тока, толщины осаждения, концентрации ионных видов во время безэлектронного осаждения вычисляется со временем в этом примере.
modeldescr_edecm/cu_electrowinning_bubbly_flow = Двухфазное моделирование потока медного электрообогащения с использованием Bubbly Flow\n\nмедного электрообогащения представляет собой процесс извлечения меди из раствора электролита и ее осаждения на поверхности катода с использованием нерастворимого анода, путем пропускания внешнего тока через электролитную ячейку. Во время процесса образуются пузырьки кислорода на поверхности анода, ведущие к большой зоне рециркуляции между поверхностями анода и катода, что требует двухфазного моделирования потока.\n\n В настоящей модели заряд и массовый транспорт ионных видов моделируются с использованием интерфейса третичного тока Nernst–Planck, а двухфазное течение, генерируемый из-за эволюции кислородного газа на поверхности анода, моделируется с использованием интерфейса Bubbly Flow, ламинарное течение. Влияние двухфазного потока на медное электроосложение продемонстрировано в модели.\n\n Эта модель требует модуля электродепозиции и модуля CFD.
modeldescr_edecm/cu_trench_deposition = Медное осаждение в Trench\n\n Этот пример иллюстрирует, как моделировать деформированную геометрию, когда электродепозиция меди происходит на поверхности катода. Учитываются как кинетика электродов, зависящих от концентрации, так и перенос ионов путем диффузии и миграции, и поэтому модель называется моделью распределения плотности третичного тока.
modeldescr_edecm/cu_trench_deposition_ls = Медное осаждение в окопе с использованием метода набора уровней\n\n Этот пример иллюстрирует использование интерфейса Level Set для моделирования электродепозиции меди, которая происходит на поверхности катода. Модель фиксирует образование полости, которое происходит из-за неравномерной скорости осаждения. Учитываются как кинетика электродов, зависящих от концентрации, так и перенос ионов путем диффузии и миграции, и поэтому модель называется моделью распределения плотности третичного тока. Кинетика электродов на границе осаждения определяется как относящийся к области термин, использующий функцию дельты из интерфейса Level Set.
modeldescr_edecm/cu_trench_deposition_pf = Медное осаждение в окопе с использованием метода поля фазы\n\n Этот пример иллюстрирует использование интерфейса Фазового поля для моделирования электродепозиции меди, которая происходит на поверхности катода. Модель фиксирует образование полости, которое происходит из-за неравномерной скорости осаждения. Учитываются как кинетика электродов, зависящих от концентрации, так и перенос ионов путем диффузии и миграции, и поэтому модель называется моделью распределения плотности третичного тока. Кинетика электродов на границе осаждения определяется как относящийся к области термин, использующий функцию дельты из интерфейса Фазового поля.
modeldescr_edecm/decorative_plating = Декоративная пометка\n\nЭта учебная модель гальванического покрытия использует распределение вторичного тока с полной кинетикой Butler–Volmer как для анода, так и для катода. Вычисляется толщина осажденного слоя на катоде, а также рисунок, вызванный растворением анодной поверхности.
modeldescr_edecm/electrode_insulator_growth = Electrode Growth Next to the Insulator\n\n Этот пример показывает, как моделировать распределение вторичного тока и рост электродов с помощью движущейся геометрии.
modeldescr_edecm/electroplating_rack = Электропокрытие нескольких компонентов в Rack\n\n Когда несколько компонентов должны быть гальванизированы, они обычно устанавливаются на стойку в гальванической ванне.\n\nВажным аспектом является достижение однородной толщины пластинчатого слоя для всех компонентов, установленных на стойке.\n\n Эта примерная модель позволяет исследовать влияние нескольких геометрических и эксплуатационных параметров на однородность гальванического покрытия стойки.
modeldescr_edecm/ecm_microbore = Электрохимическая обработка микроборе\n\n В этом примере модели удаления металла с помощью электрохимической обработки (ЭКМ). Используется первичная модель распределения тока с пороговым состоянием плотности тока, ниже которого не происходит удаление материала. Геометрия модели находится в 2D с осевой симметрией.
modeldescr_edecm/fountain_flow = Влияние потока фонтанов на электродепозицию на вращающийся пластина\n\n Этот пример исследует конвективные эффекты потока в клетке с вращающейся пластиной. Электролит поступает в клетку со дна и течет к вращающейся пластине, где оседает медь. Профиль ламинарного потока, концентрация меди, потенциал электролита и электрический потенциал тонкой пластины решены для.\n\n Геометрия выполнена в двух измерениях с осевой симметрией.\n\n Эта модель требует модуля электродепозиции и модуля CFD.
modeldescr_edecm/inductor_coil = Электроосаждение катушки индуктора\n\nЭтот пример моделирует осаждение катушки индуктора в 3D.\n\n Геометрия включает экструзию образца осаждения в изолирующую фоторезистную маску и диффузионный слой поверх фоторезиста. Массовая передача ионов меди в электролите оказывает значительное влияние на кинетику осаждения, что приводит к более высоким скоростям осаждения во внешних частях образца осаждения.\n\n Модель решается в зависящем от времени исследовании с использованием деформированной геометрии.
modeldescr_edecm/microconnector_bump_2d = Электродепозиция насоса микроконнектора в 2D\n\n Этот пример имитирует осаждение удара микроконнектора. Процесс осаждения ограничен массовым транспортом, и исследуется влияние различных скоростей жидкости на распределение плотности тока на электроде.
modeldescr_edecm/microconnector_bump_3d = Электродепозиция микроконнекторного насоса с деформирующей геометрией в 3D\n\n Этот пример имитирует эволюцию формы удара микроконнектора с течением времени как отложения меди на поверхности электрода. Перевозка ионов в электролите происходит путем конвекции и диффузии. Электродная кинетика описана зависимым от концентрации Butler–Volmer expression.\n\n Модель является расширением 3D электродепозиции микроконнекторного насоса в 2D примере.
modeldescr_edecm/microvia_fill_process = Microvia Fill Process\n\n Этот пример имитирует процесс заполнения микровии во время электродепозиции. Сочетание химии поверхности и транспортных ограничений добавок в электролите приводит к более высокой скорости осаждения в микровии.
modeldescr_edecm/pcb_designer = Электропокрытие печатной платы \n\n Этот пример имитирует гальваническое покрытие печатной платы (PCB) в 3D с использованием интерфейса вторичного распределения тока. для достижения однородности толщины по всей ПХД в конструкцию включен манекен, а также диафрагма в гальванической ванне.\n\n для этого необходим модуль импорта ECAD.
modeldescr_edecm/pulse_reverse_plating = Pulse Reverse Plating\n\nЭто руководство исследует, как импульсное обратное покрытие может использоваться в качестве альтернативы без добавок для ослабления небольших выступов во время осаждения медного металла. Соответствуя параметрам процесса, включая длину передних и обратных импульсов (циклов работы), можно создать яркую зеркальную металлическую поверхность.\n\n Модель предполагает, что квазистационарное распределение тока быстро устанавливается во время каждого импульса, так что средняя скорость прямого и обратного осаждения может использоватьсяа в зависящем от времени моделировании деформирующей геометрии.
modeldescr_edecm/resistive_wafer = Электродепозиция на резистивном узоре пластина\n\n Этот пример моделирует зависящее от времени осаждение меди на резистивную пластину в реакторе-купе. По мере накопления осажденного слоя резистивные потери осажденного слоя уменьшаются. Продемонстрирована польза от использования текущего вора для более равномерной толщины депозита.
modeldescr_edecm/rotating_cylinder_hull_cell = Вращающийся цилиндр Hull Cell\n\nЭтот 2D аксисимметричный пример моделирует и сравнивает первичные, вторичные и третичные распределения тока в вращающейся цилиндровой ячейке Hull.
modeldescr_edecm/superfilling = Superfilling Electrodeposition\n\n Этот пример иллюстрирует концепцию суперзаполнения в электродепозиции.\n\n Скорость осаждения ускоряется в вогнутых областях поверхности, где концентрация поверхностного катализатора увеличивается из-за сокращения площади движущейся границы.
modeldescr_edecm/zn_electrowinning = Вторичная дистрибуция тока в цинковой электровининговой ячейке\n\nЭта 2D-модель распределения вторичного тока в цинковой электровининговой ячейке исследует влияние на распределение тока при изменении выравнивания электродов в параметрическом исследовании.


# Fatigue Module apps
applicationdescr_fatigue/frame_fatigue_life = Усталостная жизнь рамы\n\nАнализ усталости с помощью моделирования, а не проведение экспериментов по усталости, является гораздо более быстрым способом определить, выйдет ли из строя определенная конструкция после многократной нагрузки и разгрузки. Это приложение позволяет оценить усталостную долговечность рамы с вырезом. Это полезно для понимания концепции усталости и того, как создать эквивалентное приложение для ваших собственных проектов.\n\nПриложение Frame Fatigue Life позволяет изменять геометрию выреза и тестировать различные типы нагрузок и материалы. Истории нагрузок и кривые S–N можно прочитать из текстовых файлов.\n\nПоскольку геометрия параметризована, приложение можно использовать для определения чувствительности геометрических параметров и получения оптимальной конфигурации.

# Fatigue Module models
modeldescr_fatigue/accelerated_life_testing = Accelerated Life Testing\n\n Этот пример демонстрирует, как оценить усталость, вызванную конкретным напряжением или энергией, используя простое схематическое представление электронного компонента. Необходимые переменные напряжения и энергии определяются с помощью обычных дифференциальных уравнений и вычисляются во время моделирования цикла тепловой деформации.
modeldescr_fatigue/bracket_fatigue = Bracket — Fatigue Evaluation\n\nS–N Кривая, также называемая кривой Вёлера, является одним из самых популярных методов оценки усталости. Если условия эксплуатации отличаются от экспериментальных, кривая S–N должна быть изменена. Это показано на примере, где учитывается влияние условий окружающей среды и отделки поверхности.
modeldescr_fatigue/bracket_fatigue_harmonic_vibration = Bracket — Harmonic Vibration Fatigue\n\n Этот пример показывает, как выполнять анализ усталости структуры, подвергаемой гармоническим колебаниям. Нагрузка наносится на крепления конструкции, и для вычисления использования усталости выполняется частотная развертка.
modeldescr_fatigue/bracket_fatigue_harmonic_vibration_using_different_sn_options = Bracket — Усталость от гармонических вибраций Используя различные S–N Options\n\nЭтот пример показывает, как выполнить анализ усталости структуры, подвергнутой гармоническим колебаниям, используя различные описания кривой SN. Нагрузка наносится на крепления конструкции, и для вычисления использования усталости выполняется частотная развертка.
modeldescr_fatigue/cycle_counting_benchmark = Подсчет цикла в анализе усталости — Benchmark\n\nA эталонная задача алгоритма подсчета потока дождя сравнивает результаты между ASTM и модулем усталости COMSOL с использованием плоского образца испытания на растяжение. Расширение производится для расчета совокупного ущерба по модели Palmgren–Miner и результаты сравниваются с аналитическими выражениями.
modeldescr_fatigue/cylinder_with_hole_elastic = Приближение к анализу усталости низкого цикла цилиндра с помощью Hole\n\n Этот пример показывает, как выполнить анализ усталости от низкого цикла (LCF) с использованием линейной упругой модели, даже если напряжения в отверстии значительно выше предела выхода. Пластичность в отверстии обрабатывается приближённым способом на основе поля напряжения и деформации на небольших выёмках.
modeldescr_fatigue/cylinder_with_hole_plastic = Elastoplastic Low-Cycle Fatigue Analysis of Cylinder with a Hole\n\n Этот пример показывает, как выполнить анализ с низким циклом усталости (LCF) на основе эластопластического анализа. Последний из двух циклов нагрузки используется для анализа усталости, чтобы убедиться, что состояние репрезентативно для повторных нагрузок.
modeldescr_fatigue/cylindrical_test_specimen = Анализ усталости цилиндрического теста Specimen\n\nA цилиндрический тестовый образец подвергается сценарию с нормальной и сдвиговой нагрузкой. Три модели на основе напряжения — Findley, Matake и Normal stress — сравниваются с аналитическими значениями и друг с другом. Негладкое поведение модели Матаке фиксируется и обсуждается.
modeldescr_fatigue/engine_fatigue = Высокоциклическая усталость поршневого двигателя Piston Engine\n\nВ поршневом двигателе соединительные стержни передают вращающееся движение в поршневое движение. Соединительные стержни идентифицируются как критические части и анализируются с точки зрения усталости. Время жизни усталости прогнозируется с использованием критериев усталости высокого цикла Баскина.
modeldescr_fatigue/eyeglass_frame_fatigue = Усталостное разрушение оправы очков\n\nВ поисках снижения веса поперечное сечение оправы очков постоянно уменьшается. Тонкая секция над носом передает всю нагрузку между двумя половинками. В этом примере прогнозируется усталостная долговечность с использованием комбинированной модели Баскина и Coffin–Manson, когда очки подвергаются изгибу.
modeldescr_fatigue/frame_with_cutout = Усталостная реакция на случайную непропорциональную нагрузку\n\nТонкостенная рама с центральным вырезом подвергается случайной нагрузке. Хотя напряжения намного ниже уровня текучести материала, повреждения накапливаются в течение истории нагрузки. Алгоритм подсчета дождевых потоков используется для определения сценария нагрузки, а модель линейного повреждения Palmgren–Miner определяет количественную оценку ущерба.
modeldescr_fatigue/linear_guide = Усталость от подвижных контактов в линейном руководстве\n9000000000001A линейном руководстве была загружена выше предела спецификации производителя. Возникает вопрос, будут ли контактные нагрузки вводить усталость. При анализе подвижного контактного усталостного движения в основном нагруженного подвижного элемента моделируется и усталость оценивается с помощью модели Dang Van.
modeldescr_fatigue/rim_fatigue = Изучается анализ усталости колеса Rim\n\nHigh Cycle Fatigue (HCF) спицы в ободе колеса. По мере вращения колеса истории напряжений в структуре станут непропорциональными. Риск усталости оценивается по критерию Финдли.
modeldescr_fatigue/shaft_with_fillet = Анализ усталости непропорционально загруженного вала с помощью Fillet\n\n Этот пример показывает, как выполнить анализ усталости высокого цикла (HCF) с непропорциональной историей нагрузки, вызванной поперечной силой и крутящим моментом, которые применяются в различных комбинациях. Сравниваются три различные модели усталости (Findley, Matake и Dang Van).
modeldescr_fatigue/standing_contact_fatigue = Постоянный контакт Усталость\n\nСтойкая контактная усталость поверхностного затвердевшего материала. Через процесс индукционного затвердевания в материал вводится остаточное напряжение. Присутствуют три различных слоя с различными свойствами материала. Модель Данг Ван используется для прогнозирования усталости.
modeldescr_fatigue/surface_mount_resistor = Термическая усталость резистора поверхностного монтажа\n\nA подвергается тепловому циклу. Припой, соединяющий резистор с печатной платой, является самым слабым звеном в сборке. для обеспечения структурной целостности сборки выполняется анализ усталости на основе деформации ползучести и рассеиваемой энергии.
modeldescr_fatigue/viscoplastic_solder_joints_fatigue = Рассмотрено прогнозирование тепловой усталости на основе энергии в шаровой сетке Array\n\nFatigue надежности термонагруженных вископластических припоевых соединений. Срок службы припоя в двух шаровых сетках прогнозируется на основе энергетической модели Дарво. Он оценивает повреждение на основе усредненной плотности рассеивания энергии в тонком слое, где ожидается растрескивание припоя.
modeldescr_fatigue/bracket_fatigue_random_vibration = Bracket — Random Vibration Fatigue\n\n Этот пример показывает, как выполнять анализ усталости структуры, подверженной случайным колебаниям.


# Fuel Cell & Electrolyzer Module
modeldescr_fce/ac_fuel_cell = Электрохимическая импеданс-спектроскопия в топливной ячейке\n\n Этот пример демонстрирует, как выполнять электрохимическое импедансное моделирование топливного элемента.
modeldescr_fce/aec_shunt_currents = Ток шанта в щелочном электролизере Stack\n\n В щелочном электролизере все клетки имеют один и тот же электролит. В результате того, что все клетки находятся в ионном контакте, паразитные шунтирующие токи текут между клетками через коллекторы и электролитные каналы, как на входной, так и на выходной стороне.\n\n Этот пример моделирует распределение вторичного тока в стеке, содержащем 20 ячеек. Вычисляются кулоновые электрические и энергетические эффективности для стека, а также отдельные шунтирующие токи, входящие или выходящие из каждой ячейки.
modeldescr_fce/alkaline_electrolyzer = Электролиз щелочной воды (Alkaline Electrolyzer\n\nAlkaline water electrolysis) — это хорошо налаженный промышленный процесс производства водородного газа. В клетке водород образуется на катоде, тогда как кислород образуется на аноде.\n\n Электролит представляет собой водную жидкость, и когда развитые газы образуют пузырьки, эффективная ионная проводимость снижается. Сгенерированные газы могут оказывать пагубное влияние на производительность ячеек также из-за пониженной доступной площади поверхности для реакций электрода.\n\n Этот пример исследует влияние газообразования на производительность щелочной электролизной ячейки.
modeldescr_fce/fuel_cell_cathode = Массовый транспорт и электрохимическая реакция в топливной ячейке Cathode\n\nЭто стационарная 3D-модель общего катода топливных элементов, описывающая распределение массы-фракции кислорода, воды и азота, а также текущее распределение.
modeldescr_fce/fuel_cell_cathode_with_liquid_water = Катод топливных элементов с жидкой водой\n\n Этот пример расширяет учебник по массовому транспорту и электрохимической реакции в катоде топливных элементов, чтобы также включить жидкий водный транспорт в кислородный электрод.\n\n Жидкая вода производится с использованием экспрессии скорости конденсации паров в зависимости от относительного уровня влажности в газовой фазе.\n\n для определения корреляции между уровнем насыщения жидкости и разницей между давлением в жидкой и газовой фазах используется экспериментальная кривая капиллярного давления.
modeldescr_fce/ht_pem = Массовый транспортный анализ высокотемпературного топлива PEM Cell\n\n Этот пример исследует транспорт реагентов и воды в высокотемпературном PEMFC. Модель включает в себя явления переноса массы и импульса в каналах потока, слоях диффузии газа (GDL) и пористых электродах, а также электрохимические токи в GDL, пористых электродах и полимерной мембране.
modeldescr_fce/ht_pem_flow_field = Высокотемпературный топливный элемент PEM с серпентиновым потоком Field\n\nЭтот пример моделирует поток и массовый транспорт в каналах и слой диффузии газа (GDL) кислородной стороны полимерного электролитного топливного элемента.\n\n Реакция катодного электрода диффузионного электрода кислородного газа (ГДЭ) моделируется как внутреннее граничное условие, где локальная плотность тока зависит от сверхпотенциала и локальной концентрации кислорода.\n\n Потери напряжения мембраны, анода GDE и анода GDL также включены в модель.\n\n Предполагается, что поток газа на анодной стороне на 100% состоит из водорода, что исключает необходимость моделировать транспорт массы и импульса на этой стороне ячейки.
modeldescr_fce/nonisothermal_pem_fuel_cell = Nonisothermal PEM Fuel Cell\n\nЭто руководство модели взаимосвязанных электрохимических реакций, переноса заряда и видов и теплопередачи в полимерной электролитной мембране (PEM) топливный элемент. для полей потока газа прямые каналы используются на стороне анода водорода, тогда как сетчатая структура используется на стороне катода воздуха. Клетка охлаждается охлаждающей жидкостью, протекающей в отдельном канале. для верхних и нижних границ используются периодические температурные граничные условия, имитирующие конфигурацию сложенных ячеек. В модель также включен электроосмотический транспорт (драг) и проникновение воды через мембрану.
modeldescr_fce/passive_pem = Омические потери и распределение температуры в пассивном топливе PEM Cell\n\n Этот пример моделирует небольшой, пассивно охлаждаемый топливный элемент PEM для бытовой электроники. Модель включает электрохимические токи и теплотранспорт.
modeldescr_fce/pem_gdl_species_transport_2d = Виды транспорта в слоях диффузии газа: PEM\n\n Этот пример демонстрирует моделирование переноса видов в слоях газовой диффузии (GDL) топливного элемента протонной обменной мембраны (PEM) с двумя смежными каналами потока различных давлений.
modeldescr_fce/pem_mea_1d = Транспортные явления в полимерных электролитных топливных элементах Membrane-Electrode Assembly\n\nЭтот учебник моделирует, как относительная влажность впускных газов влияет на производительность низкотемпературной полимерной электролитной мембранно-электродной сборки. Модель включает в себя влагозависимые иономерные (электролитные) проводимости, газофазный массовый транспорт, водный иономерный транспорт и теплообмен. В модель также включена перекрестная диффузия водорода по мембране иономера.
modeldescr_fce/pem_electrolyzer = Полимерный электролит Membrane Electrolyzer\n\n В ячейке полимерного электролитного мембранного электролизера (PEMEC) два отсека электродов разделены полимерной мембраной. Жидкая вода подается на анодную сторону, образуя газообразный кислород на анодной, и газообразный водород на катодной стороне, соответственно.\n\n Соответствующие конструкции паттернов поля потока важны для получения равномерного распределения потока в сочетании с понижением давления во время работы.\n\n В этом примере модель смеси используется для моделирования двухфазной динамики жидкости на анодной стороне PEMEC.
modeldescr_fce/pemfc_serpentine_flow_field = Низкотемпературный PEM-топливный элемент со змеевидным полем течения\n\nВ этом учебном примере исследуется распределение тока в низкотемпературном PEMFC при использовании змеевидных схем поля течения.\n\nЯчейка работает в режиме встречного потока, поэтому входные потоки кислорода и водорода расположены с противоположных сторон.\n\nИспользуются относительно сухие составы входного газа, так что для достижения хорошей производительности ячейка опирается на самоувлажнение.
modeldescr_fce/soec = Solid Oxide Electrolyzer\n\nЭтот пример моделирует ячейку твердооксидного электролизера, в которой водяной пар уменьшается до образования водородного газа на катоде, а кислородный газ развивается на аноде. Распределение тока в ячейке связано с переносом массы катода водорода и воды и переносом импульса.
modeldescr_fce/soec_co2 = Вода и углекислый диоксид Co-Electrolysis in a Solid Oxide Electrolyzer Cell\n\nЭтот пример модели совместного электролиза воды и углекислого газа с использованием твердооксидного электролизера. Модель включает полную связь между массовыми балансами и потоком газа в диффузионных электродах водорода и кислорода, балансом импульса в каналах потока водорода и кислорода, энергетическим балансом через клетку, балансом ионного тока, переносимого ионом оксида, и балансом электронного тока. Обратимая реакция сдвига водяного газа включена в электрод диффузии водородного газа и канал потока водородного газа.\n\n Модель вычисляет пространственные распределения различных видов через газодиффузионные электроды и каналы потока газа. Пространственное распределение общей плотности тока по длине электрода также оценивается в модели с использованием оператора общей проекции.
modeldescr_fce/soec_thermodynamics = Твердооксидный электролизер Используя Thermodynamics\n\nЭтот пример моделирует ячейку твердооксидного электролизера, в которой водяной пар уменьшается до образования водородного газа на катоде, а кислородный газ развивается на аноде. Текущее распределение в ячейке связано с переносом массы катода водорода и воды и переносом импульса.\n\n Узлы термодинамики и химии используются для автоматического определения свойств катодной газовой смеси, а также равновесных потенциалов реакций электрода.
modeldescr_fce/sofc_unit_cell = Распределение плотности тока в твердом оксидном топливе Cell\n\n Этот пример представляет собой исследование распределения плотности тока в твердом оксидном топливном элементе (SOFC). Модель включает полную связь между массовыми балансами на аноде и катоде, балансами импульсов в газовых каналах, потоком газа в пористых электродах, балансом ионного тока, переносимого ионом оксида, и балансом электронного тока.
modeldescr_fce/stack_cooling = Fuel Cell Stack Cooling\n\nЭто руководство моделирует термическое управление стеком полимерных электролитных мембран (PEM) топливных элементов. Работа стека с аналогичным профилем температуры для всех ячеек важна, поскольку неравномерное распределение температуры может в противном случае привести к неравномерной конденсации водяного пара и большому изменению производительности от ячейки к ячейке.\n\n Стек состоит из пяти ячеек, сложенных биполярными пластинами, которые несут жидкую охлаждающую жидкость. Модель решает температурные, электродные и электролитные фазовые потенциалы, массовый транспорт реагирующих видов в каждом отдельном газовом отсеке, а также давление жидкости и соответствующие скорости в газовом и жидкостном отсеках потока.\n\n Каналы потока биполярных пластин не разрешаются явно в геометрии. Вместо этого используются анизотропные проницаемости, определяющие структуры течения жидкости внутри стека.
modeldescr_fce/zero_gap_aec = Двухфазный неизотепловой щелочной водный электролизер\n\nЭта модель определяет электролизер щелочной воды с нулевым разрывом, где кислород и газообразный водород эволюционируют в электродах диффузии никеля пористого газа, расположенных рядом с пористым сепаратором (диафрагма).\n\n Геометрия определяет единичную ячейку стека электролизера, в свою очередь содержащую две полные ячейки электролизера, простирающиеся на 10 см вдоль направления канала. Два электролизера разделены гофрированной биполярной стальной пластиной.\n\n Модель решает полностью взаимосвязанное распределение тока электролизеров, двухфазное течение эволюционировавших газов и электролита и теплообмен.


# Geomechanics Module featured applications
applicationdescr_geomech/parameterized_concrete_beam = Параметризованные бетонные балки Beam\n\nАрмированные бетонные балки обычно используются в современном строительстве из-за их прочности и долговечности. Имитируя такие пучки, инженеры могут гарантировать, что полученные структуры хорошо работают и безопасны. С помощью симуляционных приложений инженеры всех уровней знаний могут легко анализировать и тестировать различные проекты.\n\n Демо-приложение Parameterized Concrete Beam фокусируется на структурных свойствах произвольных конструкций балки и арматуры. Пользователи приложения имеют возможность изменять ряд параметров, таких как геометрические параметры балки, свойства стали и бетона, распределение армирующих стержней и граничные условия на конце балки.\n\nРезультаты показывают осевое напряжение в бетоне и балках, отклонение и области, где происходит пластичность.

# Geomechanics Module models
modeldescr_geomech/block_verification = Блокировать проверку\n\nЭтот проверочный пример представляет собой одноосное сжатие предварительно напряженного блока. Благодаря простым предварительным напряжениям и одноосному сжатию можно определить предел текучести материала аналитически. Блок моделируется как упруго-идеально пластичный материал с критерием текучести Мора–Кулон.
modeldescr_geomech/concrete_beam = Бетонная балка с армированными брусками \n\nБетонные конструкции почти всегда содержат арматуру в форме стальных брусьев ("rebars"). В COMSOL арматура может быть смоделирована либо индивидуально путем добавления интерфейса Truss к интерфейсу Solid, используемому для бетона, либо с использованием подфункции Fiber для моделирования их глобального эффекта. В случае использования интерфейса Truss твердая сетка для бетона и арматурная сетка может быть независимой, поскольку перемещения отображаются из твердых частиц на арматуре в определенной позиции.\n\n Луч анализируется с помощью нескольких моделей материалов, включая бетонную модель Оттосена и модель повреждений Мазара.
modeldescr_geomech/concrete_beam_cdpm = Разрушение бетонной балки с использованием сопряженного повреждения–Plasticity\n\nРазрушение железобетонных конструкций связано с повышенным поведением материала и взаимодействием между материалами. Здесь показано, как моделировать различные стадии разрушения железобетонной балки, включая связанную модель материала «поврежденность-пластичность» для бетона, пластичность металла для арматуры и нелинейный закон скольжения для взаимодействия между бетоном и арматурой.
modeldescr_geomech/concrete_damage_plasticity = Concrete Damage–Plasticity Material Tests\n\nЭтот пример показывает поведение модели сопряженного повреждения-пластичности для бетона при различных условиях нагрузки.
modeldescr_geomech/damage_test_bar = Хрупкое разрушение при одноосном растяжении\n\nВ этой учебной модели показано поведение двух моделей хрупкого повреждения при испытании на одноосное растяжение.
modeldescr_geomech/deep_excavation = Deep Excavation\n\nЭтот пример показывает, как моделировать глубокие раскопки. Основной областью применения таких моделей является гражданское строительство. В этом случае боковое давление in situ, действующее на подпорную стенку при раскопках грунта, моделируется пограничными нагрузками. Почва предполагает пластичность Drucker–Prager.
modeldescr_geomech/flexible_footing = Гибкая и гладкая полоса ног на страте Clay\n\nA общая проблема проверки для геотехнических проблем - это поверхностный слой глины. В этом примере на глиняные пласты наносится вертикальная деформация и изучается статический отклик и ударная деформация. Глина смоделирована как эластично-идеальный пластиковый материал и сравниваются условия выхода Drucker–Prager и Mohr–Coulomb в условиях деформации плоскости.
modeldescr_geomech/hysteresis_small_strain_overlay = Гистерезис в почве с использованием наложения на малый деформация Model\n\n Модель накладного материала с малым напряжением улавливает эффект высокой жесткости при низкой деформации, а также гистерезис при циклической нагрузке, что является общим эффектом для большинства почв. Формулировка допускает деградацию жесткости с увеличением деформации сдвига и полное восстановление жесткости при развороте деформации.\n\n В этом примере циклические испытания на растяжение и сдвига показывают деградацию жесткости и эффект гистерезиса с моделью наложения с малым напряжением.
modeldescr_geomech/settlement_analysis = Shallow Foundation on Unsaturated Soil\n\n В этом примере исследуется поселение и анализ мелкого фундамента, покоящегося на ненасыщенном слое почвы с модифицированными моделями грунта Cam-Clay и Extended Barcelona Basic. Показан эффект отсасывания поры за счет движений в фреатической линии и полученного в результате расселения и скачка на глиняном слое.
modeldescr_geomech/settlement_analysis_transient = Переходная реакция неглубокого фундамента на ненасыщенной почве\n\nВ этом примере исследуется переходная реакция неглубокого фундамента, опирающегося на ненасыщенный слой почвы. Изменения порового всасывания из-за инфильтрации или испарения воды исследуются с использованием расширенной базовой модели почвы Барселоны. Результаты показывают деформацию глинистого пласта из-за давления основания и изменения порового всасывания.
modeldescr_geomech/holed_plate_fracture = Хрупкое разрушение пластины с отверстиями\n\nВ этом примере хрупкое разрушение пластины с отверстиями и надрезом моделируется с использованием модели повреждения фазового поля. Геометрия пластины настроена так, что происходит разрушение смешанного типа, размеры и свойства материала взяты из экспериментальных данных. В примере показано, как настроить эффективную и стабильную конфигурацию решателя для задач такого типа.
modeldescr_geomech/isotropic_compression = Isotropic Compression with Modified Cam-Clay Material Model\n\nЭта модель имитирует изотропное сжатие образца почвы с использованием моделей материалов Modified Cam-Clay (MCC), Extended Barcelona Basic (BBMx) и Modified Structured Cam-Clay (MSCC). Целью примера является воспроизведение аналитических кривых, показывающих Нормальную линию сжатия (NCL) и Линию набухания (или URL-адрес линии разгрузки / перенагрузки).
modeldescr_geomech/isotropic_compression_mscc = Isotropic Compression Test for Structured Clays\n\nЭта модель имитирует изотропное сжатие естественно структурированных и искусственно структурированных глин с использованием модели материала Modified Structured Cam-Clay (MSCC). Целью данного примера является воспроизведение изотропного компрессионного поведения, заданного в бенчмарке для четырех структурированных почв.
modeldescr_geomech/mechanical_modeling_of_bentonite_clay = Механическое моделирование бентонитовой глины \n\n В этом примере расширенная базовая модель Барселоны (BBMx) используется для моделирования эдометра, одноосной отечности, триаксиальной и ограниченной отечности бентонитовых глин для восстановления гидромеханических характеристик образцов. \n\nQualitatively существует хорошее согласие между моделированием и экспериментами, используемыми для проверки реализации модели почвы BBMx.
modeldescr_geomech/notched_beam_damage = В этом примере две модели для хрупкого повреждения используются для оценки трещины зазубренного бетонного пучка, подвергнутого трехточечному изгибу.\n\n Результаты сравниваются с экспериментальными данными.
modeldescr_geomech/triaxial_test = Triaxial Test\n\nТриаксиальный тест является распространенным методом измерения свойств почвы. В этом примере изучается статическая реакция и нагрузка коллапса при различных давлениях удержания в обычных и улучшенных трехосных испытаниях. Образец почвы моделируется как эластопластическая почва с помощью Drucker– Состояние Прагера.
modeldescr_geomech/triaxial_and_oedometer_test_mcc = Триаксиальное и одометрическое испытания с модифицированной моделью материала Cam-Clay\n\nВ этом примере триаксиальные и одометрические испытания моделируются с помощью модифицированной модели материала Cam-Clay. Нелинейная связь напряжений и деформаций восстанавливается при формулировке с постоянным коэффициентом Пуассона. Поведение упрочнения и разупрочнения воспроизводится для нормально консолидированных и сильно переуплотненных грунтов.
modeldescr_geomech/triaxial_test_hardening_soil = Трехосное испытание с моделью твердеющего грунта\n\nВ этом примере трехосное испытание моделируется с использованием модели материала Hardening Soil. Тест состоит из двух основных этапов; первоначальное изотропное сжатие, за которым следует осевое сжатие. Восстановлена ​​гиперболическая зависимость напряжения-деформации. Также проверено, что асимптотическое значение осевого напряжения равно аналитическому значению напряжения разрушения.
modeldescr_geomech/triaxial_test_hardening_soil_small_strain = Трехосное испытание с отвердевающим грунтом Модель материала с малой деформацией\n\nВ этом примере монотонные и циклические трехосные испытания моделируются с использованием модели материала Hardening Soil Small Strain.\n\nМодель отражает эффекты жесткости и гистерезиса при малых деформациях при циклическом нагружении. Соотношение напряжения и деформации соответствует гиперболической кривой, указанной в ссылке.
modeldescr_geomech/tunnel_excavation = Tunnel Excavation\n\nОбщая проблема проверки для геотехнических проблем - моделирование раскопок в туннелях. В этом примере используются два исследования. Первый вычисляет напряжениеовое состояние почвы перед раскопками в туннеле. Во втором исследовании удаляется часть почвы, и эластопластическое поведение почвы вычисляется с начальными напряжениями, взятыми из первого исследования. Почва смоделирована как эластично-идеальный пластиковый материал с использованием Drucker– Состояние Прагера.
modeldescr_geomech/slope_stability = Устойчивость склона насыпной плотины\n\nВ этом примере показано, как выполнить анализ устойчивости откоса насыпной плотины, включая поровое давление. Транспорт жидкости в пористом грунте описывается законом Дарси, а упругопластический анализ проводится с помощью модели Мора–Кулона. Свойства материала параметрируются с учетом коэффициента запаса прочности с использованием метода уменьшения сдвига.
modeldescr_geomech/wetting_and_drying_of_unsaturated_soil = Смачивающие и сухие пути для частично насыщенных почв с расширенной базовой моделью Барселоны \n\nэксперименты на сухих и влажных образцах почвы выполняются для понимания их поведения в различных условиях нагрузки. В этом примере модель почвы Extended Barcelona Basic (BBMx) используется для моделирования путей смачивания и сушки в частично насыщенных образцах почвы при циклической нагрузке.
modeldescr_geomech/strength_reduction_method = Метод снижения прочности для устойчивости склона\n\nМетод снижения прочности является инструментом определения коэффициента запаса прочности (FOS) в геотехнических задачах, в частности, в устойчивости откосов. для определения коэффициента запаса прочности склона прочностные свойства модели Мора–Кулона постепенно уменьшаются до тех пор, пока не произойдет разрушение. Проведено сравнение ассоциативного и неассоциативного пластического течения.

# Heat Transfer Module apps
applicationdescr_heat/concentric_tube_heat_exchanger = Concentric Tube Heat Exchanger\n\nЭто приложение демонстрирует следующее:\n\n•Выбор предварительно определенных или определяемых пользователем материалов\n• Пользовательская опция переключения между ламинарным потоком или турбулентным потоком\n• Изменение граничных условий с использованием методов\n• Визуализация свойств материалов, зависящих от температуры, в виде графиков \n• Пользовательская опция для установки разрешающего устройства tolerance\n\n Поиск правильных размеров теплообменника необходим для обеспечения его эффективности. Другие свойства также должны быть рассмотрены для того, чтобы спроектировать теплообменник, который имеет правильный размер и обеспечивает нагретую или охлажденную жидкость правильной температуры.\n\n Приложение вычисляет эти величины для теплообменника из двух концентрических трубок. Жидкости могут течь либо параллельно, либо в встречном потоке тока.\n\n Свойства жидкости, характеристики теплопередачи и размеры теплообменника могут быть различными. Многофизический интерфейс неизотермическое течение используется для моделирования теплопередачи.
applicationdescr_heat/equivalent_properties_of_periodic_microstructures = Эквивалентные свойства периодических микроструктур\n\nЭто приложение демонстрирует следующее:\n\n• Визуализация периодической структуры из блока cell\n• Сброс некоторых или всех входных параметров\n• Экспорт результирующих свойств материала в виде MPH-файла или XML-файла, который может быть импортирован на сессию COMSOL Multiphysics session9000000000009\nPeriodic, часто встречается в композитных материалах, таких как углеродные волокна и сотовые структуры. Они могут быть представлены единичной ячейкой, повторяющейся по трем направлениям распространения.\n\nдля снижения вычислительных затрат моделирование может заменить все микроскопические детали композитного материала однородным областьом с эквивалентными свойствами. Это приложение вычисляет эквивалентные свойства для геометрической конфигурации и свойства материала ячейки блока, которые будут использоваться в макроскопической модели, которая использует эти композиционные материалы.\n\nДаны девять различных микроструктур с размерными характеристиками, которые модифицируются пользователем, а также тринадцать предварительно определенных материалов. Приложение вычисляет эквивалентную плотность, теплоёмкость и теплопроводность или диффузивность композитных материалов.
applicationdescr_heat/finned_pipe = Ребристая труба\n\nЭто приложение демонстрирует следующее:\n\n• Геометрические детали и параметризованная геометрия\n• Объект формы таблицы результатов, содержащий выходные данные\n\nРебристые трубы используются в охладителях, нагревателях или теплообменниках для увеличения теплопередачи. Они бывают разных размеров и конструкций в зависимости от применения и требований.\n\nКогда ребра располагаются снаружи трубы, они увеличивают поверхность теплообмена трубы, так что охлаждающая или нагревающая внешняя жидкость может обмениваться теплом более эффективно. При размещении внутри трубы именно внутренняя жидкость получает выгоду от увеличенной поверхности теплообмена. Вместо ребер канавки также могут увеличить поверхность теплообмена, особенно внутри трубы, где пространство ограничено.\n\nС помощью этого приложения вы можете настроить длинную цилиндрическую трубу с заданными внутренними и внешними ребрами или канавками, чтобы наблюдать и оценивать их охлаждающий эффект. Приложение вычисляет тепловые характеристики трубы, которая заполнена водой, а затем охлаждается или нагревается окружающим воздухом с принудительной конвекцией.\n\nДоступны различные геометрические конфигурации для внешней структуры (лопасти с набором дисков, круглые канавки, винтовые лопасти, винтовые канавки или отсутствие) и для внутренней структуры (прямые канавки или отсутствие).\n\nПриложение вычисляет рассеиваемую мощность и падение давления в зависимости от геометрии и скорости воздуха.
applicationdescr_heat/flash_method = Флэш-метод\n\nФлэш-метод широко используется для измерения теплопроводности тонких образцов материала размером с монету. Материал образца подвергается воздействию лазерного импульса на одну из его сторон. В свою очередь, противоположная грань нагревается примерно на 1 К. Поскольку импульс однородный и четко выраженный, вы можете измерить изменение температуры на другой стороне. Таким образом, вы можете измерить теплопроводность образца с высокой точностью.\n\nПриложение моделирования Flash Method воспроизводит реальный эксперимент и предоставляет возможности для определения параметров эксперимента, которые могут повлиять на точность метода и вашего эксперимента. Это означает, что вы можете указать высоту, радиус и материал образца. Вы также можете установить температуру окружающей среды, включить или отключить эффекты конвекции и излучения, а также настроить значения коэффициента теплопередачи и коэффициента излучения поверхности как образца, так и корпуса.
applicationdescr_heat/forced_air_cooling_with_heat_sink = Принудительное охлаждение воздуха с помощью Heat Sink\n\nЭто приложение демонстрирует следующее:\n\n• Геометрические детали и параметризированные геометрии\n• Отправка электронного письма с отчетом, когда расчёт завершён \n• Пользовательские настройки сервера электронной почты, которые полезны при запуске компилируемых автономных приложений\n• Варианты настройки различных размеров сетки\n• Контроль ошибок входных параметров с помощью методов\n\n Теплоотводы обычно сравниваются с их способностью рассеивать тепло для данной кривой вентилятора. Одним из возможных способов проведения такого эксперимента является размещение теплоотвода в прямоугольном канале с изолированными стенками.\n\n Затем измеряется температура и давление на входе и выходе канала, а также мощность, необходимая для поддержания основания теплоотвода при заданной температуре. В этих условиях можно оценить количество тепла, рассеиваемого теплоотводом, и потери давления по каналу.\n\n Целью приложения является проведение исследований таких бенчмаркинговых экспериментов. Вы можете варьировать тип теплоотвода, а также количество плавников или штифтов и их размеры, чтобы найти оптимальный дизайн для данной потери давления по каналу.\n\n Скорости воздуха и скорости источника тепла могут варьироваться, и приложение решает для неизотермического потока, предполагая турбулентность, как описано в алгебраической модели yPlus.
applicationdescr_heat/inline_induction_heater = Inline Induction Heater\n\nЭто приложение демонстрирует следующее:\n\n• Модель, использующая симметрию, в то время как результаты визуализируются в полном объёме 3D\n• Предоставляет информацию, если результаты выше или ниже определенных критических значений\n• Выбор предварительно определенных или определяемых пользователем материалов\n• Управление ошибками параметров геометрии с использованием методов и отображение возможных ошибок с помощью карточных стеков\n• Слайдеры и кнопки для управления положением среза при визуализации результатов с помощью среза plot\n\n Приложение вычисляет эффективность аппарата магнитной индукции для нагрева жидкой пищи, протекающей в наборе труб из ферритной нержавеющей стали.\n\nFerritic нержавеющие стали все чаще используются в пищевой промышленности из-за их относительно низкой и стабильной цены, а также их магнитные свойства, которые позволяют использовать новые методы нагрева.\n\nA круговая электромагнитная катушка намотана вокруг набора труб, в которых течет жидкость. Переменный ток, проходящий через катушку, генерирует переменное магнитное поле, которое проникает в трубы, генерирует вихревые токи внутри них и нагревает их. Затем тепло передается жидкости по существу по проводимости.\n\n Различные конфигурации доступны для набора труб (число, длина, толщина, материал) и для катушки (число витков, радиус провода, плотность тока и частота возбуждения) для оптимизации теплообмена с жидкостью, обеспечивая однородные температуры внутри нее для заданного расхода.
applicationdescr_heat/parasol_and_solar_irradiation = Parasol and Solar Irradiation\n\n Приложение Parasol and Solar Irradiation иллюстрирует, как моделировать тепловые эффекты солнца в качестве внешнего источника излучения.\n\n Вы можете использовать приложение для исследования солнечного излучения на пляже с двумя кулерами, расположенными в разных положениях под зонтиком. Вы можете варьировать продолжительность дня и установить местоположение пляжа – в любой точке мира.\n\n Типичной модификацией этого приложения будет замена зонтика и кулеров на здание для учета солнечного излучения в модели климат-контроля здания.
applicationdescr_heat/thermoelectric_cooler = Thermoelectric Cooler\n\nЭто приложение демонстрирует следующее:\n\n• Визуализация внешнего вида материала, цвета и текстуры\n• Представление ниже графики о параметрах геометрии, результатах и производительности в зависимости от выбранного графика action\n\nThermoelectric кулеры широко используются для охлаждения электроники в различных областях применения, начиная от потребительских товаров до дизайна космических аппаратов. Термоэлектрический модуль является распространенным типом компонента, используемого в термоэлектрических приложениях. Типичный модуль состоит из нескольких термоэлектрических ножек, зажатых между двумя теплопроводящими пластинами, одной холодной и одной горячей. Устройство, которое необходимо охладить, должно быть прикреплено к холодному лицу.\n\n Из-за разнообразия применений может быть много различных конфигураций термоэлектрического охладителя. Это приложение охватывает базовую конструкцию одноступенчатого термоэлектрического охладителя разных размеров с различными размерами и распределениями термопар. Он также служит отправной точкой для более подробных расчетов с дополнительными вариантами ввода и может быть расширен до многоступенчатых термоэлектрических охладителей.

applicationdescr_heat/crossflow_heat_exchanger = Cross-Flow Heat Exchanger\n\nЭтот пример решает течение жидкости и теплопередачу в микромасштабном теплообменнике из нержавеющей стали. Такие теплообменники находятся в лабораторных устройствах и микрореакторах для топливных элементов. Модель учитывает тепло, передаваемое через конвекцию и проводимость.
applicationdescr_heat/disk_stack_heat_sink = Disk-Stack Heat Sink\n\nЭто приложение предоставляет простой пример, который вычисляет эффекты охлаждения радиатора на дисковом стеке на электронном компоненте. Из свойств теплоотвода и охлаждающего потока он возвращает максимальную температуру, полученную в стационарном режиме.\nВ этом приложении теплоотвод состоит из нескольких тонких алюминиевых дисков, сложенных вокруг центральной полой колонки. Вы предполагаете, что тепло тонет хорошо проветриваемым. Такая конфигурация позволяет однородно охлаждать большие поверхности алюминиевых плавников воздухом при температуре окружающей среды.
applicationdescr_heat/friction_stir_welding = Friction Stir Welding\n\nДве алюминиевые пластины соединяются генерирующим тепло трения вращающимся инструментом. Тепло переносится проводимостью из инструмента в пластины. Движение инструмента учитывается с помощью конвективного термина теплового потока. Поверхности пластин охлаждаются через свободную конвекцию и излучение от поверхности к окружающей среде.
applicationdescr_heat/glass_plate = Стеклянная пластина \n\nA расплав стекла охлаждается радиацией, чтобы сформировать окончательную форму. Моделирование излучения выполняется с использованием трех излучений в участвующих медиа-моделях, представленных в COMSOL Multiphysics, для сравнения точности и вычислительных затрат.
applicationdescr_heat/phase_change = Phase Change\n\nЦель этого приложения - продемонстрировать в простом случае, как свойства изменения фазы влияют на температурное поле.\n Приложение вычисляет изменение фазы в стержне льда, который нагревается и изменяется в воде, и прогнозирует его влияние на анализ теплопередачи. Вы можете сравнить оценку изменения фазы от льда к воде, используя уравнение преходящей проводимости со скрытым теплом синтеза, с другим уравнением, которое пренебрегает скрытым теплом. Кроме того, изучается влияние температурного интервала, через который происходит изменение фазы.
applicationdescr_heat/power_transistor = Power Transistor\n\nЭтот пример имитирует систему, состоящую из небольшой части печатной платы, содержащей силовой транзистор и медные пути, подключенные к транзистору. Целью моделирования является определение рабочей температуры транзистора, которая может быть существенно выше комнатной температуры из-за нежелательного резистивного нагрева.
applicationdescr_heat/tumor_ablation = Абляция опухоли\n\nВ этом примере опухолевая ткань нагревается с помощью электрического зонда. В примере используется уравнение биотепла для описания переходной теплопередачи и интерфейс Electric Currents для моделирования источника тепла.

# Heat Transfer Module models
modeldescr_heat/aluminum_extrusion_fsi = Fluid–Structure Interaction in Aluminum Extrusion\n\nЭтот пример демонстрирует взаимодействие с жидкостью–structure interaction (FSI) в процессе экструзии алюминия, включая термальные–structural и термальные–fluid couplings. Экструдированный материал обрабатывается как очень высокая вязкость жидкости, где тепло генерируется внутренним трением. Гибель подвергается тепловой нагрузке и полному напряжению от жидкости. Вам нужна библиотека материалов для создания модели.
modeldescr_heat/annular_ultraviolet_reactor_optically_transparent_water = Расчет коэффициента плавучести в кольцевом ультрафиолетовом реакторе с оптически прозрачной водой\n\n Этот пример демонстрирует расчет скорости плавучести с интерфейсом излучения от поверхности к поверхности из модуля теплопередачи. Он моделирует ультрафиолетовый очиститель воды, состоящий из цилиндрической лампы, окруженной цилиндрическим реактором. Аннулярная область между ними представляет собой воду, протекающую через очиститель. В этой модели вычисляется только скорость потока без учета потока воды.
modeldescr_heat/anisotropic_hygroscopic_porous_medium = Влажный транспорт в анизотропной гидроскопической пористой среде\n\n Этот пример сравнивает транспорт влаги в двух типах анизотропной пористой среды. Первый компонент определяет слоистую структуру. Структура чередуется между слоями с высокой и низкой диффузивностью влаги. Таким образом, влага легче распространяется по слоям, чем поперечно. Второй компонент имеет единый область с эффективной анизотропной диффузивностью влаги. Затем сравнивается распределение относительной влажности для этих двух случаев.
modeldescr_heat/area_scaling_factor_ht_in_shells = Фактор масштабирования области в передаче тепла в Shells\n\nЭта учебная модель демонстрирует использование фактора масштабирования области (ASF) в интерфейсе теплопередачи в Shells для учета кривизны слоев при применении тепловых потоков и источников тепла. Результаты, полученные с помощью интерфейса теплопередача in Shells, применяемого к границе (с дополнительным измерением), сравниваются с результатами, полученными с интерфейсом теплопередача in Solids на эквивалентной твердой геометрии.
modeldescr_heat/b1_insulated_roof = Тепло-влажный транспорт в полубесконечной стене\n\n Этот учебник показывает, как имитировать сопряженный транспорт тепла и влаги в изолированной конструкции крыши, сделанной из подшипника нагрузки и слоя изоляции. Теплоизоляция обращена внутрь, а снаружи есть влагозащитный барьер. Нагрузочный подшипник является капиллярно активным, в то время как изоляционный слой является капиллярно неактивным, что вызывает высокие относительные уровни влажности на поверхности контакта между двумя материалами, что приводит к внутренней конденсации. 1D-модель является эталонным тестом, определенным в моделировании HAMSTAD-WP2 для проверки численного моделирования для сопряженного переноса тепла и влаги в строительных материалах.
modeldescr_heat/b1_insulated_roof_mold_prediction = Тепло и влажность Транспорт с прогнозом роста плесени\n\nЭто руководство демонстрирует, как использовать температуру и относительную влажность, вычисленные путем моделирования переноса тепла и влаги в изолированной крыше в качестве входных данных для модели прогнозирования плесени. Модель VTT для прогнозирования роста и снижения плесени вычисляет индекс плесени M, решая ODE, в котором темпы роста и снижения зависят от зависящей от времени температуры и относительной влажности в строительном материале.
modeldescr_heat/boiler = Радиационная теплопередача в котле общего назначения\n\nВ этом примере используется метод дискретных ординат (DOM) для анализа радиационной теплопередачи в котле общего назначения с внутренними препятствиями. DOM — одна из наиболее полезных моделей излучения для прогнозирования радиационных тепловых потоков на стенках топочной камеры сгорания. С помощью этого примера при необходимости можно легко получить поведение температуры и теплового потока внутри печи и на нагревательных поверхностях.
modeldescr_heat/brake_disc = Теплогенерация на диске Brake\n\n Этот пример представляет собой временный анализ температурного поля в автомобильном тормозном диске во время и после маневра паники.
modeldescr_heat/brake_disc_moving_mesh = Теплогенерация в дисковом торможении с движущимся Сетка\n\n Этот пример представляет собой модифицированную версию модели "Heat Generation in a Disc Brake". Функция Solid with Translational Motion заменяется вращающимся областьом и тепловым контактом. Поскольку источник тепла трения учитывается только на каждом этапе, этот метод требует гораздо меньших временных шагов для сближения.
modeldescr_heat/bulk_temperature_2d = Оценка температуры в 2D\n\nЭто руководство показывает, как использовать встроенные переменные и операторы в 2D для оценки температуры в неизотермическом потоке в четырех различных геометриях. Температура массы затем используется для расчета коэффициента теплопередачи на нагретой стене.
modeldescr_heat/bulk_temperature_3d = Оценка температуры в 3D\n\nЭто руководство показывает, как использовать встроенные переменные и операторы в 3D для оценки температуры в неизотермическом потоке в трех различных геометриях. Температура массы затем используется для расчета коэффициента теплопередачи на нагретой стене.
modeldescr_heat/buoyancy_air = Поток плавучести Air\n\n Этот пример изучает стационарное состояние свободной конвекции в полости, заполненной воздухом и ограниченной двумя вертикальными пластинами. Чтобы генерировать поток плавучести, пластины нагреваются при разных температурах, устанавливаются в диапазоне, чтобы поддерживать режим ламинарного. Моделирование выполняется в 2D и 3D геометриях.
modeldescr_heat/buoyancy_water = Поток плавучести в воде\n\n Этот пример изучает стационарное состояние свободной конвекции в полости, заполненной водой и ограниченной двумя вертикальными пластинами. Чтобы генерировать поток плавучести, пластины нагреваются при различных температурах, приближая режим к переходу между ламинарным и турбулентным.
modeldescr_heat/buried_cables_heating = Похороненные кабели Heating\n\nЭта модель оценивает распределение температуры в трех закопанных кабелях в ситуации, когда известна температура поверхности почвы. Температурный профиль, полученный с помощью подхода тепловой цепи для кабелей, сравнивают с подходом FEM. Свойства теплового контура устанавливаются с использованием стандартного представления погребенных кабелей под предположением Кеннелли (однородная температура поверхности почвы). Принцип суперпозиции используется для определения взаимного нагрева кабелей с целью повышения эквивалентной точности теплового контура.
modeldescr_heat/carbon_fibers_infinite_elements = Анизотропный теплообмен через волокнистый углерод \n\nCarbon-fiber-reinforced полимеры содержат тканые углеродные волокна, которые имеют теплопроводность вдоль оси волокна намного выше, чем перпендикулярно ей. Это руководство показывает, как использовать интерфейс криволинейных координат для вычисления локальной ориентации волокна и использовать его для определения анизотропной теплопроводности волокон. Поскольку размеры образца полимера, армированного углеродным волокном, довольно малы, используются бесконечные элементы, чтобы избежать установления граничных условий слишком близко к источнику тепла.
modeldescr_heat/cavity_radiation = Излучение в полости\n\nТри поверхности образуют полость. Тепловой поток устанавливается на двух внешних границах, а температура устанавливается на третьей внешней границе. Результаты этого примера можно сравнить с теоретическими результатами.
modeldescr_heat/chicken_patties = Convection Cooking of Chicken Patties\n\nТранзиентный анализ проводящего теплопередачи, связанного с переносом влаги при приготовлении куриной котлеты. 2D аксиальная симметрия.
modeldescr_heat/chip_cooling = Электронный чип Cooling\n\n Эта учебная модель использует геометрию теплоотвода из библиотеки деталей. В руководстве показаны различные подходы к моделированию теплопередачи при изучении охлаждения электронного чипа.\n\nВ первой части моделируются только твердые части, в то время как конвективный воздушный поток моделируется с использованием <em>Convective Heat Flux</em>граничных условий.\n\nВо второй части модель расширяется, чтобы включить жидкостный область для канала потока для вычисления связанной температуры и скорости жидкости, предполагая неизотермическое поведение.\n\n В последней части рассматривается излучение от поверхности к поверхности, чтобы увидеть, насколько оно способствует результатам.
modeldescr_heat/circuit_board_forced_3d = [Конвекционное охлаждение кольцевых плат] Конвекционное охлаждение кольцевых плат —3D Forced Convection\n\n 3D стационарная температура и течение жидкости моделируются с помощью интерфейса Conjugate теплопередача.
modeldescr_heat/circuit_board_nat_2d = [Конвекционное охлаждение кольцевых плат]Конвекционное охлаждение кольцевых плат —2D Natural Convection\n\nA 2D-приближение постоянной температуры и течения жидкости моделируется с помощью интерфейса Conjugate теплопередача.
modeldescr_heat/circuit_board_nat_3d = [Конвекционное охлаждение кольцевых плат] Конвекционное охлаждение кольцевых плат —3D Natural Convection\n\n 3D стационарная температура и течение жидкости моделируется с помощью интерфейса Conjugate теплопередача.
modeldescr_heat/cold_water_glass = Свободная конвекция в стакане с водой\n\nВ этом примере используется интерфейс неизотермическое течение для моделирования свободной конвекции и теплопередачи стакана холодной воды, нагретой до комнатной температуры. Первоначально стакан и вода имеют температуру 5°C, а затем ставятся на стол в комнате при 25°C.
modeldescr_heat/composite_thermal_barrier = Композитный тепловой барьер\n\n Этот пример показывает, как настроить несколько тонких слоев с различными теплопроводностями двумя различными способами.\n Сначала композит моделируется как 3D-объект. \n Во втором подходе используется граничное условие тонкого слоя, чтобы избежать разрешения тонких доменов.
modeldescr_heat/condensation_electronic_device = Обнаружение конденсата в электронном устройстве\n\n Этот пример имитирует термодинамическую эволюцию влажного воздуха в электронной коробке с целью определения того, происходит ли конденсация при изменении свойств внешней среды. Модель импорта измеряла данные по температуре воздуха, давлению и концентрации водяного пара. Концентрация водяного пара считается однородной внутри коробки и равной внешней концентрации.
modeldescr_heat/condensation_electronic_device_transport_diffusion = Обнаружение конденсата в электронном устройстве с транспортом и диффузией\n\n Этот пример имитирует термодинамическую эволюцию влажного воздуха в электронной коробке с целью определения того, происходит ли конденсация при изменении свойств внешней среды. Модель импорта измеряла данные по температуре воздуха, давлению и концентрации водяного пара. Концентрация водяного пара считается неоднородной внутри коробки. Учитываются транспортировка и диффузия водяного пара.
modeldescr_heat/lumped_composite_thermal_barrier = Сосредоточенный композитный тепловой барьер\n\nЭтот пример представляет собой вариант учебного пособия по композитному тепловому барьеру и показывает, как создать несколько сэндвич-тонких слоев с различной теплопроводностью двумя разными способами.\nСначала композит моделируется как 3D объект. \nВо втором подходе физический интерфейс сосредоточенной тепловой системы используется, чтобы избежать разрешения тонких областей с помощью моделирования тепловой схемы. \nНаконец, эквивалентная система с сосредоточенными параметрами моделируется с помощью одного резистора, несущего эквивалентное тепловое сопротивление тонких слоев, с использованием только функции термического соединения.
modeldescr_heat/lumped_composite_thermal_barrier_shells = Сосредоточенный композитный термобарьер с оболочками\n\nЭтот пример представляет собой вариант учебного пособия по композитному термобарьеру и показывает, как создать несколько сэндвич-тонких слоев с различной теплопроводностью двумя разными способами. \nСначала композит моделируется как 3D-объект. \nВо втором подходе физический интерфейс сосредоточенной тепловой системы используется, чтобы избежать разрешения тонких областей с помощью моделирования тепловой схемы. Кроме того, верхняя и нижняя части стальной колонны представлены двумя обечайками.
modeldescr_heat/wood_frame_wall = Риск конденсации в стене с деревянным каркасом\n\nВ этом руководстве показано, как смоделировать совместный перенос тепла и влаги в 2D стене с деревянным каркасом, чтобы оценить риск образования конденсата внутри стены. Сравниваются различные подходы к проектированию и моделированию в стационарных условиях на открытом воздухе. Кроме того, вычисляется влияние суточного изменения влажности наружного воздуха на распределение влажности в стене.
modeldescr_heat/circular_tube_nitf_laminar = Неизотермическое ламинарное течение в круглой трубе\n\nЭто эталонная задача для моделирования неизотермического ламинарного течения. Коэффициент теплопередачи, полученный в результате моделирования, сравнивается с корреляционной функцией, основанной на числе Нуссельта.
modeldescr_heat/conical_dielectric_probe = Моделирование конического диэлектрического зонда для диагностики рака кожи\n\nВ этом примере используется маломощная миллиметровая волна Ka-диапазона 35 ГГц и ее отражательная способность к влаге для неинвазивной диагностики рака. Поскольку опухоли кожи содержат больше влаги, чем здоровая кожа, это приводит к более сильным отражениям в этом диапазоне частот. Таким образом, зонд обнаруживает отклонения в S-параметрах в местах расположения опухолей. Также проводятся температурные изменения кожи и анализ фракции некротических тканей.
modeldescr_heat/contact_switch = Contact Switch\n\nЭтот пример иллюстрирует, как реализовать мультифизический контакт. Он моделирует тепловое и электрическое поведение двух контактирующих частей переключателя. Электрический ток и тепло передаются от одной части к другой только через контактную поверхность. Контактное переключающее устройство имеет цилиндрический корпус и пластинчатый крючок в зоне контакта. Здесь тепловое и электрическое кажущееся сопротивление связано с механическим контактным давлением на границе раздела, которое определяется моделью.
modeldescr_heat/continuous_casting_apparent_heat_capacity = Непрерывное литье — Метод кажущейся теплоёмкости\n\nВ этом примере описываются охлаждение и затвердевание от расплава до твердого металла в процессе непрерывного литья. Модель включает в себя неизотермические свойства, распределение температуры, поле течения и фазовый переход. В этом примере используется метод кажущейся теплоёмкости для моделирования фазового перехода.
modeldescr_heat/continuous_casting_ale = Непрерывное литье — Произвольный лагранжиан–Эйлеровский метод\n\nВ этом примере описываются охлаждение и затвердевание от расплава до твердого металла в процессе непрерывного литья. Модель включает в себя неизотермические свойства, распределение температуры, поле течения и фазовый переход. В этом примере используется произвольный метод Lagrangian–Eulerian для моделирования фазового изменения.
modeldescr_heat/cooling_flange = Температурное поле в охлаждающем фланце\n\nВ этом примере охлаждающего фланца используются коэффициенты теплопередачи для принудительной конвекции в канале и для свободной конвекции на внешних поверхностях. В модели также используются функции интерполяции и сопоставленной сетки, а также параметрическая развертка по радиусу канала.
modeldescr_heat/cooling_nickel_cylindrical_rod_nucleate_boiling_water = Охлаждение никелевого цилиндрического стержня с помощью пузырькового кипения воды\n\nВ этой учебной модели показано использование характеристик теплового потока пузырькового кипения для расчета переходного охлаждения цилиндрического стержня, покрытого никелем и погруженного в бассейн с кипящей водой. Представлены результаты измерения температуры и теплового потока, полученные с помощью трехмерного нестационарного расчета с тепловым потоком, приложенным к боковой поверхности стержня. Корреляция Розенова используется для оценки потока вследствие пузырькового кипения.
modeldescr_heat/copper_layer = Блок кварцевого стекла, покрытый слоем меди \n\nЭто переходный термический анализ с использованием функции тонкого слоя. В этом примере описан тонкий слой меди на блоке кварцевого стекла с плохой теплопроводностью.
modeldescr_heat/copper_layer_meshed = Блок кварцевого стекла, покрытый слоем меди \n\nЭтот пример идентичен модели слоя меди, за исключением того, что тонкий слой меди состоит из сетки. Результаты идентичны, но этот пример менее эффективен, поскольку для тонкого слоя требуется мелкая сетка.
modeldescr_heat/cooling_solidification_metal = Охлаждение и затвердевание металла\n\nЭто модель процесса непрерывного литья, при котором жидкий металл затвердевает при прохождении через охлаждаемую форму. Фазовый переход моделируется с помощью формулировки кажущейся теплоёмкости с использованием адаптации сетки и метода продолжения для облегчения решения сильно нелинейной стационарной задачи. Цель состоит в том, чтобы найти форму фронта затвердевания.
modeldescr_heat/crossflow_heat_exchanger = Cross-Flow Heat Exchanger\n\nЭтот пример решает течение жидкости и теплопередачу в микромасштабном теплообменнике из нержавеющей стали. Такие теплообменники находятся в лабораторных устройствах и микрореакторах для топливных элементов. Модель учитывает тепло, передаваемое через конвекцию и проводимость.
modeldescr_heat/cylinder_conduction = Стационарная двумерная осесимметричная теплопередача с проводимостью \n\nЭто эталонная задача для двумерного осесимметричного стационарного термического анализа с тепловым потоком, температурой и граничными условиями изоляции. Температурное поле анализа сравнивается с эталонным решением NAFEMS.
modeldescr_heat/cylinder_participating_media = Радиационная теплопередача в конечных цилиндрических средах\n\nВ этом примере используется метод дискретных ординат (DOM) для решения трехмерной задачи переноса излучения в излучающей, поглощающей и линейно-анизотропно рассеивающей конечной цилиндрической среде. Использование квадратуры S6 РОВ приводит к более быстрым и точным результатам, которые необходимы в комбинированных режимах теплопередачи. Рассчитанные падающее излучение и тепловые потоки хорошо согласуются с литературными результатами, полученными методами преобразованного интеграла. Формулировка DOM в COMSOL Multiphysics также легко справляется с эффектами граничного излучения и отражения.
modeldescr_heat/cylinder_participating_media_p1 = Радиационная теплопередача в конечных цилиндрических средах — P1 Method\n\nВ этом примере используется метод P1 для решения трехмерной задачи переноса излучения в излучающей, поглощающей и линейно-анизотропной цилиндрической среде с конечным рассеянием. Рассчитанные падающее излучение и тепловые потоки сравниваются с результатами, полученными с помощью высокоточного метода дискретных ординат S6, используемого в соответствующей модели. Они показывают хорошее согласие при большой оптической толщине при гораздо меньших вычислительных затратах.
modeldescr_heat/disk_stack_heat_sink = Радиатор дискового стека\n\nВ этом примере изучается охлаждающее воздействие радиатора дискового стека на электронный компонент. Радиатор состоит из нескольких тонких алюминиевых дисков, расположенных вокруг центральной полой колонны. Такая конфигурация позволяет охлаждать большие поверхности алюминиевых ребер воздухом при температуре окружающей среды.
modeldescr_heat/domestic_oven = Нагрев пирога в домашней духовке\n\nВ этом примере моделируется нагрев внутри духовки с помощью интерфейсов «Однофазное течение», «Теплопередача» и «Излучение от поверхности к поверхности». Он учитывает кондуктивную, конвективную и радиационную теплопередачу. Установлены два подхода к вычислениям: \n- Подход с односторонним неизотермическим потоком (односторонний NITF), который сначала решает стационарный течение жидкости, а затем теплопередачу\n- Подход с неизотермическим потоком (NITF), который решает все физические задачи одновременно
modeldescr_heat/double_pipe_heat_exchanger = Двухтрубный теплообменник\n\nДвухтрубные теплообменники с типичной U-образной формой являются одним из самых простых и дешевых типов теплообменников, используемых в химической промышленности. В этом примере изучается охлаждение моторного масла, поступающего при 130°C, холодным трансформаторным маслом, поступающим при 60°C в противотоке. Представленная здесь сетчатая часть решает возможные трудности из-за высокого соотношения сторон устройства. При постобработке различные величины описывают производительность и эффективность этого двухтрубного теплообменника.
modeldescr_heat/double_pipe_heat_exchanger_preset = [Двухтрубный теплообменник]Параметрированный двухтрубный теплообменник, предустановленная модель\n\nЭто шаблон MPH-файла, содержащий физические интерфейсы и параметризованную геометрию для модели двухтрубного теплообменника.
modeldescr_heat/droplet_evaporation = Испарение капель на твердой подложке\n\nИспарение капель широко распространено в повседневной жизни и имеет важное значение во многих промышленных процессах, таких как струйная печать, очистка или нанесение покрытий на поверхности, а также нагрев с фазовым переходом. Transfer.\n\nВ этой модели капля воды, помещенная на твердую подложку, испаряется в воздухе. Решаем уравнения двухфазного течения, сопряженного с теплообменом и переносом водяного пара. Модель сначала проверяется на основе изотермического аналитического решения, а затем расширяется для включения неизотермических эффектов.
modeldescr_heat/dynamic_wall_heat_exchanger = Теплообменник с динамическими стенками\n\nЭтот теплообменник содержит динамическую стенку с колеблющейся формой волны. Эта деформация вызывает перемешивание жидкости и уменьшает образование тепловых граничных слоев. Следовательно, это увеличивает теплообмен между стенками и жидкостью. Кроме того, волнообразная деформация вызывает эффект накачки, аналогичный перистальтической накачке, которая компенсирует потери давления. \n Эта модель сочетает в себе мультифизическую связь сопряженной теплопередачи для теплопередачи в твердом теле и жидкости с интерфейсом Moving Сетка для обработки деформации стенок и каналов. Первое стационарное исследование моделирует статическую конфигурацию, а второе исследование, зависящее от времени, вычисляет динамическое поведение.
modeldescr_heat/effective_thermal_conductivity_porous_media = Модели усреднения для эффективной теплопроводности в пористых средах\n\nВ этом руководстве представлены модели усреднения, доступные в интерфейсе «Теплопередача в пористых средах», используемые для расчета эффективной теплопроводности, когда делается предположение о локальном тепловом равновесии. Модели сравниваются при значениях пористости от 0 до 1 и коэффициенте теплопроводности жидкой и твердой фаз, равном 50.
modeldescr_heat/electronic_enclosure_cooling = Принудительное конвекционное охлаждение корпуса с вентилятором и решеткой \n\nВ этом исследовании моделируется тепловое поведение компьютерного блока питания (БП). Такие электронные корпуса обычно включают охлаждающие устройства, чтобы избежать повреждения электронных компонентов из-за чрезмерно высоких температур. В этом примере вытяжной вентилятор и перфорированная решётка создают поток воздуха в корпусе для охлаждения внутреннего нагрева.
modeldescr_heat/electronic_enclosure_cooling_geom = [Принудительное конвекционное охлаждение корпуса с вентилятором и решеткой]Параметризованная геометрия электронного корпуса\n\nЭто шаблон MPH-файла, содержащий физические интерфейсы и параметризованную геометрию для модели принудительного конвекционного охлаждения корпуса с вентилятором и решеткой.
modeldescr_heat/evaporation_porous_media_small_rate = Испарение в пористых средах с малой скоростью испарения\n\nВ этом учебном пособии описывается ламинарный поток воздуха через влажную пористую среду. Воздух на входе сухой, и его влажность увеличивается по мере прохождения воздуха через пористую среду. Предполагается, что начальное количество жидкой воды в пористой среде достаточно велико, а скорость испарения настолько мала, что жидкая вода никогда не испаряется полностью. Кроме того, скорость испарения достаточно мала, чтобы можно было пренебречь вызванными изменениями свойств пористой среды.
modeldescr_heat/evaporation_porous_media_large_rate = Испарение в пористых средах с большой скоростью испарения\n\nВ этом учебном пособии описывается случай сушки с ламинарным потоком воздуха через ненасыщенную пористую среду. Воздух на входе сухой, и его влажность увеличивается по мере прохождения воздуха через пористую среду. Водонасыщенность пористой среды вычисляется во времени. Предполагается, что вода покидает пористую среду только в виде пара.
modeldescr_heat/evaporative_cooling = Испарительное охлаждение воды\n\nВ этом учебном примере показано, как соединить три физических интерфейса для моделирования испарительного охлаждения. Эффекты, которые необходимо учитывать, — это теплообмен, перенос водяного пара и течение жидкости. Функция «Влажная поверхность» используется для реализации источника для водяного пара и расчета источника испарительного тепла, доступного с помощью функции «Граничный источник тепла». Функция «Влажный воздух» используется для точного определения термодинамических свойств, зависящих от влажности.
modeldescr_heat/fire_effects_beam = Воздействие на конструкции, подвергающиеся воздействию огня — Тепловое напряжение в балке\n\nЭтот проверочный пример из DIN EN 1991-1-2 моделирует термическое напряжение в балке, подвергающейся воздействию температурного градиента с сильно нелинейными свойствами материала. Результаты сравниваются с эталонными значениями европейского стандарта.
modeldescr_heat/fire_effects_cooling = Воздействие на конструкции, подвергающиеся воздействию огня — Процесс охлаждения\n\nЭтот проверочный пример из DIN EN 1991-1-2 описывает процесс охлаждения за счет конвекции. Результаты сравниваются с эталонными значениями европейского стандарта.
modeldescr_heat/fire_effects_heating = Воздействие на конструкции, подвергающиеся воздействию огня — Процесс нагрева\n\nЭтот проверочный пример из DIN EN 1991-1-2 моделирует процесс нагрева за счет конвекции и излучения с использованием зависящей от температуры теплопроводности. Результаты сравниваются с эталонными значениями европейского стандарта.
modeldescr_heat/fire_effects_multiple_layers = Воздействие на конструкции, подвергающиеся воздействию огня — Теплопередача в нескольких слоях\n\nЭтот проверочный пример из DIN EN 1991-1-2 моделирует теплопередачу через слои с различными тепловыми свойствами, вдохновленную передачей тепла через полую стальную секцию с заполнением. Результаты сравниваются с эталонными значениями европейского стандарта.
modeldescr_heat/fire_effects_thermal_elongation = Воздействие на конструкции, подвергающиеся воздействию огня — Термическое удлинение\n\nЭтот проверочный пример из DIN EN 1991-1-2 моделирует тепловое расширение с использованием заданной функции термической деформации. Результаты сравниваются с эталонными значениями европейского стандарта, которые, как ожидается, будут точно такими же.
modeldescr_heat/flat_plate_nitf_turbulent = Неизотермическое турбулентное течение над плоской пластиной\n\nЭта тестовая модель моделирует полностью развитое неизотермическое турбулентное течение над плоской пластиной. Он сравнивает коэффициент теплопередачи, полученный в результате моделирования, с корреляционной функцией, основанной на числе Нуссельта.
modeldescr_heat/forced_turbulent_convection = Принудительное турбулентное конвекционное охлаждение горячей плиты\n\nВ этом примере объединяются двумерные поля установившейся температуры и течения жидкости с использованием предопределенной мультифизики для Turbulent Fluid–Thermal Interaction.
modeldescr_heat/forced_turbulent_convection_hcoeff = Упрощенное турбулентное конвекционное охлаждение горячей пластины \n\nУстановившееся температурное поле нагретой пластины моделируется с помощью интерфейса General теплопередача с использованием библиотечной функции для коэффициента теплопередачи.
modeldescr_heat/freeze_drying = Сублимационная сушка\n\nВ этом примере моделируется процесс сублимации льда во флаконе в условиях вакуумной камеры, что является тестовым примером для многих установок сублимационной сушки. В примере используется интерфейс «Деформированная геометрия» для расчета связанных балансов тепла и массы для обработки продвигающейся границы раздела пар-лед через пористую среду.
modeldescr_heat/friction_stir_welding = Сварка алюминиевой пластины трением с перемешиванием\n\nДве алюминиевые пластины соединяются путем генерации тепла трением с помощью вращающегося инструмента. Тепло передается путем проводимости от инструмента к пластинам. Движение инструмента учитывается с помощью конвективного теплового потока. Поверхности пластин охлаждаются за счет свободной конвекции и излучения от поверхности к окружающей среде.
modeldescr_heat/glass_fiber_drawing_process = Процесс волочения стекловолокна\n\nЭтот пример посвящен моделированию процесса волочения волокна. Термическое волочение волокна — это процесс, при котором сравнительно более толстая структура нагревается и вытягивается в удлиненные отрезки микроструктурированного волокна. Этот процесс выполняется путем пропускания их через печь и вытягивания их с другого конца. \n\nЭта задача была создана с использованием интерфейсов ламинарного потока, теплопередачи, излучения от поверхности к поверхности и подвижной сетки.
modeldescr_heat/glass_plate = Радиационное охлаждение стеклянной пластины\n\nРасплав стекла охлаждается радиацией для формирования окончательной формы. Моделирование излучения выполняется с использованием трех излучений в участвующих моделях сред, предоставленных в COMSOL Multiphysics, для сравнения точности и вычислительных затрат.
modeldescr_heat/green_house_effect = Парниковый эффект \n\nЭта модель иллюстрирует парниковый эффект в коробке, покрытой пластиной и подвергающейся воздействию солнечного излучения в течение дня. Изменение температуры контролируется в двух случаях: \n- с помощью пластины из стекла, прозрачного в солнечном спектральном диапазоне и непрозрачного для окружающего солнечного диапазона. \n- с помощью полностью прозрачной пластины.
modeldescr_heat/gray_body = Серое тело\n\nСерое тело со сферической полостью с различными площадями отверстий моделируется с использованием интерфейса Теплопередача, Излучение от поверхности к поверхности. Коэффициент излучения для каждого случая вычисляется и сравнивается с классической теорией серого тела в различных приближениях. Результаты COMSOL очень хорошо согласуются с самой точной теорией.
modeldescr_heat/hairpin_heat_exchanger = Шпильчатый теплообменник\n\nВ этом примере рассматривается неизотермический ламинарный поток в шпильчатом теплообменнике. Этот теплообменник состоит из двух концентрических U-образных трубок с двумя встречными потоками масла. U-образные трубы обычно укладываются последовательно для достижения желаемой температуры на выходе.
modeldescr_heat/hamstad_benchmark_2 = Перенос влаги в однородной стене\n\nВ этом примере показано, как моделировать перенос влаги в однородной стене в изотермических условиях. При таком предположении можно рассчитать аналитическое решение. Однородный слой инициализируется по балансу влаги. В начале моделирования относительная влажность снаружи и внутри помещения смещается в сторону более низких значений. 1D-модель — это второй эталонный тест, определенный в HAMSTAD-WP2 «Моделирование» для проверки численного моделирования совместного переноса тепла и влаги в строительных материалах.
modeldescr_heat/heat_and_moisture_flow_past_cylinder = Поток тепла и влаги мимо цилиндра\n\nВ этом учебном пособии демонстрируется использование предопределенного интерфейса «Поток тепла и влаги» для моделирования теплопередачи и переноса влаги в турбулентном воздушном потоке с количественной оценкой испарения и конденсации на поверхностях и автоматической обработкой соответствующего скрытого источника тепла.
modeldescr_heat/heat_conduction_in_slab = Теплопроводность в конечной плите\n\nВ этом примере вычисляется распределение температуры вдоль плиты после внезапного снижения температуры на границах плиты.
modeldescr_heat/heated_plate = Нагреваемая вертикальная пластина\n\nСвободная конвекция от вертикальной пластины с заданной температурой. Слабо сжимаемый Navier–Stokes в сочетании с конвективным и кондуктивным теплообменом.
modeldescr_heat/heating_circuit = Heating Circuit\n\nСтационарная модель нагревательного контура, включая джоулевый нагрев постоянным током, теплопередачу и анализ механики конструкций тонкого проводящего слоя на твердой стеклянной пластине.
modeldescr_heat/heat_exchanger_iso = Изотермический теплообменник MEMS \n\nЭтот пример иллюстрирует моделирование конвективной и кондуктивной теплопередачи в элементарной ячейке теплообменника MEMS, обычно встречающегося в лабораторных устройствах на кристалле. В примере используется интерфейс теплопередача, применяющий аналитический профиль скорости для описания ламинарного потока воды через трубы.
modeldescr_heat/heat_exchanger_ni = Неизотермический теплообменник MEMS \n\nВ этом примере рассматривается та же геометрия элементарной ячейки теплообменника, что и в сопутствующей модели изотермического теплообменника MEMS. Однако, в отличие от последнего, в этом примере используется интерфейс «Неизотермический поток» для связи конвективной и кондуктивной теплопередачи со слабо сжимаемыми уравнениями Навье–Стокса в трубках.
modeldescr_heat/heat_sink = Радиатор\n\nВ этом примере моделируются характеристики охлаждения алюминиевого радиатора n19 от Alpha Company Ltd в Японии. Модель изучает распределение температуры в стоке и в потоке.
modeldescr_heat/heat_sink_mb_eb = Теплоотвод\n\nЭта модель демонстрирует, как рассчитать баланс массы и энергии. Он сопровождает статью в блоге https://www.comsol.com/blogs/how-to-calculate-mass-conservation-and-energy-balance/.
modeldescr_heat/heat_sink_surface_radiation = Радиатор с излучением от поверхности к поверхности\n\nЭтот пример аналогичен модели радиатора, за исключением того, что рассматривается излучение от поверхности к поверхности. Из-за высокой излучательной способности поверхности радиатора не следует пренебрегать контактом между поверхностями. Этот анализ показывает, что максимальная температура системы значительно снижается за счет лучистой теплопередачи, когда коэффициент излучения поверхностей близок к 1.
modeldescr_heat/heat_transfer_in_curved_layered_shells = Теплопередача в изогнутых слоистых оболочках\n\nЭта учебная модель демонстрирует использование особенностей теплопередачи в слоистых материалах для учета кривизны слоев при приложении тепловых потоков и источников тепла. Результаты, полученные с помощью интерфейса «Теплопередача в твёрдых телах», примененного к границе (с дополнительным измерением), сравниваются с результатами, полученными с помощью интерфейса «Теплопередача в твёрдых телах» с эквивалентной твердотельной геометрией, а также с результатами, полученными с помощью промежуточного подхода с использованием интерфейса «Теплопередача в твёрдых телах» с функцией «Тонкий слой» для одного из слоев.\nВыделены некоторые расширенные настройки и инструменты постобработки, предназначенные для свойств слоистых материалов.
modeldescr_heat/isothermal_box = Isothermal Box\n\nВ этом примере рассматривается теплообмен в изотермическом боксе, предназначенном для транспортировки охлажденных предметов, таких как медицинские материалы, в течение 24 часов. В этом случае коробка должна не только сохранять содержимое холодным в течение длительного периода времени, но также должна соблюдаться ограничение по температуре хранения. В этой модели интервал ограничения находится между 2°C и 8°C.
modeldescr_heat/isothermal_spherical_droplet_evaporation = Изотермическое сферическое испарение капель \n\nИспарение капель широко распространено в повседневной жизни и имеет важное значение во многих промышленных процессах, таких как струйная печать, очистка/нанесение покрытий на поверхности и теплопередача с фазовым переходом. \n\nЭта модель демонстрирует, как моделировать фазовый переход с помощью движущегося внешнего граничного условия с использованием произвольного лагранжиана–Эйлерова метода. Задача двумерная осесимметричная, но для демонстрационных целей решена в трех измерениях.
modeldescr_heat/laser_beam_absorption_in_silica_glass = Моделирование поглощения лазерного луча в кварцевом стекле с помощью Beer–Lambert Law\n\nВ этом руководстве показано, как использовать интерфейс «Радиационный луч в поглощающей среде» (модуль теплопередачи) для моделирования затухания лазерного света, проходящего через образец кварцевого стекла, и источника тепла, генерируемого в результате поглощения.
modeldescr_heat/laser_heating_wafer_deposited_beam_power = Лазерный нагрев кремниевой пластины\n\nКремниевая пластина нагревается лазером, который перемещается радиально внутрь и наружу с течением времени, в то время как сама пластина вращается на своей платформе. Моделируя падающий тепловой поток от лазера как пространственно распределенного источника тепла на поверхности с использованием функции «Deposited Beam Power», можно получить переходный тепловой отклик пластины. Рассчитываются пиковая, средняя и минимальная температуры в процессе нагрева, а также изменения температуры по пластине.
modeldescr_heat/laser_irradiation = Лазерное облучение опухоли\n\nУчебная модель для интерфейса Bioheat Equation. Опухолевая ткань нагревается с помощью лазерного излучения.
modeldescr_heat/light_bulb = Свободная конвекция в лампочке\n\nВ этом примере моделируется неизотермический поток аргона внутри лампочки. Цель модели - показать связь между переносом энергии — посредством проводимости, излучения и конвекции — и переносом импульса, вызванным изменениями плотности в аргоне. gas.\n\nдля построения модели вам понадобится библиотека материалов.
modeldescr_heat/led_bulb = Охлаждение светодиодной лампы\n\nЭта модель описывает три режима теплопередачи: проводимость, конвекцию и излучение в сочетании с неизотермическим потоком в реалистичной геометрии, представляющей лампочку и окружающий воздух.\nСветодиодные чипы рассеивают тепло. Модель вычисляет равновесную температуру, вызванную этими источниками тепла, проводимость в твердых частях, конвективное охлаждение за счет естественной конвекции и радиационное охлаждение окружающей среды.
modeldescr_heat/living_room_with_stove = Теплообмен в помещении с печкой\n\nЭто модель гостиной с температурой окружающей среды, обогреваемой печкой. Исследование радиации выполняется с помощью интерфейса физики радиации от поверхности к поверхности.
modeldescr_heat/localized_heat_source = Теплопроводность с локализованным источником тепла на диске\n\nВ этом примере кондуктивной теплопередачи показано, как определить источник тепла, локализованный в небольшой области, с помощью интерфейса Теплопередача. Сравниваются точность и численная стоимость различных функций моделирования источника тепла. Результаты дают рекомендации по выбору подходящего варианта в зависимости от соотношения типичных размеров исходной и окружающей геометрии.
modeldescr_heat/lumped_system_connector_solid_layered_shell = Соединение модели конечных элементов для теплопередачи в твёрдых телах и оболочках с моделью сосредоточенной тепловой системы \n\nЭто учебная модель для функций соединителя сосредоточенной системы, интерфейса и соединителя сосредоточенной системы в интерфейсах Теплопередача в твёрдых телах и Теплопередача в оболочках. Сравниваются температурные решения, полученные с помощью интерфейсов «Теплоперенос в твёрдых телах» и «Теплоперенос в оболочках», когда эти интерфейсы подключены к сосредоточенным тепловым системам.
modeldescr_heat/lumped_thermoelectric_cooler = Термоэлектрический охладитель с сосредоточенной моделью\n\nТермоэлектрические охладители широко используются для охлаждения электроники в различных областях применения, от потребительских товаров до проектирования космических кораблей. Термоэлектрические модули являются распространенным применением термоэлектричества в технике охлаждения. Они состоят из нескольких термоэлектрических ветвей, зажатых между двумя теплопроводящими пластинами: холодной и горячей. Устройство, которое необходимо охладить, должно быть прикреплено к холодной поверхности. \n\nЭта модель охватывает базовую конструкцию одноступенчатого термоэлектрического охладителя, смоделированную с помощью трехмерного компонента конечных элементов и нульмерной сосредоточенной тепловой системы. Трехмерная модель служит эталоном, и результаты, полученные с помощью обеих моделей, сравниваются для проверки сосредоточенного подхода.
modeldescr_heat/lumped_thermoelectric_module_pid_control_stationary = Сосредоточенный термоэлектрический модуль\n\nТермоэлектрические элементы часто используются для охлаждения или нагрева электронных компонентов до желаемой температуры. При таком моделировании вас, как правило, не интересует поведение самого термоэлектрического элемента, а вы хотите использовать его рабочие характеристики для моделирования общей реакции системы. Эта модель иллюстрирует, как создать сосредоточенную тепловую систему, содержащую термоэлектрический элемент, и вычисляет неизотермический поток вокруг ее радиатора.
modeldescr_heat/lumped_thermoelectric_module_pid_control_transient = Сосредоточенный термоэлектрический модуль с ПИД-регулированием\n\nТермоэлектрические элементы часто используются для охлаждения или нагрева электронных компонентов до желаемой температуры. При таком моделировании вас, как правило, не интересует поведение самого термоэлектрического элемента, а вы хотите использовать его рабочие характеристики для моделирования общей реакции системы. Эта модель иллюстрирует, как создать сосредоточенную тепловую систему, содержащую термоэлектрический элемент, и вычисляет неизотермический поток вокруг ее радиатора. Ток в термоэлектрическом элементе контролируется с помощью надстройки ПИД-регулятора для стабилизации температуры до определенного значения.
modeldescr_heat/marangoni_effect = Эффект Марангони\n\nМодель конвекции Марангони в полости, заполненной силиконовым маслом. Жидкость ускоряется при высоком температурном градиенте. Теплопроводность мала по сравнению с конвекцией.
modeldescr_heat/memory_array_segr = Конвекционное охлаждение модулей массива памяти\n\nМоделируется трехмерная теплопередача модулей массива памяти, охлаждаемых принудительной конвекцией. Стационарное решение достигается за счет использования схемы раздельного решения, основанной на методе коррекции давления.
modeldescr_heat/microchannel_heat_sink = Тепловое моделирование микроканального радиатора \n\nВ этом примере изучается воздушный поток и его охлаждающий эффект в микроканальном радиаторе с перпендикулярными коллекторами. Эта конкретная конфигурация, действующая как делитель потока перед тем, как воздух попадает в радиатор, повышает эффективность охлаждения электронного компонента.
modeldescr_heat/microchannel_heatsink = Тепловое моделирование микроканального радиатора\n\nАлюминиевый радиатор монтируется на процессор с заданной мощностью. Чтобы предотвратить перегрев, через микроканалы радиатора прокачивается холодный воздух.
modeldescr_heat/microchannel_heatsink_res = Тепловое моделирование микроканального радиатора с тепловым контактным сопротивлением\n\nЭто расширенная версия модели микроканального радиатора, в которой также учитывается тепловое контактное сопротивление между источником тепла и радиатором.
modeldescr_heat/microwave_cancer_therapy = Микроволновое нагрев раковой опухоли\n\nВ опухоль вводится тонкая микроволновая антенна. Микроволны нагревают опухоль, образуя коагулированную область, в которой раковые клетки погибают.
modeldescr_heat/orbit_calculation = Orbit Calculation\n\nЭта модель представляет собой введение в определение и проверку орбиты спутника, а также расчет солнечных, альбедо и радиационных тепловых нагрузок Земли. CubeSat высотой 1U находится на круговой орбите на высоте 400 км, наклонении 50° и долготе восходящего узла 0°. Спутник медленно вращается вокруг своей оси, указывающей надир. Анализируется один орбитальный период, во время зимнего солнцестояния. Рассчитывается общее облучение и радиационная нагрузка от всех источников окружающей среды. Этот тип анализа обычно выполняется до расчета изменения температуры внутри конструкции спутника.
modeldescr_heat/orbit_thermal_loads = Орбитальные тепловые нагрузки\n\nСпутник на орбите испытывает солнечные, альбедо и плоскоститарные радиационные нагрузки, при этом альбедо и плоскоститарное ИК-излучение могут меняться в зависимости от широты, а также от долготы. Эта модель демонстрирует, как определить свойства Земли, которые изменяются в пространстве. Он показывает, как читать данные электронных таблиц и изображений, а также как определять и использовать различные функции. Полное облучение и поток на спутник оцениваются по нескольким орбитам, а поток Альбедо строится над поверхностью Земли.
modeldescr_heat/spacecraft_thermal_analysis = Тепловой анализ космического корабля\n\nЭта модель показывает рабочий процесс расчета температуры спутника на нескольких периодах орбиты. Прямые солнечные, альбедо и радиационные тепловые нагрузки Земли предварительно вычисляются в исследовании орбитальных тепловых нагрузок и повторно используются на нескольких периодах орбиты в исследовании орбитальной температуры.
modeldescr_heat/packed_bed_thermal_energy_storage_system = Система хранения тепловой энергии с насадочным слоем\n\n1D-модель системы хранения тепловой энергии (ТЭС), состоящая из насадочного слоя окатышей. Сравниваются три подхода к теплопередаче в пористых средах: \n- Модель локального теплового равновесия (LTE) с одним уравнением \n- Модель локальной тепловой неравновесности (LTNE) с двумя уравнениями \n- Многомасштабная гибридная модель LTNE с двумя уравнениями
modeldescr_heat/parallel_plates_diffuse_specular = Тест смешанного диффузно-зеркального излучения \n\nВ этом примере показано, как использовать интерфейс Mathematical Particle Tracing для моделирования радиационной теплопередачи с диффузным и зеркальным отражением между поверхностями в корпусе. Этот пример разделен на две части. В первой части сравнивается тепловой поток, вычисленный с помощью интерфейса Mathematical Particle Tracing, с точным аналитическим решением для двух одинаковых бесконечно длинных параллельных серых пластин при смешанном диффузно-зеркальном отражении при постоянной температуре. Вторая часть объединяет интерфейс «Математическое трассирование частиц» с интерфейсом «Теплопередача в твёрдых телах» для геометрии параллельных пластин, но с другими характеристиками и пространственно изменяющимися температурами.
modeldescr_heat/parallel_plates_diffuse_specular_ray_shooting = Излучение от поверхности к поверхности с диффузным и зеркальным отражением\n\nВ этом руководстве показано, как использовать интерфейс «Излучение от поверхности к поверхности» для моделирования радиационного теплопереноса с излучением между диффузными излучателями и диффузно-зеркальными отражателями. Эта модель разделена на две части. Первая часть посвящена проверочному тесту радиационного теплового потока, вычисленному с помощью алгоритма лучевой съёмки, в ходе которого результаты сравниваются с аналитическим решением для двух параллельных пластин при постоянной температуре. Во второй части рассматривается связь с теплообменом в твёрдых телах.
modeldescr_heat/parasol = Влияние солнечного излучения на два охладителя, расположенные под зонтиком \n\nЭта модель иллюстрирует, как моделировать тепловые эффекты солнца как внешнего источника излучения, и учитывает коэффициенты излучения поверхности, зависящие от длины волны. Два холодильника из пенополистирола подвергаются воздействию условий окружающей среды. Зонтик обеспечивает тень для одного из кулеров большую часть дня. Температура банок с напитками в холодильниках вычисляется с течением времени.
modeldescr_heat/performance_view_factor_computation_radiation_groups = Как повысить производительность расчета коэффициента обзора для моделирования излучения от поверхности к поверхности\n\nЭта модель показывает, как использовать функции модуля теплопередачи для сокращения времени расчётов и использования памяти при расчете коэффициента обзора. Наглядные результаты ускорения и снижения использования памяти приведены на бенчмарк-модели. Решение не вычисляется, выполняется только расчёт коэффициента обзора с использованием узла решателя Сборка.
modeldescr_heat/performance_view_factor_computation_case1_full_model = Как повысить производительность расчета коэффициента обзора для моделирования излучения от поверхности к поверхности\n\nЭта модель показывает, как использовать функции модуля теплопередачи для сокращения времени расчётов и использования памяти при расчете коэффициента обзора. Наглядные результаты ускорения и снижения использования памяти приведены на бенчмарк-модели. Решение не вычисляется, выполняется только расчёт коэффициента обзора с использованием узла решателя Сборка.
modeldescr_heat/performance_view_factor_computation_case1_radiation_groups = Как повысить производительность расчета коэффициента обзора для моделирования излучения от поверхности к поверхности\n\nЭта модель показывает, как использовать функции модуля теплопередачи для сокращения времени расчётов и использования памяти при расчете коэффициента обзора. Наглядные результаты ускорения и снижения использования памяти приведены на бенчмарк-модели. Решение не вычисляется, выполняется только расчёт коэффициента обзора с использованием узла решателя Сборка.
modeldescr_heat/performance_view_factor_computation_case1_symmetry = Как повысить производительность расчета коэффициента обзора для моделирования излучения от поверхности к поверхности\n\nЭта модель показывает, как использовать функции модуля теплопередачи для сокращения времени расчётов и использования памяти при расчете коэффициента обзора. Наглядные результаты ускорения и снижения использования памяти приведены на бенчмарк-модели. Решение не вычисляется, выполняется только расчёт коэффициента обзора с использованием узла решателя Сборка.
modeldescr_heat/performance_view_factor_computation_case2_full_model = Как повысить производительность расчета коэффициента обзора для моделирования излучения от поверхности к поверхности\n\nЭта модель показывает, как использовать функции модуля теплопередачи для сокращения времени расчётов и использования памяти при расчете коэффициента обзора. Наглядные результаты ускорения и снижения использования памяти приведены на бенчмарк-модели. Решение не вычисляется, выполняется только расчёт коэффициента обзора с использованием узла решателя Сборка.
modeldescr_heat/performance_view_factor_computation_case2_symmetry = Как повысить производительность расчета коэффициента обзора для моделирования излучения от поверхности к поверхности\n\nЭта модель показывает, как использовать функции модуля теплопередачи для сокращения времени расчётов и использования памяти при расчете коэффициента обзора. Наглядные результаты ускорения и снижения использования памяти приведены на бенчмарк-модели. Решение не вычисляется, выполняется только расчёт коэффициента обзора с использованием узла решателя Сборка.
modeldescr_heat/phase_change = Фазовый переход\n\nЭтот одномерный пример демонстрирует, как смоделировать фазовый переход и спрогнозировать влияние скрытого тепла на перенос энергии. Модель описывает скрытое тепло, используя физический интерфейс для зависящей от времени теплопередачи за счет проводимости.
modeldescr_heat/plate_heat_exchanger = Пластинчатый теплообменник\n\nОдним из наиболее распространенных устройств в агрегатных операциях является теплообменник, который может как охлаждать, так и нагревать жидкости и твердые материалы. Охлаждение необходимо по нескольким причинам: материалы чувствительны к высоким температурам; условия эксплуатации могут быть неоптимальными при высоких температурах; или могут быть практические или экологические причины для поддержания низкой температуры. Теплообменники чаще всего используются в процессах отвода тепла, когда конвективное охлаждение от вентиляторов и ребер недостаточно. Нагрев также используется во многих процессах для поддержания заданной повышенной температуры жидкости.
modeldescr_heat/plate_fin_heat_exchanger = Пластинчато-ребристый теплообменник\n\nВ этой учебной модели показано, как пластинчато-ребристый теплообменник из алюминия используется для охлаждения горячего масла более холодным воздухом.\n\nЧтобы максимизировать теплообмен, теплообменник изготовлен из пористой алюминиевой матрицы, по которой течет горячее масло. Тепло передается через алюминиевые ребра, контактирующие с пористой матрицей. Эти ребра моделируются как тонкие слои, то есть их толщина не рисуется, а учитывается в уравнении теплопередачи.
modeldescr_heat/potato_drying = Сушка образца картофеля\n\nВ этом руководстве описан случай сушки с ламинарным потоком воздуха через ненасыщенную пористую среду. Воздух на входе сухой, и его влажность увеличивается по мере прохождения воздуха через пористую среду. Водонасыщенность пористой среды вычисляется во времени. Предполагается, что вода покидает образец картофеля только в виде пара.
modeldescr_heat/potcore_inductor = Конвективное охлаждение индуктора Potcore\n\nИндуктор является распространенным компонентом различных электрических устройств. Его приложения включают преобразование мощности и измерения, а также его можно использовать вместе с конденсаторами для создания генераторов. В небольших устройствах со множеством компонентов, например в ноутбуках, выделение тепла может стать проблемой и должно быть учтено при проектировании. Эта осесимметричная 2D-модель изучает теплообмен в индукторе с сердечником. Он учитывает теплообмен внутри индуктора и в окружающем воздухе, а также поток воздуха вокруг индуктора.
modeldescr_heat/power_transformer = Тепловое моделирование силового трансформатора\n\nМодель описывает температурное поле и течение жидкости в цилиндрическом силовом трансформаторе, включая изменения свойств жидкости в зависимости от температуры.
modeldescr_heat/power_transistor = Power Transistor\n\nЭтот пример имитирует систему, состоящую из небольшой части печатной платы, содержащей силовой транзистор и медные пути, подключенные к транзистору. Целью моделирования является определение рабочей температуры транзистора, которая может быть существенно выше комнатной температуры из-за нежелательного резистивного нагрева.
modeldescr_heat/radiant_floor_heating_design = Проект лучистого отопления пола \n\n Модель проекта лучистого отопления пола.
modeldescr_heat/roller_shutter_thermal_performances_preset = [Тепловые характеристики роллетных ставней]Параметризованные роллетные ставни, предустановленная модель\n\nЭто шаблон MPH-файла, содержащий физические интерфейсы и параметризованную геометрию для модели тепловых характеристик роллетных ставней.
modeldescr_heat/roller_shutter_thermal_performances = Тепловые характеристики роллет \n\nЭтот тест воспроизводит два тестовых примера из стандарта ISO 10077-2:2012, касающихся роллет. Тепловые характеристики каждой жалюзи вычисляются на основе ее теплопроводности и коэффициента теплопередачи. Наконец, результаты сравниваются с заданными данными для проверки.
modeldescr_heat/semi_infinite_wall = Перенос тепла и влаги в полубесконечной стене\n\nВ этом учебном пособии показано, как смоделировать совместный перенос тепла и влаги в компоненте здания. 1D-модель представляет собой эталонный тест, определенный в стандарте EN 15026 для проверки программного обеспечения для оценки переноса влаги путем численного моделирования. Вы можете убедиться, что числовые результаты, полученные с помощью COMSOL Multiphysics, находятся в пределах допустимых диапазонов, указанных в норме.
modeldescr_heat/shell_and_tube_heat_exchanger = Кожухотрубный теплообменник\n\nКожухотрубные теплообменники обычно используются на нефтеперерабатывающих заводах и в других крупных химических процессах. В этом примере через теплообменник протекают две разделенные жидкости с разными температурами: одна через трубки (сторона трубок), а другая через оболочку вокруг трубок (сторона кожуха). На оптимальную производительность кожухотрубного теплообменника влияют несколько конструктивных параметров и условий эксплуатации. В этом примере показаны основные принципы настройки модели теплообменника. Он может служить отправной точкой для более сложных моделей, включающих изучение параметров или дополнительных эффектов, таких как коррозия, термическое напряжение и вибрация.
modeldescr_heat/shell_and_tube_heat_exchanger_geom = [Кожухотрубный теплообменник]Параметризованная геометрия кожухотрубного теплообменника\n\nЭто шаблон MPH-файла, содержащий физические интерфейсы и параметризованную геометрию для модели кожухотрубного теплообменника.
modeldescr_heat/shell_conduction = Shell Conduction\n\nСтатический анализ теплопроводности в тонкой проводящей оболочке. Эталонная задача, в которой результат сравнивается с эталонным решением NAFEMS.
modeldescr_heat/simple_layered_shell = Простая многослойная оболочка\n\nВ этом примере показано, как настроить простую модель теплопередачи, включающую многослойную оболочку. В дополнение к определению многоуровневой оболочки в этом примере показано, как отобразить результаты, вычисленные в многоуровневой оболочке.
modeldescr_heat/simplified_circuit_board_1d = Охлаждение печатной платы посредством принудительной конвекции\n\nУстановившаяся средняя температура жидкости моделируется как одномерное поршневое течение с использованием интерфейса общей теплопередачи.
modeldescr_heat/simplified_circuit_board_3d_hcoeff = Охлаждение печатной платы посредством принудительной конвекции\n\nТемпература схемы и платы от запуска до установившегося состояния моделируется с использованием известных значений сопротивления теплопередаче. Использует интерфейс общей теплопередачи.
modeldescr_heat/spiral_heat_exchanger = Спиральный теплообменник\n\nСпиральный теплообменник часто используется в химической и пищевой промышленности. Его конструкция предотвращает образование застойных зон. В этом примере изучаются свойства потока и теплопередачи в спиральных каналах потока с противотоком. Оцениваются типичные значения, характеризующие характеристики теплообменника.
modeldescr_heat/stefan_flow_evaporation_water_surface = Моделирование потока Стефана вследствие испарения с поверхности воды \n\nВ этой учебной модели показано использование узла связи «Поток влаги» для учета потока Стефана во влажном воздухе над поверхностью испарения. Влияние на поле скорости и концентрацию пара представлено при различных температурных условиях окружающей среды.
modeldescr_heat/surface_mount_package = Теплопередача в корпусе для поверхностного монтажа кремниевого чипа\n\nВ этом примере исследуется стационарное распределение температуры в интегральной схеме, установленной рядом с горячим компонентом. В примере используется интерфейс «Теплопередача» и его функция «Тонкий слой».
modeldescr_heat/surface_to_surface_radiation_with_specular_reflection = Излучение от поверхности к поверхности с зеркальным отражением\n\nЦель этой модели — представить зеркальное отражение в излучении от поверхности к поверхности с использованием алгоритма Ray Shooting. Пользователю доступны различные параметры для повышения точности результатов при использовании алгоритма Ray Shooting. Модель представляет собой стандартный эталонный тест концентрических сфер, которые являются диффузными излучателями и зеркальными отражателями.
modeldescr_heat/thermal_annealing = Быстрый термический отжиг\n\nВ этом примере вычисляется радиационная теплопередача от нагревательной лампы к кремниевой пластине и датчику температуры. Модель анализирует реакцию датчика с точки зрения температуры и интенсивности облучения.
modeldescr_heat/thermal_bridge_2d_composite_structure = Тепловые мосты в строительстве зданий — 2D композитная структура\n\nВ этом примере изучается теплообмен в композитной двумерной конструкции, состоящей из четырех материалов с различной теплопроводностью. Распределение температуры и тепловой поток через конструкцию сравниваются с литературными данными. Этот пример соответствует случаю 2 европейского стандарта EN ISO 10211:2017 для тепловых мостов в строительных конструкциях.
modeldescr_heat/thermal_bridge_2d_square_column = Тепловые мосты в строительстве зданий — 2D Square Column\n\nВ этом примере изучается теплообмен в квадратной колонне. К границам прикладывают холодный и горячий температурный режим. Из-за симметрии задачи геометрия упрощается до половины квадрата. Распределение температуры сравнивается с литературными данными. Этот пример соответствует случаю 1 европейского стандарта EN ISO 10211:2017 для тепловых мостов в строительных конструкциях.
modeldescr_heat/thermal_bridge_3d_iron_bar = Тепловые мосты в строительстве зданий — 3D железный стержень через изоляционный слой\n\nВ этом примере изучается теплопроводность в тепловом мосту, состоящем из железного стержня и изоляционного слоя, который отделяет горячую внутреннюю сторону от холодной внешней стороны. Этот пример соответствует случаю 4 европейского стандарта EN ISO 10211:2017 для тепловых мостов в строительных конструкциях.
modeldescr_heat/thermal_bridge_3d_two_floors = Тепловые мосты в строительстве зданий — 3D-структура между двумя этажами\n\nВ этом примере изучается теплопроводность в конструкции здания, отделяющей два этажа от внешней среды. Конструкция изготовлена ​​из четырех материалов с разной теплопроводностью. Распределение температуры и тепловой поток через конструкцию сравниваются с литературными данными. Этот пример соответствует случаю 3 европейского стандарта EN ISO 10211:2017 для тепловых мостов в строительных конструкциях.
modeldescr_heat/thermal_contact_electronic_package_heat_sink = Сопротивление теплового контакта между электронным корпусом и радиатором\n\nВ этом примере воспроизводятся части сравнительного исследования сопротивления теплового контакта на границе раздела между радиатором и электронным корпусом. Эффективность устройства зависит от охлаждения ребер и теплопередачи от корпуса к радиатору. В этом примере основное внимание уделяется передаче тепла через контактный интерфейс, где на проводимость соединения влияют четыре параметра: контактное давление, микротвердость более мягкого материала, шероховатость поверхности и наклон шероховатости поверхности.
modeldescr_heat/thermal_connection_edges = Тепловое соединение, края\n\nВ этой учебной модели демонстрируется использование функции мультифизического соединения Тепловое соединение, многослойная оболочка, края. В этой модели три слоистые оболочки соединены с тепловыми областями краями в разностных местах, связанных с тепловыми областями. Результаты, полученные с использованием интерфейса «Теплопередача в оболочках», сравниваются с результатами, полученными с использованием интерфейса «Теплопередача в твёрдых телах» с эквивалентной твердотельной геометрией.
modeldescr_heat/thermal_connection_facing_boundary = Тепловое соединение, обращено к границе\n\nВ этой учебной модели демонстрируется использование функции мультифизической связи «Тепловое соединение», «Многослойная оболочка», «Поверхности». В этой модели одна слоистая оболочка соединена с тепловыми областями обращенной границей. Результаты, полученные с использованием интерфейса «Теплопередача в оболочках», сравниваются с результатами, полученными с использованием интерфейса «Теплопередача в твёрдых телах» с эквивалентной твердотельной геометрией.
modeldescr_heat/thermal_connection_shared_boundaries = Тепловое соединение, общие границы\n\nВ этой учебной модели демонстрируется использование функции мультифизического взаимодействия «Тепловое соединение», «Многослойная оболочка», «Поверхности». В этой модели три слоистые оболочки соединены с тепловыми областями внутренними и внешними границами. Результаты, полученные с использованием интерфейса «Теплопередача в оболочках», сравниваются с результатами, полученными с использованием интерфейса «Теплопередача в твёрдых телах» с эквивалентной твердотельной геометрией.
modeldescr_heat/thermal_curing_simulation = Thermal Curing Simulation\n\nВ этом примере показано, как моделировать термическое отверждение с использованием базового пакета COMSOL Multiphysics.
modeldescr_heat/thermal_curing_simulation_irreversible_transformation = Моделирование термического отверждения\n\nВ этом примере показано, как смоделировать термическое отверждение с использованием функции необратимого преобразования модуля Теплопередача.
modeldescr_heat/thermoelectric_generator_reset = Термоэлектрическая нога\n\nВ этом примере решается теплообмен и электрическое поле в термоэлектрической ноге. В этом устройстве для охлаждения используется эффект Пельтье.
modeldescr_heat/thermoelectric_leg = Термоэлектрическая нога\n\nВ этом примере решается теплообмен и электрическое поле в термоэлектрической ноге. В этом устройстве для охлаждения используется эффект Пельтье.
modeldescr_heat/thin_gap_with_radiation = Тонкая щель с излучением\n\nКогда излучение возникает в очень узком зазоре, это часто хорошо аппроксимируется как излучение между бесконечными параллельными пластинами.\n\nЭта модель учитывает три алюминиевые пластины, разделенные узкими воздушными промежутками. В модели сравнивается классический подход, основанный на интерфейсе «Излучение от поверхности к поверхности», с двумя приближенными подходами, использующими функцию «Термальный контакт» и интерфейс «Сосредоточенная тепловая система». \n\nПервый подход требует оценки коэффициента обзора, расчёт которого довольно затратно, в то время как другие подходы предполагают коэффициент обзора, равный единице, между поверхностями стенок зазора.
modeldescr_heat/thin_plate = Внеплоскостная теплопередача для тонкой пластины\n\nМоделируя теплообмен в тонкой прямоугольной металлической пластине, этот пример демонстрирует, как использовать функцию внеплоскостной теплопередачи. Теплопередача моделируется с использованием двумерного приближения, в котором температура предполагается постоянной по толщине. Окружающая жидкость охлаждает пластину за счет конвекции. Кроме того, модель учитывает излучение от поверхности к окружающей среде. Чтобы проверить достоверность 2D-аппроксимации, также решается эквивалентная 3D-модель.
modeldescr_heat/three_omega_method_with_frequency_domain_heat_transfer = Метод трех омега с теплообменом в частотной области\n\nЭта модель показывает, как определить анализ теплопередачи в частотной области. Метод 3-омега использует уравнение Кэхилла для аппроксимации теплопроводности образца на основе измеренной температуры металлической полосы, помещенной поверх него и подвергнутой колебательному нагреву. 2D-модель вычисляет колебания температуры металлической полосы и сравнивает приблизительную теплопроводность со значением, использованным для моделирования.
modeldescr_heat/tin_melting_front = Tin Melting Front\n\nЭтот пример демонстрирует, как смоделировать фазовый переход с помощью движущейся границы раздела в соответствии с задачей Стефана. Он адаптирован на основе сравнительного исследования. Квадратная полость, содержащая как твердое, так и жидкое олово, подвергается воздействию разницы температур между левой и правой границами. Жидкие и твердые части растворяются в отдельных областях, имеющих движущийся фронт плавления. Положение этой границы во времени вычисляется по условию энергетического баланса Стефана. В расплаве ожидается движение, создаваемое естественной конвекцией из-за градиента температуры. Это движение, в свою очередь, влияет на смещение фронта.
modeldescr_heat/tin_melting_front_comparison = Сравнение фронта плавления олова\n\nВ этом примере показано, как смоделировать фазовый переход путем применения штрафных санкций при температуре плавления к скорости, то есть скорость проверяется там, где температура превышает температуру плавления, и наоборот. Квадратная полость, содержащая олово из материала с фазовым переходом, инициализирована как полурасплавленная и подвергается воздействию разницы температур между левой и правой границами. Твердая часть превращается в жидкость, поскольку температура продолжает распространяться через жидкую часть. В расплаве ожидается движение, создаваемое естественной конвекцией из-за градиента температуры. Это движение, в свою очередь, влияет на смещение фронта. Затем в примере сравниваются результаты с существующим примером, в котором использовался интерфейс движущейся границы согласно задаче Стефана.
modeldescr_heat/topology_verification_back_side = Проверка топологии излучения от поверхности к поверхности, границы видны на их обратной стороне\n\nВ этой учебной модели показано, как использовать инструменты для определения моделей излучения от поверхности к поверхности. Проверка топологии, выполняемая вместе с оценкой коэффициента обзора, помогает выявить недостающую границу при выборе физики.
modeldescr_heat/topology_verification_nonradiating = Проверка топологии излучения «поверхность-поверхность», неизлучающие границы\n\nВ этой учебной модели показано, как использовать инструменты для определения моделей излучения «поверхность-поверхность». Символы направления излучения используются для обнаружения непредвиденной конфигурации, в которой непрозрачность определена неправильно.
modeldescr_heat/tpv_cell = Термофотоэлектрический элемент\n\nНагретый излучатель используется с зеркалами для облучения гальванических элементов для производства электричества. Модель исследует связь между потоком излучения и температурой ячеек с помощью параметрического решателя.
modeldescr_heat/transient_conduction_in_a_wall = Переходная проводимость в стене, сосредоточенная тепловая система\n\nЭта модель выполняет анализ переходных процессов температуры через стену дома. Стена состоит из разных слоев, соответствующих конструкции, утеплителя и штукатурки. Снаружи и внутри стена подвергается тепловому излучению и конвективному охлаждению. Результаты, полученные с использованием интерфейса Lumped Thermal System, сравниваются с результатами, полученными с помощью метода FEM.
modeldescr_heat/tumor_ablation = Абляция опухоли печени\n\nВ этом примере опухолевая ткань нагревается с помощью электрического зонда. В примере используется уравнение биотепла для описания переходной теплопередачи и интерфейс Electric Currents для моделирования источника тепла.
modeldescr_heat/turbulent_heat_exchanger = Турбулентный поток через поперечное сечение кожухотрубного теплообменника \n\nВ этом примере вы изучаете часть кожухотрубного теплообменника, используя модель турбулентности k-ε для моделирования полностью развитого турбулентного потока.
modeldescr_heat/vacuum_flask = Охлаждение вакуумной колбы с помощью естественной конвекции\n\nВ этом примере вычисляется, сколько тепла вакуумная колба, содержащая горячую жидкость, рассеивает в единицу времени. В этом примере охлаждение естественной конвекцией рассматривается с использованием двух подходов. Первый подход заключается в использовании коэффициентов теплопередачи для описания тепловыделения. Второй подход заключается в моделировании конвективного потока воздуха за пределами колбы.
modeldescr_heat/view_factor = View Factor Computation\n\nЭтот тест демонстрирует, как вычислить геометрические коэффициенты обзора для двух концентрических сфер, которые облучают друг друга. Он сравнивает результаты моделирования с точными аналитическими значениями.
modeldescr_heat/window_and_glazing_thermal_performances_preset = [Влияние остекления на тепловые характеристики окна]Параметризованное окно и остекление, предустановленная модель\n\nЭто шаблон MPH-файла, содержащий физические интерфейсы и параметризованную геометрию для модели «Влияние остекления на тепловые характеристики окна».
modeldescr_heat/window_and_glazing_thermal_performances = Влияние остекления на тепловые характеристики окна\n\nЭтот тест воспроизводит два тестовых случая из стандарта ISO 10077-2:2012, относящихся к окнам с двойным остеклением. Тепловые характеристики каждого окна вычисляются на основе его теплопроводности и коэффициента теплопередачи. Наконец, результаты сравниваются с заданными данными для проверки.
modeldescr_heat/windows_thermal_performances_preset = [Тепловые характеристики Windows]Параметризованное окно, предустановленная модель\n\nЭто шаблон MPH-файла, содержащий физические интерфейсы и параметризованную геометрию для модели тепловых характеристик Windows.
modeldescr_heat/windows_thermal_performances = Тепловые характеристики Windows\n\nЭтот тест воспроизводит шесть тестовых случаев из стандарта ISO 10077-2:2012, относящихся к окнам. Тепловые характеристики каждого окна оцениваются по его теплопроводности и коэффициенту теплопередачи. Наконец, результаты сравниваются с заданными данными для проверки.
modeldescr_heat/zero_pressure_gradient_2d_flat_plate = Двухмерная плоская пластина с нулевым градиентом давления \n\nЭта модель представляет собой проверочный пример, предложенный Ресурсом моделирования турбулентности Исследовательского центра НАСА в Лэнгли для подтверждения поведения моделей турбулентности и пристеночных функций в пограничном слое турбулентного потока. Скорость и температура сравниваются с теоретическими кривыми в подходах, разрешенных стенками, и подходах, моделируемых стенками, с использованием алгебраической модели турбулентности y+. Наконец, выполнение функций тепловой стенки устанавливается при преобладании проводимости, а затем при преобладании вязкой диссипации.

# Liquid & Gas Properties Module models
modeldescr_lgp/phase_envelope = Создание фазовых огибающих с помощью расчётов равновесия\n\nВ этом примере фазовая огибающая строится для неидеальной смеси хлороформа и метанола. Сначала строят температурную диаграмму –состава, выделяя азеотропную смесь. Кроме того, создается диаграмма энтальпии –состава и строятся изотермы. Подобные диаграммы имеют основополагающее значение для понимания, например, процессов дистилляции или мгновенного испарения. Эта модель показывает, как узел Термодинамика можно использовать для создания знакомых типов диаграмм.
modeldescr_lgp/heat_pipe = Тепловая труба с точными свойствами жидкости и газа\n\nТепловые трубы эффективно передают тепло посредством испарения, массопереноса и конденсации рабочей жидкости. Они встречаются в самых разных приложениях, где важен термоконтроль, ярким примером которого является охлаждение электроники. \n\nЭта модель демонстрирует, как ламинарный поток в паровой камере может быть связан с течением жидкости в пористом фитиле и как термодинамические свойства воды могут быть получены с помощью узла Термодинамика. Разница температур между горячей и холодной стороной вместе с температурной зависимостью давления пара вызывает разницу давления в паровой камере. Испарение действует как сток тепла на границе пара/фитиль на горячей стороне и, наоборот, конденсация выступает как источник тепла на холодной стороне. \n\nВажность переноса пара сравнивается с кондуктивной теплопередачей в стенке трубы. Первое превосходит второе на несколько порядков.

# MEMS Module models
applicationdescr_mems/microresistor_beam = Микрорезисторный луч\n\nЭто приложение демонстрирует следующее:\n\n• Отображение уравнения\n• Несколько решений в одной графике\n• Визуализация внешнего вида, цвета и текстуры материала\n\nМикрорезисторы обеспечивают быстрое и точное срабатывание или перемещение конструкции, напрямую связанное с подаваемым на них электричеством. Их можно использовать во многих приложениях, где требуется почти мгновенное воздействие на устройства небольших возмущений или отклонений.\n\nПриложение иллюстрирует важность полностью связанного мультифизического моделирования. Электрический потенциал прикладывается к небольшому резистору и вычисляются деформация, температура и электрический потенциал внутри балки.\n\nПриложение позволяет варьировать геометрические размеры, а также свойства материала, электропроводность и приложенное напряжение. На основе результатов вы сможете спроектировать подходящий микрорезистор для вашего устройства.

modeldescr_mems/aln_lamb_wave_resonator_3d = Резонатор волны Лэмба из нитрида алюминия — 3D\n\nРезонаторы волны Лэмба являются полезными компонентами для многих радиочастотных применений. В этом руководстве показано, как смоделировать резонатор волны Лэмба из нитрида алюминия и выполнить анализ собственной частоты и частотной характеристики для определения характеристик устройства.
modeldescr_mems/ac_electrokinetic_2d = Электрокинетически усиленные поверхностные реакции переменного тока \n\nВ этом примере представлен пример электрокинетически регулируемого переменного тока течения жидкости в микроканале с поверхностной реакцией на стенке канала. В примере используются две геометрии для канала и поверхности и пять физических интерфейсов, которые описывают электростатику, теплопередачу, течение жидкости, а также конвекцию и диффузию в канале, а также диффузию на реакционной поверхности.
modeldescr_mems/ale_cantilever_beam_2d = Консольная балка\n\nУпругая консольная балка является одной из элементарных конструкций, используемых в конструкции МЭМС.\n\nВ этом примере показан изгиб балки под действием электростатических сил. силы. Уравнение электростатики решается в воздушной области, окружающей балку, с использованием произвольного метода Лагранжа-Эйлера (ALE) для учета изменений геометрии.
modeldescr_mems/ale_cantilever_beam_3d = Консольная балка в 3D\n\nУпругая консольная балка является одной из элементарных структур, используемых при проектировании MEMS. В этом примере показан изгиб балки под действием электростатических сил. Уравнение электростатики решается в воздушной области, окружающей балку, с использованием подвижной сетки для учета изменений геометрии.
modeldescr_mems/biased_resonator_2d_basic = [Двумерный смещенный резонатор: стационарный анализ, анализ собственной частоты, частотной области и анализ втягивания] Стационарный анализ смещенного резонатора — 2D\n\nСмоделирован электростатически управляемый МЭМС-резонатор. Устройство приводится в действие напряжением смещения переменного и постоянного тока, приложенным к конденсатору с параллельными пластинами. В этом примере деформация резонатора вычисляется с применением смещения постоянного тока.
modeldescr_mems/biased_resonator_2d_freq = [Двумерный смещенный резонатор: анализ стационарной, собственной частоты, частотной области и втягивающего анализа]Частотная характеристика смещенного резонатора — 2D\n\nМЭМС с электростатическим управлением резонатор смоделирован. Устройство приводится в действие напряжением смещения переменного и постоянного тока, приложенным к конденсатору с параллельными пластинами. В этом примере вычисляется частотная характеристика смещенного резонатора.
modeldescr_mems/biased_resonator_2d_modes = [Двумерный смещенный резонатор: стационарный анализ, анализ собственной частоты, частотной области и втягивающий анализ]Нормальные режимы смещенного резонатора — 2D\n—2МЭМС с электростатическим управлением резонатор смоделирован. Устройство приводится в действие напряжением смещения переменного и постоянного тока, приложенным к конденсатору с параллельными пластинами. В этом примере вычисляются формы и частоты нормальных мод в зависимости от приложенного смещения.
modeldescr_mems/biased_resonator_2d_pull_in = [Двумерный смещенный резонатор: стационарный анализ, анализ собственной частоты, частотной области и анализ втягивающего напряжения]Втягивающее напряжение для смещенного резонатора — 2D\n\nМЭМС с электростатическим управлением резонатор смоделирован. Устройство приводится в действие напряжением смещения переменного и постоянного тока, приложенным к конденсатору с параллельными пластинами. В этом примере вычисляется напряжение включения резонатора.
modeldescr_mems/biased_resonator_2d_pull_in_pull_out = Анализ втягивания и вытягивания смещенного резонатора — 2D\n\nМоделируется МЭМС-резонатор с электростатическим управлением. Устройство приводится в действие напряжением смещения переменного и постоянного тока, приложенным к конденсатору с параллельными пластинами. В этом примере вычисляются напряжения включения и выключения резонатора. Это делается посредством квазистатического анализа траектории смещения-напряжения во всем диапазоне движения, от начального расслабленного состояния до втянутого уплощенного состояния.
modeldescr_mems/biased_resonator_3d_basic = [Трехмерный смещенный резонатор: стационарный анализ, анализ собственной частоты, частотной области и анализ втягивания] Стационарный анализ смещенного резонатора — 3D\n\nСмоделирован электростатически управляемый МЭМС-резонатор. Устройство приводится в действие напряжением смещения переменного и постоянного тока, приложенным к конденсатору с параллельными пластинами. В этом примере деформация резонатора вычисляется с применением смещения постоянного тока.
modeldescr_mems/biased_resonator_3d_freq = [Трехмерный смещенный резонатор: анализ стационарной, собственной частоты, частотной области и втягивающего анализа]Частотная характеристика смещенного резонатора — 3D\n\nМЭМС с электростатическим управлением резонатор смоделирован. Устройство приводится в действие напряжением смещения переменного и постоянного тока, приложенным к конденсатору с параллельными пластинами. В этом примере вычисляется частотная характеристика смещенного резонатора.
modeldescr_mems/biased_resonator_3d_modes = [Трехмерный смещенный резонатор: стационарный анализ, анализ собственной частоты, частотной области и анализ втягивания]Нормальные режимы смещенного резонатора — 3D\n—2МЭМС с электростатическим управлением резонатор смоделирован. Устройство приводится в действие напряжением смещения переменного и постоянного тока, приложенным к конденсатору с параллельными пластинами. В этом примере вычисляются формы и частоты нормальных мод в зависимости от приложенного смещения.
modeldescr_mems/biased_resonator_3d_pull_in = [Трехмерный смещенный резонатор: стационарный анализ, анализ собственных частот, частотной области и анализ втягивающего напряжения]Втягивающее напряжение для смещенного резонатора — 3D\n\nМЭМС с электростатическим управлением резонатор смоделирован. Устройство приводится в действие напряжением смещения переменного и постоянного тока, приложенным к конденсатору с параллельными пластинами. В этом примере вычисляется напряжение включения резонатора.
modeldescr_mems/biased_resonator_3d_ecad_design = Нормальные режимы смещенного резонатора — 3D-геометрия из GDS-файла\n\nВ этом учебном пособии показано, как построить геометрию для 3D-смещенного резонатора из файла GDS с помощью модуля импорта ECAD и модуля проектирования. Процедура имитирует процессы изготовления полупроводников и МЭМС для более эффективного построения трехмерной геометрии и более интуитивно понятна для тех, кто знаком с изготовлением полупроводников и МЭМС.
modeldescr_mems/biased_resonator_3d_transient = Переходный отклик смещенного резонатора — 3D\n\nМоделируется МЭМС-резонатор с электростатическим управлением. Устройство приводится в действие напряжением смещения переменного и постоянного тока, приложенным к конденсатору с параллельными пластинами. В этом примере переходная характеристика системы вычисляется при приложении напряжения ступенчатой ​​функции.
modeldescr_mems/capacitive_pressure_sensor = Ёмкостный датчик давления\n\nМоделируется ёмкостный датчик давления. В этом примере показано, как смоделировать реакцию датчика давления на приложенное давление, а также как проанализировать влияние напряжений, вызванных уплотнением, на производительность датчика.
modeldescr_mems/comb_drive_2d = Гребенчатый привод\n\nПрямоугольные гребенчатые приводы используются в различных приложениях в системах MEMS. Это модель гребенчатого привода с электростатическим приводом, используемого для открытия и закрытия микропинцета. Поскольку электростатические силы притягивают соты друг к другу, электрическое поле между ними меняется из-за геометрического изменения. Чтобы учесть этот эффект, в примере используется произвольный метод Lagrangian–Eulerian (ALE).
modeldescr_mems/comb_drive_3d = Ёмкостный гребенчатый привод\n\nЁмкостный гребенчатый привод обычно используется как в качестве приводов, так и в качестве датчиков положения. В этом примере быстрый трехмерный анализ электростатического поля используется для расчета значения базовой ёмкости, которое может предоставить значительную информацию о проектировании.
modeldescr_mems/comb_drive_tuning_fork_gyroscope = Микромашинный гироскоп скорости камертона с гребенчатым приводом \n\nЭтот учебный пример гироскопа с гребенчатым приводом любезно предоставлен доктором Джеймсом Рэнсли из Veryst Engineering, LLC. Модель демонстрирует полностью параметризованную геометрию, широкое использование функций выбора, реализацию аналитических формул для оценки электромеханических сил и реакции, а также сравнение численных результатов с аналитическими оценками. В частности, операторы экструзии используются для расчета расстояний между электродами для расчета силы.
modeldescr_mems/comb_drive_tuning_fork_gyroscope_manufacturing_variation = Эффекты производственных вариаций в гироскопе скорости камертона с гребенчатым приводом, изготовленном с помощью микромеханической обработки.\n\nЭтот учебный пример любезно предоставлен доктором Джеймсом Рэнсли из компании Veryst Engineering, LLC. Эта модель является продолжением базовой модели “A Микромашинный гребенчатый камертон, гироскоп скорости”, которую также предоставил доктор Рэнсли. Модель демонстрирует, как точно рассчитать влияние производственных изменений устройств MEMS без необходимости использования очень мелкой сетки. Этот высокоэффективный подход к моделированию основан на уникальной функции деформированной геометрии COMSOL Multiphysics, которая реализует изменение формы устройства из-за дефектов изготовления с использованием одной и той же сетки, тем самым устраняя ошибку, возникающую в случае использования разных сеток для разных геометрических форм.
modeldescr_mems/composite_transducer = Композитный пьезоэлектрический преобразователь\n\nПроанализирован составной пьезоэлектрический ультразвуковой преобразователь. За анализом собственных частот следует анализ частотной характеристики для расчета входной проводимости как функции частоты возбуждения.
modeldescr_mems/disc_resonator_anchor_losses = Потери на якоре дискового резонатора\n\nВ этом примере показано, как вычислить добротность резонатора с алмазным диском, ограниченную потерями на якоре. Резонатор прикреплен к подложке с помощью поликремниевого штифта, и мощность передается на подложку через штырь. Идеально подобранный слой используется для представления практически бесконечной подложки. Модель основана на документе, представленном на конференции COMSOL 2007 года в Гренобле (P. Steeneken "Parameter Extraction and Support-Loss in MEMS Resonators", COMSOL Users Conference 2007, Гренобль).
modeldescr_mems/electroosmotic_biochip = Электроосмотический поток в биочипе\n\nВ этом примере моделируется электроосмотический поток в ДНК-чипе. Перемещение жидкости происходит за счет присутствия заряженного раствора на стенках каналов чипа, который мигрирует под действием электрического поля. Электроосмотический поток в модели связывает электрическое поле с уравнениями потока Стокса на границах.
modeldescr_mems/electroosmotic_micropump_2d = Электроосмотический микронасос\n\nВ этом примере показана секция низковольтного каскадного микронасоса. Он моделирует приложенное электрическое поле в жидкости и результирующий электроосмотический поток через насос. Параметрическое исследование приложенного противодавления позволяет определить прочность насоса. В этом примере используется предопределенный интерфейс Electroosmotic Flow, основанный на интерфейсах Stokes Flow и Conductive Media DC.
modeldescr_mems/electrostatic_chuck = Электростатический патрон \n\nЭлектростатический патрон (электронный патрон) — это важное устройство, используемое в оборудовании для обработки пластин для закрепления пластины на платформе с регулируемой температурой для охлаждения и нагрева пластины во время обработки. В работе электронного патрона задействовано несколько физических явлений: электростатические силы, поток газа, теплопередача и механика твёрдого тела. В этом примере моделируется контроль температуры с помощью электростатической силы, которая противодействует давлению газообразного гелия в зазоре между пластиной и поверхностью патрона, что обеспечивает теплопроводность в среде с низким давлением.
modeldescr_mems/capacitive_micromachined_ultrasonic_transducer = Ёмкостный микромашинный ультразвуковой преобразователь\n\nЁмкостный микромашинный ультразвуковой преобразователь (CMUT) представляет собой микромасштабный приемник, который преобразует ультразвук в электрический сигнал для приложений формирования изображений с высоким разрешением. В этой модели анализируется конструкция CMUT с оптимизированными характеристиками силы-перемещения для повышения эффективности трансдукции. Центральным фактором улучшения является коэффициент однородности смещения, который можно рассчитать с помощью исследования частотной области с предварительным напряжением. Эта конкретная конструкция является усовершенствованием хорошо зарекомендовавшей себя технологии медицинской визуализации, основанной на пьезоэлектрических преобразователях, и обещает миниатюризацию и более высокое разрешение.
modeldescr_mems/capacitive_micromachined_ultrasonic_transducer_lumped_model = Ёмкостный микромашинный ультразвуковой преобразователь с сосредоточенной моделью\n\nЁмкостный микромеханический ультразвуковой преобразователь (CMUT) преобразует ультразвук в электрический сигнал для приложений визуализации с высоким разрешением. В этом руководстве показано, как модель МЭМС-преобразователя с сосредоточенными параметрами может быть получена из его модели FEM. Он включает в себя модель CMUT FEM и соответствующую модель с сосредоточенными параметрами, созданную с использованием интерфейса сосредоточенной механической системы (LMS). Параметры модели LMS получены в результате исследования оценки параметров.
modeldescr_mems/electrostatically_actuated_cantilever = Консоль с электростатическим приводом\n\nУпругая консольная балка является одной из элементарных структур, используемых в конструкциях МЭМС. В этом примере показан изгиб консольной балки под действием электростатической нагрузки. Модель учитывает деформацию балки под действием приложенного напряжения.
modeldescr_mems/electrostrictive_disc = Электрострикционный диск\n\nВ этом руководстве показано, как использовать интерфейс Ферроэлектроэластичность для моделирования эффектов нелинейной поляризации и электрострикции в таких материалах, как, например, релаксорные сегнетоэлектрики.
modeldescr_mems/elevator_button = Пьезорезистивная кнопка лифта\n\nЭта 3D модель имитирует работу сенсорной кнопки лифта с пьезорезистивным полимерно-пленочным элементом. Приложение нагрузки к проводимости кнопки 's top surface changes the piezoresistive element's, тем самым генерируя электрический сигнал, который может быть обнаружен внешней схемой.
modeldescr_mems/fluid_structure_interaction = Fluid–Structure Interaction\n\nЭта модель демонстрирует, как моделировать взаимодействия Fluid–structure (FSI) с использованием модуля MEMS. Силы вязкости и давление системы воздействуют на поверхность конструкции. Деформация мягкой структуры не мала, поэтому режим жидкости изменится. Это означает, что изменения в структуре и динамика жидкости связаны.
modeldescr_mems/gecko_foot = Gecko Foot\n\nЭта модель содержит нано/микроиерархию синтетических волос на ногах геккона, где волоски описываются консольными балками в разных масштабах. Анализ показывает напряжения и отклонения стопы геккона, вызванные контактными силами и силами трения.
modeldescr_mems/large_deformation_actuator = Пьезоэлектрический актуатор большой деформации\n\nПьезоэлектрические приводы часто располагаются на балках или звеньях, которые совершают большие движения. Следовательно, пьезоактюатор может испытывать большие движения или вращения, и стандартные пьезоэлектрические уравнения не смогут описать систему. В этом примере показано, как смоделировать пьезоэлектрические приводы с большими деформациями.
modeldescr_mems/mems_gyroscope = MEMS Gyrscope\n\nДемпфирование слайд-пленки является важным фактором, который следует учитывать при моделировании структур с небольшими зазорами, вибрирующих в тангенциальном направлении. Этот эффект проиллюстрирован здесь на упрощенной модели вибрационного МЭМС-гироскопа с 2 степенями свободы.
modeldescr_mems/microgripper = Пьезоэлектрический микрозахват\n\nЭта модель демонстрирует основы настройки пьезоэлектрической модели с механическим контактом. Микрозахват содержит пакетированный пьезоактюатор, работающий в продольном режиме. Одновременное сжатие в поперечном направлении и удлинение в продольном направлении замыкает захват и перемещает предметы.
modeldescr_mems/micromirror = Предварительно напряженное микрозеркало\n\nЭта модель показывает основы того, как настроить и решить проблему отрыва предварительно напряженного микрозеркала с покрытием, которое управляется электростатически. Параметрическое исследование показывает, насколько изменения предварительного напряжения влияют на перемещения.
modeldescr_mems/micromirror_prestressed_vibration = Предварительно напряженные вибрации микрозеркала: Термовязкостная –Thermoelasticity Coupling\n\nЭта модель анализирует работу микрозеркала на воздухе и эффекты термовязкостного демпфирования. Модель учитывает тепловое расширение и термовязкостные акустические явления.
modeldescr_mems/micropump_mechanism = Механизм микронасоса\n\nМикронасосы являются ключевыми компонентами микрофлюидных систем, применение которых варьируется от обработки биологических жидкостей до микроэлектронного охлаждения. Эта модель имитирует механизм бесклапанного микронасоса, который эффективно работает при низких числах Рейнольдса, преодолевая гидродинамическую обратимость. Бесклапанным насосам часто отдают предпочтение в микрофлюидных системах, поскольку они минимизируют риск засорения и бережно относятся к биологическому материалу. Интерфейс Fluid–Structure Interaction используется для расчета течения жидкости и связанной с ним деформации конструкции. Кроме того, интерфейс Global ODEs и DAEs используется для демонстрации того, как выполнить интегрирование общего расхода с временным разрешением на протяжении всего цикла откачки.
modeldescr_mems/microresistor_beam = Microresistor Beam\n\nЭта модель обрабатывает движение луча, пропуская через него ток, вызывая повышение температуры. Это приводит к смещению за счет теплового расширения. Совместный термический, электрический и расчёт механики конструкций позволяет оценить увеличение тока и температуры, необходимое для смещения пучка.
modeldescr_mems/piezo_composite_actuator = Пьезокомпозитный изогнутый актуатор\n\nКомпозитные пьезоэлектрические актуаторы представляют собой слоистые структуры со слоями пьезоэлектрической керамики и других материалов. Слои соединяются друг с другом при высокой температуре, а разница в тепловом расширении приводит к характерной форме и рабочим свойствам привода. Эта модель показывает, как моделировать изогнутые пьезоактюаторы с тепловым расширением и большими деформациями.
modeldescr_mems/piezo_flow_sensor = Пьезоэлектрический датчик расхода\n\nЭта модель показывает, как моделировать задачу взаимодействия пьезоэлектрической жидкости со структурой. Воздух, проходящий в открытой области, давит на мягкую структуру ПДМС, которая подвергается значительной деформации. Пьезоэлектрический элемент, прикрепленный к основанию этой конструкции, создает изменяющееся во времени напряжение в результате изменения во времени скорости жидкости. При этом на пьезоэлементе возникает разность напряжений, которая измеряется путем подключения его к сосредоточенному резистору в электрической цепи.
modeldescr_mems/piezoceramic_tube = Пьезокерамическая трубка\n\nЭта модель выполняет статический двухмерный осесимметричный анализ пьезоэлектрического актуатора. Моделируется радиально поляризованная пьезоэлектрическая трубка с двумя наборами граничных условий. Первый случай иллюстрирует обратный пьезоэлектрический эффект, второй — прямой пьезоэффект. Модель основана на статье С.М. Пиламеду и др.
modeldescr_mems/piezoelectric_energy_harvester = Пьезоэлектрический сборщик энергии\n\nЭта модель показывает, как анализировать простой пьезоэлектрический сборщик энергии на консольной основе. К сборщику энергии применяется синусоидальное ускорение, а выходная мощность оценивается как функция частоты, сопротивления нагрузки и величины ускорения.
modeldescr_mems/piezoelectric_hysteresis = Гистерезис в пьезоэлектрической керамике\n\nМногие пьезоэлектрические материалы являются сегнетоэлектриками. Сегнетоэлектрики демонстрируют нелинейное поведение поляризации, такое как гистерезис и насыщение, в больших приложенных электрических полях. Кроме того, поляризация и механические деформации в таких материалах могут быть сильно связаны за счет эффекта электрострикции. В этой модели используется интерфейс «Сегнетоэлектроупругость» для анализа простого привода, изготовленного из пьезоэлектрического керамического материала ЦТС, который подвергается приложенному электрическому полю и механической нагрузке.
modeldescr_mems/piezoelectric_micropump = Пьезоэлектрический микронасос\n\nЭта учебная модель любезно предоставлена Риккардо Вьетри, Джеймсом Рэнсли и Эндрю Спэнном из компании Veryst Engineering, LLC. Пьезоэлектрические микронасосы часто используются в медицине из-за их способности точно контролировать дозирование очень малых объёмов жидкостей или газов. В этом примере показано, как смоделировать простой нерезонансный микронасос, подходящий для применений с низким расходом. Модель демонстрирует сочетание пьезоэлектрических материалов с взаимодействием жидкости со структурой, а также иллюстрирует использование простой формулы, зависящей от скорости, для учета наличия клапанов на впускной и выпускной границах.
modeldescr_mems/piezoelectric_rate_gyroscope = Пьезоэлектрический гироскоп скорости \n\nЭта модель показывает, как анализировать пьезоэлектрический гироскоп скорости на основе камертона. Обратный пьезоэлектрический эффект используется для управления плоскостным камертоном. Этот режим связан с режимом вне плоскости силой Кориолиса, и результирующее движение вне плоскости воспринимается прямым пьезоэлектрическим эффектом. Геометрия камертонов спроектирована так, что собственные частоты соседних мод разнесены в частотном пространстве. Рассчитывается частотная характеристика системы и оценивается чувствительность к скорости вращения.
modeldescr_mems/piezoelectric_valve = Пьезоэлектрический клапан\n\nПьезоэлектрические клапаны часто используются в медицинских и лабораторных приложениях благодаря быстрому времени отклика и бесшумной работе. Их энергоэффективная работа также рассеивает мало тепла, что часто важно для этих приложений. \n\nЭта модель показывает, как смоделировать пьезоэлектрический клапан в COMSOL. Клапан приводится в действие многоярусным пьезоэлектрическим приводом. Гиперэластичное уплотнение прижимается к отверстию клапана приводом и моделируется контакт.\n\nдля этой модели требуется модуль «Нелинейные конструкционные материалы».
modeldescr_mems/piezoresistive_pressure_sensor = Пьезорезистивный датчик давления \n\nМоделируется пьезорезистивный датчик давления. Эта модель показывает, как настроить расчёт разности потенциалов, вызванной напряжением, создаваемой четырехконтактным пьезорезистором, когда мембрана, в которую он встроен, деформируется под действием приложенного давления. Используется интерфейс «Пьезорезистивность, граничные токи». Модель основана на анализе раннего МЭМС-датчика давления: датчика Motorola MAP (SD Senturia, Microsystem Design, Springer, 2000).
modeldescr_mems/piezoresistive_pressure_sensor_shell = Пьезорезистивный датчик давления, Shell\n\nМоделируется пьезорезистивный датчик давления. Эта модель показывает, как настроить расчёт разности потенциалов, вызванной напряжением, создаваемой четырехконтактным пьезорезистором, когда мембрана, в которую он встроен, деформируется под действием приложенного давления. Используется интерфейс «Пьезорезистивность, Шелл». Модель основана на анализе раннего датчика давления MEMS: датчика Motorola MAP (SD Senturia, Microsystem Design, Springer, 2000).\n\nМодель требует наличия модуля MEMS и модуля механики конструкций.
modeldescr_mems/pressure_sensor_2d = Ёмкостный датчик давления\n\nИзмеримой величиной датчика давления является ёмкость, которая изменяется из-за деформации конструкции. Величина деформации пропорциональна давлению окружающей среды, но также зависит от температуры окружающей среды и любых начальных напряжений, возникающих во время производства. Эта модель учитывает начальные напряжения и деформации под давлением окружающей среды и вычисляет ёмкость на основе электрического поля деформированной геометрии.
modeldescr_mems/pressure_sensor_3d = Ёмкостный датчик давления 3D Модель\n\nИзмеримой величиной датчика давления является ёмкость, которая изменяется из-за деформации конструкции. Величина деформации пропорциональна давлению окружающей среды, но также зависит от температуры окружающей среды и любых начальных напряжений, возникающих во время производства. Эта модель учитывает начальные напряжения и деформации при атмосферном давлении и вычисляет ёмкость на основе деформации датчика.
modeldescr_mems/pyroelectric_detector = Пироэлектрический детектор\n\nЭта 2D осесимметричная модель демонстрирует работу пироэлектрического детектора, используемого в приборах для измерения энергии лазера. Диск ниобата лития (LiNbO3) зажат между двумя электродами и подключен к внешней цепи. Диск установлен на кольцеобразной токопроводящей площадке с ограниченной теплопроводностью. Импульсный поток энергии, приложенный к верхней поверхности диска, представляет собой поглощение инфракрасного лазера. В этой модели используется мультифизический интерфейс пьезоэлектричества и пироэлектричества, который включает связи пироэлектричества, пьезоэлектричества и теплового расширения. Исследование во времени используется для расчета изменения температуры в диске и пироэлектрического тока.
modeldescr_mems/residual_stress_resonator_2d = Остаточное напряжение в тонкопленочном резонаторе — 2D\n\nПоверхностные тонкие пленки, обработанные микромеханической обработкой, часто подвергаются остаточным напряжениям. Термическое остаточное напряжение добавляется к механической модели конструкции, что изменяет резонансную частоту конструкции. Эта модель описывает тонкопленочный резонатор со сложенными струнами консольных балок в 2D. Сложенные изгибы снимают осевое напряжение.
modeldescr_mems/residual_stress_resonator_3d = Остаточное напряжение в тонкопленочном резонаторе — 3D\n\nПоверхностные тонкие пленки, обработанные микромеханической обработкой, часто подвергаются остаточным напряжениям. Термическое остаточное напряжение добавляется к механической модели конструкции, что изменяет резонансную частоту конструкции. Эта модель описывает тонкопленочный резонатор со сложенными струнами консольных балок в 3D. Сложенные изгибы снимают осевое напряжение.
modeldescr_mems/rf_mems_switch = Втягивание радиочастотного MEMS-переключателя\n\nВ этой модели анализируется радиочастотный MEMS-переключатель, состоящий из тонкого микромеханического мостика, подвешенного над диэлектрическим слоем. К переключателю прикладывается напряжение постоянного тока, превышающее напряжение втягивания, что приводит к разрушению моста на диэлектрический слой, что приводит к увеличению ёмкости устройства. Контактная сила на основе штрафов применяется для моделирования контактных сил, когда мост вступает в контакт с диэлектриком.
modeldescr_mems/saw_gas_sensor = Датчик газа на поверхностных акустических волнах\n\nЭта модель анализирует собственные частоты датчика газа на поверхностных акустических волнах (ПАВ). В частности, модель исследует, как дополнительная массовая нагрузка от адсорбированного газа снижает резонансную частоту.
modeldescr_mems/shear_bender = Пьезоэлектрическая балка, активируемая сдвигом\n\nЭта модель выполняет статический анализ композитной консольной балки, оснащенной пьезокерамическим приводом. Электрическое поле прикладывается перпендикулярно направлению полюса, вызывая тем самым поперечное отклонение луча.
modeldescr_mems/solidly_mounted_resonator_2d = Сплошной резонатор 2D\n\nСплошной резонатор (SMR) представляет собой пьезоэлектрический МЭМС-резонатор, сформированный поверх стопки акустических зеркал, нанесенной на толстую подложку. В этом учебном примере показано, как смоделировать SMR в 2D. В этом примере были вычислены собственные моды и проанализирована частотная характеристика от 500 до 1200 МГц. Рассчитанная кривая импеданса и профиль смещения достаточно хорошо согласуются с результатами моделирования, найденными в литературе.
modeldescr_mems/solidly_mounted_resonator_2d_uncertainty_quantification = Сплошной резонатор 2D с количественной оценкой неопределенности \n\nСплошной резонатор (SMR) представляет собой пьезоэлектрический резонатор MEMS, изготовленный из нескольких слоев материалов. В этом руководстве показано, как количественная оценка неопределенности используется для изучения влияния производственных изменений на резонансную частоту SMR. В учебном пособии показано, как анализ чувствительности, распространение неопределенности и анализ надежности используются в сочетании с исследованием собственной частоты.
modeldescr_mems/solidly_mounted_resonator_3d = Сплошной резонатор 3D\n\nСплошной резонатор (SMR) представляет собой пьезоэлектрический МЭМС-резонатор, сформированный поверх стопки акустических зеркал, нанесенной на толстую подложку. В этом учебном примере показано, как смоделировать SMR в 3D. В этом примере собственные моды были вычислены с различным количеством частиц, прикрепленных к поверхности датчика, для расчета чувствительности, и было проанализировано соответствующее изменение частотной характеристики. Резонансная частота уменьшается с увеличением количества прикрепленных частиц, а чувствительность зависит от места прикрепления относительно формы моды - оба наблюдения соответствуют ожиданиям.
modeldescr_mems/squeezed_film_accelerometer_2d = Газовое демпфирование сжатой пленкой в акселерометре 2D\n\nМикромеханические структуры с ёмкостным датчиком обычно имеют очень узкий зазор между электродами. Зазор обычно заполнен газом, который демпфирует движения механических частей. Эта 2D-модель показывает, как газовое демпфирование сжатой пленкой может быть связано с механическими смещениями в микросистемном акселерометре.
modeldescr_mems/squeeze_film_accelerometer = Газовое демпфирование с помощью сжимающей пленки в акселерометре\n\nМикромеханические структуры с ёмкостным датчиком обычно имеют очень узкий зазор между электродами. Зазор обычно заполнен газом, который демпфирует движения механических частей. Эта комбинированная 3D- и 2D-модель показывает, как газовое демпфирование сжимающей пленкой может быть связано с механическими смещениями в микросистемном акселерометре.
modeldescr_mems/squeeze_film_disc = Газовое демпфирование вибрирующего диска с помощью сжимающей пленки\n\nЭтот тест вычисляет общую силу, действующую на вибрирующий диск в частотной и временной областях, и сравнивает оба результата с выражениями, полученными аналитическим путем. Когда амплитуда вибрации достаточно мала, чтобы система была линейной, результаты в частотной и временной областях хорошо согласуются с теорией. Вибрации с большей амплитудой, которые приводят к нелинейному отклику, который невозможно смоделировать в частотной области, исследуются во временной области и сравниваются с аналитическими решениями.
modeldescr_mems/squeeze_film_perforated_plates = Демпфирование перфорированных пластин с помощью сжимающей пленки\n\nВ этой эталонной модели сравниваются коэффициенты демпфирования перфорированных пластин на основе результатов расчетов и экспериментальных данных. Моделирование включает 18 различных геометрических конфигураций. Он использует модель перфорации Бао, встроенную в физический интерфейс Thin Film Flow. Также моделируются два предельных случая: отсутствие перфорации и нулевое относительное давление на перфорациях.
modeldescr_mems/surface_micromachined_accelerometer_geom = [Surface Micromachined Accelerometer]Surface Micromachined Accelerometer Geometry\n\nЭто шаблон MPH-файла, содержащий физические интерфейсы и параметризованную геометрию для модели Surface Micromachined Accelerometer.
modeldescr_mems/surface_micromachined_accelerometer = [Поверхностный микромашинный акселерометр]Поверхностный микромашинный акселерометр\n\nВ этом примере показано, как смоделировать поверхностный микромеханический акселерометр с ёмкостным приводом с помощью электромеханического интерфейса. Он основан на тематическом исследовании из книги Стивена Д. Сентурии «Проектирование микросистем» (Kluwer Academic Publishers, 5-е издание, 2003 г., страницы 513–525).
modeldescr_mems/thermal_actuator_tem = Thermal Actuator\n\nВ этом примере термопривода с двумя горячими рычагами сочетаются три различных физических явления: проводимость электрического тока, теплопроводность с выделением тепла, а также структурные напряжения и деформации из-за теплового расширения.
modeldescr_mems/thermal_actuator_tem_parameterized = Термический привод — Параметризованный\n\nВ этом примере термопривода с двумя горячими рычагами сочетаются три различных физических явления: проводимость электрического тока, теплопроводность с выделением тепла, а также структурные напряжения и деформации из-за теплового расширения. В этой примерной версии геометрия параметрируется таким образом, чтобы можно было проанализировать эффект изменения размеров привода.
modeldescr_mems/thermoelastic_damping_2d = Термоупругое демпфирование в МЭМС-резонаторе\n\nТермоупругое демпфирование является важным фактором при проектировании МЭМС-резонаторов. Циклическая деформация резонатора создает локальные колебания температуры и тепловое расширение материала, которое проявляется в виде демпфирования. Эта 2D-модель показывает, как моделировать термоупругое демпфирование в МЭМС-резонаторе с использованием полностью связанных тепловых и структурных уравнений.
modeldescr_mems/thermoelastic_damping_3d = Термоупругое демпфирование в МЭМС-резонаторе\n\nТермоупругое демпфирование является важным фактором при проектировании МЭМС-резонаторов. Циклическая деформация резонатора создает локальные колебания температуры и тепловое расширение материала, которое проявляется в виде демпфирования. Эта 3D-модель показывает, как моделировать термоупругое демпфирование в МЭМС-резонаторе с использованием полностью связанных тепловых и структурных уравнений.
modeldescr_mems/thermomechanical_valve_2d = Термомеханический микроклапан\n\nАктивные микроклапаны являются обычными компонентами микрофлюидных систем. Эта 2D-модель показывает, как связать резистивный нагрев с температурным полем и как повышение температуры расширяет твердую структуру и создает необходимое движение клапана.
modeldescr_mems/thermomechanical_valve_3d = Термомеханический микроклапан\n\nАктивные микроклапаны являются обычными компонентами микрофлюидных систем. Эта 3D-модель показывает, как связать резистивный нагрев с температурным полем и как повышение температуры расширяет твердую структуру и создает необходимое движение клапана.
modeldescr_mems/thickness_shear_quartz_oscillator = Кварцевый генератор в режиме сдвига по толщине\n\nСмоделирован кварцевый генератор, работающий в режиме сдвига по толщине. В примере показано, как правильно настроить систему координат для кварца АТ-огранки и смоделировать реакцию устройства, работающего в резонансе. Резонансная частота генератора изменяется за счет изменения ёмкости шунтирующего конденсатора.
modeldescr_mems/thin_film_baw_resonator = Тонкопленочный композитный резонатор BAW\n\nРезонаторы объёмных акустических волн (BAW) являются полезными компонентами для многих радиочастотных применений, где они могут работать как узкополосные фильтры. В этом примере показано, как можно выполнить анализ собственной частоты и частотной характеристики составного тонкопленочного резонатора BAW.
modeldescr_mems/thin_film_baw_resonator_dispersion_diagram = Дисперсионная диаграмма тонкопленочной структуры BAW\n\nЭта модель показывает, как создавать дисперсионные диаграммы на основе результатов моделирования путем расширения учебного пособия «Тонкопленочный композитный резонатор BAW». Дисперсионную кривую можно построить как в зависимости от действительных, так и мнимых значений волнового числа, соответствующих распространяющимся и затухающим модам соответственно. Каждую моду также можно визуализировать, построив ее поле смещения. Учет таких распространяющихся и затухающих мод является важной частью процесса выбора подходящих параметров конструкции слоевой структуры резонатора ОАВ.
modeldescr_mems/thin_film_baw_resonator_s_parameter = S-параметр тонкопленочного BAW-резонатора\n\nЭта модель показывает, как вычислить S-параметр для пьезоэлектрического MEMS-устройства путем расширения учебного пособия «Тонкопленочный композитный резонатор BAW». Измерение S-параметра обычно используется для характеристики таких устройств для радиочастотных применений. Функция терминала в интерфейсе физики электростатики обеспечивает прямой доступ к вычисленным S-параметрам для типов исследований в частотной области.
modeldescr_mems/thin_film_baw_resonator_3d_equivalent_circuit = Тонкопленочный резонатор BAW с эквивалентной схемой \n\nВ этом учебном пособии показано, как можно получить модель электрической схемы МЭМС-резонатора с помощью исследования оценки параметров. Модель схемы представляет собой модифицированную схему Butterworth–Van Dyke, созданную с использованием интерфейса Electrical Circuit. Исследование оценки параметров используется для определения параметров дискретных элементов модели схемы.
modeldescr_mems/tunable_piezoelectric_actuator = Настраиваемый пьезоэлектрический актуатор\n\nПассивные электрические цепи можно использовать для настройки вибрационных свойств пьезоэлектрических актуаторов. В этом примере показано, как описать электрическую цепь с помощью списка соединений SPICE и как вычислить частотную характеристику привода, подключенного к внешней схеме настройки.

# Metal Processing models
modeldescr_metproc/phase_transformations_in_a_round_bar = Фазовые превращения в круглом стержне\n\nДвумерная модель стального стержня использована для моделирования закалки в масле из аустенитного состояния. Используются как диффузионные, так и смещающие фазовые превращения, а фазовый состав вычисляется в радиальном направлении стержня.
modeldescr_metproc/transformation_diagram_computation = Диаграмма превращения Computation\n\nВо время закалки стали аустенит разлагается на такие фазы, как феррит, перлит, бейнит и мартенсит. Распространенный способ проиллюстрировать характеристики фазового превращения конкретного стального сплава — использовать диаграммы превращения. Двумя наиболее часто используемыми типами диаграмм являются диаграммы CCT (преобразование непрерывного охлаждения) и TTT (преобразование температуры и времени). В этом примере показано, как вычислить диаграммы CCT и TTT на основе данных о температурно-зависимом фазовом превращении.
modeldescr_metproc/quenching_of_a_steel_billet = Закалка стальной заготовки\n\nСтальная заготовка закаливается в масле из аустенитного состояния. Двумерная осесимметричная модель используется для моделирования совместной задачи распада аустенита, теплопередачи и механики твёрдого тела. В процессе закалки аустенит распадается на комбинацию феррита, перлита, бейнита и мартенсита. Рассчитываются деформации фазового превращения, возникающие в результате теплового расширения и пластичности, вызванной трансформацией (TRIP). Рассчитывается результирующее остаточное напряженное состояние.
modeldescr_metproc/quenching_simulation_using_imported_material_properties = Моделирование закалки с использованием свойств импортированного материала \n\nСтальная заготовка закаливается в масле из аустенитного состояния. Двумерная осесимметричная модель используется для моделирования совместной задачи распада аустенита, теплопередачи и механики твёрдого тела. В процессе закалки аустенит распадается на комбинацию феррита, перлита, бейнита и мартенсита. Рассчитываются деформации фазового превращения, возникающие в результате теплового расширения и пластичности, вызванной трансформацией (TRIP). Рассчитывается результирующее остаточное напряженное состояние.
modeldescr_metproc/carburization_and_quenching_of_a_steel_gear = Науглероживание и закалка стальной шестерни\n\nЭта модель показывает, как моделировать науглероживание и закалку стальной шестерни. Диффузия углерода в поверхность шестерни влияет на начало мартенситного превращения. Рассчитаны остаточные напряжения и показано, что в основании шестерни возникают высокие остаточные сжимающие напряжения.
modeldescr_metproc/calibration_against_ttt_data = Калибровка по данным TTT\n\nЭта модель показывает, как использовать модуль обработки металлов и модуль оптимизации для калибровки параметров модели фазового превращения по данным TTT (преобразование времени и температуры).
modeldescr_metproc/welding_of_a_titanium_plate = Сварка титановой пластины\n\nЭта модель имитирует дуговую сварку пластины, изготовленной из титанового сплава альфа–бета. Во время сварного прохода материал испытывает температурный переход, включающий как нагрев, так и охлаждение. Смоделированы фазовые превращения и вычислена эволюция фазового состава во времени.
# Microfluidics apps


# Microfluidics Module models
modeldescr_mfl/controlled_diffusion_separator = Сепаратор с контролируемой диффузией\n\nВ этой модели используется H-образное микрофлюидное устройство для контролируемого разделения посредством диффузии. Устройство обеспечивает контакт двух разных ламинарных потоков в течение контролируемого периода времени. Контактная поверхность четко определена, и, контролируя скорость потока, можно поддерживать поле ламинарного потока и контролировать количество веществ, переносимых из одного потока в другой посредством диффузии. Этот пример был первоначально сформулирован Альбертом Витарсой под руководством профессора Брюса Финлейсона в Вашингтонском университете в Сиэтле. Работа была выполнена в рамках задания аспирантуры по оценке потенциала патентов в области микрофлюидики посредством математического моделирования.
modeldescr_mfl/drug_delivery_mm = Система доставки лекарств \n\nВ этом примере описывается работа системы доставки лекарств, которая подает водорастворимое лекарство в переменной концентрации.
modeldescr_mfl/electrokinetic_valve = Транспорт в электрокинетическом клапане\n\nЭто пример потока, управляемого давлением, и электрофореза в микроканальной системе. Фокусировка достигается за счет потока образца и буферного раствора под давлением, который удерживает образец в фокусирующем канале. Когда достигается устойчивое состояние, поток, управляемый давлением, отключается и прикладывается электрическое поле, которое прогоняет диссоциированные ионы образца через инжекционный канал.
modeldescr_mfl/electroosmotic_mixer = Электроосмотический микромиксер\n\nВ этом примере показан микромиксер, который использует преимущества электроосмоса для смешивания жидкостей. Прикладывается зависящее от времени электрическое поле, и возникающий электроосмос возмущает поток. Анимация следов частиц показывает обширные складки и растяжения материальных линий.
modeldescr_mfl/electrowetting_lens = Электросмачивающая линза\n\nВ этом примере показана регулируемая линза, которая приводится в действие за счет эффекта электросмачивания диэлектрика (EWOD). Мениск, образующийся между двумя несмешивающимися жидкостями (проводящей и изолирующей), используется для формирования хрусталика. Электрическое поле прикладывается между проводящей жидкостью и электродом с диэлектрическим покрытием на стенке камеры линзы. Изменение поля меняет угол контакта линии контакта между двумя жидкостями, это меняет форму линзы.
modeldescr_mfl/jet_instability_ls = Нестабильность струи — Level Set\n\nЭффект Марангони создает скорость скольжения в тангенциальном направлении на границе раздела жидкость/жидкость, когда присутствуют градиенты коэффициента поверхностного натяжения. В этом примере длинная струя жидкости распадается в инерциальной системе отсчета в результате периодического градиента поверхностного натяжения.
modeldescr_mfl/jet_instability_mm = Нестабильность струи — Moving Сетка\n\nЭффект Марангони создает скорость скольжения в тангенциальном направлении на границе раздела жидкость/жидкость, когда присутствуют градиенты коэффициента поверхностного натяжения. В этом примере длинная струя жидкости распадается в инерциальной системе отсчета в результате периодического градиента поверхностного натяжения.
modeldescr_mfl/knudsen_minimum = Минимум Кнудсена 's Minimum\n\nThe flow rate of a rarefied gas between parallel plates exhibits a minimum at a Knudsen number of approximately 1. This phenomenon, known as Knudsen's моделируется с использованием интерфейса Transitional Flow. для сравнения включены решения Navier–Stokes, Slip Flow и Molecular Flow для одной и той же проблемы.
modeldescr_mfl/lamella_mixer = Lamella Mixer\n\nЭтот пример демонстрирует смешивание жидкостей с использованием ламинарного слоистого потока в смесителе MEMS. Смеситель имеет несколько ламелей микроканалов, причем две смешиваемые жидкости чередуются для каждого второго слоя. Жидкость перемещается по каналам сзади вперед под действием потока, создаваемого давлением.
modeldescr_mfl/microchannel_dispersion_optimization = Оптимизация дисперсии полос в электроосмотическом потоке через изогнутый микроканал\n\nПоскольку полоса аналита протекает через изогнутый канал в электроосмотически управляемом потоке, дисперсия полосы происходит из-за градиентов скорости жидкости поперек канала. Эти градиенты скорости возникают из-за различий в электрическом поле, действующем на стенки изогнутых каналов. В этом примере показано, как оптимизировать скорость канала, чтобы минимизировать дисперсию аналита.
modeldescr_mfl/rotating_channel = Вращающийся канал\n\nВ этом примере вычисляется радиальное распределение давления и скорость потока через вращающуюся платформу Lab-On-A-Chip (LOAC). Поток через устройство является результатом центробежных сил и сил Кориолиса. Результаты хорошо сопоставимы с упомянутой публикацией.
modeldescr_mfl/slip_flow_benchmark = Slip Flow Benchmark\n\nВ этом примере вычисляется поток между двумя герметичными камерами, соединенными микроканалом с проводящими стенками, когда камеры поддерживаются при разных температурах. По воздуховоду не возникает чистого потока, но возникает градиент давления и циркуляционный поток. Это эталонная проблема для интерфейса скользящего потока.
modeldescr_mfl/split_recombine_mixer = Тестовый образец смесителя с разделением и рекомбинацией\n\nВ этом примере моделируется канал смесителя с разделением и рекомбинированием, в который вводится индикаторная жидкость и смешивается путем многократного ламинирования. Диффузия удаляется из модели с использованием чрезвычайно низкого коэффициента диффузии, так что любую численную диффузию можно изучить на границах раздела слоев. Результаты хорошо согласуются с указанными публикациями как по структуре ламинирования, так и по общему перепаду давления в смесителе.
modeldescr_mfl/star_chip = Звездообразный микроканал\n\nВ этом примере представлено зависящее от времени исследование микроканала, который используется для наполнения и промывки другой части оборудования жидкостью. Давление на пяти входах изменяется синусоидально в зависимости от времени, изучается вектор скорости на выходе. В примере используется вытянутая сетка призмы, которая сокращает время расчётов и требования к памяти.
modeldescr_mfl/tesla_microvalve_optimization = Оптимизация микроклапана Тесла\n\nВ этом примере выполняется топологическая оптимизация микроклапана Тесла. Микроклапан Теслы препятствует обратному потоку, используя силы трения, а не движущиеся части. Проект можно оптимизировать, распределив определенное количество материала в области моделирования. Цель состоит в том, чтобы максимизировать соотношение падения давления для прямого и обратного потока через устройство.
modeldescr_mfl/tesla_microvalve_parameter_optimization = Оптимизация параметров микроклапана Тесла \n\n Микроклапан Тесла с оптимизированной топологией используется в качестве вдохновения для параметризованной геометрии. Оптимизация этой геометрии учитывает эрозию и расширение геометрии путем оптимизации параметрической развертки. В этом примере оптимизация осуществляется на основе худшей из трех геометрий, реализуемых при каждом параметрическом анализе.
modeldescr_mfl/tesla_microvalve_shape_optimization = Оптимизация формы микроклапана Тесла\n\nМикроклапан Теслы с оптимизированной топологией используется в качестве вдохновения для исходной геометрии. Полиномы Бернштейна второго порядка используются для изменения формы геометрии. Полученная конструкция переделывается в деформированную конфигурацию, и производительность исследуется в диапазоне чисел Рейнольдса.
modeldescr_mfl/tesla_microvalve_transient_optimization = Оптимизация микроклапана Тесла с переходным потоком \n\nВ этом примере выполняется топологическая оптимизация микроклапана Тесла для осциллирующего перепада давления. Микроклапан Теслы препятствует обратному потоку, используя силы трения, а не движущиеся части, и поэтому цель состоит в том, чтобы максимизировать среднюю скорость потока. Проект можно оптимизировать путем распределения материала в области моделирования.
modeldescr_mfl/viscous_catenary = Viscous Catenary\n\nЗадача о вязкой цепной линии описывает движение цилиндра с очень вязкой жидкостью, поддерживаемого на концах, когда он течет под действием силы тяжести.


# Mixer Module apps
applicationdescr_mixer/mixer = Mixer\n\nЭто приложение демонстрирует следующее:\n\n• Несколько вкладок в лента\n• Детали геометрии и параметризованная геометрия\n• Детали и совокупный выбор можно использовать для автоматической установки параметров области и границ во встроенном model\n• Добавление или удаление геометрических частей с различной геометрической конфигурацией\n• Опции для создания различной сетки size\n• Отправка электронного письма с отчетом после завершения расчётов\n• Пользовательские настройки почтового сервера, которые полезны при работе в скомпилированном автономном режиме apps\n• Ползунки для управления визуализацией графика среза\n\nПриложение предоставляет удобный интерфейс, с помощью которого ученые и инженеры-технологи могут исследовать влияние сосудов, рабочих колес, перегородки и условия эксплуатации влияют на эффективность смешивания и мощность, необходимую для привода рабочих колес. Вы можете использовать это приложение, чтобы понять и оптимизировать конструкцию и работу смесителя для заданной жидкости.\n\nВы можете указать размеры сосуда из списка трех типов, а размеры и конфигурацию рабочих колес из списка одиннадцати типов. Сосуды также могут быть оборудованы перегородками. Вы также можете указать скорость рабочего колеса и свойства смешиваемой жидкости.

# Mixer Module models
modeldescr_mixer/centrifugal_pump = Центробежный насос\n\nЦентробежные насосы используются в различных областях применения и могут быть найдены во многих отраслях промышленности. Размер насоса в этой модели типичен для автомобильной техники. Эта модель показывает, как настроить моделирование вращающегося оборудования с использованием приближения замороженного ротора для моделирования центробежных насосов. Модель включает в себя расчет ряда интересных параметров для насосов с использованием муфт компонентов и, в частности, оценку кривой насоса. Геометрия создается с помощью инструментов геометрии COMSOL’s.
modeldescr_mixer/continuous_mixer = Смеситель непрерывного действия\n\nЭта модель имитирует резервуар с асимметрично расположенным рабочим колесом. Геометрия резервуара и рабочего колеса определяется с использованием деталей из библиотеки деталей модуля смесителя. Жидкость непрерывно подается в резервуар сверху и выходит через выпускное отверстие внизу. Поле турбулентного потока, возникающее в результате перемешивания рабочего колеса, решено с использованием анализа замерзшего ротора. Модель показывает, как визуализировать смешивание и вычислить распределение времени пребывания с помощью отслеживания частиц. Импульс, содержащий 50 000 безмассовых частиц, вводится и отслеживается по мере прохождения через смеситель. Распределение времени пребывания вычисляется путем подсчета количества частиц, достигших выхода.
modeldescr_mixer/free_surface_mixer = Смеситель со свободной поверхностью\n\nЭтот пример турбулентного потока в турбулентном смесителе с частично перегородками показывает, как настроить интерфейсы «Вращающееся оборудование», «Турбулентный поток» из модуля «Смеситель» со свободной поверхностью и стационарной свободной поверхностью. Выполняется и сравнивается как моделирование замороженного ротора, так и моделирование, зависящее от времени.\n\nПРИМЕЧАНИЕ. Модель включает в себя как исследование замороженного ротора, так и исследование зависимости от времени, и ее решение может занять около дня. Однако решение проблемы замороженного ротора занимает всего несколько часов.
modeldescr_mixer/helical_ribbon_impeller = Смеситель со винтовой ленточной крыльчаткой\n\nВ этом примере изучается течение высоковязкой жидкости, помещенной в круглый сосуд смесителя. Смеситель оснащен нетипичным винтовым ленточным рабочим колесом. Модель учитывает изотермическое течение перемешиваемой жидкости, а также течение и теплообмен при нагревании жидкости от стенок сосуда.
modeldescr_mixer/mixer_application_dished_bottom = Dished Bottom Mixer\n\nПриложение Dished Bottom Mixer можно использовать для изучения течения жидкости в смесителе с перегородками. С помощью приложения геометрия, сетка и работа смесителя автоматически настраиваются на основе набора заданных пользователем характеристик, таких как высота и диаметр смесителя, а также свойства жидкости в резервуаре. Приложение включает в себя три типа рабочих колес; трех- и четырехлопастные рабочие колеса и турбина Раштона. Смешиваемая жидкость по умолчанию определяется как ньютоновская, но приложение также поддерживает поддержку неньютоновских жидкостей. После моделирования представлен ряд соответствующих результатов; число Рейнольдса рабочего колеса, потребляемая мощность, число мощности и число накачки рабочего колеса.\n\nдля этого приложения доступны два типа моделирования. При использовании метода скользящей сетки геометрия рабочего колеса вращается, а стенки резервуара и перегородки остаются неподвижными. При использовании метода моделирования «замороженного ротора» вращающиеся части удерживаются в замороженном состоянии вместе со стенками сосуда и перегородками, а вращение учитывается за счет центробежных сил и сил Кориолиса.
modeldescr_mixer/mixer_application_flat_bottom = Смеситель с плоским дном\n\nПриложение «Смеситель с плоским дном» можно использовать для изучения течения жидкости в смесителе с перегородками. С помощью приложения геометрия, сетка и работа смесителя автоматически настраиваются на основе набора заданных пользователем характеристик, таких как высота и диаметр смесителя, а также свойства жидкости в резервуаре. Приложение включает в себя три типа рабочих колес; трех- и четырехлопастные рабочие колеса и турбина Раштона. Смешиваемая жидкость по умолчанию определяется как ньютоновская, но приложение также поддерживает поддержку неньютоновских жидкостей. После моделирования представлен ряд соответствующих результатов; число Рейнольдса рабочего колеса, потребляемая мощность, число мощности и число накачки рабочего колеса.\n\nдля этого приложения доступны два типа моделирования. При использовании метода скользящей сетки геометрия рабочего колеса вращается, а стенки резервуара и перегородки остаются неподвижными. При использовании метода моделирования «замороженного ротора» вращающиеся части удерживаются в замороженном состоянии вместе со стенками сосуда и перегородками, а вращение учитывается за счет центробежных сил и сил Кориолиса.
modeldescr_mixer/modular_mixer_geom = [Модульный микшер]Ламинарный модульный микшер — Файл шаблона\n\nЭтот пример представляет собой шаблон MPH-файла, используемый ламинарным корпусом моделей модульных микшеров. Геометрия представляет собой комбинацию рабочего колеса Раштона и резервуара с плоским дном. Геометрические последовательности для построения рабочего колеса и резервуара импортируются из библиотек деталей.
modeldescr_mixer/modular_mixer = Модульный смеситель\n\nЭтот пример создан на основе предоставленного файла геометрической модели, который содержит геометрические детали для создания смесителей с плоским и выпуклым дном с перегородками и рабочим колесом с наклонными лопастями или турбиной Раштона. В модели моделируется ламинарное перемешивание в сосуде с плоским дном с турбиной Раштона.\n\nВ примерах используется метод моделирования замороженного ротора, при котором вращающиеся части удерживаются в замороженном состоянии вместе со стенками сосуда и перегородками, а вращение учитывается за счет центробежных сил и сил Кориолиса.
modeldescr_mixer/modular_mixer_ke = [Модульный смеситель]Модульный смеситель — Турбулентное перемешивание (k-epsilon)\n\nЭтот пример построен на основе прилагаемого файла геометрической модели, который содержит геометрические детали для создания смесителей с плоским и вогнутым дном с перегородками, с крыльчаткой со скошенными лопастями или турбина Раштона. В модели моделируется турбулентный поток в сосуде с выпуклым дном и рабочим колесом со скошенными лопатками с использованием модели k-epsilon.—3\nВ примере используется метод моделирования Frozen Rotor, при котором вращающиеся части удерживаются в замороженном состоянии вместе со стенкой сосуда и перегородками, а вращение учитывается путем включения центробежные силы и силы Кориолиса.
modeldescr_mixer/modular_mixer_kw = [Модульный смеситель]Модульный смеситель — Турбулентное перемешивание (k-omega)\n\nЭтот пример построен на основе прилагаемого файла геометрической модели, который содержит геометрические детали для создания смесителей с перегородками с плоским и выпуклым дном либо с крыльчаткой с наклонными лопастями, либо с крыльчаткой с наклонными лопастями. Турбина Раштона. В модели моделируется турбулентный поток в сосуде с выпуклым дном и рабочим колесом со скошенными лопатками с использованием модели k-omega.\n\nВ примере используется метод моделирования Frozen Rotor, при котором вращающиеся части удерживаются в замороженном состоянии вместе со стенкой сосуда и перегородками, а вращение учитывается путем включения центробежные силы и силы Кориолиса.
modeldescr_mixer/modular_mixer_turbulent_geom = [Модульный смеситель]Турбулентный модульный смеситель — Файл шаблона\n\nЭтот пример представляет собой шаблон MPH-файла, используемый турбулентными случаями (модели турбулентности k-epsilon и k-omega) Модульного смесителя модели. Геометрия представляет собой комбинацию рабочего колеса со скошенными лопатками и резервуара с вогнутым дном. Геометрические последовательности для построения рабочего колеса и резервуара импортируются из библиотек деталей.
modeldescr_mixer/nonisothermal_mixer = Неизотермический поток в 2D-смесителе\n\nЭтот пример иллюстрирует моделирование распределения температуры в упрощенном смесителе.
modeldescr_mixer/power_law_mixer = Поведение степенной жидкости в смесителе \n\nВ этом примере моделируется поток в резервуаре с плоским дном с одним четырехлопастным наклонным рабочим колесом. Моделируемая жидкость представляет собой раствор 1% карбопола в воде, которая представляет собой разжижающуюся при сдвиге жидкость, которую можно смоделировать по степенному закону. Рассчитанные энергетические числа сравниваются с экспериментальными результатами.
modeldescr_mixer/three_phase_mixer = Трехфазный смеситель\n\nЭта модель имитирует разделение и смешивание суспензии с легкими и тяжелыми частицами. Первоначально распределение обеих популяций частиц однородно по всей жидкости. Прежде чем рабочее колесо начнет вращаться, жидкость и две группы частиц имеют тенденцию разделяться, поскольку легкие частицы поднимаются наверх резервуара, а тяжелые частицы оседают на дне. При перемешивании суспензии три фазы снова смешиваются.
modeldescr_mixer/wall_jet_4PB_mixer_flat = Смешивание воды в смесителе с плоским дном\n\nВ этом примере моделируется поток в резервуаре с плоским дном с одной четырехлопастной крыльчаткой с наклоном. Турбулентный поток моделируется с использованием модели турбулентности k-эпсилон. В соответствии с литературными данными безразмерные профили осевой скорости в различных осевых положениях демонстрируют самоподобие.
modeldescr_mixer/free_surface_mixer_ls = Установка уровня смесителя со свободной поверхностью\n\nЭтот пример турбулентного потока в турбулентном смесителе с частично перегородками и трехлопастным рабочим колесом показывает, как настроить интерфейсы «Вращающееся оборудование», «Турбулентный поток» из модуля «Смеситель» с методом установки уровня для потока на свободной поверхности во вращающейся геометрии. Выполняется нестационарное моделирование, и можно наблюдать вихрь, создаваемый вращающейся жидкостью.\n\nПРИМЕЧАНИЕ. Решение и создание примерно 3 ГБ данных для исследования, зависящего от времени, может занять около дня.

# Molecular Flow apps
applicationdescr_molec/ion_implanter_evaluator = Ion Implanter Evaluator\n\nПриложение Ion Implanter Evaluator учитывает проектирование системы ионной имплантации. Ионная имплантация широко используется в полупроводниковой промышленности для имплантации легирующих добавок в пластины.\n\nВ установке ионной имплантации ионы, генерируемые в источнике ионов, ускоряются электрическим полем для достижения желаемой энергии имплантата. Ионы с правильным зарядом выбираются с помощью разделительного магнита, который изгибает ионный пучок, чтобы гарантировать, что ионы с определенным соотношением заряда к массе являются единственными, которые достигают пластины. Энергетическая доза и угол ионного луча являются ключевыми параметрами процесса. \n\nПриложение позволяет пользователю изменять угол пластины, а также молекулярную массу выделяющих газов веществ, скорость газовыделения и температуру поверхности. Скорость крио- и турбонасоса также можно регулировать. \n\nЧисленная плотность, давление, молекулярное течение, а также средняя числовая плотность вдоль линии луча могут быть визуализированы.

# Molecular Flow Module models
modeldescr_molec/charge_exchange_cell = Нейтрализация пучка протонов через ячейку перезарядки\n\nГазовые ячейки имеют несколько применений в конструкции научных приборов. Газовая ячейка используется для определения области высокого давления в основной вакуумной системе прибора. В этом примере область высокого давления длиной 100 мм с рабочим давлением 1e-3 Торр помещена в основную вакуумную систему с рабочим давлением 1e-5 Торр. Газовая ячейка используется для нейтрализации пучка протонов посредством реакций перезарядки с буферным газом, создавая пучок энергичных нейтральных атомов. В масс-спектрометрии типичными применениями являются устранение масс-спектральных помех в масс-спектрометрии с индуктивно связанной плазмой (ICPMS) или в качестве ячейки столкновений, способствующей реакциям ионно-молекулярных реакций или фрагментации в тандемной масс-спектрометрии (МС-МС).
modeldescr_molec/differential_pumping = Дифференциальная накачка\n\nВакуумные системы с дифференциальной накачкой используют небольшое отверстие или трубку для соединения двух частей вакуумной системы, находящихся под очень разными давлениями. Такие системы необходимы, когда процессы протекают при более высоких давлениях и контролируются детекторами, для работы которых требуется сверхвысокое давление. В этой модели поток газа через узкую трубку в камеру высокого вакуума аппроксимируется аналитическим выражением для скорости потока. Модель также может быть адаптирована для непосредственного использования экспериментальных данных. Результаты, полученные путем объединения аналитической модели с границей раздела свободномолекулярного течения, сравниваются с моделированием, которое включает свободномолекулярное течение как в трубе, так и в сверхвысоковольтной части системы.
modeldescr_molec/ion_implanter = Молекулярное течение в вакуумной системе ионной имплантации\n\nВ этом примере рассматривается конструкция системы ионной имплантации. Ключевым требованием к конструкции системы является низкая плотность выделяющихся молекул на пути ионного пучка. В этом примере числовая плотность вычисляется вдоль части пути ионного луча, когда выделяющая газ целевая пластина вращается вокруг своей оси внутри системы.
modeldescr_molec/evaporator = Evaporator\n\nВ этом примере показано, как вычислить толщину термически испаренной золотой пленки. Толщина нанесенной пленки вычисляется как на стенках камеры, так и на образце.\n\nдля работы этого примера требуется не менее 6 ГБ ОЗУ.
modeldescr_molec/outgassing_pipes = Трубы дегазации\n\nЭтот тест вычисляет давление в системе труб дегазации с высоким удлинением. Результаты сравниваются с 1D-моделированием и моделированием Монте-Карло той же системы из литературы.
modeldescr_molec/rf_coupler = Молекулярное течение через радиочастотный соединитель\n\nВ этом примере вычисляется вероятность передачи через радиочастотный соединитель с использованием как метода угловых коэффициентов, доступного в интерфейсе свободного молекулярного течения, так и метода Монте-Карло с использованием интерфейса математической трассировки частиц. Рассчитанная вероятность передачи двумя методами находится в отличном согласии, разница менее 1%.\n\nдля этого примера требуется модуль отслеживания частиц.
modeldescr_molec/rotating_plate = Вращающаяся пластина в однонаправленном молекулярном потоке\n\nВ этом примере вычисляется поток частиц, плотность числа и давление на поверхности пластины, которая вращается в узконаправленном молекулярном потоке. Полученные результаты сравниваются с результатами других, приближенных, методов расчета молекулярных потоков.
modeldescr_molec/s_bend_benchmark = Молекулярное течение через S-образный изгиб\n\nВ этом примере вычисляется вероятность прохождения через S-образный изгиб с использованием как метода угловых коэффициентов, доступного в интерфейсе свободного молекулярного течения, так и метода Монте-Карло с использованием интерфейса математической трассировки частиц. Рассчитанная вероятность передачи двумя методами находится в отличном согласии, разница менее 1%.\n\nдля этого примера требуется модуль отслеживания частиц.
modeldescr_molec/s_bend_transitional_flow = Эталонная модель переходного течения через S-образный изгиб \n\nВ COMSOL Multiphysics существует несколько различных способов расчета молекулярного течения в произвольной геометрии. К ним относятся подход Монте-Карло (который вычисляет траектории большого количества рандомизированных частиц в системе) с использованием отслеживания частиц, метод угловых коэффициентов с использованием интерфейса Free Molecular Flow и, наконец, метод дискретной скорости с использованием интерфейса Transitional Flow. Интерфейсы потока для вычисления числовой плотности в пределах произвольной геометрии s-образного изгиба.
modeldescr_molec/vacuum_capillary = Молекулярное течение через микрокапилляр \n\nМолекулярное течение вниз по цилиндру был одной из первых задач в этой области, которую нужно было решать аналитически. В этой эталонной задаче вычисляется вероятность прохождения молекулярного течения по капиллярной трубе переменной длины, и результаты сравниваются с аналитическим решением.
modeldescr_molec/water_adsorption_desorption = Адсорбция и десорбция воды в вакуумной системе с блокировкой нагрузки \n\nВ этом примере показано, как смоделировать зависимую от времени адсорбцию и десорбцию воды в вакуумной системе при низких давлениях. Вода вводится в систему при открытии задвижки шлюза и моделируется последующая миграция и перекачка воды.
modeldescr_molec/uhv_cvd = Сверхвысокий вакуум, химическое осаждение из паровой фазы\n\nВ этом примере показано, как смоделировать рост кремниевых пластин с использованием нескольких видов в интерфейсе свободного молекулярного течения. для турбонасоса исследовано несколько кривых откачки.

# Multibody Dynamics Module apps
applicationdescr_mbd/centrifugal_governor_simulator = Симулятор центробежного регулятора\n\nЦентробежные регуляторы, особый тип регулятора, контролируют скорость двигателя, регулируя количество подаваемого топлива. Чтобы поддерживать практически постоянную скорость независимо от нагрузки или условий подачи топлива, центробежные регуляторы используют принцип пропорционального управления. Пока регулятор находится в работе, очень важно, чтобы он быстро достиг новой установившейся конфигурации. Следовательно, конструкция пружины и демпфера важна. \n\nВ приложении Centrifugal Government Simulator вы можете выполнить анализ твёрдого тела подпружиненного центробежного регулятора, чтобы найти движение втулки, положение равновесия втулки и собственную частоту системы. Вы можете сделать это, выполнив анализ переходных процессов для расчета движения втулки и траектории шаров, стационарный анализ для расчета равновесной конфигурации регулятора или анализ собственных частот для расчета формы режима регулятора и его характеристик демпфирования. коэффициент демпфирования, а также плотность шаров и их соединений.
applicationdescr_mbd/rigid_body_system_simulator = Симулятор системы твёрдого тела\n\nЭто приложение моделирует систему твёрдого тела, соединенную через шарнирные, призматические и шаровые шарниры. Можно выполнить кинематический и динамический анализ этой системы. Информация о геометрии предоставляется с точки зрения местоположения узла и возможности подключения. На твёрдых телах могут быть заданы начальные значения и различные граничные условия. Движением суставов можно управлять с помощью различных условий суставов, таких как ограничения и пружины. Могут быть выполнены как переходные, так и стационарные параметрические анализы. В результате анализа можно оценить конфигурацию системы, траекторию различных точек, движение суставов, силы суставов и моменты суставов.
applicationdescr_mbd/truck_mounted_crane_analyzer = Анализатор кранов на грузовиках\n\nЭто приложение демонстрирует следующее:\n\n• Использование ручки form object\n• Обновление геометрии путем вращения ручки\n• Предоставляет информацию, если результаты выше или ниже определенных критических значений значения\n\nМногие грузовые автомобили оснащены кранами для погрузки-разгрузки грузов, и такие краны имеют ряд гидравлических цилиндров, которые управляют движением крана. Эти цилиндры и другие компоненты, составляющие кран, подвергаются большим нагрузкам при работе с тяжелыми грузами. Чтобы определить грузоподъемность крана, необходимо вычислить эти силы.\n\nВ приложении выполняется анализ твёрдого тела крана, чтобы найти грузоподъемность для заданной ориентации и выдвижения крана. кран.\n\nВходные данные включают угол между стрелами, общую длину выдвижения, мощность внутренних и внешних цилиндров стрелы, а также мощность цилиндров выдвижения. Результаты приложения включают грузоподъемность и использование гидравлического цилиндра.

# Multibody Dynamics Module models
modeldescr_mbd/andrews_mechanism = Механизм сжатия Эндрю's Squeezing Mechanism\n\nThis example illustrates the modeling of Andrew's, также известный как механизм семи тел, эталонная задача для динамики многотельных тел. Звенья в механизме жесткие, а для установления связей между ними используются десять шарнирных соединений. Полученные результаты, различные углы в механизме, сравниваются с результатом из эталона.
modeldescr_mbd/bevel_gear_pair = Силы и моменты на конических шестернях\n\nЭтот пример иллюстрирует моделирование пары прямых конических конических шестерен. Шестерни моделируются жесткими и соединены через зубчатую пару. Исследование переходных процессов проводится для расчета сил и моментов, испытываемых фиксированной передачей. Полученные результаты сравниваются с результатами из справочника.
modeldescr_mbd/centrifugal_governor = Подпружиненный центробежный регулятор\n\nЭтот пример иллюстрирует моделирование подпружиненного центробежного регулятора. Компоненты механизма моделируются как гибкие элементы. Соединения между различными компонентами моделируются с помощью шарнирных соединений и призматических соединений. Пружина и приборная панель на призматическом шарнире служат для управления движением механизма.
modeldescr_mbd/centrifugal_governor_simulator_embedded = Симулятор центробежного регулятора\n\nЦентробежные регуляторы, особый тип регулятора, контролируют скорость двигателя, регулируя количество подаваемого топлива. Чтобы поддерживать практически постоянную скорость независимо от нагрузки или условий подачи топлива, центробежные регуляторы используют принцип пропорционального управления. Пока регулятор находится в работе, очень важно, чтобы он быстро достиг новой установившейся конфигурации. Следовательно, конструкция пружины и демпфера важна. \n\nВ приложении Centrifugal Government Simulator вы можете выполнить анализ твёрдого тела подпружиненного центробежного регулятора, чтобы найти движение втулки, положение равновесия втулки и собственную частоту системы. Вы можете сделать это, выполнив анализ переходных процессов для расчета движения втулки и траектории шаров, стационарный анализ для расчета равновесной конфигурации регулятора или анализ собственных частот для расчета формы режима регулятора и его характеристик демпфирования. коэффициент демпфирования, а также плотность шаров и их соединений.
modeldescr_mbd/crane_link_optimization = Оптимизация механизма звеньев крана\n\nВ этом примере оптимизируется геометрия звеньевого механизма. Целью является снижение необходимой силы в гидроцилиндре при подъеме заданного груза в несколько положений крана.
modeldescr_mbd/crooked_four_bar_mechanism = Четырехстержневой механизм с дефектом сборки \n\nЭто эталонная задача для гибкой динамики многотельных тел. Здесь изучен четырехзвенный механизм, у которого одно из шарниров имеет дефект. Звенья в механизме гибкие, так как движение в механизме возможно только тогда, когда звенья деформируются. для установления соединений между звеньями используются четыре шарнирных соединения. Деформация вне плоскости в двух разных местах сравнивается с эталонным результатом.
modeldescr_mbd/differential_gear = Механизм дифференциальной передачи\n\nЭтот пример иллюстрирует моделирование механизма дифференциальной передачи, обычно используемого в автомобиле. для моделирования дифференциала используются пять комплектов прямоконических шестерен. Соотношение угловых скоростей двух выходных валов дифференциала варьируется для имитации движения транспортного средства как по прямой, так и по криволинейной траектории. Проведено исследование переходного процесса для расчета угловой скорости всех шестерен и вращения крестовин вокруг собственной оси.
modeldescr_mbd/double_pendulum = Динамика двойного маятника\n\nЭтот пример иллюстрирует динамическое моделирование многотельного двойного маятника. Оба плеча в разных случаях моделируются как гибкие элементы, а также как жесткие элементы. В этом примере демонстрируются различные функции соединений, такие как состояние остановки, состояние блокировки, пружина–демпфер и заданное движение.
modeldescr_mbd/elastic_roller_chain = Анализ напряжения узла звездочки роликовой цепи\n\nВ этом примере демонстрируется анализ напряжения узла звездочки упругой цепи. Система состоит из роликовой цепи, намотанной на две звездочки в 3D. Все компоненты систем предполагаются упругими телами. На ведущую звездочку задается угловая скорость, а на ведомую звездочку прикладывается момент нагрузки. Анализ переходных процессов выполняется для понимания траектории нагрузки, контактных сил, распределения напряжений в различных компонентах цепной передачи.
modeldescr_mbd/gear_rattle_with_bearing_misalignment = Вибрация вала из-за дребезжания шестерен и смещения подшипников \n\nВ коробке передач вибрации из-за дребезжания шестерен и смещения подшипников являются хорошо известными источниками шума. В данном примере рассматриваются два вала, соединенные через пару шестерен. Валы на своих концах опираются на роликовые подшипники. Первоначально ведомый вал разгружен, а ведущий вращается с переменной скоростью. Из-за люфта в шестернях зацепление зубьев становится прерывистым, что вызывает вибрацию валов. Через некоторое время на ведомый вал нагружается крутящий момент, обеспечивающий плавное зацепление зубьев в шестернях. Чтобы проанализировать влияние несоосности на вибрации ротора, проводится временной анализ для двух случаев. В первом случае все подшипники соосны с валами, а во втором случае один из подшипников имеет небольшой угловой перекос. Результаты показывают большие крутильные и осевые вибрации вала при наличии смещения.
modeldescr_mbd/gear_train = Вибрации в составной зубчатой передаче\n\nЭтот пример иллюстрирует моделирование прямозубой зубчатой передачи. Анализ переходных процессов выполняется для расчета угловой скорости всех шестерен, а также сил и моментов, испытываемых всеми шестернями. Зубчатое зацепление предполагается упругим, а для расчета жесткости зубчатого зацепления используется контактное моделирование. Проведен параметрический анализ для расчета жесткости зубчатого зацепления в зависимости от вращения шестерни за один цикл зацепления.
modeldescr_mbd/gearbox_vibration_noise = Моделирование вибрации и шума в коробке передач\n\nЭтот пример иллюстрирует моделирование вибрации и шума в 5-ступенчатой ​​синхронизированной коробке передач автомобиля с механической коробкой передач. Анализ переходных процессов выполняется для расчета вибраций коробки передач при заданной частоте вращения двигателя и внешней нагрузке. Нормальное ускорение корпуса коробки передач преобразуется в частотную область и используется в качестве источника шума. Затем выполняется акустический анализ для расчета уровней звукового давления в ближнем, дальнем и внешнем полях.
modeldescr_mbd/gearbox_vibration_noise_bearing = Моделирование вибрации и шума в коробке передач: версия подшипника \n\nЭтот пример является расширением модели, используемой для изучения вибрации и шума в 5-ступенчатой синхронизированной коробке передач в автомобиле с механической коробкой передач. В этом варианте модели вместо шарнирных соединений использовано детальное изображение роликового подшипника. Сначала вибрация коробки передач вычисляется с помощью анализа зависимости от времени для заданной частоты вращения двигателя и внешней нагрузки. Затем вычисляется представление в частотной области нормального ускорения корпуса коробки передач для использования в качестве источника шума. Наконец, проводится акустический анализ для определения уровней звукового давления в ближнем, дальнем и внешнем полях.
modeldescr_mbd/gearbox_vibration_noise_cms = Моделирование вибрации и шума в коробке передач: CMS Version\n\nЭтот пример иллюстрирует моделирование вибрации и шума в 5-ступенчатой синхронизированной коробке передач автомобиля с механической коробкой передач. По сути, это тот же пример, что и «Моделирование вибрации и шума в коробке передач», но некоторые упругие компоненты сведены к эффективным в вычислительном отношении моделям низшего порядка с использованием метода синтеза режимов компонентов (CMS).
modeldescr_mbd/golf_swing_mechanics = Механика удара в гольфе\n\nТо, как вы размахиваете клюшкой для гольфа, влияет на результат удара. В этом примере представлен многочастичный анализ удара в гольфе с целью максимизировать скорость головки клюшки непосредственно перед ударом по мячу. Крутящий момент запястья, который играет важную роль в улучшении результата удара, варьируется параметрически, чтобы увидеть его влияние на скорость головки клюшки.
modeldescr_mbd/gyroscope = Моделирование гироскопического эффекта\n\nВ этом примере демонстрируется моделирование механического гироскопа и анализируется реакция вращающегося диска на внешний крутящий момент, воздействующий на диск вследствие вращения рамы. Также сравнивается изменение ориентации вращающегося диска, когда диск не вращается. Во второй части модели анализируется прецессия и нутация волчка под действием внешнего крутящего момента.
modeldescr_mbd/helical_gear_pair = Динамика косозубых шестерен\n\nЭтот пример иллюстрирует моделирование пары косозубых шестерен. Зубчатое зацепление предполагается жестким и упругим в двух различных случаях. Проведено исследование переходных процессов для анализа влияния жесткости зубчатого зацепления и жесткости соединений на контактную силу и угловую скорость шестерен. Анализ собственных частот также выполняется для расчета собственных частот и форм колебаний зубчатой ​​передачи как для жесткого, так и для упругого зубчатого зацепления.
modeldescr_mbd/helicopter_swashplate = Механизм автомата перекоса вертолета\n\nЭтот пример иллюстрирует моделирование механизма автомата перекоса, используемого для управления ориентацией лопастей несущего винта вертолета. Лопасти ротора моделируются как жесткие, так и гибкие в двух разных случаях. Рассчитана деформация лопастей несущего винта, вращающихся вокруг двух разных осей. Остальные части механизма моделируются жесткими. Также проведен анализ собственных частот этого механизма.
modeldescr_mbd/hinge_joint_assembly = Сборка с помощью шарнирного соединения\n\nПетля между двумя механическими компонентами моделируется с использованием шарнирного соединения. Конструкция анализируется как с гибкими частями, так и с одной частью жесткой.
modeldescr_mbd/hopping_hoop = Динамика прыжкового обруча\n\nВ этом примере моделируется динамика прыжкового обруча. Катящееся кольцо с точечной массой по периметру может при определенных условиях отскочить от поверхности, по которой оно катится.
modeldescr_mbd/induction_motor_vibration = Моделирование вибрации в асинхронном двигателе \n\nЭто пример модели асинхронного двигателя, в котором вихревые токи индуцируются в роторе гармоническими по времени токами на обмотках статора и вращением ротора. Воздушный зазор между ротором и статором предполагается асимметричным, и анализируются результирующие вибрации в двигателе. \n\nВ этом примере электромагнитное моделирование асинхронного двигателя выполняется в 2D, тогда как моделирование динамики многотельных систем выполняется в 3D. Вращающий момент, когда переменный ток проходит через обмотки статора, вычисляется как функция времени и используется в динамике многотельных тел для расчета скорости ротора с учетом инерционных эффектов.
modeldescr_mbd/landing_gear = Напряжения и тепловыделение в шасси\n\nЭтот пример иллюстрирует многочастичное динамическое моделирование шасси. Амортизатор моделируется с помощью призматического соединения с прикрепленными к нему пружиной и демпфером. Исследованы тепловыделение и повышение температуры за счет диссипации энергии в амортизаторе.
modeldescr_mbd/lumped_human_body = Сосредоточенная модель человеческого тела\n\nВ этом примере анализируется сосредоточенная модель человеческого тела, имеющая пять степеней свободы. Модель учитывает взаимодействие обуви и земли с телом человека. Узлы «Масса», «Пружина» и «Демпфер» интерфейса «Сосредоточенная механическая система» используются для моделирования тела, включая башмак и землю. Сначала проводится исследование собственных частот, чтобы определить собственные частоты системы, а затем выполняется анализ частотной характеристики для расчета реакции системы на определенное базовое возбуждение.
modeldescr_mbd/lumped_vehicle_suspension_system = Сосредоточенная модель системы подвески транспортного средства\n\nВ этом примере анализируется сосредоточенная модель системы подвески транспортного средства, имеющая одиннадцать степеней свободы. Узлы «Масса», «Пружина» и «Демпфер» интерфейса «Сосредоточенная механическая система» используются для моделирования колес, включая систему подвески, а также сидений с пассажиром. Кузов транспортного средства, имеющий три степени свободы, моделируется как твердое тело в интерфейсе Multibody Dynamics. \n\nУзел «Внешний источник» интерфейса «Сосредоточенная механическая система» используется для соединения модели MBD кузова транспортного средства с сосредоточенной моделью остальной части системы. Анализ переходных процессов выполняется для расчета движения транспортного средства, а также уровней вибрации сиденья для данного профиля дороги.
modeldescr_mbd/mechanism_submerged_in_fluid = Механизм, погруженный в жидкость\n\nЭтот пример иллюстрирует моделирование многотельного механизма, погруженного в жидкость. Рассматриваемый здесь механизм состоит из двух ребер, соединенных с центральным твердым телом через шарнирные соединения. Задача взаимодействия переходной жидкости –structure решается для моделирования поведения плавания, при котором вращение плавника создает поступательную скорость в механизме. пары между жидкой и твердой границами. Предполагается двунаправленная связь между течением жидкости и многотельной моделью механизма.
modeldescr_mbd/pm_motor_2d_structure_interaction = Magnetic–Взаимодействие структуры в двигателе с постоянными магнитами\n\nВ этом примере демонстрируется связь между динамикой многих тел и вращающимся оборудованием, магнитным полем для выполнения электромагнитного и механического анализа. Двигатель с постоянными магнитами с 10 полюсами ротора и 12 пазами статора моделируется в 2D. Магниты прикреплены по окружности ротора. для моделирования связи магнитной структуры, интегрированной с движущейся сеткой, электромагнитная сила передается ротору, а движение ротора передается движущейся сетке. Зависящая от времени задача расчета плотности магнитного потока и смещения решается для трех полных электрических периодов.
modeldescr_mbd/power_switch_multibody = Электродинамика выключателя питания — Multibody Version\n\nЭлектрические события, такие как перегрузка по току или перегрузка, могут серьезно повредить электрические цепи или линии электропередачи. Чтобы избежать дорогостоящей замены ответственных деталей, можно установить автоматические выключатели с электрическим выключателем. Они механически прерывают ток или всплеск, перемещая плунжер, как только достигается критический ток. В отличие от предохранителя, который необходимо заменить после его срабатывания для защиты окружающих электрических компонентов, автоматический выключатель можно сбросить. \n\nОсновная цель этой учебной модели — изучить принцип работы и некоторые возможные решения для моделирования одного класса автоматических выключателей: магнитных силовых выключателей. Это электромеханическое устройство, в котором железные плунжеры перемещаются за счет магнитного притяжения, создаваемого током, протекающим в окружающих его катушках. Выключение управляющего тока возвращает переключатель в исходное состояние. \n\nМодель моделирует динамику твёрдого тела под воздействием магнитных сил, наведенных токов и пружин/ограничивающих устройств, которые удерживают плунжер в равновесном положении. Медная катушка помещается на центральную ножку нижнего E-сердечника и фиксируется. Когда ток протекает в катушке, на верхний Е-сердечник (подвижный плунжер), который удерживается на месте предварительно напряженной пружиной, действует сила притяжения. Когда сила достигает порогового значения, плунжер перемещается в сторону нижнего Е-сердечника, закрывая воздушный зазор. Модель показывает, как правильно моделировать движение и время закрытия, которое зависит от жесткости пружины.
modeldescr_mbd/radial_cam_follower = Моделирование механизма открытия клапана на основе радиального кулачка \n\nВ этом примере изучается подпружиненный механизм открытия клапана, имеющий коромысло и радиальный кулачок. Все компоненты системы смоделированы жесткими и соединены между собой призматическими, шарнирными и пазовыми соединениями. Соединение кулачка и толкателя, а также другие шарнирные соединения моделируются с использованием встроенных узлов интерфейса Multibody Dynamics.\n\nАнализ переходных процессов выполняется для различных значений жесткости пружины. Выходные данные модели включают, среди прочего, скорость ведомого механизма, ускорение ведомого механизма, силу соединения кулачкового толкателя и необходимый крутящий момент.
modeldescr_mbd/reciprocating_engine = Трехцилиндровый поршневой двигатель\n\nЭтот пример иллюстрирует моделирование трехцилиндрового поршневого двигателя. В первой части модели изменение давления в цилиндре в зависимости от вращения коленчатого вала вычисляется с помощью термодинамического анализа. Во второй части модели выполняется гибкий многотельный динамический анализ с использованием ранее сгенерированных данных о давлении для получения числа оборотов коленчатого вала, выходной мощности двигателя и напряжений в гибком шатуне. Все компоненты двигателя считаются жесткими, за исключением одного шатуна. Соединения между различными компонентами моделируются с помощью призматических и шарнирных соединений.
modeldescr_mbd/roller_bearing_dynamics = Динамика цилиндрического роликового подшипника\n\nЭта модель имитирует динамику системы цилиндрических роликоподшипников. Система состоит из цилиндрических роликовых элементов, вставленных между внутренним и внешним кольцами и удерживаемых на месте сепаратором. Все компоненты системы предполагаются жесткими. Предполагается, что внутреннее кольцо связано с валом, вращающимся с заданной скоростью, а внешнее кольцо - с неподвижным основанием. \n\nФрикционный контакт между роликами и кольцами моделируется с использованием контакта твёрдого тела с трением. Соединение роликов с сепаратором упрощается за счет шарнирных соединений. К внутреннему кольцу прикладывается внешняя нагрузка, и проводится исследование переходных процессов для анализа поперечной динамики внутреннего кольца, динамики роликов и сепаратора, сил контакта и трения, а также рассеяния энергии из-за трения.
modeldescr_mbd/roller_chain_dynamics = Динамика сборки звездочки роликовой цепи\n\nВ этом примере моделируется динамика сборки цепной звездочки. Система состоит из роликовой цепи, намотанной на две звездочки в 2D. Роликовая цепь сконструирована путем объединения жестких роликовых пластин и пальцевых пластин таким образом, что относительное вращение между звеньями цепи не ограничено. Эта цепь служит для передачи вращательного движения между двумя звездочками, расположенными на расстоянии. \n\nНа ведущей звездочке задается угловая скорость, а на ведомой звездочке прикладывается момент нагрузки. С помощью исследования переходных процессов динамика системы анализируется для двух случаев; при нагрузке и разгрузке ведомого вала. Результаты показывают сравнение движения звеньев цепи, контактных сил и других параметров для обоих случаев.
modeldescr_mbd/roller_conveyor_dynamics = Динамика роликового конвейера\n\nЭта модель моделирует динамику роликового конвейера, транспортирующего сферический объект или шар. Шар помещается на один конец роликового конвейера, а затем транспортируется на другой конец, где он собирается в прямоугольный лоток. Конвейерная система состоит из цилиндрических роликов, вставленных между двумя рамами. Направляющие предусмотрены с обеих сторон конвейера, чтобы предотвратить падение шарика. Все компоненты системы предполагаются жесткими. Предполагается, что ролики подключены к источнику энергии для вращения с заданной скоростью, тогда как рама, направляющие и лоток зафиксированы. \n\nФрикционный контакт между шариком и роликами моделируется с использованием контакта твёрдого тела с трением. Подобные контакты также используются между шаром и другими компонентами, а именно направляющими и лотком. Соединение роликов с рамой упрощается за счет шарнирных соединений. Исследование переходных процессов проводится для анализа динамики системы, а также для определения контактных сил, сил трения и рассеяния энергии из-за трения.
modeldescr_mbd/seated_human_body = Биомеханическая модель тела человека в положении сидя\n\nРазработана биомеханическая модель тела человека для оценки динамической реакции на вертикальные колебания в положении сидя. Интерфейс Multibody Dynamics используется для моделирования различных частей и соединений человеческого тела, а также для изучения вибраций всего тела (WBV).
modeldescr_mbd/slider_crank_mechanism = Кривошипно-шатунный механизм \n\nЭто эталонная задача для динамики многотельных тел, в которой изучается кривошипно-ползунный механизм. Звенья в механизме жесткие. для создания соединений между звеньями используются два шарнирных соединения и уменьшенное пазовое соединение. Временная история ускорения в определенной точке сравнивается с результатом из эталона.
modeldescr_mbd/slider_crank_mechanism_with_clearance = Кривошипно-ползунный механизм с зазором шарнира\n\nЭта модель моделирует динамическое поведение кривошипно-шатунного механизма с зазором шарнира. Все детали механизма считаются жесткими. для соединения опоры, кривошипа и шатуна между собой используются два шарнирных соединения. для моделирования соединения шатуна и ползунка рассматриваются два разных случая. В первом случае предполагается, что соединительный стержень –скользящий шарнир представляет собой идеальный шарнир без какого-либо зазора. Во втором случае используется зазорное соединение, которое позволяет соединяемым компонентам перемещаться в пределах предусмотренного зазора. Анализ переходных процессов выполняется для анализа влияния зазора шарнира на скорость ползуна, ускорение ползуна и момент кривошипа.
modeldescr_mbd/spring_loaded_slider = Динамическое поведение подпружиненного вращающегося ползунка\n\nЭтот пример иллюстрирует моделирование движения ползунка вследствие вращения основания. Призматическое соединение, которое используется для соединения двух компонентов, подпружинено и обладает демпфирующим эффектом. Движение ползунка сравнивается с аналитическим решением, которое также вычисляется одновременно с использованием ОДУ.
modeldescr_mbd/stewart_platform = Моделирование платформы Стюарта\n\nВ этом примере моделируется платформа Стюарта, имеющая шесть призматических приводов. Моделируются три линейных движения (боковое, продольное, вертикальное) и три вращения (тангаж, крен, рыскание). Демонстрируется механизм управления для получения желаемого движения, которое может представлять собой комбинацию этих линейных и вращательных движений.
modeldescr_mbd/truck_mounted_crane = Автокран\n\nМногие грузовики оборудованы кранами для погрузочно-разгрузочных работ. Такие краны имеют несколько гидравлических цилиндров, управляющих движением, и несколько механизмов. \n\nВ этом примере выполняется анализ твёрдого тела крана, чтобы найти силы в цилиндрах и оси во время цикла нагрузки.
modeldescr_mbd/truck_mounted_crane_analyzer_embedded = Автокран\n\nМногие грузовики оборудованы кранами для погрузочно-разгрузочных работ. Такие краны имеют несколько гидравлических цилиндров, управляющих движением, и несколько механизмов. \n\nВ этом примере выполняется анализ твёрдого тела крана, чтобы найти силы в цилиндрах и оси во время цикла нагрузки.
modeldescr_mbd/washing_machine_vibration = Вибрация в сборке стиральной машины\n\nВ этом примере моделируется упрощенная модель многочастичной динамики портативной стиральной машины с горизонтальной осью. Анализ собственных частот выполняется для расчета собственных частот и форм колебаний всей сборки. Анализ переходных процессов выполняется для выявления вибраций, возникающих в корпусе, смоделированном как гибкая оболочка, во время цикла вращения. Также анализируются радиальное и осевое смещение барабана, а также рассеивание энергии в стойках.
modeldescr_mbd/washing_machine_walk = Неустойчивость ходьбы в стиральной машине\n\nВ этом примере моделируется упрощенная модель портативной стиральной машины с горизонтальной осью и прогнозируется возникновение нестабильности ходьбы во время цикла отжима. Анализируется вращательное скольжение машины, которое является важной проблемой при проектировании, а также описывается метод активной балансировки на основе управления для устранения нестабильности и вибраций, присутствующих в системе.

# Nonlinear Structural Materials Module apps
applicationdescr_nsm/stress_analysis_of_a_pressure_vessel = Анализ напряжения сосуда под давлением\n\nСосуд под давлением предназначен для хранения жидкостей или газов при значительно более высоком или более низком давлении, чем давление окружающей среды. Большая разница давлений требует правильной конструкции, чтобы избежать катастрофических отказов. \n\nПриложение «Анализ напряжения сосуда под давлением» — это пример того, как можно разработать инструмент для проверки семейства компонентов с параметрируемой геометрией. Цель приложения — определить, сможет ли сосуд выдержать приложенное внутреннее давление, не превышая заданного предела объёмной доли материала, превысившего предел текучести. Приложение определяет ортотропную пластичность с использованием ортотропного критерия Хилла.\n\nВы можете настроить геометрические параметры сосуда, внутреннее давление, свойства материала и объёмную долю сосуда, которая может превышать предел текучести. Результаты приложения включают давление, при котором возникает первоначальный выход, объёмную долю выработанного продукта ниже допустимого предела и давление, при котором объёмная доля выработанного продукта достигает заданного предела.

# Nonlinear Structural Materials Module models
modeldescr_nsm/arterial_wall_mechanics = Механика артериальных стенок\n\nВ этом примере используется анизотропная модель материала Holzapfel–Gasser–Ogden, чтобы показать, как реализовать гиперэластичный материал для моделирования коллагеновых мягких тканей стенок артерий.
modeldescr_nsm/arterial_wall_viscoelasticity = Вязкоэластичность артериальной стенки\n\nАнизотропные гиперэластические материалы используются для моделирования коллагеновых мягких тканей в стенках артерий. Модель «Механика артериальной стенки» описывает участок артерии на основе модели гиперэластичного материала Holzapfel–Gasser–Ogden. В этом примере изучается динамическое поведение артерии. В частности, модель вычисляет вязкоупругий отклик, добавляя к гиперэластичному материалу пятиветвевую характеристику вязкоупругости.
modeldescr_nsm/balloon_inflation = Надувание сферического резинового шара\n\nВ этом примере исследуется надувание сферического резинового шара для четырех различных моделей гиперупругого материала: Нео-Хука, Муни–Ривлин, Огден и Варга.
modeldescr_nsm/balloon_inflation_shell_membrane = Надувание сферического резинового воздушного шара — Версия оболочки и мембраны\n\nЭта версия модели надувания воздушного шара демонстрирует, как интерфейсы оболочки и мембраны можно использовать для моделирования тонких гиперэластичных структур.
modeldescr_nsm/bar_necking = Сжатие упругопластического металлического стержня\n\nКруглый металлический стержень из упругопластического материала с нелинейным изотропным упрочнением подвергается одноосному растяжению. Фиксируется явление образования шейки и моделируется его рост. Этот пример является классическим эталоном пластичности при больших деформациях.
modeldescr_nsm/biomedical_stent = Пластическая деформация при расширении биомедицинского стента\n\nСтент представляет собой трубку из проволочной сетки, используемую для открытия коронарной артерии во время ангиопластики, процесса удаления или сжатия бляшек. Расширенный стент действует как каркас, удерживающий кровеносный сосуд открытым. При этой процедуре повреждение артерии может быть нанесено как неравномерным расширением стента, так и его ракурсом. В этом примере изучается деформация стента, подвергающегося радиальному внешнему давлению, с использованием модели упругопластического материала с линейным упрочнением.
modeldescr_nsm/biventricular_cardiac_model = Модель бивентрикулярного сердца\n\nСтандартная бивентрикулярная модель сердца используется, чтобы показать, как настроить направления волокон в сложной геометрии. Затем волокна используются для моделирования большой деформации миокарда с помощью модели анизотропного материала Holzapfel–Gasser–Ogden.
modeldescr_nsm/buckling_hdpe_liner = Выпучивание вкладышей из ПЭВП\n\nВ этом примере модель материала Bergstrom–Bischoff используется для моделирования зависимого от температуры и деформации поведения полиэтилена высокой плотности (HDPE), используемого, например, для изготовления облицовок поврежденных труб в нефтегазовой отрасли или для изготовления резервуаров для хранения водорода типа IV для топливных элементов. В обоих случаях хвостовик склонен к разрушению из-за проникновения газа между хвостовиком и несущей конструкцией. Эта модель предсказывает давление разрушения для различных рабочих температур.
modeldescr_nsm/chloroprene_rubber_compression_test = Испытание на сжатие хлоропренового каучука\n\nВ этом примере модель материала Бергстрома–Бойса используется для определения неравновесного поведения хлоропренового каучука, наполненного углеродной сажей, при истории деформации, которая чередует сжатие с релаксацией. Результаты сверены с экспериментальными и численными результатами, взятыми из литературы.
modeldescr_nsm/combined_creep = Объединение моделей материалов Creep\n\nЭтот пример иллюстрирует, как объединить различные модели материалов Creep. Здесь модель Нортона–Бейли (первичная ползучесть) сочетается с моделью Нортона (вторичная ползучесть). Этот пример является продолжением модели термической ползучести.
modeldescr_nsm/compressed_elastoplastic_pipe = Сжатие упругопластовой трубы\n\nЧтобы загерметизировать сломанную трубу, ее сжимают между двумя жесткими инденторами до тех пор, пока она не станет почти плоской. Эта операция приводит к очень большим пластическим деформациям.
modeldescr_nsm/die_forming = Die Forming\n\nВ этом примере исследуется формование пластикового металлического листа с использованием цилиндрического жесткого пуансона и явление упругого возврата, возникающее в процессе.
modeldescr_nsm/elastoplastic_plate = Упругопластический анализ перфорированной пластины\n\nВ этом примере показан анализ перфорированной пластины, загруженной в пластический режим. Часть примера является эталонной, но также изучаются разгрузка пластины и остаточные напряжения.\n\nВо второй части примера показано, как можно использовать функцию упрочнения, основанную на измеренной кривой напряжения–деформации.
modeldescr_nsm/elastoplastic_creep = Объединение моделей упругопластики и ползучести \n\nВ этом примере показано, как выполнить анализ напряжений нелинейной модели материала, включая ползучесть и упругопластичность. Модель является эталоном NAFEMS.
modeldescr_nsm/frame_with_cutout_plasticity = Скручивание и изгиб металлического каркаса\n\nТонкостенный металлический каркас с центральным вырезом, смоделированный с помощью интерфейса Shell, подвергается скручиванию и изгибу. Вокруг выреза напряжения превышают предел текучести, и материал подвергается пластической деформации. Исследованы остаточные напряжения и пластические деформации после снятия нагрузки.
modeldescr_nsm/thin_layer_interfaces = Thin Layer Interfaces\n\nЭта модель демонстрирует альтернативные реализации, используемые для описания тонкого слоя, и влияние выбора на непрерывность полей перемещений и напряжений. Показано, как можно получить идеальный интерфейс, асимптотически изменяя параметры материала.
modeldescr_nsm/golf_ball_impact = Анализ удара мяча для гольфа\n\nВ этом примере изучается механическое воздействие клюшки для гольфа, ударяющей мяч для гольфа. Контакт между двумя частями моделируется с использованием формулы вязкого штрафа для стабилизации динамического события. Чтобы правильно смоделировать большую деформацию, мяч для гольфа определяется с использованием модели гиперупругого материала. Материал сердцевины является вязкоупругим, что приводит к рассеиванию упругой энергии, создаваемой ударом. \n\nРезультаты моделирования сравниваются с типичными показателями гольфа, такими как скорость мяча и скорость вращения.
modeldescr_nsm/hydrogel_swelling = Сильное набухание полимерных гидрогелей\n\nПолимерные гидрогели состоят из сшитой сети длинноцепочечных полимеров, впитавших большое количество молекул растворителя. Такие материалы используются во многих биомедицинских приложениях, таких как адресная доставка лекарств, тканевая инженерия и чувствительные к стимулам актуаторы. Эта эталонная модель демонстрирует, как моделировать сильное набухание в полимерных гидрогелях путем реализации теории связанных полей большой деформации и диффузии растворителя, основанной на работе Хонга, Чжао, Чжоу и Суо, JMPS 56:1779-1793 (2008).
modeldescr_nsm/hyperelastic_seal = Hyperelastic Seal\n\nУплотнение моделируется с использованием модели гиперупругого материала с большими деформациями. Модель сравнивает жесткость с учетом внутреннего давления и без него.
modeldescr_nsm/lemaitre_chaboche_viscoplastic_model = Lemaitre–Chaboche Viscoplasty Model\n\nБольшинство металлов и сплавов при высоких температурах подвергаются вязкопластической деформации. В случае циклического нагружения для описания таких эффектов, как храповик, циклическое размягчение или упрочнение, а также релаксация напряжения, необходим материальный закон как с изотропным, так и с кинематическим упрочнением.\n\nВ этом примере показано, как реализовать Lemaitre–Вязкопластический конститутивный закон Шабоша как сочетание изотропного упрочнения и нелинейного кинематического упрочнения. Эта вязкопластическая модель обычно используется в таких областях, как аддитивное производство, лазерная сварка, лазерная резка и термическая обработка металлов и сплавов при высоких температурах.
modeldescr_nsm/membrane_airbag_inflation_hyperelastic = Надувание квадратной гиперэластичной подушки безопасности\n\nКвадратная подушка безопасности, изготовленная из неогуковского гиперэластичного материала, надувается при постоянном давлении воздуха. В некоторых областях подушки безопасности материал сморщивается по мере развития отрицательных главных напряжений. \n\nВ этом примере модель сморщивающейся мембраны в рамках теории поля натяжения дает правильное описание распределения напряжений и структуры складок в надутой мембране.
modeldescr_nsm/membrane_varying_thickness = образование складок цилиндрических мембран различной толщины \n\nВ этом примере изучается образование складок неоднородной толстой мембраны из несжимаемого материала Муни–Ривлин. Определенная часть мембраны подвергается сморщиванию при предварительном растяжении и надувании, которое исчезает в зависимости от внутреннего давления. \n\nРезультаты метода градиента деформации сравниваются с результатами метода релаксированной энергии деформации.
modeldescr_nsm/orthotropic_container = Ортотропный контейнер под давлением\n\nВ этом примере вычисляются напряжение и пластическая деформация в тонкостенном контейнере из катаной стали, подвергнутом внутреннему избыточному давлению. Материал представлен упругой изотропной моделью в сочетании с ортотропной пластичностью Хилла. Этот пример также иллюстрирует, как обрабатывать конструкции, поведение материала которых зависит от формы, например стальной прокат или композиты. Здесь основные направления материала повторяют геометрическую форму конструкции.
modeldescr_nsm/orthotropic_container_shell = Ортотропный контейнер под давлением — Shell Version\n\nТонкостенный контейнер из стального проката подвергается внутреннему избыточному давлению. В результате метода изготовления направление вне плоскости имеет более высокий предел текучести, чем два других направления. Ортотропная пластичность Хилла используется для моделирования разницы в пределе текучести. Контейнер представляет собой цилиндр, увенчанный двумя торисферическими головками (также называемыми головками Клёппера).\n\nВ этом примере пластичность моделируется в интерфейсе Shell. Используется осевая симметрия.
modeldescr_nsm/parameter_estimation_hyperelasticity = Оценка параметров гиперупругих материалов\n\nВ этой учебной модели показано, как настроить исследование оценки параметров для подгонки параметров материала гиперупругой модели Огдена к экспериментальным данным. Процедура рассматривает несколько вариантов нагрузки при больших деформациях, что часто необходимо для получения определяющих моделей с хорошими возможностями прогнозирования.
modeldescr_nsm/parameter_estimation_plasticity = Оценка параметров упругопластических материалов\n\nВ этой учебной модели показано, как оценить параметры материала модели упругопластического материала комбинированного упрочнения с учетом данных циклического сдвига.
modeldescr_nsm/parameter_estimation_polymer_viscoplasticity = Оценка параметров вязкопластических полимеров\n\nВ этой учебной модели показано, как оценить параметры вязкопластического материала Бергстрома–Бойса, подходящей для неравновесного моделирования резиноподобных материалов. Данные, используемые для оценки параметров, состоят из циклических испытаний на одноосное растяжение и сжатие при двух разных скоростях деформации. После оценки основных параметров модели формулировка модели расширяется и включает в себя температурную зависимость с использованием дополнительных данных экспериментов по растяжению при различных температурах.
modeldescr_nsm/plastic_strain_mapping = Картирование пластической деформации\n\nВ этом примере показан анализ перфорированной пластины, загруженной в пластический режим. Целью анализа является демонстрация того, как пластические деформации могут быть отображены между разнородными сетками.
modeldescr_nsm/polynomial_hyperelastic = Полиномиальная гиперупругая модель\n\nЭтот пример иллюстрирует, как реализовать модель исходного материала Mooney–Rivlin с двумя и пятью членами, используя определяемую пользователем плотность энергии деформации.
modeldescr_nsm/powder_compaction_of_a_cup = Уплотнение порошка в чашке\n\nФормирование механических компонентов путем прессования металлического порошка является ключевым аспектом порошковой металлургии. В этом примере анализируется уплотнение алюминиевого порошка для формирования осесимметричной чашки. Учитывается трение между металлическим порошком и пресс-формой. для моделирования процесса уплотнения необходимо сочетать материалную модель Drucker-Prager Cap и геометрическую нелинейность.
modeldescr_nsm/compaction_of_a_rotational_flange = Уплотнение вращающегося фланцевого компонента \n\nПроцесс уплотнения порошка становится распространенным в обрабатывающей промышленности благодаря его возможности производить компоненты сложной формы и высокой прочности. В этом примере уплотнение железного порошка с образованием осесимметричного вращающегося фланцевого компонента анализируется с помощью пластиковой модели Capped Drucker–Prager. Учитывается трение между металлическим порошком и матрицей.
modeldescr_nsm/two_stage_compaction = Двухэтапный процесс уплотнения порошка\n\nУплотнение порошка является ключевым процессом в порошковой металлургии, где оно дает возможность производить качественные изделия сложной формы для спекания. Плотность прессовки является ключевым фактором, определяющим общее качество спеченного продукта, поскольку области с более низкой плотностью могут снизить его механическую прочность. \n\nМногостадийный процесс прессования является одним из способов достижения однородной плотности заготовки. В этом примере двухэтапный процесс уплотнения демонстрируется в простой установке, а результат сравнивается с результатами одноэтапного процесса.
modeldescr_nsm/pharmaceutical_tableting_process = Процесс таблетирования фармацевтических препаратов\n\nУплотнение порошка является популярным производственным процессом не только в порошковой металлургии, но и в фармацевтической промышленности. Модель Capped Drucker–Prager обычно используется для моделирования процессов уплотнения фармацевтических порошков, где свойства материала зависят от плотности порошка. В этом примере микрокристаллическая целлюлоза (МКЦ) уплотняется, а составные свойства материала калибруются на основе экспериментальных данных.
modeldescr_nsm/rail_steel = Упруго-акустический эффект в рельсовой стали \n\nВ этом примере изучается упруго-акустический эффект, изменение скорости упругих волн, распространяющихся в конструкции, подвергающейся статическим упругим деформациям. Анализ основан на модели гиперупругого материала Мурнагана и показывает хорошее согласие с опубликованными экспериментальными результатами для рельсовых сталей, обычно используемых в железнодорожных рельсах.
modeldescr_nsm/rubber_boot_seal = Контактный анализ резинового уплотнения пыльника\n\nВ этом примере изучается деформация резинового пыльника, соединенного с жесткой трубой. Когда труба вращается и уплотнение деформируется, фланцы уплотнения самопересекаются, и оно также вступает в контакт с трубой.
modeldescr_nsm/sheet_metal_forming = Формовка листового металла\n\nМоделируется формовка листового металла с использованием жесткого пуансона. Модель вычисляет силы пуансона во время формовки и форму пластины после разгрузки ("springback"). Решения вычисляются с использованием как твердой двумерной плоской деформации, так и трехмерной модели оболочки. Результаты сопоставлены с экспериментальными данными.
modeldescr_nsm/sheet_uniaxial_stretching = Одноосное растяжение прямоугольного листа\n\nЭтот пример демонстрирует образование складок тонкого прямоугольного листа, растянутого в одноосном направлении. Сначала проводится статический анализ для определения области отрицательных главных напряжений без допущения наличия складок. Затем проводится анализ потери устойчивости перед напряжением, чтобы определить потенциальные линеаризованные формы потери устойчивости. Наконец, проводится нелинейный анализ после выпучивания, чтобы исследовать эволюцию складок.
modeldescr_nsm/strain_rate_dependent_plasticity = Испытание на растяжение с пластичностью, зависящей от скорости деформации\n\nВ этом примере испытание на растяжение моделируется при четырех различных скоростях деформации. для моделирования зависимости пластического упрочнения от скорости деформации используется закон Джонсона–Кука.\n\nТакже вычисляются распределение температуры и тепловое расширение, вызванное нагревом, вызванным пластической деформацией. В отдельном исследовании рассматривается влияние включения температурной зависимости в модель Джонсона–Кука.
modeldescr_nsm/sma_stent = Саморасширяющийся стент из сплава с памятью формы\n\nВ этой модели изучается обжатие при низкой температуре стента из сплава с памятью формы с последующим нагревом до температуры тела. Результаты показывают увеличение напряжения при нагревании и давления, оказываемого на внутреннюю стенку артерии.
modeldescr_nsm/small_punch_test = Испытание на малый удар для полиэтилена сверхвысокой молекулярной массы\n\nПолиэтилен сверхвысокой молекулярной массы (СВМПЭ) – это материал, обычно используемый при замене коленных и тазобедренных суставов. “малый перфорационный тест” предназначен для оценки механических свойств с использованием очень маленьких образцов, так что из-за их размера их можно напрямую эксплантировать. В этом примере показано использование модели материала Bergstrom–Bischoff в функции вязкопластичности полимеров, доступной в модуле «Нелинейные конструкционные материалы».
modeldescr_nsm/snap_hook = Snap Hook\n\nЗастежки типа карабина, в которых крючок вставляется в паз, широко распространены в автомобильной промышленности; например, они появляются в панели управления автомобиля. Чтобы получить силу, необходимую для вставки и удаления крючка, в этом примере решается задача нелинейной механики конструкций, включающая большие деформации и контакт между упругим и упругопластическим телом.
modeldescr_nsm/variable_load_creep = Первичная ползучесть при непостоянной нагрузке\n\nЭто тестовая задача NAFEMS, которая иллюстрирует разницу между упрочнением во времени и деформационным упрочнением для первичной ползучести. Исследуются как одноосный, так и двухосный вариант нагружения.
modeldescr_nsm/viscoplastic_solder_joints = Вязкопластическая ползучесть в паяных соединениях\n\nВ этом примере изучается вязкопластическая ползучесть в паяных соединениях при термической нагрузке с использованием модели вязкопластичности Ананда.
modeldescr_nsm/temperature_dependent_plasticity = Температурно-зависимая пластичность в сосуде под давлением\n\nСосуд под давлением подвергается быстрому изменению температуры. Температурные градиенты во время охлаждения вызывают пластические деформации в плакировке из нержавеющей стали, где предел текучести и функции упрочнения зависят от температуры.
modeldescr_nsm/thermally_induced_creep = Термически индуцированная ползучесть\n\nДолговременная ползучесть сферы, подвергающейся воздействию как температуры, так и внутреннего давления. Это эталонная задача NAFEMS с использованием закона Нортона.
modeldescr_nsm/tire_inflation = Накачка шин\n\nЭта модель демонстрирует, как использовать волокна в тонких слоях для моделирования тонких анизотропных композитов, встроенных в твердое тело, без явного рисования слоя материала или армирующих волокон. В частности, это используется для моделирования стальных кордов в ремнях шин, которые используются для обеспечения структурной поддержки шины под протектором. Кроме того, криволинейная система координат используется для определения анизотропных свойств материала слоя каркаса.\n\nМодель также использует степень свободы “twist” в двухмерной осевой симметрии для фиксации азимутального смещения, вызванного ориентацией кордов во время накачивания шины.
modeldescr_nsm/turbine_stator_creep = Анализ ползучести лопатки статора турбины\n\nВ этом примере показано, как рассчитать деформации, вызванные вторичной ползучестью лопатки статора турбины. Скорость ползучести сильно зависит от температуры, поэтому деформация и релаксация напряжений контролируются вычисленным температурным полем.
modeldescr_nsm/uniaxial_loading_of_shape_memory_alloy = Одноосное нагружение сплава с памятью формы\n\nПроведены три исследования для демонстрации свойств блока сплава NiTi, подвергнутого одноосному растяжению–сжатию loading.\n\nПервое параметрическое исследование демонстрирует эффект псевдоупругости при различных температурах. Во втором исследовании добавлен цикл частичной нагрузки–разгрузки. Наконец, третье исследование показывает эффект памяти формы в цикле низкотемпературной нагрузки с последующим повышением температуры.
modeldescr_nsm/uniaxial_loading_of_shape_memory_alloy_souza_auricchio = Одноосное нагружение сплава с памятью формы с использованием модели Souza–Auricchio Model\n\nПроведены три исследования, чтобы показать свойства блока NiTi-сплава, подвергнутого одноосному нагружению. растяжение–сжимающая нагрузка с использованием модели Соузы–Ауриккио.\n\nПервое параметрическое исследование демонстрирует эффект псевдоупругости при различных температурах. Во втором исследовании добавлен частичный цикл нагрузки–разгрузки. Наконец, третье исследование показывает эффект памяти формы в цикле низкотемпературной нагрузки с последующим повышением температуры.

# Optimization Module apps
applicationdescr_opt/general_parameter_estimation = Общая оценка параметров\n\nЭто приложение демонстрирует следующее:\n\n• Импорт измеренных данных из текстового файла или использование встроенного функционала для генерации данных\n• Автоматически изменять параметры решателя на основе введенных данных.\n• Динамически обновлять отображение уравнений\n\nПриложение можно использовать для оценки параметров моделей без какой-либо физики. Данные можно импортировать из файла или использовать встроенные функции генерации данных.\n\nМодели включают линейную, квадратичную, сигмовидную, наклонную гауссовую, а также пользовательскую модель, содержащую до пяти параметров.\n\nРешатель Levenberg–Marquardt вычисляет доверительные интервалы для оцененных параметров, в то время как другие решатели (MMA, SNOPT, IPOPT и BOBYQA) позволяют указывать границы параметров. ММА и BOBYQA позволяют минимизировать максимальный квадрат вместо суммы.
applicationdescr_opt/structural_topology_optimizer = Structural Topology Optimizer\n\nОптимизация топологии обычно решается в несколько этапов решения. Информация, полученная в результате решения исходной геометрии, используется для ограничения и масштабирования последующего решателя оптимизации. Сама оптимизация может выиграть от многократного запуска на разных сетках. Оптимизация грубой сетки сначала предотвращает образование небольших нежелательных пустот в топологии и обеспечивает отправную точку для уточнения более мелкой сетки.\n\nЭто приложение демонстрирует, как эти шаги можно автоматизировать для обеспечения оптимизированной топологии за один шаг. Он объединяет два примера оптимизации топологии нагруженной коленной конструкции и балки MBB и предлагает параметризованные версии этих геометрий. Приложение также позволяет преобразовать оптимизированную топологию в геометрический объект, который можно импортировать и использовать в моделях COMSOL.

# Optimization Module models
modeldescr_opt/beam_eigenfrequency_topology_optimization = Максимизация собственной частоты луча\n\nЭта модель демонстрирует, как спроектировать луч без низких собственных частот путем объединения функции модели плотности в интерфейсе оптимизации топологии с этапом исследования стационарной, затем собственной частоты.
modeldescr_opt/beam_optimization = Оптимизация конструкции балки\n\nМасса алюминиевой балки сведена к минимуму с учетом ограничения смещения и распределенной нагрузки. Проблема решается с помощью оптимизации формы параметров и топологии.
modeldescr_opt/beam_optimization_milling = Оптимизация топологии балки с ограничениями фрезерования \n\nМасса алюминиевой балки минимизируется с учетом ограничения смещения и распределенной нагрузки. Проблема решается с помощью оптимизации топологии с ограничениями фрезерования.
modeldescr_opt/bracket_fatigue_optimization = Кронштейн — Оптимизация напряжения с оценкой усталости\n\nОптимизация формы с учетом усталостных свойств не поддерживается, но усталостные свойства хорошо коррелируют с максимальным напряжением. Модель демонстрирует, как оптимизация по p-норме напряжения фон Мизеса может использоваться для улучшения усталостных свойств без увеличения массы или уменьшения жесткости.
modeldescr_opt/coil_shape_optimization = Оптимизация формы катушек\n\nВ этом примере показано, как использовать модуль оптимизации для поиска геометрии катушки, дающей однородное магнитное поле на оси и минимальное поле вблизи концов оси.
modeldescr_opt/curve_fit_mooney_rivlin = Mooney–Rivlin Curve Fit\n\nВ этом примере показано, как использовать модуль оптимизации для подгонки кривой модели материала к экспериментальным данным.
modeldescr_opt/diagonal_brace_buckling_optimization = Максимизация изгибающей нагрузки диагональной раскоса\n\nПотертость — это распространенный вид разрушения тонких конструктивных элементов. Эта модель показывает, как можно максимизировать изгибающую нагрузку диагональной распорки, ограничивая при этом ее объём.
modeldescr_opt/flywheel_profile = Оптимизация профиля маховика\n\nВ этом примере решается задача поиска оптимального профиля толщины маховика, чтобы момент инерции был максимизирован без увеличения массы или максимального напряжения в маховике.
modeldescr_opt/hook_optimization_stl = Экспорт и импорт оптимизированного по топологии крюка\n\nМодель изучает оптимальное распределение материала в крюке, который симметричен относительно плоскости z и состоит из линейно упругого материала - конструкционной стали. На него действуют два случая распределенной нагрузки: один на кончике крюка и один вдоль его нижнего внутреннего изгиба. Топология ограничена с использованием ограничения фрезерования.
modeldescr_opt/impedance_tube_parameter_estimation_data = Оценка параметров импедансной трубки с помощью генерации данных \n\n Импедансные трубки используются для оценки поверхностного импеданса различных образцов, например, слоя пористого материала, используемого для звукоизоляции. Эта модель показывает, как пять материальных параметров модели Johnson–Champoux–Allard могут быть оценены по давлению на двух измерительных микрофонах. Модель включает в себя первоначальное исследование, в результате которого генерируются синтетические данные измерений. Шум добавляется к данным перед их экспортом.
modeldescr_opt/loaded_knee = Оптимизация топологии нагруженной структуры колена\n\nВ этом примере используется модель твердого изотропного материала со штрафом (SIMP), чтобы найти оптимальное распределение заданного количества материала, образующего L-образный каркас. Критерием оптимальности является минимальное соответствие варианту нагружения, когда верхняя граница рамы фиксирована, а вдоль ее правого конца приложена направленная вниз нагрузка.
modeldescr_opt/material_property_fitting = Material Property Fitting\n\nВ этом примере демонстрируется переходная оптимизация с использованием решателя наименьших квадратов.
modeldescr_opt/mbb_beam_extruded_optimization = Оптимизация вытянутой балки MBB\n\nЭта модель демонстрирует трехмерную топологию и оптимизацию формы для вытянутой геометрии. Этого можно достичь с помощью моделирования на основе уравнений и операторов выдавливания. Модель учитывает максимизацию жесткости балки с учетом ограничения на массу, но метод можно использовать с любым вариантом стационарных решателей и решателей в частотной области.
modeldescr_opt/mbb_beam_optimization = Оптимизация топологии луча MBB\n\nВ этом примере демонстрируется оптимизация топологии с помощью модуля оптимизации в контексте Messerschmitt–Bölkow–Задача эталонного луча Блома.
modeldescr_opt/mbb_beam_shape_optimization = Оптимизация формы балки MBB\n\nЭта модель демонстрирует, как функция границы свободной формы может использоваться для оптимизации формы конструкции, найденной с помощью оптимизации топологии. В модели используются те же цели и ограничения, что и в оригинале, что приводит к несколько более высокой жесткости при той же массе.
modeldescr_opt/multistudy_bracket_optimization = Мультиисследовательская оптимизация брекета\n\nВ этом примере оптимизации формы масса брекета минимизируется за счет изменения размера и положения ряда геометрических объектов.\n\nСуществуют пределы как для самой низкой собственной частоты, так и для максимального напряжения в случае статической нагрузки. Кроме того, для поддержания допустимой геометрии требуется несколько геометрических ограничений.
modeldescr_opt/optimal_heating_control = Оптимальное управление нагревом стержня\n\nЭто пример оптимального управления, при котором подаваемая на стержень мощность нагрева оптимизируется для обеспечения определенной температуры на внешней стороне стержня. Здесь наблюдается максимальная температура воды, а минимальная — в центре. Следовательно, эта проблема соответствует ситуации, когда требуется как можно быстрее достичь определенной минимальной температуры, не превышая при этом некоторой максимальной температуры.
modeldescr_opt/reversed_flow = Минимизация скорости потока в микроканале\n\nВ этом примере цель состоит в том, чтобы найти оптимальное распределение пористого материала в микроканале так, чтобы горизонтальная скорость в центре канала была минимальной.
modeldescr_opt/shell_shape_optimization = Оптимизация формы оболочки\n\nЭта модель демонстрирует, как использовать функцию оболочки произвольной формы для увеличения жесткости оболочки путем деформации ее формы.
modeldescr_opt/shell_eigenfrequency_shape_optimization = Максимизация собственной частоты оболочки\n\nЭта модель демонстрирует, как увеличить самую низкую собственную частоту оболочки путем объединения функции оболочки свободной формы с этапом исследования стационарной, а затем собственной частоты.
modeldescr_opt/time_dependent_optimization = Оптимизация, зависящая от времени\n\nВ этом учебном пособии показано, как вычислить периодическое стационарное решение нелинейной задачи с помощью решателя нестационарной оптимизации. Модель решается намного быстрее с использованием решателя оптимизации, зависящей от времени, поскольку решение не нужно вычислять для большого количества периодов.
modeldescr_opt/tuning_fork_optimization = Оптимизация камертона\n\nРасширяя модель камертона, в этом примере показано, как настроить исследование оптимизации для определения длины зубца, при которой вилка вибрирует со стандартной концертной частотой, 440 Гц.
modeldescr_opt/tuning_fork_shape_optimization = Оптимизация формы камертона\n\nРасширяя модель камертона, в этом примере показано, как настроить исследование оптимизации для определения длины зубца, при которой вилка вибрирует со стандартной концертной частотой, 440 Гц.
modeldescr_opt/wrench_shape_optimization = Оптимизация формы гаечного ключа\n\nВ этой модели показано, как использовать функцию границы свободной формы для увеличения жесткости ключа без увеличения его массы.

# Particle Tracing Module apps
applicationdescr_particle/charge_exchange_cell_simulator = Симулятор ячейки перезарядки\n\nЯчейка перезарядки состоит из области газа под повышенным давлением внутри вакуумной камеры. Когда ионный пучок взаимодействует с газом более высокой плотности, ионы вступают в реакции перезарядки с газом, которые затем создают энергичные нейтральные частицы. Вполне вероятно, что только часть ионов пучка подвергнется реакциям перезарядки. Поэтому для нейтрализации луча снаружи ячейки располагают пару заряженных отклоняющих пластин. Таким образом, можно создать энергетически нейтральный источник. \n\nЭто приложение моделирует взаимодействие протонного пучка с ячейкой перезарядки, содержащей нейтральный аргон. Пользовательский ввод включает несколько геометрических параметров газовой ячейки и вакуумной камеры, свойств пучка и свойств заряженных пластин, которые используются для отклонения оставшихся ионов. \n\nПриложение для моделирования вычисляет эффективность ячейки перезарядки, измеряемую как долю нейтрализованных ионов, и записывает статистику о различных типах возникающих столкновений.
applicationdescr_particle/laminar_static_particle_mixer_designer = Ламинарный статический смеситель частиц конструктор\n\nВ статических смесителях жидкость прокачивается через трубу, содержащую стационарные смесительные лопасти. Этот метод смешивания хорошо подходит для смешивания в ламинарном потоке, поскольку в этом режиме потока он создает лишь небольшие потери давления. Когда жидкость прокачивается через канал, лопасти поперечного сечения в чередующихся направлениях перемешивают жидкость, когда она проходит по длине канала. Метод статического смешивания позволяет точно контролировать количество смешивания, происходящего на протяжении всего процесса. Однако производительность смесителя может сильно различаться в зависимости от его геометрии. \n\nПриложение Laminar Static Particle Mixer конструктор вычисляет скорость жидкости и поле давления в статическом смесителе, а также траектории частиц, переносимых жидкостью. Поскольку частицы имеют массу, они не следуют точно линиям скорости течения жидкости, в результате чего некоторые частицы попадают на смесительные лопасти. \n\nПример приложения вычисляет вероятность прохождения частиц в смесителе. Он также оценивает индекс дисперсии, который является показателем однородности смешивания различных видов частиц.
applicationdescr_particle/red_blood_cell_separation = Разделение эритроцитов\n\nДиэлектрофорез (ДЭП) происходит, когда на диэлектрическую частицу воздействует сила, находящаяся в неоднородном электрическом поле. DEP имеет множество применений в области биомедицинских устройств, используемых для биосенсоров, диагностики, манипуляций с частицами и фильтрации (сортировки), сборки частиц и т. д. \n\nСила DEP чувствительна к размеру, форме и диэлектрическим свойствам частиц. Это позволяет использовать DEP для отделения различных типов частиц, например, различных типов клеток, из смеси. Приложение «Сепарация эритроцитов» показывает, как эритроциты можно избирательно фильтровать из образца крови, чтобы изолировать эритроциты от тромбоцитов. \n\nВ фильтрующем устройстве DEP эритроциты, которые больше тромбоцитов, воспринимают большую силу и, таким образом, отклоняются сильнее. Два выхода устроены так, что верхнее отверстие улавливает неотклоняющиеся частицы, а из нижнего отверстия могут выйти только отклоненные частицы. \n\nПриложение позволяет изменять характеристики эритроцитов и тромбоцитов, а также электрическое поле.

# Particle Tracing Module models
modeldescr_particle/brownian_motion = Броуновское движение\n\nВ этом учебном примере показано, как моделировать движение частиц под действием броуновской силы. Результаты сравниваются с решением уравнения чистой диффузии и показывают хорошее согласие. Наконец, выполняется моделирование Монте-Карло, в ходе которого модель решается несколько раз, каждый раз используя другой набор случайных чисел.
modeldescr_particle/cascade_impactor = Каскадный импактор\n\nВ этом примере моделируются частицы различных размеров, которые проходят через разные уровни каскадного импактора. Каскадный импактор представляет собой инерционное устройство для разделения частиц, состоящее из нескольких уровней, разделенных собирающими пластинами и соплами. Воздух, насыщенный частицами, поступает через верхний воздухозаборник и проходит через все более тонкие сопла. Двумерная гистограмма используется для записи диапазона размеров частиц, попадающих на каждую ступень каскадного импактора.
modeldescr_particle/childs_law_benchmark = Оценка детского права\n\nЭтот пример моделирует эмиссию электронов с плоской поверхности, ограниченную пространственным зарядом. Распределение электрического потенциала сравнивается с аналитическим решением, основанным на законе Чайлда, как и общий ток эмиссии с эмиссионной поверхности.
modeldescr_particle/dielectrophoretic_separation = Диэлектрофоретическое отделение тромбоцитов от эритроцитов\n\nЭтот пример демонстрирует непрерывное отделение тромбоцитов (PLT) от эритроцитов (RBC) в микрофлюидном канале с использованием диэлектрофореза (DEP).
modeldescr_particle/einzel_lens = Линза Эйнцеля\n\nЛинза Эйнцеля — это электростатическое устройство, используемое для фокусировки пучков заряженных частиц. Его можно найти в электронно-лучевых трубках, экспериментах с ионным и электронным лучом, а также в ионных двигательных установках.\n\nЭта конкретная модель состоит из трех осевых цилиндров. Внешние цилиндры заземлены, а на средний цилиндр подается фиксированное напряжение. Трехмерное электростатическое поле вычисляется с помощью интерфейса <em>Electrostatics</em>, а траектории частиц вычисляются с использованием <em>Charged Particle Tracing</em> интерфейс.
modeldescr_particle/electron_beam_divergence_relativistic = Релятивистский расходящийся электронный луч\n\nПри моделировании распространения пучков заряженных частиц с большими токами и релятивистскими скоростями пространственный заряд и ток пучка создают значительные электрические и магнитные силы, которые имеют тенденцию расширять и фокусировать луч соответственно. Используя этап исследования «Отслеживание двунаправленных частиц», можно рассчитать траектории и поля таким образом, чтобы учитывать двустороннюю связь между ними. В этом примере исследование измельчения сетки используется для подтверждения того, что решение согласуется с аналитическим выражением формы оболочки релятивистского пучка.
modeldescr_particle/flow_channel_turbulent_dispersion = Дисперсия тяжелых частиц в турбулентном канальном потоке\n\nВ этой эталонной модели твердые частицы выбрасываются в полностью развитый турбулентный канальный поток. Частицы подвергаются силе сопротивления, которая включает в себя турбулентность жидкости, реализованную с использованием модели непрерывного случайного блуждания (CRW). Поскольку турбулентность в канале анизотропна, частицы со значительной инерцией стремятся скапливаться вблизи стенок канала, в то время как очень мелкие частицы остаются равномерно распределенными по сечению канала. В этом примере плотность частиц после положения выброса сравнивается для нескольких различных значений числа Стокса частицы.
modeldescr_particle/fuel_spray_breakup = Распад и рассеивание топливной струи \n\nВ этом примере топливная струя выбрасывается из сопла в первоначально неподвижную воздушную область. Поскольку капли топлива подвергаются воздействию воздушной среды, они оказывают на воздух объёмную силу, которая заставляет его циркулировать. Из-за напряжений сдвига на поверхности каждой капли и турбулентности циркулирующего воздуха капли распадаются и рассеиваются по мере распространения через область. Капли распадаются в соответствии со встроенной моделью, которая включает анализ нестабильности Кельвина–Гельмгольца.
modeldescr_particle/ideal_cloak = Идеальный плащ\n\nВ этом примере оптическое маскировочное устройство спроектировано с использованием анизотропной среды для сокрытия объекта из поля зрения без искажения электромагнитных волн с точки зрения наблюдателя. для отслеживания лучей используется гамильтонова формулировка в интерфейсе Mathematical Particle Tracing.
modeldescr_particle/inertial_focusing = Инерционная фокусировка между двумя параллельными стенками\n\nБолее 50 лет известно, что нейтрально плавучие частицы в канале потока имеют тенденцию сходиться в определенных местах поперечного сечения канала. для цилиндрической трубы или двух параллельных плоскостей, по которым течет поток Пуазейля, положение равновесия составляет примерно 0,6 радиуса трубы или расстояние от параллельных стенок примерно в 0,2 ширины канала соответственно. Это называется <em>Segre–Silberberg</em> эффект, а кольцо частиц с радиусом, в 0,6 раз превышающим радиус трубы, иногда называют эффектом В этой тестовой модели мы воспроизводим случай канала потока, ограниченного двумя параллельными стенками. Зависящие от стенки подъемные силы и силы сопротивления воздействуют на нейтрально плавучие частицы, когда они переносятся по каналу параболическим профилем скорости жидкости. При переносе частиц по каналу инерционная подъемная сила заставляет их достигать положений равновесия на расстояниях от центра 0,3 <em>D</em>, где <em>D</em> - расстояние между стенами. Эти положения равновесия согласуются с эффектом <em>Segre–Зильберберга</em>.
modeldescr_particle/ion_cyclotron_motion = Ion Cyclotron Motion\n\nВ этом примере используются формулы Ньютона (первого и второго порядка), лагранжа и гамильтона для расчета траектории заряженной частицы в однородном магнитном поле. Этот тест вычисляет радиус Лармора и сравнивает его с аналитическим решением. Один и тот же результат получается для всех составов.
modeldescr_particle/ion_drift_velocity_benchmark = Benchmark скорости ионного дрейфа\n\nСкорость дрейфа Ar+ вычисляется с использованием моделирования Монте-Карло, в котором явно моделируются упругие столкновения и реакции перезарядки ионов аргона с нейтральным буферным газом. В примере используются зависящие от энергии данные о сечении столкновения из эксперимента. Средние значения скорости ионов согласуются с экспериментальными данными в широком диапазоне приведенных величин электрического поля.
modeldescr_particle/ion_funnel = Ионная воронка\n\nВ этом примере исследуется фокусирующий эффект электродинамической ионной воронки. Из-за своей способности работать при высоком давлении фонового газа ионные воронки часто используются для сопряжения таких устройств, как спектрометры подвижности ионов и масс-спектрометры, что повышает чувствительность этих устройств. В примере используется функция «Столкновения» для моделирования взаимодействия ионов с нейтральным фоновым газом.
modeldescr_particle/ion_range_benchmark = Ion Range Benchmark\n\nМодель Ion Range Benchmark имитирует прохождение энергичных протонов через кремний с ионизационными потерями и ядерным рассеянием. Начальная энергия протонов варьируется с помощью параметрической развертки от 1 кэВ до 100 МэВ.\n\nСредняя длина пробега протонов сравнивается с опубликованными значениями пробега ионов в приближении непрерывного замедления (CSDA), а также с прогнозируемым пробегом в начальном направлении движения. Расчетные и экспериментальные данные хорошо согласуются.
modeldescr_particle/laminar_mixer_particle = Траектории частиц в ламинарном статическом смесителе\n\nВ этом примере вычисляются траектории частиц кварца через статическое смесительное устройство. Инерция частиц заставляет некоторые из них сталкиваться со стенками канала или смесительными лопастями, так что только определенная часть частиц достигает выпускного отверстия. Эта доля, вероятность передачи, вычисляется во время постобработки.
modeldescr_particle/magnetic_lens = Магнитная линза\n\nВ этом примере используется интерфейс Charged Particle Tracing для расчета траекторий электронов в пространственно изменяющемся магнитном поле. Фокусирующее влияние магнитного поля на электронный пучок анализируется далее путем расчета эмиттанса вдоль траектории луча.
modeldescr_particle/magnetophoretic_separation = Магнитофоретическое разделение лейкоцитов и эритроцитов \n\nЭтот пример демонстрирует непрерывное разделение лейкоцитов (лейкоцитов) и эритроцитов (эритроцитов) в микрофлюидном канале с использованием магнитофореза - явления, при котором неоднородное магнитное поле оказывает воздействие на частицы.
modeldescr_particle/multipactor_saturation = Multipactor Saturation\n\nУмножение может происходить, когда электроны ускоряются высокочастотным радиочастотным полем в резонаторе в условиях, близких к вакууму. Вблизи определенных резонансных частот, зависящих от размера полости, электроны могут вызвать каскад вторичной электронной эмиссии, ударяясь о стенки полости на высокой скорости. В конце концов количество электронов в полости достигает состояния динамического равновесия, поскольку взаимное электростатическое отталкивание приводит к расширению зоны электронов, так что средний выход вторичных электронов по всем ударам о стенку приближается к единице. Последующее установившееся поведение известно как мультипакторное насыщение.
modeldescr_particle/pierce_electron_gun = Pierce Electron Gun\n\nЭлектронная пушка должна быть в состоянии потреблять достаточный ток и ускорять электроны до желаемой скорости. Первая часть геометрии электронной пушки представляет собой уникальные проблемы проектирования, поскольку скорости испускаемых электронов там обычно самые низкие, и, следовательно, плотность объёмного заряда довольно высока. В конструкции электронной пушки Пирса используются электроды особой формы, позволяющие противодействовать кулоновскому отталкиванию между электронами в пучке. В результате электроны в пучке распространяются прямолинейно. Предполагается, что эмитированные электроны на катоде ограничены пространственным зарядом; начальным тепловым распределением скоростей электронов пренебрегают.
modeldescr_particle/pinched_flow_fractionation = Фракционирование в сжатом потоке\n\nВ этом примере моделируется разделение частиц по размеру в микроканале с использованием метода фракционирования в сжатом потоке. Микроприбор имеет два входа и несколько выходов, на которых поле скоростей течения жидкости вычисляется с помощью интерфейса ламинарное течение. Затем с помощью интерфейса Particle Tracing for Fluid Flow вычисляются траектории впрыскиваемых частиц. Гистограммы используются для отслеживания разделения частиц по размеру и количественной оценки диапазона размеров частиц, выходящих из каждого выпускного отверстия.
modeldescr_particle/planar_diode = Термоэлектронная эмиссия в плоском диоде \n\nКогда электроны испускаются из нагретого катода в плоскопараллельном вакуумном диоде, они вносят вклад в плотность пространственного заряда в диоде, что, в свою очередь, влияет на распределение электрического потенциала. Если разность потенциалов между катодом и анодом недостаточно велика, между ними образуется минимум потенциала, отталкивающий электроны недостаточной энергии обратно к катоду. Говорят, что такой диод работает в <em>режиме ограничения пространственного заряда</em>.\n\nВ этой тестовой модели выделенный <em>Thermionic Emission</em> функция используется для высвобождения тепловых электронов из катода с заданной температурой и работой выхода. Траектории электронов двунаправленно связаны с расчётм электрического потенциала в диоде с использованием специализированной <em>Electric Particle-Field Interaction</em> мультифизической связи и <em>Biнаправленно связанных частиц Трассировка</em> шаг исследования. Распределение электрического потенциала и анодный ток выгодно отличаются от результатов аналитической модели Ленгмюра–Фрай.
modeldescr_particle/quadrupole_mass_filter = Квадрупольный масс-фильтр\n\nВ этом примере описан принцип работы квадрупольной ионной ловушки, ключевого компонента квадрупольного масс-спектрометра. В электрическом поле присутствуют как переменные, так и постоянные компоненты.\n\nдля этого примера требуется модуль отслеживания частиц.
modeldescr_particle/quadrupole_mass_spectrometer = Квадрупольный масс-спектрометр\n\nВ этом примере вычисляются траектории ионов с различными молекулярными массами в квадруполе. В электрическом поле присутствуют как переменные, так и постоянные компоненты.\n\nдля этого примера требуется модуль отслеживания частиц.
modeldescr_particle/rossler_attractor = Аттрактор Ресслера\n\nСистема Ресслера представляет собой систему трех нелинейных обыкновенных дифференциальных уравнений, которая демонстрирует хаотическую динамику. В этом примере для решения дифференциальных уравнений используется безмассовая формулировка, доступная в интерфейсе математической трассировки частиц.
modeldescr_particle/rotating_galaxy = Вращающаяся галактика\n\nВ этом учебном примере показано, как реализовать определяемые пользователем силы взаимодействия между частицами. Галактика, состоящая из 1200 звезд, изначально вращается как твердое тело, но сила гравитации между звездами приводит к изменению формы галактики.
modeldescr_particle/sensitive_high_resolution_ion_microprobe = Чувствительный ионный микрозонд высокого разрешения\n\nЧувствительный ионный микрозонд высокого разрешения (SHRIMP) используется для передачи ионов с заданной начальной энергией и заданным соотношением заряда к массе путем воздействия на входящий луч соответствующим образом настроенными электрическими и магнитными силами. Луч сначала направляется через изогнутый сектор с радиальной электрической силой, затем через второй изогнутый сектор с однородной плотностью магнитного потока. детектор. Модель вычисляет вероятность передачи и визуализирует номинальную траекторию передаваемого луча.
modeldescr_particle/three_body_problem = Задача трех тел\n\nКлассическая задача трех тел включает в себя предсказание траекторий трех точечных масс под действием взаимного гравитационного притяжения. В общем, задача трех тел не имеет аналитического решения в замкнутой форме, но ее можно решить численно, если известны начальные условия. В этом примере моделируются два периодических решения задачи трех тел: конфигурация восьмерки и конфигурация Лагранжа.
modeldescr_particle/trapped_protons = Движение захваченных протонов в магнитном поле Земли 's Magnetic Field\n\nThis example computes the trajectory of relativistic protons in Earth's. Широта зеркальной точки захваченных протонов вычисляется как функция экваториального питч-угла, при котором протоны высвобождаются. В этом примере используется функция «Магнитная сила», которая включает встроенную опцию для использования данных Международного геомагнитного эталонного поля (IGRF).
modeldescr_particle/turbomolecular_pump = Турбомолекулярный насос\n\nИнтерфейс <em>Free Molecular Flow</em>, доступный в модуле «Молекулярное течение», является эффективным инструментом для моделирования чрезвычайно разреженных газов, когда молекулы газа движутся намного быстрее, чем любые геометрические объекты в этой области. для турбомолекулярных насосов, в которых лопатки движутся со скоростью, сравнимой с тепловой скоростью молекул газа, необходим подход Монте-Карло.\n\nВ этом примере траектории молекул газа вычисляются в пустом пространстве между двумя вращающимися лопастями турбомолекулярного насоса. В модели используется функция <em>Rotating Frame</em> для воздействия на частицы центробежных сил и сил Кориолиса, что позволяет рассчитывать траектории в неинерциальной системе отсчета, которая движется вместе с вращающимися лопастями. Влияние скорости лопасти на коэффициент сжатия показано с помощью параметрической развертки.
modeldescr_particle/turbomolecular_pump_quasi_2d = Квази-2D турбомолекулярный насос\n\nМоделирование потока разреженного газа в турбомолекулярном насосе по методу Монте-Карло можно значительно упростить, если средний радиус лопастей намного превышает расстояние между ними. В этих условиях вращающиеся лопасти насоса можно аппроксимировать как бесконечный ряд лопастей, имеющих только поступательную скорость.\nЭта эталонная модель показывает влияние скорости, угла и расстояния лопастей на вероятность прохождения молекул через одноступенчатый турбомолекулярный насос в режиме свободномолекулярного течения. Результаты хорошо согласуются с более ранними публикациями, в которых использовались те же упрощающие предположения.


# Pipe Flow Module apps
applicationdescr_pipe/gas_box = Gas Box конструктор\n\nКонтроллер массового расхода (MFC) – это устройство, используемое для измерения и контроля расхода жидкостей и газов. Это приложение вычисляет противодавление в сети труб, питаемых системой MFC. Каждый MFC подает заданный расход в одну из труб и может работать правильно только в том случае, если противодавление остается ниже 760 Торр.
applicationdescr_pipe/geothermal_heat_pump = Система рекуперации тепла для геотермального теплового насоса \n\nЭто приложение демонстрирует следующее:\n\n• Изменение дизайна с помощью поля со списком с предопределенными параметрами \n• Параметры для создания ячеек разного размера\n• Редактирование и построение графиков ежемесячных данных input\n• Установка времени окончания и размера временных шагов для моделирования, зависящего от времени\n• Визуализация начальных значений для зависящего от времени моделирования Simulation\n• Включает простую систему управления температурой\n\nГеотермальное нагрев - это экологически чистый и энергоэффективный метод обеспечения теплом современных и хорошо изолированных домов. Теплообменники, расположенные на достаточной глубине под землей под домом, используют подземное тепло, где температура практически постоянна в течение всего года. \n\nПриложение изучает различные конфигурации труб наземного теплообменника. Он предоставляет информацию о характеристиках заземленных теплообменников для различных технических характеристик (глубина, расположение труб, конфигурация труб и условия нагрева), температурных условиях, теплопроводности почвы и температурном градиенте. \n\nНагреватель также можно выключить, если будет достигнута ежедневная потребность в тепле, а затем снова включить его через 24 часа. Температуру на выходе трубы можно контролировать и сравнивать с минимальной температурой, указанной в технических характеристиках теплообменника.
applicationdescr_pipe/radiant_floor_heating_design = Дизайн лучистого отопления пола\n\nСистемы теплого пола стали популярным способом обогрева современных жилых домов. В то время года, когда климат требует отопления, оно оказывается экономичным, а также обеспечивает особый комфорт для людей. \n\nС помощью этого приложения вы можете спроектировать систему обогрева пола с подогревом. Входные характеристики включают геометрические параметры пола и трубопроводов, тип насоса и обогревателя, а также температуру наружного воздуха.

# Pipe Flow Module models
modeldescr_pipe/autothermal_reactor = Автотермический реактор\n\nВ промышленной химии часто желательно рекуперировать и использовать энергию, полученную в результате экзотермических реакций. Когда выделяется достаточное количество химического тепла для нагрева потока реагентов и достижения желаемой конверсии, процесс называется автотермическим. В этом примере более подробно рассматривается синтез фталевого ангидрида в автотермических условиях.
modeldescr_pipe/discharging_tank = Разгрузочный резервуар\n\nВ этой учебной модели показано, как рассчитать падение давления и начальный расход в системе трубопроводов, соединенной с резервуаром для воды. Модуль «Трубопроводность» содержит готовые к использованию модели трения, учитывающие шероховатость поверхности труб, а также потери давления в изгибах и задвижках.
modeldescr_pipe/district_heating_optimization = Оптимизация топологии сети централизованного теплоснабжения\n\nСхема сети централизованного теплоснабжения разработана с использованием оптимизации топологии.
modeldescr_pipe/geothermal_heating = Геотермальное нагрев из контура пруда\n\nПруды и озера могут служить термальными резервуарами в приложениях геотермального отопления с помощью тепловых насосов. В этом примере вода циркулирует в пруду по полиэтиленовым трубам в закрытой системе. Трубы свернуты в гибкую форму и сгруппированы на салазках. Интерфейс Nonisothermal Pipe Flow ставит и решает проблему распределения температуры, перепадов давления, распределения скорости и теплообмена.
modeldescr_pipe/ground_heat_recovery = Рекуперация тепла грунта для теплого пола \n\nГеотермальное нагрев - это экологически чистый и энергоэффективный метод снабжения теплом новых и хорошо изолированных домов. Чтобы сократить расходы на нагрев, необходимо изучить способы расположения коллекторов тепла в подземных слоях.\n\nВ этой модели сравниваются три различных устройства, встроенных в подземный слой верхнего слоя почвы в саду, с использованием модуля «Трубопровод». Типичные термические свойства слоя почвы получены с помощью импорта данных измерений.
modeldescr_pipe/heat_exchanger_plate = Конвективный поток в пластине теплообменника\n\nОбщий класс задач о потоке жидкости состоит из сегментов труб, соединенных с большими объёмами, такими как резервуары и/или коробки.\n\nЗдесь, поставлена задача с помощью модуля Pipe Flow для моделирования течения в микроканалах теплообменника. В примере демонстрируется функция «Соединение труб», которая автоматически соединяет 3D-объём и секции потока в трубе.
modeldescr_pipe/large_diameter_pipe = Теплопередача через трубу большого диаметра\n\nВ этом примере показано, как создать теплообменную муфту труба-твердое тело с помощью модуля Pipe Flow, предполагая конечный радиус для трехмерного анализа твёрдого тела. Это полезно, если вы ожидаете, что на распределение температуры в сплошном блоке может влиять конечный радиус, например, если размеры поперечного сечения блока сопоставимы с радиусом трубы.
modeldescr_pipe/mold_cooling = Охлаждение литьевой формы \n\nТщательно контролируемое охлаждение литьевой формы очень важно для достижения желаемой истории охлаждения пластиковых форм, поскольку от охлаждения зависит структурная целостность материала. History.\n\nЭтот пример демонстрирует, как модуль Pipe Flow можно использовать для моделирования охлаждения отлитой под давлением полиуретановой детали автомобильного рулевого колеса.
modeldescr_pipe/pipe_flow_stress = Совместный анализ потока и напряжения в трубе\n\nВ этой учебной модели поток в трубе с изгибом вычисляется с использованием интерфейса Pipe Flow. Вычисленная нагрузка течения жидкости используется в качестве входных данных для анализа напряжений в интерфейсе Pipe Mechanics. Также учитываются гравитационные нагрузки от трубы и жидкости.
modeldescr_pipe/cooling_pipeline_stress = Напряжение в сети трубопроводов охлаждения\n\nВ этом примере показано, как смоделировать связанный поток, теплообмен, а также структурную деформацию и напряжение в сети трубопроводов. Также учитываются гравитационные нагрузки от трубы и жидкости.
modeldescr_pipe/slurry_transport = Slurry Transport\n\nВ этом примере моделируется транспортировка угольной суспензии по системе труб, где диаметр трубы изменяется в разных секциях. Пульпа ведет себя как неньютоновская жидкость, описываемая степенной моделью. Результаты предоставляют скорость потока на разных участках трубопровода и общий перепад давления в системе.
modeldescr_pipe/pipeline_insulation = Изоляция участка трубопровода\n\nПри движении сырой нефти по трубопроводу тепло рассеивается за счет вязкого нагрева (внутреннего трения). При тщательно оптимизированной изоляции трубопровода можно использовать тепло, чтобы избежать необходимости предварительного подогрева нефти, несмотря на то, что ее необходимо транспортировать в холодных условиях на большие расстояния. В этом примере модуль Pipe Flow используется для моделирования транспортировки нефти по трубопроводу. С помощью исследования оптимизации можно найти идеальную толщину изоляции трубопровода, при которой температура вдоль трубопровода будет постоянной.
modeldescr_pipe/water_hammer_verification = Water Hammer\n\nКогда клапан в трубопроводной сети быстро закрывается, это приводит к гидравлическому переходному процессу, известному как "water hammer". Распространение этих гидравлических переходных процессов может в крайних случаях вызывать отказы трубопроводных систем, вызванные избыточным давлением. \n\nЭто модель простой проверки с помощью интерфейса Water Hammer, анализирующей трубопроводную систему, состоящую из резервуара, трубы и клапана.

# Plasma Module apps
applicationdescr_plasma/boltzmann_dc_discharge = Тлеющий разряд постоянного тока Больцмана\n\nЭто приложение моделирует тлеющий разряд постоянного тока. Функция распределения электронов по энергии (EEDF) и свойства переноса электронов вычисляются с помощью интерфейса <em>Boltzmann Equation, Two-Term Approximation</em>. Поскольку входные параметры для интерфейса <em>Boltzmann Equation, Two-Term Approximation</em>, такие как степень ионизации плазмы, априори не известны, выполняется итерационный процесс. Исследование Больцмана и исследование плазмы вычисляются поочередно до тех пор, пока отклонение плотности электронов не упадет ниже заданного пользователем значения. В результате можно исследовать ФРЭЭ в каждой точке геометрии.
applicationdescr_plasma/ccp_reactor = Ёмкостно-связанная плазма\n\nЭто приложение дает представление о мгновенных и периодических стационарных решениях одномерной ёмкостно-связанной плазмы. Геометрия, давление и приложенное напряжение — все это входные данные, а также частота и количество радиочастотных циклов, по которым необходимо выполнить расчет. Помимо мгновенных и усредненных по времени графиков, вычисляются глобальные величины энерговыделения и тока.
applicationdescr_plasma/two_term_boltzmann = Калькулятор свойств плазмы и коэффициента скорости \n\nЭто приложение можно использовать для расчета свойств переноса электронов, коэффициентов скорости и коэффициентов Таунсенда из набора сечений столкновений электронов. Вычисленные данные можно анализировать в виде графиков или таблиц и экспортировать в файлы для использования в пространственно-зависимой модели плазмы.

# Plasma Module models
modeldescr_plasma/argon_3d_icp = 3D ICP Reactor, Argon Chemistry\n\nВ этом примере исследуются 3D-эффекты для индуктивно связанной плазмы. Асимметрия поля давления приводит к неоднородности потоков на поверхность пластины.
modeldescr_plasma/argon_dbd_1d = Диэлектрический барьерный разряд\n\nВ этом примере моделируется электрический пробой в газе при атмосферном давлении. Поскольку электрический пробой — сложный процесс, рассматривается 1D-модель. Чтобы подчеркнуть физику процесса распада, в примере используется простая химия аргона, которая сводит к минимуму количество видов и реакций.
modeldescr_plasma/argon_gec_ccp_1d = Реактор GEC CCP, химия аргона, 1D\n\nРеактор NIST GEC CCP предоставляет платформу для изучения ёмкостно-связанной плазмы. В этом примере исследуется механизм выделения энергии в плазму благодаря синусоидальному электростатическому полю, действующему на частоте 13,56 МГц.
modeldescr_plasma/argon_gec_ccp = GEC CCP Reactor, Argon Chemistry\n\nЭта модель исследует эталонную ячейку GEC (Gaseous Electronics Conference) в двух измерениях с использованием интерфейса «Плазма, периодичность времени». Ячейка приводится в движение с фиксированной мощностью, и результаты хорошо согласуются с опубликованными в литературе.
modeldescr_plasma/argon_gec_icp = GEC ICP Reactor, Argon Chemistry\n\nВ этом примере исследуются электрические характеристики эталонной ячейки GEC для химии аргона.
modeldescr_plasma/argon_gec_icp_boltzmann = Реактор GEC ICP, связанный с двухчленным уравнением Больцмана\n\nВ этом учебном пособии моделируется реактор ICP путем решения уравнений типа плазменной жидкости, полностью связанных с однородным и независимым от времени электронным уравнением Больцмана в классическом двухчленном приближении. Приближенное уравнение Больцмана решается для каждой позиции пространства и связывается с уравнениями типа жидкости через среднюю энергию электронов. Константы скорости реакций электронного удара и параметры электронного транспорта получаются путем соответствующего интегрирования вычисленной функции распределения электронов по энергиям по сечениям рассеяния электронов.
modeldescr_plasma/argon_pdp = Плазменная панель дисплея\n\nВ этом примере рассматривается процедура адресации, используемая для генерации ультрафиолетового света для плазменных панелей дисплея (PDP).
modeldescr_plasma/boltzmann_argon = Argon Boltzmann Analysis\n\nВ этом учебном пособии исследуется влияние различных параметров на функцию распределения электронов по энергии и коэффициенты скорости для аргонового разряда.
modeldescr_plasma/boltzmann_oxygen = Анализ Больцмана кислорода\n\nВ этом учебном пособии сравниваются экспериментальная и расчетная скорость дрейфа для разряда кислорода в дрейфовой трубе.
modeldescr_plasma/transient_negative_mobility = Эффекты переходной отрицательной подвижности и отрицательной дифференциальной проводимости в ксеноне \n\nВ этой учебной модели представлено исследование, показывающее эффекты переходной отрицательной подвижности и отрицательной дифференциальной проводимости в ксеноне. Стационарное и нестационарное уравнение Больцмана в двухчленном приближении используется для расчета функции распределения электронов по энергии. Функции распределения электронов по энергии, средняя энергия электронов и скорость дрейфа хорошо согласуются с результатами моделирования, опубликованными З. Донко и Н. Дятько.
modeldescr_plasma/boltzmann_dry_air = Сухой воздух Анализ Больцмана\n\nЭта модель решает уравнение Больцмана в двухчленном приближении для смеси азота и кислорода, представляющей собой фоновый газ сухого воздуха. Коэффициенты переноса электронов и источники источников вычисляются путем соответствующего интегрирования функции распределения энергии электронов по сечениям электронного удара. Показано, как подготовить функцию распределения энергии электронов к экспорту, чтобы ее можно было использовать в интерфейсе Plasma.
modeldescr_plasma/boltzmann_hydrogen = Водород Больцмана Анализ\n\nЭта модель решает уравнение Больцмана в двухчленном приближении для фона молекулярного и атомарного водорода. Подвижность электронов и исходные условия вычисляются путем подходящего интегрирования функции распределения электронов по энергии по сечениям электронного удара.
modeldescr_plasma/ccp_benchmark = Эталонная модель ёмкостно-связанной плазмы\n\nВ этом примере воспроизводятся опубликованные результаты тестов для одномерной ёмкостно-связанной плазмы. Модель приводится в действие постоянным током, а не постоянным напряжением. Ионный ток, энерговыделение, плотность электронов, плотность ионов и поток ионов сравниваются с опубликованными данными.
modeldescr_plasma/ccp_argon_oxygen = Модель аргонно-кислородного плазменного реактора с ёмкостной связью\n\nВ этой учебной модели рассматривается одномерный плазменный реактор с ёмкостной связью в смеси аргона и кислорода. Обсуждаются важные аспекты и стратегии моделирования электроотрицательных разрядов.
modeldescr_plasma/chlorine_global_model = Chlorine Discharge Global Model\n\nПлазменные разряды, содержащие хлор, обычно используются для травления полупроводников и металлов в микроэлектронике. изготовление.\n\nВ этой учебной модели изучаются плазменные разряды хлора с использованием глобальной (усредненной по объёму) модели диффузии. Модели глобальной диффузии могут выполнять моделирование за долю времени, которое потребовалось бы для пространственно-зависимых моделей. Это делает их хорошим выбором для изучения больших наборов реакций и расширенных областей параметров.\n\nМодель хлорного разряда исследует поглощаемую мощность от 50 до 600 Вт, работая при давлениях от 1 до 100 мТорр. Результаты моделирования нескольких важных величин, таких как электронная плотность, электронная температура и атомная плотность хлора, хорошо согласуются с измерениями, выполненными в индуктивно-связанных плазменных реакторах, которые можно найти в литературе.
modeldescr_plasma/boltzmann_global_model_argon = Глобальная модель в сочетании с двухчленным уравнением Больцмана \n\nФункция распределения электронов по энергии (EEDF) играет важную роль в общем поведении разрядов. В этом примере изучается период формирования аргоновой плазмы, при этом особое внимание уделяется ФРЭЭ. Плазма создается в зазоре шириной 4 см с помощью источника постоянного тока напряжением 1 кВ и давлением 100 мТорр. Глобальная модель в приближении локального поля используется для описания временной эволюции видов плазмы. Коэффициенты скорости реакций электронного удара и подвижность электронов получаются путем соответствующего интегрирования сечений по ФРЭЭ, а ФРЭЭ вычисляется на каждом временном шаге с использованием уравнения Больцмана в двухчленном приближении.
modeldescr_plasma/computing_plasma_impedance = Расчёт импеданса плазмы\n\nВ этой учебной модели показано, как вычислить импеданс ёмкостно связанной плазмы. Исследование «Периодическое время» вычисляет периодическое по времени решение плазмы. Впоследствии решение преобразуется во временную область, после чего вызывается решатель быстрого преобразования Фурье (БПФ). Это позволяет вычислять импеданс плазмы для заданного набора входных параметров. Это значение импеданса полезно при проектировании согласующих сетей.
modeldescr_plasma/alpha_to_gamma_transition = Альфа-гамма-переход\n\nЁмкостно-связанные ВЧ-разряды могут работать в двух различных режимах в зависимости от мощности разряда. В режиме малой мощности, известном как альфа-режим, колебания электрического поля отвечают за нагрев и создание электронов. В режиме высокой мощности, известном как гамма-режим, разряд поддерживается в основном за счет электронной лавины внутри оболочек, инициируемой вторичными электронами, испускаемыми ионами, бомбардирующими электроды. Эта модель исследует альфа- и гамма-режимы и переход между ними в ёмкостном ВЧ-разряде при атмосферном давлении с использованием интерфейса «Плазма, периодическое время».
modeldescr_plasma/breakdown_between_spheres = Электрический пробой между сферами\n\nЭта модель подтверждает, что начало образования стримера между двумя сферами, разделенными атмосферным давлением сухого воздуха на расстоянии 2 см, происходит при 51,8 кВ. Электрический пробой обнаруживается путем интегрирования коэффициентов Таунсенда вдоль линий электрического поля между двумя сферами. Как только интегрированный коэффициент Таунсенда достигнет определенного порога, сформируется стример, создающий короткое замыкание.
modeldescr_plasma/ccp_ion_energy_distribution_function = Функция распределения энергии ионов в плазменном реакторе с ёмкостной связью\n\nЭта модель вычисляет функцию распределения энергии ионов (IEDF) для коммерческого плазменного реактора с ёмкостной связью. Результаты показывают хорошее согласие с экспериментальными данными.
modeldescr_plasma/corona_discharge_1d = Коронный разряд атмосферного давления\n\nВ этом примере моделируется отрицательный коронный разряд, возникающий между двумя коаксиально выполненными проводниками. К внутреннему проводнику прикладывается отрицательный электрический потенциал, а внешний проводник заземляется. Моделируемый разряд моделируется в аргоне при атмосферном давлении.
modeldescr_plasma/corona_discharge_air_1d = Коронный разряд атмосферного давления в воздухе\n\nВ этой учебной модели представлено исследование коаксиального коронного разряда постоянного тока в сухом воздухе при атмосферном давлении. Габариты и условия эксплуатации аналогичны электрофильтрам по схеме «провод-пластина». Внутренний проволочный электрод имеет радиус 100 мм, а зазор между электродами составляет 10 см.\n\nМодель решает уравнения непрерывности и импульса электронов и ионов в приближении дрейфа-диффузии, самосогласованно связанные с уравнением Пуассона’s. Используется приближение локального поля, что означает, что коэффициенты переноса и источника считаются хорошо параметризованными посредством уменьшенного электрического поля.\n\nПредставленное моделирование относится к установившимся режимам с устойчивым разрядом и 10's of kV applied to the inner electrode while the exterior electrode is grounded. Emphasis is placed on the charged particles' созданием и переносом, и как это отражается на вольт-амперной характеристике разряда.
modeldescr_plasma/dbd_flow_control = Диэлектрический барьерный плазменный привод \n\nВ этом примере на открытый электрод подается переходное напряжение, которое на пике вызывает ионизацию газа над вставленным электродом. Ионизированный газ в присутствии электрического поля, создаваемого геометрией электрода, приводит к образованию вектора объёмной силы, который действует на окружающий (нейтрально заряженный) газ. Основная сила, создаваемая распределением пространственного заряда, является основным механизмом активного аэродинамического управления.
modeldescr_plasma/dipolar_ecr_source = Диполярный источник микроволновой плазмы\n\nИсследован диполярный источник микроволновой плазмы, поддерживаемый электронным циклотронным резонансом (ЭЦР). Вложение энергии в плазму от электромагнитных волн происходит в очень тонкой резонансной зоне, где статическая плотность магнитного потока равна резонансной плотности потока (0,0875 Тл).\n\nТребуется плазменный модуль, модуль переменного/постоянного тока и радиочастотный модуль.
modeldescr_plasma/drift_diffusion_tutorial = Учебное пособие по дрейфовой диффузии\n\nВ основе Плазменного модуля лежит уравнение дрейфа-диффузии для переноса электронов. Интерфейс Drift Diffusion решает пару уравнений реакции/адвекции/диффузии: одно для электронной плотности, а другое для средней энергии электронов.
modeldescr_plasma/electrodeless_lamp = Безэлектродная лампа\n\nВ этом примере исследуется спектр излучения и механизм преобразования электрической энергии в световую энергию в безэлектродной лампе. По сути, модель представляет собой трансформатор, в котором плазма играет роль вторичного компонента. Модель содержит 96 реакций и 12 видов.
modeldescr_plasma/electrostatic_precipitator = Электростатический осадитель\n\nЭта модель вычисляет течение жидкости, перенос заряда и электрический потенциал в электростатическом осадителе. На основании полученных полей в устройство подаются частицы разного диаметра и вычисляется вероятность передачи. Как и ожидалось, эффективность разделения показывает минимум, когда радиус частиц составляет около 0,2 микрона.
modeldescr_plasma/glided_arc = Скользящая дуга\n\nВ этом примере исследуется удлинение и смещение дуги во время размыкания подвижного электрического контакта в низковольтном переключающем устройстве. Двумерная модель включает силы Лоренца, омический нагрев и объёмные потери на излучение. Предполагается, что дуга находится в локальном термодинамическом равновесии.
modeldescr_plasma/harmonic_content = Гармоническое содержание энерговыделения в двухчастотной ёмкостно связанной плазме \n\nПередача энергии от изменяющегося во времени электростатического поля электронам в ёмкостно связанной плазме (CCP) не происходит исключительно на удвоенной радиочастотной частоте. Из-за сильно нелинейного механизма передачи энергии от полей к электронам выделение энергии происходит на частотах, более чем в два раза превышающих частоту возбуждения. для двухчастотных реакторов ПГУ гармоническое содержание энерговыделения происходит на многих различных частотах.
modeldescr_plasma/icp_torch = Горелка с индуктивно связанной плазмой (ICP)\n\nВ этом примере исследуются электрические и тепловые характеристики горелки с индуктивно связанной плазмой при атмосферном давлении. Предполагается, что разряд находится в локальном термодинамическом равновесии.
modeldescr_plasma/plasma_dc_arc = Плазменная дуга постоянного тока\n\nВ этом примере исследуются электрические и тепловые характеристики плазменной дуги постоянного тока, созданной в конфигурации «точка-плоскость». Предполагается, что разряд находится в локальном термодинамическом равновесии. Плазма считается проводящей жидкой средой и моделируется с использованием подхода магнитогидродинамики. Эта модель показывает, как использовать интерфейс Магнитогидродинамика, Внеплоскостные токи для моделирования плазмы, генерируемой в дуге постоянного тока.
modeldescr_plasma/plasma_pulsed_arc = Плазменная импульсная дуга\n\nВ этом примере исследуются электрические и тепловые характеристики плазменной импульсной дуги, созданной в конфигурации точка-плоскость. Предполагается, что разряд находится в локальном термодинамическом равновесии. Плазма считается проводящей жидкой средой и моделируется с использованием подхода магнитогидродинамики. Эта модель показывает, как использовать интерфейс Магнитогидродинамика, Внеплоскостные токи для моделирования плазмы, генерируемой в импульсной дуге.
modeldescr_plasma/icp_argon_oxygen = Модель аргоно-кислородного реактора с индуктивно-связанной плазмой\n\nВ этой учебной модели рассматривается реактор с индуктивно-связанной плазмой в смеси аргона и кислорода. Модель вычисляет течение жидкости и нагрев газа. Обсуждаются важные аспекты и стратегии моделирования электроотрицательных разрядов.
modeldescr_plasma/icp_coil_optimization = Оптимизация катушки реактора ИСП\n\nЭта модель показывает, как можно использовать оптимизацию формы при проектировании катушек реактора ИСП для получения однородности плазмы. Исследуемый реактор представляет собой планарный ИКП с катушками, распределенными в радиальном направлении. Этап исследования оптимизации используется для поиска наилучшего размещения катушки, чтобы градиент электронной плотности в центре реактора был минимизирован. Целевая плотность электронов в центре реактора также задается путем изменения мощности катушки.
modeldescr_plasma/icp_ccp_argon_chlorine = Модель реактора с индуктивно связанной плазмой аргона и хлора с радиочастотным смещением \n\nВ этой учебной модели рассматривается реактор с индуктивно связанной плазмой с радиочастотным смещением в смеси аргона и хлора. Модель вычисляет течение жидкости и нагрев газа. Обсуждаются важные аспекты и стратегии моделирования электроотрицательных разрядов.
modeldescr_plasma/impedance_matching = Согласование импеданса\n\nЭто руководство управляет плазмой с ёмкостной связью с помощью согласующей схемы L-типа при высоких и низких мощностях. При малой мощности, когда гармоники тока малы, идеальное согласование достигается при выбранном значении мощности. Выполняются измерения мощности, частоты и давления и исследуется их влияние на коэффициент передачи мощности и эффективность согласования. Наконец, развертка выполняется в более высоком диапазоне мощности, и присутствие значительных гармоник в токе вызывает рассогласование импедансов.
modeldescr_plasma/inplane_microwave_plasma = In-Plane Microwave Plasma\n\nВ этом учебном примере представлена простая 2D-модель аргоновой плазмы, поддерживаемой за счет нагрева электромагнитными волнами.
modeldescr_plasma/ion_energy_distribution_function = Функция распределения энергии ионов\n\nВ этом примере вычисляется функция распределения ионов по энергии (IEDF) для ионов аргона в индуктивно связанной плазме. Ионам задана начальная максвелловская функция распределения. Затем они подвергаются сочетанию упругих столкновений и реакций перезарядки с разреженным фоновым газом.
modeldescr_plasma/microwave_microplasma = Микроволновая микроплазма\n\nПлазма, поддерживаемая в микроразмерных разрядных промежутках, способна работать при высоком давлении (1 атм) с высокой плотностью электронов (10²⁰ m⁻³) и плотность мощности (10⁹ Вт.м⁻³) при сохранении относительно прохладного температура тяжелых частиц. Эта модель моделирует аргоновую плазму атмосферного давления, поддерживаемую изменяющимся во времени электрическим возбуждением в микроволновом диапазоне. Модель является одномерной по направлению приложенного поля и описывает пространственную и временную эволюцию ряда макроскопических свойств плазмы.
modeldescr_plasma/oxygen_gec_icp = GEC ICP Reactor, Argon/Oxygen Chemistry\n\nЭлектроотрицательная плазма демонстрирует характеристики, отличные от электроположительных разрядов, из-за присутствия отрицательных ионов. В этом примере моделируется индуктивно связанная плазма для смеси аргона (30%) и кислорода (70%). Плазмохимия состоит из 62 реакций и 15 видов. Отрицательные ионы удерживаются в ядре плазмы, поскольку не могут покинуть амбиполярное поле.
modeldescr_plasma/plasma_display_panel = Плазменная панель дисплея\n\nЭтот пример иллюстрирует физику диэлектрического барьерного разряда, который приводит к генерации света в пикселях, используемых в плазменных панелях дисплея.
modeldescr_plasma/plasma_enhanced_cvd = Плазменное химическое осаждение из паровой фазы\n\nВ этом примере моделируется осаждение кремния на пластину с использованием смеси аргона и силана в соотношении 95/5. Плазмохимия состоит из 19 объёмных реакций, 8 поверхностных реакций, 11 объёмных частиц и 3 поверхностных реакций. Плазма сильно электроотрицательна из-за присутствия ионов SiH4-.
modeldescr_plasma/positive_and_negative_corona_discharges = Положительные и отрицательные коронные разряды\n\nВ этом учебном пособии представлены исследования положительных и отрицательных коронных разрядов в сухом воздухе при атмосферном давлении. Разряды поддерживаются внутри двух электродов, расположенных коаксиально, с помощью источника постоянного тока высокого напряжения, приложенного к внутреннему электроду. Используются два разных типа моделей: модель полной самосогласованной плазмы и упрощенная модель. Модель плазмы решает уравнения непрерывности и импульса электронов и ионов в приближении дрейфа-диффузии, самосогласованно связанные с уравнением Пуассона ’s. Используется приближение локального поля, что означает, что коэффициенты переноса и источника считаются хорошо параметризованными посредством уменьшенного электрического поля. Упрощенная модель использует упрощенную модель переноса заряда в сочетании с электростатикой, чтобы обеспечить приближенный метод расчета плотности заряда и электростатического поля в коронных разрядах. Плотность объёмного заряда и электрический потенциал, полученные с помощью упрощенной модели, хорошо согласуются с результатами моделирования, полученными с помощью модели самосогласованной плазмы.
modeldescr_plasma/positive_column_1d = Тлеющий разряд постоянного тока, 1D\n\nТлеющие разряды постоянного тока в режиме низкого давления уже давно используются в газовых лазерах и люминесцентных лампах. Разряды постоянного тока привлекательны для изучения, поскольку решение не зависит от времени. Эта одномерная модель показывает, как использовать интерфейс разряда постоянного тока для настройки анализа положительного столба. Разряд поддерживается за счет эмиссии вторичных электронов на катоде.
modeldescr_plasma/positive_column_1d_boltzmann = Тлеющий разряд постоянного тока в сочетании с двухчленным уравнением Больцмана \n\nВ этом учебном пособии моделируется тлеющий разряд постоянного тока путем решения уравнений типа плазменной жидкости, полностью связанных с однородным и независимым от времени электронным уравнением Больцмана в классическом двухчленном приближении. Приближенное уравнение Больцмана решается для каждой позиции пространства и связывается с уравнениями типа жидкости через среднюю энергию электронов. Константы скорости реакций электронного удара и параметры электронного транспорта получаются путем соответствующего интегрирования вычисленной функции распределения электронов по энергиям по сечениям рассеяния электронов.
modeldescr_plasma/positive_column_2d = Тлеющий разряд постоянного тока\n\nТлеющие разряды постоянного тока в режиме низкого давления давно применяются в газовых лазерах и люминесцентных лампах. Разряды постоянного тока привлекательны для изучения, поскольку решение не зависит от времени. Эта 2D-модель показывает, как использовать интерфейс разряда постоянного тока для настройки анализа положительного столба. Разряд поддерживается за счет эмиссии вторичных электронов на катоде.
modeldescr_plasma/pulsed_ccp_discharge = Импульсный ёмкостно-связанный плазменный разряд\n\nВ этой учебной модели показано, как настроить модель импульсного ёмкостного разряда. Импульс включения состоит из 10 периодов возбуждения на частоте 13,56 МГц, за которыми следует отсутствие возбуждения в течение 100 периодов. Изучены ВАХ, плотность электронов, температура и потенциал плазмы.
modeldescr_plasma/streamer_1d = Отрицательный стример в азоте\n\nСтримеры представляют собой кратковременные нитевидные электрические разряды, которые могут развиваться в непроводящем фоне в присутствии интенсивного электрического поля. Эти разряды могут достигать высокой плотности электронов и, следовательно, высокой концентрации химически активных частиц, которые имеют важное значение для многочисленных применений. Промышленные применения включают производство озона, контроль загрязнения и обработку поверхности.\n\nРаспространение стримеров обусловлено очень нелинейной динамикой, которая включает в себя очень крутые градиенты плотности и высокую плотность пространственного заряда, распределенную в очень тонких слоях. В этой учебной модели представлено исследование отрицательного стримера в азоте атмосферного давления в постоянном электрическом поле -100 кВ/см. Модель является одномерной и описывает переходное поведение исходной электронной затравки от роста электронов в невозмущенном электрическом поле до распространения стримера.
modeldescr_plasma/streamer_2d = Двуглавый стример в азоте\n\nВ этой учебной модели представлено исследование двухголового стримера в азоте при атмосферном давлении. Первоначальная затравка электронов помещается между двумя электродами, которые прикладывают к газу начальное электрическое поле напряженностью 52 кВ/см. Отрицательный и положительный стример распространяются к электродам. Плотность электронов, электрическое поле и скорость распространения стримера хорошо согласуются с результатами моделирования, опубликованными Bessières и другими.
modeldescr_plasma/surface_chemistry_tutorial = Учебное пособие по химии поверхности с использованием модуля «Плазма»\n\nХимия поверхности часто является упускаемым из виду аспектом моделирования реагирующего потока. В этой учебной модели показано, как можно добавить поверхностные реакции и вещества для изучения таких процессов, как химическое осаждение из паровой фазы (CVD). Затем в учебном пособии моделируется рост кремния на пластине.\n\nПервоначально в примере используется глобальная модель для исследования широкой области параметров со сложной химической структурой. Затем настраивается и запускается пространственно-зависимая модель. Особое внимание уделяется общему балансу масс в системе, при этом исследуется разница между среднемассовой скоростью и скоростью диффузии. Модель демонстрирует, что общая масса и молярная концентрация в системе сохраняются. Наконец, высота осажденного кремния изучается как функция времени.
modeldescr_plasma/thermal_plasma = Thermal Plasma\n\nВ этом примере индуктивно связанной плазмы высокой плотности при давлении 1 торр вычисляются температура нейтрального газа и поле потока, а также все другие компоненты, составляющие плазму. Нагрев газа происходит за счет тушения возбужденных атомов аргона.
modeldescr_plasma/point_to_plane_dc_corona = Коронный разряд постоянного тока в воздухе в конфигурации «точка-плоскость»\n\nВ этой учебной модели представлено исследование отрицательного коронного разряда в сухом воздухе при атмосферном давлении в конфигурации «точка-плоскость». Эллиптический электрод миллиметрового размера создает электрическое поле высокой напряженности, в котором возникает коронный разряд. Заземляющая пластина расположена на расстоянии 10 см от коронирующего электрода. Напряжение варьируется от -5 до -50 кВ. Создание и транспорт заряженных частиц решается самосогласованно в сочетании с уравнением Пуассона’s. Используется приближение локального поля, что означает, что коэффициенты переноса и источника считаются хорошо параметризованными посредством уменьшенного электрического поля.
modeldescr_plasma/hydrogen_global_model = Глобальная модель водорода в сочетании с двухчленным уравнением Больцмана \n\nВ этом примере водородный плазменный реактор при умеренном давлении изучается с использованием глобальной модели. Включено уравнение теплопроводности тяжелых частиц. В первой части исследования используется максвелловская функция распределения электронов по энергии. Во второй части глобальная модель решается самосогласованно с уравнением Больцмана в двухчленном приближении.
modeldescr_plasma/microwave_cavity_plasma = Плазменный реактор с микроволновой полостью\n\nВ этой учебной модели рассматривается водородная плазма, создаваемая в микроволновой полости. Модель самосогласованно вычисляет течение жидкости и нагрев газа.

# Polymer Flow Module models
modeldescr_polymer/cylinder_flow_viscoelastic = Течение вязкоупругой жидкости мимо цилиндра \n\nЖидкость Oldroyd-B представляет собой одно из простейших определяющих соотношений, способных описать вязкоупругое поведение разбавленных полимерных растворов в обычных условиях течения. В этом примере моделируется течение такой жидкости мимо цилиндра между двумя параллельными пластинами.
modeldescr_polymer/slot_die_coating_2d = 2D неньютоновское покрытие щелевой матрицы\n\nВ этом учебном пособии показано, как смоделировать процесс нанесения покрытия щелевой матрицы с помощью степенной неньютоновской жидкости в одной из двух фаз. В модели используется метод фазового поля двухфазного потока.
modeldescr_polymer/slot_die_coating_3d = Покрытие щелевой матрицы с дефектом канала\n\n Это учебное пособие по процессу нанесения покрытия на щелевую матрицу в 3D, где канал заблокирован. В примере используется метод фазового поля двухфазного потока с неньютоновской степенной жидкостью. Отчетливо видно влияние на толщину пленки обструкции канала.
modeldescr_polymer/beads_on_string = Структура вязкоупругих нитей «бусинки на нити» \n\nВ этом примере применяется жидкость Oldroyd-B для моделирования утончения вязкоупругой нити под действием поверхностного натяжения. За времена, меньшие времени релаксации полимера, нить приобретает структуру бусинок на нити. На временах, значительно превышающих время релаксации, раствор состоит из почти сферических капель, соединенных экспоненциально утончающимися нитями. Оба переходных режима хорошо согласуются с экспериментальными измерениями.
modeldescr_polymer/rubber_injection_molding = Литье резины под давлением\n\nВ этом учебном примере показано, как настроить 3D-моделирование литья резины под давлением. Метод фазового поля используется для отслеживания границы раздела между резиной и вытесненным воздухом. Каучук моделируется как разжижающаяся при сдвиге неупругая неньютоновская степенная жидкость с коэффициентом консистенции жидкости, приводящим к высокому соотношению вязкостей резины и воздуха. Чтобы сгладить большую разницу вязкостей на границе раздела, используется метод усреднения вязкости, основанный на объёмной доле.
modeldescr_polymer/pasta_extrusion = Экструзия макаронных изделий\n\nВ этом примере изучается неизотермическая экструзия макаронных изделий. Вращающийся шнек продавливает макаронное тесто через экструдер для придания желаемой формы.\nЧтобы контролировать повышение температуры в экструдере из-за вязкой диссипации, экструдер охлаждается снаружи. \nМакаронное тесто моделируется как неньютоновская псевдопластическая жидкость с температурно-зависимыми реологическими свойствами. Модель решается с использованием подхода замороженного ротора, который очень эффективен по сравнению с решением переходной модели.
modeldescr_polymer/viscoelastic_fsi_flexible_wall = Вязкоупругое течение через канал с гибкой стенкой\n\nЭта модель представляет собой тестовый пример течения в упругой трубе. Этот конкретный случай моделирует вязкоупругое течение и представляет собой стационарное течение в канале, в котором часть верхней стенки заменена упругой пластиной, находящейся под внешним давлением. Модель воспроизводит результаты, описанные в литературе. \n\nПРИМЕЧАНИЕ. для модели требуются модуль потока полимеров и модуль механики конструкций.

# Porous Media Flow Module applications
modeldescr_porous/ceramic_water_filter = Керамический фильтр для воды с сердечником из активированного угля\n\nВ этом примере показано, как смоделировать перенос различных загрязнений через керамическую свечу фильтра для воды с сердечником из активированного угля. Эти типы фильтров для воды можно найти в настольных гравитационных фильтрах, а также прикреплять к крану или как часть более крупной системы фильтров обратного осмоса. В учебном пособии показано, как составить уравнения потока и переноса для моделирования различных механизмов фильтрации, а также рассматривается влияние небольшой трещины в керамической детали.
modeldescr_porous/linear_biphasic_poroelasticity = Линейная двухфазная пороупругость\n\nВ этом примере показано, как использовать мультифизическую связь «Пороупругость» между интерфейсами «Механика твёрдого тела» и «Закон Дарси» для моделирования линейного поровязкоупругого поведения мягких биологических тканей. Реализация проверяется с использованием двух численных тестов из литературы: испытания на кручение и испытания на вдавливание цилиндрических пробок суставного хряща.
modeldescr_porous/packed_bed_latent_heat_storage = Хранение скрытой теплоты в насадочном слое\n\nВ этой модели показано, как моделировать резервуар для хранения скрытой теплоты в насадочном слое. Системы хранения скрытого тепла хранят энергию (обычно энергию, обеспечиваемую солнечными коллекторами) с использованием материалов с фазовым переходом. Конфигурация требует учета локального термического неравновесия между парафином, в котором происходит фазовый переход, и загружаемой жидкой водой.
modeldescr_porous/pore_scale_flow_3d = Анализ пористых структур в микроскопическом масштабе\n\nМоделирование течения через реалистичные пористые структуры затруднено из-за сложности самой структуры. Детальное определение поля течения невозможно в реальных приложениях. Поэтому используются макроскопические подходы, которые используют усредненные величины пористой структуры, такие как пористость и проницаемость. В этом примере импортируется STL-файл пористой структуры и подробно анализируется поле течения в масштабе пор.
modeldescr_porous/porous_microchannel_heat_sink = Производительность пористого микроканального радиатора \n\nВ этом примере вычисляется эффективность пористого микроканального радиатора по сравнению с обычным микроканальным радиатором. Модель полностью параметризована. Исследование параметров толщины пористой подложки используется для определения оптимальной конфигурации.
modeldescr_porous/porous_microchannel_heat_sink_optimization = Оптимизация пористого микроканального радиатора \n\nВ этом примере производительность пористого микроканального радиатора оптимизируется с помощью модуля оптимизации. Рассчитано оптимальное значение толщины пористой подложки. Этот пример является расширением модели "Performance of a Microchannel Heat Sink", и результаты сравниваются с результатами исследования параметров исходной модели.
modeldescr_porous/rtm_wind_turbine_blade = Формование методом переноса смолы лопасти ветряной турбины\n\nВ этом примере показано моделирование процесса трансферного формования смолы (RTM) для лопасти ветряной турбины с использованием интерфейса «Двухфазное течение, набор уровней, уравнения Бринкмана». Смола впрыскивается в заготовку, состоящую из разных композитов с разной анизотропной проницаемостью.
modeldescr_porous/wicking_paper = Впитывание в бумажную полоску\n\nВ этом примере моделируется впитывание в пористой среде. Впитывание — это явление, которое возникает, когда сухая пористая среда контактирует с жидкостью: она поглощает жидкость за счет капиллярных сил до тех пор, пока не будет достигнуто равновесие между гравитационными и капиллярными силами.

# RF Module add-ins
addinlabel_rf/sparameter_analysis = Анализ S-параметров
addindoc_rf/sparameter_analysis = Эта надстройка помогает находить максимумы, минимумы и полосу пропускания на основе графика S-параметров в масштабе дБ.
addindoc_rf/sparameter_analysis_form_sparameterAnalysisSettings = Используйте кнопки панели инструментов в окне настроек, чтобы добавить аннотации для вычисленных максимумов, минимумов и полосы пропускания или удалить аннотации на выбранном 1D-графике.
addin_rf/Remove_all_annotations = Удалить все аннотации
