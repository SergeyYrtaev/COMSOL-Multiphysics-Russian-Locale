addinlabel_mph/planar_cut = Планарная резка
addindoc_mph/planar_cut = Это дополнение добавляет шаги к последовательности геометрии для разделения 3D-геометрии в определенной плоскости и удаляет части вверх или вниз по плоскости. План может быть определен как xy-, xz- или yz-плоскость. Координат плоскости может быть средней точкой (вычисленной из ограничивающего поля геометрии) или определяться пользователем. Можно отменить последний разрез или отменить все разрезы, что удаляет соответствующие шаги из геометрической последовательности.
addinlabel_mph/planar_cut_form_main = Планарная резка
addindoc_mph/planar_cut_form_main = Раздел 3D-геометрии в определенной плоскости и удалить части вверх или вниз плоскости.
addinlabel_mph/planar_cut_form_planeDef = Определение плоскости
addin_mph/planar_cut_mainwindow = Планерный разрез
addin_mph/planar_cut_Midpoint = Средняя точка
