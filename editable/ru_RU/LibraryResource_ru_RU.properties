addindoc_mph/_07_advanced_compact_tablets = Шаблон для разработки приложений, которые будут использоваться на небольших экранах, таких как планшеты или ноутбуки. Шаблон состоит из верхнего меню с четырьмя большими кнопками и горизонтальными линиями. Активный верхний пункт меню выделен жирным текстом синим. Горизонтальная линия ниже кнопки выделена синим цветом и имеет увеличенную толщину. Нажатие на кнопку в верхнем меню активирует два стека карт. Первый стек карт содержит панель инструментов с элементами для построения графики в графическом объекте внизу, в то время как второй стек карт может использоваться для добавления входов, настроек и результатов.
