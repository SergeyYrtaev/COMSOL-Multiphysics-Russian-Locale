############################################################################################
#
# Application Library app and model descriptions
#
# Below, add descriptions to display with applications in the Application Libraries window.
# Use modeldescr_<producttag>/<filename> (applicationdescr_<producttag>/<filename> for apps) 
# as the resource key, where <filename> is the name of the MPH-file excluding extension.
# \n can be used to force line breaks at certain positions. In particular, \n\n (without any
# surrounding spaces) MUST be used to separate the title from the description text.
#
# Note: The 'modeldescr_' resources are parsed in a shell script that writes them
#       to the model help plug-ins. Therefore, make sure to use single spaces on both 
#       sides of the equal sign on each 'modeldescr_' or 'applicationdescr_' line.
#
# Note to translators: If you want to use the English text for a particular application, 
#       replace the right-hand side by the annotation $ENGLISH$, for example
#         applicationdescr_cfd/inkjet = $ENGLISH$
#       Do NOT copy the current English text, because it will then not be updated if the
#       original text is updated.
#
############################################################################################


