# RF Module applications
applicationdescr_rf/corrugated_circular_horn_antenna = Гофрированная круглая рупорная антенна\n\nЭто приложение демонстрирует следующее:\n\n• Панель инструментов с большими кнопками для навигации вместо ленты \n• Подформы используются в качестве разделов, а заголовки разделов включают изображение \n• Предоставляет информацию, если результаты находятся в определенном диапазоне \n• Визуализирует двухмерную осесимметричную модель полностью 3D\n\nВозбуждаемая ТЕ-мода из круглого волновода проходит вдоль гофрированной внутренней поверхности круглой рупорной антенны, где также генерируется TM-мода. В сочетании эти два режима дают меньшую кросс-поляризацию в апертуре антенны. С помощью этого приложения можно улучшить характеристики излучения антенны, а также коэффициент кросс-поляризации апертуры, изменив геометрию антенны.
applicationdescr_rf/frequency_selective_surface_simulator = Частотно-избирательный поверхностный симулятор\n\nЭто приложение демонстрирует следующее:\n\n• Разработка приложения для маленькие экраны, такие как смартфоны\n• Пользовательский интерфейс навигации с верхним меню, обычно используемым на веб-сайтах\n• Геометрические детали и параметризованные geometries\n• Визуализация периодичности геометрии с рендерингом материала\n• Предупреждающие сообщения на значках, когда свойства отсутствуют update\n• Отправка электронного письма с прикрепленным отчетом после завершения расчётов\n\nЧастотно-избирательные поверхности (FSS) представляют собой периодические структуры, которые генерируют полосу пропускания или заграждение частотная характеристика. Они используются для фильтрации или блокировки радиочастотных, микроволновых или, по сути, любых электромагнитных волн. Например, вы видите эти селективные поверхности на дверцах микроволновых печей, которые позволяют вам видеть разогреваемую пищу, не нагреваясь при этом самому. \n\nПриложение имитирует заданную пользователем периодическую структуру, выбранную из встроенных типов элементарных ячеек. Он предоставляет пять типов элементарных ячеек, широко используемых в моделировании FSS, а также две заранее определенные поляризации в одном фиксированном направлении распространения, которое имеет нормальное падение на FSS. Анализ включает в себя спектры отражения и пропускания, норму электрического поля на верхней поверхности элементарной ячейки и норму электрического поля в масштабе дБ, показанную на вертикальной плоскости сечения в области элементарной ячейки. кольцо и др.), а также их геометрические параметры, в том числе периодичность (размер ячеек).
applicationdescr_rf/microstrip_patch_antenna_array_synthesizer = Синтезатор микрополосковой антенной решетки со слотовой связью\n\nЭто приложение демонстрирует следующее:\n\n• Параметризованная геометрия\n• Визуализация внешнего вида, цвета и текстура\n• Несколько графиков в одном окне для визуализации результатов\n• Параметры для визуализации результатов в разных представлениях с помощью проверки box\n\nМикрополосковые патч-антенны используются в ряде отраслей промышленности в качестве приемопередатчиков радиолокационных и радиочастотных сигналов. Это главный кандидат для системы мобильной сети 5G.\n\nПриложение моделирует однощелевую микрополосковую патч-антенну, изготовленную на многослойной низкотемпературной керамической подложке (LTCC). Используя это приложение, вы сможете моделировать диаграмму направленности антенной решетки в дальней зоне и ее направленность. Диаграмма направленности в дальней зоне аппроксимируется путем умножения коэффициента решетки и диаграммы направленности одиночной антенны для выполнения эффективного анализа в дальней зоне без моделирования сложной модели полной решетки.\n\nВы также можете оценить прототипы фазированных антенных решеток для мобильных сетей 5G с входной частотой по умолчанию 30 ГГц. Это можно сделать, изменяя свойства антенны, такие как геометрические размеры и материал подложки.
applicationdescr_rf/plasmonic_wire_grating = [Плазмонная проволочная решётка (RF)] Анализатор плазмонной проволочной решетки \n\nЭто приложение вычисляет эффективность дифракции для нулевого, первого и второго порядков дифракции \n2 при пропускании и отражении — как функции угла падения проволочной решетки на диэлектрической подложке. Приложение также показывает график нормы электрического поля для нескольких периодов решетки для выбранного угла падения.

# RF Module models
modeldescr_rf/airplane_antenna_crosstalk = Моделирование перекрестных помех между антеннами на фюзеляже самолета \n\nПерекрестные помехи в антеннах, или помехи на одной площадке, проблематичны, когда несколько антенн используются на одной большой платформе. В этом примере помехи между двумя идентичными антеннами на частоте ОВЧ изучаются с помощью анализа S-параметров различных конфигураций приемной антенны, установленной на фюзеляже самолета. Рассчитываются двумерные и трехмерные диаграммы направленности передающей антенны в дальней зоне, а также визуализируются освещенные и затененные области на поверхности самолета.
modeldescr_rf/anechoic_chamber = Безэховая камера, поглощающая электромагнитные волны\n\nБезэховая камера используется для измерения характеристик антенны, электромагнитных помех (ЭМП) и электромагнитной совместимости (ЭМС). Внутри камеры расположены поглотители, состоящие из множества пирамидальных объектов, которые направляют распространяющееся падающее поле на соседние поглотители. Поглощая электромагнитные волны внутри камеры и блокируя входящие сигналы снаружи, камера создает виртуальное бесконечное пространство, которое практически не имеет внутренних отражений и не страдает от каких-либо нежелательных внешних радиочастотных шумов. палата. Рассчитанная диаграмма направленности в дальней зоне и S-параметр (S11) демонстрируют, что поглотители микроволнового излучения значительно уменьшают отражение от стен, не искажая характеристики антенны.
modeldescr_rf/antenna_ebg = Развязка антенн с использованием электромагнитной запрещенной зоны Metamaterial\n\nСтруктура электромагнитной запрещенной зоны (EBG) может использоваться для увеличения изоляции между антеннами, расположенными близко друг к другу. Этот эффект развязки зависит не только от частоты, но также от поляризации и конфигурации плоскости связи. В этом примере анализируется структура EBG, помещенная между двумя антеннами, и показано заметное уменьшение связи между двумя антеннами.
modeldescr_rf/axisymmetric_cavity_resonator = Осесимметричный резонатор \n\nЭто эталонная задача для двумерной осесимметричной формулировки интерфейса электромагнитных волн в частотной области, доступного с радиочастотным модулем. Задача состоит в том, чтобы найти резонансные частоты и поля внутри осесимметричной полости прямоугольного сечения с идеально проводящими стенками. Аналитические выражения для собственных значений можно получить с помощью разделения переменных. Собственные значения, полученные с помощью COMSOL, прекрасно согласуются с аналитическими значениями.
modeldescr_rf/beam_splitter = Разделитель луча\n\nСветоделитель используется для разделения луча света на две части. Один из способов изготовления сплиттера — нанесение тонкого слоя металла между двумя стеклянными призмами. Луч слегка ослабляется внутри слоя, а затем разделяется на два пути. В этом примере тонкий металлический слой моделируется с помощью граничного условия перехода, что снижает требования к памяти. Также вычисляются потери в металлическом слое.
modeldescr_rf/biconical_antenna = Биконическая антенна\n\nБиконическая антенна представляет собой широкополосную антенну со всенаправленной диаграммой направленности. В этом примере такой антенны и ее коаксиальной структуры питания вычисляются входные обратные потери в зависимости от частоты, а также диаграммы направленности в дальней зоне E-плоскости и H-плоскости.
modeldescr_rf/biconical_frame_antenna = Моделирование биконической антенны для испытаний на электромагнитные и электромагнитные помехи \n\nБиконические антенны популярны для измерений на очень высоких частотах (ОВЧ), поскольку они поддерживают широкий диапазон частот. Они также полезны для испытаний на электромагнитную совместимость (ЭМС), когда антенну можно использовать в качестве источника радиочастот при проверке чувствительности или невосприимчивости. В этом примере моделируется биконическая антенна, изготовленная из легких шестиугольных рамок, которые при изготовлении предпочтительнее сплошных конусов. Моделирование включает расчет диаграммы направленности в дальней зоне и коэффициента стоячей волны по напряжению (КСВН).
modeldescr_rf/branch_line_coupler = Ответвительный соединитель \n\n Ответвительный соединитель, также известный как квадратурный (90-градусный) гибрид, представляет собой четырехпортовое сетевое устройство с одним входным портом, двумя выходными портами с разностью фаз между ними 90 градусов и одним изолированным портом. Из-за симметрии любой порт может использоваться в качестве входного порта. Целью этого примера является расчёт S-параметров и наблюдение за согласованием, изоляцией и связью вокруг рабочей частоты.
modeldescr_rf/car_emiemc = Влияние антенны лобового стекла автомобиля на жгут проводов \n\nВ этом примере имитируется FM-антенна, напечатанная на заднем лобовом стекле автомобиля. При моделировании вычисляется диаграмма направленности антенны в дальней зоне и электрические поля во внутреннем жгуте кабелей.
modeldescr_rf/cascaded_cavity_filter = Каскадный фильтр с прямоугольной полостью\n\nКаскадные полостовые фильтры обеспечивают гораздо лучшие характеристики полосового фильтра, чем фильтры с одной полостью. В этом примере используются три фильтра с прямоугольной полостью, соединенные через прорези. Рассчитанные S-параметры показывают превосходное подавление внеполосного сигнала.
modeldescr_rf/cavity_filter_5g = Термоструктурные эффекты на резонаторный фильтр\n\nВ этом примере исследуются электрические характеристики каскадного резонаторного фильтра, работающего в миллиметровом диапазоне 5G при изменениях температуры. Термические изменения приводят к структурным деформациям конструкции. Таким образом, на резонансные частоты фильтрующих элементов (полостей) влияют термоструктурные явления. S-параметры вычисляются с различными конфигурациями теплового расширения.
modeldescr_rf/cavity_filter_thermal_expansion = Тепловой дрейф в микроволновом резонаторе Фильтр \n\nМикроволновые фильтры служат для подавления нежелательных частот на выходе микроволновых передатчиков. Усилители, как правило, нелинейны и создают гармоники, которые необходимо подавлять с помощью одного или нескольких узкополосных фильтров на выходе. Высокочастотной стабильности таких фильтров может быть трудно достичь, поскольку микроволновые системы могут быть подвержены тепловому дрейфу, вызванному мощными нагрузками или суровыми условиями окружающей среды, такими как воздействие прямых солнечных лучей в пустыне. Таким образом, системным инженерам необходимо оценить дрейф частоты полосы пропускания, возникающий из-за теплового расширения фильтра.
modeldescr_rf/cavity_resonators = Расчёт добротности и резонансных частот резонаторов полости \n\nЭти модели вычисляют резонансные частоты и добротность прямоугольных, цилиндрических и сферических полостей. Эти геометрии имеют известные аналитические решения. Представлены модели и сравнения. Также показаны исследования по уточнению сетки.
modeldescr_rf/circuit_emiemc = Базовый анализ излучения и устойчивости печатной платы\n\nВ этом примере представлено пошаговое руководство по моделированию основного излучения печатной платы и ее устойчивости к внешнему шуму. Сначала, когда одна из микрополосковых линий возбуждается, для анализа излучения вычисляются перекрестные помехи с соседней печатной линией и излучаемое поле через неполный экран пластикового корпуса. Во втором исследовании рассматривается воздействие на печатную плату излучения антенны, расположенной снаружи корпуса.
modeldescr_rf/circular_waveguide_filter = Круговой волноводный фильтр\n\nКруговой волноводный фильтр спроектирован с использованием 2D осесимметричной модели. Шесть кольцевых колец, добавленных к волноводу, образуют круглые полости, соединенные последовательно, и частота среза каждого резонатора близка к центральной частоте фильтра. Смоделированные S-параметры показывают полосовую частотную характеристику.
modeldescr_rf/circularly_polarized_antenna = Антенна с круговой поляризацией для GPS-приложений \n\nОдин из способов создания круговой поляризации с помощью микрополосковой патч-антенны состоит в усечении патч-радиатора. Этот пример настроен на частотный диапазон GPS. Осевые отношения в E- и H-плоскости вычисляются, чтобы показать степень круговой поляризации.
modeldescr_rf/circulator = Трехпортовый ферритовый циркулятор\n\nМоделируется передача волны TE10 с частотой 10 ГГц через трехпортовый ферритовый циркулятор без потерь. Идентичные элементы настройки размещены в каждом плече для согласования импедансов.
modeldescr_rf/cylinder_graphene_cloak = [Маскировка цилиндрического рассеивателя графеном (RF)]Маскировка цилиндрического рассеивателя графеном\n\nВ этой модели мы представляем метод маскировки с использованием электрически настроенного монослоя графена. Мы покажем, что когда цилиндрический диэлектрический рассеиватель покрыт графеном, сечение рассеяния сильно уменьшается на указанной частоте, что делает его невидимым с электромагнитной точки зрения. Целью этой модели является демонстрация использования линейно поляризованного фонового поля плоской волны в двумерной осесимметричной модели.
modeldescr_rf/coaxial_cable_circuit = Подключение трехмерной модели электромагнитных волн к электрической цепи\n\nВ этом примере показано, как можно аппроксимировать структуру вне области моделирования, подключив ее к модели в качестве эквивалента схемы. 3D-модель коаксиального кабеля подключена к источнику напряжения последовательно с согласованным импедансом. Кроме того, коаксиальный кабель воспринимает нагрузку также с согласованным импедансом.
modeldescr_rf/coaxial_cable_impedance = Поиск импеданса коаксиального кабеля \n\nКоаксиальный кабель является одной из наиболее распространенных конструкций линий передачи. В этом примере вычисляются распределения электрического и магнитного поля внутри коаксиального кабеля. Используя эти поля, вычисляется характеристическое сопротивление кабеля и сравнивается с аналитическим результатом.
modeldescr_rf/coaxial_cable_transient = Моделирование переходных процессов в коаксиальном кабеле\n\nВ этом примере рассматривается импульс, распространяющийся по коаксиальной линии передачи для трех различных типов оконечных устройств: короткое, разомкнутое и согласованное. Время распространения сигнала определяется на основе отраженных волн, обнаруженных на входном порту.
modeldescr_rf/coaxial_low_pass_filter_transient = Быстрое преобразование Фурье коаксиального фильтра нижних частот от времени к частоте \n\nОчень широкополосный коаксиальный фильтр нижних частот спроектирован с использованием двумерной осесимметричной модели. Чтобы учесть широкополосную частотную характеристику с высоким частотным разрешением, модель сначала строится с использованием интерфейса физики переходных процессов. Затем S-параметры вычисляются с помощью преобразования Фурье время-частота.\n\nЧтобы добиться низкочастотной характеристики, заполненный воздухом коаксиальный кабель настраивается с помощью пяти кольцевых колец (диафрагм), которые добавляются к внешней стенке проводника в этом примере модели. Стенки коаксиального кабеля и части диафрагмы моделируются как идеальные электрические проводники (PEC). Объём внутри центрального проводника коаксиального кабеля удаляется и моделируются только проводящие металлические поверхности.\n\nВычисленные S-параметры показывают низкочастотную характеристику с частотой среза около 24,5 ГГц.
modeldescr_rf/coaxial_waveguide_coupling = Коаксиально-волноводная связь\n\nЭто модель коаксиального кабеля, который возбуждает распространяющуюся волну внутри прямоугольного волновода. Рассчитываются S-параметры передачи и отражения.
modeldescr_rf/conical_antenna = Коническая антенна\n\nВ этом примере изучается импеданс и диаграмма направленности как функции частоты для моноконической антенны с конечной плоскостью заземления и коаксиальным фидером сопротивлением 50 Ом.
modeldescr_rf/conical_antenna_circuit = Коническая антенна с схемой\n\nЭто переходный анализ модели конической антенны в сочетании с внешней схемой.
modeldescr_rf/conical_horn_lens_antenna = Быстрое численное моделирование конической рупорной линзовой антенны\n\nОсесимметричную трехмерную структуру, такую как коническая рупорная антенна, можно смоделировать быстро и эффективно, используя только ее двухмерную компоновку. В этом примере излучение антенны и характеристики согласования вычисляются очень быстро относительно доминирующей моды TE из данного круглого волновода путем моделирования двумерной осесимметричной геометрии трехмерной антенной структуры.
modeldescr_rf/corrugated_circular_horn_antenna = Гофрированная круглая рупорная антенна\n\nВозбуждаемая ТЕ-мода из круглого волновода проходит через гофрированную внутреннюю поверхность круглой рупорной антенны, где также генерируется TM-мода. В сочетании эти два режима дают меньшую кросс-поляризацию в апертуре антенны, чем возбуждаемый режим TE. Этот пример разработан с использованием осесимметричной 2D-модели.
modeldescr_rf/coupled_line_filter = Полосовой фильтр со связанными линиями\n\nУзкополосный полосовой фильтр может быть реализован с использованием связанных микрополосковых линий. Длина каждого участка микрополосковой линии составляет примерно половину длины волны на полосовой частоте. Полосовая характеристика такого фильтра намного лучше, чем у односекционного фильтра со связанной линией.
modeldescr_rf/cpw_bandpass_filter = Копланарный волноводный полосовой фильтр \n\nКопланарный волноводный полосовой фильтр (CPW) может быть спроектирован с использованием встречно-штыревых конденсаторов (IDC) и короткозамкнутых шлейфовых индукторов (SSI). Это очень эффективный метод производства полосовых фильтров, который можно легко реализовать на пластине GaAs. \n\nУчебная модель копланарного волноводного полосового фильтра представляет собой конструкцию, которая компактна по отношению к ее резонансной частоте и обеспечивает относительно высокий коэффициент добротности по сравнению с конструкциями моделей с ёмкостно-связанными микрополосковыми линиями. Он использует функцию универсального сосредоточенного порта Multielement программного обеспечения COMSOL Multiphysics, чтобы одинаково возбуждать и/или завершать каждый элемент соответствующих портов.
modeldescr_rf/cpw_numeric_tem_port = Моделирование CPW с использованием числовых портов TEM \n\nВ этом учебном примере показано, как установить функции порта в физическом интерфейсе при проектировании схемы копланарного волновода (CPW), которая полезна для приложений mmWave.
modeldescr_rf/cpw_resonator = Резонатор CPW для квантовой электродинамики цепей \n\nЭта модель включает в себя четвертьволновой копланарный волноводный резонатор (CPW) с комбинацией открытого и короткого концов. Резонатор, подключенный к соседней линии CPW, ведет себя как полосовой фильтр. Такое устройство работает как один из основных компонентов схемы квантовой электродинамики (cQED).
modeldescr_rf/cylinder_orientation = Определение ориентации металлического цилиндра, встроенного в диэлектрическую оболочку\n\nМеталлический цилиндрический стержень спрятан внутри сферической диэлектрической оболочки, и его ориентация неизвестна. Изучая зависящее от поляризации рассеянное поле цилиндрического объекта и выполняя параметрическое сканирование в зависимости от угла поляризации, стержень обнаруживается для угла поляризации, при котором рассеянное поле является наибольшим. В примере используется линейно поляризованная плоская волна в качестве фонового поля и вычисляются диаграммы направленности в дальней зоне.
modeldescr_rf/cylindrical_cavity_filter_evanescent = Цилиндрический полостный фильтр с затухающим режимом \n\nЭтот пример демонстрирует принцип работы полостных фильтров с затухающим режимом. Резонанс затухающей моды достигается за счет частичного заполнения полости резонатора диэлектрическим кольцом. Полученный фильтр является резонансным на частоте ниже, чем резонансная частота доминирующей моды пустой металлической полости.
modeldescr_rf/dielectric_resonator_antenna = Диэлектрический резонатор Антенна\n\nДиэлектрический резонатор, расположенный рядом с излучающим элементом, можно использовать для увеличения направленности и усиления. Здесь над щелевой антенной размещен блок кварцевого диэлектрика с дополнительными пассивными металлическими антенными элементами. Модель учитывает поля внутри и вокруг антенны. Рассчитанная диаграмма направленности и импеданс в дальней зоне показывают улучшенные характеристики.
modeldescr_rf/dielectric_scattering_pml = Диэлектрическое рассеяние PML\n\nЭто пример моделирования идеально согласованных слоев в RF-модуле. Он показывает рассеяние на диэлектрическом объекте и то, как рассеянная волна поглощается PML.
modeldescr_rf/dielectric_slab_waveguide = Диэлектрический пластинчатый волновод\n\nПлоский диэлектрический пластинчатый волновод демонстрирует принципы, лежащие в основе любого типа диэлектрического волновода, например, гребневых волноводов и ступенчатых волокон. В этом примере решаются электрические и магнитные поля волновода с диэлектрической пластиной. Затем вычисляется эффективный индекс и сравнивается с соответствующим аналитическим результатом.
modeldescr_rf/dipole_antenna_array = Моделирование дипольной антенной решетки с использованием метода граничных элементов \n\nЭтот пример дипольной антенной решетки демонстрирует экономичный анализ с использованием метода граничных элементов (BEM). При работе с большим массивом металлических радиаторов метод конечных элементов (МКЭ) потребует больших вычислительных ресурсов. Результаты моделирования отображают диаграммы направленности решетки 12x1, состоящей из металлических полуволновых дипольных антенн, резонансных на частоте 1 ГГц.
modeldescr_rf/dipole_antenna_balun = Дипольная антенна с четвертьволновым коаксиальным симметрирующим устройством \n\nАнтенное симметрирующее устройство блокирует нежелательные токи на внешней стороне кабеля. Четвертьволновой коаксиальный балун (1:1) — одна из самых простых конструкций. Он работает как трансформатор и делает входное сопротивление от внутреннего проводника к внешнему проводнику бесконечным. В этом примере моделируется прототип антенны, включающий розетку SMA, корпус ABS и четвертьволновой коаксиальный балун. Частота настроена на диапазон GPS — 1,575 ГГц. Такая антенна может быть полезна для измерений в помещении с одной поляризацией.
modeldescr_rf/dipole_antenna = Дипольная антенна\n\nДипольная антенна — одна из самых простых конфигураций антенн. Это можно реализовать с помощью двух тонких металлических стержней, между которыми приложена синусоидальная разность напряжений. Длина стержней выбрана такой, чтобы они представляли собой четвертьволновые элементы на рабочей частоте. Такая антенна имеет хорошо известную торообразную диаграмму направленности.
modeldescr_rf/dipole_array = Массив магнитных дипольных антенн \n\nТри катушки переменного тока используются для излучения электромагнитных волн. Фазовые углы токов в различных катушках используются для изменения угла излучения.
modeldescr_rf/double_ridged_horn_antenna = Рупорная антенна с двумя ребрами\n\nРупорная антенна с двумя ребрами широко используется в безэховых камерах для определения характеристик испытуемой антенны (AUT) от S-диапазона до Ku-диапазона благодаря ее надежной работе в широкополосном диапазоне частот. В этом учебном пособии моделируется рупорная антенна с двойным гребнем и вычисляется коэффициент стоячей волны по напряжению (КСВН), диаграмма направленности в дальней зоне и направленность антенны. \n\nСосредоточенный порт назначается на границе между внутренней и внешней проводящей поверхностью на конце коаксиального разъема. Самый внешний слой воздушной области выполнен в виде идеально согласованного слоя (PML), который имитирует поглощение всего исходящего излучения от антенны, как это происходит в реальной безэховой камере. Сетка динамически управляется интерфейсом <em>Электромагнитные волны, частотная область</em> на основе каждой частоты моделирования.
modeldescr_rf/drude_lorentz_media = [Моделирование дисперсионного друда во временной области–Lorentz Media (RF)]Моделирование дисперсионного друда во временной области–Lorentz Media\n\nМассивы плазмонных дырок могут демонстрировать большое пропускание также для дырок, меньших длины волны. Это объясняется существованием поверхностных плазмонных поляритонов, которые могут туннелировать электромагнитную энергию через отверстие, даже если она намного меньше длины волны. Друде–Резонансные условия Лоренца. Каждое поляризационное поле Друде–Лоренца решается с использованием обыкновенного дифференциального уравнения, управляемого электрическим полем.\n\n2D-геометрия состоит из одной дисперсионной пластины толщиной 1µм с щелью шириной 0,5µм в ней. Используемая длина волны составляет 1µм. Применяются периодические граничные условия, поэтому физически это массив щелей. Приходящая волна представляет собой плоский волновой импульс с плоским фронтом и гауссовой временной формой.
modeldescr_rf/dual_band_antenna_transient = Анализ переходных процессов печатной двухдиапазонной полосковой антенны\n\nАнализ широкополосной антенны, такой как S-параметр или анализ диаграммы направленности в дальней зоне, может быть получен путем выполнения анализа переходных характеристик и быстрого преобразования Фурье (БПФ) от времени к частоте. Эта модель сначала выполняет исследование, зависящее от времени, а затем преобразует зависимую переменную, магнитный векторный потенциал A и сигнал напряжения на сосредоточенном порте из временной области в частотную область. S-параметры и данные излучения в дальней зоне генерируются из данных частотной области. Вычисленные S-параметры показывают два резонанса в заданном диапазоне частот, как и ожидалось для этой конструкции двухдиапазонной антенны.
modeldescr_rf/esd_test_pcb = Испытание электростатического разряда (ESD) печатной платы \n\nЭтот пример демонстрирует, как событие ESD вызывает логическую ошибку микросхемы на печатной плате. Ток ESD основан на расширенной модели HBM (модель человеческого тела) и предварительно определен в функции сосредоточенного порта.
modeldescr_rf/fabry_perot = Fabry–Pero Cavity\n\nЭтот пример представляет собой хрестоматийный случай простейшей структуры оптического резонатора, для которой потери в резонаторе являются не материальными потерями, а чисто радиационными. Это хорошая отправная точка для пользователей фотоники и оптики. Модель демонстрирует два метода расчета добротности.
modeldescr_rf/falling_magnet = Падающий магнит\n\nЭтот пример иллюстрирует явление вихретокового торможения. Цилиндрический магнит, падающий через медную трубку, индуцирует вихревые токи на стенках трубки. Этот индуцированный вихревой ток создает магнитное поле, которое противодействует магнитному полю магнита и вызывает тормозную силу, противодействующую движению магнита. Поскольку противодействующая сила увеличивается с увеличением скорости, существует конечная скорость, при которой сила магнитного торможения равна силе гравитации. Модель вычисляет скорость магнита после его падения, когда он достигает своей конечной скорости.
modeldescr_rf/far_field = Постобработка в дальней зоне\n\nЭто учебное пособие, показывающее, как рассчитать диаграмму направленности антенны в дальней зоне.
modeldescr_rf/frequency_selective_surface_csrr = Частотно-селективная поверхность, периодический дополнительный разъемный кольцевой резонатор\n\nЧастотно-селективные поверхности (FSS) представляют собой периодические структуры с полосовой или заграждающей частотной характеристикой. Этот пример показывает, что только сигналы около центральной частоты могут проходить через периодический дополнительный слой резонатора с разъемным кольцом.
modeldescr_rf/fresnel_equations = [Уравнения Френеля (RF)]Fresnel Equations\n\nПлоская электромагнитная волна, распространяющаяся в свободном пространстве, падает под углом на бесконечную диэлектрическую среду. В этом примере вычисляются коэффициенты отражения и передачи и сравниваются результаты с результатами, заданными уравнениями Френеля.
modeldescr_rf/gaussian_beam_3d = Распространение трехмерного лазерного импульса гауссова луча\n\nВ этом примере показано моделирование переходных процессов того, как распространяется импульс гауссова луча. Импульс лазерного луча YAG (l=1,06 µm) фокусируется так, что перетяжка луча находится внутри области. Входная и выходная границы искривлены в соответствии со сферическими волновыми фронтами гауссова пучка, поэтому пятно становится видимым.
modeldescr_rf/gcpw_numeric_tem_port = Моделирование заземленного CPW с использованием числовых портов TEM \n\nВ этом учебном примере показано, как установить функции порта в физическом интерфейсе при проектировании схемы заземленного копланарного волновода (GCPW), которая полезна для приложений mmWave.
modeldescr_rf/helical_antenna = Двухплечевая спиральная антенна\n\nВинтовая антенна имеет два основных режима: нормальный и осевой режим. В нормальном режиме работы диаграмма направленности в дальней зоне аналогична торообразной диаграмме направленности классической дипольной антенны. В осевой моде спиральная антенна резонансна в гораздо более высокой полосе частот; он работает аналогично решетке конечного огня вдоль оси z, генерируя директивную диаграмму направленности. В этом примере анализируется спиральная антенна в этих двух разных режимах.
modeldescr_rf/hexagonal_grating = [Шестиугольная решётка (RF)]Шестиугольная решётка\n\nПлоская волна падает на отражающую шестиугольную решетку. Решётчатая ячейка состоит из выступающей полусферы. Коэффициенты рассеяния для разных порядков дифракции вычислены для нескольких разных длин волн.
modeldescr_rf/high_speed_interconnect_tdr = Настройка высокоскоростного межсоединения с помощью рефлектометрии во временной области\n\nВ приложениях обеспечения целостности сигнала (SI) рефлектометрия во временной области (TDR) является полезным методом анализа разрывов в тракте сигнала путем наблюдения за силой отраженного сигнала. Отраженный сигнал искажает входной импульс в основном из-за несогласования импедансов, если нет внешнего источника шума, перекрестных помех или нежелательной связи. \n\nВ этом примере на микрополосковой линии, соединенной от слоя к слою через металлизированное сквозное отверстие, запускается ступенчатая функция с быстрым нарастанием. На основе расчета импеданса TDR выявляются разрывы в тракте сигнала и настраивается схема для снижения искажений.
modeldescr_rf/h_bend_waveguide_2d = H-Bend Waveguide 2D\n\nПередача волны TE10 через изгиб волновода на 90 градусов моделируется в 2D.
modeldescr_rf/h_bend_waveguide_3d = H-Bend Waveguide 3D\n\nПередача волны TE10 через изгиб волновода на 90 градусов моделируется в 3D.
modeldescr_rf/h_bend_waveguide_s_parameters = H-Bend Waveguide\n\nМоделируется передача волны TE10 через изгиб волновода на 90 градусов. S-параметры, представляющие коэффициент пропускания и отражения изгиба волновода, вычисляются как функция частоты.
modeldescr_rf/rf_heating = RF Heating\n\nЭто модель изгиба ВЧ-волновода с диэлектрическим блоком внутри. Электромагнитные потери в блоке, а также на стенках волновода со временем приводят к нагреву узла. Свойства материала блока являются функцией температуры. Модель вычисляет переходное тепловое поведение, а также стационарное решение.
modeldescr_rf/lightning_induced_voltage_airplane = Наведенное молнией напряжение провода в самолете\n\nЭта модель демонстрирует, как вычислить наведенное напряжение проводного контура внутри самолета при различных условиях электромагнитного экранирования.
modeldescr_rf/lightning_induced_voltage_overhead_lines = Наведенное молнией напряжение воздушной линии над землей с потерями \n\nЭта модель показывает, как рассчитать напряжение, наведенное молнией, на воздушной линии над землей с потерями. Рассмотрены каналы молнии с различным наклоном. Также показано влияние проводимости почвы.
modeldescr_rf/lightning_surge_tower = Грозовой всплеск на опоре электропередачи\n\nЭта модель направлена на решение этих проблем путем моделирования воздействия грозовых перенапряжений на опоры линий электропередачи высокого напряжения. Исследование наведенного напряжения на трехфазных проводах в результате удара молнии позволяет оценить потенциальные перенапряжения и помогает разработать эффективные меры защиты. Эта модель специально ориентирована на молнию с током 10 кА, которая поражает один из экранированных проводов башни. Наведенное напряжение на трехфазных проводниках вычисляется с помощью строгих методов моделирования.
modeldescr_rf/lightning_surge_wind_farm = Анализ грозовых перенапряжений на морской ветряной электростанции\n\nЭта модель анализирует грозовые перенапряжения на морской ветряной электростанции. Когда удар молнии с током 20 кА попал в одну ветряную турбину, были вычислены индуцированные электрические поля в соседних ветряных турбинах.
modeldescr_rf/log_periodic_antenna = Логопериодическая антенна\n\nЛогопериодическая антенна, как известно, является широкополосной или частотно-независимой антенной. Одной из наиболее популярных форм является копланарная дипольная решётка, которая обычно используется для измерений антенн УВЧ-диапазона в безэховой камере. В этом примере вычисляется коэффициент стоячей волны по напряжению (КСВН) и диаграмма направленности в дальней зоне в диапазоне от 250 МГц до 750 МГц.
modeldescr_rf/lossy_circular_waveguide = Круговой волновод с потерями\n\nВ этом руководстве показано, как настроить анализ мод с металлическими стенками с потерями для волновода. Постоянная распространения и затухание в дБ/м извлекаются для нескольких мод.
modeldescr_rf/lossy_circulator_3d = Согласование импеданса 3-портового ферритового циркулятора с потерями \n\nСмоделирован ферритовый циркуляционный насос с потерями на частоте 3 ГГц. Геометрические параметры конструкции варьируются в соответствии с импедансом для минимального отражения основной моды прямоугольного волновода TE10.
modeldescr_rf/lossy_circulator_3d_geom = [Согласование импеданса 3-портового ферритового циркулятора с потерями]Параметризованная геометрия циркулятора \n\nЭто шаблон MPH-файла, содержащий параметризованную геометрию для модели Согласования импеданса 3-портового ферритового циркулятора с потерями.
modeldescr_rf/lumped_element_filter = Фильтр нижних частот и полосовой фильтр с использованием элементов с сосредоточенными параметрами \n\nПассивные устройства могут быть разработаны с использованием функций элементов с сосредоточенными параметрами, если и рабочая частота устройства, и вносимые потери элементов с сосредоточенными параметрами невелики. В этом примере моделируются два типа фильтров с сосредоточенными элементами, которые похожи на порты с сосредоточенными параметрами, за исключением того, что они строго пассивны и существуют предопределенные варианты индуктивностей и ёмкостей. Геометрия каждого элемента (устройство поверхностного монтажа, SMD) упрощается до двумерной границы, а электрические характеристики моделируются с использованием <em>Сосредоточенный элемент</em> граничных условий в <em>Электромагнитные волны, Частота Область</em> интерфейс. Затем в том же частотном диапазоне моделируется полосовой фильтр, преобразованный из конструкции фильтра нижних частот. Обе модели фильтров представляют S-параметры и распределение электрического поля.
modeldescr_rf/magnetic_frill = Магнитная оборка\n\nМагнитная оборка генератора напряжения используется для питания дипольной антенны. Импеданс антенны извлекается и сравнивается с результатами из литературы.
modeldescr_rf/mapped_dielectric_distribution = [Определение сопоставленного диэлектрического распределения материала (RF)]Определение сопоставленного диэлектрического распределения материала\n\nВ этом примере показано, как настроить пространственно изменяющееся диэлектрическое распределение. Здесь форма выпуклой линзы определяется посредством известной деформации прямоугольной области. Диэлектрическое распределение определяется на недеформированной исходной прямоугольной области и отображается на деформированной форме линзы. Хотя определенная здесь форма линзы является выпуклой, распределение диэлектрика приводит к тому, что падающий луч расходится.
modeldescr_rf/marine_csem = Моделирование метода электромагнитного зондирования для разведки нефти \n\nМорской электромагнитный метод с управляемым источником использует мобильный горизонтальный электрический дипольный передатчик и группу донных электрических приемников. Приемники морского дна измеряют низкочастотное электрическое поле, генерируемое источником. Некоторая часть передаваемой энергии отражается резистивным резервуаром, что приводит к более высокому принимаемому сигналу.
modeldescr_rf/microstrip_line_crosstalk = Анализ целостности сигнала и TDR соседних микрополосковых линий\n\nАнализ целостности сигнала (SI) дает обзор качества электрического сигнала, передаваемого через электрические цепи, такие как высокоскоростные межсоединения, кабели и печатные платы. Качество принимаемого сигнала может быть искажено шумом снаружи схемы и ухудшено из-за несогласования импедансов, вносимых потерь и перекрестных помех; На практике анализ ЭМС/ЭМП проводится для оценки восприимчивости устройства или сети к нежелательному взаимодействию. В этом примере модели мы исследуем эффект перекрестных помех между двумя соседними микрополосковыми линиями на микроволновой подложке. Результаты моделирования обеспечивают отклик рефлектометрии во временной области (TDR) на связанных портах и ​​показывают увеличение искажений сигнала при более высоких скоростях передачи данных.
modeldescr_rf/microstrip_line_discontinuity = Исследование дефектной микрополосковой линии с помощью частотно-временного БПФ-анализа\n\nХотя анализ переходных процессов полезен для рефлектометрии во временной области (TDR) для решения проблем целостности сигнала (SI), многие примеры ВЧ и СВЧ рассматриваются с использованием моделирования в частотной области, генерирующего S-параметры. Однако по данным частотной области трудно определить источники ухудшения сигнала. В этом примере моделируется микрополосковая линия в частотной области с несколькими разрывами ширины линии и выполняется быстрое преобразование Фурье от частоты ко времени. Результаты расчётов помогают идентифицировать физические разрывы и несоответствия импедансов в линии передачи путем анализа колебаний сигнала во временной области.
modeldescr_rf/microstrip_line_mixed_mode = Анализ S-параметров смешанного режима\n\nS-параметры смешанного режима описывают отклики схемы с симметричными портами, возбуждаемыми и завершаемыми двумя типами мод: общими и дифференциальными. Они вычисляются с использованием полной матрицы S-параметров четырехпортовой сети, состоящей из четырех несимметричных линий. В этом примере анализируются две соседние микрополосковые линии и вычисляются S-параметры смешанного режима.
modeldescr_rf/microstrip_line_tem_differential = Моделирование дифференциальной микрополосковой линии\n\nДифференциальная линия состоит из двух линий передачи, возбуждаемых двумя противофазными сигналами. Известно, что эта конфигурация полезна для улучшения отношения сигнал/шум. В примере модели показано, как настроить дифференциальные и несимметричные микрополосковые линии с использованием портов типа ТЕМ. Влияние фиктивного источника шума на вычисленные S-параметры продемонстрировано для каждой конфигурации микрополосковой линии соответственно.
modeldescr_rf/microstrip_line_tem_via = Моделирование микрополосковых линий с помощью Vias\n\nСуществует множество способов возбуждения и завершения линий передачи с использованием различных типов портов и функций сосредоточенных портов. В этом примере порты поперечного электромагнитного типа (TEM) и порт с сосредоточенными параметрами переходного типа используются для имитации двух соседних микрополосковых линий. Один конец переходного отверстия выполнен в виде металлизированного переходного отверстия, а другой конец переходного отверстия предназначен для измерения сигнала притока. Вычисленные S-параметры показывают величину перекрестных помех между линиями и силу сигнала, проходящего через цилиндрическое переходное отверстие.
modeldescr_rf/microstrip_on_pcb = Микрополоска на печатной плате\n\nГенератор напряжения питает микрополоску на печатной плате, используя внутреннее граничное условие порта с сосредоточенными параметрами.\nМодель вычисляет импеданс микрополоски и сравнивает два вывода; числовой порт, использующий анализ граничного режима, и простое оконечное устройство порта с сосредоточенными параметрами, сопротивление которого соответствует импедансу микрополосковой линии.
modeldescr_rf/microstrip_patch_antenna_array = Технико-экономическое обоснование конструкции микрополосковой патч-антенной решетки \n\nАнтенная решётка представляет собой группу излучающих элементов. Управляя фазой и величиной входного сигнала, назначенного каждому элементу антенны, а также количеством элементов решетки, диаграмму направленности можно направлять в желаемом направлении с предпочтительным уровнем усиления. В этом примере массив патч-антенн размером 4 на 2 подается из одной точки подачи, при этом все элементы подаются с одинаковой фазой и величиной.
modeldescr_rf/microstrip_patch_antenna_fem_bem = FEM–BEM Соединение микрополосковой патч-антенны\n\nВ этом примере показано, как соединить метод конечных элементов (FEM), анализирующий микрополосковую патч-антенну, с методом граничных элементов (BEM) для оценки дальнего поля за пределами FEM вычислительная область.
modeldescr_rf/microstrip_patch_antenna_inset = Микрополосковая патч-антенна\n\nМикрополосковая патч-антенна привлекательна благодаря своей низкопрофильной конформной конструкции, относительно низкой стоимости и очень узкой полосе пропускания. В этом примере вычисляется отраженная мощность и диаграмма направленности в дальней зоне для патч-антенны со вставленным каналом.
modeldescr_rf/microstrip_patch_antenna_periodic = Моделирование антенны с фазированной решеткой\n\nСпрос на фазированные антенные решетки растет не только в традиционной военной промышленности, но и в коммерческих областях, таких как платформы мобильных сетей 5G, Интернет вещей (IoT) и приложения спутниковой связи. В этом примере показано, как спроектировать фазированную решетку с функциональностью сканирования луча на основе арифметической разности фаз между элементами решетки. Первоначальную сложную модель можно свести к простой модели с одной элементарной ячейкой с периодическими условиями, чтобы сделать анализ более быстрым и эффективным. Исследованы две конструкции фазированных решеток, построенных с использованием микрополосковых патч-антенн, и они хорошо согласуются по коэффициенту усиления антенны.
modeldescr_rf/microwave_oven = Микроволновая печь\n\nКартофель, помещенный в микроволновую печь, подвергается воздействию микроволнового излучения частотой 2,45 ГГц. Рассчитывается и анализируется нагрев картофеля в течение первых 5 секунд. По истечении этого времени температура в картофеле приближается к 100°C.
modeldescr_rf/monopole_antenna_array = Монопольная антенная решётка\n\nФорма диаграммы направленности антенной решетки может регулироваться в желаемом направлении путем управления фазами и величинами входных сигналов. В этом примере показан основной шаг по проектированию активной решетки с электронным сканированием (AESA) с использованием арифметической прогрессии фазы на каждом антенном элементе.
modeldescr_rf/mri_coil = Катушка MRI Birdcage Coil\n\nВ этом примере описывается конструкция и оптимизация катушки птичьей клетки для обеспечения однородного распределения магнитного поля для систем магнитно-резонансной томографии (МРТ) и тем самым улучшения разрешения сканированных изображений. Однородное магнитное поле получается путем исследования квадратурного возбуждения и выполнения параметрической развертки для определения оптимального значения сосредоточенных элементов в катушке. Анализ ёмкости сосредоточенных элементов дает оптимальное значение для воздушного фантома на желаемой ларморовской частоте. Модель также изучает работу катушки при загрузке фантома человеческой головы.
modeldescr_rf/mw_filter = Тепловой дрейф в полости СВЧ-фильтра\n\nПроведен анализ теплового дрейфа собственной частоты основной моды в СВЧ-фильтре. Структурный анализ в сочетании с методом ALE используется для определения задачи собственных электромагнитных значений в термически расширенной геометрии. Поскольку повторное создание сетки не требуется, достигается высокая относительная точность. \n\nТребуется RF-модуль и модуль «Механика конструкций».
modeldescr_rf/nanorods = Nanorods\n\nГауссова электромагнитная волна падает на плотный массив очень тонких стержней. Расстояние между стержнями, а значит и диаметр стержня, значительно меньше длины волны. В этих условиях стержневая решётка не действует как дифракционная решётка. Вместо этого массив стержней ведет себя так, как если бы он представлял собой сплошной металлический лист для света, поляризованного вдоль стержней, тогда как для света, поляризованного перпендикулярно стержням, массив почти прозрачен для электромагнитных волн.
modeldescr_rf/negative_refractive_index = [Моделирование отрицательного показателя преломления (RF)]Моделирование отрицательного показателя преломления \n\nРазработав периодическую структуру с характеристиками, сравнимыми по масштабу с длиной волны, можно получить материалы с отрицательной диэлектрической проницаемостью и проницаемостью. В этом примере показано, как смоделировать область метаматериала с отрицательной диэлектрической проницаемостью и проницаемостью в объёме.
modeldescr_rf/notch_filter_srr = Режекторный фильтр с использованием разрезного кольцевого резонатора\n\nРазрезной кольцевой резонатор (SRR) имеет полосовую частотную характеристику. В этом примере напечатанный SRR на диэлектрической подложке соединен с микрополосковой линией. Вся схема ведет себя как режекторный (полосовой) фильтр, который можно использовать для блокировки определенного диапазона частот сигнала.
modeldescr_rf/parabolic_reflector = Параболическая отражательная антенна\n\nБольшой отражатель можно легко смоделировать с помощью двухмерного осесимметричного метода. В этом примере радиус отражателя превышает 20 длин волн и возбуждается круглой рупорной антенной с осевым питанием. Смоделированная дальняя зона демонстрирует четкую диаграмму направленности с высоким коэффициентом усиления.
modeldescr_rf/parallel_wires_impedance = Поиск импеданса параллельной линии передачи \n\nПараллельная линия передачи состоит из двух проводящих проводов в диэлектрике, таком как воздух. Поля вокруг такой линии передачи простираются до бесконечности, хотя и быстро спадают по мере удаления от проводов. Этот пример демонстрирует, как вычислить поля и импеданс такой неэкранированной линии передачи, и сравнивает результаты с аналитическим решением.
modeldescr_rf/patch_antenna = Сбалансированная патч-антенна для 6 ГГц\n\nПатч-антенны широко распространены в беспроводном оборудовании. В этом примере два коаксиальных кабеля работают вместе, создавая сбалансированное питание антенны. Модель вычисляет эффективность антенны, чтобы найти оптимальную рабочую частоту, 6,3 ГГц.
modeldescr_rf/pcb_microwave_filter_with_stress = СВЧ-фильтр на печатной плате с учетом напряжений\n\nМикрополосковые фильтры можно изготавливать непосредственно на печатной плате (PCB) с микрополосковой линией от входа к выходу. Вдоль микрополосковой линии расположены несколько шлейфов заданной длины и ширины. Проектирование фильтра включает выбор импеданса микрополосковой линии, импеданса шлейфов и длины шлейфов. Данный фильтр имеет семиполюсную низкочастотную характеристику Чебышева. В примере используется интерфейс электромагнитных волн, решающий векторное волновое уравнение Гельмгольца. Характеристики фильтра чувствительны к расположению и длине шлейфов; поэтому в примере также анализируется изменение характеристик фильтра как функция механической деформации.
modeldescr_rf/pcb_microwave_filter_with_stress_ecad = СВЧ-фильтр на печатной плате с учетом напряжений\n\nМикрополосковые фильтры можно изготавливать непосредственно на печатной плате (PCB) с микрополосковой линией от входа к выходу. Вдоль микрополосковой линии расположены несколько шлейфов заданной длины и ширины. Проектирование фильтра включает выбор импеданса микрополосковой линии, импеданса шлейфов и длины шлейфов. Данный фильтр имеет семиполюсную низкочастотную характеристику Чебышева. В примере используется интерфейс электромагнитных волн, решающий векторное волновое уравнение Гельмгольца. Характеристики фильтра чувствительны к расположению и длине шлейфов; поэтому в примере также анализируется изменение характеристик фильтра как функция механической деформации.
modeldescr_rf/periodic_boundary_condition = Периодическое граничное условие\n\nУчебное пособие, которое показывает, как определить периодические граничные условия для трехмерных электромагнитных волн. Он вычисляет наклонную плоскую волну, падающую в куб, используя периодическое граничное условие с периодичностью Флоке.
modeldescr_rf/photonic_crystal = Фотонный кристалл\n\nФотонный волновод создается путем удаления некоторых опор в фотонно-кристаллической структуре. В зависимости от расстояния между столбами получается фотонная запрещенная зона. В фотонной запрещенной зоне только волны определенного диапазона частот будут распространяться через описанную геометрию направляющей.
modeldescr_rf/photonic_microprism = Фотонная микропризма\n\nдля уменьшения радиационных потерь в изгибах фотонного волновода можно использовать микропризму. Если микропризму поместить между двумя волноводами, образующими резкий изгиб, свет будет проходить между волноводами через призму.
modeldescr_rf/pifa_handheld = Моделирование антенны мобильного устройства\n\nПлоская антенна с перевернутой F-образной антенной (PIFA) является обычным и популярным выбором для миниатюрных антенн в сотовых телефонах. Конструкция PIFA может быть настроена и расширена для покрытия нескольких диапазонов частот сотовых телефонов, Wi-Fi и Bluetooth. Антенна в этом вводном примере настроена только на диапазон частот нисходящего канала Advanced Wireless Services (AWS). Свойства согласования импеданса антенны вычисляются через S-параметры и моделируется диаграмма направленности в дальней зоне.
modeldescr_rf/plasmonic_wire_grating = [Плазмонная проволочная решётка (RF)]Плазмонная проволочная решётка\n\nПлоская волна падает на проволочную решетку на диэлектрической подложке. Эффективность дифракции для нулевого и первого порядков дифракции — как при пропускании, так и при отражении — вычисляется как функция угла падения.
modeldescr_rf/polarized_circular_ports = Поляризованные круговые порты\n\nЭтот пример круглого волновода демонстрирует, как возбуждать и ограничивать порты с вырожденными модами порта. В частности, показано, как моделировать и возбуждать моду TE11 круглых волноводов в 3D.
modeldescr_rf/pyramidal_absorber = Моделирование пирамидальных поглотителей для безэховой камеры \n\nВ этом примере периодические пирамидальные структуры с потерями работают как поглотители микроволнового излучения. Пирамидальные поглотители с поглощающим излучение материалом (RAM) широко используются в безэховых камерах для измерения электромагнитных волн. В этом примере имитируются микроволновые поглотители с материалом с потерями, имитирующим проводящую пену с углеродом.
modeldescr_rf/quarter_wave_transformer = Четвертьволновой трансформатор\n\nЧетвертьволновый трансформатор — это компонент, который можно вставить между линией передачи и оконечной нагрузкой, чтобы согласовать полное сопротивление нагрузки с характеристическим сопротивлением линии передачи. На частоте, для которой выполняется условие четвертьволны, трансформатор устраняет все отражения от нагрузки.
modeldescr_rf/radar_cross_section = Сечение радара\n\nЭтот пример лодки, обнаруженной радаром, демонстрирует использование фонового поля в задаче электромагнитного рассеяния. Результаты включают в себя радиолокационное сечение и дальнее поле как функции угла падения.
modeldescr_rf/radome_antenna = Обтекатель с двухслойной диэлектрической линзой\n\nОбтекатель представляет собой корпус для антенн, практически прозрачный для радиочастотных сигналов. Структура может быть оптимизирована для минимизации потерь при передаче, а также предназначена для улучшения характеристик излучения, включая направленность антенны и боковые лепестки.
modeldescr_rf/rat_race_coupler = Муфта «Крысиные бега»\n\nКольцевой гибрид на 180 градусов (соединитель Rat-Race) представляет собой сеть с четырьмя портами и разницей фаз между двумя портами в 180 градусов. Целью этого примера является расчёт S-параметров и наблюдение за согласованием, изоляцией и связью вокруг рабочей частоты.
modeldescr_rf/rcs_sphere = Расчёт радиолокационного сечения идеально проводящей сферы\n\nКлассической эталонной задачей в вычислительной электромагнетике является определение радиолокационного сечения (RCS) сферы в свободном пространстве, освещенной плоской волной. В этом примере решается ЭПР металлической сферы с очень высокой проводимостью, которую можно рассматривать как материал с бесконечной проводимостью. Результаты сравниваются с аналитическим решением, и показано согласие.
modeldescr_rf/rcs_sphere_asymptotic = Быстрый асимптотический радиолокационный анализ поперечного сечения проводящей сферы\n\nВ этом примере используются асимптотические методы для изучения отклика радиолокационного сечения (RCS) проводящей сферы. Выбранный физический интерфейс преобразует падающее поле плоских волн на границах в дальнее поле с помощью формулы Stratton–Chu. Результаты расчетов сравниваются с известным асимптотическим значением ЭПР проводящей сферы в оптической области.
modeldescr_rf/rcs_sphere_bem = [ЭПР металлической сферы с использованием метода граничных элементов (RF)]ЭПР металлической сферы с использованием метода граничных элементов\n\nЭта модель иллюстрирует процесс оценки радиолокационного сечения (ЭПР) металлической сферы посредством использования метода граничных элементов (МГЭ). Используя преимущества вертикальной плоскости симметрии, параллельной поляризации падающего фонового поля, модель снижает вычислительные затраты. Вычисленные значения RCS сравниваются с аналитическими значениями в пределах области Mie RCS.
modeldescr_rf/rcs_time_explicit = Широкополосный расчет RCS с использованием моделирования во временной области и БПФ \n\nВ этом примере модели вычисляется бистатическое радиолокационное сечение (RCS) на единицу длины круга с использованием физического интерфейса «Электромагнитные волны, явная по времени». Двумерный круг возбуждается синусоидальным сигналом частотой 200 МГц, модулированным временным гауссовским импульсом. Широкополосная частотная характеристика RCS около 200 МГц получается на этапах исследования зависимости от времени и преобразования времени в частоту с помощью БПФ.
modeldescr_rf/rf_coil = RF Coil\n\nЭто вводное руководство демонстрирует, как найти основную резонансную частоту радиочастотной катушки, а также как выполнить развертку по частоте для определения добротности катушки.
modeldescr_rf/sar_in_human_head = Удельный коэффициент поглощения (SAR) в мозге человека\n\nУченые используют SAR (удельный коэффициент поглощения) для определения количества радиации, которую поглощают ткани человека. Это измерение особенно важно для мобильных телефонов, излучение которых близко к мозгу. Модель изучает, как голова человека поглощает волну, излучаемую антенной, и вызываемое этим повышение температуры. \n\nТребуется радиочастотный модуль и модуль теплопередачи.
modeldescr_rf/sar_wifi_antenna = SAR головы человека рядом с антенной Wi-Fi\n\nПользователи бытовой электроники с излучающими устройствами подвергаются воздействию радиочастотного (РЧ) излучения. Величина воздействия определяется как удельная скорость поглощения (SAR). То есть значение SAR представляет собой скорость радиочастотной (РЧ) энергии, поглощаемой телом. Эта модель вычисляет локальные значения SAR на упрощенном макете головы и мозга человека, когда микрополосковая патч-антенна, работающая в диапазоне частот Wi-Fi, расположена близко к голове.
modeldescr_rf/scatterer_on_substrate = Рассеиватель на подложке\n\nПлоская электромагнитная волна падает на наночастицу золота на диэлектрической подложке. Сечения поглощения и рассеяния частицы вычисляются для нескольких различных полярных и азимутальных углов падения.
modeldescr_rf/scattering_nanosphere = Оптическое рассеяние на золотой наносфере\n\nЭтот пример демонстрирует расчет рассеяния плоской волны света на золотой наносфере. Рассеяние вычисляется для диапазона оптических частот, в котором золото можно смоделировать как материал с отрицательной комплексной диэлектрической проницаемостью. Рассчитываются диаграмма направленности в дальней зоне и потери.
modeldescr_rf/second_harmonic_generation = [Генерация второй гармоники гауссова луча (RF)]Генерация второй гармоники гауссова луча\n\nЛазерные системы являются важной областью применения в современной электронике. С помощью нелинейных материалов можно генерировать гармоники, кратные частоте лазерного света. В этом примере показано, как генерацию второй гармоники можно настроить как симуляцию переходных волн с использованием нелинейных свойств материала. Луч лазера Nd:YAG (лямбда = 1,06 микрона) фокусируется на нелинейном кристалле, так что перетяжка луча находится внутри кристалла.
modeldescr_rf/shape_optimize_dipole_antenna = Оптимизация формы дипольной антенны\n\nИмпеданс антенны является важным параметром, определяющим ее поведение в цепях передатчика. Согласование импеданса и низкореактивные компоненты важны для обеспечения надежной работы, чего можно достичь либо правильной конструкцией, либо согласующей схемой. В этом примере оптимизируется длина и диаметр дипольной антенны, чтобы получить определенное значение входного импеданса.\n\nдля этой модели требуется модуль оптимизации.
modeldescr_rf/sierpinski_fractal_monopole_antenna = Серпинский Фрактальный монополь Антенна\n\nФрактал — это математическая форма, показывающая самоповторяющиеся закономерности. Благодаря своим геометрическим свойствам фрактальная структура может генерировать множественные резонансы в радиочастотных приложениях. В этой модели антенны используется треугольник Серпинского третьего порядка, и вычисленные S-параметры показывают хорошее входное согласование на резонансах более высокого порядка.
modeldescr_rf/siw_leaky_wave_antenna = Интегрированный волновод с подложкой Антенна утечки волн \n\nВстроенные волноводы с подложкой (SIW) могут использоваться в антенных приложениях. В этом примере вытекающие волны из щелевой решетки на верхней поверхности SIW генерируют луч в определенном направлении, которым можно управлять, выбирая другую рабочую частоту.
modeldescr_rf/sma_connectorized_gcpw = Разъем SMA на заземленном копланарном волноводе\n\nРазъемы SMA широко используются на печатных платах (PCB) для тестирования. В этом примере показан способ возбуждения разъема SMA на микроволновой подложке и как согласовать заземленный копланарный волновод (GCPW) с сопротивлением 50 Ом с использованием портов с сосредоточенными параметрами и воздушного моста.
modeldescr_rf/spiral_slot_antenna = Антенна со спиральной щелью\n\nАнтенны со спиральной щелью имеют конформную конструкцию и могут использоваться для связи, зондирования, отслеживания, позиционирования и многих приложений в различных диапазонах микроволновых частот благодаря своей широкополосной частотной характеристике. В этом примере показано, как построить спиральную геометрию с помощью параметрических кривых, а также вычислить S-параметры и шаблоны дальнего поля.
modeldescr_rf/step_index_fiber = Step-Index Fiber\n\nИсследовано распределение магнитного и электрического полей для ограниченных мод для ступенчатого волокна из кварцевого стекла.
modeldescr_rf/substrate_integrated_waveguide = Подложка Интегрированный волновод\n\nВолноводная структура может быть изготовлена на подложке путем добавления переходных отверстий между микрополосковой линией и плоскостью заземления. Такое устройство ведет себя как фильтр верхних частот и привлекательно тем, что его легко изготовить. В этом примере волновода, интегрированного в подложку, S-параметры вычисляются как функция частоты, обнаруживая резкий срез на ожидаемой частоте.
modeldescr_rf/transmission_line_butler = Быстрое прототипирование сети формирования луча с матрицей Батлера\n\nМатрица Батлера — это пассивная сеть формирования луча. Это экономически эффективная сеть питания для фазированных антенных решеток, поскольку схема может быть изготовлена в виде микрополосковых линий и является жизнеспособным решением для сканирования луча без развертывания дорогостоящих активных устройств. <em>Линия передачи</em> интерфейс. Результаты показывают логарифмическое напряжение на схеме формирования диаграммы направленности матрицы Батлера на частоте 30 ГГц и арифметическую прогрессию фазы на каждом выходном порту.
modeldescr_rf/transmission_line_lpf = Быстрое моделирование фильтра нижних частот линии передачи \n\nОдин из способов спроектировать фильтр - использовать значения элементов известных прототипов фильтров, таких как максимально плоские или равночастотные фильтры нижних частот. Легче изготовить фильтр с распределенными элементами на микроволновой подложке, чем фильтр с сосредоточенными элементами, поскольку сложно найти готовые конденсаторы и катушки индуктивности, которые точно соответствуют значениям частотно-масштабированных элементов прототипа фильтра. Преобразование Richard’s, личность Kuroda’s и интерфейс <em>Transmission Line</em>. Этот подход очень быстр по сравнению с решением уравнений Максвелла’s в 3D. Модель моделирует трехэлементный фильтр нижних частот с равной пульсацией по 0,5 дБ и частотой среза 4 ГГц. Полученный график S-параметров показывает частотную характеристику нижних частот, которая также периодически наблюдается в более высоком частотном диапазоне.
modeldescr_rf/transmission_line_wpd = Быстрое моделирование линии передачи Делитель мощности Уилкинсона\n\nВ этом примере модели моделируется делитель мощности Уилкинсона с использованием физического интерфейса линии передачи в 2D. Этот подход очень быстр по сравнению с решением уравнений Максвелла в 3D. В результатах представлены S-параметры в диапазоне от 1 ГГц до 5 ГГц и распределение электрического потенциала вдоль линии передачи.
modeldescr_rf/tunable_cavity_filter = Настраиваемый резонаторный фильтр с затухающим режимом с использованием пьезоактюатора \n\nРезонаторный фильтр с затухающим режимом может быть реализован путем добавления структуры внутри резонатора. Эта структура меняет резонансную частоту ниже частоты доминирующей моды незаполненной полости. Пьезоактюатор используется для управления размером небольшого воздушного зазора, который обеспечивает возможность настройки резонансной частоты. \n\nВ дополнение к радиочастотному модулю для этого примера требуется один из модуля акустики, модуля MEMS или модуля механики конструкций.
modeldescr_rf/two_port_network_touchstone = Фильтр, характеризуемый импортированными S-параметрами через файл Touchstone \n\nФайл Touchstone описывает частотные характеристики сетевой схемы с n-портами с точки зрения S-параметров. Это можно использовать для упрощения произвольно сложных схем. Файл Touchstone можно получить в результате численного моделирования или измерений сетевого анализатора.\n\nПолученный файл для двухпортовой сети затем можно включить в моделирование без построения сложной формы схемы. В этом примере фильтр нижних частот между двумя коаксиальными разъемами моделируется с использованием функции двухпортовой сети и импортированных S-параметров через файл Touchstone. Результаты включают распределение электрического поля внутри коаксиальных разъемов и S-параметры.
modeldescr_rf/uhf_rfid_tag = Моделирование RFID-метки UHF\n\nUHF RFID-метки широко используются для идентификации и отслеживания животных. В этом примере имитируется метка пассивной радиочастотной идентификации (RFID) для диапазона частот УВЧ. По отношению к комплексному импедансу чип-транспондера ’s вычисляется коэффициент отражения. для этого используется подход, который отличается от традиционного метода анализа параметров рассеяния реальным эталонным значением импеданса.
modeldescr_rf/uhf_wireless_power_transfer = Моделирование беспроводной передачи энергии в кольцевых рамочных антеннах \n\nВ этом примере рассматривается концепция беспроводной передачи энергии путем изучения энергетической связи между двумя кольцевыми рамочными антеннами, настроенными на частоту UHF RFID, размер которой уменьшен с помощью чиповых индукторов. В то время как ориентация передающей антенны фиксирована, приемная антенна вращается, и наилучшая конфигурация связи исследуется с точки зрения S-параметров.
modeldescr_rf/vivaldi_antenna = Антенна Вивальди\n\nАнтенна с конической щелью, также известная как антенна Вивальди, полезна для широкополосных приложений. В этом примере для профиля конусности используется экспоненциальная функция. Цель состоит в том, чтобы вычислить диаграмму направленности в дальней зоне и импеданс конструкции. Хорошее согласование наблюдается в широкой полосе частот.
modeldescr_rf/waveguide_adapter = Волноводный адаптер\n\nЭто модель адаптера для распространения СВЧ в переходе между прямоугольным и эллиптическим волноводом. S-параметры рассеяния вычислены для частот одномодового диапазона.
modeldescr_rf/waveguide_diplexer = Проектирование волноводного диплексора для мобильной сети 5G\n\nДиплексор — это устройство, которое объединяет или разделяет сигналы на два разных диапазона частот, широко используемое в системах мобильной связи. В этом примере моделируются свойства разделения с использованием упрощенной 2D-геометрии. Рассчитанные S-параметры и электрические поля на нижнем и верхнем диапазонах покажут характеристики диплексера в Ka-диапазоне.
modeldescr_rf/waveguide_diplexer_optimization = Проектирование волноводного диплексора для мобильной сети 5G с использованием оптимизации формы\n\nДиплексер — это устройство, которое объединяет или разделяет сигналы на два разных диапазона частот, широко используемое в системах мобильной связи. В этом примере моделируются свойства разделения с использованием упрощенной 2D-геометрии. Геометрия оптимизируется с помощью оптимизации формы, чтобы получить желаемые S-параметры и электрические поля в нижней и верхней полосах.
modeldescr_rf/waveguide_iris_filter = Волноводный ирисовый полосовой фильтр\n\nПроводящая диафрагма, ирисовая диафрагма, расположенная поперек апертуры волновода, вызывает разрывы и генерирует шунтирующее реактивное сопротивление. Полоса пропускания частотной характеристики может быть достигнута с помощью каскадных резонаторов в сочетании с такими реактивными элементами, которые могут быть созданы путем вставки ряда ирисовых элементов внутрь волновода. Этот пример состоит из волновода X-диапазона WR-90 и симметричных индуктивных диафрагм (ирисов). Рассчитанные S-параметры показывают хорошую полосовую характеристику и подавление внеполосного сигнала.
modeldescr_rf/waveguide_filter_optimization_polynomial = Оптимизация волноводного ирисового полосового фильтра — Полиномиальная версия\n\n Волноводный фильтр спроектирован с использованием оптимизации формы путем перемещения вершин в геометрии. Диафрагмы исходной геометрии оптимизированы для обеспечения хорошей полосовой характеристики и подавления внеполосных сигналов при сохранении симметрии двойного зеркала.
modeldescr_rf/waveguide_filter_optimization_transformation = Оптимизация волноводного ирисового полосового фильтра — Transformation Version\n\n Волноводный фильтр спроектирован с использованием оптимизации формы путем перемещения и масштабирования прямоугольников в геометрии. Диафрагмы исходной геометрии оптимизированы для обеспечения хорошей полосовой характеристики и подавления внеполосных сигналов при сохранении симметрии двойного зеркала.
modeldescr_rf/waveguide_optimization = Waveguide Optimization\n\nВ этом примере показано, как выполнить анализ чувствительности S-параметра и оптимизацию изгиба микроволнового волновода на 90 градусов. Это базовое руководство по использованию функции параметризованной геометрии вместе с интерфейсами чувствительности и оптимизации. \n\nдля этой модели требуется модуль оптимизации.
modeldescr_rf/wilkinson_power_divider = Делитель мощности Wilkinson с разъемом SMA\n\nРезистивные делители мощности и делители мощности с Т-образным соединением представляют собой два традиционных типа трехпортовых делителей мощности. Такие делители либо имеют потери, либо не согласованы с опорным сопротивлением системы на всех портах. Кроме того, изоляция между двумя связанными портами не гарантируется. Делитель мощности Уилкинсона превосходит как делитель с Т-образным соединением без потерь, так и резистивный делитель, и не имеет упомянутых выше проблем. В этом примере показано, как смоделировать такое устройство.
modeldescr_rf/yagi_uda_antenna = Усилитель Wi-Fi Yagi–Uda Antenna\n\nАнтенна Yagi–Uda предназначена для определенного диапазона Wi-Fi и может уменьшить прослушивание за счет наведение сигналов с помощью направляющих. Эта антенна состоит из одного равномерно расположенного отражателя и четырех директоров. Результаты моделирования показывают максимальное усиление 10 дБи и соотношение фронт/тыл 14 дБ.

# Ray Optics Module apps
applicationdescr_roptics/distributed_bragg_reflector_filter = Распределенный отражатель Брэгга \n\nРаспределенный отражатель Брэгга (DBR) представляет собой периодическую структуру, образованную из чередующихся диэлектрических слоев, которую можно использовать для достижения почти полного отражения в определенном диапазоне частот. Основное преимущество DBR перед обычными металлическими зеркалами заключается в том, что DBR могут быть спроектированы так, чтобы иметь индивидуальные коэффициенты отражения на выбранных длинах волн. фильтры.\n\nПолосовой фильтр предотвращает передачу длин волн в пределах полосы задерживания. Это полезно для фильтрации нежелательных областей длины волны из спектра. Полосовые фильтры обычно включаются во многие виды оптических измерительных установок, где они используются для предотвращения попадания рассеянного лазерного света в чувствительное детекторное оборудование. \n\nРежекторный фильтр пропускает узкий диапазон длин волн, отражая при этом все остальные длины волн. Это полезно для выбора излучения из спектрально узкого источника, такого как отдельные переходы в газе, при этом исключая оптическое загрязнение от других источников излучения. \n\nВходные данные для этого приложения настраивают свойства геометрии и показателей преломления слоя. Результаты представлены в виде графиков коэффициента отражения в диапазоне длин волн излучения. Ширина полосы задерживания представлена ​​для обоих случаев фильтра, а также вычисляются коэффициент отражения режекторного фильтра и ширина полосы пропускания режекторного фильтра.
applicationdescr_roptics/solar_dish_receiver_designer = Solar Dish Receiver конструктор\n\nСолнечные концентраторы/резонаторные приемники могут использоваться для фокусировки падающего солнечного излучения в небольшую область, генерируя интенсивное тепло, которое затем может быть преобразовано в электрическую или химическую энергию. Обычным показателем качества в солнечных теплоэнергетических системах является коэффициент концентрации или отношение солнечного потока на поверхности приемника или в фокальной плоскости к окружающему солнечному потоку. \n\nЭто приложение представляет собой работоспособное приложение, основанное на учебной модели Solar Dish Receiver. В этом приложении падающее солнечное излучение отражается параболической тарелкой, а концентрированное солнечное излучение собирается в небольшой полости. Всего для исследования доступны шесть различных параметризованных геометрий полости: цилиндрическая, купольная, гетероконическая, эллиптическая, сферическая и коническая. Также возможно принять во внимание несколько различных типов возмущений, включая потемнение края Солнца и шероховатость поверхности. для каждой геометрии полости встроенные графики показывают распределение потока и коэффициент концентрации в фокальной плоскости, а также падающий поток на внутренних поверхностях полости. \n\nВы можете узнать больше об этом примере в соответствующем сообщении в блоге: "<a href="/blogs/эффективно оптимизирующая-солнечная антенна-приемник-дизайн/">Efficiently Optimizing Solar Dish Receiver Designs</a>"

# Ray Optics Module models
modeldescr_roptics/achromatic_phase_shifter = Тонкопленочный ахроматический фазовращатель с полным внутренним отражением (TIRTF APS)\n\nВозможность изменять поляризацию света имеет решающее значение для широкого спектра оптических устройств. Например, поляризация света оказывает существенное влияние на работу оптических изоляторов, аттенюаторов и светоделителей. Присвоив свету определенную поляризацию, особенно линейную или круговую, можно существенно уменьшить блики в оптических системах. Компонента поля в распространяющемся луче света. Задержка фазы может возникнуть, когда свет подвергается полному внутреннему отражению (TIR) ​​от поверхности. На разность фаз между компонентами электрического поля влияет наличие тонких диэлектрических пленок на отражающей поверхности.\n\nВ этой эталонной модели углы запаздывания фазы для одно- и трехслойных покрытий вычисляются и сравниваются с опубликованными результатами. Этот принцип можно использовать для создания тонкопленочного ахроматического фазовращателя с полным внутренним отражением (TIRTF APS) с почти равномерным запаздыванием фазы в широком спектральном диапазоне.
modeldescr_roptics/annular_ultraviolet_reactor = Кольцевой ультрафиолетовый реактор\n\nЭта модель демонстрирует, как вычислить объёмную скорость флюенса в ультрафиолетовом (УФ) реакторе. Геометрия представляет собой кольцевую область жидкости, окружающую цилиндрическую лампу. Рассмотрено влияние отражения от стенок реактора на радиальное распределение скорости флюенса.
modeldescr_roptics/annular_ultraviolet_reactor_particle = Кольцевой ультрафиолетовый реактор с отслеживанием частиц \n\nВ этом примере простой реактор очистки воды ультрафиолетом (УФ) моделируется с использованием комбинации трассировки лучей, вычислительной гидродинамики и лагранжевого отслеживания частиц. Сначала объёмная скорость флюенса накапливается вдоль лучей, испускаемых поверхностью УФ-лампы, с использованием интерфейса «Геометрическая оптика». Затем определяется скорость жидкости в реакторе. Наконец, частицы отслеживаются вдоль линий тока жидкости, а скорость флюенса вдоль этих траекторий частиц интегрируется с использованием вспомогательной зависимой переменной.
modeldescr_roptics/antireflective_coating_multilayer = Многослойное антибликовое покрытие\n\nАнтиотражающие покрытия часто используются в оптических системах для уменьшения количества рассеянного света, образующегося при переходе луча света из одной среды в другую среду с другим показателем преломления. Простейшим примером антиотражающего покрытия является четвертьволновой слой, в котором толщина монослойной диэлектрической пленки регулируется так, чтобы она составляла одну четверть оптической длины волны. Хотя однослойное покрытие может снизить коэффициент отражения до нуля для света определенной длины волны и угла падения, коэффициент отражения может быть существенно выше для других длин волн. Одним из возможных решений является использование многослойного покрытия, которое обеспечивает постоянно низкий коэффициент отражения в более широком спектральном диапазоне.\n\nВ этом учебном примере свет пересекает границу между двумя средами с разными показателями преломления при нормальном падении. Сравнивается отражательная способность двух различных многослойных покрытий в широком спектральном диапазоне: покрытие в четверть четверти (два слоя) и покрытие в четверть четверти (три слоя). Показано, что покрытие «четверть-половина четверти» имеет более стабильно низкий коэффициент отражения в большей части видимого спектра.
modeldescr_roptics/aspheric_lens = Монохроматические аберрации в асферической линзе\n\nМонохроматические аберрации, или отклонения в характеристиках системы линз от параксиальной оптики, широко распространены в реальных системах линз. Среди наиболее распространенных оптических аберраций — кома, астигматизм и сферическая аберрация.\n\nВ этом учебном примере коллимированный луч фокусируется асферической линзой. Оцениваются коэффициенты Цернике, соответствующие различным членам аберрации, и строятся графики соответствующих полиномов Цернике. Из-за симметрии системы линз наблюдается, что среди аберраций более высокого порядка доминирует сферическая аберрация. В зависимости от определения фокальной плоскости также может присутствовать существенный член дефокусировки.
modeldescr_roptics/aspheric_lens_with_piezoelectric_mirror = Асферическая линза с пьезоэлектрическим зеркалом для компенсации аберраций\n\nЭта модель имитирует двухслойный оптический объектив с зеркалом PZT MEMS для компенсации аберраций. Асферическая линза оптимизирована для первого слоя диска, поэтому лучи фокусируются вблизи дифракционного предела. Если линзу переместить ближе к диску, чтобы сместить фокус на второй слой, в результате фокус покажет значительные монохроматические аберрации. К зеркалу PZT прикладывается электрический потенциал, вызывающий его деформацию, чтобы исправить эти аберрации.
modeldescr_roptics/bow_tie_laser_cavity = Лазерный резонатор-бабочка\n\nЭто пример лазерного резонатора, состоящего из двух сферических зеркал и двух плоских зеркал в симметричной конфигурации «галстук-бабочка». Луч, первоначально выпущенный под небольшим углом относительно оптической оси, отслеживается по большому количеству отражений, чтобы определить, остается ли он удерживаемым внутри полости. Исследование повторяется для нескольких размеров полости, а затем анализ устойчивости сравнивается с теорией матрицы ABCD.
modeldescr_roptics/compact_camera_module = Компактный модуль камеры\n\nКомпактные модули камеры широко используются в электронных устройствах, таких как мобильные телефоны и планшетные компьютеры. Чтобы уменьшить размер и количество необходимых элементов, оптическая конструкция обычно включает несколько сильно асферических поверхностей. Эта модель демонстрирует пятиэлементную конструкцию с использованием детали 'Aspheric Even Lens 3D' из библиотеки частей модуля лучевой оптики.
modeldescr_roptics/compact_camera_module_alt = Компактный модуль камеры (Альтернатива)\n\nКомпактные модули камеры широко используются в электронных устройствах, таких как мобильные телефоны и планшетные компьютеры. Чтобы уменьшить размер и количество необходимых элементов, оптическая конструкция обычно включает несколько сильно асферических поверхностей. Эта модель демонстрирует трехэлементную конструкцию с использованием детали 'Aspheric Even Lens 3D' из библиотеки частей модуля лучевой оптики\n\nЭта модель является альтернативой пятиэлементной конструкции, используемой модулем компактной камеры.
modeldescr_roptics/corner_cube_retroreflector = Ретрорефлектор углового куба\n\nРетрорефлектор углового куба может использоваться для отражения лучей в направлении, точно антипараллельном их первоначальному направлению, независимо от угла падения. В этом учебном примере показано, как смоделировать отражение пучка лучей от ретрорефлектора углового куба с помощью интерфейса геометрической оптики.
modeldescr_roptics/cross_grating_echelle_spectrograph = Перекрестная решётка Échelle Spectrograph\n\nЭто руководство демонстрирует использование функции перекрестной решетки в спектрографе échelle. Поперечная решётка представляет собой периодическую поверхность с двумя направлениями периодичности. В этой модели поперечная решётка используется в высоком порядке в одном направлении и в первом порядке в ортогональном ("cross") направлении. Таким образом, двумерный спектр с перекрестной дисперсией может быть получен с помощью одной решетки. Производится параметрическая развертка по нескольким порядкам и формируются результирующие лучевые и точечные диаграммы.
modeldescr_roptics/czerny_turner_monochromator = Czerny–Turner Monochromator\n\nA Czerny–Turner monochromator пространственно разделяет полихроматический свет на серию монохроматических лучей. В этом примере моделируется перекрещенная конфигурация Czerny–Turner, которая состоит из сферического коллимирующего зеркала, плоской дифракционной решетки, сферического зеркала формирования изображения и детектора на основе устройства с зарядовой связью (CCD). В примере используется интерфейс геометрической оптики для вычисления положения падающих лучей на плоскости детектора, из которого можно получить разрешение устройства.
modeldescr_roptics/diffraction_grating = Дифракционная решётка\n\nВ этом примере используются модули волновой оптики и лучевой оптики для моделирования распространения лучей через дифракционную решетку под разными углами падения. Он использует S-параметры, вычисленные с помощью интерфейса «Электромагнитные волны, частотная область» на элементарной ячейке решетки, чтобы указать коэффициенты отражения и пропускания каждого порядка дифракции в интерфейсе «Геометрическая оптика», что позволяет моделировать распространение лучей через решетку в масштабах длины, намного превышающих ширину элементарной ячейки.
modeldescr_roptics/distributed_bragg_reflector = Распределенный брэгговский отражатель\n\nРаспределенный брэгговский отражатель (DBR) представляет собой периодическую структуру, образованную из чередующихся диэлектрических слоев, которую можно использовать для достижения почти полного отражения в диапазоне частот с минимальными потерями. В этом учебном примере моделируется отражатель Брэгга с центральной длиной волны 550 нм и полосой задерживания 180 нм.
modeldescr_roptics/double_gauss_lens = Двойная линза Гаусса\n\nВ этом учебном примере показано, как настроить многоэлементный объектив. Выбранный объектив — двойной Гаусс, описанный в 'Modern Lens Design (2nd edition)', W. Smith, 2005, стр. 323.\n\nВ учебнике показано, как создать геометрическую последовательность с помощью 'Spherical Lens 3D' и 'Circular Planar Annulus' части, найденные в библиотеке деталей модуля лучевой оптики.\n\nТрассировка луча выполняется при одной длине волны и угле поля. Лучевые диаграммы показаны вместе с точечной диаграммой и диаграммой оптических аберраций.
modeldescr_roptics/double_gauss_lens_image_simulation = Simulation изображения двойной линзы Гаусса\n\nВ этом примере показано, как импортировать растровое изображение, которое можно использовать в качестве объекта в конечной трассировке сопряженных лучей. Модель основана на учебном пособии по двойной линзе Гаусса из библиотеки приложений модуля лучевой оптики.
modeldescr_roptics/double_gauss_lens_parametric = Двойная линза Гаусса — Параметрическая развертка\n\nЭто руководство расширяет пример 'Double Gauss Lens', демонстрируя, как создать параметрическую развертку по нескольким длинам волн и углам поля. Также продемонстрировано создание переменных на основе результатов параметрической развертки и их использование во время постобработки.
modeldescr_roptics/fresnel_rhomb = Ромб Френеля\n\nРомб Френеля — это призма, которая использует полное внутреннее отражение для управления поляризацией света. В этом примере свет в призме внутренне отражается под углом падения, который вызывает задержку фазы на 45 градусов между s- и p-поляризованным излучением. Подвергая свет двум таким отражениям, призма преобразует падающий линейно поляризованный свет в свет с круговой поляризацией.
modeldescr_roptics/gravitational_lensing = Гравитационное линзирование\n\nВ этом примере показано, как Солнце вызывает отклонение на 1,75 угловых секунды лучей, скользящих по поверхности Солнца, наблюдаемых с Земли. Эйнштейн предсказал это значение после усовершенствования своей теории относительности во время Первой мировой войны.
modeldescr_roptics/electrophoretic_grin_lens = Электрофоретические линзы с градиентным индексом (GRIN)\n\nЭлектрофоретические линзы имеют неизогнутые поверхности, но обладают оптической силой. Оптическая сила является результатом ступенчатого показателя преломления линзы, вызванного неравномерным распределением ее материала. В этой модели неоднородное распределение показателя преломления формируется электрофорезом: при приложении электрического потенциала положительно заряженные (диспергированные или разбавленные) частицы притягиваются к центру, что делает центральный показатель выше, а внешний показатель ниже. Полученная оптика представляет собой так называемую линзу с градиентным индексом (GRIN).
modeldescr_roptics/gregory_maksutov_telescope = Григорий–Максутов Телескоп\n\nТелескоп Григория–Максутов представляет собой простой катадиоптрический телескоп, состоящий из сферической корректирующей линзы и сферическое главное зеркало. В этом примере линза и зеркало корректора сформированы с использованием ‘Spherical Lens 3D’ и ‘Spherical Mirror 3D’ частей соответственно из модуля лучевой оптики. Библиотека частей.
modeldescr_roptics/hubble_space_telescope = Космический телескоп Хаббла\n\nКосмический телескоп Хаббла (HST) является примером стандартного телескопа Кассегрена. Деталь ‘Conic Mirror On Axis 3D’ из библиотеки частей модуля лучевой оптики используется для построения геометрии HST Ritchey–Chrétien. Множественные функции выпуска используются для создания лучевых и точечных диаграмм на и вне оси.
modeldescr_roptics/keck_telescope = Телескоп Кека\n\nТелескоп Кека — это телескоп диаметром 10 метров с оптической схемой Ричи–Кретьен. Он известен как один из первых больших оптических телескопов, в котором используется легкое сегментированное главное зеркало. В этом учебном примере показано, как использовать встроенные многоугольные зеркала из библиотеки деталей модуля лучевой оптики для построения модели сегментированного главного зеркала телескопа Кек.
modeldescr_roptics/laser_cavity_thin_lens = Лазерный резонатор с тонкой линзой\n\nЭто пример простого лазерного резонатора, состоящего из двух плоских зеркал с тонкой двояковыпуклой линзой между ними. Луч, первоначально выпущенный под небольшим углом относительно оптической оси, отслеживается по большому количеству отражений, чтобы определить, остается ли он удерживаемым внутри полости. Исследование повторяется для нескольких размеров полости, а затем анализ устойчивости сравнивается с теорией матрицы ABCD.
modeldescr_roptics/light_pipe = Прозрачная световая труба\n\nСветовые трубы — это конструкции, которые можно использовать для транспортировки света между разными местами. В целом их можно разделить на две основные группы: трубки с отражающим покрытием и прозрачные твердые тела, которые удерживают свет за счет полного внутреннего отражения. В этом примере свет передается через изогнутую световод за счет полного внутреннего отражения. Исследовано влияние формы трубы на коэффициент пропускания.
modeldescr_roptics/linear_wave_retarder = Линейный волновой замедлитель\n\nКомбинации оптических устройств, таких как поляризаторы и волновые замедлители, могут использоваться для управления интенсивностью и поляризацией передаваемого излучения. В этом учебном примере два линейных поляризатора с ортогональными осями пропускания используются для уменьшения интенсивности луча до нуля. Затем анализируются интенсивность и поляризация прошедшего луча, когда между двумя поляризаторами помещается четвертьволновой или полуволновой замедлитель.
modeldescr_roptics/luneburg_lens = Линза Люнебурга\n\nЛинза Люнебурга имеет градуированный показатель преломления, что приводит к особым фокусирующим свойствам. В этом примере модели используется интерфейс Geometrical Optics для расчета траекторий искривленных лучей в градиентной среде.
modeldescr_roptics/michelson_interferometer = Интерферометр Майкельсона\n\nВ этом примере показано, как построить интерференционную картину из комбинации двух лучей с немного разной длиной оптического пути. Простой интерферометр Майкельсона используется для изменения длины оптического пути, которое осуществляется путем перемещения одного из зеркал.
modeldescr_roptics/michelson_interferometer_thermal = Интерферометр Майкельсона\n\nВ этом примере объединены интерфейсы Теплопередача в твёрдых телах, Механика твёрдого тела и Геометрическая оптика для расчета влияния теплового расширения оптических компонентов на интерференционную картину, отображаемую Майкельсоном. interferometer.\n\nЭтот пример также требует модуля «Механика конструкций» или модуля MEMS.
modeldescr_roptics/microlithography_lens = Микролитографическая линза\n\nМикролитографическая линза используется для проецирования изображения интегральной схемы на кремниевую подложку. В этом учебном пособии показано, как создать 21-элементную линзу из плавленого кварца с числовой апертурой 0,56, предназначенную для использования на длине волны 248 нм. Объектив общей длиной 1 метр имеет увеличение -0,25 и обеспечивает превосходное качество изображения в круге изображения диаметром 23,4 мм.
modeldescr_roptics/newtonian_telescope = Ньютоновский телескоп\n\nВ этой учебной модели показано, как отслеживать неполяризованные световые лучи через ньютоновский телескоп. Падающий свет отражается от параболоидального зеркала на плоское вторичное зеркало эллиптической формы, которое сгибает оптический путь на 90 градусов к плоской фокальной плоскости. Геометрия телескопа параметрируется фокусным расстоянием и диаметром главного зеркала, а также расстоянием фокальной плоскости от оптической оси.
modeldescr_roptics/newtonian_telescope_structural_analysis = Структурный анализ ньютоновского телескопа\n\nВ этом учебном примере демонстрируется расчёт механики конструкций простого телескопа. Исследована деформация конструкции телескопа под действием силы тяжести и показано ее влияние на качество изображения.
modeldescr_roptics/petzval_lens = Petzval Lens\n\nВ этом учебном примере показано, как настроить многоэлементный объектив. Выбранная линза представляет собой линзу Петцваля с выравнивателем поля, описанную в 'Fundamental Optical Design', M. Kidger, 2001, p. 192. В учебнике показано, как включить геометрическую последовательность, используя часть 'Spherical Lens 3D', найденную в библиотеке частей модуля лучевой оптики. Также продемонстрировано использование чистых отверстий, а также заграждений по краям и отверстиям. Наконец, графически показаны результаты трассировки лучей на основе сетки при нескольких различных длинах волн и углах поля.
modeldescr_roptics/petzval_lens_geometric_modulation_transfer_function = Функция передачи геометрической модуляции линзы Петцваля\n\nЭта модель и учебное пособие демонстрируют использование прикладного метода для расчета и построения передаточной функции геометрической модуляции (MTF) для линзы Петцваля.
modeldescr_roptics/petzval_lens_optimization = Petzval Lens Optimization\n\nВ этом примере показано, как использовать исследование оптимизации для обновления оптического рецепта для многоэлементного объектива при замене одного из очков. Начиная с первоначального рецепта, оптическое стекло одного элемента было заменено стеклом почти с тем же показателем преломления d-линии и числом Аббе. В исследовании «Оптимизация» в качестве управляющих параметров были выбраны возмущения радиусов кривизны поверхностей линз, а в качестве целевых функций выбраны среднеквадратичные размеры пятна для трех различных углов поля зрения.
modeldescr_roptics/petzval_lens_stop_analysis = [СТОП-анализ линзы Петцваля]СТОП-анализ линзы Петцваля\n\nЭта модель демонстрирует интегрированный анализ структурно-термооптических характеристик (СТОП) оптической системы при однородной температуре. В качестве основы для этой модели используется учебник по линзе Петцваля вместе с простой геометрией ствола. Результирующие поля смещений и напряжений внутри оптической системы показаны вместе с диаграммами номинального и наилучшего фокусного пятна. Эта модель является основой для нескольких расширений данного исследования.
modeldescr_roptics/petzval_lens_stop_analysis_isothermal_sweep = [СТОП-анализ линзы Петцваля]СТОП-анализ линзы Петцваля Изотермическая развертка\n\nЭта модель демонстрирует интегрированный анализ структурно-термооптических характеристик (СТОП) оптической системы. В качестве основы для этой модели используется учебное пособие по анализу STOP линзы Petzval, в котором сборка линзы и оправы подвергается воздействию единой изотермической температуры. Выполняется параметрическая развертка в диапазоне однородных температур и определяется положение плоскости изображения с наилучшей фокусировкой.
modeldescr_roptics/petzval_lens_stop_analysis_with_hyperelasticity = [СТОП-анализ линзы Петцваля]СТОП-анализ линзы Петцваля с гиперупругостью\n\nЭта модель демонстрирует комплексный анализ структурно-термооптических характеристик (СТОП) оптической системы с использованием нелинейной модели материала. В качестве основы для этой модели используется учебное пособие по анализу STOP линзы Петцваля. Опоры линз смоделированы с использованием гиперэластичного материала. Результирующие поля смещений и напряжений внутри оптической системы показаны вместе с диаграммами номинального и наилучшего фокусного пятна.
modeldescr_roptics/petzval_lens_stop_analysis_with_surface_to_surface_radiation = [СТОП-анализ линзы Петцваля]СТОП-анализ линзы Петцваля с излучением от поверхности к поверхности \n\nЭта модель демонстрирует интегрированный структурно-термооптический анализ характеристик (СТОП) оптической системы в присутствии температурных градиентов. В качестве основы для этой модели используется учебное пособие по анализу STOP линзы Петцваля вместе с простой геометрией ствола. Линза в сборе размещается внутри термовакуумной камеры, где внешняя температура существенно отличается от внутренней. Линза в сборе подвергается воздействию внешней среды через пару окон посредством излучения от поверхности к поверхности. Результирующий тепловой градиент и поле смещения внутри оптической системы показаны вместе с влиянием на качество изображения.
modeldescr_roptics/plane_em_wave_to_ray_release = Высвобождение лучей на основе плоской электромагнитной волны\n\nВ этом учебном примере показано, как настроить высвобождение лучей на основе падающего электрического поля на границе. Сначала интерфейс «Электромагнитные волны, частотная область» используется для расчета электрического поля плоской волны. Затем испускаются лучи с начальной интенсивностью и поляризацией, совпадающими с поляризацией электрического поля на границе высвобождения.
modeldescr_roptics/ray_optics_modeling_fresnel_lens = Моделирование трассировки лучей линзы Френеля\n\nЭта модель демонстрирует, как можно сконструировать линзу Френеля из обычной плоско-выпуклой линзы, когда требуется короткое фокусное расстояние. Сконструированная таким образом линза Френеля намного легче и дешевле, чем плоско-выпуклая линза. Сравнивается коллимация лучей обеих линз.
modeldescr_roptics/ray_release_from_dipole_antenna_source_2daxi = Высвобождение лучей из источника дипольной антенны (2D-осесимметричная)\n\nВ этой учебной модели диаграмма направленности дипольной антенны в дальней зоне вычисляется в компоненте 2D-осесимметричной модели. Затем в отдельном компоненте 3D-модели испускается луч с использованием диаграммы направленности в дальней зоне для инициализации интенсивности, поляризации и фазы луча.
modeldescr_roptics/ray_release_from_dipole_antenna_source_3d = Высвобождение луча от источника дипольной антенны (3D)\n\nВ этой учебной модели диаграмма направленности дипольной антенны в дальней зоне вычисляется в компоненте 3D-модели. Затем в отдельном компоненте 3D-модели испускается луч с использованием диаграммы направленности в дальней зоне для инициализации интенсивности, поляризации и фазы луча.
modeldescr_roptics/rowland_circle_spectrometer = Спектрометр круга Роуленда\n\nКруг Роуленда представляет собой круг радиуса R, который лежит по касательной к вогнутой изогнутой дифракционной решетке радиуса 2R. Если входная щель падающего света расположена на этом круге, то лучи, отраженные решеткой, будут фокусироваться в различных точках одного и того же круга в зависимости от длины волны и порядка дифракции. В этой учебной модели базового двумерного кругового спектрометра Роуленда показано, как определить вогнутые изогнутые дифракционные решетки, указать, какие порядки дифракции высвобождать, и отслеживать порядки дифракции выпущенных лучей с помощью вспомогательной зависимой переменной.
modeldescr_roptics/sagnac_interferometer = Интерферометр Саньяка\n\nЭто модель простого интерферометра Саньяка, состоящего из двух зеркал и светоделителя, расположенных в виде треугольника. Вся область моделирования вращается; в результате лучи, распространяющиеся в треугольнике в противоположных направлениях, имеют разную длину оптического пути из-за эффекта Саньяка. Это можно использовать для определения угловой скорости системы.
modeldescr_roptics/schmidt_cassegrain_telescope = Телескоп Schmidt–Cassegrain Telescope\n\nТелескоп Schmidt–Cassegrain Телескоп, продемонстрированный в этом учебном примере, представляет собой классическую конструкцию с использованием асферической корректирующей линзы и двух сферические зеркала. Асферический корректор создается с использованием детали 'Aspheric Even Lens 3D' из библиотеки частей модуля Ray Optics.
modeldescr_roptics/solar_dish_receiver = Приемник солнечной антенны\n\nПараболоидная антенна может концентрировать солнечную энергию на цели (приемнике), что приводит к очень высоким локальным тепловым потокам. Его можно использовать для выработки пара, который можно использовать для питания генератора, или водорода, который можно использовать непосредственно в качестве источника топлива. В этом примере вычисляется тепловой поток, поступающий на приемник, в зависимости от радиального положения и сравнивается с опубликованными значениями. Учтены поправки, связанные с конечным размером солнца, затемнением лимба и шероховатостью поверхности тарелки.
modeldescr_roptics/thermal_lensing = Термическое линзирование\n\nЗатухание электромагнитного излучения в поглощающей среде может вызвать значительное изменение температуры в материале. Зависимость показателя преломления от температуры, а также физические деформации, вызванные тепловым расширением, могут привести к тому, что первоначально плоская поверхность будет фокусировать входящие лучи - эффект, называемый термическим линзированием. В этом примере демонстрируется термическое линзирование в оконном стекле.
modeldescr_roptics/thermally_induced_focal_shift = Термически индуцированный сдвиг фокуса в мощных лазерных фокусирующих системах \n\nСовременная мощная промышленная волоконная лазерная система может доставлять до 3 кВт одномодового лазерного излучения на поверхности, подлежащие резке, сверлению, сварке или маркировке. Даже при использовании материалов с высокой пропускающей способностью оптический компонент, используемый для фокусировки лазерного луча на целевых поверхностях, может подвергаться воздействию большого количества энергии, переносимой светом. Когда лазерный луч проходит через оптические компоненты, тепловое расширение, а также изменение показателя преломления оптических материалов могут изменить фокус системы. В этом примере вычисляется фокусный сдвиг в мощной лазерной системе из-за термической деформации.
modeldescr_roptics/tunable_liquid_gradient_refractive_index_lens = Линза с настраиваемым градиентом преломления жидкости \n\nЛинза с градиентом преломления жидкости (L-GRIN) может фокусировать свет исключительно за счет течения жидкости, устраняя необходимость в механических или электрических механизмах управления светом. В этом примере раствор хлорида кальция смешивают с дистиллированной водой; Результирующий градиент концентрации CaCl2 создает градиент показателя преломления в канале, который фокусирует свет от оптоволоконного кабеля. Объектив L-GRIN настраивается; изменяя расход дистиллированной воды, можно управлять распределением показателя преломления в канале и изменять расположение фокальной плоскости.
modeldescr_roptics/two_mirror_laser_cavity = Двухзеркальный лазерный резонатор\n\nЭто пример простого лазерного резонатора, состоящего из двух сферических зеркал. Луч, первоначально выпущенный под небольшим углом относительно оптической оси, отслеживается по большому количеству отражений, чтобы определить, остается ли он удерживаемым внутри полости. Исследование повторяется для нескольких размеров полости, а затем анализ устойчивости сравнивается с теорией матрицы ABCD.
modeldescr_roptics/vdara_caustic_surface = Vdara® Caustic Surface\n\nКогда отель Vdara® впервые открылся в Лас-Вегасе, посетители, отдыхающие у бассейна, в определенное время испытывали сильные периоды жары. день, в определенное время года. Такое сильное тепло было вызвано отражением солнечного излучения от изогнутой отражающей поверхности на южной стороне отеля. В этом примере показано, как каустическая поверхность образуется в зоне бассейна примерно в то время и в дату, когда впервые было сообщено о проблемах.
modeldescr_roptics/white_pupil_echelle_spectrograph = Белый зрачок Échelle Spectrograph\n\nÉchelle Спектрографы обычно используются в астрономии для анализа звездных атмосфер с высоким разрешением и для точности Допплеровская велосиметрия. В этом учебном примере моделируется "white pupil" форма этого инструмента. Он использует несколько деталей из библиотеки деталей модуля лучевой оптики и демонстрирует создание сложной полностью параметризованной геометрии. Включены два компонента решетки и продемонстрировано использование узла «Порядок дифракции». Решётка échelle используется в высоком порядке, а решётка с перекрестной дисперсией используется в первом порядке. Показаны результирующий луч échelle и точечные диаграммы.

#Rotordynamics Module models
applicationdescr_rotor/rotor_bearing_system_simulator = Симулятор системы подшипников ротора\n\nЭто приложение демонстрирует следующее:\n\n• Система навигации с использованием кнопок переключения на ленте и кнопок «Назад/Вперед» в окне настроек.\n• Выбор предопределенных или пользовательских материалов\n• Использование таблицы для ввода объектов геометрии\n\nПриложение моделирует подшипниковую систему ротора, состоящую из дисков и подшипников, установленных на вращающемся валу. Анализ собственных частот выполняется для диапазона угловых скоростей, чтобы определить критические скорости системы.\n\nПриложение такого типа полезно на ранней стадии проектирования, когда можно внести изменения в конструкцию, чтобы отодвинуть критические скорости от рабочей скорости системы.\n\nРезультаты включают в себя режимы вихря, график Кэмпбелла и список критических скоростей.


#modeldescr_rotor/gas_turbine_rotor = Rotory Vibrations in a Gas Turbine Rotor\n\nThis application performs an eigenfrequency analysis of a gas turbine rotor supported by hydrodynamic bearings. The objective is to obtain the critical speeds of the rotor using the Campbell diagram.\n\nThe rotor is modeled using Solid Rotor interface in Rotordynamics Module. This interface implements the equations in rotating frame. The bearings are modeled using the Hydrodynamic Bearing interface. A multiphysics coupling feature Solid Rotor Bearing Coupling is used to model the coupling between the rotor and bearing.
modeldescr_rotor/campbell_plot_comparison = Сравнение графиков Кэмпбелла с использованием разных интерфейсов ротора \n\nдля моделирования ротора могут использоваться разные типы элементов, в зависимости от уровня сложности и типа моделируемой системы. Этапы моделирования и представление результатов будут различаться в зависимости от типа идеализации. В этой учебной модели анализ собственных частот выполняется на ступенчатом роторе с использованием трех различных физических интерфейсов для динамики ротора: Solid Rotor; Сплошной ротор, фиксированная рама; и лучевой ротор. Полученные графики Кэмпбелла от этих интерфейсов сравниваются друг с другом. Модель также помогает понять различные этапы использования каждого интерфейса.
modeldescr_rotor/coupled_rotors = Роторы, соединенные шлицевой муфтой\n\nВ этом примере вы узнаете, как смоделировать два ротора, соединенных шлицевой муфтой. Первый ротор представляет собой фиксированный консольный ротор, а второй ротор просто поддерживается. Модель предполагает, что между роторами посредством муфты связано только поступательное движение, в то время как вращения обоих роторов разъединены. \n\nВ учебном пособии показано, как выполнить анализ собственных частот на разных скоростях ротора, где гироскопические эффекты в роторе усиливают прямые моды и смягчают обратные моды. Результаты моделирования проиллюстрированы графиком Кэмпбелла, критические скорости сравниваются и оказываются близкими к полученным в справочниках.
modeldescr_rotor/dual_rotors = Критическая скорость системы с двумя роторами\n\nВ связи с потребностью в большей мощности при меньших размерах двухвальные системы с межваловыми подшипниками становятся стандартной конфигурацией для газотурбинных двигателей. Такие системы состоят из двух соосных роторов, вращающихся с разной скоростью и соединенных между собой многокатушечным подшипником. В этом примере для такой системы с двумя роторами выполняется анализ собственных частот, чтобы определить критическую скорость. Перекрестные вибрации, возникающие в многокатушечных подшипниках, делают динамическое поведение одного вала зависимым от динамического поведения другого.
modeldescr_rotor/extended_jeffcott_rotor_rub = Вибрация в роторе Джеффкотта, опирающемся на гидродинамический подшипник из-за контакта с корпусом \n\nЭтот пример является расширением модели Вибрация в роторе Джеффкотта из-за контактов с корпусом. В этом случае вместо просто опирающегося ротора ротор опирается на гидродинамические подшипники. Зазор между ротором и корпусом в этом случае больше. Реакция ротора изучается как на докритических, так и на сверхкритических скоростях. На докритической скорости контакт ротора с корпусом отсутствует, тогда как на сверхкритических скоростях из-за большей силы дисбаланса ротор контактирует с корпусом. При наличии контакта отклик содержит высшие гармоники.
modeldescr_rotor/geared_rotors = Роторы, соединенные косозубыми шестернями\n\nВ этой учебной модели показано, как моделировать несколько роторов, соединенных косозубыми шестернями, с помощью модуля Rotordynamics, дополнительного продукта к Structural Mechanics Module и COMSOL Multiphysics®. При моделировании зубчатых роторов наличие шестерен вызывает боковые и крутильные колебания роторов. Зубчатое зацепление считается упругим и имеет постоянную жесткость.\n\nПоказан анализ собственных частот для вычисления собственных частот системы при разных скоростях ведущего ротора. Также выполняется нестационарный анализ при заданной скорости ведущего ротора и моменте нагрузки на ведомом роторе. Эти расчеты позволяют получить орбиты центров шестерен и силы в подшипниках. Нестационарный анализ выполняется как для жесткого, так и для упругого зубчатого зацепления, чтобы оценить влияние жесткости зацепления на колебания ротора.\n\nРезультаты включают диаграмму Кэмпбелла с изменением собственных частот от скорости вращения, критические скорости ротора, частотные характеристики перемещения и вращения шестерен, распределение напряжений по Мизесу в валах, орбиты центров шестерен во вращающейся и неподвижной системах отсчета, а также динамическую ошибку передачи при передаче вращения от одного вала к другому.
modeldescr_rotor/hydrodynamic_bearings_comparison = Сравнение различных гидродинамических подшипников\n\nВ этом примере показано, как можно использовать моделирование для исследования характеристик различных гидродинамических подшипников скольжения. Модель использует интерфейс «Гидродинамический подшипник», который решает уравнение Рейнольдса для расчета давления, развивающегося в тонкой пленке жидкости для четырех различных типов подшипников: скольжения, эллипса, разъемных половин и многолепестковых подшипников. стационарное положение шеек и профиль толщины жидкости, когда шейка концентрична подшипнику. Кроме того, профили давления и скорости жидкости также отображаются как поверхности, отделенные от подшипника. \n\nВ этом учебном примере мы сравниваем изменения в равновесном положении шейки и профиле толщины пленки жидкости. Сравнивая эти величины, можно подобрать оптимальный подшипник для аналогичных условий эксплуатации.
modeldescr_rotor/jeffcott_rotor_rub = Вибрация в роторе Джеффкотта, вызванная корпусом Contact\n\nВ этом примере изучается вибрация ротора Джеффкотта, находящегося в корпусе. Зазор между ротором и корпусом мал, что приводит к прерывистому контакту ротора с корпусом. Реакция ротора изучается как на докритических, так и на сверхкритических скоростях. Результаты сравниваются с имеющимися в литературе результатами.
modeldescr_rotor/journal_bearing_dynamic_coefficients = Оценка динамических коэффициентов подшипника скольжения\n\nПри анализе роторов обычно подшипники моделируются через их эффективные динамические коэффициенты относительно положения статического равновесия. Эта модель иллюстрирует, как вычислить такие коэффициенты для подшипника скольжения. Длина подшипника должна быть намного меньше его диаметра, чтобы убедиться, что вычисленные коэффициенты соответствуют соответствующим аналитическим значениям для аппроксимации короткого подшипника.
modeldescr_rotor/misaligned_rotor = Влияние смещения подшипников на вибрацию ротора\n\nВ этом примере анализируется ротор, опирающийся на два гидродинамических подшипника. Эксцентриковый диск, расположенный между двумя подшипниками, заставляет ротор вращаться. Один из подшипников не совмещен с осью ротора.\n\nВстроенный мультифизический интерфейс «Лучевой ротор с гидродинамическим подшипником» в модуле «Роторная динамика» используется для совместного моделирования ротора и подшипников. Анализ проводится для двух случаев: сначала без перекоса, а затем с учетом перекоса. Результаты для обоих случаев сравниваются, чтобы понять влияние смещения.\n\nНекоторые результаты: орбита диска, частотный спектр реакции ротора на диске и распределение давления в подшипниках.
modeldescr_rotor/nonsynchronous_rotor_vibration_with_roller_bearing = Влияние зазора роликового подшипника на несинхронную вибрацию ротора\n\nЗазоры в подшипниках должны быть минимальными, чтобы избежать несинхронной вибрации ротора. Однако малый зазор снижает долговечность подшипника. Этот пример иллюстрирует моделирование вибрации, вызванной нелинейным контактом для различных радиальных зазоров.
modeldescr_rotor/reciprocating_engine_rotor = Роторно-динамический анализ коленчатого вала\n\nУзнайте, как выполнить анализ вибрации коленчатого вала 3-цилиндрового поршневого двигателя в этой учебной модели. Из-за эксцентриситета шатунной шейки и балансировочных масс на коленчатом валу при вращении он испытывает самовозбуждающиеся вибрации. Коленчатый вал смоделирован с использованием твердотельных элементов для точного отражения эффектов эксцентриситета шатунной шейки и балансировочных масс. \n\nЦель этой учебной модели - продемонстрировать, как можно изучать переходную реакцию ротора и орбиты балансировочных масс на валу. Результаты моделирования включают профиль напряжения и давления в коленчатом валу, орбиты центра шеек и компоненты бокового смещения шеек. \n\nОбратите внимание, что интерфейс Solid Rotor используется для моделирования ротора, а подшипники моделируются с использованием интерфейса Hydrodynamic Bearing.
modeldescr_rotor/rotor_bearing_system_simulator_embedded = Симулятор системы подшипников ротора\n\nЭто приложение моделирует систему подшипников ротора, состоящую из дисков и подшипников, установленных на вращающемся валу. Анализ собственных частот выполняется для диапазона угловых скоростей, чтобы определить критические скорости системы. system.\n\nРезультаты включают режимы вихря, график Кэмпбелла и список критических скоростей.
modeldescr_rotor/rotor_stability_with_seal = Реакция ротора под воздействием сил уплотнения \n\nПоток жидкости в уплотнениях вызывает сильную восстанавливающую радиальную силу, противодействующую движению вала. Существует также перекрестная сила, обусловленная осевым изменением окружного потока. Первый тип силы всегда оказывает стабилизирующее воздействие на ротор, тогда как второй в определенных ситуациях может вызвать нестабильность.\n\nВ этом примере осевой компрессор моделируется с использованием интерфейса Beam Rotor. Компрессор имеет 10 ступеней рабочих колес с уплотнением рядом с каждым рабочим колесом, чтобы избежать утечек потока. Кроме того, на конце ступеней рабочего колеса имеется уплотнение уравновешивающего поршня. Зависящая от времени реакция системы изучается при постепенном увеличении скорости ротора. для моделирования рассматриваются два случая: исключение всех уплотнений и включение всех уплотнений. Сравниваются отклики системы для двух случаев, показывающие лучшую стабильность при наличии уплотнений.
modeldescr_rotor/rotor_thermal_stress = Термические напряжения в роторе из-за тепловых потерь в подшипнике\n\nГидродинамические подшипники выделяют тепло из-за вязких потерь в смазке. В результате температура ротора повышается, вызывая деформации и термические напряжения как в роторе, так и в корпусе подшипника.\n\nЭтот пример показывает, как моделировать различные физические явления и связи между ними. Результаты включают распределение давления и вязкие тепловые потери в подшипнике, температурный профиль в смазочной пленке, роторе и корпусе подшипника, а также напряжения и деформации ротора.
modeldescr_rotor/rotor_whirl = Вращение однородного вала под действием силы тяжести\n\nВ учебной модели «Вращение однородного вала» показано, как выполнить анализ переходных процессов однородного вала под действием силы тяжести. Вал поддерживается на концах двумя гидродинамическими подшипниками. Гироскопический эффект заставляет ротор вращаться вокруг своей начальной оси, и ротор в конечном итоге достигает устойчивой орбиты. \n\nРезультаты включают профиль напряжения на роторе с максимальным изгибающим напряжением, давление подшипниковой жидкости и орбиту шейки. В последнем результате журнал движется по спирали наружу и в конечном итоге достигает устойчивой орбиты. \n\nВ этом примере также анализируется частотный спектр ускорения журнала, который подтверждает, что вихрь на половинной частоте является доминирующим режимом вращения.
modeldescr_rotor/simply_supported_beam_rotor = Просто поддерживаемый лучевой ротор\n\nВ этой учебной модели вы увидите, как настроить анализ собственных частот и переходных процессов (с использованием БПФ) ротора с различными креплениями и опорами подшипников. В примере показано, как использовать графики Кэмпбелла и водопада, чтобы найти критическую скорость. Он также демонстрирует диапазон стабильности ротора.\n\nРотор моделируется с использованием интерфейса Beam Rotor в модуле Rotordynamics, дополнении к программному обеспечению COMSOL Multiphysics®. Инерционные свойства и смещение компонентов ротора моделируются с помощью узла Диск. Опора подшипника моделируется с помощью эквивалентного подхода, основанного на жесткости, с использованием узла Подшипник журнала, представленного в интерфейсе. В анализе БПФ используется последовательность исследования БПФ, зависящая от времени.
modeldescr_rotor/single_cylinder_reciprocating_engine = Поршневой двигатель с гидродинамическими подшипниками\n\nИсследуется одноцилиндровый поршневой двигатель, опирающийся на гидродинамические подшипники. для доведения двигателя до требуемых оборотов применяется пусковой крутящий момент. Нагрузочный момент включается, как только двигатель набирает обороты. После запуска двигатель работает самостоятельно, приводясь в действие давлением в цилиндре \n\nДвигатель в сборе моделируется с использованием интерфейса «Динамика многотельных систем» в модуле «Динамика многотельных систем», а подшипник моделируется с использованием интерфейса «Гидродинамический подшипник» в модуле «Роторная динамика». Мультифизическая связь Solid–Bearing Coupling используется для объединения двух интерфейсов.\n\nРезультаты включают напряжение в коленчатом валу и фундаменте, давление в подшипниках, изменение скорости двигателя, генерируемую мощность, мощность тормоза и орбиту вала в подшипник.
modeldescr_rotor/squeeze_film_damper_damping_coefficients = Коэффициенты демпфирования сжимающего пленочного демпфера\n\nСжимающие пленочные демпферы представляют собой компоненты, которые обеспечивают дополнительное демпфирование вращающихся машин. для упрощения моделирования узла ротора пленочные демпферы моделируются с точки зрения их коэффициентов демпфирования, которые являются функциями положения шейки в демпфере. Эта модель вычисляет коэффициенты демпфирования для демпфера с короткой пленкой и сравнивает их с соответствующими аналитическими значениями.
modeldescr_rotor/step_thrust_bearing = Ступенчатый упорный подшипник\n\nВ этой учебной модели анализируется ступенчатый упорный подшипник. Ступенчатый упорный подшипник состоит из ступенчатой ​​опорной поверхности, на которой вращается конец вала. Весь узел погружен в смазку. В этом примере рассматривается шестиступенчатый упорный подшипник. Предполагается, что буртик вала вращается без какого-либо осевого движения в подшипнике. для параметрического исследования варьируются толщина пленки и скорость вращения кольца.\n\nРезультаты включают распределение давления в подшипнике, изменение давления в радиальном и окружном направлениях колодки, а также несущую способность подшипника.
modeldescr_rotor/step_thrust_bearing_shape_optimization = Оптимизация формы ступенчатого упорного подшипника \n\nВ этой учебной модели форма ступенчатого упорного подшипника оптимизирована для максимизации несущей способности. Ступенчатый упорный подшипник состоит из ступенчатой ​​опорной поверхности, на которой вращается конец вала. Весь узел погружен в смазку. Предполагается, что буртик вала вращается без какого-либо осевого движения в подшипнике. \n\nПолученная конструкция демонстрирует оптимальную форму ступенек. Модель также учитывает количество шагов для определения оптимального числа.
modeldescr_rotor/step_thrust_bearing_topology_optimization = Оптимизация топологии ступенчатого упорного подшипника\n\nВ этой учебной модели топология ступенчатого упорного подшипника оптимизирована для максимизации несущей способности. Ступенчатый упорный подшипник состоит из ступенчатой ​​опорной поверхности, на которой вращается конец вала. Весь узел погружен в смазку. Предполагается, что буртик вала вращается без какого-либо осевого движения в подшипнике. \n\nМодель показывает, что инициализация оптимизации с неоднородной конструкцией может привести к локальным минимумам с определенным количеством шагов.
modeldescr_rotor/turbocharger_stability_analysis = Устойчивость турбокомпрессора под воздействием поперечных сил подшипника\n\nСвязные силы, присутствующие в гидродинамическом подшипнике, часто действуют как отрицательное демпфирование ротора. Вблизи критической скорости это может привести к неконтролируемой вибрации турбонагнетателя, что может привести к выходу из строя подшипника. В этом примере анализируется влияние сил перекрестной связи на динамику ротора. Также изучается, как уменьшить эту вибрацию.
modeldescr_rotor/turbocharger_transient_analysis = Турбокомпрессор, опирающийся на подшипники с плавающим кольцом \n\nВ этой модели изучается турбокомпрессор, опирающийся на два подшипника с плавающим кольцом. Силы пленки, действующие на кольцо, заставляют его вращаться в осевом направлении внутри подшипника. В устойчивом состоянии кольцо вращается с постоянной угловой скоростью, а крутящий момент на кольце, обусловленный внутренней и внешней пленками, сбалансирован. Внутренняя и внешняя пленки в подшипниках с плавающим кольцом соединены через шесть каналов в кольце. Результаты включают напряжение в роторе, распределение давления в подшипнике, изменение скорости кольца, общий момент на кольце и скорость потока через каналы кольца.
modeldescr_rotor/vibration_control_with_amb = Контроль вибрации в моторном приводе с помощью активного магнитного подшипника \n\nАктивные магнитные подшипники часто используются для контроля уровня вибрации в механических системах. В этом примере рассматривается роторная система с приводом от двигателя, в которой скорость системы постепенно увеличивается. Система вибрирует из-за существующего дисбаланса. Когда скорость ротора пересекает критические скорости системы, из-за резонанса возникают высокие уровни вибрации. Во втором исследовании электромагнитный подшипник включается в момент перехода ротора через одну из критических скоростей с целью управления вибрациями во время резонанса. Виброотклик системы с электромагнитным подшипником сравнивается с системой без электромагнитного подшипника.


# Semiconductor Module apps
applicationdescr_semicond/wavelength_tunable_led = Перестраиваемый по длине волны светодиод\n\nСиние светодиоды интересны тем, что их можно использовать в современном высокоэффективном освещении. Из-за большой энергии запрещенной зоны нитриды галлия широко используются для генерации синего света. Это приложение имитирует эмиссионные свойства светодиода на основе нитрида галлия. В активной области устройства используется материал InxGa1-xN, который содержит смесь галлия и индия, где доля индия обозначена x. Запрещённой зоной этой оптически активной области можно управлять, варьируя состав материала за счёт изменения доли индия.
applicationdescr_semicond/si_solar_cell_with_ray_optics = Si солнечный элемент с лучевой оптикой\n\nЭто приложение демонстрирует следующее:\n\n• Несколько компонентов (1D и 3D) в одном приложении\n• Использование в приложении того же списка выбора, что и в модели с использованием функции доступа к данным.\n• Вывод числовых результатов для определенного временного шага с помощью поля со списком.\n\nПриложение объединяет модуль лучевой оптики и модуль полупроводников, чтобы проиллюстрировать работу кремниевого солнечного элемента в месте, указанном пользователем. Модуль лучевой оптики вычисляет среднюю освещенность за день в году. Полупроводниковый модуль вычисляет нормированные выходные характеристики солнечного элемента с расчетными параметрами, указанными пользователем. Нормализованные выходные характеристики затем умножаются на вычисленную среднюю освещенность, чтобы получить выходные характеристики ячейки в указанную дату и место, предполагая простую линейную зависимость между выходными данными и освещенностью.
applicationdescr_semicond/superlattice_band_gap_tool = Инструмент для определения запрещенной зоны сверхрешетки\n\nИнструмент для определения запрещенной зоны сверхрешетки помогает проектировать периодические структуры, состоящие из двух чередующихся полупроводниковых материалов (сверхрешеток). Инструмент использует уравнение Шредингера эффективной массы для оценки энергетических уровней основного состояния электронов и дырок в данной сверхрешеточной структуре. Инженеры устройств могут использовать этот инструмент для быстрого расчета эффективной запрещенной зоны для заданной периодической структуры и повторять оценённые параметры, пока они не достигнут желаемого значения запрещенной зоны. \n\nЧтобы использовать приложение, введите желаемые параметры сверхрешетки, включая ширину ямы и барьерного слоя, эффективные массы для электронов и дырок в этих слоях, зону разрывы в этих слоях и смещение зоны проводимости. Смещение валентной зоны обновляется автоматически, и пользователь приложения должен проверить его положительность. Пользователь также может контролировать максимальный размер элемента сетки, используемой для исследований. Нажмите кнопку <em>Compute</em>, чтобы вычислить сдвиг края зоны проводимости и валентной зоны, а также эффективную запрещенную зону. Электронные и дырочные волновые функции отображаются в графическом окне.\n\nПодробнее о демонстрационном приложении можно узнать в этом сообщении блога: "Computing the Band Gap in Superlattices with the Schrödinger Equation"

# Semiconductor Module models
modeldescr_semicond/bipolar_transistor = Bipolar Transistor\n\nВ этом примере показано, как настроить моделирование простого биполярного транзистора. Вычисляются характеристики выходного тока и напряжения в схеме с общим эмиттером и определяется коэффициент усиления по току с общим эмиттером.
modeldescr_semicond/bipolar_transistor_3d = 3D-анализ биполярного транзистора\n\nВ этом примере показано, как настроить 3D-анализ биполярного транзистора. Эта модель демонстрирует, что трехмерные полупроводниковые модели можно эффективно решать с помощью логарифмических формул методом конечных элементов.
modeldescr_semicond/bipolar_transistor_thermal = Термический анализ биполярного транзистора\n\nЭта модель демонстрирует, как соединить интерфейс <em>Semiconductor</em> с интерфейсом <em>Теплопередача в твёрдых телах</em>. Термический анализ выполнен на существующем <a href="/model/bipolar-transistor-14615">биполярном транзисторе модели </a> в случае, когда устройство работает в активной-прямой конфигурации.\n\nИнтерфейс <em>Semiconductor</em> вычисляет динамику носителя и токи внутри устройства и выводит величину нагрева, обусловленную электрическими процессами. Этот термин нагрева используется в качестве источника тепла интерфейсом <em>теплопередача in Solids</em> для расчета распределения температуры по всему устройству.\n\nРаспределение температуры из интерфейса <em>теплопередача in Solids</em> используется для задания температуры решетки в интерфейсе <em>Semiconductor</em>, которая изменяет электрические свойства и вызывает изменения к члену нагрева, что приводит к полностью связанной модели.
modeldescr_semicond/caughey_thomas_mobility = Caughey–Thomas Mobility\n\nВ этом примере показано, как использовать модель насыщения высокого поля Коги–Thomas для электрона и дырки мобильность. Зависимая от поля подвижность делает проблему, которая и так сильно нелинейна, еще более нелинейной. Интерфейс физики полупроводников автоматически создает предлагаемую последовательность решателей для лучшей сходимости при использовании встроенной модели подвижности, зависящей от поля.
modeldescr_semicond/cross_bridge_kelvin_resistor_contact_resistivity = Модель перекрестного мостового резистора Кельвина для определения удельного контактного сопротивления \n\nВ этом эталонном примере создаются две модели перекрестного мостового резистора Кельвина, используемые для определения удельного контактного сопротивления. Первая модель моделирует систему в 3D, используя функцию контактного сопротивления, встроенную в интерфейс Semiconductor. Другая модель представляет собой двумерную аппроксимацию системы, разработанной в справочном документе, реализованную с использованием граничного математического интерфейса PDE. Вычисленное контактное сопротивление в Кельвине как функция размера контактного окна и ширины диффузионного отвода хорошо коррелирует между двумя моделями и хорошо согласуется с результатом, показанным в справочной статье.
modeldescr_semicond/dot_in_well_solar_cell = Солнечный элемент с квантовыми точками InAs, встроенными в квантовые ямы AlGaAs/GaAs\n\nВ этом примере показан приблизительный подход к моделированию солнечного элемента «точка в яме», как описано Асахи и другими в справочном документе. Квантовые ямы и слои квантовых точек рассматриваются как сосредоточенные уровни энергии в запрещенной зоне. Авторы указывают переходы между уровнями точка/яма и энергетическими зонами. В противном случае ямы и точки не препятствуют континуальной части плотности тока. Это описание эквивалентно функции захвата в интерфейсе Semiconductor, поэтому оно используется для моделирования лунок и точек в этом примере. Рассчитанный тренд фототока и занятости состояний квантовых точек хорошо согласуется с результатом, показанным в статье.
modeldescr_semicond/double_barrier_1d = Двойной барьер 1D\n\nСтруктура с двойным барьером представляет интерес из-за ее применения в полупроводниковых устройствах, таких как резонансно-туннельные устройства. диоды.\n\nЭтот проверочный пример демонстрирует <em>Schrödinger Equation</em> интерфейс для создания простой 1D структуры с двойным барьером GaAs/AlGaAs для проанализировать квазисвязанные состояния и их эволюцию во времени, явление резонансного туннелирования и передачу как функцию энергии. Результаты модели показывают очень хорошее согласие с аналитическими результатами как для вычисленных собственных энергий квазисвязанных состояний и условия резонансного туннелирования, так и для вычисленных коэффициентов прохождения.
modeldescr_semicond/eeprom = Программирование устройства EEPROM с плавающим затвором \n\nВ этом примере вычисляются характеристики тока и заряда устройства с электрически стираемой программируемой постоянной памятью (EEPROM) с плавающим затвором. Стационарное исследование демонстрирует эффекты изменения заряда, хранящегося на плавающем затворе, путем расчета кривых ток-напряжение как функции напряжения на управляющем затворе для двух разных количеств накопленного заряда. Затем проводятся исследования, зависящие от времени, для моделирования импульсов переходного напряжения на управляющем затворе. Эти импульсы заставляют ток туннелировать между плавающим затвором и полупроводниковым материалом, позволяя программировать и стирать устройство EEPROM.
modeldescr_semicond/egofet = Органический полевой транзистор с электролитным затвором\n\nЭта модель показывает, как смоделировать органический полевой транзистор с электролитным затвором на основе общей дрейфовой модели –диффузии. Модель использует интерфейс Stabilized Convection–Diffusion Equation и интерфейс Electrostatics. Визуализируются характеристики транзистора. Формирование EDL в моделируемом устройстве демонстрирует ключевую особенность EGOFET.
modeldescr_semicond/gaas_pin_photodiode = GaAs PIN Photodiode\n\nВ этом примере показано, как использовать интерфейсы полупроводниковой оптоэлектроники для моделирования простой структуры GaAs PIN-диода. Учтено как вынужденное, так и спонтанное излучение в полупроводнике. Соответствующее поглощение света и связанное с ним изменение комплексного показателя преломления учитываются самосогласованным образом.
modeldescr_semicond/gaas_pn_junction_infrared_led_diode = GaAs P–N Junction Infrared LED\n\nВ этом примере моделируется светодиод, излучающий в инфракрасной части электромагнитного спектра. Структура устройства состоит из единственного pn-перехода, образованного слоем легирования p-типа вблизи верхней поверхности пластины n-типа. Такая геометрия устройств проста и дешева в производстве, и подобные светодиоды используются во многих бытовых применениях, например, в качестве ИК-излучателей в пультах дистанционного управления телевизорами. В этом примере функция оптического перехода используется для расчета электролюминесценции устройства. Рассчитаны электронные свойства и оценена эффективность светопроизводства. Кроме того, визуализируя пространственное распределение излучательной рекомбинации, можно внести конструктивные предложения, позволяющие максимизировать общую эффективность выходного света.
modeldescr_semicond/gan_double_heterostructure_led = Светодиод с двойной гетероструктурой InGaN/AlGaN\n\nЭта модель имитирует светодиод на основе GaN. Интенсивность излучения, спектр и квантовая эффективность вычисляются как функция возбуждающего тока. Моделируется прямая излучательная рекомбинация через запрещенную зону, а также процессы безызлучательной оже-рекомбинации и рекомбинации с помощью ловушек. Это приводит к сублинейному увеличению интенсивности излучения с увеличением тока, что является общей характеристикой светодиодных устройств, известной как спад светодиодов. Обратите внимание, что эффекты квантового ограничения внутри тонкой активной области не включены в модель.
modeldescr_semicond/gross_pitaevskii_equation_for_bose_einstein_condensation = Gross–Питаевского Уравнение Бозе–1Эйнштейн Конденсация\n\nЭта учебная модель решает Gross–PitaevskiУравнение для основного состояния бозе–Эйнштейна конденсата в гармонической ловушке, используя физический интерфейс Уравнение Шредингера в Полупроводниковом модуле. По сути, это уравнение представляет собой нелинейное одночастичное уравнение Шрёдингера с вкладом потенциальной энергии, пропорциональным локальной плотности частиц. Исследование собственных значений не подходит для решения такого рода нелинейных задач на собственные значения. Вместо этого используется стационарное исследование с глобальным уравнением, обеспечивающим нормализацию волновой функции для поиска решения основного состояния. Результат для большого числа частиц хорошо сравним с приближением Thomas–Fermi, как и ожидалось.
modeldescr_semicond/heterojunction_1d = Гетеропереход 1D\n\nЭта тестовая модель имитирует три различные конфигурации гетероперехода при прямом и обратном смещении. Он показывает разницу в использовании формулировки непрерывного квазиуровня Ферми по сравнению с формулировкой термоэлектронной эмиссии для переноса заряда через гетеропереход. Смоделированные уровни энергии сравниваются между каждой конфигурацией, чтобы проиллюстрировать происхождение переноса заряда, то есть происходит ли он в первую очередь от дырок в валентной зоне или от электронов в зоне проводимости. Рассчитанные ВАХ для каждой конфигурации сравниваются с результатами из литературы. Несколько методов улучшения сходимости демонстрируются при настройке различных этапов исследования.
modeldescr_semicond/heterojunction_tunneling = Туннелирование гетероперехода\n\nЭта эталонная модель моделирует градуированный гетеропереход, используя формулу термоэлектронной эмиссии для переноса заряда через переход. Он показывает дополнительный вклад в плотность тока от эффекта квантового туннелирования через потенциальный барьер с использованием приближения ВКБ. Несмотря на то, что моделируемая система по своей природе является одномерной, создается двухмерная модель, иллюстрирующая процедуру моделирования более общей конфигурации. Также демонстрируется настройка определяемых пользователем свойств тройного материала. Рассчитанные ВАХ, их температурная зависимость и зонные диаграммы хорошо согласуются с результатами из литературы.
modeldescr_semicond/inas_nanowire_traps_hysteresis_density_gradient = Гистерезис, индуцированный поверхностной ловушкой в нанопроволочном полевом транзисторе InAs — a Анализ градиента плотности\n\nВ этом учебном пособии анализируется гистерезис кривых проводимости-затвора-напряжения (G-Vg) InAs нанопроволочный полевой транзистор, использующий теорию градиента плотности для добавления эффекта квантового ограничения к традиционной формуле дрейфа-диффузии без значительного увеличения вычислительных затрат. Гистерезис вызван эффектами динамической зарядки быстрых и медленных ловушек на границе раздела полупроводник-оксид с непрерывным распределением энергии как донорного, так и акцепторного типа. Вероятность захвата моделируется как термически активированная с высотой барьера, которая меняется в зависимости от уровня энергии ловушки. Качественное поведение и порядок величины вычисленных кривых G-Vg при различных условиях изменения напряжения хорошо согласуются с результатами моделирования и экспериментов, найденными в литературе.
modeldescr_semicond/insb_pfet_density_gradient = Градиентный анализ плотности полевого транзистора InSb с p-каналом \n\nВ этом учебном пособии анализируются характеристики постоянного тока полевого транзистора с p-каналом InSb с использованием теории градиента плотности для добавления эффекта квантового ограничения к традиционной формуле дрейфа-диффузии без значительного увеличения вычислительных ресурсов. Эффект удержания применяется как в канале квантовой ямы, так и на верхней границе изолятора, близкой к каналу. Демонстрируется использование матрицы эффективной массы анизотропного градиента плотности, а также метод настройки общей модели подвижности, зависящей от поля. Профиль плотности дырок и кривая Id-Vg, полученные на основе 2D-модели, хорошо сравниваются с опубликованными цифрами в справочной статье.
modeldescr_semicond/isfet = Моделирование ионно-чувствительного полевого транзистора (ISFET)\n\nИонно-чувствительный полевой транзистор (ISFET) создается путем замены контакта затвора MOSFET интересующим электролитом. Концентрацию определенных видов ионов в электролите можно определить путем измерения изменения напряжения на затворе из-за взаимодействия между ионами и диэлектриком затвора. \n\nЭто учебное пособие по датчику pH ISFET иллюстрирует процедуру настройки связи между моделью полупроводника и моделью электролита. В нем также показана техника использования простого глобального уравнения для извлечения рабочих параметров без необходимости явного моделирования реальной схемы обратной связи.
modeldescr_semicond/k_dot_p_method_strained_wurtzite_gan_band_structure = k·p Метод для зонной структуры напряженного вюрцита GaN\n\nЭта тестовая модель вычисляет структуру валентной зоны недеформированного и напряженного объёмного кристалла вюрцита GaN в качестве учебного пособия для пользователей, которые хотят настроить несколько компонентов волновой функции с помощью интерфейса уравнения Шредингера. Модель соответствует формулировке, приведенной в справочной статье Чуанга и Чанга. Диагональные и недиагональные элементы матрицы Гамильтона вводятся с помощью встроенных функций с подробными инструкциями в документации модели. Вычисленные собственные значения хорошо согласуются с аналитическим решением и рис. 5 в статье.
modeldescr_semicond/lombardi_surface_mobility = Поверхностная подвижность Ломбарди\n\nЭтот пример демонстрирует, как использовать модель поверхностного рассеяния Ломбарди для определения подвижности электронов в простом МОП-транзисторе. Дополнительная нелинейность, вносимая полевой зависимостью подвижности, легко преодолевается с помощью автоматически сгенерированной последовательности решателей после обнаружения таких моделей подвижности с помощью интерфейса физики полупроводников. Профиль плотности тока и общий ток, протекающий в терминал, сравниваются со случаем постоянной подвижности.
modeldescr_semicond/mesfet = Характеристики постоянного тока MESFET\n\nВ этом примере сравниваются вольт-амперные характеристики MESFET с использованием формулы только с основной несущей.
modeldescr_semicond/moscap_1d = MOSCAP 1D\n\nСтруктура металл-кремний-оксид (МОП) является фундаментальным строительным блоком для многих кремниевых планарных устройств. Измерения ёмкости дают глубокое представление о принципах работы таких устройств. В этом учебном примере создается простая 1D-модель МОП-конденсатора (MOSCAP). Как низкочастотные, так и высокочастотные кривые C-V вычисляются с использованием подхода исследования переходных процессов (соответствующая модель moscap_1d_small_signal демонстрирует подход малого сигнала). Демонстрируются два альтернативных метода расчета дифференциальной ёмкости с использованием клеммы затвора или клеммы с металлическим контактом соответственно.
modeldescr_semicond/moscap_1d_interface_traps = Эффекты захвата интерфейса MOSCAP\n\nВ этом руководстве сравниваются экспериментальные данные из литературы с моделью COMSOL MOSCAP с ловушками интерфейса (поверхностными состояниями). Функция поверхностной рекомбинации с помощью ловушек используется для моделирования эффектов зарядов ловушек и процессов захвата и испускания носителей ловушками. Учитывается также влияние фиксированных зарядов в затворном оксиде. Рассчитанные значения ёмкости и проводимости в зависимости от напряжения и частоты затвора воспроизводят качественное поведение экспериментальных данных с сопоставимыми величинами. Модель использует формулировку квазиуровня Ферми и показывает, как построить график таких величин, как заселенность ловушки, в зависимости от энергии.
modeldescr_semicond/moscap_1d_small_signal = MOSCAP 1D Small Signal\n\nСтруктура металл-кремний-оксид (МОП) является фундаментальным строительным блоком для многих кремниевых планарных устройств. Измерения ёмкости дают глубокое представление о принципах работы таких устройств. В этом учебном примере создается простая 1D-модель МОП-конденсатора (MOSCAP). Как низкочастотные, так и высокочастотные кривые CV вычисляются с использованием подхода анализа малых сигналов (соответствующая модель moscap_1d показывает переходный подход). В модели используется формулировка квазиуровня Ферми и этап исследования равновесия полупроводника. Демонстрируются два альтернативных метода расчета дифференциальной ёмкости с использованием клеммы затвора или клеммы с металлическим контактом соответственно.
modeldescr_semicond/mosfet = Характеристики постоянного тока МОП-транзистора (MOSFET)\n\nВ этом примере вычисляются характеристики постоянного тока простого MOSFET. Сначала вычисляются характеристики тока стока в зависимости от напряжения затвора, чтобы определить пороговое напряжение для устройства. Затем вычисляются характеристики тока стока в зависимости от напряжения стока для нескольких напряжений на затворе. Из этих графиков можно определить линейные области и области насыщения устройства.
modeldescr_semicond/mosfet_breakdown = Пробой полевого МОП-транзистора \n\nВ этом примере показано, как использовать зависящий от времени решатель для моделирования разрушения полевого МОП-транзистора в результате ударной ионизации. МОП-транзисторы обычно работают в трех режимах в зависимости от напряжения сток-исток для данного напряжения затвора. Первоначально зависимость ток-напряжение линейна, это омическая область. По мере увеличения напряжения сток-исток извлекаемый ток начинает насыщаться, это область насыщения. По мере дальнейшего увеличения напряжения сток-исток возникает область пробоя, где ток увеличивается экспоненциально при небольшом увеличении приложенного напряжения. Это происходит из-за ударной ионизации.
modeldescr_semicond/mosfet_mobility = MOSFET with Mobility Models\n\nВ этом руководстве показано, как добавить несколько связанных моделей мобильности к базовому примеру MOSFET, включая две зависящие от поля модели мобильности, которые очень нелинейны и их трудно решить полностью связанным образом. При использовании таких встроенных моделей подвижности, зависящих от поля, интерфейс физики полупроводников автоматически создает предлагаемую последовательность решателей. Сходимость легко достигается с помощью этой автоматически созданной последовательности решателей, которая использует раздельный решатель для попеременного решения основных зависимых переменных с фиксированными переменными электрического поля, а затем впоследствии обновляет переменные электрического поля.
modeldescr_semicond/mosfet_small_signal = Анализ малых сигналов полевого МОП-транзистора\n\nВ этом примере показано, как вычислить характеристики переменного тока полевого МОП-транзистора. и выходная проводимость, и крутизна вычисляются как функция тока стока.
modeldescr_semicond/nanowire_density_gradient_3d = 3D-моделирование градиента плотности нанопроволочного МОП-транзистора\n\nЭта 3D-модель нанопроволочного МОП-транзистора использует теорию градиента плотности, чтобы добавить эффект квантового ограничения к традиционной формуле дрейф-диффузии, не требуя чрезмерно высоких вычислительных затрат. Оксидный слой моделируется явно с помощью геометрических областей, а квантовое ограничение на границе раздела кремний-оксид учитывается с помощью специального граничного условия. Эффективная масса градиента плотности анизотропна. Различные утилиты выбора используются для упрощения назначения физических настроек и выбора графиков. Результат хорошо согласуется с кривыми Id-Vg и профилями электронной плотности, опубликованными в справочной статье.
modeldescr_semicond/nanowire_traps = Захват поверхности в кремниевом нанопроволоке с универсальным затвором\n\nВ этом примере анализируется кремниевый нанопроволочный универсальный затвор с различной плотностью ловушек на затворе. Эффект ловушек заключается в увеличении порогового напряжения устройства.
modeldescr_semicond/pin_forward_recovery = Прямое восстановление PIN-диода\n\nВ этом руководстве моделируется переходный процесс при включении (прямое восстановление) простого PIN-диода на основе книги "Fundamentals of Power Semiconductor Devices" Б. Дж. Балиги (стр. 242, издание 2008 г.). Диод управляется током с постоянной скоростью нарастания 1e9, 2e9 и 1e10 А/см^2/сек и плотностью установившегося тока 100 А/см^2. Результирующая временная эволюция напряжения устройства и концентрации электронов хорошо сравнима с показанными в книге (рис. 5.30 ~ 5.31). Более сложный пример, включающий сужение запрещенной зоны, рассеяние несущих и элементы схемы внешней нагрузки, см. в учебном пособии "Reverse Recovery of a PIN Diode".
modeldescr_semicond/pin_radiation_effects = Эффекты излучения в PIN-диоде \n\nВ этом учебном пособии выполняется стационарный и переходный анализ реакции PIN-диода на постоянное и импульсное излучение соответственно. Воздействие излучения моделируется как пространственно-равномерная генерация электронно-дырочных пар внутри устройства. При высоких мощностях дозы разделение генерируемых зарядов приводит к уменьшению внутреннего электрического поля и длительному хранению избыточных носителей заряда. Количественное предсказание этого явления возможно только с помощью численного моделирования, поскольку аналитическое решение недостижимо. Демонстрируются несколько методов достижения сходимости в случаях высокого обратного смещения, подвижности, зависящей от поля, и исследований, зависящих от времени. Рассчитанные концентрации носителей и распределение электрического поля хорошо согласуются со справочной статьей.
modeldescr_semicond/pin_reverse_recovery = Обратное восстановление PIN-диода\n\nВ этом руководстве моделируется переходный процесс выключения (обратное восстановление) простого PIN-диода с индуктивной нагрузкой, в общих чертах на основе книги "Fundamentals of Power Semiconductor Devices" Б. Дж. Балиги (стр. 256, издание 2008 года). В отличие от книги, которая предполагает начальную постоянную скорость изменения тока с последующим резким снижением напряжения устройства при подаваемом обратном напряжении, в этой модели мы используем возможности схемы COMSOL Multiphysics для более реалистичного моделирования индуктивной нагрузки с помощью обратноходового диода. Результирующая временная эволюция тока, напряжения и концентрации носителей хорошо сравнима с показанной в книге (рис. 5.42 ~ 5.45).
modeldescr_semicond/pn_diode_circuit = P–N Diode Circuit\n\nВ этом примере показано, как соединить внешнюю цепь с симуляцией устройства с диодом с pn-переходом. Результаты связанного моделирования сравниваются с сосредоточенной моделью.
modeldescr_semicond/pn_junction_1d = P–N Junction 1D\n\nЭтот простой тест вычисляет потенциал и концентрации носителей для одномерного pn-перехода, используя методы конечных элементов и конечных объёмов. Результаты сравниваются с эквивалентным устройством из книги "Semiconductor Devices, A Simulation Approach" Крамера и Хитчона.
modeldescr_semicond/schottky_contact = Schottky Contact\n\nЭтот тест моделирует поведение идеального диода с барьером Шоттки, изготовленного из вольфрамового контакта, нанесенного на кремниевую пластину. Результирующая кривая JV (плотность тока в зависимости от приложенного напряжения), полученная на основе модели при прямом смещении, сравнивается с экспериментальными измерениями, найденными в литературе.
modeldescr_semicond/schrodinger_poisson_nanowire = Самосогласованные результаты Шрёдингера –Результаты Пуассона для нанопроволоки GaAs\n\nЭта эталонная модель имитирует нанопроволоку GaAs с использованием самосогласованного метода Schrödinger–Теория Пуассона для расчета электронной плотности и профилей удерживающего потенциала. Предопределенная функция мультифизической связи Schrödinger–Poisson в сочетании со специальным типом исследования Schrödinger–Poisson обеспечивает упрощенную процедуру настройки модели и автоматическое создание самосогласованных итераций с настраиваемыми параметрами для оптимизации сходимости в различных условиях. Рассчитанные профили электронной плотности и удерживающего потенциала хорошо согласуются с рисунками в справочной статье, причем оба профиля воспроизводят отчетливые пространственные колебания типа Фриделя при низких температурах.
modeldescr_semicond/si_inversion_layer_density_gradient_and_schrodinger_poisson = Градиент плотности и результаты Шредингера–Результаты Пуассона для инверсионного слоя кремния\n\nЭто учебное пособие демонстрирует использование формулы градиента плотности для включения эффекта квантового ограничения в физическое моделирование инверсии кремния. слой. Эта формулировка требует лишь умеренного увеличения вычислительных ресурсов по сравнению с традиционным уравнением дрейфа-диффузии. Таким образом, он позволяет проводить инженерные исследования гораздо быстрее, чем другие, более сложные квантово-механические методы. Результат теории градиента плотности сравнивается с решением уравнения Шрёдингера–Пуассона. Рассчитанные профили электронной плотности по обеим теориям показывают ожидаемое поведение квантового ограничения, и оба хорошо согласуются с опубликованными цифрами в справочной статье.
modeldescr_semicond/si_quantum_dot_in_uniform_magnetic_field = Кремниевая квантовая точка в однородном магнитном поле\n\nВ этой учебной модели решается двухкомпонентное уравнение Шредингера для собственных состояний простой кремниевой квантовой точки в однородном магнитном поле, основанное на статье Джока и других по теме спин-орбитальных кубитов. Встроенное условие области Сила Лоренца для интерфейса уравнения Шредингера используется для учета вклада векторного потенциала в кинетический импульс. Связь компонент со спином вверх и вниз реализуется с использованием встроенного гамильтониана нулевого порядка. Вместе с эталонной моделью метода k dot p для напряженной зонной структуры GaN вюрцита эти примеры показывают, как настроить несколько компонентов волновой функции с помощью интерфейса уравнения Шредингера. Вычисленная плотность вероятности и плотность кинетического импульса основного состояния хорошо сравниваются с дополнительным рисунком 1 в статье. Кроме того, вычисленная разница энергий между первыми двумя собственными состояниями хорошо согласуется с ожидаемым значением интуитивного аналитического расчета.
modeldescr_semicond/si_solar_cell_1d = Si Solar Cell 1D\n\nВ этом руководстве используется простая 1D-модель кремниевого солнечного элемента для иллюстрации основных шагов по настройке и выполнению физического моделирования устройства с помощью полупроводникового модуля. для скорости фотогенерации используется определяемое пользователем выражение, и результат показывает типичные кривые I-V и P-V солнечных элементов. \n\nМеханизм генерации носителей заряда в результате фотоэлектрического эффекта подробно не моделируется. Вместо этого для общей скорости генерации используется определяемое пользователем выражение, основанное на законе Бера с эмпирическими спектрами поглощения Si и аппроксимированными спектрами AM1,5. Модель Shockley–Read–Hall используется для улавливания основного эффекта рекомбинации. В нормальных условиях работы фотогенерированные носители разносятся по обе стороны от обедненной области pn-перехода. Небольшое напряжение прямого смещения применяется для извлечения электрической энергии, определяемой произведением фототока и приложенного напряжения.
modeldescr_semicond/si_solar_cell_with_ray_optics_embedded = Si Solar Cell with Ray Optics Embedded\n\nЭто приложение объединяет модуль лучевой оптики и полупроводниковый модуль для иллюстрации работы кремниевого солнечного элемента в месте, указанном пользователем. Модуль лучевой оптики вычисляет среднюю освещенность за день в году и местоположение, выбранное пользователем. Полупроводниковый модуль вычисляет нормированные выходные характеристики солнечного элемента с расчетными параметрами, указанными пользователем. Нормализованные выходные характеристики затем умножаются на вычисленную среднюю освещенность, чтобы получить выходные характеристики ячейки в указанную дату и место, предполагая простую линейную зависимость между выходными данными и освещенностью.
modeldescr_semicond/soi_mosfet_heating = Нагрев КНИ МОП-транзистора\n\nВ этом примере вычисляется ток, индуцированный нагрев КНИ МОП-транзистора. Технология SOI (кремний на изоляторе) снижает паразитные ёмкости и обеспечивает устойчивость к эффектам защелки. Однако значительный нагрев устройства может произойти из-за термической изоляции кремния от подложки. Поэтому тепловое моделирование важно при разработке детальных моделей устройств КНИ.
modeldescr_semicond/solving_hydrogen_atom = Решение задачи атома водорода\n\nВ этой модели показано, как решить задачу атома водорода с помощью интерфейса уравнения Шредингера в модуле полупроводников. Визуализируются орбитали атома водорода. Смоделированные собственные энергии и плотности вероятности хорошо согласуются с аналитическими результатами.
modeldescr_semicond/superlattice_band_gap_tool = Инструмент для измерения запрещенной зоны сверхрешетки\n\nМодель Superlattice Band Gap Tool помогает проектировать периодические структуры, состоящие из двух чередующихся полупроводниковых материалов (сверхрешеток). Модель использует уравнение Шредингера эффективной массы для оценки энергетических уровней основного состояния электронов и дырок в данной сверхрешеточной структуре. Инженеры устройств могут использовать эту модель для быстрого расчета эффективной запрещенной зоны для заданной периодической структуры и повторять оценённые параметры, пока они не достигнут желаемого значения запрещенной зоны.\n\nВы можете узнать больше о модели в этом сообщении в блоге: "Computing the Band Gap in Superlattices with the Schrödinger Equation"
modeldescr_semicond/superlattice_band_gap_tool_embedded = Инструмент для измерения запрещенной зоны сверхрешетки\n\nИнструмент для определения запрещенной зоны сверхрешетки помогает проектировать периодические структуры, состоящие из двух чередующихся полупроводниковых материалов (сверхрешеток). Инструмент использует уравнение Шредингера эффективной массы для оценки энергетических уровней основного состояния электронов и дырок в данной сверхрешеточной структуре. Инженеры устройств могут использовать этот инструмент для быстрого расчета эффективной запрещенной зоны для данной периодической структуры и повторять оценённые параметры до тех пор, пока не будет достигнуто желаемое значение запрещенной зоны.
modeldescr_semicond/trench_gate_igbt_2d = IGBT траншейного затвора 2D\n\nВ этой первой половине примера, состоящего из двух частей, строится 2D-модель IGBT траншейного затвора, которая во второй половине будет расширена до 3D. В общем, эффективнее всего начать с 2D-модели, чтобы убедиться, что все работает как положено, прежде чем расширять ее до 3D. Модель подвижности Коги–Томас объединяется с единой моделью подвижности Клаассена для учета насыщения скоростей, а также рассеяния фононов, примесей и носителей-носителей. Опция контактного сопротивления граничных условий металлического контакта используется для реализации смешанного моделирования с паразитным сопротивлением на коллекторе и эмиттере, как указано в справочном документе. Вычисленная плотность коллекторного тока как функция коллекторного напряжения достаточно хорошо согласуется с опубликованными результатами.
modeldescr_semicond/trench_gate_igbt_3d = IGBT с траншейным затвором 3D\n\nВо второй половине примера, состоящего из двух частей, 3D-модель IGBT с траншейным затвором строится путем выдавливания 2D-модели из первой половины. В отличие от 2D-модели, теперь можно расположить чередующиеся n+ и p+ эмиттеры по направлению выдавливания, как в реальном устройстве. Эта более реалистичная схема приводит к лучшему количественному согласию с экспериментальными данными. Вычисленная плотность коллекторного тока как функция коллекторного напряжения достаточно хорошо согласуется с опубликованными результатами.
modeldescr_semicond/vortex_lattice_formation_in_a_rotating_bose_einstein_condensate = Формирование вихревой решетки во вращающемся бозе–Einstein Condensate\n\nЭта учебная модель решает уравнение Гросса–Питаевского для образование вихревой решетки во вращающемся бозе–эйнштейновском конденсате, связанном гармонической ловушкой. Уравнение, по сути, представляет собой нелинейное одночастичное уравнение Шредингера, в котором межчастичное взаимодействие представлено вкладом потенциальной энергии, пропорциональным локальной плотности частиц. Временная эволюция во вращающейся системе отсчета с феноменологическим демпфированием настраивается с помощью встроенных функций физического интерфейса уравнения Шредингера. Видно зарождение вихрей, начиная с периферии конденсата. Впоследствии система проходит период впечатляющей динамической нестабильности, прежде чем перейти в низкоэнергетическое состояние вихревой решетки. Модуль оптимизации используется для оценки параметров на основе численных результатов. Временные масштабы начального колебания и возможного коллапса параметра эллиптичности хорошо согласуются между моделированием и экспериментальными данными, опубликованными Мэдисоном и другими.

# Structural Mechanics apps
applicationdescr_sme/beam_section_calculator = Калькулятор сечения балки\n\nЭто приложение демонстрирует:\n\n• Свет theme\n\nЭто приложение позволяет вам оценить данные поперечного сечения для широкого спектра балок американского и европейского стандарта. Учитывая набор сил и моментов, действующих на сечение, вы также можете рассчитать детальное распределение напряжений. \n\nРассчитанные данные сечения также можно легко извлечь и использовать в качестве входных данных для анализа балок в COMSOL Multiphysics.
applicationdescr_sme/beam_section_calculator_llexcel = Калькулятор сечения балки (с использованием LiveLink™ для Excel®)\n\nЭто приложение демонстрирует следующее:\n\n• Чтение и импорт данных из Excel®-файла\n• Экспорт данных в файл Excel®-файл\n• Светлая тема\n\nПриложение вычисляет свойства сечения балки и истинное распределение напряжений в заданном сечении стальной балки. Доступен широкий спектр американских и европейских стандартов балок. Он использует LiveLink™ для Excel® для чтения и хранения данных луча в таблицах Excel®.\n\nТребуется модуль «Механика строительных конструкций» и LiveLink™ для Excel®.
applicationdescr_sme/bike_frame_analyzer_llsw = Анализатор рамы велосипеда\n\nЭто приложение демонстрирует следующее:\n\n• Подключение приложения к сеансу SOLIDWORKS®\n• Установка максимально допустимого значения, с которым сравнивается решение\n• Выбор предопределенных или пользовательских материалов\n• Изменение граничных условий с помощью поля со списком с использованием методов\n\nПриложение вычисляет распределение напряжений и деформацию рамы велосипеда на основе настраиваемых пользователем нагрузок и ограничений. Он использует LiveLink™ для SOLIDWORKS® для нагрузки геометрии и обновления размеров рамы для изучения их влияния на результаты.
applicationdescr_sme/interference_fit = Калькулятор посадки с натягом\n\nЦелью приложения «Калькулятор посадки с натягом» является изучение соединения при посадке с натягом, когда одна труба усаживается поверх другой трубы. Поскольку внутренняя труба больше, чем доступное пространство, занимаемое внешней трубой, внутренняя труба сжимается, в то время как внешняя труба расширяется. \n\nТаким образом, результирующее контактное давление будет зависеть от начальной геометрии обеих частей. Кроме того, передаваемый крутящий момент и сила зависят от силы трения между двумя частями, которая пропорциональна контактному давлению. \n\nВ приложении вы можете изменять геометрию трубы, размер области перекрытия и коэффициент трения. При этом приложение отображает эквивалентное напряжение в сборке, контактное давление на границе раздела двух труб и деформацию двух труб на диаметре пересечения.
applicationdescr_sme/mems_pressure_sensor_swelling = Дрейф датчика давления МЭМС из-за гигроскопического набухания \n\nдля интеграции в микроэлектронные схемы устройства МЭМС приклеиваются на печатные платы и соединяются с другими устройствами. Затем вся схема часто покрывается эпоксидным составом (ЭМС) для защиты устройств и их соединений с платой. Эпоксидные полимеры, используемые для таких применений, подвержены поглощению влаги и гигроскопическому набуханию, что может привести к расслоению между ЭМС и платой или к неправильному поведению компонентов MEMS. влажная среда. Приложение помогает дизайнеру достичь необходимой чувствительности и минимизировать дрейф. Это делается путем указания геометрических параметров, свойств материала пресс-формы и внешних условий. \n\nПриложение было создано с использованием интерфейсов «Перенос разбавленных частиц», «Механика твёрдого тела» и «Оболочка» в программном обеспечении COMSOL Multiphysics®.
applicationdescr_sme/truss_bridge_designer = Truss Bridge конструктор\n\nПриложение Truss Bridge конструктор представляет собой пример разработки инструмента моделирования для класса строительных конструкций, в данном случае ферменного моста Пратта. Такой мост характеризуется диагональными балками на каждой стороне моста, которые наклонены вниз и к центру пролета. Из-за такой конструкции диагональные балки подвергаются только растяжению, а вертикальные балки, которые короче и, следовательно, менее чувствительны к короблению, подвергаются сжатию.\n\nВ приложении можно изменить все основные геометрические размеры проезжей части и опорных балок. Также вы можете обеспечить погрузку любым количеством автомобилей и боковой ветровой нагрузкой. Помимо стационарного исследования, в ходе которого вычисляются перемещения и напряжения, вызванные нагрузками, можно рассчитать собственные частоты моста.
applicationdescr_sme/truss_tower_buckling = Башня ферменной устойчивости \n\nАнализ потери устойчивости — это поиск критической сжимающей нагрузки, при превышении которой конструкции становятся нестабильными. Приложение для анализа устойчивости ферменной башни имитирует потерю устойчивости ферменной башни под действием вертикальных сжимающих нагрузок, чтобы обеспечить критическую сжимающую нагрузку. \n\nС помощью приложения вы можете рассчитать и проанализировать потерю устойчивости башни при различных условиях геометрии, то есть при различной высоте башни, площади поперечного сечения, а также различных материалах. Вы можете выбрать, будет ли башня стоять на опорах или поддерживаться растяжками. Приложение учитывает влияние собственной нагрузки (собственный вес фермы и опорных растяжек, а также их предварительное натяжение) при выполнении расчета.
applicationdescr_sme/viscoelastic_structural_damper = Viscoelastic Structural Damper\n\nВискоэластичные демпферы часто используются для защиты высоких конструкций от вибрации. Приложение Viscoelastic Structural Damper может выполнять анализ во временной и частотной области для типичного вязкоупругого демпфера. Целью приложения является расчет и анализ важных параметров демпфера, таких как петля гистерезиса, а также модули потерь и накопления, для заданной модели материала. Кроме того, приложение обеспечивает визуальное сравнение поведения демпфера при использовании двух разных настроек параметров вязкоупругого материала. \n\nВы можете изменить количество вязкоупругих ветвей и соответствующие им параметры материала, а также величину и фазу приложенной нагрузки. Приложение можно использовать для изучения демпфера в диапазоне частот или для решения задачи, зависящей от времени.
applicationdescr_sme/homogenization_of_periodic_microstructures = Гомогенизированные свойства материалов периодических микроструктур \n\nПериодические микроструктуры часто встречаются в композиционных материалах, металлических пенопластах и сэндвич-структурах. Они могут быть представлены элементарной ячейкой, повторяющейся в трех декартовых направлениях. \n\nЭто приложение вычисляет гомогенизированные свойства материала различных периодических микроструктур и делает их доступными в MPH- или XML-файле, который впоследствии можно импортировать в COMSOL Multiphysics. session.\n\nДоступны десять различных микроструктур, представленных периодическими элементарными ячейками. Размеры ячейки и составляющие материалы могут быть изменены пользователем. Приложение вычисляет гомогенизированную плотность, матрицу упругости, коэффициент теплового расширения, теплоёмкость и теплопроводность элементарной ячейки, которые впоследствии можно использовать в макроскопической модели.

# Structural Mechanics Module models
modeldescr_sme/angle_crack_plate = Угловая трещина, встроенная в пластину\n\nЭта модель воспроизводит тест NAFEMS, в котором пластина с угловой трещиной подвергается растягивающей нагрузке. Рассчитывается J-интеграл и сравниваются коэффициенты интенсивности напряжений для режима I и режима II с эталоном для нескольких значений угла.
modeldescr_sme/axisymmetric_twist_and_bending = Осесимметричное скручивание и изгиб\n\nВключение окружных смещений в двухмерный осесимметричный интерфейс механика твёрдого тела позволяет рассчитывать деформации скручивания и изгиба. Эта модель определяет коэффициенты концентрации напряжений для полого вала для случаев осевого растяжения, кручения и изгиба с использованием вычислительной двумерной осесимметричной формулировки. Чтобы продемонстрировать их эквивалентность, настройки модели и результаты сравниваются с полным 3D-анализом.
modeldescr_sme/ball_check_valve = Шаровой обратный клапан\n\nИспользуя жидкость–Solid Мультифизический интерфейс Interaction позволяет изучить поведение подпружиненного шарового обратного клапана при изменении функционального и обратного потока. Сила жидкости, действующая на шар, открывает клапан при давлении открытия. В случае обратного давления шар вступает в контакт с уплотнительным кольцом, предотвращая тем самым течение жидкости в обратном направлении. Техника повторного создания сетки используется для точного определения области жидкости между деталями, вступающими в контакт. Поскольку режим течения жидкости является турбулентным, алгебраическая модель турбулентности y-plus используется вместе с обработкой стенки с низким Рейнольдсом.
modeldescr_sme/beam_solid_connection = Connecting Beams and Solids\n\nВ этом примере показано использование мультифизической связи Solid–Beam Connection для создания переходов между интерфейсами механика твёрдого тела и Beam. Обсуждаются два разных типа соединения и проводится сравнение распределения напряжений на переходе.
modeldescr_sme/bimetallic_strip_fsi = Биметаллическая полоса в воздушном потоке\n\nЭто концептуальная модель, иллюстрирующая взаимодействие взаимодействие жидкости и конструкции, теплопередачу и тепловое расширение.\nБиметаллическая полоса в воздушном канале нагревается так, что изгибается. Через некоторое время вводится воздушный поток с изменяющейся во времени температурой на входе. В результате происходят изменения в деформации, вызванные как давлением жидкости, так и конвективным охлаждением.
modeldescr_sme/bipolar_plate = Биполярная пластина топливного элемента \n\nТермический и расчёт механики конструкций биполярной пластины топливного элемента в PEMFC. Блок топливных элементов состоит из анода, мембраны и катода, соединенных последовательно через биполярные пластины. Анализируется температурное поле, а тепловое расширение учитывается в структурном анализе.
modeldescr_sme/blasting_rock = Распространение волн в горных породах под воздействием взрывных нагрузок \n\nВ этом примере представлен анализ переходных процессов распространения волн в массиве горных пород, вызванных кратковременной нагрузкой на поверхность. Такие нагрузки характерны при строительстве тоннелей и других земляных работах с применением взрывных работ. В примере показано использование граничных условий с низким уровнем отражения для усечения расчетной области до разумного размера. Результаты очень хорошо согласуются с опубликованным исследованием.
modeldescr_sme/block_on_arch = Блоковое нажатие на Arch\n\nЭтот концептуальный пример показывает, как рассчитывать критические точки в моделях с контактом. Модель состоит из блока, смоделированного с помощью интерфейса механика твёрдого тела, нажимающего на арку, смоделированного с помощью интерфейса Shell. Контактная задача решается расширенным методом Лагранжа. Блок нагружен граничной нагрузкой, контролируемой смещением, и постепенно прижимается к арке. При загрузке наблюдается проскальзывание арки, но решение остается устойчивым.
modeldescr_sme/blood_vessel = Взаимодействие жидкости со структурой в сети кровеносных сосудов\n\nВ этом примере изучается часть сосудистой системы маленького ребенка. Аорта и ее разветвленные кровеносные сосуды встроены в биологическую ткань. Давление движущейся жидкости деформирует кровеносный сосуд.
modeldescr_sme/bolt_pretension_tutorial = Моделирование предварительно натянутых болтов\n\nВ этой учебной модели исследуются различные методы моделирования предварительно натянутых болтов. Болты моделируются с использованием как сплошных, так и балочных элементов. Показаны различные типы соединений между болтами и зажимаемыми деталями. Болты предварительно затягиваются последовательно с использованием разных уровней нагрузки.
modeldescr_sme/bracket_basic = [Кронштейн — Учебные пособия по механике конструкций]Геометрия кронштейна\n\nЭто основа для всех учебных пособий по кронштейну, которая содержит геометрию кронштейна.
modeldescr_sme/bracket_contact = [Bracket — Учебные пособия по механике конструкций]Bracket — Contact Analysis\n\nВ этом примере представлены пары контактов в задаче механики конструкций и используются для моделировать контакт между различными частями сборки.
modeldescr_sme/bracket_eigenfrequency = [Bracket — Учебные пособия по механике конструкций]Bracket — Анализ собственных частот\n\nВ этом примере вычисляется собственная частота 3D-кронштейна. Во втором исследовании проводится анализ собственных частот предварительного напряжения, когда кронштейн подвергается статической нагрузке.
modeldescr_sme/bracket_eigenfrequency_shape_optimization = [Bracket — Учебные пособия по механике конструкций]Bracket — Оптимизация формы собственной частоты\n—3В этом примере максимизируется самая низкая собственная частота a 3D-брекет с использованием оптимизации формы.
modeldescr_sme/bracket_frequency = [Bracket — Учебные пособия по механике конструкций]Bracket — Анализ частотной характеристики\n\nВ этом примере вычисляется отклик в частотной области 3D Кронштейн подвергается гармонической нагрузке. Второе исследование выполняет анализ в частотной области с предварительным напряжением, включая статическую нагрузку и гармоническое возмущение.
modeldescr_sme/bracket_general_periodic = [Bracket — Учебные пособия по механике конструкций]Bracket — General Periodic Dynamic Analysis\n\nВ этом примере кронштейн подвергается периодическому, но не гармоничный, нагруженный. Функция нагрузки первоначально разлагается в ряд Фурье с использованием этапа исследования БПФ от времени до частоты. Отклик на ряд гармоник вычисляется с использованием стандартной развертки по частоте, а затем выполняется обратное исследование БПФ для преобразования результатов обратно во временную область. Наконец, для проверки результатов используется модальное исследование, зависящее от времени.
modeldescr_sme/bracket_inertia_relief = [Bracket — Учебные пособия по механике конструкций]Bracket — Анализ инерционного рельефа\n\nВ этом примере вычисляется структурное напряжение в свободном кронштейне, подвергающемся статической нагрузке, с использованием анализа разгрузки инерции.
modeldescr_sme/bracket_initial_strain = [Bracket — Учебные пособия по механике конструкций]Bracket — Анализ начальной деформации\n\nВ этом примере вычисляется распределение напряжений в несущем кронштейне, соединенном с предварительно напряженный штифт.
modeldescr_sme/bracket_linear_buckling = [Bracket —0 Учебные пособия по механике конструкций]Bracket — Линейный анализ потери устойчивости\n\nВ этом примере показано, как вычислить критическую силу потери устойчивости для 3D кронштейн.
modeldescr_sme/bracket_parametric = [Bracket — Учебные пособия по механике конструкций]Bracket — Parametric Analysis\n\nВ этом примере показано, как настроить несколько вариантов нагрузки на конструкцию и сравнить результаты. Модель расширяет кронштейн_static.mph.
modeldescr_sme/bracket_random_vibration = Кронштейн — Анализ случайной вибрации\n\nВ этом учебном примере показано, как выполнить анализ случайной вибрации конструкции с использованием спектральной плотности мощности (PSD). Вычисления основаны на модальной модели пониженного порядка (ROM).
modeldescr_sme/bracket_rigid_connector = [Bracket — Учебные пособия по механике конструкций]Bracket — Rigid Connector Analysis\n\nВ этом примере показано, как смоделировать жесткую конструкцию, соединенную с упругим элементом. часть.
modeldescr_sme/bracket_rom = Bracket — Моделирование пониженного порядка\n\nВ этом учебном пособии показано, как использовать модель пониженного порядка для расчета реакции конструкции, подвергающейся трем одновременным нагрузкам, имеющим независимые временные характеристики. Модели пониженного порядка обеспечивают эффективный способ анализа проблем линейной структурной динамики.
modeldescr_sme/bracket_shell = [Bracket — Structural Mechanics Tutorials]Bracket — Shell Analysis\n\nВ этом примере вычисляются напряжения внутри кронштейна, подвергающегося внешним нагрузкам, используя интерфейс оболочки.
modeldescr_sme/bracket_spring = [Bracket — Учебные пособия по строительной механике]Bracket — Spring Foundation Analysis\n\nВ этом примере показано, как использовать пружинный фундамент в задаче строительной механики.
modeldescr_sme/bracket_static = [Bracket — Учебные пособия по механике конструкций]Bracket — Static Analysis\n\nВ этом примере вычисляется структурное напряжение внутри кронштейна, подверженного статическому воздействию нагрузка.
modeldescr_sme/bracket_thermal = [Кронштейн — учебные пособия по механике конструкций]Кронштейн — анализ термических напряжений\n\nВ этом примере показано, как использовать интерфейс термических напряжений.
modeldescr_sme/bracket_topology_optimization_stl = Bracket — Оптимизация топологии\n\nВ этом примере показано, как выполнить оптимизацию топологии с несколькими вариантами нагрузки и ограничений. Функция плотности для оптимизации топологии используется вместе с параметрической разверткой, где каждое оптимизированное решение используется в качестве входных данных для дальнейшей улучшенной оптимизации. Окончательно оптимизированная геометрия экспортируется, а затем импортируется для проверочного анализа, в котором исключаются пустые области.
modeldescr_sme/bracket_transient = [Bracket — Учебные пособия по механике конструкций]Bracket — Transient Analysis\n\nВ этом примере вычисляется структурное напряжение внутри кронштейна, подвергнутого воздействию переменная во времени нагрузка.
modeldescr_sme/building_response_spectrum = Анализ сейсмического воздействия здания\n\nВ этом примере показано, как проверить целостность конструкции, подвергшейся землетрясению, с помощью анализа спектра реакции. Здание смоделировано в виде стального каркаса с использованием балочных элементов. Рассчитываются перемещения и напряжения.
modeldescr_sme/channel_beam = Channel Beam\n\nЭтот тест демонстрирует, как использовать интерфейс Beam модуля «Механика строительных конструкций». Он вычисляет деформации, силы сечения и напряжения в консольной балке, а также ряд собственных частот. Здесь также показано, как использовать интерфейс «Поперечное сечение балки» для оценки напряжений и расчета данных о поперечном сечении балки.
modeldescr_sme/cms_tutorial = Учебное пособие по синтезу в режиме компонентов\n\nВ этом учебном примере концепции синтеза в режиме компонентов (CMS) представлены через простую твердотельную модель балки. Части балки сводятся к компонентам CMS. Выполняются как динамический, так и стационарный анализ. Более того, вы узнаете, как применять нагрузки непосредственно к компоненту CMS и как работать с такими компонентами при оценке результата. Сравниваются результаты полной и сокращенной версий модели.
modeldescr_sme/contacting_rings = Трение между контактирующими кольцами\n\nЭто эталонная задача, включающая прерывистое трение кольца, катящегося внутри другого кольца. Смещение внутреннего кольца вычисляется и сравнивается с аналитическим результатом.
modeldescr_sme/contactor_shading_coil = Контактор переменного тока с экранирующей катушкой\n\nКонтактор переменного тока представляет собой особый тип магнитного переключателя, который активируется первичной катушкой, питаемой переменным током. В отличие от переключателей постоянного тока, такие устройства могут иметь тенденцию к повторному открытию, когда переменный ток пересекает ноль. Добавление экранирующей катушки, которая поддерживает наведенные токи с запаздыванием по отношению к токам питающей катушки, позволяет всегда иметь ненулевую тяговую силу, обеспечивая тем самым более стабильное замыкание. \n\nВ этом примере изучается динамика замыкания контактора переменного тока и последующее установление механического контакта. Изменение расстояния между движущейся и неподвижной частями устройства влияет на распределение магнитного поля. Этот эффект объясняется использованием движущейся сетки в окружающем воздухе. Модель настраивается с использованием мультифизического интерфейса Магнитомеханика.
modeldescr_sme/cohesive_zone_debonding = Разрушение ламинированного композита в смешанном режиме \n\nРазрушение межфазной границы в результате расслоения или разрыва сцепления можно смоделировать с помощью модели когезивной зоны (CZM). В этом примере показана реализация CZM с билинейным законом разделения тяги. Он используется для прогнозирования начала смешанного размягчения и распространения расслоения в композитном материале.
modeldescr_sme/corrugated_sheet = Гомогенизированная модель гофрированного листа\n\nВ этом примере представлена ​​гомогенизированная численная модель гофрированного листа на основе элементарной ячейки, в которой полученные численным путем эквивалентные матрицы жесткости сравниваются с различными аналитическими моделями. В этом примере рассматриваются два профиля гофра: трапециевидный и круглый.
modeldescr_sme/cosserat_torsion = Кручение изотропного упругого цилиндра Коссера\n\nЭта модель демонстрирует, как расширить встроенную модель линейного упругого материала до упругого материала Коссера путем добавления степеней свободы микровращения. Анализируется цилиндрический стержень при чистом кручении и наблюдается влияние параметра масштаба длины Коссера на отклик.
modeldescr_sme/coupled_vibrations_manual = Колебания диска, опирающегося на воздухонаполненный цилиндр\n\nАнализ собственных частот форм колебаний круглого диска, опирающегося на цилиндрическую полость, показывает, что нельзя пренебрегать связью между изгибными модами диска и акустическими модами в цилиндре. Результаты хорошо коррелируют с полуаналитическими и экспериментальными данными.
modeldescr_sme/cylinder_roller_contact = Цилиндр Ролик Контакт\n\nСтальной цилиндр запрессован в алюминиевый блок. Цилиндр подвергается равномерной нагрузке вдоль его вершины. Распределение контактного давления и длина контакта, вычисленные с использованием метода штрафа, дополненного метода Лагранжа и метода Ниче, сравниваются с аналитическим решением.
modeldescr_sme/disc_brake_wear = Износ колодок дискового тормоза\n\nВ этом примере изучается износ фрикционного материала в дисковом тормозе. Квазистатические силы трения задаются из простых кинематических соображений. Геометрия тормозной колодки постоянно обновляется с учетом удаления материала из-за износа в соответствии с известным уравнением Аршарда. и контактное давление, и скорость износа изменяются со временем в результате обновленной геометрии колодок.
modeldescr_sme/elastic_cloaking = Эластичная маскировка с полярным материалом\n\nВ этом примере функция «Внешнее напряжение» используется для настройки модели материала с несимметричным напряжением, необходимым при проектировании эластичного плаща-невидимки. Это устройство, целью которого является экранирование области пространства как от продольных, так и от поперечных волн.
modeldescr_sme/elbow_bracket = Различные анализы локтевого кронштейна\n\nЭтот пример локтевого кронштейна демонстрирует возможности модуля «Механика строительных конструкций». В частности, показано, как использовать типы исследования для решения стационарных, нестационарных, нестационарных задач, задач с собственной частотой, частотной характеристикой и линейной потери устойчивости.
modeldescr_sme/elbow_bracket_brief = [Различные анализы локтевого кронштейна]Статический анализ и анализ собственных частот локтевого кронштейна\n\nЭта короткая версия модели локтевого кронштейна демонстрирует типы исследований для стационарного анализа и анализа собственных частот.
modeldescr_sme/elliptic_membrane = Анализ напряжений эллиптической мембраны\n\nЭто эталонная задача для задачи плоского напряжения. Оценивается точность расчета концентрации напряжений и проводится исследование сходимости сетки для различных типов элементов.
modeldescr_sme/failure_prediction_in_a_layered_shell = Прогнозирование сбоев в многоуровневой оболочке\n\nВ этом примере показано, как смоделировать стек оболочек с помощью интерфейса оболочки. Показатели отказов и коэффициенты запаса прочности для различных критериев при одноосном растяжении сравниваются с результатами теста NAFEMS.
modeldescr_sme/free_cylinder = Анализ собственных частот свободного цилиндра \n\nСобственные частоты свободной цилиндрической трубки сравниваются с эталонным решением NAFEMS. Используются три различных физических интерфейса: механика твёрдого тела и Shell в 2D-осесимметрии и механика твёрдого тела в 3D с граничными условиями циклической симметрии. Кроме того, показано, как вычислять собственные моды с деформацией скручивания.
modeldescr_sme/frequency_shift_temperature_changes = Сдвиги собственных частот, вызванные изменениями температуры\n\n В этом примере исследуется сдвиг собственных частот, вызванный изменением температуры. В одном исследовании исследуется балка с двойным зажимом, у которой закреплены оба конца, а во втором исследовании рассматривается консольная балка, у которой закреплен только один конец. Исследуются эффекты, связанные с усилением напряжения, изменением размера, расширением ограничений и температурно-зависимыми свойствами материала. Результаты показывают, что в зажатой балке преобладает смягчение напряжений, тогда как ограниченное расширение вызывает сжимающие напряжения. С другой стороны, консольная балка очень хорошо соответствует аналитическим значениям, основанным на небольших изменениях геометрии, вызванных тепловым расширением. Показано, что в последнем случае важным фактором является температурная зависимость модуля Юнга.
modeldescr_sme/hanging_cable = Подвесной трос\n\nКабель представляет собой элемент конструкции, который имеет жесткость только в тангенциальном направлении, но практически не имеет жесткости на изгиб. Когда он поддерживается только на двух концах, он отклоняется под действием гравитационной нагрузки, образуя кривую, известную как цепная линия. В этом примере показано, как моделировать такие компоненты, как кабели, провода или струны, с помощью интерфейса Wire.
modeldescr_sme/hinge_assembly = Сборка с шарниром\n\nПетля между двумя механическими компонентами моделируется путем соединения двух жестких соединителей. Этот метод можно использовать для моделирования многих типов механизмов.
modeldescr_sme/homogenization_of_periodic_microstructures = Гомогенизация периодических микроструктур\n\nЭта модель вычисляет гомогенизированные механические и термические свойства материала гетерогенных периодических микроструктур, представленных элементарными ячейками.
modeldescr_sme/hydrogen_diffusion = Диффузия водорода в металлах\n\nЭта модель показывает, как моделировать поглощение и диффузию водорода в водных электролитах. Он использует интерфейс «Транспорт в твёрдых телах» для моделирования диффузии, обусловленной концентрацией и напряжением.
modeldescr_sme/inplane_and_space_truss = Плоская и пространственная ферма\n\nЛинейный статический анализ простой 2D фермы. Ферма с шарнирным соединением моделируется с использованием интерфейса Truss. Решение сравнивается с аналитическими результатами.
modeldescr_sme/inplane_framework_freq = Каркас в плоскости с дискретной массой и моментом инерции \n\nВ этом примере вычисляются собственные частоты для простого каркаса в плоскости с точечной массой и моментом инерции точечной массы. Платформа моделируется с использованием интерфейса Beam. Собственные частоты сравниваются с аналитическими значениями.
modeldescr_sme/interior_pm_motor_stress_analysis = Электромагнитный и механический анализ двигателя с внутренними постоянными магнитами\n\nМагниты в двигателе с внутренними постоянными магнитами (IPM) встроены в сердечник ротора, где они образуют узкие области, известные как мосты. Толщина магнитного моста является важным параметром, который следует учитывать при проектировании, как с электромагнитной, так и с механической точки зрения. Поскольку магнитное насыщение в зонах моста влияет на электромагнитные характеристики ИПМ, толщина моста должна быть минимальной, чтобы уменьшить потери. Однако при высокоскоростном вращении эти узкие мосты также испытывают большие нагрузки, вызванные центробежными силами. Эти два противоречивых аспекта усложняют проектирование и анализ двигателя IPM. \n\nВ этом примере демонстрируется связь между механикой твёрдого тела и вращающимся магнитным оборудованием для выполнения электромагнитного и механического анализа двигателя IPM. Двигатель с 10 полюсами ротора и 12 пазами статора моделируется в 2D. Магниты встроены в V-образную конфигурацию внутри сердечника ротора. Связь между магнитами и сердечником ротора моделируется в виде пружин. Результаты дают представление о плотности магнитного потока и распределении напряжений в системе.
modeldescr_sme/impeller = Вибрации рабочего колеса\n\nЭто учебное пособие предназначено для демонстрации использования динамической циклической симметрии при визуализации результатов на полной геометрии. Трехмерное рабочее колесо с восемью одинаковыми лопастями можно разделить на восемь секторов симметрии. Модель вычисляет основные частоты для всей геометрии рабочего колеса и сравнивает их со значениями, вычисленными для одного сектора, используя условие циклической симметрии на границах двух секторов. Он также демонстрирует, как настроить анализ частотной характеристики для одного сектора симметрии.
modeldescr_sme/kirsch_plate = Задача Кирша о бесконечной пластине\n\nЭтот статический тест вычисляет распределение напряжений вблизи небольшого отверстия в бесконечной пластине и сравнивает результат с аналитическим решением.
modeldescr_sme/ladder_frame = Ladder Frame\n\nЭта модель иллюстрирует, как выполнить анализ собственных частот и статический анализ конструкции лестничной рамы легкого грузовика. В примере показано, как преобразовать твердотельную геометрию в модель оболочки, реализовать распределенную нагрузку, задав соответствующую результирующую, и проверить сварное соединение.
modeldescr_sme/large_deformation_beam = Анализ больших деформаций балки\n\nБалка моделируется с использованием как интерфейса механика твёрдого тела, так и интерфейса Beam. Результаты сравниваются друг с другом и с эталонным решением от NAFEMS. Кроме того, выполняется линейный анализ потери устойчивости, и критическая нагрузка, полученная в результате этого исследования, сравнивается с критической нагрузкой Эйлера.
modeldescr_sme/layered_plate = Термические напряжения в слоистой пластине\n\nПлита, состоящая из двух слоев (покрытия и слоя подложки), не подвергается напряжениям и деформациям при 800°C. Температура пластины снижается до 150°C, что вызывает термические напряжения. Третий слой, несущий слой, затем активируется в состоянии без напряжения. Наконец температура снижается до 20°C.
modeldescr_sme/loaded_spring_contact = Самоконтакт нагруженной пружины\n\nВ этом примере показано, как настроить самоконтакт для винтовой пружины. Когда пружина сжимается вертикальной силой, приложенной к одному из ее концов, она соприкасается сама с собой и начинает вращаться.
modeldescr_sme/main_bearing_cap = Предварительное напряжение болтов крышек коренных подшипников\n\nВ этом примере показано, как моделировать предварительно напряженные болты.\n\nГеометрия болта взята из детали Библиотеки.\n\nдля сравнения: один из болтов моделируется с использованием формулы контакта резьбы, тогда как другой болт соединен с отверстием для болта чистым условием непрерывности. Пониженная жесткость в резьбовой части болтов учитывается уменьшением жесткости материала.
modeldescr_sme/membrane_airbag_inflation = Надувание квадратной подушки безопасности\n\nКвадратная подушка безопасности надувается при постоянном давлении воздуха. В некоторых областях подушки безопасности материал сминается во время надувания из-за возникновения отрицательного главного напряжения. Модель сморщивающейся мембраны в рамках теории поля натяжения дает правильное описание распределения напряжений и характера складок в надутых мембранах.
modeldescr_sme/membrane_torsion = Кручение круглой мембраны\n\nВ этом примере крутящий момент прикладывается к внутреннему краю мембраны в форме круглого кольца, в то время как внешний край зафиксирован, что приводит к сморщиванию мембраны. Модель сморщивающейся мембраны позволяет избежать нестабильности равновесия, которая может быть вызвана сжимающими напряжениями.\n\nВ этом примере изучается влияние структуры сетки и порядка дискретизации на образование складок и распределение напряжений.
modeldescr_sme/membrane_uniaxial_stretching = Одноосное растяжение прямоугольной мембраны\n\nЭтот пример демонстрирует явление сморщивания тонкого листа, растянутого в одноосном направлении. Модифицированная теория мембран, включающая модель складок, обеспечивает несжимающие главные напряжения в складчатой ​​области. Аналитические результаты сравниваются с численными результатами.
modeldescr_sme/micromechanical_model_of_a_fiber_composite = Микромеханическая модель волокнистого композита\n\nВ этом примере анализируется упрощенная микромеханическая модель элементарной ячейки волокнистого композита. Гомогенизированные упругие и термические свойства композиционного материала вычисляются на основе индивидуальных свойств волокна и матрицы. Сравнение проводится со значениями, полученными по правилу смешения.
modeldescr_sme/micromechanical_model_of_a_particulate_composite = Микромеханическая модель дисперсного композита\n\nВ этом примере анализируется упрощенная микромеханическая модель дисперсной элементарной ячейки композита. Гомогенизированные упругие и вязкоупругие свойства композиционного материала вычисляются на основе индивидуальных свойств частиц и матрицы. Анализ переходных процессов микроструктуры композита дает вязкоупругий отклик, который используется для определения гомогенизированных вязкоупругих параметров с использованием оценки параметра наименьших квадратов.
modeldescr_sme/micromechanical_model_of_a_piezoelectric_composite = Микромеханическая модель пьезоэлектрического волоконного композита\n\nВ этом примере изучаются микромеханические свойства пьезоэлектрического волоконного композита. Гомогенизированные электромеханические свойства композита определяются индивидуальными микроскопическими свойствами матрицы и волокна.
modeldescr_sme/micromechanical_model_of_a_tpms_composite = Микромеханическая модель композита на основе трехпериодической минимальной поверхности\n\nВ этом примере гомогенизированные упругие и термические свойства композитного материала на основе трехпериодической минимальной поверхности (TPMS) равны вычислено.\n\nЭлементарная ячейка на основе гироида TPMS подвергается периодическим граничным условиям для получения гомогенизированных свойств материала. Проанализировано влияние отрицательного коэффициента Пуассона и различных объёмных долей на свойства гомогенизатора.
modeldescr_sme/motherboard_random_vibration = Испытание материнской платы на случайную вибрацию\n\nВ этом примере моделируется испытание электронного оборудования на случайную вибрацию. Выполняются три анализа, по одному для ускорения в каждом глобальном направлении. Оцениваются ускорения в деталях и усилия в зажимных болтах.
modeldescr_sme/motherboard_shock_response = Реакция материнской платы на удар \n\nЭлектронное оборудование часто должно быть сертифицировано для функционирования после воздействия определенной ударной нагрузки. В этом примере влияние полусинусоидального удара силой 50 г и длительностью 11 мс на печатную плату исследуется с помощью анализа спектра отклика.
modeldescr_sme/mountain_bike_fork = Соединение с натягом в вилке горного велосипеда\n\nПосадка с натягом — это метод, используемый для соединения или подгонки одной детали поверх другой детали или вокруг нее. Внутреннюю часть охлаждают, чтобы она сжималась, а затем монтируют. Как только деталь снова нагревается и расширяется, на границе между двумя деталями возникает контактное давление. \n\nЭтот тип соединения моделируется в учебном примере вилки горного велосипеда, где рулевая труба соединена с короной. Моделирование исследует контактное давление и распределение напряжений, а также передаваемую силу и крутящий момент.
modeldescr_sme/nonlinear_harmonic = Нелинейный гармонический отклик\n\nВ этом руководстве показано, как оценить гармонический отклик конструкции с умеренно нелинейным поведением. Нелинейную задачу можно решить только с помощью анализа во временной области. Способ ускорить вычисления — использовать линеаризованный анализ частотной характеристики, чтобы обеспечить хорошие начальные условия.
modeldescr_sme/nonlinear_magnetostriction = Нелинейный магнитострикционный преобразователь\n\nМагнитное поле и смещение как функции приложенного тока вычисляются для магнитострикционного преобразователя, для которого и магнитострикция, и намагниченность материала считаются нелинейными.
modeldescr_sme/oscillating_fsi = Вибрирующая балка в потоке жидкости\n\nЭто переходная жидкость–Структура Моделирование взаимодействия балки, вибрирующей в потоке. Ниже по течению от сооружения появляется вихревая улица фон Кармана. Результаты сравниваются с эталонным решением.
modeldescr_sme/paperboard_roll = Перенос влаги в рулоне картона\n\nВ этом примере показано, как смоделировать перенос влаги и вызванное набухание в рулоне картона при изменении условий окружающей среды. Свойства материала картона анизотропны.
modeldescr_sme/peristaltic_pump = Перистальтический насос\n\nВ этом примере перистальтического насоса ролики сжимают гибкую трубку, и сжатие прогоняет жидкость через трубку. Модель демонстрирует, как использовать интерфейс Fluid–Structure Interaction.
modeldescr_sme/pinched_hemispherical_shell = Pinched Hemispherical Shell\n\nЭтот тест изучает нелинейную деформацию полусферической оболочки.
modeldescr_sme/plate_deflected_by_magnet = Деформация железной пластины магнитной силой \n\nСильный постоянный магнит помещается рядом с зажатой тонкой пластиной из железа. Магнитная сила заставляет пластину отклоняться. В этом примере изучаются упругие деформации и напряжения пластины. Деформация пластины влияет на распределение магнитного поля. Этот эффект объясняется использованием движущейся сетки в воздухе, окружающем пластину. Модель настраивается с использованием мультифизического интерфейса «Магнитомеханика, отсутствие токов».
modeldescr_sme/portal_crane = Анализ напряжений портального крана\n\nПортальные краны часто используются при работе с тяжелыми грузами. В этом примере интерфейс Beam используется для расчета напряжений в портальном кране, вычисленном на подъем 15 тонн. Рассмотрены три варианта нагрузки: собственный вес, полезная нагрузка и тепловое расширение в жаркий летний день. Внутренний шарнир в раме моделируется с использованием условия освобождения конца балки.
modeldescr_sme/postbuckling_shell = Анализ шарнирной цилиндрической оболочки после выпучивания\n\nВ этом примере показано, как проследить путь после выпучивания, при котором ни нагрузка, ни смещение не увеличиваются монотонно. Результаты сравниваются с опубликованными значениями.
modeldescr_sme/postbuckling_shell_arclength = Анализ после выпучивания с использованием метода приращения длины дуги\n\nдля тонких конструкций выпучивание является катастрофической нестабильностью, если эксплуатационная нагрузка превышает критический предел. для таких конструкций может быть важно изучить поведение конструкции за пределами критической нагрузки, вызывающей потерю устойчивости, что известно как анализ после потери устойчивости. Отследить путь равновесия в анализе после потери устойчивости непросто, поскольку это приводит к численным трудностям, таким как предельные точки. Использование метода длины дуги является хорошо известной стратегией для отслеживания путей равновесия в таких ситуациях. \n\nВ этом примере метод приращения длины дуги в сочетании с кубической экстраполяцией используется для анализа после выпучивания шарнирной цилиндрической панели, подвергающейся точечной нагрузке в ее центре. Результаты этого примера сравниваются с аналогичным примером, в котором используется подход глобального уравнения, основанный на монотонно возрастающем смещении.
modeldescr_sme/pratt_truss_bridge = Pratt Truss Bridge\n\nДва анализа показывают свойства ферменного моста Pratt: анализ статического напряжения и отклонения гравитационных нагрузок в сочетании с нагрузками, представляющими грузовики на мосту; и анализ собственных частот. Модель сочетает в себе трехмерные элементы балки Эйлера для рамной конструкции и элементы оболочки, представляющие дорогу.
modeldescr_sme/pressure_sensor_hygroscopic_swelling = Дрейф датчика давления МЭМС из-за гигроскопического набухания \n\nЭпоксидный компаунд, покрывающий датчик давления МЭМС, подвержен поглощению влаги. Исследование, зависящее от времени, позволяет рассчитать диффузию влаги в пресс-форме, а параметрический стационарный анализ вычисляет дрейф измеренного давления, вызванный гигроскопическим набуханием.
modeldescr_sme/random_vibration_deep_beam = Анализ случайных колебаний глубокой балки\n\nВ этом проверочном примере изучаются вынужденные случайные колебания свободно опертой глубокой балки. Балка нагружена распределенной силой с однородной спектральной плотностью мощности (PSD). Выходной PSD вычисляется для реакции на смещение и изгибное напряжение. Вычисленные значения сравниваются с аналитическими результатами.
modeldescr_sme/rigid_domain = Моделирование твёрдых тел\n\nДеталь, жесткость которой гораздо выше, чем у несущей конструкции, моделируется с использованием жесткой области. Проводится анализ собственных частот, при котором учитываются только массовые свойства твёрдого тела.
modeldescr_sme/rim_submodel = Подмодель в ободе колеса\n\nВ этом руководстве используется метод подмоделирования для точного определения концентрации напряжений в ободе колеса. Сначала решается глобальная модель, чтобы получить смещения, которые затем используются в качестве граничных условий в локальной модели области, где возникают концентрации напряжений.
modeldescr_sme/ring_impact = Удар между двумя мягкими кольцами\n\nВ этом концептуальном примере мягкий удар между двумя упругими кольцами моделируется с использованием интерфейса механика твёрдого тела. Одному из колец придается начальная скорость, необходимая для инициирования удара. Оба кольца свободны и не подвергаются никаким внешним силам. Контакт моделируется с использованием вязкой формулы с использованием как штрафного, так и расширенного лагранжева методов. Подтверждено сохранение линейного и углового момента, а также энергии.
modeldescr_sme/rotating_blade = Фундаментальная собственная частота вращающейся лопасти\n\nВ этом тесте изучаются собственные частоты вращающейся лопасти. Он показывает, как усиление напряжения и комбинированный эффект повышения жесткости и смягчения вращения влияют на фундаментальную собственную частоту.
modeldescr_sme/scattered_field_elastic_waves = Формула рассеянного поля для упругих волн \n\nЭта модель демонстрирует, как найти рассеянное поле, зная падающее поле для трех различных типов рассеивателя, то есть бесконечно жесткого, полости и упругого включения. Эта формулировка может быть полезна, когда рассеиватель находится в дальней зоне источника, так что зондирующая волна напоминает плоскую волну. В этом случае включение источника потребует неоправданно огромной вычислительной области для создания сетки. Таким образом, плоские волны P и S используются в модели в качестве падающих полей. Более того, модель показывает, как численно вычислить поле, излучаемое точечным источником, а затем использовать такое решение, как известное падающее поле, для последующего исследования, в ходе которого решается проблема рассеяния.
modeldescr_sme/scordelis_lo_roof = Scordelis–Lo Roof Shell Benchmark\n\nЭтот тест демонстрирует, как построить и решить 3D-модель оболочки с использованием интерфейса оболочки модуля «Механика строительных конструкций» и сравнить результат с аналитическим решением.
modeldescr_sme/shell_beam_connection = Соединение оболочек и балок\n\nМногие инженерные конструкции состоят из тонких и тонких компонентов, где полнотелая модель будет содержать очень много мелких элементов. для таких конструкций гораздо эффективнее использовать элементы оболочки или балки. \n\nВ этом учебном пособии и проверочной задаче вы узнаете, как соединить элементы балки и оболочки в различных ситуациях. Результаты также сравниваются с твердотельной моделью той же геометрии.
modeldescr_sme/shell_solid_connection = Соединение оболочек и тел\n\nВ этом учебном примере показано, как сделать переход между оболочками и телами. Результаты сравниваются между оболочкой и полным 3D-решением. Также изучаются последствия перехода.
modeldescr_sme/single_edge_crack = Однокромочная трещина\n\nПлита с одинарной краевой трещиной подвергается растягивающей нагрузке. Коэффициент интенсивности напряжений KI для этого случая нагрузки определяется с помощью так называемого J-интеграла для трех различных контуров.
modeldescr_sme/sliding_wedge = Скользящий клин\n\nКлин контактора под действием силы тяжести вынужден скользить из-за граничной нагрузки по целевой поверхности клина. Горизонтальные линейные пружины подключены между левой вертикальной границей и землей. Это так называемая большая задача скольжения, включающая контактное давление для постоянной площади контакта и расчет силы трения. для решения этой контрольной задачи используются метод штрафа, расширенный метод Лагранжа и метод Ниче.
modeldescr_sme/snap_hook_elastic = Контактный анализ упругого карабина \n\nВ этом примере имитируется вставка карабина в паз. Крючок моделируется с использованием модели линейного упругого материала.
modeldescr_sme/squeezed_plate_response = Вибрация сжатой пластины\n\nЭта модель иллюстрирует, как выполнить анализ собственных частот и частотных характеристик в контактной задаче. Тонкая круглая пластина зажата между двумя круглыми пластинами меньшего размера. Пик амплитуды при анализе частотной характеристики сравнивается с собственной частотой, вычисленной на основе состояния контакта. Ее также сравнивают с собственной частотой идеального случая, то есть кольцевой пластины, зажатой по внутреннему радиусу.
modeldescr_sme/space_frame_instability = Нестабильность рамы пространственной дуги\n\nЭтот пример иллюстрирует нестабильность рамы пространственной дуги при сосредоточенной вертикальной нагрузке. Небольшая боковая нагрузка применяется для нарушения симметрии конструкции. Элементы каркаса моделируются с использованием геометрически нелинейных балочных элементов.\n\nРезультаты сравниваются с имеющимися литературными данными.
modeldescr_sme/spherical_cap_with_central_point_load = Сферическая крышка с центральной точечной нагрузкой\n\nВ этом тесте сферическая крышка подвергается точечной нагрузке в центре. Возникающая в результате нелинейная деформация изучается с использованием интерфейсов механика твёрдого тела и Shell. В обоих случаях используется двумерная осесимметричная формулировка.\n\nРезультаты обоих интерфейсов сравниваются с результатами, полученными в тесте для различных дискретизаций.
modeldescr_sme/spherical_punch = Формование листового металла сферическим пуансоном \n\nОбычный процесс формования листового металла заключается в том, что пуансон используется для деформации пластины, зажатой между челюстями. Эта осесимметричная модель контакта имитирует деформацию упругопластической круглой пластины, изгибаемой сферическим пуансоном. Вы можете легко контролировать как силу, необходимую для деформации пластины, так и форму пластины после снятия нагрузки.
modeldescr_sme/stress_dependent_elasticity = Моделирование упругости, зависящей от напряжения\n\nВ этом примере показано, как реализовать задачу упругости, зависящей от напряжения. Модуль Юнга зависит от напряжения.
modeldescr_sme/stress_optical = Напряжение-оптические эффекты в фотонном волноводе\n\nНапряжение-оптический эффект вызывает нежелательное двойное лучепреломление в плоскостирном фотонном волноводе. Анализ плоской деформации, за которым следует анализ оптических мод, показывает результирующее разделение основных мод.
modeldescr_sme/stress_optical_generalized = [Напряжение-оптические эффекты в фотонном волноводе]Напряжение-оптические эффекты с обобщенной плоской деформацией \n\nНапряжение-оптический эффект вызывает нежелательное двойное лучепреломление в плоскостирном фотонном волноводе. Анализ плоской деформации, за которым следует анализ оптических мод, показывает результирующее разделение основных мод. В этом примере используется обобщенная формулировка плоской деформации, учитывающая деформацию в направлении z.
modeldescr_sme/surface_cracked_cylinder = Цилиндр с трещиной на поверхности\n\nВ этом эталонном примере изучается полуэллиптическая трещина на внутренней поверхности цилиндра. Внутренняя часть цилиндра и поверхности трещин подвергаются сжимающей нагрузке. J-интеграл вычисляется вдоль фронта трещины, а затем коэффициент интенсивности напряжений сравнивается с эталонными значениями.
modeldescr_sme/surface_resistor = Термомеханический анализ резистора поверхностного монтажа\n\nТермически индуцированные напряжения анализируются в установившемся состоянии с использованием методов теплопередачи и механики твёрдого тела. интерфейсы.\n\nТребуются модуль теплопередачи и модуль механики конструкций или модуль MEMS.
modeldescr_sme/thermal_expansion = Тепловое расширение в устройстве MEMS\n\nВ этом примере анализируется тепловое расширение в устройстве MEMS, таком как микрогироскоп, где тепловое расширение должно быть как можно меньшим. В примере используются зависящие от температуры свойства материала из Библиотеки материалов.\n\nдля построения модели вам понадобится Библиотека материалов.
modeldescr_sme/thermally_loaded_beam = Термически нагруженная балка\n\nВ этом примере трехмерная балка подвергается тепловым нагрузкам. Температура изменяется линейно по сечению балки. Решение сравнивается с аналитическим решением.
modeldescr_sme/thick_plate = Анализ напряжения толстой пластины\n\nЭталон, при котором анализируется толстая пластина, подвергающаяся давлению на верхнюю поверхность.\nРешение сравнивается с эталонным решением NAFEMS.
modeldescr_sme/thick_wall_cylinder = Эталонный тест толстостенного цилиндра \n\nЦилиндр подвергается как внутреннему, так и внешнему давлению и тепловой нагрузке. Результат сравнивается с аналитическим решением.
modeldescr_sme/tower_sensitivity = Анализ чувствительности ферменной башни\n\nАнализ чувствительности — это эффективный способ вычисления градиента целевой функции по отношению ко многим управляющим переменным. В этом примере в качестве целевых функций используются наклон и рысканье на вершине ферменной башни. Рассчитана чувствительность этих углов к изменению диаметров отдельных стержней.
modeldescr_sme/traffic_tunnel = Напряжения в грунте вокруг транспортного туннеля\n\nЭтот пример демонстрирует использование упругопластического анализа в механике грунтов с использованием критериев текучести Мора–Кулона в условиях плоской деформации. Изучено напряженное состояние грунта и деформация тоннеля.
modeldescr_sme/transient_rolling_contact = Переходный контакт качения\n\nВ этом концептуальном примере показано, как решить проблему переходного контакта с переходом трения прерывистого движения. Мягкая полая труба, на которую действует сила тяжести, освобождается в верхней части хафпайпа. Движение трубы варьируется от скольжения до качения, в зависимости от ее положения в хафпайпе и ее скорости. Поперечное сечение трубы также имеет овальную форму за счет контактных и инерционных сил. Энергетический баланс подтверждает точность решения.
modeldescr_sme/truss_tower_buckling = Анализ потери устойчивости ферменной башни\n\nВ этом примере сначала показано, как вычислить критическую нагрузку, вызывающую потерю устойчивости ферменной башни, с помощью линейного анализа потери устойчивости. Интерфейс Truss используется для моделирования башни. Решение сравнивается с аналитической оценкой критической нагрузки, полученной на основе потери устойчивости Эйлера.\n\nНа втором этапе выполняется нелинейный анализ потери устойчивости, основанный на несовершенствах геометрии из предыдущего исследования.
modeldescr_sme/truss_tower_buckling_guys = Линейный анализ устойчивости ферменной башни при постоянных нагрузках\n\nВ этом примере показано, как вычислить критическую нагрузку при потере устойчивости при наличии постоянных нагрузок. Ферменную башню поддерживают преднапряженные ванты. Нагрузка предварительного растяжения и сила тяжести конструкции считаются собственными нагрузками, а вертикальная нагрузка, приложенная к вершине башни, считается динамической нагрузкой.
modeldescr_sme/tube_connection = Предварительно напряженные болты в трубном соединении\n\nВ этом примере анализируется трубное соединение с предварительно напряженными болтами. Трубка подвергается внутреннему давлению и внешнему изгибающему моменту. Рассчитано напряжение в болтах в зависимости от приложенной внешней нагрузки. Мембранные и изгибающие напряжения вычисляются по ряду линий классификации напряжений.
modeldescr_sme/turbine_stator = Анализ термического напряжения лопатки статора турбины\n\nВ этом примере показано, как рассчитать термические напряжения в лопатке статора турбины с помощью интерфейса Thermal Stress, Solid.
modeldescr_sme/two_arches = Неустойчивость двух контактирующих арок\n\nЭтот концептуальный пример показывает, как рассчитывать критические точки в моделях с контактом. Модель состоит из двух соприкасающихся арок, смоделированных с помощью интерфейса Shell. Контактная задача решается методом штрафа. Верхняя арка нагружена краевыми нагрузками с контролируемым смещением и прижата к нижней арке. Во время нагрузки наблюдается проскальзывание нижней арки с несколькими критическими точками, связанными с боковой неустойчивостью. Чтобы получить стабильное эталонное решение, ограничивается боковое перемещение среднего края обеих арок.
modeldescr_sme/twophase_flow_fsi = Двухфазное течение с жидкостью –Structure Interaction\n\nВ следующем примере демонстрируются методы моделирования взаимодействия жидкости–структуры, содержащей две жидкие фазы в COMSOL Мультифизика. Он иллюстрирует, как более тяжелая жидкость может вызвать движение в препятствии, используя произвольный метод Лагранжа–Эйлера (ALE) вместе с предопределенным мультифизическим интерфейсом «Двухфазное течение, фазовое поле».
modeldescr_sme/vacancy_electromigration = Вакансия Электромиграция в межсоединительных линиях ИС \n\nПо мере развития технологии интегральных схем (ИС), схемы становятся все более мощными и компактными, и становится все более важным выявлять и предотвращать любые причины сбоев схем. Одним из особенно важных факторов, способствующих выходу из строя схемы, является электромиграция внутри межсоединений схемы, возникающая из-за накопления вакансий внутри металла. Электромиграция означает миграцию вакансий внутри металла, вызванную электрическими полями, концентрацией, гидростатическим напряжением и температурными градиентами. Этот пример иллюстрирует, как это сильно связанное явление можно смоделировать и проанализировать в COMSOL Multiphysics.
modeldescr_sme/vibrating_beam = Выделение тепла в вибрирующей конструкции\n\nВ этом примере моделируется выделение тепла в балочной конструкции, подверженной вибрациям малой амплитуды. Модель вычисляет линейный упругий отклик в частотной области. Анализ нестационарной теплопередачи моделирует медленно растущую температуру в балке, используя тепло, выделяемое за счет механических потерь в материале, в качестве источника тепла.
modeldescr_sme/vibrating_membrane = Вибрирующая мембрана\n\nВ этом примере изучаются собственные частоты предварительно натянутой мембраны, проявляющей жесткость под напряжением. Результаты модели сравниваются с аналитическим решением. Исследуются два различных метода создания предварительного напряжения.
modeldescr_sme/vibrating_string = Вибрирующая струна\n\nВ этом примере изучаются собственные частоты предварительно натянутой струны, проявляющей жесткость под напряжением. Результаты модели сравниваются с аналитическим решением. Исследуются два различных метода создания предварительного напряжения.
modeldescr_sme/vibrating_deep_beam = Анализ вибрации глубокой балки\n\nВ этом примере изучаются свободные и вынужденные колебания глубокой балки. Решение для анализа собственной частоты, частотной характеристики и переходных процессов вычисляется с использованием луча Тимошенко. Результаты этого моделирования сравниваются с аналитическими результатами.
modeldescr_sme/viscoelastic_damper_eigenmodes = Собственные моды вязкоупругого структурного демпфера\n\nВ этом примере собственные моды структурного демпфера равны вычислено.\n\nВ демпфере большая часть деформации контролируется вязкоупругими доменами, жесткость и демпфирующие свойства которых сильно зависят от частоты. Это приводит к нелинейной проблеме собственных частот, которую необходимо решать путем итерации для каждой отдельной собственной моды. Процедура автоматизирована за счет использования модельных методов.
modeldescr_sme/viscoelastic_damper_frequency = Viscoelastic Structural Damper\n\nВ этом примере выполняется анализ частотной характеристики вязкоупругого демпфера. Демпфер предназначен для снижения ветровых и сейсмических колебаний зданий и других высотных сооружений.
modeldescr_sme/viscoelastic_damper_transient = [Вязкоупругий структурный демпфер]Вязкоупругий структурный демпфер — Анализ переходных процессов\n\nВ этом примере выполняется анализ переходных процессов вязкоупругого демпфера. Демпфер предназначен для снижения ветровых и сейсмических колебаний зданий и других высотных сооружений.
modeldescr_sme/viscoelastic_tube = Релаксация напряжений вязкоупругой трубки\n\nВ этом примере изучается влияние температуры на вязкоупругую релаксацию напряжений в обобщенном материале Максвелла с четырьмя ветвями.
modeldescr_sme/wheel_rim = Автомобильный обод колеса\n\nВ этом примере показано, как решить большую задачу линейно-упругой механики конструкций с помощью суперпозиции нагрузок, а также как использовать симметричные и антисимметричные граничные условия. Геометрия представляет собой симметричный обод колеса, на который воздействует давление в шинех и вращающаяся нагрузка. Суперпозиция симметричных и антисимметричных случаев нагрузки, решенных на половине геометрии, дает общее поле напряжений.

# Subsurface Flow Module apps 
applicationdescr_ssf/twophase_flow_column = Эксперимент с двухфазным потоком\n\nМногоступенчатый эксперимент по истечению двухфазного несмешивающегося потока через пористую среду дает информацию о характеристиках потока и переноса жидкого грунта. system.\n\nЭто приложение вычисляет капиллярное давление и эффективную насыщенность для различных жидких фаз и комбинаций грунтов в различных экспериментальных установках. Взаимосвязь между капиллярным давлением, эффективной насыщенностью и относительной проницаемостью основана на модели удерживания Ван Генухтена.
applicationdescr_ssf/perforated_well = Перфорированная скважина\n\nПерфорированные скважины обычно используются для добычи нефти или газа из-за их преимущества, заключающегося в лучшем управлении скважиной за счет индивидуальной герметизации перфорационных отверстий. для моделирования неравномерного течения жидкости в такой перфорированной скважине требуется полный трехмерный анализ. \n\nЭто приложение позволяет моделировать поток Дарси в перфорированном стволе скважины для различных скважин, коллектора и свойств жидкости, чтобы прогнозировать прием жидкости в каждой отдельной перфорации.
applicationdescr_ssf/equivalent_porous_material_properties = Эквивалентные свойства пористого материала\n\nПористые материалы часто представляют собой периодически расположенные микроструктуры. для расчета потока пористой среды используются макромасштабные проницаемость и пористость, которые можно рассчитать на основе результатов ползущего потока через микромасштабную элементарную ячейку. В этом приложении предусмотрены различные микромасштабные структуры, и их размерные характеристики можно регулировать. Впоследствии эквивалентные значения пористости и проницаемости можно вычислить и экспортировать.

# Subsurface Flow Module models
modeldescr_ssf/aquifer_characterization = Характеристика водоносного горизонта\n\nВ этом примере используется интерфейс оптимизации для решения обратной задачи определения пространственно-переменной гидравлической проводимости на дискретизированной квадратичной сетке на основе ряда испытаний насосов водоносного горизонта. Поскольку количество наблюдений меньше количества неизвестных параметров, для различения решений с сопоставимыми значениями пригодности используется геостатистический штрафной член. Данные измерений генерируются на основе заданной прямой модели, реализованной с использованием производительности закон Дарси interface, making it possible to analyze the efficiency and accuracy of the inverse method as well as the optimization решатель's.
modeldescr_ssf/aquifer_water_table = Расчет уровня грунтовых вод в водоносном горизонте\n\nЭта модель демонстрирует применение COMSOL Multiphysics для эталонного случая установившегося подземного течения жидкости и переходного переноса растворенных веществ вдоль вертикального сечения в неограниченном водоносном горизонте. Транспорт растворов подвергается сильно нерегулярному потоку с сильной анизотропной дисперсией.
modeldescr_ssf/biot_poroelasticity = Biot Poroelasticity\n\nВ примере Biot Poroelasticity используется интерфейс Poroelasticity, доступный в модуле Subsurface Flow, для оценки деформации пористой среды, возникающей в результате отвода жидкости. Модель основана на примере уплотнения Терзаги и сравнивает результаты анализа уплотнения Терзаги и пороупругости Био.
modeldescr_ssf/buckley_leverett_model = Двухфазное течение в пористой среде: Buckley–Leverett Model\n\nВ этом примере моделируется двухфазное течение в пористой среде. В этом одномерном случае поток может быть описан уравнением Бакли–Леверетта, которое допускает аналитическое решение и служит в этом примере эталоном.
modeldescr_ssf/buoyancy_darcy_elder = Поток плавучести с законом Дарси — The Elder Issue\n\nВ этом примере показано, как смоделировать плавучее течение в пористой среде, вызванный изменениями плотности в зависимости от температуры или концентрации. Модель повторяет эксперименты Элдера с использованием подхода Восса и Соузы.
modeldescr_ssf/carbon_dioxide_storage = Хранение CO2 в геологической формации\n\nВ этом примере моделируется подземное хранилище CO2 в части формации Йохансен у побережья Норвегии. CO2 закачивается с помощью нагнетательной скважины со скоростью 15 кг/с в течение 25 лет, после чего скважина закрывается. Модель используется для расчета распространения CO2 по области моделирования на этапе закачки и в течение 25 лет непосредственно после остановки нагнетательной скважины. Эта модель содержит информацию из набора данных Йохансена, который доступен здесь по лицензии открытой базы данных (ODbL). Любые права на индивидуальное содержимое базы данных лицензируются по лицензии на содержимое базы данных: http://opendatacommons.org/licenses/dbcl/1.0/. Данные предоставлены Норвежским нефтяным директоратом (NPD), Бергенским университетом (UiB) и SINTEF.
modeldescr_ssf/convection_porous_medium = Свободная конвекция в пористой среде\n\nЭтот пример демонстрирует моделирование конвекции и проводимости в пористой среде. Здесь движение жидкости полностью обусловлено подъемом плавучести из-за изменений плотности в зависимости от температуры. Результаты сравниваются с опубликованным исследованием.
modeldescr_ssf/discrete_fracture = Discrete Fracture\n\nВ этом примере показано, как смоделировать поток в дискретной трещине, которая прорезает пористый блок, где поток в трещине намного быстрее, чем в матричном блоке.
modeldescr_ssf/electric_volcano_2d = Электрокинетические и магнитные поля внутри вулкана в 2D\n\nЭтот пример описывает электрокинетические напряжения, генерируемые потоком в шее вулкана. Жидкости взаимодействуют с электрическими и магнитными полями, создавая эффекты, наблюдаемые на поверхностных датчиках. Этот пример представляет собой инновационное использование методов моделирования, которые имеют решающее значение для широкого спектра исследований электромагнитного зондирования. \n\nТребуются модуль подземных потоков и модуль переменного/постоянного тока.
modeldescr_ssf/electric_volcano_3d = Электрокинетические и магнитные поля внутри вулкана в 3D\n\nЭтот пример описывает 3D взаимодействие между электрическими, магнитными и гидравлическими потенциальными полями в некроме вулкана. Трехмерная геометрия построена на основе данных, предоставленных экспертами. Поток жидкости взаимодействует с электрическими и магнитными полями, создавая эффекты, наблюдаемые на наземных датчиках.\n\nТребуются модуль подземных потоков и модуль переменного/постоянного тока.
modeldescr_ssf/finite_well = Finite Well\n\nЭтот пример демонстрирует, как смоделировать нестационарный поток в скважину конечного радиуса. Необычной особенностью этого примера является то, что результаты на краю лунки выдавливаются внутрь. Решение сравнивается с оценками Тайса для снижения давления до точечной скважины в напорном водоносном горизонте.
modeldescr_ssf/forchheimer_flow = Forchheimer Flow\n\nСопротивление течению в открытых пористых структурах, таких как насадочные слои, определяется как ламинарными, так и турбулентными эффектами. Уравнение Форхгеймера, решенное в этом примере, учитывает это.
modeldescr_ssf/fractured_reservoir_flow = Поток в трещиноватом коллекторе\n\nЭта модель демонстрирует, как моделировать поток через трещиноватый коллектор. Коллектор моделируется как дискретная сеть трещин, где трещины имеют случайное распределение положения, размера, ориентации и апертуры.
modeldescr_ssf/freezing_soil = Замерзающая почва\n\nЭта модель пороупругости характеризует деформацию твёрдого тела с фазовым изменением замораживания-оттаивания путем сочетания потоков жидкости, смещения твёрдого тела и уравнений теплопередачи.
modeldescr_ssf/frozen_inclusion = Frozen Inclusion\n\nЭтот пример представляет собой эталонную задачу для моделирования фазового перехода в пористой среде. Он изучает процесс плавления ледяных включений в пористой среде и, следовательно, демонстрирует, как соединить закон Дарси с интерфейсом «Теплопередача в пористых средах», включая фазовый переход. Это один из тестовых примеров проекта INTERFROST – проекта взаимного сравнения связанных теплогидравлических систем с учетом изменения климата в регионах вечной мерзлоты.
modeldescr_ssf/furrow_irrigation_dual_permeability = Орошение по бороздам — Двойная проницаемость\n\nВ этом примере показано, как настроить модель орошения по бороздам в неоднородном столбце почвы. Он использует функцию ненасыщенной двойной проницаемости, которая связывает два уравнения Ричардса через функцию переноса жидкости. Этот сценарий можно рассматривать как эталонную задачу для моделирования двойной проницаемости.
modeldescr_ssf/geothermal_doublet = Геотепловой дублет\n\nЭтот пример геотермального дублета показывает, как объединить теплопередачу и течение жидкости для прогнозирования долгосрочных характеристик гидротермальной дублетной системы в слоистых недрах, пересекаемых зоной разлома. Он включает моделирование скважин, трещин и геологических слоев с различными гидравлическими и термическими свойствами.
modeldescr_ssf/glacier_flow_2d = Glacier Flow\n\nЭто 2D-пример моделирования потока и теплопереноса в двух типах ледников: холодном леднике и умеренном леднике. Он сочетает неньютоновский ползучий ледяной поток с переносом тепла за счет проводимости и конвекции. Можно также принять во внимание скольжение льда по коренной породе.
modeldescr_ssf/glacier_flow_3d = Glacier Flow\n\nЭто 3D-пример того, как моделировать поток и перенос тепла в леднике. Он сочетает неньютоновский ползучий поток льда с переносом тепла за счет проводимости и конвекции. Учитывается также скольжение льда по коренной породе.
modeldescr_ssf/groundwater_contamination = Моделирование загрязнения грунтовых вод\n\nВ этом примере используются интерфейсы «Поток свободной и пористой среды», «Дарси» и «Перенос разбавленных видов» для расчета концентрации загрязняющего вещества, которое сбрасывается на поверхность и просачивается через ненасыщенный пористый слой в водоносный горизонт. Модель исследует, какое количество загрязняющих веществ попадает в колодец, из которого грунтовые воды выкачиваются на поверхность.
modeldescr_ssf/groundwater_flow_and_solute_transport = Поток подземных вод и перенос растворенных веществ\n\nЭта модель представляет собой вводный пример моделирования потока подземных вод и переноса видов. Двумерное поперечное сечение представляет собой однородный напорный водоносный горизонт единичной толщины. Изучено влияние насосной скважины на поле течения и распределение концентрации.
modeldescr_ssf/leaky_well = Leaky Well\n\nЭта 1D-модель анализирует нестационарный поток в скважину в водоносном горизонте, который несовершенно ограничен, поэтому происходит утечка из вышележащего слоя. Модель основана на задаче конечной ямы. Результаты хорошо совпадают с аналитическим решением Хантуша и Джейкоба.
modeldescr_ssf/low_permeable_lens = Двухфазное течение через линзу с низкой проницаемостью\n\nЭтот пример касается двухфазного потока в пористой среде, которая содержит линзу с низкой проницаемостью. Более тяжелая фаза проникает в пористую среду сверху, а низкопроницаемая линза проникает только при достижении критического насыщения снаружи линзы. Поскольку насыщение более тяжелой фазы на границе линзы является прерывистым, это требует использования граничного условия «Разрыв пористой среды».
modeldescr_ssf/multilateral_well = Разрушение многоствольной скважины\n\nЭтот пример, который показывает, как анализировать разрушение из-за деформаций вблизи необсаженной скважины, предоставлен доктором Роберто Суаресом Риверой из TerraTek Inc. Их пороупругий подход строит модель потока пористой среды с твердой деформацией и анализирует возможность разрушения с использованием кулоновских выражений разрушения.
modeldescr_ssf/perforated_well = Перфорированная скважина\n\nЭтот анализ трехмерного течения жидкости к перфорационным отверстиям в скважине показывает неравномерное и антисимметричное гидравлическое поведение вблизи водозабора. Геометрия скважины, смоделированная здесь, исходит от эксперта, который использует аналогичную геометрию в итеративном моделировании для оценки размера и ориентации перфорационных отверстий. Продемонстрировано, как получить высокоточные потоки с сеткой относительно низкого разрешения.
modeldescr_ssf/permeability_estimation = Оценка проницаемости микромасштабных пористых структур\n\nВ этой учебной модели показано, как оценить проницаемость пористого материала путем моделирования ползущего потока через элементарную ячейку пористой структуры. Результат затем можно использовать для моделирования потока через пористые материалы на макромасштабе, например, в реакторе с гранулированным слоем.
modeldescr_ssf/pesticide_transport = Транспорт и реакция пестицидов в почве\n\nВ этом примере исследуется разложение инсектицида алдикарба. Карбамат первоначально разлагается на сульфон, который впоследствии распадается на сульфоксид. Реакции биоразложения обеспечивают важные пути снижения количества токсичных веществ. На втором этапе моделирования используется вычисленная кинетика реакции в пространственно-зависимой модели, которая описывает загрязнение почвы посредством транспорта и реакции алдикарба.
modeldescr_ssf/phase_change_lunardini = Фазовый переход в полубесконечном столбце почвы\n\nВ этом примере решается задача теплопроводности с фазовым изменением в пористом материале, и результаты сравниваются с аналитическим решением, также известным как решение Лунардини.
modeldescr_ssf/pore_scale_flow = Поровый поток\n\nВ этом инновационном примере исследователи увеличивают поток в пористой среде, решая уравнения Навье–Стокса внутри отдельных пор. Геометрия модели (микрометровый масштаб) получена на основе изображений тонко нарезанной породы, полученных с помощью сканирующего электронного микроскопа. Представляет интерес то, как изменчивость интерстициальных скоростей масштабируется до непрерывных потоков.
modeldescr_ssf/reservoir_horizontal_wells = Пласт с горизонтальными скважинами\n\nВ этом примере моделируется тонкий нефтяной пласт с двумя горизонтальными скважинами. Пласт содержит две фазы: воду и нефть. Нефть добывают путем закачки воды через нижнюю скважину. Модель используется для расчета дебита нефти и водонефтяного коэффициента добычи с течением времени.
modeldescr_ssf/seawater_intrusion = Вторжение морской воды в прибрежный водоносный горизонт\n\nВторжение морской воды является критической проблемой в прибрежных регионах, ставя под угрозу как запасы пресной воды, так и качество подземных вод. В этом примере демонстрируется модель решения этой проблемы в вулканических прибрежных водоносных горизонтах, где насосная скважина расположена на некотором расстоянии от береговой линии. Чтобы учесть особые условия, когда водоносные горизонты с низкой проводимостью пересекаются с водоносными горизонтами с высокой проводимостью "lava tubes,", модель включает подход двойной пористости.
modeldescr_ssf/solute_injection = Впрыск растворенного вещества\n\nВ этом примере отслеживается судьба и транспорт растворенного вещества, впрыскиваемого в определенную скважину. В резервуаре химическое вещество перемещается путем адвекции и рассеивания. Модель соответствует аналитическому решению, используемому для проверки выделенных кодов потока и транспорта.
modeldescr_ssf/solute_transport = Перенос растворов в заданном потоке подземных вод \n\nЭта модель отслеживает растворенное вещество на площади 16 квадратных километров в течение 1000 дней в заданном потоке подземных вод с учетом продольной и поперечной дисперсии. В исследовании используется эталонная ситуация и сравнивается с аналитическим решением.
modeldescr_ssf/solute_transport_preset = Перенос растворов в заданном потоке подземных вод, предварительно заданная модель\n\nЭто шаблон MPH-файла, содержащий аналитическое решение и параметры для модели переноса растворенных веществ в заданном потоке подземных вод.
modeldescr_ssf/sorbing_solute = Переменный насыщенный поток и транспорт — Сорбирование растворенного вещества\n\nВ этом примере вода, скопившаяся кольцом на земле, перемещается в относительно сухой столб почвы и уносит с собой химическое вещество. Проходя через столб почвы с различной насыщенностью, химическое вещество прикрепляется к твердым частицам, замедляя транспорт растворенных веществ относительно воды. Кроме того, концентрации химических веществ снижаются в результате биоразложения как в жидкой, так и в твердой фазе.
modeldescr_ssf/terzaghi_compaction = Terzaghi Compaction\n\nВ этом примере решается обычная задача о потоке насыщенной жидкости для изменения гидравлического напора и используются результаты для оценки вертикального уплотнения отложений. Анализ основан на теории Терцаги и концепции эффективного напряжения. Решение сравнивается с опубликованными результатами. Этот пример модифицирован в модели пороупругости Био для анализа двунаправленного течения жидкости и деформации твёрдого тела.
modeldescr_ssf/twophase_flow_column = Двухфазное течение в колонне\n\nЭтот пример описывает одновременный поток двух несмешивающихся жидкостей в пористой среде в многоступенчатом эксперименте с давлением на входе. Модель вычисляет давление и степень насыщения воздуха и воды в репрезентативном объёме и, таким образом, отслеживает уровни насыщения, а не оценивает дискретное местоположение границы раздела воздух-вода.
modeldescr_ssf/variably_saturated_flow = Переменный насыщенный поток\n\nЭта модель уравнения Ричардса сравнивает поток с переменной насыщенностью вокруг непроницаемых элементов в двух блоках грунта. Этот пример, созданный исследователями-гидрологами, демонстрирует автоматизированные интерфейсы для функций удерживания и проницаемости Ван Генухтена и Брукса и Кори.
modeldescr_ssf/wellbore_storage = Хранение ствола скважины\n\nЭта обманчиво простая модель притока к скважине демонстрирует, как учитывать влияние флюидов, хранящихся внутри скважины. В статье подробно описано, как добавить к границе обыкновенное дифференциальное уравнение. Решение соответствует аналитическим оценкам Пападопулоса и Купера.

# Uncertainty Quantification Module models
modeldescr_uq/bracket_uncertainty_quantification = Количественная оценка неопределенности кронштейна\n\nЭта модель представляет собой версию учебной модели кронштейна модуля «Механика строительных конструкций» с полностью параметризованной геометрией. Проводится серия исследований по количественной оценке неопределенности, чтобы оценить, какие геометрические параметры больше всего влияют на угол отверстия под штифт и какова вероятность того, что угол отверстия под штифт превысит 0,1 градуса.
modeldescr_uq/bracket_uncertainty_quantification_fillet = Количественная оценка неопределенности кронштейна — Fillet Version\n\nЭта модель представляет собой версию учебной модели кронштейна из модуля «Механика строительных конструкций» с полностью параметризованной геометрией, в которой используется модуль проектирования. Проводится серия исследований по количественной оценке неопределенности, чтобы оценить, какие геометрические параметры больше всего влияют на угол отверстия под штифт и какова вероятность того, что угол отверстия под штифт превысит 0,1 градуса.
modeldescr_uq/ishigami_function_direct_monte_carlo = Прямое моделирование функции Исигами методом Монте-Карло\n\nВ этом примере показано, как выполнить прямое моделирование функции Исигами методом Монте-Карло. Эта случайная функция трех переменных является хорошо известным эталоном, используемым для проверки алгоритмов анализа глобальной чувствительности и количественной оценки неопределенности. Среднее, стандартное отклонение, максимальное и минимальное значения функции Исигами можно рассчитать аналитически для используемых здесь входных распределений.
modeldescr_uq/ishigami_function_uncertainty_quantification = Количественная оценка неопределенности функции Исигами\n\nВ этом примере показано, как выполнить количественный анализ неопределенности функции Исигами. Эта случайная функция трех переменных является хорошо известным эталоном, используемым для проверки алгоритмов анализа глобальной чувствительности и количественной оценки неопределенности. Среднее значение, стандартное отклонение, максимальное и минимальное значения, а также индексы Соболя функции Исигами могут быть вычислены аналитически для используемых здесь входных распределений.
modeldescr_uq/tensile_test_uncertainty_quantification = Количественная оценка обратной неопределенности испытания на растяжение\n\nМодель показывает, как калибровать модуль Юнга и коэффициент Пуассона на основе предварительных знаний и экспериментальных данных испытания на растяжение. В ходе испытания измеряется растягивающая сила и радиальное смещение. В результате вычисляется совместное распределение вероятностей калибруемых параметров.

# Wave Optics Module applications
applicationdescr_woptics/fiber_simulator = Fiber Simulator\n\nСкорость передачи оптических волноводов превосходит скорость передачи микроволновых волноводов, поскольку оптические устройства имеют гораздо более высокую рабочую частоту, чем микроволны, что обеспечивает гораздо более широкую полосу пропускания. Одномодовые волокна со ступенчатым индексом используются для связи на большие расстояния (даже заокеанские), тогда как как градиентные (GRIN), так и многомодовые волокна со ступенчатым индексом используются для связи на короткие расстояния, например, в учреждениях, университетских кампусах и зданиях. Конструкция состоит из концентрической слоистой структуры, в которой внутренний слой(и) образует сердцевину, а внешний(ые) слой(и) образует оболочку. Поскольку сердцевина имеет более высокий показатель преломления, чем оболочка, направленные моды могут распространяться вдоль волокна.
applicationdescr_woptics/plasmonic_wire_grating = [Плазмонная проволочная решётка (волновая оптика)] Анализатор плазмонной проволочной решетки \n\nЭто приложение демонстрирует следующее:\n\n• Выбор различных макетов пользовательского интерфейса для компьютера/планшета или смартфона\n• Пользовательский фоновое изображение и цвет\n• Внешний вид графики с пользовательским верхним цветом и нижним цветом\n• Пользовательское положение графики toolbar\n\nПриложение вычисляет эффективность дифракции для нулевого, первого и второго порядков дифракции при пропускании и отражении в зависимости от угла падения проволочной решетки на диэлектрической подложке. Приложение также показывает график нормы электрического поля для нескольких периодов решетки для выбранного угла падения.
applicationdescr_woptics/polarizing_beam_splitter = Поляризационный светоделитель\n\nГауссовский луч падает на стопку тонких пленок под углом 45 градусов, встроенную в призмы из стеклянного материала. Тонкопленочный пакет изготовлен из чередующихся материалов с высоким и низким показателем преломления. Волна будет преломляться под углом Брюстера на каждой внутренней границе раздела. Таким образом, будут передаваться преимущественно волны p-поляризации (поляризация в плоскости падения), а отражаться – преимущественно волны s-поляризации (поляризация, ортогональная плоскости падения). Изменение радиуса пятна гауссова луча изменяет поляризационную дискриминацию.\n\nСпектры отражения и пропускания вычисляются для разных пятен гауссова луча. radii.\n\nПриложение автоматически вычисляет фазовые выражения, необходимые для интерфейса «Электромагнитные волны, огибающие луча», когда пользователь изменяет оценённые параметры.

# Wave Optics Module models
modeldescr_woptics/bandgap_photonic_crystal = Анализ запрещенной зоны фотонного кристалла\n\nМодель исследует распространение волн в фотонном кристалле, состоящем из столбиков GaAs, расположенных на равном расстоянии друг от друга. Структура фотонного кристалла такая же, как и в другой модели фотонного кристалла, но в этом примере извлекается зонная диаграмма для самых нижних полос кристалла. Он выполняет нелинейную прогонку анализа собственных значений, используя нелинейный решатель с дополнительным уравнением нормализации для собственного значения.
modeldescr_woptics/brewster_interface = Падение гауссова луча под углом Брюстера\n\nЭтот пример демонстрирует свойства поляризации гауссовского луча, падающего на границу раздела двух сред под углом Брюстера. В нем показано, как использовать интерфейс «Электромагнитные волны, огибающие луча» с определяемой пользователем спецификацией фазы. Функции согласованных граничных условий используются для поглощения волн, падающих на границы под косыми углами.
modeldescr_woptics/cylinder_graphene_cloak = [Маскировка цилиндрического рассеивателя графеном (волновая оптика)]Маскировка цилиндрического рассеивателя графеном\n\nВ этой модели мы представляем метод маскировки с использованием электрически настроенного монослоя графена. Мы покажем, что когда цилиндрический диэлектрический рассеиватель покрыт графеном, сечение рассеяния сильно уменьшается на указанной частоте, что делает его невидимым с электромагнитной точки зрения. Целью этой модели является демонстрация использования линейно поляризованного фонового поля плоской волны в двумерной осесимметричной модели.
modeldescr_woptics/directional_coupler = Направленный ответвитель\n\nДва встроенных оптических волновода, расположенных в непосредственной близости, образуют направленный ответвитель. Материал оболочки — GaAs, а материал сердцевины — ионно-имплантированный GaAs. Волновод возбуждается двумя первыми супермодами волноводной структуры: симметричной и антисимметричной модами. Два числовых порта используются как на возбуждающей границе, так и на поглощающей границе для определения двух мод. Настраивается последовательность исследований анализа граничных режимов, включающая четыре анализа граничных режимов и окончательное исследование в частотной области. Модель демонстрирует связь одного из волноводов с другим волноводом.
modeldescr_woptics/drude_lorentz_media = [Моделирование дисперсионного Друде во временной области–Lorentz Media (Волновая оптика)]Моделирование дисперсионного Друде во временной области–Lorentz Media\n\nМассивы плазмонных дырок могут демонстрировать большое пропускание также для дырок, меньших длины волны. Это объясняется существованием поверхностных плазмонных поляритонов, которые могут туннелировать электромагнитную энергию через отверстие, даже если она намного меньше длины волны. Друде–Резонансные условия Лоренца. Каждое поляризационное поле Друде–Лоренца решается с использованием обыкновенного дифференциального уравнения, управляемого электрическим полем.\n\n2D-геометрия состоит из одной дисперсионной пластины толщиной 1µм с щелью шириной 0,5µм в ней. Используемая длина волны составляет 1µм. Применяются периодические граничные условия, поэтому физически это массив щелей. Приходящая волна представляет собой плоский волновой импульс с плоским фронтом и гауссовой временной формой.
modeldescr_woptics/enhanced_mems_mirror_coating = Улучшенное покрытие для микроэлектромеханического зеркала\n\nВ этом примере показано, как оптимизировать толщину материала покрытия микроэлектромеханического (МЭМС) зеркала для достижения максимальной отражательной способности. Чтобы сократить время моделирования, для моделирования тонкого материала покрытия поверх металлического зеркала используется граничное условие многослойного импеданса.
modeldescr_woptics/fabry_perot_resonator = Fabry–Pero Resonator\n\nA Fabry–Резонатор Перо является одним из фундаментальных оптических устройств и имеет широкий спектр применения. Несколькими примерами приложений являются измерение длины, частоты и/или длины волны или фильтрация определенных пространственных мод. \n\nЭта модель использует интерфейс «Электромагнитные волны, огибающие луча» в двунаправленной формулировке для эффективного расчета формы моды и свойств отражения/передачи макроскопического изображения. Фабри–Резонатор Перо.
modeldescr_woptics/fiber_simulator = Fiber Simulator\n\nВ этом примере выполняется анализ мод на концентрической круглой диэлектрической слоистой структуре. Могут моделироваться волокна как со ступенчатым, так и с градиентным показателем преломления.\n\nВизуализируются геометрия и распределение показателя преломления, поля мод, диаметр поля моды, затухание, групповая задержка и коэффициент дисперсии.
modeldescr_woptics/focusing_lens = Фокусирующая линза\n\nОптические линзы размером в миллиметр не могут быть легко проанализированы с помощью интерфейса электромагнитных волн в частотной области на стандартных рабочих станциях из-за большого количества элементов сетки конечных элементов. требуется.\n\nЭта модель объясняет, как интерфейс «Электромагнитные волны, огибающие луча» можно использовать для анализа плоско-выпуклой линзы с фокусным расстоянием 1 мм. Результаты сравниваются с формулой дифракции Френеля. Эти два результата очень хорошо согласуются.
modeldescr_woptics/fresnel_equations = [Уравнения Френеля (волновая оптика)]Fresnel Equations\n\nПлоская электромагнитная волна, распространяющаяся в свободном пространстве, падает под углом на бесконечную диэлектрическую среду. В этом примере вычисляются коэффициенты отражения и передачи и сравниваются результаты с результатами, заданными уравнениями Френеля.
modeldescr_woptics/fresnel_lens = Линза Френеля\n\nЭта модель имитирует 16-уровневую фокусирующую линзу Френеля первого порядка с диаметром 50 µm и 150 µм фокусное расстояние. В одном моделировании интерфейс «Электромагнитные волны, частотная область» вычисляет электрическое поле в линзе Френеля и окружающей воздушной области, простирающейся до фокальной плоскости. Во втором моделировании электрическое поле в выходной плоскости прямо над линзой Френеля распространяется в фокальную плоскость с использованием приближения Френеля. Наконец, моделирование выполняется с использованием интерфейса «Электромагнитные волны, огибающие луча». Проведено сравнение электрических полей в фокальной плоскости, вычисленных тремя методами. Результаты очень хорошо согласуются. \n\nКроме того, эта модель демонстрирует короткое время моделирования для интерфейса «Электромагнитные волны, огибающие луча», поскольку она может выполнять моделирование с более грубым сетка.\n\nМодель также демонстрирует, как построить и запустить метод модели. Метод модели автоматически перестраивает сложную геометрию при изменении параметра конструкции.
modeldescr_woptics/graphene_metamaterial_perfect_absorber = Графен Метаматериал Perfect Absorber\n\nГрафен, атомы углерода, расположенные в двумерной гексагональной решетке, вызвал огромный исследовательский и прикладной интерес с момента его экспериментального открытия около двух десятилетий назад. Помимо того, что этот волшебный материал ультратонкий, он обладает множеством интересных свойств, включая высокую электро- и теплопроводность, высокую эластичность, высокую механическую прочность и так далее. Среди различных приложений перспективной областью являются электрооптические устройства на основе графена, такие как фотодетекторы, фотодиоды и метаматериалы. Дополнительной желательной особенностью графена является то, что его оптическим откликом можно активно управлять, изменяя его энергию Ферми с помощью электрического затвора. В этой модели мы сначала демонстрируем, как рассчитать оптическую проводимость графена, используя формулу Кубо. Вычисленная проводимость затем используется для моделирования поглотителя ТГц метаматериала на основе графена.
modeldescr_woptics/hexagonal_grating = [Шестиугольная решётка (волновая оптика)]Гексагональная решётка\n\nПлоская волна падает на отражающую шестиугольную решетку. Решётчатая ячейка состоит из выступающей полусферы. Коэффициенты рассеяния для разных порядков дифракции вычислены для нескольких разных длин волн.
modeldescr_woptics/hexagonal_plasmonic_color_filter = Шестиугольный плазмонный цветной фильтр\n\nНадежные и простые в изготовлении цветные фильтры имеют множество применений. Эта модель демонстрирует, как построить модель поглощающего цветного фильтра на основе шестиугольного массива отверстий в тонком слое алюминия. Структура является гексагонально-периодической, но в модели показано, как определить задачу как прямоугольно-периодическую задачу.
modeldescr_woptics/in_plane_switching_liquid_crystal_cell = Плоскостное переключение жидкокристаллической ячейки\n\nЭта модель демонстрирует возможность переключения ячейки жидкокристаллического (ЖК) дисплея в конфигурации In-Plane Switching (IPS, переключение в плоскости).\n\nМодель Осина-Франка используется для расчета распределения директора ЖК (оптической оси) при приложении статического электрического поля. Интерфейс PDE в слабой форме задает слабую форму уравнения Осина-Франка, а интерфейс электростатики вычисляет распределение электрического потенциала.\n\nдля заданного неоднородного анизотропного ЖК-материала выполняется полноволновое моделирование с помощью интерфейса электромагнитных волн в частотной области. Результаты показывают, что ячейка имеет большой динамический диапазон пропускания, когда поляризатор и анализатор ориентированы ортогонально.
modeldescr_woptics/mach_zehnder_modulator = Mach–Zehnder Modulator\n\nA Mach–Zehnder Модулятор используется для управления амплитудой оптической волны. Входной волновод разделен на два волноводных плеча интерферометра. Если напряжение прикладывается к одному из плеч, для волны, проходящей через это плечо, индуцируется фазовый сдвиг. Когда два плеча рекомбинируются, разность фаз между двумя волнами преобразуется в амплитудную модуляцию.\nЭто мультифизическая модель, показывающая, как объединить пользовательский интерфейс «Электромагнитные волны, огибающие луча» с пользовательским интерфейсом «Электростатика» для описания реалистичного волноводного устройства.
modeldescr_woptics/mapped_dielectric_distribution = [Определение сопоставленного диэлектрического распределения материала (волновая оптика)]Определение сопоставленного диэлектрического распределения материала\n\nВ этом примере показано, как настроить пространственно изменяющееся диэлектрическое распределение. Здесь форма выпуклой линзы определяется посредством известной деформации прямоугольной области. Диэлектрическое распределение определяется на недеформированной исходной прямоугольной области и отображается на деформированной форме линзы. Хотя определенная здесь форма линзы является выпуклой, распределение диэлектрика приводит к тому, что падающий луч расходится.
modeldescr_woptics/metal_air_surface_plasmon_polariton = Моделирование распространения и дисперсии плазмон-поляритонов на поверхности металла–Air Поверхностный плазмон-поляритон\n\nЭлектромагнитные волны, которые распространяются вдоль поверхности, такие как поверхностные плазмонные поляритоны (SPP), представляют большой исследовательский интерес из-за их потенциального применения в наномасштабной манипуляции светом. Эта модель демонстрирует, как смоделировать распространение и зависимость дисперсии частотно-волнового вектора SPP, распространяющихся вдоль границы раздела между воздухом и объёмным серебром.
modeldescr_woptics/metasurface_beam_deflector = Metasurface Beam Deflector\n\nЭта модель демонстрирует, как моделировать метаповерхностный дефлектор луча, который использует аномальное преломление. Сама структура представляет собой повторяющийся массив из шести постов (так называемых метаэлементов). Периодичность отдельных постов составляет 500 нм, поэтому полная структура из шести постов имеет ширину 3 мкм. Штыри имеют высоту 1 мкм, а конструкция вычислена на работу на длине волны в свободном пространстве 1,55 мкм.\n\nЦилиндрические опоры изготовлены из кремния, а подложка - из SiO2. Структура спроектирована так, что падающий свет, проходящий через подложку под нормальным углом падения, будет преломляться под заданным углом - аномальным углом преломления. \n\nЧтобы смоделировать это с помощью COMSOL, мы применяем границы периодического состояния в направлениях x и y в сочетании с портами периодического типа в направлении z. Подузлы «Порядок дифракции» в портах будут полностью учитывать передачу и отражение в каждом разрешенном направлении дифракции.
modeldescr_woptics/microstructured_optical_fiber = Моды утечки в микроструктурированном оптическом волокне \n\nВ этой модели используется анализ мод для определения комплексных эффективных показателей микроструктурированного оптического волокна (MOF), состоящего из воздушных отверстий в кремниевой основе. Поскольку эффективный показатель меньше, чем показатель преломления фонового материала кремнезема, моды являются вытекающими. \n\nМодель демонстрирует как использование идеально согласованного слоя (PML), так и использование граничного условия рассеяния для усечения моделирования. область.\n\nДействительная и мнимая части эффективного индекса хорошо сравниваются со значениями из опубликованной статьи.
modeldescr_woptics/negative_refractive_index = [Моделирование отрицательного показателя преломления (волновая оптика)]Моделирование отрицательного показателя преломления \n\nРазработав периодическую структуру с характеристиками, сравнимыми по масштабу с длиной волны, можно получить материалы с отрицательной диэлектрической проницаемостью и проницаемостью. В этом примере показано, как смоделировать область метаматериала с отрицательной диэлектрической проницаемостью и проницаемостью в объёме.
modeldescr_woptics/optically_anisotropic_waveguide = Оптически анизотропный волновод\n\nВ этой модели модальный анализ выполняется при параметрическом изменении длины волновода от 0,5 µм до 4 µm для получения дисперсионной кривой для анизотропного ядра. Как поперечная, так и продольная анизотропия рассматриваются на двух отдельных этапах моделирования.
modeldescr_woptics/optical_ring_resonator = Режекторный фильтр оптического кольцевого резонатора\n\nВ этом примере вычисляются спектральные свойства оптического кольцевого резонатора. Модель демонстрирует, как использовать граничное условие Field Continuity на границах, где происходит скачок в предопределенной фазовой аппроксимации.
modeldescr_woptics/optical_ring_resonator_3d = Режекторный фильтр оптического кольцевого резонатора 3D\n\nВ этом примере вычисляются спектральные свойства трехмерного оптического кольцевого резонатора. Модель демонстрирует, как использовать детали из библиотеки деталей волновой оптики и как настроить граничное условие «Непрерывность поля» на границах, где происходит скачок в предопределенной фазовой аппроксимации.
modeldescr_woptics/optical_yagi_uda_antenna = Optical Yagi–Uda Antenna\n\nЭта модель демонстрирует использование метода граничных элементов в интерфейсе «Электромагнитные волны, граничный элемент» для моделирования оптического Антенна Яги–Уда. Антенна приводится в действие электрическим точечным диполем, который реализуется через фоновое поле. Оценивается распределение поля вокруг антенны и диаграмма направленности в дальней зоне, показывающая высокую направленность.
modeldescr_woptics/orbital_angular_momentum = Orbital Angular Momentum Beam\n\nЭта модель имитирует гауссов луч Лагерра с интерфейсом «Электромагнитные волны, огибающие луча», используя формулировку однонаправленной волны. Входной луч представляет собой фокусирующий гауссов луч со спиральным распределением фазы.\n\nЭто распределение фазы создает гауссовский кольцевой луч. Фаза вращается вокруг оптической оси по мере распространения луча. Полученный луч называется вихревым лучом.
modeldescr_woptics/photonic_crystal_demultiplexer_optimization = Оптимизация фотонного кристалла для демультиплексирования\n\nЭта модель моделирует распространение двух частотных диапазонов в фотонном кристалле с тремя портами. Кристалл изначально симметричен, так что две полосы частот одинаково равны для каждого выходного порта. Модель оптимизирует положение опор, чтобы две полосы частот поступали к разным выходным портам.
modeldescr_woptics/photonic_crystal_filter_optimization = Оптимизация фотонного кристалла для фильтрации сигналов \n\nЭта модель основана на модели фотонного кристалла, в которой изучается фотонно-кристаллическая структура. Эта структура имеет запрещенную зону, поэтому через очерченную геометрию направляющей будут распространяться только волны в определенном диапазоне частот. Эта модель меняет положение стоек, чтобы максимизировать соотношение передачи на нужной частоте к передаче на нежелательной частоте.
modeldescr_woptics/plasmonic_wire_grating = [Плазмонная проволочная решётка (волновая оптика)]Плазмонная проволочная решётка\n\nПлоская волна падает на проволочную решетку на диэлектрической подложке. Эффективность дифракции для нулевого и первого порядков дифракции — как при пропускании, так и при отражении — вычисляется как функция угла падения.
modeldescr_woptics/polarizing_beam_splitter = Поляризационный светоделитель\n\nГауссовский луч падает на стопку тонких пленок под углом 45 градусов, встроенную в призмы из стеклянного материала. Тонкопленочный пакет изготовлен из чередующихся материалов с высоким и низким показателем преломления. Волна будет преломляться под углом Брюстера на каждой внутренней границе раздела. Таким образом, будут передаваться преимущественно волны p-поляризации (поляризация в плоскости падения), а отражаться – преимущественно волны s-поляризации (поляризация, ортогональная плоскости падения). Изменение радиуса пятна гауссова луча изменяет поляризационную дискриминацию.\n\nСпектры отражения и пропускания вычисляются для различных радиусов пятна гауссова луча.
modeldescr_woptics/rcs_sphere_bem = [ЭПР металлической сферы с использованием метода граничных элементов (волновая оптика)]ЭПР металлической сферы с использованием метода граничных элементов \n\nЭта модель иллюстрирует процесс оценки радиолокационного сечения (ЭПР) металлической сферы посредством использования метода граничных элементов (МГЭ). Используя преимущества вертикальной плоскости симметрии, параллельной поляризации падающего фонового поля, модель снижает вычислительные затраты. Вычисленные значения RCS сравниваются с аналитическими значениями в пределах области Mie RCS.
modeldescr_woptics/second_harmonic_generation = [Генерация второй гармоники гауссова луча (волновая оптика)]Генерация второй гармоники гауссова луча\n\nЛазерные системы являются важной областью применения в современной электронике. С помощью нелинейных материалов можно генерировать гармоники, кратные частоте лазерного света. В этом примере показано, как генерацию второй гармоники можно настроить как симуляцию переходных волн с использованием нелинейных свойств материала. Луч лазера Nd:YAG (лямбда = 1,06 микрона) фокусируется на нелинейном кристалле, так что перетяжка луча находится внутри кристалла.
modeldescr_woptics/second_harmonic_generation_frequency_domain = Генерация второй гармоники в частотной области\n\nЭто пример, подтверждающий принцип, описывающий процесс генерации второй гармоники (ГВГ) с использованием двух интерфейсов электромагнитных волн в частотной области. Один для основной волны и один для второй гармоники.\n\nдля удобства показатель преломления идеально согласован (при n = 1) для каждой частоты. Связь между волнами реализуется с использованием функции областьной поляризации для каждого интерфейса. \n\nРезультаты сравниваются с аналитическим решением из приближения медленно меняющейся огибающей (SVEA).
modeldescr_woptics/self_focusing = Самофокусировка\n\nГауссовский луч попадает в оптическое стекло БК-7. Материал имеет показатель преломления, зависящий от интенсивности. для центра луча показатель преломления наибольший. Этот профиль индуцированного показателя преломления противодействует дифракционным эффектам и фактически фокусирует луч. Отсюда и название самофокусировка. Самофокусировка важна при проектировании мощных лазерных систем. Модель демонстрирует трехмерное нелинейное распространение волн.
modeldescr_woptics/single_bit_hologram = Однобитовая голограмма\n\nЭта модель имитирует побитовое хранение голографических данных, включая запись и извлечение данных. В побитовом хранилище голографических данных данные составляют 1 бит. Таким образом, профили объектного луча и опорного луча в этой модели идентичны.\n\nВ процессе записи два луча пересекаются друг с другом и образуют интерференционный узор полос, который представляет собой голограмму, несущую 1 бит. data.\n\nВо время процесса извлечения объектный луч выключается, а затем опорный луч дифрагирует на голограмме и создает объект луч.\n\nМодель реализована с использованием интерфейса «Электромагнитные волны, частотная область». Одна последовательность исследований обрабатывает как этапы записи, так и этапы извлечения путем модификации физического дерева для двух этапов исследования.
modeldescr_woptics/single_mode_fiber_coupling = Соединение одномодового волокна \n\nФокусировка лазерного луча на кончике одномодового волокна является распространенным способом передачи света. для достижения хорошей эффективности связи пространственная мода светового поля должна соответствовать пространственной модели волокна. \n\nВ этой модели мы используем физический интерфейс «Электромагнитные волны, огибающие луча» для расчета связи в свободном пространстве между двумя небольшими концами волокна. Эффективность связи зависит от положения линз связи.
modeldescr_woptics/slot_waveguide = Slot Waveguide\n\nМодель анализирует распространение мод внутри нанощелевого волновода. В конфигурации щелевого волновода две пластины с высоким показателем преломления (~ 3,48) размещаются рядом со щелью с низким показателем преломления (~ 1,44). Анализ мод был выполнен на двумерном сечении щелевого волновода для рабочей длины волны 1,55 μм. Дальнейший анализ был проведен для оптимизации ширины щели для обеспечения максимальной оптической мощности и оптической интенсивности через площадь щели.
modeldescr_woptics/step_index_fiber_bend = Ступенчатый изгиб волокна \n\nВ первой части модели вычисляются моды для прямого ступенчатого волокна из кварцевого стекла.\nВо второй части анализируется ступенчатый изгиб волокна с радиусом кривизны 3 мм по отношению к распространяющиеся моды и потери излучения. Показано, как найти усредненный по мощности радиус моды и как использовать его для расчета эффективного индекса моды.
modeldescr_woptics/symmetric_laser_cavity = Поперечные моды для симметричного лазерного резонатора\n\nЭтот пример демонстрирует, как можно составить систему нелинейных уравнений для определения собственных частот симметричного лазерного резонатора. В примере используется двунаправленная формулировка физического интерфейса «Электромагнитные волны, огибающие луча».\n\nВычисленные собственные частоты проверяются на значения из аналитических выражений.
modeldescr_woptics/tapered_waveguide = Tapered Waveguide\n\nКоническая структура оптического волновода используется для согласования двух волноводов, имеющих разные геометрические сечения и/или разные параметры материала. Конический волновод имеет одно геометрическое сечение во входной плоскости и другое сечение в выходной плоскости. Между этими плоскостями ширина сердечника изменяется линейно в зависимости от расстояния распространения.\n\nЭта модель демонстрирует, как определить определяемую пользователем фазу и волновой вектор для интерфейса «Электромагнитные волны, огибающие луча» при использовании с идеально согласованными слоями (PML). PML используются для поглощения излучения, не соответствующего полям моды порта.
modeldescr_woptics/time_to_frequency_fft_distributed_bragg_reflector = Анализ БПФ по времени для распределенного отражателя Брэгга \n\nЭта модель демонстрирует, как настроить исследование БПФ по времени для структуры распределенного отражателя Брэгга (DBR). Модулированный гауссов входной импульс возбуждает структуру DBR. Решение во временной области впоследствии преобразуется в частотную область с использованием быстрого преобразования Фурье (БПФ).\n\nРезультаты хорошо согласуются с результатами обычного исследования в частотной области.
modeldescr_woptics/total_internal_reflection = Total Internal Reflection\n\nЭта модель демонстрирует, что двунаправленная формулировка интерфейса «Электромагнитные волны, огибающие луча» может использоваться для моделирования луча, отражающегося в двух основных направлениях при его распространении вдоль waveguide.\n\nПочти коллимированный гауссов пучок возбуждается на левой границе и демонстрирует полное внутреннее отражение (ПВО) на границе раздела между волноводом и окружающим воздухом. Луч выходит из волновода, пройдя вдоль волновода на расстояние 20 мм.\n\nЭтот тип световодов полезен для моделирования виртуальной реальности (VR).
modeldescr_woptics/vertical_cavity_surface_emitting_laser = Расчеты порогового усиления для лазеров поверхностного излучения с вертикальным резонатором (VCSEL)\n\nИсследование собственной частоты используется для определения резонансной частоты и порогового усиления для лазера поверхностного излучения с вертикальным резонатором на основе GaAs на основе оксида (VCSEL).\n\nМоделирование выполняется в два этапа. Сначала выполняется регулярный анализ собственных частот, чтобы найти хорошие начальные значения для последующего нелинейного анализа собственных частот. \n\nРезонансные частоты и пороговое усиление, вычисленные для различных геометрий устройства, хорошо сравниваются со значениями из статьи, в которой собраны результаты различных вычислительных методов по этой контрольной задаче.
modeldescr_woptics/waveguide_s_bend = Waveguide S-Bend\n\nЭта модель демонстрирует, как моделировать распространение направленных волн в диэлектрическом S-образном оптическом волноводе. Модель демонстрирует, что фазовая аппроксимация, необходимая для интерфейса «Электромагнитные волны, конверты луча», может быть вычислена численно путем решения дополнительного уравнения в частных производных.
modeldescr_woptics/whispering_gallery_mode_resonator = Резонатор режима шепчущей галереи\n\nДиэлектрические микросферы могут поддерживать режимы шепчущей галереи с высокими оптическими показателями качества. Эта модель иллюстрирует, как вычислить различные собственные моды и резонансные частоты. Резонансные частоты фильтруются либо по их пространственной локализации в резонаторе, либо путем сравнения потерь связанных мод и нежелательных для данного применения воздушных мод.


# LiveLink™ for Excel® models
modeldescr_llexcel/busbar_llexcel = Электрический нагрев в шине с использованием LiveLink™ для Excel®\n\nВ этом примере анализируется резистивный нагрев шины, предназначенной для проведения постоянного тока. Данные, используемые в настройках модели, импортируются из листа Excel.


# LiveLink™ for MATLAB® models
modeldescr_llmatlab/busbar_llsw_llmatlab = Электрический нагрев шины решен с помощью LiveLink™ для SOLIDWORKS® и LiveLink™ для MATLAB®\n\nВ этом примере анализируется резистивный нагрев шины, предназначенной для проведения постоянного тока от трансформатора к электрическому устройству. Это MPH-файл базовой модели, используемый в M-файле, который демонстрирует, как выполнить параметрическую развертку с использованием LiveLink™ для SOLIDWORKS® вместе с LiveLink™ для MATLAB®.
modeldescr_llmatlab/domain_activation_llmatlab = Активация и деактивация области\n\nВ этом примере нестационарной задачи теплопередачи реализуется нагрев из чередующихся областей с использованием активации и деактивации области.
modeldescr_llmatlab/homogenization_llmatlab = Гомогенизация в химическом реакторе\n\nЭтот пример иллюстрирует, как моделировать периодический процесс гомогенизации в модели химического реактора, зависящей от пространства. Эта гомогенизация устраняет градиенты концентрации в реакторе через заданный интервал времени.
modeldescr_llmatlab/pseudoperiodicity_llmatlab = Конвективная теплопередача с псевдопериодичностью\n\nВ этом примере моделируется конвективная теплопередача в канале, заполненном водой. Чтобы уменьшить требования к памяти, модель решается повторно на псевдопериодическом участке канала. Каждое решение соответствует отдельному сечению, и перед каждым шагом решения температура на выходной границе из предыдущего решения сопоставляется с входной границей.
modeldescr_llmatlab/vacuum_flask_llmatlab = Распределение температуры в термосе\n\nВ этом примере решается распределение температуры внутри термоса, содержащего горячий кофе. Основная цель - проиллюстрировать, как использовать функции MATLAB® для определения свойств материала и граничных условий.
modeldescr_llmatlab/model_tutorial_llmatlab = Модель шаблона для LiveLink™ для MATLAB® Demo\n\nЭто шаблон MPH-файла, содержащий физический интерфейс и геометрию, используемую для LiveLink™ для примеров MATLAB®.

# LiveLink™ for Simulink® models
modeldescr_llsimulink/battery_control_thermal = Контроль разряда аккумуляторной батареи с помощью термического анализа\n\nЭта модель вычисляет распределение температуры в аккумуляторной батарее, которая используется при заданной мощности. Ток контролируется в Simulink, чтобы обеспечить постоянную мощность во время использования.
modeldescr_llsimulink/li_battery_llsimulink = 1D модель литий-ионной батареи. Управление зарядом\n\nЭта модель иллюстрирует управление зарядкой/разрядкой литий-ионной батареи в Simulink® Simulink.
modeldescr_llsimulink/inverted_pendulum = Управление перевернутым маятником\n\nЭта модель показывает, как управлять базовым положением перевернутого маятника, чтобы поддерживать его вертикальное положение стабильным.\nУправление осуществляется с помощью ПИД-регулятора. Внешняя сила прикладывается в базовом положении в зависимости от угла поворота маятника, чтобы предотвратить его падение. Кроме того, положение маятника ограничено в пределах диапазона.\nКонтроллер реализован в Simulink®.
modeldescr_llsimulink/magnetic_brake_llsimulink = Магнитный тормоз — LiveLink™ for Simulink® Simulation\n\nМагнитный тормоз состоит из постоянный магнит, который индуцирует токи во вращающемся медном диске. Возникающие вихревые токи взаимодействуют с магнитным потоком, создавая силы Лоренца и, следовательно, тормозной момент. Угловая скорость диска вычисляется с помощью Simulink®.
modeldescr_llsimulink/model_tutorial_llmatlab = Модель шаблона для LiveLink™ для Simulink® Demo\n\nЭто шаблон MPH-файла, содержащий геометрические и физические интерфейсы для LiveLink™ для примеров Simulink®.
modeldescr_llsimulink/thermal_actuator_llsimulink = Включение/выключение термопривода\n\nЭтот пример модели состоит из термопривода с двумя горячими рычагами, изготовленного из поликремния. Привод активируется за счет теплового расширения. Повышение температуры, необходимое для деформации двух горячих рычагов и, таким образом, смещения привода, достигается за счет джоулева нагрева (резистивного нагрева). Большее расширение горячего рычага по сравнению с холодным рычагом вызывает изгиб привода. \nМаксимальное смещение наконечника удерживается в пределах от 39 до 41 мкм с помощью контроллера включения/выключения, регулирующего приложенный электрический потенциал.\nКонтроллер реализован с использованием Simulink®.\nВ этом примере повторно используется модель Thermal Microactuator Simplified из библиотеки приложений продукта платформы.
modeldescr_llsimulink/thermal_actuator_llsimulink_seed = Термоконтроллер, LiveLink™ для Simulink® Simulation\n\nЭто исходная модель для учебного пособия в Руководстве пользователя.


