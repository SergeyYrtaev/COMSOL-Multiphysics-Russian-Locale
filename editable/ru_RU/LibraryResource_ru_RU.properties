addinlabel_mph/colored_selections = Цветные выборки
addindoc_mph/colored_selections = Дополнение Colored Selections автоматически окрашивает все области или границы, чтобы их было проще различать. Цвета выбираются случайным образом; оттенок и осветление можно настроить в соответствии с настройкими пользователя.
