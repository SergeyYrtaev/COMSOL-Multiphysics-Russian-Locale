Failed_to_compute_release_time_intervals_at_least_two_release_times_are_required = Не удалось вычислить временные интервалы выпуска. Требуется как минимум два времени выпуска.
Failed_to_convert_data_file_column_index_to_an_integer = Не удалось преобразовать индекс столбца файла данных в целое число.
Failed_to_identify_affected_particle_properties = Не удалось определить свойства затронутых частиц.
Failed_to_identify_exterior_field_variable = Не удалось определить переменную внешнего поля.
Failed_to_identify_far_field_variables = Не удалось определить переменные дальнего поля.
Failed_to_identify_released_particle_properties = Не удалось определить свойства выпущенных частиц.
Failed_to_load_external_file_for_magnetic_field_data = Не удалось загрузить внешний файл данных магнитного поля.
Failed_to_load_file_for_initial_particle_positions = Не удалось загрузить файл начальных положений частиц.
Failed_to_load_nuclear_stopping_power_data_for_screening_function_X = Не удалось загрузить данные о останавливающей способности ядерного оружия для функции проверки: #
Failed_to_parse_expression_for_integer_values = Не удалось проанализировать выражение для целочисленных значений.
Fileindex_incompatible_data = Ожидаемое количество функций не соответствует файлу импортированных данных. 
Firstorder_vfromfile_error = Для формул первого порядка с импульсом из файла хотя бы одна из строк "normalizeexpr" и "coefexpr" должна быть непустой.
