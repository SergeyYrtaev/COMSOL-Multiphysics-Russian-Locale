Lower_limit_exceeds_upper_limit_for_ray_frequency = Нижний предел превышает верхний предел частоты лучей.
Lower_limit_exceeds_upper_limit_for_vacuum_wavelength = Нижний предел превышает верхний предел длины волны в вакууме.
# - M --------------------------------------------------------------------- M -
Major_axis_direction_vector_must_not_be_zero_vector = Вектор направления главной оси не должен быть нулевым вектором.
Medium_properties_node_could_not_evaluate_n._Add_material_with_defined_dispersion_model = Узел свойств среды не смог оценить n. Добавьте материал с определенной моделью дисперсии.
# - N --------------------------------------------------------------------- N -
No_domain_selected_for_the_nozzle_domain_subfeature = Для подфункции «Область сопла» не выбран область. Выберите область, в которой будет выпущен распыл частиц.
No_drag_forces_detected._The_droplet_breakup_feature_has_no_effect = Силы сопротивления не обнаружены. Функция «Разрушение капель» не имеет никакого эффекта.
No_particle_inlet_or_release_defined._Add_an_Inlet_or_Release_feature = Вход или выход частиц не определен. Добавьте функцию входа или выпуска.
No_photometric_data_file_has_been_loaded = Файл фотометрических данных не загружен.
No_physics_is_selected = Физика не выбрана.
No_ray_inlet_or_release_defined._Add_an_Inlet_or_Release_feature = Вход и выход луча не определены. Добавьте функцию входа или выпуска.
No_ray_release_defined._Add_a_ray_release_feature = Выпуск луча не определен. Добавьте функцию выпуска лучей.
No_reference_edge = Нет опорного края.
No_reference_point = Никакой точки отсчета.
# - O --------------------------------------------------------------------- O -
Only_a_single_instance_of_the_continuous_random_walk_turbulence_model_is_allowed = Допускается только один экземпляр модели турбулентности непрерывного случайного блуждания.
# - P --------------------------------------------------------------------- P -
Particle_beam_reference_point = Опорная точка необходима при использовании узла Particle Beam с положением луча = Выбранная точка. Добавьте подузел «Опорная точка».
Particles_affected_by_a_Droplet_Breakup_feature_must_be_liquid_droplets = Частицы, на которые влияет функция разрушения капель, должны быть каплями жидкости.
Particles_released_by_a_nozzle_must_be_liquid_droplets = Частицы, выбрасываемые из сопла, должны представлять собой капли жидкости.
# - Q --------------------------------------------------------------------- Q -
# - R --------------------------------------------------------------------- R -
Ray_tracing_nonempty_selection = Для трассировки лучей требуется либо физический интерфейс с непустым выбором, либо хотя бы одно граничное условие, например узел «Стена» или «Разрыв материала», с непустым выбором.
Rayleigh_Taylor_drag_force = Модель распада капли Рэлея-Тейлора требует определения силы сопротивления. Добавьте узел Drag Force.
Reference_edge_selection_is_empty = Выбор опорного края пуст.
Reference_point_selection_is_empty = Выбор контрольной точки пуст.
Release_times_must_increase_monotonically = Время релиза должно монотонно увеличиваться.
# - S --------------------------------------------------------------------- S -
Space_charge_specify_current = Несовместимые настройки для мультифизической связи с ограниченным выбросом космического заряда.\nВ интерфейсе отслеживания связанных заряженных частиц выберите «Указать ток» в списке «Спецификация выброса частиц».
# - T --------------------------------------------------------------------- T -
The_cross_grating_feature_requires_at_least_one_diffraction_order_subnode = Для функции «Перекрестная решетка» требуется как минимум один подузел «Порядок дифракции».
The_drag_forces_have_no_selection._The_droplet_breakup_feature_has_no_effect = Силы сопротивления не имеют выбора. Функция «Разрушение капель» не имеет никакого эффекта.
The_droplet_breakup_feature_requires_at_least_one_liquid_species = Для функции «Разрушение капель» требуется как минимум один вид жидкости. Выберите Капли/пузырьки жидкости из списка Тип частиц в окне настроек узла Свойства частиц или Переопределить свойства.
The_fraction_of_total_emissive_power_is_expected_to_be_between_0_and_1 = Ожидается, что доля общей излучательной мощности будет находиться в диапазоне от 0 до 1.
The_frequency_could_not_be_determined_from_the_solution._Set_a_user_defined_frequency_instead = Не удалось определить частоту из решения. \nВместо этого установите частоту, определяемую пользователем.
The_grating_feature_requires_at_least_one_diffraction_order_subnode = Для функции «Решетка» требуется как минимум один подузел «Порядок дифракции».
The_receiver_selection_does_not_form_a_closed_surface = Выбор Приемника не образует замкнутой поверхности.
The_receiver_selection_does_not_form_a_sphere = Выбор приемника не образует сферу.
The_release_or_inlet_features_have_no_selection._Add_a_selection_to_at_least_one_of_the_release_or_inlet_features = Функции выпуска или впуска не имеют выбора. Добавьте выбор хотя бы к одному из элементов выпуска или впуска.
The_ray_release_features_have_no_selection._Add_a_selection_to_at_least_one_of_the_ray_release_features = Функции выпуска лучей не имеют выбора. Добавьте выделение хотя бы к одной из функций выпуска лучей.
The_Kelvin_Helmholtz_model_is_only_supported_for_liquid_droplets = Модель Кельвина-Гельмгольца поддерживается только для капель жидкости.
The_IES_file_is_not_properly_formatted = Файл IES неправильно отформатирован.
To_model_anisotropic_turbulence_the_selection_of_the_drag_force_must_be_adjacent_to_at_least_one_wall = Чтобы смоделировать анизотропную турбулентность, выбранная сила сопротивления должна быть примыкать хотя бы к одной стене.
To_use_the_Newtonian_ignore_inertial_terms_formulation_a_drag_force_must_be_included._the_selection_should_include_all_domains_in_the_particle_tracing_interface = Чтобы использовать формулировку Ньютона, игнорируя инерционные термины, необходимо включить силу сопротивления. Выбор должен включать все домены в интерфейсе отслеживания частиц.
To_use_the_Newtonian_ignore_inertial_terms_formulation_the_selections_for_the_drag_force_nodes_must_include_all_domains_in_the_particle_tracing_interface = Чтобы использовать формулировку Ньютона, игнорируя инерционные члены, выбор узлов силы сопротивления должен включать все домены в интерфейсе трассировки частиц.
TILT_NONE_is_the_only_supported_option = TILT=NONE — единственный поддерживаемый вариант.
