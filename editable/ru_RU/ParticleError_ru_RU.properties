# - A --------------------------------------------------------------------- A -
A_droplet_breakup_node_with_no_subnodes_has_no_effect = Узел «Разрыв капли» без подузлов не имеет никакого эффекта.
All_repeating_layers_in_a_periodic_multilayer_film_must_be_adjacent = Все повторяющиеся слои в периодической многослойной пленке должны располагаться рядом.
Aspect_ratio_should_be_greater_than_1 = Соотношение сторон должно быть больше 1.
At_least_one_release_from_data_file_node_does_not_have_any_imported_data = По крайней мере, один узел «Освобождение из файла данных» не имеет импортированных данных.
At_least_two_release_times_must_be_defined. = Необходимо определить как минимум два времени выпуска.
# - B --------------------------------------------------------------------- B -
Beam_axis_and_major_axis_direction_must_not_be_parallel = Ось луча и направление главной оси не должны быть параллельны.
# - C --------------------------------------------------------------------- C -
Cone_axis_and_transverse_direction_must_not_be_parallel = Ось конуса и поперечное направление не должны быть параллельны.
