Initial_coordinate_array_sizes_must_agree_when_releasing_at_specified_combinations = Начальные размеры массива координат должны согласовываться при отпускании в указанных комбинациях.
Initial_coordinates_edit_field_cannot_be_empty_in_release_from_grid_feature = Поле редактирования исходных координат не может быть пустым при освобождении от объекта сетки.
Invalid_aspect_ratio_of_gaussian_beam = Недопустимое соотношение сторон гауссова луча.
