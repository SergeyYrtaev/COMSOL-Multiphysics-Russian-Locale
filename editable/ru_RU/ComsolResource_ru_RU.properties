tooltiptext_application_CheckBoxWidget_formtab = Добавьте флажок в текущую форму.
tooltiptext_application_ComboBoxWidget_formtab = Добавьте объект комбо-бокса к текущей форме.
tooltiptext_application_DataDisplayWidget_formtab = Добавьте объект отображения данных к текущей форме.
tooltiptext_application_dialog_preview_action_form_editor = Показать предварительный просмотр выбранной формы.
tooltiptext_application_Divider_formtab = Добавить линейный объект к текущей форме, чтобы действовать как горизонтальный или вертикальный делитель, разделяющий группы объектов формы.
tooltiptext_application_DoubleArrayDataField_formtab = Объявите массив двойных переменных данных с плавающей запятой, к которым вы можете получить доступ из объектов и методов формы.
tooltiptext_application_DoubleArrayDataField_roottab = Объявите массив двойных переменных данных с плавающей запятой, к которым вы можете получить доступ из объектов и методов формы.
tooltiptext_application_DoubleDataField_formtab = Объявите скалярные переменные данных с двойной плавающей точкой, к которым вы можете получить доступ из объектов и методов формы.
tooltiptext_application_DoubleDataField_roottab = Объявите скалярные переменные данных с двойной плавающей точкой, к которым вы можете получить доступ из объектов и методов формы.
tooltiptext_application_DoubleMatrixDataField_formtab = Объявите массив 2D (матрица) Двойные переменные данных с плавающей точкой, к которым вы можете получить доступ из объектов формы и методов.
tooltiptext_application_DoubleMatrixDataField_roottab = Объявите массив 2D (матрица) Двойные переменные данных с плавающей точкой, к которым вы можете получить доступ из объектов формы и методов.
tooltiptext_application_edit_source_action = Выберите настройки, которые могут быть изменены из объектов формы.
tooltiptext_application_EquationLabel_formtab = Добавьте объект уравнения к текущей форме, чтобы отображать символы, такие как уравнения.
tooltiptext_application_Executable_roottab = Компиляция для создания автономного приложения, которое может работать без лицензии COMSOL Multiphysics® или COMSOL Server™.
tooltiptext_application_File_roottab = Объявите переменную файла, которую вы можете использовать для доступа к файлам при запуске приложения.
tooltiptext_application_FileBrowser_formtab = Добавьте объект импорта файла в текущую форму для просмотра и выбора файлов.
tooltiptext_application_FileLibrary_roottab = Откройте библиотеку файлов, где вы можете выбрать из общих файлов, таких как текстовые файлы, и добавить такие файлы.
tooltiptext_application_FileMenu_windowtab = Добавьте меню файла в ленту или выберите его.
tooltiptext_application_FileType_roottab = Определите тип файла, который можно использовать для управления файлами, отображаемыми в диалогах файлового браузера, например, при использовании объекта формы Импорт файла.
tooltiptext_application_Filler_formtab = Добавьте объект-спейсер к текущей форме, чтобы определить пространство абсолютного размера в форме.
tooltiptext_application_FormDefinition_addindefinitiontab = Добавить определение формы в определение добавления.
tooltiptext_application_FormReference_formtab = Добавить объект формы в качестве подформы в текущей форме.
tooltiptext_application_Gauge_formtab = Добавить калибровочный объект к текущей форме для отображения числового значения в калибровочном контроле.
tooltiptext_application_GraphicsData_roottab = Объявите переменную Graphics Data, которую вы можете использовать для доступа к выбранным данным из объектов Graphics.
tooltiptext_application_Graphics_formtab = Добавьте графический объект к текущей форме для отображения графиков в приложении.
tooltiptext_application_Hyperlink_formtab = Например, добавьте объект гиперссылки к текущей форме для гиперссылки на веб-страницу.
tooltiptext_application_Image_formtab = Добавьте объект изображения к текущей форме.
tooltiptext_application_ImageLibrary_roottab = Откройте библиотеку изображений, где вы можете выбирать из изображений и добавлять изображения.
tooltiptext_application_InformationCards_formtab = Добавьте объект стека информационных карт в текущую форму для встроенного стека карт с картами, которые отображают информацию о приложении.
tooltiptext_application_IntegerArrayDataField_formtab = Объявляйте целые переменные данных Array, к которым вы можете получить доступ из объектов формы и методов.
tooltiptext_application_IntegerArrayDataField_roottab = Объявляйте целые переменные данных Array, к которым вы можете получить доступ из объектов формы и методов.
tooltiptext_application_IntegerDataField_formtab = Объявите скалярные целочисленные переменные данных, к которым вы можете получить доступ из объектов формы и методов.
tooltiptext_application_IntegerDataField_roottab = Объявите скалярные целочисленные переменные данных, к которым вы можете получить доступ из объектов формы и методов.
tooltiptext_application_IntegerMatrixDataField_formtab = Объявить массив 2D (матрица) Целые переменные данных, к которым вы можете получить доступ из объектов формы и методов.
tooltiptext_application_IntegerMatrixDataField_roottab = Объявить массив 2D (матрица) Целые переменные данных, к которым вы можете получить доступ из объектов формы и методов.
tooltiptext_application_JavaLibrary_roottab = Добавьте предварительно скомпилированную внешнюю библиотеку кода Java.
tooltiptext_application_Knob_formtab = Добавить объект ручки в текущую форму для выбора числового ввода с помощью ручки управления.
tooltiptext_application_Label_formtab = Добавьте объект метки текста в текущую форму для отображения некоторой информации в виде статического текста.
tooltiptext_application_LanguageLibrary_roottab = Откройте библиотеку языков, где вы можете добавить файлы локализации.
tooltiptext_application_ListBox_formtab = Добавить поле списка объекта к текущей форме.
tooltiptext_application_Log_formtab = Добавьте объект журнала в текущую форму, чтобы показать окно журнала с сообщениями от программного обеспечения COMSOL Multiphysics.
tooltiptext_application_MainMenu_windowtab = Добавьте в окно главное меню или выберите его.
tooltiptext_application_MainToolbar_windowtab = Добавьте панель инструментов в окно или выберите его.
tooltiptext_application_Menu_menutab = Добавьте узел меню.
tooltiptext_application_MenuDivider_menutab = Добавьте разделитель меню между двумя пунктами меню в меню.
tooltiptext_application_MenuItem_menutab = Добавьте элемент в меню.
tooltiptext_application_MenuToggleItem_menutab = Добавьте элемент Toggle в меню.
tooltiptext_application_MessageLog_formtab = Добавьте объект журнала сообщений в текущую форму, чтобы добавить окно сообщений для сообщений пользователю.
tooltiptext_application_MethodDefinition_addindefinitiontab = Добавить определение метода в определение добавления.
