tooltiptext_application_BooleanArrayDataField_formtab = Объявляйте Array Boolean переменными данных, к которым вы можете получить доступ из объектов формы и методов.
tooltiptext_application_BooleanArrayDataField_roottab = Объявляйте Array Boolean переменными данных, к которым вы можете получить доступ из объектов формы и методов.
tooltiptext_application_BooleanDataField_formtab = Объявляйте скалярные булевые переменные данных, к которым вы можете получить доступ из объектов и методов формы.
tooltiptext_application_BooleanDataField_roottab = Объявляйте скалярные булевые переменные данных, к которым вы можете получить доступ из объектов и методов формы.
tooltiptext_application_BooleanMatrixDataField_formtab = Объявите массив 2D (матрица) Булевыми переменными данных, к которым вы можете получить доступ из объектов формы и методов.
tooltiptext_application_BooleanMatrixDataField_roottab = Объявите массив 2D (матрица) Булевыми переменными данных, к которым вы можете получить доступ из объектов формы и методов.
tooltiptext_application_BrowserDisplay_formtab = Добавьте объект веб-страницы в текущую форму для отображения веб-страницы или другой информации на основе HTML.
tooltiptext_application_Button_formtab = Добавьте объект кнопки к текущей форме.
