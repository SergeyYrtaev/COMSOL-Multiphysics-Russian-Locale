tooltiptext_add_material_to_library_user_defined_library = Добавить материал в пользовательскую библиотеку материалов.
tooltiptext_add_results_parameters = Добавить локально доступные параметры в часть результатов для параметризированной постобработки.
tooltiptext_add_parameters = Добавьте доступные параметры в свою модель.
