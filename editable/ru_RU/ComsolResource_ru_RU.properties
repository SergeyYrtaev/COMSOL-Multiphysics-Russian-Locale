This_feature_is_obsolete_and_will_be_removed_in_a_future_version.Consider_replacing_it_by_the_new_version_of_Opaque_Surface_feature_that_supports_directional_dependence_of_surface_properties_available_from_the_boundary_features_list = Эта функция устарела и будет удалена в будущей версии.\nРассмотрите возможность замены его новой версией функции «Непрозрачная поверхность», которая поддерживает зависимость свойств поверхности от направления, доступных из списка граничных объектов.
This_feature_is_obsolete_and_will_be_removed_in_a_future_version.Consider_replacing_it_by_the_new_version_of_Semitransparent_Surface_feature_that_supports_directional_dependence_of_surface_properties_available_from_the_boundary_features_list = Эта функция устарела и будет удалена в будущей версии.\nРассмотрите возможность замены его новой версией функции «Полупрозрачная поверхность», которая поддерживает зависимость свойств поверхности от направления, доступных из списка граничных объектов.

This_feature_is_obsolete_and_will_be_discontinued_in_future_versions._Consider_using_the_new_Adsorption_feature_available_from_the_Physics_settings. = Эта функция устарела и будет прекращена в будущих версиях. Рассмотрите возможность использования новой функции адсорбции, доступной из настроек физики, раздела области или границы. Новая функция включает в себя еще два типа изотерм адсорбции: Toth и BET.
This_feature_is_obsolete_and_will_be_discontinued_in_future_versions._Consider_using_the_new_Flux_feature_available_from_the_Physics_settings,_Boundary_section. = Эта функция устарела и будет прекращена в будущих версиях. Рассмотрите возможность использования новой функции Flux, доступной из настроек физики, раздел «Границы». Новая функция предписывает диффузивный поток, в отличие от текущей функции, которая предписывает общий поток. Новая функция может быть легко применена на движущихся границах.
This_feature_is_obsolete_and_will_be_discontinued_in_future_versions._Consider_using_the_new_Inlet_feature_available_from_the_Physics_settings,_Boundary_section. = Эта функция устарела и будет прекращена в будущих версиях. Рассмотрите возможность использования новой функции входа, доступной из настроек физики, раздел «Границы».
This_feature_is_obsolete_and_will_be_discontinued_in_future_versions._Consider_using_the_new_Outlet_feature_available_from_the_Physics_settings,_Boundary_section. = Эта функция устарела и будет прекращена в будущих версиях. Рассмотрите возможность использования новой функции Outlet, доступной из настроек физики, раздел «Границы».
This_feature_is_obsolete_and_will_be_discontinued_in_future_versions._Consider_using_the_new_Thermoelectric_Effect_feature_available_from_the_Physics_settings,_Multiphysics_section. = Эта функция устарела и будет прекращена в будущих версиях. Рассмотрите возможность использования новой функции термоэлектрического эффекта, доступной в разделе «Мультифизика» в разделе «Физические настройки».
This_feature_is_obsolete_and_will_be_removed_in_future_versions = Эта функция устарела и будет удалена в будущих версиях.
This_feature_is_obsolete_and_will_be_removed_in_future_versions._A_new_version_of_Marangoni_Effect_multiphysics_coupling_is_available_from_the_Multiphysics_Couplings_window. = Эта функция устарела и будет удалена в будущих версиях.\nНовая версия мультифизической связи «Эффект Марангони» доступна в окне «Мультифизические связи».
This_feature_is_obsolete_and_will_be_removed_in_future_versions._Consider_transferring_features_related_to_radiation_in_participating_media_into_a_new_instance_of_the_Radiation_in_Participating_Media_physics_interface,_coupled_with_the_Heat_Transfer_interface_via_the_Heat_Transfer_with_Radiation_in_Participating_Media_multiphysics_coupling_feature. = Эта функция устарела и будет удалена в будущих версиях. Рассмотрим перенос функций, связанных с излучением в участвующих средах, в новый экземпляр интерфейса физики излучения в участвующих средах в сочетании с интерфейсом теплопередачи через теплопередачу с излучением в мультифизической связи с участием средств массовой информации.
This_feature_is_obsolete_and_will_be_removed_in_future_versions._Consider_using_either_a_new_coupling_feature_Nonlinear_Magnetostriction,_or_a_new_coupling_feature_Piezomagnetic_Effect_for_modeling_linear_magnetostriction. = Эта функция устарела и будет удалена в будущих версиях.\nConsider с использованием либо новой функции связи Нелинейная магнитострикция, либо новой функции связи Пьезомагнетизм для моделирования линейной магнитострикции.
This_feature_is_obsolete_and_will_be_removed_in_future_versions._Consider_using_either_a_new_feature_Amperes_law_nonlinear_magnetostrictive,_or_a_new_feature_Amperes_law_piezomagnetic_for_modeling_linear_magnetostriction. = Эта функция устарела и будет удалена в будущих версиях.\nРассмотрите возможность использования новой функции «Закон Ампера, нелинейная магнитострикция» или новой функции «Закон Ампера, пьезомагнетик» для моделирования линейной магнитострикции.
This_feature_is_obsolete_and_will_be_removed_in_future_versions._Consider_replacing_it_by_either_the_new_type_of_Gravity_node_or_by_one_of_the_following_nodes_Linearly_Accelerated_Frame;_Base_Excitation. = Эта функция устарела и будет удалена в будущих версиях.\nРассмотрите возможность замены его либо новым типом узла «Гравитация», либо одним из следующих узлов: «Линейно-ускоренный кадр»; Базовое возбуждение.
This_feature_is_obsolete_and_will_be_removed_in_future_versions._Consider_using_the_feature_Diffuse_Surface_instead = Эта функция устарела и будет удалена в будущих версиях. Вместо этого используйте функцию Diffuse Surface.
This_feature_is_obsolete_and_will_be_removed_in_future_versions._Consider_using_the_feature_Heat_Flux_instead = Эта функция устарела и будет удалена в будущих версиях. Вместо нее используйте функцию «Тепловой поток».
This_feature_is_obsolete_and_will_be_removed_in_future_versions._Consider_using_the_feature_Inflow_instead = Эта функция устарела и будет удалена в будущих версиях. Вместо этого используйте функцию Inflow.
This_feature_is_obsolete_and_will_be_removed_in_future_versions._Consider_using_the_feature_Opacity_instead = Эта функция устарела и будет удалена в будущих версиях. Вместо этого используйте функцию Opacity.
This_feature_is_obsolete_and_will_be_removed_in_future_versions._Consider_using_the_feature_Out-of-Plane_Heat_Flux_instead = Эта функция устарела и будет удалена в будущих версиях. Вместо нее используйте функцию «Тепловой поток вне плоскости».
This_feature_is_obsolete_and_will_be_removed_in_future_versions._Consider_using_the_feature_Magnetohydrodynamics_instead = Эта функция устарела и будет удалена в будущих версиях. Подумайте об использовании функции магнитогидродинамики вместо этого.
This_feature_is_obsolete_and_will_be_removed_in_future_versions._Consider_using_the_Magnetic_and_Electric_Field_interface_instead = Эта функция устарела и будет удалена в будущих версиях. Вместо этого используйте интерфейс магнитного и электрического поля.
This_feature_is_obsolete_and_will_be_removed_in_future_versions._Consider_using_the_new_Diffuse_Mirror_feature_instead. = Эта функция устарела и будет удалена в будущих версиях. Подумайте об использовании новой функции Diffuse Mirror.
This_feature_is_obsolete_and_will_be_removed_in_future_versions._Consider_using_the_new_global_Symmetry_feature_instead._Do_not_attempt_to_use_both_of_these_features_together. = Эта функция устарела и будет удалена в будущих версиях. Вместо этого рассмотрите возможность использования новой глобальной функции симметрии. Не пытайтесь использовать обе эти функции вместе.
This_feature_is_obsolete_and_will_be_removed_in_future_versions._Consider_using_the_new_Hygroscopic_Porous_Medium_feature_instead = Эта функция устарела и будет удалена в будущих версиях. Подумайте об использовании новой функции Hygroscopic Porous Medium.
This_feature_is_obsolete_and_will_be_removed_in_future_versions._Consider_using_the_new_Opaque_Surface_feature_instead. = Эта функция устарела и будет удалена в будущих версиях. Подумайте об использовании новой функции Opaque Surface.
This_feature_is_obsolete_and_will_be_removed_in_future_versions._Consider_using_the_new_Semitransparent_Surface_feature_instead. = Эта функция устарела и будет удалена в будущих версиях. Подумайте об использовании новой функции полупрозрачной поверхности.
This_feature_is_obsolete_and_will_be_removed_in_future_versions._Consider_using_the_Porous_Medium_feature_instead = Эта функция устарела и будет удалена в будущих версиях. Вместо этого используйте функцию Porous Medium.
This_feature_is_obsolete_and_will_be_removed_in_future_versions._Consider_using_the_Unsaturated_Porous_Medium_feature_instead = Эта функция устарела и будет удалена в будущих версиях. Вместо этого рассмотрите возможность использования функции «Ненасыщенная пористая средняя».
This_feature_is_obsolete_and_will_be_removed_in_future_versions._Consider_using_the_Packed_Bed_(based_on_Porous_material)_instead = Эта функция устарела и будет удалена в будущих версиях. Подумайте об использовании упакованной кровати (на основе пористого материала).
This_feature_is_obsolete_and_will_be_removed_in_future_versions._Consider_using_the_feature_Thin_Layer_instead = Эта функция устарела и будет удалена в будущих версиях. Подумайте об использовании функции тонкого слоя вместо этого.
This_feature_is_obsolete_and_will_be_removed_in_future_versions._Consider_using_the_feature_Viscous_Dissipation_instead = Эта функция устарела и будет удалена в будущих версиях. Вместо этого используйте функцию Viscous Dissipation.
This_feature_is_obsolete_and_will_be_removed_in_future_versions._Consider_using_a_new_feature_Thin_Layer_instead = Эта функция устарела и будет удалена в будущих версиях. Вместо этого рассмотрите возможность использования нового тонкого слоя.
This_feature_is_obsolete_and_will_be_removed_in_future_versions._Consider_using_a_new_feature_Thin_Film_instead = Эта функция устарела и будет удалена в будущих версиях. Вместо этого рассмотрите возможность использования нового тонкого фильма.
This_feature_is_obsolete_and_will_be_removed_in_future_versions._Consider_using_a_new_feature_Fracture_instead = Эта функция устарела и будет удалена в будущих версиях. Вместо этого рассмотрите возможность использования новой функции Fracture.
This_feature_is_obsolete_and_will_be_removed_in_future_versions._Consider_using_a_new_feature_Porous_Medium_instead = Эта функция устарела и будет удалена в будущих версиях. Подумайте об использовании новой функции Porous Medium.
This_feature_is_obsolete_and_will_be_removed_in_future_versions._Consider_using_a_new_feature_Unsaturated_Porous_Medium_instead = Эта функция устарела и будет удалена в будущих версиях. Рассмотрите возможность использования новой функции Ненасыщенная пористая средняя.
This_feature_is_obsolete_and_will_be_removed_in_future_versions._Consider_using_user_defined_layer_thickness_instead = Эта функция устарела и будет удалена в будущих версиях. Вместо этого рассмотрите возможность использования определенной пользователем толщины слоя.
This_feature_is_obsolete_and_will_be_removed_in_future_versions._Consider_combining_a_Thin_Layer_feature_on_one_side_of_the_pair_with_a_pair_Continuity_feature = Эта функция устарела и будет удалена в будущих версиях. Рассмотрите возможность объединения функции тонкого слоя на одной стороне пары с функцией непрерывности пары.
This_feature_is_obsolete_and_will_be_removed_in_future_versions._Consider_combining_a_Thin_Film_feature_on_one_side_of_the_pair_with_a_pair_Continuity_feature = Эта функция устарела и будет удалена в будущих версиях. Рассмотрите возможность объединения функции тонкого фильма на одной стороне пары с функцией непрерывности пары.
This_feature_is_obsolete_and_will_be_removed_in_future_versions._Consider_combining_a_Fracture_feature_on_one_side_of_the_pair_with_a_pair_Continuity_feature = Эта функция устарела и будет удалена в будущих версиях. Рассмотрите возможность объединения функции Разлома на одной стороне пары с функцией непрерывности пары.
This_feature_is_obsolete_and_will_be_removed_in_future_versions._Consider_using_specialized_multiphysics_coupling_such_as_Nonisothermal_Flow,_Thermal_Expansion,_Electromagnetic_Heating_or_Thermoelectric_Effect_instead._If_no_specialized_coupling_is_available_for_the_physics_used_in_the_model,_you_can_control_the_model_input_for_temperature_from_the_model_input_section_in_the_physics_feature_settings = Эта функция устарела и будет удалена в будущих версиях. Рассмотрите возможность использования специализированной мультифизической связи, такой как неизотермический поток, тепловое расширение, электромагнитное нагревание или термоэлектрический эффект. Если нет специализированной связи для физики, используемой в модели, вы можете управлять вводом модели для температуры из раздела ввода модели в настройках функции физики.
This_feature_is_obsolete_and_will_be_removed_in_future_versions._Consider_using_specialized_multiphysics_coupling_such_as_Nonisothermal_Flow_or_Reacting_Flow_instead._If_no_specialized_coupling_is_available_for_the_physics_used_in_the_model,_you_can_control_the_model_inputs_for_pressure_and_velocity_from_the_model_input_section_in_the_physics_feature_settings = Эта функция устарела и будет удалена в будущих версиях. Вместо этого рассмотрите возможность использования специализированной мультифизической связи, такой как неизотермический поток или реакционный поток. Если нет специализированной связи для физики, используемой в модели, вы можете управлять входами модели для давления и скорости из раздела ввода модели в настройках функции физики.
This_feature_is_obsolete_and_will_be_removed_in_future_versions._Consider_using_the_Thickness_feature_available_at_the_interface_level_instead. = Эта функция устарела и будет удалена в будущих версиях. Подумайте об использовании функции Thickness, доступной на уровне интерфейса.
This_feature_is_obsolete_and_will_be_removed_in_future_versions._Consider_using_the_new_Phase_Change_Material_subfeature_that_is_available_for_the_features_Fluid,_Solid,_and_Porous_Medium = Эта функция устарела и будет удалена в будущих версиях. Рассмотрите возможность использования новой подфункции «Материал изменения фазы», которая доступна для функций «Жидкий, твердый и пористый средний».
This_feature_is_obsolete_and_will_be_removed_in_future_versions._Consider_using_a_Reacting_Flow_coupling_feature_instead = Эта функция устарела и будет удалена в будущих версиях. Подумайте об использовании функции мультифизической связи Reacting Flow. Функция связи включает поддержку турбулентного смешивания, а также обработку стенки массового переноса для турбулентного потока. 
This_feature_is_obsolete_and_will_be_removed_in_future_versions._Consider_using_the_Surface-to-Surface_Radiation_physics_interface_coupled_with_the_Heat_Transfer_physics_interface_via_the_Heat_Transfer_with_Surface-to-Surface_Radiation_multiphysics_coupling_feature_for_modeling_radiation_effects = Эта функция устарела и будет удалена в будущих версиях. Рассмотрите возможность использования интерфейса физики излучения от поверхности к поверхности в сочетании с интерфейсом физики теплопередачи через теплопередачу с функцией мультифизической связи излучения от поверхности к поверхности для моделирования радиационных эффектов.
This_feature_is_obsolete_and_will_be_removed_in_future_versions._The_Initial_Interface_feature_is_not_required_anymore = Эта функция устарела и будет удалена в будущих версиях.\n Функция начального интерфейса больше не требуется.
This_feature_is_obsolete_and_will_be_removed_in_a_future_version._A_new_version_of_the_same_feature_is_available_when_using_a_new_version_of_the_physics_interface_available_from_the_Add_Physics_window = Эта функция устарела и будет удалена в будущей версии.\nНовая версия той же функции доступна при использовании новой версии интерфейса физики, доступной в окне «Добавить физику».
This_feature_is_obsolete_and_will_be_removed_in_future_versions._Consider_replacing_it_with_a_global_Parameter_Estimation_node,_either_by_right-clicking_the_component_node_in_the_Model_Builder,_or_add_it_from_the_Add_Physics_window = Эта функция устарела и будет удалена в будущих версиях.\nРекомендуется заменить её глобальным узлом оценки параметров: щёлкните правой кнопкой мыши узел компонента в Построителе модели или добавьте его из окна «Добавить физику».
This_interface_is_obsolete_and_will_be_discontinued_in_future_versions._Consider_using_the_new_Current_Distribution,_Boundary_Elements_interface_available_from_the_Add_Physics_window. = Этот интерфейс устарел и будет прекращен в будущих версиях.\nРассмотрите возможность использования нового интерфейса «Распределение тока, граничные элементы», доступного в окне «Добавить физику».
This_interface_is_obsolete_and_will_be_discontinued_in_future_versions._Consider_using_the_new_Transport_of_Diluted_Species_in_Porous_Media_interface_available_from_the_Add_Physics_window. = Этот интерфейс устарел и будет прекращен в будущих версиях.\nРассмотрите возможность использования нового интерфейса «Перенос разбавленных частиц в пористой среде», доступного в окне «Добавить физику».
