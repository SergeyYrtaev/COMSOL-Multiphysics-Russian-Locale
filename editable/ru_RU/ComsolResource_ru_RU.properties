The_accent_color_will_serve_as_an_accent_for_the_login_screen_button_and_on_the_top_bar_We_recommend_selecting_a_color_that_is_one_or_two_shades_darker_than_your_primary_color_you_must_enter_a_valid_hexadecimal_color_code_or_use_the_color_picker_by_clicking_on_the_color_swatch = Цвет акцента будет служить в качестве акцента для кнопки экрана входа и на верхней панели. Мы рекомендуем выбрать цвет, который на один или два оттенка темнее вашего основного цвета. Вы должны ввести действительный шестнадцатеричный цветовой код или использовать цветовой выборщик, нажав на цветной образец.
