tooltiptext_report_add_complete = Составьте подробный отчет о текущей модели.
tooltiptext_report_add_custom = Создайте пустой отчет, который вы можете заполнить содержимым вручную.
tooltiptext_report_add_document = Создание узла Документации в соответствии с Отчетами для общих целей документации.
tooltiptext_report_add_from_template = Создайте отчет на основе шаблона.
tooltiptext_report_add_intermediate = Составьте отчет о текущей модели промежуточного уровня детализации.
tooltiptext_report_add_presentation_custom = Создайте пустую презентацию, которую вы можете заполнить содержимым вручную.
tooltiptext_report_add_presentation_detailed = Создайте подробную презентацию текущей модели.
