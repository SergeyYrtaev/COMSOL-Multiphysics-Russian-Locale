The_Waveguide_End_Impedance_option_for_the_Impedance_boundary_condition_that_was_originally_used_in_this_model_is_obsolete_except_in_3D_and_2D_axisymmetry._It_has_been_removed_because_it_does_not_make_sense_physically_outside_of_those_dimensions._DELETE_the_current_impedance_boundary_condition_and_apply_a_new_one_choosing_from_the_list_of_available_options. = Опция Waveguide End Impedance для граничного условия Impedance, которая первоначально использовалась в этой модели, устарела, за исключением аксисимметрии 3D и 2D. Она была удалена, потому что физически не имеет смысла вне этих измерений. Удалите текущее граничное условие импеданса и примените новое, выбрав из списка доступных вариантов.
