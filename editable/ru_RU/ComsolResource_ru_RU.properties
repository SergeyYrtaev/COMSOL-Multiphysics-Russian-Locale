tooltiptext_tdp_UserDefinedSpecies = Создает определенный пользователем вид, который может быть включен в химическую систему.
tooltiptext_tdp_BuiltinPropertyPackage = Создает пакет, содержащий свойства набора видов и фаз, присутствующих в химической системе.
tooltiptext_tdp_ExternalPropertyPackage = Создает пакет, содержащий свойства набора видов и фаз, присутствующих в химической системе. В пакете используется установленное программное обеспечение, совместимое с CAPE-OPEN.
tooltiptext_tdp_PredefinedPropertyPackage = Создает пакет, содержащий свойства видов и фаз, присутствующих в сухом воздухе, влажном воздухе или водяном паре.
tooltiptext_circuitConnection = Соедините элементы схемы с помощью мыши.
tooltiptext_circuitHub = Поместите точку подключения в схему с помощью мыши.
tooltiptext_cleanup_diagram = Очистите диаграмму (удалите несвязанные линии).
tooltiptext_clearmeshesmenu = Очистите все встроенные сетчатые данные в модели, чтобы уменьшить размер модели.
tooltiptext_clear_addins = Очистить все импортные дополнения.
tooltiptext_clear_plot_data = Очистить все данные графиков, хранящиеся в модели.
tooltiptext_clearsolutions = Очистить решения в текущем исследовании.
tooltiptext_clearsolutionsmenu = Очистить все решения.
tooltiptext_clip_ClipBox = Добавьте коробку с клипом в вид.
tooltiptext_clip_ClipCylinder = Добавьте цилиндр для зажима в вид.
tooltiptext_clip_ClipPlane = Добавить секущую плоскость в вид.
tooltiptext_clip_ClipSphere = Добавьте сферу клипа в View.
tooltiptext_ClusterComputing = Добавьте этап исследования кластерных вычислений к текущему исследованию. Используйте этот шаг, когда вы хотите отправить пакетные задания COMSOL Multiphysics на планировщик работы, который, в свою очередь, выполняет пакетную работу на втором компьютере или кластере.
tooltiptext_ClusterSweep = Добавьте шаг исследования Cluster Sweep к текущему исследованию. Используйте этот шаг, чтобы найти решение для последовательности стационарных или зависящих от времени симуляций, которые возникают, когда вы изменяете некоторые параметры, представляющие интерес.
tooltiptext_CombineSolution = Добавить этап изучения комбинированных решений для объединения решений с использованием конкатенации или суммирования и для удаления решений.
tooltiptext_connecttotomcatserver = Подключите COMSOL к серверу.
tooltiptext_constraintgroup = Сделайте выбранное ограничение активным в этой группе ограничений.
tooltiptext_constraint_button_dummy = Создайте функцию ограничения, выбрав точки / края и поместив символ.
tooltiptext_construction_draw = Создание объектов геометрии конструкции при рисовании в Графическом окне.
tooltiptext_contour = Добавить контурный график в группу графиков, чтобы отобразить величину в виде контурных линий или заполненных контуров.
tooltiptext_contour_3d = Добавить контурный график в группу графиков, чтобы отобразить величину в виде контурных линий или заполненных контуров на поверхностях 3D-геометрии.
tooltiptext_copy_entity = Копировать выбранный узел.
tooltiptext_copysolutions = Сделайте копию решения.
tooltiptext_create_geometry_from_mesh = Создайте новый компонент модели с геометрией, созданной из сетки.
tooltiptext_create_mesh_part = Создайте сетку.
tooltiptext_create_part = Создайте геометрическую часть.
tooltiptext_dataset_add_selection = Добавить выбор в текущий набор данных.
tooltiptext_dataset_create_deformed_geom = Создайте деформированную геометрию из текущего набора данных.
tooltiptext_dataset_Array1D = Создать набор данных «Массив 1D» для формирования массива данных для графиков на основе другого набора данных 1D.
tooltiptext_dataset_create_mesh = Создайте сетку в новом компоненте из данных сетки, определенных набором данных.
tooltiptext_dataset_create_mesh_part = Создать часть сетки из данных сетки, определённых набором данных.
tooltiptext_dataset_CutLine2D = Создать набор данных «Линия сечения 2D» для данных вдоль линии в 2D.
tooltiptext_dataset_CutLine3D = Создать набор данных «Линия сечения 3D» для данных вдоль линии в 3D.
tooltiptext_dataset_CutPlane = Создать набор данных «Плоскость сечения» для данных в 3D.
tooltiptext_dataset_CutPoint2D = Создать набор данных «Точка сечения 2D» для данных в точке 2D.
tooltiptext_dataset_CutPoint3D = Создать набор данных «Точка сечения 3D» для данных в точке 3D.
tooltiptext_dataset_MeshImportParameters = Создать атрибут, указывающий, какое время или параметры использовать при создании сетки из набора данных.
tooltiptext_dataset_Shell = Создайте набор данных Shell для визуализации верхней и нижней поверхностей оболочки.
tooltiptext_debug_diagram = Диаграмма отладки.
tooltiptext_default_constraintgroup = Сделайте выбранное ограничение активным во всех группах ограничений.
tooltiptext_default_loadgroup = Сделайте выбранную нагрузку активной во всех группах нагрузки.
tooltiptext_defeature_detach = Отсоедините лица от объекта геометрии и сформируйте новый объект.
tooltiptext_defeature_faces = Удалить и заменить лица из объекта геометрии.
tooltiptext_defeature_fillets = Удалите филе из объекта геометрии.
tooltiptext_defeature_holes = Удалите отверстия из объекта геометрии.
tooltiptext_defeature_interferences = Обнаружение помех между объектами геометрии.
tooltiptext_defeature_shortedges = Удалите короткие края от объекта геометрии.
tooltiptext_defeature_sliverfaces = Удалите скользящие грани из объекта геометрии.
tooltiptext_defeature_smallfaces = Удалите маленькие лица из объекта геометрии.
tooltiptext_defeature_spikes = Удалите шипы, которые представляют собой длинные и узкие выступы на краях или углах лица, определенных двумя или тремя краями, от объекта геометрии.
tooltiptext_Delete1 = Удалите выбранные геометрические объекты, объекты или функции.
tooltiptext_Delete2 = Удалите выбранные геометрические объекты, объекты или функции.
tooltiptext_Delete3 = Удалите выбранные геометрические объекты, объекты или функции.
tooltiptext_delete_entity = Удалить выбранный узел.

# tooltiptext_design_* are tooltip texts for the Physics Builder.
tooltiptext_design_BooleanInput = Добавить булевой входной узел для определения пользовательского ввода, где значение данных является булевым (либо 0, либо 1).
tooltiptext_design_CodeEditor = Откройте окно редактора кода для редактирования кода Java, который вы можете добавить для реализации специальных методов.
tooltiptext_design_CoefficientFormEquation = Добавить узел уравнения формы коэффициента для определения дифференциального уравнения с использованием формулы коэффициента.
tooltiptext_design_Constraint = Добавьте узел ограничения, чтобы добавить ограничение, определив выражение, которое будет ограничено до нуля.
tooltiptext_design_ConstraintSection = Добавьте узел Constraint Settings Section, чтобы добавить раздел настроек ограничений в окно настроек.
tooltiptext_design_ContactPairFeature = Добавьте узел функции Pair Contact, чтобы определить новую функцию контакта пары.
tooltiptext_design_DependentVariable = Добавить зависимый переменный узел для определения зависимой переменной (полевой переменной) в компоненте.
tooltiptext_design_DeviceModelFeature = Добавьте узел функции модели устройства, чтобы определить новую функцию модели устройства.
tooltiptext_design_EquationDisplayDef = Добавьте узел отображения уравнений, чтобы определить отображение уравнения, которое вы можете ввести с помощью синтаксиса LaTeX.
tooltiptext_design_EquationVariableDefinition = Добавить узел переменного определения для определения переменной только при решении для поставщика определения.
tooltiptext_design_FeatureComponent = Добавить узел компонент функции для сбора связанных узлов или группировать узлы вместе, чтобы избежать длинных списков узлов под функцией.
tooltiptext_design_FeatureInput = Добавить узел ввода функций для определения ввода функций: пользовательский ввод, который также поддерживает связь с любой объявленной переменной.
tooltiptext_design_FieldVariable = Добавить зависимый узел переменной декларации, чтобы объявить зависимую переменную (полевую переменную) в интерфейсе физики.
tooltiptext_design_GeneralFormEquation = Добавить узел уравнения общей формы для определения дифференциального уравнения с использованием общей формулировки.
tooltiptext_design_IncludeDesign = Используйте узел импорта для импорта других файлов конструктора в ваш проект Physics Builder.
tooltiptext_design_InitMaker = Добавить узел инициализации степени свободы для определения начальных значений переменных со степенями свободы в компоненте.
tooltiptext_design_InputGroup = Добавьте узел User Input Group для определения группы пользовательского интерфейса, которая представляет собой набор пользовательских входов, групп пользовательского ввода и параметров материала.
tooltiptext_design_LayeredShellFeature = Добавьте узел функции слоистой оболочки, чтобы определить новую функцию слоистой оболочки.
tooltiptext_design_MaterialGroup = Добавьте узел Material Property Group, чтобы добавить материальную собственность в группу материальной собственности или создать новую группу материальной собственности.
tooltiptext_design_MaterialList = Добавьте узел Material List, чтобы создать список материалов, с которым вы можете связать свойства материала.
tooltiptext_design_MaterialParameter = Добавить узел свойств материала, чтобы определить свойство материала в компоненте.
tooltiptext_design_MeshSuggestion_physics = Добавьте узел Сетка Defaults для определения значений параметров сетки по умолчанию для подходящей генерации сетки.
tooltiptext_design_MigrationVersion = Добавьте ветвь Версии, которая содержит операции миграции из старой версии в новую.
tooltiptext_design_MultiphysicsInterface_add = Добавьте новый узел Multiphysics Interface, чтобы начать создание мультифизического интерфейса для связанного мультифизического приложения.
tooltiptext_design_OverrideRule = Добавьте узел правил Override для определения новых правил Override в дополнение к эксклюзивным и способствующим типам.
tooltiptext_design_PairFeature = Добавьте узел Pair Feature для определения новой функции пары.
tooltiptext_design_PeriodicFeature = Добавьте узел периодической функции, чтобы определить новую периодическую функцию.
tooltiptext_design_PhysicalQuantity = Добавить физический узел для определения новой физической величины.
tooltiptext_design_PhysicsArea = Добавьте физический узел, где вы можете классифицировать физику в разных областях физики.
tooltiptext_design_PhysicsBoundaryCondition = Добавить узел пограничного состояния для определения нового граничного условия.
tooltiptext_design_PhysicsBoundaryFeature = Добавьте узел граничных признаков, чтобы определить новую граничную особенность.
tooltiptext_design_PhysicsDomainCondition = Добавьте узел состояния области, чтобы определить новое условие области.
tooltiptext_design_PhysicsDomainFeature = Добавьте узел функции области, чтобы определить новую функцию области.
tooltiptext_design_PhysicsEdgeCondition = Добавьте узел Edge Condition, чтобы определить новую особенность на два уровня ниже уровня геометрической сущности физики.
tooltiptext_design_PhysicsEdgeFeature = Добавьте узел Edge Feature, чтобы определить новую функцию edge.
tooltiptext_design_PhysicsFeature = Добавьте узел Generic Feature для определения новой общей функции, поддерживающей несколько уровней геометрических объектов.
tooltiptext_design_PhysicsFeatureLink = Добавить узел Feature Link, чтобы добавить ссылку на функцию, определенную вне определения физического интерфейса, и включить ее в этот физический интерфейс.
tooltiptext_design_PhysicsGlobalFeature = Добавьте узел Global Feature, чтобы определить новую глобальную функцию.
tooltiptext_design_PhysicsInterface_add = Добавьте новый узел интерфейса физики, чтобы начать создавать физический интерфейс.
tooltiptext_design_PhysicsMaker = Добавить узел компонента для создания компонента: набор, например, переменных, уравнений и пользовательских входов.
tooltiptext_design_PhysicsMakerLink = Добавьте узел Component Link, чтобы включить все элементы, определенные в компоненте, как если бы они были частью физического интерфейса.
tooltiptext_design_PhysicsPointFeature = Добавьте узел Point Feature для определения новой функции point.
tooltiptext_design_PhysicsProperty = Добавьте узел свойств, чтобы определить свойство, которое содержит пользовательские входные данные и переменные, которые важны для всего физического интерфейса.
tooltiptext_design_PhysicsPropertyLink = Добавить узел Property Link, чтобы добавить ссылку на свойство, определенное вне определения физического интерфейса, и включить его в этот физический интерфейс.
tooltiptext_design_PostDefault_physics = Добавьте узел Results Defaults для определения графиков по умолчанию, адаптированных к физике.
tooltiptext_design_ReferenceInput = Добавить узел ввода пользователя для определения пользовательского ввода, где данные могут содержать только значения из одного или нескольких списков объектов модели.
tooltiptext_design_Section = Добавить узел раздела, чтобы создать раздел для группы пользовательского ввода в окне настроек узла.
tooltiptext_design_SelectableInput = Добавить выбираемый узел ввода для определения пользовательского ввода, где данные могут содержать только значения из списка.
tooltiptext_design_SharedQuantity = Добавьте узел определения общего количества, чтобы определить количество как общее количество, которое может использоваться другими частями физики или решателями.
tooltiptext_design_SolverSuggestion_physics = Добавьте узел Study/решатель Defaults для определения параметров исследования и решателя по умолчанию, адаптированных к физике.
tooltiptext_design_TensorFunction = Добавить узел тензорной функции для определения новой тензорной функции.
tooltiptext_design_TextForm = Добавьте текстовую метку в качестве статического текста в окне настроек для функции. Текст может содержать пояснения о том, как использовать функцию или другую информацию.
tooltiptext_design_UserInput = Добавьте узел ввода пользователя, чтобы определить пользовательский ввод для некоторой величины, которую пользователь должен указать.
tooltiptext_design_Variable = Добавить узел переменной декларации к компоненту, чтобы указать свойства переменной.
tooltiptext_design_VariableDefinition = Добавить узел переменного определения для определения переменной, используя выражение, функцию формы или пользовательский ввод, в компоненте.
tooltiptext_design_WeakConstraint = Добавьте слабый узел ограничения, чтобы добавить ограничение слабой формы, определив целостность.
tooltiptext_design_WeakEquation = Добавьте узел уравнения слабой формы, чтобы добавить вклад уравнения слабой формы, определив целое.
tooltiptext_design_buttons = Добавьте ряд кнопок в окно настроек интерфейса функции или физики в конструкторе моделей.
tooltiptext_design_category = Добавьте узел определения меню графика, чтобы определить меню графика, в которые вы можете группировать связанные переменные.
tooltiptext_design_interfaceComponent = Добавьте узел компонента физического интерфейса для сбора связанных узлов или группирования узлов вместе, чтобы избежать длинных списков узлов под физическим интерфейсом.
tooltiptext_design_selection = Добавьте узел Компонент выбора, чтобы создать выбор, который вы можете использовать при определении других вариантов.
tooltiptext_designpreviewaction = Показать предварительный просмотр пользовательского интерфейса для текущего компонента для данного типа геометрии.

# tooltiptext_diagramfeature_* are tooltip texts for the Electrical Circuits diagram.
tooltiptext_diagramfeature_Circuit_AmMeter_0 = Поместите измеритель Ампера на схему с помощью мыши.
tooltiptext_diagramfeature_Circuit_BjtNpn_0 = Поместите NPN BJT на схему с помощью мыши.
tooltiptext_diagramfeature_Circuit_BjtPnp_0 = Поместите PNP BJT в схему с помощью мыши.
tooltiptext_diagramfeature_Circuit_Capacitor_0 = Поместите конденсатор в схему с помощью мыши.
tooltiptext_diagramfeature_Circuit_CurrentCurrentSource_0 = Поместите источник тока, управляемый током, на схему с помощью мыши.
tooltiptext_diagramfeature_Circuit_CurrentSourceCircuit_0 = Поместите источник тока в схему с помощью мыши.
tooltiptext_diagramfeature_Circuit_CurrentVoltageSource_0 = Поместите источник напряжения, управляемый током, в схему с помощью мыши.
tooltiptext_diagramfeature_Circuit_Diode_0 = Поместите Диод в схему с помощью мыши.
tooltiptext_diagramfeature_Circuit_GroundNode_0 = Поместите наземный узел в схему с помощью мыши.
tooltiptext_diagramfeature_Circuit_Inductor_0 = Поместите индуктор в схему с помощью мыши.
tooltiptext_diagramfeature_Circuit_ModelDeviceIV_0 = Поместите внешний I Vs. U на схему с помощью мыши.
tooltiptext_diagramfeature_Circuit_ModelDeviceVI_0 = Поместите внешний U Vs. I на схему с помощью мыши.
tooltiptext_diagramfeature_Circuit_ModelTerminalIV_0 = Поместите внешний I-терминал в схему с помощью мыши.
tooltiptext_diagramfeature_Circuit_MosfetN_0 = Поместите n-канальный MOSFET на схему с помощью мыши.
tooltiptext_diagramfeature_Circuit_MosfetP_0 = Поместите P-канал MOSFET на схему с помощью мыши.
tooltiptext_diagramfeature_Circuit_Resistor_0 = Поместите резистор в схему с помощью мыши.
tooltiptext_diagramfeature_Circuit_SubCircuit_0 = Поместите субсхему в схему с помощью мыши.
tooltiptext_diagramfeature_Circuit_Transformer_0 = Поместите трансформатор в схему с помощью мыши.
tooltiptext_diagramfeature_Circuit_VoltageCurrentSource_0 = Поместите источник тока, управляемый напряжением, на схему с помощью мыши.
tooltiptext_diagramfeature_Circuit_VoltageSource_0 = Поместите источник напряжения в схему с помощью мыши.
tooltiptext_diagramfeature_Circuit_VoltageVoltageSource_0 = Поместите источник напряжения, управляемый напряжением, на схему с помощью мыши.
tooltiptext_diagramfeature_Circuit_VoltMeter_0 = Поместите счетчик Вольта в схему с помощью мыши.

tooltiptext_dimension = Добавьте узел View к текущему компоненту модели, чтобы контролировать вид и освещение в окне Graphics.
tooltiptext_dimension_button_dummy = Создайте функцию измерения, выбрав точки / края и поместив символ.
tooltiptext_disconnectfromtomcatserver = Отключите COMSOL от сервера.
tooltiptext_draw_circle_center = Нарисуйте круг в графическом окне.
tooltiptext_draw_circle_corner = Нарисуйте круг в графическом окне, щелкнув два угла ограниченного квадрата.
tooltiptext_draw_circular_arc = Нарисуйте круговую дугу в окне Графики, щелкнув начальную точку, центральную точку и угол дуги.
tooltiptext_draw_circular_arc_tangent = Нарисуйте круговую дугу в окне Графики, щелкнув начальную точку, начальное касательное направление и конечную точку дуги.
tooltiptext_draw_circular_arc_3p = Нарисуйте круговую дугу в окне Графики, щелкнув три точки на дуге.
tooltiptext_draw_cubic_segment = Нарисуйте сегменты кубической кривой многоугольника Безье в окне Графики.
tooltiptext_draw_ellipse_center = Нарисуйте эллипс в графическом окне.
tooltiptext_draw_ellipse_corner = Нарисуйте эллипс в окне Графики, щелкнув двумя углами ограниченного прямоугольника.
tooltiptext_draw_interpolation_points = Нарисуйте кривую интерполяции в окне Графики, щелкнув несколько точек.
tooltiptext_draw_interpolation_sto = Нарисуйте кривую интерполяции в окне Графики, щелкнув начальную точку, начальное касательное направление и ряд других точек.
tooltiptext_draw_interval = Нарисуйте интервал (линейный сегмент) в окне Графики.
tooltiptext_draw_line_segment = Нарисуйте сегменты линии полигона Безье в окне Графики.
tooltiptext_draw_point1 = Добавьте точку в окно графики.
tooltiptext_draw_point2 = Добавьте точку в окно графики.
tooltiptext_draw_polygon = Нарисуйте многоугольник в графическом окне.
tooltiptext_draw_quadratic_segment = Нарисуйте сегменты квадратичной кривой многоугольника Безье в окне Графики.
tooltiptext_draw_rect_center = Нарисуйте центрированный прямоугольник в графическом окне.
tooltiptext_draw_rect_corner = Нарисуйте прямоугольник в графическом окне.
tooltiptext_draw_sketch = Покажите эскиз в графическом окне. Вы можете редактировать его, перетаскивая точки и края.
tooltiptext_draw_square_center = Нарисуйте центрированный квадрат в графическом окне.
tooltiptext_draw_square_corner = Нарисуйте квадрат в графическом окне.
tooltiptext_drawconstr_angle = Создайте функцию измерения угла, выбрав два края или точку и поместив символ.
tooltiptext_drawconstr_coincident = Создайте функцию ограничения совпадения, выбрав две точки / края и поместив символ.
tooltiptext_drawconstr_concentric = Создать концентрическую функцию ограничения путем выбора круглых краев и/или точек и размещения символа.
tooltiptext_drawconstr_constraint = Умное ограничение, тип которого зависит от выбора. Создайте функцию ограничения, выбрав точки / края и поместив символ.
tooltiptext_drawconstr_dimension = Умное измерение, тип которого зависит от выбора. Создайте функцию сдерживающего измерения, выбрав точки / края и поместив символ.
tooltiptext_drawconstr_dirdistance = Создайте функцию измерения прямого расстояния, выбрав две точки или изогнутые края и необязательно прямой край и символ размещения.
tooltiptext_drawconstr_distance = Создайте функцию измерения расстояния, выбрав один край или две точки / края и поместив символ.
tooltiptext_drawconstr_equaldistance = Создайте функцию ограничения равного расстояния, выбрав две точки / края и дважды поместив символ.
tooltiptext_drawconstr_equalradius = Создайте функцию ограничения равного радиуса, выбрав круговой край и поместив символ два раза.
tooltiptext_drawconstr_horizontal = Создайте функцию горизонтального ограничения, выбрав один или несколько прямых краев и поместив символ.
tooltiptext_drawconstr_parallel = Создайте функцию параллельного ограничения, выбрав прямые края и поместив символ.
tooltiptext_drawconstr_perpendicular = Создайте перпендикулярную функцию ограничения, выбрав два прямых края или вершину, которая имеет ровно два смежных края и символ размещения.
tooltiptext_drawconstr_position = Создайте функцию измерения позиции, выбрав точку и поместив символ.
tooltiptext_drawconstr_radius = Создайте функцию измерения Радиуса, выбрав круговой край и поместив символ.
tooltiptext_drawconstr_tangentconstraint = Создайте функцию Tangent Constraint, выбрав точку или два края (и необязательно одну или две вершины) и поместив символ.
tooltiptext_drawconstr_totaledgelength = Создайте функцию измерения Total Edge Length, выбрав край (и) и поместив символ.
tooltiptext_drawconstr_vertical = Создайте функцию вертикального ограничения, выбрав один или несколько прямых краев и поместив символ.
tooltiptext_drawconstr_xdistance = Создайте функцию измерения x-Distance, выбрав две точки или изогнутые края и поместив символ.
tooltiptext_drawconstr_ydistance = Создайте функцию измерения y-Distance, выбрав две точки или изогнутые края и поместив символ.
tooltiptext_duplicate_entity = Дублировать выбранный узел.
tooltiptext_edit_drawobject = Редактировать выбранный объект геометрии, перемещая его точки в графическом окне.
tooltiptext_entity_properties = Откройте окно свойств для просмотра свойств выбранного узла.
tooltiptext_evaluate = Оценка значений данных, определенных в соответствии с производными значениями.
tooltiptext_evaluate2d = Оценка значений данных, определенных в соответствии с производными значениями.
tooltiptext_evaluate3d = Вычислить значения данных, определённые в разделе «Производные значения».
tooltiptext_evaluation_EvalGlobal = Глобальное вычисление
tooltiptext_evaluation_EvalPoint = Вычисление в точке
tooltiptext_evaluation_group_clear = Очистить выбранную группу вычислений.
tooltiptext_evaluation_group_copy_to_table = Копировать выбранную группу вычислений в таблицу.
tooltiptext_evaluation_group_execute = Выполнить выбранную группу вычислений.
tooltiptext_evaluation_group_plot_contour = Построить группу вычислений на контурном графике.
tooltiptext_evaluation_group_plot_graph = Построить группу вычислений на графике.
tooltiptext_evaluation_group_plot_surface = Построить группу вычислений на поверхностном графике.
tooltiptext_evaluationgroup_EvaluationGroup = Создать группу вычислений, объединяющую несколько узлов численного вычисления.
tooltiptext_export_Animation = Создать анимацию решения в окне «Графика» или экспортировать её как GIF-, Flash- или AVI-файл.
tooltiptext_export_data = Экспорт содержимого графика в виде файла данных.
tooltiptext_export_Image1D = Добавьте узел 1D Image в разделе Экспорт для хранения 1D-графика в виде изображения (в формате файлов EPS, PNG, BMP, JPEG, TIFF или GIF).
tooltiptext_export_Image2D = Добавьте 2D-узел изображения в разделе Экспорт для хранения 2D-графика в виде изображения (в формате PNG, BMP, JPEG, TIFF или GIF).
tooltiptext_export_Image3D = Добавьте 3D-узел изображения в разделе Экспорт для хранения 3D-графика в виде изображения (в формате PNG, BMP, JPEG, TIFF или GIF-файла).
tooltiptext_export_materials = Экспорт материалов под выбранным узлом в файл Model XML.
tooltiptext_export_Player = Создайте плеер для создания анимации непосредственно в окне графики COMSOL Desktop.
tooltiptext_extradim_AttachDimensions = Добавьте прилагаемое измерение, которое образует картезианский продукт с набором дополнительных измерений.
tooltiptext_extradim_Integration = Добавьте оператор для интеграции по дополнительным измерениям.
tooltiptext_file_menu = Нажмите здесь, чтобы создать новую модель, открыть или сохранить модели, получить доступ к документации, управлять настройками и лицензиями, а также подключаться к серверу или отключаться от него.

tooltiptext_fliphorizontal = Переверните выбранное устройство горизонтально.
tooltiptext_flipvertical = Переверните выбранное устройство вертикально.

# tooltiptext_flsh_* are tooltip texts for some features in the Chemical Engineering Flowsheet diagram.
tooltiptext_flsh_add_custom_thermo = Добавьте собственное определение термодинамики в интерфейс Chemical Engineering Flowsheet.
tooltiptext_flsh_add_feed_port = Добавить в выбранный блок ввод корма.
tooltiptext_flsh_add_product_port = Добавить розетку продукта в выбранный блок.

tooltiptext_function_Analytic = Добавить узел аналитической функции для определения аналитической функции.
tooltiptext_function_Interpolation = Добавить узел функции интерполяции для определения функции интерполяции.
tooltiptext_function_Piecewise = Добавьте узел функции Piecewise, чтобы определить функцию по частям.
tooltiptext_FunctionSweep = Добавьте шаг исследования Function Sweep для создания развертки функций, определенных под узлом Switch.
tooltiptext_geom_Array = Создать массив (линейный или прямоугольный в 2D, линейный или трехмерный в 3D) идентичных объектов геометрии.
tooltiptext_geom_Block = Добавьте блок к текущей геометрии.
tooltiptext_geom_build_all = Постройте все функции в текущей геометрии.
tooltiptext_geom_build_all_objects = Постройте все функции, предшествующие объединению формы / сборке, в текущей геометрии.
tooltiptext_geom_CapFaces = Добавьте колпачки для заполнения отверстий в геометрии или для разделения геометрии.
tooltiptext_geom_Chamfer = Добавьте шарфы в выбранные вершины в геометрии, чтобы создать вырезанные углы.
tooltiptext_geom_Chamfer3D = Добавьте шарфы для резки углов в 3D-геометрии.
tooltiptext_geom_Check = Проверьте достоверность объектов геометрии.
tooltiptext_geom_clear = Ясная последовательность геометрии тока.
tooltiptext_geom_CentroidMeasurement = Создавайте параметры, измеряющие центроид выбранных вершин.
tooltiptext_geom_Compose = Составьте объект геометрии из существующих объектов геометрии, используя формулу набора, содержащую булевы операторы.
tooltiptext_geom_Cone = Добавьте конус к текущей геометрии.
tooltiptext_geom_Copy = Копировать объекты геометрии, создавая копию с необязательным смещением от исходных объектов геометрии.
tooltiptext_geom_CrossSection = Создайте 2D сечение 3D геометрии.
tooltiptext_geom_Cylinder = Добавьте цилиндр в текущую геометрию.
tooltiptext_geom_Difference = Создайте объект геометрии как заданное различие между двумя другими объектами геометрии (или наборами объектов геометрии).
tooltiptext_geom_DistanceMeasurement = Создание параметров, измеряющих расстояние между выбранными геометрическими объектами.
tooltiptext_geom_Ellipsoid = Добавьте эллипсоид к текущей геометрии.
tooltiptext_geom_Extract = Извлеките объекты из геометрии или удалите все объекты, которые не были выбраны.
tooltiptext_geom_Extrude = Выдавить плоские грани объектов геометрии или объектов из рабочей плоскости для создания объектов 3D-геометрии.
tooltiptext_geom_export_to_file = Экспорт текущей геометрии в виде двоичного или текстового файла COMSOL или в формат файла CAD.
tooltiptext_geom_Fillet = Добавьте филе в выбранные вершины в геометрии, чтобы создать закругленные углы.
tooltiptext_geom_Fillet3D = Добавьте филе для создания закругленных углов в 3D-геометрии.
tooltiptext_geom_Helix = Добавьте спираль к текущей геометрии.
tooltiptext_geom_Import = Импорт геометрии из файла COMSOL Multiphysics или CAD.
tooltiptext_geom_Intersection = Создайте объект геометрии как множество пересечений других объектов геометрии.
tooltiptext_geom_Interval = Добавьте интервал к текущей геометрии.
tooltiptext_geom_insert_sequence_from_file = Вставьте геометрическую последовательность из файла COMSOL Multiphysics в текущую геометрию.
tooltiptext_geom_insert_sequence_fullscreen = Вставьте последовательность геометрии из другой модели COMSOL Multiphysics в текущую геометрию.
tooltiptext_geom_Knit = Связать поверхностные объекты, чтобы сформировать твердые объекты.
tooltiptext_geom_LiveLinkAutoCADLiveLinkCAD = Подключитесь к AutoCAD®, используя LiveLink™ для AutoCAD®.
tooltiptext_geom_LiveLinkInventorLiveLinkCAD = Подключитесь к Inventor®, используя LiveLink™ для Inventor®.
tooltiptext_geom_LiveLinkPTCCreoParametricLiveLinkCAD = Подключиться к PTC®Creo® Parametric™ с помощью LiveLink™ для PTC®Creo® Parametric™.
tooltiptext_geom_LiveLinkPTCProENGINEERLiveLinkCAD = Подключитесь к PTC® Pro/ENGINEER® с помощью LiveLink™ для PTC® Pro/ENGINEER®.
tooltiptext_geom_LiveLinkRevitLiveLinkCAD = Подключитесь к Revit®, используя LiveLink™ для Revit®.
tooltiptext_geom_LiveLinkSOLIDWORKSLiveLinkCAD = Подключитесь к SOLIDWORKS®, используя LiveLink™ для SOLIDWORKS®.
tooltiptext_geom_LiveLinkSolidEdgeLiveLinkCAD = Подключитесь к Solid Edge®, используя LiveLink™ для Solid Edge®.
tooltiptext_geom_local_parameters = Добавить параметры, которые локально доступны для выбранной геометрии.
tooltiptext_geom_Loft = Лофт 2D разделы на объекты 3D геометрии.
tooltiptext_geom_Mirror = Зеркальная геометрия объектов в плоскости (в 3D) или линии (в 2D).
tooltiptext_geom_Move = Перемещение объектов геометрии.
tooltiptext_geom_Offset = Смещение краев в нормальном направлении в объектах 2D-геометрии.
tooltiptext_geom_OffsetFaces = Смещение лиц в нормальном направлении в 3D-объектах геометрии.
tooltiptext_geom_ParameterCheck = Добавить узел проверки параметров в часть геометрии или последовательность геометрии для проверки значений входных параметров (или локальных или глобальных параметров).
tooltiptext_geom_ParametricCurve = Добавьте параметрическую кривую к текущей геометрии.
tooltiptext_geom_part_instance = Выберите эту часть геометрии, чтобы создать ее часть в текущей геометрии.
tooltiptext_geom_Partition = Объекты геометрии раздела на части, использующие другие объекты геометрии в качестве объектов инструмента для раздела. В качестве альтернативы в 3D используйте рабочую плоскость для разделения объектов геометрии.
tooltiptext_geom_PartitionDomains = Разделы выбирают домены в определенных местах.
tooltiptext_geom_PartitionEdges = Разделение выбранных краев в заданных местах.
tooltiptext_geom_PartitionFaces = Раздел выбранных лиц в определенных местах.
tooltiptext_geom_Point = Добавьте точку к текущей геометрии.
tooltiptext_geom_Projection = Создайте проекцию на плоскость работы объектов и объектов 3D-геометрии.
tooltiptext_geom_RemoveDetails = Автоматически или вручную удаляйте детали из геометрии.
tooltiptext_geom_Repair = Ремонт объектов геометрии путем устранения дефектов и удаления деталей.
tooltiptext_geom_Revolve = Переверните плоские грани объектов геометрии или объектов из плоскости работы вокруг оси для создания объектов 3D-геометрии.
tooltiptext_geom_RigidTransform = Перемещайте и вращайте объекты 3D-геометрии.
tooltiptext_geom_Rotate = Вращайте объекты геометрии вокруг оси вращения.
tooltiptext_geom_Scale = Объекты масштабной геометрии с использованием изотропного или анизотропного масштабирования.
tooltiptext_geom_Sphere = Добавьте сферу к текущей геометрии.
tooltiptext_geom_Sweep = Подметать лица вдоль кривой позвоночника, чтобы создать твердый объект.
tooltiptext_geom_Tangent = Создайте сегмент линии, касающийся заданного края или заданных краев.
tooltiptext_geom_Thicken = Преобразуйте поверхностные объекты в твердые, придавая им толщину (обычно в нормальном направлении).
tooltiptext_geom_Thicken2D = Преобразуйте объекты 2D-кривой в твердые объекты, давая им толщину в нормальном направлении. 
tooltiptext_geom_Torus = Добавьте тор к текущей геометрии.
tooltiptext_geom_TransformFaces = Преобразование лиц в объекты 3D-геометрии.
tooltiptext_geom_Union = Создание объекта геометрии как заданного союза других объектов геометрии.
tooltiptext_geom_WorkPlane = Добавьте рабочую плоскость к текущей геометрии.
tooltiptext_geom_composite_curves = Создайте функцию композитной кривой из объектов, содержащих выбранные края.
tooltiptext_geommeasureaction = Измерять объем, площадь, периметр или другие геометрические свойства выбранных геометрических объектов. Результат отображается в окне сообщений.
tooltiptext_geommeasureaction_small = Измерять объем, площадь, периметр или другие геометрические свойства выбранных геометрических объектов. Результат отображается в окне сообщений.
tooltiptext_global_material_Effective = Добавить глобальный эффективный материал для расчета эффективных свойств материала из двух или более соединений.
tooltiptext_global_material_External = Добавьте интерфейс между физическими функциями и функциями во внешнюю общую библиотеку.
tooltiptext_global_material_LayeredMaterial = Добавьте глобальный многослойный материал.
tooltiptext_global_material_Multiphase = Добавить глобальный многофазный материал для расчета эффективных свойств материала из двух или более фаз.
tooltiptext_global_material_SingleLayerMaterial = Добавьте глобальный однослойный материал.
tooltiptext_global_material_Switch = Переключение между глобальными материалами во время подметания решателя.
tooltiptext_global_material_TopologyLink = Добавьте ссылку на топологию для ссылки на глобальный материал для оптимизации топологии.
tooltiptext_home_open_part_library = Откройте окно Библиотеки частей для добавления в геометрию заранее определенных частей геометрии.
tooltiptext_importmodel = Модель импорта с сервера.
tooltiptext_import_materials = Импорт материалов в вашу модель из поддерживаемых форматов файлов. 
tooltiptext_import_materials_fullscreen = Импорт материалов в вашу модель из поддерживаемых форматов файлов. 
tooltiptext_import_property_package = Импорт упаковки, содержащей набор видов и фаз, присутствующих в химической системе.
