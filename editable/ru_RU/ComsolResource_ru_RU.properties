You_must_be_admin_to_view_this_page = Вы должны быть администратором, чтобы просмотреть эту страницу.
You_need_to_close_the_Documentation_window_for_the_changes_to_take_effect = Вы должны закрыть окно Документации, чтобы изменения вступили в силу.
You_need_to_set_a_password_to_be_able_to_launch_in_COMSOL_Client = Вам нужно установить пароль для запуска в COMSOL Client.
You_have_not_entered_your_current_password_correctly_please_try_again = Вы неправильно ввели свой текущий пароль. Пожалуйста, попробуйте еще раз.
