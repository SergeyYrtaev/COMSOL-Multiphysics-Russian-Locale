###############################################################################
# Explanatory texts for the Show More Options dialog box
###############################################################################
show_all_variables_in_physics_doc = Показать все переменные в дереве экспрессии в контексте физики. По умолчанию скрыты переменные, предназначенные в основном для оценки результатов.
show_all_variables_in_results_doc = Показать все переменные в дереве экспрессии в контекстах результатов. По умолчанию видны только переменные, которые считаются наиболее полезными для оценки результатов.
show_equations_doc = Для каждого физического узла в окне настроек есть раздел уравнения. В этом разделе отображаются математические уравнения, применимые к узлу и выбранному типу исследования.
show_equation_view_doc = Окно настроек для подузлов представления уравнений содержит подробную информацию о реализации каждой физической функции: переменных, функций формы, выражений уравнений слабой формы и ограничений.
show_equation_based_doc = Вклады, основанные на уравнениях, включают слабые вклады, глобальные уравнения и точечные, слабые и глобальные ограничения, которые вы можете добавить в физический интерфейс.
show_extra_dimensions_doc = Дополнительные измерения могут быть использованы для расширения стандартной геометрии с дополнительными пространственными измерениями.
show_override_and_contribution_doc = Включите дополнительную информацию и обновления, связанные с выбором в окне настроек узла в дереве. Хотя это повышает удобство использования, это также может привести к некоторой задержке для моделей с большим количеством узлов, обычно при переключении узлов или обновлении настроек. Типичным примером является раздел «Переопределить и внести вклад» в окне «Настройки». Он содержит списки других узлов, которые переопределяют узел, других узлов, которые переопределяет узел, и других узлов, которые вносят вклад вместе с узлом (например, в общую нагрузку или поток). Сбор этой информации может привести к задержке перед получением доступа к окну настроек после щелчка по новому узлу.\nОтключение этой опции может улучшить отзывчивость пользовательского интерфейса.
show_variable_utilities_doc = Меню переменных утилит, доступное для узлов глобальных определений и определений, содержит утилиты для матричных переменных и матричных операций, переменных состояний, свойств массы и многого другого.
show_stabilization_doc = Раздел Стабилизация в окне Настройки содержит настройки для обработки численной стабилизации для стабилизации уравнений потока жидкости, например.
show_advanced_physics_doc = Сделайте доступными все настройки в интерфейсах физики, включая настройки расширенных разделов и другие специальные настройки.
show_batch_doc = Включите решение моделей как пакетные задания, используя пакетный процесс для решения исследования на вашем компьютере.
show_batch_and_cluster_doc = Включите решение моделей в виде пакетных заданий и использование кластерных вычислений. Работа с пакетом использует пакетный процесс для решения исследования на вашем компьютере. Кластерные вычисления отправляют пакетные задания планировщику рабочих мест, который может выполнять задания на втором компьютере или кластере.
show_sensitivity_doc = Анализ чувствительности может добавить функции чувствительности на уровне исследования и использовать параметры модели в качестве глобальных управляющих переменных для оценки чувствительности модели по отношению практически к любой переменной.
show_reduced_modeling_doc = Уменьшенные модели представляют собой онлайн-представления с уменьшенным порядком полной мультифизической модели COMSOL.
show_multigrid_level_doc = Включите возможность вручную определять уровни мультисетей для многосетевых решателей или предусловий.
show_solver_and_job_doc = Включите возможность вручную определять конфигурации решателя или конфигурации работы.
show_advanced_results_doc = Отображение узла Просмотров в разделе Результаты также при отсутствии добавления таких просмотров.
show_color_tables_doc = Отобразите узел Color Tables в разделе Результаты также, когда цветные таблицы не были добавлены.
show_all_dataset_types_doc = Покажите все типы наборов данных, а не только те, которые кажутся полезными на основе того, какие физические интерфейсы используются.
show_all_plot_types_doc = Показать все типы графиков, а не только те, которые кажутся полезными с учётом используемых физических интерфейсов.
show_all_numerical_evaluation_types_doc = Показать все типы численных вычислений, а не только те, которые кажутся полезными с учётом используемых физических интерфейсов.
show_all_export_types_doc = Покажите все типы экспорта, а не только те, которые кажутся полезными, основываясь на том, какие физические интерфейсы используются.
show_plot_information_section_doc = Показывать раздел информации о графике в окне настроек любого графика.
show_material_library_settings_doc = Отобразите настройки, используемые для редактирования библиотеки материалов.

