tooltiptext_add_plot_view = Открыть окно «Добавить предопределённый график», чтобы добавить предопределённый график к текущей модели.
tooltiptext_add_study_view = Открыть окно «Добавить исследование», чтобы добавить исследование к текущему компоненту модели.
