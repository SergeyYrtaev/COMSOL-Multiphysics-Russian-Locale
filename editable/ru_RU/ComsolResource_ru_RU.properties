The_application_which_was_set_to_run_on_login_for_the_groups_X_was_replaced_Any_application_session_running_the_replaced_application_can_no_longer_be_reconnected_to_These_application_sessions_must_be_manually_closed = Было заменено приложение, которое должно было работать на входе для групп '#'. Любая сессия приложения, на которой выполняется заменяемое приложение, больше не может быть повторно подключена. Эти сеансы подачи заявок должны быть закрыты вручную.
