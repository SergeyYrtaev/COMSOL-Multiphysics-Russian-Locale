tooltiptext_annotation_3d = Добавить аннотацию к графику.
tooltiptest_application_builder_compare_app_with_other_app = Сравните содержимое Open Application Builder с сохраненным приложением.
tooltiptext_arrow_line = Добавьте график стрелки в группу графиков, чтобы визуализировать векторную величину, используя стрелки по краям.
tooltiptext_arrow_line_3d = Добавьте график стрелки в группу графиков, чтобы визуализировать векторную величину, используя стрелки по краям.
tooltiptext_arrow_surface = Добавьте участок стрелки в группу графика, чтобы визуализировать векторную величину, используя стрелки на поверхности.
tooltiptext_arrow_surface_3d = Добавьте график стрелок в группу графиков, чтобы визуализировать векторную величину, используя стрелки на поверхностях (границах) 3D-геометрии.
tooltiptext_arrow_volume = Добавьте график стрелки в группу графиков, чтобы визуализировать векторную величину, используя стрелки в 3D-объеме.
tooltiptext_image_2d = Добавьте изображение в группу графиков.
tooltiptext_image_3d = Добавьте изображение в группу графиков.

tooltiptext_applfeature_Circuit_AmMeter_-1 = Добавьте Ампер-метр в схему для измерения тока между двумя узлами. Он действует как короткое замыкание между соединенными узлами.
tooltiptext_applfeature_Circuit_BjtNpn_-1 = Добавьте в схему NPN биполярный транзистор.
tooltiptext_applfeature_Circuit_BjtPnp_-1 = Добавьте в схему биполярный транзистор PNP.
tooltiptext_applfeature_Circuit_Capacitor_-1 = Добавить конденсатор в схему.
tooltiptext_applfeature_Circuit_CurrentCurrentSource_-1 = Добавьте источник тока, контролируемый током, в схему.
tooltiptext_applfeature_Circuit_CurrentSourceCircuit_-1 = Добавьте источник тока в схему.
tooltiptext_applfeature_Circuit_CurrentVoltageSource_-1 = Добавьте источник напряжения, управляемый током, в схему.
tooltiptext_applfeature_Circuit_Diode_-1 = Добавьте диод в схему.
tooltiptext_applfeature_Circuit_GroundNode_-1 = Добавьте наземный узел в схему.
tooltiptext_applfeature_Circuit_Inductor_-1 = Добавить индуктор в схему.
tooltiptext_applfeature_Circuit_ModelDeviceIV_-1 = Добавьте в схему функцию External I Vs. U, которую можно использовать для подключения схемы к другому физическому интерфейсу. Функция действует как источник напряжения, и значение напряжения берется из сопряженного интерфейса.
tooltiptext_applfeature_Circuit_ModelDeviceVI_-1 = Добавьте внешний U Vs. В схеме есть функция, которая может использоваться для подключения схемы к другому физическому интерфейсу. Функция действует как источник тока, и значение тока берется из сопряженного интерфейса.
tooltiptext_applfeature_Circuit_ModelTerminalIV_-1 = Добавьте функцию внешнего I-терминала в схему, чтобы подключить ее к другому физическому интерфейсу. Функция действует как источник напряжения, применяя напряжение по отношению к земле; значение напряжения берется из сопряженного интерфейса.
tooltiptext_applfeature_Circuit_MosfetN_-1 = Добавьте n-канальный MOSFET в схему.
tooltiptext_applfeature_Circuit_MosfetP_-1 = Добавьте P-канал MOSFET в схему.
tooltiptext_applfeature_Circuit_MutualInductance_-1 = Добавьте узел взаимной индуктивности в схему, чтобы соединить два существующих индуктора.
tooltiptext_applfeature_Circuit_Resistor_-1 = Добавьте резистор в схему.
tooltiptext_applfeature_Circuit_SubCircuit_-1 = Добавить субсхему в схему, которая реализует заданное определение субсхемы.
tooltiptext_applfeature_Circuit_Transformer_-1 = Добавьте трансформатор в схему.
tooltiptext_applfeature_Circuit_VoltageCurrentSource_-1 = Добавьте источник тока, управляемый напряжением, в схему.
tooltiptext_applfeature_Circuit_VoltageSource_-1 = Добавьте источник напряжения в схему.
tooltiptext_applfeature_Circuit_VoltageVoltageSource_-1 = Добавьте источник напряжения, управляемый напряжением, в схему.
tooltiptext_applfeature_Circuit_VoltMeter_-1 = Добавьте счетчик вольта в схему для измерения разности напряжений между двумя узлами. Он действует как открытая цепь между соединенными узлами.

tooltiptext_applfeature_Chemistry_ReactionChem_-1 = Используйте реакционный узел для входа в обратимые или необратимые реакции, которые не связаны с электронами, например, для реакций газовой фазы.
tooltiptext_applfeature_Chemistry_SpeciesChem_-1 = Используйте Узел Видов, чтобы добавить дополнительные виды к модели, даже если они не участвуют в каких-либо реакциях.
tooltiptext_applfeature_Chemistry_SpeciesGroup_-1 = Добавьте группу видов, которая содержит информацию на молекулярном уровне об объемных видах и поверхностных видах, присутствующих в модели. Эта группа также используется для импорта данных CHEMKIN.

tooltiptext_applfeature_Events_DiscreteStates_-1 = Добавить узел дискретных состояний для определения дискретных переменных состояний, которые не должны быть непрерывными во времени. Они часто используются в качестве логических переменных.
tooltiptext_applfeature_Events_ExplicitEvent_-1 = Добавьте явный узел событий, чтобы создать событие, которое происходит в заранее определенное время, которое вы указываете в разделе «Время событий».
tooltiptext_applfeature_Events_GlobalConstraint_-1 = Используйте узел Global Constraint, чтобы добавить ограничение в интерфейс Events, используя выражение ограничения.
tooltiptext_applfeature_Events_GlobalEquations_-1 = Используйте узел глобальных уравнений для добавления ODE или DAE в качестве глобальных уравнений в интерфейсе событий.
tooltiptext_applfeature_Events_ImplicitEvent_-1 = Добавьте узел Implicit Event для создания события, которое происходит, когда выполняется условие, включающее состояние индикатора.
tooltiptext_applfeature_Events_IndicatorStates_-1 = Добавьте узел состояния индикатора, чтобы определить переменные состояния, которые могут вызывать неявные события при их нулевых пересечениях.
tooltiptext_applfeature_Events_WeakGlobalContribution_-1 = Используйте узел Weak Contribution, чтобы добавить вклад слабой формы в интерфейс Events, используя слабое выражение.

tooltiptext_applfeature_GeneralOptimization_GlobalControlVariables_-1 = Добавьте узел Global Control Variables, чтобы указать переменные управления, которые доступны по всему миру.
tooltiptext_applfeature_GeneralOptimization_GlobalInequality_-1 = Добавить глобальный узел ограничения неравенства, чтобы добавить ограничение неравенства, которое применяется во всем мире, используя только замкнутую форму выражения глобальных переменных управления.
tooltiptext_applfeature_GeneralOptimization_GlobalLeastSquaresObjective_-1 = Добавить глобальный объектный узел наименьших квадратов, чтобы создать цель наименьших квадратов для глобальных переменных управления на основе импортированных экспериментальных данных.
tooltiptext_applfeature_GeneralOptimization_GlobalObjective_-1 = Добавьте узел Global Objective, чтобы указать глобальную цель как вклад в целевую функцию.

tooltiptext_applfeature_GlobalEquations_GlobalConstraint_-1 = Используйте узел Global Constraint, чтобы добавить ограничение в интерфейс Global ODE и DAE, используя выражение ограничения.
tooltiptext_applfeature_GlobalEquations_GlobalEquations_-1 = Используйте узел глобальных уравнений для добавления ODE или DAE в качестве глобальных уравнений в интерфейсе глобальных ODE и DAE.
tooltiptext_applfeature_GlobalEquations_WeakGlobalContribution_-1 = Используйте узел Weak Contribution, чтобы добавить вклад слабой формы в интерфейс Global ODE и DAE, используя слабое выражение.

tooltiptext_applfeature_ReactionEng_AdditionalSourceFeature_-1 = Добавить дополнительный узел источника, чтобы добавить дополнительное выражение скорости или дополнительную объемную скорость производства.
tooltiptext_applfeature_ReactionEng_FeedStream_-1 = Добавить один или несколько узлов Feed Stream для моделирования потоков подачи (материальных потоков) в реакторы типа Semibatch или CSTR.
tooltiptext_applfeature_ReactionEng_GlobalConstraint_-1 = Используйте узел Global Constraint, чтобы добавить ограничение в реакционную инженерную модель, используя выражение ограничения.
tooltiptext_applfeature_ReactionEng_GlobalEquations_-1 = Используйте узел глобальных уравнений для добавления ODE или DAE в качестве дополнительных глобальных уравнений в реакционной инженерной модели.
tooltiptext_applfeature_ReactionEng_ParameterEstimation_-1 = Используйте узел оценки параметров для определения управляющих переменных для оценки параметров на основе предварительно определенных типов реакторов. Требуется модуль оптимизации.
tooltiptext_applfeature_ReactionEng_ReactionChem_-1 = Используйте реакционный узел для входа в обратимые или необратимые реакции, которые не связаны с электронами, например, для реакций газовой фазы.
tooltiptext_applfeature_ReactionEng_ReactionToMph_-1 = Используйте инструмент Generate Space-Dependent Model, чтобы установить связь между интерфейсом Reaction Engineering и другими интерфейсами COMSOL Multiphysics, где настроена космическая модель.
tooltiptext_applfeature_ReactionEng_SpeciesChem_-1 = Используйте Узел Видов, чтобы добавить дополнительные виды к модели, даже если они не участвуют в каких-либо реакциях.
tooltiptext_applfeature_ReactionEng_SpeciesGroup_-1 = Добавьте группу видов, которая содержит информацию на молекулярном уровне об объемных видах и поверхностных видах, присутствующих в модели. Эта группа также используется для импорта данных CHEMKIN.
tooltiptext_applfeature_ReactionEng_WeakGlobalContribution_-1 = Используйте узел Weak Contribution, чтобы добавить вклад слабой формы в реакционную инженерную модель, используя слабое выражение.

tooltiptext_applfeature_Sensitivity_GlobalControlVariables_-1 = Добавьте узел Global Control Variables, чтобы указать переменные управления, которые доступны по всему миру.
tooltiptext_applfeature_Sensitivity_GlobalObjective_-1 = Добавьте узел Global Objective, чтобы указать глобальную цель как вклад в целевую функцию.

