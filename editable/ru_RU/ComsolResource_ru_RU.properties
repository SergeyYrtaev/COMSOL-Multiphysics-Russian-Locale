The_coupling_features_Electromagnetic_Heat_Source_and_Boundary_Electromagnetic_Heat_Source_are_obsolete_and_will_be_removed_in_future_versions._They_have_been_merged_into_one_and_are_now_part_of_the_domain_coupling_Electromagnetic_Heating._If_you_were_using_only_Boundary_Electromagnetic_Heat_Source_to_couple_shell_interfaces,_then_consider_using_Boundary_Electromagnetic_Heating_instead = Связывание с электромагнитным источником тепла и граничным электромагнитным источником тепла устарело и будет удалено в будущих версиях. Они были объединены в один и теперь являются частью связи по области электромагнитного нагрева. Если вы используете только пограничный электромагнитный источник тепла для сопряжения интерфейсов оболочки, рассмотрите возможность использования пограничного электромагнитного нагрева.
