tooltiptext_resethistory = Сделайте историю, хранящуюся в модели, более компактной.
tooltiptext_reset_colors = Сбросьте все настройки цвета узла выбора в текущем компоненте на цвета темы по умолчанию.
tooltiptext_reset_colors_draw = Сбросьте все настройки выбора цвета в текущей геометрии до цветов темы по умолчанию.
tooltiptext_reset_layout = Сбросить компоновку рабочего пространства COMSOL к компоновке по умолчанию.
tooltiptext_resetcurrentviewaction = Восстановите настройки по умолчанию для текущего узла View.
tooltiptext_resetviewaction = Восстановите настройки по умолчанию для узла View.
tooltiptext_restore_desktop_perspective = Вернуться в рабочее пространство Построителя модели.
tooltiptext_restore_desktop_perspective_physics_builder = Вернитесь в рабочее пространство конструктора.
tooltiptext_revert = Вернитесь к последней сохраненной версии модели.
tooltiptext_rotateclockwise = Поверните выбранное устройство по часовой стрелке.
tooltiptext_rotatecounterclockwise = Поверните выбранное устройство против часовой стрелки.
tooltiptext_save = Сохранить текущую модель.
tooltiptext_saveas = Сохраните текущую модель под новым именем или используя новый формат.
tooltiptext_Sensitivity =  Добавьте анализ чувствительности к текущему исследованию. С помощью узла исследования чувствительности можно добавлять функции чувствительности на уровне исследования и использовать параметры модели в качестве глобальных управляющих переменных.
tooltiptext_selection_Adjacent = Добавьте смежный выбор, выбрав геометрические объекты, которые соседствуют с теми, которые выбраны в качестве входов.
tooltiptext_selection_Ball = Добавьте выбор шара, выбирая геометрические объекты внутри или пересекая шар.
tooltiptext_selection_BallDisk = Добавьте выбор шара или диска, выбрав геометрические объекты внутри или пересекая шар или диск.
tooltiptext_selection_Box = Добавьте выбор коробки, выбрав геометрические объекты внутри или пересекая коробку.
tooltiptext_selection_Complement = Добавить выбор дополнения, выбрав дополнение (обратное) некоторых других вариантов.
tooltiptext_selection_Cylinder = Добавьте выбор цилиндра, выбрав геометрические объекты внутри или пересекая цилиндр.
tooltiptext_selection_Difference = Добавить Разностный выбор, выбирая геометрические объекты с помощью операции заданной разности.
tooltiptext_selection_Explicit = Добавить Явный выбор, где геометрические объекты могут быть добавлены для создания выбора из них или соседних геометрических объектов.
tooltiptext_selection_Intersection = Добавьте выбор пересечения, выбирая геометрические объекты с помощью операции с множеством пересечений.
tooltiptext_selection_LogicalExpression = Добавить логический выбор выражения, выбирая геометрические объекты, используя выражение, которое содержит ссылки на другие выборы и атрибуты.
tooltiptext_selection_Union = Добавить союзный отбор, выбрав геометрические объекты с помощью союзной операции.
tooltiptext_settings_below = Используйте стандартную компоновку экрана COMSOL Desktop по умолчанию.
tooltiptext_settings_right = Используйте широкоэкранную компоновку COMSOL Desktop по умолчанию.
tooltiptext_show_cumulative_selections = Добавить контейнерный узел Cumulative Selections. Кумулятивный отбор — это отбор в геометрической последовательности, который представляет собой объединение вкладов из других отборов.
tooltiptext_show_external_process_view = Например, откройте окно «Внешний процесс» для контроля и мониторинга внешнего процесса для пакетных заданий.
tooltiptext_show_licenses_view = Откройте диалоговое окно Лицензии, чтобы активировать или заблокировать использование продукта COMSOL.
tooltiptext_show_table_view = Откройте окно таблицы для отображения данных таблицы во время постобработки.
tooltiptext_sketch_fillet = Создавайте закругленные углы, необязательно выбирая вершины, а затем перетаскивая вершину.
tooltiptext_slice = Добавьте график среза в группу графиков, чтобы отобразить величину как цветные срезы через 3D-геометрию.
tooltiptext_solid_draw = Создайте твердое тело (вместо кривой) при рисовании объекта геометрии в Графическом окне.
tooltiptext_snap_constrain = Создавайте геометрические ограничения, когда происходит захват геометрии.
tooltiptext_snap_geometry = Перейдите к другим объектам геометрии при рисовании объекта геометрии в графическом окне.
tooltiptext_snap_grid = Нажмите на сетку при рисовании объекта геометрии в графическом окне.
tooltiptext_streamline = Добавьте обтекаемый график в группу графиков, чтобы построить векторную величину, такую как поле скорости, используя обтекатели.
tooltiptext_streamline_3d = Добавьте обтекаемый график в группу графиков, чтобы построить векторную величину, такую как поле скорости, используя обтекатели.
tooltiptext_study_compute = Вычислите выбранное исследование.
tooltiptext_study_continue = Продолжайте вычисление последовательности решателя из последней вычисленной функции.
tooltiptext_study_gensequences = Отобразите узлы в последовательностях решателя, которые создаются по умолчанию.
tooltiptext_study_resetdefaultplots = Сбросить группы графиков и графики, добавляемые по умолчанию.
tooltiptext_study_showdefaultplots = Покажите группы графиков и графики, которые добавлены по умолчанию.
tooltiptext_study_studyinitsol = Создать решение, используя начальные значения зависимых переменных (без решения зависимых переменных).
tooltiptext_study_update = Обновление решения с использованием текущих значений параметров и определяемых пользователем переменных.
tooltiptext_StudyReference = Добавьте шаг справочного исследования к текущему исследованию.
tooltiptext_studystatistics = Показать статистику исследования: количество степеней свободы (DOF).
tooltiptext_surface = Добавить поверхностный график в группу графиков, чтобы отобразить величину в виде цветного поверхностного графика.
tooltiptext_surface_3d = Добавить поверхностный график в группу графиков, чтобы отобразить величину в виде цветного поверхностного графика на поверхностях (границах) 3D-геометрии.
tooltiptext_surface_height = Добавить поверхностный график с высотой в группу графиков, чтобы отобразить величину цветом, а другую величину — высотой поверхности.
tooltiptext_table_Table = Добавить таблицу.
tooltiptext_toggle_selection_view = Откройте окно «Список выбора», в котором перечислены геометрические объекты, объекты геометрии и названные выборы.
tooltiptext_undo = Отмените последнее модельное действие.
tooltiptext_use_application = Создайте модель из приложения.
tooltiptext_use_harmonic_perturbation_3d = Активировать гармоническое возмущение.
tooltiptext_use_harmonic_perturbation_2d = Активировать гармоническое возмущение.
tooltiptext_volume = Добавьте объемный график в группу графиков, чтобы отобразить величину как цветной объемный график.

# Enhanced-tooltip resources for multiphysics couplings
tooltiptext_multiphysics_AcousticAcousticBoundary = Добавить акустический BEM-FEM граничный мультифизический узел связи, чтобы связать акустику давления конечных элементов с акустикой давления граничных элементов.
tooltiptext_multiphysics_AcousticPipeAcousticConnection = Добавьте мультифизический узел связи Acoustic-Pipe Acoustic Connection для передачи акустического давления от акустики труб к акустике давления.
tooltiptext_multiphysics_AcousticPorousBoundary = Добавьте мультифизический узел связи Acoustic-Porous Boundary, чтобы соединить акустику давления с пористым материалом (модель Биота).
tooltiptext_multiphysics_AcousticStreamingBoundaryCoupling = Добавьте узел акустической потоковой связи для вычисления устойчивых сил, вызванных акустическим полем, и подключитесь к интерфейсу потока жидкости.
tooltiptext_multiphysics_AcousticStreamingDomainCoupling = Добавьте узел подключения акустического потокового области для вычисления устойчивых сил, вызванных акустическим полем, и подключитесь к интерфейсу потока жидкости.
tooltiptext_multiphysics_AcousticStructureBoundary = Добавить мультифизический узел связи акустико-конструкционная граница, чтобы соединить акустику давления со структурным компонентом.
tooltiptext_multiphysics_AcousticStructureBoundaryTimeExplicit = Добавьте акустико-конструкционная граница, мультифизический узел связи явная по времени, чтобы связать акустику давления времени с эластичными волнами, явная по времени.
tooltiptext_multiphysics_AcousticThermoacousticBoundary = Добавьте мультифизический узел акустическо-термоакустической акустической границы, чтобы связать термовискусную область акустики с областью акустики давления.
tooltiptext_multiphysics_AeroacousticFlowSourceCoupling = Добавить мультифизический узел связи для соединения расчета потока жидкости LES с источником аэроакустического потока в акустике давления.
tooltiptext_multiphysics_AeroacousticStructureBoundary = Добавьте мультифизический узел связи Aeroacoustic–Structure Boundary, чтобы соединить аэроакустическую модель из интерфейсов Linearized Navier-Stokes с любым структурным компонентом.
tooltiptext_multiphysics_BackgroundFluidFlowCoupling = Добавить фоновый флюидный поток, соединяющий мультифизический узел связи, чтобы связать фоновый поток, рассчитанный интерфейсом потока жидкости, с аэроакустикой.
tooltiptext_multiphysics_BackgroundPotentialFlowCoupling = Добавить фоновый мультифизический узел связи для соединения фонового потока, вычисленного сжимаемым потенциальным потоком, с интерфейсами линейного потенциального потока, обеспечивая входы для модели линеаризованного потенциального потока.
tooltiptext_multiphysics_BeamBeamCSCoupling = Добавьте мультифизический узел связи Beam-Beam Cross Section для передачи сил сечения от интерфейса Beam к интерфейсу Beam Cross Section.
tooltiptext_multiphysics_BeamCSBeamCoupling3D = Добавьте мультифизический узел связи Beam Cross Section-Beam Coupling для передачи свойств сечения из интерфейса Beam Cross Section в интерфейс Beam.
tooltiptext_multiphysics_BeamCSBeamCoupling2D = Добавьте мультифизический узел связи Beam Cross Section-Beam Coupling для передачи свойств сечения из интерфейса Beam Cross Section в интерфейс Beam.
tooltiptext_multiphysics_BeamRotorBearingCoupling = Добавить мультифизический узел связи Beam Rotor–Bearing Coupling для передачи скорости и смещения на гидродинамический подшипник и давления жидкостной пленки на ротор пучка.
tooltiptext_multiphysics_BoundaryElectrochemicalHeatSource = Добавить пограничную электрохимическую мультифизическую связь источника тепла для определения пограничного источника тепла (потока) в интерфейсе теплопередачи, основанном на сумме необратимых потерь активации и обратимого тепла в интерфейсе электрохимии.
tooltiptext_multiphysics_BoundaryThermoelectricEffectModel = Добавить граничный термоэлектрический эффект мультифизического узла связи для учета источника тепла Пельтье или стока на границах.
tooltiptext_multiphysics_CollisionlessHeatingCoupling = Добавьте мультифизическую связь без столкновения, чтобы включить нелокальные эффекты нагрева через эффективное приближение вязкости.
tooltiptext_multiphysics_CollisionlessHeatingMultiphysicsCoupling = Добавьте мультифизическую связь без столкновения, чтобы включить нелокальные эффекты нагрева через эффективное приближение вязкости.
tooltiptext_multiphysics_ConvectedAcousticStructureBoundaryTimeExplicit = Добавьте узел мультифизической связи граница конвективной акустико-конструкционной связи, явная по времени, чтобы связать уравнение конвекционной волны с упругими волнами, Explicit по времени.
tooltiptext_multiphysics_CouplingImpedance = Условие импеданса передачи.
tooltiptext_multiphysics_CuringReactionHeating = Добавить мультифизический узел связи Curing Reaction Heating для определения источника тепла области в интерфейсе теплопередачи, рассчитанном на основе скорости реакции в интерфейсе Curing Reaction.
tooltiptext_multiphysics_DeformingElectrodeSurface = Добавьте мультифизический узел связи деформирующего электрода поверхности для моделирования деформации геометрии из-за процесса электрохимического осаждения-раствора.
tooltiptext_multiphysics_ElectricParticleFieldInteraction = Добавьте мультифизический узел взаимодействия электрических частиц с полем для вычисления плотности заряда пространства из-за частиц.
tooltiptext_multiphysics_ElectricScalarScalarPotentialCoupling = Добавьте электрический скалярно-скалярный потенциальный соединительный мультифизический узел, чтобы обеспечить непрерывность электрического потенциала через границы между электростатикой и электростатикой.
tooltiptext_multiphysics_ElectrochemicalHeatSource = Добавить многофункциональный узел электрохимического источника тепла для определения областьного источника тепла в интерфейсе теплопередачи на основе суммы необратимого и обратимого тепла в интерфейсе электрохимии.
tooltiptext_multiphysics_Electrode = Добавьте узел электродной мультифизики, чтобы установить правильные граничные условия для электрического потенциала и электрического поля при соединении заряда транспорта и электростатики.
tooltiptext_multiphysics_ElectromagneticHeating = Добавьте мультифизический узел электромагнитного нагрева для учета электромагнитных объемных и поверхностных потерь в уравнении тепла.
tooltiptext_multiphysics_ElectromagneticHeatingLayeredShell = Добавьте электромагнитный нагревательный многофизический соединительный узел Layered Shell для учета электромагнитных объемных и поверхностных потерь от тонких проводящих слоистых оболочек в уравнении тепла.
tooltiptext_multiphysics_ElectromechanicalInterface = Добавить мультифизический узел электромеханического интерфейса для моделирования электромеханического взаимодействия между деформируемыми твердыми доменами и несолидными пустотами, где электрическое поле вычисляется с использованием метода граничных элементов.
tooltiptext_multiphysics_ElectronHeatSourceFeature = Добавьте мультифизический узел связи Electron Heat Source, чтобы применить источник тепла от электромагнитного поля к электронам в плазме.
tooltiptext_multiphysics_ElectronHeatSourceMultiphysicsCoupling = Добавьте мультифизический узел связи Electron Heat Source, чтобы применить источник тепла от электромагнитного поля к электронам в плазме.
tooltiptext_multiphysics_ElectronHeatSourceTimePeriodicMultiphysicsCoupling = Добавьте мультифизический узел связи Electron Heat Source, чтобы применить источник тепла от электромагнитного поля к электронам в плазме.
tooltiptext_multiphysics_ElectromechanicalForces = Добавьте узел мультифизической связи электромеханических сил для вычисления сил из-за напряжения Максвелла в твердых доменах.
tooltiptext_multiphysics_ElectrostrictiveEffect = Добавьте мультифизический узел электрострикции для вычисления сил и электрострикционных эффектов в твердых доменах.
tooltiptext_multiphysics_EquilibriumDischargeBoundaryHeatSource = Добавьте межфизический соединительный узел с равновесным разрядом для отображения потерь электромагнитной поверхности в качестве источника тепла на границе.
tooltiptext_multiphysics_EquilibriumDischargeHeatSource = Добавить мультифизический узел связи с равновесным источником разряда для представления исходного термина, представляющего три компонента источника/поглотителя, участвующих в равновесном разряде.
tooltiptext_multiphysics_FSIFixedGeometry = Добавить Fluid–Structure Interaction, Fixed Geometry multiphysics coupling node для моделирования FSI, когда деформации структуры настолько малы, что они не оказывают существенного влияния на текучие домены.
tooltiptext_multiphysics_FlowCoupling = Добавьте мультифизический узел связи Flow Coupling, чтобы добавить скорость потока и давление в качестве ввода модели по умолчанию в интерфейсе физики назначения.
tooltiptext_multiphysics_FluidParticleInteraction = Добавьте мультифизический узел взаимодействия жидких частиц для вычисления силы объема на основе силы сопротивления, оказываемой на частицы, и которая способствует силам, действующим на жидкость.
tooltiptext_multiphysics_FluidPipeInteraction = Добавьте мультифизический узел связи Fluid-Pipe Interaction для передачи жидких нагрузок от потока трубопровода к механике трубопровода.
tooltiptext_multiphysics_FluidStructureInteractionBC = Добавьте мультифизический узел связи Fluid–Structure Interaction, чтобы соединить жидкость и структуру на их интерфейсе.
tooltiptext_multiphysics_FluidStructureInteractionPair = Добавить мультифизический узел связи Fluid–Structure Interaction Pair для соединения жидкости и структуры на их интерфейсе, определяемом как пара.
tooltiptext_multiphysics_HallEffect = Добавьте мультифизический узел связи Hall Effect, чтобы включить влияние магнитного поля на свойства электрической проводимости.
tooltiptext_multiphysics_HeatAndMoisture = Добавьте мультифизический узел связи Heat and Moisture для моделирования сопряженного переноса тепла и влаги.
tooltiptext_multiphysics_HeatTransferWithRadiationInAbsorbingScatteringMedia = Добавьте теплопередачу с излучением в мультифизическом узле мультифизического поглощения для моделирования теплопередачи посредством проводимости, конвекции и излучения, включая излучение в поглощающем рассеянии (полупрозрачном) носителе.
tooltiptext_multiphysics_HeatTransferWithRadiationInParticipatingMedia = Добавить теплопередачу с излучением в участвующий мультифизический узел связи мультифизики для моделирования теплопередачи посредством проводимости, конвекции и излучения, включая излучение в участвующих (полупрозрачных) средах.
tooltiptext_multiphysics_HeatTransferWithRadiativeBeamInAbsorbingMedia = Добавьте теплопередачу с лучом излучения в мультифизический узел связи Absorbing Media для моделирования теплопередачи посредством проводимости, конвекции и излучения из-за распространения и поглощения коллимированных радиационных пучков, таких как лазеры, внутри частично прозрачных сред.
tooltiptext_multiphysics_HeatTransferWithOrbitalThermalLoads = Добавьте теплопередачу с мультифизическим узлом с орбитальными тепловыми нагрузками для моделирования теплопередачи, включая радиационные нагрузки на орбитальный космический корабль.
tooltiptext_multiphysics_HeatTransferWithSurfaceToSurfaceRadiation = Добавьте теплопередачу с мультифизическим узлом связи «Поверхность-поверхность» для моделирования теплопередачи посредством проводимости, конвекции и излучения, включая излучение «поверхность-поверхность».
tooltiptext_multiphysics_HygroscopicSwelling = Добавьте мультифизический узел связи Hygroscopic Swelling для связывания концентрации влаги между интерфейсом механика твердого тела и интерфейсом для транспортировки разбавленных видов.
tooltiptext_multiphysics_InductionCurrentDensityComponent = Добавьте мультифизический узел связи компонента плотности индукционного тока, чтобы взять индуцированную плотность тока из магнитных полей и нанести ее на карту плотности внешнего тока в электрических токах.
tooltiptext_multiphysics_InteriorWettedWall = Добавить Интерьер Влажная стена мультифизический узел связи
tooltiptext_multiphysics_LayeredShellShellConnection = Добавить Layered Shell–Shell Соединение мультифизического соединительного узла для соединения верхней или нижней поверхности слоистых оболочек с другими оболочками, имеющими слоистые материалы.
tooltiptext_multiphysics_LayeredShellStructCladding = Добавить Слоеный Shell–Structure Кладирующий мультифизический узел связи для соединения верхней или нижней поверхности слоистых оболочек с другими оболочками, твердыми телами или мембранами.
tooltiptext_multiphysics_LayeredShellStructTransition = Добавить Слоеный узел Shell–Structure Transition для соединения краев слоистых оболочек с другими оболочками или с границами твердых тел.
tooltiptext_multiphysics_LocalThermalNonEquilibrium = Добавьте локальный термонеравновесный мультифизический узел связи для учета теплопередачи в пористых доменах, где температура твердого тела и жидкости не находится в равновесии.
tooltiptext_multiphysics_LorentzForce = Добавьте мультифизический узел связи Lorentz Force для отображения силы Лоренца от магнитных полей до силы объема в Ламинарном потоке.
tooltiptext_multiphysics_LorentzCoupling = Добавьте мультифизический узел связи Lorentz Coupling, чтобы получить двустороннюю связь между магнитными полями и твердой механикой. Он применяет силу Лоренца на стороне механики и добавляет термин скорости Лоренца к стороне электромагнетизма.
tooltiptext_multiphysics_LumpedStructureConnection = Добавьте мультифизический узел связи Lumped Structure Connection для подключения интерфейса Lumped Mechanical System к другим интерфейсам структурной механики.
tooltiptext_multiphysics_MagneticFieldsFormulationMagneticFieldsNoCurrentsCoupling = Добавьте формулирование магнитных полей Магнитные поля Нет токов Связывание для обеспечения непрерывности между формулированием магнитного поля и магнитными полями, Нет токов интерфейсов. 
tooltiptext_multiphysics_MagneticParticleFieldInteraction = Добавить мультифизический узел взаимодействия магнитных частиц-полей для вычисления плотности тока из-за движения заряженных частиц и применить накопленную плотность тока в качестве источника при вычислении магнитного векторного потенциала.
tooltiptext_multiphysics_MagneticScalarScalarPotentialCoupling = Добавьте мультифизический узел связи с магнитным скалярным потенциалом, чтобы обеспечить непрерывность магнитного скалярного потенциала через границы между магнитными полями, без токов и магнитными полями, без токов, интерфейсами граничных элементов.
tooltiptext_multiphysics_MagneticVectorScalarPotentialCoupling = Добавьте мультифизический узел связи с магнитным вектором-скалярным потенциалом, чтобы обеспечить непрерывность плотности магнитного потока через границы между магнитными полями и магнитными полями, без токов, интерфейсами граничных элементов.
tooltiptext_multiphysics_MagnetomechanicalForces = Добавьте мультифизический узел связи магнитомеханических сил для вычисления сил из-за магнитного напряжения Максвелла в твердых доменах.
tooltiptext_multiphysics_Magnetomechanics = Добавьте мультифизический узел связи магнитной механики для вычисления магнитных сил в твердых доменах, либо используя тензор напряжения Максвелла, либо применяя только силу Лоренца к стороне механики и термин скорости Лоренца к стороне электромагнетизма.
tooltiptext_multiphysics_Magnetostriction = Добавьте мультифизический узел связи магнитострикции для имитации магнитострикции с использованием эффекта Джоуля, эффекта Виллари или полностью связанных прямых и обратных магнитострикционных эффектов.
tooltiptext_multiphysics_MagneticForces = Добавьте мультифизический узел связи магнитных сил для вычисления сил из-за магнитного напряжения Максвелла в твердых доменах.
tooltiptext_multiphysics_MagneticForcesRotatingMachinery = Добавьте магнитные силы, вращающийся узел мультифизической связи для вычисления сил из-за магнитного напряжения Максвелла в твердых доменах.
tooltiptext_multiphysics_Marangoni = Добавьте мультифизический узел связи Marangoni Effect для учета эффектов поверхностного натяжения, включая конвекцию Марангони (термокапиллярную конвекцию).
tooltiptext_multiphysics_MarangoniEffect = Добавьте мультифизический узел связи Marangoni Effect для учета конвекции Марангони (термокапиллярная конвекция) на, как правило, жидкостном воздушном интерфейсе.
tooltiptext_multiphysics_MoistureFlow = Добавьте мультифизический узел связи потока влаги для имитации потоков влажной воздушной жидкости в ламинарном или турбулентном режиме со свойствами жидкости, определяемыми как функция относительной влажности.
tooltiptext_multiphysics_MultiphaseFlowInPorousMedia = Добавьте многофазный поток в мультифизический узел связи Porous Media, чтобы соединить фазовый транспорт в интерфейсах Porous Media и закон Дарси и смоделировать транспорт нескольких фаз в пористой среде.
tooltiptext_multiphysics_MultiphaseFlowMixtureModel = Добавьте мультифизический узел связи Mixture Model для соединения фазового транспорта и интерфейса однофазного потока, чтобы имитировать рассеянный многофазный поток.
tooltiptext_multiphysics_NavierStokesDarcyCoupling = Добавьте мультифизический узел связи Free and Porous Media Flow Coupling для имитации потока жидкости через подключенные свободные и пористые домены потоков медиа, соединив интерфейсы ламинарное течение и закон Дарси через границы. 
tooltiptext_multiphysics_NonDeformingBoundary = Добавить недеформирующий граничный мультифизический узел связи к внешним границам электролита, чтобы они не подвергались деформации.
tooltiptext_multiphysics_NonIsothermalFlow = Добавьте мультифизический узел связи неизотермическое течение для имитации потоков жидкости, где свойства жидкости зависят от температуры.
tooltiptext_multiphysics_NonIsothermalReactingFlow = Добавить мультифизический узел связи Reacting Flow для имитации теплопередачи с массовым транспортом и реакциями в газовой или жидкой смеси, где поток жидкости может зависеть от состава смеси и температуры.
tooltiptext_multiphysics_NonlinearMagnetostriction = Добавить мультифизический узел нелинейной магнитострикции для имитации магнитострикции с использованием эффекта Джоуля, эффекта Виллари или полностью связанных прямых и обратных магнитострикционных эффектов.
tooltiptext_multiphysics_PairAcousticStructureBoundary = Добавьте Pair акустико-конструкционная граница мультифизический узел связи, чтобы соединить акустику давления со структурным компонентом с интерфейсом, определенным как пары.
tooltiptext_multiphysics_PairAcousticStructureBoundaryTimeExplicit = Добавьте Pair акустико-конструкционная граница, мультифизический узел связи явная по времени, чтобы связать акустику давления времени с эластичными волнами, явная по времени с интерфейсом, определенным как пары.
tooltiptext_multiphysics_PairAcousticThermoacousticBoundary = Добавить парный акустическо-термоакустический акустический граничный мультифизический узел связи, чтобы связать термовискусный область акустики с областьом акустики давления с интерфейсом, определенным как пары.
tooltiptext_multiphysics_PairConvectedAcousticStructureBoundaryTimeExplicit = Добавьте граница конвективной акустико-конструкционной связи, мультифизический узел связи явная по времени для соединения уравнение конвективной волны с упругие волны, явная по времени с интерфейсом, определенным как пары.
tooltiptext_multiphysics_PairThermoviscousAcousticStructureBoundary = Добавить Pair Thermoviscous акустико-конструкционная граница мультифизический узел связи, чтобы связать модель термовязкой акустики со структурным компонентом с интерфейсом, определенным как пары.
tooltiptext_multiphysics_PhaseTransformationLatentHeat = Добавьте многофункциональный узел фазовой трансформации Latent Heat, чтобы включить эффект скрытого нагрева во время фазовых преобразований.
tooltiptext_multiphysics_PhaseTransformationStrain = Добавьте мультифизический узел связи деформация фазового превращения, чтобы соединить интерфейс Metal Phase Transformation или Austenite Decomposition с интерфейсом механика твердого тела.
tooltiptext_multiphysics_PiezoelectricEffect = Добавьте мультифизический узел Пьезоэлектричества для моделирования пьезоэлектрических эффектов, электростатики связи и структурной механики.
tooltiptext_multiphysics_PiezoelectricEffectLS = Добавьте пьезоэлектричество, многоуровневый мультифизический узел связи для моделирования пьезоэлектрических эффектов, соединения электрического поля и структурных деформаций в слоистых оболочках.
tooltiptext_multiphysics_PiezoelectricEffectTimeExplicit = Добавьте пьезоэлектричество, мультифизический узел связи явная по времени для имитации пьезоэлектрических эффектов, связи электростатики и упругих волн.
tooltiptext_multiphysics_PiezomagneticEffect = Добавьте мультифизический узел связи пьезомагнетизма для моделирования линейной магнитострикции с использованием эффекта Джоуля, эффекта Виллари или полностью связанных прямых и обратных линейных магнитострикционных эффектов.
tooltiptext_multiphysics_PiezoresistiveEffectBoundary = Добавьте узел мультифизической связи Пьезорезистивности, граничных токов для вычисления изменения электропроводности на основе механического напряжения или деформации, который передается узлу Пьезорезистивного материала в интерфейсе электрических токов Shell.
tooltiptext_multiphysics_PiezoresistiveEffectDomain = Добавьте пьезорезистивность, мультифизический узел связи областьных токов для вычисления изменения электропроводности на основе механического напряжения или деформации, которое передается узелу пьезорезистивного материала в электрических токах.
tooltiptext_multiphysics_PiezoresistiveEffectShell = Добавьте Piezoresistivity, мультифизический узел связи Shell для вычисления изменения электропроводности на основе механического напряжения или деформации, которое передается узлу Piezoresistive Material в интерфейсе Electric Currents, Shell.
tooltiptext_multiphysics_PiezoresistivityLS = Добавьте пьезорезистивность, многофизический соединительный узел Layered Shell для вычисления изменения электропроводности на основе механического напряжения или деформации, которое передается узлу Piezoresistive Shell в интерфейсе Electric Currents, Layered Shell.
tooltiptext_multiphysics_PipeConnection = Добавьте мультифизический узел связи Pipe Connection, чтобы соединить сегмент трубы и границу жидкости.
tooltiptext_multiphysics_PlasmaConductivityCoupling = Добавить мультифизический узел связи плазменной проводимости для расчета электрической проводимости плазмы на основе приближения холодной плазмы.
tooltiptext_multiphysics_PlasmaConductivityMultiphysicsCoupling = Добавить мультифизический узел связи плазменной проводимости для расчета электрической проводимости плазмы на основе приближения холодной плазмы.
tooltiptext_multiphysics_PlasmaConductivityTimePeriodicMultiphysicsCoupling = Добавить мультифизический узел связи плазменной проводимости для расчета электрической проводимости плазмы на основе приближения холодной плазмы.
tooltiptext_multiphysics_PoroelasticCoupling = Добавьте мультифизический узел связи Poroelasticity, чтобы двунаправленно связать интерфейсы механика твердого тела и закон Дарси для учета пороэластической деформации.
tooltiptext_multiphysics_PoroelasticCouplingLS = Добавьте многофункциональный узел с многослойной полиупругостью для двунаправленной связи интерфейсов Layered Shell и закон Дарси для учета пороэластической деформации.
tooltiptext_multiphysics_PorousStructureBoundary = Добавить мультифизический узел связи Porous–Structure Boundary, чтобы связать пористый область (модель Биота) со структурным компонентом.
tooltiptext_multiphysics_PotentialCoupling = Добавить мультифизический узел связи, чтобы применить переменную электрического потенциала от интерфейса источника к входам модели интерфейса назначения.
tooltiptext_multiphysics_Pyroelectricity = Добавьте узел мультифизической связи Пироэлектричества для имитации пироэлектрических и электрокалорийных эффектов, связи электростатики и теплопередачи в твердых телах.
tooltiptext_multiphysics_RayHeatSource = Добавить мультифизический узел связи Ray Heat Source для вычисления источника тепла, возникающего в результате затухания лучей в поглощающей среде.
tooltiptext_multiphysics_ReactingFlow = Добавить мультифизический узел связи Reacting Flow для имитации массового транспорта и реакций в газовой или жидкой смеси, где поток жидкости может зависеть от состава смеси.
tooltiptext_multiphysics_ReactingFlowDS = Добавьте реагирующий поток, разбавленный узел мультифизической связи для имитации массового транспорта и реакций в газе или жидкости с потоком ламинарной жидкости.
tooltiptext_multiphysics_SchrodingerPoissonCoupling = Добавить Schrödinger–Poisson Соединение мультифизического узла связи для создания двунаправленной связи между интерфейсом электростатики и интерфейсом уравнения Шрёдингера для моделирования носителей заряда в квантово-конфинированных системах. 
tooltiptext_multiphysics_SemiconductorElectromagneticWavesCoupling = Добавьте полупроводниковые электромагнитные волны, соединяющие мультифизический узел связи, чтобы передать интенсивность оптического поля от электромагнитных волн к оптической функции перехода в интерфейсе полупроводника.
tooltiptext_multiphysics_ShellBeamConnection = Добавить мультифизический узел связи Shell–Beam Connection для создания переходов между границами оболочки или краями и краями луча или точками в моделях структурной механики.
tooltiptext_multiphysics_ShellThinFilmFlowInteraction = Добавить мультифизический узел связи Shell–Thin-Film Flow Interaction для моделирования взаимодействия на границах жидкостной оболочки.
tooltiptext_multiphysics_SolidBeamConnection = Добавить мультифизический узел связи Solid–Beam Connection для создания переходов из твердого области в пучки в моделях структурной механики.
tooltiptext_multiphysics_SolidBeamConnection3D = Добавить мультифизический узел связи Solid–Beam Connection для создания переходов из твердого области в пучки в моделях структурной механики.
tooltiptext_multiphysics_SolidBearingCoupling = Добавить мультифизический узел связи Solid–Bearing Coupling для передачи скорости и смещения на гидродинамический подшипник и давление флюидной пленки в интерфейс механика твердого тела или Multibody Dynamics.
tooltiptext_multiphysics_SolidRotorBearingCoupling = Добавить Solid Rotor–Bearing Coupling мультифизический узел связи для передачи скорости и смещения к гидродинамическому подшипнику и давления жидкостной пленки к твердому ротору.
tooltiptext_multiphysics_SolidShellBoundaryElectricCoupling  = Добавьте твердое электрическое течение в Shell Via Boundary, чтобы обеспечить непрерывность электрического потенциала через границы между электрическими токами и электрическими токами.
tooltiptext_multiphysics_SolidShellConnection2DAxis = Добавить мультифизический узел связи Solid–Thin Structure Connection для создания переходов от твердого области к границам оболочки в моделях структурной механики.
tooltiptext_multiphysics_SolidShellConnection = Добавить мультифизический узел связи Solid–Thin Structure Connection для создания переходов от твердого области к границам оболочки в моделях структурной механики.
tooltiptext_multiphysics_SolidShellElectricBoundaryCoupling = Добавьте твердое электрическое течение в Shell Via Boundary, чтобы обеспечить непрерывность электрического потенциала через границы между электрическими токами и электрическими токами.
tooltiptext_multiphysics_SpaceChargeDensityCoupling = Добавьте мультифизический узел связи для вычисления локального заряда пространства, основанного на локальных концентрациях и зарядах видов в интерфейсе переноса химических видов, и добавьте его в уравнение Пуассона в интерфейсе электростатики.
tooltiptext_multiphysics_SpaceChargeLimitedEmission = Добавьте мультифизический узел связи Space Charge Limited Emission для моделирования ограниченного излучения электронов от поверхности.
tooltiptext_multiphysics_StaticCurrentDensityComponent = Добавьте мультифизический узел связи компонента плотности статического тока, чтобы взять индуцированную плотность тока из электрических токов и нанести ее на карту плотности внешнего тока в магнитных полях.
tooltiptext_multiphysics_StructurePipeConnection = Добавить мультифизический узел связи Structure–Pipe Connection для создания перехода между точкой на элементе трубы и краями оболочки или твердыми границами, чтобы смоделировать переход от приближения трубы к полному 3D приближению.
tooltiptext_multiphysics_StructureThinFilmFlowInteraction = Добавить узел мультифизической связи Structure–Thin-Film Flow Interaction для моделирования взаимодействия на границах жидкости и твердого тела.
tooltiptext_multiphysics_TemperatureCoupling = Добавьте мультифизический узел связи с температурой, чтобы добавить температуру в качестве ввода модели по умолчанию в интерфейсе физики назначения.
tooltiptext_multiphysics_TernaryFlowPhaseField = Добавьте трехфазный поток, многофизический узел фазового поля для моделирования потока трех несмешивающихся жидкостей при отслеживании интерфейсов, разделяющих жидкости.
tooltiptext_multiphysics_ThermalConnectionLayeredShellEdges = Добавьте термосоединение, слоистую оболочку, многофизический соединительный узел Edges, чтобы определить условие непрерывности между температурными полями из интерфейса физики области и из интерфейса физики оболочки слоистого типа оболочки через края.
tooltiptext_multiphysics_ThermalConnectionLayeredShellPoints = Добавьте термосоединение, слоистую оболочку, многофункциональный узел связи точек, чтобы определить условие непрерывности между температурными полями из интерфейса физики области и из интерфейса физики оболочки слоистого типа оболочки через края.
tooltiptext_multiphysics_ThermalConnectionLayeredShellSurfaces = Добавьте термосоединение, слоистую оболочку, узел мультифизической связи Surfaces, чтобы определить условие непрерывности между температурными полями из интерфейса физики области и из интерфейса физики оболочки слоистого типа оболочки через грани.
tooltiptext_multiphysics_ThermalConnectionNonlayeredShell = Добавьте термосвязь, мультифизический узел с неслойной оболочкой Shell, чтобы определить условие непрерывности между температурными полями из интерфейса области и из интерфейса оболочки неслойного типа оболочки.
tooltiptext_multiphysics_ThermalExpansion = Добавьте мультифизический узел связи теплового расширения, чтобы добавить внутреннюю тепловую деформацию, вызванное изменениями температуры.
tooltiptext_multiphysics_ThermalExpansionLS = Добавьте многофизический соединительный узел с укладкой теплового расширения, чтобы добавить внутреннюю тепловую деформацию, вызванное изменениями температуры.
tooltiptext_multiphysics_ThermalExpansionTL = Добавить тепловое расширение, тонкий слой мультифизический узел связи, чтобы добавить внутреннюю тепловую деформацию в тонкие слои, вызванные изменениями температуры.
tooltiptext_multiphysics_ThermoacousticStructureBoundary = Добавить мультифизический узел связи Thermoviscous акустико-конструкционная граница, чтобы связать модель термовязкой акустики со структурным компонентом.
tooltiptext_multiphysics_ThermoelectricEffect = Добавьте мультифизический узел связи термоэлектрического эффекта для учета источника тепла Пельтье или стока в областях, где определены электрические и тепловые модели.
tooltiptext_multiphysics_ThermoelectricEffectLayeredShell = Добавьте термоэлектрический эффект, многофизический соединительный узел Layered Shell для учета источника тепла Пельтье или поглотителя в слоистых материалах, где определены электрические и тепловые модели.
tooltiptext_multiphysics_ThermoelectricEffectModel = Добавьте мультифизический узел связи термоэлектрического эффекта для учета источника тепла Пельтье или стока в областях, где определены электрические и тепловые модели.
tooltiptext_multiphysics_ThermoviscousAcousticThermoelasticityBoundary = Добавить термовязкий акустическо-термоупругий граничный мультифизический узел связи, чтобы связать модель термовязкой акустики со структурным компонентом с теплообменом.
tooltiptext_multiphysics_ThinBarrierMPF = Добавьте тонкий барьерный мультифизический узел связи для учета тонкого слоя, который действует как сопротивление для полей потока всех фаз.
tooltiptext_multiphysics_TwoPhaseFlowLevelSet = Добавьте двухфазный поток, мультифизический узл набора уровней для определения плотности и динамической вязкости потока, используемого в интерфейсах потока жидкости, и поверхностного натяжения на интерфейсе в качестве силы объема.
tooltiptext_multiphysics_TwoPhaseFlowPhaseField = Добавить двухфазный поток, фазовое поле мультифизического узла связи для определения плотности и динамической вязкости потока, используемого в интерфейсах потока жидкости и поверхностного натяжения на интерфейсе в качестве силы объема.
tooltiptext_multiphysics_UnsaturatedPoroelasticCoupling = Добавьте мультифизический узел связи ненасыщенной пороэластичности для двунаправленной связи между механикой твердого тела и транспортом влаги в интерфейсах твердых тел для учета пороэластической деформации.
tooltiptext_multiphysics_PipeWallHeatTransfer = Добавьте мультифизический узел связи Pipe Wall теплопередача для учета теплообмена через стенку трубы.
tooltiptext_multiphysics_Welle = Добавить мультифизический узел связи Well, чтобы указать давление и/или массовый поток в многофазной скважине.
tooltiptext_multiphysics_Wellp = Добавить мультифизический узел связи Well, чтобы указать давление и/или массовый поток в многофазной скважине.
tooltiptext_multiphysics_WettedWall = Добавьте мультифизический узел связи Wetted Wall, чтобы добавить граничные условия для стен, контактирующих с жидкостными интерфейсами.
tooltiptext_multiphysics_EmbeddedReinforcement = Добавьте мультифизический узел связи Embedded Reinforcement, чтобы встроить структуру в интерфейс механика твердого тела.
tooltiptext_multiphysics_PhaseFieldDamage = Добавьте узел многофизической связи с фазовым повреждением поля для моделирования распространения трещин в твердом теле.

