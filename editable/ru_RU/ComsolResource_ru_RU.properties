tooltiptext_add_coordsysab = Добавить поглощающий слой к текущему компоненту модели.
tooltiptext_add_coordsysie = Добавление бесконечного области элементов к текущему компоненту модели.
tooltiptext_add_coordsyspml = Добавьте идеально подобранный слой (PML) к текущему компоненту модели.
tooltiptext_add_hide = Добавьте функцию выбора, чтобы скрыть объекты или объекты геометрии.
tooltiptext_add_global_expression_toolbar = Добавляет узел переменных в соответствии с глобальными определениями для определения переменных с глобальным охватом.
