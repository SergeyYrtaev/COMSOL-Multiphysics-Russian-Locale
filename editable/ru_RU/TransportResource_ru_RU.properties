ProductFootNote3 = Давление на входе не должно ограничиваться извне.\nИспользуется, если все давления на выходе ограничены извне.
ProductFootNote4 = Максимум одно выходное давление должно ограничиваться извне.
ProductFootNote5 = Падение давления зависит от скорости потока. Может использоваться для управления \n скоростью потока рециркуляции с помощью клапана, или если скорость потока на выходе \n задается извне насосом.
ProductFootNote6 = Заданное выходное давление не должно ограничиваться извне.\nМожет использоваться для указания давления рециркуляции.
ProductFootNote7 = Давление обычно ограничивается извне \n для любого выпускного отверстия, которое не подлежит рециркуляции.
ProductFootNote8 = Давление на выходе может превышать давление на входе, \n, подразумевая внутренний насос.
