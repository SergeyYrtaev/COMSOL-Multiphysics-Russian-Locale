The_model_has_been_saved_with_a_license_which_includes_the_Chemistry_interface_and_then_opened_in_a_session_where_this_license_was_no_longer_available._Due_to_this_the_Chemistry_interface_was_no_longer_selected_in_X._If_the_license_for_the_Chemistry_interface_becomes_available_again_the_Chemistry_interface_will_remain_unselected_until_you_set_it_again. = Модель была сохранена с лицензией, включающей интерфейс химии, а затем открыта в сеансе, где эта лицензия больше не была доступна. В связи с этим интерфейс химии больше не выбирался в #. Если лицензия на интерфейс «Химия» снова станет доступной, интерфейс «Химия» останется невыбранным, пока вы не установите его снова.
The_model_was_created_in_an_earlier_version_and_contains_the_obsolete_feature_ElectrochemicalReactionHeatFlux = Модель создана в более ранней версии и содержит устаревшую функцию «Тепловой поток электрохимической реакции». Эту функцию невозможно загрузить в данную версию COMSOL Multiphysics; рассмотрите возможность замены его функцией «Граничный тепловой поток».
The_model_was_created_in_an_earlier_version_and_contains_the_obsolete_feature_ReactionHeatFlux = Модель создана в более ранней версии и содержит устаревшую функцию «Тепловой поток электрохимической реакции». Эту функцию невозможно загрузить в данную версию COMSOL Multiphysics; рассмотрите возможность замены его функцией «Граничный тепловой поток».
The_model_was_created_in_an_earlier_version_and_contains_the_obsolete_feature_PorousMatrix = Модель создана в более ранней версии и содержит устаревшую функцию Porous Matrix. Эту функцию невозможно загрузить в данную версию COMSOL Multiphysics; рассмотрите возможность замены его функцией Porous Medium.
The_model_was_created_in_an_earlier_version_and_contains_the_obsolete_feature_InfiniteElements = Модель создана в более ранней версии и содержит устаревшую функцию «Бесконечные элементы». Эту функцию невозможно загрузить в данную версию COMSOL Multiphysics; рассмотрите возможность замены его функцией «Бесконечные элементы» в узле «Определения».
The_model_was_created_in_an_earlier_version_and_contains_the_obsolete_feature_ConvectiveHeatFlux = Модель создана в более ранней версии и содержит устаревшую функцию Convetive Heat Flux. Эту функцию невозможно загрузить в данную версию COMSOL Multiphysics; рассмотрите возможность замены его функцией теплового потока.
The_model_was_created_in_an_earlier_version_and_contains_the_obsolete_feature_OutOfPlaneConvectiveHeatFlux = Модель была создана в более ранней версии и содержит устаревшую функцию внеплоскостного конвективного теплового потока. Эту функцию невозможно загрузить в данную версию COMSOL Multiphysics; рассмотрите возможность замены его функцией теплового потока. 
