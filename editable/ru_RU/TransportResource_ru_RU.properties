A_Heat_Transfer_physics_is_selected_in_the_Reacting_Flow_multiphysics_but_no_Chemistry_interface_is_selected._Variables_and_equations_associated_to_the_Heat_Transfer_physics_are_therefore_not_defined._To_enable_the_coupling_with_the_Heat_Transfer_physics_select_a_Chemistry_interface. = В мультифизике Reacting Flow выбрана физика теплопередачи, но интерфейс химии не выбран. Поэтому переменные и уравнения, связанные с физикой теплопередачи, не определены. Чтобы включить связь с физикой теплопередачи, выберите интерфейс «Химия».
A_radiation_interface_is_selected_in_the_multiphysics_coupling_named_below_and_is_active_in_this_study = Интерфейс излучения выбран в мультифизической связи, указанной ниже, и активен в этом исследовании. Поскольку интерфейсы излучения предполагают бесконечную среду в направлении вне плоскости, все функции выхода из плоскости выбранного интерфейса физики теплопередачи отключаются.
A_new_option_Jacobian_contribution_is_introduced_in_this_version._This_option_is_visible_in_the_interface_settings_when_Advanced_Physics_Options_is_selected_in_Show_More_Options._This_option_was_automatically_set_to_Only_local_contributions_to_radiosity_when_opening_the_model_to_benefit_from_computational_cost_and_memory_usage_improvements._When_set_to_Include_contributions_from_total_irradiation,_the_behavior_is_the_same_as_in_COMSOL_Multiphysics_v5.6_or_earlier._Please_refer_to_the_release_notes_for_more_details. = В этой версии представлена новая опция \"Jacobian вклад\". Эта опция отображается в настройках интерфейса, когда \"Advanced Physics Options\" выбран в \"Показать больше Options\".\nЭтот параметр был автоматически установлен на \"Только локальный вклад в radiosity\" при открытии модели, чтобы получить выгоду от улучшений вычислительных затрат и использования памяти. Если установлено значение \"Включать вклады от общего облучения\", поведение такое же, как в COMSOL Multiphysics v5.6 или более ранних версиях.\nПожалуйста, обратитесь к примечаниям к выпуску для получения более подробной информации.
