#############################################################################
# Descriptions for Multiphysics Warning and Error messages                  #
#############################################################################

# - A -------------------------------------------
A_new_option_Lower_integration_order_for_irradiation_has_been_introduced_in_this_version._This_option_is_available_in_the_interface_settings_when_Advanced_Physics_Options_is_selected_in_Show_More_Options._This_option_is_selected_by_default_to_benefit_from_computational_cost_and_memory_usage_improvements._When_cleared,_the_behavior_is_the_same_as_in_COMSOL_Multiphysics_v6.1_or_earlier._Please_refer_to_the_release_notes_for_more_details. = В этой версии введена новая опция \"Нижний порядок интегрирования для облучения\". Эта опция доступна в настройках интерфейса, когда \"Advanced Physics Options\" выбран в \"Показать больше Options\".\nЭтот параметр выбран по умолчанию, чтобы получить выгоду от улучшения вычислительных затрат и использования памяти. Если флажок снят, поведение такое же, как в COMSOL Multiphysics® v6.1 или более ранней версии.\nПодробнее см. в примечаниях к выпуску.
A_rotating_domain_is_attached_to_a_stationary_domain_spf = Вращающийся область прикреплен к стационарному области.\nСоздайте границы сборки и соответствующие пары в геометрической последовательности и добавьте их в \"Flow Continuity\". 
A_rotating_domain_is_attached_to_a_stationary_domain_mixture_model = Вращающийся область прикреплен к стационарному области.\nСоздайте границы сборки и соответствующие пары в геометрической последовательности и добавьте их в \"Mixture Continuity\". 
A_rotating_domain_is_attached_to_a_stationary_domain_nitf = Вращающийся область прикреплен к неподвижному области.\nСоздайте границы сборки и соответствующие пары в геометрической последовательности и добавьте их к \"Flow Continuity\" в интерфейсе физики потока жидкости и в \"Continuity\" функция в интерфейсе физики теплопередачи.
A_rotating_domain_is_attached_to_a_stationary_domain_reacting_flow = Вращающийся область прикреплен к неподвижному области.\nСоздайте границы сборки и соответствующие пары в геометрической последовательности и добавьте их к \"Flow Continuity\" в интерфейсе физики потока жидкости и в \"Continuity\" функция в интерфейсе физики транспорта.
A_rotating_domain_is_attached_to_a_stationary_domain_tpf_level_set = Вращающийся область прикреплен к неподвижному области.\nСоздайте границы сборки и соответствующие пары в геометрической последовательности и добавьте их к \"Flow Continuity\" в интерфейсе физики потока жидкости и в \"Continuity\" функция в физическом интерфейсе набора уровней.
A_rotating_domain_is_attached_to_a_stationary_domain_tpf_phase_field = Вращающийся область прикреплен к неподвижному области.\nСоздайте границы сборки и соответствующие пары в геометрической последовательности и добавьте их к \"Flow Continuity\" в интерфейсе физики потока жидкости и в \"Continuity\" функция в интерфейсе физики фазового поля.
A_rotating_domain_is_attached_to_a_stationary_domain_phase_transport_mixture_model = Вращающийся область прикреплен к неподвижному области.\nСоздайте границы сборки и соответствующие пары в геометрической последовательности и добавьте их к \"Flow Continuity\" в интерфейсе физики потока жидкости и в \"Continuity\" функция в интерфейсе физики фазового переноса.
All_NASA_coefficients_are_zero_for_at_least_one_species_in_the_coupled_chemistry_interface = Все коэффициенты НАСА равны нулю хотя бы для одного вида в интерфейсе связанной химии.
All_NASA_coefficients_are_zero_for_at_least_one_species_in_the_interface = Все коэффициенты НАСА равны нулю хотя бы для одного вида на интерфейсе.
Are_you_sure_you_want_to_overwrite_the_autogenerated_features_in_X = Вы уверены, что хотите перезаписать автоматически созданные функции в #?
# - B -------------------------------------------
Boussinesq_approximation_is_not_compatible_with_curing_reaction_heating. = Приближение Буссинеска несовместимо с нагреванием реакции отверждения.
Boussinesq_approximation_is_not_compatible_with_multiphase_flow. = Приближение Буссинеска несовместимо с многофазным потоком.
# - E -------------------------------------------
Error_in_species_matching = Ошибка в сопоставлении видов
# - F -------------------------------------------
Fracture_flow_is_not_supported_in_the_multiphase_flow_in_porous_media_multiphysics_coupling. = «Поток трещин» не поддерживается в мультифизической связи «Многофазный поток в пористой среде».
Failed_to_parse_input_as_number = Не удалось проанализировать ввод как число.
Failed_to_parse_quadrature_set_variables._This_may_be_due_to_a_quadrature_definition_change_in_the_equation_view. = Не удалось проанализировать переменные квадратурного набора. Это может быть связано с изменением определения квадратуры в представлении уравнения.
# - G -------------------------------------------
Gravity_is_active_but_the_Boussinesq_approximation_has_not_been_activated. = Гравитация активна, но приближение Буссинеска не активировано.
# - N -------------------------------------------
No_constraint_for_the_pressure_is_detected = Нет функции, ограничивающей давление.\nДля указания уровня давления требуется ограничение давления.\nИгнорируйте это предупреждение, если давление ограничивается с помощью точечных или слабых ограничений.
No_mixture_properties_available_from_the_coupled_Chemistry_interface = В связанном интерфейсе химии свойства смеси недоступны.
No_velocity_has_been_detected = Объект «Открытая граница» ведет себя как объект «Теплоизоляция», поскольку скорость в соседних областях определена равной нулю.
# - P -------------------------------------------
Permanently_define_all_frames_for_fluid_flow = Границы потока жидкости определяются в пространственной системе координат. В узле компонента выберите «Определить все кадры навсегда», чтобы избежать неожиданного поведения. 
Pair_conditions_and_Interior_Walls_are_not_applicable_for_Fluid_Properties_nodes_with_different_number_of_branches. = Условия пары и Внутренние стены неприменимы для узлов свойств жидкости с различным количеством ветвей.
Phase_Initialization_not_solved_for_warning = Текущий физический интерфейс требует переменной Reciprocal Initial Interface Distance.\nУбедитесь, что все шаги исследования, решающие переменные в этом физическом интерфейсе, получают свои начальные значения переменных, для которых не решены, из шага исследования фазовой инициализации.
Point_X_for_which_only_the_downside_has_well-defined_material_properties_can_be_seen_from_point_Y_computing_the_irradiation. = Точку #0, для которой только нижняя сторона имеет четко определенные свойства материала, можно увидеть из точки #1 при расчете облучения.\nЭто может быть связано с ошибочным определением граничных направлений излучения или непрозрачностью соседних доменов.
Point_X_for_which_only_the_upside_has_well-defined_material_properties_can_be_seen_from_point_Y_computing_the_irradiation. = Точку #0, у которой только верхняя сторона имеет четко определенные свойства материала, можно увидеть из точки #1 при расчете облучения.\nЭто может быть связано с ошибочным определением граничных направлений излучения или непрозрачностью соседних доменов.
Primary_and_secondary_vectors_selected_in_X_are_collinear. = Первичные и вторичные векторы, выбранные в #, коллинеарны.
Primary_vector_selected_in_X_cannot_be_a_zero_vector. = Первичный вектор, выбранный в #, не может быть нулевым вектором.
# - R -------------------------------------------
Reaction_Sources_feature_X_is_not_linked_to_reaction_rates_defined_in_Chemistry_interface._The_enthalpy_of_the_reaction_cannot_be_evaluated._This_configuration_is_not_supported_by_the_Reacting_Flow_multiphysics. = Функция «Источники реакций» # не связана со скоростями реакций, определенными в интерфейсе «Химия». Энтальпию реакции оценить невозможно. Эта конфигурация не поддерживается мультифизикой Reacting Flow.
Reciprocal_Wall_Distance_not_solved_for_warning = Текущая модель турбулентности RANS требует переменной «Расстояние обратной стенки».\nУбедитесь, что все шаги исследования, решающие переменные потока в этом физическом интерфейсе, получают свои начальные значения переменных, для которых не решены, из шага исследования, на котором уже вычислена соответствующая переменная «Расстояние обратной стенки».
Reduced_pressure_is_not_compatible_with_multiphase_flow = Пониженное давление несовместимо с многофазным потоком.
# - S -------------------------------------------
Secondary_vector_selected_in_X_cannot_be_a_zero_vector. = Вторичный вектор, выбранный в #, не может быть нулевым вектором.
Several_Reaction_Sources_features_are_present_in_the_model._This_configuration_is_currently_not_supported_by_the_Reacting_Flow_multiphysics_because_the_enthalpy_of_reaction_cannot_be_evaluated_correctly. = В модели присутствует несколько функций источников реакций. Эта конфигурация в настоящее время не поддерживается мультифизикой Reacting Flow, поскольку энтальпия реакции не может быть правильно оценена.
Species_node = Видовой узел
Streamline_diffusion_should_be_selected_when_using_equal-order_interpolation_for_pressure_and_velocity = Диффузию по линии тока следует выбирать при использовании интерполяции равного порядка для давления и скорости.
# - T -------------------------------------------
The_automatically_generated_events_group_has_been_disabled_warning = Автоматически создаваемая группа событий отключена, поскольку физический интерфейс «Орбитальные тепловые нагрузки» больше не требует дополнительного интерфейса «События». Ознакомьтесь с новой функцией временной шкалы событий. Если вы не изменили автоматически созданную группу, вы можете безопасно удалить ее.
The_Incompressible_flow_option_is_not_available_for_the_Mixture_Model_multiphysics_coupling = Опция «Несжимаемый поток» недоступна для мультифизической связи «Модель смеси».
The_Mixture_Model_multiphysics_coupling_is_restricted_to_incompressible_flow = Мультифизическая связь модели смеси ограничена несжимаемым потоком.
The_Nonisothermal_Mixture_Model_Multiphysics_coupling_cannot_be_used_without_a_Nonisothermal_Flow_Multiphysics_coupling = Мультифизическую связь «Модель неизотермической смеси» нельзя использовать без мультифизической связи «Неизотермический поток».
The_Orbital_Thermal_Loads_physics_requires_exactly_one_active_Events_Timeline_feature_in_the_study._Please_add_or_enable_one_Events_Timeline_feature. = Для физики орбитальных тепловых нагрузок требуется ровно одна активная функция временной шкалы событий в исследовании. Пожалуйста, добавьте или включите одну функцию временной шкалы событий.
The_Orbital_Thermal_Loads_physics_requires_exactly_one_active_Events_Timeline_feature_in_the_study._Please_enable_only_one_Events_Timeline_feature. = Для физики орбитальных тепловых нагрузок требуется ровно одна активная функция временной шкалы событий в исследовании. Пожалуйста, включите только одну функцию временной шкалы событий.
The_Orbit_Thermal_Loads_solution_(X)_is_selected_to_define_the_precomputed_Orbit_Thermal_Loads_solution_in_Orbital_Temperature_study_(Y)._The_solution_duration_of_(X)_is_not_a_multiple_of_the_orbit_period._This_may_lead_to_unexpected_results. = Решение для орбитальных тепловых нагрузок (#0) выбрано для определения предварительно рассчитанного решения для орбитальных тепловых нагрузок в исследовании орбитальной температуры (#1). Длительность решения (#0) не кратна периоду обращения. Это может привести к неожиданным результатам.
The_option_compensate_for_hydrostatic_pressure_may_be_incompatible_with_multiphase_flow = Опция «Компенсация гидростатического давления» может быть несовместима с многофазным потоком.
The_Orbital_Thermal_Loads_physics_must_be_solved_together_with_an_Events_interface._To_generate_one,_click_the_Create_New_button_in_the_Generate_Events_Interface_feature_after_specifying_the_events_occuring_during_the_orbit. = Физика орбитальных тепловых нагрузок должна решаться вместе с интерфейсом событий. Чтобы создать его, нажмите кнопку «Создать новый» в функции «Интерфейс создания событий» после указания событий, происходящих во время витка.
The_Reacting_Flow_multiphysics_interface_X_requires_mixture_properties_from_the_coupled_Chemistry_interface_X._Enable_Calculate_mixture_properties_in_the_Calculate_Transport_Properties_section. = Мультифизический интерфейс Reacting Flow #0 требует свойств смеси из связанного интерфейса химии #1. Включите \"Расчет свойств смеси\" в разделе \"Расчет транспортных свойств\".
The_X_feature_is_not_intended_to_be_used_with_disjoint_boundaries._Use_separate_features_for_each_group_of_boundaries. = Функция # не предназначена для использования с непересекающимися границами. Используйте отдельные функции для каждой группы границ.
The_X_feature_with_Y_set_to_Z_is_not_intended_to_be_used_with_disjoint_boundaries._Use_separate_features_for_each_group_of_boundaries. = Функция #0 с #1, установленной на #2, не предназначена для использования с непересекающимися границами. Используйте отдельные функции для каждой группы границ.
This_Events_interface_has_been_disabled_warning = Этот интерфейс событий был отключен, поскольку физический интерфейс орбитальных тепловых нагрузок больше не требует дополнительного интерфейса событий. Ознакомьтесь с новой функцией временной шкалы событий. Если вы не изменяли этот автоматически созданный интерфейс событий, вы можете безопасно удалить его.
This_feature_is_not_intended_to_be_used_with_disjoint_boundaries._Use_separate_features_for_each_group_of_boundaries. = Эта функция не предназначена для использования с непересекающимися границами. Используйте отдельные функции для каждой группы границ.
