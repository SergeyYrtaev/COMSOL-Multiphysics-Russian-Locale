This_model_has_been_saved_in_a_previous_version_of_COMSOL_Multiphysics_and_has_been_updated_during_loading._The_beam_properties_are_now_defined_from_the_beam_intensity_in_the_beam_cross_section._The_Beam_Power_user_input_has_been_multiplied_by_a_factor_so_that_results_are_unchanged_compared_to_previous_versions. = Эта модель была сохранена в предыдущей версии COMSOL Multiphysics и обновлялась во время загрузки. Свойства луча теперь определяются по интенсивности луча в поперечном сечении луча. Пользовательский ввод мощности луча был умножен на коэффициент, так что результаты не изменились по сравнению с предыдущими версиями.
This_model_has_been_saved_in_a_previous_version_of_COMSOL_Multiphysics._The_specular_transmissivity_material_has_been_updated_since_and_it_could_not_be_updated_in_this_feature_because_it_is_in_conflict_with_the_specular_transmissivity_defined_in_the_Surface-to-surface_Radiation_Physics_Interface_(X)._Please_check_the_definition_of_the_specular_transmissivity_in_this_feature_and_in_the_X_interface. = Эта модель была сохранена в предыдущей версии COMSOL Multiphysics.\nМатериал зеркального пропускания был обновлен с тех пор, и его нельзя обновить в этой функции, поскольку он противоречит зеркальному пропусканию, определенному в интерфейсах радиационной физики «поверхность-поверхность». #.\nПожалуйста, проверьте определение зеркальной прозрачности в этой функции и в интерфейсах #.
This_model_has_been_saved_in_a_previous_version_of_COMSOL_Multiphysics._The_Coordinate_System_Selection_is_now_restricted_to_Boundary_System._The_coordinate_system_of_this_feature_has_been_changed_to_the_default_Boundary_System_(sys1)._Please_check_the_coordinate_system_selected_in_this_feature. = Эта модель была сохранена в предыдущей версии COMSOL Multiphysics. Выбор системы координат теперь ограничен граничной системой. Система координат этого объекта была изменена на граничную систему по умолчанию (sys1). Пожалуйста, проверьте систему координат, выбранную в этой функции.
This_model_has_been_saved_in_a_previous_version_of_COMSOL_Multiphysics._Consider_using_the_Pipe_Wall_Heat_Transfer_multiphysics_coupling_feature. = Эта модель была сохранена в предыдущей версии COMSOL Multiphysics. Рассмотрите возможность использования мультифизической связи Pipe Wall теплопередача.
This_model_has_been_saved_in_a_version_of_COMSOL_Multiphysics_earlier_than_6.0._In_current_version_the_boundary_material_is_selected_once_per_side_for_all_surface_properties._The_model_could_not_be_imported_correctly_because_different_materials_were_used_for_different_radiative_properties._Please_check_the_surface_properties_definition_in_this_feature. = Эта модель сохранена в версии COMSOL Multiphysics ниже 6.0. В текущей версии граничный материал выбирается один раз для каждой стороны для всех свойств поверхности. Модель не удалось импортировать правильно, поскольку для разных радиационных свойств использовались разные материалы. Пожалуйста, проверьте определение свойств поверхности в этой функции.
