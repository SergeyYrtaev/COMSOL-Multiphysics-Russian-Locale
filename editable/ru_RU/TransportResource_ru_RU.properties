The_Hydrogen_Fuel_Cell_or_Water_Electrolyzer_interface_should_include_gas_phase_diffusion_and_should_not_use_Darcys_law_for_momemtum_transport = Интерфейс водородного топливного элемента или водного электролизера должен включать диффузию газовой фазы и не должен использовать закон Дарси для переноса импульса.
The_list_of_features_below_use_Opacity_Controlled_or_None_to_define_the_emitted_radiation_direction._For_the_boundaries_using_Opacity_Controlled_option,_if_any,_the_domain_opacities_induce_that_no_radiation_is_emitted._If_these_boundaries_are_not_radiating,_consider_removing_them_from_the_Surface-to-Surface_Radiation_physics_interface_selection._Otherwise,_check_the_domain_and_boundary_opacity._Note_that_the_layer_opacity_is_controlled_by_the_Layer_Opacity_subfeature. = В приведенном ниже списке функций используется «Контролируемая непрозрачность» или «Нет» для определения направления испускаемого излучения. Для границ, использующих опцию «Контролируемая непрозрачность», если таковая имеется, непрозрачность области приводит к тому, что излучение не испускается. \nЕсли эти границы не излучают, рассмотрите возможность удаления их из выбора физического интерфейса «Излучение от поверхности к поверхности». В противном случае проверьте непрозрачность области и границ. Обратите внимание, что непрозрачность слоя контролируется подфункцией «Непрозрачность слоя».
The_Mass_fractions_X_defined_in_the_Transport_of_Concentrated_Species_interface_X_are_not_listed_in_the_Bulk_species_list_in_the_Species_Matching_section_of_the_Chemistry_interface_X._Please_check_that_all_dependent_variables_defined_in_the_Transport_of_Concentrated_Species_interface_are_present_in_Bulk_species_table_in_Chemistry. = Массовые доли #0, определенные в интерфейсе «Перенос концентрированных частиц» #1, не указаны в списке «Основные виды» в разделе «Соответствие видов» интерфейса «Химия» #2. Убедитесь, что все зависимые переменные, определенные в интерфейсе «Перенос концентрированных веществ», присутствуют в таблице «Основные виды» в разделе «Химия».
The_Mass_fractions_below_defined_in_the_Transport_of_Concentrated_Species_interface_are_not_listed_in_the_Bulk_species_list_in_the_Species_Matching_section_of_the_Chemistry_interface._Please_check_that_all_dependent_variables_defined_in_the_Transport_of_Concentrated_Species_interface_are_present_in_Bulk_species_table_in_Chemistry. = Массовые доли, определенные ниже в интерфейсе «Перенос концентрированных веществ», не указаны в списке «Основные виды» в разделе «Сопоставление видов» интерфейса «Химия». Убедитесь, что все зависимые переменные, определенные в интерфейсе «Перенос концентрированных веществ», присутствуют в таблице «Основные виды» в разделе «Химия».
The_Large_Eddy_Simulation_turbulence_model_type_is_not_supported_by_the_Moisture_Flow_multiphysics_coupling._For_turbulent_flow,_select_a_RANS_turbulence_model_instead. = Тип модели турбулентности Large Eddy Simulation не поддерживается мультифизической связью Moisture Flow. Для турбулентного потока вместо этого выберите модель турбулентности RANS.
The_Large_Eddy_Simulation_turbulence_model_type_is_not_supported_by_the_Reacting_Flow_multiphysics_coupling._For_turbulent_flow,_select_a_RANS_turbulence_model_instead. = Тип модели турбулентности Large Eddy Simulation не поддерживается мультифизической связью Reacting Flow. Для турбулентного потока вместо этого выберите модель турбулентности RANS.
