You_are_viewing_an_older_version_of_this_asset_This_version_cannot_be_edited = Вы просматриваете более старую версию этого ресурса. Эта версия не может быть отредактирована.
You_are_viewing_an_older_version_of_this_file_This_version_cannot_be_edited =  Вы просматриваете старую версию этого файла. Эта версия не может быть отредактирована.
You_are_viewing_an_older_version_of_this_item_This_version_cannot_be_edited =  Вы просматриваете старую версию этой статьи. Эта версия не может быть отредактирована.
You_are_viewing_an_older_version_of_this_model_This_version_cannot_be_edited =  Вы просматриваете старую версию этой модели. Эта версия не может быть отредактирована.
