###############################################################################
# Enhanced tooltip texts for .NET ribbon buttons.
###############################################################################
tooltiptext_database_add_all_entity_versions_by_current_search_filter_to_entity_maintenance_view_action = Добавьте все версии, соответствующие текущему поиску в окне Model Manager, в окно обслуживания.
tooltiptext_database_add_all_entity_versions_for_selected_entities_to_entity_maintenance_view_action = Для текущего выбора добавьте все версии, принадлежащие к одним и тем же элементам или черновикам элементов в окно обслуживания.
tooltiptext_database_add_selected_entity_versions_to_entity_maintenance_view_action = Добавьте выбранные версии в окно «Модельный менеджер» в окно «Техническое обслуживание».
tooltiptext_database_cleanup_database_action = Оптимизировать хранение данных: выполнить дедупликацию и очистить неиспользуемые данные, оставшиеся после окончательного удаления.
tooltiptext_database_compare_versions = Сравните выбранную пару элементов (например, модели, приложения или физику) друг с другом. Выберите один элемент, чтобы сравнить его с открытым.
tooltiptext_database_database_open_add_database_view_action = Добавьте новую локальную базу данных, откройте существующую локальную базу данных или подключитесь к серверной базе данных.
tooltiptext_database_delete_all_drafts_action = Удалить навсегда все версии, относящиеся к черновикам выбранных пунктов. Сами выбранные пункты удаляться не будут. Это удалёние не может быть отменено.
tooltiptext_database_delete_entity_action = Постоянно удаляйте все версии, относящиеся к выбранным элементам или их черновикам. Это удалёние не может быть отменено.
tooltiptext_database_delete_entity_version_action = Постоянно удаляйте выбранные версии. Это удалёние не может быть отменено.
tooltiptext_database_delete_entity_versions_for_entity_maintenance_view_target_action = Постоянно удаляйте все версии, на которые в настоящее время нацелено окно обслуживания. Это удалёние не может быть отменено.
tooltiptext_database_entity_statistics_for_entity_selection_action = Для текущего выбора оцените использование дискового пространства всех версий, принадлежащих к одним и тем же элементам или черновикам элементов.
tooltiptext_database_entity_statistics_for_entity_maintenance_view_target_action = Оцените использование дискового пространства всех версий, на которые в настоящее время нацелено окно технического обслуживания.
tooltiptext_database_entity_statistics_for_entity_version_selection_action = Оцените использование дискового пространства выбранных версий.
tooltiptext_database_entity_statistics_for_search_result_action = Оцените использование дискового пространства всех версий, соответствующих текущему поиску в окне Model Manager.
tooltiptext_database_open_bulk_export_view_action = Экспорт элементов (таких как модели, приложения или вспомогательные данные) из базы данных в файловую систему.
tooltiptext_database_open_bulk_import_view_action = Импорт файлов (например, моделей, приложений или вспомогательных данных) из файловой системы в базу данных.
tooltiptext_database_open_commit_history_view_gui_database_item_action = Открыть окно коммитов, чтобы показать все коммиты ветки, при необходимости ограничив список коммитами, связанными с выбранным элементом. Каждый коммит представляет собой набор изменений в базе данных, например новые версии, назначения тегов и удаления.
tooltiptext_database_open_create_access_control_template_view_action = Добавьте шаблон разрешения.
tooltiptext_database_open_create_branch_view_action = Создать ветку из текущего состояния существующей ветки, из снимка или из конкретного коммита, при необходимости с фильтрацией по текущему выбору. Это позволяет параллельно изменять несколько элементов, создавая отдельную последовательность коммитов в репозитории.
tooltiptext_database_open_create_commit_tag_view_action = Записать снимок текущего состояния ветки или конкретного коммита.
tooltiptext_database_open_create_repository_view_action = Добавить репозиторий для группирования коллекции элементов. Каждый репозиторий содержит начальную ветку, в которой сохраняются версии элементов.
tooltiptext_database_open_create_tag_view_action = Добавьте новый тег в базу данных. Тег может быть добавлен непосредственно без родительского тега или в качестве детского тега к одному или нескольким другим тегам. Другие элементы могут быть позже помечены новым тегом.
tooltiptext_database_open_create_user_group_view_action = Добавьте группу.
tooltiptext_database_open_create_user_profile_view_action = Добавить пользователя.
tooltiptext_database_open_current_model_version_history = Откройте окно Версии, чтобы показать все версии текущей модели или приложения.
tooltiptext_database_open_database_perspective = Откройте рабочее пространство Model Manager для просмотра и управления настроенными базами данных.
tooltiptext_database_open_database_tree_view_action = Откройте окно базы данных.
tooltiptext_database_open_edit_access_control_view_gui_database_item_action = Установите разрешения для выбора.
tooltiptext_database_open_edit_view_action = Откройте окно настроек, чтобы отобразить настройки текущего выбора.
tooltiptext_database_open_entity_maintenance_view_action = Откройте окно технического обслуживания для выполнения операций по техническому обслуживанию версий моделей и файлов.
tooltiptext_database_open_entity_version_links_view_action = Откройте окно Ссылки, чтобы показать все ссылки версии для элемента.
tooltiptext_database_open_entity_version_view_gui_database_item_action = Открыть окно версий, чтобы показать все версии элемента относительно ветки.
tooltiptext_database_open_file_in_external_editor_action = Просмотрите выбранный файл, открыв его с помощью приложения по умолчанию для его типа файла.
tooltiptext_database_open_global_database_source_action = Активировать базу данных, подключив и обновив для неё окна Model Manager, баз данных и коммитов.
tooltiptext_database_open_merge_branch_view_action = Открыть окно слияния, чтобы объединить изменения элементов из исходного расположения в целевую ветку. Источником может быть ветка, снимок или конкретный коммит. Слияние может потребовать разрешения конфликтов, если один и тот же элемент был изменён как в источнике, так и в цели после последнего слияния.
tooltiptext_database_open_model_from_database = Откройте выбранный элемент (например, модель, приложение или физику).
tooltiptext_database_open_rebuild_file_database_view_action = Оптимизируйте локальную базу данных путем уплотнения файла базы данных. 
tooltiptext_database_open_remove_entity_view_action = Удалить выбранные элементы. Удаление не является окончательным; элементы можно будет восстановить позже из окна коммитов.
tooltiptext_database_open_save_tags_view_gui_database_item_action = Установите назначенные теги выбранных элементов.
tooltiptext_database_open_set_owner_view_action = Установите владельца выбора.
tooltiptext_database_purge_entity_resources_for_all_drafts_action = Очистить построенные, вычисленные и отображённые данные всех версий, принадлежащих черновикам выбранных моделей. Данные, относящиеся к самим выбранным моделям, не будут затронуты. Очистка не может быть отменена.
tooltiptext_database_purge_entity_resources_for_entities_action = Очистить построенные, вычисленные и отображённые данные всех версий, принадлежащих выбранным моделям или их чертежам. Очистка не может быть отменена.
tooltiptext_database_purge_entity_resources_for_entity_maintenance_view_target_action = Очистить построенные, вычисленные и отображённые данные всех версий моделей, на которые в настоящее время нацелено окно технического обслуживания. Очистка не может быть отменена.
tooltiptext_database_purge_entity_resources_for_entity_versions_action = Четко построенные, вычисленные и построенные данные выбранных версий моделей. Очистка не может быть отменена.
tooltiptext_database_run_model_from_database = Запустите выбранное приложение.
tooltiptext_database_toggle_database_tree_view_action = Переключите видимость окна баз данных.

###############################################################################
# Static texts for the Model Manager server web frontend.
###############################################################################
db_webtext_admin_already_used_postgresql_directory_warning = Каталог данных уже существует и содержит файлы, не относящиеся к PostgreSQL®.
db_webtext_admin_already_used_solr_directory_warning = Каталог данных уже существует и содержит файлы, не относящиеся к Apache Solr™.
db_webtext_admin_managedresourcesdirectory_label_restore = Восстановление будет копировать файлы из каталога резервного копирования в каталог данных назначения. Только файлы, на которые ссылается база данных с помощью этого каталога ресурсов, будут скопированы, и только если они ещё не присутствуют в пункте назначения.
db_webtext_admin_managedresourcesdirectory_label_restore_info = Восстановление выполняется в следующий раз, когда база данных, использующая этот каталог ресурсов, активна, или сразу, если уже есть существующая активная база данных, использующая ее.
db_webtext_admin_managedsqldatabaseserver_label_restore = Восстановление будет копировать самую последнюю резервную копию базы из корневой директории резервной копии в директорию данных назначения, а затем запускать сервер в режиме восстановления, чтобы восстановить его в самое последнее состояние резервного копирования.
db_webtext_admin_managedsqldatabaseserver_label_restore_warning = Существующий каталог данных не является пустым и может использоваться. Вы уверены, что все равно хотите восстановиться? Существующий каталог данных будет переименован перед восстановлением, чтобы избежать перезаписи с восстановленными данными.
db_webtext_admin_migrated_data_directory_warning = Изменилось расположение каталога данных. Обязательно переместите соответствующий каталог файловой системы в новое место.
db_webtext_search_attachment_filename_placeholder = Введите имя файла для фильтрации на...
db_webtext_search_attachment_filename_tooltip = Имя файла привязанности. Используйте * для карточек.
db_webtext_search_boolean_tooltip = Булева ценность.
db_webtext_search_date_tooltip = Значение даты.
db_webtext_search_file_version_title_tooltip = Название версии файла. Используйте * для подстановочных знаков и "" для фраз.
db_webtext_search_fulltext_assets_placeholder = Поиск ресурсов...
db_webtext_search_fulltext_models_placeholder = Модели поиска...
db_webtext_search_fulltext_tooltip = Полнотекстовый поиск и пользовательские выражения фильтра. Используйте * для подстановочных знаков и "" для фраз. Синтаксис поиска Model Manager см. в документации.
db_webtext_search_integer_placeholder = Введите целое число...
db_webtext_search_integer_tooltip = Целая стоимость.
db_webtext_search_keyword_placeholder = Введите значение для фильтрации на...
db_webtext_search_keyword_tooltip = Ключевое слово. Используйте * для карточек.
db_webtext_search_keyword_array_placeholder = Введите значение (значения) для фильтрации на...
db_webtext_search_keyword_array_tooltip = Ценность массива ключевых слов. Используйте * для карточек.
db_webtext_search_link_tooltip = Текст ссылки. Используйте * для подстановочных знаков и "" для фраз.
db_webtext_search_model_version_title_placeholder = Введите заголовок для фильтрации на...
db_webtext_search_model_version_title_tooltip = Название модели. Используйте * для подстановочных знаков и "" для фраз.
db_webtext_search_text_placeholder = Введите значение для фильтрации на...
db_webtext_search_text_tooltip = Значение текста. Используйте * для подстановочных знаков и "" для фраз.
