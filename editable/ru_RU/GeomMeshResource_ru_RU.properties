partdescr_acdc/sc_liw_rc_closed_hoops = Однопроводная катушка – Линейный провод, гоночная трасса, замкнутые кольца\n\nЭто производная от "Single Conductor Coil – Generic" геометрической части, где:\n\n• Тип провода ограничен "line wire"; провод будет линией или краем.\n• Тип ядра установлен на "rectangular with fillet" (по умолчанию); размеры можно задать с помощью входных параметров "coil_width" и "coil_depth". Размер скругления можно настроить с помощью параметра "coil_fillet". Радиус скругления катушки имеет нижнюю границу, которая устанавливается равной половине ширины поперечного сечения провода.\n• Тип соединения ограничен "closed hoops"; повороты не имеют наклона и образуют отдельные кольца. Это довольно хорошо аппроксимирует спираль, сохраняя при этом симметрию. Входной параметр "partitioning" можно использовать для оснащения пялец разделительной поверхностью.\n\nДля получения дополнительной информации ознакомьтесь с документацией по части геометрии "Single Conductor Coil – Generic".
partdescr_acdc/sc_generic_shape = Single Conductor Coil – Generic\n\nЭто общая однопроводная катушка, которая используется в качестве основы для других более специализированных частей однопроводниковой катушки. Все настройки ввода остаются разблокированными, что означает, что часть может трансформироваться в любой из других катушек (высокая гибкость, низкая сложность).\n\n Для получения дополнительной информации, пожалуйста, проверьте документацию (см. соответствующий документ *.pdf).
partdescr_acdc/hc_dom_cylindrical = Гомогенизированная многовитковая катушка — область, цилиндрическая\n\nЭто производная от геометрической части "Homogenized Multiturn Coil – Generic", где:\n\n• Тип катушки ограничен значением "domain coil"; размеры поперечного сечения пучка задаются входными параметрами "coil_thickness" и "coil_height".\n• Тип сердечника ограничен значением "cylindrical"; диаметр задается входным параметром "coil_diameter".\n\nДополнительные сведения см. в документации к геометрической части "Homogenized Multiturn Coil – Generic".
partdescr_acdc/hc_dom_racetrack = Homogenized Multiturn Coil – Domain, Racetrack\n\nЭто производная от части геометрии "Homogenized Multiturn Coil – Generic", где:\n\n• Тип катушки был ограничен "domain coil"; размеры сечения пучка могут быть установлены с помощью "coil_thickness" и "coil_height" входных параметров.\n• Тип ядра был установлен на "rectangular with fillet" (по умолчанию); размеры могут быть установлены с использованием входных параметров "coil_width" и "coil_depth". Размер филе можно скорректировать с помощью параметра "coil_fillet". Наружный радиус филе катушки имеет нижнюю границу, равную "coil_thickness"\n\n Для получения дополнительной информации, пожалуйста, проверьте документацию на "Homogenized Multiturn Coil – Generic" часть геометрии.
partdescr_acdc/hc_dom_rectangular_with_fillet = Гомогенизированная многовитковая катушка – Относящаяся к области, прямоугольная, скругленная\n\nЭто производная от "Homogenized Multiturn Coil – Generic" геометрической части, где:\n\n• Тип катушки ограничен "domain coil"; размеры поперечного сечения жгута можно задать с помощью входных параметров "coil_thickness" и "coil_height".\n• Тип ядра ограничен "rectangular with fixed fillet"; размеры можно задать с помощью входных параметров "coil_width" и "coil_depth". Радиус внешнего скругления рулона был ограничен толщиной пучка, что привело к образованию острого угла внутри.\n\nДля получения дополнительной информации ознакомьтесь с документацией по части геометрии "Homogenized Multiturn Coil – Generic".
partdescr_acdc/hc_dom_rectangular_with_sharp_corner = Гомогенизированная многовитковая катушка – Область, прямоугольная, с острыми углами\n\nЭто производная от "Homogenized Multiturn Coil – Generic" геометрической части, где:\n\n• Тип катушки ограничен "domain coil"; размеры поперечного сечения жгута можно задать с помощью входных параметров "coil_thickness" и "coil_height".\n• Тип сердцевины ограничен "rectangular with sharp corner" (без скругления); размеры можно задать с помощью входных параметров "coil_width" и "coil_depth".\n\nДля получения дополнительной информации ознакомьтесь с документацией по части геометрии "Homogenized Multiturn Coil – Generic".
partdescr_acdc/hc_hob_circular = Homogenized Multiturn Coil – Horizontal Boundary, Circular\n\nЭто производная от части геометрии "Homogenized Multiturn Coil – Generic", где:\n\n• Тип катушки был ограничен "horizontal boundary coil"; толщину пучка можно установить с помощью параметра ввода "coil_thickness"\n• Тип ядра ограничен "circular"; диаметр может быть установлен с помощью параметра ввода "coil_diameter"\n\n Для получения дополнительной информации, пожалуйста, проверьте документацию на "Homogenized Multiturn Coil – Generic" часть геометрии.
partdescr_acdc/hc_hob_racetrack = Homogenized Multiturn Coil – Horizontal Boundary, Racetrack\n\nЭто производная от части геометрии "Homogenized Multiturn Coil – Generic", где:\n\n• Тип катушки был ограничен "horizontal boundary coil"; толщину пучка можно установить с помощью параметра ввода "coil_thickness"\n• Основной тип был установлен на "rectangular with fillet" (по умолчанию); размеры могут быть установлены с использованием входных параметров "coil_width" и "coil_depth". Размер филе можно скорректировать с помощью параметра "coil_fillet". Наружный радиус филе катушки имеет нижнюю границу, которая равна "coil_thickness"\n\n Для получения дополнительной информации, пожалуйста, проверьте документацию на "Homogenized Multiturn Coil – Generic" часть геометрии.
partdescr_acdc/hc_hob_rectangular_with_fillet = Homogenized Multiturn Coil – Horizontal Boundary, Rectangular, Fillet\n\nЭто производная от части геометрии "Homogenized Multiturn Coil – Generic", где:\n\n• Тип катушки был ограничен "horizontal boundary coil"; толщину пучка можно установить с помощью параметра ввода "coil_thickness"\n• Тип ядра был ограничен "rectangular with fixed fillet"; размеры могут быть установлены с использованием входных параметров "coil_width" и "coil_depth". Наружный радиус филе катушки был ограничен, чтобы быть равным толщине пучка, в результате чего острый угол на внутренней стороне.\n\n Для получения дополнительной информации, пожалуйста, проверьте документацию на "Homogenized Multiturn Coil – Generic" часть геометрии.
partdescr_acdc/hc_hob_rectangular_with_sharp_corner = Homogenized Multiturn Coil – Horizontal Boundary, Rectangular, Sharp Corner\n\nЭто производная от части геометрии "Homogenized Multiturn Coil – Generic", где:\n\n• Тип катушки был ограничен "horizontal boundary coil"; толщину пучка можно установить с помощью параметра ввода "coil_thickness"\n• Тип ядра был ограничен "rectangular with sharp corner" (без филе); размеры могут быть установлены с помощью "coil_width" и "coil_depth" входных параметров.\n\n Для получения дополнительной информации, пожалуйста, проверьте документацию на "Homogenized Multiturn Coil – Generic" часть геометрии.
partdescr_acdc/hc_veb_cylindrical = Homogenized Multiturn Coil – Vertical Boundary, Cylindrical\n\nЭто производная от части геометрии "Homogenized Multiturn Coil – Generic", где:\n\n• Тип катушки был ограничен "vertical boundary coil"; высота пучка может быть установлена с помощью параметра ввода "coil_height"\n• Тип ядра ограничен "cylindrical"; диаметр может быть установлен с помощью параметра ввода "coil_diameter"\n\n Для получения дополнительной информации, пожалуйста, проверьте документацию на "Homogenized Multiturn Coil – Generic" часть геометрии.
partdescr_acdc/hc_veb_racetrack = Homogenized Multiturn Coil – Vertical Boundary, Racetrack\n\nЭто производная от части геометрии "Homogenized Multiturn Coil – Generic", где:\n\n• Тип катушки был ограничен "vertical boundary coil"; высота пучка может быть установлена с помощью параметра ввода "coil_height"\n• Основной тип был установлен на "rectangular with fillet" (по умолчанию); размеры могут быть установлены с использованием входных параметров "coil_width" и "coil_depth". Размер филе можно скорректировать с помощью "coil_fillet" parameter.\n\n Для получения дополнительной информации, пожалуйста, проверьте документацию на "Homogenized Multiturn Coil – Generic" часть геометрии.
partdescr_acdc/hc_veb_rectangular = Homogenized Multiturn Coil – Vertical Boundary, Rectangular\n\nЭто производная от части геометрии "Homogenized Multiturn Coil – Generic", где:\n\n• Тип катушки был ограничен "vertical boundary coil"; высота пучка может быть установлена с помощью параметра ввода "coil_height"\n• Тип ядра был ограничен "rectangular with sharp corner" (без филе); размеры могут быть установлены с помощью "coil_width" и "coil_depth" входных параметров.\n\n Для получения дополнительной информации, пожалуйста, проверьте документацию на "Homogenized Multiturn Coil – Generic" часть геометрии.
partdescr_acdc/hc_generic_shape = Homogenized Multiturn Coil – Generic\n\n Это универсальная гомогенизированная часть многооборотной катушки, которая используется в качестве основы для других более специализированных частей многооборотной катушки. Все настройки ввода остаются разблокированными, что означает, что часть может трансформироваться в любой из других катушек (высокая гибкость, низкая сложность).\n\n Для получения дополнительной информации, пожалуйста, проверьте документацию (см. соответствующий документ *.pdf).
partdescr_acdc/mc_sip_core_form = Magnetic Core – Single-Phase, Core Form\n\nЭто производная от части геометрии "Magnetic Core – Generic", где:\n\n• Фазовый тип был ограничен "single-phase"\n• Тип ядра был ограничен "core form"\n\n Для получения дополнительной информации, пожалуйста, проверьте документацию на "Magnetic Core – Generic" часть геометрии.
partdescr_acdc/mc_sip_shell_form = Магнитное ядро – Single-Phase, Shell Form\n\nЭто производная от части геометрии "Magnetic Core – Generic", где:\n\n• Фазовый тип был ограничен "single-phase"\n• Тип ядра был ограничен "shell form"\n\n Для получения дополнительной информации, пожалуйста, проверьте документацию на "Magnetic Core – Generic" часть геометрии.
partdescr_acdc/mc_thp_core_form = Magnetic Core – Three-Phase, Core Form\n\nЭто производная от части геометрии "Magnetic Core – Generic", где:\n\n• Фазовый тип был ограничен "three-phase"\n• Тип ядра был ограничен "core form"\n\n Для получения дополнительной информации, пожалуйста, проверьте документацию на "Magnetic Core – Generic" часть геометрии.
partdescr_acdc/mc_thp_shell_form = Магнитное ядро – Three-Phase, Shell Form\n\nЭто производная от части геометрии "Magnetic Core – Generic", где:\n\n• Фазовый тип был ограничен "three-phase"\n• Тип ядра был ограничен "shell form"\n\n Для получения дополнительной информации, пожалуйста, проверьте документацию на "Magnetic Core – Generic" часть геометрии.
partdescr_acdc/mc_generic_shape = Магнитное ядро – Generic\n\n Это общая часть магнитного ядра, которая используется в качестве основы для других более специализированных частей магнитного ядра. Все настройки ввода остаются разблокированными, что означает, что часть может трансформироваться в любом из других ядер (восход - гибкость, недостаток - сложность).\n\n Для получения дополнительной информации, пожалуйста, проверьте документацию (см. соответствующий документ *.pdf).
partdescr_heat/heat_sink_dissimilar_border = Heat Sink – Dissimilar Border Pins\n\n Геометрическая часть с распределением пин-финов в направлениях x и y. Граничные плавники в направлении y могут иметь разные формы.
partdescr_heat/heat_sink_parameterized = Heat Sink – Parameterized Fin Types\n\nHeat sink geometry part that support multiple parameterization. Определите тип плавника среди трех возможных вариантов: 1-пиновые плавники, 2-разнородные пограничные штифты, 3-прямые плавники
partdescr_heat/heat_sink_pins = Heat Sink – Pin Fins\n\n Геометрическая часть с распределением пин-финов в направлениях x и y.
partdescr_heat/heat_sink_straight_fins = Heat Sink – Straight Fins\n\n Геометрическая часть с распределением прямых плавников в направлении x.
partdescr_mbd/bevel_gear = Bevel Gear\n\nBevel gear geometry. Зубное филе, центральное отверстие, удаление материала из зубчатой заготовки и вала являются необязательными.
partdescr_mbd/gear_tooth_2d = Gear Tooth (2D)\n\nЗубное сечение внешней передачи.
partdescr_mbd/helical_gear = Helical Gear\n\nHelical gear geometry. Зубное филе, центральное отверстие, удаление материала из зубчатой заготовки и вала являются необязательными.
partdescr_mbd/helical_rack = Helical Rack\n\nHelical rack geometry. Зубное филе необязательно.
partdescr_mbd/internal_gear_tooth_2d = Внутренний зубной протез (2D)\n\nЗубное поперечное сечение внутренней передачи.
partdescr_mbd/internal_helical_gear = Internal Helical Gear\n\nВнутренняя геометрия спиральной передачи. Зубное филе необязательно.
partdescr_mbd/internal_spur_gear = Внутренний Spur Gear\n\nВнутренняя геометрия шпор. Зубное филе необязательно.
partdescr_mbd/internal_spur_gear_2d = Внутренний Spur Gear (2D)\n\nВнутренняя геометрия шпор. Зубное филе необязательно.
partdescr_mbd/rack_tooth_2d = Rack Tooth (2D)\n\nЗубное сечение стойки.
partdescr_mbd/roller_chain = Roller Chain\n\nГеометрия стандартной роликовой цепи.
partdescr_mbd/roller_chain_2d = Roller Chain (2D)\n\nГеометрия стандартной роликовой цепи в 2D.
partdescr_mbd/roller_chain_sprocket_assembly=Roller Chain Sprocket\n\nГеометрия стандартной роликовой цепи.
partdescr_mbd/roller_chain_sprocket_assembly_2d=Roller Chain Sprocket (2D)\n\nГеометрия стандартной роликовой цепи в 2D.
partdescr_mbd/sprocket = Звездочка\n\nГеометрия звездочки.
partdescr_mbd/sprocket_2d = Sprocket (2D)\n\nГеометрия ракетки в 2D.
partdescr_mbd/spur_gear = Spur Gear\n\nSpur gear geometry. Зубное филе, центральное отверстие, удаление материала из зубчатой заготовки и вала являются необязательными.
partdescr_mbd/spur_gear_2d = Spur Gear (2D)\n\nSpur gear geometry. Зубное филе и центральное отверстие являются необязательными.
partdescr_mbd/spur_rack = Spur Rack\n\nSpur (прямая) геометрия стойки. Зубное филе необязательно.
partdescr_mbd/spur_rack_2d = Spur Rack (2D)\n\nSpur (прямая) геометрия стойки. Зубное филе необязательно.
partdescr_mbd/worm_gear = Worm Gear\n\nWorm geometry. Зубное филе и ошейники являются необязательными.
partdescr_mfl/cross_channel_2d = Перекрестный канал 2D\n\nMicrofluidics с двумя пошаговыми входами.
partdescr_mfl/cross_channel_3d_rectangular_cross_section = Cross Channel 3D, прямоугольное сечение\n\nМикрофлюидный канал с двумя расположенными в шахматном порядке входными отверстиями прямоугольного сечения.
partdescr_mfl/cross_channel_3d_circular_cross_section = Cross Channel 3D, круглое сечение\n\nМикрофлюидный канал с двумя расположенными в шахматном порядке входными отверстиями круглого сечения.
partdescr_mfl/serpentine_channel_2d_rounded = Змеиный канал 2D, закругленный\n\nЗмеевидный канал микрофлюидики с закругленными концами.
partdescr_mfl/serpentine_channel_2d_squared = Змеевидный канал 2D, квадратный\n\nЗмеевидный канал микрофлюидики с квадратными концами.
partdescr_mfl/serpentine_channel_3d_rounded_circular_cross_section = Змеиный канал 3D, закругленный, круглого сечения\n\nЗмеевидный канал микрофлюидики с закругленными концами и круглым поперечным сечением.
partdescr_mfl/serpentine_channel_3d_rounded_rectangular_cross_section = Змеиный канал 3D, закругленный, прямоугольного сечения\n\nЗмеевидный канал микрофлюидики с закругленными концами и прямоугольным поперечным сечением.
partdescr_mfl/serpentine_channel_3d_squared_circular_cross_section = Змеевидный канал 2D, квадратный, круглого сечения\n\nЗмеевидный канал микрофлюидики с квадратными концами и круглым поперечным сечением.
partdescr_mfl/serpentine_channel_3d_squared_rectangular_cross_section = Змеевидный канал 2D, квадратный, прямоугольного сечения\n\nЗмеевидный канал микрофлюидики с квадратными концами и прямоугольным поперечным сечением.
partdescr_mfl/y_channel_2d = Канал Y-Channel 2D\n\nMicrofluidics с двумя наклонными входами.
partdescr_mfl/y_channel_3d_rectangular_cross_section = Y-Channel 3D, Прямоугольное поперечное сечение\n\nMicrofluidics канал с двумя угловыми входами с прямоугольным поперечным сечением.
partdescr_mfl/y_channel_3d_circular_cross_section = Y-канал 3D, круглое сечение\n\nМикрофлюидный канал с двумя угловыми входами круглого сечения.
partdescr_mixer/anchor_impeller = Якорное рабочее колесо\n\nГеометрия анкерного рабочего колеса. 
partdescr_mixer/backswept_impeller = Рабочее колесо обратной стреловидности\n\nГеометрия рабочего колеса обратной стреловидности.
partdescr_mixer/backswept_rushton_impeller = Рабочее колесо Раштона обратной стреловидности\n\nГеометрия рабочего колеса Раштона обратной стреловидности.
partdescr_mixer/c_shaped_outer_blade_impeller = C-образный внешний клинок Impeller\n\nC-образная геометрия наружного лезвия.
partdescr_mixer/cone_bottom_tank = Cone Bottom Tank\n\nГеометрия нижней части цистерны.
partdescr_mixer/dished_bottom_tank = Бак с выпуклым дном\n\nГеометрия резервуара с вогнутым дном.
partdescr_mixer/flat_bottom_tank = Бак с плоским дном\n\nГеометрия резервуара с плоским дном.
partdescr_mixer/hydrofoil_impeller = Рабочее колесо на подводных крыльях\n\nГеометрия рабочего колеса подводного крыла.
partdescr_mixer/hydrofoil_impeller_constant_pitch = Рабочее колесо подводного крыла с постоянным шагом\n\nРабочее колесо на подводных крыльях с постоянной геометрией шага.
partdescr_mixer/impeller_shaft = Вал крыльчатки\n\nГеометрия вала рабочего колеса.
partdescr_mixer/pitched_blade_impeller = Рабочее колесо со скошенными лопастями\n\nГеометрия рабочего колеса со скошенными лопатками.
partdescr_mixer/pitched_blade_impeller_bent_blade = Рабочее колесо со скошенными изогнутыми лопастями\n\nГеометрия рабочего колеса со скошенными изогнутыми лопастями.
partdescr_mixer/pitched_blade_impeller_constant_pitch = Крыльчатка со скошенными лопастями и постоянным шагом\n\nРабочее колесо со скошенными лопатками и постоянной геометрией шага.
partdescr_mixer/propeller_constant_pitch = Пропеллер с постоянной геометрией шага Pitch\n\nPropeller.
partdescr_mixer/rushton_impeller = Раштон Импеллер\n\nГеометрия рабочего колеса Раштона.
partdescr_mixer/smith_impeller = Смит Импеллер\n\nГеометрия рабочего колеса Смита.
partdescr_mph/bend = Bend\n\nPipe bend (локтевой) с факультативными прямыми ногами.
partdescr_mph/bidirectional_fiber = Двунаправленная клетка Fiber Composite\n\nA с круговыми волокнами, окруженными матрицей. Одно волокно размещено в центре продольного поперечного сечения ячейки, а четвертные волокна размещены в углах бокового поперечного сечения ячейки.\n\n Либо указать диаметр волокна и размеры ячейки, либо фракцию объема волокна и размеры ячейки.
partdescr_mph/bidirectional_non_crimp_fiber = Двунаправленная клетчатка без креветок Composite\n\nA с прямыми волоконными нитями в продольном и боковом направлениях, встроенными в матрицу.
partdescr_mph/bidirectional_plain_weave_fiber = Двунаправленная плоская тканая клетка Composite\n\nA с волоконными нитями в обычном плетении, встроенном в матрицу. Волокна могут иметь эллиптическое или круглое поперечное сечение.
partdescr_mph/cube = Cube\n\nA куб, указанный с использованием длины края, среднего радиуса, индрадиуса или окружности.
partdescr_mph/dodecahedron = Dodecahedron\n\nA обычный додекаэдр, указанный с использованием длины края, среднего радиуса, индрадиуса или окружности.
partdescr_mph/gyroid = Ячейка Gyroid\n\nA для гироида с трехкратной периодической минимальной поверхностью.
partdescr_mph/honeycomb_circular_cross_section = Соты, круглого сечения\n\nЯчейка для сотовой конструкции круглого сечения.
partdescr_mph/honeycomb_hexagonal_cross_section = Соты, шестиугольное сечение\n\nЯчейка для сотовой конструкции шестиугольного сечения.
partdescr_mph/honeycomb_rectangular_cross_section_aligned = Соты, прямоугольного сечения с выровненной насадкой\n\nЯчейка для сотовой конструкции прямоугольного сечения. Поперечное сечение расположено соосно.
partdescr_mph/honeycomb_rectangular_cross_section_staggered = Honeycomb, секция прямоугольного креста с ступенчатой упаковкой\n\nA сотовой структуры с прямоугольным сечением. Поперечное сечение устроено пошагово.
partdescr_mph/honeycomb_triangular_cross_section = Соты, треугольного сечения\n\nЯчейка для сотовой конструкции треугольного сечения.
partdescr_mph/icosahedron = Icosahedron\n\nA обычный икосаэдр, указанный с использованием длины края, среднего радиуса, индрадиуса или окружности.
partdescr_mph/octahedron = Octahedron\n\nA обычный октаэдр, указанный с использованием длины края, среднего радиуса, индрадиуса или окружности.
partdescr_mph/particulate_body_centered_cubic = Композит частиц, ячейка Cubic\n9000000000001A с сферическими частицами, окруженными матрицей. Одна сферическая частица размещена в центре, а одна восьмая частица размещена в углах ячейки.\n\n Либо указать диаметр частиц и размеры ячеек, либо фракцию объема частиц и размеры ячеек.
partdescr_mph/particulate_face_centered_cubic = Particulate Composite, Face-Centered Cubic\n\nA со сферическими частицами, окруженными матрицей. Половину сферических частиц помещают в центр лица, а одну восьмую частицы помещают в углах ячейки.\n\n Либо указать диаметр частиц и размеры ячеек, либо фракцию объема частиц и размеры ячеек.
partdescr_mph/particulate_primitive_cubic = Particulate Composite, Primitive Cubic\n\nA со сферической частицей, окруженной матрицей. Сферическая частица помещается в центр матрицы. Вместо частицы можно создать внутреннюю пустоту для моделирования структуры пены.\n\n Либо указать диаметр частиц и размеры ячеек, либо фракцию объема частиц и размеры ячеек.
partdescr_mph/random_flat_surface= Случайный плоский прямоугольник Surface\n\nA возмущен в нормальном направлении с использованием серии Фурье с нормально распределенными коэффициентами. Укажите либо амплитуду, либо шероховатость поверхности.
partdescr_mph/reducer= Reducer\n\nConical сегмент труб с факультативно изменяющейся толщиной стенки и филе.
partdescr_mph/round_corrugation = Круглая Гофра\n\nЭлементарная ячейка для круглого гофрированного листа.
partdescr_mph/round_flanged_corrugation = Круглая фланцевая гофра\n\nЭлементарная ячейка для гофрированного листа с круглыми полками.
partdescr_mph/sandwich = Сотовый телефон Sandwich\n\nA для структуры сэндвича.
partdescr_mph/sinusoidal_corrugation = Синусоидальное гофрирование\n\nЭлементарная ячейка синусоидального гофрированного листа.
partdescr_mph/straight = Прямой\n\nПрямой участок трубы.
partdescr_mph/t_junction = T-Junction\n\nT-переход, состоящий из основного сегмента и сегмента филиала. Фильтры могут быть добавлены вручную при переходе основных и ветвленных стенок труб с использованием ядра САПР и предопределенных вариантов кромки.
partdescr_mph/tetrahedron = Tetrahedron\n\nA обычный тетраэдр, указанный с использованием длины края, среднего радиуса, индрадиуса или окружности.
partdescr_mph/trapezoidal_corrugation = Трапециевидное гофрирование\n\nЭлементарная ячейка трапециевидного гофрированного листа.
partdescr_mph/triangular_corrugation = Треугольная ячейка Corrugation\n\nA для треугольного гофрированного листа.
partdescr_mph/unidirectional_fiber_hexagonal_packing = Однонаправленный волоконный композит, Hexagonal Packing\n\nA ячейка с круговыми волокнами, окруженная матрицей. Одно волокно размещено в центре, а четверть волокна размещены в углах продольного сечения ячейки.\n\n Либо указать диаметр волокна и размеры ячейки, либо фракцию объема волокна и размеры ячейки.
partdescr_mph/unidirectional_fiber_square_packing = Unidirectional Fiber Composite, Square Packing\n\nA ячейка с круговым волокном, окруженная матрицей. Волокно помещается в центре продольного сечения клетки. Вместо области волокна можно создать внутреннюю пустоту для моделирования микроканала.\n\n Либо указать диаметр волокна и размеры ячейки, либо фракцию объема волокна и размеры ячейки.
partdescr_mph/unidirectional_fiber_hexagonal_packing_2d = Однонаправленный волоконный композит, Hexagonal Packing\n\nA ячейка с круговыми волокнами, окруженная матрицей. Одно волокно размещено в центре, а четверть волокна размещены в углах продольного сечения ячейки.\n\n Либо указать диаметр волокна и размеры ячейки, либо фракцию объема волокна и размеры ячейки.
partdescr_mph/unidirectional_fiber_square_packing_2d = Unidirectional Fiber Composite, Square Packing\n\nA ячейка с круговым волокном, окруженная матрицей. Волокно помещается в центре продольного сечения клетки. Вместо области волокна можно создать внутреннюю пустоту для моделирования микроканала.\n\n Либо указать диаметр волокна и размеры ячейки, либо фракцию объема волокна и размеры ячейки.
