partdescr_acdc/sc_awg_cc_closed_corner = Single Conductor Coil – Round Wire (AWG), Cylindrical, Closed Corner\n\nЭто производная от части геометрии "Single Conductor Coil – Generic", где:\n\n• Тип провода был ограничен "round wire" (American Wire Gauge); диаметр может быть установлен с помощью параметра ввода "wire_diameter_awg". Внутренне это значение преобразуется в "wire_diameter", используя выражение "wire_diameter = 0.005[inch]*92^((36-wire_diameter_awg)/39)". Поддерживаются нецелые значения AWG. Поскольку это аналитическое преобразование, а не таблица поиска, для значений AWG "00", "000" и "0000" следует использовать отрицательные целые числа "-1", "-2" и "-3".9000000000017• Тип ядра ограничен "cylindrical" (или круговой); диаметр может быть установлен с помощью параметра ввода "coil_diameter"\n• Тип соединения был ограничен "closed corner"; обратная петля была помещена в угол (при условии прямоугольной формы ядра) под углом 45 градусов по отношению к плоскости xz.\n\n Для получения дополнительной информации, пожалуйста, проверьте документацию на "Single Conductor Coil – Generic" часть геометрии.
