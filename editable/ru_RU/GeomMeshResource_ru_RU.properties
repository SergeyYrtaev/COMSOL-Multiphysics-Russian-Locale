partdescr_acdc/synch_edrive_3d_stat_par_slots_2d = Sync EDrive 3D – Stator Parallel Slots 2D\n\nЭто часть геометрии двигателя, используемая в контексте (все еще экспериментальной) модели двигателя 'Synchronous Electric Drive 3D'. Эти модели являются частью серии Motor Tutorial.
partdescr_acdc/synch_edrive_3d_rot_emb_vshape_2d = Sync EDrive 3D – Rotor Embedded V-образный 2D\n\nЭто часть геометрии двигателя, используемая в контексте (все еще экспериментальной) модели двигателя 'Synchronous Electric Drive 3D'. Эти модели являются частью серии Motor Tutorial.
partdescr_acdc/synch_edrive_3d_hairp_conn_bracket = Sync EDrive 3D Subpart – Hairpin Connector Bracket\n\nЭто подчасть, используемая в контексте (по-прежнему экспериментальных) моделей двигателей 'Synchronous Electric Drive 3D'. Эти модели являются частью серии Motor Tutorial.
partdescr_acdc/synch_edrive_3d_hairp_conn_joint = Sync EDrive 3D Subpart – Hairpin Connector Solder Joint\n\nЭто подчасть, используемая в контексте (по-прежнему экспериментальных) моделей двигателей 'Synchronous Electric Drive 3D'. Эти модели являются частью серии Motor Tutorial.
partdescr_acdc/synch_edrive_3d_hairp_conn_endcap = Sync EDrive 3D Subpart – Hairpin Connector End Cap\n\nЭто часть, используемая в контексте (по-прежнему экспериментальных) моделей двигателей 'Synchronous Electric Drive 3D'. Эти модели являются частью серии Motor Tutorial.
partdescr_acdc/synch_edrive_3d_stat_par_slots_3d = Sync EDrive 3D – Stator Parallel Slots 3D\n\nЭто часть геометрии двигателя, используемая в контексте (все еще экспериментальной) модели двигателя 'Synchronous Electric Drive 3D'. Эти модели являются частью серии Motor Tutorial.
partdescr_acdc/synch_edrive_3d_rot_emb_vshape_3d = Sync EDrive 3D – Rotor Embedded V-образный 3D\n\nЭто часть геометрии двигателя, используемая в контексте (все еще экспериментальной) модели двигателя 'Synchronous Electric Drive 3D'. Эти модели являются частью серии Motor Tutorial.
partdescr_acdc/embedded_magnet_internal_rotor_2d = Внутренний ротор – Embedded Magnets\n\n Это внутренняя роторная часть со встроенными постоянными магнитами. Он разработан в первую очередь для использования вместе с внешней статорной частью для имитации вращающихся электродвигателей.\n\n Для получения дополнительной информации проверьте документацию в соответствующем документе *.pdf.
partdescr_acdc/embedded_magnet_v_shape_internal_rotor_2d = Внутренний ротор – V-образные встраиваемые магниты\n\n Это внутренняя роторная часть с V-образными постоянными магнитами. Он разработан в первую очередь для использования вместе с внешней статорной частью для имитации вращающихся электродвигателей.\n\n Для получения дополнительной информации проверьте документацию в соответствующем документе *.pdf.
partdescr_acdc/surface_mounted_magnet_internal_rotor_2d = Внутренний ротор – Surface Mounted Magnets\n\n Это внутренняя роторная часть с установленными на поверхности постоянными магнитами. Он разработан в первую очередь для использования вместе с внешней статорной частью для имитации вращающихся электродвигателей.\n\n Для получения дополнительной информации проверьте документацию в соответствующем документе *.pdf.
partdescr_acdc/slotted_external_stator_2d = Внешний статор – Slotted\n\nЭто внешняя слотированная часть статора. Он разработан в первую очередь для использования вместе с внутренней частью ротора, чтобы имитировать вращающиеся электродвигатели.\n\n Для получения дополнительной информации проверьте документацию в соответствующем документе *.pdf.
partdescr_acdc/sc_row_cc_closed_corner = Single Conductor Coil – Round Wire, Cylindrical, Closed Corner\n\nЭто производная от части геометрии "Single Conductor Coil – Generic", где:\n\n• Тип провода был ограничен "round wire"; диаметр можно установить с помощью параметра ввода "wire_diameter"\n• Тип ядра ограничен "cylindrical" (или круговой); диаметр может быть установлен с помощью параметра ввода "coil_diameter"\n• Тип соединения был ограничен "closed corner"; обратная петля была помещена в угол (при условии прямоугольной формы ядра) под углом 45 градусов по отношению к плоскости xz.\n\n Для получения дополнительной информации, пожалуйста, проверьте документацию на "Single Conductor Coil – Generic" часть геометрии.
partdescr_acdc/sc_row_cc_open_corner = Single Conductor Coil – Round Wire, Cylindrical, Open Corner\n\nЭто производная от части геометрии "Single Conductor Coil – Generic", где:\n\n• Тип провода был ограничен "round wire"; диаметр можно установить с помощью параметра ввода "wire_diameter"\n• Тип ядра ограничен "cylindrical" (или круговой); диаметр может быть установлен с помощью параметра ввода "coil_diameter"\n• Тип соединения был ограничен "open corner"; линии подачи были размещены в углу (при условии прямоугольной формы ядра) под углом 45 градусов по отношению к плоскости xz.\n\n Для получения дополнительной информации, пожалуйста, проверьте документацию на "Single Conductor Coil – Generic" часть геометрии.
partdescr_acdc/sc_row_cc_closed_hoops = Single Conductor Coil – Round Wire, Cylindrical, Closed Hoops\n\nЭто производная от части геометрии "Single Conductor Coil – Generic", где:\n\n• Тип провода был ограничен "round wire"; диаметр можно установить с помощью параметра ввода "wire_diameter"\n• Тип ядра ограничен "cylindrical" (или круговой); диаметр может быть установлен с помощью параметра ввода "coil_diameter"\n• Тип соединения был ограничен "closed hoops"; повороты не имеют наклона и образуют отдельные обручи. Это довольно хорошо приближает спираль, поддерживая использование симметрии. Входной параметр "partitioning" может использоваться для оснащения обручей поверхностью раздела.\n\n Для получения дополнительной информации, пожалуйста, проверьте документацию на "Single Conductor Coil – Generic" часть геометрии.
partdescr_acdc/sc_row_cc_open_helix = Single Conductor Coil – Round Wire, Cylindrical, Open Helix\n\nЭто производная от части геометрии "Single Conductor Coil – Generic", где:\n\n• Тип провода был ограничен "round wire"; диаметр можно установить с помощью параметра ввода "wire_diameter"\n• Тип ядра ограничен "cylindrical" (или круговой); диаметр может быть установлен с помощью параметра ввода "coil_diameter"\n• Тип соединения был ограничен "open helix"; число витков может быть нецелым. Входная кормовая линия параллельна плоскости xz, а выходная кормовая линия размещена под углом в зависимости от количества оборотов.\n\n Для получения дополнительной информации, пожалуйста, проверьте документацию на "Single Conductor Coil – Generic" часть геометрии.
partdescr_acdc/sc_row_rc_closed_corner = Single Conductor Coil – Round Wire, Racetrack, Closed Corner\n\nЭто производная от части геометрии "Single Conductor Coil – Generic", где:\n\n• Тип провода был ограничен "round wire"; диаметр можно установить с помощью параметра ввода "wire_diameter"\n• Основной тип был установлен на "rectangular with fillet" (по умолчанию); размеры могут быть установлены с использованием входных параметров "coil_width" и "coil_depth". Размер филе можно скорректировать с помощью параметра "coil_fillet". Радиус филе катушки имеет нижнюю границу, которая устанавливается на половину ширины поперечного сечения провода.\n• Тип соединения был ограничен "closed corner"; обратная петля была помещена в угол (при условии прямоугольной формы ядра) под углом 45 градусов по отношению к плоскости xz. \n\n Для получения дополнительной информации, пожалуйста, проверьте документацию на "Single Conductor Coil – Generic" часть геометрии.
partdescr_acdc/sc_row_rc_open_corner = Single Conductor Coil – Round Wire, Racetrack, Open Corner\n\nЭто производная от части геометрии "Single Conductor Coil – Generic", где:\n\n• Тип провода был ограничен "round wire"; диаметр можно установить с помощью параметра ввода "wire_diameter"\n• Основной тип был установлен на "rectangular with fillet" (по умолчанию); размеры могут быть установлены с использованием входных параметров "coil_width" и "coil_depth". Размер филе можно скорректировать с помощью параметра "coil_fillet". Радиус филе катушки имеет нижнюю границу, которая устанавливается на половину ширины поперечного сечения провода.\n• Тип соединения был ограничен "open corner"; линии подачи были размещены в углу (при условии прямоугольной формы ядра) под углом 45 градусов по отношению к плоскости xz.\n\n Для получения дополнительной информации, пожалуйста, проверьте документацию на "Single Conductor Coil – Generic" часть геометрии.
partdescr_acdc/sc_row_rc_closed_side = Single Conductor Coil – Round Wire, Racetrack, Closed Side\n\nЭто производная от части геометрии "Single Conductor Coil – Generic", где:\n\n• Тип провода был ограничен "round wire"; диаметр можно установить с помощью параметра ввода "wire_diameter"\n• Основной тип был установлен на "rectangular with fillet" (по умолчанию); размеры могут быть установлены с использованием входных параметров "coil_width" и "coil_depth". Размер филе можно скорректировать с помощью параметра "coil_fillet". Радиус филе катушки имеет нижнюю границу, которая устанавливается на половину ширины поперечного сечения провода.\n• Тип соединения был ограничен "closed side"; обратная петля была размещена на стороне, совпадающей с xz-plane.\n\n Для получения дополнительной информации, пожалуйста, проверьте документацию на "Single Conductor Coil – Generic" часть геометрии.
partdescr_acdc/sc_row_rc_open_side = Single Conductor Coil – Round Wire, Racetrack, Open Side\n\nЭто производная от части геометрии "Single Conductor Coil – Generic", где:\n\n• Тип провода был ограничен "round wire"; диаметр можно установить с помощью параметра ввода "wire_diameter"\n• Основной тип был установлен на "rectangular with fillet" (по умолчанию); размеры могут быть установлены с использованием входных параметров "coil_width" и "coil_depth". Размер филе можно скорректировать с помощью параметра "coil_fillet". Радиус филе катушки имеет нижнюю границу, которая устанавливается на половину ширины поперечного сечения провода.\n• Тип соединения был ограничен "open side"; линии подачи были размещены на стороне, совпадающей с xz-plane.\n\n Для получения дополнительной информации, пожалуйста, проверьте документацию на "Single Conductor Coil – Generic" часть геометрии.
