partdescr_rf/wr8 = WR8 Rectangular Waveguide\n\nRectangular waveguide с размерами поперечного сечения 0,08 дюйма на 0,04 дюйма, что приводит к частоте среза 73,77 ГГц.
partdescr_rf/wr6 = WR6 Rectangular Waveguide\n\nRectangular waveguide с размерами поперечного сечения 0,065 дюйма на 0,0325 дюйма, что приводит к частоте среза 90,79 ГГц.
partdescr_rf/wr5 = WR5 Rectangular Waveguide\n\nRectangular waveguide с размерами поперечного сечения 0,051 дюйма на 0,0255 дюйма, что приводит к частоте среза 115,7 ГГц.
partdescr_rf/wr4 = WR4 Rectangular Waveguide\n\nRectangular waveguide с размерами поперечного сечения 0,043 дюйма на 0,0215 дюйма, что приводит к частоте среза 137,2 ГГц.
partdescr_rf/wr3 = WR3 Rectangular Waveguide\n\nRectangular waveguide с размерами поперечного сечения 0,034 дюйма на 0,017 дюйма, что приводит к частоте среза 173,6 ГГц.
partdescr_rf/wr2 = WR2 Rectangular Waveguide\n\nRectangular waveguide с размерами поперечного сечения 0,02 дюйма на 0,01 дюйма, что приводит к частоте среза 295,1 ГГц.
partdescr_rf/wr1 = WR1 Rectangular Waveguide\n\nRectangular waveguide с размерами поперечного сечения 0,01 дюйма на 0,005 дюйма, что приводит к частоте среза 590,1 ГГц.
partdescr_roptics/aspheric_even_lens_3d = Aspheric Even Lens 3D\n\nAspheric объектив с вогнутыми или выпуклыми поверхностями. Поверхностное провисание определяется коническим плюс многочленом, определяемым суммой первых 11 четных терминов. Следует указать единицу нормализации асферических коэффициентов. Диаметры асферической поверхности могут быть меньше, чем диаметр внешней линзы. Также могут быть указаны прозрачные отверстия, которые меньше диаметров поверхности.
partdescr_roptics/aspheric_even_mirror_3d = Aspheric Even Mirror 3D\n\nAspheric mirror с вогнутой или выпуклой поверхностью. Поверхностное провисание определяется коническим плюс многочленом, определяемым суммой первых 11 четных терминов. Следует указать единицу нормализации асферических коэффициентов. Диаметр асферической поверхности может быть меньше, чем диаметр наружного зеркала. Можно указать четкую апертуру, которая меньше диаметра поверхности. Зеркало также может иметь центральное отверстие.
partdescr_roptics/aspheric_lens_3d_legacy = Асферическая линза 3D Legacy\n\nАсферическая линза определяется уравнением провисания. Наследная часть. Вместо этого используйте асферическую четную линзу 3D.
partdescr_roptics/aspheric_odd_lens_3d = Aspheric Odd Lens 3D\n\nAspheric объектив с вогнутыми или выпуклыми поверхностями. Поверхностное провисание определяется коническим плюс многочленом, определяемым суммой первых 11 нечетных терминов. Следует указать единицу нормализации асферических коэффициентов. Диаметры асферической поверхности могут быть меньше, чем внешний диаметр линзы. Также могут быть указаны прозрачные отверстия, которые меньше диаметров поверхности.
partdescr_roptics/aspheric_odd_mirror_3d = Асферическое зеркало Odd Mirror 3D\n\nСферическое зеркало с вогнутой или выпуклой поверхностью. Поверхностное провисание определяется коническим плюс многочленом, определяемым суммой первых 11 нечетных терминов. Следует указать единицу нормализации асферических коэффициентов. Диаметр асферической поверхности может быть меньше, чем внешний диаметр зеркала. Можно указать четкую апертуру, которая меньше диаметра поверхности. Зеркало также может иметь центральное отверстие.
partdescr_roptics/aspheric_qtype_qbfs_lens_3d = Aspheric Q-type Qbfs Lens 3D\n\nAspheric объектив с вогнутыми или выпуклыми поверхностями. Поверхностное провисание определяется с использованием полиномиальной основы Qbfs для определения отклонения от наиболее подходящей сферы. Можно указать первые 10 асферических коэффициентов, которые имеют единицы длины. Диаметр нормализации — это диаметр поверхности, над которой полиномы Qbfs являются ортогональными. Диаметры асферической поверхности могут быть меньше, чем внешний диаметр линзы. Также могут быть указаны прозрачные отверстия, которые меньше диаметров поверхности.
partdescr_roptics/aspheric_qtype_qbfs_mirror_3d = Aspheric Q-type Qbfs Mirror 3D\n\nAspheric mirror с вогнутой или выпуклой поверхностью. Поверхностное провисание определяется с использованием полиномиальной основы Qbfs для определения отклонения от наиболее подходящей сферы. Можно указать первые 10 асферических коэффициентов, которые имеют единицы длины. Диаметр нормализации — это диаметр поверхности, над которой полиномы Qbfs являются ортогональными. Диаметр асферической поверхности может быть меньше, чем внешний диаметр зеркала. Можно указать четкую апертуру, которая меньше диаметра поверхности. Зеркало также может иметь центральное отверстие.
partdescr_roptics/aspheric_qtype_qcon_lens_3d = Aspheric Q-type Qcon Lens 3D\n\nAspheric объектив с вогнутыми или выпуклыми поверхностями. Поверхностное провисание определяется с использованием полиномиальной основы Qcon Q-типа, которая определяет отклонение от эталонного коника. Можно указать первые 10 асферических коэффициентов, которые имеют единицы длины. Диаметр нормализации — это диаметр поверхности, над которой полиномы Qcon являются ортогональными. Диаметры асферической поверхности могут быть меньше, чем внешний диаметр линзы. Также могут быть указаны прозрачные отверстия, которые меньше диаметров поверхности.
partdescr_roptics/aspheric_qtype_qcon_mirror_3d = Асферическое зеркало Qcon Mirror 3D\n\nСферическое зеркало с вогнутой или выпуклой поверхностью. Поверхностное провисание определяется с использованием полиномиальной основы Qcon Q-типа, которая определяет отклонение от эталонного коника. Можно указать первые 10 асферических коэффициентов, которые имеют единицы длины. Диаметр нормализации — это диаметр поверхности, над которой полиномы Qcon являются ортогональными. Диаметр асферической поверхности может быть меньше, чем внешний диаметр зеркала. Можно указать четкую апертуру, которая меньше диаметра поверхности. Зеркало также может иметь центральное отверстие.
partdescr_roptics/beam_splitter_cube = Beam Splitter Cube\n\nBeam splitter с кубическим экстерьером.
partdescr_roptics/compound_parabolic_concentrator_3d = Соединение Параболический Концентратор 3D\n\nСложный параболический Концентратор с конечной толщиной.
partdescr_roptics/compound_parabolic_concentrator_shell_3d = Соединение Параболический Концентратор Shell 3D\n\nСложный параболический Концентратор с незначительной толщиной.
partdescr_roptics/compound_parabolic_concentrator_trough_3d = Соединение Параболический Концентратор Корыто 3D\n\nСложный параболический Концентратор Корыто с конечной толщиной.
partdescr_roptics/compound_parabolic_concentrator_trough_shell_2d = Соединение Parabolic Concentrator Trough Shell 2D\n\nСложный параболический концентратор корыто с незначительной толщиной.
partdescr_roptics/compound_parabolic_concentrator_trough_shell_3d = Соединение Параболический Концентратор Trough Shell 3D\n\nСложный параболический концентратор корыто с незначительной толщиной.
partdescr_roptics/conic_mirror_off_axis_3d = Conic Mirror Off Axis 3D\n\nOff axis conic mirror. Зеркальная поверхность может быть либо вогнутой, либо выпуклой. Зеркало может быть либо стандартной частью родительского зеркала, либо отдельной секцией. Можно указать четкую диафрагму, которая меньше диаметра зеркальной поверхности.
partdescr_roptics/conic_polygonal_mirror_off_axis_3d = Conic Polygonal Mirror Off Axis 3D\n\nOff ось полигональное коническое зеркало. Форма зеркала может быть обычным многоугольником. Зеркальная поверхность может быть либо вогнутой, либо выпуклой. Зеркало может быть либо стандартной частью родительского зеркала, либо отдельной секцией. Можно указать четкую диафрагму, которая меньше диаметра зеркальной поверхности.
partdescr_roptics/conic_mirror_on_axis_3d = Conic Mirror On Axis 3D\n\nOn axis conic mirror. Зеркальная поверхность может быть либо вогнутой, либо выпуклой. Центральное отверстие может присутствовать или не присутствовать. Можно указать четкую диафрагму, которая меньше диаметра зеркальной поверхности.
partdescr_roptics/conic_polygonal_mirror_on_axis_3d = Conic Polygonal Mirror On Axis 3D\n\nOn axis polygonal conic mirror. Форма зеркала может быть обычным многоугольником. Зеркальная поверхность может быть либо вогнутой, либо выпуклой. Центральное отверстие может присутствовать или не присутствовать. Можно указать четкую диафрагму, которая меньше диаметра зеркальной поверхности.
partdescr_roptics/corner_cube_retroreflector_3d = Угловой куб Retroreflector\n\nReflector выполнен пересечением угла куба и цилиндра.
partdescr_roptics/circular_planar_annulus = Круглое плоское кольцо\n\nКруглое плоское кольцо незначительной толщины.
partdescr_roptics/cylindrical_equi_concave_lens_2d = Цилиндрические равнобедренные линзы 2D\n\nЦилиндрические линзы с двумя вогнутыми лицами.
partdescr_roptics/cylindrical_equi_convex_lens_2d = Цилиндрический Equi-Convex Lens 2D\n\nCylindrical объектив с двумя выпуклыми лицами.
partdescr_roptics/cylindrical_equi_convex_meniscus_doublet_2d = Цилиндрический Equi-Convex Meniscus Doublet 2D\n\nCylindrical doublet изготовлен из двустворчатой линзы и мениска.
partdescr_roptics/cylindrical_meniscus_lens_2d = Cylindrical Meniscus Lens 2D\n\nCylindrical объектив с выпуклым лицом и вогнутым лицом.
partdescr_roptics/cylindrical_plano_concave_lens_2d = Цилиндрические плоско-вогнутые линзы 2D\n\nцилиндрические линзы с вогнутым лицом и плоским лицом.
partdescr_roptics/cylindrical_plano_concave_lens_3d = Цилиндрические плоско-вогнутые линзы 3D\n\nцилиндрические линзы с вогнутым лицом и плоским лицом.
partdescr_roptics/cylindrical_plano_convex_lens_2d = Цилиндрический Plano-Convex Lens 2D\n\nЦилиндрический объектив с выпуклым лицом и плоским лицом.
partdescr_roptics/cylindrical_plano_convex_lens_3d = Цилиндрический Plano-Convex Lens 3D\n\nЦилиндрический объектив с выпуклым лицом и плоским лицом.
partdescr_roptics/elliptical_planar_mirror_3d = Elliptical Planar Mirror 3D\n\nElliptical planar mirror. Угол зеркала может быть указан непосредственно или с точки зрения диаметров большой и меньшей оси.
partdescr_roptics/general_conic_mirror_off_axis_3d_legacy = General Conic Mirror Off Axis 3D Legacy\n\nOff axis conic mirror. Диаметр ясной диафрагмы может быть меньше полного диаметра зеркала.\n\nLegacy. Используйте Conic Mirror Off Axis 3D
partdescr_roptics/general_conic_mirror_on_axis_3d_legacy = General Conic Mirror On Axis 3D Legacy\n\nOn axis conic mirror. Центральное отверстие может присутствовать или не присутствовать. Диаметр ясной диафрагмы может быть меньше полного диаметра зеркала.\n\nLegacy. Используйте Conic Mirror на Axis 3D.
partdescr_roptics/paraboloidal_reflector_3d = Параболоидальный отражатель 3D\n\nПараболоидный отражатель с конечной толщиной.
partdescr_roptics/paraboloidal_reflector_shell_3d = Параболоидальный отражатель Shell 3D\n\nParaboloidal reflector с незначительной толщиной.
partdescr_roptics/rectangular_planar_annulus = Прямоугольный плоский Annulus\n\n Прямоугольный плоский аннулус с незначительной толщиной.
partdescr_roptics/right_angle_prism_3d = Right Angle Prism 3D\n\nТриугольная призма.
partdescr_roptics/spherical_doublet_lens_3d = Сферическая двойная линза 3D\n\nDoublet объектив сформирован с использованием двух экземпляров части 'Spherical Lens 3D'. Эти две линзы могут быть либо в воздушном пространстве, либо в контакте.
partdescr_roptics/spherical_equi_concave_lens_3d = Сферическая Equi-Concave Lens 3D\n\nSpherical объектив с двумя вогнутыми поверхностями с равными радиусами кривизны.
partdescr_roptics/spherical_equi_concave_lens_3d_legacy = Сферический Equi-Concave Lens 3D Legacy\n\nSpherical объектив с двумя вогнутыми лицами. Наследие. Используйте Spherical Equi-Concave Lens 3D.
partdescr_roptics/spherical_equi_convex_lens_3d = Сферический Equi-Convex Lens 3D\n\nSpherical объектив с двумя выпуклыми поверхностями с равными радиусами кривизны.
partdescr_roptics/spherical_equi_convex_lens_3d_legacy = Сферический Equi-Convex Lens 3D Legacy\n\nSpherical объектив с двумя выпуклыми лицами. Наследие. Используйте Spherical Equi-Convex Lens 3D.
partdescr_roptics/spherical_general_lens_3d_legacy = Сферическая общая линза 3D Legacy\n\nСферическая линза с произвольными вогнутыми или выпуклыми поверхностями. Наследие. Вместо этого используйте сферическую линзу 3D.
partdescr_roptics/spherical_lens_3d = Сферическая линза 3D\n\nSpherical объектив с вогнутыми или выпуклыми поверхностями. Диаметры поверхности линзы могут быть меньше, чем внешний диаметр. Могут быть указаны прозрачные отверстия, которые меньше диаметров поверхности линзы.
partdescr_roptics/spherical_meniscus_lens_3d = Сферическая линза Meniscus Lens 3D\n\nSpherical с выпуклыми/вогнутыми или вогнутыми/выпуклыми поверхностями.
partdescr_roptics/spherical_meniscus_lens_3d_legacy = Сферическая линза Meniscus Lens 3D Legacy\n\nSpherical объектив с выпуклым лицом и вогнутым лицом. Наследие. Вместо этого используйте сферический мениск 3D.
partdescr_roptics/spherical_mirror_3d = Сферическое зеркало 3D\n\nSpherical mirror. Зеркальная поверхность может быть либо вогнутой, либо выпуклой. Центральное отверстие может присутствовать или не присутствовать. Можно указать четкую диафрагму, которая меньше диаметра зеркальной поверхности.
partdescr_roptics/spherical_polygonal_lens_3d = Сферические полигональные линзы 3D\n\nLens с вогнутыми или выпуклыми сферическими поверхностями. Форма линзы может быть обычным полигоном. Диаметры поверхности линзы могут быть меньше, чем внешний диаметр. Могут быть указаны четкие полигональные отверстия, которые меньше диаметров поверхности линзы.
partdescr_roptics/spherical_polygonal_mirror_3d = Сферическое полигональное зеркало 3D\n\nSpherical polygonal mirror. Форма зеркала может быть обычным многоугольником. Зеркальная поверхность может быть либо вогнутой, либо выпуклой. Центральное отверстие может присутствовать или не присутствовать. Можно указать четкую диафрагму, которая меньше диаметра зеркальной поверхности.
partdescr_roptics/spherical_plano_concave_lens_3d = Сферическая плоско-вогнутая линза 3D\n\nСферическая линза с вогнутой поверхностью и плоской поверхностью.
partdescr_roptics/spherical_plano_concave_lens_3d_legacy = Сферический Плано-Вогнутый объектив 3D Legacy\n\nСферический объектив с вогнутым лицом и плоским лицом. Наследие. Вместо этого используйте сферические плоско-вогнутые линзы 3D.
partdescr_roptics/spherical_plano_convex_lens_3d = Сферический Plano-Convex Lens 3D\n\nSpherical объектив с выпуклой поверхностью и плоской поверхностью.
partdescr_roptics/spherical_plano_convex_lens_3d_legacy = Сферический Plano-Convex Lens 3D Legacy\n\nSpherical объектив с выпуклым лицом и плоским лицом. Наследие. Используйте Spherical Plano-Convex Lens 3D.
partdescr_roptics/spherical_triplet_lens_3d = Сферические линзы Triplet Lens 3D\n\nTriplet формируются с использованием трех экземпляров части 'Spherical Lens 3D'. Три линзы могут быть либо в воздушном пространстве, либо в контакте.
partdescr_sme/C_beam_generic = Общая С-образная балка\n\nТиповая форма поперечного сечения канала с плоским или коническим фланцем.
partdescr_sme/C_imperial_beam = American C-beam (imperial)\n\nAmerican стандартные каналы с коническими фланцевыми поверхностями. Параметры обозначения, определенные в системе имперских единиц.\n\n Параметры двух размеров контролируют все размеры секции. Например, ввод 10 и 15.3 в качестве параметров дает стандартное поперечное сечение пучка C10x15.3.
partdescr_sme/C_metric_beam = American C-beam (metric)\n\nАмериканские стандартные каналы с коническими фланцевыми поверхностями. Параметры обозначения, определенные в системе метрических единиц.\n\n Параметры двух размеров контролируют все размеры секции. Например, ввод 75 и 5.2 в качестве параметров дает стандартное поперечное сечение пучка C75x5.2.
partdescr_sme/conical_washer = Conical Washer\n\nВесенняя стиральная машина конической формы.
partdescr_sme/flat_washer = Плоская шайба\n\nПлоская шайба.
partdescr_sme/HEA_beam = European HEA-beam\n\nEuropean wide flange beams.\n9000000000003A single size parameter controls all section dimensions. Например, ввод 120 в качестве параметра дает стандартное поперечное сечение луча HEA 120.
partdescr_sme/HEB_beam = European HEB-beam\n\nEuropean wide flange beams.\n9000000000003A single size parameter control all section dimensions. Например, ввод 120 в качестве параметра дает стандартное сечение луча HEB 120.
partdescr_sme/HEM_beam = European HEM-beam\n\nEuropean wide flange beams.\n9000000000003A single size parameter controls all section dimensions. Например, ввод 120 в качестве параметра дает стандартное поперечное сечение луча HEM 120.
partdescr_sme/HP_imperial_beam = American HP-beam (imperial)\n\nАмериканские несущие сваи с параллельными фланцевыми поверхностями. Параметры обозначения, определенные в системе имперских единиц.\n\n Параметры двух размеров контролируют все размеры секции. Например, ввод 8 и 36 в качестве параметров дает стандартное поперечное сечение луча HP8x36.
partdescr_sme/HP_metric_beam = American HP-beam (metric)\n\nАмериканские несущие сваи с параллельными фланцевыми поверхностями. Параметры обозначения, определенные в системе метрических единиц.\n\n Параметры двух размеров контролируют все размеры секции. Например, ввод 200 и 53 в качестве параметров дает стандартное поперечное сечение луча HP200x53.
partdescr_sme/hex_bolt = Hex Bolt\n\nBolt с шестиугольной головой.
partdescr_sme/hex_bolt_drill = Hex Bolt, With Drill\n\nBolt with hexagonal head and drill geometry. Чтобы подавить объект геометрии сверла, установите параметр сверла на 0.
partdescr_sme/hex_bolt_no_thread = Hex Bolt, No Thread\n\nBolt с гексагональной головой и постоянным диаметром шанка.
partdescr_sme/hex_bolt_no_thread_drill = Hex Bolt, No Thread, With Drill\n\nBolt with hexagonal head and constant shank diameter and drill geometry. Чтобы подавить объект геометрии сверла, установите параметр сверла на 0.
partdescr_sme/hex_nut = Шестигранная гайка\n\nСтандартная шестигранная гайка.
partdescr_sme/I_beam_generic = Дженерик I-beam\n\nGeneric Форма поперечного сечения луча I с плоским или конусообразным фланцем.
partdescr_sme/IPE_beam = Европейская IPE-балка\n\nЕвропейские двутавры.\n\nОдин параметр размера управляет всеми размерами сечения. Например, ввод значения 120 в качестве параметра дает стандартное поперечное сечение балки IPE 120.
partdescr_sme/IPN_beam = Европейские лучи стандарта IPN-beam\n\n с конусным фланцем. Flange slope 14%.\n\nA одноразмерный параметр контролирует все размеры секций. Например, ввод 120 в качестве параметра дает стандартное поперечное сечение луча IPN 120.
partdescr_sme/L_beam_generic = Типовая Г-образная балка\n\nБалка стандартной угловой формы поперечного сечения.
partdescr_sme/L_EN_equal_beam =European Equal L-beam\n\nEuropean equal leg angles.\n\nTwo size parameters control all section dimensions. Например, ввод 40 и 3 в качестве параметров дает стандартное поперечное сечение луча L40x40x3.
partdescr_sme/L_EN_unequal_beam = European Unequal L-beam\n\nEuropean unequal leg angles.\n\nThree size parameters control all section dimensions. Например, ввод 30, 20 и 3 в качестве параметров дает стандартное поперечное сечение луча L30x20x3.
partdescr_sme/L_US_equal_imperial_beam = American Equal L-beam (imperial)\n\nAmerican equal leg angles. Параметры обозначения, определенные в системе имперских единиц.\n\n Параметры двух размеров контролируют все размеры секции. Например, ввод 6 и 5/8 в качестве параметров дает стандартное поперечное сечение луча L6x6x5/8.
partdescr_sme/L_US_equal_metric_beam = American Equal L-beam (metric)\n\nAmerican equal leg angles. Параметры обозначения, определенные в системе метрических единиц.\n\n Параметры двух размеров контролируют все размеры секции. Например, ввод 51 и 3.2 в качестве параметров дает стандартное поперечное сечение луча L51x51x3.2.
partdescr_sme/L_US_unequal_imperial_beam = American Unequal L-beam (imperial)\n\nAmerican unequal leg angles. Параметры обозначения, определенные в системе имперских единиц.\n\nТри размера параметров, контролируют все размеры раздела. Например, ввод 7, 4 и 3/8 в качестве параметров дает стандартное поперечное сечение луча L7x4x3/8.
partdescr_sme/L_US_unequal_metric_beam = American Unequal L-beam (metric)\n\nAmerican unequal leg angles. Параметры обозначения, определенные в системе метрических единиц.\n\nТри размера параметров, контролируют все размеры раздела. Например, ввод 64, 38 и 4.8 в качестве параметров дает стандартное поперечное сечение луча L64x38x4.8.
partdescr_sme/M_imperial_beam = American M-beam (imperial)\n\nAmerican beams with miscellaneous shapes. Параметры обозначения, определенные в системе имперских единиц.\n\n Параметры двух размеров контролируют все размеры секции. Например, ввод 12 и 10.8 в качестве параметров дает стандартное поперечное сечение луча M12x10.8.
partdescr_sme/M_metric_beam = American M-beam (metric)\n\nAmerican beams with miscellaneous shapes. Параметры обозначения, определенные в системе метрических единиц.\n\n Параметры двух размеров контролируют все размеры секции. Например, ввод 100 и 8.9 в качестве параметров дает стандартное поперечное сечение луча M100x8.9.
partdescr_sme/MC_imperial_beam = American MC-beam (imperial)\n\nAmerican стандартные каналы с параллельными фланцевыми поверхностями. Параметры обозначения, определенные в системе имперских единиц.\n\n Параметры двух размеров контролируют все размеры секции. Например, ввод 3 и 7.1 в качестве параметров дает стандартное поперечное сечение пучка MC3x7.1.
partdescr_sme/MC_metric_beam = American MC-beam (metric)\n\nAmerican стандартные каналы с параллельными фланцевыми поверхностями. Параметры обозначения, определенные в системе метрических единиц.\n\n Параметры двух размеров контролируют все размеры секции. Например, ввод 75 и 10.6 в качестве параметров дает стандартное поперечное сечение пучка MC75x10.6.
partdescr_sme/MT_imperial_beam = American MT-beam (imperial)\n\nTees вырезаны из американских лучей разной формы. Параметры обозначения, определенные в системе имперских единиц.\n\n Параметры двух размеров контролируют все размеры секции. Например, ввод 3 и 2.2 в качестве параметров дает стандартное сечение луча MT3x2.2.
partdescr_sme/MT_metric_beam = American MT-beam (metric)\n\nTees вырезаны из американских лучей разной формы. Параметры обозначения, определенные в системе метрических единиц.\n\n Параметры двух размеров контролируют все размеры секции. Например, ввод 50 и 4.45 в качестве параметров дает стандартное сечение луча MT50x4.45.
partdescr_sme/S_imperial_beam = American S-beam (imperial)\n\nAmerican standard beams with tapered flange surfaces. Параметры обозначения, определенные в системе имперских единиц.\n\n Параметры двух размеров контролируют все размеры секции. Например, ввод 3 и 5.7 в качестве параметров дает стандартное поперечное сечение луча S3x5.7.
partdescr_sme/S_metric_beam = American S-beam (metric)\n\nAmerican standard beams with tapered flange surfaces. Параметры обозначения, определенные в системе метрических единиц.\n\n Параметры двух размеров контролируют все размеры секции. Например, ввод 75 и 8.5 в качестве параметров дает стандартное поперечное сечение пучка S75x8.5.
partdescr_sme/ST_imperial_beam = American ST-beam (imperial)\n\nTees вырезаны из американских стандартных балок с коническими фланцевыми поверхностями. Параметры обозначения, определенные в системе имперских единиц.\n\n Параметры двух размеров контролируют все размеры секции. Например, ввод 10 и 37,5 в качестве параметров дает стандартное поперечное сечение пучка ST10x37.5.
partdescr_sme/ST_metric_beam = American ST-beam (metric)\n\nTees вырезаны из американских стандартных лучей с коническими фланцевыми поверхностями. Параметры обозначения, определенные в системе метрических единиц.\n\n Параметры двух размеров контролируют все размеры секции. Например, ввод 37,5 и 4.25 в качестве параметров дает стандартное поперечное сечение пучка ST37.5x4.25.
partdescr_sme/UPE_beam = Европейский UPE-beam\n\nChannels с параллельными фланцами.\n9000000000003A одноразмерный параметр контролирует все размеры раздела. Например, ввод 120 в качестве параметра дает стандартное поперечное сечение пучка UPE 120.
partdescr_sme/UPN_beam = Европейский UPN-луч\n\nШвеллеры европейского стандарта с коническими фланцами.\n\nОдин параметр размера управляет всеми размерами сечения. Например, ввод значения 120 в качестве параметра дает стандартное поперечное сечение балки UPN 120.
partdescr_sme/simple_bolt = Simple Bolt\n\nПростой болт с цилиндрической головкой.
partdescr_sme/simple_bolt_drill = Простой болт, с Drill\n\nПростой болт с цилиндрической головкой и геометрией сверла. Чтобы подавить объект геометрии сверла, установите параметр сверла на 0.
partdescr_sme/simple_bolt_no_thread = Simple Bolt, No Thread\n\nBolt с цилиндрической головой и постоянным диаметром шанка.
partdescr_sme/simple_bolt_no_thread_drill = Simple Bolt, No Thread, With Drill\n\nBolt с цилиндрической головкой и постоянным диаметром шана и геометрией сверла. Чтобы подавить объект геометрии сверла, установите параметр сверла на 0.
partdescr_sme/T_beam_generic = Generic T-beam\n\nGeneric Форма поперечного сечения Т-луча с плоским или конусообразным фланцем.
partdescr_sme/W_imperial_beam = American W-beam (imperial)\n\nAmerican wide flange beams with parallel flange surfaces. Параметры обозначения, определенные в системе имперских единиц.\n\n Параметры двух размеров контролируют все размеры секции. Например, ввод 8 и 58 в качестве параметров дает стандартное поперечное сечение луча W8x58.
partdescr_sme/W_metric_beam = American W-beam (metric)\n\nAmerican wide flange beams with parallel flange surfaces. Параметры обозначения, определенные в системе метрических единиц.\n\n Параметры двух размеров контролируют все размеры секции. Например, ввод 200 и 86 в качестве параметров дает стандартное поперечное сечение луча W200x86.
partdescr_sme/WT_imperial_beam = American WT-beam (imperial)\n\nTees вырезаны из американских широкофланцевых балок с параллельными фланцевыми поверхностями. Параметры обозначения, определенные в системе имперских единиц.\n\n Параметры двух размеров контролируют все размеры секции. Например, ввод 9 и 48.5 в качестве параметров дает стандартное поперечное сечение луча WT9x48.5.
partdescr_sme/WT_metric_beam = American WT-beam (metric)\n\nTees вырезаны из американских широкофланцевых балок с параллельными фланцевыми поверхностями. Параметры обозначения, определенные в системе метрических единиц.\n\n Параметры двух размеров контролируют все размеры секции. Например, ввод 50 и 9,65 в качестве параметров дает стандартное поперечное сечение луча WT50x9,65.
partdescr_woptics/rectangular_waveguide_bend = Прямоугольный волновод Bend\n\nBent прямоугольный волновод. Может использоваться для волноводов с ядрами, встроенными в однородную или слоистую неоднородную облицовку.
partdescr_woptics/rectangular_waveguide_cross_section = Прямоугольный Waveguide Cross Section\n\nWaveguide сечение с прямоугольным ядром и облицовочными доменами. Может использоваться для волноводов с ядрами, встроенными в однородную или слоистую неоднородную облицовку.
partdescr_woptics/rectangular_waveguide_s_bend = Прямоугольный волновод S-Bend\n\nS-согнутый прямоугольный волновод. Может использоваться для волноводов с ядрами, встроенными в однородную или слоистую неоднородную облицовку.
partdescr_woptics/rectangular_waveguide_straight = Прямоугольный волновод Straight\n\nStraight прямоугольный волновод. Может использоваться для волноводов с ядрами, встроенными в однородную или слоистую неоднородную облицовку.
partdescr_woptics/rectangular_waveguide_straight_to_ring_coupler = Прямоугольный волновод Straight-to-Ring Coupler\n\n Прямоугольный волновод, соединяющий прямой и кольцевой волновод. Может использоваться для волноводов с ядрами, встроенными в однородную или слоистую неоднородную облицовку.
partdescr_woptics/rectangular_waveguide_taper = Прямоугольный волновод Taper\n\nTapered прямоугольный волновод. Может использоваться для волноводов с ядрами, встроенными в однородную или слоистую неоднородную облицовку.
partdescr_woptics/slab_waveguide_bend = Изгиб волновода плиты\n\nДвумерный пластинчатый изгиб волновода с сердечником, встроенным в оболочку.
partdescr_woptics/slab_waveguide_s_bend = Slab Waveguide S-Bend\n\n2D волновод S-образного изгиба с ядром, встроенным в облицовочный область.
partdescr_woptics/slab_waveguide_s_bend_directional_coupler = Направленный ответвитель с S-образным изгибом и пластинчатым волноводом\n\n2D пластинчатый волноводный направленный ответвитель на основе S-образных изгибов.
partdescr_woptics/slab_waveguide_straight = Slab Waveguide Straight\n\n2D прямой волновод плиты, с ядром, встроенным в облицовочный область.
partdescr_woptics/slab_waveguide_straight_to_ring_coupler = Плоский волновод Прямой переходник на кольцо\n\nПластинчатый волновод, соединяющий прямую и кольцевую секции волновода, с сердечником, внедренным в область оболочки.
partdescr_woptics/slab_waveguide_taper = Slab Waveguide Taper\n\n2D конический волновод из плиты с ядром, встроенным в облицовочный область. Волновод может иметь различные положения и ширину для ядра и облицовку на входных и выходных границах.
