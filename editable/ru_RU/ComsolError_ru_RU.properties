Check_consistency_is_selected_in_the_Surface-to-Surface_radiation_interface_to_verify_that_the_radiation_directions_are_defined_in_a_consistent_manner._This_verification_has_required_additional_computational_resources._Note_that_checking_the_model_consistency_does_not_require_additional_computational_time_when_the_Ray_shooting_method_is_used._In_order_to_speed_up_the_computation,_once_the_configuration_has_been_verified,_it's_recommended_to_deselect_Check_consistency = Контрольная согласованность выбирается в интерфейсе излучения от поверхности к поверхности, чтобы убедиться, что направления излучения определены согласованным образом. Эта проверка потребовала дополнительных вычислительных ресурсов. Обратите внимание, что проверка согласованности модели не требует дополнительного вычислительного времени при использовании метода съемки Ray. Чтобы ускорить вычисления, после того, как конфигурация была проверена, рекомендуется отключить согласованность Check.
