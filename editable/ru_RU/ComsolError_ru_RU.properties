Boundaries_for_which_only_the_opposite_side_has_well_defined_material_properties_can_be_seen_from_a_point_computing_the_irradiation.nonlinear_geometry._X = Границы, для которых только противоположная сторона имеет четко определенные свойства материала, можно увидеть из точки, вычисляющей облучение. Это может быть связано с ошибочным определением граничных направлений излучения или непрозрачностью прилегающих доменов. В случае функций формы нелинейной геометрии это также может быть связано с комбинацией относительно грубой сетки с опцией элементов сетки высокого порядка, выбранной в настройках интерфейса.\n# можно нарисовать, чтобы показать лица, которые видят противоположную сторону других границ.
