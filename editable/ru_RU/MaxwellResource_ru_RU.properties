This_action_will_create_X_diffraction_orders_such_a_large_number_of_nodes_may_cause_the_user_interface_to_become_less_responsive_are_you_sure_you_want_to_proceed = Это действие создаст # порядки дифракции. Такое большое количество узлов может привести к тому, что пользовательский интерфейс станет менее отзывчивым. Вы уверены, что хотите продолжить?
This_feature_is_obsolete_and_will_be_removed_in_future_versions_use_the_coil_feature_instead = Эта функция устарела и будет удалена в будущих версиях.\nВместо этого используйте функцию 'Coil'.
This_feature_is_obsolete_and_will_be_removed_in_future_versions_use_the_rotating_domain_feature_under_component_definitions_moving_mesh_instead = Эта функция устарела и будет удалена в будущих версиях.\n\nИспользуйте функцию 'Rotating Domain' в разделе 'Component > Definitions > Moving Mesh' вместо этого.\n\nЕсли опция «Подвижная сетка» недоступна, перейдите к компоненту модели в окне «Построитель моделей». В окне Настройки компонента модели нажмите 'Permanently Define All Frames'.
The_filter_parameters_in_the_Filter_parameters_for_absorbing_layers_section_are_set_to_the_default_values_in_the_old_migrated_model._See_documentation_for_the_new_default_values = Параметры фильтра в разделе Параметры фильтра для поглощающих слоев установлены на значения по умолчанию в старой перенесенной модели. \n\nНовые значения по умолчанию см. в документации.
This_material_model_is_obsolete_and_will_be_removed_in_future_versions_use_the_BHCurve_instead = Эта модель материала устарела и будет удалена в будущих версиях. Вместо этого используйте "B-H Curve".\n\nЕсли ваш материал содержит пользовательскую кривую BH, и вы не уверены, правильно ли она была перенесена, сравните ее с одним из материалов в библиотеке и при необходимости внесите вручную корректировки.
This_material_model_is_obsolete_and_will_be_removed_in_future_versions_use_the_EffectiveBHCurve_instead = Эта модель материала устарела и будет удалена в будущих версиях. Вместо этого используйте "Effective B-H Curve".\n\nЕсли ваш материал содержит созданную пользователем эффективную кривую B-H и вы не уверены, правильно ли она была перенесена, сравните ее с одним из материалов в библиотеке и при необходимости внесите вручную корректировки.
This_material_model_is_obsolete_In_order_to_conform_to_industry_standards_the_curve_now_includes_Hc = Эта модель материала устарела. Чтобы соответствовать отраслевым стандартам, кривая теперь включает Hc, т.е. кривая пересекает горизонтальную ось в точке "-Hc".\n\nПожалуйста, обратитесь к библиотеке материалов для получения актуального примера нелинейного постоянного магнита.
This_model_was_created_in_an_earlier_version,_the_following_obsolete_fallback_boundary_conditions_have_been_removed = Эта модель была создана в более ранней версии, были удалены следующие устаревшие резервные граничные условия:
This_model_was_created_in_an_earlier_version,_the_following_obsolete_feature_has_been_removed = Данная модель создана в более ранней версии, удалена следующая устаревшая функция:
This_multiphysics_coupling_has_been_deprecated = Эта мультифизическая связь устарела, и ее планируется удалить в более поздних версиях. Модели, содержащие эту связь, останутся функциональными и в конечном итоге будут перенесены автоматически. Удалите эту мультифизическую связь и замените ее новой, если вы хотите выполнить миграцию вручную.
This_physics_interface_has_been_deprecated[ecs] = Этот физический интерфейс устарел, и его планируется удалить в последующих версиях. Модели, содержащие этот интерфейс, останутся работоспособными и будут автоматически перенесены (частично) на новый (многоуровневый) интерфейс оболочки в более поздних версиях. Токи в Оболочках’. Если вы хотите моделировать слоистые оболочки, вы можете переключиться на использование нового интерфейса ‘Electric Currents in Layered Shells’. Если вы хотите продолжать использовать старый интерфейс (особенно для пьезорезистивных моделей), обратите внимание, что он по-прежнему доступен в разделе ‘AC/DC > Электромагнетизм и механика > Пьезорезистивность > Электрические токи, один слой. Shell’.\n\nНовый интерфейс «Электрические токи в оболочках» и новый интерфейс «Электрические токи в многослойных оболочках» очень похожи. Основное отличие – это режим по умолчанию. Интерфейс «Электрические токи в многослойных оболочках» по умолчанию настроен на отсутствие слоев, а интерфейс «Электрические токи в многослойных оболочках» по умолчанию настроен на многослойность.
This_physics_interface_has_been_deprecated[ecls] = Этот физический интерфейс устарел, и его планируется удалить в последующих версиях. Модели, содержащие этот интерфейс, останутся работоспособными и будут автоматически перенесены (частично) на новый (многоуровневый) интерфейс оболочки в более поздних версиях. Токи в Оболочках’. Если вы хотите моделировать слоистые оболочки, вы можете переключиться на использование нового интерфейса ‘Electric Currents in Layered Shells’.\n\nThe new Electric Currents in Интерфейс Shells и новый интерфейс Electric Currents in Layered Shells очень похожи. Основное отличие – это режим по умолчанию. Интерфейс «Электрические токи в многослойных оболочках» по умолчанию настроен на отсутствие слоев, а интерфейс «Электрические токи в многослойных оболочках» по умолчанию настроен на многослойность.
The_Nonlinear_Permanent_Magnet_material_model_has_been_updated_In_order_to_conform_to_industry_standards_the_curve_now_includes_Hc = Обновлена модель материала «Нелинейный постоянный магнит». Чтобы соответствовать отраслевым стандартам, кривая теперь включает Hc, т.е. кривая пересекает горизонтальную ось в точке "-Hc".\n\nЕсли вы хотите продолжать использовать нелинейный постоянный магнит в качестве определяющего соотношения, пожалуйста, следите за тем, чтобы ваши материалы были актуальными. Обратитесь к библиотеке материалов для получения актуального примера нелинейного постоянного магнита.
