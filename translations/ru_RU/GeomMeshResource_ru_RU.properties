u044B\u043B\u0430 \u0440\u0430\u0437\u043C\u0435\u0449\u0435\u043D\u0430 \u043D\u0430 \u0441\u0442\u043E\u0440\u043E\u043D\u0435, \u0441\u043E\u0432\u043F\u0430\u0434\u0430\u044E\u0449\u0435\u0439 \u0441 xz-plane.\n\n \u0414\u043B\u044F \u043F\u043E\u043B\u0443\u0447\u0435\u043D\u0438\u044F \u0434\u043E\u043F\u043E\u043B\u043D\u0438\u0442\u0435\u043B\u044C\u043D\u043E\u0439 \u0438\u043D\u0444\u043E\u0440\u043C\u0430\u0446\u0438\u0438, \u043F\u043E\u0436\u0430\u043B\u0443\u0439\u0441\u0442\u0430, \u043F\u0440\u043E\u0432\u0435\u0440\u044C\u0442\u0435 \u0434\u043E\u043A\u0443\u043C\u0435\u043D\u0442\u0430\u0446\u0438\u044E \u043D\u0430 "Single Conductor Coil \u2013 Generic" \u0447\u0430\u0441\u0442\u044C \u0433\u0435\u043E\u043C\u0435\u0442\u0440\u0438\u0438.
partdescr_acdc/sc_awg_rc_open_side = Single Conductor Coil \u2013 Round Wire (AWG), Racetrack, Open Side\n\n\u042D\u0442\u043E \u043F\u0440\u043E\u0438\u0437\u0432\u043E\u0434\u043D\u0430\u044F \u043E\u0442 \u0447\u0430\u0441\u0442\u0438 \u0433\u0435\u043E\u043C\u0435\u0442\u0440\u0438\u0438 "Single Conductor Coil \u2013 Generic", \u0433\u0434\u0435:\n\n\u2022 \u0422\u0438\u043F \u043F\u0440\u043E\u0432\u043E\u0434\u0430 \u0431\u044B\u043B \u043E\u0433\u0440\u0430\u043D\u0438\u0447\u0435\u043D "round wire" (American Wire Gauge); \u0434\u0438\u0430\u043C\u0435\u0442\u0440 \u043C\u043E\u0436\u0435\u0442 \u0431\u044B\u0442\u044C \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u043B\u0435\u043D \u0441 \u043F\u043E\u043C\u043E\u0449\u044C\u044E \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440\u0430 \u0432\u0432\u043E\u0434\u0430 "wire_diameter_awg". \u0412\u043D\u0443\u0442\u0440\u0435\u043D\u043D\u0435 \u044D\u0442\u043E \u0437\u043D\u0430\u0447\u0435\u043D\u0438\u0435 \u043F\u0440\u0435\u043E\u0431\u0440\u0430\u0437\u0443\u0435\u0442\u0441\u044F \u0432 "wire_diameter", \u0438\u0441\u043F\u043E\u043B\u044C\u0437\u0443\u044F \u0432\u044B\u0440\u0430\u0436\u0435\u043D\u0438\u0435 "wire_diameter = 0.005[inch]*92^((36-wire_diameter_awg)/39)". \u041F\u043E\u0434\u0434\u0435\u0440\u0436\u0438\u0432\u0430\u044E\u0442\u0441\u044F \u043D\u0435\u0446\u0435\u043B\u044B\u0435 \u0437\u043D\u0430\u0447\u0435\u043D\u0438\u044F AWG. \u041F\u043E\u0441\u043A\u043E\u043B\u044C\u043A\u0443 \u044D\u0442\u043E \u0430\u043D\u0430\u043B\u0438\u0442\u0438\u0447\u0435\u0441\u043A\u043E\u0435 \u043F\u0440\u0435\u043E\u0431\u0440\u0430\u0437\u043E\u0432\u0430\u043D\u0438\u0435, \u0430 \u043D\u0435 \u0442\u0430\u0431\u043B\u0438\u0446\u0430 \u043F\u043E\u0438\u0441\u043A\u0430, \u0434\u043B\u044F \u0437\u043D\u0430\u0447\u0435\u043D\u0438\u0439 AWG "00", "000" \u0438 "0000" \u0441\u043B\u0435\u0434\u0443\u0435\u0442 \u0438\u0441\u043F\u043E\u043B\u044C\u0437\u043E\u0432\u0430\u0442\u044C \u043E\u0442\u0440\u0438\u0446\u0430\u0442\u0435\u043B\u044C\u043D\u044B\u0435 \u0446\u0435\u043B\u044B\u0435 \u0447\u0438\u0441\u043B\u0430 "-1", "-2" \u0438 "-3".9000000000017\u2022 \u041E\u0441\u043D\u043E\u0432\u043D\u043E\u0439 \u0442\u0438\u043F \u0431\u044B\u043B \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u043B\u0435\u043D \u043D\u0430 "rectangular with fillet" (\u043F\u043E \u0443\u043C\u043E\u043B\u0447\u0430\u043D\u0438\u044E); \u0440\u0430\u0437\u043C\u0435\u0440\u044B \u043C\u043E\u0433\u0443\u0442 \u0431\u044B\u0442\u044C \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u043B\u0435\u043D\u044B \u0441 \u0438\u0441\u043F\u043E\u043B\u044C\u0437\u043E\u0432\u0430\u043D\u0438\u0435\u043C \u0432\u0445\u043E\u0434\u043D\u044B\u0445 \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440\u043E\u0432 "coil_width" \u0438 "coil_depth". \u0420\u0430\u0437\u043C\u0435\u0440 \u0444\u0438\u043B\u0435 \u043C\u043E\u0436\u043D\u043E \u0441\u043A\u043E\u0440\u0440\u0435\u043A\u0442\u0438\u0440\u043E\u0432\u0430\u0442\u044C \u0441 \u043F\u043E\u043C\u043E\u0449\u044C\u044E \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440\u0430 "coil_fillet". \u0420\u0430\u0434\u0438\u0443\u0441 \u0444\u0438\u043B\u0435 \u043A\u0430\u0442\u0443\u0448\u043A\u0438 \u0438\u043C\u0435\u0435\u0442 \u043D\u0438\u0436\u043D\u044E\u044E \u0433\u0440\u0430\u043D\u0438\u0446\u0443, \u043A\u043E\u0442\u043E\u0440\u0430\u044F \u0443\u0441\u0442\u0430\u043D\u0430\u0432\u043B\u0438\u0432\u0430\u0435\u0442\u0441\u044F \u043D\u0430 \u043F\u043E\u043B\u043E\u0432\u0438\u043D\u0443 \u0448\u0438\u0440\u0438\u043D\u044B \u043F\u043E\u043F\u0435\u0440\u0435\u0447\u043D\u043E\u0433\u043E \u0441\u0435\u0447\u0435\u043D\u0438\u044F \u043F\u0440\u043E\u0432\u043E\u0434\u0430.\n\u2022 \u0422\u0438\u043F \u0441\u043E\u0435\u0434\u0438\u043D\u0435\u043D\u0438\u044F \u0431\u044B\u043B \u043E\u0433\u0440\u0430\u043D\u0438\u0447\u0435\u043D "open side"; \u043B\u0438\u043D\u0438\u0438 \u043F\u043E\u0434\u0430\u0447\u0438 \u0431\u044B\u043B\u0438 \u0440\u0430\u0437\u043C\u0435\u0449\u0435\u043D\u044B \u043D\u0430 \u0441\u0442\u043E\u0440\u043E\u043D\u0435, \u0441\u043E\u0432\u043F\u0430\u0434\u0430\u044E\u0449\u0435\u0439 \u0441 xz-plane.\n\n \u0414\u043B\u044F \u043F\u043E\u043B\u0443\u0447\u0435\u043D\u0438\u044F \u0434\u043E\u043F\u043E\u043B\u043D\u0438\u0442\u0435\u043B\u044C\u043D\u043E\u0439 \u0438\u043D\u0444\u043E\u0440\u043C\u0430\u0446\u0438\u0438, \u043F\u043E\u0436\u0430\u043B\u0443\u0439\u0441\u0442\u0430, \u043F\u0440\u043E\u0432\u0435\u0440\u044C\u0442\u0435 \u0434\u043E\u043A\u0443\u043C\u0435\u043D\u0442\u0430\u0446\u0438\u044E \u043D\u0430 "Single Conductor Coil \u2013 Generic" \u0447\u0430\u0441\u0442\u044C \u0433\u0435\u043E\u043C\u0435\u0442\u0440\u0438\u0438.
partdescr_acdc/sc_awg_rc_closed_hoops = \u041E\u0434\u043D\u043E\u043F\u0440\u043E\u0432\u043E\u0434\u043D\u0430\u044F \u043A\u0430\u0442\u0443\u0448\u043A\u0430 \u2013 \u041A\u0440\u0443\u0433\u043B\u044B\u0439 \u043F\u0440\u043E\u0432\u043E\u0434 (AWG), \u0433\u043E\u043D\u043E\u0447\u043D\u0430\u044F \u0442\u0440\u0430\u0441\u0441\u0430, \u0437\u0430\u043C\u043A\u043D\u0443\u0442\u044B\u0435 \u043A\u043E\u043B\u044C\u0446\u0430\n\n\u042D\u0442\u043E \u043F\u0440\u043E\u0438\u0437\u0432\u043E\u0434\u043D\u0430\u044F \u043E\u0442 "Single Conductor Coil \u2013 Generic" \u0433\u0435\u043E\u043C\u0435\u0442\u0440\u0438\u0447\u0435\u0441\u043A\u043E\u0439 \u0447\u0430\u0441\u0442\u0438, \u0433\u0434\u0435:\n\n\u2022 \u0422\u0438\u043F \u043F\u0440\u043E\u0432\u043E\u0434\u0430 \u043E\u0433\u0440\u0430\u043D\u0438\u0447\u0435\u043D "round wire" (\u0410\u043C\u0435\u0440\u0438\u043A\u0430\u043D\u0441\u043A\u0438\u0439 \u043A\u0430\u043B\u0438\u0431\u0440 \u043F\u0440\u043E\u0432\u043E\u0434\u0430); \u0434\u0438\u0430\u043C\u0435\u0442\u0440 \u043C\u043E\u0436\u043D\u043E \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u0438\u0442\u044C \u0441 \u043F\u043E\u043C\u043E\u0449\u044C\u044E \u0432\u0445\u043E\u0434\u043D\u043E\u0433\u043E \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440\u0430 "wire_diameter_awg". \u0412\u043D\u0443\u0442\u0440\u0435\u043D\u043D\u0435 \u044D\u0442\u043E \u0437\u043D\u0430\u0447\u0435\u043D\u0438\u0435 \u043F\u0440\u0435\u043E\u0431\u0440\u0430\u0437\u0443\u0435\u0442\u0441\u044F \u0432 "wire_diameter" \u0441 \u0438\u0441\u043F\u043E\u043B\u044C\u0437\u043E\u0432\u0430\u043D\u0438\u0435\u043C \u0432\u044B\u0440\u0430\u0436\u0435\u043D\u0438\u044F "wire_diameter = 0.005[inch]*92^((36-wire_diameter_awg)/39)". \u041F\u043E\u0434\u0434\u0435\u0440\u0436\u0438\u0432\u0430\u044E\u0442\u0441\u044F \u043D\u0435\u0446\u0435\u043B\u044B\u0435 \u0437\u043D\u0430\u0447\u0435\u043D\u0438\u044F AWG. \u041F\u043E\u0441\u043A\u043E\u043B\u044C\u043A\u0443 \u044D\u0442\u043E \u0430\u043D\u0430\u043B\u0438\u0442\u0438\u0447\u0435\u0441\u043A\u043E\u0435 \u043F\u0440\u0435\u043E\u0431\u0440\u0430\u0437\u043E\u0432\u0430\u043D\u0438\u0435, \u0430 \u043D\u0435 \u0442\u0430\u0431\u043B\u0438\u0446\u0430 \u043F\u043E\u0438\u0441\u043A\u0430, \u0434\u043B\u044F \u0437\u043D\u0430\u0447\u0435\u043D\u0438\u0439 AWG "00", "000" \u0438 "0000" \u043E\u0442\u0440\u0438\u0446\u0430\u0442\u0435\u043B\u044C\u043D\u044B\u0435 \u0446\u0435\u043B\u044B\u0435 \u0447\u0438\u0441\u043B\u0430 "-1", \u0421\u043B\u0435\u0434\u0443\u0435\u0442 \u0438\u0441\u043F\u043E\u043B\u044C\u0437\u043E\u0432\u0430\u0442\u044C "-2" \u0438 "-3".\n\u2022 \u0422\u0438\u043F \u044F\u0434\u0440\u0430 \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u043B\u0435\u043D \u043D\u0430 "rectangular with fillet" (\u043F\u043E \u0443\u043C\u043E\u043B\u0447\u0430\u043D\u0438\u044E); \u0440\u0430\u0437\u043C\u0435\u0440\u044B \u043C\u043E\u0436\u043D\u043E \u0437\u0430\u0434\u0430\u0442\u044C \u0441 \u043F\u043E\u043C\u043E\u0449\u044C\u044E \u0432\u0445\u043E\u0434\u043D\u044B\u0445 \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440\u043E\u0432 "coil_width" \u0438 "coil_depth". \u0420\u0430\u0437\u043C\u0435\u0440 \u0441\u043A\u0440\u0443\u0433\u043B\u0435\u043D\u0438\u044F \u043C\u043E\u0436\u043D\u043E \u043D\u0430\u0441\u0442\u0440\u043E\u0438\u0442\u044C \u0441 \u043F\u043E\u043C\u043E\u0449\u044C\u044E \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440\u0430 "coil_fillet". \u0420\u0430\u0434\u0438\u0443\u0441 \u0441\u043A\u0440\u0443\u0433\u043B\u0435\u043D\u0438\u044F \u043A\u0430\u0442\u0443\u0448\u043A\u0438 \u0438\u043C\u0435\u0435\u0442 \u043D\u0438\u0436\u043D\u044E\u044E \u0433\u0440\u0430\u043D\u0438\u0446\u0443, \u043A\u043E\u0442\u043E\u0440\u0430\u044F \u0443\u0441\u0442\u0430\u043D\u0430\u0432\u043B\u0438\u0432\u0430\u0435\u0442\u0441\u044F \u0440\u0430\u0432\u043D\u043E\u0439 \u043F\u043E\u043B\u043E\u0432\u0438\u043D\u0435 \u0448\u0438\u0440\u0438\u043D\u044B \u043F\u043E\u043F\u0435\u0440\u0435\u0447\u043D\u043E\u0433\u043E \u0441\u0435\u0447\u0435\u043D\u0438\u044F \u043F\u0440\u043E\u0432\u043E\u0434\u0430.\n\u2022 \u0422\u0438\u043F \u0441\u043E\u0435\u0434\u0438\u043D\u0435\u043D\u0438\u044F \u043E\u0433\u0440\u0430\u043D\u0438\u0447\u0435\u043D "closed hoops"; \u043F\u043E\u0432\u043E\u0440\u043E\u0442\u044B \u043D\u0435 \u0438\u043C\u0435\u044E\u0442 \u043D\u0430\u043A\u043B\u043E\u043D\u0430 \u0438 \u043E\u0431\u0440\u0430\u0437\u0443\u044E\u0442 \u043E\u0442\u0434\u0435\u043B\u044C\u043D\u044B\u0435 \u043A\u043E\u043B\u044C\u0446\u0430. \u042D\u0442\u043E \u0434\u043E\u0432\u043E\u043B\u044C\u043D\u043E \u0445\u043E\u0440\u043E\u0448\u043E \u0430\u043F\u043F\u0440\u043E\u043A\u0441\u0438\u043C\u0438\u0440\u0443\u0435\u0442 \u0441\u043F\u0438\u0440\u0430\u043B\u044C, \u0441\u043E\u0445\u0440\u0430\u043D\u044F\u044F \u043F\u0440\u0438 \u044D\u0442\u043E\u043C \u0441\u0438\u043C\u043C\u0435\u0442\u0440\u0438\u044E. \u0412\u0445\u043E\u0434\u043D\u043E\u0439 \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440 "partitioning" \u043C\u043E\u0436\u043D\u043E \u0438\u0441\u043F\u043E\u043B\u044C\u0437\u043E\u0432\u0430\u0442\u044C \u0434\u043B\u044F \u043E\u0441\u043D\u0430\u0449\u0435\u043D\u0438\u044F \u043F\u044F\u043B\u0435\u0446 \u0440\u0430\u0437\u0434\u0435\u043B\u0438\u0442\u0435\u043B\u044C\u043D\u043E\u0439 \u043F\u043E\u0432\u0435\u0440\u0445\u043D\u043E\u0441\u0442\u044C\u044E.\n\n\u0414\u043B\u044F \u043F\u043E\u043B\u0443\u0447\u0435\u043D\u0438\u044F \u0434\u043E\u043F\u043E\u043B\u043D\u0438\u0442\u0435\u043B\u044C\u043D\u043E\u0439 \u0438\u043D\u0444\u043E\u0440\u043C\u0430\u0446\u0438\u0438 \u043E\u0437\u043D\u0430\u043A\u043E\u043C\u044C\u0442\u0435\u0441\u044C \u0441 \u0434\u043E\u043A\u0443\u043C\u0435\u043D\u0442\u0430\u0446\u0438\u0435\u0439 \u043F\u043E \u0447\u0430\u0441\u0442\u0438 \u0433\u0435\u043E\u043C\u0435\u0442\u0440\u0438\u0438 "Single Conductor Coil \u2013 Generic".
partdescr_acdc/sc_rew_cc_closed_corner = Single Conductor Coil \u2013 Rectangular Wire, Cylindrical, Closed Corner\n\n\u042D\u0442\u043E \u043F\u0440\u043E\u0438\u0437\u0432\u043E\u0434\u043D\u0430\u044F \u043E\u0442 \u0447\u0430\u0441\u0442\u0438 \u0433\u0435\u043E\u043C\u0435\u0442\u0440\u0438\u0438 "Single Conductor Coil \u2013 Generic", \u0433\u0434\u0435:\n\n\u2022 \u0422\u0438\u043F \u043F\u0440\u043E\u0432\u043E\u0434\u0430 \u0431\u044B\u043B \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u043B\u0435\u043D \u043D\u0430 "rectangular with fillet" (\u043F\u043E \u0443\u043C\u043E\u043B\u0447\u0430\u043D\u0438\u044E); \u0440\u0430\u0437\u043C\u0435\u0440\u044B \u043C\u043E\u0433\u0443\u0442 \u0431\u044B\u0442\u044C \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u043B\u0435\u043D\u044B \u0441 \u0438\u0441\u043F\u043E\u043B\u044C\u0437\u043E\u0432\u0430\u043D\u0438\u0435\u043C \u0432\u0445\u043E\u0434\u043D\u044B\u0445 \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440\u043E\u0432 "wire_width" \u0438 "wire_height". \u041F\u0440\u0438 \u043D\u0430\u043B\u0438\u0447\u0438\u0438 \u0437\u043D\u0430\u0447\u0438\u0442\u0435\u043B\u044C\u043D\u043E\u0433\u043E \u0444\u0438\u043B\u0435 \u0435\u0433\u043E \u0440\u0430\u0434\u0438\u0443\u0441 \u043C\u043E\u0436\u0435\u0442 \u0431\u044B\u0442\u044C \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u043B\u0435\u043D \u0441 \u043F\u043E\u043C\u043E\u0449\u044C\u044E \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440\u0430 "wire_fillet". \u0415\u0441\u043B\u0438 \u0444\u0438\u043B\u0435 \u043D\u0435\u0431\u043E\u043B\u044C\u0448\u043E\u0435 \u0438\u043B\u0438 \u0432\u044B \u043F\u0440\u0435\u0434\u043F\u043E\u0447\u0438\u0442\u0430\u0435\u0442\u0435 \u0443\u043F\u0440\u043E\u0449\u0435\u043D\u043D\u0443\u044E \u0433\u0435\u043E\u043C\u0435\u0442\u0440\u0438\u044E, \u0432\u044B \u043C\u043E\u0436\u0435\u0442\u0435 \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u0438\u0442\u044C \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440 "wire_fillet" zero.\n\u2022 \u0422\u0438\u043F \u044F\u0434\u0440\u0430 \u043E\u0433\u0440\u0430\u043D\u0438\u0447\u0435\u043D "cylindrical" (\u0438\u043B\u0438 \u043A\u0440\u0443\u0433\u043E\u0432\u043E\u0439); \u0434\u0438\u0430\u043C\u0435\u0442\u0440 \u043C\u043E\u0436\u0435\u0442 \u0431\u044B\u0442\u044C \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u043B\u0435\u043D \u0441 \u043F\u043E\u043C\u043E\u0449\u044C\u044E \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440\u0430 \u0432\u0432\u043E\u0434\u0430 "coil_diameter"\n\u2022 \u0422\u0438\u043F \u0441\u043E\u0435\u0434\u0438\u043D\u0435\u043D\u0438\u044F \u0431\u044B\u043B \u043E\u0433\u0440\u0430\u043D\u0438\u0447\u0435\u043D "closed corner"; \u043E\u0431\u0440\u0430\u0442\u043D\u0430\u044F \u043F\u0435\u0442\u043B\u044F \u0431\u044B\u043B\u0430 \u043F\u043E\u043C\u0435\u0449\u0435\u043D\u0430 \u0432 \u0443\u0433\u043E\u043B (\u043F\u0440\u0438 \u0443\u0441\u043B\u043E\u0432\u0438\u0438 \u043F\u0440\u044F\u043C\u043E\u0443\u0433\u043E\u043B\u044C\u043D\u043E\u0439 \u0444\u043E\u0440\u043C\u044B \u044F\u0434\u0440\u0430) \u043F\u043E\u0434 \u0443\u0433\u043B\u043E\u043C 45 \u0433\u0440\u0430\u0434\u0443\u0441\u043E\u0432 \u043F\u043E \u043E\u0442\u043D\u043E\u0448\u0435\u043D\u0438\u044E \u043A \u043F\u043B\u043E\u0441\u043A\u043E\u0441\u0442\u0438 xz.\n\n \u0414\u043B\u044F \u043F\u043E\u043B\u0443\u0447\u0435\u043D\u0438\u044F \u0434\u043E\u043F\u043E\u043B\u043D\u0438\u0442\u0435\u043B\u044C\u043D\u043E\u0439 \u0438\u043D\u0444\u043E\u0440\u043C\u0430\u0446\u0438\u0438, \u043F\u043E\u0436\u0430\u043B\u0443\u0439\u0441\u0442\u0430, \u043F\u0440\u043E\u0432\u0435\u0440\u044C\u0442\u0435 \u0434\u043E\u043A\u0443\u043C\u0435\u043D\u0442\u0430\u0446\u0438\u044E \u043D\u0430 "Single Conductor Coil \u2013 Generic" \u0447\u0430\u0441\u0442\u044C \u0433\u0435\u043E\u043C\u0435\u0442\u0440\u0438\u0438.
partdescr_acdc/sc_rew_cc_open_corner = Single Conductor Coil \u2013 Rectangular Wire, Cylindrical, Open Corner\n\n\u042D\u0442\u043E \u043F\u0440\u043E\u0438\u0437\u0432\u043E\u0434\u043D\u0430\u044F \u043E\u0442 \u0447\u0430\u0441\u0442\u0438 \u0433\u0435\u043E\u043C\u0435\u0442\u0440\u0438\u0438 "Single Conductor Coil \u2013 Generic", \u0433\u0434\u0435:\n\n\u2022 \u0422\u0438\u043F \u043F\u0440\u043E\u0432\u043E\u0434\u0430 \u0431\u044B\u043B \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u043B\u0435\u043D \u043D\u0430 "rectangular with fillet" (\u043F\u043E \u0443\u043C\u043E\u043B\u0447\u0430\u043D\u0438\u044E); \u0440\u0430\u0437\u043C\u0435\u0440\u044B \u043C\u043E\u0433\u0443\u0442 \u0431\u044B\u0442\u044C \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u043B\u0435\u043D\u044B \u0441 \u0438\u0441\u043F\u043E\u043B\u044C\u0437\u043E\u0432\u0430\u043D\u0438\u0435\u043C \u0432\u0445\u043E\u0434\u043D\u044B\u0445 \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440\u043E\u0432 "wire_width" \u0438 "wire_height". \u041F\u0440\u0438 \u043D\u0430\u043B\u0438\u0447\u0438\u0438 \u0437\u043D\u0430\u0447\u0438\u0442\u0435\u043B\u044C\u043D\u043E\u0433\u043E \u0444\u0438\u043B\u0435 \u0435\u0433\u043E \u0440\u0430\u0434\u0438\u0443\u0441 \u043C\u043E\u0436\u0435\u0442 \u0431\u044B\u0442\u044C \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u043B\u0435\u043D \u0441 \u043F\u043E\u043C\u043E\u0449\u044C\u044E \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440\u0430 "wire_fillet". \u0415\u0441\u043B\u0438 \u0444\u0438\u043B\u0435 \u043D\u0435\u0431\u043E\u043B\u044C\u0448\u043E\u0435 \u0438\u043B\u0438 \u0432\u044B \u043F\u0440\u0435\u0434\u043F\u043E\u0447\u0438\u0442\u0430\u0435\u0442\u0435 \u0443\u043F\u0440\u043E\u0449\u0435\u043D\u043D\u0443\u044E \u0433\u0435\u043E\u043C\u0435\u0442\u0440\u0438\u044E, \u0432\u044B \u043C\u043E\u0436\u0435\u0442\u0435 \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u0438\u0442\u044C \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440 "wire_fillet" zero.\n\u2022 \u0422\u0438\u043F \u044F\u0434\u0440\u0430 \u043E\u0433\u0440\u0430\u043D\u0438\u0447\u0435\u043D "cylindrical" (\u0438\u043B\u0438 \u043A\u0440\u0443\u0433\u043E\u0432\u043E\u0439); \u0434\u0438\u0430\u043C\u0435\u0442\u0440 \u043C\u043E\u0436\u0435\u0442 \u0431\u044B\u0442\u044C \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u043B\u0435\u043D \u0441 \u043F\u043E\u043C\u043E\u0449\u044C\u044E \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440\u0430 \u0432\u0432\u043E\u0434\u0430 "coil_diameter"\n\u2022 \u0422\u0438\u043F \u0441\u043E\u0435\u0434\u0438\u043D\u0435\u043D\u0438\u044F \u0431\u044B\u043B \u043E\u0433\u0440\u0430\u043D\u0438\u0447\u0435\u043D "open corner"; \u043B\u0438\u043D\u0438\u0438 \u043F\u043E\u0434\u0430\u0447\u0438 \u0431\u044B\u043B\u0438 \u0440\u0430\u0437\u043C\u0435\u0449\u0435\u043D\u044B \u0432 \u0443\u0433\u043B\u0443 (\u043F\u0440\u0438 \u0443\u0441\u043B\u043E\u0432\u0438\u0438 \u043F\u0440\u044F\u043C\u043E\u0443\u0433\u043E\u043B\u044C\u043D\u043E\u0439 \u0444\u043E\u0440\u043C\u044B \u044F\u0434\u0440\u0430) \u043F\u043E\u0434 \u0443\u0433\u043B\u043E\u043C 45 \u0433\u0440\u0430\u0434\u0443\u0441\u043E\u0432 \u043F\u043E \u043E\u0442\u043D\u043E\u0448\u0435\u043D\u0438\u044E \u043A \u043F\u043B\u043E\u0441\u043A\u043E\u0441\u0442\u0438 xz.\n\n \u0414\u043B\u044F \u043F\u043E\u043B\u0443\u0447\u0435\u043D\u0438\u044F \u0434\u043E\u043F\u043E\u043B\u043D\u0438\u0442\u0435\u043B\u044C\u043D\u043E\u0439 \u0438\u043D\u0444\u043E\u0440\u043C\u0430\u0446\u0438\u0438, \u043F\u043E\u0436\u0430\u043B\u0443\u0439\u0441\u0442\u0430, \u043F\u0440\u043E\u0432\u0435\u0440\u044C\u0442\u0435 \u0434\u043E\u043A\u0443\u043C\u0435\u043D\u0442\u0430\u0446\u0438\u044E \u043D\u0430 "Single Conductor Coil \u2013 Generic" \u0447\u0430\u0441\u0442\u044C \u0433\u0435\u043E\u043C\u0435\u0442\u0440\u0438\u0438.
partdescr_acdc/sc_rew_cc_closed_hoops = Single Conductor Coil \u2013 Rectangular Wire, Cylindrical, Closed Hoops\n\n\u042D\u0442\u043E \u043F\u0440\u043E\u0438\u0437\u0432\u043E\u0434\u043D\u0430\u044F \u043E\u0442 \u0447\u0430\u0441\u0442\u0438 \u0433\u0435\u043E\u043C\u0435\u0442\u0440\u0438\u0438 "Single Conductor Coil \u2013 Generic", \u0433\u0434\u0435:\n\n\u2022 \u0422\u0438\u043F \u043F\u0440\u043E\u0432\u043E\u0434\u0430 \u0431\u044B\u043B \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u043B\u0435\u043D \u043D\u0430 "rectangular with fillet" (\u043F\u043E \u0443\u043C\u043E\u043B\u0447\u0430\u043D\u0438\u044E); \u0440\u0430\u0437\u043C\u0435\u0440\u044B \u043C\u043E\u0433\u0443\u0442 \u0431\u044B\u0442\u044C \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u043B\u0435\u043D\u044B \u0441 \u0438\u0441\u043F\u043E\u043B\u044C\u0437\u043E\u0432\u0430\u043D\u0438\u0435\u043C \u0432\u0445\u043E\u0434\u043D\u044B\u0445 \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440\u043E\u0432 "wire_width" \u0438 "wire_height". \u041F\u0440\u0438 \u043D\u0430\u043B\u0438\u0447\u0438\u0438 \u0437\u043D\u0430\u0447\u0438\u0442\u0435\u043B\u044C\u043D\u043E\u0433\u043E \u0444\u0438\u043B\u0435 \u0435\u0433\u043E \u0440\u0430\u0434\u0438\u0443\u0441 \u043C\u043E\u0436\u0435\u0442 \u0431\u044B\u0442\u044C \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u043B\u0435\u043D \u0441 \u043F\u043E\u043C\u043E\u0449\u044C\u044E \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440\u0430 "wire_fillet". \u0415\u0441\u043B\u0438 \u0444\u0438\u043B\u0435 \u043D\u0435\u0431\u043E\u043B\u044C\u0448\u043E\u0435 \u0438\u043B\u0438 \u0432\u044B \u043F\u0440\u0435\u0434\u043F\u043E\u0447\u0438\u0442\u0430\u0435\u0442\u0435 \u0443\u043F\u0440\u043E\u0449\u0435\u043D\u043D\u0443\u044E \u0433\u0435\u043E\u043C\u0435\u0442\u0440\u0438\u044E, \u0432\u044B \u043C\u043E\u0436\u0435\u0442\u0435 \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u0438\u0442\u044C \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440 "wire_fillet" zero.\n\u2022 \u0422\u0438\u043F \u044F\u0434\u0440\u0430 \u043E\u0433\u0440\u0430\u043D\u0438\u0447\u0435\u043D "cylindrical" (\u0438\u043B\u0438 \u043A\u0440\u0443\u0433\u043E\u0432\u043E\u0439); \u0434\u0438\u0430\u043C\u0435\u0442\u0440 \u043C\u043E\u0436\u0435\u0442 \u0431\u044B\u0442\u044C \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u043B\u0435\u043D \u0441 \u043F\u043E\u043C\u043E\u0449\u044C\u044E \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440\u0430 \u0432\u0432\u043E\u0434\u0430 "coil_diameter"\n\u2022 \u0422\u0438\u043F \u0441\u043E\u0435\u0434\u0438\u043D\u0435\u043D\u0438\u044F \u0431\u044B\u043B \u043E\u0433\u0440\u0430\u043D\u0438\u0447\u0435\u043D "closed hoops"; \u043F\u043E\u0432\u043E\u0440\u043E\u0442\u044B \u043D\u0435 \u0438\u043C\u0435\u044E\u0442 \u043D\u0430\u043A\u043B\u043E\u043D\u0430 \u0438 \u043E\u0431\u0440\u0430\u0437\u0443\u044E\u0442 \u043E\u0442\u0434\u0435\u043B\u044C\u043D\u044B\u0435 \u043E\u0431\u0440\u0443\u0447\u0438. \u042D\u0442\u043E \u0434\u043E\u0432\u043E\u043B\u044C\u043D\u043E \u0445\u043E\u0440\u043E\u0448\u043E \u043F\u0440\u0438\u0431\u043B\u0438\u0436\u0430\u0435\u0442 \u0441\u043F\u0438\u0440\u0430\u043B\u044C, \u043F\u043E\u0434\u0434\u0435\u0440\u0436\u0438\u0432\u0430\u044F \u0438\u0441\u043F\u043E\u043B\u044C\u0437\u043E\u0432\u0430\u043D\u0438\u0435 \u0441\u0438\u043C\u043C\u0435\u0442\u0440\u0438\u0438. \u0412\u0445\u043E\u0434\u043D\u043E\u0439 \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440 "partitioning" \u043C\u043E\u0436\u0435\u0442 \u0438\u0441\u043F\u043E\u043B\u044C\u0437\u043E\u0432\u0430\u0442\u044C\u0441\u044F \u0434\u043B\u044F \u043E\u0441\u043D\u0430\u0449\u0435\u043D\u0438\u044F \u043E\u0431\u0440\u0443\u0447\u0435\u0439 \u043F\u043E\u0432\u0435\u0440\u0445\u043D\u043E\u0441\u0442\u044C\u044E \u0440\u0430\u0437\u0434\u0435\u043B\u0430.\n\n \u0414\u043B\u044F \u043F\u043E\u043B\u0443\u0447\u0435\u043D\u0438\u044F \u0434\u043E\u043F\u043E\u043B\u043D\u0438\u0442\u0435\u043B\u044C\u043D\u043E\u0439 \u0438\u043D\u0444\u043E\u0440\u043C\u0430\u0446\u0438\u0438, \u043F\u043E\u0436\u0430\u043B\u0443\u0439\u0441\u0442\u0430, \u043F\u0440\u043E\u0432\u0435\u0440\u044C\u0442\u0435 \u0434\u043E\u043A\u0443\u043C\u0435\u043D\u0442\u0430\u0446\u0438\u044E \u043D\u0430 "Single Conductor Coil \u2013 Generic" \u0447\u0430\u0441\u0442\u044C \u0433\u0435\u043E\u043C\u0435\u0442\u0440\u0438\u0438.
partdescr_acdc/sc_rew_cc_open_helix = Single Conductor Coil \u2013 Rectangular Wire, Cylindrical, Open Helix\n\n\u042D\u0442\u043E \u043F\u0440\u043E\u0438\u0437\u0432\u043E\u0434\u043D\u0430\u044F \u043E\u0442 \u0447\u0430\u0441\u0442\u0438 \u0433\u0435\u043E\u043C\u0435\u0442\u0440\u0438\u0438 "Single Conductor Coil \u2013 Generic", \u0433\u0434\u0435:\n\n\u2022 \u0422\u0438\u043F \u043F\u0440\u043E\u0432\u043E\u0434\u0430 \u0431\u044B\u043B \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u043B\u0435\u043D \u043D\u0430 "rectangular with fillet" (\u043F\u043E \u0443\u043C\u043E\u043B\u0447\u0430\u043D\u0438\u044E); \u0440\u0430\u0437\u043C\u0435\u0440\u044B \u043C\u043E\u0433\u0443\u0442 \u0431\u044B\u0442\u044C \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u043B\u0435\u043D\u044B \u0441 \u0438\u0441\u043F\u043E\u043B\u044C\u0437\u043E\u0432\u0430\u043D\u0438\u0435\u043C \u0432\u0445\u043E\u0434\u043D\u044B\u0445 \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440\u043E\u0432 "wire_width" \u0438 "wire_height". \u041F\u0440\u0438 \u043D\u0430\u043B\u0438\u0447\u0438\u0438 \u0437\u043D\u0430\u0447\u0438\u0442\u0435\u043B\u044C\u043D\u043E\u0433\u043E \u0444\u0438\u043B\u0435 \u0435\u0433\u043E \u0440\u0430\u0434\u0438\u0443\u0441 \u043C\u043E\u0436\u0435\u0442 \u0431\u044B\u0442\u044C \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u043B\u0435\u043D \u0441 \u043F\u043E\u043C\u043E\u0449\u044C\u044E \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440\u0430 "wire_fillet". \u0415\u0441\u043B\u0438 \u0444\u0438\u043B\u0435 \u043D\u0435\u0431\u043E\u043B\u044C\u0448\u043E\u0435 \u0438\u043B\u0438 \u0432\u044B \u043F\u0440\u0435\u0434\u043F\u043E\u0447\u0438\u0442\u0430\u0435\u0442\u0435 \u0443\u043F\u0440\u043E\u0449\u0435\u043D\u043D\u0443\u044E \u0433\u0435\u043E\u043C\u0435\u0442\u0440\u0438\u044E, \u0432\u044B \u043C\u043E\u0436\u0435\u0442\u0435 \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u0438\u0442\u044C \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440 "wire_fillet" zero.\n\u2022 \u0422\u0438\u043F \u044F\u0434\u0440\u0430 \u043E\u0433\u0440\u0430\u043D\u0438\u0447\u0435\u043D "cylindrical" (\u0438\u043B\u0438 \u043A\u0440\u0443\u0433\u043E\u0432\u043E\u0439); \u0434\u0438\u0430\u043C\u0435\u0442\u0440 \u043C\u043E\u0436\u0435\u0442 \u0431\u044B\u0442\u044C \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u043B\u0435\u043D \u0441 \u043F\u043E\u043C\u043E\u0449\u044C\u044E \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440\u0430 \u0432\u0432\u043E\u0434\u0430 "coil_diameter"\n\u2022 \u0422\u0438\u043F \u0441\u043E\u0435\u0434\u0438\u043D\u0435\u043D\u0438\u044F \u0431\u044B\u043B \u043E\u0433\u0440\u0430\u043D\u0438\u0447\u0435\u043D "open helix"; \u0447\u0438\u0441\u043B\u043E \u0432\u0438\u0442\u043A\u043E\u0432 \u043C\u043E\u0436\u0435\u0442 \u0431\u044B\u0442\u044C \u043D\u0435\u0446\u0435\u043B\u044B\u043C. \u0412\u0445\u043E\u0434\u043D\u0430\u044F \u043A\u043E\u0440\u043C\u043E\u0432\u0430\u044F \u043B\u0438\u043D\u0438\u044F \u043F\u0430\u0440\u0430\u043B\u043B\u0435\u043B\u044C\u043D\u0430 \u043F\u043B\u043E\u0441\u043A\u043E\u0441\u0442\u0438 xz, \u0430 \u0432\u044B\u0445\u043E\u0434\u043D\u0430\u044F \u043A\u043E\u0440\u043C\u043E\u0432\u0430\u044F \u043B\u0438\u043D\u0438\u044F \u0440\u0430\u0437\u043C\u0435\u0449\u0435\u043D\u0430 \u043F\u043E\u0434 \u0443\u0433\u043B\u043E\u043C \u0432 \u0437\u0430\u0432\u0438\u0441\u0438\u043C\u043E\u0441\u0442\u0438 \u043E\u0442 \u043A\u043E\u043B\u0438\u0447\u0435\u0441\u0442\u0432\u0430 \u043E\u0431\u043E\u0440\u043E\u0442\u043E\u0432.\n\n \u0414\u043B\u044F \u043F\u043E\u043B\u0443\u0447\u0435\u043D\u0438\u044F \u0434\u043E\u043F\u043E\u043B\u043D\u0438\u0442\u0435\u043B\u044C\u043D\u043E\u0439 \u0438\u043D\u0444\u043E\u0440\u043C\u0430\u0446\u0438\u0438, \u043F\u043E\u0436\u0430\u043B\u0443\u0439\u0441\u0442\u0430, \u043F\u0440\u043E\u0432\u0435\u0440\u044C\u0442\u0435 \u0434\u043E\u043A\u0443\u043C\u0435\u043D\u0442\u0430\u0446\u0438\u044E \u043D\u0430 "Single Conductor Coil \u2013 Generic" \u0447\u0430\u0441\u0442\u044C \u0433\u0435\u043E\u043C\u0435\u0442\u0440\u0438\u0438.
partdescr_acdc/sc_rew_rc_closed_corner = Single Conductor Coil \u2013 Rectangular Wire, Racetrack, Closed Corner\n\n\u042D\u0442\u043E \u043F\u0440\u043E\u0438\u0437\u0432\u043E\u0434\u043D\u0430\u044F \u043E\u0442 \u0447\u0430\u0441\u0442\u0438 \u0433\u0435\u043E\u043C\u0435\u0442\u0440\u0438\u0438 "Single Conductor Coil \u2013 Generic", \u0433\u0434\u0435:\n\n\u2022 \u0422\u0438\u043F \u043F\u0440\u043E\u0432\u043E\u0434\u0430 \u0431\u044B\u043B \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u043B\u0435\u043D \u043D\u0430 "rectangular with fillet" (\u043F\u043E \u0443\u043C\u043E\u043B\u0447\u0430\u043D\u0438\u044E); \u0440\u0430\u0437\u043C\u0435\u0440\u044B \u043C\u043E\u0433\u0443\u0442 \u0431\u044B\u0442\u044C \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u043B\u0435\u043D\u044B \u0441 \u0438\u0441\u043F\u043E\u043B\u044C\u0437\u043E\u0432\u0430\u043D\u0438\u0435\u043C \u0432\u0445\u043E\u0434\u043D\u044B\u0445 \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440\u043E\u0432 "wire_width" \u0438 "wire_height". \u041F\u0440\u0438 \u043D\u0430\u043B\u0438\u0447\u0438\u0438 \u0437\u043D\u0430\u0447\u0438\u0442\u0435\u043B\u044C\u043D\u043E\u0433\u043E \u0444\u0438\u043B\u0435 \u0435\u0433\u043E \u0440\u0430\u0434\u0438\u0443\u0441 \u043C\u043E\u0436\u0435\u0442 \u0431\u044B\u0442\u044C \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u043B\u0435\u043D \u0441 \u043F\u043E\u043C\u043E\u0449\u044C\u044E \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440\u0430 "wire_fillet". \u0415\u0441\u043B\u0438 \u0444\u0438\u043B\u0435 \u043D\u0435\u0431\u043E\u043B\u044C\u0448\u043E\u0435 \u0438\u043B\u0438 \u0432\u044B \u043F\u0440\u0435\u0434\u043F\u043E\u0447\u0438\u0442\u0430\u0435\u0442\u0435 \u0443\u043F\u0440\u043E\u0449\u0435\u043D\u043D\u0443\u044E \u0433\u0435\u043E\u043C\u0435\u0442\u0440\u0438\u044E, \u0432\u044B \u043C\u043E\u0436\u0435\u0442\u0435 \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u0438\u0442\u044C \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440 "wire_fillet" zero.\n\u2022 \u0422\u0438\u043F \u044F\u0434\u0440\u0430 \u0431\u044B\u043B \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u043B\u0435\u043D \u043D\u0430 "rectangular with fillet" (\u043F\u043E \u0443\u043C\u043E\u043B\u0447\u0430\u043D\u0438\u044E); \u0440\u0430\u0437\u043C\u0435\u0440\u044B \u043C\u043E\u0433\u0443\u0442 \u0431\u044B\u0442\u044C \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u043B\u0435\u043D\u044B \u0441 \u0438\u0441\u043F\u043E\u043B\u044C\u0437\u043E\u0432\u0430\u043D\u0438\u0435\u043C \u0432\u0445\u043E\u0434\u043D\u044B\u0445 \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440\u043E\u0432 "coil_width" \u0438 "coil_depth". \u0420\u0430\u0437\u043C\u0435\u0440 \u0444\u0438\u043B\u0435 \u043C\u043E\u0436\u043D\u043E \u0441\u043A\u043E\u0440\u0440\u0435\u043A\u0442\u0438\u0440\u043E\u0432\u0430\u0442\u044C \u0441 \u043F\u043E\u043C\u043E\u0449\u044C\u044E \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440\u0430 "coil_fillet". \u0420\u0430\u0434\u0438\u0443\u0441 \u0444\u0438\u043B\u0435 \u043A\u0430\u0442\u0443\u0448\u043A\u0438 \u0438\u043C\u0435\u0435\u0442 \u043D\u0438\u0436\u043D\u044E\u044E \u0433\u0440\u0430\u043D\u0438\u0446\u0443, \u043A\u043E\u0442\u043E\u0440\u0430\u044F \u0443\u0441\u0442\u0430\u043D\u0430\u0432\u043B\u0438\u0432\u0430\u0435\u0442\u0441\u044F \u043D\u0430 \u043F\u043E\u043B\u043E\u0432\u0438\u043D\u0443 \u0448\u0438\u0440\u0438\u043D\u044B \u043F\u043E\u043F\u0435\u0440\u0435\u0447\u043D\u043E\u0433\u043E \u0441\u0435\u0447\u0435\u043D\u0438\u044F \u043F\u0440\u043E\u0432\u043E\u0434\u0430.\n\u2022 \u0422\u0438\u043F \u0441\u043E\u0435\u0434\u0438\u043D\u0435\u043D\u0438\u044F \u0431\u044B\u043B \u043E\u0433\u0440\u0430\u043D\u0438\u0447\u0435\u043D "closed corner"; \u043E\u0431\u0440\u0430\u0442\u043D\u0430\u044F \u043F\u0435\u0442\u043B\u044F \u0431\u044B\u043B\u0430 \u043F\u043E\u043C\u0435\u0449\u0435\u043D\u0430 \u0432 \u0443\u0433\u043E\u043B (\u043F\u0440\u0438 \u0443\u0441\u043B\u043E\u0432\u0438\u0438 \u043F\u0440\u044F\u043C\u043E\u0443\u0433\u043E\u043B\u044C\u043D\u043E\u0439 \u0444\u043E\u0440\u043C\u044B \u044F\u0434\u0440\u0430) \u043F\u043E\u0434 \u0443\u0433\u043B\u043E\u043C 45 \u0433\u0440\u0430\u0434\u0443\u0441\u043E\u0432 \u043F\u043E \u043E\u0442\u043D\u043E\u0448\u0435\u043D\u0438\u044E \u043A \u043F\u043B\u043E\u0441\u043A\u043E\u0441\u0442\u0438 xz.\n\n \u0414\u043B\u044F \u043F\u043E\u043B\u0443\u0447\u0435\u043D\u0438\u044F \u0434\u043E\u043F\u043E\u043B\u043D\u0438\u0442\u0435\u043B\u044C\u043D\u043E\u0439 \u0438\u043D\u0444\u043E\u0440\u043C\u0430\u0446\u0438\u0438, \u043F\u043E\u0436\u0430\u043B\u0443\u0439\u0441\u0442\u0430, \u043F\u0440\u043E\u0432\u0435\u0440\u044C\u0442\u0435 \u0434\u043E\u043A\u0443\u043C\u0435\u043D\u0442\u0430\u0446\u0438\u044E \u043D\u0430 "Single Conductor Coil \u2013 Generic" \u0447\u0430\u0441\u0442\u044C \u0433\u0435\u043E\u043C\u0435\u0442\u0440\u0438\u0438.
partdescr_acdc/sc_rew_rc_open_corner = Single Conductor Coil \u2013 Rectangular Wire, Racetrack, Open Corner\n\n\u042D\u0442\u043E \u043F\u0440\u043E\u0438\u0437\u0432\u043E\u0434\u043D\u0430\u044F \u043E\u0442 \u0447\u0430\u0441\u0442\u0438 \u0433\u0435\u043E\u043C\u0435\u0442\u0440\u0438\u0438 "Single Conductor Coil \u2013 Generic", \u0433\u0434\u0435:\n\n\u2022 \u0422\u0438\u043F \u043F\u0440\u043E\u0432\u043E\u0434\u0430 \u0431\u044B\u043B \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u043B\u0435\u043D \u043D\u0430 "rectangular with fillet" (\u043F\u043E \u0443\u043C\u043E\u043B\u0447\u0430\u043D\u0438\u044E); \u0440\u0430\u0437\u043C\u0435\u0440\u044B \u043C\u043E\u0433\u0443\u0442 \u0431\u044B\u0442\u044C \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u043B\u0435\u043D\u044B \u0441 \u0438\u0441\u043F\u043E\u043B\u044C\u0437\u043E\u0432\u0430\u043D\u0438\u0435\u043C \u0432\u0445\u043E\u0434\u043D\u044B\u0445 \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440\u043E\u0432 "wire_width" \u0438 "wire_height". \u041F\u0440\u0438 \u043D\u0430\u043B\u0438\u0447\u0438\u0438 \u0437\u043D\u0430\u0447\u0438\u0442\u0435\u043B\u044C\u043D\u043E\u0433\u043E \u0444\u0438\u043B\u0435 \u0435\u0433\u043E \u0440\u0430\u0434\u0438\u0443\u0441 \u043C\u043E\u0436\u0435\u0442 \u0431\u044B\u0442\u044C \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u043B\u0435\u043D \u0441 \u043F\u043E\u043C\u043E\u0449\u044C\u044E \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440\u0430 "wire_fillet". \u0415\u0441\u043B\u0438 \u0444\u0438\u043B\u0435 \u043D\u0435\u0431\u043E\u043B\u044C\u0448\u043E\u0435 \u0438\u043B\u0438 \u0432\u044B \u043F\u0440\u0435\u0434\u043F\u043E\u0447\u0438\u0442\u0430\u0435\u0442\u0435 \u0443\u043F\u0440\u043E\u0449\u0435\u043D\u043D\u0443\u044E \u0433\u0435\u043E\u043C\u0435\u0442\u0440\u0438\u044E, \u0432\u044B \u043C\u043E\u0436\u0435\u0442\u0435 \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u0438\u0442\u044C \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440 "wire_fillet" zero.\n\u2022 \u0422\u0438\u043F \u044F\u0434\u0440\u0430 \u0431\u044B\u043B \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u043B\u0435\u043D \u043D\u0430 "rectangular with fillet" (\u043F\u043E \u0443\u043C\u043E\u043B\u0447\u0430\u043D\u0438\u044E); \u0440\u0430\u0437\u043C\u0435\u0440\u044B \u043C\u043E\u0433\u0443\u0442 \u0431\u044B\u0442\u044C \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u043B\u0435\u043D\u044B \u0441 \u0438\u0441\u043F\u043E\u043B\u044C\u0437\u043E\u0432\u0430\u043D\u0438\u0435\u043C \u0432\u0445\u043E\u0434\u043D\u044B\u0445 \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440\u043E\u0432 "coil_width" \u0438 "coil_depth". \u0420\u0430\u0437\u043C\u0435\u0440 \u0444\u0438\u043B\u0435 \u043C\u043E\u0436\u043D\u043E \u0441\u043A\u043E\u0440\u0440\u0435\u043A\u0442\u0438\u0440\u043E\u0432\u0430\u0442\u044C \u0441 \u043F\u043E\u043C\u043E\u0449\u044C\u044E \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440\u0430 "coil_fillet". \u0420\u0430\u0434\u0438\u0443\u0441 \u0444\u0438\u043B\u0435 \u043A\u0430\u0442\u0443\u0448\u043A\u0438 \u0438\u043C\u0435\u0435\u0442 \u043D\u0438\u0436\u043D\u044E\u044E \u0433\u0440\u0430\u043D\u0438\u0446\u0443, \u043A\u043E\u0442\u043E\u0440\u0430\u044F \u0443\u0441\u0442\u0430\u043D\u0430\u0432\u043B\u0438\u0432\u0430\u0435\u0442\u0441\u044F \u043D\u0430 \u043F\u043E\u043B\u043E\u0432\u0438\u043D\u0443 \u0448\u0438\u0440\u0438\u043D\u044B \u043F\u043E\u043F\u0435\u0440\u0435\u0447\u043D\u043E\u0433\u043E \u0441\u0435\u0447\u0435\u043D\u0438\u044F \u043F\u0440\u043E\u0432\u043E\u0434\u0430.\n\u2022 \u0422\u0438\u043F \u0441\u043E\u0435\u0434\u0438\u043D\u0435\u043D\u0438\u044F \u0431\u044B\u043B \u043E\u0433\u0440\u0430\u043D\u0438\u0447\u0435\u043D "open corner"; \u043B\u0438\u043D\u0438\u0438 \u043F\u043E\u0434\u0430\u0447\u0438 \u0431\u044B\u043B\u0438 \u0440\u0430\u0437\u043C\u0435\u0449\u0435\u043D\u044B \u0432 \u0443\u0433\u043B\u0443 (\u043F\u0440\u0438 \u0443\u0441\u043B\u043E\u0432\u0438\u0438 \u043F\u0440\u044F\u043C\u043E\u0443\u0433\u043E\u043B\u044C\u043D\u043E\u0439 \u0444\u043E\u0440\u043C\u044B \u044F\u0434\u0440\u0430) \u043F\u043E\u0434 \u0443\u0433\u043B\u043E\u043C 45 \u0433\u0440\u0430\u0434\u0443\u0441\u043E\u0432 \u043F\u043E \u043E\u0442\u043D\u043E\u0448\u0435\u043D\u0438\u044E \u043A \u043F\u043B\u043E\u0441\u043A\u043E\u0441\u0442\u0438 xz.\n\n \u0414\u043B\u044F \u043F\u043E\u043B\u0443\u0447\u0435\u043D\u0438\u044F \u0434\u043E\u043F\u043E\u043B\u043D\u0438\u0442\u0435\u043B\u044C\u043D\u043E\u0439 \u0438\u043D\u0444\u043E\u0440\u043C\u0430\u0446\u0438\u0438, \u043F\u043E\u0436\u0430\u043B\u0443\u0439\u0441\u0442\u0430, \u043F\u0440\u043E\u0432\u0435\u0440\u044C\u0442\u0435 \u0434\u043E\u043A\u0443\u043C\u0435\u043D\u0442\u0430\u0446\u0438\u044E \u043D\u0430 "Single Conductor Coil \u2013 Generic" \u0447\u0430\u0441\u0442\u044C \u0433\u0435\u043E\u043C\u0435\u0442\u0440\u0438\u0438.
partdescr_acdc/sc_rew_rc_closed_side = Single Conductor Coil \u2013 Rectangular Wire, Racetrack, Closed Side\n\n\u042D\u0442\u043E \u043F\u0440\u043E\u0438\u0437\u0432\u043E\u0434\u043D\u0430\u044F \u043E\u0442 \u0447\u0430\u0441\u0442\u0438 \u0433\u0435\u043E\u043C\u0435\u0442\u0440\u0438\u0438 "Single Conductor Coil \u2013 Generic", \u0433\u0434\u0435:\n\n\u2022 \u0422\u0438\u043F \u043F\u0440\u043E\u0432\u043E\u0434\u0430 \u0431\u044B\u043B \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u043B\u0435\u043D \u043D\u0430 "rectangular with fillet" (\u043F\u043E \u0443\u043C\u043E\u043B\u0447\u0430\u043D\u0438\u044E); \u0440\u0430\u0437\u043C\u0435\u0440\u044B \u043C\u043E\u0433\u0443\u0442 \u0431\u044B\u0442\u044C \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u043B\u0435\u043D\u044B \u0441 \u0438\u0441\u043F\u043E\u043B\u044C\u0437\u043E\u0432\u0430\u043D\u0438\u0435\u043C \u0432\u0445\u043E\u0434\u043D\u044B\u0445 \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440\u043E\u0432 "wire_width" \u0438 "wire_height". \u041F\u0440\u0438 \u043D\u0430\u043B\u0438\u0447\u0438\u0438 \u0437\u043D\u0430\u0447\u0438\u0442\u0435\u043B\u044C\u043D\u043E\u0433\u043E \u0444\u0438\u043B\u0435 \u0435\u0433\u043E \u0440\u0430\u0434\u0438\u0443\u0441 \u043C\u043E\u0436\u0435\u0442 \u0431\u044B\u0442\u044C \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u043B\u0435\u043D \u0441 \u043F\u043E\u043C\u043E\u0449\u044C\u044E \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440\u0430 "wire_fillet". \u0415\u0441\u043B\u0438 \u0444\u0438\u043B\u0435 \u043D\u0435\u0431\u043E\u043B\u044C\u0448\u043E\u0435 \u0438\u043B\u0438 \u0432\u044B \u043F\u0440\u0435\u0434\u043F\u043E\u0447\u0438\u0442\u0430\u0435\u0442\u0435 \u0443\u043F\u0440\u043E\u0449\u0435\u043D\u043D\u0443\u044E \u0433\u0435\u043E\u043C\u0435\u0442\u0440\u0438\u044E, \u0432\u044B \u043C\u043E\u0436\u0435\u0442\u0435 \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u0438\u0442\u044C \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440 "wire_fillet" zero.\n\u2022 \u0422\u0438\u043F \u044F\u0434\u0440\u0430 \u0431\u044B\u043B \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u043B\u0435\u043D \u043D\u0430 "rectangular with fillet" (\u043F\u043E \u0443\u043C\u043E\u043B\u0447\u0430\u043D\u0438\u044E); \u0440\u0430\u0437\u043C\u0435\u0440\u044B \u043C\u043E\u0433\u0443\u0442 \u0431\u044B\u0442\u044C \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u043B\u0435\u043D\u044B \u0441 \u0438\u0441\u043F\u043E\u043B\u044C\u0437\u043E\u0432\u0430\u043D\u0438\u0435\u043C \u0432\u0445\u043E\u0434\u043D\u044B\u0445 \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440\u043E\u0432 "coil_width" \u0438 "coil_depth". \u0420\u0430\u0437\u043C\u0435\u0440 \u0444\u0438\u043B\u0435 \u043C\u043E\u0436\u043D\u043E \u0441\u043A\u043E\u0440\u0440\u0435\u043A\u0442\u0438\u0440\u043E\u0432\u0430\u0442\u044C \u0441 \u043F\u043E\u043C\u043E\u0449\u044C\u044E \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440\u0430 "coil_fillet". \u0420\u0430\u0434\u0438\u0443\u0441 \u0444\u0438\u043B\u0435 \u043A\u0430\u0442\u0443\u0448\u043A\u0438 \u0438\u043C\u0435\u0435\u0442 \u043D\u0438\u0436\u043D\u044E\u044E \u0433\u0440\u0430\u043D\u0438\u0446\u0443, \u043A\u043E\u0442\u043E\u0440\u0430\u044F \u0443\u0441\u0442\u0430\u043D\u0430\u0432\u043B\u0438\u0432\u0430\u0435\u0442\u0441\u044F \u043D\u0430 \u043F\u043E\u043B\u043E\u0432\u0438\u043D\u0443 \u0448\u0438\u0440\u0438\u043D\u044B \u043F\u043E\u043F\u0435\u0440\u0435\u0447\u043D\u043E\u0433\u043E \u0441\u0435\u0447\u0435\u043D\u0438\u044F \u043F\u0440\u043E\u0432\u043E\u0434\u0430.\n\u2022 \u0422\u0438\u043F \u0441\u043E\u0435\u0434\u0438\u043D\u0435\u043D\u0438\u044F \u0431\u044B\u043B \u043E\u0433\u0440\u0430\u043D\u0438\u0447\u0435\u043D "closed side"; \u043E\u0431\u0440\u0430\u0442\u043D\u0430\u044F \u043F\u0435\u0442\u043B\u044F \u0431\u044B\u043B\u0430 \u0440\u0430\u0437\u043C\u0435\u0449\u0435\u043D\u0430 \u043D\u0430 \u0441\u0442\u043E\u0440\u043E\u043D\u0435, \u0441\u043E\u0432\u043F\u0430\u0434\u0430\u044E\u0449\u0435\u0439 \u0441 xz-plane.\n\n \u0414\u043B\u044F \u043F\u043E\u043B\u0443\u0447\u0435\u043D\u0438\u044F \u0434\u043E\u043F\u043E\u043B\u043D\u0438\u0442\u0435\u043B\u044C\u043D\u043E\u0439 \u0438\u043D\u0444\u043E\u0440\u043C\u0430\u0446\u0438\u0438, \u043F\u043E\u0436\u0430\u043B\u0443\u0439\u0441\u0442\u0430, \u043F\u0440\u043E\u0432\u0435\u0440\u044C\u0442\u0435 \u0434\u043E\u043A\u0443\u043C\u0435\u043D\u0442\u0430\u0446\u0438\u044E \u043D\u0430 "Single Conductor Coil \u2013 Generic" \u0447\u0430\u0441\u0442\u044C \u0433\u0435\u043E\u043C\u0435\u0442\u0440\u0438\u0438.
partdescr_acdc/sc_rew_rc_open_side = Single Conductor Coil \u2013 Rectangular Wire, Racetrack, Open Side\n\n\u042D\u0442\u043E \u043F\u0440\u043E\u0438\u0437\u0432\u043E\u0434\u043D\u0430\u044F \u043E\u0442 \u0447\u0430\u0441\u0442\u0438 \u0433\u0435\u043E\u043C\u0435\u0442\u0440\u0438\u0438 "Single Conductor Coil \u2013 Generic", \u0433\u0434\u0435:\n\n\u2022 \u0422\u0438\u043F \u043F\u0440\u043E\u0432\u043E\u0434\u0430 \u0431\u044B\u043B \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u043B\u0435\u043D \u043D\u0430 "rectangular with fillet" (\u043F\u043E \u0443\u043C\u043E\u043B\u0447\u0430\u043D\u0438\u044E); \u0440\u0430\u0437\u043C\u0435\u0440\u044B \u043C\u043E\u0433\u0443\u0442 \u0431\u044B\u0442\u044C \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u043B\u0435\u043D\u044B \u0441 \u0438\u0441\u043F\u043E\u043B\u044C\u0437\u043E\u0432\u0430\u043D\u0438\u0435\u043C \u0432\u0445\u043E\u0434\u043D\u044B\u0445 \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440\u043E\u0432 "wire_width" \u0438 "wire_height". \u041F\u0440\u0438 \u043D\u0430\u043B\u0438\u0447\u0438\u0438 \u0437\u043D\u0430\u0447\u0438\u0442\u0435\u043B\u044C\u043D\u043E\u0433\u043E \u0444\u0438\u043B\u0435 \u0435\u0433\u043E \u0440\u0430\u0434\u0438\u0443\u0441 \u043C\u043E\u0436\u0435\u0442 \u0431\u044B\u0442\u044C \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u043B\u0435\u043D \u0441 \u043F\u043E\u043C\u043E\u0449\u044C\u044E \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440\u0430 "wire_fillet". \u0415\u0441\u043B\u0438 \u0444\u0438\u043B\u0435 \u043D\u0435\u0431\u043E\u043B\u044C\u0448\u043E\u0435 \u0438\u043B\u0438 \u0432\u044B \u043F\u0440\u0435\u0434\u043F\u043E\u0447\u0438\u0442\u0430\u0435\u0442\u0435 \u0443\u043F\u0440\u043E\u0449\u0435\u043D\u043D\u0443\u044E \u0433\u0435\u043E\u043C\u0435\u0442\u0440\u0438\u044E, \u0432\u044B \u043C\u043E\u0436\u0435\u0442\u0435 \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u0438\u0442\u044C \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440 "wire_fillet" zero.\n\u2022 \u0422\u0438\u043F \u044F\u0434\u0440\u0430 \u0431\u044B\u043B \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u043B\u0435\u043D \u043D\u0430 "rectangular with fillet" (\u043F\u043E \u0443\u043C\u043E\u043B\u0447\u0430\u043D\u0438\u044E); \u0440\u0430\u0437\u043C\u0435\u0440\u044B \u043C\u043E\u0433\u0443\u0442 \u0431\u044B\u0442\u044C \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u043B\u0435\u043D\u044B \u0441 \u0438\u0441\u043F\u043E\u043B\u044C\u0437\u043E\u0432\u0430\u043D\u0438\u0435\u043C \u0432\u0445\u043E\u0434\u043D\u044B\u0445 \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440\u043E\u0432 "coil_width" \u0438 "coil_depth". \u0420\u0430\u0437\u043C\u0435\u0440 \u0444\u0438\u043B\u0435 \u043C\u043E\u0436\u043D\u043E \u0441\u043A\u043E\u0440\u0440\u0435\u043A\u0442\u0438\u0440\u043E\u0432\u0430\u0442\u044C \u0441 \u043F\u043E\u043C\u043E\u0449\u044C\u044E \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440\u0430 "coil_fillet". \u0420\u0430\u0434\u0438\u0443\u0441 \u0444\u0438\u043B\u0435 \u043A\u0430\u0442\u0443\u0448\u043A\u0438 \u0438\u043C\u0435\u0435\u0442 \u043D\u0438\u0436\u043D\u044E\u044E \u0433\u0440\u0430\u043D\u0438\u0446\u0443, \u043A\u043E\u0442\u043E\u0440\u0430\u044F \u0443\u0441\u0442\u0430\u043D\u0430\u0432\u043B\u0438\u0432\u0430\u0435\u0442\u0441\u044F \u043D\u0430 \u043F\u043E\u043B\u043E\u0432\u0438\u043D\u0443 \u0448\u0438\u0440\u0438\u043D\u044B \u043F\u043E\u043F\u0435\u0440\u0435\u0447\u043D\u043E\u0433\u043E \u0441\u0435\u0447\u0435\u043D\u0438\u044F \u043F\u0440\u043E\u0432\u043E\u0434\u0430.\n\u2022 \u0422\u0438\u043F \u0441\u043E\u0435\u0434\u0438\u043D\u0435\u043D\u0438\u044F \u0431\u044B\u043B \u043E\u0433\u0440\u0430\u043D\u0438\u0447\u0435\u043D "open side"; \u043B\u0438\u043D\u0438\u0438 \u043F\u043E\u0434\u0430\u0447\u0438 \u0431\u044B\u043B\u0438 \u0440\u0430\u0437\u043C\u0435\u0449\u0435\u043D\u044B \u043D\u0430 \u0441\u0442\u043E\u0440\u043E\u043D\u0435, \u0441\u043E\u0432\u043F\u0430\u0434\u0430\u044E\u0449\u0435\u0439 \u0441 xz-plane.\n\n \u0414\u043B\u044F \u043F\u043E\u043B\u0443\u0447\u0435\u043D\u0438\u044F \u0434\u043E\u043F\u043E\u043B\u043D\u0438\u0442\u0435\u043B\u044C\u043D\u043E\u0439 \u0438\u043D\u0444\u043E\u0440\u043C\u0430\u0446\u0438\u0438, \u043F\u043E\u0436\u0430\u043B\u0443\u0439\u0441\u0442\u0430, \u043F\u0440\u043E\u0432\u0435\u0440\u044C\u0442\u0435 \u0434\u043E\u043A\u0443\u043C\u0435\u043D\u0442\u0430\u0446\u0438\u044E \u043D\u0430 "Single Conductor Coil \u2013 Generic" \u0447\u0430\u0441\u0442\u044C \u0433\u0435\u043E\u043C\u0435\u0442\u0440\u0438\u0438.
partdescr_acdc/sc_rew_rc_closed_hoops = Single Conductor Coil \u2013 Rectangular Wire, Racetrack, Closed Hoops\n\n\u042D\u0442\u043E \u043F\u0440\u043E\u0438\u0437\u0432\u043E\u0434\u043D\u0430\u044F \u043E\u0442 \u0447\u0430\u0441\u0442\u0438 \u0433\u0435\u043E\u043C\u0435\u0442\u0440\u0438\u0438 "Single Conductor Coil \u2013 Generic", \u0433\u0434\u0435:\n\n\u2022 \u0422\u0438\u043F \u043F\u0440\u043E\u0432\u043E\u0434\u0430 \u0431\u044B\u043B \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u043B\u0435\u043D \u043D\u0430 "rectangular with fillet" (\u043F\u043E \u0443\u043C\u043E\u043B\u0447\u0430\u043D\u0438\u044E); \u0440\u0430\u0437\u043C\u0435\u0440\u044B \u043C\u043E\u0433\u0443\u0442 \u0431\u044B\u0442\u044C \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u043B\u0435\u043D\u044B \u0441 \u0438\u0441\u043F\u043E\u043B\u044C\u0437\u043E\u0432\u0430\u043D\u0438\u0435\u043C \u0432\u0445\u043E\u0434\u043D\u044B\u0445 \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440\u043E\u0432 "wire_width" \u0438 "wire_height". \u041F\u0440\u0438 \u043D\u0430\u043B\u0438\u0447\u0438\u0438 \u0437\u043D\u0430\u0447\u0438\u0442\u0435\u043B\u044C\u043D\u043E\u0433\u043E \u0444\u0438\u043B\u0435 \u0435\u0433\u043E \u0440\u0430\u0434\u0438\u0443\u0441 \u043C\u043E\u0436\u0435\u0442 \u0431\u044B\u0442\u044C \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u043B\u0435\u043D \u0441 \u043F\u043E\u043C\u043E\u0449\u044C\u044E \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440\u0430 "wire_fillet". \u0415\u0441\u043B\u0438 \u0444\u0438\u043B\u0435 \u043D\u0435\u0431\u043E\u043B\u044C\u0448\u043E\u0435 \u0438\u043B\u0438 \u0432\u044B \u043F\u0440\u0435\u0434\u043F\u043E\u0447\u0438\u0442\u0430\u0435\u0442\u0435 \u0443\u043F\u0440\u043E\u0449\u0435\u043D\u043D\u0443\u044E \u0433\u0435\u043E\u043C\u0435\u0442\u0440\u0438\u044E, \u0432\u044B \u043C\u043E\u0436\u0435\u0442\u0435 \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u0438\u0442\u044C \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440 "wire_fillet" zero.\n\u2022 \u0422\u0438\u043F \u044F\u0434\u0440\u0430 \u0431\u044B\u043B \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u043B\u0435\u043D \u043D\u0430 "rectangular with fillet" (\u043F\u043E \u0443\u043C\u043E\u043B\u0447\u0430\u043D\u0438\u044E); \u0440\u0430\u0437\u043C\u0435\u0440\u044B \u043C\u043E\u0433\u0443\u0442 \u0431\u044B\u0442\u044C \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u043B\u0435\u043D\u044B \u0441 \u0438\u0441\u043F\u043E\u043B\u044C\u0437\u043E\u0432\u0430\u043D\u0438\u0435\u043C \u0432\u0445\u043E\u0434\u043D\u044B\u0445 \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440\u043E\u0432 "coil_width" \u0438 "coil_depth". \u0420\u0430\u0437\u043C\u0435\u0440 \u0444\u0438\u043B\u0435 \u043C\u043E\u0436\u043D\u043E \u0441\u043A\u043E\u0440\u0440\u0435\u043A\u0442\u0438\u0440\u043E\u0432\u0430\u0442\u044C \u0441 \u043F\u043E\u043C\u043E\u0449\u044C\u044E \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440\u0430 "coil_fillet". \u0420\u0430\u0434\u0438\u0443\u0441 \u0444\u0438\u043B\u0435 \u043A\u0430\u0442\u0443\u0448\u043A\u0438 \u0438\u043C\u0435\u0435\u0442 \u043D\u0438\u0436\u043D\u044E\u044E \u0433\u0440\u0430\u043D\u0438\u0446\u0443, \u043A\u043E\u0442\u043E\u0440\u0430\u044F \u0443\u0441\u0442\u0430\u043D\u0430\u0432\u043B\u0438\u0432\u0430\u0435\u0442\u0441\u044F \u043D\u0430 \u043F\u043E\u043B\u043E\u0432\u0438\u043D\u0443 \u0448\u0438\u0440\u0438\u043D\u044B \u043F\u043E\u043F\u0435\u0440\u0435\u0447\u043D\u043E\u0433\u043E \u0441\u0435\u0447\u0435\u043D\u0438\u044F \u043F\u0440\u043E\u0432\u043E\u0434\u0430.\n\u2022 \u0422\u0438\u043F \u0441\u043E\u0435\u0434\u0438\u043D\u0435\u043D\u0438\u044F \u0431\u044B\u043B \u043E\u0433\u0440\u0430\u043D\u0438\u0447\u0435\u043D "closed hoops"; \u043F\u043E\u0432\u043E\u0440\u043E\u0442\u044B \u043D\u0435 \u0438\u043C\u0435\u044E\u0442 \u043D\u0430\u043A\u043B\u043E\u043D\u0430 \u0438 \u043E\u0431\u0440\u0430\u0437\u0443\u044E\u0442 \u043E\u0442\u0434\u0435\u043B\u044C\u043D\u044B\u0435 \u043E\u0431\u0440\u0443\u0447\u0438. \u042D\u0442\u043E \u0434\u043E\u0432\u043E\u043B\u044C\u043D\u043E \u0445\u043E\u0440\u043E\u0448\u043E \u043F\u0440\u0438\u0431\u043B\u0438\u0436\u0430\u0435\u0442 \u0441\u043F\u0438\u0440\u0430\u043B\u044C, \u043F\u043E\u0434\u0434\u0435\u0440\u0436\u0438\u0432\u0430\u044F \u0438\u0441\u043F\u043E\u043B\u044C\u0437\u043E\u0432\u0430\u043D\u0438\u0435 \u0441\u0438\u043C\u043C\u0435\u0442\u0440\u0438\u0438. \u0412\u0445\u043E\u0434\u043D\u043E\u0439 \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440 "partitioning" \u043C\u043E\u0436\u0435\u0442 \u0438\u0441\u043F\u043E\u043B\u044C\u0437\u043E\u0432\u0430\u0442\u044C\u0441\u044F \u0434\u043B\u044F \u043E\u0441\u043D\u0430\u0449\u0435\u043D\u0438\u044F \u043E\u0431\u0440\u0443\u0447\u0435\u0439 \u043F\u043E\u0432\u0435\u0440\u0445\u043D\u043E\u0441\u0442\u044C\u044E \u0440\u0430\u0437\u0434\u0435\u043B\u0430.\n\n \u0414\u043B\u044F \u043F\u043E\u043B\u0443\u0447\u0435\u043D\u0438\u044F \u0434\u043E\u043F\u043E\u043B\u043D\u0438\u0442\u0435\u043B\u044C\u043D\u043E\u0439 \u0438\u043D\u0444\u043E\u0440\u043C\u0430\u0446\u0438\u0438, \u043F\u043E\u0436\u0430\u043B\u0443\u0439\u0441\u0442\u0430, \u043F\u0440\u043E\u0432\u0435\u0440\u044C\u0442\u0435 \u0434\u043E\u043A\u0443\u043C\u0435\u043D\u0442\u0430\u0446\u0438\u044E \u043D\u0430 "Single Conductor Coil \u2013 Generic" \u0447\u0430\u0441\u0442\u044C \u0433\u0435\u043E\u043C\u0435\u0442\u0440\u0438\u0438.
partdescr_acdc/sc_hor_cc_closed_corner = Single Conductor Coil \u2013 Horizontal Ribbon, Cylindrical, Closed Corner\n\n\u042D\u0442\u043E \u043F\u0440\u043E\u0438\u0437\u0432\u043E\u0434\u043D\u0430\u044F \u043E\u0442 \u0447\u0430\u0441\u0442\u0438 \u0433\u0435\u043E\u043C\u0435\u0442\u0440\u0438\u0438 "Single Conductor Coil \u2013 Generic", \u0433\u0434\u0435:\n\n\u2022 \u0422\u0438\u043F \u043F\u0440\u043E\u0432\u043E\u0434\u0430 \u0431\u044B\u043B \u043E\u0433\u0440\u0430\u043D\u0438\u0447\u0435\u043D "horizontal ribbon"; \u0448\u0438\u0440\u0438\u043D\u0430 \u043B\u0435\u043D\u0442\u044B \u043C\u043E\u0436\u0435\u0442 \u0431\u044B\u0442\u044C \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u043B\u0435\u043D\u0430 \u0441 \u043F\u043E\u043C\u043E\u0449\u044C\u044E \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440\u0430 \u0432\u0432\u043E\u0434\u0430 "ribbon_width"\n\u2022 \u0422\u0438\u043F \u044F\u0434\u0440\u0430 \u043E\u0433\u0440\u0430\u043D\u0438\u0447\u0435\u043D "cylindrical" (\u0438\u043B\u0438 \u043A\u0440\u0443\u0433\u043E\u0432\u043E\u0439); \u0434\u0438\u0430\u043C\u0435\u0442\u0440 \u043C\u043E\u0436\u0435\u0442 \u0431\u044B\u0442\u044C \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u043B\u0435\u043D \u0441 \u043F\u043E\u043C\u043E\u0449\u044C\u044E \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440\u0430 \u0432\u0432\u043E\u0434\u0430 "coil_diameter"\n\u2022 \u0422\u0438\u043F \u0441\u043E\u0435\u0434\u0438\u043D\u0435\u043D\u0438\u044F \u0431\u044B\u043B \u043E\u0433\u0440\u0430\u043D\u0438\u0447\u0435\u043D "closed corner"; \u043E\u0431\u0440\u0430\u0442\u043D\u0430\u044F \u043F\u0435\u0442\u043B\u044F \u0431\u044B\u043B\u0430 \u043F\u043E\u043C\u0435\u0449\u0435\u043D\u0430 \u0432 \u0443\u0433\u043E\u043B (\u043F\u0440\u0438 \u0443\u0441\u043B\u043E\u0432\u0438\u0438 \u043F\u0440\u044F\u043C\u043E\u0443\u0433\u043E\u043B\u044C\u043D\u043E\u0439 \u0444\u043E\u0440\u043C\u044B \u044F\u0434\u0440\u0430) \u043F\u043E\u0434 \u0443\u0433\u043B\u043E\u043C 45 \u0433\u0440\u0430\u0434\u0443\u0441\u043E\u0432 \u043F\u043E \u043E\u0442\u043D\u043E\u0448\u0435\u043D\u0438\u044E \u043A \u043F\u043B\u043E\u0441\u043A\u043E\u0441\u0442\u0438 xz.\n\n \u0414\u043B\u044F \u043F\u043E\u043B\u0443\u0447\u0435\u043D\u0438\u044F \u0434\u043E\u043F\u043E\u043B\u043D\u0438\u0442\u0435\u043B\u044C\u043D\u043E\u0439 \u0438\u043D\u0444\u043E\u0440\u043C\u0430\u0446\u0438\u0438, \u043F\u043E\u0436\u0430\u043B\u0443\u0439\u0441\u0442\u0430, \u043F\u0440\u043E\u0432\u0435\u0440\u044C\u0442\u0435 \u0434\u043E\u043A\u0443\u043C\u0435\u043D\u0442\u0430\u0446\u0438\u044E \u043D\u0430 "Single Conductor Coil \u2013 Generic" \u0447\u0430\u0441\u0442\u044C \u0433\u0435\u043E\u043C\u0435\u0442\u0440\u0438\u0438.
partdescr_acdc/sc_hor_cc_open_corner = Single Conductor Coil \u2013 Horizontal Ribbon, Cylindrical, Open Corner\n\n\u042D\u0442\u043E \u043F\u0440\u043E\u0438\u0437\u0432\u043E\u0434\u043D\u0430\u044F \u043E\u0442 \u0447\u0430\u0441\u0442\u0438 \u0433\u0435\u043E\u043C\u0435\u0442\u0440\u0438\u0438 "Single Conductor Coil \u2013 Generic", \u0433\u0434\u0435:\n\n\u2022 \u0422\u0438\u043F \u043F\u0440\u043E\u0432\u043E\u0434\u0430 \u0431\u044B\u043B \u043E\u0433\u0440\u0430\u043D\u0438\u0447\u0435\u043D "horizontal ribbon"; \u0448\u0438\u0440\u0438\u043D\u0430 \u043B\u0435\u043D\u0442\u044B \u043C\u043E\u0436\u0435\u0442 \u0431\u044B\u0442\u044C \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u043B\u0435\u043D\u0430 \u0441 \u043F\u043E\u043C\u043E\u0449\u044C\u044E \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440\u0430 \u0432\u0432\u043E\u0434\u0430 "ribbon_width"\n\u2022 \u0422\u0438\u043F \u044F\u0434\u0440\u0430 \u043E\u0433\u0440\u0430\u043D\u0438\u0447\u0435\u043D "cylindrical" (\u0438\u043B\u0438 \u043A\u0440\u0443\u0433\u043E\u0432\u043E\u0439); \u0434\u0438\u0430\u043C\u0435\u0442\u0440 \u043C\u043E\u0436\u0435\u0442 \u0431\u044B\u0442\u044C \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u043B\u0435\u043D \u0441 \u043F\u043E\u043C\u043E\u0449\u044C\u044E \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440\u0430 \u0432\u0432\u043E\u0434\u0430 "coil_diameter"\n\u2022 \u0422\u0438\u043F \u0441\u043E\u0435\u0434\u0438\u043D\u0435\u043D\u0438\u044F \u0431\u044B\u043B \u043E\u0433\u0440\u0430\u043D\u0438\u0447\u0435\u043D "open corner"; \u043B\u0438\u043D\u0438\u0438 \u043F\u043E\u0434\u0430\u0447\u0438 \u0431\u044B\u043B\u0438 \u0440\u0430\u0437\u043C\u0435\u0449\u0435\u043D\u044B \u0432 \u0443\u0433\u043B\u0443 (\u043F\u0440\u0438 \u0443\u0441\u043B\u043E\u0432\u0438\u0438 \u043F\u0440\u044F\u043C\u043E\u0443\u0433\u043E\u043B\u044C\u043D\u043E\u0439 \u0444\u043E\u0440\u043C\u044B \u044F\u0434\u0440\u0430) \u043F\u043E\u0434 \u0443\u0433\u043B\u043E\u043C 45 \u0433\u0440\u0430\u0434\u0443\u0441\u043E\u0432 \u043F\u043E \u043E\u0442\u043D\u043E\u0448\u0435\u043D\u0438\u044E \u043A \u043F\u043B\u043E\u0441\u043A\u043E\u0441\u0442\u0438 xz.\n\n \u0414\u043B\u044F \u043F\u043E\u043B\u0443\u0447\u0435\u043D\u0438\u044F \u0434\u043E\u043F\u043E\u043B\u043D\u0438\u0442\u0435\u043B\u044C\u043D\u043E\u0439 \u0438\u043D\u0444\u043E\u0440\u043C\u0430\u0446\u0438\u0438, \u043F\u043E\u0436\u0430\u043B\u0443\u0439\u0441\u0442\u0430, \u043F\u0440\u043E\u0432\u0435\u0440\u044C\u0442\u0435 \u0434\u043E\u043A\u0443\u043C\u0435\u043D\u0442\u0430\u0446\u0438\u044E \u043D\u0430 "Single Conductor Coil \u2013 Generic" \u0447\u0430\u0441\u0442\u044C \u0433\u0435\u043E\u043C\u0435\u0442\u0440\u0438\u0438.
partdescr_acdc/sc_hor_cc_closed_hoops = Single Conductor Coil \u2013 Horizontal Ribbon, Cylindrical, Closed Hoops\n\n\u042D\u0442\u043E \u043F\u0440\u043E\u0438\u0437\u0432\u043E\u0434\u043D\u0430\u044F \u043E\u0442 \u0447\u0430\u0441\u0442\u0438 \u0433\u0435\u043E\u043C\u0435\u0442\u0440\u0438\u0438 "Single Conductor Coil \u2013 Generic", \u0433\u0434\u0435:\n\n\u2022 \u0422\u0438\u043F \u043F\u0440\u043E\u0432\u043E\u0434\u0430 \u0431\u044B\u043B \u043E\u0433\u0440\u0430\u043D\u0438\u0447\u0435\u043D "horizontal ribbon"; \u0448\u0438\u0440\u0438\u043D\u0430 \u043B\u0435\u043D\u0442\u044B \u043C\u043E\u0436\u0435\u0442 \u0431\u044B\u0442\u044C \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u043B\u0435\u043D\u0430 \u0441 \u043F\u043E\u043C\u043E\u0449\u044C\u044E \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440\u0430 \u0432\u0432\u043E\u0434\u0430 "ribbon_width"\n\u2022 \u0422\u0438\u043F \u044F\u0434\u0440\u0430 \u043E\u0433\u0440\u0430\u043D\u0438\u0447\u0435\u043D "cylindrical" (\u0438\u043B\u0438 \u043A\u0440\u0443\u0433\u043E\u0432\u043E\u0439); \u0434\u0438\u0430\u043C\u0435\u0442\u0440 \u043C\u043E\u0436\u0435\u0442 \u0431\u044B\u0442\u044C \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u043B\u0435\u043D \u0441 \u043F\u043E\u043C\u043E\u0449\u044C\u044E \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440\u0430 \u0432\u0432\u043E\u0434\u0430 "coil_diameter"\n\u2022 \u0422\u0438\u043F \u0441\u043E\u0435\u0434\u0438\u043D\u0435\u043D\u0438\u044F \u0431\u044B\u043B \u043E\u0433\u0440\u0430\u043D\u0438\u0447\u0435\u043D "closed hoops"; \u043F\u043E\u0432\u043E\u0440\u043E\u0442\u044B \u043D\u0435 \u0438\u043C\u0435\u044E\u0442 \u043D\u0430\u043A\u043B\u043E\u043D\u0430 \u0438 \u043E\u0431\u0440\u0430\u0437\u0443\u044E\u0442 \u043E\u0442\u0434\u0435\u043B\u044C\u043D\u044B\u0435 \u043E\u0431\u0440\u0443\u0447\u0438. \u042D\u0442\u043E \u0434\u043E\u0432\u043E\u043B\u044C\u043D\u043E \u0445\u043E\u0440\u043E\u0448\u043E \u043F\u0440\u0438\u0431\u043B\u0438\u0436\u0430\u0435\u0442 \u0441\u043F\u0438\u0440\u0430\u043B\u044C, \u043F\u043E\u0434\u0434\u0435\u0440\u0436\u0438\u0432\u0430\u044F \u0438\u0441\u043F\u043E\u043B\u044C\u0437\u043E\u0432\u0430\u043D\u0438\u0435 \u0441\u0438\u043C\u043C\u0435\u0442\u0440\u0438\u0438. \u0412\u0445\u043E\u0434\u043D\u043E\u0439 \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440 "partitioning" \u043C\u043E\u0436\u0435\u0442 \u0438\u0441\u043F\u043E\u043B\u044C\u0437\u043E\u0432\u0430\u0442\u044C\u0441\u044F \u0434\u043B\u044F \u043E\u0441\u043D\u0430\u0449\u0435\u043D\u0438\u044F \u043E\u0431\u0440\u0443\u0447\u0435\u0439 \u043F\u043E\u0432\u0435\u0440\u0445\u043D\u043E\u0441\u0442\u044C\u044E \u0440\u0430\u0437\u0434\u0435\u043B\u0430.\n\n \u0414\u043B\u044F \u043F\u043E\u043B\u0443\u0447\u0435\u043D\u0438\u044F \u0434\u043E\u043F\u043E\u043B\u043D\u0438\u0442\u0435\u043B\u044C\u043D\u043E\u0439 \u0438\u043D\u0444\u043E\u0440\u043C\u0430\u0446\u0438\u0438, \u043F\u043E\u0436\u0430\u043B\u0443\u0439\u0441\u0442\u0430, \u043F\u0440\u043E\u0432\u0435\u0440\u044C\u0442\u0435 \u0434\u043E\u043A\u0443\u043C\u0435\u043D\u0442\u0430\u0446\u0438\u044E \u043D\u0430 "Single Conductor Coil \u2013 Generic" \u0447\u0430\u0441\u0442\u044C \u0433\u0435\u043E\u043C\u0435\u0442\u0440\u0438\u0438.
partdescr_acdc/sc_hor_cc_open_helix = Single Conductor Coil \u2013 Horizontal Ribbon, Cylindrical, Open Helix\n\n\u042D\u0442\u043E \u043F\u0440\u043E\u0438\u0437\u0432\u043E\u0434\u043D\u0430\u044F \u043E\u0442 \u0447\u0430\u0441\u0442\u0438 \u0433\u0435\u043E\u043C\u0435\u0442\u0440\u0438\u0438 "Single Conductor Coil \u2013 Generic", \u0433\u0434\u0435:\n\n\u2022 \u0422\u0438\u043F \u043F\u0440\u043E\u0432\u043E\u0434\u0430 \u0431\u044B\u043B \u043E\u0433\u0440\u0430\u043D\u0438\u0447\u0435\u043D "horizontal ribbon"; \u0448\u0438\u0440\u0438\u043D\u0430 \u043B\u0435\u043D\u0442\u044B \u043C\u043E\u0436\u0435\u0442 \u0431\u044B\u0442\u044C \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u043B\u0435\u043D\u0430 \u0441 \u043F\u043E\u043C\u043E\u0449\u044C\u044E \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440\u0430 \u0432\u0432\u043E\u0434\u0430 "ribbon_width"\n\u2022 \u0422\u0438\u043F \u044F\u0434\u0440\u0430 \u043E\u0433\u0440\u0430\u043D\u0438\u0447\u0435\u043D "cylindrical" (\u0438\u043B\u0438 \u043A\u0440\u0443\u0433\u043E\u0432\u043E\u0439); \u0434\u0438\u0430\u043C\u0435\u0442\u0440 \u043C\u043E\u0436\u0435\u0442 \u0431\u044B\u0442\u044C \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u043B\u0435\u043D \u0441 \u043F\u043E\u043C\u043E\u0449\u044C\u044E \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440\u0430 \u0432\u0432\u043E\u0434\u0430 "coil_diameter"\n\u2022 \u0422\u0438\u043F \u0441\u043E\u0435\u0434\u0438\u043D\u0435\u043D\u0438\u044F \u0431\u044B\u043B \u043E\u0433\u0440\u0430\u043D\u0438\u0447\u0435\u043D "open helix"; \u0447\u0438\u0441\u043B\u043E \u0432\u0438\u0442\u043A\u043E\u0432 \u043C\u043E\u0436\u0435\u0442 \u0431\u044B\u0442\u044C \u043D\u0435\u0446\u0435\u043B\u044B\u043C. \u0412\u0445\u043E\u0434\u043D\u0430\u044F \u043A\u043E\u0440\u043C\u043E\u0432\u0430\u044F \u043B\u0438\u043D\u0438\u044F \u043F\u0430\u0440\u0430\u043B\u043B\u0435\u043B\u044C\u043D\u0430 \u043F\u043B\u043E\u0441\u043A\u043E\u0441\u0442\u0438 xz, \u0430 \u0432\u044B\u0445\u043E\u0434\u043D\u0430\u044F \u043A\u043E\u0440\u043C\u043E\u0432\u0430\u044F \u043B\u0438\u043D\u0438\u044F \u0440\u0430\u0437\u043C\u0435\u0449\u0435\u043D\u0430 \u043F\u043E\u0434 \u0443\u0433\u043B\u043E\u043C \u0432 \u0437\u0430\u0432\u0438\u0441\u0438\u043C\u043E\u0441\u0442\u0438 \u043E\u0442 \u043A\u043E\u043B\u0438\u0447\u0435\u0441\u0442\u0432\u0430 \u043E\u0431\u043E\u0440\u043E\u0442\u043E\u0432.\n\n \u0414\u043B\u044F \u043F\u043E\u043B\u0443\u0447\u0435\u043D\u0438\u044F \u0434\u043E\u043F\u043E\u043B\u043D\u0438\u0442\u0435\u043B\u044C\u043D\u043E\u0439 \u0438\u043D\u0444\u043E\u0440\u043C\u0430\u0446\u0438\u0438, \u043F\u043E\u0436\u0430\u043B\u0443\u0439\u0441\u0442\u0430, \u043F\u0440\u043E\u0432\u0435\u0440\u044C\u0442\u0435 \u0434\u043E\u043A\u0443\u043C\u0435\u043D\u0442\u0430\u0446\u0438\u044E \u043D\u0430 "Single Conductor Coil \u2013 Generic" \u0447\u0430\u0441\u0442\u044C \u0433\u0435\u043E\u043C\u0435\u0442\u0440\u0438\u0438.
partdescr_acdc/sc_hor_rc_closed_corner = Single Conductor Coil \u2013 Horizontal Ribbon, Racetrack, Closed Corner\n\n\u042D\u0442\u043E \u043F\u0440\u043E\u0438\u0437\u0432\u043E\u0434\u043D\u0430\u044F \u043E\u0442 \u0447\u0430\u0441\u0442\u0438 \u0433\u0435\u043E\u043C\u0435\u0442\u0440\u0438\u0438 "Single Conductor Coil \u2013 Generic", \u0433\u0434\u0435:\n\n\u2022 \u0422\u0438\u043F \u043F\u0440\u043E\u0432\u043E\u0434\u0430 \u0431\u044B\u043B \u043E\u0433\u0440\u0430\u043D\u0438\u0447\u0435\u043D "horizontal ribbon"; \u0448\u0438\u0440\u0438\u043D\u0430 \u043B\u0435\u043D\u0442\u044B \u043C\u043E\u0436\u0435\u0442 \u0431\u044B\u0442\u044C \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u043B\u0435\u043D\u0430 \u0441 \u043F\u043E\u043C\u043E\u0449\u044C\u044E \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440\u0430 \u0432\u0432\u043E\u0434\u0430 "ribbon_width"\n\u2022 \u041E\u0441\u043D\u043E\u0432\u043D\u043E\u0439 \u0442\u0438\u043F \u0431\u044B\u043B \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u043B\u0435\u043D \u043D\u0430 "rectangular with fillet" (\u043F\u043E \u0443\u043C\u043E\u043B\u0447\u0430\u043D\u0438\u044E); \u0440\u0430\u0437\u043C\u0435\u0440\u044B \u043C\u043E\u0433\u0443\u0442 \u0431\u044B\u0442\u044C \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u043B\u0435\u043D\u044B \u0441 \u0438\u0441\u043F\u043E\u043B\u044C\u0437\u043E\u0432\u0430\u043D\u0438\u0435\u043C \u0432\u0445\u043E\u0434\u043D\u044B\u0445 \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440\u043E\u0432 "coil_width" \u0438 "coil_depth". \u0420\u0430\u0437\u043C\u0435\u0440 \u0444\u0438\u043B\u0435 \u043C\u043E\u0436\u043D\u043E \u0441\u043A\u043E\u0440\u0440\u0435\u043A\u0442\u0438\u0440\u043E\u0432\u0430\u0442\u044C \u0441 \u043F\u043E\u043C\u043E\u0449\u044C\u044E \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440\u0430 "coil_fillet". \u0420\u0430\u0434\u0438\u0443\u0441 \u0444\u0438\u043B\u0435 \u043A\u0430\u0442\u0443\u0448\u043A\u0438 \u0438\u043C\u0435\u0435\u0442 \u043D\u0438\u0436\u043D\u044E\u044E \u0433\u0440\u0430\u043D\u0438\u0446\u0443, \u043A\u043E\u0442\u043E\u0440\u0430\u044F \u0443\u0441\u0442\u0430\u043D\u0430\u0432\u043B\u0438\u0432\u0430\u0435\u0442\u0441\u044F \u043D\u0430 \u043F\u043E\u043B\u043E\u0432\u0438\u043D\u0443 \u0448\u0438\u0440\u0438\u043D\u044B \u043F\u043E\u043F\u0435\u0440\u0435\u0447\u043D\u043E\u0433\u043E \u0441\u0435\u0447\u0435\u043D\u0438\u044F \u043F\u0440\u043E\u0432\u043E\u0434\u0430.\n\u2022 \u0422\u0438\u043F \u0441\u043E\u0435\u0434\u0438\u043D\u0435\u043D\u0438\u044F \u0431\u044B\u043B \u043E\u0433\u0440\u0430\u043D\u0438\u0447\u0435\u043D "closed corner"; \u043E\u0431\u0440\u0430\u0442\u043D\u0430\u044F \u043F\u0435\u0442\u043B\u044F \u0431\u044B\u043B\u0430 \u043F\u043E\u043C\u0435\u0449\u0435\u043D\u0430 \u0432 \u0443\u0433\u043E\u043B (\u043F\u0440\u0438 \u0443\u0441\u043B\u043E\u0432\u0438\u0438 \u043F\u0440\u044F\u043C\u043E\u0443\u0433\u043E\u043B\u044C\u043D\u043E\u0439 \u0444\u043E\u0440\u043C\u044B \u044F\u0434\u0440\u0430) \u043F\u043E\u0434 \u0443\u0433\u043B\u043E\u043C 45 \u0433\u0440\u0430\u0434\u0443\u0441\u043E\u0432 \u043F\u043E \u043E\u0442\u043D\u043E\u0448\u0435\u043D\u0438\u044E \u043A \u043F\u043B\u043E\u0441\u043A\u043E\u0441\u0442\u0438 xz.\n\n \u0414\u043B\u044F \u043F\u043E\u043B\u0443\u0447\u0435\u043D\u0438\u044F \u0434\u043E\u043F\u043E\u043B\u043D\u0438\u0442\u0435\u043B\u044C\u043D\u043E\u0439 \u0438\u043D\u0444\u043E\u0440\u043C\u0430\u0446\u0438\u0438, \u043F\u043E\u0436\u0430\u043B\u0443\u0439\u0441\u0442\u0430, \u043F\u0440\u043E\u0432\u0435\u0440\u044C\u0442\u0435 \u0434\u043E\u043A\u0443\u043C\u0435\u043D\u0442\u0430\u0446\u0438\u044E \u043D\u0430 "Single Conductor Coil \u2013 Generic" \u0447\u0430\u0441\u0442\u044C \u0433\u0435\u043E\u043C\u0435\u0442\u0440\u0438\u0438.
partdescr_acdc/sc_hor_rc_open_corner = Single Conductor Coil \u2013 Horizontal Ribbon, Racetrack, Open Corner\n\n\u042D\u0442\u043E \u043F\u0440\u043E\u0438\u0437\u0432\u043E\u0434\u043D\u0430\u044F \u043E\u0442 \u0447\u0430\u0441\u0442\u0438 \u0433\u0435\u043E\u043C\u0435\u0442\u0440\u0438\u0438 "Single Conductor Coil \u2013 Generic", \u0433\u0434\u0435:\n\n\u2022 \u0422\u0438\u043F \u043F\u0440\u043E\u0432\u043E\u0434\u0430 \u0431\u044B\u043B \u043E\u0433\u0440\u0430\u043D\u0438\u0447\u0435\u043D "horizontal ribbon"; \u0448\u0438\u0440\u0438\u043D\u0430 \u043B\u0435\u043D\u0442\u044B \u043C\u043E\u0436\u0435\u0442 \u0431\u044B\u0442\u044C \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u043B\u0435\u043D\u0430 \u0441 \u043F\u043E\u043C\u043E\u0449\u044C\u044E \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440\u0430 \u0432\u0432\u043E\u0434\u0430 "ribbon_width"\n\u2022 \u041E\u0441\u043D\u043E\u0432\u043D\u043E\u0439 \u0442\u0438\u043F \u0431\u044B\u043B \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u043B\u0435\u043D \u043D\u0430 "rectangular with fillet" (\u043F\u043E \u0443\u043C\u043E\u043B\u0447\u0430\u043D\u0438\u044E); \u0440\u0430\u0437\u043C\u0435\u0440\u044B \u043C\u043E\u0433\u0443\u0442 \u0431\u044B\u0442\u044C \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u043B\u0435\u043D\u044B \u0441 \u0438\u0441\u043F\u043E\u043B\u044C\u0437\u043E\u0432\u0430\u043D\u0438\u0435\u043C \u0432\u0445\u043E\u0434\u043D\u044B\u0445 \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440\u043E\u0432 "coil_width" \u0438 "coil_depth". \u0420\u0430\u0437\u043C\u0435\u0440 \u0444\u0438\u043B\u0435 \u043C\u043E\u0436\u043D\u043E \u0441\u043A\u043E\u0440\u0440\u0435\u043A\u0442\u0438\u0440\u043E\u0432\u0430\u0442\u044C \u0441 \u043F\u043E\u043C\u043E\u0449\u044C\u044E \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440\u0430 "coil_fillet". \u0420\u0430\u0434\u0438\u0443\u0441 \u0444\u0438\u043B\u0435 \u043A\u0430\u0442\u0443\u0448\u043A\u0438 \u0438\u043C\u0435\u0435\u0442 \u043D\u0438\u0436\u043D\u044E\u044E \u0433\u0440\u0430\u043D\u0438\u0446\u0443, \u043A\u043E\u0442\u043E\u0440\u0430\u044F \u0443\u0441\u0442\u0430\u043D\u0430\u0432\u043B\u0438\u0432\u0430\u0435\u0442\u0441\u044F \u043D\u0430 \u043F\u043E\u043B\u043E\u0432\u0438\u043D\u0443 \u0448\u0438\u0440\u0438\u043D\u044B \u043F\u043E\u043F\u0435\u0440\u0435\u0447\u043D\u043E\u0433\u043E \u0441\u0435\u0447\u0435\u043D\u0438\u044F \u043F\u0440\u043E\u0432\u043E\u0434\u0430.\n\u2022 \u0422\u0438\u043F \u0441\u043E\u0435\u0434\u0438\u043D\u0435\u043D\u0438\u044F \u0431\u044B\u043B \u043E\u0433\u0440\u0430\u043D\u0438\u0447\u0435\u043D "open corner"; \u043B\u0438\u043D\u0438\u0438 \u043F\u043E\u0434\u0430\u0447\u0438 \u0431\u044B\u043B\u0438 \u0440\u0430\u0437\u043C\u0435\u0449\u0435\u043D\u044B \u0432 \u0443\u0433\u043B\u0443 (\u043F\u0440\u0438 \u0443\u0441\u043B\u043E\u0432\u0438\u0438 \u043F\u0440\u044F\u043C\u043E\u0443\u0433\u043E\u043B\u044C\u043D\u043E\u0439 \u0444\u043E\u0440\u043C\u044B \u044F\u0434\u0440\u0430) \u043F\u043E\u0434 \u0443\u0433\u043B\u043E\u043C 45 \u0433\u0440\u0430\u0434\u0443\u0441\u043E\u0432 \u043F\u043E \u043E\u0442\u043D\u043E\u0448\u0435\u043D\u0438\u044E \u043A \u043F\u043B\u043E\u0441\u043A\u043E\u0441\u0442\u0438 xz.\n\n \u0414\u043B\u044F \u043F\u043E\u043B\u0443\u0447\u0435\u043D\u0438\u044F \u0434\u043E\u043F\u043E\u043B\u043D\u0438\u0442\u0435\u043B\u044C\u043D\u043E\u0439 \u0438\u043D\u0444\u043E\u0440\u043C\u0430\u0446\u0438\u0438, \u043F\u043E\u0436\u0430\u043B\u0443\u0439\u0441\u0442\u0430, \u043F\u0440\u043E\u0432\u0435\u0440\u044C\u0442\u0435 \u0434\u043E\u043A\u0443\u043C\u0435\u043D\u0442\u0430\u0446\u0438\u044E \u043D\u0430 "Single Conductor Coil \u2013 Generic" \u0447\u0430\u0441\u0442\u044C \u0433\u0435\u043E\u043C\u0435\u0442\u0440\u0438\u0438.
partdescr_acdc/sc_hor_rc_closed_side = Single Conductor Coil \u2013 Horizontal Ribbon, Racetrack, Closed Side\n\n\u042D\u0442\u043E \u043F\u0440\u043E\u0438\u0437\u0432\u043E\u0434\u043D\u0430\u044F \u043E\u0442 \u0447\u0430\u0441\u0442\u0438 \u0433\u0435\u043E\u043C\u0435\u0442\u0440\u0438\u0438 "Single Conductor Coil \u2013 Generic", \u0433\u0434\u0435:\n\n\u2022 \u0422\u0438\u043F \u043F\u0440\u043E\u0432\u043E\u0434\u0430 \u0431\u044B\u043B \u043E\u0433\u0440\u0430\u043D\u0438\u0447\u0435\u043D "horizontal ribbon"; \u0448\u0438\u0440\u0438\u043D\u0430 \u043B\u0435\u043D\u0442\u044B \u043C\u043E\u0436\u0435\u0442 \u0431\u044B\u0442\u044C \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u043B\u0435\u043D\u0430 \u0441 \u043F\u043E\u043C\u043E\u0449\u044C\u044E \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440\u0430 \u0432\u0432\u043E\u0434\u0430 "ribbon_width"\n\u2022 \u041E\u0441\u043D\u043E\u0432\u043D\u043E\u0439 \u0442\u0438\u043F \u0431\u044B\u043B \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u043B\u0435\u043D \u043D\u0430 "rectangular with fillet" (\u043F\u043E \u0443\u043C\u043E\u043B\u0447\u0430\u043D\u0438\u044E); \u0440\u0430\u0437\u043C\u0435\u0440\u044B \u043C\u043E\u0433\u0443\u0442 \u0431\u044B\u0442\u044C \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u043B\u0435\u043D\u044B \u0441 \u0438\u0441\u043F\u043E\u043B\u044C\u0437\u043E\u0432\u0430\u043D\u0438\u0435\u043C \u0432\u0445\u043E\u0434\u043D\u044B\u0445 \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440\u043E\u0432 "coil_width" \u0438 "coil_depth". \u0420\u0430\u0437\u043C\u0435\u0440 \u0444\u0438\u043B\u0435 \u043C\u043E\u0436\u043D\u043E \u0441\u043A\u043E\u0440\u0440\u0435\u043A\u0442\u0438\u0440\u043E\u0432\u0430\u0442\u044C \u0441 \u043F\u043E\u043C\u043E\u0449\u044C\u044E \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440\u0430 "coil_fillet". \u0420\u0430\u0434\u0438\u0443\u0441 \u0444\u0438\u043B\u0435 \u043A\u0430\u0442\u0443\u0448\u043A\u0438 \u0438\u043C\u0435\u0435\u0442 \u043D\u0438\u0436\u043D\u044E\u044E \u0433\u0440\u0430\u043D\u0438\u0446\u0443, \u043A\u043E\u0442\u043E\u0440\u0430\u044F \u0443\u0441\u0442\u0430\u043D\u0430\u0432\u043B\u0438\u0432\u0430\u0435\u0442\u0441\u044F \u043D\u0430 \u043F\u043E\u043B\u043E\u0432\u0438\u043D\u0443 \u0448\u0438\u0440\u0438\u043D\u044B \u043F\u043E\u043F\u0435\u0440\u0435\u0447\u043D\u043E\u0433\u043E \u0441\u0435\u0447\u0435\u043D\u0438\u044F \u043F\u0440\u043E\u0432\u043E\u0434\u0430.\n\u2022 \u0422\u0438\u043F \u0441\u043E\u0435\u0434\u0438\u043D\u0435\u043D\u0438\u044F \u0431\u044B\u043B \u043E\u0433\u0440\u0430\u043D\u0438\u0447\u0435\u043D "closed side"; \u043E\u0431\u0440\u0430\u0442\u043D\u0430\u044F \u043F\u0435\u0442\u043B\u044F \u0431\u044B\u043B\u0430 \u0440\u0430\u0437\u043C\u0435\u0449\u0435\u043D\u0430 \u043D\u0430 \u0441\u0442\u043E\u0440\u043E\u043D\u0435, \u0441\u043E\u0432\u043F\u0430\u0434\u0430\u044E\u0449\u0435\u0439 \u0441 xz-plane.\n\n \u0414\u043B\u044F \u043F\u043E\u043B\u0443\u0447\u0435\u043D\u0438\u044F \u0434\u043E\u043F\u043E\u043B\u043D\u0438\u0442\u0435\u043B\u044C\u043D\u043E\u0439 \u0438\u043D\u0444\u043E\u0440\u043C\u0430\u0446\u0438\u0438, \u043F\u043E\u0436\u0430\u043B\u0443\u0439\u0441\u0442\u0430, \u043F\u0440\u043E\u0432\u0435\u0440\u044C\u0442\u0435 \u0434\u043E\u043A\u0443\u043C\u0435\u043D\u0442\u0430\u0446\u0438\u044E \u043D\u0430 "Single Conductor Coil \u2013 Generic" \u0447\u0430\u0441\u0442\u044C \u0433\u0435\u043E\u043C\u0435\u0442\u0440\u0438\u0438.
partdescr_acdc/sc_hor_rc_open_side = Single Conductor Coil \u2013 Horizontal Ribbon, Racetrack, Open Side\n\n\u042D\u0442\u043E \u043F\u0440\u043E\u0438\u0437\u0432\u043E\u0434\u043D\u0430\u044F \u043E\u0442 \u0447\u0430\u0441\u0442\u0438 \u0433\u0435\u043E\u043C\u0435\u0442\u0440\u0438\u0438 "Single Conductor Coil \u2013 Generic", \u0433\u0434\u0435:\n\n\u2022 \u0422\u0438\u043F \u043F\u0440\u043E\u0432\u043E\u0434\u0430 \u0431\u044B\u043B \u043E\u0433\u0440\u0430\u043D\u0438\u0447\u0435\u043D "horizontal ribbon"; \u0448\u0438\u0440\u0438\u043D\u0430 \u043B\u0435\u043D\u0442\u044B \u043C\u043E\u0436\u0435\u0442 \u0431\u044B\u0442\u044C \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u043B\u0435\u043D\u0430 \u0441 \u043F\u043E\u043C\u043E\u0449\u044C\u044E \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440\u0430 \u0432\u0432\u043E\u0434\u0430 "ribbon_width"\n\u2022 \u041E\u0441\u043D\u043E\u0432\u043D\u043E\u0439 \u0442\u0438\u043F \u0431\u044B\u043B \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u043B\u0435\u043D \u043D\u0430 "rectangular with fillet" (\u043F\u043E \u0443\u043C\u043E\u043B\u0447\u0430\u043D\u0438\u044E); \u0440\u0430\u0437\u043C\u0435\u0440\u044B \u043C\u043E\u0433\u0443\u0442 \u0431\u044B\u0442\u044C \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u043B\u0435\u043D\u044B \u0441 \u0438\u0441\u043F\u043E\u043B\u044C\u0437\u043E\u0432\u0430\u043D\u0438\u0435\u043C \u0432\u0445\u043E\u0434\u043D\u044B\u0445 \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440\u043E\u0432 "coil_width" \u0438 "coil_depth". \u0420\u0430\u0437\u043C\u0435\u0440 \u0444\u0438\u043B\u0435 \u043C\u043E\u0436\u043D\u043E \u0441\u043A\u043E\u0440\u0440\u0435\u043A\u0442\u0438\u0440\u043E\u0432\u0430\u0442\u044C \u0441 \u043F\u043E\u043C\u043E\u0449\u044C\u044E \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440\u0430 "coil_fillet". \u0420\u0430\u0434\u0438\u0443\u0441 \u0444\u0438\u043B\u0435 \u043A\u0430\u0442\u0443\u0448\u043A\u0438 \u0438\u043C\u0435\u0435\u0442 \u043D\u0438\u0436\u043D\u044E\u044E \u0433\u0440\u0430\u043D\u0438\u0446\u0443, \u043A\u043E\u0442\u043E\u0440\u0430\u044F \u0443\u0441\u0442\u0430\u043D\u0430\u0432\u043B\u0438\u0432\u0430\u0435\u0442\u0441\u044F \u043D\u0430 \u043F\u043E\u043B\u043E\u0432\u0438\u043D\u0443 \u0448\u0438\u0440\u0438\u043D\u044B \u043F\u043E\u043F\u0435\u0440\u0435\u0447\u043D\u043E\u0433\u043E \u0441\u0435\u0447\u0435\u043D\u0438\u044F \u043F\u0440\u043E\u0432\u043E\u0434\u0430.\n\u2022 \u0422\u0438\u043F \u0441\u043E\u0435\u0434\u0438\u043D\u0435\u043D\u0438\u044F \u0431\u044B\u043B \u043E\u0433\u0440\u0430\u043D\u0438\u0447\u0435\u043D "open side"; \u043B\u0438\u043D\u0438\u0438 \u043F\u043E\u0434\u0430\u0447\u0438 \u0431\u044B\u043B\u0438 \u0440\u0430\u0437\u043C\u0435\u0449\u0435\u043D\u044B \u043D\u0430 \u0441\u0442\u043E\u0440\u043E\u043D\u0435, \u0441\u043E\u0432\u043F\u0430\u0434\u0430\u044E\u0449\u0435\u0439 \u0441 xz-plane.\n\n \u0414\u043B\u044F \u043F\u043E\u043B\u0443\u0447\u0435\u043D\u0438\u044F \u0434\u043E\u043F\u043E\u043B\u043D\u0438\u0442\u0435\u043B\u044C\u043D\u043E\u0439 \u0438\u043D\u0444\u043E\u0440\u043C\u0430\u0446\u0438\u0438, \u043F\u043E\u0436\u0430\u043B\u0443\u0439\u0441\u0442\u0430, \u043F\u0440\u043E\u0432\u0435\u0440\u044C\u0442\u0435 \u0434\u043E\u043A\u0443\u043C\u0435\u043D\u0442\u0430\u0446\u0438\u044E \u043D\u0430 "Single Conductor Coil \u2013 Generic" \u0447\u0430\u0441\u0442\u044C \u0433\u0435\u043E\u043C\u0435\u0442\u0440\u0438\u0438.
partdescr_acdc/sc_hor_rc_closed_hoops = Single Conductor Coil \u2013 Horizontal Ribbon, Racetrack, Closed Hoops\n\n\u042D\u0442\u043E \u043F\u0440\u043E\u0438\u0437\u0432\u043E\u0434\u043D\u0430\u044F \u043E\u0442 \u0447\u0430\u0441\u0442\u0438 \u0433\u0435\u043E\u043C\u0435\u0442\u0440\u0438\u0438 "Single Conductor Coil \u2013 Generic", \u0433\u0434\u0435:\n\n\u2022 \u0422\u0438\u043F \u043F\u0440\u043E\u0432\u043E\u0434\u0430 \u0431\u044B\u043B \u043E\u0433\u0440\u0430\u043D\u0438\u0447\u0435\u043D "horizontal ribbon"; \u0448\u0438\u0440\u0438\u043D\u0430 \u043B\u0435\u043D\u0442\u044B \u043C\u043E\u0436\u0435\u0442 \u0431\u044B\u0442\u044C \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u043B\u0435\u043D\u0430 \u0441 \u043F\u043E\u043C\u043E\u0449\u044C\u044E \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440\u0430 \u0432\u0432\u043E\u0434\u0430 "ribbon_width"\n\u2022 \u041E\u0441\u043D\u043E\u0432\u043D\u043E\u0439 \u0442\u0438\u043F \u0431\u044B\u043B \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u043B\u0435\u043D \u043D\u0430 "rectangular with fillet" (\u043F\u043E \u0443\u043C\u043E\u043B\u0447\u0430\u043D\u0438\u044E); \u0440\u0430\u0437\u043C\u0435\u0440\u044B \u043C\u043E\u0433\u0443\u0442 \u0431\u044B\u0442\u044C \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u043B\u0435\u043D\u044B \u0441 \u0438\u0441\u043F\u043E\u043B\u044C\u0437\u043E\u0432\u0430\u043D\u0438\u0435\u043C \u0432\u0445\u043E\u0434\u043D\u044B\u0445 \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440\u043E\u0432 "coil_width" \u0438 "coil_depth". \u0420\u0430\u0437\u043C\u0435\u0440 \u0444\u0438\u043B\u0435 \u043C\u043E\u0436\u043D\u043E \u0441\u043A\u043E\u0440\u0440\u0435\u043A\u0442\u0438\u0440\u043E\u0432\u0430\u0442\u044C \u0441 \u043F\u043E\u043C\u043E\u0449\u044C\u044E \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440\u0430 "coil_fillet". \u0420\u0430\u0434\u0438\u0443\u0441 \u0444\u0438\u043B\u0435 \u043A\u0430\u0442\u0443\u0448\u043A\u0438 \u0438\u043C\u0435\u0435\u0442 \u043D\u0438\u0436\u043D\u044E\u044E \u0433\u0440\u0430\u043D\u0438\u0446\u0443, \u043A\u043E\u0442\u043E\u0440\u0430\u044F \u0443\u0441\u0442\u0430\u043D\u0430\u0432\u043B\u0438\u0432\u0430\u0435\u0442\u0441\u044F \u043D\u0430 \u043F\u043E\u043B\u043E\u0432\u0438\u043D\u0443 \u0448\u0438\u0440\u0438\u043D\u044B \u043F\u043E\u043F\u0435\u0440\u0435\u0447\u043D\u043E\u0433\u043E \u0441\u0435\u0447\u0435\u043D\u0438\u044F \u043F\u0440\u043E\u0432\u043E\u0434\u0430.\n\u2022 \u0422\u0438\u043F \u0441\u043E\u0435\u0434\u0438\u043D\u0435\u043D\u0438\u044F \u0431\u044B\u043B \u043E\u0433\u0440\u0430\u043D\u0438\u0447\u0435\u043D "closed hoops"; \u043F\u043E\u0432\u043E\u0440\u043E\u0442\u044B \u043D\u0435 \u0438\u043C\u0435\u044E\u0442 \u043D\u0430\u043A\u043B\u043E\u043D\u0430 \u0438 \u043E\u0431\u0440\u0430\u0437\u0443\u044E\u0442 \u043E\u0442\u0434\u0435\u043B\u044C\u043D\u044B\u0435 \u043E\u0431\u0440\u0443\u0447\u0438. \u042D\u0442\u043E \u0434\u043E\u0432\u043E\u043B\u044C\u043D\u043E \u0445\u043E\u0440\u043E\u0448\u043E \u043F\u0440\u0438\u0431\u043B\u0438\u0436\u0430\u0435\u0442 \u0441\u043F\u0438\u0440\u0430\u043B\u044C, \u043F\u043E\u0434\u0434\u0435\u0440\u0436\u0438\u0432\u0430\u044F \u0438\u0441\u043F\u043E\u043B\u044C\u0437\u043E\u0432\u0430\u043D\u0438\u0435 \u0441\u0438\u043C\u043C\u0435\u0442\u0440\u0438\u0438. \u0412\u0445\u043E\u0434\u043D\u043E\u0439 \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440 "partitioning" \u043C\u043E\u0436\u0435\u0442 \u0438\u0441\u043F\u043E\u043B\u044C\u0437\u043E\u0432\u0430\u0442\u044C\u0441\u044F \u0434\u043B\u044F \u043E\u0441\u043D\u0430\u0449\u0435\u043D\u0438\u044F \u043E\u0431\u0440\u0443\u0447\u0435\u0439 \u043F\u043E\u0432\u0435\u0440\u0445\u043D\u043E\u0441\u0442\u044C\u044E \u0440\u0430\u0437\u0434\u0435\u043B\u0430.\n\n \u0414\u043B\u044F \u043F\u043E\u043B\u0443\u0447\u0435\u043D\u0438\u044F \u0434\u043E\u043F\u043E\u043B\u043D\u0438\u0442\u0435\u043B\u044C\u043D\u043E\u0439 \u0438\u043D\u0444\u043E\u0440\u043C\u0430\u0446\u0438\u0438, \u043F\u043E\u0436\u0430\u043B\u0443\u0439\u0441\u0442\u0430, \u043F\u0440\u043E\u0432\u0435\u0440\u044C\u0442\u0435 \u0434\u043E\u043A\u0443\u043C\u0435\u043D\u0442\u0430\u0446\u0438\u044E \u043D\u0430 "Single Conductor Coil \u2013 Generic" \u0447\u0430\u0441\u0442\u044C \u0433\u0435\u043E\u043C\u0435\u0442\u0440\u0438\u0438.
partdescr_acdc/sc_ver_cc_closed_corner = Single Conductor Coil \u2013 Vertical Ribbon, Cylindrical, Closed Corner\n\n\u042D\u0442\u043E \u043F\u0440\u043E\u0438\u0437\u0432\u043E\u0434\u043D\u0430\u044F \u043E\u0442 \u0447\u0430\u0441\u0442\u0438 \u0433\u0435\u043E\u043C\u0435\u0442\u0440\u0438\u0438 "Single Conductor Coil \u2013 Generic", \u0433\u0434\u0435:\n\n\u2022 \u0422\u0438\u043F \u043F\u0440\u043E\u0432\u043E\u0434\u0430 \u0431\u044B\u043B \u043E\u0433\u0440\u0430\u043D\u0438\u0447\u0435\u043D "vertical ribbon"; \u0432\u044B\u0441\u043E\u0442\u0430 \u043B\u0435\u043D\u0442\u044B \u043C\u043E\u0436\u0435\u0442 \u0431\u044B\u0442\u044C \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u043B\u0435\u043D\u0430 \u0441 \u043F\u043E\u043C\u043E\u0449\u044C\u044E \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440\u0430 \u0432\u0432\u043E\u0434\u0430 "ribbon_height".\n\u2022 \u0422\u0438\u043F \u044F\u0434\u0440\u0430 \u043E\u0433\u0440\u0430\u043D\u0438\u0447\u0435\u043D "cylindrical" (\u0438\u043B\u0438 \u043A\u0440\u0443\u0433\u043E\u0432\u043E\u0439); \u0434\u0438\u0430\u043C\u0435\u0442\u0440 \u043C\u043E\u0436\u0435\u0442 \u0431\u044B\u0442\u044C \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u043B\u0435\u043D \u0441 \u043F\u043E\u043C\u043E\u0449\u044C\u044E \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440\u0430 \u0432\u0432\u043E\u0434\u0430 "coil_diameter"\n\u2022 \u0422\u0438\u043F \u0441\u043E\u0435\u0434\u0438\u043D\u0435\u043D\u0438\u044F \u0431\u044B\u043B \u043E\u0433\u0440\u0430\u043D\u0438\u0447\u0435\u043D "closed corner"; \u043E\u0431\u0440\u0430\u0442\u043D\u0430\u044F \u043F\u0435\u0442\u043B\u044F \u0431\u044B\u043B\u0430 \u043F\u043E\u043C\u0435\u0449\u0435\u043D\u0430 \u0432 \u0443\u0433\u043E\u043B (\u043F\u0440\u0438 \u0443\u0441\u043B\u043E\u0432\u0438\u0438 \u043F\u0440\u044F\u043C\u043E\u0443\u0433\u043E\u043B\u044C\u043D\u043E\u0439 \u0444\u043E\u0440\u043C\u044B \u044F\u0434\u0440\u0430) \u043F\u043E\u0434 \u0443\u0433\u043B\u043E\u043C 45 \u0433\u0440\u0430\u0434\u0443\u0441\u043E\u0432 \u043F\u043E \u043E\u0442\u043D\u043E\u0448\u0435\u043D\u0438\u044E \u043A \u043F\u043B\u043E\u0441\u043A\u043E\u0441\u0442\u0438 xz.\n\n \u0414\u043B\u044F \u043F\u043E\u043B\u0443\u0447\u0435\u043D\u0438\u044F \u0434\u043E\u043F\u043E\u043B\u043D\u0438\u0442\u0435\u043B\u044C\u043D\u043E\u0439 \u0438\u043D\u0444\u043E\u0440\u043C\u0430\u0446\u0438\u0438, \u043F\u043E\u0436\u0430\u043B\u0443\u0439\u0441\u0442\u0430, \u043F\u0440\u043E\u0432\u0435\u0440\u044C\u0442\u0435 \u0434\u043E\u043A\u0443\u043C\u0435\u043D\u0442\u0430\u0446\u0438\u044E \u043D\u0430 "Single Conductor Coil \u2013 Generic" \u0447\u0430\u0441\u0442\u044C \u0433\u0435\u043E\u043C\u0435\u0442\u0440\u0438\u0438.
partdescr_acdc/sc_ver_cc_open_corner = Single Conductor Coil \u2013 Vertical Ribbon, Cylindrical, Open Corner\n\n\u042D\u0442\u043E \u043F\u0440\u043E\u0438\u0437\u0432\u043E\u0434\u043D\u0430\u044F \u043E\u0442 \u0447\u0430\u0441\u0442\u0438 \u0433\u0435\u043E\u043C\u0435\u0442\u0440\u0438\u0438 "Single Conductor Coil \u2013 Generic", \u0433\u0434\u0435:\n\n\u2022 \u0422\u0438\u043F \u043F\u0440\u043E\u0432\u043E\u0434\u0430 \u0431\u044B\u043B \u043E\u0433\u0440\u0430\u043D\u0438\u0447\u0435\u043D "vertical ribbon"; \u0432\u044B\u0441\u043E\u0442\u0430 \u043B\u0435\u043D\u0442\u044B \u043C\u043E\u0436\u0435\u0442 \u0431\u044B\u0442\u044C \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u043B\u0435\u043D\u0430 \u0441 \u043F\u043E\u043C\u043E\u0449\u044C\u044E \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440\u0430 \u0432\u0432\u043E\u0434\u0430 "ribbon_height".\n\u2022 \u0422\u0438\u043F \u044F\u0434\u0440\u0430 \u043E\u0433\u0440\u0430\u043D\u0438\u0447\u0435\u043D "cylindrical" (\u0438\u043B\u0438 \u043A\u0440\u0443\u0433\u043E\u0432\u043E\u0439); \u0434\u0438\u0430\u043C\u0435\u0442\u0440 \u043C\u043E\u0436\u0435\u0442 \u0431\u044B\u0442\u044C \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u043B\u0435\u043D \u0441 \u043F\u043E\u043C\u043E\u0449\u044C\u044E \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440\u0430 \u0432\u0432\u043E\u0434\u0430 "coil_diameter"\n\u2022 \u0422\u0438\u043F \u0441\u043E\u0435\u0434\u0438\u043D\u0435\u043D\u0438\u044F \u0431\u044B\u043B \u043E\u0433\u0440\u0430\u043D\u0438\u0447\u0435\u043D "open corner"; \u043B\u0438\u043D\u0438\u0438 \u043F\u043E\u0434\u0430\u0447\u0438 \u0431\u044B\u043B\u0438 \u0440\u0430\u0437\u043C\u0435\u0449\u0435\u043D\u044B \u0432 \u0443\u0433\u043B\u0443 (\u043F\u0440\u0438 \u0443\u0441\u043B\u043E\u0432\u0438\u0438 \u043F\u0440\u044F\u043C\u043E\u0443\u0433\u043E\u043B\u044C\u043D\u043E\u0439 \u0444\u043E\u0440\u043C\u044B \u044F\u0434\u0440\u0430) \u043F\u043E\u0434 \u0443\u0433\u043B\u043E\u043C 45 \u0433\u0440\u0430\u0434\u0443\u0441\u043E\u0432 \u043F\u043E \u043E\u0442\u043D\u043E\u0448\u0435\u043D\u0438\u044E \u043A \u043F\u043B\u043E\u0441\u043A\u043E\u0441\u0442\u0438 xz.\n\n \u0414\u043B\u044F \u043F\u043E\u043B\u0443\u0447\u0435\u043D\u0438\u044F \u0434\u043E\u043F\u043E\u043B\u043D\u0438\u0442\u0435\u043B\u044C\u043D\u043E\u0439 \u0438\u043D\u0444\u043E\u0440\u043C\u0430\u0446\u0438\u0438, \u043F\u043E\u0436\u0430\u043B\u0443\u0439\u0441\u0442\u0430, \u043F\u0440\u043E\u0432\u0435\u0440\u044C\u0442\u0435 \u0434\u043E\u043A\u0443\u043C\u0435\u043D\u0442\u0430\u0446\u0438\u044E \u043D\u0430 "Single Conductor Coil \u2013 Generic" \u0447\u0430\u0441\u0442\u044C \u0433\u0435\u043E\u043C\u0435\u0442\u0440\u0438\u0438.
partdescr_acdc/sc_ver_cc_closed_hoops = Single Conductor Coil \u2013 Vertical Ribbon, Cylindrical, Closed Hoops\n\n\u042D\u0442\u043E \u043F\u0440\u043E\u0438\u0437\u0432\u043E\u0434\u043D\u0430\u044F \u043E\u0442 \u0447\u0430\u0441\u0442\u0438 \u0433\u0435\u043E\u043C\u0435\u0442\u0440\u0438\u0438 "Single Conductor Coil \u2013 Generic", \u0433\u0434\u0435:\n\n\u2022 \u0422\u0438\u043F \u043F\u0440\u043E\u0432\u043E\u0434\u0430 \u0431\u044B\u043B \u043E\u0433\u0440\u0430\u043D\u0438\u0447\u0435\u043D "vertical ribbon"; \u0432\u044B\u0441\u043E\u0442\u0430 \u043B\u0435\u043D\u0442\u044B \u043C\u043E\u0436\u0435\u0442 \u0431\u044B\u0442\u044C \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u043B\u0435\u043D\u0430 \u0441 \u043F\u043E\u043C\u043E\u0449\u044C\u044E \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440\u0430 \u0432\u0432\u043E\u0434\u0430 "ribbon_height".\n\u2022 \u0422\u0438\u043F \u044F\u0434\u0440\u0430 \u043E\u0433\u0440\u0430\u043D\u0438\u0447\u0435\u043D "cylindrical" (\u0438\u043B\u0438 \u043A\u0440\u0443\u0433\u043E\u0432\u043E\u0439); \u0434\u0438\u0430\u043C\u0435\u0442\u0440 \u043C\u043E\u0436\u0435\u0442 \u0431\u044B\u0442\u044C \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u043B\u0435\u043D \u0441 \u043F\u043E\u043C\u043E\u0449\u044C\u044E \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440\u0430 \u0432\u0432\u043E\u0434\u0430 "coil_diameter"\n\u2022 \u0422\u0438\u043F \u0441\u043E\u0435\u0434\u0438\u043D\u0435\u043D\u0438\u044F \u0431\u044B\u043B \u043E\u0433\u0440\u0430\u043D\u0438\u0447\u0435\u043D "closed hoops"; \u043F\u043E\u0432\u043E\u0440\u043E\u0442\u044B \u043D\u0435 \u0438\u043C\u0435\u044E\u0442 \u043D\u0430\u043A\u043B\u043E\u043D\u0430 \u0438 \u043E\u0431\u0440\u0430\u0437\u0443\u044E\u0442 \u043E\u0442\u0434\u0435\u043B\u044C\u043D\u044B\u0435 \u043E\u0431\u0440\u0443\u0447\u0438. \u042D\u0442\u043E \u0434\u043E\u0432\u043E\u043B\u044C\u043D\u043E \u0445\u043E\u0440\u043E\u0448\u043E \u043F\u0440\u0438\u0431\u043B\u0438\u0436\u0430\u0435\u0442 \u0441\u043F\u0438\u0440\u0430\u043B\u044C, \u043F\u043E\u0434\u0434\u0435\u0440\u0436\u0438\u0432\u0430\u044F \u0438\u0441\u043F\u043E\u043B\u044C\u0437\u043E\u0432\u0430\u043D\u0438\u0435 \u0441\u0438\u043C\u043C\u0435\u0442\u0440\u0438\u0438. \u0412\u0445\u043E\u0434\u043D\u043E\u0439 \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440 "partitioning" \u043C\u043E\u0436\u0435\u0442 \u0438\u0441\u043F\u043E\u043B\u044C\u0437\u043E\u0432\u0430\u0442\u044C\u0441\u044F \u0434\u043B\u044F \u043E\u0441\u043D\u0430\u0449\u0435\u043D\u0438\u044F \u043E\u0431\u0440\u0443\u0447\u0435\u0439 \u043F\u043E\u0432\u0435\u0440\u0445\u043D\u043E\u0441\u0442\u044C\u044E \u0440\u0430\u0437\u0434\u0435\u043B\u0430.\n\n \u0414\u043B\u044F \u043F\u043E\u043B\u0443\u0447\u0435\u043D\u0438\u044F \u0434\u043E\u043F\u043E\u043B\u043D\u0438\u0442\u0435\u043B\u044C\u043D\u043E\u0439 \u0438\u043D\u0444\u043E\u0440\u043C\u0430\u0446\u0438\u0438, \u043F\u043E\u0436\u0430\u043B\u0443\u0439\u0441\u0442\u0430, \u043F\u0440\u043E\u0432\u0435\u0440\u044C\u0442\u0435 \u0434\u043E\u043A\u0443\u043C\u0435\u043D\u0442\u0430\u0446\u0438\u044E \u043D\u0430 "Single Conductor Coil \u2013 Generic" \u0447\u0430\u0441\u0442\u044C \u0433\u0435\u043E\u043C\u0435\u0442\u0440\u0438\u0438.
partdescr_acdc/sc_ver_cc_open_helix = Single Conductor Coil \u2013 Vertical Ribbon, Cylindrical, Open Helix\n\n\u042D\u0442\u043E \u043F\u0440\u043E\u0438\u0437\u0432\u043E\u0434\u043D\u0430\u044F \u043E\u0442 \u0447\u0430\u0441\u0442\u0438 \u0433\u0435\u043E\u043C\u0435\u0442\u0440\u0438\u0438 "Single Conductor Coil \u2013 Generic", \u0433\u0434\u0435:\n\n\u2022 \u0422\u0438\u043F \u043F\u0440\u043E\u0432\u043E\u0434\u0430 \u0431\u044B\u043B \u043E\u0433\u0440\u0430\u043D\u0438\u0447\u0435\u043D "vertical ribbon"; \u0432\u044B\u0441\u043E\u0442\u0430 \u043B\u0435\u043D\u0442\u044B \u043C\u043E\u0436\u0435\u0442 \u0431\u044B\u0442\u044C \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u043B\u0435\u043D\u0430 \u0441 \u043F\u043E\u043C\u043E\u0449\u044C\u044E \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440\u0430 \u0432\u0432\u043E\u0434\u0430 "ribbon_height".\n\u2022 \u0422\u0438\u043F \u044F\u0434\u0440\u0430 \u043E\u0433\u0440\u0430\u043D\u0438\u0447\u0435\u043D "cylindrical" (\u0438\u043B\u0438 \u043A\u0440\u0443\u0433\u043E\u0432\u043E\u0439); \u0434\u0438\u0430\u043C\u0435\u0442\u0440 \u043C\u043E\u0436\u0435\u0442 \u0431\u044B\u0442\u044C \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u043B\u0435\u043D \u0441 \u043F\u043E\u043C\u043E\u0449\u044C\u044E \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440\u0430 \u0432\u0432\u043E\u0434\u0430 "coil_diameter"\n\u2022 \u0422\u0438\u043F \u0441\u043E\u0435\u0434\u0438\u043D\u0435\u043D\u0438\u044F \u0431\u044B\u043B \u043E\u0433\u0440\u0430\u043D\u0438\u0447\u0435\u043D "open helix"; \u0447\u0438\u0441\u043B\u043E \u0432\u0438\u0442\u043A\u043E\u0432 \u043C\u043E\u0436\u0435\u0442 \u0431\u044B\u0442\u044C \u043D\u0435\u0446\u0435\u043B\u044B\u043C. \u0412\u0445\u043E\u0434\u043D\u0430\u044F \u043A\u043E\u0440\u043C\u043E\u0432\u0430\u044F \u043B\u0438\u043D\u0438\u044F \u043F\u0430\u0440\u0430\u043B\u043B\u0435\u043B\u044C\u043D\u0430 \u043F\u043B\u043E\u0441\u043A\u043E\u0441\u0442\u0438 xz, \u0430 \u0432\u044B\u0445\u043E\u0434\u043D\u0430\u044F \u043A\u043E\u0440\u043C\u043E\u0432\u0430\u044F \u043B\u0438\u043D\u0438\u044F \u0440\u0430\u0437\u043C\u0435\u0449\u0435\u043D\u0430 \u043F\u043E\u0434 \u0443\u0433\u043B\u043E\u043C \u0432 \u0437\u0430\u0432\u0438\u0441\u0438\u043C\u043E\u0441\u0442\u0438 \u043E\u0442 \u043A\u043E\u043B\u0438\u0447\u0435\u0441\u0442\u0432\u0430 \u043E\u0431\u043E\u0440\u043E\u0442\u043E\u0432.\n\n \u0414\u043B\u044F \u043F\u043E\u043B\u0443\u0447\u0435\u043D\u0438\u044F \u0434\u043E\u043F\u043E\u043B\u043D\u0438\u0442\u0435\u043B\u044C\u043D\u043E\u0439 \u0438\u043D\u0444\u043E\u0440\u043C\u0430\u0446\u0438\u0438, \u043F\u043E\u0436\u0430\u043B\u0443\u0439\u0441\u0442\u0430, \u043F\u0440\u043E\u0432\u0435\u0440\u044C\u0442\u0435 \u0434\u043E\u043A\u0443\u043C\u0435\u043D\u0442\u0430\u0446\u0438\u044E \u043D\u0430 "Single Conductor Coil \u2013 Generic" \u0447\u0430\u0441\u0442\u044C \u0433\u0435\u043E\u043C\u0435\u0442\u0440\u0438\u0438.
partdescr_acdc/sc_ver_rc_closed_corner = Single Conductor Coil \u2013 Vertical Ribbon, Racetrack, Closed Corner\n\n\u042D\u0442\u043E \u043F\u0440\u043E\u0438\u0437\u0432\u043E\u0434\u043D\u0430\u044F \u043E\u0442 \u0447\u0430\u0441\u0442\u0438 \u0433\u0435\u043E\u043C\u0435\u0442\u0440\u0438\u0438 "Single Conductor Coil \u2013 Generic", \u0433\u0434\u0435:\n\n\u2022 \u0422\u0438\u043F \u043F\u0440\u043E\u0432\u043E\u0434\u0430 \u0431\u044B\u043B \u043E\u0433\u0440\u0430\u043D\u0438\u0447\u0435\u043D "vertical ribbon"; \u0432\u044B\u0441\u043E\u0442\u0430 \u043B\u0435\u043D\u0442\u044B \u043C\u043E\u0436\u0435\u0442 \u0431\u044B\u0442\u044C \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u043B\u0435\u043D\u0430 \u0441 \u043F\u043E\u043C\u043E\u0449\u044C\u044E \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440\u0430 \u0432\u0432\u043E\u0434\u0430 "ribbon_height".\n\u2022 \u041E\u0441\u043D\u043E\u0432\u043D\u043E\u0439 \u0442\u0438\u043F \u0431\u044B\u043B \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u043B\u0435\u043D \u043D\u0430 "rectangular with fillet" (\u043F\u043E \u0443\u043C\u043E\u043B\u0447\u0430\u043D\u0438\u044E); \u0440\u0430\u0437\u043C\u0435\u0440\u044B \u043C\u043E\u0433\u0443\u0442 \u0431\u044B\u0442\u044C \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u043B\u0435\u043D\u044B \u0441 \u0438\u0441\u043F\u043E\u043B\u044C\u0437\u043E\u0432\u0430\u043D\u0438\u0435\u043C \u0432\u0445\u043E\u0434\u043D\u044B\u0445 \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440\u043E\u0432 "coil_width" \u0438 "coil_depth". \u0420\u0430\u0437\u043C\u0435\u0440 \u0444\u0438\u043B\u0435 \u043C\u043E\u0436\u043D\u043E \u0441\u043A\u043E\u0440\u0440\u0435\u043A\u0442\u0438\u0440\u043E\u0432\u0430\u0442\u044C \u0441 \u043F\u043E\u043C\u043E\u0449\u044C\u044E \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440\u0430 "coil_fillet". \u0420\u0430\u0434\u0438\u0443\u0441 \u0444\u0438\u043B\u0435 \u043A\u0430\u0442\u0443\u0448\u043A\u0438 \u0438\u043C\u0435\u0435\u0442 \u043D\u0438\u0436\u043D\u044E\u044E \u0433\u0440\u0430\u043D\u0438\u0446\u0443, \u043A\u043E\u0442\u043E\u0440\u0430\u044F \u0443\u0441\u0442\u0430\u043D\u0430\u0432\u043B\u0438\u0432\u0430\u0435\u0442\u0441\u044F \u043D\u0430 \u043F\u043E\u043B\u043E\u0432\u0438\u043D\u0443 \u0448\u0438\u0440\u0438\u043D\u044B \u043F\u043E\u043F\u0435\u0440\u0435\u0447\u043D\u043E\u0433\u043E \u0441\u0435\u0447\u0435\u043D\u0438\u044F \u043F\u0440\u043E\u0432\u043E\u0434\u0430.\n\u2022 \u0422\u0438\u043F \u0441\u043E\u0435\u0434\u0438\u043D\u0435\u043D\u0438\u044F \u0431\u044B\u043B \u043E\u0433\u0440\u0430\u043D\u0438\u0447\u0435\u043D "closed corner"; \u043E\u0431\u0440\u0430\u0442\u043D\u0430\u044F \u043F\u0435\u0442\u043B\u044F \u0431\u044B\u043B\u0430 \u043F\u043E\u043C\u0435\u0449\u0435\u043D\u0430 \u0432 \u0443\u0433\u043E\u043B (\u043F\u0440\u0438 \u0443\u0441\u043B\u043E\u0432\u0438\u0438 \u043F\u0440\u044F\u043C\u043E\u0443\u0433\u043E\u043B\u044C\u043D\u043E\u0439 \u0444\u043E\u0440\u043C\u044B \u044F\u0434\u0440\u0430) \u043F\u043E\u0434 \u0443\u0433\u043B\u043E\u043C 45 \u0433\u0440\u0430\u0434\u0443\u0441\u043E\u0432 \u043F\u043E \u043E\u0442\u043D\u043E\u0448\u0435\u043D\u0438\u044E \u043A \u043F\u043B\u043E\u0441\u043A\u043E\u0441\u0442\u0438 xz.\n\n \u0414\u043B\u044F \u043F\u043E\u043B\u0443\u0447\u0435\u043D\u0438\u044F \u0434\u043E\u043F\u043E\u043B\u043D\u0438\u0442\u0435\u043B\u044C\u043D\u043E\u0439 \u0438\u043D\u0444\u043E\u0440\u043C\u0430\u0446\u0438\u0438, \u043F\u043E\u0436\u0430\u043B\u0443\u0439\u0441\u0442\u0430, \u043F\u0440\u043E\u0432\u0435\u0440\u044C\u0442\u0435 \u0434\u043E\u043A\u0443\u043C\u0435\u043D\u0442\u0430\u0446\u0438\u044E \u043D\u0430 "Single Conductor Coil \u2013 Generic" \u0447\u0430\u0441\u0442\u044C \u0433\u0435\u043E\u043C\u0435\u0442\u0440\u0438\u0438.
partdescr_acdc/sc_ver_rc_open_corner = Single Conductor Coil \u2013 Vertical Ribbon, Racetrack, Open Corner\n\n\u042D\u0442\u043E \u043F\u0440\u043E\u0438\u0437\u0432\u043E\u0434\u043D\u0430\u044F \u043E\u0442 \u0447\u0430\u0441\u0442\u0438 \u0433\u0435\u043E\u043C\u0435\u0442\u0440\u0438\u0438 "Single Conductor Coil \u2013 Generic", \u0433\u0434\u0435:\n\n\u2022 \u0422\u0438\u043F \u043F\u0440\u043E\u0432\u043E\u0434\u0430 \u0431\u044B\u043B \u043E\u0433\u0440\u0430\u043D\u0438\u0447\u0435\u043D "vertical ribbon"; \u0432\u044B\u0441\u043E\u0442\u0430 \u043B\u0435\u043D\u0442\u044B \u043C\u043E\u0436\u0435\u0442 \u0431\u044B\u0442\u044C \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u043B\u0435\u043D\u0430 \u0441 \u043F\u043E\u043C\u043E\u0449\u044C\u044E \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440\u0430 \u0432\u0432\u043E\u0434\u0430 "ribbon_height".\n\u2022 \u041E\u0441\u043D\u043E\u0432\u043D\u043E\u0439 \u0442\u0438\u043F \u0431\u044B\u043B \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u043B\u0435\u043D \u043D\u0430 "rectangular with fillet" (\u043F\u043E \u0443\u043C\u043E\u043B\u0447\u0430\u043D\u0438\u044E); \u0440\u0430\u0437\u043C\u0435\u0440\u044B \u043C\u043E\u0433\u0443\u0442 \u0431\u044B\u0442\u044C \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u043B\u0435\u043D\u044B \u0441 \u0438\u0441\u043F\u043E\u043B\u044C\u0437\u043E\u0432\u0430\u043D\u0438\u0435\u043C \u0432\u0445\u043E\u0434\u043D\u044B\u0445 \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440\u043E\u0432 "coil_width" \u0438 "coil_depth". \u0420\u0430\u0437\u043C\u0435\u0440 \u0444\u0438\u043B\u0435 \u043C\u043E\u0436\u043D\u043E \u0441\u043A\u043E\u0440\u0440\u0435\u043A\u0442\u0438\u0440\u043E\u0432\u0430\u0442\u044C \u0441 \u043F\u043E\u043C\u043E\u0449\u044C\u044E \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440\u0430 "coil_fillet". \u0420\u0430\u0434\u0438\u0443\u0441 \u0444\u0438\u043B\u0435 \u043A\u0430\u0442\u0443\u0448\u043A\u0438 \u0438\u043C\u0435\u0435\u0442 \u043D\u0438\u0436\u043D\u044E\u044E \u0433\u0440\u0430\u043D\u0438\u0446\u0443, \u043A\u043E\u0442\u043E\u0440\u0430\u044F \u0443\u0441\u0442\u0430\u043D\u0430\u0432\u043B\u0438\u0432\u0430\u0435\u0442\u0441\u044F \u043D\u0430 \u043F\u043E\u043B\u043E\u0432\u0438\u043D\u0443 \u0448\u0438\u0440\u0438\u043D\u044B \u043F\u043E\u043F\u0435\u0440\u0435\u0447\u043D\u043E\u0433\u043E \u0441\u0435\u0447\u0435\u043D\u0438\u044F \u043F\u0440\u043E\u0432\u043E\u0434\u0430.\n\u2022 \u0422\u0438\u043F \u0441\u043E\u0435\u0434\u0438\u043D\u0435\u043D\u0438\u044F \u0431\u044B\u043B \u043E\u0433\u0440\u0430\u043D\u0438\u0447\u0435\u043D "open corner"; \u043B\u0438\u043D\u0438\u0438 \u043F\u043E\u0434\u0430\u0447\u0438 \u0431\u044B\u043B\u0438 \u0440\u0430\u0437\u043C\u0435\u0449\u0435\u043D\u044B \u0432 \u0443\u0433\u043B\u0443 (\u043F\u0440\u0438 \u0443\u0441\u043B\u043E\u0432\u0438\u0438 \u043F\u0440\u044F\u043C\u043E\u0443\u0433\u043E\u043B\u044C\u043D\u043E\u0439 \u0444\u043E\u0440\u043C\u044B \u044F\u0434\u0440\u0430) \u043F\u043E\u0434 \u0443\u0433\u043B\u043E\u043C 45 \u0433\u0440\u0430\u0434\u0443\u0441\u043E\u0432 \u043F\u043E \u043E\u0442\u043D\u043E\u0448\u0435\u043D\u0438\u044E \u043A \u043F\u043B\u043E\u0441\u043A\u043E\u0441\u0442\u0438 xz.\n\n \u0414\u043B\u044F \u043F\u043E\u043B\u0443\u0447\u0435\u043D\u0438\u044F \u0434\u043E\u043F\u043E\u043B\u043D\u0438\u0442\u0435\u043B\u044C\u043D\u043E\u0439 \u0438\u043D\u0444\u043E\u0440\u043C\u0430\u0446\u0438\u0438, \u043F\u043E\u0436\u0430\u043B\u0443\u0439\u0441\u0442\u0430, \u043F\u0440\u043E\u0432\u0435\u0440\u044C\u0442\u0435 \u0434\u043E\u043A\u0443\u043C\u0435\u043D\u0442\u0430\u0446\u0438\u044E \u043D\u0430 "Single Conductor Coil \u2013 Generic" \u0447\u0430\u0441\u0442\u044C \u0433\u0435\u043E\u043C\u0435\u0442\u0440\u0438\u0438.
