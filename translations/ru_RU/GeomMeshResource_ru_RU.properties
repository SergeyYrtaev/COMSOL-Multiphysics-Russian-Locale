partdescr_roptics/aspheric_even_lens_3d = Aspheric Even Lens 3D\n\nAspheric \u043E\u0431\u044A\u0435\u043A\u0442\u0438\u0432 \u0441 \u0432\u043E\u0433\u043D\u0443\u0442\u044B\u043C\u0438 \u0438\u043B\u0438 \u0432\u044B\u043F\u0443\u043A\u043B\u044B\u043C\u0438 \u043F\u043E\u0432\u0435\u0440\u0445\u043D\u043E\u0441\u0442\u044F\u043C\u0438. \u041F\u043E\u0432\u0435\u0440\u0445\u043D\u043E\u0441\u0442\u043D\u043E\u0435 \u043F\u0440\u043E\u0432\u0438\u0441\u0430\u043D\u0438\u0435 \u043E\u043F\u0440\u0435\u0434\u0435\u043B\u044F\u0435\u0442\u0441\u044F \u043A\u043E\u043D\u0438\u0447\u0435\u0441\u043A\u0438\u043C \u043F\u043B\u044E\u0441 \u043C\u043D\u043E\u0433\u043E\u0447\u043B\u0435\u043D\u043E\u043C, \u043E\u043F\u0440\u0435\u0434\u0435\u043B\u044F\u0435\u043C\u044B\u043C \u0441\u0443\u043C\u043C\u043E\u0439 \u043F\u0435\u0440\u0432\u044B\u0445 11 \u0447\u0435\u0442\u043D\u044B\u0445 \u0442\u0435\u0440\u043C\u0438\u043D\u043E\u0432. \u0421\u043B\u0435\u0434\u0443\u0435\u0442 \u0443\u043A\u0430\u0437\u0430\u0442\u044C \u0435\u0434\u0438\u043D\u0438\u0446\u0443 \u043D\u043E\u0440\u043C\u0430\u043B\u0438\u0437\u0430\u0446\u0438\u0438 \u0430\u0441\u0444\u0435\u0440\u0438\u0447\u0435\u0441\u043A\u0438\u0445 \u043A\u043E\u044D\u0444\u0444\u0438\u0446\u0438\u0435\u043D\u0442\u043E\u0432. \u0414\u0438\u0430\u043C\u0435\u0442\u0440\u044B \u0430\u0441\u0444\u0435\u0440\u0438\u0447\u0435\u0441\u043A\u043E\u0439 \u043F\u043E\u0432\u0435\u0440\u0445\u043D\u043E\u0441\u0442\u0438 \u043C\u043E\u0433\u0443\u0442 \u0431\u044B\u0442\u044C \u043C\u0435\u043D\u044C\u0448\u0435, \u0447\u0435\u043C \u0434\u0438\u0430\u043C\u0435\u0442\u0440 \u0432\u043D\u0435\u0448\u043D\u0435\u0439 \u043B\u0438\u043D\u0437\u044B. \u0422\u0430\u043A\u0436\u0435 \u043C\u043E\u0433\u0443\u0442 \u0431\u044B\u0442\u044C \u0443\u043A\u0430\u0437\u0430\u043D\u044B \u043F\u0440\u043E\u0437\u0440\u0430\u0447\u043D\u044B\u0435 \u043E\u0442\u0432\u0435\u0440\u0441\u0442\u0438\u044F, \u043A\u043E\u0442\u043E\u0440\u044B\u0435 \u043C\u0435\u043D\u044C\u0448\u0435 \u0434\u0438\u0430\u043C\u0435\u0442\u0440\u043E\u0432 \u043F\u043E\u0432\u0435\u0440\u0445\u043D\u043E\u0441\u0442\u0438.
partdescr_roptics/aspheric_even_mirror_3d = Aspheric Even Mirror 3D\n\nAspheric mirror \u0441 \u0432\u043E\u0433\u043D\u0443\u0442\u043E\u0439 \u0438\u043B\u0438 \u0432\u044B\u043F\u0443\u043A\u043B\u043E\u0439 \u043F\u043E\u0432\u0435\u0440\u0445\u043D\u043E\u0441\u0442\u044C\u044E. \u041F\u043E\u0432\u0435\u0440\u0445\u043D\u043E\u0441\u0442\u043D\u043E\u0435 \u043F\u0440\u043E\u0432\u0438\u0441\u0430\u043D\u0438\u0435 \u043E\u043F\u0440\u0435\u0434\u0435\u043B\u044F\u0435\u0442\u0441\u044F \u043A\u043E\u043D\u0438\u0447\u0435\u0441\u043A\u0438\u043C \u043F\u043B\u044E\u0441 \u043C\u043D\u043E\u0433\u043E\u0447\u043B\u0435\u043D\u043E\u043C, \u043E\u043F\u0440\u0435\u0434\u0435\u043B\u044F\u0435\u043C\u044B\u043C \u0441\u0443\u043C\u043C\u043E\u0439 \u043F\u0435\u0440\u0432\u044B\u0445 11 \u0447\u0435\u0442\u043D\u044B\u0445 \u0442\u0435\u0440\u043C\u0438\u043D\u043E\u0432. \u0421\u043B\u0435\u0434\u0443\u0435\u0442 \u0443\u043A\u0430\u0437\u0430\u0442\u044C \u0435\u0434\u0438\u043D\u0438\u0446\u0443 \u043D\u043E\u0440\u043C\u0430\u043B\u0438\u0437\u0430\u0446\u0438\u0438 \u0430\u0441\u0444\u0435\u0440\u0438\u0447\u0435\u0441\u043A\u0438\u0445 \u043A\u043E\u044D\u0444\u0444\u0438\u0446\u0438\u0435\u043D\u0442\u043E\u0432. \u0414\u0438\u0430\u043C\u0435\u0442\u0440 \u0430\u0441\u0444\u0435\u0440\u0438\u0447\u0435\u0441\u043A\u043E\u0439 \u043F\u043E\u0432\u0435\u0440\u0445\u043D\u043E\u0441\u0442\u0438 \u043C\u043E\u0436\u0435\u0442 \u0431\u044B\u0442\u044C \u043C\u0435\u043D\u044C\u0448\u0435, \u0447\u0435\u043C \u0434\u0438\u0430\u043C\u0435\u0442\u0440 \u043D\u0430\u0440\u0443\u0436\u043D\u043E\u0433\u043E \u0437\u0435\u0440\u043A\u0430\u043B\u0430. \u041C\u043E\u0436\u043D\u043E \u0443\u043A\u0430\u0437\u0430\u0442\u044C \u0447\u0435\u0442\u043A\u0443\u044E \u0430\u043F\u0435\u0440\u0442\u0443\u0440\u0443, \u043A\u043E\u0442\u043E\u0440\u0430\u044F \u043C\u0435\u043D\u044C\u0448\u0435 \u0434\u0438\u0430\u043C\u0435\u0442\u0440\u0430 \u043F\u043E\u0432\u0435\u04