partdescr_sme/HP_imperial_beam = American HP-beam (imperial)\n\n\u0410\u043C\u0435\u0440\u0438\u043A\u0430\u043D\u0441\u043A\u0438\u0435 \u043D\u0435\u0441\u0443\u0449\u0438\u0435 \u0441\u0432\u0430\u0438 \u0441 \u043F\u0430\u0440\u0430\u043B\u043B\u0435\u043B\u044C\u043D\u044B\u043C\u0438 \u0444\u043B\u0430\u043D\u0446\u0435\u0432\u044B\u043C\u0438 \u043F\u043E\u0432\u0435\u0440\u0445\u043D\u043E\u0441\u0442\u044F\u043C\u0438. \u041F\u0430\u0440\u0430\u043C\u0435\u0442\u0440\u044B \u043E\u0431\u043E\u0437\u043D\u0430\u0447\u0435\u043D\u0438\u044F, \u043E\u043F\u0440\u0435\u0434\u0435\u043B\u0435\u043D\u043D\u044B\u0435 \u0432 \u0441\u0438\u0441\u0442\u0435\u043C\u0435 \u0438\u043C\u043F\u0435\u0440\u0441\u043A\u0438\u0445 \u0435\u0434\u0438\u043D\u0438\u0446.\n\n \u041F\u0430\u0440\u0430\u043C\u0435\u0442\u0440\u044B \u0434\u0432\u0443\u0445 \u0440\u0430\u0437\u043C\u0435\u0440\u043E\u0432 \u043A\u043E\u043D\u0442\u0440\u043E\u043B\u0438\u0440\u0443\u044E\u0442 \u0432\u0441\u0435 \u0440\u0430\u0437\u043C\u0435\u0440\u044B \u0441\u0435\u043A\u0446\u0438\u0438. \u041D\u0430\u043F\u0440\u0438\u043C\u0435\u0440, \u0432\u0432\u043E\u0434 8 \u0438 36 \u0432 \u043A\u0430\u0447\u0435\u0441\u0442\u0432\u0435 \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440\u043E\u0432 \u0434\u0430\u0435\u0442 \u0441\u0442\u0430\u043D\u0434\u0430\u0440\u0442\u043D\u043E\u0435 \u043F\u043E\u043F\u0435\u0440\u0435\u0447\u043D\u043E\u0435 \u0441\u0435\u0447\u0435\u043D\u0438\u0435 \u043B\u0443\u0447\u0430 HP8x36.
