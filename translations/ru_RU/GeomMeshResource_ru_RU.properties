partdescr_acdc/sc_row_cc_closed_corner = Single Conductor Coil \u2013 Round Wire, Cylindrical, Closed Corner\n\n\u042D\u0442\u043E \u043F\u0440\u043E\u0438\u0437\u0432\u043E\u0434\u043D\u0430\u044F \u043E\u0442 \u0447\u0430\u0441\u0442\u0438 \u0433\u0435\u043E\u043C\u0435\u0442\u0440\u0438\u0438 "Single Conductor Coil \u2013 Generic", \u0433\u0434\u0435:\n\n\u2022 \u0422\u0438\u043F \u043F\u0440\u043E\u0432\u043E\u0434\u0430 \u0431\u044B\u043B \u043E\u0433\u0440\u0430\u043D\u0438\u0447\u0435\u043D "round wire"; \u0434\u0438\u0430\u043C\u0435\u0442\u0440 \u043C\u043E\u0436\u043D\u043E \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u0438\u0442\u044C \u0441 \u043F\u043E\u043C\u043E\u0449\u044C\u044E \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440\u0430 \u0432\u0432\u043E\u0434\u0430 "wire_diameter"\n\u2022 \u0422\u0438\u043F \u044F\u0434\u0440\u0430 \u043E\u0433\u0440\u0430\u043D\u0438\u0447\u0435\u043D "cylindrical" (\u0438\u043B\u0438 \u043A\u0440\u0443\u0433\u043E\u0432\u043E\u0439); \u0434\u0438\u0430\u043C\u0435\u0442\u0440 \u043C\u043E\u0436\u0435\u0442 \u0431\u044B\u0442\u044C \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u043B\u0435\u043D \u0441 \u043F\u043E\u043C\u043E\u0449\u044C\u044E \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440\u0430 \u0432\u0432\u043E\u0434\u0430 "coil_diameter"\n\u2022 \u0422\u0438\u043F \u0441\u043E\u0435\u0434\u0438\u043D\u0435\u043D\u0438\u044F \u0431\u044B\u043B \u043E\u0433\u0440\u0430\u043D\u0438\u0447\u0435\u043D "closed corner"; \u043E\u0431\u0440\u0430\u0442\u043D\u0430\u044F \u043F\u0435\u0442\u043B\u044F \u0431\u044B\u043B\u0430 \u043F\u043E\u043C\u0435\u0449\u0435\u043D\u0430 \u0432 \u0443\u0433\u043E\u043B (\u043F\u0440\u0438 \u0443\u0441\u043B\u043E\u0432\u0438\u0438 \u043F\u0440\u044F\u043C\u043E\u0443\u0433\u043E\u043B\u044C\u043D\u043E\u0439 \u0444\u043E\u0440\u043C\u044B \u044F\u0434\u0440\u0430) \u043F\u043E\u0434 \u0443\u0433\u043B\u043E\u043C 45 \u0433\u0440\u0430\u0434\u0443\u0441\u043E\u0432 \u043F\u043E \u043E\u0442\u043D\u043E\u0448\u0435\u043D\u0438\u044E \u043A \u043F\u043B\u043E\u0441\u043A\u043E\u0441\u0442\u0438 xz.\n\n \u0414\u043B\u044F \u043F\u043E\u043B\u0443\u0447\u0435\u043D\u0438\u044F \u0434\u043E\u043F\u043E\u043B\u043D\u0438\u0442\u0435\u043B\u044C\u043D\u043E\u0439 \u0438\u043D\u0444\u043E\u0440\u043C\u0430\u0446\u0438\u0438, \u043F\u043E\u0436\u0430\u043B\u0443\u0439\u0441\u0442\u0430, \u043F\u0440\u043E\u0432\u0435\u0440\u044C\u0442\u0435 \u0434\u043E\u043A\u0443\u043C\u0435\u043D\u0442\u0430\u0446\u0438\u044E \u043D\u0430 "Single Conductor Coil \u2013 Generic" \u0447\u0430\u0441\u0442\u044C \u0433\u0435\u043E\u043C\u0435\u0442\u0440\u0438\u0438.
partdescr_acdc/sc_row_cc_open_corner = Single Conductor Coil \u2013 Round Wire, Cylindrical, Open Corner\n\n\u042D\u0442\u043E \u043F\u0440\u043E\u0438\u0437\u0432\u043E\u0434\u043D\u0430\u044F \u043E\u0442 \u0447\u0430\u0441\u0442\u0438 \u0433\u0435\u043E\u043C\u0435\u0442\u0440\u0438\u0438 "Single Conductor Coil \u2013 Generic", \u0433\u0434\u0435:\n\n\u2022 \u0422\u0438\u043F \u043F\u0440\u043E\u0432\u043E\u0434\u0430 \u0431\u044B\u043B \u043E\u0433\u0440\u0430\u043D\u0438\u0447\u0435\u043D "round wire"; \u0434\u0438\u0430\u043C\u0435\u0442\u0440 \u043C\u043E\u0436\u043D\u043E \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u0438\u0442\u044C \u0441 \u043F\u043E\u043C\u043E\u0449\u044C\u044E \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440\u0430 \u0432\u0432\u043E\u0434\u0430 "wire_diameter"\n\u2022 \u0422\u0438\u043F \u044F\u0434\u0440\u0430 \u043E\u0433\u0440\u0430\u043D\u0438\u0447\u0435\u043D "cylindrical" (\u0438\u043B\u0438 \u043A\u0440\u0443\u0433\u043E\u0432\u043E\u0439); \u0434\u0438\u0430\u043C\u0435\u0442\u0440 \u043C\u043E\u0436\u0435\u0442 \u0431\u044B\u0442\u044C \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u043B\u0435\u043D \u0441 \u043F\u043E\u043C\u043E\u0449\u044C\u044E \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440\u0430 \u0432\u0432\u043E\u0434\u0430 "coil_diameter"\n\u2022 \u0422\u0438\u043F \u0441\u043E\u0435\u0434\u0438\u043D\u0435\u043D\u0438\u044F \u0431\u044B\u043B \u043E\u0433\u0440\u0430\u043D\u0438\u0447\u0435\u043D "open corner"; \u043B\u0438\u043D\u0438\u0438 \u043F\u043E\u0434\u0430\u0447\u0438 \u0431\u044B\u043B\u0438 \u0440\u0430\u0437\u043C\u0435\u0449\u0435\u043D\u044B \u0432 \u0443\u0433\u043B\u0443 (\u043F\u0440\u0438 \u0443\u0441\u043B\u043E\u0432\u0438\u0438 \u043F\u0440\u044F\u043C\u043E\u0443\u0433\u043E\u043B\u044C\u043D\u043E\u0439 \u0444\u043E\u0440\u043C\u044B \u044F\u0434\u0440\u0430) \u043F\u043E\u0434 \u0443\u0433\u043B\u043E\u043C 45 \u0433\u0440\u0430\u0434\u0443\u0441\u043E\u0432 \u043F\u043E \u043E\u0442\u043D\u043E\u0448\u0435\u043D\u0438\u044E \u043A \u043F\u043B\u043E\u0441\u043A\u043E\u0441\u0442\u0438 xz.\n\n \u0414\u043B\u044F \u043F\u043E\u043B\u0443\u0447\u0435\u043D\u0438\u044F \u0434\u043E\u043F\u043E\u043B\u043D\u0438\u0442\u0435\u043B\u044C\u043D\u043E\u0439 \u0438\u043D\u0444\u043E\u0440\u043C\u0430\u0446\u0438\u0438, \u043F\u043E\u0436\u0430\u043B\u0443\u0439\u0441\u0442\u0430, \u043F\u0440\u043E\u0432\u0435\u0440\u044C\u0442\u0435 \u0434\u043E\u043A\u0443\u043C\u0435\u043D\u0442\u0430\u0446\u0438\u044E \u043D\u0430 "Single Conductor Coil \u2013 Generic" \u0447\u0430\u0441\u0442\u044C \u0433\u0435\u043E\u043C\u0435\u0442\u0440\u0438\u0438.
partdescr_acdc/sc_row_cc_closed_hoops = Single Conductor Coil \u2013 Round Wire, Cylindrical, Closed Hoops\n\n\u042D\u0442\u043E \u043F\u0440\u043E\u0438\u0437\u0432\u043E\u0434\u043D\u0430\u044F \u043E\u0442 \u0447\u0430\u0441\u0442\u0438 \u0433\u0435\u043E\u043C\u0435\u0442\u0440\u0438\u0438 "Single Conductor Coil \u2013 Generic", \u0433\u0434\u0435:\n\n\u2022 \u0422\u0438\u043F \u043F\u0440\u043E\u0432\u043E\u0434\u0430 \u0431\u044B\u043B \u043E\u0433\u0440\u0430\u043D\u0438\u0447\u0435\u043D "round wire"; \u0434\u0438\u0430\u043C\u0435\u0442\u0440 \u043C\u043E\u0436\u043D\u043E \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u0438\u0442\u044C \u0441 \u043F\u043E\u043C\u043E\u0449\u044C\u044E \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440\u0430 \u0432\u0432\u043E\u0434\u0430 "wire_diameter"\n\u2022 \u0422\u0438\u043F \u044F\u0434\u0440\u0430 \u043E\u0433\u0440\u0430\u043D\u0438\u0447\u0435\u043D "cylindrical" (\u0438\u043B\u0438 \u043A\u0440\u0443\u0433\u043E\u0432\u043E\u0439); \u0434\u0438\u0430\u043C\u0435\u0442\u0440 \u043C\u043E\u0436\u0435\u0442 \u0431\u044B\u0442\u044C \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u043B\u0435\u043D \u0441 \u043F\u043E\u043C\u043E\u0449\u044C\u044E \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440\u0430 \u0432\u0432\u043E\u0434\u0430 "coil_diameter"\n\u2022 \u0422\u0438\u043F \u0441\u043E\u0435\u0434\u0438\u043D\u0435\u043D\u0438\u044F \u0431\u044B\u043B \u043E\u0433\u0440\u0430\u043D\u0438\u0447\u0435\u043D "closed hoops"; \u043F\u043E\u0432\u043E\u0440\u043E\u0442\u044B \u043D\u0435 \u0438\u043C\u0435\u044E\u0442 \u043D\u0430\u043A\u043B\u043E\u043D\u0430 \u0438 \u043E\u0431\u0440\u0430\u0437\u0443\u044E\u0442 \u043E\u0442\u0434\u0435\u043B\u044C\u043D\u044B\u0435 \u043E\u0431\u0440\u0443\u0447\u0438. \u042D\u0442\u043E \u0434\u043E\u0432\u043E\u043B\u044C\u043D\u043E \u0445\u043E\u0440\u043E\u0448\u043E \u043F\u0440\u0438\u0431\u043B\u0438\u0436\u0430\u0435\u0442 \u0441\u043F\u0438\u0440\u0430\u043B\u044C, \u043F\u043E\u0434\u0434\u0435\u0440\u0436\u0438\u0432\u0430\u044F \u0438\u0441\u043F\u043E\u043B\u044C\u0437\u043E\u0432\u0430\u043D\u0438\u0435 \u0441\u0438\u043C\u043C\u0435\u0442\u0440\u0438\u0438. \u0412\u0445\u043E\u0434\u043D\u043E\u0439 \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440 "partitioning" \u043C\u043E\u0436\u0435\u0442 \u0438\u0441\u043F\u043E\u043B\u044C\u0437\u043E\u0432\u0430\u0442\u044C\u0441\u044F \u0434\u043B\u044F \u043E\u0441\u043D\u0430\u0449\u0435\u043D\u0438\u044F \u043E\u0431\u0440\u0443\u0447\u0435\u0439 \u043F\u043E\u0432\u0435\u0440\u0445\u043D\u043E\u0441\u0442\u044C\u044E \u0440\u0430\u0437\u0434\u0435\u043B\u0430.\n\n \u0414\u043B\u044F \u043F\u043E\u043B\u0443\u0447\u0435\u043D\u0438\u044F \u0434\u043E\u043F\u043E\u043B\u043D\u0438\u0442\u0435\u043B\u044C\u043D\u043E\u0439 \u0438\u043D\u0444\u043E\u0440\u043C\u0430\u0446\u0438\u0438, \u043F\u043E\u0436\u0430\u043B\u0443\u0439\u0441\u0442\u0430, \u043F\u0440\u043E\u0432\u0435\u0440\u044C\u0442\u0435 \u0434\u043E\u043A\u0443\u043C\u0435\u043D\u0442\u0430\u0446\u0438\u044E \u043D\u0430 "Single Conductor Coil \u2013 Generic" \u0447\u0430\u0441\u0442\u044C \u0433\u0435\u043E\u043C\u0435\u0442\u0440\u0438\u0438.
partdescr_acdc/sc_row_cc_open_helix = Single Conductor Coil \u2013 Round Wire, Cylindrical, Open Helix\n\n\u042D\u0442\u043E \u043F\u0440\u043E\u0438\u0437\u0432\u043E\u0434\u043D\u0430\u044F \u043E\u0442 \u0447\u0430\u0441\u0442\u0438 \u0433\u0435\u043E\u043C\u0435\u0442\u0440\u0438\u0438 "Single Conductor Coil \u2013 Generic", \u0433\u0434\u0435:\n\n\u2022 \u0422\u0438\u043F \u043F\u0440\u043E\u0432\u043E\u0434\u0430 \u0431\u044B\u043B \u043E\u0433\u0440\u0430\u043D\u0438\u0447\u0435\u043D "round wire"; \u0434\u0438\u0430\u043C\u0435\u0442\u0440 \u043C\u043E\u0436\u043D\u043E \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u0438\u0442\u044C \u0441 \u043F\u043E\u043C\u043E\u0449\u044C\u044E \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440\u0430 \u0432\u0432\u043E\u0434\u0430 "wire_diameter"\n\u2022 \u0422\u0438\u043F \u044F\u0434\u0440\u0430 \u043E\u0433\u0440\u0430\u043D\u0438\u0447\u0435\u043D "cylindrical" (\u0438\u043B\u0438 \u043A\u0440\u0443\u0433\u043E\u0432\u043E\u0439); \u0434\u0438\u0430\u043C\u0435\u0442\u0440 \u043C\u043E\u0436\u0435\u0442 \u0431\u044B\u0442\u044C \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u043B\u0435\u043D \u0441 \u043F\u043E\u043C\u043E\u0449\u044C\u044E \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440\u0430 \u0432\u0432\u043E\u0434\u0430 "coil_diameter"\n\u2022 \u0422\u0438\u043F \u0441\u043E\u0435\u0434\u0438\u043D\u0435\u043D\u0438\u044F \u0431\u044B\u043B \u043E\u0433\u0440\u0430\u043D\u0438\u0447\u0435\u043D "open helix"; \u0447\u0438\u0441\u043B\u043E \u0432\u0438\u0442\u043A\u043E\u0432 \u043C\u043E\u0436\u0435\u0442 \u0431\u044B\u0442\u044C \u043D\u0435\u0446\u0435\u043B\u044B\u043C. \u0412\u0445\u043E\u0434\u043D\u0430\u044F \u043A\u043E\u0440\u043C\u043E\u0432\u0430\u044F \u043B\u0438\u043D\u0438\u044F \u043F\u0430\u0440\u0430\u043B\u043B\u0435\u043B\u044C\u043D\u0430 \u043F\u043B\u043E\u0441\u043A\u043E\u0441\u0442\u0438 xz, \u0430 \u0432\u044B\u0445\u043E\u0434\u043D\u0430\u044F \u043A\u043E\u0440\u043C\u043E\u0432\u0430\u044F \u043B\u0438\u043D\u0438\u044F \u0440\u0430\u0437\u043C\u0435\u0449\u0435\u043D\u0430 \u043F\u043E\u0434 \u0443\u0433\u043B\u043E\u043C \u0432 \u0437\u0430\u0432\u0438\u0441\u0438\u043C\u043E\u0441\u0442\u0438 \u043E\u0442 \u043A\u043E\u043B\u0438\u0447\u0435\u0441\u0442\u0432\u0430 \u043E\u0431\u043E\u0440\u043E\u0442\u043E\u0432.\n\n \u0414\u043B\u044F \u043F\u043E\u043B\u0443\u0447\u0435\u043D\u0438\u044F \u0434\u043E\u043F\u043E\u043B\u043D\u0438\u0442\u0435\u043B\u044C\u043D\u043E\u0439 \u0438\u043D\u0444\u043E\u0440\u043C\u0430\u0446\u0438\u0438, \u043F\u043E\u0436\u0430\u043B\u0443\u0439\u0441\u0442\u0430, \u043F\u0440\u043E\u0432\u0435\u0440\u044C\u0442\u0435 \u0434\u043E\u043A\u0443\u043C\u0435\u043D\u0442\u0430\u0446\u0438\u044E \u043D\u0430 "Single Conductor Coil \u2013 Generic" \u0447\u0430\u0441\u0442\u044C \u0433\u0435\u043E\u043C\u0435\u0442\u0440\u0438\u0438.
partdescr_acdc/sc_row_rc_closed_corner = Single Conductor Coil \u2013 Round Wire, Racetrack, Closed Corner\n\n\u042D\u0442\u043E \u043F\u0440\u043E\u0438\u0437\u0432\u043E\u0434\u043D\u0430\u044F \u043E\u0442 \u0447\u0430\u0441\u0442\u0438 \u0433\u0435\u043E\u043C\u0435\u0442\u0440\u0438\u0438 "Single Conductor Coil \u2013 Generic", \u0433\u0434\u0435:\n\n\u2022 \u0422\u0438\u043F \u043F\u0440\u043E\u0432\u043E\u0434\u0430 \u0431\u044B\u043B \u043E\u0433\u0440\u0430\u043D\u0438\u0447\u0435\u043D "round wire"; \u0434\u0438\u0430\u043C\u0435\u0442\u0440 \u043C\u043E\u0436\u043D\u043E \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u0438\u0442\u044C \u0441 \u043F\u043E\u043C\u043E\u0449\u044C\u044E \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440\u0430 \u0432\u0432\u043E\u0434\u0430 "wire_diameter"\n\u2022 \u041E\u0441\u043D\u043E\u0432\u043D\u043E\u0439 \u0442\u0438\u043F \u0431\u044B\u043B \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u043B\u0435\u043D \u043D\u0430 "rectangular with fillet" (\u043F\u043E \u0443\u043C\u043E\u043B\u0447\u0430\u043D\u0438\u044E); \u0440\u0430\u0437\u043C\u0435\u0440\u044B \u043C\u043E\u0433\u0443\u0442 \u0431\u044B\u0442\u044C \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u043B\u0435\u043D\u044B \u0441 \u0438\u0441\u043F\u043E\u043B\u044C\u0437\u043E\u0432\u0430\u043D\u0438\u0435\u043C \u0432\u0445\u043E\u0434\u043D\u044B\u0445 \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440\u043E\u0432 "coil_width" \u0438 "coil_depth". \u0420\u0430\u0437\u043C\u0435\u0440 \u0444\u0438\u043B\u0435 \u043C\u043E\u0436\u043D\u043E \u0441\u043A\u043E\u0440\u0440\u0435\u043A\u0442\u0438\u0440\u043E\u0432\u0430\u0442\u044C \u0441 \u043F\u043E\u043C\u043E\u0449\u044C\u044E \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440\u0430 "coil_fillet". \u0420\u0430\u0434\u0438\u0443\u0441 \u0444\u0438\u043B\u0435 \u043A\u0430\u0442\u0443\u0448\u043A\u0438 \u0438\u043C\u0435\u0435\u0442 \u043D\u0438\u0436\u043D\u044E\u044E \u0433\u0440\u0430\u043D\u0438\u0446\u0443, \u043A\u043E\u0442\u043E\u0440\u0430\u044F \u0443\u0441\u0442\u0430\u043D\u0430\u0432\u043B\u0438\u0432\u0430\u0435\u0442\u0441\u044F \u043D\u0430 \u043F\u043E\u043B\u043E\u0432\u0438\u043D\u0443 \u0448\u0438\u0440\u0438\u043D\u044B \u043F\u043E\u043F\u0435\u0440\u0435\u0447\u043D\u043E\u0433\u043E \u0441\u0435\u0447\u0435\u043D\u0438\u044F \u043F\u0440\u043E\u0432\u043E\u0434\u0430.\n\u2022 \u0422\u0438\u043F \u0441\u043E\u0435\u0434\u0438\u043D\u0435\u043D\u0438\u044F \u0431\u044B\u043B \u043E\u0433\u0440\u0430\u043D\u0438\u0447\u0435\u043D "closed corner"; \u043E\u0431\u0440\u0430\u0442\u043D\u0430\u044F \u043F\u0435\u0442\u043B\u044F \u0431\u044B\u043B\u0430 \u043F\u043E\u043C\u0435\u0449\u0435\u043D\u0430 \u0432 \u0443\u0433\u043E\u043B (\u043F\u0440\u0438 \u0443\u0441\u043B\u043E\u0432\u0438\u0438 \u043F\u0440\u044F\u043C\u043E\u0443\u0433\u043E\u043B\u044C\u043D\u043E\u0439 \u0444\u043E\u0440\u043C\u044B \u044F\u0434\u0440\u0430) \u043F\u043E\u0434 \u0443\u0433\u043B\u043E\u043C 45 \u0433\u0440\u0430\u0434\u0443\u0441\u043E\u0432 \u043F\u043E \u043E\u0442\u043D\u043E\u0448\u0435\u043D\u0438\u044E \u043A \u043F\u043B\u043E\u0441\u043A\u043E\u0441\u0442\u0438 xz. \n\n \u0414\u043B\u044F \u043F\u043E\u043B\u0443\u0447\u0435\u043D\u0438\u044F \u0434\u043E\u043F\u043E\u043B\u043D\u0438\u0442\u0435\u043B\u044C\u043D\u043E\u0439 \u0438\u043D\u0444\u043E\u0440\u043C\u0430\u0446\u0438\u0438, \u043F\u043E\u0436\u0430\u043B\u0443\u0439\u0441\u0442\u0430, \u043F\u0440\u043E\u0432\u0435\u0440\u044C\u0442\u0435 \u0434\u043E\u043A\u0443\u043C\u0435\u043D\u0442\u0430\u0446\u0438\u044E \u043D\u0430 "Single Conductor Coil \u2013 Generic" \u0447\u0430\u0441\u0442\u044C \u0433\u0435\u043E\u043C\u0435\u0442\u0440\u0438\u0438.
partdescr_acdc/sc_row_rc_open_corner = Single Conductor Coil \u2013 Round Wire, Racetrack, Open Corner\n\n\u042D\u0442\u043E \u043F\u0440\u043E\u0438\u0437\u0432\u043E\u0434\u043D\u0430\u044F \u043E\u0442 \u0447\u0430\u0441\u0442\u0438 \u0433\u0435\u043E\u043C\u0435\u0442\u0440\u0438\u0438 "Single Conductor Coil \u2013 Generic", \u0433\u0434\u0435:\n\n\u2022 \u0422\u0438\u043F \u043F\u0440\u043E\u0432\u043E\u0434\u0430 \u0431\u044B\u043B \u043E\u0433\u0440\u0430\u043D\u0438\u0447\u0435\u043D "round wire"; \u0434\u0438\u0430\u043C\u0435\u0442\u0440 \u043C\u043E\u0436\u043D\u043E \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u0438\u0442\u044C \u0441 \u043F\u043E\u043C\u043E\u0449\u044C\u044E \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440\u0430 \u0432\u0432\u043E\u0434\u0430 "wire_diameter"\n\u2022 \u041E\u0441\u043D\u043E\u0432\u043D\u043E\u0439 \u0442\u0438\u043F \u0431\u044B\u043B \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u043B\u0435\u043D \u043D\u0430 "rectangular with fillet" (\u043F\u043E \u0443\u043C\u043E\u043B\u0447\u0430\u043D\u0438\u044E); \u0440\u0430\u0437\u043C\u0435\u0440\u044B \u043C\u043E\u0433\u0443\u0442 \u0431\u044B\u0442\u044C \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u043B\u0435\u043D\u044B \u0441 \u0438\u0441\u043F\u043E\u043B\u044C\u0437\u043E\u0432\u0430\u043D\u0438\u0435\u043C \u0432\u0445\u043E\u0434\u043D\u044B\u0445 \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440\u043E\u0432 "coil_width" \u0438 "coil_depth". \u0420\u0430\u0437\u043C\u0435\u0440 \u0444\u0438\u043B\u0435 \u043C\u043E\u0436\u043D\u043E \u0441\u043A\u043E\u0440\u0440\u0435\u043A\u0442\u0438\u0440\u043E\u0432\u0430\u0442\u044C \u0441 \u043F\u043E\u043C\u043E\u0449\u044C\u044E \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440\u0430 "coil_fillet". \u0420\u0430\u0434\u0438\u0443\u0441 \u0444\u0438\u043B\u0435 \u043A\u0430\u0442\u0443\u0448\u043A\u0438 \u0438\u043C\u0435\u0435\u0442 \u043D\u0438\u0436\u043D\u044E\u044E \u0433\u0440\u0430\u043D\u0438\u0446\u0443, \u043A\u043E\u0442\u043E\u0440\u0430\u044F \u0443\u0441\u0442\u0430\u043D\u0430\u0432\u043B\u0438\u0432\u0430\u0435\u0442\u0441\u044F \u043D\u0430 \u043F\u043E\u043B\u043E\u0432\u0438\u043D\u0443 \u0448\u0438\u0440\u0438\u043D\u044B \u043F\u043E\u043F\u0435\u0440\u0435\u0447\u043D\u043E\u0433\u043E \u0441\u0435\u0447\u0435\u043D\u0438\u044F \u043F\u0440\u043E\u0432\u043E\u0434\u0430.\n\u2022 \u0422\u0438\u043F \u0441\u043E\u0435\u0434\u0438\u043D\u0435\u043D\u0438\u044F \u0431\u044B\u043B \u043E\u0433\u0440\u0430\u043D\u0438\u0447\u0435\u043D "open corner"; \u043B\u0438\u043D\u0438\u0438 \u043F\u043E\u0434\u0430\u0447\u0438 \u0431\u044B\u043B\u0438 \u0440\u0430\u0437\u043C\u0435\u0449\u0435\u043D\u044B \u0432 \u0443\u0433\u043B\u0443 (\u043F\u0440\u0438 \u0443\u0441\u043B\u043E\u0432\u0438\u0438 \u043F\u0440\u044F\u043C\u043E\u0443\u0433\u043E\u043B\u044C\u043D\u043E\u0439 \u0444\u043E\u0440\u043C\u044B \u044F\u0434\u0440\u0430) \u043F\u043E\u0434 \u0443\u0433\u043B\u043E\u043C 45 \u0433\u0440\u0430\u0434\u0443\u0441\u043E\u0432 \u043F\u043E \u043E\u0442\u043D\u043E\u0448\u0435\u043D\u0438\u044E \u043A \u043F\u043B\u043E\u0441\u043A\u043E\u0441\u0442\u0438 xz.\n\n \u0414\u043B\u044F \u043F\u043E\u043B\u0443\u0447\u0435\u043D\u0438\u044F \u0434\u043E\u043F\u043E\u043B\u043D\u0438\u0442\u0435\u043B\u044C\u043D\u043E\u0439 \u0438\u043D\u0444\u043E\u0440\u043C\u0430\u0446\u0438\u0438, \u043F\u043E\u0436\u0430\u043B\u0443\u0439\u0441\u0442\u0430, \u043F\u0440\u043E\u0432\u0435\u0440\u044C\u0442\u0435 \u0434\u043E\u043A\u0443\u043C\u0435\u043D\u0442\u0430\u0446\u0438\u044E \u043D\u0430 "Single Conductor Coil \u2013 Generic" \u0447\u0430\u0441\u0442\u044C \u0433\u0435\u043E\u043C\u0435\u0442\u0440\u0438\u0438.
