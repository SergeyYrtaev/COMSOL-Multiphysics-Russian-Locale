0 \u043F\u043E\u043B\u043E\u0432\u0438\u043D\u0443 \u0448\u0438\u0440\u0438\u043D\u044B \u043F\u043E\u043F\u0435\u0440\u0435\u0447\u043D\u043E\u0433\u043E \u0441\u0435\u0447\u0435\u043D\u0438\u044F \u043F\u0440\u043E\u0432\u043E\u0434\u0430.\n\u2022 \u0422\u0438\u043F \u0441\u043E\u0435\u0434\u0438\u043D\u0435\u043D\u0438\u044F \u0431\u044B\u043B \u043E\u0433\u0440\u0430\u043D\u0438\u0447\u0435\u043D "closed side"; \u043E\u0431\u0440\u0430\u0442\u043D\u0430\u044F \u043F\u0435\u0442\u043B\u044F \u0431\u044B\u043B\u0430 \u0440\u0430\u0437\u043C\u0435\u0449\u0435\u043D\u0430 \u043D\u0430 \u0441\u0442\u043E\u0440\u043E\u043D\u0435, \u0441\u043E\u0432\u043F\u0430\u0434\u0430\u044E\u0449\u0435\u0439 \u0441 xz-plane.\n\n \u0414\u043B\u044F \u043F\u043E\u043B\u0443\u0447\u0435\u043D\u0438\u044F \u0434\u043E\u043F\u043E\u043B\u043D\u0438\u0442\u0435\u043B\u044C\u043D\u043E\u0439 \u0438\u043D\u0444\u043E\u0440\u043C\u0430\u0446\u0438\u0438, \u043F\u043E\u0436\u0430\u043B\u0443\u0439\u0441\u0442\u0430, \u043F\u0440\u043E\u0432\u0435\u0440\u044C\u0442\u0435 \u0434\u043E\u043A\u0443\u043C\u0435\u043D\u0442\u0430\u0446\u0438\u044E \u043D\u0430 "Single Conductor Coil \u2013 Generic" \u0447\u0430\u0441\u0442\u044C \u0433\u0435\u043E\u043C\u0435\u0442\u0440\u0438\u0438.
partdescr_acdc/sc_liw_rc_open_side = Single Conductor Coil \u2013 Line Wire, Racetrack, Open Side\n\n\u042D\u0442\u043E \u043F\u0440\u043E\u0438\u0437\u0432\u043E\u0434\u043D\u0430\u044F \u043E\u0442 \u0447\u0430\u0441\u0442\u0438 \u0433\u0435\u043E\u043C\u0435\u0442\u0440\u0438\u0438 "Single Conductor Coil \u2013 Generic", \u0433\u0434\u0435:\n\n\u2022 \u0422\u0438\u043F \u043F\u0440\u043E\u0432\u043E\u0434\u0430 \u0431\u044B\u043B \u043E\u0433\u0440\u0430\u043D\u0438\u0447\u0435\u043D "line wire"; \u043F\u0440\u043E\u0432\u043E\u0434 \u0431\u0443\u0434\u0435\u0442 \u0441\u0442\u0440\u043E\u043A\u043E\u0439, \u0438\u043B\u0438 \u043A\u0440\u0430\u0435\u043C.\n\u2022 \u041E\u0441\u043D\u043E\u0432\u043D\u043E\u0439 \u0442\u0438\u043F \u0431\u044B\u043B \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u043B\u0435\u043D \u043D\u0430 "rectangular with fillet" (\u043F\u043E \u0443\u043C\u043E\u043B\u0447\u0430\u043D\u0438\u044E); \u0440\u0430\u0437\u043C\u0435\u0440\u044B \u043C\u043E\u0433\u0443\u0442 \u0431\u044B\u0442\u044C \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u043B\u0435\u043D\u044B \u0441 \u0438\u0441\u043F\u043E\u043B\u044C\u0437\u043E\u0432\u0430\u043D\u0438\u0435\u043C \u0432\u0445\u043E\u0434\u043D\u044B\u0445 \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440\u043E\u0432 "coil_width" \u0438 "coil_depth". \u0420\u0430\u0437\u043C\u0435\u0440 \u0444\u0438\u043B\u0435 \u043C\u043E\u0436\u043D\u043E \u0441\u043A\u043E\u0440\u0440\u0435\u043A\u0442\u0438\u0440\u043E\u0432\u0430\u0442\u044C \u0441 \u043F\u043E\u043C\u043E\u0449\u044C\u044E \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440\u0430 "coil_fillet". \u0420\u0430\u0434\u0438\u0443\u0441 \u0444\u0438\u043B\u0435 \u043A\u0430\u0442\u0443\u0448\u043A\u0438 \u0438\u043C\u0435\u0435\u0442 \u043D\u0438\u0436\u043D\u044E\u044E \u0433\u0440\u0430\u043D\u0438\u0446\u0443, \u043A\u043E\u0442\u043E\u0440\u0430\u044F \u0443\u0441\u0442\u0430\u043D\u0430\u0432\u043B\u0438\u0432\u0430\u0435\u0442\u0441\u044F \u043D\u0430 \u043F\u043E\u043B\u043E\u0432\u0438\u043D\u0443 \u0448\u0438\u0440\u0438\u043D\u044B \u043F\u043E\u043F\u0435\u0440\u0435\u0447\u043D\u043E\u0433\u043E \u0441\u0435\u0447\u0435\u043D\u0438\u044F \u043F\u0440\u043E\u0432\u043E\u0434\u0430.\n\u2022 \u0422\u0438\u043F \u0441\u043E\u0435\u0434\u0438\u043D\u0435\u043D\u0438\u044F \u0431\u044B\u043B \u043E\u0433\u0440\u0430\u043D\u0438\u0447\u0435\u043D "open side"; \u043B\u0438\u043D\u0438\u0438 \u043F\u043E\u0434\u0430\u0447\u0438 \u0431\u044B\u043B\u0438 \u0440\u0430\u0437\u043C\u0435\u0449\u0435\u043D\u044B \u043D\u0430 \u0441\u0442\u043E\u0440\u043E\u043D\u0435, \u0441\u043E\u0432\u043F\u0430\u0434\u0430\u044E\u0449\u0435\u0439 \u0441 xz-plane.\n\n \u0414\u043B\u044F \u043F\u043E\u043B\u0443\u0447\u0435\u043D\u0438\u044F \u0434\u043E\u043F\u043E\u043B\u043D\u0438\u0442\u0435\u043B\u044C\u043D\u043E\u0439 \u0438\u043D\u0444\u043E\u0440\u043C\u0430\u0446\u0438\u0438, \u043F\u043E\u0436\u0430\u043B\u0443\u0439\u0441\u0442\u0430, \u043F\u0440\u043E\u0432\u0435\u0440\u044C\u0442\u0435 \u0434\u043E\u043A\u0443\u043C\u0435\u043D\u0442\u0430\u0446\u0438\u044E \u043D\u0430 "Single Conductor Coil \u2013 Generic" \u0447\u0430\u0441\u0442\u044C \u0433\u0435\u043E\u043C\u0435\u0442\u0440\u0438\u0438.
partdescr_acdc/sc_liw_rc_closed_hoops = \u041E\u0434\u043D\u043E\u043F\u0440\u043E\u0432\u043E\u0434\u043D\u0430\u044F \u043A\u0430\u0442\u0443\u0448\u043A\u0430 \u2013 \u041B\u0438\u043D\u0435\u0439\u043D\u044B\u0439 \u043F\u0440\u043E\u0432\u043E\u0434, \u0433\u043E\u043D\u043E\u0447\u043D\u0430\u044F \u0442\u0440\u0430\u0441\u0441\u0430, \u0437\u0430\u043C\u043A\u043D\u0443\u0442\u044B\u0435 \u043A\u043E\u043B\u044C\u0446\u0430\n\n\u042D\u0442\u043E \u043F\u0440\u043E\u0438\u0437\u0432\u043E\u0434\u043D\u0430\u044F \u043E\u0442 "Single Conductor Coil \u2013 Generic" \u0433\u0435\u043E\u043C\u0435\u0442\u0440\u0438\u0447\u0435\u0441\u043A\u043E\u0439 \u0447\u0430\u0441\u0442\u0438, \u0433\u0434\u0435:\n\n\u2022 \u0422\u0438\u043F \u043F\u0440\u043E\u0432\u043E\u0434\u0430 \u043E\u0433\u0440\u0430\u043D\u0438\u0447\u0435\u043D "line wire"; \u043F\u0440\u043E\u0432\u043E\u0434 \u0431\u0443\u0434\u0435\u0442 \u043B\u0438\u043D\u0438\u0435\u0439 \u0438\u043B\u0438 \u043A\u0440\u0430\u0435\u043C.\n\u2022 \u0422\u0438\u043F \u044F\u0434\u0440\u0430 \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u043B\u0435\u043D \u043D\u0430 "rectangular with fillet" (\u043F\u043E \u0443\u043C\u043E\u043B\u0447\u0430\u043D\u0438\u044E); \u0440\u0430\u0437\u043C\u0435\u0440\u044B \u043C\u043E\u0436\u043D\u043E \u0437\u0430\u0434\u0430\u0442\u044C \u0441 \u043F\u043E\u043C\u043E\u0449\u044C\u044E \u0432\u0445\u043E\u0434\u043D\u044B\u0445 \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440\u043E\u0432 "coil_width" \u0438 "coil_depth". \u0420\u0430\u0437\u043C\u0435\u0440 \u0441\u043A\u0440\u0443\u0433\u043B\u0435\u043D\u0438\u044F \u043C\u043E\u0436\u043D\u043E \u043D\u0430\u0441\u0442\u0440\u043E\u0438\u0442\u044C \u0441 \u043F\u043E\u043C\u043E\u0449\u044C\u044E \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440\u0430 "coil_fillet". \u0420\u0430\u0434\u0438\u0443\u0441 \u0441\u043A\u0440\u0443\u0433\u043B\u0435\u043D\u0438\u044F \u043A\u0430\u0442\u0443\u0448\u043A\u0438 \u0438\u043C\u0435\u0435\u0442 \u043D\u0438\u0436\u043D\u044E\u044E \u0433\u0440\u0430\u043D\u0438\u0446\u0443, \u043A\u043E\u0442\u043E\u0440\u0430\u044F \u0443\u0441\u0442\u0430\u043D\u0430\u0432\u043B\u0438\u0432\u0430\u0435\u0442\u0441\u044F \u0440\u0430\u0432\u043D\u043E\u0439 \u043F\u043E\u043B\u043E\u0432\u0438\u043D\u0435 \u0448\u0438\u0440\u0438\u043D\u044B \u043F\u043E\u043F\u0435\u0440\u0435\u0447\u043D\u043E\u0433\u043E \u0441\u0435\u0447\u0435\u043D\u0438\u044F \u043F\u0440\u043E\u0432\u043E\u0434\u0430.\n\u2022 \u0422\u0438\u043F \u0441\u043E\u0435\u0434\u0438\u043D\u0435\u043D\u0438\u044F \u043E\u0433\u0440\u0430\u043D\u0438\u0447\u0435\u043D "closed hoops"; \u043F\u043E\u0432\u043E\u0440\u043E\u0442\u044B \u043D\u0435 \u0438\u043C\u0435\u044E\u0442 \u043D\u0430\u043A\u043B\u043E\u043D\u0430 \u0438 \u043E\u0431\u0440\u0430\u0437\u0443\u044E\u0442 \u043E\u0442\u0434\u0435\u043B\u044C\u043D\u044B\u0435 \u043A\u043E\u043B\u044C\u0446\u0430. \u042D\u0442\u043E \u0434\u043E\u0432\u043E\u043B\u044C\u043D\u043E \u0445\u043E\u0440\u043E\u0448\u043E \u0430\u043F\u043F\u0440\u043E\u043A\u0441\u0438\u043C\u0438\u0440\u0443\u0435\u0442 \u0441\u043F\u0438\u0440\u0430\u043B\u044C, \u0441\u043E\u0445\u0440\u0430\u043D\u044F\u044F \u043F\u0440\u0438 \u044D\u0442\u043E\u043C \u0441\u0438\u043C\u043C\u0435\u0442\u0440\u0438\u044E. \u0412\u0445\u043E\u0434\u043D\u043E\u0439 \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440 "partitioning" \u043C\u043E\u0436\u043D\u043E \u0438\u0441\u043F\u043E\u043B\u044C\u0437\u043E\u0432\u0430\u0442\u044C \u0434\u043B\u044F \u043E\u0441\u043D\u0430\u0449\u0435\u043D\u0438\u044F \u043F\u044F\u043B\u0435\u0446 \u0440\u0430\u0437\u0434\u0435\u043B\u0438\u0442\u0435\u043B\u044C\u043D\u043E\u0439 \u043F\u043E\u0432\u0435\u0440\u0445\u043D\u043E\u0441\u0442\u044C\u044E.\n\n\u0414\u043B\u044F \u043F\u043E\u043B\u0443\u0447\u0435\u043D\u0438\u044F \u0434\u043E\u043F\u043E\u043B\u043D\u0438\u0442\u0435\u043B\u044C\u043D\u043E\u0439 \u0438\u043D\u0444\u043E\u0440\u043C\u0430\u0446\u0438\u0438 \u043E\u0437\u043D\u0430\u043A\u043E\u043C\u044C\u0442\u0435\u0441\u044C \u0441 \u0434\u043E\u043A\u0443\u043C\u0435\u043D\u0442\u0430\u0446\u0438\u0435\u0439 \u043F\u043E \u0447\u0430\u0441\u0442\u0438 \u0433\u0435\u043E\u043C\u0435\u0442\u0440\u0438\u0438 "Single Conductor Coil \u2013 Generic".
partdescr_acdc/sc_generic_shape = Single Conductor Coil \u2013 Generic\n\n\u042D\u0442\u043E \u043E\u0431\u0449\u0430\u044F \u043E\u0434\u043D\u043E\u043F\u0440\u043E\u0432\u043E\u0434\u043D\u0430\u044F \u043A\u0430\u0442\u0443\u0448\u043A\u0430, \u043A\u043E\u0442\u043E\u0440\u0430\u044F \u0438\u0441\u043F\u043E\u043B\u044C\u0437\u0443\u0435\u0442\u0441\u044F \u0432 \u043A\u0430\u0447\u0435\u0441\u0442\u0432\u0435 \u043E\u0441\u043D\u043E\u0432\u044B \u0434\u043B\u044F \u0434\u0440\u0443\u0433\u0438\u0445 \u0431\u043E\u043B\u0435\u0435 \u0441\u043F\u0435\u0446\u0438\u0430\u043B\u0438\u0437\u0438\u0440\u043E\u0432\u0430\u043D\u043D\u044B\u0445 \u0447\u0430\u0441\u0442\u0435\u0439 \u043E\u0434\u043D\u043E\u043F\u0440\u043E\u0432\u043E\u0434\u043D\u0438\u043A\u043E\u0432\u043E\u0439 \u043A\u0430\u0442\u0443\u0448\u043A\u0438. \u0412\u0441\u0435 \u043D\u0430\u0441\u0442\u0440\u043E\u0439\u043A\u0438 \u0432\u0432\u043E\u0434\u0430 \u043E\u0441\u0442\u0430\u044E\u0442\u0441\u044F \u0440\u0430\u0437\u0431\u043B\u043E\u043A\u0438\u0440\u043E\u0432\u0430\u043D\u043D\u044B\u043C\u0438, \u0447\u0442\u043E \u043E\u0437\u043D\u0430\u0447\u0430\u0435\u0442, \u0447\u0442\u043E \u0447\u0430\u0441\u0442\u044C \u043C\u043E\u0436\u0435\u0442 \u0442\u0440\u0430\u043D\u0441\u0444\u043E\u0440\u043C\u0438\u0440\u043E\u0432\u0430\u0442\u044C\u0441\u044F \u0432 \u043B\u044E\u0431\u043E\u0439 \u0438\u0437 \u0434\u0440\u0443\u0433\u0438\u0445 \u043A\u0430\u0442\u0443\u0448\u0435\u043A (\u0432\u044B\u0441\u043E\u043A\u0430\u044F \u0433\u0438\u0431\u043A\u043E\u0441\u0442\u044C, \u043D\u0438\u0437\u043A\u0430\u044F \u0441\u043B\u043E\u0436\u043D\u043E\u0441\u0442\u044C).\n\n \u0414\u043B\u044F \u043F\u043E\u043B\u0443\u0447\u0435\u043D\u0438\u044F \u0434\u043E\u043F\u043E\u043B\u043D\u0438\u0442\u0435\u043B\u044C\u043D\u043E\u0439 \u0438\u043D\u0444\u043E\u0440\u043C\u0430\u0446\u0438\u0438, \u043F\u043E\u0436\u0430\u043B\u0443\u0439\u0441\u0442\u0430, \u043F\u0440\u043E\u0432\u0435\u0440\u044C\u0442\u0435 \u0434\u043E\u043A\u0443\u043C\u0435\u043D\u0442\u0430\u0446\u0438\u044E (\u0441\u043C. \u0441\u043E\u043E\u0442\u0432\u0435\u0442\u0441\u0442\u0432\u0443\u044E\u0449\u0438\u0439 \u0434\u043E\u043A\u0443\u043C\u0435\u043D\u0442 *.pdf).
partdescr_acdc/hc_dom_cylindrical = \u0413\u043E\u043C\u043E\u0433\u0435\u043D\u0438\u0437\u0438\u0440\u043E\u0432\u0430\u043D\u043D\u0430\u044F \u043C\u043D\u043E\u0433\u043E\u0432\u0438\u0442\u043A\u043E\u0432\u0430\u044F \u043A\u0430\u0442\u0443\u0448\u043A\u0430 \u2014 \u043E\u0431\u043B\u0430\u0441\u0442\u044C, \u0446\u0438\u043B\u0438\u043D\u0434\u0440\u0438\u0447\u0435\u0441\u043A\u0430\u044F\n\n\u042D\u0442\u043E \u043F\u0440\u043E\u0438\u0437\u0432\u043E\u0434\u043D\u0430\u044F \u043E\u0442 \u0433\u0435\u043E\u043C\u0435\u0442\u0440\u0438\u0447\u0435\u0441\u043A\u043E\u0439 \u0447\u0430\u0441\u0442\u0438 "Homogenized Multiturn Coil \u2013 Generic", \u0433\u0434\u0435:\n\n\u2022 \u0422\u0438\u043F \u043A\u0430\u0442\u0443\u0448\u043A\u0438 \u043E\u0433\u0440\u0430\u043D\u0438\u0447\u0435\u043D \u0437\u043D\u0430\u0447\u0435\u043D\u0438\u0435\u043C "domain coil"; \u0440\u0430\u0437\u043C\u0435\u0440\u044B \u043F\u043E\u043F\u0435\u0440\u0435\u0447\u043D\u043E\u0433\u043E \u0441\u0435\u0447\u0435\u043D\u0438\u044F \u043F\u0443\u0447\u043A\u0430 \u0437\u0430\u0434\u0430\u044E\u0442\u0441\u044F \u0432\u0445\u043E\u0434\u043D\u044B\u043C\u0438 \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440\u0430\u043C\u0438 "coil_thickness" \u0438 "coil_height".\n\u2022 \u0422\u0438\u043F \u0441\u0435\u0440\u0434\u0435\u0447\u043D\u0438\u043A\u0430 \u043E\u0433\u0440\u0430\u043D\u0438\u0447\u0435\u043D \u0437\u043D\u0430\u0447\u0435\u043D\u0438\u0435\u043C "cylindrical"; \u0434\u0438\u0430\u043C\u0435\u0442\u0440 \u0437\u0430\u0434\u0430\u0435\u0442\u0441\u044F \u0432\u0445\u043E\u0434\u043D\u044B\u043C \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440\u043E\u043C "coil_diameter".\n\n\u0414\u043E\u043F\u043E\u043B\u043D\u0438\u0442\u0435\u043B\u044C\u043D\u044B\u0435 \u0441\u0432\u0435\u0434\u0435\u043D\u0438\u044F \u0441\u043C. \u0432 \u0434\u043E\u043A\u0443\u043C\u0435\u043D\u0442\u0430\u0446\u0438\u0438 \u043A \u0433\u0435\u043E\u043C\u0435\u0442\u0440\u0438\u0447\u0435\u0441\u043A\u043E\u0439 \u0447\u0430\u0441\u0442\u0438 "Homogenized Multiturn Coil \u2013 Generic".
partdescr_acdc/hc_dom_racetrack = Homogenized Multiturn Coil \u2013 Domain, Racetrack\n\n\u042D\u0442\u043E \u043F\u0440\u043E\u0438\u0437\u0432\u043E\u0434\u043D\u0430\u044F \u043E\u0442 \u0447\u0430\u0441\u0442\u0438 \u0433\u0435\u043E\u043C\u0435\u0442\u0440\u0438\u0438 "Homogenized Multiturn Coil \u2013 Generic", \u0433\u0434\u0435:\n\n\u2022 \u0422\u0438\u043F \u043A\u0430\u0442\u0443\u0448\u043A\u0438 \u0431\u044B\u043B \u043E\u0433\u0440\u0430\u043D\u0438\u0447\u0435\u043D "domain coil"; \u0440\u0430\u0437\u043C\u0435\u0440\u044B \u0441\u0435\u0447\u0435\u043D\u0438\u044F \u043F\u0443\u0447\u043A\u0430 \u043C\u043E\u0433\u0443\u0442 \u0431\u044B\u0442\u044C \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u043B\u0435\u043D\u044B \u0441 \u043F\u043E\u043C\u043E\u0449\u044C\u044E "coil_thickness" \u0438 "coil_height" \u0432\u0445\u043E\u0434\u043D\u044B\u0445 \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440\u043E\u0432.\n\u2022 \u0422\u0438\u043F \u044F\u0434\u0440\u0430 \u0431\u044B\u043B \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u043B\u0435\u043D \u043D\u0430 "rectangular with fillet" (\u043F\u043E \u0443\u043C\u043E\u043B\u0447\u0430\u043D\u0438\u044E); \u0440\u0430\u0437\u043C\u0435\u0440\u044B \u043C\u043E\u0433\u0443\u0442 \u0431\u044B\u0442\u044C \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u043B\u0435\u043D\u044B \u0441 \u0438\u0441\u043F\u043E\u043B\u044C\u0437\u043E\u0432\u0430\u043D\u0438\u0435\u043C \u0432\u0445\u043E\u0434\u043D\u044B\u0445 \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440\u043E\u0432 "coil_width" \u0438 "coil_depth". \u0420\u0430\u0437\u043C\u0435\u0440 \u0444\u0438\u043B\u0435 \u043C\u043E\u0436\u043D\u043E \u0441\u043A\u043E\u0440\u0440\u0435\u043A\u0442\u0438\u0440\u043E\u0432\u0430\u0442\u044C \u0441 \u043F\u043E\u043C\u043E\u0449\u044C\u044E \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440\u0430 "coil_fillet". \u041D\u0430\u0440\u0443\u0436\u043D\u044B\u0439 \u0440\u0430\u0434\u0438\u0443\u0441 \u0444\u0438\u043B\u0435 \u043A\u0430\u0442\u0443\u0448\u043A\u0438 \u0438\u043C\u0435\u0435\u0442 \u043D\u0438\u0436\u043D\u044E\u044E \u0433\u0440\u0430\u043D\u0438\u0446\u0443, \u0440\u0430\u0432\u043D\u0443\u044E "coil_thickness"\n\n \u0414\u043B\u044F \u043F\u043E\u043B\u0443\u0447\u0435\u043D\u0438\u044F \u0434\u043E\u043F\u043E\u043B\u043D\u0438\u0442\u0435\u043B\u044C\u043D\u043E\u0439 \u0438\u043D\u0444\u043E\u0440\u043C\u0430\u0446\u0438\u0438, \u043F\u043E\u0436\u0430\u043B\u0443\u0439\u0441\u0442\u0430, \u043F\u0440\u043E\u0432\u0435\u0440\u044C\u0442\u0435 \u0434\u043E\u043A\u0443\u043C\u0435\u043D\u0442\u0430\u0446\u0438\u044E \u043D\u0430 "Homogenized Multiturn Coil \u2013 Generic" \u0447\u0430\u0441\u0442\u044C \u0433\u0435\u043E\u043C\u0435\u0442\u0440\u0438\u0438.
partdescr_acdc/hc_dom_rectangular_with_fillet = \u0413\u043E\u043C\u043E\u0433\u0435\u043D\u0438\u0437\u0438\u0440\u043E\u0432\u0430\u043D\u043D\u0430\u044F \u043C\u043D\u043E\u0433\u043E\u0432\u0438\u0442\u043A\u043E\u0432\u0430\u044F \u043A\u0430\u0442\u0443\u0448\u043A\u0430 \u2013 \u041E\u0442\u043D\u043E\u0441\u044F\u0449\u0430\u044F\u0441\u044F \u043A \u043E\u0431\u043B\u0430\u0441\u0442\u0438, \u043F\u0440\u044F\u043C\u043E\u0443\u0433\u043E\u043B\u044C\u043D\u0430\u044F, \u0441\u043A\u0440\u0443\u0433\u043B\u0435\u043D\u043D\u0430\u044F\n\n\u042D\u0442\u043E \u043F\u0440\u043E\u0438\u0437\u0432\u043E\u0434\u043D\u0430\u044F \u043E\u0442 "Homogenized Multiturn Coil \u2013 Generic" \u0433\u0435\u043E\u043C\u0435\u0442\u0440\u0438\u0447\u0435\u0441\u043A\u043E\u0439 \u0447\u0430\u0441\u0442\u0438, \u0433\u0434\u0435:\n\n\u2022 \u0422\u0438\u043F \u043A\u0430\u0442\u0443\u0448\u043A\u0438 \u043E\u0433\u0440\u0430\u043D\u0438\u0447\u0435\u043D "domain coil"; \u0440\u0430\u0437\u043C\u0435\u0440\u044B \u043F\u043E\u043F\u0435\u0440\u0435\u0447\u043D\u043E\u0433\u043E \u0441\u0435\u0447\u0435\u043D\u0438\u044F \u0436\u0433\u0443\u0442\u0430 \u043C\u043E\u0436\u043D\u043E \u0437\u0430\u0434\u0430\u0442\u044C \u0441 \u043F\u043E\u043C\u043E\u0449\u044C\u044E \u0432\u0445\u043E\u0434\u043D\u044B\u0445 \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440\u043E\u0432 "coil_thickness" \u0438 "coil_height".\n\u2022 \u0422\u0438\u043F \u044F\u0434\u0440\u0430 \u043E\u0433\u0440\u0430\u043D\u0438\u0447\u0435\u043D "rectangular with fixed fillet"; \u0440\u0430\u0437\u043C\u0435\u0440\u044B \u043C\u043E\u0436\u043D\u043E \u0437\u0430\u0434\u0430\u0442\u044C \u0441 \u043F\u043E\u043C\u043E\u0449\u044C\u044E \u0432\u0445\u043E\u0434\u043D\u044B\u0445 \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440\u043E\u0432 "coil_width" \u0438 "coil_depth". \u0420\u0430\u0434\u0438\u0443\u0441 \u0432\u043D\u0435\u0448\u043D\u0435\u0433\u043E \u0441\u043A\u0440\u0443\u0433\u043B\u0435\u043D\u0438\u044F \u0440\u0443\u043B\u043E\u043D\u0430 \u0431\u044B\u043B \u043E\u0433\u0440\u0430\u043D\u0438\u0447\u0435\u043D \u0442\u043E\u043B\u0449\u0438\u043D\u043E\u0439 \u043F\u0443\u0447\u043A\u0430, \u0447\u0442\u043E \u043F\u0440\u0438\u0432\u0435\u043B\u043E \u043A \u043E\u0431\u0440\u0430\u0437\u043E\u0432\u0430\u043D\u0438\u044E \u043E\u0441\u0442\u0440\u043E\u0433\u043E \u0443\u0433\u043B\u0430 \u0432\u043D\u0443\u0442\u0440\u0438.\n\n\u0414\u043B\u044F \u043F\u043E\u043B\u0443\u0447\u0435\u043D\u0438\u044F \u0434\u043E\u043F\u043E\u043B\u043D\u0438\u0442\u0435\u043B\u044C\u043D\u043E\u0439 \u0438\u043D\u0444\u043E\u0440\u043C\u0430\u0446\u0438\u0438 \u043E\u0437\u043D\u0430\u043A\u043E\u043C\u044C\u0442\u0435\u0441\u044C \u0441 \u0434\u043E\u043A\u0443\u043C\u0435\u043D\u0442\u0430\u0446\u0438\u0435\u0439 \u043F\u043E \u0447\u0430\u0441\u0442\u0438 \u0433\u0435\u043E\u043C\u0435\u0442\u0440\u0438\u0438 "Homogenized Multiturn Coil \u2013 Generic".
partdescr_acdc/hc_dom_rectangular_with_sharp_corner = \u0413\u043E\u043C\u043E\u0433\u0435\u043D\u0438\u0437\u0438\u0440\u043E\u0432\u0430\u043D\u043D\u0430\u044F \u043C\u043D\u043E\u0433\u043E\u0432\u0438\u0442\u043A\u043E\u0432\u0430\u044F \u043A\u0430\u0442\u0443\u0448\u043A\u0430 \u2013 \u041E\u0431\u043B\u0430\u0441\u0442\u044C, \u043F\u0440\u044F\u043C\u043E\u0443\u0433\u043E\u043B\u044C\u043D\u0430\u044F, \u0441 \u043E\u0441\u0442\u0440\u044B\u043C\u0438 \u0443\u0433\u043B\u0430\u043C\u0438\n\n\u042D\u0442\u043E \u043F\u0440\u043E\u0438\u0437\u0432\u043E\u0434\u043D\u0430\u044F \u043E\u0442 "Homogenized Multiturn Coil \u2013 Generic" \u0433\u0435\u043E\u043C\u0435\u0442\u0440\u0438\u0447\u0435\u0441\u043A\u043E\u0439 \u0447\u0430\u0441\u0442\u0438, \u0433\u0434\u0435:\n\n\u2022 \u0422\u0438\u043F \u043A\u0430\u0442\u0443\u0448\u043A\u0438 \u043E\u0433\u0440\u0430\u043D\u0438\u0447\u0435\u043D "domain coil"; \u0440\u0430\u0437\u043C\u0435\u0440\u044B \u043F\u043E\u043F\u0435\u0440\u0435\u0447\u043D\u043E\u0433\u043E \u0441\u0435\u0447\u0435\u043D\u0438\u044F \u0436\u0433\u0443\u0442\u0430 \u043C\u043E\u0436\u043D\u043E \u0437\u0430\u0434\u0430\u0442\u044C \u0441 \u043F\u043E\u043C\u043E\u0449\u044C\u044E \u0432\u0445\u043E\u0434\u043D\u044B\u0445 \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440\u043E\u0432 "coil_thickness" \u0438 "coil_height".\n\u2022 \u0422\u0438\u043F \u0441\u0435\u0440\u0434\u0446\u0435\u0432\u0438\u043D\u044B \u043E\u0433\u0440\u0430\u043D\u0438\u0447\u0435\u043D "rectangular with sharp corner" (\u0431\u0435\u0437 \u0441\u043A\u0440\u0443\u0433\u043B\u0435\u043D\u0438\u044F); \u0440\u0430\u0437\u043C\u0435\u0440\u044B \u043C\u043E\u0436\u043D\u043E \u0437\u0430\u0434\u0430\u0442\u044C \u0441 \u043F\u043E\u043C\u043E\u0449\u044C\u044E \u0432\u0445\u043E\u0434\u043D\u044B\u0445 \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440\u043E\u0432 "coil_width" \u0438 "coil_depth".\n\n\u0414\u043B\u044F \u043F\u043E\u043B\u0443\u0447\u0435\u043D\u0438\u044F \u0434\u043E\u043F\u043E\u043B\u043D\u0438\u0442\u0435\u043B\u044C\u043D\u043E\u0439 \u0438\u043D\u0444\u043E\u0440\u043C\u0430\u0446\u0438\u0438 \u043E\u0437\u043D\u0430\u043A\u043E\u043C\u044C\u0442\u0435\u0441\u044C \u0441 \u0434\u043E\u043A\u0443\u043C\u0435\u043D\u0442\u0430\u0446\u0438\u0435\u0439 \u043F\u043E \u0447\u0430\u0441\u0442\u0438 \u0433\u0435\u043E\u043C\u0435\u0442\u0440\u0438\u0438 "Homogenized Multiturn Coil \u2013 Generic".
partdescr_acdc/hc_hob_circular = Homogenized Multiturn Coil \u2013 Horizontal Boundary, Circular\n\n\u042D\u0442\u043E \u043F\u0440\u043E\u0438\u0437\u0432\u043E\u0434\u043D\u0430\u044F \u043E\u0442 \u0447\u0430\u0441\u0442\u0438 \u0433\u0435\u043E\u043C\u0435\u0442\u0440\u0438\u0438 "Homogenized Multiturn Coil \u2013 Generic", \u0433\u0434\u0435:\n\n\u2022 \u0422\u0438\u043F \u043A\u0430\u0442\u0443\u0448\u043A\u0438 \u0431\u044B\u043B \u043E\u0433\u0440\u0430\u043D\u0438\u0447\u0435\u043D "horizontal boundary coil"; \u0442\u043E\u043B\u0449\u0438\u043D\u0443 \u043F\u0443\u0447\u043A\u0430 \u043C\u043E\u0436\u043D\u043E \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u0438\u0442\u044C \u0441 \u043F\u043E\u043C\u043E\u0449\u044C\u044E \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440\u0430 \u0432\u0432\u043E\u0434\u0430 "coil_thickness"\n\u2022 \u0422\u0438\u043F \u044F\u0434\u0440\u0430 \u043E\u0433\u0440\u0430\u043D\u0438\u0447\u0435\u043D "circular"; \u0434\u0438\u0430\u043C\u0435\u0442\u0440 \u043C\u043E\u0436\u0435\u0442 \u0431\u044B\u0442\u044C \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u043B\u0435\u043D \u0441 \u043F\u043E\u043C\u043E\u0449\u044C\u044E \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440\u0430 \u0432\u0432\u043E\u0434\u0430 "coil_diameter"\n\n \u0414\u043B\u044F \u043F\u043E\u043B\u0443\u0447\u0435\u043D\u0438\u044F \u0434\u043E\u043F\u043E\u043B\u043D\u0438\u0442\u0435\u043B\u044C\u043D\u043E\u0439 \u0438\u043D\u0444\u043E\u0440\u043C\u0430\u0446\u0438\u0438, \u043F\u043E\u0436\u0430\u043B\u0443\u0439\u0441\u0442\u0430, \u043F\u0440\u043E\u0432\u0435\u0440\u044C\u0442\u0435 \u0434\u043E\u043A\u0443\u043C\u0435\u043D\u0442\u0430\u0446\u0438\u044E \u043D\u0430 "Homogenized Multiturn Coil \u2013 Generic" \u0447\u0430\u0441\u0442\u044C \u0433\u0435\u043E\u043C\u0435\u0442\u0440\u0438\u0438.
partdescr_acdc/hc_hob_racetrack = Homogenized Multiturn Coil \u2013 Horizontal Boundary, Racetrack\n\n\u042D\u0442\u043E \u043F\u0440\u043E\u0438\u0437\u0432\u043E\u0434\u043D\u0430\u044F \u043E\u0442 \u0447\u0430\u0441\u0442\u0438 \u0433\u0435\u043E\u043C\u0435\u0442\u0440\u0438\u0438 "Homogenized Multiturn Coil \u2013 Generic", \u0433\u0434\u0435:\n\n\u2022 \u0422\u0438\u043F \u043A\u0430\u0442\u0443\u0448\u043A\u0438 \u0431\u044B\u043B \u043E\u0433\u0440\u0430\u043D\u0438\u0447\u0435\u043D "horizontal boundary coil"; \u0442\u043E\u043B\u0449\u0438\u043D\u0443 \u043F\u0443\u0447\u043A\u0430 \u043C\u043E\u0436\u043D\u043E \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u0438\u0442\u044C \u0441 \u043F\u043E\u043C\u043E\u0449\u044C\u044E \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440\u0430 \u0432\u0432\u043E\u0434\u0430 "coil_thickness"\n\u2022 \u041E\u0441\u043D\u043E\u0432\u043D\u043E\u0439 \u0442\u0438\u043F \u0431\u044B\u043B \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u043B\u0435\u043D \u043D\u0430 "rectangular with fillet" (\u043F\u043E \u0443\u043C\u043E\u043B\u0447\u0430\u043D\u0438\u044E); \u0440\u0430\u0437\u043C\u0435\u0440\u044B \u043C\u043E\u0433\u0443\u0442 \u0431\u044B\u0442\u044C \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u043B\u0435\u043D\u044B \u0441 \u0438\u0441\u043F\u043E\u043B\u044C\u0437\u043E\u0432\u0430\u043D\u0438\u0435\u043C \u0432\u0445\u043E\u0434\u043D\u044B\u0445 \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440\u043E\u0432 "coil_width" \u0438 "coil_depth". \u0420\u0430\u0437\u043C\u0435\u0440 \u0444\u0438\u043B\u0435 \u043C\u043E\u0436\u043D\u043E \u0441\u043A\u043E\u0440\u0440\u0435\u043A\u0442\u0438\u0440\u043E\u0432\u0430\u0442\u044C \u0441 \u043F\u043E\u043C\u043E\u0449\u044C\u044E \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440\u0430 "coil_fillet". \u041D\u0430\u0440\u0443\u0436\u043D\u044B\u0439 \u0440\u0430\u0434\u0438\u0443\u0441 \u0444\u0438\u043B\u0435 \u043A\u0430\u0442\u0443\u0448\u043A\u0438 \u0438\u043C\u0435\u0435\u0442 \u043D\u0438\u0436\u043D\u044E\u044E \u0433\u0440\u0430\u043D\u0438\u0446\u0443, \u043A\u043E\u0442\u043E\u0440\u0430\u044F \u0440\u0430\u0432\u043D\u0430 "coil_thickness"\n\n \u0414\u043B\u044F \u043F\u043E\u043B\u0443\u0447\u0435\u043D\u0438\u044F \u0434\u043E\u043F\u043E\u043B\u043D\u0438\u0442\u0435\u043B\u044C\u043D\u043E\u0439 \u0438\u043D\u0444\u043E\u0440\u043C\u0430\u0446\u0438\u0438, \u043F\u043E\u0436\u0430\u043B\u0443\u0439\u0441\u0442\u0430, \u043F\u0440\u043E\u0432\u0435\u0440\u044C\u0442\u0435 \u0434\u043E\u043A\u0443\u043C\u0435\u043D\u0442\u0430\u0446\u0438\u044E \u043D\u0430 "Homogenized Multiturn Coil \u2013 Generic" \u0447\u0430\u0441\u0442\u044C \u0433\u0435\u043E\u043C\u0435\u0442\u0440\u0438\u0438.
partdescr_acdc/hc_hob_rectangular_with_fillet = Homogenized Multiturn Coil \u2013 Horizontal Boundary, Rectangular, Fillet\n\n\u042D\u0442\u043E \u043F\u0440\u043E\u0438\u0437\u0432\u043E\u0434\u043D\u0430\u044F \u043E\u0442 \u0447\u0430\u0441\u0442\u0438 \u0433\u0435\u043E\u043C\u0435\u0442\u0440\u0438\u0438 "Homogenized Multiturn Coil \u2013 Generic", \u0433\u0434\u0435:\n\n\u2022 \u0422\u0438\u043F \u043A\u0430\u0442\u0443\u0448\u043A\u0438 \u0431\u044B\u043B \u043E\u0433\u0440\u0430\u043D\u0438\u0447\u0435\u043D "horizontal boundary coil"; \u0442\u043E\u043B\u0449\u0438\u043D\u0443 \u043F\u0443\u0447\u043A\u0430 \u043C\u043E\u0436\u043D\u043E \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u0438\u0442\u044C \u0441 \u043F\u043E\u043C\u043E\u0449\u044C\u044E \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440\u0430 \u0432\u0432\u043E\u0434\u0430 "coil_thickness"\n\u2022 \u0422\u0438\u043F \u044F\u0434\u0440\u0430 \u0431\u044B\u043B \u043E\u0433\u0440\u0430\u043D\u0438\u0447\u0435\u043D "rectangular with fixed fillet"; \u0440\u0430\u0437\u043C\u0435\u0440\u044B \u043C\u043E\u0433\u0443\u0442 \u0431\u044B\u0442\u044C \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u043B\u0435\u043D\u044B \u0441 \u0438\u0441\u043F\u043E\u043B\u044C\u0437\u043E\u0432\u0430\u043D\u0438\u0435\u043C \u0432\u0445\u043E\u0434\u043D\u044B\u0445 \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440\u043E\u0432 "coil_width" \u0438 "coil_depth". \u041D\u0430\u0440\u0443\u0436\u043D\u044B\u0439 \u0440\u0430\u0434\u0438\u0443\u0441 \u0444\u0438\u043B\u0435 \u043A\u0430\u0442\u0443\u0448\u043A\u0438 \u0431\u044B\u043B \u043E\u0433\u0440\u0430\u043D\u0438\u0447\u0435\u043D, \u0447\u0442\u043E\u0431\u044B \u0431\u044B\u0442\u044C \u0440\u0430\u0432\u043D\u044B\u043C \u0442\u043E\u043B\u0449\u0438\u043D\u0435 \u043F\u0443\u0447\u043A\u0430, \u0432 \u0440\u0435\u0437\u0443\u043B\u044C\u0442\u0430\u0442\u0435 \u0447\u0435\u0433\u043E \u043E\u0441\u0442\u0440\u044B\u0439 \u0443\u0433\u043E\u043B \u043D\u0430 \u0432\u043D\u0443\u0442\u0440\u0435\u043D\u043D\u0435\u0439 \u0441\u0442\u043E\u0440\u043E\u043D\u0435.\n\n \u0414\u043B\u044F \u043F\u043E\u043B\u0443\u0447\u0435\u043D\u0438\u044F \u0434\u043E\u043F\u043E\u043B\u043D\u0438\u0442\u0435\u043B\u044C\u043D\u043E\u0439 \u0438\u043D\u0444\u043E\u0440\u043C\u0430\u0446\u0438\u0438, \u043F\u043E\u0436\u0430\u043B\u0443\u0439\u0441\u0442\u0430, \u043F\u0440\u043E\u0432\u0435\u0440\u044C\u0442\u0435 \u0434\u043E\u043A\u0443\u043C\u0435\u043D\u0442\u0430\u0446\u0438\u044E \u043D\u0430 "Homogenized Multiturn Coil \u2013 Generic" \u0447\u0430\u0441\u0442\u044C \u0433\u0435\u043E\u043C\u0435\u0442\u0440\u0438\u0438.
partdescr_acdc/hc_hob_rectangular_with_sharp_corner = Homogenized Multiturn Coil \u2013 Horizontal Boundary, Rectangular, Sharp Corner\n\n\u042D\u0442\u043E \u043F\u0440\u043E\u0438\u0437\u0432\u043E\u0434\u043D\u0430\u044F \u043E\u0442 \u0447\u0430\u0441\u0442\u0438 \u0433\u0435\u043E\u043C\u0435\u0442\u0440\u0438\u0438 "Homogenized Multiturn Coil \u2013 Generic", \u0433\u0434\u0435:\n\n\u2022 \u0422\u0438\u043F \u043A\u0430\u0442\u0443\u0448\u043A\u0438 \u0431\u044B\u043B \u043E\u0433\u0440\u0430\u043D\u0438\u0447\u0435\u043D "horizontal boundary coil"; \u0442\u043E\u043B\u0449\u0438\u043D\u0443 \u043F\u0443\u0447\u043A\u0430 \u043C\u043E\u0436\u043D\u043E \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u0438\u0442\u044C \u0441 \u043F\u043E\u043C\u043E\u0449\u044C\u044E \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440\u0430 \u0432\u0432\u043E\u0434\u0430 "coil_thickness"\n\u2022 \u0422\u0438\u043F \u044F\u0434\u0440\u0430 \u0431\u044B\u043B \u043E\u0433\u0440\u0430\u043D\u0438\u0447\u0435\u043D "rectangular with sharp corner" (\u0431\u0435\u0437 \u0444\u0438\u043B\u0435); \u0440\u0430\u0437\u043C\u0435\u0440\u044B \u043C\u043E\u0433\u0443\u0442 \u0431\u044B\u0442\u044C \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u043B\u0435\u043D\u044B \u0441 \u043F\u043E\u043C\u043E\u0449\u044C\u044E "coil_width" \u0438 "coil_depth" \u0432\u0445\u043E\u0434\u043D\u044B\u0445 \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440\u043E\u0432.\n\n \u0414\u043B\u044F \u043F\u043E\u043B\u0443\u0447\u0435\u043D\u0438\u044F \u0434\u043E\u043F\u043E\u043B\u043D\u0438\u0442\u0435\u043B\u044C\u043D\u043E\u0439 \u0438\u043D\u0444\u043E\u0440\u043C\u0430\u0446\u0438\u0438, \u043F\u043E\u0436\u0430\u043B\u0443\u0439\u0441\u0442\u0430, \u043F\u0440\u043E\u0432\u0435\u0440\u044C\u0442\u0435 \u0434\u043E\u043A\u0443\u043C\u0435\u043D\u0442\u0430\u0446\u0438\u044E \u043D\u0430 "Homogenized Multiturn Coil \u2013 Generic" \u0447\u0430\u0441\u0442\u044C \u0433\u0435\u043E\u043C\u0435\u0442\u0440\u0438\u0438.
partdescr_acdc/hc_veb_cylindrical = Homogenized Multiturn Coil \u2013 Vertical Boundary, Cylindrical\n\n\u042D\u0442\u043E \u043F\u0440\u043E\u0438\u0437\u0432\u043E\u0434\u043D\u0430\u044F \u043E\u0442 \u0447\u0430\u0441\u0442\u0438 \u0433\u0435\u043E\u043C\u0435\u0442\u0440\u0438\u0438 "Homogenized Multiturn Coil \u2013 Generic", \u0433\u0434\u0435:\n\n\u2022 \u0422\u0438\u043F \u043A\u0430\u0442\u0443\u0448\u043A\u0438 \u0431\u044B\u043B \u043E\u0433\u0440\u0430\u043D\u0438\u0447\u0435\u043D "vertical boundary coil"; \u0432\u044B\u0441\u043E\u0442\u0430 \u043F\u0443\u0447\u043A\u0430 \u043C\u043E\u0436\u0435\u0442 \u0431\u044B\u0442\u044C \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u043B\u0435\u043D\u0430 \u0441 \u043F\u043E\u043C\u043E\u0449\u044C\u044E \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440\u0430 \u0432\u0432\u043E\u0434\u0430 "coil_height"\n\u2022 \u0422\u0438\u043F \u044F\u0434\u0440\u0430 \u043E\u0433\u0440\u0430\u043D\u0438\u0447\u0435\u043D "cylindrical"; \u0434\u0438\u0430\u043C\u0435\u0442\u0440 \u043C\u043E\u0436\u0435\u0442 \u0431\u044B\u0442\u044C \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u043B\u0435\u043D \u0441 \u043F\u043E\u043C\u043E\u0449\u044C\u044E \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440\u0430 \u0432\u0432\u043E\u0434\u0430 "coil_diameter"\n\n \u0414\u043B\u044F \u043F\u043E\u043B\u0443\u0447\u0435\u043D\u0438\u044F \u0434\u043E\u043F\u043E\u043B\u043D\u0438\u0442\u0435\u043B\u044C\u043D\u043E\u0439 \u0438\u043D\u0444\u043E\u0440\u043C\u0430\u0446\u0438\u0438, \u043F\u043E\u0436\u0430\u043B\u0443\u0439\u0441\u0442\u0430, \u043F\u0440\u043E\u0432\u0435\u0440\u044C\u0442\u0435 \u0434\u043E\u043A\u0443\u043C\u0435\u043D\u0442\u0430\u0446\u0438\u044E \u043D\u0430 "Homogenized Multiturn Coil \u2013 Generic" \u0447\u0430\u0441\u0442\u044C \u0433\u0435\u043E\u043C\u0435\u0442\u0440\u0438\u0438.
partdescr_acdc/hc_veb_racetrack = Homogenized Multiturn Coil \u2013 Vertical Boundary, Racetrack\n\n\u042D\u0442\u043E \u043F\u0440\u043E\u0438\u0437\u0432\u043E\u0434\u043D\u0430\u044F \u043E\u0442 \u0447\u0430\u0441\u0442\u0438 \u0433\u0435\u043E\u043C\u0435\u0442\u0440\u0438\u0438 "Homogenized Multiturn Coil \u2013 Generic", \u0433\u0434\u0435:\n\n\u2022 \u0422\u0438\u043F \u043A\u0430\u0442\u0443\u0448\u043A\u0438 \u0431\u044B\u043B \u043E\u0433\u0440\u0430\u043D\u0438\u0447\u0435\u043D "vertical boundary coil"; \u0432\u044B\u0441\u043E\u0442\u0430 \u043F\u0443\u0447\u043A\u0430 \u043C\u043E\u0436\u0435\u0442 \u0431\u044B\u0442\u044C \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u043B\u0435\u043D\u0430 \u0441 \u043F\u043E\u043C\u043E\u0449\u044C\u044E \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440\u0430 \u0432\u0432\u043E\u0434\u0430 "coil_height"\n\u2022 \u041E\u0441\u043D\u043E\u0432\u043D\u043E\u0439 \u0442\u0438\u043F \u0431\u044B\u043B \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u043B\u0435\u043D \u043D\u0430 "rectangular with fillet" (\u043F\u043E \u0443\u043C\u043E\u043B\u0447\u0430\u043D\u0438\u044E); \u0440\u0430\u0437\u043C\u0435\u0440\u044B \u043C\u043E\u0433\u0443\u0442 \u0431\u044B\u0442\u044C \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u043B\u0435\u043D\u044B \u0441 \u0438\u0441\u043F\u043E\u043B\u044C\u0437\u043E\u0432\u0430\u043D\u0438\u0435\u043C \u0432\u0445\u043E\u0434\u043D\u044B\u0445 \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440\u043E\u0432 "coil_width" \u0438 "coil_depth". \u0420\u0430\u0437\u043C\u0435\u0440 \u0444\u0438\u043B\u0435 \u043C\u043E\u0436\u043D\u043E \u0441\u043A\u043E\u0440\u0440\u0435\u043A\u0442\u0438\u0440\u043E\u0432\u0430\u0442\u044C \u0441 \u043F\u043E\u043C\u043E\u0449\u044C\u044E "coil_fillet" parameter.\n\n \u0414\u043B\u044F \u043F\u043E\u043B\u0443\u0447\u0435\u043D\u0438\u044F \u0434\u043E\u043F\u043E\u043B\u043D\u0438\u0442\u0435\u043B\u044C\u043D\u043E\u0439 \u0438\u043D\u0444\u043E\u0440\u043C\u0430\u0446\u0438\u0438, \u043F\u043E\u0436\u0430\u043B\u0443\u0439\u0441\u0442\u0430, \u043F\u0440\u043E\u0432\u0435\u0440\u044C\u0442\u0435 \u0434\u043E\u043A\u0443\u043C\u0435\u043D\u0442\u0430\u0446\u0438\u044E \u043D\u0430 "Homogenized Multiturn Coil \u2013 Generic" \u0447\u0430\u0441\u0442\u044C \u0433\u0435\u043E\u043C\u0435\u0442\u0440\u0438\u0438.
partdescr_acdc/hc_veb_rectangular = Homogenized Multiturn Coil \u2013 Vertical Boundary, Rectangular\n\n\u042D\u0442\u043E \u043F\u0440\u043E\u0438\u0437\u0432\u043E\u0434\u043D\u0430\u044F \u043E\u0442 \u0447\u0430\u0441\u0442\u0438 \u0433\u0435\u043E\u043C\u0435\u0442\u0440\u0438\u0438 "Homogenized Multiturn Coil \u2013 Generic", \u0433\u0434\u0435:\n\n\u2022 \u0422\u0438\u043F \u043A\u0430\u0442\u0443\u0448\u043A\u0438 \u0431\u044B\u043B \u043E\u0433\u0440\u0430\u043D\u0438\u0447\u0435\u043D "vertical boundary coil"; \u0432\u044B\u0441\u043E\u0442\u0430 \u043F\u0443\u0447\u043A\u0430 \u043C\u043E\u0436\u0435\u0442 \u0431\u044B\u0442\u044C \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u043B\u0435\u043D\u0430 \u0441 \u043F\u043E\u043C\u043E\u0449\u044C\u044E \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440\u0430 \u0432\u0432\u043E\u0434\u0430 "coil_height"\n\u2022 \u0422\u0438\u043F \u044F\u0434\u0440\u0430 \u0431\u044B\u043B \u043E\u0433\u0440\u0430\u043D\u0438\u0447\u0435\u043D "rectangular with sharp corner" (\u0431\u0435\u0437 \u0444\u0438\u043B\u0435); \u0440\u0430\u0437\u043C\u0435\u0440\u044B \u043C\u043E\u0433\u0443\u0442 \u0431\u044B\u0442\u044C \u0443\u0441\u0442\u0430\u043D\u043E\u0432\u043B\u0435\u043D\u044B \u0441 \u043F\u043E\u043C\u043E\u0449\u044C\u044E "coil_width" \u0438 "coil_depth" \u0432\u0445\u043E\u0434\u043D\u044B\u0445 \u043F\u0430\u0440\u0430\u043C\u0435\u0442\u0440\u043E\u0432.\n\n \u0414\u043B\u044F \u043F\u043E\u043B\u0443\u0447\u0435\u043D\u0438\u044F \u0434\u043E\u043F\u043E\u043B\u043D\u0438\u0442\u0435\u043B\u044C\u043D\u043E\u0439 \u0438\u043D\u0444\u043E\u0440\u043C\u0430\u0446\u0438\u0438, \u043F\u043E\u0436\u0430\u043B\u0443\u0439\u0441\u0442\u0430, \u043F\u0440\u043E\u0432\u0435\u0440\u044C\u0442\u0435 \u0434\u043E\u043A\u0443\u043C\u0435\u043D\u0442\u0430\u0446\u0438\u044E \u043D\u0430 "Homogenized Multiturn Coil \u2013 Generic" \u0447\u0430\u0441\u0442\u044C \u0433\u0435\u043E\u043C\u0435\u0442\u0440\u0438\u0438.
partdescr_acdc/hc_generic_shape = Homogenized Multiturn Coil \u2013 Generic\n\n \u042D\u0442\u043E \u0443\u043D\u0438\u0432\u0435\u0440\u0441\u0430\u043B\u044C\u043D\u0430\u044F \u0433\u043E\u043C\u043E\u0433\u0435\u043D\u0438\u0437\u0438\u0440\u043E\u0432\u0430\u043D\u043D\u0430\u044F \u0447\u0430\u0441\u0442\u044C \u043C\u043D\u043E\u0433\u043E\u043E\u0431\u043E\u0440\u043E\u0442\u043D\u043E\u0439 \u043A\u0430\u0442\u0443\u0448\u043A\u0438, \u043A\u043E\u0442\u043E\u0440\u0430\u044F \u0438\u0441\u043F\u043E\u043B\u044C\u0437\u0443\u0435\u0442\u0441\u044F \u0432 \u043A\u0430\u0447\u0435\u0441\u0442\u0432\u0435 \u043E\u0441\u043D\u043E\u0432\u044B \u0434\u043B\u044F \u0434\u0440\u0443\u0433\u0438\u0445 \u0431\u043E\u043B\u0435\u0435 \u0441\u043F\u0435\u0446\u0438\u0430\u043B\u0438\u0437\u0438\u0440\u043E\u0432\u0430\u043D\u043D\u044B\u0445 \u0447\u0430\u0441\u0442\u0435\u0439 \u043C\u043D\u043E\u0433\u043E\u043E\u0431\u043E\u0440\u043E\u0442\u043D\u043E\u0439 \u043A\u0430\u0442\u0443\u0448\u043A\u0438. \u0412\u0441\u0435 \u043D\u0430\u0441\u0442\u0440\u043E\u0439\u043A\u0438 \u0432\u0432\u043E\u0434\u0430 \u043E\u0441\u0442\u0430\u044E\u0442\u0441\u044F \u0440\u0430\u0437\u0431\u043B\u043E\u043A\u0438\u0440\u043E\u0432\u0430\u043D\u043D\u044B\u043C\u0438, \u0447\u0442\u043E \u043E\u0437\u043D\u0430\u0447\u0430\u0435\u0442, \u0447\u0442\u043E \u0447\u0430\u0441\u0442\u044C \u043C\u043E\u0436\u0435\u0442 \u0442\u0440\u0430\u043D\u0441\u0444\u043E\u0440\u043C\u0438\u0440\u043E\u0432\u0430\u0442\u044C\u0441\u044F \u0432 \u043B\u044E\u0431\u043E\u0439 \u0438\u0437 \u0434\u0440\u0443\u0433\u0438\u0445 \u043A\u0430\u0442\u0443\u0448\u0435\u043A (\u0432\u044B\u0441\u043E\u043A\u0430\u044F \u0433\u0438\u0431\u043A\u043E\u0441\u0442\u044C, \u043D\u0438\u0437\u043A\u0430\u044F \u0441\u043B\u043E\u0436\u043D\u043E\u0441\u0442\u044C).\n\n \u0414\u043B\u044F \u043F\u043E\u043B\u0443\u0447\u0435\u043D\u0438\u044F \u0434\u043E\u043F\u043E\u043B\u043D\u0438\u0442\u0435\u043B\u044C\u043D\u043E\u0439 \u0438\u043D\u0444\u043E\u0440\u043C\u0430\u0446\u0438\u0438, \u043F\u043E\u0436\u0430\u043B\u0443\u0439\u0441\u0442\u0430, \u043F\u0440\u043E\u0432\u0435\u0440\u044C\u0442\u0435 \u0434\u043E\u043A\u0443\u043C\u0435\u043D\u0442\u0430\u0446\u0438\u044E (\u0441\u043C. \u0441\u043E\u043E\u0442\u0432\u0435\u0442\u0441\u0442\u0432\u0443\u044E\u0449\u0438\u0439 \u0434\u043E\u043A\u0443\u043C\u0435\u043D\u0442 *.pdf).
partdescr_acdc/mc_sip_core_form = Magnetic Core \u2013 Single-Phase, Core Form\n\n\u042D\u0442\u043E \u043F\u0440\u043E\u0438\u0437\u0432\u043E\u0434\u043D\u0430\u044F \u043E\u0442 \u0447\u0430\u0441\u0442\u0438 \u0433\u0435\u043E\u043C\u0435\u0442\u0440\u0438\u0438 "Magnetic Core \u2013 Generic", \u0433\u0434\u0435:\n\n\u2022 \u0424\u0430\u0437\u043E\u0432\u044B\u0439 \u0442\u0438\u043F \u0431\u044B\u043B \u043E\u0433\u0440\u0430\u043D\u0438\u0447\u0435\u043D "single-phase"\n\u2022 \u0422\u0438\u043F \u044F\u0434\u0440\u0430 \u0431\u044B\u043B \u043E\u0433\u0440\u0430\u043D\u0438\u0447\u0435\u043D "core form"\n\n \u0414\u043B\u044F \u043F\u043E\u043B\u0443\u0447\u0435\u043D\u0438\u044F \u0434\u043E\u043F\u043E\u043B\u043D\u0438\u0442\u0435\u043B\u044C\u043D\u043E\u0439 \u0438\u043D\u0444\u043E\u0440\u043C\u0430\u0446\u0438\u0438, \u043F\u043E\u0436\u0430\u043B\u0443\u0439\u0441\u0442\u0430, \u043F\u0440\u043E\u0432\u0435\u0440\u044C\u0442\u0435 \u0434\u043E\u043A\u0443\u043C\u0435\u043D\u0442\u0430\u0446\u0438\u044E \u043D\u0430 "Magnetic Core \u2013 Generic" \u0447\u0430\u0441\u0442\u044C \u0433\u0435\u043E\u043C\u0435\u0442\u0440\u0438\u0438.
partdescr_acdc/mc_sip_shell_form = \u041C\u0430\u0433\u043D\u0438\u0442\u043D\u043E\u0435 \u044F\u0434\u0440\u043E \u2013 Single-Phase, Shell Form\n\n\u042D\u0442\u043E \u043F\u0440\u043E\u0438\u0437\u0432\u043E\u0434\u043D\u0430\u044F \u043E\u0442 \u0447\u0430\u0441\u0442\u0438 \u0433\u0435\u043E\u043C\u0435\u0442\u0440\u0438\u0438 "Magnetic Core \u2013 Generic", \u0433\u0434\u0435:\n\n\u2022 \u0424\u0430\u0437\u043E\u0432\u044B\u0439 \u0442\u0438\u043F \u0431\u044B\u043B \u043E\u0433\u0440\u0430\u043D\u0438\u0447\u0435\u043D "single-phase"\n\u2022 \u0422\u0438\u043F \u044F\u0434\u0440\u0430 \u0431\u044B\u043B \u043E\u0433\u0440\u0430\u043D\u0438\u0447\u0435\u043D "shell form"\n\n \u0414\u043B\u044F \u043F\u043E\u043B\u0443\u0447\u0435\u043D\u0438\u044F \u0434\u043E\u043F\u043E\u043B\u043D\u0438\u0442\u0435\u043B\u044C\u043D\u043E\u0439 \u0438\u043D\u0444\u043E\u0440\u043C\u0430\u0446\u0438\u0438, \u043F\u043E\u0436\u0430\u043B\u0443\u0439\u0441\u0442\u0430, \u043F\u0440\u043E\u0432\u0435\u0440\u044C\u0442\u0435 \u0434\u043E\u043A\u0443\u043C\u0435\u043D\u0442\u0430\u0446\u0438\u044E \u043D\u0430 "Magnetic Core \u2013 Generic" \u0447\u0430\u0441\u0442\u044C \u0433\u0435\u043E\u043C\u0435\u0442\u0440\u0438\u0438.
partdescr_acdc/mc_thp_core_form = Magnetic Core \u2013 Three-Phase, Core Form\n\n\u042D\u0442\u043E \u043F\u0440\u043E\u0438\u0437\u0432\u043E\u0434\u043D\u0430\u044F \u043E\u0442 \u0447\u0430\u0441\u0442\u0438 \u0433\u0435\u043E\u043C\u0435\u0442\u0440\u0438\u0438 "Magnetic Core \u2013 Generic", \u0433\u0434\u0435:\n\n\u2022 \u0424\u0430\u0437\u043E\u0432\u044B\u0439 \u0442\u0438\u043F \u0431\u044B\u043B \u043E\u0433\u0440\u0430\u043D\u0438\u0447\u0435\u043D "three-phase"\n\u2022 \u0422\u0438\u043F \u044F\u0434\u0440\u0430 \u0431\u044B\u043B \u043E\u0433\u0440\u0430\u043D\u0438\u0447\u0435\u043D "core form"\n\n \u0414\u043B\u044F \u043F\u043E\u043B\u0443\u0447\u0435\u043D\u0438\u044F \u0434\u043E\u043F\u043E\u043B\u043D\u0438\u0442\u0435\u043B\u044C\u043D\u043E\u0439 \u0438\u043D\u0444\u043E\u0440\u043C\u0430\u0446\u0438\u0438, \u043F\u043E\u0436\u0430\u043B\u0443\u0439\u0441\u0442\u0430, \u043F\u0440\u043E\u0432\u0435\u0440\u044C\u0442\u0435 \u0434\u043E\u043A\u0443\u043C\u0435\u043D\u0442\u0430\u0446\u0438\u044E \u043D\u0430 "Magnetic Core \u2013 Generic" \u0447\u0430\u0441\u0442\u044C \u0433\u0435\u043E\u043C\u0435\u0442\u0440\u0438\u0438.
partdescr_acdc/mc_thp_shell_form = \u041C\u0430\u0433\u043D\u0438\u0442\u043D\u043E\u0435 \u044F\u0434\u0440\u043E \u2013 Three-Phase, Shell Form\n\n\u042D\u0442\u043E \u043F\u0440\u043E\u0438\u0437\u0432\u043E\u0434\u043D\u0430\u044F \u043E\u0442 \u0447\u0430\u0441\u0442\u0438 \u0433\u0435\u043E\u043C\u0435\u0442\u0440\u0438\u0438 "Magnetic Core \u2013 Generic", \u0433\u0434\u0435:\n\n\u2022 \u0424\u0430\u0437\u043E\u0432\u044B\u0439 \u0442\u0438\u043F \u0431\u044B\u043B \u043E\u0433\u0440\u0430\u043D\u0438\u0447\u0435\u043D "three-phase"\n\u2022 \u0422\u0438\u043F \u044F\u0434\u0440\u0430 \u0431\u044B\u043B \u043E\u0433\u0440\u0430\u043D\u0438\u0447\u0435\u043D "shell form"\n\n \u0414\u043B\u044F \u043F\u043E\u043B\u0443\u0447\u0435\u043D\u0438\u044F \u0434\u043E\u043F\u043E\u043B\u043D\u0438\u0442\u0435\u043B\u044C\u043D\u043E\u0439 \u0438\u043D\u0444\u043E\u0440\u043C\u0430\u0446\u0438\u0438, \u043F\u043E\u0436\u0430\u043B\u0443\u0439\u0441\u0442\u0430, \u043F\u0440\u043E\u0432\u0435\u0440\u044C\u0442\u0435 \u0434\u043E\u043A\u0443\u043C\u0435\u043D\u0442\u0430\u0446\u0438\u044E \u043D\u0430 "Magnetic Core \u2013 Generic" \u0447\u0430\u0441\u0442\u044C \u0433\u0435\u043E\u043C\u0435\u0442\u0440\u0438\u0438.
partdescr_acdc/mc_generic_shape = \u041C\u0430\u0433\u043D\u0438\u0442\u043D\u043E\u0435 \u044F\u0434\u0440\u043E \u2013 Generic\n\n \u042D\u0442\u043E \u043E\u0431\u0449\u0430\u044F \u0447\u0430\u0441\u0442\u044C \u043C\u0430\u0433\u043D\u0438\u0442\u043D\u043E\u0433\u043E \u044F\u0434\u0440\u0430, \u043A\u043E\u0442\u043E\u0440\u0430\u044F \u0438\u0441\u043F\u043E\u043B\u044C\u0437\u0443\u0435\u0442\u0441\u044F \u0432 \u043A\u0430\u0447\u0435\u0441\u0442\u0432\u0435 \u043E\u0441\u043D\u043E\u0432\u044B \u0434\u043B\u044F \u0434\u0440\u0443\u0433\u0438\u0445 \u0431\u043E\u043B\u0435\u0435 \u0441\u043F\u0435\u0446\u0438\u0430\u043B\u0438\u0437\u0438\u0440\u043E\u0432\u0430\u043D\u043D\u044B\u0445 \u0447\u0430\u0441\u0442\u0435\u0439 \u043C\u0430\u0433\u043D\u0438\u0442\u043D\u043E\u0433\u043E \u044F\u0434\u0440\u0430. \u0412\u0441\u0435 \u043D\u0430\u0441\u0442\u0440\u043E\u0439\u043A\u0438 \u0432\u0432\u043E\u0434\u0430 \u043E\u0441\u0442\u0430\u044E\u0442\u0441\u044F \u0440\u0430\u0437\u0431\u043B\u043E\u043A\u0438\u0440\u043E\u0432\u0430\u043D\u043D\u044B\u043C\u0438, \u0447\u0442\u043E \u043E\u0437\u043D\u0430\u0447\u0430\u0435\u0442, \u0447\u0442\u043E \u0447\u0430\u0441\u0442\u044C \u043C\u043E\u0436\u0435\u0442 \u0442\u0440\u0430\u043D\u0441\u0444\u043E\u0440\u043C\u0438\u0440\u043E\u0432\u0430\u0442\u044C\u0441\u044F \u0432 \u043B\u044E\u0431\u043E\u043C \u0438\u0437 \u0434\u0440\u0443\u0433\u0438\u0445 \u044F\u0434\u0435\u0440 (\u0432\u043E\u0441\u0445\u043E\u0434 - \u0433\u0438\u0431\u043A\u043E\u0441\u0442\u044C, \u043D\u0435\u0434\u043E\u0441\u0442\u0430\u0442\u043E\u043A - \u0441\u043B\u043E\u0436\u043D\u043E\u0441\u0442\u044C).\n\n \u0414\u043B\u044F \u043F\u043E\u043B\u0443\u0447\u0435\u043D\u0438\u044F \u0434\u043E\u043F\u043E\u043B\u043D\u0438\u0442\u0435\u043B\u044C\u043D\u043E\u0439 \u0438\u043D\u0444\u043E\u0440\u043C\u0430\u0446\u0438\u0438, \u043F\u043E\u0436\u0430\u043B\u0443\u0439\u0441\u0442\u0430, \u043F\u0440\u043E\u0432\u0435\u0440\u044C\u0442\u0435 \u0434\u043E\u043A\u0443\u043C\u0435\u043D\u0442\u0430\u0446\u0438\u044E (\u0441\u043C. \u0441\u043E\u043E\u0442\u0432\u0435\u0442\u0441\u0442\u0432\u0443\u044E\u0449\u0438\u0439 \u0434\u043E\u043A\u0443\u043C\u0435\u043D\u0442 *.pdf).
partdescr_heat/heat_sink_dissimilar_border = Heat Sink \u2013 Dissimilar Border Pins\n\n \u0413\u0435\u043E\u043C\u0435\u0442\u0440\u0438\u0447\u0435\u0441\u043A\u0430\u044F \u0447\u0430\u0441\u0442\u044C \u0441 \u0440\u0430\u0441\u043F\u0440\u0435\u0434\u0435\u043B\u0435\u043D\u0438\u0435\u043C \u043F\u0438\u043D-\u0444\u0438\u043D\u043E\u0432 \u0432 \u043D\u0430\u043F\u0440\u0430\u0432\u043B\u0435\u043D\u0438\u044F\u0445 x \u0438 y. \u0413\u0440\u0430\u043D\u0438\u0447\u043D\u044B\u0435 \u043F\u043B\u0430\u0432\u043D\u0438\u043A\u0438 \u0432 \u043D\u0430\u043F\u0440\u0430\u0432\u043B\u0435\u043D\u0438\u0438 y \u043C\u043E\u0433\u0443\u0442 \u0438\u043C\u0435\u0442\u044C \u0440\u0430\u0437\u043D\u044B\u0435 \u0444\u043E\u0440\u043C\u044B.
